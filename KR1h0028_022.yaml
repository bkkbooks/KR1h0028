body:
  text: 欽定四庫全書孟子纂疏卷九宋趙順孫撰朱子集註萬章章句上凡九章萬章問曰舜往于田號泣于旻天何爲其號泣也孟子曰怨慕也號平聲舜往于田耕歴山時也仁覆閔下謂之昊天愚案此説出毛詩𫝊號泣于旻天呼天而泣也事見虞書大禹謨篇怨慕怨已之不得其親而思慕也輔氏曰怨者怨咎已之不得其親而不能自已慕者思慕其親而不能自忘也夫父慈子孝理之常也何有於怨慕哉唯其遭事之變故深惟其所以不得於親之故而自怨自咎其在我者有何罪戾而致然又思慕其親無頃刻之忘必欲得其歡心而而後已此舜之所以怨慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明髙曰是非爾所知也夫公明髙以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉惡去聲夫音扶恝苦八反共平聲長息公明髙弟子公明髙曽子弟子于父母亦書辭言呼父母而泣也恝無愁之貌於我何哉自責不知己有何罪耳非怨父母也楊氏曰非孟子深知舜之心不能為此言蓋舜惟恐不順於父母未嘗自以為孝也若自以為孝則非孝矣輔氏曰楊氏𤼵明得舜之心使舜自以是為孝則其心便自止息且如人喫飯纔覺飽則便止矣帝使其子九男二女百官牛羊倉廩備以事舜於畎畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸為去聲帝堯也史記云二女妻之以觀其内文集曰二女娥皇女英也盖夫婦之間隱微之際正始之道所繫尤重故觀人者於此為尤切也九男事之以觀其外又言一年所居成聚二年成邑三年成都是天下之士就之也胥相視也遷之移以與之也如窮人之無所歸言其怨慕迫切之甚也愚謂其怨慕之情迫切之至一如窮人之無所歸託其心焦然怵迫而無所底麗也天下之士悦之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悦之好色富貴無足以解憂者惟順於父母可以解憂孟子推舜之心如此以解上文之意極天下之欲不足以解憂而惟順於父母可以解憂孟子眞知舜之心哉輔氏曰上文是説舜之實此又孟子推𫐠舜之心以解上文之意言舜之心事實有如此者耳舉天下之所欲不足以解憂者所性不存焉故也惟順於父母可以解憂者性之不可離而亦不可以不盡也人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者予於大舜見之矣少好皆去聲言常人之情因物而遷惟聖人為能不失其本心也艾美好也楚詞戰國䇿所謂幼艾義與此同不得失意也熱中躁急心熱也言五十者舜攝政時年五十也五十而慕則其終身慕可知矣眞氏曰五十始衰禮所謂不致毁之時也大舜於此猶慕焉聖人純孝之心不以老而衰也此其所以為終身之慕此章言舜不以得衆人之所欲為已樂而以不順乎親之心為已憂非聖人之盡性其孰能之蔡氏曰衆人之所欲者皆外物也順親者人之本心也溺於外物而失其本心則性不存矣故集註有盡性之言輔氏曰心纔有一豪物欲之累而於其親有一豪之不順則於吾固有之性便有不盡處也能盡其性則能不失其本心而為人倫之至矣萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也懟直類反詩齊國風南山之篇也信誠也誠如此詩之言也懟讎怨也舜父頑母嚚常欲害舜告則不聽其娶是廢人之大倫以讎怨於父母也輔氏曰人之大倫固不可廢亦不容廢也若由父母而廢之則是陷父母於過失而讎怨於父母也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也妻去聲以女為人妻曰妻程子曰堯妻舜而不告者以君治之而已如今之官府治民之私者亦多輔氏曰謂以君命治之不容瞽瞍之不聽也如今之官府治民之私或有牽制而不容聽者則官司以法定使之如此耳萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而揜之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其于予治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜弤都禮反忸女六反怩音尼與平聲完治也捐去也階梯也揜蓋也案史記曰使舜上塗廩瞽瞍從下縦火焚廩舜乃以兩笠自捍而下去得不死後又使舜穿井舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空出去即其事也象舜異母弟也謨謀也蓋蓋井也舜所居三年成都故謂之都君咸皆也績功也舜既入井象不知舜已出欲以殺舜為己功也干盾也戈㦸也琴舜所彈五弦琴也弤琱弓也象欲以舜之牛羊倉廩與父母而自取此物也二嫂堯二女也棲牀也象欲使為己妻也象往舜宫欲分取所有見舜生在牀彈琴蓋既出即潛歸其宫也鬱陶思之甚而氣不得伸也愚謂此言憤結積聚之意象言已思君之甚故來見爾忸怩慙色也臣庶謂其百官也象素憎舜不至其宫故舜見其來而喜使之治其臣庶也孟子言舜非不知其將殺已但見其憂則憂見其喜則喜兄弟之情自有所不能已耳眞氏曰象欲殺舜之迹明甚舜豈不知之然見其憂則憂見其喜則喜略無一豪芥蔕於其中後世骨月之間小有疑隙則猜防萬端惟恐𤼵之不蚤除之不亟至此然後知聖人之心與天同量也萬章所言其有無不可知然舜之心則孟子有以知之矣它亦不足辨也真氏曰世儒以帝堯在上二女嬪虞象無殺舜之理故以孟子為疑不知孟子特論大舜之心使其有是處之不過如此豈必眞有是哉程子曰象憂亦憂象喜亦喜人情天理於是為至輔氏曰象日以殺舜為事肆人欲以絶兄弟之情者也象憂亦憂象喜亦喜順天理以盡兄弟之情者也象之人欲雖萬變而終有窮舜之天理則一定而未嘗易卒之象不格姦而源源以來則舜之天理勝而象之人欲消矣曰然則舜偽喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舎之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智予既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚偽焉與平聲校音效又音教畜許六反校人主池沼小吏也圉圉困而未舒之貌洋洋則稍縱矣攸然而逝者自得而逺去也方亦道也罔蒙蔽也欺以其方謂誑之以理之所有罔以非其道謂昧之以理之所無象以愛兄之道來所謂欺之以其方也舜本不知其偽故實喜之何偽之有輔氏曰誑之以理之所有在君子猶或可欺也昧之以理之所無在君子則必不可惑也象以愛兄之道來正是欺之以其方者然彼以愛兄之道來則舜以愛弟之道接此皆誠實之事何偽之有哉此章又言舜遭人倫之變而不失天理之常也萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉放猶置也置之於此使不得去也萬章疑舜何不誅之孟子言舜實封之而或者誤以為放也萬章曰舜流共工于幽州放驩兠于崇山殺三苖于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎庳音鼻流徙也共工官名文集曰蓋古之世官族也驩兠人名二人比周相與為黨三苖國名負固不服文集曰三苖在江南荆揚之間恃險為亂者也殺殺其君也殛誅也鯀禹父名文集曰鯀崇伯名方命圯族治水無功蔡氏曰圎則行方則止方命者逆命而不行猶今言廢閣詔令也盖鯀之為人悻戾自用不從上令也圯敗族類也言與衆不和傷人害物也楚辭言鯀悻直是其方命圯族之證也皆不仁之人也幽州崇山三危羽山有庳皆地名也愚案幽州北裔之地舜分冀北為幽州崇山南裔之山在今澧州慈利縣三危西裔之地禹貢在雍州或以為燉煌未詳羽山東裔之山在今海州朐山縣或曰今道州鼻亭即有庳之地也未知是否愚案漢書顔師古註云有鼻在零陵今鼻亭是也萬章疑舜不當封象使彼有庳之民無罪而遭象之虐非仁人之心也藏怒謂藏匿其怒宿怨謂留蓄其怨敢問或曰放者何謂也曰象不得有爲於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接于有庳此之謂也孟子言象雖封為有庳之君然不得治其國天子使吏代之治而納其所收之貢稅於象有似於放故或者以為放也蓋象至不仁處之如此則既不失吾親愛之心而彼亦不得虐有庳之民也源源若水之相繼也來謂來朝覲也不及貢以政接于有庳謂不待及諸侯朝貢之期而以政事接見有庳之君蓋古書之辭而孟子引以證源源而來之意見其親愛之無已如此也呉氏曰言聖人不以公義廢私恩亦不以私恩害公義舜之於象仁之至義之盡也語録曰仁之至自是仁之至義之盡自是義之盡封之有庳富貴之也是仁之至使吏治其國而納其貢賦是義之盡後世如景帝之於梁王始則縱之太過不得謂之仁後又窘治之甚峻義又失之皆不足道輔氏曰呉氏說盡聖人事以公義廢私恩則不盡情其流必至於不仁以私恩害公義則不盡義其流必至於不義舜之於象封之有庳富貴之也是不以公義廢私恩象不得有為於其國天子使吏治其國而納其貢稅焉是不以私恩害公義如是則仁義兩盡而天理人情皆極其至矣咸丘蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勲乃徂落百姓如喪考妣三年四海遏密八音孔子曰天無二日民無二王舜既爲天子矣又帥天下諸侯以為堯三年喪是二天子矣朝音潮岌魚及反咸丘蒙孟子弟子語者古語也蹙顰蹙不自安也岌岌不安貌也言人倫乖亂天下將危也齊東齊國之東鄙也孟子言堯但老不治事而舜攝天子之事耳堯在時舜未嘗即天子位堯何由北面而朝乎又引書及孔子之言以明之堯典虞書篇名今此文乃見於舜典蓋古書二篇或合為一耳言舜攝位二十八年而堯死也徂升也落降也人死則䰟升而魄降故古者謂死為徂落語録曰天地隂陽之氣交合便成人氣便是䰟精便是魄到得将死熱氣上出所謂䰟升下體漸冷所謂魄降䰟歸于天魄降于地而人死矣陳氏曰徂是䰟之升上落是魄之降下遏止也密静也八音金石絲竹匏土革木樂噐之音也咸丘蒙曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也不臣堯不以堯為臣使北面而朝也詩小雅北山之篇也普徧也率循也此詩今毛氏序云役使不均已勞於王事而不得養其父母焉其詩下文亦云大夫不均我從事獨賢乃作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也文字也辭語也逆迎也雲漢大雅篇名也孑獨立之貌遺脫也言說詩之法不可以一字而害一句之義不可以一句而害設辭之志當以已意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民眞無遺種矣惟以意逆之則知作詩者之志在於憂旱而非眞無遺民也詩𫝊曰所謂逆者其至否速遲不敢自必而聽於彼也語録曰逆是前去追迎之之意盖是将自家意思去前面等候詩人之志來又曰譬如有一客來自家去迎他他來則接之不來則已若必去捉他來則不可輔氏曰以文害辭是泥一字之文而害一句之辭也以辭害意是泥一句之辭而害詩人設辭之意也又曰意謂已意志謂詩人之志以我之意迎取詩人之志然後可以得之孝子之至莫大乎尊親尊親之至莫大乎以天下養爲天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也養去聲言瞽瞍既爲天子之父則當享天下之養此舜之所以為尊親養親之至也豈有使之北面而朝之理乎詩大雅下武之篇言人能長言孝思而不忘則可以為天下法則也輔氏曰上既言讀詩之法以破咸丘蒙之惑此又言尊親養親之至以見舜無使父朝已之理夫舜既為天子則瞽瞍實為天子之父備享四海九州之奉而舜為尊親養親之至矣故引下武詩以咏嘆之以為如舜者然後可謂能長言孝思而不忘天下以為法則者矣舜盡事親之道而為法於天下即其事也豈有使其父北面而朝之理乎書曰祗載見瞽瞍夔夔齊栗瞽瞍亦允若是為父不得而子也見音現齊側皆反書大禹謨篇也祗敬也載事也蔡氏曰敬其子職之事也夔夔齊栗敬謹恐懼之貌蔡氏曰齊荘敬也栗戰栗也夔夔荘敬戰栗之容也允信也若順也言舜敬事瞽瞍往而見之敬謹如此瞽瞍亦信而順之也蔡氏曰舜之敬畏小心而盡於事親者如此瞽瞍頑愚亦且信之即孟子所謂底豫也孟子引此而言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得而子者而非如咸丘蒙之說也萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人天下者天下之天下非一人之私有故也然則舜有天下也孰與之曰天與之萬章問而孟子答也天與之者諄諄然命之乎諄之淳反萬章問也諄諄詳語之貌曰否天不言以行與事示之而已矣行去聲下同行之於身謂之行措諸天下謂之事言但因舜之行事而示以與之之意耳曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之而已矣暴步卜反下同暴顯也言下能薦人於上不能令上必用之輔氏曰下薦人於上公心也若有令上必用之之心則便是私意矣孟子此數句不惟説得三聖受授之義明白而於人臣薦賢逹善之道大公至正之心亦無餘藴矣彼竊位蔽賢之徒固不足深責而進一善逹一能上以必其君之用下以示一已之恩者皆私意也舜為天人所受是因舜之行與事而示之以與之之意也輔氏曰上只言天此又併民而言者天人一理而實以民為視聽也舜相堯二十有八載此固天也至於朝覲訟獄謳歌則人耳而亦曰天者以天統乎人人與天一也曰敢問薦之於天而天受之暴之於民而民受之如何曰使之主祭而百神享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人治去聲舜相堯二十有八載非人之所能為也天也堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也非天與也相去聲朝音潮夫音扶南河在翼州之南愚謂冀州為帝都在帝都之西者謂之西河在帝都之南者謂之南河其實一河也其南即豫州也訟獄謂獄不決而訟之也太誓曰天視自我民視天聽自我民聽此之謂也自從也天無形其視聽皆從於民之視聽民之歸舜如此則天與之可知矣輔氏曰天無形則無耳目安能有所視聽而天人之理不間豪髪故其視聽皆因民之視聽此又以人兼天也萬章問曰人有言至於禹而徳衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹扵天十有七年舜崩三年之䘮畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之隂朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也朝音潮陽城箕山之隂皆嵩山下深谷中可藏處愚案陽城山在漢頴川郡箕山在嵩髙之北啓禹之子也楊氏曰此語孟子必有所受然不可考矣但云天與賢則與賢天與子則與子可以見堯舜禹之心皆無一豪私意也輔氏曰孟子𤼵天與賢則與賢天與子則與子两句峻潔如此便見得三聖人之心渾是一箇天理更無有一豪私意為之間也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歴年多施澤於民乆啓賢能敬承繼禹之道益之相禹也歴年少施澤於民未乆舜禹益相去乆逺其子之賢不肖皆天也非人之所能爲也莫之爲而爲者天也莫之致而至者命也之相之相去聲相去之相如字堯舜之子皆不肖而舜禹之為相乆此堯舜之子所以不有天下而舜禹有天下也禹之子賢而益相不乆此啓所以有天下而益不有天下也然此皆非人力所為而自為非人力所致而自至者蓋以理言之謂之天自人言之謂之命其實則一而已輔氏曰天無為故非人力所為而自為者天也事未有無故而致者故非人力所致而自至者命也以理言之謂之天此所謂天則天専言之則道者是也以人言之謂之命此所謂命則天之命於人者是也理則天理之本體命則天理之命於人者皆非人力所為所致故曰其實則一而已也陳氏曰天與命只一理就其中却㣲有分别為以做事言做事是人對此而反之非人所為便是天至以吉凶禍福地頭言有因而致是人力對此而反之非力所致便是命天以全體言命以其中妙用言其曰以理言之謂之天是専就天之正面訓義言却包命在其中其曰自人言之謂之命命是天命因人形之而後見故吉凶禍福自天來到於人然後為命乃是於天理中截斷命為一邉而言其指歸爾若只就天一邉説吉凶禍福未有人受來如何見得是命匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下孟子因禹益之事歴舉此下兩條以推明之言仲尼之德雖無愧於舜禹而無天子薦之者故不有天下繼世以有天下天之所廢必若桀紂者也故益伊尹周公不有天下繼世而有天下者其先世皆有大功德於民故必有大惡如桀紂則天乃廢之如啓及太甲成王雖不及益伊尹周公之賢聖但能嗣守先業則天亦不廢之故益伊尹周公雖有舜禹之德而亦不有天下輔氏曰無天子薦之者在孔子之氣數有不完也繼世有賢君者在益伊尹周公之所遇有不同也亦皆莫之為而為莫之致而至者也伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顚覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓已也復歸于亳相王皆去聲艾音乂此承上文言伊尹不有天下之事趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也太甲太丁子也程氏曰古人謂歳爲年湯崩時外丙方二嵗仲壬方四嵗惟太甲差長故立之也二說未知孰是顛覆壞亂也典刑常法也桐湯墓所在艾治也說文云芟草也蓋斬絶自新之意亳商所都也周公之不有天下猶益之於夏伊尹之於殷也此復言周公所以不有天下之意輔氏曰前既言益與伊尹之事矣故此復言以周公不有天下亦若益與伊尹爾所以足前義也孔子曰唐虞禪夏后殷周繼其義一也禪音擅禪授也或禪或繼皆天命也聖人豈有私意於其間哉尹氏曰孔子曰唐虞禪夏后商周繼其義一也孟子曰天與賢則與賢天與子則與子知前聖之心者無如孔子繼孔子者孟子而已矣輔氏曰孔子之言固斷置得好又得孟子𤼵明之尤更明白可謂眞能得前聖之心者知即知而得之也萬章問曰人有言伊尹以割烹要湯有諸要平聲下同要求也案史記伊尹欲行道以致君而無由乃為有莘氏之媵臣愚案湯妃有莘氏之女負鼎俎以滋味説湯致於王道蓋戰國時有為此説者輔氏曰戰國之時去聖漸逺人不知有義理之學稍有才識者則汲汲然志於功名事業以求其富貴利逹雖枉已辱身有所不顧故設為此等議論上以誣聖賢下以便一已之私耳孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人樂音洛莘國名愚案莘國即今同州郃陽縣樂堯舜之道者誦其詩讀其書而欣慕愛樂之也語録曰問是指其實事而言曰然或謂耕田鑿井便是堯舜之道此皆不實不然何以有豈若吾身親見之哉一句駟四匹也介與草芥之芥同言其辭受取與無大無細一以道義而不茍也輔氏曰道體也義用也既曰義又曰道者兼體用言之也先言義後言道者自其用處察之而見其體一也天下干駟所謂大也一介所謂細也物有大細而道義無大細茍害道義則豈間於大細哉此伊尹之辭受取與所以無間於萬鍾之大一介之細而一以道義斷之不以㣲細而茍於取與也湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畝之中由是以樂堯舜之道哉囂五髙反又戸驕反囂囂無欲自得之貌輔氏曰伊尹以堯舜之道自樂故常無欲而自得涵泳其言則舉天下之物果何足以累其心哉湯三使往聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民爲堯舜之民哉吾豈若於吾身親見之哉幡然變動之貌輔氏曰幡有反覆之意故為變動之貌於吾身親見之言於我之身親見其道之行不徒誦說向慕之而已也輔氏曰此皆是樂道之事也言我能使是君為堯舜之君使是民為堯舜之民則我之身親見其道之行而其樂又不空見於誦説向慕之而已也天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也此亦伊尹之言也知謂識其事之所當然覺謂悟其理之所以然語録曰知只是知此一事覺是忽然自理㑹得又曰知者因事因物皆可以知覺則是自心中有所覺悟又曰如知得君之仁臣之敬子之孝父之慈是知此事又知得君之所以仁臣之所以敬父之所以慈子之所以孝是覺此理又曰覺是自悟之覺如大學説格物致知豁然貫通處今人知得此事講解得這箇道理皆知之之事及至自悟則又自有箇見解處輔氏曰知淺而覺深知有界限而覺無偏全覺後知後覺如呼寐者而使之寤也語録曰是我喚醒他輔氏曰此述程子之意也程子云譬之人睡他人未覺而我先覺以我先覺故搖撼其未覺者亦使之覺及其已覺也元無欠少亦未嘗有増加適一般耳此説説得箇覺字極為全備謂覺之而已非有所増益之也言天使者天理當然若使之也程子曰予天民之先覺謂我乃天生此民中盡得民道而先覺者也既為先覺之民豈可不覺其未覺者及彼之覺亦非分我所有以予之也皆彼自有此理我但能覺之而已輔氏曰既為先覺之民豈可不覺其未覺者此解非予覺之而誰也一句盖大學之道既明明德則必在新民到此地位則自然住不得正使不得時與位亦須著如孔孟著書立言以覺萬世始得此皆是不容已者思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中其自任以天下之重如此故就湯而說之以伐夏救民推吐回反内音納説音稅書曰昔先正保衡作我先王曰予弗克俾厥后為堯舜其心愧恥若撻于市一夫不獲則曰時予之辜孟子之言蓋取諸此是時夏桀無道暴虐其民故欲使湯伐夏以救之徐氏曰伊尹樂堯舜之道堯舜揖遜而伊尹說湯以伐夏者時之不同義則一也輔氏曰徐氏於時義上看得分明故集註取之吾未聞枉已而正人者也況辱已以正天下者乎聖人之行不同也或逺或近或去或不去歸潔其身而已矣行去聲辱已甚於枉已輔氏曰枉已謂枉其在已之道辱已則又有恥辱之事及於已矣然辱已實由於枉已固不可以為未甚而有枉於已也正天下難於正人輔氏曰人則有所指而言至於天下則所該廣矣以其廣狹故有難易之辨然正天下實自正人始未有不能正人而能正天下者也若伊尹以割烹要湯辱已甚矣何以正天下乎逺謂隱遁也近謂仕近君也言聖人之行雖不必同然其要歸在潔其身而已輔氏曰聖人之行本無不同其所以不同者所遭之時不同耳故或隱遁而逺去或留仕以近君雖有不同然其要歸則在於潔其身而已所謂潔其身者不使其身陷於不義耳盖身者萬事之本也身之不潔則事無綱領舉皆紛亂而無可為者矣伊尹豈肯以割烹要湯哉吾聞其以堯舜之道要湯未聞以割烹也林氏曰以堯舜之道要湯者非實以是要之也道在此而湯之聘自來耳猶子貢言夫子之求之異乎人之求之也輔氏曰要求也聖人本無求人之心但道徳充足於已而人自來求我亦如聖人之求之耳故子貢謂夫子之求之也異乎人之求之與正與此意相似愚謂此語亦猶前章所論父不得而子之意輔氏曰前章所論父不得而子謂為天子則可臣其父故孟子謂舜不為瞽瞍所化而反化於其子此則所謂父不得而子此章所問伊尹之要湯謂其以割烹故孟子謂非以割烹而乃以堯舜之道要湯其意亦正同也伊訓曰天誅造攻自牧宫朕載自亳伊訓商書篇名孟子引以證伐夏救民之事也輔氏曰此伊尹之所自言於此可見其任重之義則其不肯枉道以要君者必矣事或理明義順則雖犯天下之所甚疑在聖賢則無掩覆之意也今書牧宫作鳴條造載皆始也伊尹言始攻桀無道由我始其事於亳也萬章問曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否不然也好事者爲之也癰於容反疽七余反好去聲主謂舎於其家以之為主人也癰疽痬醫也侍人奄人也瘠姓環名皆時君所近狎之人也好事謂喜造言生事之人也輔氏曰謂其喜好撰造言説以生起事端者於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環是無義無命也讎如字又音犨顔讎由衛之賢大夫也史記作顔濁鄒彌子衛靈公幸臣彌子瑕也徐氏曰禮主於辭遜故進以禮義主於制斷故退以義難進而易退者也在我者有禮義而已得之不得則有命存焉孔子不恱於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當阨主司城貞子爲陳侯周臣要平聲不悦不樂居其國也桓司馬宋大夫向魋也司城貞子亦宋大夫之賢者也陳侯名周案史記孔子為魯司寇齊人饋女樂以間之孔子遂行適衛月餘去衛適宋司馬魋欲殺孔子孔子去至陳主於司城正子孟子言孔子雖當阨難然猶擇所主況在齊衛無事之時豈有主癰疽侍人之事乎輔氏曰以孔子進以禮退以義得之不得曰有命觀之則必無主癰疽瘠環之理以孔子當阨主司城貞子為陳侯周臣觀之則必無主癰疽瘠環之事吾聞觀近臣以其所爲主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以爲孔子近臣在朝之臣逺臣逺方來仕者君子小人各從其類故觀其所為主與其所主者而其人可知萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者爲之也食音嗣好去聲下同百里奚虞之賢臣人言其自賣於秦養牲者之家得五羊之皮而為之食牛因以干秦穆公也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐􅉑宫之竒諫百里奚不諫屈求勿反乗去聲虞􅉑皆國名愚案虞國在漢河東郡大陽縣號國在漢河南郡榮陽縣垂棘之璧垂棘之地所出之璧也屈産之乗屈地所生之良馬也乗四匹也晉欲伐虢道經於虞故以此物借道其實欲并取虞宫之竒亦虞之賢臣諫虞公令勿許虞公不用遂為晉所滅百里奚知其不可諫故不諫而去之知虞公之不可諫而去之秦年已七十矣曽不知以食牛于秦穆公之爲汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可𫝊於後世不賢而能之乎自鬻以成其君郷黨自好者不爲而謂賢者爲之乎相去聲自好自愛其身之人也孟子言百里奚之智如此必知食牛以干主之為汙其賢又如此必不肯自鬻以成其君也輔氏曰自鬻以成其君謂自賣我之身以成彼之為君即所謂顯其君於天下者是也然此事當孟子時已無所據孟子直以事理反覆推之而知其必不然耳范氏曰古之聖賢未遇之時鄙賤之事不恥為之如百里奚為人養牛無足怪也惟是人君不致敬盡禮則不可得而見豈有先自汙辱以要其君哉輔氏曰聖賢未遇鄙賤之事不恥為之吾夫子猶曰吾少也賤故多能鄙事荘周曰百里奚爵禄不入於心故飯牛而牛肥使穆公忘其賤而與之政亦可謂知百里奚矣輔氏曰傳記載百里奚食牛之事亦多但非是固欲為此以要君耳故荘子之言深得百里奚之意伊尹百里奚之事皆聖賢出處之大節故孟子不得不辨輔氏曰聖賢出處之大節當時好事者以已度人妄為議論以蠱敗戕傷之使人心之義理愈昬私欲愈熾波流風靡而未知底止故孟子不得不辨所以正人心息邪説詎詖行放淫辭以立人極豈好辯哉不得已也尹氏曰當時好事者之論大率類此蓋以其不正之心度聖賢也蔡氏曰戰國之時人不知道惟知以功利為急以枉尺直尋詭遇獲禽為能甚者敢自誣於聖賢欲借以行其私如伊尹割烹要湯孔子主癰疽瘠環百里奚自鬻於秦其見愈卑其論愈下雖萬章之徒亦不知其為非而猶不免於疑問習俗移人之深如此孟子安得不歴數而明辨之哉孟子纂疏卷九
