body:
  text: 欽定四庫全書孟子纂疏卷四宋趙順孫撰朱子集注公孫丑章句下凡十四章自第二章以下記孟子出處行實為詳孟子曰天時不如地利地利不如人和天時謂時日支干孤虛王相之屬也語録曰孤虛以方位言如俗言向某方利某方不利之類王相指日時輔氏曰時十二時也日十日也支十二支也干十干也孤虛星也王相五氣之盛衰也其法具於兵書所由來者逺矣蔡氏曰時四時也日日辰也史記注六甲孤虛法甲子旬戌亥為孤辰巳為虛甲戌旬申酉為孤寅邜為虛甲申旬午未為孤子丑為虛甲午旬辰巳為孤戌亥為虛甲辰旬寅邜為孤申酉為虛甲寅旬子丑為孤午未為虛王相如東方木王相於邜之類愚謂孤虛之法以一畫為孤無畫為虛二畫為實以六十甲子日定東西南北四方然後知其孤虛實而向背之即知吉凶矣地利險阻城池之固也人和得民心之和也三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也夫音扶三里七里城郭之小者郭外城環圍也言四面攻圍曠日持久必有值天時之善者城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也革甲也愚謂古者之甲以革為之故函人為攻皮之工後世始用金曰鎧粟穀也委棄也言不得民心民不為守也故曰域民不以封疆之界固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之域界限也以天下之所順攻親戚之所畔故君子有不戰戰必勝矣言不戰則巳戰則必勝輔氏曰此帝王常勝之道而夫子所謂我戰必克者皆為是也尹氏曰言得天下者凡以得民心而已孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎對曰不幸而有疾不能造朝章內朝音潮唯朝將之朝如字造七到反下同王齊王也孟子本將朝王王不知而託疾以召孟子故孟子亦以疾辭也或問孟子本欲朝王矣王召之則辭而不往何也曰孟子於齊實處賓師之位而未嘗受祿蓋非齊王之所得臣也其相見之節王就而見孟子則可孟子自往而見王則不可王而召之則既失禮矣而其託疾者又不誠也則若之何而可往哉語録曰問莫是以齊王不合託疾否曰未論齊王託疾看孟子之意只說他不合來召蓋在他國時諸侯無越境之理只得以幣來聘故賢者受其幣而往見之所謂答禮行義是也如見梁惠王是惠王先來聘之既至其國或為賓師有事則王自來見或自往見王但召之則不可召之則有自尊之意故不往見也答陳代如不待其招而往何哉此以往他國而言答萬章天子不召師而况諸侯乎此以在其國而言輔氏曰孟子本將朝王者禮也王不知而託疾以召孟子故孟子亦以疾辭者義也於此可見孟子之心至公無私因事制宜如權衡然物有重輕則權亦從而前卻也明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎曰昔者疾今日愈如之何不弔東郭氏齊大夫家也昔者昨日也或者疑辭辭疾而出弔與孔子不見孺悲取瑟而歌同意輔氏曰孔子以疾辭孺悲而不出見然又取瑟而歌使之知其非疾所以警教孺悲也孟子以疾辭齊王而不往朝然又出弔東郭而使之知其非疾者亦所以警教齊王也此皆聖賢至誠應物而得乎時中之義也王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝要平聲孟仲子趙氏以為孟子之從昆弟學於孟子者也采薪之憂言病不能采薪謙辭也仲子權辭以對又使人要孟子令勿歸而造朝以實己言輔氏曰仲子雖學於孟子然未免於世俗之習懾於𫝑之尊而不知在己之有義眩於儀之多而不察其意之不誠故作此態是亦世俗之常情也不得已而之景丑氏宿焉景子曰內則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也惡平聲下同景丑氏齊大夫家也景子景丑也惡歎辭也景丑所言敬之小者也孟子所言敬之大者也輔氏曰景丑之說擎跽曲拳奔走承順之敬世俗之所知故曰敬之小孟子所言陳善閉邪責難於君之敬聖賢之所行故曰敬之大也真氏曰景子但知聞命奔走為敬其君不知以堯舜之道告其君者乃敬之大者也僕𨽻之臣唯唯承命外若敬其君然心實薄之曰是何足與言仁義此不敬之大者也齊人之敬君以貌孟子之敬君以心景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果宜與夫禮若不相似然夫音扶下同禮曰父命呼唯而不諾又曰君命召在官不俟屨在外不俟車言孟子本欲朝王而聞命中止似與此禮之意不同也曰豈謂是與曽子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉夫豈不義而曽子言之是或一道也天下有達尊三爵一齒一德一朝廷莫如爵鄉黨莫如齒輔世長民莫如德惡得有其一以慢其二哉與平聲慊口簞反長上聲慊恨也少也或作嗛字書以為口銜物也然則慊亦但為心有所銜之義其為快為足為恨為少則因其事而所銜有不同耳大學或問曰孟子所謂慊於心樂毅所謂慊於志則以銜其快與足之意而言者也孟子所謂吾何慊漢書所謂嗛栗姬則以銜其恨與少之意而言者也讀者各隨所指而觀之則並行而不悖矣孟子言我之意非如景子之所言者因引曽子之言而云夫此豈是不義而曽子肯以為言是或别有一種道理也輔氏曰道雖一本而其用則有萬不同時異勢殊則聖人處之各自成一樣禮經之說固是正理然曽子之說又或别是一般道理也達通也蓋通天下之所尊有此三者曽子之說蓋以德言之也輔氏曰自天下有達尊三以下則是孟子自說而集注所謂曽子之說蓋以德言者特指吾仁吾義云耳今齊王但有爵耳安得以此慢於齒德乎故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也樂音洛大有為之君大有作為非常之君也程子曰古之人所以必待人君致敬盡禮而後往者非欲自為尊大也為是故耳輔氏曰以為欲自尊大者世俗之見也不足與有為者君子之心也君子之所為衆人固不識者正謂此也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸先從受學師之也後以為臣任之也今天下地醜德齊莫能相尚無他好臣其所教而不好臣其所受教好去聲醜類也尚過也所教謂聽從於己可役使者也所受教謂己之所從學者也湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而况不為管仲者乎不為管仲孟子自謂也輔氏曰孟子到此不得已而直言之不如是則公孫丑之徒終不足以知此義也范氏曰孟子之於齊處賓師之位非當仕有官職者故其言如此語録曰問賓師如何曰當時有所謂客卿者是也大槩尊禮之而不居職任事此章見賓師不以趨走承順為恭而以責難陳善為敬人君不以崇髙富貴為重而以貴德尊士為賢則上下交而德業成矣輔氏曰天地交而後萬物遂上下交而後德業成此自然之理也世衰道微君不能止於仁而惟知恃𫝑以驕夫臣臣不能止於敬而惟知自屈以諂夫君上下之情扞格而不接德之與業渙散而無成天下日趨於大亂極敗而世俗猶以孟子為迂濶於事亦可悲矣陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳臻孟子弟子兼金好金也其價兼倍於常者一百百鎰也孟子曰皆是也皆適於義也輔氏曰以事言則或受或不受固不一也以義言則受者義所當受也不受者義所不當受也故曰皆適於義也陳臻只就事上較量孟子則以義為斷制也當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受贐除刃反贐送行者之禮也當在薛也豫有戒心辭曰聞戒故為兵餽之豫何為不受為兵之為去聲時人有欲害孟子者孟子設兵以戒備之薛君以金餽孟子為兵備辭曰聞子之有戒心也若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎焉於䖍反無逺行戒心之事是未有所處也取猶致也尹氏曰言君子之辭受取豫唯當於理而已輔氏曰理體也義用也當於理則是適於義也問孟子但有辭有受有取初無豫之事而尹氏併言辭受取豫者何也曰學者玩此章非特可以知辭受之義而亦可以知所豫矣孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎曰不待三去上聲平陸齊下邑也大夫邑宰也㦸有枝兵也士戰士也伍行列也去之殺之也然則子之失伍也亦多矣凶年饑歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也幾上聲子之失伍言其失職猶士之失伍也距心大夫名對言此乃王之失政使然非我所得專為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與曰此則距心之罪也為去聲死與之與平聲牧之養之也牧牧地也芻草也孟子言若不得自專何不致其事而去他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也見音現為王之為去聲為都治邑也邑有先君之廟曰都語録曰古之王者嘗為都處便自有廟如大王廟在岐文王廟在豐武王祭大王則於岐祭文王則於豐鎬京却無二王之廟又如晉獻公使申生祭於曲沃武公雖自曲沃入晉而其先君之廟則乃在曲沃而不徙孔大夫姓也為王誦其語欲以風曉王也陳氏曰孟子一言而齊之君臣舉知其罪固足以興邦矣然而齊卒不得為善國者豈非說而不繹從而不改故邪陳氏名暘三山人輔氏曰孟子一言而齊之君臣舉知其罪者理明辭達長於譬喻而能感發於人故也然齊之君臣雖知其罪而終不能改繹者志小氣輕志小則易足蓋元不曽有大底規模氣輕則多率多率則凡事說過便休都無那自訟自責之意如此則何緣㑹改孟子謂蚳蛙曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚔音遲蛙烏花反為去聲與平聲蚳蛙齊大夫也靈丘齊下邑似也言所為近似有理可以言謂士師近王得以諫刑罰之不中者蚳蛙諫於王而不用致為臣而去致猶還也齊人曰所以為蚳蛙則善矣所以自為則吾不知也為去聲譏孟子道不行而不能去也公都子以告公都子孟子弟子也曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕㦲官守以官為守者言責以言為責者綽綽寬貌裕寬意也孟子居賓師之位未嘗受祿故其進退之際寬裕如此輔氏曰在易晉之初六曰罔孚裕無咎程子曰夫子恐後人不達寬裕之意居位者廢職失守以為裕故特云初六裕則無咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也由是觀之凡始進未受命者苟上未見信猶可以寬裕自守况孟子處賓師之位又未嘗受祿乎宜其進退寬裕如此也一有官守言責則當自盡其職不可知此矣蚳蛙是有言責者孔距心是有官守者蚳蛙聞孟子之言雖不自以為罪然遂諫於王而不用致為臣而去孔距心雖知其為罪却只說過了便休蛙之資質賢於距心多矣學者須當學蚳蛙則改過勇而進德當日新也尹氏曰進退久速當於理而已輔氏曰尹氏之說與上章君子之辭受取豫唯當於理而已同意言孟子之辭受取豫進退久速雖有不同然非有所愛憎適莫於其間也一當乎天理而已矣玩味其言可發深省嘗謂聖賢之曉人常寬裕委曲而無迫切之意人見其如此也則曰聖賢之術也而不知聖賢初無心也理當然耳故其所為無迹後世妄意聖人之所為而挾術以諫君故其迹露如魏徴望獻陵之事可見雖能濟一時之事然懷是心以事君則不恭甚矣孟子為卿於齊出弔於滕王使蓋大夫王歡為輔行王歡朝暮見反齊滕之路未嘗與之言行事也蓋古盍反見音現蓋齊下邑也王歡王嬖臣也輔行副使也反往而還也行事使事也輔氏曰使事謂弔祭之禮邦交之儀凡禮文制數皆是也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也曰夫既或治之豫何言哉夫音扶王歡蓋攝卿以行故曰齊卿夫既或治之言有司巳治之矣孟子之待小人不惡而嚴如此輔氏曰夫既或治之正答公孫丑未嘗與之言行事一句也孟子言所謂使事有司既已治之而得其宜矣自不須更與王歡言也只此句便見孟子之待小人不惡而嚴之意使有司不能治其事於禮儀制數有曠闕不齊整處而孟子固不與歡言而正之則非所謂不惡矣今有司既已能治辦其事而猶與之言則便有徇之之意而不可謂之嚴矣然自常情觀之則孟子之不與歡言不以為惡之而不欲與之言則以為易之而不足與之言矣夫惡之而不欲與之言則隘易之而不足與之言則忽隘與忽孟子無是心也但言有司既已能治辦其事而不與之言則亦是順理之事而其中自有不惡而嚴之意耳故愚嘗謂君子之待小人有正己而無屈意有容德而無過禮惡惡之心雖不能無然亦不為己甚之疾也孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然孟子仕於齊喪母歸葬於魯嬴齊南邑充虞孟子弟子嘗董治作棺之事者也嚴急也木棺木也以已通以美太美也曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心稱去聲度厚薄尺寸也中古周公制禮時也輔氏曰古者棺椁無度者想只是過於厚觀十三卦喪葬取之大過可見至周公制禮時始為七寸之制也椁稱之與棺相稱也輔氏曰謂棺七寸則椁亦七寸欲其堅厚久逺非特為人觀視之美而已輔氏曰人子之喪親所以為之棺椁者蓋欲其堅厚以歷久逺而已非是欲為人觀視之美也蓋必如此然後於人心為盡耳盡於人心此一句須當自體之若後世之厚葬却只是欲為人觀美之故也不得不可以為恱無財不可以為恱得之為有財古之人皆用之吾何為獨不然不得謂法制所不當得得之為有財言得之而又為有財也或曰為當作而輔氏曰先儒多以七寸之棺自天子達於庶人與下文得之為有財兩句礙故解云所以不得者正謂無財之故耳集注不從者此蓋孟子因而泛說葬禮如重纍之數墻翣之飾既有定制則不可得以為恱非獨指棺椁言之也蓋孟子自做兩句分說下來得之為有財又是總說必竟是兩意或者又以為當作而則尤分曉為作而是字誤也且比化者無使土親膚於人心獨無恔乎比必二反恔音效比猶為也化者死者也恔快也言為死者不使土近其肌膚於人子之心豈不快然無所恨乎輔氏曰謂厚其棺椁者正為死者不欲使土近其肌膚耳惟如此則人子之心始以為快而無所慊恨也有所恨則是有所不快處則是其心有不盡也吾聞之也君子不以天下儉其親送終之禮所當得為而不自盡是為天下愛惜此物而薄於吾親也輔氏曰如此則便是倒行逆施不順理底於所厚者薄則無所不薄矣墨子之葬以薄為道者即是此意沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲有仕於此而子恱之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎何以異於是伐與之與平聲下伐與殺與同夫音扶沈同齊臣以私問非王命也輔氏曰沈同問燕可伐否耳固不問以齊伐燕為如何也若是以王命來問孟子必當詳告之不但曰可而已也子噲子之事見前篇諸侯土地人民受之天子傳之先君私以與人則與者受者皆有罪也輔氏曰此謂不由其道妄取妄豫如子噲子之之徒者由其道則三聖之授受乃先天而天弗違之事不可以罪言矣仕為官也士即從仕之人也齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉天吏解見上篇言齊無道與燕無異如以燕伐燕也史記亦謂孟子勸齊伐燕蓋傳聞此說之誤語録曰孟子居齊許久伐燕之事必親見之齊王乃無一語謀於孟子而孟子亦無一語諫之何也想得孟子亦必以伐之為是但不意齊師之暴虐耳不然齊有一大事如此而齊王不相謀孟子豈可更居齊邪史記云鄒人孟軻勸齊王伐燕云此湯武之舉也想承此誤然亦有不可曉者又曰孟子言伐燕有四須合而觀之燕之父子君臣如此固有可伐之理然孟子不曽教齊不伐亦不曽教齊必伐但曰為天吏則可以伐之楊氏曰燕固可伐矣故孟子曰可使齊王能誅其君弔其民何不可之有乃殺其父兄虜其子弟而後燕人畔之乃以是歸咎孟子之言則誤矣燕人畔王曰吾甚慙於孟子齊破燕後二年燕人共立太子平為王陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而況於王乎賈請見而解之惡監皆平聲陳賈齊大夫也管叔名鮮武王弟周公兄也武王勝商殺紂立紂子武庚而使管叔與弟蔡叔霍叔監其國武王崩成王幼周公攝政管叔與武庚畔周公討而誅之蔡氏曰周公攝政管叔於周公為兄尤所覬覦故流言公將不利於孺子周公避位居東後成王悟迎周公歸叔懼遂與武庚叛成王命周公征討而誅戮之見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎與平聲言周公乃管叔之弟管叔乃周公之兄然則周公不知管叔之將畔而使之其過有所不免矣語録曰周公當初也看那兄弟不過本是怕武庚叛故遣管蔡霍叔去監他為其至親可恃不知他反去與那武庚同作一黨輔氏曰周公以親之故不忍料其兄之惡而使之故不免有過是以孟子亦以為周公之過不亦宜乎不說周公為無過也或曰周公之處管叔不如舜之處象何也游氏曰象之惡己著而其志不過富貴而已故舜得以是而全之若管叔之惡則未著而其志其才皆非象比也周公詎忍逆探其兄之惡而棄之邪周公愛兄宜無不盡者管叔之事聖人之不幸也舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也輔氏曰此是集注採程子游氏兩說合而成之可謂曲盡人情矣舜與周公皆是處聖人之不幸使其易地而處則皆然也此乃是以天理處人倫之極至處且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭更平聲順猶遂也更改也辭辨也更之則無損於明故民仰之順而為之辭則其過愈深矣責賈不能勉其君以遷善改過而教之以遂非文過也林氏曰齊王慙於孟子蓋羞惡之心有不能自己者使其臣有能因是心而將順之則義不可勝用矣而陳賈鄙夫方且為之曲為辨說而沮其遷善改過之心長其飾非拒諫之惡故孟子深責之然此書記事散出而無先後之次故其說必參考而後通若以第二篇十章十一章置於前章之後此章之前則孟子之意不待論說而自明矣輔氏曰林氏說得齊王之心發處與陳賈之意邪處孟子責陳賈之言深切處皆甚分明有以啓發萬世之為君臣者有能因是心而將順之者則如孟子因齊王見牛不忍之心而引之使保民者是也孟子致為臣而歸孟子久於齊而道不行故去也王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不識可以繼此而得見乎對曰不敢請耳固所願也朝音潮他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之為去聲時子齊臣也中國當國之中也萬鍾榖祿之數也鍾量名受六斛四斗愚案四豆為區區受斗六升四區為釜釜受六斗四升十釜為鍾受六斛四斗矜敬也式法也盍何不也時子因陳子而以告孟子陳子以時子之言告孟子陳子即陳臻也孟子曰然夫時子惡知其不可也如使豫欲富辭十萬而受萬是為欲富乎夫音扶惡平聲孟子既以道不行而去則其義不可以復留而時子不知則又有難顯言者輔氏曰顯言之則訐掦齊王之失而有戾於我固所願之言故但言設使我欲富則我前日為卿嘗辭十萬之祿今乃受此萬鍾之饋是我雖欲富亦不為此也輔氏曰謂時子不知我之去乃為道之不行而於義不可不去耳今乃以是誘我設使我誠欲其富則前日方辭十萬之祿今日乃受萬鍾之饋則豈欲富者乎齊王時子之事是皆就人欲計較中來若孟子之意則道合則從不可則去惡用是多端也哉季孫曰異哉子叔疑使已為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉龍音壟此孟子引季孫之語也季孫子叔疑不知何時人龍斷岡壟之斷而髙也義見下文蓋子叔疑者嘗不用而使其子弟為卿季孫譏其既不得於此而又欲求得於彼如下文賤丈夫登龍斷者之所為也孟子引此以明道既不行復受其祿則無以異此矣輔氏曰舉季孫所譏子叔疑之事以見我不敢效此之意辭祿而受饋雖多寡之不同畢竟是既不得於此而又求得於彼也古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子釋龍斷之說如此治之謂治其爭訟左右望者欲得此而又取彼也罔謂罔羅取之也從而征之謂人惡其專利故就征其稅後世緣此遂征商人也輔氏曰文王關譏不征是三代之初皆如是也程子曰齊王所以處孟子者未為不可孟子亦非不肯為國人矜式者但齊王實非欲尊孟子乃欲以利誘之故孟子拒而不受輔氏曰程子恐讀書者不察誤認孟子之意故辨明之孟子去齊宿於晝晝如字或曰當作晝音獲下同晝齊西南近邑也有欲為王留行者坐而言不應隱几而臥為去聲下同隱於靳反隱憑也客坐而言孟子不應而卧也客不恱曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣曰坐我明語子昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身齊側皆反復扶又反語去聲齊宿齊戒越宿也繆公尊禮子思常使人候伺道達誠意於其側乃能安而留之也輔氏曰好賢之心切唯恐有不當其意故其計必出於此也泄栁魯人申詳子張之子也繆公尊之不如子思然二子義不苟容非有賢者在其君之左右維持調護之則亦不能安其身矣或問二子之賢其心固如是乎曰非謂二子之心為然也語其勢則然耳若二子之心如此則與世之垢面汙行而事君側便嬖之人者何以異乎輔氏曰此李先生說也謂若謂二人必欲常有人譽已於君側乃能自安則是奸道也豈足為賢況泄栁嘗閉門以避繆公豈既仕而若此乎蓋二子直道以事君義不苟合非有賢者為之主持必不見容非欲人之譽己者是也泄栁申詳無人乎繆公之側則不能安其身恐繆公不察己之誠也繆公無人乎子思之側則不能安子思恐子思弗察己之誠也臣而惟恐君之弗察其誠則其合也難其行道也不易使其君唯恐己之弗察其誠則其合也易其行道也不難繆公之待二子固不若子思矣然子思之與二子事皆其所自取如形影之相似也德若子思則亦應有此若只及得泄栁申詳則又只得如此耳下是則苟容以徇君者也子為長者慮而不及子思子絶長者乎長者絶子乎長上聲長者孟子自稱也言齊王不使子來而子自欲為王留我是所以為我謀者不及繆公留子思之事而先絶我也我之卧而不應豈為先絶子乎輔氏曰孟子之自處不在子思之下故意或人之為我謀不及繆公留子思之事也蓋有欲為王留行者雖有愛賢之意而不知待賢之禮故孟子告之如此孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不恱語去聲尹士齊人也干求也澤恩澤也濡滯遲留也髙子以告髙子亦齊人孟子弟子也曰夫尹士惡知豫哉千里而見王是豫所欲也不遇故去豈豫所欲哉豫不得已也夫音扶下同惡平聲見王欲以行道也今道不行故不得已而去非本欲如此也豫三宿而出晝於豫心猶以為速王庶幾改之王如改諸則必反豫所改必指一事而言然今不可考矣輔氏曰度孟子之於齊王必有為之兆者王不能用故去之然孟子不言其事故不可考其所以不言者或是當時人自知之也夫出晝而王不豫追也豫然後浩然有歸志豫雖然豈舍王哉王由足用為善王如用豫則豈徒齊民安天下之民舉安王庶幾改之豫日望之浩然如水之流不可止也楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂皆以直告而不隱於孟子故足以為善若乃其心不然而謬為大言以欺人是人終不可與入堯舜之道矣何善之能為輔氏曰齊宣王資質大略與齊桓公漢髙祖相似朴實不欺又與孟子問答不忍之心時亦有所發明故孟子拳拳然以為足用為善然終是志不足以帥氣道不足以勝習故孟子不得已而去之豫豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉悻形頂反見音現悻悻怒意也窮盡也尹士聞之曰士誠小人也此章見聖賢行道濟時汲汲之本心愛君澤民惓惓之餘意輔氏曰本心謂其初本欲如此也餘意則後來不得已之意耳詳玩此兩句便可見聖賢之心千里見王王如用豫豈特齊民安天下之民舉安此其行道濟時汲汲之本心三宿出晝王庶幾改之豫日望之此其愛君澤民惓惓之餘意李氏曰於此見君子憂則違之之情而荷蕢者所以為果也語録曰孟子與荷蕢皆是憂則違之但荷蕢果於去不若孟子之遲遲吾行蓋得時行道者聖人之本心不遇而去者聖人之不得已此與孔子去魯之心同蓋聖賢憂世濟時之誠心非若荷蕢之果於去也孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人路問於路中問也豫恱也尤過也此二句實孔子之言蓋孟子嘗稱之以教人耳曰彼一時此一時也彼前日此今日五百年必有王者興其閒必有名世者自堯舜至湯自湯至文武皆五百餘年而聖人出名世謂其人德業聞望可名於一世者為之輔佐若臯陶稷契伊尹萊朱太公望散宜生之屬由周而來七百有餘歲矣以其數則過矣以其時考之則可矣周謂文武之間數謂五百年之期時謂亂極思治可以有為之日於是而不得一有所為此孟子所以不能無不豫也夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉夫音扶舍上聲言當此之時而使我不遇於齊是天未欲平治天下也然天意未可知而其具又在我我何為不豫哉然則孟子雖若有不豫然者而實未嘗不豫也輔氏曰自五百年至則可矣觀之則孟子不能無不豫然也自夫天未欲平治以下觀之則孟子實未嘗不豫也蓋聖賢憂世之志樂天之誠有並行而不悖者於此見矣輔氏曰不能無不豫者憂世之心也所謂與民同患之仁也實未嘗不豫者樂天之事也所謂與天為一之誠也憂樂自常情觀之則相反自聖賢言之則並行而不悖也即此章之事則可見矣孟子去齊居休公孫丑問曰仕而不受祿古之道乎休地名曰非也於崇吾得見王退而有去志不欲變故不受也崇亦地名孟子始見齊王必有所不合故有去志變謂變其去志繼而有師命不可以請久於齊非我志也師命師旅之命也國既被兵難請去也語録曰或謂師友之師非師旅之師曰欲授孟子室乃孟子辭去時所謂於崇吾得見王則初見齊王時事以此考之則師旅為當孔氏曰仕而受祿禮也不受齊祿義也義之所在禮有時而變公孫丑欲以一端裁之不亦誤乎輔氏曰仕受祿禮之常也孟子之不受齊祿禮之變也君子以義起禮故義之所在禮有時而變也蓋禮則一定義則權其禮之可否者也可則行否則變如此然後得乎時措之宜也公孫丑之學未能造此故欲以一端裁之此其所以誤也孟子纂疏卷四
