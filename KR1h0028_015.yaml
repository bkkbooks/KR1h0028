body:
  text: 欽定四庫全書孟子纂疏卷二宋趙順孫撰朱子集注梁惠王章句下凡十六章莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也曰好樂何如孟子曰王之好樂甚則齊國其庶幾乎見於之見音現下見於同語去聲下同好去聲篇內並同莊暴齊臣也庶幾近辭也言近於治他日見於王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好世俗之樂耳變色者慚其好之不正也曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也今樂世俗之樂古樂先王之樂曰可得聞與曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆聞與之與平聲樂樂下字音洛孰樂亦音洛獨樂不若與人與少樂不若與衆亦人之常情也臣請為王言樂為去聲此以下皆孟子之言也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也蹙子六反頞音遏夫音扶同樂之樂音洛鐘鼓管籥皆樂器也愚謂管笙也籥簫也舉皆也疾首頭痛也蹙聚也頞額也人憂戚則蹙其額極窮也羽旄旌屬愚案春秋傳范宣子假羽旄於齊晉人假羽旄於鄭杜預曰以析羽為旌為王者斿車之所建也又案周禮司常九旗之數有全羽析羽釋云全羽析羽直有羽而無帛也不與民同樂謂獨樂其身而不恤其民使之窮困也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也病與之與平聲同樂之樂音洛與民同樂者推好樂之心以行仁政使民各得其所也今王與百姓同樂則王矣好樂而能與百姓同之則天下之民歸之矣所謂齊其庶幾者如此范氏曰戰國之時民窮財盡人君獨以南面之樂自奉其身孟子切於救民故因齊王之好樂開導其善心深勸其與民同樂而謂今樂猶古樂其實今樂古樂何可同也但與民同樂之意則無古今之異耳若必欲以禮樂治天下當如孔子之言必用韶舞必放鄭聲蓋孔子之言為邦之正道孟子之言救時之急務所以不同楊氏曰樂以和為主使人聞鐘鼓管絃之音而疾首蹙頞則雖奏以咸英韶濩無補於治也故孟子告齊王以此姑正其本而已輔氏曰范氏辨孔子孟子之說可謂平正明白無餘藴矣而楊氏論樂以和為主及與民同樂為樂之本又可以足范氏之說齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之囿音又傳直戀反囿者蕃育鳥獸之所輔氏曰太宰九職以園圃育草木藪牧養蕃鳥獸今乃以囿為蕃育鳥獸之所何也觀此章所言及文王靈囿所冇與衛獻公之射鴻于囿春秋之書築鹿囿則可知矣況說文又有養獸曰囿之訓乎古者四時之田皆於農隙以講武事然不欲馳騖於稼穡場圃之中故度閒曠之地以為囿然文王七十里之囿其亦三分天下有其二之後也與輔氏曰文王由方百里起不應有七十里之囿故疑其在三分天下有其二之後傳謂古書輔氏曰孟子時有之今不復存矣然孟子所謂於傳有之者亦言據古書有此說耳然亦未必其然否也曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎芻音初蕘音饒芻草也蕘薪也輔氏曰芻謂取草者蕘謂取薪者臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦宜乎阱才性反禮入國而問禁國外百里為郊郊外有關愚謂五十里為近郊百里為逺郊關者蓋郊之門阱坎地以陷獸者言陷民於死也齊宣王問曰交鄰國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大是故大王事獯鬻句踐事吳獯音薰鬻音育句音鈎仁人之心寬洪惻怛而無較計大小彊弱之私故小國雖或不恭而吾所以字之之心自不能已輔氏曰此說足以盡仁人之心寬洪者仁之量也惻怛者仁之意也仁與物無對一視同仁自不見大小彊弱之異也豈復有較計之私哉故小國雖或不恭而吾所以字之之心自不能已尤更說得仁字體用分曉蓋仁心本無閒斷也智者明義理識時𫝑故大國雖見侵陵而吾所以事之之禮尤不敢廢語録曰問仁者為能以大事小是仁者之心寬洪惻怛便是小國不恭亦撓他不動智者為能以小事大蓋知者見得利害甚明故祗得事大曰不特是見得利害明道理自合恁地小之事大弱之事彊皆是道理合恁地輔氏曰此說足以盡智者之用明義理謂明得吾心義理之原識時𫝑謂識得在外時𫝑之輕重唯其知得方能敬以循之是以大國或見侵陵則在我事之之禮自不敢廢若元不知則更論甚敢與不敢所謂不敢廢方始是知之極致也又曰集注只言義理時𫝑而已若言利害便流於私欲只要就利避害更不顧義理當如何矣永嘉陳氏曰仁者無計較之私忘其孰大而孰小智者有量度之明自知不能敵大湯事見後篇文王事見詩大雅大王事見後章所謂狄人即獯鬻也愚案獯鬻者胸奴之别號句踐越王名事見國語史記蔡氏曰案國語史記載越王棲於㑹稽之上使大夫種行成於吳曰寡君之師徒不足以辱君矣願以金玉子女賂君之辱夫差欲與之成子胥諌越人飾美女八人納之太宰嚭曰子苟赦越國之罪又有美於此者進之嚭曰古之伐國者服之而已今已服矣又何求焉夫差與之成而去之句踐後與范蠡深謀十年而竟滅吳以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國樂音洛天者理而已矣輔氏曰即程子所謂天専言之則道也大之字小小之事大皆理之當然也輔氏曰以道理言則大者自當事小此天之所以覆地也小者自當事大此坤之所以承乾也自然合理故曰樂天不敢違理故曰畏天語録曰仁者與天為一智者順天所命與天為一者嘉人之善矜人之惡無所擇於利害故能以大事小聽天所命者循理而行順時而動不敢用其私心故能以小事大然此亦各因一事而言惟仁者能如此智者能如此耳非專以事大事小為仁智之分樂天畏天之别也仁者固能事小然豈不能事大智者固能事大然豈不能事小但其事之之情則有樂天畏天之異耳輔氏曰自然合理仁之事也與天為一故曰樂天不敢違理智之事也與天為二故曰畏天包含遍覆無不周遍保天下之氣象也制節謹度不敢縱逸保一國之規模也語録曰保天下保一國以其德之厚薄量之大小而言亦無一定之拘輔氏曰言仁智者之氣象規模有此效也非謂仁者智者之心欲其如此也詩云畏天之威于時保之詩周頌我將之篇時是也王曰大哉言矣寡人有疾寡人好勇言以好勇故不能事大而恤小也輔氏曰齊王唯其好勇故但欲辟土地朝秦楚爭地爭城以刈其人民而已故不能知事大之禮又不能行恤小之仁對曰王請無好小勇夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之夫撫之夫音扶惡平聲疾視怒目而視也小勇血氣所為大勇義理所發愚謂血氣所為之勇如溝澮之水暴集隨涸故謂之小義理所發之勇如天開地闢自不能已故謂之大詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也文王一怒而安天下之民詩大雅皇矣篇赫赫然怒貌爰於也旅衆也遏詩作按止也徂往也莒詩作旅徂旅謂密人侵阮徂共之衆也愚案密國在今寧州阮國在今涇州共阮地今有共池侵阮徂共蓋侵阮直至共之地也篤厚也祜福也對答也以答天下仰望之心也此文王之大勇也書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也而武王亦一怒而安天下之民衡與橫同書周書泰誓之篇也然所引與今書文少異今且依此解之寵之四方寵異之於四方也輔氏曰謂天寵異武王於天下也亶聰明是以天德寵異之也作元后是以天位寵異之也有罪者我得而誅之無罪者我得而安之我既在此則天下何敢有過越其心志而作亂者乎輔氏曰心志謂天下之心志也人之作亂皆過越其心志之故耳若守其心志無所過越則何至有作亂之事乎此武王以天下之重自任也衡行謂作亂也孟子釋書意如此而言武王亦大勇也今王亦一怒而安天下之民民惟恐王之不好勇也王若能如文武之為則天下之民望其一怒以除暴亂而拯已於水火之中惟恐王之不好勇耳此章言人君能懲小忿則能恤小事大以交鄰國能養大勇則能除暴救民以安天下輔氏曰章㫖之說語簡意盡君人者必能懲小忿然後能養大勇所謂人能有所不為然後可以有為也張敬夫曰小勇者血氣之怒也大勇者理義之怒也血氣之怒不可有理義之怒不可無知此則可以見性情之正而識天理人欲之分矣輔氏曰此說發明先儒所未到怒乃人情之所不能無者情則性之動也但所發有理義血氣之不同發於義理則為性情之正發於血氣則為人欲而不正耳理義血氣是乃天理人欲之分也齊宣王見孟子於雪宫王曰賢者亦有此樂乎孟子對曰有人不得則非其上矣樂音洛下同雪宫離宫名輔氏曰離猶别也别在其所居宫室之外故曰離宫言人君能與民同樂則人皆有此樂輔氏曰此釋有之一字不然則下之不得此樂者必有非其君上之心輔氏曰此釋人不得則非其上矣一句明人君當與民同樂不可使人有不得者非但當與賢者共之而已也不得而非其上者非也為民上而不與民同樂者亦非也下不安分上不恤民皆非理也輔氏曰下不得而非其上者不知命也故謂之不安分為民上而不與民同樂者不知義也故謂之不恤民皆不知理者也樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也樂民之樂而民樂其樂則樂以天下矣憂民之憂而民憂其憂則憂以天下矣輔氏曰君以民之樂為樂則民亦以君之樂為樂如是則樂不以一已而以天下君以民之憂為憂而民亦以君之憂為憂如是則憂不以一已而以天下憂樂皆不以已而以天下則君以民為體民以君為心天下雖大兆民雖多然其歡欣愈怡病癢疾痛舉切於吾之身矣君能體仁如此則天下之民其將何往雖欲不王不可得也真氏曰因已之樂而圖民之憂是之謂與民同樂因民之憂而不敢恣已之樂是之謂與民同憂君之憂樂與民同而民不與君同其憂樂者鮮矣故為人君者不以已之樂為樂而以天下之樂為樂不以已之憂為憂而以天下之憂為憂如此而天下不歸者未之有也昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放于琅邪吾何修而可以比於先王觀也朝音潮放上聲晏子齊臣名嬰轉附朝儛皆山名也遵循也放至也琅邪齊東南境上邑名觀游也晏子對曰善哉問也天子適諸侯曰巡狩巡狩者巡所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度獰舒救反省悉井反述陳也省視也斂收穫也給亦足也夏諺夏時之俗語也豫樂也巡所守巡行諸侯所守之土也述所職陳其所受之職也愚謂巡所守者自上察下也述所職者自下達上也王十二嵗一巡守諸侯六年一朝皆無有無事而空行者而又春秋循行郊野察民之所不足而補助之故夏諺以為王者一遊一豫皆有恩惠以及民而諸侯皆取法焉不敢無事慢遊以病其民也今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡為諸侯憂睊古縣反今謂晏子時也師衆也二千五百人為師春秋傳曰君行師從糧謂糗糒之屬睊睊側目貌胥相也讒謗也慝怨惡也言民不勝其勞而起謗怨也方逆也命王命也輔氏曰王者之命諸侯豈固欲其如此哉不過使之愛養斯民而已逆王命則虐必及其民矣若流如水之流無窮極也流連荒亡解見下文諸侯謂附庸之國縣邑之長輔氏曰此主言齊事而云為諸侯憂故知為附庸之君縣邑之長也從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡厭平聲此釋上文之義也從流下謂放舟隨水而下從流上謂挽舟逆水而上從獸田獵也荒廢也樂酒以飲酒為樂也亡猶失也言廢時失事也輔氏曰舊說以亡為喪亡然此四弊相等不應樂酒之弊獨極言其喪國且下文但言荒亡之行耳亦未可便以為喪亡之亡也故集注創為此說當矣先王無流連之樂荒亡之行行去聲惟君所行也言先王之法今時之弊二者惟在君所行耳景公說大戒於國出舍於郊於是始興發補不足召太師曰為我作君臣相說之樂蓋徵招角招是也其詩曰畜君何尤畜君者好君也說音悅為去聲樂如字徵陟里反招與韶同畜敕六反戒告命也出舍自責以省民也輔氏曰出舍於郊則是欲行上文所謂循行郊野察民之不足而補助之法故下文即言興發倉廩以補不足也興發發倉廩也太師樂官也君臣已與晏子也樂有五聲三曰角為民四曰徵為事愚謂樂有五聲宫商角徵羽是也角主木木聲清濁中其數多少中故為民徵主火火聲稍輕其數稍少故為事事謂人之所營事務也招舜樂也輔氏曰韶樂蓋極於和樂故取其名以見和樂之意其詩徵招角招之詩也愚謂徵角皆以招名之亦舜作歌以康庶事鼓琴歌南風以阜民財之意尤過也言晏子能畜止其君之欲宜為君之所尤然其心則何過哉孟子釋之以為臣能畜止其君之欲乃是愛其君者也真氏曰易之大小畜皆以止為義凡止君之欲者乃所以為愛君也縱君之欲者其得為愛君乎忠臣之心惟恐其君之有欲姦臣之心惟恐其君之無欲尹氏曰君之與民貴賤雖不同然其心未始有異也孟子之言可謂深切矣齊王不能推而用之惜哉輔氏曰尹氏之言平淡有味熟讀而詳玩之自有感發於人心而孟子之意亦無餘藴矣齊宣王問曰人皆謂我毁明堂毁諸已乎趙氏曰明堂泰山明堂周天子東巡守朝諸侯之處漢時遺址尚在輔氏曰漢書郊祀志武帝元封元年封泰山泰山東北址古時有明堂處云人欲毁之者蓋以天子不復巡守諸侯又不當居之也輔氏曰此正與子貢欲去告朔餼羊之意同以其無用故欲毁去之也王問當毁之乎且止乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣夫音扶明堂王者所居以出政令之所也能行王政則亦可以王矣何必毁哉王曰王政可得聞與對曰昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者詩云哿矣富人哀此煢獨與平聲孥音奴鰥姑頑反哿工可反煢音瓊岐周之舊國也愚案岐山在漢右扶風美陽縣西北唐屬岐州岐山縣木朝屬鳳翔府蓋箭括嶺也岐山之南有周原蓋周之舊國九一者井田之制也方一里為一井其田九百畝中畫井字界為九區一區之中為田百畝中百畝為公田外八百畝為私田八家各受私田百畝而同養公田是九分而稅其一也輔氏曰治岐之政耕者九一是助法也及周禮則易而為徹聖人之於法度非冇所不得已則不應變易之易助為徹雖不可知要必出於不得已若非斯民浸失先公後私之意則必田畯之官漸有急於公而緩於私之失故變其法雖一夫受田百畝而與同溝共井之人通力合作計畝均收大率民得其九公取其一故謂之徹其以一分饒與民則又變狹而之寬因以寓厚民之意也世祿者先王之世仕者之子孫皆教之教之而成材則官之如不足用亦使之不失其祿蓋其先世嘗有功德於民故報之如此忠厚之至也關謂道路之關市謂都邑之市譏察也征稅也關市之吏察異服異言之人而不征商賈之稅也輔氏曰關市譏而不征周禮則關市有征周公之意是必將以抑商賈而歸之農也及其弊也則有為暴之譏焉以此見變法易令之識非易事也澤謂瀦水梁謂魚梁與民同利不設禁也輔氏曰澤梁不禁至周禮則山澤皆有厲禁亦禁其暴殄天物者而使取之以其時而已永嘉陳氏曰文王治岐關市不征澤梁無禁因民所利而利之乃王道之始成周門關市廛皆有限守山林川澤悉冇厲禁經制大備乃王道之成孥妻子也惡惡止其身不及妻子也先王養民之政導其妻子使之養其老而恤其幼不幸而有鰥寡孤獨之人無父母妻子之養則尤宜憐恤故必以為先也輔氏曰先王以民為體雖無尺寸之膚不養然於心腹腠理易於傷犯處尤當冇以愛護之此又體仁之至而王政之本也詩小雅正月之篇哿可也煢困悴貌王曰善哉言乎曰王如善之則何為不行王曰寡人有疾寡人好貨對曰昔者公劉好貨詩云乃積乃倉乃裹餱糧于槖于囊思戢用光弓矢斯張干戈戚揚爰方啓行故居者有積倉行者有裹糧也然後可以爰方啓行王如好貨與百姓同之於王何有餱音侯槖音托戢詩作輯音集王自以為好貨故取民無制而不能行此王政公劉后稷之曾孫也愚案后稷生不窋不窋生鞠陶鞠陶生公劉是后稷之曽孫詩大雅公劉之篇積露積也餱乾糧也無砥曰橐有砥曰囊皆所以盛餱糧也戢安集也言思安集其民人以光大其國家也戚斧也揚鉞也愚謂鉞大而斧小太公六韜云大柯斧一名天鉞是鉞大於斧也爰於也啓行言往遷于豳也愚案舜封后稷于邰不窋失其官守而自竄於戎狄之閒公劉始立國於豳之谷豳今邠州三水縣何有言不難也孟子言公劉之民富足如此是公劉好貨而能推已之心以及民也真氏曰人君豈能不事儲峙之富惟能推此心使民亦有餱糧之積可也今王好貨亦能如此則其於王天下也何難之有王曰寡人有疾寡人好色對曰昔者太王好色愛厥妃詩云古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇當是時也內無怨女外無曠夫王如好色與百姓同之於王何有大音泰王又言此者好色則心志蠱惑用度奢侈而不能行王政也大王公劉九世孫愚案公劉生慶節慶節生皇僕皇僕生差弗差弗生毁隃毁隃生公非公非生高圉高圉生亞圉亞圉生公叔祖公叔祖生大王是公劉之九世孫詩大雅綿之篇也古公大王之本號後乃追尊為大王也亶父大王名也愚謂古公猶言先公也蓋未追王前之本號古公當殷末時猶尚質故亶父以名言來朝走馬避狄人之難也率循也滸水崖也岐下岐山之下也愚謂古公避狄之難其來以早朝之時疾走其馬循西方水崖漆沮之側東行而至於岐山之下姜女大王之妃也胥相也宇居也曠空也無怨曠者是大王好色而能推已之心以及民也真氏曰人君豈能無妃匹之奉惟能推此心使民亦有配偶之安可也楊氏曰孟子與人君言皆所以擴充其善心而格其非心不止就事論事若使為人臣者論事每如此豈不能堯舜其君乎輔氏曰孟子對時君之言其所以充其善而格其非者乃陳善閉邪之事若夫就事論事則是後世不知學者之所為淺暗拘滯徒以激其君而使之拒吾說耳若夫孟子之事則亦勉强做不得須是學到孟子地位能如他知言養氣然後自然有此等功用也至所謂豈不能堯舜其君則亦據理而言之耳其君之聽與不聽用與不用則不可得而必也愚謂此篇自首章至此大意皆同蓋鐘鼓苑囿游觀之樂與夫好勇好貨好色之心皆天理之所有而人情之所不能無者然天理人欲同行異情循理而公於天下者聖賢之所以盡其性也縱欲而私於一已者衆人之所以滅其天也二者之間不能以髮而其是非得失之歸相去逺矣輔氏曰鐘鼓苑囿遊觀之樂與夫好勇好貨好色之心以常情論之則雖若不可為故齊王言之則以為慊而又自以為疾恐不足行王道然以實理言之則是固天理人情之所不能無者但有理與欲公與私之異耳故集注舉胡氏知言之說所謂天理人欲同行而異情者而辨析之夫聖賢之與衆人其於好貨好色其行雖同而其情則異循理而公天下者聖賢之所以盡其性此即公劉大王與民同欲之事也縱欲而私於一已者衆人之所以滅其天理此即齊王自以為疾之事也二者同異不過豪髮之間而其終之是非得失則其相去遂有盡性滅天興王絶世之相反如此集注言此不但贊其理之密正欲使學者因其言以反諸身至誠體察於所謂豪髮之際然後力求所以循夫理而克其欲耳故孟子因時君之問而剖析於幾微之際皆所以遏人欲而存天理其法似疏而實密其事似易而實難輔氏曰不直禁其好貨好色則似若疏且易矣然必使之為公劉大王之事推已之心以及夫民循理而不縱欲公天下而不私一已則其實又甚密而且難矣法指孟子之說事指公劉大王之事非孟子據理之極知言之要何能辨析其精微如此哉學者以身體之則有以識其非曲學阿世之言而知所以克已復禮之端矣輔氏曰讀之者徒既其文而不究其實則亦不知夫其意之所在故又欲學者體之以心驗之以身真有以見夫豪釐之辨同行異情之實與夫天理人欲界限之不可相入然後識孟子真非曲學阿世之說而已之所以克去私意復歸於禮之端緒亦可得而默喻矣孟子謂齊宣王曰王之臣有託其妻子於其友而之楚遊者比其反也則凍餒其妻子則如之何王曰棄之比必二反託寄也比及也棄絶也曰士師不能治士則如之何王曰已之士師獄官也其屬有鄉士遂士之官士師皆當治之已罷去也曰四境之內不治則如之何王顧左右而言他治去聲孟子將問此而先設上二事以發之輔氏曰常人之情知人則明自知則暗孟子將以四境之內不治問王故先設此二事以開其明而使之自知其職有不舉也及此而王不能答也其憚於自責恥於下問如此不足與有為可知矣輔氏曰王顧左右而言他則亦自知其曠職為可愧矣然知之非艱行之為艱使齊王沛然逹其所愧反躬自責訪孟子所以治四境之道而力行之則齊國其庶幾矣今乃不然顧左右以釋其愧言他事以亂其辭有護疾忌醫之心無責已求言之志則其不足與有為可知矣趙氏曰言君臣上下各勤其任無墮其職乃安其身輔氏曰各勤其任指心而言無墮其職指事而言君臣上下內盡其心外盡其事則其身乃安孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也王無親臣矣昔者所進今日不知其亡也世臣纍世勳舊之臣與國同休戚者也輔氏曰謂如畢公弼亮四世之類是也服勤王家至厯纍世則自然與國同休戚矣親臣君所親信之臣與君同休戚者也輔氏曰謂腹心之臣如漢之蕭何唐之房杜是也君臣一體自然與之同休戚矣此言喬木世臣皆故國所宜有然所以為故國者則在此而不在彼也輔氏曰齊之為國舊矣故曰故國喬木乃年深髙大之木亦故國之所宜有但所以為故國者則以其有世臣而非以其有喬木也昨日所進用之人今日有亡去而不知者則無親臣矣況世臣乎輔氏曰故國不可無世臣人君不可無親臣今齊王之臣昨日所進而用之者今日亡去而不知則雖親臣亦無之矣況世臣乎舊說皆以親臣便為世臣故其辭膠轕不分曉集注始分為兩人然後其意明白王曰吾何以識其不才而舍之舍上聲王意以為此亡去者皆不才之人我初不知而誤用之故今不以其去為意耳因問何以先識其不才而舍之邪輔氏曰若不先言齊王之意則問此一句似無來厯也蓋宣王於此始悟其始之所進者擇之不精故問何以辨之於初也宣王資質亦明快易曉者曰國君進賢如不得已將使卑踰尊疏踰戚可不慎與與平聲如不得已言謹之至也蓋尊尊親親禮之常也然或尊者親者未必賢則必進疏逺之賢而用之是使卑者踰尊疏者踰戚非禮之常故不可不謹也輔氏曰先儒皆以如不得已一句連下文說言不得已則將使卑踰尊疏踰戚故不可不謹雖若可通然如此則是國君用人唯於不得已之際方致其謹且下文但言因國人之言自察其賢否而用舍之亦未嘗言其不得已之意故集注直以如不得已一句連上文說言如不得已是至謹之意人君於進賢之際皆不可不謹故於下段結之云所謂進賢如不得已者如此至於尊者親者未必賢則又將進其疏逺之賢者而用之至使卑者踰尊疏者踰戚則又非禮之常尤不可不謹也左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之去上聲左右近臣其言固未可信諸大夫之言宜可信矣然猶恐其蔽於私也至於國人則其論公矣然猶必察之者蓋人有同俗而為衆所恱者亦有特立而為俗所憎者故必自察之而親見其賢否之實然後從而用舍之則於賢者知之深任之重而不才者不得以幸進矣所謂進賢如不得已者如此輔氏曰左右近臣未必盡賢故其言未可以為信諸大夫則職位尊矣不容有不賢者然猶恐其或有蔽於私也至於舉國之人皆以為然則其論公矣然世又有同俗而為衆所悅者特立而為俗所憎者故又必自察之所謂察之則必因言以察其心考迹以察其用如孔子之視所以觀所由察所安然後能親見其賢否之實從而用舍之則於賢者非徒知之知之必深而無所疑非徒任之任之必重而不可易至於不才亦不容於幸進矣左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也此言非獨以此進退人才至於用刑亦以此道蓋所謂天命天討皆非人君之所得私也輔氏曰命有德討有罪二事相反而實相連故因論進退人才而併及於用刑舜之於四凶孔子之於少正卯皆天理人情之至所謂天討也如此然後可以為民父母傳曰民之所好好之民之所惡惡之此謂民之父母齊宣王問曰湯放桀武王伐紂有諸孟子對曰於傳有之傳直戀反放置也書云成湯放桀于南巢蔡氏曰南巢地名廬江六縣有居巢城桀奔于此因以放之也曰臣弒其君可乎桀紂天子湯武諸侯曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也賊害也殘傷也害仁者凶暴淫虐滅絶天理故謂之賊害義者顛倒錯亂傷敗彝倫故謂之殘語録曰賊仁之罪重殘義之罪輕仁義都是心之天理仁是根本賊仁則大倫大法虧滅了便是殺人砥人一般義就一莭一事上言一事不合宜便傷義似手足上傷損一般所傷者小猶可補又曰傷敗彝倫只是小小傷敗常理如不以禮食不親迎之類若是那紾兄之臂踰東家牆便是絶滅天理輔氏曰賊之為害深殘之為害淺凶暴淫虐指發於中者而言顛倒錯繆指見於事者而言然發於中者必見於外見於事者實生於心滅絶天理則是殄閼其根本傷敗彝倫則是損害其枝葉此賊仁賊義之害又有輕重之不同也一夫言衆叛親離不復以為君也輔氏曰此賊仁賊義衆惡皆備之證驗也書曰獨夫紂蓋四海歸之則為天子天下叛之則為獨夫所以深警齊王垂戒後世也王勉曰斯言也惟在下者有湯武之仁而在上者有桀紂之暴則可不然是未免為篡弒之罪也勉建陽人輔氏曰此事自人君言之則理所當然自臣下言之則不得已之大變故王氏下此數語所以著萬世為人臣者之戒孟子見齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斫而小之則王怒以為不勝其任矣夫人幼而學之壯而欲行之王曰姑舍女所學而從我則何如勝平聲夫音扶舍上聲女音汝下同巨室大宫也工師匠人之長匠人衆工人也輔氏曰匠人為衆工人則工師乃衆工人之師故知其為長也姑且也言賢人所學者大而王欲小之也今有璞玉於此雖萬鎰必使玉人雕琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人雕琢玉哉鎰音溢璞玉之在石中者鎰二十兩也愚謂國語云二十四兩為諡禮云朝一鎰米注亦謂二十四兩趙岐始誤注為二十兩玉人玉工也不敢自治而付之能者愛之甚也治國家則徇私欲而不任賢是愛國家不如愛玉也輔氏曰人唯愛玉唯恐損之故不敢自治而必付之能者至於治國家乃不任賢者而徇私欲以為之則雖曰治之乃所以害之是愛國家反不如愛玉也范氏曰古之賢者常患人君不能行其所學而世之庸君亦常患賢者不能從其所好是以君臣相遇自古以為難孔孟終身而不遇蓋以此耳輔氏曰德義則當責成於已遇否則當聽命於天齊人伐燕勝之案史記燕王噲讓國於其相子之而國大亂齊因伐之燕士卒不戰城門不閉遂大勝燕宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬而舉之人力不至於此不取必有天殃取之何如乘去聲下同以伐燕為宣王事與史記諸書不同己見序說輔氏曰伐燕實湣王事序說辨之已明今此作宣王者後世傳寫之訛也孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也商紂之世文王三分天下有其二以服事商至武王十三年乃伐紂而有天下張子曰此事間不容髮一日之間天命未絶則是君臣當日命絶則為獨夫然命之絶否何以知之人情而已諸侯不期而會者八百武王安得而止之哉或問文武之事與齊之取燕若不同者而孟子引之何耶曰張子詳矣第深考之則於文武之心孟子之意其庶幾乎輔氏曰文王武王豈冇一豪利天下之心哉亦順天命而不敢違焉耳而張子之說為尤嚴所謂間不容髮之際非理明義精德至聖人者孰能處之而無愧哉才有一豪利心則失之矣然其命之絶否則亦不過察於人情則又與孟子之言實相表裏也以萬乘之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣簞音丹食音嗣簞竹器愚謂圓曰簞方曰笥飯器也以竹為之食飯也運轉也言齊若更為暴虐則民將轉而望救於他人矣趙氏曰征伐之道當順民心民心悅則天意得矣輔氏曰趙氏發明得人心天意為一之理亦明切齊人伐燕取之諸侯將謀救燕宣王曰諸侯多謀伐寡人者何以待之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也千里畏人指齊王也書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民若時雨降民大悅書曰徯我后后來其蘇霓五稽反徯胡禮反兩引書皆商書仲虺之誥文也與今書文亦小異一征初征也天下信之信其志在救民不為暴也奚為後我言湯何為不先來征我之國也蔡氏曰湯師之未加者則怨望其來曰何獨後豫霓虹也雲合則雨虹見則止愚案爾雅云雲出天之正氣霓出地之正氣雄謂之虹雌謂之霓則雲陽物也隂陽和而既雨則雲散而霓見矣變動也徯待也后君也蘇復生也他國之民皆以湯為我君而待其來使已得蘇息也蔡氏曰湯師之所往伐者則曰待我后久矣后來我其復生乎他國之民皆以湯為我君而望其來者如此此言湯之所以七十里而為政於天下也今燕虐其民王往而征之民以為將拯已於水火之中也簞食壺漿以迎王師若殺其父兄係纍其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之彊也今又倍地而不行仁政是動天下之兵也纍力追反拯救也係纍執縛也重器寶器也畏忌也倍地并燕而增一倍之地也齊之取燕若能如湯之征葛則燕人悅之而齊可以為政於天下矣今乃不行仁政而肆為殘虐則無以慰燕民之望而服諸侯之心是以不免乎以千里而畏人也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也旄與耄同倪五稽反反還也旄老人也倪小兒也謂所虜略之老小也猶尚也及止及其未發而止之也范氏曰孟子事齊梁之君論道德則必稱堯舜論征伐則必稱湯武蓋治民不法堯舜則是為暴行師不法湯武則是為亂豈可謂吾君不能而舍所學以徇之哉輔氏曰范氏發明孟子此意甚好蓋莫非道也而堯舜之道則正道也莫非師也而湯武之師則天討也集注又益以豈可謂吾君不能而舍所學以徇之哉一句尤為有功於學者此萬世臣子事君之大法也鄒與魯閧穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也閧胡弄反勝平聲長上聲下同閧鬬聲也穆公鄒君也不可勝誅言人衆不可盡誅也長上謂有司也民怨其上故疾視其死而不救也孟子對曰凶年饑嵗君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也曾子曰戒之戒之出乎爾者反乎爾者也夫民今而後得反之也君無尤焉幾上聲夫音扶轉飢餓輾轉而死也充滿也上謂君及有司也尤過也君行仁政斯民親其上死其長矣君不仁而求富是以有司知重斂而不知恤民故君行仁政則有司皆愛其民而民亦愛之矣范氏曰書曰民惟邦本本固邦寧有倉廩府庫所以為民也豐年則斂之凶年則散之恤其飢寒救其疾苦是以民親愛其上有危難則赴救之如子弟之衛父兄手足之捍頭目也穆公不能反已猶欲歸罪於民豈不誤哉輔氏曰范氏說得君民相與之義甚明且曰穆公不能反已而猶欲歸罪於民豈不誤哉辭意深厚最宜詳玩滕文公問曰滕小國也閒於齊楚事齊乎事楚乎閒去聲滕國名愚案滕國在漢沛郡公丘縣東南孟子對曰是謀非吾所能及也無已則有一焉鑿斯池也築斯城也與民守之效死而民弗去則是可為也無已見前篇一謂一說也效猶致也國君死社稷故致死以守國至於民亦為之死守而不去則非有以深得其心者不能也此章言有國者當守義而愛民不可僥幸而苟免輔氏曰築城鑿池致死以守者守義也使民亦為之死守而不去則非愛民者不能也若夫間於二國而徒欲擇彊者而事之以覬一日之安則是僥幸而苟免也滕文公問曰齊人將築薛吾甚恐如之何則可薛國名近滕愚案薛國即漢魯國薛縣與滕相密邇齊取其地而城之故文公以其逼已而恐也孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也邠與豳同邠地名言大王非以岐下為善擇取而居之也詳見下章苟為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也君如彼何哉彊為善而已矣夫音扶彊上聲創造統緒也言能為善則如大王雖失其地而其後世遂有天下乃天理也然君子造基業於前而垂統緒於後但能不失其正令後世可繼續而行耳若夫成功則豈可必乎彼齊也君之力既無如之何則但彊於為善使其可繼而俟命於天耳此章言人君但當竭力於其所當為不可徼幸於其所難必輔氏曰勉彊於其所當為者彊為善之事也僥幸於其所難必者期後世之必興也滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可孟子對曰昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市屬音燭皮謂虎豹麋鹿之皮也幣帛也屬㑹集也土地本生物以養人今爭地而殺人是以其所以養人者害人也邑作邑也歸市人衆而爭先也或曰世守也非身之所能為也效死勿去又言或謂土地乃先人所受而世守之者非已所能専但當致死守之不可舍去此國君死社稷之常法傳所謂國滅君死之正也正謂此也君請擇於斯二者能如大王則避之不能則謹守常法蓋遷國以圖存者權也守正而俟死者義也審已量力擇而處之可也文集曰或請改義字作經字曰義便近權如或可以如此或可以如彼皆義也經則一定而不可易對權字說須改作經字輔氏曰遷國以圖存者大王是也守正而俟死者國君死社稷是也在文公唯有此二法故併舉以告之然權非大賢以上不能為經則人皆當勉也故使文公審已量力擇而取其一焉夫大王之事非文公所能為然則孟子之意固欲文公勉守其常法耳楊氏曰孟子之於文公始告之以效死而已禮之正也至其甚恐則以大王之事告之非得已也然無大王之德而去則民或不從而遂至於亡則又不若效死之為愈故又請擇於斯二者又曰孟子所論自世俗觀之則可謂無謀矣然理之可為者不過如此舍此則必為儀秦之為矣凡事求可功求成取必於智謀之末而不循天理之正者非聖賢之道也輔氏曰楊氏二條說盡事理而後條尤有補於世教魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣有司未知所之敢請公曰將見孟子曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾乘去聲乘輿君車也駕駕馬也孟子前喪父後喪母踰過也言其厚母薄父也諾應辭也樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺槨衣衾之美也曰非所謂踰也貧富不同也入見之見音現與平聲樂正子孟子弟子也仕於魯三鼎士祭禮五鼎大夫祭禮愚謂士爵卑而賤大夫爵尊而貴中庸曰子為士祭以士子為大夫祭以大夫此祭鼎所以有三與五之異樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉為去聲沮慈吕反尼女乙反焉於䖍反克樂正子名沮尼皆止之之意也言人之行必有人使之者其止必有人尼之者然其所以行所以止則固有天命而非此人所能使亦非此人所能尼也然則我之不遇豈臧倉之所能為哉輔氏曰凡人之行止須有人使之尼之故人多歸咎其使尼之人然在君子觀之則其人之所以行所以止者固自有天命存焉實非是人之所能使所能尼也況孟子之出處實關時運之盛衰然則其所以不遇魯侯者又豈臧倉所能為哉此章言聖賢之出處關時運之盛衰乃天命之所為非人力之可及輔氏曰章㫖之說深得聖賢出處之道樂正子亦未免以世俗之心窺孟子故孟子以此發之孟子纂疏卷二
