body:
  text: 欽定四庫全書孟子纂疏卷十二宋趙順孫撰朱子集注告子章句下凡十六章任人有問屋廬子曰禮與食孰重曰禮重任平聲任國名愚案任薛同姓之國在齊宋之間屋廬子名連孟子弟子也色與禮孰重任人復問也曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎迎去聲屋廬子不能對明日之鄒以告孟子孟子曰於答是也何有於如字何有不難也不揣其本而齊其末方寸之木可使高於岑樓揣初委反本謂下末謂上方寸之木至卑喻食色岑樓樓之高鋭似山者至高喻禮若不取其下之平而升寸木於岑樓之上則寸木反高岑樓反卑矣輔氏曰物之不齊固當揣其本以齊其末不可只據其末以定其高卑金重於羽者豈謂一鉤金與一輿羽之謂哉鉤帶鉤也金本重而帶鉤小故輕喻禮有輕於食色者羽本輕而一輿多故重喻食色有重於禮者輔氏曰物固有重而有輕然重者少而輕者多則輕者反重而重者反輕矣取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚趙色重翅與雪同古字通用施智反禮食親迎禮之輕者也飢而死以滅其性不得妻而廢人倫食色之重者也奚翅猶言何但言其相去懸絶不但有輕重之差而已往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎紾音軫摟音婁紾戾也摟牽也處子處女也此二者禮與食色皆其重者而以之相較則禮為尤重也此章言義理事物其輕重固有大分然於其中又各自有輕重之别聖賢於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視於理之當然而已矣輔氏曰章旨之説於聖賢處事之權度固己深得其要矣茍或義理未精權度未審則凡於事物膠轕難辨之際巧者必至於枉尺而直尋拙者必至於膠柱而調瑟終不能得夫時措之宜矣曹交問曰人皆可以為堯舜有諸孟子曰然趙氏曰曹交曹君之弟也愚謂春秋末曹已滅矣交特姓曹者爾謂為曹君之弟者趙氏誤也人皆可以為堯舜疑古語或孟子所嘗言也輔氏曰孟子言必稱堯舜故恐或是孟子所嘗言然曹交之問又初不言是孟子説故疑是古語有之交聞文王十尺湯九尺今交九尺四寸以長句食粟而已如何則可曹交問也食粟而已言無他材能也曰奚有於是亦為之而已矣有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳勝平聲匹字本作鴄鴨也從省作匹禮記説匹為鶩是也烏獲古之有力人也愚案秦武王好以力戲力士烏獲至大官能舉移千鈞徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也堯舜之道孝弟而已矣後去聲長上聲先去聲夫音扶陳氏曰孝弟者人之良知良能自然之性也堯舜人倫之至亦率是性而已豈能加毫末於是哉輔氏曰孩提之童無不知愛其親者及其長也無不知敬其兄者是所謂良知良能也本於性之自然初非有所勉強矯揉而能也雖堯舜之聖為人倫之至亦不過率是性而充其量耳豈能加毫末於其間哉楊氏曰堯舜之道大矣而所以為之乃在夫行止疾徐之間非有甚高難行之事也百姓蓋日用而不知耳輔氏曰陳氏是就孝弟上説而極於堯舜之聖楊氏是就堯舜上説而本於孝弟之近二説互相發明所謂百姓蓋日用而不知者其警發於人尤為切至也子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣之行並去聲言為善為惡皆在我而已詳曹交之問淺陋粗率必其進見之時禮貌衣冠言動之間多不循理輔氏曰此指其以身之長短與湯文較也人皆可以為堯舜豈謂是歟觀此之問則交蓋全未知夫學又以孟子所告兩節言之則其進見之時禮貌衣服言語之不循乎理其必有所不免矣故孟子告之如此兩節云蔡氏曰孟子以人皆可為堯舜所以誘曹交之進也然亦豈謂不假修為而即可為堯舜邪勉之以孝弟又勉之以衣服言行之間固不以難而沮人亦不以易而許人惜乎曹交之不足以進此也曰交得見於鄒君可以假館願留而受業於門見音現假館而後受業又可見其求道之不篤輔氏曰此亦是富貴者之習氣都未知那居無求安之味在曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師夫音扶言道不難知若歸而求之事親敬長之間則性分之內萬理皆備隨處發見無不可師不必留此而受業也輔氏曰道若大路然人所共由者也初匪難知但患人蔽於私役於氣自暴自棄而不肯求耳誠能即其孝親弟長之良知良能而遡其自然之性則一性之中萬理皆備日用之間隨所感處無不發見而察之而體之則師不必求於外而得道不必索於外而存矣曹交事長之禮既不至求道之心又不篤故孟子教之以孝弟而不容其受業蓋孔子餘力學文之意亦不屑之教誨也輔氏曰使交能因是而思孟子所以不容已受業之故而得其説則是亦所以教誨之也公孫丑問曰高子曰小辨小人之詩也孟子曰何以言之曰怨辨音盤高子齊人也小辨小雅篇名周幽王娶申后生太子宜臼又得褒姒生伯服而黜申后廢宜臼於是宜臼之傳為作此詩以敘其哀痛迫切之情也曰固哉高叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫高叟之為詩也關與彎同射食亦反夫音扶固謂執滯不通也為猶治也越蠻夷國名道語也親親之心仁之發也輔氏曰此正程子所謂性中只有箇仁義禮智而已曷嘗有孝弟來仁主於愛愛莫大於愛親者是也曰凱風何以不怨凱風邶風篇名衛有七子之母不能安其室七子作此以自責也曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也磯音機磯水激石也不可磯言微激之而遽怒也文集曰問親之過大則傷天地之太和戾父子之至愛若此而不怨焉則是坐視其親之陷於大惡恝然不少動其心而父子之情益薄矣此之謂愈疏親之過小則特以一時之私心而少有虧於父子之天性若此而遽怨焉則是水中不可容一激石一有激石則呌號而奮怒矣此之謂不可磯故二者均為不孝也不可磯是如此否曰得之孔子曰舜其至孝矣五十而慕言舜猶怨慕小辨之怨不為不孝也趙氏曰生之膝下一體而分喘息呼吸氣通於親當親而疏怨慕號天是以小辨之怨未足為愆也輔氏曰趙氏下此數語極切當不易得他究到這裏學者儘當玩繹宋牼將之楚孟子遇於石丘牼口莖反宋姓牼名石丘地名曰先生將何之趙氏曰學士年長者故謂之先生曰吾聞秦楚構兵我將見楚王説而罷之楚王不悅我將見秦王説而罷之二王我將有所遇焉説音稅時宋牼方欲見楚王恐其不悅則將見秦王也遇合也案莊子書有宋鈃者禁攻寢兵救世之戰上説下教強聒不舍疏云齊宣王時人以事考之疑即此人也曰軻也請無問其詳願聞其指説之將何如曰我將言其不利也曰先生之志則大矣先生之號則不可徐氏曰能於戰國擾攘之中而以罷兵息民為説其志可謂大矣然以利為名則不可也輔氏曰當戰國擾攘之時而為罷兵息民之説非志之大者固有所不能然以利害為説則不可此蓋聖學不明人雖有善心而不知所以為之之道故反陷於不善而不自知也先生以利説秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士樂罷而悅於利也為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄是君臣父子兄弟終去仁義懷利以相接然而不亡者未之有也樂音洛下同先生以仁義説秦楚之王秦楚之王悅於仁義而罷三軍之師是三軍之士樂罷而悅於仁義也為人臣者懷仁義以事其君為人子者懷仁義以事其父為人弟者懷仁義以事其兄是君臣父子兄弟去利懷仁義以相接也然而不王者未之有也何必曰利王去聲此章言休兵息民為事則一然其心有義利之殊而其效有興亡之異學者所當深察而明辨之也真氏曰戰國交兵之禍烈矣宋牼一言而罷之豈非生民之福而仁人之所甚願者哉顧利端一開君臣父子兄弟大抵皆見利而動其禍又有甚於交兵者是以聖賢不得不嚴其防也孟子居鄒季任為任處守以幣交受之而不報處於平陸儲子為相以幣交受之而不報任平聲相去聲下同趙氏曰季任任君之弟任君朝會於鄰國季任為之居守其國也儲子齊相也不報者來見則當報之但以幣交則不必報也輔氏曰來見則禮意重幣交則禮意輕也他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣屋廬子知孟子之處此必有義理故喜得其間隙而問之問曰夫子之任見季子之齊不見儲子為其為相與為其之為去聲下同與平聲言儲子但為齊相不若季子攝守君位故輕之邪曰非也書曰享多儀儀不及物曰不享惟不役志于享書周書洛誥之篇享奉上也儀禮也物幣也役用也言雖享而禮意不及其幣則是不享矣以其不用志于享故也蔡氏曰享朝享也享不在幣而在於禮幣有餘而禮不足亦所謂不享也愚謂儀物相稱然後成享一或偏勝是心有慢上者矣與不享同為其不成享也孟子釋書意如此屋廬子悅或問之屋廬子曰季子不得之鄒儲子得之平陸徐氏曰季子為君居守不得往他國以見孟子則以幣交而禮意已備儲子為齊相可以至齊之境內而不來見則雖以幣交而禮意不及其物也輔氏曰不得之鄒而不來則是制於禮者也得之平陸而不至則是簡於禮者也制於禮者欲為而不可簡於禮者可為而不欲君子之所為一視其禮意之輕重而行吾之義而已蔡氏曰此章見孟子於禮意之間是否之際權衡輕重各稱其宜如此然皆以幣交而皆受之豈孟子當時亦有幣交之禮而季子儲子皆非惡人而亦有可受之理歟淳于髠曰先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如此乎先後為皆去聲名聲譽也實事功也言以名實為先而為之者是有志於救民也以名實為後而不為者是欲獨善其身者也名實未加於上下言上未能正其君下未能濟其民也孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下惠也三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同惡趨並去聲仁者無私心而合天理之謂輔氏曰無私心以存諸心而言合天理以行諸外而言人固有雖無私心而行事有不合天理者唯仁則內外合天人備矣問論語於令尹子文陳文子之事注引師説以為當理而無私心則仁矣今又以為仁者無私心而合天理其先後不同何也曰彼就二子之事而言故以為當理而無私心此直指夫仁而言故曰仁者無私心而合天理楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心為心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下為心也以取天下為心豈聖人之心哉輔氏曰楊氏真得湯伊尹之心足以洗世儒之惑曰魯繆公之時公儀子為政子栁子思為臣魯之削也滋甚若是乎賢者之無益於國也公儀子名休為魯相子栁泄栁也削地見侵奪也髠譏孟子雖不去亦未必能有為也曰虞不用百里奚而亡秦穆公用之而霸不用賢則亡削何可得與與平聲百里奚事見前篇曰昔者王豹處於淇而河西善謳綿駒處於高唐而齊右善歌華周杞梁之妻善哭其夫而變國俗有諸內必形諸外為其事而無其功者髠未嘗覩之也是故無賢者也有則髠必識之華去聲王豹衛人善謳淇水名愚案淇水出漢河內郡共縣北山東至黎陽入河綿駒齊人善歌高唐齊西邑華周杞梁二人皆齊臣戰死於莒其妻哭之哀國俗化之皆善哭髠以此譏孟子仕齊無功未足為賢也曰孔子為魯司冦不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為茍去君子之所為衆人固不識也稅音脫為肉為無之為去聲案史記孔子為魯司冦攝行相事齊人聞而懼於是以女樂遺魯君季桓子與魯君往觀之怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰于大夫則吾猶可以止桓子卒受齊女樂郊又不致膰俎于大夫孔子遂行孟子言以為為肉者固不足道以為為無禮則亦未為深知孔子者蓋聖人於父母之國不欲顯其君相之失又不欲為無故而茍去故不以女樂去而以膰肉行其見幾明決而用意忠厚固非衆人所能識也然則孟子之所為豈髠之所能識哉輔氏曰觀孟子引孔子之事以答淳于髠則孟子之去齊亦必有所為而不欲言之者矣至孔子之事集注以見幾明決用意忠厚兩語斷之亦可謂善言聖人也不曰髠所不識但曰衆人固不識者此又見孟子忠厚之意尹氏曰淳于髠未嘗知仁亦未嘗識賢也宜乎其言若是輔氏曰尹氏斷髠甚當唯其如此故承當孟子之言不得也孟子曰五霸者三王之罪人也今之諸侯五霸之罪人也今之大夫今之諸侯之罪人也趙氏曰五霸齊桓晉文秦穆宋襄楚莊也三王夏禹商湯周文武也丁氏曰夏昆吾商大彭豕韋周齊桓晉文謂之五霸丁氏名公著唐蘇州人輔氏曰此必有所傳授決非臆説夫齊桓晉文之霸亦恐非創始為之必有所自來故取其説而附見之愚謂丁氏説本杜預春秋傳注天子適諸侯曰巡狩諸侯朝於天子曰述職春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢倍克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則六師移之是故天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也故曰五霸者三王之罪人也朝音潮辟與闢同治平聲慶賞也益其地以賞之也掊克聚斂也讓責也移之者誅其人而變置之也討者出命以討其罪而使方伯連帥帥諸侯以伐之也伐者奉天子之命聲其罪而伐之也摟牽也五霸牽諸侯以伐諸侯不用天子之命也自入其疆至則有讓言巡狩之事自一不朝至六師移之言述職之事五霸桓公為盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好今之諸侯皆犯此五禁故曰今之諸侯五霸之罪人也歃所洽反糴音狄好去聲案春秋傳僖公九年葵邱之會陳牲而不殺讀書加於牲上一明天子之禁輔氏曰但一意以明天子之禁而已樹立也已立世子不得擅易初命三事所以修身正家之要也輔氏曰不孝是惡之大者故居首世子必告於天子而後立既立則豈可擅自易之不孝是不子易樹子是不父以妾為妻則無夫婦之道賓賓客也旅行旅也皆當有以待之不可忽忘也士世祿而不世官恐其未必賢也官事無攝當廣求賢才以充之不可以闕人廢事也取士必得必得其人也無專殺大夫有罪則請命于天子而後殺之也無曲防不得曲為隄防壅泉激水以專小利病鄰國也無遏糴鄰國凶荒不得閉糴也無有封而不告者不得專封國邑而不告天子也長君之惡其罪小逢君之惡其罪大今之大夫皆逢君之惡故曰今之大夫今之諸侯之罪人也長上聲君有過不能諫又順之者長君之惡也君之過未萌而先意導之者逢君之惡也輔氏曰長君之惡者無能而巽懦阿諛之人也逢君之惡者有才而傾儉陰邪之人也林氏曰邵子有言治春秋者不先治五霸之功罪則事無統理而不得聖人之心春秋之間有功者未有大於五霸有過者亦未有大於五霸故五霸者功之首罪之魁也孟子此章之義其亦若此也與然五霸得罪於三王今之諸侯得罪於五霸皆出於異世故得以逃其罪至於今之大夫且得罪於今之諸侯則同時矣而諸侯非惟莫之罪也乃反以為良臣而厚禮之不以為罪而反以為功何其繆哉輔氏曰邵子可謂善治春秋者孟子雖取桓公之五命而猶以五霸為三王之罪人得春秋之大指矣魯欲使愼子為將軍愼子魯臣孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世教民者教之禮義使知入事父兄出事長上也用之使之戰也輔氏曰能如是而教其民乃可以即戎使之敵愾禦侮臨戰之際皆如手足之扞頭目子弟之衛父兄矣不然則是陷之於死地也故謂之殃民在堯舜之仁政豈容之哉一戰勝齊遂有南陽然且不可是時魯蓋欲使慎子伐齊取南陽也輔氏曰只以孟子獨言遂有南陽便可見也故孟子言就使慎子善戰有功如此且猶不可愼子勃然不悅曰此則滑釐所不識也滑音骨滑釐愼子名曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍待諸侯謂待其朝覲聘問之禮宗廟典籍祭祀會同之常制也輔氏曰觀此一句則知先王之制封國大小自有意義豈私意可得而損益之哉周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里二公有勳勞於天下而其封國不過百里語録曰問王制與孟子同而周禮諸公之地封疆方五百里諸侯方四百里伯三百里子二百里男百里鄭氏以王制為夏商制謂夏商中國方三千里周公斥而大之中國方七千里所以不同曰鄭氏只文字上説得好看然甚不曉事情且如百里之國周人欲增到五百里須併四箇百里國地方做得一國其所併四國又當别列地以封之如此則天下諸侯東遷西移改立宗廟社稷皆為之騷動矣如此趲去不數大國便無地可容了許多國何以處之恐不其然竊意其初只方百里後來吞并遂漸漸大如禹會諸侯於塗山執玉帛者萬國到周時只千八百國自非吞併如何不見許多國武王時諸國地已大武王亦不奈何只得就而封之當時封許多功臣之國緣當初滅國者五十得許多空地可封不然則周公太公亦自無安頓處孟子百里之説亦只是大綱如此説不是實考得見古制儉止而不過之意也今魯方百里者五子以為有王者作則魯在所損乎在所益乎魯地之大皆并吞小國而得之有王者作則必在所損矣徒取諸彼以與此然且仁者不為況於殺人以求之乎徒空也言不殺人而取之也輔氏曰不殺人而取彼與此仁者猶且不為以其非所當得故也況於殃民而求廣土地者乎君子之事君也務引其君以當道志於仁而已當道謂事合於理志仁謂心在於仁輔氏曰事合於理則必不敢并小以為之心在於仁則必不肯殺人以從欲然此亦內外之符也心茍在於仁則事必合於理矣先言當道者就事説故耳真氏曰道之與仁非有二也以事之理而言則曰道以心之德而言則曰仁心存於仁則其行無不合道矣孟子曰今之事君者曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求富之是富桀也為去聲辟與闢同鄒與向同下皆同辟開墾也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之強戰是輔桀也約要結也與國和好相與之國也由今之道無變今之俗雖與之天下不能一朝居也言心爭奪而至於危亡也輔氏曰自當時觀之孟子之説似若遇當然其後六國卒并於秦而秦亦不二世而亡則孟子之言驗矣白圭曰吾欲二十而取一何如白圭名丹周人也欲更稅法二十分而取其一分林氏曰案史記白圭能薄飲食忍耆欲與童僕同苦樂樂觀時變人棄我取人取我與以此居積致富其為此論蓋欲以其術施之國家也孟子曰子之道貉道也貉音陌貉北方夷狄之國名也萬室之國一人陶則可乎曰不可器不足用也孟子設喻以詰圭而圭亦知其不可也曰夫貉五榖不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也夫音扶北方地寒不生五榖黍早熟故生之饔飱以飲食饋客之禮也今居中國去人倫無君子如之何其可也無君臣祭祀交際之禮是去人倫無百官有司是無君子陶以寡且不可以為國況無君子乎因其辭以折之欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也什一而稅堯舜之道也多則桀寡則貉今欲輕重之則是小貉小桀而已輔氏曰什一中正之制也故以為堯舜之道三代聖人雖因時損益有所不同然一本於中正則無以異也惟其中正所以行之天下而安傅之萬世而無弊周衰王制盡廢兼并之俗起而貧富遂以不均白圭厪身禁欲樂觀時變知取知豫以此居積致富此三代盛時所無有也其犯先王之禁大矣顧乃私憂過計創為輕賦之説欲以其術施之國家故孟子明辨其不可觀其始則取其事之易辨者以開其智中則厯陳其不可之實以破其説末則舉堯舜之道不可得而輕重者使之有所歸著亦可謂委曲詳盡矣白圭曰丹之治水也愈於禹趙氏曰當時諸侯有小水白圭為之築隄壅而注之他國孟子曰子過矣禹之治水水之道也順水之性也是故禹以四海為壑今吾子以鄰國為壑壑受水處也水逆行謂之洚水洚水者洪水也仁人之所惡也吾子過矣惡去聲水逆行者下流壅塞故水逆流今乃壅水以害人則與洪水之災無異矣孟子曰君子不亮惡乎執惡平聲亮信也與諒同輔氏曰以實之謂信不信則不實不實則無物而輕飄浮搖故凡事茍且無所執守也此與論人而無信章同意此以守言彼以行言也惡乎執言凡事苟且無所執持也永嘉陳氏曰此可以言不敬而却謂之不亮蓋不信實者必茍且自欺也魯欲使樂正子為政孟子曰吾聞之喜而不寐喜其道之得行公孫丑曰樂正子強乎曰否有知慮乎曰否多聞識乎曰否知去聲此三者皆當世之所尚而樂正子之所短故丑疑而厯問之輔氏曰強謂有強力可辦事者戰陳之事皆在其中有智慮謂能為計謀如縱橫捭闔皆是也多聞識謂廣聞博識多知而能言之士也此三者皆戰國之所尚而善信之士所不屑也然則奚為喜而不寐丑問也曰其為人也好善好去聲下同好善足乎丑問也曰好善優於天下而況魯國乎優有餘裕也言雖治天下尚有餘力也愚謂善專於己則有盡善取於人則無窮此其所以雖治天下猶有餘力也夫茍好善則四海之內皆將輕千里而來告之以善夫音扶下同輕易也言不以千里為難也輔氏曰上之人好善則人有善者喜得其伸故不以千里之逺為難致而皆來告之也夫茍不好善則人將曰訑訑豫既已知之矣訑訑之聲音顔色距人於千里之外士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎訑音移治去聲訑訑自足其智不嗜善言之貌輔氏曰世間此等人亦甚多然其所謂智者是乃所以為愚也然原其始則起於豫既已知之之意萌於中而已可不畏乎君子小人迭為消長直諒多聞之士逺則讒諂面諛之人至理勢然也此章言為政不在於用一已之長而貴於有以來天下之善輔氏曰公孫丑所問三者不過是已之長而已所謂貴於有以來天下之善者蓋指四海之內輕千里而來而告之以善言也陳子曰古之君子何如則仕孟子曰所就三所去三其目在下迎之致敬以有禮言將行其言也則就之禮貌未衰言弗行也則去之所謂見行可之仕若孔子於季桓子是也受女樂而不朝則去之矣其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之所謂際可之仕若孔子於衛靈公是也故與公遊於囿公仰視蜚雁而後去之其下朝不食夕不食飢餓不能出門户君聞之曰吾大者不能行其道又不能從其言也使飢餓於我土地吾恥之周之亦可受也免死而已矣所謂公養之仕也君之於民固有周之之義況此又有悔過之言所以可受然未至於飢餓不能出門户則猶不受也其曰免死而已則其所受亦有節矣輔氏曰見行可之仕謂見其可行之幾而仕也際可之仕謂因其交際之禮為可而仕也公養之仕謂因君以周民為義養已而仕也見其有可行之幾而仕故言之弗行則去之以其交際之禮為可而仕故禮貌一衰則去之此皆不以勢利而變其初心也為君以周民為義養已而仕則飢餓瀕死然後受之然其受之亦以免死無纍其君則已矣固不可茍安貪得而因以為利也言將行其言也則就之為道而仕也迎之致敬以盡禮則就之為禮而仕也道在我禮在彼至於周之亦可受也則享其意而已此君子之不得已也又曰集注恐後之貪利茍得者以是藉口而全不顧彼已之義遂流於欲而不自知也故言此以防警之爾然使上之賜下止周其身下受其賜止以免其死則時可知矣孟子曰舜發於畎畝之中傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市説音悅舜耕厯山三十登庸説築傅巖武丁舉之膠鬲遭亂鬻販魚鹽文王舉之管仲囚於士官桓公舉以相國孫叔敖隱處海濱楚莊王舉之為令尹百里奚事見前篇故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性曽益其所不能曽與增同降大任使之任大事也若舜以下是也空窮也乏絶也拂戾也言使之所為不遂多背戾也動心忍性謂竦動其心堅忍其性也輔氏曰竦動其心則心活堅忍其性則性定心活則不為欲所役性定則不為氣所動然所謂性亦指氣稟食色而言耳程子曰若要熟也須從這裏過語録曰只是要事事經厯過似一條路須每日從上面往來行得熟了方認得許多險阻去處若素不曽行忽然一旦撞行將去少間定墮坑落塹去也輔氏曰人不經憂患困窮頓挫摧屈則心不平氣不易察理不盡處事多率故謂人要熟須從這裏過永嘉陳氏曰更嘗變故多則閲義理之心熟熟謂義理與自家相習便如履吾室中人恆過然後能改困於心衡於慮而後作徵於色發於聲而後喻衡與橫同恆常也猶言大率也橫不順也作奮起也徵驗也喻曉也此又言中人之性常必有過然後能改蓋不能謹於平日故必事勢窮蹙以至困於心橫於慮然後能奮發而興起不能燭於幾微故必事理暴著以至驗於人之色發於人之聲然後能警悟而通曉也語録曰困心衡慮者人覺其有過徵色發聲者其過形於外輔氏曰舜大聖人之事也傳説而下則皆上智之事也自人常過而下則中人之事也才言常過而後能改便見是中人之性矣下兩句只是改過之事雖是不能謹於平日至於事勢窮蹙困心衡慮始能奮發而興起然必竟是其才尚足以有為雖是不能燭於幾微至於事理暴著證色發聲始能警悟而通曉然必竟是其智尚足以有察如此故亦可以進於善若至是而猶不之覺焉則下愚而已入則無法家拂士出則無敵國外患者國恆亡拂與弼同此言國亦然也輔氏曰上既言上智中人之事矣故此推言在國亦然法家法度之世臣也拂士輔拂之賢士也輔氏曰法度之世臣則能正其失於事輔拂之賢士則能救其過於身然後知生於憂患而死於安樂也樂音洛以上文觀之則知人之生全出於憂患而死亡由於安樂矣輔氏曰憂患則知警戒知警戒則心體流行而不息是生道也安樂則怠肆怠肆則心死矣心死則身亦隨之尹氏曰言困窮拂鬱能堅人之志而熟人之仁以安樂失之者多矣輔氏曰此言深切非深履而得其味決不能知孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣多術言非一端屑潔也語録曰考孟子不屑就與不屑不潔之言屑字皆當作潔字解不以其人為潔而拒絶之所謂不屑之教誨也語録曰如坐而言不應隱几而卧之類其人若能感此退自修省則是亦我教誨之也尹氏曰言或抑或揚或與或不與各因其才而篤之無非教也孟子纂疏卷十二
