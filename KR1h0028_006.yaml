body:
  text: 欽定四庫全書論語纂疏卷三宋趙順孫撰朱子集注公冶長第五此篇皆論古今人物賢否得失蓋格物窮理之一端也愚謂他人之是否若非切己之實然借是以分辨形以剖析豪氂在人者既明則在己者亦明矣所以為格物窮理之一端凡二十七章胡氏以為疑多子貢之徒所記云愚謂子貢方人故疑此篇多其徒所記然無左驗故止為疑詞而無決詞云子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之妻去聲下同縲力追反絏息列反公冶長孔子弟子魯人一云齊人妻為之妻也縲黑索也絏攣也古者獄中以黑索拘攣罪人長之為人無所考而夫子稱其可妻其必有以取之矣又言其人雖嘗陷於縲絏之中而非其罪則固無害於可妻也夫有罪無罪在我而已豈以自外至者為榮辱哉輔氏曰所貴於無罪者謂在我無得罪之道也所慮於有罪者謂在我有得罪之事也在我無得罪之道而不幸罪有自外來何足以為辱在我有得罪之事雖或幸免其罪於外何足以為榮故君子有隱微之過於暗室屋漏之中則其心愧恥若撻于市不幸而遇無妄之災則雖市朝之刑裔夷之竄皆安之而無恧也子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之南容孔子弟子居南宫名縚又名括字子容諡敬叔孟懿子之兄也不廢言必見用也以其謹於言行故能見用於治朝免禍於亂世也語録曰觀其三復白圭便是能謹其言行者那有道是君子道長之時必不廢棄邦無道是小人得志以陷害君子之時能謹其言行必不陷於刑戮愚謂南容三復白圭其所謹者言耳而集注稱其謹於言行蓋言行相為表裏能謹其言亦謹行之大端也事又見第十一篇或曰公冶長之賢不及南容故聖人以其子妻長而以兄子妻容蓋厚於兄而薄於己也程子曰此以己之私心窺聖人也凡人避嫌者皆內不足也聖人自至公何避嫌之有況嫁女必量其才而求配尤不當有所避也若孔子之事則其年之長幼時之先後皆不可知唯以為避嫌則大不可避嫌之事賢者且不為況聖人乎語録曰聖人正大道理合做處便做何用避嫌程子所謂年之長幼時之先後正是解或人之説未必當時如此大抵二人都是好人可託或先是見公冶長遂將女妻他後來見南容亦是箇好人又把兄之女妻之看來文勢恐是孔子之女年長先嫁兄之女少在後嫁亦未可知問若是有一項合委曲而不可以直遂者這不可以為避嫌曰是道理合如此如避嫌者却是又怕人道如何這却是私意輔氏曰凡嫁女必量其才以求配婦人亦當以才言乎曰才生於氣凡能有為者才也婦人亦有所當為之事茍能為之豈獨不以才言乎又曰古謂妻為夫配者多矣而夫亦可以言配乎曰配合也妻齊也夫婦固皆可以配言矣子謂子賤君子哉若人魯無君子者斯焉取斯焉於虔反子賤孔子弟子姓宓名不齊魯人上斯斯此人下斯斯此德子賤蓋能尊賢取友以成其德者輔氏曰子賤為單父宰所父事者三人所兄事者五人所友者十一人皆教子賤以治人之事則其能尊師取友以成其德者可知矣故夫子既嘆其賢而又言若魯無君子則此人何所取以成此德乎因以見魯之多賢也蘇氏曰稱人之善必本其父兄師友厚之至也愚謂稱人之善己可言厚又推本其父兄師友之善則是厚之又厚故曰厚之至子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也女音汝瑚音胡璉力展反器者有用之成材胡氏曰器者各適其用而不相通此以為有用之成材者因下文瑚璉而加重其詞耳夏曰瑚商曰璉周曰簠簋皆宗廟盛黍稷之器而飾以玉器之貴重而華美者也輔氏曰一等是器而瑚璉為宗廟之器是器之貴重者也而又飾以玉是器之華美者也子貢見孔子以君子許子賤故以已為問而孔子告之以此然則子貢雖未至於不器其亦器之貴者歟或問集注言器者有用之成材又言未至於不器然則夫子女器之言抑揚之不同如此何也曰當時答問不稱其可用之實今較其輕重則誠與稱子賤者有等差耳語録曰子貢是器之貴者可以為貴用與賤者之器不同然畢竟只是器非不器也問子貢得為器之貴者而未至於不器不知是合下無規模抑是後來欠工夫曰是合下稟得偏了或曰雍也仁而不佞雍孔子弟子姓冉字仲弓魯人佞口才也語録曰佞只是捷給便口者仲弓為人重厚簡默輔氏曰仲弓從事於敬恕以求仁在德行之科而夫子稱其可使南面今或者又以不佞為慊則決非務外而事口者故以為重厚簡默也而時人以佞為賢輔氏曰人情徇外而不事內求名而不務實故以佞為賢故美其優於德而病其短於才也子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞焉於虔反禦當也猶應答也胡氏曰禦如禦人於國門之禦故云當也給辦也憎惡也言何用佞乎佞人所以應答人者但以口取辦而無情實徒多為人所憎惡爾語録曰是他説得大驚小怪被他驚嚇者豈不惡之輔氏曰佞人恃口以禦人浮淺躁妄發言成文雖若可聽然其情實則未必如此心口既不相副自然招尤而取憎也我雖未知仲弓之仁然其不佞乃所以為賢不足以為病也再言焉用佞所以深曉之或疑仲弓之賢而夫子不許其仁何也曰仁道至大非全體而不息者不足以當之語録曰所謂全體者合下全具比心更無一物之雜不息則未嘗休息而置之無用處全體似箇卓子四腳若三腳便是不全不息是常用他或置之僻處又被别人將去便是息此心具十全道理在若只見得九分亦不是全了所以息是私欲間之無一豪私欲方是不息黃氏曰集注言仁曰愛之理心之德深味六字則仁之道無餘藴矣至此言盡仁之道而又曰非全體而不息者不足以當之深味四字則學而求至於仁其所至之標的又昭然而可見矣或曰集注於他章引師説曰當理而無私心與此章所謂全體而不息者有以異乎曰後章據所聞於師者而言也此章即已之所見而言也此章全體二字已足以該後章五字之義加之以不息二字則又後章五字未盡之旨蓋亦因其所已聞而發其所獨得歟輔氏曰全體言其無物不體不息言其無時不然此兩語足以盡仁之體用蓋私意一萌物我橫生則體便有虧天理間斷則用便有息也陳氏曰仁惟此心純是天理之公絶無一豪人欲之私以間之乃可以當其名集注所謂全體云者非指仁之全體而言乃所以全體之也蔡氏曰全體是天理渾然無一豪之雜不息是天理流行無一念之間愛之理心之德六字所以訓仁之義為甚切全體不息四字所以盡仁之道為甚大只此十字之約不惟諸儒纍千百言所莫能盡而前後聖賢所論仁字普博精深千條萬緒莫不總會於此十字之中吁妙矣哉真氏曰仁者兼該萬善無所不備如人之頭目手足皆具然後謂之人也不息者如天地一元之氣運行於六合之間無頃刻止息所以生成萬物無有已時又曰心之活便能運轉不息凡處人倫事物之間此心周流無礙處處皆到心死則便如鐵石凡處人倫事物之間皆窒塞了如顔子亞聖猶不能無違於三月之後況仲弓雖賢未及顔子聖人固不得而輕許之也子使漆雕開仕對曰吾斯之未能信子説説音恱漆雕開孔子弟子字子若魯人斯指此理而言語録曰斯只是這許多道理見於日用之間蔡氏曰此理字宏闊恐不止是誠意正心之事凡其日用之間事君以忠事父以孝無非此理也信謂真知其如此而無豪髮之疑也語録曰信是於這箇道理上見得透全無些子疑處開自言未能如此未可以治人故夫子恱其篤志語録曰開能指此理而言便是心目之間已有所見末能信者未能真知其實方欲進進不已又要真知到真實無妄之地此夫子所以恱其篤志也程子曰漆雕開已見大意故夫子説之語録曰大意便是本初處若不見得大意如何下手作工夫若已見得大意而不下手作工夫亦不可又曰斯者非大意而何若推其極只是性蓋帝之降衷便是又曰是他見得大了便小殺合不得又曰規模小底易自以為足規模大則工夫卒難了所以自謂未能信黃氏曰大意即是大體他是見得這大體恁地了便是有一二節目處未盡得譬如白盤中一點黑黑盤中一點白不是全盤不是又如人學字且要識得一箇模樣那一點一畫未是却有商量胡氏曰得其大而不局於其小也又曰古人見道分明故其言如此或問漆雕開未能自信而程子以為己見大意見道分明何也曰人惟不見其大者故安於小惟見之不明也故若存若亡一出一入而不自知其所至之深淺也今開之不安於小也如此則固非有以見乎其大不能矣卒然之間一言之對若目有所見而手有所指者且其驗之於身又如此其切而不容自欺也則其所見之明又為如何哉然曰見大意則於其細微容或有所未盡曰見道分明則固未必見其反身而誠也輔氏曰人惟見道不分明故所言含糊不決今開斷然以為未能信未可以仕而治人故知其見道之分明也胡氏曰謂之見道分明者凡豪釐之未信皆自知之也謝氏曰開之學無可考然聖人使之仕必其材可以仕矣至於心術之微則一豪不自得不害其為未信此聖人所不能知而開自知之其材可以仕而其器不安於小成他日所就其可量乎夫子所以説之也黃氏曰謝氏説一豪不自得不害為未信似指心之所存者而言集注言真知如此而無豪髮之疑則專指所知而言安知未信之言非兼知行而言邪曰觀斯字之義則指斯道而為言非指此心之志於道而言故但可以知為言也然謂之真知則是心理相契無復疑礙安有所存所行之未實乎故但言知而謝氏之意在其中矣輔氏曰謝氏不言理而言心者心即理之所寓也心有一豪不自得便是於理有所未信也又曰材見於用者心存諸中者有諸中必形於外聖人明睿所照亦何有不知者但其未信之實意味曲折不若開自知之精耳又曰器言其志量也所見者大所知者明則其志量自然不肯安於小成其進進不已之意不至於大而化化而不知之神不止也則他日所就果可量乎胡氏曰謝氏以材器為言似與程子小異然所謂心術之微聖人有所不能知則其説精矣愚謂材如木料器是材之成就者子曰道不行乘桴浮于海從我者其由與子路聞之喜子曰由也好勇過我無所取材桴音孚從好並去聲與平聲材與裁同古字借用桴筏也愚謂桴竹木所編小筏也程子曰浮海之嘆傷天下之無賢君也子路勇於義故謂其能從已皆假設之言耳子路以為實然而喜夫子之與己故夫子美其勇而譏其不能裁度事理以適於義也輔氏曰聖人欲浮于海豈有憤世長往之意哉其憂時憫道之心蓋有不能自已者故程子下一嘆字又下一傷字且斷以為假設之辭則聖人哀矜惻怛之仁藹然見於言意之表又曰夫子謂子路之能從我正以其勇於義耳子路聞之喜使夫子而果行則子路必能從之矣故夫子以為好勇過我蓋深美之至於裁度事理以適於義則子路有所未能蓋不惟今日遂以夫子為必行而喜其與已而其平日之所為多傷於剛果而不能裁以適義如率爾之對迂也之言皆是也夫子所以教之胡氏曰得時行道使天下無不被其澤此聖人之本心世衰道否至於無所容其身豈聖人之得已乘桴浮海雖假設之辭然傷時之不我用也如子路之勇於義不以流離困苦而二其心故謂其能從我是皆憂深思逺而形於言也子路不知夫子之本心而喜夫子之與己可謂直情徑行而無所忖度故稱其勇而譏其不能審於義也孟武伯問子路仁乎子曰不知也子路之於仁蓋日月至焉者或在或亡不能必其有無故以不知告之輔氏曰諸子之於仁蓋亦勉焉而未能有諸已也故或日一至焉或月一至焉能造其域而不能久耳方其志氣清明存養不懈則是心存而有其仁及私意橫生一有間斷則是心亡而無其仁矣將以為有則有時而無將以為無則有時而有既不能必其有無則以不知告之又問子曰由也千乘之國可使治其賦也不知其仁也乘去聲賦兵也古者以田賦出兵故謂兵為賦春秋傳所謂悉索敝賦是也言子路之才可見者如此仁則不能知也輔氏曰才以其可以有為者言仁則心德之全而人道之備也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也千室大邑百乘卿天夫之家宰邑長家臣之通號赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也朝音潮赤孔子弟子姓公西字子華魯人子謂子貢曰女與回也孰愈女音汝下同愈勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二一數之始十數之終二者一之對也胡氏曰十者數之終以其究極之所至而言二者一之對以其彼此之相形而言顔子明睿所照即始而見終子貢推測而知因此而識彼無所不説告往知來是其驗矣語録曰顔子明睿所照子貢推測而知兩句當玩味見得優劣處顔子是真箇見得徹頭徹尾子貢只是臆度想像恰似將一物來比並相似只能聞一知二顔子雖是資稟純粹亦得學力所以見得理分明又曰明睿所臨如箇明鏡在此物來畢照推測而知者如將些子火光逐些子照去推尋問聞一知十是明睿所照若孔子則如何曰孔子又在明睿上了耳順心通無所限際問推測而知亦是格物窮理否曰然若不格物窮理則推測箇甚底輔氏曰顔子不假思惟如鑑照物纎豪莫遁故能即始以見終子貢須用思索循序而進以類而逹故能因此以識彼聞一知十不是知一件限定知得十件只是知得周遍始終無遺聞一知二亦不是聞一件限定知得二件只是知得通達無所執泥知得周遍始終無遺故無所不説知得通達無所執泥故告往知來然思與睿亦非兩事但有生熟之異始則思而通久則明睿生而物無遺照矣或疑始終只是一事彼此則是兩事如此則子貢所知反似多於顔子愚謂子貢必待告往而後知來若顔子無所不説則不待告往而來無不知矣子曰弗如也吾與女弗如也與許也胡氏曰子貢方人夫子既語以不暇又問其與回孰愈以觀其自知之如何聞一知十上知之資生知之亞也聞一知二中人以上之資學而知之之才也子貢平日以已方回見其不可企及故喻之如此夫子以其自知之明而又不難於自屈故既然之又重許之此其所以終聞性與天道不特聞一知二而已也輔氏曰惟是生知之聖人則全體昭著不待推廣若夫學而知之者則須居敬窮理漸漸開明固不能無淺深之異也又曰子貢雖好方人然亦非專用心於此者其反身自省之誠蓋不能無也故其平日以己方回見其不可企及而喻之如此又曰自屈生於自知自知之明則不容於不自屈也且自知之明則不安於己知不難於自屈則不畫於己至此夫子所以許之而子貢亦得以終有所聞也至於聞性與天道則其知亦亞於顔子矣宰豫晝寢子曰朽木不可雕也糞土之牆不可杇也於豫與何誅朽許久反杇音汚與平聲下同晝寢謂當晝而寢朽腐也雕刻畫也杇鏝也愚謂鏝一名杇塗工之作具也杇是塗之所用因謂泥牆為杇言其志氣昏惰教無所施也輔氏曰玩理以養心則志不昏以志而帥氣則氣不惰志不昏氣不惰則有受教之地而聖人之教可得而施也朽木不可雕糞土之牆不可杇正以喻其志氣昏惰而教無所施耳真氏曰志謂心志氣謂血氣學者若能立志以自強則氣亦從之不至於怠惰如將帥之統卒有紀律有號令則士卒雖欲惰而不可得茍心志不立則未免為氣血所使孟子曰志者氣之帥也蓋志強則氣亦強志惰則氣亦惰如將勇則士亦勇將惰則士亦惰也學者欲共昏惰之病必以立志為先與語辭誅責也言不足責乃所以深責之輔氏曰聖人之責人大抵意愈深則言愈緩如此子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於豫與改是行去聲宰豫能言而行不逮故孔子自言於豫之事而改此失亦以重警之也輔氏曰宰豫以言語稱於聖門而孟子亦以為善為説辭然論喪則欲其短語仁則病其愚對社則失其義問五帝德則夫豫以為非其人至此則又深責之且自言於子之事而改此失則能言而行不逮可見矣胡氏曰子曰疑衍文不然則非一日之言也范氏曰君子之於學惟日孜孜斃而後已惟恐其不及也宰豫晝寢自棄孰甚焉故夫子責之輔氏曰惟日孜孜古者自始學至成德無不皆然但有勉強自然之異耳故以為斃而後已惟恐其不及也胡氏曰宰豫不能以志帥氣居然而倦是宴安之氣勝警戒之志惰也古之聖賢未嘗不以懈惰荒寧為懼勤勵不息自強此孔子所以深責宰豫也聽言觀行聖人不待是而後能亦非緣此而盡疑學者特因此立教以警羣弟子使謹於言而敏於行耳輔氏曰懈意一生便是為氣所使古之聖賢必以懈惰荒寧為懼勤勵不息自強者只要這箇道理常在非是别有所作為也要之只在收放心而已又曰明睿所照不假於外故不待是而後能至誠與人不逆於詐故非緣此而盡疑學者仁以體物教人不倦故因此立教以警羣弟子也蔡氏曰學者誠能立志以自強則氣亦從之不至於昏惰何有於晝寢故學莫先於立志子曰吾未見剛者或對曰申棖子曰棖也欲焉得剛焉於虔反剛堅強不屈之意語録曰壁立千仞便是剛最人所難能者故夫子歎其未見申棖弟子姓名魯人欲多嗜欲也多嗜欲則不得為剛矣程子曰人有欲則無剛剛則不屈於欲輔氏曰程子兩語斷置得剛欲兩字分曉謝氏曰剛與欲正相反能勝物之謂剛故常伸於萬物之上為物掩之謂欲故常屈於萬物之下自古有志者少無志者多冝夫子之未見也棖之欲不可知其為人得非悻悻自好者乎故或者疑以為剛然不知此其所以為欲爾語録曰凡人才要貪這一件物事便被這物事壓得頭低了申棖想只是悻悻自好底人故當時以為剛然不知悻悻自好只是客氣如此便有以意氣加人之意只此便是欲也又曰剛者外面退然自守而其中不屈於欲所以為剛悻悻者外面有崛強之貌便是有計較勝負之意此便是欲又曰若耳之欲聲目之欲色之類皆是欲才有些被他牽引去此中便無所主焉得剛或者以申棖為剛必是外面悻悻自好聖人觀人直從裏面看出見得他人無所主只是色莊要人道好便是欲了安得為剛輔氏曰人茍逐欲則物便大已便小已小則便為物所掩己為物所掩則自然常屈於萬物之下惟剛則能全其天德則自然常伸於萬物之上是則無欲故能剛有志故能勝欲此謝氏所以歎自古有志者少無志者多冝夫子之未見也胡氏曰剛則已大物小凡天下之可欲者皆不足以動之所謂伸於萬物之上是也欲則已小物大隨其意之所貪俯首下氣以求之所謂屈於萬物之下是也所以相對而相反有此則無彼也又曰孟子集注悻悻怒意自好自愛其身也謝氏以其類乎剛而知之然自好未必如孟子之意正謂其自以為是耳剛者平居未必不退然自守而臨事則不可易悻悻者則常有忿怒之意至臨利害則趨利而避害矣此其所以為欲也真氏曰所謂勝物者謂立志堅強不為外物所奪凡榮辱得喪禍福死生皆不足以動之如孟子所謂富貴不能淫貧賤不能移威武不能屈此之謂勝物非剛暴恃氣求以勝人之謂也為物掩之謂欲言陷溺於物欲之中不能自克如為物遮覆掩遏而不能出也子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也子貢言我所不欲人加於我之事我亦不欲以此加之於人此仁者之事不待勉強故夫子以為非子貢所及語録曰子貢謂此等不善底事我欲無以加於人此意可謂廣大然夫子謂非爾所及蓋是子貢工夫未到此田地學者只有箇恕字要充廣此心漸漸勉力做向前去如今便説欲無加諸人無者自然而然此等地位是本體明淨發處盡是不忍之心不待勉強乃仁者之事子貢遽作此言故夫子謂非爾所及言不可以躐等程子曰我不欲人之加諸我吾亦欲無加諸人仁也施諸已而不願亦勿施於人恕也恕則子貢或能勉之仁則非所及矣語録曰此是程子晚年看得如此分曉説出得如此明白此兩句所以分仁恕者只是生熟難易之間耳又曰熟底是仁生底是恕自然底是仁勉強底是恕無計較無覩當底是仁有計較有覩當底是恕愚謂無者自然而然勿者禁止之謂此所以為仁恕之别語録曰異處在無字與勿字上子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也文章德之見乎外者威儀文辭皆是也輔氏曰威儀以德之見於容貌者言文辭以德之見於言語者言也蔡氏曰謂之德則有本謂之見乎外則自有不容掩謂之威儀文辭皆是也則夫子之粲然有文蔚然有章者雖不外乎威儀文辭而亦不專在乎威儀文辭矣蓋其動靜語默煥乎文章隨寓發著自無隱乎爾真氏曰文章二字非止於言語詞章而已聖人盛德藴於中而輝光發於外如威儀之中度語言之當理皆文也孔子稱堯曰煥乎其有文章子貢曰夫子之文章皆此之謂也至於二字之義則五色錯而成文黑白合而成章文者燦然有文之謂章者蔚然有章之謂章有條也六經論語之言文章皆取其自然形見者後世始以筆墨著述為文與聖賢之所謂文者異矣性者人所受之天理天道者天理自然之本體其實一理也語録曰性便是自家底天道便是上面腦子上面有腦子下面便有許多物事徹底如此又曰譬如一條長連底物事其流行者是天道人得之者為性乾之元亨利貞天道也人得之則為仁義禮智之性言夫子之文章日見乎外固學者所共聞至於性與天道則夫子罕言之而學者有不得聞者蓋聖門教不躐等子貢至是始得聞之而歎其美也輔氏曰夫子之德著見於外如所謂威儀文辭者固羣弟子所共聞所共學也至於性與天道則所罕言必學者真積力久將有所得然後告之豈有陵節躐等之教哉陳氏曰文章固是性天道之發然聖人教不躐等平時只是教人以文章到後來他位髙方語以性天道爾程子曰此子貢聞夫子之至論而歎美之言也子路有聞未之能行唯恐有聞前所聞者既未及行故恐復有所聞而行之不給也語録曰子路急於為善惟恐行之不徹譬如人之飲食珍羞異饌羅列在前須是喫得盡方好若喫不盡也徒然子路不急於聞而急於行今人惟恐不聞既聞得寫在䇿子上便了不解自去著工夫范氏曰子路聞善勇於必行門人自以為弗及也故著之若子路可謂能用其勇矣輔氏曰人之有勇用於非所當用者多矣而子路之勇乃獨用之於力行夫善可不謂之能用其勇乎子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也好去聲孔文子衛大夫名圉凡人性敏者多不好學位髙者多恥下問故諡法有以勤學好問為文者蓋亦人所難也孔圉得諡為文以此而已蘇氏曰孔文子使太叔疾出其妻而妻之疾通於初妻之娣文子怒將攻之訪於仲尼仲尼不對命駕而行疾奔宋文子使疾弟遺室孔姞其為人如此而諡曰文此子貢之所以疑而問也孔子不沒其善言能如此亦足以為文矣非經天緯地之文也語録曰問孔文子孔姞之事如此不好便敏而好學不恥下問濟得甚事而聖人取之何也曰古人諡法甚寬所謂節以一惠言只有一善亦取之節者節略而取其一善也孔文子固是不好只敏學下問亦是他好處又曰經天緯地是有文理一橫一直皆有文理故謂之文孔文子之文是其小者子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義子産鄭大夫公孫僑恭謙遜也敬謹恪也輔氏曰首篇已釋恭為莊敬而此又釋為謙遜者恭敬謙遜皆禮之端緣此下有其事上也敬一句故以謙遜釋恭字謹恪釋敬字蓋謙遜乃恭之實而於行已為切謹恪乃敬之實而於事上為冝也惠愛利也使民義如都鄙有章上下有服田有封洫廬井有伍之類語録曰義字有剛斷之義其養民則惠及使民則義惠字與義字相反便見得子産之政不專在於寬就都鄙有章處看見得義字在子産上不在民上又曰有章是一都一鄙各有規矩有服是衣冠服用皆有等級髙卑輔氏曰田有封洫謂封疆也洫溝也廬井有伍謂廬舍也九夫為井使五家相保吳氏曰數其事而責之者其所善者多也臧文仲不仁者三不知者三是也數其事而稱之者猶有所未至也子産有君子之道四焉是也今或以一言蓋一人一事蓋一時皆非也輔氏曰文仲子産非有優劣所善者多即是君子之道四焉猶有未至即是不仁三不知三又曰以一言蓋一人一事蓋一時此最學者之病蓋心粗氣暴使然也大凡人言亦有説得是者亦有説得非者事亦有做得是者亦有做得非者儻或性情不治心粗氣暴則恱其是者遂不知其非惡其非者遂不察其是唯聖人之心如明鏡如止水妍醜不相掩而好惡適其平所論孔文子與子産兩章皆當如此子曰晏平仲善與人交久而敬之晏平仲齊大夫名嬰程子曰人交久則敬衰久而能敬所以為善輔氏曰人之常情交際之初誰獨無是恭敬之心哉但久而褻狎則慢易生而敬心漸漸衰息矣惟平仲之與人交雖久而敬心不衰故夫子以為善子曰臧文仲居蔡山節藻梲何如其知也恱章恱反知去聲臧文仲魯大夫臧孫氏名辰居猶藏也蔡大龜也節柱頭斗拱也藻水草名梲梁上短柱也蓋為藏龜之室而刻山於節畫藻於梲也愚謂刻山於節者謂刻鏤柱頭為斗拱形如山也畫藻於梲者謂畫梁上短柱為藻文也當時以文仲為知孔子言其不務民義而諂瀆鬼神如此安得為知春秋傳所謂作虛器即此事也語録曰山節藻梲恐只是華飾不見得其制度如何今夫子只譏其不知便未是僣所謂作虛器而已大夫不藏龜禮家乃因此立説又曰如臧文仲人皆以為知聖人便説道他既惑於鬼神安得為知蓋卜筮之事聖人固欲使民信之然從蓍龜之地須自有箇合當底去處今文仲乃為山節藻梲以藏之便是他箇心一向倒在十筮上面了如何得謂之知古説多道他是僭若是僭則不止謂之不知便是不仁了聖人今只説他不知便是只主不知而言也張子曰山節藻梲為藏龜之室祀爰居之義同歸於不知冝矣張子名載長安人輔氏曰傳譏文仲不知者三祀爰居居其一今山節藻梲為藏龜之室即是祀爰居之義故同歸於不知也子張問曰令尹子文三仕為令尹無喜色三巳之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁知如字焉於虔反令尹官名楚上卿執政者也子文姓鬬名榖於莵其為人也喜怒不形物我無間知有其國而不知有其身其忠盛矣故子張疑其仁黃氏曰喜怒不形釋三仕三已物我無間釋舊政告新知有其國而不知有其身通釋上兩節然其所以三仕三巳而告新令尹者未知其皆出於天理而無人欲之私也是以夫子但許其忠而未許其仁也語録曰三仕三巳所以不得為仁蓋不知其事是如何三仕之中是有無合當仕否三已之中又不知有無合當巳否問三仕無喜三巳無愠全無私欲何以識破他有私處曰也不曽識破但是夫子既不許之以仁必是三仕三已之間猶或有未善也崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁乘去聲崔子齊大夫名杼齊君莊公名光陳文子亦齊大夫名須無十乘四十匹也違去也文子潔身去亂可謂清矣然未知其心果見義理之當然而能脫然無所纍乎抑不得已於利害之私而猶未免於怨悔也故孔子特許其清而不許其仁愚聞之師曰當理而無私心則仁矣語録曰有人好惡當理而未必無私心有人無私心而好惡又未必當於理惟仁者既無私心而好惡又當於理黃氏曰當理而無私心合分作兩句看事雖當理有一豪私意雜乎其間則是雖無私心而非理之正事皆當理又無私心則可謂之仁人輔氏曰當理以事言無私心以心言事當於理而心無或私則體用一源內外無間如天道流行而物生咸遂此所以謂之仁其先言當理而後言無私心者蓋又指其事而言之也陳氏曰仁一也而言之不同以理言則心德之全而天理之公也以心言則此心純是天理之公而無一豪人欲之私者是也以事言則當理而無私心之謂若顔子仲弓子路冉有公西華及憲問等章之所謂仁則以此心純是天理之公而無一豪人欲之私者言之若三仁夷齊與子文文子等章之所謂仁則以當理而無私心者言之終以心言者是以平日統體言之也以事言者是於臨事變也因以觀其心體之云爾非姑指一事而言其實亦非有二義也今以是而觀二子之事雖其制行之髙若不可及然皆未有以見其必當於理而真無私心也語録曰子文之無喜愠是其心固無私而於事則未盡善陳文子潔身去亂其事善矣然未能保其心之無私也仁須表裏心事一皆中理乃可子張未識仁體而恱於茍難遂以小者信其大者夫子之不許也冝哉讀者於此更以上章不知其仁後篇仁則吾不知之語并與三仁夷齊之事觀之則彼此交盡而仁之為義可識矣或問夷齊三仁曰此五人者考事察言以求其心則其中洞然無復一豪私欲之纍其亦異乎二子之為矣故程子以為比干之忠見得時便是仁亦此意語録曰若比干伯夷之忠清是就心上説若論心時比干伯夷已是仁人若無遜國諫紂之事亦已是仁人蓋二子忠清元自仁中出若子文文子夫子當時只見此兩件事是清與忠不知其如何得仁也又曰夷齊之忠清是有本底忠清忠清裏依舊有仁子文文子之忠清只得喚做忠清輔氏曰以不知其仁仁則吾不知之語觀之則知仁之難能而聖人不輕以許人以三仁夷齊之事觀之又見仁之可至而聖人不輕以絶人不輕許人則人不敢以為易而自怠不輕絶人則人不至以為難而自絶陳氏曰仁者心德之全其道至火非可指一事而言若三仁夷齊之仁是於大變中做事見其當理而全無私心之謂若子張之問子文文子則又但以一事之小者而欲信其大者則不可也胡氏曰不知其仁謂非全體不息者不足以當之也仁則吾不知謂仁則天理渾然自無克伐怨欲之纍不行不足以言之也殷有三仁謂三人同出於至誠惻怛之意故不咈乎愛之理而有以全其心之德也夷齊之仁謂皆求以合乎天理之正而即乎人心之安也夫全體者無虧欠也不息者無間斷也至於外若無虧欠間斷而中之私意根萌猶在焉亦不得謂之仁必其見於事者皆當於理而發於心者皆無所私然後可以謂之仁也今以他書考之子文之相楚所謀者無非僣王猾夏之事文子之仕齊既失正君討賊之義又不數歲而復反於齊焉則其不仁亦可見矣季文子三思而後行子聞之曰再斯可矣三去聲季文子魯大夫名行父每事必三思而後行若使晉而求遭喪之禮以行亦其一事也斯語詞程子曰為惡之人未嘗知有思有思則為善矣然至於再則已審三則私意起而反惑矣故夫子譏之或問程子之説曰天下之事以義理斷之則是非當否再思而已審以私意揣之則利害得喪萬變而無窮思至於再者欲人之以義制事而不汨於利害之私也又曰凡事初看尚未定再察則已審矣便用決斷始得若更加之思焉則私意起而非義理之本然矣永嘉陳氏曰大凡應事一思底已是再思則親切三思則計較起私意反生將前箇真底失了若為學之道則不厭思此只為應事言之愚案季文子慮事如此可謂詳審而冝無過舉矣而宣公篡立文子乃不能討反為之使齊而納賂焉豈非程子所謂私意起而反惑之驗與是以君子務窮理而貴果斷不徒多思之為尚輔氏曰不能窮理則無以審其是不能果斷則無以決其疑如是而展轉思慮則私意起而反惑也決矣陳氏曰理之明則是非判斷之果則從違決此又工夫最切處愚謂窮理是思時事果斷是思後事子曰寧武子邦有道則知邦無道則愚其知可及也其愚不可及也知去聲寧武子衛大夫名俞案春秋傳武子仕衛當文公成公之時文公有道而武子無事可見此其知之可及也成公無道至於失國而武子周旋其間盡心竭力不避艱險凡其所處皆智巧之士所深避而不肯為者而能卒保其身以濟其君此其愚之不可及也語録曰寧武子當文公有道之時不得作為然他亦無事可見至成公無道失國若智巧之士必且去深僻處隱避不肯出來武子竭力其間至誠懇惻不避艱險却能擺脫禍患卒得兩全非他能沉晦何以致此若比以智自免之士武子却似箇愚底人但其愚得來好若使别人處之縱免禍患不失於此則失於彼又曰他人於邦無道之時要正救者不能免患要避患者又却偷安若寧武子之愚既能韜晦以免患又自處不失其正此所以為不可及又曰愚有兩般有一般愚而冒昧向前底少間都做壞了事如寧武子雖他冒昧向前不露圭角只猝猝地做將去然少間事又都不做壞了問衛之無道武子却不明進退之義而乃周旋其間不避艱險如何曰武子九世公族與國同休戚却與尋常無干涉人不同若無干涉要去也得住也得若要去時須早去始得到那艱險時節却要去是甚道理程子曰邦無道能沉晦以免患故曰不可及也亦有不當愚者比干是也語録曰世間事做一律看不得聖人不是要人皆學寧武子但如寧武子亦自可為法然比干却是父族微子既去之後比干不容於不諫諫而死乃正人也當武子之時則為武子當比干之時則為比干執一不得也又曰若比干諫而死看來似不會愚底人然他於義却不當愚只得如此處又與武子不同子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之與平聲斐音匪此孔子周流四方道不行而思歸之歎也吾黨小子指門人之在魯者狂簡志大而略於事也輔氏曰唯狂故簡唯志大故略於事大凡學者易得有狂簡之病非篤志為己者不能免也雖琴張曾點猶或墮於此失斐文貌語録曰斐只是有文采成章言其文理成就有可觀者語録曰成章是做得成片段有文理可觀蓋他狂也是做得箇狂底人成不是做得一上放棹了狷也是他做得這箇狷成不是今日狷明日又不狷也如孝真箇是做得孝成忠真箇是做得忠成子貢之辨子路之勇都真箇做得成了不是半上落下今日做得明日休也輔氏曰成章謂隨其所習而有首有尾有條理有文章可觀者雖異端亦有成章而可觀者矣此則指門人之性行而言也裁割正也語録曰如物之不正須裁割令正夫子初心欲行其道於天下至是而知其終不用也於是始欲成就後學以傳道於來世又不得中行之士而思其次以為狂士志意髙逺猶或可與進於道也但恐其過中失正而或陷於異端耳故欲歸而裁之也語録曰如狂簡底人不裁之則無所收檢而流入於異端蓋這般人只管是要他身髙都不理會事所以易入於異端大率異端皆是遁世髙尚底人素隱行怪之人其流弊為佛老且如孟之反不伐是他自占便冝處便是老氏所謂不為天下先底意思子桑戶死琴張弔其喪而歌是不以生死芥蒂便如釋氏如此等人雖是志意髙逺然非聖人有以裁正之則一向狂去更無收殺便全不濟事了輔氏曰志意髙逺即所謂志大也過中失正即其略於事者是也大凡人之志意髙逺則勢利拘絆他不住故或可與進於道然溺於髙逺則又有脫略世故之弊故過中失正而或陷於異端是以不可不有以裁制之而使歸於中正也蔡氏曰士不幸而狂懦與其懦也寧狂蓋狂士志意髙逺資質粗徑做事亦徹頭徹尾文理成就可觀尚可裁節使歸中道彼懦者巽懦怯弱氣息奄奄無一事可為亦無下手腳裁截處學者其深戒之子曰伯夷叔齊不念舊惡怨是用希伯夷叔齊孤竹君之二子孟子稱其不立於惡人之朝不與惡人言與鄉人立其冠不正望望然去之若將凂焉其介如此冝若無所容矣然其所惡之人能改即止故人亦不甚怨之也黃氏曰君子之於人茍非大不平者自不應有所怨若以為己怨用希則是夷齊胸中常有憤憾之意而亦何足以為夷齊哉故集注以人怨為是蔡氏曰夷齊不念舊惡是以心中渾然以理為主略與不遷怒相似蓋不是惡其人只是惡其惡耳若其人昨日為善今日為惡則惡之若昨日為惡今日為善則好之而不惡矣所以人亦怨之者希也聖賢之心皆是如此但伯夷平日以清隘聞故特明之程子曰不念舊惡此清者之量語録曰伯夷之清他却是箇介僻底人冝其惡惡直是惡之然能不念舊惡却是他凊之好處又曰二子之心非夫子孰能知之子曰孰謂微生髙直或乞醯焉乞諸其鄰而與之醯呼西反微生姓髙名魯人素有直名者醯醋也人來乞時其家無有故乞諸鄰家以與之夫子言此譏其曲意徇物掠美市恩不得為直也輔氏曰己所無有不以實告乃乞諸鄰以與之是為曲意徇物其與之也不告以其所從得是為掠美市恩大凡平心順理以應物則為直若有一豪計較作為則不得為直知乞醯以應人之求為不直則知所以為直也程子曰微生髙所枉雖小害直為大語録曰醯至易得之物尚委曲如此若臨大事如何當有便道有無便道無才枉其小便害其大此皆不誠實也輔氏曰人心非公則私非天理即人欲非自然即計較有一豪計較便非自然便是私與人欲才出此便入彼無間可容息也故乞醯之事雖若微末然迹其曲意徇物掠美市恩委曲計較故程子以為所枉雖小害直為大范氏曰是曰是非曰非有謂有無謂無曰直聖人觀人於其一介之取豫而千駟萬鍾從可知焉故以微事斷之所以教人不可不謹也語録曰問范氏言千駟萬鍾從可知焉莫是説以非義而豫必有非義而取否曰不是説如此豫必如此取只看他小事尚如此到處千駟萬鍾亦只是這模樣輔氏曰范氏釋直字之義尤明白而又發聖人觀人即小以知大之説所以教人謹微窒欲之意尤更精切子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之足將樹反足過也語録曰所謂足者謂本當只如此我却以為未足而添足之故謂之足恭本當如此而但如此則自是足了乃不是足凡制字如此類者皆有兩意輔氏曰既已滿足其分而猶為之不已曰足程子曰左丘明古之聞人也或問左丘明非傳春秋者邪曰未可知也啖趙陸氏辨之於纂例詳矣鄧著作名世考之氏姓書曰此人蓋左丘姓而明名傳春秋者乃左氏耳謝氏曰二者之可恥有甚於穿窬也左丘明恥之其所養可知矣夫子自言丘亦恥之蓋竊比老彭之意又以深戒學者使察乎此而立心以直也輔氏曰巧言令色足恭以取人之恱藏匿其心所怨而外與之為友雖與穿窬之事不類然其心隂巧譎詐以取恱求媚則有甚於穿窬之人也左丘明以是二者為恥則其平日之所養廣大正直之意可知已夫子所謂德愈盛而心愈下不自知其言之謙者也又曰學者於察字立字不可不加功不察則或不知二者之可恥不卓然立起此心則無緣會得直陳氏曰穿窬者之志不過隂取貨財而止若此二者過諂以事人匿怨而面交其所包藏豈止於取貨財之謂邪故可恥有甚於穿窬也愚謂穿窬之人暮夜為盜而日間陽為好人中心不直者何以異此顔淵季路侍子曰盍各言爾志盍音合盍何不也子路曰願車馬衣輕裘與朋友共敝之而無憾衣去聲衣服之也裘皮服敝壞也憾恨也顔淵曰願無伐善無施勞伐誇也善謂有能施亦張大之意勞謂有功易曰勞而不伐是也語録曰問善自其平生之所能言勞以其一時功勞言曰亦是勞是就事業上説或曰勞勞事也勞事非己所欲故亦不欲施之於人亦通愚謂如前説則於勞字為順如後説則於施字為順子路曰願聞子之志子曰老者安之朋友信之少者懷之老者養之以安朋友與之以信少者懷之以恩一説安之安我也信之信我也懷之懷我也亦通黃氏曰前説是作用後説是效驗後説固説得自然前説亦未嘗不自然後説與綏斯來動斯和意思相類自是聖人地位但前説却有仁心自然物各付物有天地發生氣象況顔子子路皆是就作用上説故前説為勝程子曰夫子安仁顔淵不違仁子路求仁語録曰問孔子安仁固無可言顔子不違仁乃是已得之故不違便是克己復禮底事子路方有與物共之志故曰求仁曰然又曰他人於微小物事尚戀戀不肯舍仲由能如此其心廣大而不私已矣非其意在於求仁乎愚謂仁本固有而未免於求猶與仁為二也不違則身已居仁而常使之不相去耳安仁則心即仁仁即心矣又曰子路顔淵孔子之志皆與物共者也但有小大之差爾語録曰子路顔淵孔子言志都是不私已但有小大之異爾子路只車馬衣裘之間所志已狹顔子將善與衆人公共何伐之有施諸已不願亦勿施於人何施勞之有却已是煞展拓然不若聖人分明是天地氣象又曰子路勇於義者觀其志豈可以勢利拘之哉亞於浴沂者也顔子不自私己故無伐善知同於人故無施勞其志可謂大矣然未免出於有意也至於夫子則如天地之化工付與萬物而已不勞焉此聖人之所為也今夫羈靮以御馬而不以制牛人皆知羈靮之作在乎人而不知羈靮之生由於馬聖人之化亦猶是也先觀二子之言後觀聖人之言分明天地氣象凡看論語非但欲理會文字須要識得聖賢氣象語録曰問曾點事煞髙子路只此一事如何便解亞得他曰子路是箇資質髙底人要不做底事便不做雖是做工夫處粗不如子貢子夏之細密然其資質却自甚髙若見得透便不干事又曰子路是不以外物纍其心方剝得外面一重粗皮子去顔淵却又髙一等便是又剝得一重細底皮去然猶在軀殼子裏若聖人則超然與天地同體矣問聖人之化猶天地之化工付與萬物又曰羈靮以御馬而不以制牛這箇只是天理聖人順之而已曰這只是天理自合如此如老者安之是他自帶得安之理來朋友信之是他自帶得信之理來少者懷之是他自帶得懷之理來聖人為之初無形迹季路顔淵便先有自身了方做去如穿牛鼻絡馬首都是天理如此恰似他生下便自帶得此理來輔氏曰子路雖有曾點氣象而其實亦有不同曾點是知之事子路自行之事浴沂之知崇共敝之行實又曰子路從事上説顔子從心上説固自有淺深之不同然二子皆有願云者則是各有所對待而言也子路是對著箇有憾底在顔子是對著箇矜伐底在孔子則無所對也理當然而已矣此天地之事也胡氏曰以氣象觀之子路則發於意氣者也顔子則循其性分者也夫子則渾然天理者也子路所以亞於浴沂者以其胸次灑落非勢利所得而拘使無所滯礙即曾晳之所至矣聖人固不可企及顔子地位亦髙誠能先於貨利之間思子路之勇決而袪其吝嗇之心則於求仁之方亦庶幾矣未可以其粗厲而忽之也子曰已矣乎吾未見能見其過而內自訟者也已矣乎者恐其終不得見而嘆之也內自訟者口不言而心自咎也黃氏曰自訟而見於言不若自責於心之為深切也非謂諱過而不敢言也輔氏曰真有意於行者口不言真知其非者心自咎人有過而能自知者鮮矣知過而能內自訟者為尤鮮能內自訟則其悔悟深切而能改必矣輔氏曰口不言而心自咎者最改過之機蓋悔悟深切則誠意所蓄根深力固才説出來意思便消散了況説與人道我將改者乎若此者其不能改必矣夫子自恐終不得見而歎之其警學者深矣子曰十室之邑必有忠信如丘者焉不如丘之好學也焉如字屬上句好去聲十室小邑也忠信如聖人生質之美者也輔氏曰此言生質之美者固或冇同乎聖人之忠信非謂聖人之質全與衆人無異也且夫子之言亦曰必有忠信如丘者耳非謂事事皆如已也夫子生知而未嘗不好學故言此以勉人言美質易得至道難聞學之至則可以為聖人不學則不免為鄉人而已可不勉哉輔氏曰美質易得所稟然也至道難聞非學則莫至此也此蓋夫子不以聖人自居而勉人為學之辭雍也第六凡二十九章胡氏曰凡二十八章舊以首句自為一章今以二章合之而仍其元數失於改也又案下章子華使齊原思為宰亦合為一章今考之雖皆聖人用財之事然恐記者以類相從未必一時之言也前篇此類頗多不應為一章篇首二章雖相承亦與賜也何如相似若析為二章不害其為相通也如此則當為凡三十章篇內第十四章以前大意與前篇同胡氏曰此篇前有半與上篇大意同而八佾論禮樂之事亦與為政篇末相接大抵記聖人之言多以其類而卷帙之分特以竹簡之編既盡而止其篇目則聊舉其首二字以為之别耳子曰雍也可使南面南面者人君聽治之位言仲弓寬洪簡重有人君之度也黃氏曰前篇之不佞後章之居敬但可見其簡重觀前篇或人稱其為仁則可見其有寬洪之德輔氏曰惟寬故洪惟簡故重寬則有容故洪簡則守要故重寬與簡御衆臨下之道也故有人君之度而可以南面度以德量言也胡氏曰謂仲弓可以居君位者當時小國諸侯皆君也仲弓問子桑伯子子曰可也簡子桑伯子魯人胡氏以為疑即莊周所稱子桑户者是也或問子桑伯子曰莊子所稱子桑户與孟子反子琴張為友者蓋老氏之流仲弓以夫子許已南面故問伯子如何輔氏曰仲弓簡默務內不務外其性行有與伯子略相似者故仲弓因以為問也可者僅可而有所未盡之辭輔氏曰非是斷然許之之辭簡者不煩之謂語録曰煩是煩擾仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大簡乎大音泰言自處以敬則中有主而自治嚴如是而行簡以臨民則事不煩而民不擾所以為可輔氏曰中有主則一自治嚴則收斂固事不煩則無鑿出之事民不擾則無不得所之民若先自處以簡則中無主而自治踈矣而所行又簡豈不失之太簡而無法度之可守乎輔氏曰中無主則二三自治疏則滲漏多太簡則率易無法度之可守則或不免於猖狂妄行矣家語記伯子不衣冠而處夫子譏其欲同人道於牛馬然則伯子蓋太簡者而仲弓疑夫子之過許與子曰雍之言然仲弓蓋未喻夫子可字之意而其所言之理有默契焉者故夫子然之輔氏曰伯子蓋亦知要者但其所主守工夫則有未至也故雖可取而未盡善仲弓只添一敬字説內外本末便自曲盡非其平日踐履工夫之熟何能然邪然夫子所謂可者已具此意了仲弓雖未喻可是僅可而未盡之義然其所言正有合於夫子之意故夫子以為然也程子曰子桑伯子之簡雖可取而未盡善故夫子云可也仲弓因言內主於敬而簡則為要直內存乎簡而簡則為疏略可謂得其旨矣輔氏曰要直二字要看要字從知上説直字從行上説疏略則謂於事理有所脫遺也又曰居敬則心中無物故所行自簡居簡則先有心於簡而多一簡字矣故曰大簡輔氏曰中主於敬則內欲不萌外物不入故心中無物而所行自簡夫簡者乃理之自然也若先有心於簡則是其心中先自多一箇字了故曰大簡哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也好去聲亡與無同遷移也二復也怒於甲者不移於乙過於前者不復於後語録曰只是見得箇道理透故怒於甲時雖欲遷於乙亦不可得而遷也見得道理透則既知有過自不復然如人錯喫烏喙才覺了自不復喫顔子克己之功至於如此語録曰怒與過皆自己上來不遷不二皆自克己上來如無伐善無施勞是他到處不遷怒不二過也是他到處問不遷怒二過是顔子克己工夫到後方如此却不是以此方為克己工夫否曰夫子説時也只從他克己效驗上説但克己工夫未到時也須照管不成道我工夫未到那田地而遷怒二過只聽之邪黃氏曰顔子不遷不二蓋其存養之深省察之明克治之力持守之堅故其未怒之初鑑空衡平既怒之後冰消霧釋方過之萌瑕纇莫逃既知之後根株悉拔此其所以為好學而集注以為克己之功也輔氏曰顔子不遷不二乃終身學力之所就固非一旦收其放心便能如此亦非是學者克己之事故集注以為克己之功必其平日遇怒則克不使之流蕩於外以過於物遇過則克不使之伏藏於內以為之根怒不過物則久久自然不遷過蹙其根則久久自然不二可謂真好學矣輔氏曰真字須子細看短命者顔子三十二而卒也既云今也則亡又言未聞好學者蓋深惜之又以見真好學者之難得也程子曰顔子之怒在物不在已故不遷有不善未嘗不知知之未嘗復行不二過也語録曰顔子自無怒因物之可怒而怒之又安得遷又曰有不善未嘗不知知之未嘗復行直是顔子天資好如至清之水纎芥必見又曰喜怒在事則理之當喜怒者也不在血氣則不遷若舜之誅四凶也可怒在彼已何與焉如鑑之照物妍媸在彼隨物應之而已何遷之有輔氏曰聖人遇事之當喜者則喜遇事之當怒者則怒方其未與事接則是心初無喜怒也故若舜之誅四凶可怒在彼已何與焉又如鑑之照物因物賦形何遷之有胡氏曰既云怒在物而不在己又云不在血氣則不遷蓋不在己者非謂其怒不怒也乃因物之可怒而發也不在血氣者非謂怒於心而不形於色也發於義理而不發於血氣也又曰如顔子地位豈有不善所謂不善只是微有差失才差失便能知之才知之便更不萌作語録曰萌作只是萌動輔氏曰顔子存得天理分數全了明睿所照文理密察才有微微差失便自知之既知之自然存著不得便自消融了豈復至於萌作哉便能知之者是物格知至之事更不萌作者是意誠心正之事蔡氏曰不遷怒朱子謂怒於甲者不移於乙程子謂在物不在己不二過朱子謂過於前者不復於後程子謂只是微有差失便能知之才知之便更不萌作若不同矣然程子是就怒初發念初萌而直言之也朱子是就怒已發念已萌而橫言之也其理則一必兼之方盡其義張子曰慊於己者不使萌於再語録曰慊於己只是略有些子不足於心便自知之即隨手消除更不復萌作輔氏曰正説著顔子地位若聖人分上則又使不著使字也或曰詩書六藝七十子非不習而通也而夫子獨稱顔子為好學顔子之所好果何學歟程子曰學以至乎聖人之道也學之道奈何曰天地儲精語録曰儲儲蓄精精氣精氣流過若生物時攔定又曰天地儲蓄得二氣之精聚故能生出人物得五行之秀者為人語録曰只説五行而不言隂陽者蓋做這人須是五行方做得成然隂陽便在五行中其本也真而靜文集曰真靜兩字亦自不同真則指本體而言靜則但言其初未感物時耳語録曰本是本體真是不雜人偽其未發也五性具焉曰仁義禮智信語録曰五性便是真未發便是靜時只是疊説形既生矣外物觸其形而動於中矣輔氏曰緣人是箇活物故外物觸之而動動靜者闔闢之機上既言其本靜故於此復動也其中動而七情出焉曰喜怒哀懼愛惡欲輔氏曰古所謂七情喜怒哀樂愛惡欲也今程子以懼字易樂字蓋嫌喜樂二者相似而不及於懼也其義精矣陳氏曰喜愛欲三字有淺深喜方見於顔色愛則心中好之然未有取之之意欲則貪意直注於彼必欲拏將來矣情既熾而益蕩其性鑿矣語録曰性固不可鑿但人不循此理任意妄作去傷了他耳鑿與孟子所謂鑿一般故覺者約其情使合於中正其心養其性而已語録曰覺者約其情使合於中正其心養其性方是大綱説輔氏曰覺是心之靈故能約其情而使之合乎中然必先明諸心知所往然後力行以求至焉語録曰這一般緊要處只在先明諸心上蓋先明諸心了方知得聖之可學有下手處方就這裏做工夫若不就此如何地做又曰明諸心知所往窮理之事也力行求至踐履之事也窮理非是專要明在外之理如何而為孝弟如何而為忠信推此類通之求處至當即窮理之事也若顔子之非禮勿視聽言動不遷怒二過者則其好之篤而學之得其道也然其未至於聖人者守之也非化之也假之以年則不日而化矣語録曰聖人無怒何待於不遷聖人無過何有於不二所以不遷不二猶有意存焉與願無伐善無施勞之意同猶今人所謂願得不如此是固嘗如此而今且得其不如此也此所謂守之非化之也又曰聖人則都無這箇顔子則疑於遷二與不遷二之間輔氏曰學未至於聖人者雖見道明用心剛然必有所存斯不亡必有所理斯不亂持守之功一息或廢則其理便間斷矣惟至於聖則氣質消盡渾是義理無處不有無時不然此大而化之之事也顔子未逹聖人一間耳故假之以年則不日而化也必矣今人乃謂聖本生知非學可至而所以為學者不過記誦文辭之間其亦異乎顔子之學矣子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉使為並去聲子華公西赤也使為孔子使也輔氏曰或使於他邑或使於外國不可知也大夫無私交此未必為大夫時事又孔子將之楚先之以子路申之以冉有皆使之類也又如蘧伯玉使人於孔子大夫雖無私交若此類則無害也釡六斗四升庾十六斗秉十六斛愚案左傳晏子云齊舊四量豆區釜鍾四升為豆各自其四以登於釜杜注云四豆為區區斗六升四區為釡釡六斗四升是也又案聘禮記云十斗曰斛十六斗曰籔十籔曰秉鄭注云秉十六斛今江淮之間量名有為藪者今文籔為逾是庾逾籔其數同也子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富衣去聲乘肥馬衣輕裘言其富也急窮迫也周者補不足繼者續有餘原思為之宰與之粟九百辭原思孔子弟子名憲魯人孔子為魯司寇時以思為宰愚謂魯司寇大夫也必有采邑故以思為采邑之宰粟宰之祿也九百不言其量不可考輔氏曰量謂五量籥合升斗斛也但此言九百而已不可考知其為斗為斛也子曰毋以與爾鄰里鄉黨乎毋禁止辭五家為鄰二十五家為里萬二千五百家為鄉五百家為黨言常祿不當辭有餘自可推之以周貧乏蓋鄰里鄉黨有相周之義輔氏曰先王制為井田之法使鄉田同井出入相友守望相助疾病相扶持則鄰里鄉黨有貧乏者於義固當相周也程子曰夫子之使子華子華之為夫子使義也而冉子乃為之請聖人寬容不欲直拒人故與之少所以示不當與也請益而與之亦少所以示不當益也求未達而自與之多則已過矣故夫子非之蓋赤茍至乏則夫子必自周之不待請矣原思為宰則有常祿思辭其多故又教以分諸鄰里之貧者蓋亦莫非義也輔氏曰聖人能通天下之志而於物無遺照故雖不徇人之情以咈吾之理然亦不行吾之義而不察人之情使赤誠有所乏則夫子自當知之而自有以處之矣又何待求之請哉張子曰於斯二者可見聖人之用財矣語録曰這是見得聖人於小處也區處得恁地盡這便是一以貫之處聖人做事都著地頭黃氏曰冉子之與粟不害其為惠原思之辭粟不害其為廉自常人觀之皆善行也聖人處事如化工生物洪纎髙下各適其冝又豈但可見其用財而已哉子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸犂利之反騂息營反舍上聲犂雜文騂赤色周人尚赤牲用騂角角周正中犧牲也永嘉陳氏曰以其角中程度也祭天地之牛角繭粟宗廟之牛角握社稷之牛角尺用用以祭也山川山川之神也言人雖不用神必不舍也輔氏曰犂牛雜文雖不堪作犧牲然其所生之子其色則騂其角則正則必將取以為犧牲用矣固不可以其母之犂而廢其子之騂也雖欲勿用人之私意也山川其舍諸理之所不容廢也仲弓父賤而行惡故夫子以此譬之胡氏曰父賤而行惡本疏文家語亦言其生於不肖之父也言父之惡不能廢其子之善如仲弓之賢自當見用於世也然此論仲弓云爾非與仲弓言也文集曰如子謂顔淵未見其止亦非與顔淵言也范氏曰以瞽䏂為父而有舜以鯀為父而有禹古之聖賢不係於世類尚矣子能改父之過變惡以為美則可謂孝矣胡氏曰范氏之説可以勉人為子故有取焉子曰回也其心三月不違仁其餘則日月至焉而已矣三月言其久語録曰三月只是言久爾非謂三月後必違也愚謂三月姑借以言其久日月亦偕以言其暫仁者心之德心不違仁者無私欲而有其德也或問仁人心也則心與仁冝一矣而又曰心不違仁則心之與仁又若二物曰孟子之言非以仁訓心也蓋以仁為心之德也人有是心則有是德矣然私欲亂之則或有是心而不能有是德此衆人之心所以每至於違仁也克己復禮私欲不萌則即是心而是德存焉此顔子之心所以不違於仁也故所謂為仁者非有兩物而相去也所謂不違者非有兩物而相依也深體而默識於言意之表則庶乎其得之矣語録曰仁與心本是一物被私欲一隔仁便違去却為二物若私欲既無則心與仁便不相違合成一物心猶鏡仁猶鏡之明鏡本來明被塵垢一蔽遂不明若塵垢一去則鏡明矣日月至焉者或日一至焉或月一至焉能造其域而不能久也語録曰日至是一日一次至此月至是一月一次至此言其疏也間時都思量别處真氏曰詳集注之意謂自顔子之外其餘門弟子有一日全不違仁有一月全不違仁者語録以為或一日中一次不違仁一月中一次不違仁二説不同當以集注為正程子曰三月天道小變之節言其久也過此則聖人矣不違仁只是無纎豪私欲少有私欲便是不仁輔氏曰二氣分為四時三月而一變故三月為天道小變之節尹氏曰此顔子於聖人未達一間者也若聖人則渾然無間斷矣輔氏曰間隙也三月之後少有違仁處便間隙也永嘉陳氏曰顔子不逺復才有間斷處依舊又接續了若聖人則自生至死滿腔子都是仁無少間斷顔子所以未逹一間者正以此耳張子曰始學之要當知三月不違與日月至焉內外賓主之辨使心意勉勉循循而不能已過此幾非在我者或問內外賓主曰不違仁者仁在內而我為主也日月至者仁在外而我為客也誠知此辨則其不安於客而求為主於內必矣故曰使心意勉勉循循而不能已也其曰過此幾非在我者則豈以為用功至此而極矣過此以往則必德盛仁熟而自至而非吾力之所能與也語録曰仁猶屋心猶我常在屋中則為主出入不常則為客也三月不違者心常在內雖間或有出時然終是在外不穩便才出即便入蓋心安於內所以為主日月至焉者心常在外雖間或有入時然終是在內不安才入即便出蓋心安於外所以為賓又曰不違仁者仁在內而為主然其未熟亦有時而出於外日月至焉者仁在外而為賓雖有時入於內而不能久也又曰那客亦是主人只以其多在外故謂之客又曰學者只要勉勉循循而不能已才能如此便後面雖不用大段著力也自做去如推箇輪車相似才推得轉了他便滔滔自去又曰不能已是為了又為為得好後只管為如欲罷不能相似過此則自家著力不得待他自長進去如水漲船行更無著力處又曰前頭事皆不由我我也不知前面之分寸我也不知前面之淺深只理會這裏工夫使外內賓主之辨常要分曉使心意勉勉循循不已只如此而已黃氏曰內外賓主之語語録有數條大略以屋為喻而在內者為主在外者為賓然有二説其一以仁為屋而以心之出入為賓主其一以軀殼為屋而以仁之存亡為賓主以文義言則前説勝以義理言則後説勝以文義言則心自是心仁自是仁以義理言則心即仁也前説因孔子所言而為文後説則言心在便為仁不在便為不仁其旨尤切當兩存而並觀之陳氏曰如內外賓主之辨初學便當知此然天理人欲相為勝負之幾最未易判也若到天理決然常在內而為主人欲決然不隨之追逐於外而為賓非真知而足目俱到者不能到此田地則主勢日伸賓勢日屈其進進自不能止過此方知車輪運轉不停非是放下全不用力前頭限量不由我非吾力所能料雖欲輟不用力而力自不能輟矣此即日進無疆地位也然此等皆學者所未到之處非可以臆度想像而識須臨境而後知味也胡氏曰勉勉者用力而不已也循循者謹守而不變也二者學者希顔之方也永嘉陳氏曰先儒提出此旨正欲學者捫心猛省若是為客乍入復出則為無家之人將來必大可哀季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有與平聲從政謂為大夫胡氏曰由求仕於季氏久矣若為家臣豈至此方問其可不可邪以冉子退朝而夫子有政與事之辨參之知其謂為大夫也必矣果有決斷達通事理藝多才能輔氏曰子路資稟剛勇故能有決斷子貢知識髙明故通達事理冉求雖進道不力然在政事之科故多才能程子曰季康子問三子之才可以從政乎夫子答以各有所長非惟三子人各有所長能取其長皆可用也黃氏曰程子言人各有所長意則大矣然如三子之果逹藝而可以從政則恐亦非凡人所可能也輔氏曰聖人於天下無棨才無遺善聖人不作天下人才冇多少用不盡處季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣費音祕為去聲汶音問閔子騫孔子弟子名損魯人費季氏邑汶水名在齊南魯北境上閔子不欲臣季氏令使者善為己辭言若再來召我則當去之齊輔氏曰閔子心雖不欲臣季氏而不遽形於言姑令使者善為己辭焉此與人為善之意也又言若再來召我則當去之齊以示其必不從之意其與人處已兩盡其道如此程子曰仲尼之門能不仕大夫之家者閔子曾子數人而已謝氏曰學者能少知內外之分皆可以樂道而忘人之勢況閔子得聖人為之依歸彼其視季氏不義之富貴不啻犬彘又從而臣之豈其心哉在聖人則有不然者蓋居亂邦見惡人在聖人則可自聖人以下剛則必取禍柔則必取辱閔子豈不能早見而豫待之乎如由也不得其死求也為季氏附益夫豈其本心哉蓋既無先見之知又無克亂之才故也然則閔子其賢乎語録曰謝氏説得粗亦可以警那懦底人若常常記得這樣在心不至倒了今倒了底却多輔氏曰謝氏説由求之事曰是豈其本心哉却説得好剛者必取禍謂子路柔者必取辱謂冉求聖人道全德備應用無窮其於先見之知克亂之才蓋兼有之故於天下無不可為之時亦無不可為之事若未至於聖人而欲早見豫待以擬方來之變則於轇轕紛沓之際未有不失其本心者此閔子所以為賢也伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也夫音扶伯牛孔子弟子姓冉名耕魯人有疾先儒以為癩也或問伯牛之癩曰以淮南子而言耳其信否不可知牖南牖也禮病者居北牖下君視之則遷於南牖下使君得以南面規已黃氏曰北牖見儀禮記若喪大記則云北牖西南隅既謂之奧則北面不當有牖當考翁氏曰此説見鄉黨疏文案寢廟制無北牖然北方冇少牖謂之扉因天光漏入而得屋漏之名恐北牖指此也室西南隅曰奧奧南有牖時伯牛家以此禮尊孔子孔子不敢當故不入其室而自牖執其手蓋與之永訣也輔氏曰不入其室以避過奉之禮義也自牖執其手以致永訣之意仁也此聖人從容中禮處命謂天命或問命曰有生之初氣質之稟蓋有一定而不可易者孟子所謂莫之致而至者也語録曰命之正者出於理命之變者出於氣質要之皆天所付豫但當自盡其道則所值之命皆正命也又曰問此命是天理本然之命否曰此只是氣稟之命富貴死生禍福貴賤皆稟之氣而不可移易者言此人不應有此疾而今乃有之是乃天之所命也然則非其不能謹疾而有以致之亦可見矣輔氏曰伯牛非有致疾之道有以致疾則非正命矣伯牛非其不能謹疾而有以致之故夫子嘆其命矣夫然天既與之以是德而復使之有是疾則於栽培之理蓋亦不得其常者矣胡氏曰夫子於顔冉之死皆以命言然則雖斯人不應有斯疾其死也亦謂之考終命也歟侯氏曰伯牛以德行稱亞於顔閔故其將死也孔子尤痛惜之侯氏名仲良河東人輔氏曰侯氏深見聖人愛惜人才而切於傳道之心其至誠惻怛有不能自已者子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也食音嗣樂音洛簞竹器食飯也瓢瓠也顔子之貧如此而處之泰然不以害其樂故夫子再言賢哉回也以深嘆美之程子曰顔子之樂非樂簞瓢陋巷也不以貧窶纍其心而改其所樂也故夫子稱其賢語録曰顔子胸中自有樂故雖貧窶之中而亦不以纍其心不是將那不以貧窶纍其心底做樂又曰簞瓢陋巷非可樂蓋自有其樂爾其字當玩味自有深意語録曰其字是元有此樂又曰昔受學於周茂叔每令尋仲尼顔子樂處所樂何事語録曰問尋孔顔所樂處蓋他自有其樂然求之亦甚難曰先賢到樂處已自成就向上去了非初學所能求況今之師非濓溪之師所謂友者非二程之友所以説此事却似莽廣不如且就聖賢著實用工處求如克己復禮致謹於視聽言動之間久久自會純熟充達向上去又曰要尋樂處只是自去尋尋到那極苦澀處這便是好消息來尋到那意思不好處這便是樂底意來却無不做工夫自然樂底道理而今做工夫只是平常恁地理會不要把做差異了去做愚案程子之言引而不發蓋欲學者深思而自得之今亦不敢妄為之説學者但當從事於博文約禮之誨以至於欲罷不能而竭其才則庶乎有以得之矣輔氏曰博文者致知格物之事約禮者克己復禮之事聖人教人唯此二者誠能從事於此使知與行互相發所造日深其味日永雖欲己之自不能已而求之至於才力竭盡則庶乎有以得之矣此指示學者自得之路而使之循序以進皆有可據之實也真氏曰集注所引程子三説皆不説出顔子之樂是如何樂其末却令學者於博文約禮上用功博文約禮亦冇何樂似若有所隱而不以告人者其實無所隱而告人之深也博文者言以天下之理無不窮究而用功之廣也約禮者言以禮檢束其身而用功之要也內外精粗二者並進則此身皆與為一從容遊泳於天理之中雖簞瓢陋巷不知其為貧萬鍾九鼎不知其為富此乃顔子之樂也程子全然不露只使人自思而得之朱子又恐人無下乎處特説出博文約禮四字令學者從此用力真積力久自然有得至於欲罷不能之地則顔子之樂可以庶幾矣又曰欲罷不能者言人之於學若能實用其工則自然見得循理則樂不循理則不樂由乎禮則安不由乎禮則危不待父兄師友之檢約自然欲止而不能此方是真有所得也冉求曰非不説子之道力不足也子曰力不足者中道而廢今女畫説音恱女音汝力不足者欲進而不能畫者能進而不欲輔氏曰欲進而不能者心欲進而力有所不及也能進而不欲者力能進而心有所不肯也謂之畫者如畫地以自限也輔氏曰畫地以自限自不踰耳非力有所不能踰也愚謂畫則先有不敢當之意如畫地自限非有險阻不可進而不前也胡氏曰夫子稱顔回不改其樂冉求聞之故有是言然使求恱夫子之道誠如口之説芻豢則必將盡力以求之何患力之不足哉畫而不進則日退而已矣此冉求之所以局於藝也輔氏曰道若大路人病不求使其説聖人之道誠如口之説芻豢則將盡心竭力以求之仁與道豈逺乎哉固不患力之不足也盡而不進此所以日退而局於藝焉耳矣子謂子夏曰女為君子儒無為小人儒女音汝儒學者之稱輔氏曰此所謂學亦專言之學也若周官儒以道得民則學之已成者也然凡有意於學亦可謂之儒故但以儒為學者之稱此所以有君子小人之辨程子曰君子儒為己小人儒為人語録曰若不就為己分上做工夫只要説得去以此欺人便是小人儒謝氏曰君子小人之分義與利之間而已然所謂利者豈必殖貨財之謂以私滅公適已自便凡可以害天理者皆利也子夏文學雖有餘然意其逺者大者或昧焉故夫子語之以此輔氏曰謝氏極言為利之害可以警學者用心之微蓋凡人日用之間發心措慮未嘗不在利上如所謂以私滅公適已自便者皆是學者能謹察而明辨之則於檢身之際自不至於滲漏矣又曰子夏資質純固但欠逺大之見而有近小之蔽恐或溺於私與利也故以是告之然此必子夏始見時事至其言切問近思仁在其中之説聖人之道有始有卒之説則必不至此矣子遊為武城宰子曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也女音汝淡徒甘反武城魯下邑胡氏曰言魯下邑非大夫之采邑也淡臺姓滅明名字子羽徑路之小而捷者公事如飲射讀法之類或問公事者何事曰以士民之分言之則凡飲酒讀法而羣至乎有司者公事也以邑宰之知已而訪問焉則凡一邑之間利病休戚之所同而當以告于有司者亦公事也胡氏曰飲謂鄉飲周禮鄉大夫賓賢能飲國中賢者能者州長習射黨正蠟祭皆行卿飲酒禮射謂鄉射周禮鄉大夫以五物詢衆庶州長春秋以禮會民皆行鄉射禮讀法則州長於正月之吉黨正於四時孟月吉日族師於月吉閭胥於既比皆行讀法禮以是知為邑宰者亦然也其他則凡涉乎公家者皆是也不由徑則動必以正而無見小欲速之意可知非公事不見邑宰則其有以自守而無枉已徇人之私可見矣胡氏曰言其動必以正則非但於行路而已言其有以自守則非但不私謁而已故又以可知可見總言之因小以明大因兩端以見其全體也楊氏曰為政以人才為先故孔子以得人為問如滅明者觀其二事之小而其正大之情可見矣後世有不由徑者人必以為迂不至其室人必以為簡非孔氏之徒其孰能知而取之語録曰問為政以人才為先如子遊為武城宰縱得人將焉用之曰古者士人為吏更為政而得人講論此亦為政之助問觀其二事之小而正大之情可見曰看這氣象便不恁地猥碎問非獨見滅明如此亦見得子遊胸懷也恁地開廣故取得這般人曰子遊意思髙逺識得大體愚謂持身以滅明為法則無茍賤之羞取人以子遊為法則無邪媚之惑輔氏曰持身者不以茍賤為羞則捨己徇欲無所不至取人者茍為邪媚所惑則賢否短長皆不復能有所辨矣子曰孟之反不伐奔而殿將入門䇿其馬曰非敢後也馬不進也殿去聲孟之反魯大夫名側胡氏曰反即莊周所稱孟子反者是也或問孟之反曰莊子所謂孟子反蓋聞老氏懦弱謙下之風而恱之者也伐誇功也奔敗走也軍後曰殿䇿鞭也戰敗而還以後為功反奔而殿故以此言自掩其功也語録曰軍敗以殿為功殿於後則人皆屬目其歸他若不恁地説便是自承當了這箇殿後之功事在哀公十一年謝氏曰人能操無欲上人之心則人欲日消天理日明而凡可以矜已誇人者皆無足道矣然不知學者欲上人之心無時而忘也若孟之反可以為法矣語録曰欲上人之心便是私欲聖人四方八面提起向人説只要去得私欲孟之反其他事不可知只此一事便可為法也子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣鮀徒河反祝宗廟之官鮀衛大夫字子魚有口才朝宋公子有美色言衰世好諛恱色非此難免蓋傷之也子曰誰能出不由户何莫由斯道也言人不能出不由户何故乃不由此道邪怪而歎之之辭輔氏曰道者人所共由之路也出必由户行必由道冝也而一然一否何哉夫子怪而歎之而人亦可以自反矣又曰前章是傷而歎之之辭此章是怪而歎之之辭以類記之也洪氏曰人知出必由户而不知行必由道非道逺人人自逺爾輔氏曰此説尤可以警悟學者道即在人行之則是但人自逺之而不肯踐行耳道無逺人之理人有逺道之私子曰質勝文則野文勝質則史文質彬彬然後君子野野人言鄙略也史掌文書多聞習事而誠或不足也輔氏曰史如周官太史小史之屬太史掌邦之六典小史掌邦國之志所謂多聞也太史小史皆掌喪祭賓客會同朝覲軍旅之事所謂習事也先王盛時雖多聞習事而誠實固無不足者世衰道微習於外者多遺其內故多聞習事之史或有誠實不足者下一或字其義備矣彬彬猶班班物相雜而適均之貌言學者當損有餘補不足至於成德則不期然而然矣輔氏曰質勝文則野則質有餘而文不足文勝質則史則文有餘而質不足學者能於其不足者補之於其有餘者損之至於成德則文質班班然相雜而適相稱有不期然而然者夫然後可以謂之君子楊氏曰文質不可以相勝然質之勝文猶之甘可以受和白可以受采也文勝而至於滅質則其本亡矣雖有文將安施乎然則與其史也寧野輔氏曰文質不可以相勝一定之理也文質彬彬盡善之道也與其史也寧野彼勝於此之辭也凡物必先有質而後有文則質乃文之本也文勝而至於滅質則其本亡矣如繢盡之事使無素地則五采何所施乎與其史也寧野野近本而史徇末故也愚謂楊氏之説雖非本章之正義亦足以明二者之輕重子曰人之生也直罔之生也幸而免程子曰生理本直罔不直也而亦生者幸而免爾或問程子之説曰上生字為始生之生下生字為生存之生雖若不同而義實相足蓋曰天之生是人也實理自然初無委曲彼乃不能順是而猶能保其生焉是其免特幸而已爾語録曰生理本直不待人去循之而後得名若至大至剛以直之直亦氣之本然不待人以直養之而後得此名也又曰生理本直順理而行便是合得生若不直便是不合得生特幸而免於死耳問如何是生理本直曰如父子便本有親君臣便本有義又曰只玩味生理本直四字便自冇味如見孺子入井便有怵惕之心只便是直才有內交要譽之意便曲了又曰人之生元來都是直理罔便是都背了直理當仁而不仁當義而不義皆是背了直理既如此合是死若不死時便是幸而免又曰天地生生之理不直則是枉天理冝自夭折也而亦得生是幸而免耳如木方生被人折了便不直多應是死到得不死幸然如此陳氏曰只是秉彜中許多道理本甚坦直何嘗冇一豪迂折子曰知之者不如好之者好之者不如樂之者好去聲樂音洛尹氏曰知之者知有此道也好之者好而未得也樂之者有所得而樂之也張敬夫曰譬之五榖知者知其可食者也好者食而嗜之者也樂者嗜之而飽者也知而不能好則是知之未至也好之而未及於樂則是好之未至也此古之學者所以自強而不息者與輔氏曰尹氏之説即張氏之説也食而知其味故嗜即所謂好也然其未至於樂者則雖嗜之而未能得飽滿饜足蓋猶有嗜好之意焉至於樂則飽滿饜足自得於心有不可以語人者矣張氏以人之食五穀為喻其曉人尤更明切故具載之然則知而不能好未能知其味也好之而未能樂未能與之為一也才到樂處則無息無二學者茍未至於樂則當益鞭其後自強不息以求之必期至於自得而樂之之地則自不能已耳子曰中人以上可以語上也中人以下不可以語上也以上之上上聲語去聲語告也言教人者當隨其髙下而告語之則其言易入而無躐等之弊也張敬夫曰聖人之道精粗雖無二致但其施教則必因其材而篤焉蓋中人以下之質驟而語之太髙非惟不能以入且將妄意躐等而有不切於身之弊亦終於下而已矣故就其所及而語之是乃所以使之切問近思而漸進於髙逺也真氏曰張氏説至精密道德性命者理之精也事親事長灑掃應對之屬事之粗也然道德性命只在事親事長之中茍能盡其事親事長之道則道德性命不外乎此矣但中人以下之資質若驟然告之以道德性命彼將何所從入想像臆度反所以害道不若且從分明易知處告之如事親事長灑掃應對之屬皆人所易知也如此則可以循序而用力不期而至於髙逺之地此聖門教人之要法也又曰切問謂以切己之事問於人也近思謂不馳心髙逺就其切近者而思之也外焉問於人內焉思於心皆先其切近者則一語有一語之益一事有一事之功不比泛然馳騖於外而初無補於身心也樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後獲可謂仁矣知逺皆去聲民亦人也獲謂得也專用力於人道之所冝而不惑於鬼神之不可知知者之事也或問此一節曰人道之所冝近而易知也非達於事理則必忽而不務而反務其所不當務者矣鬼神之理幽而難測也非逹於事理則其昧者必至於慢惑者必至於瀆矣誠能專用其力於人道所冝而易知者而不昧不惑於鬼神之難測者則是所謂知也語録曰常人之所謂知多求知人所不知聖人之所謂知只知其所當知而已自常人觀之若不足以為知若果能專用力於人道之冝而不惑於鬼神之不可知却真箇是知又曰人道之冝如孝與弟之類先其事之所難而後其效之所得仁者之心也或問此一節曰為是事者必有效是亦天理之自然也然或先計其效而後為其事則其事雖公而意則私雖有成功亦利仁之事而已若仁者則先為其事而不計其效知循天理之自然而無欲利之私心也語録曰事便是就事上説心便是就裹面説務民之義敬鬼神而逺之這是事先難後獲這是仁者處心如此事也是心裏做出來但心是較近裏説如一間屋相似説心底是那房裏説事底是那廳上蔡氏曰知者以事言仁者以心言蓋務民義敬鬼神是就事上説先難後獲是就心上説仁字較近裏知字較近外此必因樊遲之失而告之程子曰人多信鬼神惑也而不信者又不能敬能敬能逺可謂知矣輔氏曰凡人之信鬼神者皆其知不足以知其理故惑於其所不知而信之耳而不信者又直以為無是理而不之信故慢易之心生焉能敬則知人與鬼神二而一之不可斁能逺則知人與鬼神一而二之不可褻是可不謂之知乎又曰先難克已也以所難為先而不計所獲仁也語録曰問既曰仁者則安得有己私而更須克己耶恐仁者二字非指仁人而言其語脈猶曰所謂仁云者必先難後獲乃可謂之仁曰仁人者正其誼不謀其利明其道不計其功語意正如此仁者雖已無私然安敢自謂已無私乎輔氏曰此其於所難之中又特舉其甚者言之蓋克已最難而求仁之功莫先焉能於此而致其先難之力不計其獲則一日克己而天下歸仁矣非顔子之剛明疇克爾哉呂氏曰當務為急不求所難知力行所知不憚所難為文集曰本欲只用呂説後見其後獲意未備故别下語又惜其語非他説所及故存之於後子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽知去聲樂上二字並五教反下一字音洛樂喜好也知者達於事理而周流無滯有似於水故樂水輔氏曰知者通達故周旋委曲隨事而應各當其理未嘗或滯於一隅其理與氣皆與水相似故心所喜好者水仁者安於義理而厚重不遷有似於山故樂山輔氏曰仁者安仁故渾厚端重外物不足以遷移之其理與氣皆與山相似故心所喜好者山動靜以體言語録曰以體言是就那人身上説又曰仁者雖有動時其體只自靜智者雖有靜時其體只自動輔氏曰知者隨事處冝無所凝滯故其體段常動仁者心安於理無所歆羡故其體段常靜愚謂此體字乃形容仁知之體段非體用之體樂壽以效言也輔氏曰效謂功效動而不括故樂靜而有常故壽輔氏曰此所以言其功效也括結礙也動而無所結礙故其效樂常悠久也靜而悠久不變故其效壽程子曰非體仁知之深者不能如此形容之語録曰此語極好看儘可玩味子曰齊一變至於魯魯一變至於道孔子之時齊俗急功利喜夸詐乃霸政之餘習魯則重禮教崇信義猶有先王之遺風焉但人亡政息不能無廢墜爾道則先王之道也言二國之政俗有美惡故其變而之道有難易輔氏曰廢其法而衰替者易復更其法而富強者難變俗以政革政以道協政有美惡故俗有醇疵至於變而之道則盡善盡美而無以復加矣程子曰夫子之時齊強魯弱孰不以為齊勝魯也然魯猶存周公之法制齊由桓公之霸為從簡尚功之治太公之遺法變易盡矣故一變乃能至魯魯則修舉廢墜而已一變則至於先王之道也語録曰齊魯初來氣象已自不同看太公自是與周公别到桓公管仲出來又不能遵守齊之初政却全然變易了一向盡在功利上魯却只是放倒了畢竟先世之遺意尚存如哀公用田賦猶使人來問孔子也若以賦為是更何暇問惟其知得前人底是所以來問若桓公管仲却無這意思自道他底是了一向做去不顧愚謂二國之俗唯夫子為能變之而不得試然因其言以考之則其施為緩急之序亦略可見矣語録曰如齊功利之習所當變便是急處魯紀綱所當振便是急處又曰如齊功利之習若不速革而便欲行王化魯之不振若不與之整頓而却理會甚功利之習便是失其緩急之序子曰觚不觚觚哉觚哉觚音孤觚稜也或曰酒器或曰木簡皆器之有稜者也語録曰古人之器多有觚如酒器便如今花瓶中間有八角者木簡似界方而六面即漢所謂操觚之士者也古人所以恁地方時緣是頓得穩不觚者蓋當時失其制而不為稜也觚哉觚哉言不得為觚也輔氏曰觚不觚上觚字指其器下觚字語其制也不觚謂失其觚之制而不得為觚也程子曰觚而失其形制則非觚也舉一器而天下之物莫不皆然故君而失其君之道則為不君臣而失其臣之職則為虛位范氏曰人而不仁則非人國而不治則不國矣輔氏曰實必稱其名然後成是物天下之物皆然也程子以君臣言蓋舉夫人倫之首而言之范氏又推之以及人與國則其義益廣而其意益切矣宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也劉聘君曰有仁之仁當作人今從之劉氏名勉之建安人從謂隨之於井而救之也文集曰謂赴井以救人為仁耳以下文可逝不可陷觀之可見宰我信道不篤而憂為仁之陷害故有此問語録曰宰我見聖人之行間聖人之言却尚有這般疑是怎生地緣自前無人説箇物事到夫子方説出來所以時下都討頭不著逝謂使之往救陷謂陷之於井欺謂誑之以理之所有罔謂昧之以理之所無或問欺罔之别曰欺者乘人之所不知而詐之也罔者掩人之所能知而愚之也蓋身在井上乃可以救井中之人若從之於井則不復能救之矣此理甚明人所易曉仁者雖切於救人而不私其身然不應如此之愚也輔氏曰好仁而不好學其蔽也愚此固有所不免然宰我之問則又甚矣夫子語之則正理也夫仁者以天地萬物為一體雖切於救人而不私其身然以人體公我與理一表裏瑩徹略無間斷豈容以非理罔之哉子曰君子博學於文約之以禮亦可以弗畔矣夫夬音扶約要也黃氏曰以博對約則約當為要然約而謂約之以訓要不順若顔子所謂約我則要我尤非文理或以約為束則於文義順矣而又非博約相對之意故嘗思博約之義博謂泛而取之以極其廣約謂反而束之以極其要則於文義庶乎得之且如仁字凡洙泗所言皆不可不講是博學於文也及其反而束之以求其要則不過存此心而已能存此心即所謂禮也畔背也君子學欲其博故於文無不考守欲其要故其動必以禮如此則可以不背於道矣語録曰考究時自是頭項多到得行時却只是一理若博學而不約之以禮安知不畔於道徒知要約而不博學則所謂約者未知是與不是亦或不能不畔於道也程子曰博學於文而不約之以禮必至於汗漫博學矣又能守禮而由於規矩則亦可以不畔道矣語録曰博文而不約禮只是徒看得許多徒記得許多無歸宿處子見南子子路不説夫子矢之曰豫所否者天厭之天厭之説音恱否方九反南子衛靈公之夫人有淫行孔子至衛南子請見孔子辭謝不得已而見之或問孔子之見南子曰案史記孔子至衛南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之蓋古者仕於其國有見其小君之禮而子路以夫子見此淫亂之人為辱故不恱語録曰子路性直只是心中以為不當見便不説矢誓也或問矢之為誓曰矢誓聲相近盤庚所謂矢言亦憤激之言而近於誓者也所誓辭也如云所不與崔慶者之類語録曰問若作誓説何師生不相信如此曰只為下三句有似古人誓言如左氏言所不與舅氏之説故有誓氣象否謂不合於禮不由其道也厭棄絶也聖人道大德全無可不可其見惡人固謂在我有可見之禮則彼之不善我何與焉輔氏曰道大則善惡無所不容德全則雖磨涅而不能使之磷緇也故無可無不可義之與比而已彼人雖惡然在我或當見之則亦行吾之義而已豈懼彼之能汙我哉真氏曰居亂邦見惡人惟聖人為可蓋聖人道大德宏可以轉亂而為治化惡而為善故孔子於南子則見之於陽貨亦見之而公山不狃佛肸之召皆欲往焉若大賢以下則危邦不入亂邦不居小人則逺之蓋就之未必能有所濟而或以自汚顔閔終身不仕蓋以此也然此豈子路所能測哉故重言以誓之欲其姑信此而深思以得之也輔氏曰聖人之行非常情所能測識子路學識不足以知聖人又以其平日剛勇率然之態觀之想其於所不恱必有過甚之辭故夫子重言以誓之曰我之所為若不合於禮由於道則天必厭之而棄絶我矣是其至誠惻怛之意所以感切子路者至矣蓋欲啓子路之信以致其思而使之自有所得於心耳子曰中庸之為德也其至矣乎民鮮久矣鮮上聲中者無過無不及之名也輔氏曰集注初本併不偏不倚言中後去之而專言無過不及者喜怒哀樂末發謂之中至子思而始著於書而程子因以發中一名而含二義之説若孔子之教只是即事以明理故集注直以無過不及言中又況已有程子不偏之説於後乎冝其去之也庸平常也語録曰庸是依本分不為怪異之事至極也輔氏曰惟中為至極過此則為過不及此則為不及鮮少也言民少此德今已久矣程子曰不偏之謂中文集曰不偏者明道體之自然即無所倚著之意也不易之謂庸陳氏曰謂萬古常然而不可易中者天下之正道庸者天下之定理語録曰問正道定理恐道是揔括之名理是道裏面有許多條目如天道有日月星辰隂陽寒暑之條理人道有仁義禮智君臣父子之條理曰緊要在正字與定字上中只是箇恰好道理為見不得是亘古今不可變易底故更著箇庸字自世教衰民不興於行少有此德久矣子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸施去聲博廣也仁以理言通乎上下聖以地言則造其極之名也語録曰仁以道理言聖以地位言自是不同如博施濟衆為仁而利物愛人小小者亦謂之仁仁是直看直上直下只一箇道理聖人便橫看有衆人有賢人有聖人便有節次又曰仁以理言是箇徹頭徹尾物事如一元之氣聖以地言也不是離了仁而為聖聖只是行仁到那極處仁便是這理聖便是充這理到極處不是仁上面更有箇聖博施濟衆是做到極處功用如此輔氏曰理謂天理仁即天理之全也自上聖至下愚皆所固有有一事而合乎仁則亦可謂之仁故曰通乎上下地謂學者所造之地位也聖則其所造地位極致之稱至於聖則至矣盡矣不可以有加矣乎者疑而未定之辭病心有所不足也言此何止於仁必也聖人能之乎則雖堯舜之聖其心猶有所不足於此也或問必聖人而後能之乎曰不然此正謂雖聖人亦有所不能爾必也聖乎蓋以起下文堯舜病諸之意猶必也射乎而後言射之有爭也語録曰聖是行仁極致之地言博施濟衆之事何止於仁必是行仁極致之人亦有不能盡又曰博施濟衆是無盡底地頭堯舜也做不了蓋仁者之心雖無窮而仁者之事則有限自是無可了之理輔氏曰博施濟衆乃仁者之極致故雖聖人其心猶有所不足於此以是求仁愈難而愈逺矣語録曰若必待博施而後為仁則有終身不得仁者矣夫仁者已欲立而立人已欲達而達人夫音扶以已及人仁者之心也於此觀之可以見天理之周流而無間矣輔氏曰天理周流自無人已之間狀仁之體莫切於此陳氏曰仁者之心廓然大公無所不愛其體自如此非姑指其及物處為然也但不可偏靠此為言爾能近取譬可謂仁之方也已譬喻也方術也近取諸身以已所欲譬之他人知其所欲亦猶是也然後推其所欲以及於人則恕之事而仁之術也或問仁恕之别曰凡己之欲即以及人不待推以譬彼而後施之者仁也以己之欲譬之於人知其亦必欲此而後施之者恕也此其從容勉強固有淺深之不同然其實皆不出乎常人一念之間學者亦反求諸己而已矣豈必博施濟衆務為聖人之所不能者然後得之乎語録曰己欲立而立人己欲達而逺人是以己及人仁之體也能近取譬是推己及人仁之方也又曰以己及物是自然及物己欲立便立人己欲達便達人推己及物則是要逐一去推出如我欲恁地便推出去人也合恁地方始有以及之如喫飯相似以己及物底便是我要喫自是教别人也喫不待思量推己及物底便是我喫飯思量别人也合當喫方始與人喫又曰當初只做一統看後來看上面説可謂仁之方也已却相反方分作兩段説又曰若以為滚説則既曰夫仁者矣不當以可謂仁之方結之也於此勉焉則有以勝其人欲之私而全其天理之公矣輔氏曰此強恕求仁之事蓋恕則當勉強而行仁則自然無所用其力也若能勉力於此則人欲之私自無所容而天理之公已得而體之矣程子曰醫書以手足痿痺為不仁此言最善名狀仁者以天地萬物為一體莫非己也認得為己何所不至若不屬己自與己不相干如手足之不仁氣已不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰己欲立而立人己欲達而達人能近取譬可謂仁之方也己欲令如是觀仁可以得仁之體語録曰問痿痺不仁莫是把四肢喻萬物否曰不特喻萬物只是頃刻不相應便是不仁如病風人一肢不仁兩肢不仁為其不省悟也問仁者以萬物為一體如事至物來皆有以處之如事物未至不可得而體者如何曰只是不在這裏然此理也在這裏若來時便以此處之問即人物初生時驗之均受天地之氣而生所以同一體惟仁者其心公溥實見此理固能以天地萬物為一體否曰不須問他從初生時只今便是一體猶之水然江河池沼溝渠皆是此水如以兩碗盛得水來不成教去尋討這一碗是那裏斟來那一碗是那裏酌來既都是水便是同體更何待尋問所從來又曰認得為已何所不至認得箇什麼夫仁者己欲立便立人己欲達便達人此即仁之體也能近取譬則是推己之恕故曰可謂仁之方夫仁者與可謂仁之方正相對説欲令如是觀仁可以得仁之體這處極好看仁問程子作一統説集注作三段説如何曰程子之説如大屋一般某説如在大屋之下分别廳堂房室一般初無異也黃氏曰或以為痿痺者不識痛癢之謂也如此則覺者為仁仁可以覺言乎曰所謂仁者當於氣已不貫一句之上求之手足之所以痿痺者以吾之氣不貫乎手足耳手足之譬則人物也痿痺則吾之心不屬乎彼彼雖有疾痛頑然而莫之知也氣無不貫則一身無痿痺之處此心無不達則天下無疾痛莫覺之人故論仁者當觀諸其心又曰論語言堯舜其猶病諸者二夫博施者豈非聖人之所欲然必五十乃衣帛七十乃食肉聖人之心非不欲少者亦衣帛食肉也顧其養有所不贍爾此病其施之不博也濟衆者豈非聖人之所欲然治不過九州聖人非不欲四海之外亦兼濟也顧其治有所不及爾此病其濟之不衆也推此以求修己以安百姓則為病可知茍以吾治己足則便不是聖人黃氏曰博施二語當與濟衆異今言五十衣帛少者不衣帛則依舊是所濟未衆也博施當如減田租之半不若盡除田租賜帛一匹不如十匹方為博施此雖文義之至細者然亦不可以不知輔氏曰堯舜其猶病諸此一句説得聖人之心最切此是聖人不能為天地之所為處然在常人觀之淺者固不足以知其味深者又必墮於虛無滉漾之域惟程子能推其實如説自己事自非深有得於聖人之心何能如此吕氏曰子貢有志於仁徒事髙逺未知其方孔子教以於己取之庶近而可入是乃為仁之方雖博施濟衆亦由此進輔氏曰吕氏發明得子貢病痛與聖人之教子貢意思皆切蓋子貢徒知仁道之大而不知其具足於吾心務其大則雖堯舜猶以為病若反諸心則可以得仁之體矣論語纂疏卷三
