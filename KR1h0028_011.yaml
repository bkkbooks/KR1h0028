body:
  text: 欽定四庫全書論語纂疏卷八宋趙順孫撰朱子集注衛靈公第十五凡四十一章衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行陳去聲陳謂軍師行伍之列俎豆禮器尹氏曰衛靈公無道之君也復有志於戰伐之事故答以未學而去之或問靈公問陳而夫子遽行何也曰為國以禮戰陳之事非人君所宜問也況靈公無道夫子固知之矣特以其禮際之善庶幾可與言者是以往來於衛為日最久而所以啓告之者亦已詳矣乃於夫子之言一無所入至是而猶問陳焉則其志可知矣故對以未學而去之然不徒曰未學而已猶以爼豆之事告之則夫子之去蓋亦未有必然之意也使靈公於此有以發悟於心而改事焉則夫子之行孰謂其不可留哉故史記又云明日與孔子語見蜚鴈仰視之色不在孔子孔子遂行則是夫子之行又以禮際之不善而決不專於問陳一事也夫子既行而靈公卒衛國大亂爼豆之對其旨逺哉任陳絶糧從者病莫能興從去聲孔子去衛適陳興起也子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣見賢遍反何氏曰濫溢也言君子固有窮時不若小人窮則放溢為非程子曰固窮者固守其窮亦通語録曰問固窮二義曰固守其窮古人多如此説但以上文觀之則恐聖人一時答問之辭未遽及此蓋子路方問君子亦有窮乎聖人答之曰君子固是有窮時但不如小人窮則溢爾以固字答上靣有字文勢乃相應愚謂泛言其理則何氏之説為長就子路言之則程子之説為切故集注以為皆通而必以何氏之説為先也愚謂聖人當行而行無所顧慮處困而亨無所怨悔於此可見學者冝深味之輔氏曰當行而行無所顧慮義之勇也處困而亨無所怨悔義之安也此聖人之事學者固冝深味胡氏曰當行而行惟理是視者無所顧慮不計其後之有無也處困而亨身雖窮而道則通也無所怨悔觀固窮之語可見也學者一身之進退能於是而取則焉則不為利害所奪窮達所移矣子曰賜也女以豫為多學而識之者與女音汝識音志與平聲下同子貢之學多而能識矣夫子欲其知所本也故問以發之輔氏曰子貢以通達之資聞一知二則其所學固多而能識矣然務博者多徇外如方人屢中之事可見夫子每有以却之無非使之反求其本者子貢至此則真積力久亦將有得矣故夫子先設為疑辭以發之俟其言以觀其志然後告之對曰然非與方信而忽疑蓋其積學功至而亦將有得也曰非也豫一以貫之説見第四篇然彼以行言而此以知言也語録曰曽子發出忠恕是就行事上説孔子告子貢初頭説多學而識之便是就知上説曽子是就源頭上面流下來子貢是就下面推上去又曰曽子平日於事上都積纍做得來已周密皆精察力行過了只是未透夫子才點化便透子貢却是資質明敏能曉得聖人多愛與他説話所以亦告之又曰看上下語脈是如此謝氏曰聖人之道大矣人不能遍觀而盡識冝其以為多學而識之也然聖人豈務博者哉如天之於衆形匪物物刻而雕之也故曰豫一以貫之德輶如毛毛猶有倫上天之載無聲無臭至矣語録曰問引此詩者莫只是贊其理之密否曰固是到此則無可得説了然此須是去涵泳只恁説過亦不濟事多學而識之亦非不是故子貢先曰然又曰非與學固有當學而識之者然又自有一箇一貫底道理但多學而識之則可説到一以貫之則不可説矣又曰天則是一氣流行萬物自生自長自形自色豈是逐一粧點得如此聖人只是一箇大本大原裏發出視自然明聽自然聰色自然溫貌自然恭在父子則為仁在君臣則為義從大本中流出便成許多道理只是這箇一便貫將去所主是忠發出去無非是恕陳氏曰謝氏譬天之造化發育萬物亦是一元之氣流行貫徹初無二理末以中庸語證乃形容天理自然流行之妙無雕刻形迹即以結前意爾尹氏曰孔子之於曽子不待其問而直告之以此曽子復深喻之曰唯若子貢則先發其疑而後告之而子貢終亦不能如曽子之唯也二子所學之淺深於此可見語録曰曽子與門人之言便有箇結殺頭亦見他符驗處子貢多是説過曉得了便休更沒收殺大率子貢緣曉得聖人多與他説話但都沒收殺或曰他言性與天道處却是他有得處否曰然愚案夫子之於子貢屢有以發之而他人不與焉則顔曽以下諸子所學之淺深又可見矣輔氏曰是道之傳蓋難其人聖門諸弟子唯顔曽得之雖子貢之敏識猶有憾焉則其餘諸子又可知矣學者不可承虛接響少有得而輕自大非於博學審問謹思明辨篤行致人一己百人十己千之功未可妄議其涯涘也子曰由知德者鮮矣鮮上聲由呼子路之名而告之也德謂義理之得於己者非已有之不能知其意味之實也輔氏曰聖門之學不以徒知為尚要在實有諸已自第一章至此疑皆一時之言此章蓋為愠見發也蔡氏曰案夫子厄於陳蔡之間子路則愠見子貢則勸夫子少貶唯顔子則曰夫子之道至大故天下莫能容雖然不容何害不容然後見君子此與由賜之見異矣故夫子既告子路以固窮之説而言未竟復呼子貢告以一貫之説謂女以豫求為多學以識之歟我只有箇一自然多貫了所以釋其少貶之疑又呼子路告以知德者鮮矣之説謂義理有得於己則死生禍福得喪自不能亂其所守所以釋其愠見之惑夫子當造次顚沛之中所以教門人弟子者各隨其所蔽而開發無以異於洙泗雍容講論之素吁此其所以為聖人也歟子曰無為而治者其舜也與夫何為哉恭己正南面而已矣與平聲夫音扶無為而治者聖人德盛而民化不待其有所作為也獨稱舜者紹堯之後而又得人以任衆職故尤不見其有為之迹也恭己者聖人敬德之容既無所為則人之所見如此而已或問恭己為聖人敬德之容曰純敬不已無事操修自外觀之見其恭己而已爾其為無為之道何也曰若是者不言而信不怒而威有不知其所以然者也曰以書傳考之舜之為治朝覲巡狩封山濬川舉元凱誅四凶非無事也此其曰無為而治者何邪曰即書而考之則舜之所以為治之迹皆在攝政二十八載之間及其踐天子位則書之所載不過命九官十二牧而已其後無他事也雖書之所記簡古稀闊然亦足以見當時之無事也曰若是則其治也乃時事之適然而非恭己之效也奈何曰因其時事之適然也而舜又恭己以臨之是以其治益以久長而不替也若後世之君當無事之時而不知聖人恭己之道則必怠惰放肆宴安鴆毒而其所謂無事者乃所以為禍亂多事之媒也胡氏曰謂之敬德之容者由外而知其內也子張問行猶問達之意也子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉行篤行不之行去聲貊亡百反子張意在得行於外故夫子反於身而言之猶答干祿問達之意也篤厚也語録曰篤有重厚深沈之意蠻南蠻貊北狄二千五百家為州立則見其參於前也在輿則見其倚於衡也夫然後行參七南反夫音扶其者指忠信篤敬而言參讀如毋往參焉之參言與我相參也衡軛也言其於忠信篤敬念念不忘隨其所在常若有見文集曰此謂言必欲其忠信行必欲其篤敬念念不忘而有以形於心目之間耳語録曰只是見得理如此不成是有一塊物事光輝輝地在那裏雖欲頃刻離之而不可得然後一言一行自然不離於忠信篤敬而蠻貊可行也輔氏曰言忠信則言有物行篤敬則行有常皆誠實自修之事人能如此則心存而不放何往而不可行哉然或勉之於暫而不能常有人作而無人輟則又不可故必持之於悠久之際而自強不息體之於心目之間而未嘗或離夫然後蠻貊可行也子張書諸紳紳大帶之垂者書之欲其不忘也程子曰學要鞭辟近裏著已而已博學而篤志切問而近思言忠信行篤敬立則見其參於前在輿則見其倚於衡只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也語録曰鞭辟是洛中語一處説作鞭約大抵是要鞭督向裏去今人皆不是鞕督向裏皆就外面做工夫恰似一隻船覆在水中須勇猛著力翻將轉來始得又曰辟如驅辟一般又曰只此是學只爭箇做得徹與不徹耳又曰明得盡者一見便都明了更無查滓其次惟是莊敬持養以消去其查滓而已所謂持養亦非是作意去穿鑿以求其明但只此心常敬則久自明矣顔子則是明得盡者也仲弓則是莊敬以持養之者也又曰明得盡時查滓自已化了莊敬持養未能與已合又曰天地同體處是義理之精英查滓是私意人欲之未消者人與天地本一體只緣查滓未去所以有間隔若無查滓便與天地同體克己復禮為仁已是查滓復禮便是天地同體處有不善未嘗不知不善處是查滓顔子三月不違仁既有限此外便未可知如曽子為人謀而不忠與朋友交而不信傳而不習是曽子查滓處漆雕開言吾斯之未能信皆是有些查滓處只是質美者也見得透徹那查滓處都盡化了若未到此須當莊敬持養旋旋磨擦去教盡輔氏曰自家本自與天地同體唯為氣稟物欲間隔昏蔽故不能與之為一質美謂氣質之純厚清明者誠實做出到得那其知既致其欲不萌處則查滓便渾化却與天地同體其次資質稍下者則當且以莊敬持養之莊以貌言敬以心言內外之符也功夫到後其至一也胡氏曰只此是學言正學者當用力之地也明得盡查滓便渾化却者天資髙則知之即能行之而私意無所容也莊敬持養者莊主容敬主心內外交致其力必常常操守以涵養之然後可以致私意之消釋此專為學者言不主乎釋經也子曰直哉史魚邦有道如矢邦無道如矢史官名魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諫故夫子稱其直事見家語或問尸諫之説曰案家語衛靈公不用蘧伯玉而任彌子瑕史魚諫不從將卒命其子曰吾生不能正君死無以成禮冝置尸牖下其子從之靈公弔而問之子以父言告公曰是寡人之過也遂命殯於客位而進伯玉退子瑕君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之伯玉出處合於聖人之道故曰君子卷收也懷藏也如於孫林父寧殖放弒之謀不對而出亦其事也楊氏曰史魚之直未盡君子之道若蘧伯玉然後可免於亂世若史魚之如矢則雖欲卷而懷之有不可得也語録曰直固是好然一向直便是偏豈得如蘧伯玉之君子胡氏曰直者德之一端君子則成德之名子曰可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言知去聲子曰志士仁人無求生以害仁有殺身以成仁志士有志之士仁人則成德之人也理當死而求生則於其心有不安矣是害其心之德也當死而死則心安而德全矣或問此章曰仁者心之德而萬理具焉一有不合於理則心不能安而害其德矣順此理而不違則身雖可殺而此心之全此理之正浩然充塞天地之間夫孰得而亡之哉曰其謂死身成仁而不曰義何也曰仁義體一而用殊故君子之於事有以仁決者有以義決者以仁決者此章之言是也以義決者孟子謂欲有甚於生惡有甚於死是也蓋仁人不以所惡傷所好之體義士不以所賤易所貴之宜輔氏曰志士於此二者勉之者也仁人於此二者安之者也心與理一理當死而求生則咈於天理忍於吾心而傷害於吾仁矣心之德即所謂仁也理當死而死則吾之心順適而無傷則吾之仁亦全而無闕矣程子曰實理得之於心自别實理者實見得是實見得非也古人有捐軀隕命者若不實見得惡能如此須是實見得生不重於義生不安於死也故有殺身以成仁者只是成就一箇是而已語録曰實理與實見不同今合説必記録有誤若有那實理人須是見得見得恁地確定便是實見若不實見得又都間了又曰見字上必有漏落理自是理見自是見蓋物物有那實理人須是實見得或曰理在物見在我曰是如此董氏曰所謂實理者指理而言也所謂實見得是實見得非者指見而言也此有兩節意輔氏曰程子之説有知有義有仁實見得是非者知也生不重於義者義也生不安於死者仁也三者體一而用殊但論學則以知為先成德則以仁為主所謂一箇是只是理之所當為心安而德全則能成就得一箇是矣胡氏曰所見者實私意不存當死而死惟理是視所謂只成就一箇是也求嘉陳氏曰既謂之成仁則必如是而後天理人倫無虧欠處生順死安無悔憾處當此境界但見義理而不見已身更管甚名譽邪子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者賢以事言仁以德言黃氏曰賢以事言以大夫言賢者見於有為者也仁以德言以士言仁者見於修身者也夫子嘗謂子貢恱不若已者故以是告之欲其有所嚴憚切磋以成其德也輔氏曰事大夫之賢者則有所觀法而起嚴憚之心友其士之仁者則有所切磋而生勉勵之意相示以禮相觀以善而在我者有敬畏而無怠惰焉則其所以為仁者力矣程子曰子貢問為仁非問仁也故孔子告之以為仁之資而已顔淵問為邦顔子王佐之才故問治天下之道曰為邦者謙辭子曰行夏之時夏時謂以斗柄初昏建寅之月為嵗首也天開於子地闢於丑人生於寅語録曰此是邵子皇極經世中説經世書以元統十二會為一元一萬八百年為一會初間一萬八百年而天始開又一萬八百年而地始成又一萬八百年而人始生邵子於寅上方始注一開物字蓋初間未有物只是氣塞及天開些子後便有一塊查滓在其中初則溶軟後漸堅實今山形自髙而下便如水漾沙之勢以此知必是先有天方有地有天地交感方始生物出來故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也語録曰至子始有天故曰天正至丑始有地故曰地正至寅始有人故曰人正邵康節言到子上方始有天而未有地到丑上方始有地而未有人到寅上方始有人子丒寅皆天地人之始故三代建以為正然時以作事則嵗月自當以人為紀故孔子嘗曰吾得夏時焉而説者以為謂夏小正之屬蓋取其時之正與其令之善或問夏時之得其正曰陽氣雖始於黃鍾而其月為建子然猶潛於地中而未有以見其生物之功也厯丑轉寅而三陽始備於是叶風乃至盛德在木而春氣應焉古之聖人以是為生物之始改嵗之端蓋以人之所共見者言之未有知其所由始也至商周始以征伐有天下於是更其正朔定為一代之制以新天下之耳目而有三統之説然以言乎天則生物之功未著以言乎地則改嵗之義不明而凡四時五行之序皆不得其中正此孔子所以論考三王之制而必行夏之時也語録曰夫子以正月人可施功故從其時而於此又以告顔子也乘殷之輅輅音路亦作路商輅木輅也輅者大車之名古者以木為車而已至商而有輅之名蓋始異其制也周人飾以金玉則過侈而易敗或問周輅為過侈曰輅者身之所乘足之所履其為用也賤矣運行振動任重致逺其為物也勞矣且一器而百工聚焉則為費也廣矣賤用而貴飾之則不稱物勞而華飾之則易壞費廣而又增費之則傷財此周輅之所以為過侈與不若商輅之朴素渾堅而等威已辨為質而得其中也胡氏曰車之為用也費廣故商之木車質而得其中服周之冕周冕有五祭服之冠也冠上有覆前後有旒黃帝以來蓋已有之而制度儀等至周始備然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢或問周冕之不為侈曰加之首則體嚴而用約詳其制則等辨而分明此周冕所以雖文而不為過也夏商之制雖不可考然意其必有未備者矣夫子取之蓋亦以為文而得其中也胡氏曰冕之為用也費寡故周之五冕文而得其中永嘉陳氏曰禮有以文為貴者冕也有以質為貴者車也樂則韶舞取其盡善盡美放鄭聲逺佞人鄭聲淫佞人殆逺去聲放謂禁絶之鄭聲鄭國之音佞人卑諂辨給之人殆危也程子曰問政多矣惟顔淵告之以此蓋三代之制皆因時損益及其久也不能無弊周衰聖人不作故孔子斟酌先王之禮立萬世常行之道發此以為之兆爾由是求之則餘皆可考也語録曰兆猶言準則也非謂為邦之道盡於此四者略説四件事做一箇凖則餘事皆可依效此而推行之耳張子曰禮樂治之法也放鄭聲逺佞人法外意也一日不謹則法壞矣虞夏君臣更相飭戒意蓋如此又曰法立而能守則德可久業可大鄭聲佞人能使人喪其所守故逺之輔氏曰治道成於樂鄭聲樂之淫者能搖蕩人之性情以壞其成故放絶之治道保於人才佞人人才之賊利口辨給能變亂是非以移奪人之心志喪其所守故屏逺之尹氏曰此所謂百王不易之大法孔子之作春秋蓋此意也孔顔雖不得行之於時然其為治之法可得而見矣語録曰三代制作極備孔子更不可復作故告以四代禮樂只是集百王不易之大法其作春秋善者則取之惡者則誅之意亦只是如此輔氏曰春秋大義數十皆夫子斟酌三代之禮而為萬世常行不易之大法孔顔雖不得行之於當時然即此而觀則其為治之法可以見矣子曰人無逺慮必有近憂蘇氏曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下矣蔡氏曰案蘇氏之説逺近以地言若逺近以時言恐亦可通如國家立一法度若不為長逺之慮則目前即有近憂矣子曰已矣乎吾未見好德如好色者也好去聲已矣乎歎其終不得而見也輔氏曰自恐其終不獲見所以警人使知自勉也子曰臧文仲其竊位者與知桞下惠之賢而不與立也者與之與平聲竊位言不稱其位而有愧於心如盜得而隂據之也輔氏曰爵位天之所以待人才有才德者之所宜居也豈一已可得而私有哉如盜得而隂據之則蔽賢抑能悖天行私而不自知其非矣胡氏曰竊者非所當得而隂私取之也言不稱其位則有非所當得者矣言有愧於心則有隂私取之者矣桞下惠魯大夫展獲字禽食邑栁下諡曰惠與立謂與之並立於朝范氏曰臧文仲為政於魯若不知賢是不明也知而不舉是蔽賢也不明之罪小蔽賢之罪大故孔子以為不仁又以為竊位子曰躬自厚而薄責於人則逺怨矣逺去聲責已厚故身益修語録曰厚是自責得重責了又責積而不已之意責人薄故人易從所以人不得而怨之子曰不曰如之何如之何者吾末如之何也已矣如之何如之何者熟思而審處之辭也不如是而妄行雖聖人亦無如之何矣語録曰只是要再三反覆思量若率意妄行雖聖人亦無奈何子曰羣居終日言不及義好行小慧難矣哉好去聲小慧私智也或問慧之為智曰慧之為言固明智之稱也特所謂小慧者則不本於義理而發於計較利欲之私也愚謂智本一而發於用則有公私之不同私智則智之行於私者也言不及義則放辟邪侈之心滋好行小慧則行險僥幸之機熟難矣哉者言其無以入德而將有患害也或問此章曰君子羣居將以講道義進德業也今終日之間言不及義則放辟邪侈之心滋好行小慧則行險僥幸之機熟皆非所以存養善心而為造道入德之資也其自暴自棄至於如此聖人得不為之深憂哉難矣哉者憂其不入於道德而將罹於患害之微辭也胡氏曰言不及義故無以入德好行小慧故將有患害子曰君子義以為質禮以行之孫以出之信以成之君子哉孫去聲義者制事之本故以為質幹語録曰義是就事上説又曰是制事先決其當否了愚謂義主事而言故以制事釋之君子之於事必裁之以義義所當為而後為所以謂之質幹也而行之必有節文語録曰行是大綱行時又曰行是安排恁地行又曰其間節文次第須要皆具出之必以退遜語録曰出則始自此出去又曰出是從此發出又曰徒知盡其節文而不能孫以出之則亦不可且如人知尊卑之分須當遜他然遜之之時辭氣或不能婉順便是不能孫成之必在誠實語録曰信是朴實頭做無信則義禮孫皆是為又曰是終始誠實以成此一事却非是孫以出之之後方信以成之也陳氏曰事到面前便斷可否此在先是義以為質可否既定或從或違所以區處須中節文無過不及是禮以行之於其區處或出辭氣須孫順而無峻厲方不忤人是孫以出之其總歸須誠實則此事之成無欠缺可悔處是信以成之四者皆一套事只於日用間驗之自見乃君子之道也程子曰義以為質如質幹然禮行此孫出此信成此此四句只是一事以義為本輔氏曰此四句只是一事者謂每事皆當如此一有闕焉則首尾不全矣又曰敬以直內則義以方外義以為質則禮以行之孫以出之信以成之語録曰只是一箇義義以為質便是自義以方外處説起來若無敬以直內也不知義之所在輔氏曰敬以直內義以方外是從內説出外義以為質禮以行之孫以出之信以成之是由外説入內胡氏曰必敬存而後義立義者事之質而敬又義之質推而上之也永嘉陳氏曰以敬為主則義乃方外是敬為體而義為用若以義為質則禮行此義者也孫出此義者也信成此義者也是義為體而三者為用矣子曰君子病無能焉不病人之不已知也子曰君子疾沒世而名不稱焉范氏曰君子學以為己不求人知然沒世而名不稱焉則無為善之實可知矣輔氏曰有實斯有名名不稱則無其實可知故君子以為恥非恥無名也恥無實也子曰君子求諸已小人求諸人謝氏曰君子無不反求諸已小人反是此君子小人所以分也楊氏曰君子雖不病人之不已知然亦疾沒世而名不稱也雖疾沒世而名不稱然所以求者亦反諸已而已小人求諸人故違道干譽無所不至三者文不相蒙而義實相足亦記言者之意或問楊氏之説不太巧乎曰雖巧而有益於學者胡氏曰范氏合上二章為一意楊氏於此又合三章為一意文意反覆互相周備雖非夫子立言之旨或記者取而相足也子曰君子矜而不爭羣而不黨莊以持已曰矜然無乖戾之心故不爭和以處衆曰羣然無阿比之意故不黨輔氏曰莊以持已理也然用意或過則便至乖戾之心生而與人爭和以處衆理也然用意或過則便至阿比之意起而與人黨天理存亡只在一息之間夫子言君子如此所以使學者於持已處衆之際戒謹恐懼務盡其理而防私意之或萌也子曰君子不以言舉人不以人廢言子貢問曰有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人推已及物其施不窮故可以終身行之輔氏曰推已及物即已所不欲勿施於人之恕也非有資於人在我施之而已烏有窮盡故可以終身行之此蓋指其用而言之尹氏曰學貴於知要子貢之問可謂知要矣孔子告以求仁之方也推而極之雖聖人之無我不出乎此終身行之不亦宜乎輔氏曰始則推已及物終則為聖人之無我不出乎一恕字而已終身行之豈不為冝此又極其效而言之知要之説尤為有警於學者蓋聖學以仁為先而恕則求仁之本也子曰吾之於人也誰毁誰譽如有所譽者其有所試矣譽平聲毁者稱人之惡而損其真譽者揚人之善而過其實夫子無是也然或有所譽者則必嘗有以試之而知其將然矣聖人善善之速而無所茍如此若其惡惡則已緩矣是以雖有以前知其惡而終無所毁也或問毁譽之説曰譽者善未顯而亟稱之也毁者惡未著而遽詆之也試云者亦驗其將然而未見其已然之辭也蓋聖人之心光明正大稱物平施無豪髮之差故人之善惡稱之未嘗少有過其實者然以欲人之善也故但有試而知其賢則善雖未顯已進而譽之矣不欲人之惡也故惡之未著者非有以決知其不善而卒未嘗遽詆之也此所以言譽而不及毁蓋非若後世所謂恥言人過而全無黑白者但見先褒之善而無預詆之惡是則聖人之心耳曰若有譽而無毁則聖人之心為有所倚矣曰有譽無毁是乃善善速惡惡緩之意正書所謂與其殺不辜寧失不經罪疑惟輕功疑惟重春秋傳所謂善善長惡惡短孔子樂道人之善惡稱人之惡之意而仁包五常元包四德之發見證驗也聖人之心雖至公至平無私好惡然此意則未嘗不存是乃天地生物之心也若以是為有倚而以夫恝然無情者為至則恐其髙者入於老佛荒唐之説而下者流於申商慘酷之科矣語録曰毁者那人本未有十分惡自家將做十分説他便是毁若是只據他之惡而稱之則不可謂之毁譬如一物本全自家打破了便是毁若是那物元來破了則不可謂之毁譽亦是稱奬得來過當其有所試矣那人雖未有十分善自家却遂知得他將來如此若毁人則不可如此也胡氏曰毁云損其真者叔孫武叔之毁是也譽云過其實者孟子所謂聲聞過情是也皆失其善善惡惡之正者也斯民也三代之所以直道而行也斯民者今此之人也或問斯民為今日之民曰以他文推之如伊尹所謂此民是民皆指當日之民而言況今先言斯民而後言三代則是正指今日之民而上推三代以實之之詞也且以斯民對三代之所以直道而行則所謂斯民者乃三代之時所嘗行其直道之民又何疑哉班固漢書贊引此文以明秦漢不易民而化之意亦為粗得其文意者豈西漢諸儒嘗有是説而何晏失之也歟三代夏商周也直道無私曲也言吾之所以無所毁譽者蓋以此民即三代之時所以善其善惡其惡而無所私曲之民故我今亦不得而枉其是非之實也語録曰所以字本虛然意味乃在此又曰此民乃是三代時直道而行之民我今若有所毁譽亦不得迂曲而枉其是非之實尹氏曰孔子之於人也豈有意於毁譽之哉其所以譽之者蓋試而知其美故也斯民也三代所以直道而行豈得容私於其間哉子曰吾猶及史之闕文也有馬者借人乘之今亡已夫夫音扶楊氏曰史闕文馬借人此二事孔子猶及見之今亡已夫悼時之益偷也愚謂此必有為而言蓋雖細故而時變之大者可知矣胡氏曰此章義疑不可強解愚謂史闕文傳記不備不敢參以己意如夏五郭公之類也馬借人已偶有餘不吝以自私如願車馬與朋友共敝之類也二者公心之見於事為者也故楊氏以為二事豈夫子初年居魯魯俗習於文學之化猶有此事晚年歸魯政在三桓風俗日異偶有所感而為是言歟亦借是以明時變之不如古也然二事大小精粗實不相並故又取胡氏之説於後亦闕疑之意也子曰巧言亂德小不忍則亂大謀巧言變亂是非聽之使人喪其所守小不忍如婦人之仁匹夫之勇皆是或問婦人之仁匹夫之勇強弱不同而皆為不忍何也曰忍之為義有所禁而不發云爾婦人之仁不能忍其愛也匹夫之勇不能忍其暴也輔氏曰婦人之仁失於不斷匹夫之勇失於輕決二者之失不同而皆足以亂大謀蓋大謀須斷而輕決則又失之子曰衆惡之必察焉衆好之必察焉好惡並去聲楊氏曰惟仁者能好惡人衆好惡之而不察則或蔽於私矣胡氏曰察者詳審之辭非謂衆之好惡為皆非也特恐其或蔽於私故加以詳審耳孟子於匡章陳仲子是也子曰人能𢎞道非道𢎞人𢎞廓而大之也人外無道道外無人然人心有覺而道體無為故人能大其道道不能大其人也或問此章曰人即道之所在道即所以為人之理不可殊觀但人有知思則可以大其所有之理道無方體則豈能大其所託之人哉輔氏曰人外無道道外無人此合而言之論其極致則然也然析而言之則人心有知覺道體無作為故人能大其道道不能大其人張子曰心能盡性人能𢎞道也性不知檢其心非道𢎞人也語録曰問張子如此説孟子集注却謂盡其心者必其能知性者也知性是物格之事盡心是知至之事如何曰心與性只一般知與盡不同所謂知便是心了子曰過而不改是謂過矣過而能改則復於無過唯不改則其過遂成而將不及改矣子曰吾嘗終日不食終夜不寢以思句無益句不如學也此為思而不學者言之蓋勞心以必求不如遜志而自得也語録曰思是硬要自去做底學是依這本子去做便要小著心隨順箇事理去做而今人都是硬去做要必得所以更做不成須是軟著心貼就他去做又曰遜志是卑遜其志放退一著寬廣以求之不忒恁地迫窄便要一思而必得李氏曰夫子非思而不學者特垂語以教人爾子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道不憂貧餒奴罪反耕所以謀食而未必得食學所以謀道而祿在其中然其學也憂不得乎道而已非為憂貧之故而欲為是以得祿也尹氏曰君子治其本而不恤其末豈以在外者為憂樂哉子曰知及之仁不能守之雖得之必失之知去聲知足以知此理而私欲間之則無以有之於身矣輔氏曰仁是本心之德天理之全無物不體無時不然元無虧闕間斷唯是私欲橫生則便遏絶殄瘁而不得接續雖曰知足以知之而實不能有諸已矣苟無私欲以間之則全體是仁安而行之不待強勉而其所知自然在我而不失此所以必於仁而言守也知及之仁能守之不莊以涖之則民不敬涖臨也謂臨民也知此理而無私欲以間之則所知者在我而不失矣然猶有不莊者蓋氣習之偏或有厚於內而不嚴於外者是以民不見其可畏而慢易之語録曰今自有此心純粹更不走失而於接物應事時少些莊嚴底意思闒閽翣翣底自不足以使人敬他此便是未善處下句放此知及之仁能守之莊以涖之動之不以禮未善也動之動民也猶曰鼓舞而作興之云爾語録曰這動字不是感動之動是使民底意思謂如使民去做這件事亦有禮是使之以禮下梢禮字歸在民身上禮謂義理之節文愚謂學至於仁則善有諸已而大本立矣涖之不莊動之不以禮乃其氣稟學問之小疵然亦非盡善之道也語録曰固有生成底然亦不可専主氣質蓋亦有學底輔氏曰不莊氣質之偏也不以禮學問之闕也故夫子歷言之使知德愈全則責愈備不可以為小節而忽之也或問此章曰太抵發明內外本末之序極為完備而其要以仁為重仁能守之則大本已立雖臨民不以莊動民不以禮亦其支節之小失耳然亦不可不自警省以求盡善而全其德也子曰君子不可小知而可大受也小人不可大受而可小知也此言觀人之法知我知之也受彼所受也蓋君子於細事未必可觀而材德足以任重小人雖器量淺狹而未必無一長可取文集曰一事能否不足以盡君子之藴故不可小知任天下重而不懼故可大受小人一才之長亦可器而使但不可以任大事耳子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也民之於水火所賴以生不可一日無其於仁也亦然但水火外物而仁在已無水火不過害人之身而不仁則失其心是仁有甚於水火而尤不可以一日無者也況水火或有時而殺人仁財未嘗殺人亦何憚而不為哉李氏曰此夫子勉人為仁之語下章放此子曰當仁不讓於師當仁以仁為已任也雖師亦無所遜言當勇往而必為也蓋仁者人所自有而自為之非有爭也何遜之有或問當仁不遜之説曰弟子之於師每事必遜而不敢先者也至於以仁為已任則當自勉而勇為之不可以有遜也蓋仁者已之所有而自為之非奪諸彼而先之也何遜之有程子曰為仁在已無所與遜若善名在外則不可不遜輔氏曰遜乃禮之實也德之善也凡自外來者固不可不遜如善名是也至於為仁在己則何所遜哉蓋非不遜也乃無所與遜也子曰君子貞而不諒貞正而固也諒則不擇是非而必於信或問貞諒之别曰處義既精不期固而自固者貞也不擇邪正惟知必信而不易者諒也語録曰貞者見得道理是如此便須只恁地做所謂知斯二者弗去是也為正字説不盡故更加固字如易所謂貞固足以幹事若諒者是不擇是非必要如此蔡氏曰諒有二訓有止訓信者友諒是也有為必信者此諒是也諒似乎貞而實非故夫子特别而言之子曰事君敬其事而後其食後與後獲之後同食祿也君子之仕也有官守者修其職有言責者盡其忠皆以敬吾之事而已不可先有求祿之心也輔氏曰有官守者修其職有言責者盡其忠是皆天理之當然而在人所當為者也豈可有一豪僥求覬幸之意於其先哉一有僥求覬幸之意於其先則其為是事也必至於有人則作無人則輟朝勤而夕怠始鋭而終衰亦何能有所成乎胡氏曰後其食者蓋委而置之不存乎念慮之間非才任其事而即有得祿之心繼之也若曰先敬事而後有計祿之心則義利雜糅公私交戰其不為利心勝者幾希豪釐之差千里之謬學者所當深辨也子曰有教無類人性皆善而其類有善惡之殊者氣習之染也故君子有教則人皆可以復於善而不當復論其類之惡矣輔氏曰人之性同乎一理而已然其品類則有善惡之異者何哉蓋於其始生也已有氣稟清濁之分及其少長也又有習染邪正之異茍欲合其異而反於同則在乎修道以為教者何如耳故君子有教化之妙則人皆可以復於善而自無為惡之人豈可復論其類之惡哉子曰道不同不相為謀為去聲不同如善惡邪正之異子曰辭達而已矣辭取達意而止不以富麗為工胡氏曰辭言也達通也而已矣止乎是之謂也有是意必假是言以通之言虛而行實故聖人教之常使之謹於言而不能不言者亦惟假之以通其意耳出乎意之外非贅則誣也富者欲其瞻也麗者欲其華也皆徒言之弊也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯見賢遍反師樂師瞽者胡氏曰周禮樂師大師皆以師名磬鍾笙鎛韎籥皆曰師冕名胡氏曰如春秋傳所記師筏師慧之類再言某在斯厯舉在坐之人以詔之師冕出子張問曰與師言之道與與平聲聖門學者於夫子之一言一動無不存心省察如此子曰然固相師之道也相去聲相助也古者瞽必有相其道如此蓋聖人於此非作意而為之但盡其道而已輔氏曰夫子相師之際盡夫誠行夫道而已不與焉此亦聖人之庸行也胡氏曰瞽必有相者荀子所謂猶瞽無相春秋傳云其相曰朝也冕之來見適無相者坐必作過必趨哀矜之念乃聖人之素心至此自不能己也故代相者告之使其有相不必如是屑屑然矣尹氏曰聖人處已為人其心一致無不盡其誠故也有志於學者求聖人之心於斯亦可見矣范氏曰聖人不侮鰥寡不虐無告可見於此推之天下無一物不得其所矣季氏第十六洪氏曰此篇或以為齊論胡氏曰洪氏疑此篇為齊論以其皆稱孔子且篇內十四章皆條列而詳備與上下篇不同然亦無他左驗也凡十四章季氏將伐顓臾顓音專臾音俞顓臾國名愚案春秋傳云顓臾風姓也實司太皥與有濟之杞杜注云伏羲之後在泰山南武陽縣東北魯附庸也愚謂附庸者以國事附於大國未能以其名通也冉有季路見於孔子曰季氏將有事於顓臾見賢遍反案左傳史記二子仕季氏不同時此云爾者疑子路嘗從孔子自衛反魯再仕季氏不久而復之衛也愚案魯哀公十年孔子自楚反乎衛十一年魯以幣召之乃歸子路從孔子反魯當在此時十四年小邾射來奔曰使季路要我吾無盟矣使子路子路辭則子路尚在魯也必是此年復之衛次年死於孔悝之難孔子曰求無乃爾是過與與平聲冉求為季氏聚斂尤用事故夫子獨責之夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為夫音扶東蒙山名愚案蒙山在泰山郡蒙隂縣西南今沂州費縣也顓臾在蒙山下先王封顓臾於此山之下使主其祭在魯地七百里之中語録曰問從孟子百里之説則魯安得七百里之地曰如左傳也有一同之説每疑此處若是百里無此間一縣地大如何做得侯國如何又容得顓臾在其中所謂錫之山川土田附庸其勢必不止於百里然此處亦難考究社稷猶云公家是時四分魯國季氏取其二孟孫叔孫各有其一獨附庸之國尚為公臣季氏又欲取以自益故孔子言顓臾乃先王封國則不可伐在邦域之中則不必伐是社稷之臣則非季氏所當伐也輔氏曰不可伐而伐之則不仁不必伐而伐之則不智非當伐而伐之則悖禮犯義一舉而不仁不智無禮無義如此而季氏懵然不知冉有又從而為之辭此聖人所以不得而默也此事理之至當不易之定體而一言盡其曲折如此非聖人不能也輔氏曰聖人會義理之歸達明睿之照則其遇事也雖其曲折肯綮皆軒豁呈露而無所隱遁故其發而為言自然明切周盡如此是豈從事於言語者所能及哉冉有曰夫子欲之吾二臣者皆不欲也夫子指季孫冉有實與謀以孔子非之故歸咎於季氏輔氏曰此亦常情之通病蓋學未至於窮理盡性物我並觀者當此之際未有不歸咎於人以自解釋也然亦安能逃於聖人之照哉孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣任平聲焉於虔反相去聲下同周任古之良史陳布也列位也相瞽者之相也語録曰看扶持兩空恐只是相瞽者之義相夫子亦是贊相之義瞽者之相亦是如此言二子不欲則當諫諫而不聽則當去也且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與兕徐履反柙户甲反櫝音獨與平聲兕野牛也愚謂兕似牛一角青毛其皮堅厚可制鎧交州記謂角長三尺餘形如馬鞭柄柙檻也愚謂檻櫳也一曰圈以藏虎兕櫝匱也言在柙而逸在櫝而毁典守者不得辭其過語録曰虎在山上龜玉在他處不干典守者事今在柙中走了在櫝中毁了便是典守者之過明二子居其位而不去則季氏之惡已不得不任其責也輔氏曰此可見聖人之言委曲詳盡蓋使之以類相況而自得之耳冉有曰今夫顓臾固而近於費今不取後世必為子孫憂夫音扶固謂城郭完固費季氏之私邑此則冉求之飾辭亦可見其實與季氏之謀矣孔子曰求君子疾夫舍曰欲之而必為之辭夫音扶舍上聲欲之謂貪其利丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾寡謂民少貧謂財乏均謂各得其分安謂上下相安季氏之欲取顓臾患寡與貧耳然是時季氏據國而魯公無民則不均矣君弱臣強互生嫌隙則不安矣均則不患於貧而和和則不患於寡而安安則不相疑忌而無傾覆之患或問此一節曰是時季氏據魯國之半而公室無尺地一民之勢不均甚矣不均則臣疑其君而以貧為憂矣憂貧而求富不已則君疑其臣而至於不和矣不和則臣益自疑而常懼於衆少矣憂貧而求衆愈甚則君益疑之而至於不安矣以臣亢君而不安至此則雖欲長保其祭祀而無傾危之患其可得哉必也痛自貶損以復於諸侯千乘大夫百乘之制則均而不患於貧矣君臣輯睦則和而不患於寡矣子孫長久世守職業則安而不至於傾矣此在當時蓋有難顯言者故夫子微辭以告之夫如是故逺人不服則修文德以來之既來之則安之夫音扶內治修然後逺人服有不服則修德以來之亦不當勤兵於逺今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也子路雖不與謀而素不能輔之以義亦不得為無罪故併責之逺人謂顓臾分崩離析謂四分公室家臣屢叛而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也干楯也戈戟也蕭牆屏也言不均不和內變將作其後哀公果欲以越伐魯而去季氏謝氏曰當是時三家強公室弱冉求又欲伐顓臾以附益之夫子所以深罪之為其瘠魯以肥三家也洪氏曰二子仕於季氏凡季氏所欲為必以告於夫子則因夫子之言而救止者冝亦多矣伐顓臾之事不見於經傳其以夫子之言而止也與輔氏曰謝氏得夫子所以深責冉求之意洪氏則又得夫子在當時雖不得位而餘福亦有以及人之事孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣先王之制諸侯不得變禮樂專征伐陪臣家臣也逆理愈甚則其失之愈速輔氏曰聖人見理而不見事且言理則勢在其中此亦尊德性而畏天命之一端也大約世數不過如此輔氏曰聖人渾是義理故理上看得精切如此所謂大約縱有遲速所爭亦不多也天下有道則政不在大夫言不得專政輔氏曰此因上面天下無道禮樂征伐自諸侯出而言之也天下有道諸侯既不變禮樂專征伐則大夫亦豈得而專政哉天下有道則庶人不議上無失政則下無私議非箝其口使不敢言也輔氏曰此其有道之極致大驗也使天下有一人竊議焉則其道猶或慊而人君不可不反求之身也必至於庶人自然不議然後為有道之極此章通論天下之勢胡氏曰此章三舉天下有道言之文不相蒙故曰通論天下之勢孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣夫音扶魯自文公薨公子遂殺子赤立宣公而君失其政歷成襄昭定凡五公逮及也自季武子始專國政厯悼平桓子凡四世而為家臣陽虎所執三桓三家皆桓公之後此以前章之説推之而知其當然也此章專論魯事疑與前章皆定公時語輔氏曰此二章想只是一時之言分章者以前章通論天下之勢後章專論魯事故於其中加孔子曰三字而析為二章爾蘇氏曰禮樂征伐自諸侯出冝諸侯之強也而魯以失政政逮於大夫冝大夫之強也而三桓以微何也強生於安安生於上下之分定今諸侯大夫皆陵其上則無以令其下矣故皆不久而失之也輔氏曰蘇氏解文字説得著處非常好蓋緣他看得文勢出又有筆力發得來精神如此章之説亦其一也陳氏曰魯雖無桓文專征伐之事然征伐亦不無案春秋可見凡征伐皆天子之事非諸侯所冝出則魯亦豈得為無僭者邪孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣便平聲辟婢亦反友直則聞其過友諒則進於誠友多聞則進於明或問三友盡於集注之説而已乎曰是亦釋其文之正意云爾若推而言之則是三者之於人皆有薰陶漸漬之益焉皆有嚴憚畏謹之益焉皆有興起慕效之益焉不但如彼之所言而已也胡氏曰直者責善而無所回護諒者固執而無所更易多聞者有所參訂而不膠偏見故可聞過而進於誠明也言聞過則真有所聞言進於誠明則猶有待於進蓋諒與多聞未足以進於誠明而誠明可由是而入也便習熟也胡氏曰便順適也字書云安也順適且安故云習熟也便辟謂習於威儀而不直善柔謂工於媚説而不諒便佞謂習於口語而無聞見之實三者損益正相反也或問損者之相反奈何曰便辟則無責善之誠矣善柔則無固守之節矣便佞則無貫通之意矣胡氏曰便辟書注以為足恭是也習於威儀則謬為恭敬工於媚説則巧相順從習於口語則取辦於頰舌故損益相反尹氏曰自天子至於庶人未有不須友以成者而其損益有如是者可不謹哉孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣樂五教反禮樂之樂音嶽驕樂宴樂之樂音洛節謂辨其制度聲容之節胡氏曰禮樂皆有自然之節因其節而分别之也驕樂則侈肆而不知節佚遊則惰慢而惡聞善宴樂則淫溺而狎小人三者損益亦相反也或問三者之為益曰君子之於禮樂也講明不置則存之熟是非不謬則守之正存之熟則內有以養其莊敬和樂之實守之正則外有以善其威儀節奏之文與夫道人善而悅慕勉強之意新多賢友而直諒多聞之士集樂是三者而不已焉雖欲不收其放心以進於善亦不可得矣其為益豈不大哉曰損者之相反奈何曰驕樂則不敬不和矣佚遊則忌人之善矣宴樂則憚親勝已矣語録曰問佚遊如何與樂道人之善相反曰樂道人之善則心常汲汲於好善若是佚遊則是放蕩間過了日子雖所損稍輕亦非是小害問樂道人之善則有勉思企及之意佚遊則一向懶惰無向善之心此所以見其相反曰三者如驕樂只是放恣侈靡最害事到得宴樂便須狎近小人疏逺君子黃氏曰三者損益相反集注或問自不同愚嘗拾其遺意而釋之曰節禮樂者欲其循規蹈矩而不敢縱肆也道人善者志於為善以成其身也多賢友者樂於取友以微規正也驕樂者恃氣以陵物則不復循規蹈矩矣佚遊者怠惰而自適則不復志於為善矣宴樂者多欲以求安則不復望人之規正矣此其所以相反也尹氏曰君子之於好樂可不謹哉孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽君子有德位之通稱胡氏曰不亦君子乎以德言也君子學道則愛人以位言也愆過也瞽無目不能察言觀色尹氏曰時然後言則無三者之過矣文集曰聖人此言只是戒人言語以時不可妄發孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得血氣形之所待以生者血隂而氣陽也輔氏曰隂陽之氣塞乎兩間而人所資以為體者也就其體而分之則有氣有血焉氣者陽之為也血者隂之為也而精又氣血之精者也隂陽氣血一而二二而一者也得貪得也隨時知戒以理勝之則不為血氣所使也輔氏曰知者心之用也理者性之藴也血氣者形之資也隨時知戒以理勝之不為血氣所使則心為之宰而性與質各得其分焉是亦一本而已矣范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也少未定壯而剛老而衰者血氣也戒於色戒於鬭戒於得者志氣也君子養其志氣故不為血氣所動是以年彌髙而德彌邵也語録曰到老而不屈者是志氣又曰人之血氣固有強弱然而志氣則無時而衰苟常持得這志縱血氣衰極也不由他輔氏曰人之血氣未定則常動而易流方剛則勇鋭而好勝既衰則收斂而多貪此血氣之變也常動而易流則戒色勇鋭而好勝則戒鬭收斂而多貪則戒得此志氣之常也變者無知常者常覺覺者為主而使無知者不得肆焉此聖賢之學而君子終身之務也孔子曰君子有三畏畏天命畏大人畏聖人之言畏者嚴憚之意也天命者天所賦之正理也知其可畏則其戒謹恐懼自有不能已者而付畀之重可以不失矣語録曰畏天命三字好自理會得道理便謹去做不敢違便是畏之也如非禮勿視聽言動與夫戒謹恐懼皆所以畏天命也然亦須理會得天命是恁他方得問三畏要緊都在畏天命上曰然才畏天命自是於大人聖言皆畏之問固是當畏天命但要緊又須是知得天命即是天理若不先知這道理自是懵然何由知其可畏曰要緊全在知上才知得便自不容不畏大人聖言皆天命所當畏知畏天命則不得不畏之矣語録曰大人不止有位者是指有位有齒有德者皆謂之大人愚謂大人有德位者之稱是天命之所存聖人之言謂方册所載是天命之所發小人不知天命而不畏也狎大人侮聖人之言侮戲玩也不知天命故不識義理而無所忌憚如此尹氏曰三畏者修己之誠當然也小人不務修身誠已則何畏之有孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣困謂有所不通輔氏曰凡心思智慮行止動作有所窒塞而不得通則困之謂也言人之氣質不同大約有此四等或問氣質四等之説曰人之生也氣質之稟清明純粹絶無查滓則於天地之性無所間隔而凡義理之當然有不待學而了然於胸中者所謂生而知之聖人也其不及此者則以昏明清濁正偏純駁之多少勝負為差其或得於清明純粹而不能無少查滓者則雖未免乎小有間隔而其間易達其礙易通故於其所未通者必知學以通之而其學也則亦無不通矣所謂學而知之大賢也或得於昏濁偏駁之多而不能無少清明純粹者則必其窒塞不通然後知學其學又未必無不通也所謂困而學之衆人也至於昏濁偏駁之甚而無復少有清明純粹之氣則雖有不通而懵然莫覺以為當然終不知學以求其通也此則下民而已矣楊氏曰生知學知以至困學雖其質不同然及其知之一也故君子惟學之為貴困而不學然後為下輔氏曰人之氣質不同然及其知之則一者蓋以人性之本善故耳是以君子唯學之為貴學則昏濁者可使清明偏駁者可使純粹惟其昏濁之甚自暴自棄而不自知有學焉此則所謂下愚之民也孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義難去聲視無所蔽則明無不見聽無所壅則聰無不聞語録曰視不為惡色所蔽為明聽不為姦人所欺為聰色見於面者貌舉身而言思問則疑不蓄思難則忿必懲語録曰如一朝之忿亡其身以及其親此不思難之故也思義則得不茍程子曰九思各專其一語録曰不是雜然而思當這一件黃氏曰九思固各專其一然隨其所當思而思焉則亦泛然而無統矣茍能以敬義為主戒懼謹獨而無頃刻之失然後為能隨其所當思而思矣謝氏曰未至於從容中道無時而不自省察也雖有不存焉者寡矣此之謂思誠胡氏曰九者之則義理曉然才思則不差矣故省察則能中道也孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣探吐南反真知善惡而誠好惡之顔曽閔冉之徒蓋能之矣輔氏曰見善如不及則表裏皆好而無一念之不好不患其不為之矣見不善如探湯則表裏皆惡而無一念之不惡不患其或為之矣此唯知至意誠者能之故顔曽閔冉之徒足以當之也語蓋古語也隱居以求其志行義以達其道吾聞其語矣未見其人也求其志守其所達之道也達其道行其所求之志也語録曰隱居以求之使其道充足行義是得時得位而行其所當為臣之事君行其所當為而已行所當為以達其所求之志蓋惟伊尹太公之流可以當之當時若顔子亦庶乎此然隱而未見又不幸而蚤死故夫子言然語録曰如伊尹耕於有莘之野而樂堯舜之道是隱居以求其志及幡然而起使是君為堯舜之君使是民為堯舜之民是行義以逹其道問顔子所造所得伊尹太公恐無以過之而云亦庶乎此下語輕重抑揚處疑若於顔子少貶者曰當時正以事言非論其德之淺深也然語意之間誠有如所論者更俟詳之齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之駟四馬也胡氏曰駟一車之用兩服兩驂也首陽山名胡氏曰首陽山在河東蒲坂縣其斯之謂與與平聲胡氏曰程子以為第十二篇錯簡誠不以富亦祗以異當在此章之首今詳文勢似當在此句之上言人之所稱不在於富而在於異也愚謂富是言有馬千駟異是言餓于首陽古人引詩斷章不必用詩之本指愚謂此説近是而章首當有孔子曰字蓋闕文耳大抵此書後十篇多闕誤陳亢問於伯魚曰子亦有異聞乎亢音剛亢以私意窺聖人疑必隂厚其子對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩事理通達而心氣和平故能言輔氏曰詩本人情該物理故學之者事理通達其為教溫柔敦厚使人不絞不訐故學之者心氣和平事理通達則無昏塞之患心氣和平則無躁急之失此其所以能言他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮品節詳明而德性堅定故能立輔氏曰禮有三千三百之目其序截然而不可亂故學之者品節詳明其為教恭儉乖敬使人不淫不懾故學之者德性堅定品節詳明則義精而事莫之惑德性堅定則守固而物莫之搖此其所以能立愚謂通達詳明以詩禮之義言和平堅定以學詩禮者之效言興與立又其效之著見者也聞斯二者當獨立之時所聞不過如此其無異聞可知陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也逺去聲尹氏曰孔子之教其子無異於門人故陳亢以為逺其子邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人寡寡德謙辭吳氏曰凡語中所載如此類者不知何謂或古有之或夫子嘗言之不可考也愚謂當時諸侯嫡妾不正稱號不審故孔子正言其禮論語纂疏卷八
