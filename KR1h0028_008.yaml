body:
  text: 欽定四庫全書論語纂疏卷五宋趙順孫撰朱子集注子罕第九凡三十章子罕言利與命與仁罕少也程子曰計利則害義命之理微仁之道大皆夫子所罕言也文集曰問計利則害義害義則勿道可矣罕言何也曰有自然之利如云利者義之和是也但專言之則流於貪欲之私耳語録曰命只是一箇命有以理言者有以氣言者天之所以賦與人者是理也人之所以夀夭窮通者是氣也理精微而難言氣數又不可盡委之而至於廢人事故聖人罕言之也仁之理至大數言之不惟使人躐等亦使人有玩之之心蓋舉口便説仁人便自不把當事輔氏曰義者天理之公也利者人欲之私也天理人欲不兩立計於彼則害於此矣又曰命乃天之所賦豫萬物者以理言之則聲臭俱無以氣言之則雜糅難辨是其理為甚微仁乃五性之首所以包乎四德而無物不體是其道為甚大理之微則人有所難識知未及而驟語之則反滋其惑且使之棄人事而不修道之大則人有所難盡德未至而強語之則反起其妄且或使之忽庸行而不謹此夫子所以罕言達巷黨人曰大哉孔子博學而無所成名達巷黨名其人姓名不傳博學無所成名蓋美其學之博而惜其不成一藝之名也子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣執專執也射御皆一藝而御為人僕所執尤卑言欲使我何所執以成名乎然則吾將執御矣聞人譽已承之以謙也輔氏曰承之以謙者庸行也禮之發也唯聖人之發則從容閎肆如此非若常人之暫見而旋隱勉繼而力充之也尹氏曰聖人道全而德備不可以偏長目之也達巷黨人見孔子之大意其所學者博而惜其不以一善得名於世蓋慕聖人而不知者也故孔子曰欲使我何所執而得為名乎然則吾將執御矣文集曰達巷黨人本不知孔子但嘆美其博學而惜其無所成名謂不以一善得名也此言至為淺近然自察邇言者觀之則於此便見聖人道德純備不可以一善名愚夫愚婦可以與知而其所以然者聖人有所不知也故孔子不欲以黨人之所稱者自居而曰必欲使我有所執而成名則吾當執御矣何不以是見名乎子曰麻冕禮也今也純儉吾從衆麻冕緇布冠也胡氏曰麻績麻為布也冕冠上版也謂之緇布冠者染布為赤黑色因以為名也冠者首服之總名冕者冠中之别號純絲也儉謂省約緇布冠以三十升布為之升八十縷則其經二千四百縷矣細密難成不如用絲之省約語録曰八十縷為一升四十秒也古尺一幅只闊二尺二寸如深衣十五升布似如今極細絹一般這處升數又曉未得古尺又短於今尺若盡一千二百縷須是一幅闊不止二尺二寸方得如此胡氏曰禮朝服十五升冠倍之鄭注八十縷為升升字當為登登成也前漢書食貨志周布幅廣二尺二寸程子言古尺當今五寸五分弱則五分有竒為經一百一十縷故細密難成而謂用絲為功省也拜下禮也今拜乎上泰也雖違衆吾從下臣與君行禮當拜於堂下君辭之乃升成拜輔氏曰案燕禮君燕卿大夫之禮也分坐取大夫所酳觶興以酬賔降西階下再拜稽首公命小臣辭賓升成拜鄭注升成拜復再拜稽首也又覲禮天子賜侯氏以車服侯氏拜賜禮亦如之泰驕慢也程子曰君子處世事之無害於義者從俗可也害於義則不可從也輔氏曰君子之於世俗或從或違無適無莫一於義而已以是而違俗則人亦不得以為異也愚謂制度節文之細猶可以隨時至於繫乎三綱五常者歷萬世而不容易也子絶四毋意毋必毋固毋我絶無之盡者毋史記作無是也或問聖人從容中道而有所絶有所毋何也曰絶非屏絶之絶蓋曰無之盡云爾毋無古蓋通用故論語作毋而史記作無然經傳多以無為有無之稱毋為禁止之辭則當以史記為正文集曰此絶字不是絶而不復萌猶曰無爾然必言絶而不言無者見其無之甚也意私意也語録曰意是私意始萌胡氏曰理本於天意出於已大學以誠意為言蓋好善惡惡一有不實則所謂意者為私意意不可以孤行必根於理而後可此獨以意言即私心之發也必期必也語録曰必是期要必行固執滯也語録曰固是滯而不化我私已也語録曰我是但知有我不知有人四者相為終始起於意遂於必留於固而成於我也語録曰意是始我是終必固在中間亦是一節重似一節也又曰意是絲毫我是成一山嶽也又曰意是為惡先鋒我是為惡成就正如四德貞是好底成就處我是惡底成就處蓋意必常在事前語録曰凡起意作一事便有必期之望又曰必是事之未來處胡氏曰二者在方有所作為之先故曰常在事前固我常在事後語録曰固是事之已過處又曰如做一件事不是了即管固執是我做得是胡氏曰二者在已有作為之後故曰常在事後至於我又生意則物欲牽引循環不窮矣語録曰意必固三者只成就得一箇我及至我之根源愈大少問三者又從這裏生出我生意意又生必必又生固又歸宿於我正如元亨利貞元了亨亨了又利利了又貞循環不已愚謂四者分之則各為一事合之則相為終始程子曰此毋字非禁止之辭聖人絶此四者何用禁止輔氏曰絶四是聖人事不思不勉者也張子曰四者有一焉則與天地不相似語録曰人之為事亦有其初未必出於私意而後來不能化去者若曰絶私意則四者皆無則曰子絶一便得何用更言絶四以此知四者又各有一病也輔氏曰天理一貫無意必固我之鑿楊氏曰非知足以知聖人詳視而默識之不足以記此子畏於匡畏者有戒心之謂輔氏曰聖人非若常人妄有畏懼但臨危涉險則戒備之心自不可無匡地名史記云陽虎曾暴於匡夫子貌似陽虎故匡人圍之曰文王既沒文不在兹乎道之顯者謂之文蓋禮樂制度之謂不曰道而曰文亦謙辭也兹此也孔子自謂輔氏曰文即道也但夫子自謙故曰文耳其實文王既沒則道在夫子也天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何喪與皆去聲馬氏曰文王既沒故孔子自謂後死者語録曰後死者是對上文文王言之如曰未亡人之類此孔子自謂也言天若欲喪此文則必不使我得與於此文今我既得與於此文則是天未欲喪此文也天既未欲喪此文則匡人其奈我何言必不能違天害已也輔氏曰此夫子以道自任而與天為一也不因匡人之難也不説到這上天既以斯文付夫子則決非庸人所能害道理必不如此至於微服過宋戒畏於匡則又以盡其理之當然其詳已見第七篇其如豫何章但彼以德言而此以道言也大宰問於子貢曰夫子聖者歟何其多能也大音泰與平聲孔氏曰大宰官名或吳或宋未可知也或問何以言或吳或宋曰當時惟二國有是官鄭氏以為吳而邢疏曰左傳魯哀公會于槖臯吳子使大宰嚭請盟公使子貢辭焉子貢又嘗適吳此鄭氏所據也洪氏曰宋大宰也列子稱商大宰見孔子曰丘聖者與宋商後又都商丘是也二説未知孰是故兩存之但列子多寓言恐或不足據耳與者疑辭大宰蓋以多能為聖也輔氏曰大宰與黨人其論聖人雖不同而其智不足以知聖人則一也惜其無所成名者望聖人之全也疑以多能為聖者待聖人之淺也子貢曰固天縱之將聖又多能也縱猶肆也言不為限量也語録曰天放縱聖人做得恁地不去限量他將殆也謙若不敢知之辭語録曰殆庶幾也如而今説將次胡氏曰將猶相將不定之辭聖無不通多能乃其餘事故言又以兼之輔氏曰聖人氣質清明義理本自昭著而又加以學問之功其於天下之事巨細精粗始終本末蓋無一而不洞曉也多能誠為餘事故子貢言又以兼之子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也言由少賤故多能而所能者鄙事爾非以聖而無不通也輔氏曰以少賤故多能固謙辭也而所能者又鄙事則謙而又謙之辭也雖不居其聖而聖人之實則有不可掩者矣且多能非所以率人故又言君子不必多能以曉之輔氏曰以多能率人則人將徇末而忘本尚才而不務德卒無以入於聖賢之域矣牢曰子云吾不試故藝牢孔子弟子姓琴字子開一字子張衛人試用也言由不為世用故得以習於藝而通之語録曰想見聖人事事會但不見用所以人只見他小小技藝若使其得用便做出大功業來不復有小小技藝之可見矣吳氏曰弟子記夫子此言之時子牢因言昔之所聞有如此者其意相近故并記之子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉叩音口孔子謙言已無知識但其告人雖於至愚不敢不盡耳叩發動也愚謂叩乃叩擊之叩故有發動之意兩端猶言兩頭言終始本末上下精粗無所不盡語録曰兩端猶言頭尾也竭兩端言徹頭徹尾都盡也問此是一言而盡這道理否曰有一言而盡者有數言而盡者如樊遲問仁曰愛人問知曰知人此雖一言而盡推而逺之亦無不盡如子路正名之論直説到無所措手足如子貢問政哀公問政皆纍言而盡但只聖人之言上下本末始終小大無不兼舉輔氏曰終始以事言本末以物言上下以道器言精粗以事理言必言如是而後該括得盡夫子之告人必發動其兩頭而盡告之耳程子曰聖人之教人俯就之若此猶恐衆人以為髙逺而不親也聖人之道必降而自卑不如此則人不親賢人之言則引而自髙不如此則道不尊觀於孔子孟子則可見矣語録曰聖人極其髙大人自難企及若更不俯就則人愈畏憚而不敢進賢人冇未熟處人未甚信服若不引而自髙則人將必以為淺近不足為不是要人尊已蓋使人知斯道之大庶幾竦動著力去做孔子嘗言如有用我者期月而已可也又言吾其為東周乎只作平常間説孟子言如欲平治天下當今之世捨我其誰便説得廣是勢不得不如此尹氏曰聖人之言上下兼盡即其近衆人皆可與知極其至則雖聖人亦無以加焉是之謂兩端如答樊遲之問仁智兩端竭盡無餘藴矣若夫語上而遺下語理而遺物則豈聖人之言哉輔氏曰聖人之言非有意於上下兼盡也蓋其所得之道本末兼該表裏如一言之所發自不能不盡也又以聖人所以告樊遲者明之程子所謂此是徹上徹下語聖人元無二語者皆所謂竭兩端之教也語上而遺下語理而遺物者異端之教也程子論佛氏之學如管窺天只見上去不見四旁者是語上而遺下也又曰言焉無不周遍實則外於倫理者是語理而遺物也子曰鳯鳥不至河不出圖吾已矣夫夫音扶鳯靈鳥舜時來儀文王時鳴於岐山蔡氏曰來儀者來舞而有容儀也河圖河中龍馬負圖伏羲時出易啓蒙曰河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦皆聖王之瑞也已止也張子曰鳯至圖出文明之祥伏羲舜文之瑞不至則夫子之文章知其已矣輔氏曰聖人之道行則文章著見於外禮樂制度之類也故鳯至圖出以兆文明之祥鳯以其文采圖以其卦畫文明之祥不至則夫子之道不行故知其文章已矣子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨齊音咨衰七雷反少去聲齊衰喪服冕冠也衣上服裳下服冕而衣裳貴者之盛服也瞽無目者作起也趨疾行也語録曰作與趨固是敬然敬心之所由發則不同見冕衣裳者敬心生焉而因用其敬見齊衰者與瞽者則衰矜之心動於中而自加敬也或曰少當作坐范氏曰聖人之心哀有喪尊有爵矜不成人其作與趨蓋有不期然而然者尹氏曰此聖人之誠心內外一者也輔氏曰二説互相發聖人之心寂感自然內外如一方其未感也如止水如明鏡一有所感則隨感而應哀有喪哀喪心感也敬愛之心感於內而作趨之容見於外皆自然而然不知其所以然也顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽焉在後喟苦位切鑽祖官反喟嘆聲仰彌髙不可及鑽彌堅不可入在前在後恍惚不可為象此顔淵深知夫子之道無窮盡無方體而嘆之也輔氏曰無窮盡言道之體髙廣而無量也無方體言道之用神妙而不測也惟其體之髙廣無量故竭誠以慕之則苦其彌髙而不可及盡力以研之則苦其彌堅而不可入惟其用之神妙不測故瞻之則若恍然而在前就之則又忽焉而在後無影象之可求無處所之可執此蓋顔子竭誠盡力以求聖人之道而反苦其未甚端的故喟然以嘆其體用之髙妙如此也夫子循循然善誘人博我以文約我以禮循循有次序貌誘引進也博文約禮教之序也言夫子道雖髙妙而教人有序也輔氏曰上既言夫子之道髙妙而已之不可及不可入矣故此復言夫子之教人則循循然有次序善於誘已之進此古人所以貴親炙之也侯氏曰博我以文致知格物也約我以禮克己復禮也語録曰博我以文是要四方八面都見得周匝無遺至於約我以禮又要逼向身已上來無一毫不盡又曰問格物致知是教顔子就事物上理會克己復禮却是顔子有諸已曰格那物致吾之知也便是會有諸已輔氏曰致知格物知之事也克己復禮行之事也所行即是所知非於知之外别有所行也蔡氏曰顔子不説窮理又不説格物只説箇博文蓋文字上該乎理而比之理則尤顯下該乎物而比之物則尤精又曰顔子不説理只説禮便是與復禮之禮同此禮字便有檢束便有規矩準繩若只説理便泛了程子曰此顔子稱聖人最切當處聖人教人唯此二事而已輔氏曰所謂二事亦不過知與行而已欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已卓立貌末無也此顔子自言其學之所至也蓋恱之深而力之盡所見益親而又無所用其力也輔氏曰恱之深欲罷不能也力之盡既竭吾才也所見益親如有所立卓爾也而又無所用其力雖欲從之末由也已也此顔子受聖人教誘以後之所造所得也吳氏曰所謂卓爾亦在乎日用行事之間非所謂窈冥昏默者黃氏曰顔子之見固非後學所可窺測然以其不可窺測也故言之者往往流於恍惚無所據依之地敢於為言者反借佛老之説以議聖人其不敢者則委之於虛無不可測論之域惟吳氏以為亦在日用行事之間者最為切實夫聖人之道固髙明廣大不可幾及然亦不過情性之間動容之際飲食起居交際應酬之務君臣父子兄弟夫婦之常出處去就辭受取舍以至於政事施設之間無非道之寓其所謂髙堅前後者他人於此或未能無纎毫之私或未能達義理之正或未能通權變之宜或未能及從容之妙故仰之但見其髙鑽之但見其堅或前或後而無定所也顔子用力亦不過於博文約禮之間而竭其力則見益精行益熟而於聖人情性動容以至政事施設之類皆有以見其當然之則卓然立乎其間耳初非有深逺不可窮詰之事也程子曰到此地位功夫尤難直是峻絶又大段著力不得語録曰所以著力不得緣聖人不勉而中不思而得了賢者若著力要不勉不思便是思勉了此所以説大段著力不得今日勉之明日勉之勉而至於不勉今日思之明日思之思而至於不思自生而至熟正如寫字一般會寫底固是會初寫底須學他今日寫明日寫自生而至熟自然寫得又曰顔子到這裏也不是大段著力只他自覺得要著力自無所容其力輔氏曰地位指既竭吾才如有所立卓爾之地位也到此地位則其理為至精至微非淺智浮識之所能知疾趨大步之所能至也惟寬以居之勿忘勿助長則不日而化矣夫能為之謂才竭其才則是盡其所能為之才也既已盡其所能為之才則其工夫蓋非才所能及矣此其所以著力不得也陳氏曰前此猶可以用力到此其自大而趨於化自思勉而之不思不勉介乎二者之境所未達者一間非人力所能為矣但當據其所已然從容涵養勿忘勿助至於日深月熟則亦將忽不期而自到而非今日之所預知也楊氏曰自可欲之謂善充而至於大力行之積也大而化之則非力行所及矣此顔子所以未達一間也輔氏曰力行之積是才之所能為也非力行所及則非才之所能為也程子曰此顔子所以為深知孔子而善學之者也輔氏曰嘆其道之髙妙言其教之有序所謂深知夫子也博文約禮欲罷不能既竭吾才如冇所立卓爾雖欲從之末由也已所謂善學夫子也胡氏曰無上事而喟然嘆此顔子學既有得故述其先難之故後得之由而歸功於聖人也髙堅前後語道體也仰鑽瞻忽未領其要也惟夫子循循善誘先博我以文使我知古今達事變然後約我以禮使我尊所聞行所知如行者之赴家食者之求飽是以欲罷而不能盡心盡力不少休廢然後見夫子所立之卓然雖欲從之末由也已是蓋不怠所從必欲至乎卓立之地也抑斯嘆也其在請事斯語之後三月不違之時乎語録曰問程子言到此大段著力不得胡氏又曰不怠所從必欲至乎卓立之地何也曰末由也已不是到此便休了不用力但工夫用得細不似初間用許多粗氣力輔氏曰或問謂胡説最為全備但歸功聖人一句未安蓋此非有所歸功但述其所學之本末而嘆其未能遽至聖人之地耳然集注卒不去此一句者顔子雖無歸功之言然其所以言則亦有歸功之意也又曰古今事變非博文則不知尊所聞行所知非約禮則不能行者之赴家食者之求飽形容得欲罷不能之意出盡心盡力不少休廢然後見夫子所立之卓然是釋既竭吾才如有所立卓爾不怠所從必欲至乎卓立之地是釋雖欲從之末由也已蓋顔子言此非是於可從而不從蓋於其不可從而必欲從之也愚謂此嘆之上初無某事非若夫子因曾點而發嘆故曰無上事先難之故是指仰鑽瞻忽後得是指如有所立卓爾由字是指夫子循循博約矣子疾病子路使門人為臣夫子時已去位無家臣子路欲以家臣治其喪其意實尊聖人而未知所以尊也輔氏曰子路之意以夫子之聖其喪不可以俯同衆人必當有以尊異之而夫子嘗為大夫有家臣矣故欲以家臣治其喪以尊異之也然不知聖人之喪豈以家臣之有無為輕重也哉病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎間如字病間少差也病時不知既差乃知其事輔氏曰病時不知非謂其病而懵也蓋侍御者見夫子之病而不以告也既差則必有可見之迹因而詢之以得其實也故言我之不當有家臣人皆知之不可欺也而為有臣則是欺天而已人而欺天莫大之罪引以自歸其責子路深矣輔氏曰既斥子路以行詐而又自謂其欺天蓋以見義理之不可犯也如此且豫與其死於臣之手也無寧死於二三子之手乎且豫縱不得大葬豫死於道路乎無寧寧也輔氏曰猶詩傳不顯之為顯也大葬謂君臣禮葬死於道路謂棄而不葬又曉之以不必然之故范氏曰曾子將死起而易簀曰吾得正而斃焉斯已矣子路欲尊夫子而不知無臣之不可為有臣是以陷於行詐罪至欺天君子之於言動雖微不可不謹夫子深懲子路所以警學者也楊氏曰非知至而意誠則用智自私不知行其所無事往往自陷於行詐欺天而莫之知也其子路之謂乎子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也韞紆粉反櫝徒木反賈音嫁韞藏也櫝匱也沽賣也子貢以孔子有道不仕故設此二端以問也孔子言固當賣之但當待賈而不當求之耳輔氏曰固當賣之所以釋兩言沽之哉也但當待賈而不當求之所以釋我待賈者也詳味沽之哉沽之哉之辭則見其理固當沽而意則不亟也我待賈者也又言其實以教子貢所以長其善而救其失者至矣此亦子貢始時事觀後來答叔孫武叔陳子禽之問必不尚以孔子出處為疑也范氏曰君子未嘗不欲仕也又惡不由其道士之待禮猶玉之待賈也若伊尹之耕於野伯夷太公之居於海濱世無成湯文王則終焉而已必不枉道以從人衒玉而求售也子欲居九夷東方之夷有九種欲居之者亦乘桴浮海之意或曰陋如之何子曰君子居之何陋之有君子所居則化何陋之有輔氏曰聖人能必居夷之化而不能使其道行於中國則天也子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘闕失次孔子周流四方參互考訂以知其説輔氏曰夫子既以斯文為己任則其周流四方也必當有以參互考訂而知其説胡氏曰聖人雖生知然於聲音節奏必考而後詳必驗而後信在齊聞韶學之三月亦其事也晚知道終不行故歸而正之子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉説見第七篇黃氏曰指發憤忘食之注而言輔氏曰與述而篇第二章之旨同然此則其事愈卑而意愈切矣輔氏曰此章所以警學者使自察於踐履之間不忽於卑近不違於微小之意益深切矣子在川上曰逝者如斯夫不舍晝夜夫音扶舍上聲天地之化往者過來者續無一息之停乃道體之本然也語録曰道體只是道之骨子黃氏曰言道之體段往來不窮如此也然其可指而易見者莫如川流故於此發以示人欲學者時時省察而無毫髮之間斷也語録曰天理流行之妙若少有私欲以間之便如水被些障寨不得恁滔滔地流去又曰才不省察便間斷輔氏曰天理流行無處不然無時或已但隱於人心者不若形於川流者易見人能即此而有發焉則當自強於體察致力於謹獨使之無一息之間斷則庶幾乎不虧其本體矣程子曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗已也是以君子法之自強不息及其至也純亦不已焉語録曰道無本體此四者非道之體也但因此則可以見道之體耳那無聲無臭便是道但尋從那無聲無臭處去如何見得道因有此四者方見得那無聲無臭底所以説與道為體又曰日往月來寒往暑來水流不息物生不窮未是道然無這道便無這箇了有這道方始有這箇既有這箇就上面便可見得道是與道做箇骨子故言與道為體也若説天只如此髙地只如此厚便也無説了須看其所以如此者如何問道無形體却是這物事盛載那道出來故可見與道為體言與之為體也這體字較粗如此則與本然之體微不同曰也便在裏面後面與道為體之體又説出那道之親切底骨子恐人説物自物道自道所以推物以見道其實這許多物事湊合來便都是道之體便在這許多物事上只是水上較親切易見又曰與道為體與那道為形體這體字却粗只是形體之體問猶云性者道之形體否曰然黃氏曰此言體質之體也謂物之可見者皆為道之體質也夫子所云蓋合道器兼體用而言之也輔氏曰自強不息者所謂強仁學者之事也純亦不已者所謂安仁聖人之事也學者須是自強不息不息則久久則天然後可以至於純亦不已之地不然或作或輟若有若亡坐談性命而於知與行不加功焉則沒世窮年終不足以窺聖人之事矣胡氏曰夫子因所見之一物而言程子因夫子之説舉四者而言夫道體可見固不專於水亦不專於四者大而造化之流行近而口鼻之呼吸莫不皆然又曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德便可語王道其要只在謹獨文集曰川流不息天運也純亦不已聖人之心也謹獨所以為不已學者之事也語録曰有天德則便是天理便做得王道無天德則是私意是計較人多無天德所以做王道不成又曰人多於獨處間斷又曰才不謹獨便去隱微處間斷了又曰能謹獨則無間斷而其理不窮若不謹獨便有欲來參入裏面便間斷了如何却會如川流底意輔氏曰人心即天德所寓天地之道常久而不已也則純亦不已非天德而何聖人之心則全具得此天德者也即是而推之便是王道人心天德王道只是一理愚案自此至篇終皆勉人進學不已之辭子曰吾未見好德如好色者也好去聲謝氏曰好好色惡惡臭誠也好德如好色斯誠好德矣然民鮮能之輔氏曰好色惡臭與好德皆出於性然人之常情於好色惡臭則誠實好之惡之至於好德則多虛偽不實故謝氏有此説而又言民鮮能之大凡至誠而好則內外表裏如一而心志容色皆應有不可掩者史記孔子居衛靈公與夫人同車使孔子為次乘招搖市過之孔子醜之故有是言語録曰招搖如翺翔子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也簣求位反覆芳服反簣土籠也書曰為山九仞功虧一簣夫子之言蓋出於此言山成而但少一簣其止者吾自止耳平地而方覆一簣其進者吾自往耳蓋學者自強不息則積少成多中道而止則前功盡棄其止其往皆在我而不在人也輔氏曰其止者非有尼之者也乃吾自止耳其進者非有趣之者也乃吾自往耳反觀內省而自強不息則畏與忽之妄意不萌而為學之始終蓋不待外求而得之矣子曰語之而不惰者其回也與語去聲與平聲惰懈怠也范氏曰顔子聞夫子之言而心解力行造次顛沛未嘗違之如萬物得時雨之潤發榮滋長何有於惰此羣弟子所不及也輔氏曰心解謂知得透徹聞一知十事也力行謂行得至到既竭吾才事也造次顚沛未嘗違之者知得透徹行得至到則非有意於不違而自有所不能違也故譬如萬物得時雨之潤發榮滋長自不知其所以然豈復有懈怠之意哉此羣弟子所不及而顔子所獨到故夫子稱之愚謂解者散也渙然氷釋之意惟其心解所以力行時雨謂及時之雨也萬物正要雨時却得此雨來滋潤自然發榮滋長子謂顔淵曰惜乎吾見其進也未見其止也進止二字説見上章顔子既死而孔子惜之言其方進而未已也子曰苗而不秀者有矣夫秀而不實者有矣夫夫音扶榖之始生曰苗吐華曰秀成榖曰實蓋學而不至於成有如此者是以君子貴自勉也子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已焉知之焉於虔反孔子言後生年富力強足以積學而有待其勢可畏安知其將來不如我之今日乎然或不能自勉至於老而無聞則不足畏矣言此以警人使及時勉學也輔氏曰年富則進學有餘日力強則進學有餘功故足以積學而有待年少而德進業修則未易量而可畏已老而實隕名銷則不足畏而可哀集注謂警人使及時勉學盡之矣曾子曰五十而不以善聞則不聞矣蓋述此意胡氏曰舊説以聞為聞道此説以聞為名聞於世故引曾子之言以證之尹氏曰少而不勉老而無聞則亦已矣自少而進者安知其不至於極乎是可畏也愚謂此章前兩句是勉厲之後兩句是警戒之尹氏先釋後兩句却轉來釋前兩句見勉厲之意重也子曰法語之言能無從乎改之為貴巽與之言能無説乎繹之為貴説而不繹從而不改吾末如之何也已矣法語者正言之也巽言者婉而導之也繹尋其緒也法言人所敬憚故必從然不改則面從而已語録曰如漢武帝見汲黯之直深所敬憚至帳中可其奏可謂從矣然武帝內多欲而外施仁義豈非面從巽言無所乖忤故必説然不繹則又不足以知其微意之所在也語録曰如孟子論好色好貨齊王豈不恱若不知繹則徒知古人所謂好色不知其能使內無怨女外無曠夫徒知古人所謂好貨不知其能使居者有積倉行者有裏糧楊氏曰法言若孟子論行王政之類是也巽言若其論好貨好色之類是也語之而未達拒之而不受猶之可也其或喻焉則尚庶幾其能改繹矣從且説矣而不改繹焉則是終不改繹也已雖聖人其如之何哉輔氏曰從法語説巽言秉彝之性也從而不改者物欲堅強而不能屈就於理説而不繹者志氣昏惰而不能反求諸心耳學之不進德之不修家之不齊國之不治皆由是基之若此之人雖聖人亦莫如之何也已子曰主忠信毋友不如己者過則勿憚改重出而逸其半子曰三軍可奪帥也匹夫不可奪志也侯氏曰三軍之勇在人匹夫之志在己故帥可奪而志不可奪如可奪則亦不足謂之志矣輔氏曰以三軍之勇而衛一人冝若不可奪也然其可奪者勇非在我也以匹夫而守其志冝若可奪也然其不可奪者志非在外也又曰志與意不同意是發動處志是有主處夫子所謂志士仁人有殺身以成仁無求生以害仁其可得而奪乎如可奪則豈足以為志哉子曰衣敝緼袍與衣狐貉者立而不恥者其由也與衣去聲緼紆粉反貉胡各反與平聲敝壞也緼枲著也袍衣有著者也蓋衣之賤者語録曰袍是夾衣有綿作胎底愚謂纊為繭謂今之新綿緼為袍謂今纊及舊絮也云枲著者雜用枲麻以著袍也狐貉以狐貉之皮為裘衣之貴者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之不忮不求何用不臧忮之䜴反忮害也求貪也臧善也言能不忮不求則何為不善乎愚謂忮者嫉人之有而欲害之也求者恥已之無而欲取之也是皆為外物之所纍者也能於外物一無所纍焉則何往而不善哉此衛風雄雉之篇孔子引之以美子路也吕氏曰貧與富交強者必忮弱者必求子路終身誦之子曰是道也何足以臧終身誦之則自喜其能而不復求進於道矣故夫子復言此以警之語録曰所謂終身誦之亦不是他矜伐只是將這箇做好底事終身誦之要常如此便别無長進矣輔氏曰子路因夫子之言而深得其味故終身誦之此一句乃後人追書之辭義理無窮此特一事之善若遽自以為喜則不復求進於道蓋喜心生於自足而怠心生於自喜故夫子又言此以警之謝氏曰恥惡衣惡食學者之大病善心不存蓋由於此子路之志如此其過人逺矣然以衆人而能此則可以為善矣子路之賢冝不止此而終身誦之則非所以進於日新也故激而進之輔氏曰夫子嘗言士志於道而恥惡衣惡食者未足與議也正以其善心不存而以外物為重也故謝氏以為學者之大病學者須先去得此病然後可以有進夫不忮不求何用不臧詩人賦之夫子取之非不善也但衆人能此則足以為善若向上一等人如子路之剛決強於進道當日日新又日新可也而遽以此自足焉則未盡善也又激而進之子曰歲寒然後知松柏之後雕也范氏曰小人之在治世或與君子無異惟臨利害遇事變然後君子之所守可見也輔氏曰小人之在治世或被化而強於為善或畏威而覬其免罪故其迹或與君子無異也臨利害遇事變則強於為善者或汨於欲而忘其勉強之心則惟利之趨覬於免罪者或乘其變而以為罪之未必及已則放僻邪侈故其真情發露而不可掩唯成德之君子則素其位而行雖造次顛沛未嘗違也故其所守然後可見胡氏曰小人在治世或與君子無異者猶春夏之交萬物青蔥雖有堅脆之不齊然未可辨也及事變之來小人則隨時變遷君子則所守不易非死生禍福可得而移亦猶重隂沍寒生意憔悴而松柏獨蒼然不變謝氏曰士窮見節義世亂識忠臣欲學者必周于德輔氏曰物之受於天者獨正故能不雕於歲寒人之得於天者必周故能不變於邪世愚謂臨利害遇事變此是兩事士窮見節義以利害言世亂識忠臣以事變言子曰知者不惑仁者不憂勇者不懼明足以燭理故不惑語録曰直是見得分曉故不惑理足以勝私故不憂語録曰仁者通體是理無一點私心事之來者雖無窮而此之應者各得其度何憂之有胡氏曰理公而欲私迭為勝負公理而不能勝私欲則憂患多端亦或未免惟仁者至公無私與理為一理所當然則貧賤夷狄患難皆素其位而行無往而不自得兹其所以不憂也氣足以配道義故不懼語録曰孟子説配義與道無是餒也今有見得道理分曉而反懾怯者氣不足也胡氏曰勇而謂氣足以配道義者配則合而有助之意如隂配陽也有義理之勇有血氣之勇氣本粗厲惟配乎道義則為道義之助而可以言勇所謂不懼者非悍然不顧也主乎義理而言故以配道義明之此學之序也輔氏曰仁智勇德之序也智仁勇學之序也仁者智之統體故論德則以仁為先智者仁之根柢故論學則以智為首勇則仁智之發也故皆在後言之未能仁智而勇則血氣之為耳子路之勇猶未免此故夫子常抑之若曾子之勇是乃仁智之發也蓋學之序不惑而後不憂不憂而後不懼德之序不憂則自然不惑不惑則自然不懼子曰可與共學未可與適道可與適道未可與立可與立未可與權可與者言其可與共為此事也程子曰可與共學知所以求之也可與適道知所往也可與立者篤志固執而不變也權稱錘也所以稱物而知輕重者也可與權謂能權輕重使合義也輔氏曰知所求然後有所往知所往然後有所立立則自家已到那裏在上面立地了事物不足以搖奪之然後可以用權不然則所謂權者是乃無忌憚者之所為耳所謂篤志固執而不變者亦非是強勉著意者之所為乃知得深行得到立得定自然而然也又曰權與物鈞而生衡而銖兩斤鈞皆著於衡物加於衡之首而權移於衡之尾故能知其輕重也又曰學至於可與立則足踏實地而物欲利害不足以轉移之其應經事固無留難矣至於遇變事則又須審度輕重以處之雖千變萬化而不失乎時措之冝然後為可與權也楊氏曰知為己則可與共學矣學足以明善然後可與適道信道篤然後可與立知時措之冝然後可與權文集曰問篤信是好學以前事既篤信然後能好學也今此於既學適道之後却言篤信何也恐信字徹首徹尾不可分先後知篤信而後好學者方只信得箇大槩既學之後而又信道篤者是真知而信之所信意味自不同其言各有主而此章所引篤字又應立字為切否曰信道篤三字誠有未盡善者輔氏曰學本為己故知為己則可與共學矣學而能明乎善則可與適道信道篤即用程子前説意蓋見得那正當底道理分明了信得篤實而不為事物所遷惑故可與立至於能立然後可與之用權洪氏曰易九卦終於巽以行權權者聖人之大用未能立而言權猶人未能立而欲行鮮不仆矣輔氏曰洪氏甚言夫用權之難未能立而欲行之喻雖若寬而實切茍未至於可與立而欲權以應變未有能免者也永嘉陳氏曰舉易一語見權者聖人之終事易之陳九卦凡二十七節道理最末梢一語方以權終之見得不可驟語也程子曰漢儒以反經合道為權故有權變權術之論皆非也權只是經也自漢以下無人識權字語録曰權與經固是兩義然論權而全離乎經則不是蓋權是不常用底物事如有人之病熱病者當服涼藥冷病者當服熱藥此是常理然有時有熱病而却用熱藥去發他熱病者亦有冷病者却用冷藥發他冷病者此皆是不可常用者然須是下得是方可若有毫釐之差便至於殺人不是則劇然若用得是便是少他不得便是合用這箇物事既是合用兹權也正所以為經也大抵漢儒説權是離了箇經説伊川説權便道權只在經裏面又曰權者乃是到這田地頭道理合恁地做故雖異乎經而實亦經也且如冬月便合著綿向火此是經忽然一日暖則亦須使扇當風此便是權伊川謂權只是經意亦如此但説經字太重若偏了漢儒反經合道之説却説得經權兩字分曉他説權遂謂反了經一向入於變詐則非矣又曰程子將經做箇大底物事經却包得那箇權此説本好只是據聖人説可與立未可與權須是還他是兩箇字經自是經權自是權若如伊川説便用廢了那權字始得只是雖是權依舊不離那經權只是經之變須是曉得孔子説又曉得伊川説方得愚案先儒誤以此章連下文偏其反而為一章故有反經合道之説程子非之是矣然以孟子嫂溺援之以手之義推之則權與經亦當有辨語録曰經自經權自權但經有不可行處而至於用權此權所以合經也如湯武事嫂溺則援事常如風和日暖固好變如迅雷烈風若無迅雷烈風則都旱了不可以為常黃氏曰程子言權只是經集注云權經亦當有辨是各有所發明也權變也常者一定之理變者隨時之冝遇事之常則但當守一定之理遇事之變則不得不小有移易以就夫權此權經不可無辨集注之説然也然天下之理惟其當然而已當經而經當然也當權而權亦當然也則權雖異於經而以其當然則亦只是經此程子之説然也有集注之説則經權之義始明有程子之説則經權之義始正先儒明道之力至是而始備矣唐棣之華偏其反而豈不爾思室是逺而棣大計反唐棣郁李也文集曰論語及詩召南作唐棣小雅作常棣無作棠者而小雅常字亦無唐音爾雅又云唐棣棣常棣移則唐棣常棣自是兩物而夫子所引非小雅之常棣矣偏晉書作翩或問偏之為翩曰非獨晉史為然也角弓之詩固有翩其反矣之句矣而漢武之賦所謂偏何姍姍其來遲説者以姍姍為行貌則亦以翩為偏字也然則反亦當與翻同言華之搖動也語録曰言其花有翩反飛動之意而語助也此逸詩也於六義屬興上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也子曰未之思也夫何逺之有夫音扶夫子借其言而反之蓋前篇仁逺乎哉之意輔氏曰此篇自子在川上章以從皆勉人進學之意此章借詩人之言而反之雖不明言其所謂是亦勉人進學之意必矣而聖門論學大率以仁為本故知其與仁逺乎哉之意同也程子曰聖人未嘗言易以驕人之志亦未嘗言難以阻人之進但曰未之思也夫何逺之有此言極有涵蓄意思深逺輔氏曰是理之在人以為易知乎則精深微妙未易可知也以為難知乎則其天然之理本自不隱也若言其易則驕人之志而不肯下堅苦之功若言其難則阻人之進而遂生其怠惰之意但曰未之思也夫何逺之有則只是平鋪地道著無一毫助長益生之意所以極有涵蓄意思深逺極有涵蓄者該道體之微顯進學者之工夫皆寓其中意思深逺者令人涵泳之但覺意味淵永無有窮盡也非聖人之言疇克爾哉鄉黨第十楊氏曰聖人之所謂道者不離乎日用之間也故夫子之平日一動一靜門人皆審視而詳記之胡氏曰道有體有用體常隱而不見用常見而不隱所謂體者大本大原是也所謂用者大而治國平天下小而見於一身者是也然大本大原在學者真積力久然後能默識而心解至於治國平天下又必得時得位而從可見惟容色言動凡見於一身者乃日用之常可以詳視審記而為入道之端也此記録之詳所以為善學歟聖人自體而達諸用由乎內以應乎外也學者因用以全其體制乎外以養其中也及其成功一也此夫子一動一靜所當深體也楊氏所謂道不離日用正夫子所謂吾無行而不與二三子者學者能於用處致謹則功夫實而全體可以由是而得茍未識其用而妄意全體則徒起料想臆度之意終無所益也尹氏曰甚矣孔門諸子之嗜學也於聖人之容色言動無不謹書而備録之以貽後世今讀其書即其事宛然如聖人之在目也雖然聖人豈拘拘而為之者哉蓋盛德之至動容周旋自中乎禮耳學者欲潛心於聖人冝於此求焉輔氏曰聖人之道無精粗無本末大至於平天下治國家立經陳紀制禮作樂小至於容貌辭色一動一靜皆自此廣大心中流出但愈細則愈密愈近則愈實故鄉黨一篇記聖人之容貌辭色如是之詳且悉者正所以示聖學之正傳以垂教於後世也若夫語上而遺下語理而遺物窮髙極逺馳心於無為之際而於吾身之言動事物之倫理懵不加察焉則是異端之學豈聖人之道哉舊説凡一章今分為十七節孔子於鄉黨恂恂如也似不能言者恂相倫反恂恂信實之貌或問恂恂曰以詩書訓詁考之冝為信實然亦有溫恭之意似不能言者謙卑遜順不以賢知先人也輔氏曰似不能言者所以形容信實之意大凡人才信實則言自簡默況聖人之表裏如一者乎謙卑遜順不以賢智先人即溫恭之意也鄉黨父兄宗族之所在故孔子居之其容貌詞氣如此其在宗廟朝廷便便言唯謹爾朝直遙反下同便旁連反便便辨也輔氏曰便便其言明正之意故以為辨宗廟禮法之所在輔氏曰古人行禮多在宗廟之中而典籍亦藏於是焉故也朝廷政事之所出言不可以不明辨故必詳問而極言之胡氏曰在宗廟而明辨則可以識制度文物之精微升降揖遜之委折在朝廷而明辨則上之所布者不悖於理下之所受者不被其害但謹而不放爾胡氏曰聖人雖不容不言亦未嘗輕言也此一節記孔子在鄉黨宗廟朝廷言貌之不同朝與下大夫言侃侃如也與上大夫言誾誾如也侃苦旦反誾魚巾反此君未視朝時也胡氏曰以下文君在互觀之知為君未視朝時也既視朝則不當與大夫言矣王制諸侯上大夫卿下大夫五人胡氏曰禮記王制上大夫卿又云大國三卿下大夫五人今合此二節以為上大夫下大夫之别也案夫子初仕為中都宰由宰為司空又為大司寇皆上大夫也則上大夫其同列也下大夫在已下者許氏説文侃侃剛直也輔氏曰謂能守理義而無所回屈誾誾和恱而諍也語録曰和恱則不失事上之恭諍則又不失在我義理之正又曰和恱終不成一向放倒了到合辨别處須辨别始得陳氏曰先言和恱後言諍和恱者事長順也諍則不詭隨矣君在踧踖如也與與如也踧子六反踖子亦反與平聲或如字君在視朝也踧踖恭敬不寧之貌輔氏曰二字皆從足蓋心懼而立不安也與與威儀中適之貌輔氏曰踧踖雖是恭敬不寧與與又却威儀中適此所以為聖人也若作去聲讀則禮易失於離胡氏曰中者不至於過適者當其可張子曰與與不忘向君也亦通輔氏曰恭敬不寧如此而意又不忘向君亦非聖人不能也此一節記孔子在朝廷事上接下之不同也君召使擯色勃如也足躩如也擯必刃反躩驅若反擯主國之君所使出接賓者輔氏曰此見儀禮所以接賓者盡人主之禮意而欲賓之無違於禮也勃變色貌躩盤辟貌皆敬君命故也輔氏曰勃如顔色之變躩如容止之變也心敬於中則容變於外自然之符也聖人固未嘗不敬但君命之臨則敬心愈至耳陳氏曰盤辟乃盤旋曲折之意揖所與立左右手衣前後襜如也襜赤占反所與立謂同為擯者也擯用命數之半如上公九命則用五人以次傳命語録曰古者擯介之儀甚煩如九命擯五人介則如命數是九人賓主相見自擯以下列兩行行末相近如主人説一句主人之擯傳許多擯者訖又交過末介傳中介直至賓之上介方聞之賓輔氏曰此亦見儀禮揖左人則左其手揖右人則右其手語録曰揖右人傳命出也揖左人傳命入也輔氏曰如賓自南而丘則居東者在賓之右而賓在其左故用左手以揖賓居西者在賓之左而賓在其右故用右手以揖賓如此然後兩相向也襜整貌輔氏曰言其衣之前後襜如其齊整也趨進翼如也疾趨而進張拱端好如鳥舒翼輔氏曰凡人疾走則手易散臂易掉今疾趨而進而張拱端好如鳥舒翼所謂造次不違是也賓退必復命曰賓不顧矣紓君敬也語録曰古者賓退主人送出門外設兩拜賓更不顧而去國君於列國之卿大夫亦如此此一節記孔子為君擯相之容黃氏曰色勃足躩被命之初也揖也趨進也行禮之際也賓退禮畢之後也皆天理之節文所當然也至於揖之左右衣之前後手之翼如皆禮文之至末者聖人於此動容周旋無不中禮盛德之至從心所欲不踰矩也入公門鞠躬如也如不容鞠躬曲身也公門髙大而若不容敬之至也輔氏曰髙大則冝無所不容矣今以眇然之身入之而如不容焉則心小而敬謹可知矣立不中門行不履閾閾于逼反中門中於門也謂當棖闑之間君出入處也或問中門之説曰疏門中有闑兩旁有棖中門謂棖闑之中然則門之左右扉各有中所謂闔門左扉立于其中是也語録曰棖如今衮頭相似闑當中礙門者今城門有之古人常掩左扉人君多出在門外見人當闑棖之間為君位胡氏曰中門右扉之中也君出入則由右扉棖闑之中故亦謂之中也閾門限也禮士大夫出入君門由闑右不踐閾語録曰只是自外入右邊門中乃君出入之所闑如一木柱門如今人多用石墩當兩門中臣傍闑右邊出入此右字自內出而言謝氏曰立中門則當尊行履閾則不恪輔氏曰當尊不恪皆非敬之事也過位色勃如也足躩如也其言似不足者位君之虛位輔氏曰不言君但言位則知為君之虛位矣胡氏曰言過則虛可知矣謂門屏之間語録曰如今人廳門之內屏門之內似周禮所謂外朝也又曰屏者乃門間蕭墻也今殿門亦設之人君寧立之處所謂寧也語録曰古者朝會君臣皆立君雖不在過之必敬不敢以虛位而慢之也言似不足不敢肆也攝齊升堂鞠躬如也屏氣似不息者齊音咨攝摳也齊衣下縫也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也或問升堂攝齊則手無所執與曰古者君臣所執五玉三帛二生一死皆以為贄而已笏則搢之用以記事而已不執之以為儀也宇文周復古乃不修贄而執笏於是攝齊鞠躬之禮廢升堂而蹴齊者多矣語録曰攝齊者是畏謹恐上階時踏著裳有顛仆之患愚謂古者諸侯之堂七尺尺一級使裳之齊去地尺則升階不躡也屏藏也息鼻息出入者也近至尊氣容肅也輔氏曰鼻息出入人所不能無也但心敬則氣肅其息微細自不覺其出入一似不息者耳出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也陸氏曰趨下本無進字俗本有之誤也或問何以知無進字曰降而盡階則為趨而退矣不得復有進字也等階之級也逞放也漸逺所尊舒氣解顔輔氏曰升則肅降則舒氣之有張弛也怡怡和説也沒階下盡階也趨走就位也復位踧踖敬之餘也語録曰若衆人到末梢便撒了聖人則始乎敬終乎敬故到末梢又整頓輔氏曰敬謹乃聖人之庸德豈以事之訖而遽忘哉胡氏曰初則身如不容次則言似不足又次則氣似不息君愈近則敬愈加也至於舒氣解顔若少放矣而踧踖餘敬久猶未忘則聖人之所以存心也可知矣此一節記孔子在朝之容黃氏曰此記在朝之容有五節入門事之始也門君之門也望其門如見君焉鞠躬不中門不履閾卑巽之至也過君之位則真若君在矣色勃足躩言似不足恭敬之至也升堂則君之堂也則其卑巽如入門升而見君也則其恭敬甚於過位既見而下階也則且喜且幸而氣少舒矣沒階而將復已之位則為之修容焉其復位也追思其見君也慊然若有過焉則又不容於不盡其敬也執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循勝平聲蹜色六反圭諸侯命圭聘問鄰國則使大夫執以通信或問命圭曰古者諸侯受封天子授之以圭以為瑞節語録曰圭自是贄見通信之物只是捧至君前胡氏曰聘禮云賓襲執圭公側襲受圭于中堂此聘必執圭也如不勝執主器執輕如不克敬謹之至也輔氏曰一圭之重能有幾何豈有不勝之理但敬謹之至容儀一似不勝者耳上如揖下如授謂執圭平衡手與心齊髙不過揖卑不過授也或問上如揖下如授曰儀禮有受如爭承下如送之意與此同禮有執國君之器則平衡之説而左氏記子貢譏定公邾子執玉髙卑容有俯仰故以此但為奉之平衡不髙不卑之意於義為安也文集曰問既曰平衡而又有上下莫是心與手齊如步趨之間其手微有上下但髙不至過揖下不至過授否曰得之語録曰舊説謂上階之上下階之下但此方説升堂時其容如此既升堂納圭於君前則不復執之以下堂矣所以只用平衡之説戰色戰而色懼也蹜蹜舉足促狹也輔氏曰色懼而足狹亦容儀之相應也如有循記所謂舉前曳踵言行不離地如緣物也語録曰問若有贄及執圭則升堂有不必摳衣但防其不及攝齊否曰執圭而升則足蹜蹜如有循自不至攝齊矣又曰緣手中有圭不得攝齊亦防顛仆也享禮有容色享獻也既聘而享用圭璧有庭實語録曰聘但以圭至享則更用圭璧庭實有容色和也儀禮曰發氣滿容語録曰聘是初見時故其意極於恭肅既聘而享則用圭璧以通信有庭實以將意比聘時漸紓也私覿愈愈如也私覿以私禮見也語録曰聘有享禮乃其君之信私覿則聘使亦有私禮物與所聘之國君及其大臣愈愈則又和矣輔氏曰執圭則身容手足各有其則享則既和而私覿又和焉聖人之動無不時也此一節記孔子為君聘於鄰國之禮也黃氏曰此言出使有三節執圭禮之正也享禮則稍輕私覿則又輕矣故其容節不同如此朝氏曰孔子定公九年仕魯至十三年適齊其間絶無朝聘往來之事疑使擯執圭兩條但孔子嘗言其禮當如此爾語録曰問夾谷之會孔子相恐即擯相之相曰相自是相擯自是擯相是相其禮儀擯是傳道言語擯用命數之半是以次傳説君子不以紺緅飾紺古暗反緅側由反君子謂孔子紺深青揚赤色齊服也語録曰紺即今深底鴉青色又曰揚浮也緅絳色語録曰絳是淺紅色三年之喪以飾練服也飾領緣也文集曰齊服用絳三年之喪既期而練其服以緅為飾語録曰問練服是小祥後喪服如何用絳色以為飾曰便是不可曉此箇制度差異紅紫不以為褻服紅紫間色不正或問色有正間曰青赤黃白黑五方之正色也以木克土則青黃合而成緑以金克木則白青合而成碧以火克金則赤白合而成紅以水克大則黑赤合而成紫以土克水則黃黑合而成駵此五方之間色也且近於婦人女子之服也語録曰問古人婦人女子多以紅紫為服否曰此亦不可知但據先儒如此説耳褻服私居服也言此則不以為朝祭之服可知輔氏曰朝祭之服禮服也當暑袗絺綌必表而出之袗單也葛之精者曰絺粗者曰綌表而出之謂先著裏衣表絺綌而出之於外欲其不見體也輔氏曰袗絺綌為暑也乃又為裏服表之使出於外不欲見其體膚聖人處事大抵如此與直情徑行惟欲是徇者豈直天淵之不同哉詩所謂蒙彼皺絺是也詩傳曰蒙覆也皺絺絺之蹙蹙者緇衣羔裘素衣麑裘黃衣狐裘麑研奚反緇黑色羔裘用黑羊皮麑鹿子色白狐色黃衣以裼裘欲其相稱胡氏曰古者衣裘不欲其文之著必加單衣以覆之然亦欲其色之相稱玉藻所謂羔裘元衣以裼之是也愚謂裘之上必加衣為裼緇衣羔裘是諸侯君臣日視朝之服素衣麑裘視朔之服卿大夫士亦然受外國聘享亦然黃衣狐裘則大蠟之祭服也褻裘長短右袂長欲其溫短右袂所以便作事愚謂此私家所著之裘長之者主溫也袂是裘之袖短右袂者作事便也必有寢衣長一身有半長去聲齊主於敬不可解衣而寢又不可著明衣而寢故别有寢衣其半蓋以覆足程子曰此錯簡當在齊必有明衣布之下愚謂如此則此條與明衣變食既得以類相從而褻裘狐貉亦得以類相從矣狐貉之厚以居狐貉毛深溫厚私居取其適體愚謂此在家接賓客之裘居家主溫故厚為之去喪無所不佩夫上聲君子無故玉不去身觽礪之屬亦皆佩也輔氏曰凡佩玉所以比德固不可舍其他如觽礪之屬亦所當有事而不可闕者故唯居喪則可去去喪則無所不佩也蔡氏曰案玉藻云古之君子必佩玉右徵角左宫羽凡帶必有佩玉唯喪則否佩玉有衝牙君子無故玉不去身君子於玉比德焉孔子佩象環五寸而綦組綬此是明去喪則佩但曰無所不佩則又不止於玉耳又案內則子事父母左右佩用左佩紛帨刀礪小觽金燧右佩玦捍管遰大鐫木燧鐫貌如錐以象骨為之礪礱也皆所以備尊者使令也此是明無所不佩但去喪之時恐不同子事父母之時耳非帷裳必殺之殺去聲朝祭之服裳用正幅如帷要有襞積而旁無殺縫文集曰帷裳如今之裙是也襞積即是摺處爾輔氏曰禮服取其方正故裳用正幅如帷也裳用正幅而人身之要為小故於要之兩旁為襞積即今之衣摺也其餘若深衣要半下齊倍要則無襞積而有殺縫矣文集曰問襞積恐若今裙製近要有殺也要半下謂近要者狹半放下面齊也齊倍要謂向下者闊倍於上面要也不知旁無殺縫如何恐是深衣之制裳下面是裁布為之近要者殺從其小以就半下之法所以旁有殺縫也曰帷裳如今之裙是也襞積即是摺處耳其幅自全安得謂近要者有殺縫邪輔氏曰其餘則舉其最重者如深衣則他可知矣衣半下齊倍要衣半當要而窄小則束身故不必作摺下齊倍要則當有殺縫也胡氏曰裳之如帷者上衣之裳皆然惟深衣則以布幅斜裁而易置之下齊倍於要三之一不為襞積愚謂要半下是一句取深衣篇要縫半下之語齊倍要是一句取玉藻縫齊倍要之語羔裘玄冠不以弔喪主素吉主玄弔必變服所以哀死輔氏曰誠於哀死故內外如一也胡氏曰吉凶異服故色之黑者不以弔吉月必朝服而朝吉月月朔也孔子在魯致仕時如此輔氏曰若未致仕之時此乃常禮有不必記焉此一節記孔子衣服之制胡氏曰齊服練服之色不以為飾惡其雜也間色雖常服不用惡其不正也暑服亦必有裏衣懼其褻也衣裘同色欲其稱也褻裘長短狐貉溫厚取其適也喪除而佩復其常也裳有所殺循其舊也吉凶異服欲其别也事君之禮不可廢也衣身之章也細微必謹聖人之常也蘇氏曰此孔氏遺書雜記曲禮非特孔子事也齊必有明衣布齊側皆反齊必沐浴浴竟即著明衣所以明潔其體也以布為之語録曰明衣即是箇布衫長一身有半欲以蔽足耳此下脫前章寢衣一簡齊必變食居必遷坐變食謂不飲酒不茹葷語録曰葷是不食五辛又曰今致齊有酒非也但禮中亦有飲不至醉之説遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變常以盡敬輔氏曰變食以致潔遷坐以易常君子致敬無所不用其至也豈簡細故一思慮而已哉食不厭精膾不厭細食音嗣食飯也精鑿也語録曰是插教那米白著牛羊與魚之腥聶而切之為膾食精則能養人膾粗則能害人不厭言以是為善非謂必欲如是也輔氏曰以是為善理也必欲如是欲也循理者無過求徇欲則無所不至矣食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食食饐之食音嗣饐於冀反餲烏邁反飪而甚反饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡未敗而色臭變也飪烹調生熟之節也不時五榖不成果實未熟之類此數者皆足以傷人故不食輔氏曰言此以例其餘也失烹調生熟之節則是人力有所未至也五榖不成果實未熟則是天時有所未至也失烹調生熟之節而不食則凡人力有所未至者皆不可食可知矣五榖未成果實未熟而不食則凡天時有所未至者皆不可食可知矣割不正不食不得其醬不食割肉不方正者不食造次不離於正也漢陸續之母切肉未嘗不方斷蔥以寸為度蓋其質美與此暗合也食肉用醬各有所冝不得則不食惡其不備也文集曰如魚鱠不得芥醬麋腥不得醢醬則不食謂其不備或傷人也此二者無害於人但不以嗜味而茍食耳輔氏曰食饐而餲以下數者之不食不使害於身也此二者不食不使慊於心也不正不備而亦食焉則是嗜味而茍食也肉雖多不使勝食氣惟酒無量不及亂食音嗣量去聲食以榖為主故不使肉勝食氣輔氏曰食以榖為主肉為輔不使肉氣勝榖理之冝也而徇欲者常失之聖人肉雖多而不使勝食氣安於禮節不待勉強而然也酒以為人合歡故不為量但以醉為節而不及亂耳輔氏曰酒以為人合歡而人之飲量各不同故不預為之量而以醉為節而又不及於亂此亦聖人從心所欲不踰矩之一端程子曰不及亂者非唯不使亂志雖血氣亦不可使亂但浹洽而已可也輔氏曰志一則動氣氣一則動志故二者皆不可使亂不知其秩志亂也屢舞躚躚氣亂也至於沈湎淫佚則志與氣交亂也沽酒市脯不食沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意輔氏曰聖人衛生之嚴也不撤薑食薑通神明去穢惡故不撤輔氏曰聖人養生之周也不多食適可而止無貪心也輔氏曰當食者不去可食者不多惟理是從所欲不存也祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸即頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也但比君所賜胙可少緩耳文集曰若出三日則人將不食而厭棄之非所以敬神惠也輔氏曰此皆敬鬼神之心但於其中又自有隆殺耳公胙冝速均於人故不敢宿不慮其壞而然也家之祭肉雖可少緩亦不敢久留以致敗食不語寢不言答述曰語自言曰言或問言語有别乎曰食對人寢獨居故即其事而言之也范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺為氣主而聲出焉寢食則氣窒而不通語言恐傷之也亦通雖疏食菜羮瓜祭必齊如也食音嗣陸氏曰魯論瓜作必古人飲食每種各出少許置之豆間之地以祭先代始為飲食之人不忘本也齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也或問瓜之為必曰既曰疏食菜羹矣而又以瓜繼之則不辭矣曰必祭則明無不祭之食也曰必齊如則明無不敬之祭也此一節記孔子飲食之節黃氏曰飲食以養生故欲其精然亦能傷生故惡其敗至於失節違理縱欲敗德無不致其謹焉聖人一念之微莫非天理學者不可以不戒也謝氏曰聖人飲食如此非極口腹之欲蓋養氣體不以傷生當如此然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也輔氏曰養氣體不以傷生聖人飲食之正也窮口腹以快其欲常人飲食之流也席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處輔氏曰形於外者雖小不正不處則存於中者密矣鄉人飲酒杖者出斯出矣杖者老人也六十杖於鄉未出不敢先既出不敢後輔氏曰鄉黨尚齒而敬老故其出一視老者以為節鄉人儺朝服而立於阼階儺乃多反儺所以逐疫周禮方相氏掌之阼階東階也儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也輔氏曰儺以驅疫雖近於戲然我以為有則有矣故必盡其誠敬以臨之或曰恐其驚先祖五祀之神欲其依己而安也語録曰問子孫之精神即祖考之精神故祖考之精神依於己若門庭户竈之屬吾身朝夕之所出處則鬼神亦必依己而存曰一家之主則一家之鬼神屬焉諸侯守一國則一國鬼神屬焉天子有天下則天下鬼神屬焉看來為天子者這一箇神明是多少大如何有些子差忒得若縱欲無度天上許多星辰地下許多山川如何不變怪此一節記孔子居鄉之事問人於他邦再拜而送之拜送使者如親見之敬也語録曰古人重此禮遣使者問人於他邦則主人拜而送之從背脊後拜輔氏曰使者所以將我之命往見其人拜而送之則如親見其人矣不以逺而廢敬也康子饋藥拜而受之曰丘未逹不敢嘗范氏曰凡賜食必嘗以拜藥未達則不敢嘗受而不飲則虛人之賜故告之如此然則可飲而飲不可飲而不飲皆在其中矣或問范氏之説曰古者賜之車則乘以拜賜之衣服則服以拜賜之飲食則嘗而拜之蓋今未達故不敢嘗而拜耳已而達焉則可飲而飲不可飲而不飲皆在其中矣楊氏曰大夫有賜拜而受之禮也未達不敢嘗謹疾也必告之直也胡氏曰孟子謂大夫有賜於士不得受於其家此必拜其賜之禮也未達者所用之品所療之病皆不知也一有不冝則疾生焉聖人謹疾不敢嘗也受之以禮而告之以實此一節記孔子與人交之誠意廏焚子退朝曰傷人乎不問馬非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜理當如此君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之食恐或餕餘故不以薦正席先嘗如對君也或問聖人席不正不坐矣豈必君賜食而後正之邪曰席固正矣將坐而又正焉所以為禮也曲禮主人既迎賓則請入為席矣賓既升堂主人則又跪正席夫豈先為不正之席至此然後正之哉蓋敬謹之至耳言先嘗則餘當以頒賜矣腥生肉熟而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也輔氏曰所賜既殊所處亦異如鑑照形毫釐不差此聖人之時中也侍食於君君祭先飯飯扶晚反周禮王日一舉膳夫授祭品嘗食王乃食故侍食者君祭則己不祭而先飯若為君嘗食然不敢當客禮也輔氏曰不祭不敢行私敬也先飯不敢當客禮也胡氏曰君臣之分甚嚴食而使侍其思厚矣君祭亦祭君食亦食自處以客將與為敵膳夫嘗食先食如之為臣之卑因以自見此侍君食之禮也疾君視之東首加朝服拖紳首去聲拖徒我反東首以受生氣也語録曰問君視之方東首常時首當在那邊禮記自云寢常當東首矣平時亦欲受生氣恐不獨於疾時為然曰常時多東首亦有隨意卧時節如記云請席何向請袵何趾這見得有隨意向時節然多是東首故玉藻云居常當户寢常東首也常寢於北牖下君問疾則移南牖下病卧不能著衣束帶又不可以褻服見君故加朝服於身又引大帶於上也輔氏曰一息尚存不敢廢禮況有疾而君視之乎朝服拖紳蓋禮之變亦禮之冝也然亦必疾病不能支吾然後可以如此君命召不俟駕行矣急趨君命行出而駕車隨之此一節記孔子事君之禮入太廟每事問重出輔氏曰全章見八佾故集注不以入分節之數朋友死無所歸曰於我殯朋友以義合死無所歸不得不殯輔氏曰謂於義有不得不然者胡氏曰朋友人倫之一既以義合而莫死也無父族無母族無妻族無旁親主之是無所歸也為之朋友者不任其責則轉於溝壑而已故曰於我殯此節獨記一曰字者必嘗有是事人莫知所處而夫子有是言也古者三日而殯三月而葬但曰殯而不曰葬則其親者在逺必訃告之葬未及言也朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜輔氏曰朋友雖有通財之義然責之以施者之不可吝者其意迫開之以受者之不當拜者其意深祭肉則拜者敬其祖考同於己親也胡氏曰禮祭畢祝以祭之酒肉嘏于主人曰致福謂祖考以是福其子孫也朋友不敢專有其福而以為饋焉是與受其祖考之福矣故必拜此一節記孔子交朋友之義寢不尸居不容尸謂偃卧似死人也居居家容容儀范氏曰寢不尸非惡其類於死也惰慢之氣不設於身體雖舒布其四體而亦未嘗肆耳輔氏曰偃卧似死人所以釋尸字之義耳寢之所以不尸則非是惡其類於死也聖人之心無乎不敬故惰慢之氣自然不設於身體雖是寢而舒布其四體然亦未嘗偃卧而肆有類夫尸也居不容非惰也但不若奉祭祀見賓客而已申申夭夭是也輔氏曰容儀謂奉祭祀見賓客之容貌威儀也然居家亦自有居家之容所謂申申夭夭是也但不若奉祭祀見賓客之極乎莊敬耳聖人德盛仁熟雖寢與居亦有常則也見齊衰者雖狎必變見冕者與瞽者雖褻必以貌狎謂素親狎褻謂燕見貌謂禮貌餘見前篇凶服者式之式負版者式車前橫木有所敬則俯而憑之負版持邦國圖籍者式此二者哀有喪重民數也人惟萬物之靈而王者之所敬也故周禮獻民數於王王拜受之況其下者敢不敬乎有盛饌必變色而作敬主人之禮非以其饌也輔氏曰變色而作謂改容而起以致敬也若因饌之盛則是動於欲若因主人之禮則是行吾敬天理人欲同行異情此可見矣胡氏曰變色而作以禮非以饌因禮所以行吾敬因饌則動於欲矣迅雷風烈必變迅疾也烈猛也必變者所以敬天之怒記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐語録曰問有終日之雷終夜之雨如何得常如此曰固當常如此但亦主於疾風迅雷甚雨若平平底雷風雨也不消如此問當應接之際無相妨否曰有事也只得應此一節記孔子容貌之變升車必正立執綏綏挽以上車之索也愚案車輪髙六尺六寸車逾人髙故升車則挽索以登范氏曰正立執綏則心體無不正而誠意肅恭矣輔氏曰正立則身不偏倚執綏則不忘有事范氏所謂心體無不正而誠意肅恭者得之蓋君子莊敬無所不在升車則見於此也輔氏曰莊敬乃心體之本然君子全此心故其莊敬無所不在無時不然但升車則見其如此耳車中不內顧不疾言不親指內顧回視也禮曰顧不過轂語録曰立視五雋式視馬尾蓋雋是車輪一轉之地車輪髙六尺圍三徑一則闊丈八五轉則正為九丈矣立視雖逺亦不過此輔氏曰蓋車中視物之則也三者皆失容且惑人輔氏曰顧謂目視言謂語言指該動作言此三者則於人身亦略備矣失容則失己惑人則亂人君子成己所以成物故不失容則不惑人也此一節記孔子升車之容色斯舉矣翔而後集言鳥見人之顔色不善則飛去回翔審視而後下止人之見幾而作審擇所處亦當如此輔氏曰退當見幾進當審義也真氏曰色斯舉矣去之速也衛靈公問陳而孔子行魯受女樂而孔子去翔而後集者就之遲也伊尹俟湯三聘而後幡然以起太公伯夷聞文王善養老而後出後世如漢穆生以楚王戊不設醴而去諸葛武侯必待先主三顧而後從之皆有得乎此者也然此上下必有闕文矣胡氏曰上不知為何人之言下不知為何事而發故以為有闕文也曰山梁雌雉時哉時哉子路共之三嗅而作共九用反又居勇反嗅許又反邢氏曰梁橋也時哉言雉之飲啄得其時子路不達以為時物而共具之孔子不食三嗅其氣而起邢氏名昺濟隂人朝氏曰石經嗅作戞謂雉鳴也劉聘君云嗅當作臭古閴反張兩翅也見爾雅愚案如後兩説則共字當為拱執之義然此必有闕文不可強為之説姑記所聞以俟知者論語纂疏卷五
