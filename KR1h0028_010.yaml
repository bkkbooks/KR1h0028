body:
  text: 欽定四庫全書論語纂疏卷七宋趙順孫撰朱子集注子路第十三凡三十章子路問政子曰先之勞之勞如字蘇氏曰凡民之行以身先之則不令而行語録曰先是率他輔氏曰凡民之行如孝弟忠信仁義禮智皆是也為政者必以身先行乎此則民皆視效不待誥令而自知行之矣凡民之事以身勞之則雖勤不怨語録曰勞是為他勤勞輔氏曰以身勞民之事如古人戴星而出戴星而入星言夙駕説于桑田與夫以時循行阡陌躬行講武之類為政者於此不憚其勞則民皆興起雖極其勤苦而不怨矣請益曰無倦無古本作毋吳氏曰勇者喜於有為而不能持久故以此告之輔氏曰勇者必喜事喜於有為者或不能持久故又以無倦告之無倦則終始如一誠之事也程子曰子路問政孔子既告之矣及請益則曰無倦而已未嘗復有所告姑使之深思也蔡氏曰夫子方答子路以先之勞之而子路遽請益則其勇躁之意可見故夫子但告之以無倦所以救其勇躁之失也吳氏所謂勇程子所謂深思正此意也仲弓為季氏宰問政子曰先有司赦小過舉賢才有司衆職也宰兼衆職輔氏曰宰邑長家臣之通號故兼衆職然事必先之於彼而後考其成功則己不勞而事畢舉矣語録曰凡為政隨其小大各自有有司須先教他理會自家方可要其成且如錢榖之事其出入盈縮之數須是教他自逐一具來自家方可考其虛實之成過失誤也大者於事或有所害不得不懲小者赦之則刑不濫而人心恱矣輔氏曰虞書云宥過無大而今曰赦小過故集注發此大者於事或有所害不得不懲之説蓋舜為天下所治者廣且論其大體故可以宥過無大仲弓為季氏宰所治者狹須極其詳細若人之誤無大小皆從寬宥則於事或有害而無以警其怠忽唯於小者赦之則刑不至於濫及而人心恱矣此亦時中也且宥者寬之而已亦未必盡除其罪也賢有德者才有能者舉而用之則有司皆得其人而政益修矣輔氏曰有司固非一職而才德各有所宜並舉而審用之則有司皆得其人而政益修矣曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸焉於虔反舍上聲仲弓慮無以盡知一時之賢才故孔子告之以此程子曰人各親其親然後不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間爾文集曰人各舉其所知則天下之賢無不舉矣不患無以知天下之賢才也興邦喪邦蓋極言之必自知而後舉之則遺才多矣未必不由此而喪邦也語録曰仲弓只緣見識未極其開闊故如此人之心量本自大緣私故小蔽固之極則可以喪邦矣范氏曰不先有司則君行臣職矣不赦小過則下無全人矣不舉賢才則百職廢矣失此三者不可以為季氏宰況天下乎輔氏曰蓋經筵勸講之説其所以感切於君父者至矣子路曰衛君待子而為政子將奚先衛君謂出公輒也是時魯哀公之十年孔子自楚反乎衛子曰必也正名乎是時出公不父其父而禰其祖名實紊矣故孔子以正名為先謝氏曰正名雖為衛君而言然為政之道皆當以此為先子路曰有是哉子之迂也奚其正迂謂逺於事情言非今日之急務也子曰野哉由也君子於其所不知蓋闕如也野謂鄙俗責其不能闕疑而率爾妄對也名不正則言不順言不順則事不成楊氏曰名不當其實則言不順言不順則無以考實而事不成輔氏曰名者實之賔有是實斯有是名若其名不當其實如以祖為禰則其言乖牾舛逆而不順言既不順則無以考其實凡有所為皆茍且虛偽而已故事無由得成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足中去聲范氏曰事得其序之謂禮物得其和之謂樂事不成則無序而不和故禮樂不興禮樂不興則施之政事皆失其道故刑罰不中輔氏曰無一事無禮樂禮只是一箇序樂只是一箇和成而有序則禮樂自興不然則隳壞乖舛又焉得有禮樂哉禮樂不興則凡施於政事者無非私意率皆倒行逆施無序而不和所謂刑罰不中而民無所措手足亦必然之理也故君子名之必可言也言之必可行也君子於其言無所茍而已矣程子曰名實相須一事茍則其餘皆茍矣語録曰衛輒子也蒯聵父也子以兵拒父以父為賊是多少不順其何以為國何以臨民事既不成則顛倒乖亂禮樂如何而興刑罰如何而中程子所謂一事茍則其餘皆茍正謂此也胡氏曰衛世子蒯聵恥其母南子之淫亂欲殺之不果而出奔靈公欲立公子郢郢辭公卒夫人立之又辭乃立蒯聵之子輒以拒蒯聵夫蒯聵欲殺母得罪於父而輒據國以拒父皆無父之人也其不可有國也明矣夫子為政而以正名為先必將具其事之本末告諸天王請于方伯命公子郢而立之則人倫正天理得名正言順而事成矣夫子告之之詳如此而子路終不喻也故事輒不去卒死其難徒知食焉不避其難之為義而不知食輒之食為非義也文集曰胡氏之言乃聖人大用之全體但其間曲折之微聖人須更有隨冝裁處語録曰問胡氏只是論孔子為政正名合當如此設若衛君輒用孔子孔子既為之臣而為政則此説亦可通否曰聖人必不肯北面無父之人若輒有意改過遷善則孔子須先與斷約如此做方與他做若輒不能然則孔子決不為之臣矣樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃種五榖曰稼種蔬菜曰圃樊遲出子曰小人哉樊須也小人謂細民孟子所謂小人之事者也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼好去聲夫音扶襁居丈反焉於虔反禮義信大人之事也好義則事合冝情誠實也敬服用情蓋各以其類而應也輔氏曰在已者皆盡其道在下者各以其所類應之謂正己而物正者非有大人之德其孰能之襁織縷為之以約小兒於背者楊氏曰樊須遊聖人之門而問稼圃志則陋矣辭而闢之可也待其出而後言其非何也蓋於其問也自謂農圃之不如則拒之者至矣須之學疑不及此而不能問不能以三隅反矣故不復及其既出則懼其終不喻也求老農老圃而學焉則其失愈逺矣故復言之使知前所言者意有在也子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為使去聲專獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長於風諭故誦之者必達於政而能言也輔氏曰本人情謂發乎情該物理謂多識鳥獸草木之名驗風俗之盛衰見政治之得失謂正變風雅或美或刺之類故讀之者必達於政其言溫厚和平謂詩皆自平易之心發出長於風諭謂能感發於人故讀之者必能言而專對也胡氏曰詩之作也雖有邪有正皆原於人情及諷詠其所言則事物之理莫不具載故其情合於事理之正則可以知風俗之盛政治之得其情背於事理之正則可以知風俗之衰政治之失因是而通為政之方也詩之言溫厚則不至於薄和平則不至於訐能諷諭則人皆易曉因是故能專對也程子曰窮經將以致用也世之誦詩者果能從政而專對乎然則其所學者章句之末耳此學者之大患也胡氏曰程子謂窮經將以致用者聖人立言之大旨也然讀詩者每不能至此豈非誦之而不能熟熟之而不能思思之而不能切歟可不戒哉子曰其身正不令而行其身不正雖令不從子曰魯衛之政兄弟也魯周公之後衛康叔之後本兄弟之國而是時衰亂政亦相似故孔子嘆之子謂衛公子荆善居室始有曰苟合矣少有曰茍完矣富有曰茍美矣公子荆衛太夫茍聊且粗略之意合聚也黃氏曰謂裒而斂之使事事皆聚集也完備也黃氏曰謂補足其空闕使無不備也言其循序而有節不以欲速盡美纍其心楊氏曰務為全美則纍物而驕吝之心生公子荆皆曰茍而已則不以外物為心其欲易足故也輔氏曰居室而務為全美則是為外物所纍得之則驕心生失之則吝心生是皆生於欲之無厭也公子荆其欲易足故不以外物纍心曰合曰全曰美皆曰茍而已然究觀荆之所為亦非不事事者蓋君子之於事無巨細一於敬而已自合而全自全而美事之序也所以使之得其序者必有以也在我者處得其宜在彼者成之有序然公子荆未嘗以是纍其心直以為茍而已此亦以為善居室也若夫凡事忽略倒行逆施則家亦隨敗而已豈能至於全與美乎子適衛冉有僕僕御車也子曰庶矣哉庶衆也冉有曰既庶矣又何加焉曰富之庶而不富則民生不遂故制田里薄賦斂以富之曰既富矣又何加焉曰教之富而不教則近於禽獸故必立學校明禮義以教之胡氏曰天生斯民立之司牧而寄以三事然自三代之後能舉此職者百無一二漢之文明唐之太宗亦云庶且富矣西京之教無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學唐太宗大召名儒增廣生貟教亦至矣然而未知所以教也三代之教天子公卿躬行於上言行政事皆可師法彼二君者其能然乎輔氏曰寄以三事謂父生之師教之君治之司牧之職實兼是三者所謂三代之教則大學一書所載備矣子曰茍有用我者期月而已可也三年有成期月謂周一嵗之月也可者僅辭言綱紀布也有成治功成也尹氏曰孔子歎當時莫能用已也故云然愚案史記此蓋為衛靈公不能用而發子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也勝平聲去上聲為邦百年言相繼而久也勝殘化殘暴之人使不為惡也去殺謂民化於善可以不用刑殺也語録曰是他做百年工夫積纍到此自是能使人興善不陷於刑辟蓋古有是言而夫子稱之程子曰漢自髙惠至于文景黎民醇厚幾致刑措庶乎其近之矣尹氏曰勝殘去殺不為惡而已善人之功如是若夫聖人則不待百年其化亦不止此子曰如有王者必世而後仁王者謂聖人受命而興也三十年為一世仁謂教化浹也程子曰周自文武至于成王而後禮樂興即其效也或問此章曰所謂仁者以其天理流行融液洞徹而無一物之不體也舉一世而言固無一人之不然即一人而言又無一事之不然也求之詩書惟成康之世為足以當之或問三年必世遲速不同何也程子曰三年有成謂法度紀綱有成而化行也漸民以仁摩民以義使之浹於肌膚淪於骨髓而禮樂可興所謂仁也此非積久何以能致子曰茍正其身矣於從政乎何有不能正其身如正人何冉有退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之朝音潮與去聲冉有時為季氏宰朝季氏之私朝也輔氏曰公父文伯母謂季康子曰外朝子將業君之官職焉內朝子將庀季氏之家政焉內朝即所謂私朝也晏晚也政國政事家事陳氏曰君之官職所謂政也季氏之家事所謂事也愚謂政者正也所以正人之不正也故施於國者謂之政事有大小自己事亦謂之事故家事止可謂之事以用也禮大夫雖不治事猶得與聞國政是時季氏專魯其於國政蓋有不與同列議於公朝而獨與家臣謀於私室者故夫子為不知者而言此必季氏之家事耳若是國政我嘗為大夫雖不見用猶當與聞今既不聞則是非國政也語意與魏徴獻陵之對略相似其所以正名分抑季氏而教冉有之意深矣胡氏曰魏徵獻陵之對若近於譎今引以為比則言不必信不可以常理言也定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也幾期也詩曰如幾如式言一言之間未可以如此而必期其效胡氏曰詩幾音機此失音也舊説或以為近或以為微近與不幾乎之義同與若是其幾之幾不協微則文義皆不可讀故不可從也人之言曰為君難為臣不易易去聲當時有此言也如知為君之難也不幾乎一言而興邦乎因此言而知為君之難則必戰戰兢兢臨深履薄而無一事之敢忽然則此言也豈不可以必期於興邦乎為定公言故不及臣也曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也喪去聲下同樂音洛言他無所樂惟樂此耳如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎范氏曰言不善而莫之違則忠言不至於耳君日驕而臣日諂未有不喪邦者也謝氏曰知為君之難則必敬謹以持之惟其言而莫豫違則讒諂面諛之人至矣邦未必遽興喪也而興喪之源分於此然此非識微之君子何足以知之胡氏曰謝氏説邦未必興喪則似以幾訓近又曰興喪之源分於此非識微者不足以知之則又似以幾訓微終取之者豈以其大旨有所發明歟葉公問政音義並見第七篇子曰近者説逺者來説音恱被其澤則恱聞其風則來然必近者説而後逺者來也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成父音甫莒父魯邑名欲事之速成則急遽無序而反不達見小者之為利則所就者小而所失者大矣黃氏曰事之久速有自然之次第事之小大有自然之分量循其自然之理而無所容心焉可也一有速成小利之心則是私心而非正理也非正理則心可私也事豈得而強為哉冝其不達而大事不成也程子曰子張問政子曰居之無倦行之以忠子夏問政子曰無欲速無見小利子張常過髙而未仁子夏之病常在近小故各以切己之事告之輔氏曰居之而易得倦行之而不盡心此過髙而未仁之證也欲速見小利此近小而不及之證也聖人之殺人如良醫之治疾藥雖不同效則一也葉公語孔子曰吾黨有直躬者其父攘羊而子證之語去聲直躬直身而行者有因而盜曰攘孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣為去聲父子相隱天理人情之至也故不求為直而直在其中謝氏曰順理為直父不為子隱子不為父隱於理順邪瞽瞍殺人舜竊負而逃遵海濵而處當是時愛親之心勝其於直不直何暇計哉輔氏曰於理順邪説得極好所以使人反求而自得之又引舜事以推極人子之情直到不暇計其直與不直處其曉人以理可謂明且切矣胡氏曰父子主恩委曲以全其恩雖不得正謂之直然理所當然順理而行不失其為直也葉公徒知一偏一曲之異乎人者為髙夫子則合全體大用而觀之也夫一偏一曲之髙非不足尚於正理一有所虧尚何言哉謝氏所謂不暇計其直不直者愛親之心勝而區區細行不足論也樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也恭主容敬主事恭見於外敬主乎中語録曰有事則著心做不易其心而為之是敬自誠身而言則恭較緊自行事而言則敬為切又曰敬是主事然專言則又如修已以敬敬是直內只偏言是主事恭是容貌上説又曰凡言發於外者比似主於中者較大蓋必充積盛滿而後發於外則發於外者豈不大如主於中者然主於中者却是本不可不知陳氏曰恭就貌上説敬就心上説敬工夫細密恭氣象濶大敬意思卑屈恭體貌尊嚴又曰身體嚴整容貌端莊此是恭底意但恭只是敬之見於外者敬只是恭之存於中者敬與恭不是二物如形影然未有內無敬而外能恭者亦未有外能恭而內無敬者之夷狄不可棄勉其固守而勿失也語録曰上三句散著下一句方􅗚得緊程子曰此是徹上徹下語聖人初無二語也充之則睟靣盎背推而達之則篤恭而天下平矣輔氏曰聖人之言貫徹上下無有或遺此數語者自始學至成德皆不過如此但有勉強自然之異耳充之則有睟面盎背之驗推而達之則篤恭而天下平此仁聖之極功也觀聖人以是為仁則又何嘗只要識其名義而已哉唯躬行實踐之為貴耳胡氏曰樊遲問仁者三此景先先難次之愛人其最後乎語録曰胡氏説雖無明證看得來是如此若未嘗告之以恭敬忠之説則所謂先難者將何從下手乎至於愛人則又以其發於外者言之矣蔡氏曰諸子問仁而所答各異者因其所稟之資而發也樊遲問仁而所答各異者因其所學之至而發也聖人教人猶化工之妙物各付物於此見之子貢問曰何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣使去聲此其志有所不為而其材足以有為者也輔氏曰志存於隱而才見於顯且志易肆而才難強故常人之志患在於無所不為而其才則患在於無所能為行已有恥則是其志有所不為也使於四方不辱君命則是其才足以有為也唯其志有所不為然後才足以有為也子貢能言故以使事告之蓋為使之難不獨貴於能言而已曰敢問其次曰宗族稱孝焉鄉黨稱弟焉弟去聲此本立而材不足者故為其次語録曰宗族鄉黨皆稱孝弟豈不是第一等人然聖人未以為士之至行者僅能使其身無過而無益於人之國不足深貴也曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣行去聲硜苦耕反果必行也硜小石之堅確者小人言其識量之淺狹也此其本末皆無足觀然亦不害其為自守也故聖人猶有取焉或問硜硜小人而亦可為士何也曰彼其識量雖淺而非惡也至其所守則雖規規於信果之小節然與夫誕謾茍賤之人則不可同年語矣下此則市井之人不復可為士矣曰今之從政者何如子曰噫斗筲之人何足算也筲所交反算亦作算悉亂反今之從政者蓋如魯三家之屬噫心不平聲斗量名容十升筲竹器容斗二升斗筲之人言鄙細也算數也子貢之問每下故夫子以是警之程子曰子貢之意蓋欲為皎皎之行聞於人者夫子告之皆篤實自得之事語録曰問子貢欲為皎皎之行曰子貢平日雖有此意思然這一章却是大假平實了蓋渠見行已有恥使於四方不是些小事故又問其次至宗族稱孝鄉黨稱弟他亦未敢自信故又問其次凡此節次皆是他要放平實處做功夫故每問皆下到下靣問今之從政者何如却是問錯了聖人便云何足算也乃是為他截斷了子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也狷音絹行道也胡氏曰道猶路也故行亦道也狂者志極髙而行不掩狷者知未及而守有餘文集曰狂者志髙可以有為狷者志潔有所不為而可以有守語録曰狂者知之過狷者行之過輔氏曰狂者志極髙直欲探取乎道然其行則不掩狷者守有餘故能不為其所不為然其知則未至愚謂志極髙狂者之過行不掩狂者之不及知未及狷者之不及守有餘狷者之過蓋聖人本欲得中道之人而教之然既不可得而徒得謹厚之人則未必能自振拔而有為也故不若得此狂狷之人猶可因其志節而激厲裁抑之以進於道非與其終於此而已也語録曰謹厚者雖是好又無益於事故有取於狂狷然狂狷者又各墮於一偏中道之人有狂者之意而所為又精密有狷者之節又不至過激此極難得之人黃氏曰孔子之門從遊之士皆極天下之選夫子猶嘆中行之難得思狂狷者而與之蓋進道之難如此狂狷雖不同而其力量皆足以進於道者也今持不逮之資而悠悠以求進於學是皆夫子之所棄也輔氏曰狂者之志狷者之節皆有進道之資者也故孔子於不得中道而教之之際與其得謹厚之人柔懦弗強悠悠嵗月故不若得夫狂狷之士因其志而裁抑之使勉其所行因其節以激厲之使進其所知則庶幾乎中行之事非與其終於狂狷而已也愚謂於其不及而激厲之使之跂而及乎中也於其過而裁抑之使之俯而就乎中也孟子曰孔子豈不欲中道哉不可必得故思其次也如琴張曽晳牧皮者孔子之所謂狂也其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也子曰南人有言曰人而無恆不可以作巫醫善夫恆胡登反夫音扶南人南國之人恆常久也巫所以交鬼神醫所以寄死生故雖賤役而尤不可以無常孔子稱其言而善之輔氏曰無常之人則在我者無定守矣何所用而可巫醫雖賤役然必有常乃可為之蓋交鬼神而無常則鬼神不之享治疾病而無常則人何敢寄以死生哉孔子稱其言而善之其所以警於人者深矣不恆其德或承之羞此易恆卦九三爻辭承進也語録曰承如人送與之也子曰不占而已矣復加子曰以别易文也其義未詳楊氏曰君子於易茍玩其占則知無常之取羞矣其為無常也蓋亦不占而已矣意亦略通胡氏曰不占二字如楊氏説須增玩字故集注猶以為未詳子曰君子和而不同小人同而不和和者無乖戾之心同者有阿比之意尹氏曰君子尚義故有不同小人尚利安得而和輔氏曰尹氏本意雖只是以義利二字説不同不和之意然細推之則君子之於事唯欲合於義故常和然義有可否故有不同小人徇利之意則固同矣然利起爭奪安得而和愚謂尹氏之説是推原其所以不同不和之故自義利上來非以此訓不同不和也子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之好惡並去聲一鄉之人冝有公論矣然其間亦各以類自為好惡也故善者好之而惡者不惡則必其有茍合之行惡者惡之而善者不好則必其無可好之實黃氏曰不以鄉人皆好皆惡而定其人之賢必取決於善者之好不善者之惡蓋善者循理故所好者如已之循理者也不善者循欲故所惡者不必如已之徇欲者也此其所以為賢也至於善者好而惡者不惡惡者惡而善者不好則又推而言之耳輔氏曰鄉人皆好之恐是同流合汙之人鄉人皆惡之恐是説世戾俗之人故皆以為未可至於鄉人之善者以同乎己而好之則有可好之實矣其不善者以異乎己而惡之則無茍合之行矣則其人之善也為可必矣子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉易去聲説音恱器之謂隨其材器而使之也君子之心公而恕小人之心私而刻天理人欲之間每相反而已矣輔氏曰君子説人之順理小人説人之順已君子貴重人材務盡在我用之之道而不責人之皆可用故隨其材器而使之而天下無不可用之人小人輕視人材不求在我用之之道而唯欲人之皆如己意也故求備貴全而卒至於無可用之人君子持已之道甚嚴而待人之心甚恕小人治已之方甚寬而責人之意甚刻惟公故恕惟私故刻天理人欲之間每相反而已矣子曰君子泰而不驕小人驕而不泰君子循理故安舒而不矜肆小人逞欲故反是輔氏曰君子安處善樂循理故心廣而體胖小人騖於氣逞於欲故言夸而行肆胡氏曰循理者泰之本也逞欲者驕之根也君子惟理是循富貴貧賤安於所遇無入而不自得故常舒泰小人惟欲是逞貪求茍取意得志滿常欲以之自夸故常驕矜循理則惟恐欲心之肆而卒至於無欲逞欲則不知是理之正而常至於背理二者常相反子曰剛毅木訥近仁程子曰木者質朴訥者遲鈍四者質之近乎仁者也楊氏曰剛毅則不屈於物欲木訥則不至於外馳故近仁輔氏曰有剛毅之質則必不屈於物欲不屈於物欲則心常正有木訥之質則必不至於外馳不至於外馳則心常存心正則常存此所以近乎仁也胡氏曰剛毅則有堅強不已之意木訥則無巧令外飾之資故於仁為近然非論其問學功夫即其資稟而言也資稟之近若合於仁矣未可以為仁也蓋仁雖出於天性之本然惟上智之資氣命於理自然合於中和而不墮於一偏其不屈於物欲固剛毅矣然待人接物未嘗不溫然而和順也其不至於外馳固木訥矣然威儀文辭未嘗不粲然而宣明也若資質之美則拘於一偏而已大約言之固於仁為近由學者言之必庶幾其全體可也子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡胡氏曰切切懇到也偲偲詳勉也或問切切偲偲之義曰切切者教告懇惻而不揚其過偲偲者勸勉詳盡而不強其從二者皆有忠愛之誠而無徑訐之害語録曰懇到有苦切之意然一向如此而無浸灌之意又不可須詳細相勉如此方有相親之意怡怡和恱也皆子路所不足故告之又恐其混於所施則兄弟有賊恩之禍朋友有善柔之損故又别而言之語録曰聖人見子路有粗暴底氣象故告之以切切怡怡又恐子路一向和恱去了又告之以朋友則切切偲偲兄弟則怡怡聖人之言是恁地密子曰善人教民七年亦可以即戎矣教民者教之孝悌忠信之行務農講武之法語録曰古人政事大率本末兼具即就也戎兵也民知親其上死其長故可以即戎程子曰七年云者聖人度其時可矣如云期月三年百年一世大國五年小國七年之類皆當思其作為如何乃有益輔氏曰聖人度其時可矣蓋致知格物之極功不啻如燭照而數計非臆度之謂也蔡氏曰聖人作為必須有分明界限如古人謂三十年制國用則有九年之食恐當以此推之子曰以不教民戰是謂棄之以用也言用不教之民以戰必有敗亡之禍是棄其民也黃氏曰聖人未嘗不言兵也言兵之最精者莫如聖人蓋教之以親愛節義之風坐作擊刺之法要以必克而後用之此聖人所以不輕棄其民也憲問第十四胡氏曰此篇疑原憲所記愚謂首篇曰憲問恥不書姓而直書名其為自記之證一也他章夫子稱弟子則名之曽子有子冉子門人之所記則以子稱非其師者皆稱字如原思為之宰亦以字稱而此書名其為自記之證二也下章問克伐怨欲不行不别起端而聨書之其為自記之證三也凡四十七章憲問恥子曰邦有道榖邦無道榖恥也憲原思名榖祿也邦有道不能有為邦無道不能獨善而但知食祿皆可恥也語録曰榖之一字要人玩味榖有食祿之義言有道無道只會食祿略無建明豈不深可恥憲之狷介其於邦無道榖之可恥固知之矣至於邦有道榖之可恥則未必知也故夫子因其問而并言之以廣其志使知所以自勉而進於有為也或問此一章曰原憲甘貧守道其志卓然能有不為者也其為此問固知邦無道而枉道得祿之為恥矣特欲質諸夫子以言其志耳夫子深知其然而亦知其學之未足以有為也則恐其或當有道之時雖無枉道之羞而未免於素餐之愧故以是而并告之使因其所已知而推之以及其所未知者庶乎其有以廣其業而益充其所為爾胡氏曰狷介之人自守常有餘而見於事為常不足蓋以心之全體言之循循自守猶為一已之私行必推而足以治國平天下然後可以充此心本然之限量也愚謂狷者有執守之意介者有分辨之意克伐怨欲不行焉可以為仁矣此亦原憲以其所能而問也輔氏曰原思兩問皆是以其所已能者而質之於聖人故夫子之答皆進之以其所未能克好勝伐自矜怨忿恨欲貪欲輔氏曰克只訓勝如克敵克已之為勝敵勝已是也然單言之則為好勝如忮克克伐是也伐者傷殘之意自矜乃所以自殘也忿見於外恨藏於中內恨外忿則為怨欲有公私貪欲則欲之私也胡氏曰克伐怨欲分而言之則為四事對舉而互言之則克伐者因已之所有而生氣盈也怨欲者因已之所無而生氣歉也推本而言之皆因有已而生也子曰可以為難矣仁則吾不知也有是四者而能制之使不得行可謂難矣語録曰這箇也是他去做功夫只是用功淺在仁則天理渾然自無四者之纍不行不足以言之也程子曰人而無克伐怨欲惟仁者能之有之而能制其情使不行斯亦難能也謂之仁則未也此聖人開示之深惜乎憲之不能再問也或問使憲而再問夫子告之奈何曰聖人未發之旨夫孰能測之然以程子之意而言則四者之不行亦制其末而不行於外爾若其本則固著之於心而不能去也譬之木焉不去其根則萌蘖之生自不能已制而不行日力亦不給矣且雖或能制之終身不見於外而其鬱屈不平之意乃日鬭進於胸中則夫所謂仁者亦且殫殘蔽害而不能以自存矣必也絶其萌芽蹶其根本不使小有豪髮留於心念之間則於仁也其庶幾乎語録曰這便是他失問也是他從來自見做好了如此輔氏曰憲之所以僅能其難固以其狷介有守而至於不能復有所問則亦以狷介之守痼之也或曰四者不行固不得為仁矣然亦豈非所謂克己之事求仁之方乎曰克去已私以復乎禮則私欲不留而天理之本然者得矣若但制而不行則是未有拔去病根之意而容其潛藏隱伏於胸中也豈克己求仁之謂哉學者察於二者之間則其所以求仁之功益親切而無滲漏矣語録曰克己者一似就家中捉出箇賊打殺了便沒事若有克伐怨欲而惟禁制之使不發出來猶關閉所謂賊者在家中只是不放出去外頭作過畢竟是窩藏又曰克是抉去病根不行是捺在這裏且教莫出然這病根在這裏又曰如面前有一事相觸雖能遏其怒畢竟胸中有怒在所以未得為仁所謂拔去病根而不容其潛藏隱伏於胸中者亦在乎格物致知誠意正心使其全體大用軒豁呈露而四者之根株蹶拔自不容或萌於其間也陳氏曰惟患不能自知己之病根所在耳若果知却合下便當下克己工夫對境直截與之拔去一舉淨盡然後為快豈有放緩第一著且放第二著且制之不行待他時工夫稍熟後乃漸次以拔之邪若然則恐病根轉深不可得而拔胸中一起一伏轉為之擾非所謂篤志求仁之道也胡氏曰人之一心渾然至理初無四者之纍今不思所以治之病根常在待其既發而以力制之使不得行則其病根未嘗不藏伏於內也是豈可謂之仁哉制其情而不行與顔子四勿若相似而實不同四勿者分辨於天理人欲之間而一循乎天理不行者禁制於人欲已發之後而不徇乎人欲用力於初分之際者易用力於已發之後者難此所以雖不許其仁而亦許其難也茍志不勝氣則藏伏於內者勃然而出其難也有時而不可恃矣子曰士而懷居不足以為士矣居謂意所便安處也輔氏曰懷吾意所便安處便是利心為士者正義而不謀利若於意所便安者戀戀而不能忘則於義之所當為者必不能知所從矣內則損德外則廢業是尚足以為士哉胡氏曰居以為居室可也然居室一事所該者狹聖人既以之斷其不可為士則不止乎思念其居室之安而已故以為意所便安處皆是也蓋不徇乎理之安而徇乎情之安則趨利而背義以私而滅公往往有之安得謂之士乎子曰邦有道危言危行邦無道危行言孫行孫並去聲危髙峻也永嘉陳氏曰髙峻者亷角之稱非詭險不平正之謂孫卑順也胡氏曰卑順者加謙恭耳非阿諛之謂尹氏曰君子之持身不可變也至於言則有時而不敢盡以避禍也然則為國者使士言孫豈不殆哉輔氏曰危言危行君子之常也然行以持身則終無可變之理言之應物則或有當遜之時使士孫言以避禍則時可知也然謂之孫者卑順而已亦非違道以徇物也子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁有德者和順積中英華發外能言者或便佞口給而已仁者心無私纍見義必為勇者或血氣之強而已胡氏曰和順德也英華言也無私仁也必為勇也便佞口給無德之言也血氣之強不仁之勇也必則有此而於彼可知不必則有此而於彼未可知也以或字言之所以見其不必也尹氏曰有德者必有言徒能言者未必有德也仁者志必勇徒能勇者未必有仁也輔氏曰有諸內者必形諸外事其末者未必有其本故自修者當務其內而觀人者必察其本南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人適古活反羿音詣奡五報反蕩土浪反南宫適即南容也羿有窮之君善射滅夏后相而篡其位其臣寒浞又殺羿而代之奡春秋傳作澆浞之子也力能陸地行舟後為夏后少康所誅禹平水土暨稷播種身親稼穡之事禹受舜禪而有天下稷之後至周武王亦有天下適之意蓋以羿奡比當世之有權力者而以禹稷比孔子也輔氏曰適素號能謹言而以此質於夫子其所以憫世悼俗尊尚聖人之意備見於言外愚謂權力二字正指三家而言適是孟懿子之兄亦三家子孫有此見識尤所難得故孔子不答然適之言如此可謂君子之人而有尚德之心矣不可以不與故俟其出而贊美之輔氏曰於此可見聖人處事之密而取善之周子曰君子而不仁者有矣夫未有小人而仁者也夫音扶謝氏曰君子志於仁矣然豪忽之間心不在焉則未免為不仁也輔氏曰聖人渾然天理無所間斷所謂中心安仁者也君子則志於仁矣然斯須之間心不在焉則未免為不仁若夫小人則通體假是人欲初不知有所謂仁者尚何望其能仁哉子曰愛之能勿勞乎忠焉能勿誨乎蘇氏曰愛而勿勞禽犢之愛也忠而勿誨婦寺之忠也愛而知勞之則其為愛也深矣忠而知誨之則其為忠也大矣輔氏曰愛焉則自不能不勞以成之忠焉則自不能不誨以益之此天理人情之至莫之為而為者也觀慈父之於子忠臣之於君則可見矣蘇氏發兩知字尤有意味蓋人之私情往往不知勞之為愛誨之為忠故又言以明之子曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之禆婢之反諶時林反禆諶以下四人皆鄭大夫草略也創造也謂造為草藁也世叔遊吉也春秋傳作子太叔討尋究也論講議也行人掌使之官子羽公孫揮也修飾謂增損之東里地名子産所居也潤色謂加以文采也愚謂禆諶能謀故使之草創世叔熟於典故故使之討論子羽善於應對故使之修飾子産當國不自用己見直待三人草創討論修飾後却來潤色之鄭國之為辭命必更此四賢之手而成詳審精密各盡所長是以應對諸侯鮮有敗事孔子言此蓋善之也或問子産子曰惠人也子産之政不專於寬然其心則一以愛人為主故孔子以為惠人蓋舉其重而言也問子西曰彼哉彼哉子西楚公子申能遜楚國立昭王而改紀其政亦賢大夫也然不能革其僭王之號昭王欲用孔子又沮止之其後卒召白公以致禍亂則其為人可知矣彼哉者外之之詞問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言人也猶言此人也語録曰猶詩所謂伊人莊子所謂之人也伯氏齊大夫駢邑地名齒年也蓋桓公奪伯氏之邑以與管仲伯氏自知己罪而心服管仲之功故窮約以終身而無怨言荀卿所謂與之書社三百而富人莫之敢拒者即此事也或問管仲子産孰優曰管仲之德不勝其才子産之才不勝其德然於聖人之學則槩乎其未有聞也輔氏曰管仲德不勝才子産才不勝德者以資質言也故其事業亦各隨其資以為之使其知聖賢大學之道循序而漸進成己以成物則子産之德當與顔閔同科而仲之才當與伊吕並駕矣陳氏曰二子皆無大學規模須是大學規模乃為王佐才而伊傅周召其人也子曰貧而無怨難富而無驕易易去聲處貧難處富易人之常情然人當勉其難而不可忽其易也胡氏曰貧之境逆而多不足之心富之境順而多有餘之意然處不足而心未嘗不足者非無所愧怍而真有所得則不能故難處有餘而心未嘗有餘者茍自知收斂矜夸不萌者能之故易聖人因人情事勢而别其難易如此非謂但當勉其難而易者不足言故集注又申明其不可忽之意也子曰孟公綽為趙魏老則優不可以為滕薛大夫公綽魯大夫趙魏晉卿之家老家臣之長大家勢重而無諸侯之事家老望尊而無官守之責優有餘也胡氏曰趙魏雖晉卿孟子言附之以韓魏之家則其家之大可知晉卿執國之政而家大如此故勢尊為家臣之長者茍能正己則居其位有餘矣滕薛二國名大夫任國政者滕薛國小政繁大夫位髙責重胡氏曰滕薛雖諸侯孟子言滕絶長補短將五十里則其國之小可知征伐朝聘之事所不容已大夫當國非才智過人則不足以勝其任然則公綽蓋廉靜寡欲而短於才者也胡氏曰公綽之為人以下章言其不欲觀之故知其廉靜寡欲也然律以成人又須文以禮樂方可否則有所偏而非才全德備者也楊氏曰知之弗豫枉其才而用之則為棄人矣此君子所以患不知人也言此則孔子之用人可知矣子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣知去聲成人猶言全人輔氏曰謂全盡得人之道全盡得人之道則其為人方可謂之成也武仲魯大夫名紇莊子魯卞邑大夫或問卞莊子曰莊子養母戰而三北及母死齊伐魯莊子赴鬭三獲甲首以獻曰此塞三北遂赴齊師殺十人而死事見新序言兼此四子之長則知足以窮理廉足以養心勇足以力行藝足以泛應而又節之以禮和之以樂使德成於內而文見乎外則材全德備渾然不見一善成名之迹中正和樂粹然無復偏倚駁雜之蔽而其為人也亦成矣或問必兼四子之長而又必文之以禮樂然後可以為成人何也曰四子各有所長而不能相兼又無禮樂以文之故知者至於要君勇者至於輕死藝者至於聚斂而不欲者又或不能於小國之大夫也亦難以為成人矣故孔子言必兼此四人之能而又文之以禮樂則集其所長去其所短而後可以為成人也輔氏曰藝謂六藝皆至理所寓而日用之不可闕者通此則應務冇餘矣德成於內則和之以樂之事也文見乎外則節之以禮之事也至此則內外兼全而禮樂純備矣才全則不偏德備則無闕不見一善成名之迹則人不得以一德而名之此其所以渾然也中正者禮之則也和樂者樂之用也無偏倚之蔽則中正矣無駁雜之蔽則和樂矣此其所以粹然也渾然粹然則其為人也亦成矣胡氏曰四子之長各有所偏故必兼四子之長四者相資猶未足以合乎道又必須文之以禮樂禮以節之則其偏倚邪辟者去矣樂以和之則其乖戾矯激者消矣此所以中正和樂渾然粹然而至於成人矣然亦之為言非其至者胡氏曰可者僅辭亦可則未至於僅也蓋就子路之所可及而語之也若論其至則非聖人之盡人道不足以語此語録曰問若聖人之盡人道則何以加此曰聖人天理渾全不待如此逐項説矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣復加曰字者既答而復言也授命言不愛其生持以與人也久要舊約也平生平日也有是忠信之實輔氏曰見危授命之為忠久要不妄平生之言之為信冝也而見利思義亦可以為忠何也義本吾心之固有茍因見利而遂忘其義以不思則非所以盡吾心也則雖其才知禮樂有所未備輔氏曰才生於氣四子之能雖皆出於氣稟然武仲之知又不可專以才言故兼知以言之亦可以為成人之次也程子曰知之明信之篤行之果天下之達德也若孔子所謂成人亦不出此三者武仲知也公綽仁也卞莊子勇也冉求藝也須是合此四人之能文之以禮樂亦可以為成人矣然而論其大成則不止於此若今之成人有忠信而不及於禮樂則又其次者也輔氏曰知仁勇三者天下之達德人之所以為人以此而已四子之能雖未盡人道然固亦達德之所發也又曰臧武仲之知非正也若文之禮樂則無不正矣輔氏曰程子蓋指要君之事言之然亦舉武仲此一事以例其餘也人之資稟雖善然亦不能無偏須是學以成之然後協于中正而無疵也又曰語成人之名非聖人孰能之孟子曰惟聖人然後可以踐形如此方可以稱成人之名輔氏曰有是性則具是形須是踐得這形方始全得是性此惟聖人能之雖合是四子之長而文之以禮樂至於踐形之事則猶或歉矣胡氏曰今之成人以下乃子路之言蓋不復聞斯行之之勇而有終身誦之之固矣未詳是否語録曰聖人不應只説向下去且見利思義至久要不忘平生之言三句自是子路已了得底事亦不應只恁地説蓋子路以其所能而自言故胡氏以為有終身誦之之固也問若如此夫子安得無言以繼之曰却又恐是他退後説也未可知愚謂何必然三字似以前説為疑三者又皆子路之所能故胡氏疑其為子路之言子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公叔文子衛大夫公孫枝也公明姓賈名亦衛人文子為人其詳不可知然必廉靜之士故當時以三者稱之公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎厭者苦其多而惡之之辭事適其可則人不厭而不覺其有是矣是以稱之或過而以為不言不笑不取也然此言也非禮義充溢於中得時措之冝者不能輔氏曰此乃內外合一自然而然不待勉強所謂安而行之聖人之事也文子雖賢疑未及此但君子與人為善不欲正言其非也故曰其然豈其然乎蓋疑之也子曰臧武仲以防求為後於魯雖曰不要君吾不信也要平聲防地名武仲所封邑也要有挾而求也武仲得罪奔邾自邾如防使請立後而避邑以示若不得請則將據邑以叛是要君也范氏曰要君者無上罪之大者也武仲之邑受之於君得罪出奔則立後在君非已所得專也而據邑以請由其好智而不好學也輔氏曰凡人溺於智而不知學不鑿以為私則必蕩而失正武仲二病皆有之且意萌於中迹著於外雖欲欺人而人之視已如見其肺肝然武仲之智而不足以知此則亦以好智而不好學之故也楊氏曰武仲卑辭請後其迹非要君者而意實要之夫子之言亦春秋誅意之法也黃氏曰此章當以楊氏説為主其以防也必未嘗有據防之言使其果以防為言而請後則要君明矣不待夫子之辨也子曰晉文公譎而不正齊桓公正而不譎譎古冗反晉文公名重耳齊桓公名小白譎詭也二公皆諸侯盟主攘夷狄以尊周室者也雖其以力假仁心皆不正然桓公伐楚仗義執言不由詭道猶為彼善於此文公則伐衛以致楚而隂謀以取勝其譎甚矣輔氏曰桓公責楚以包茅不貢及昭王不復二事進次而不遂戰既服而與之盟是伏義執言不由詭道也文公始則伐曹衛以致楚師之救終則復曹衛以携二國之交是伐衛以致楚而隂謀以取勝也就霸者之中論桓文之事則文譎而不正桓正而不譎若較之王者表裏無疵粹然一出於正者固不可同年而語矣二君他事亦多類此故夫子言此以發其隱子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎糾居黝反召音邵案春秋傳齊襄公無道鮑叔牙奉公子小白奔莒及無知弒襄公管夷吾召忽奉公子糾奔魯魯人納之未克而小白入是為桓公使魯殺子糾而請管召召忽死之管仲請囚鮑叔牙言於桓公以為相子路疑管仲忘君事讎忍心害理不得為仁也語録曰傷其惻隱之心便是忍心如所謂無求生以害仁害仁便是忍心也輔氏曰忘君謂不顧子糾之死事讎謂為桓公之相忍心謂心所當為而忍之使不為害理謂理所當然而咈之使不然忘君事讎即忍心害理之事也子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁九春秋傳作糾督也古字通用或問九之為糾曰春秋傳展喜犒師之詞云爾而糾合宗族之類若此者亦甚衆説者不者其然乃直以為九會諸侯至數桓公之會不止於九則又因不以兵車之文而為之説曰衣裳之會九耳其餘則兵車之會也自公榖以來皆為是説亦可謂鑿之甚矣不以兵車言不假威力也如其仁言誰如其仁者又再言以深許之蓋管仲雖未得為仁人而其利澤及人則有仁之功矣語録曰問如其仁何以言深許管仲曰看上靣説得大了下面豈是輕輕説過聖人當時舉他許多功故云誰如得他底仁終不成便與許顔子底意相似管仲莫説要他三月不違若要他三日也不會如此子貢冉求諸人豈不強似管仲哉輔氏曰仁者安仁蓋天理渾然無一息之不存無一物之不體管仲之於德其違闕者多矣顧何足以語此然使桓公糾合諸侯攘夷狄尊周室不假威力無所殺傷則利澤及人是亦仁者之功效矣蓋子路之論仁舉體而遺用故夫子以是廣其意使推而達之於用也永嘉陳氏曰仁有粗細説細處孔門弟子多有未能説粗處霸者之臣却能之蓋管仲乃仁者之功功雖可稱道過自不可掩子貢曰管仲非仁者與桓公殺公子糾不能死又相之與平聲相去聲子貢意不死猶可相之則已甚矣輔氏曰子路勇者也故有取於召忽之死而以管仲之不死為未仁子貢知者也故以管仲之不死為猶可而以其相桓為已甚而非仁子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣被皮寄反衽而審反霸與伯同長也匡正也尊周室攘夷狄皆所以正天下也微無也衽衣襟也被髮左衽夷狄之俗也豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也諒小信也經縊也莫之知人不知也後漢書引此文莫字上有人字程子曰桓公兄也子糾弟也仲私於所事輔之以爭國非義也桓公殺之雖過而糾之死實當仲始與之同謀遂與之同死可也知輔之爭為不義將自免以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲之與桓不可同世之讎也若計其後功而與其事桓聖人之言無乃害義之甚啓萬世反覆不忠之亂乎如唐之王圭魏徴不死建成之難而從太宗可謂害於義矣後雖有功何足贖哉愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也公叔文子之臣大夫僎與文子同升諸公僎士免反臣家臣公公朝謂薦之與已同進為公朝之臣也子聞之曰可以為文矣文者順理而成章之謂諡法亦有所謂錫民爵位曰文者胡氏曰其才德足以為大夫而薦之為大夫順理也以家臣之賤而與為同列無慊焉成章也彼錫民爵位特其迹耳洪氏曰家臣之賤而引之使與已並有三善焉知人一也忘已二也事君三也輔氏曰文之義主於順理而成章文王之文則指其全體而言公叔文子孔文子之文則取一事而言雖聖人與人為善之意然亦非無事實者知人智也忘已公也事君忠也具是三者則於此一事順理章成而粲然可觀矣安得不謂之文哉子言衛靈公之無道也康子曰夫如是奚而不喪夫音扶喪去聲喪失位也孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪仲叔圉即孔文子也三人皆衛臣雖未必賢而其才可用靈公用之又各當其才胡氏曰圉即敏學好問者賈則問奧竈者鮀則以佞而免於今之世者如圉幾矣賈之竊權鮀之善佞治世之罪人也然事神治軍各有一長而用人得以盡其所長耳尹氏曰衛靈公之無道冝喪也而能用此三人猶足以保其國而况有道之君能用天下之賢才者乎詩曰無競維人四方其訓之子曰其言之不怍則為之也難大言不慙則無必為之志而不自度其能否矣欲踐其言豈不難哉陳成子弒簡公成子齊大夫名恆簡公齊君名壬事在春秋哀公十四年孔子沐浴而朝告於哀公曰陳恆弒其君請討之朝音朝是時孔子致仕居魯沐浴齋戒以告君重其事而不敢忽也輔氏曰齋戒必沐浴此言沐浴則齋戒可知古人臨大事必致敬如此又曰孔子因陳恆之事而正討賊之舉此天下之大義也斯時一正亂臣賊子無所容迹三綱可整九法可序而天下之事可以次第而舉是豈可不以為重而忽之乎臣弒其君人倫之大變天理所不容人人得而誅之况鄰國乎故夫子雖已告老而猶請哀公討之公曰告夫三子夫音扶下告夫同三子三家也時政在三家哀公不得自專故使孔子告之孔子曰以吾從大夫之後不敢不告也君曰告夫三子者孔子出而自言如此意謂弒君之賊法所必討大夫謀國義所當告君乃不能自命三子而使我告之邪之三子告不可孔子曰以吾從大夫之後不敢不告也以君命往告而三子魯之強臣素有無君之心實與陳氏聲勢相倚故沮其謀而夫子復以此應之其所以警之者深矣或問當是之時魯之兵柄分屬三家哀公雖欲從夫子之言然不告三子則兵不可出而孔子之意乃不欲往告何哉曰哀公誠能聽孔子以討齊亂則亦召夫三子而以大義詔之耳理明義正雖或不欲而孰敢違之哉今無成命而反使孔子往而告之則是可否之權決於三子而不決於公也况魯之三家即齊之陳氏其不欲討之必矣是則不唯名義之不正而事亦豈可得而成哉然夫子以君命之重也故不得已而一往焉尚冀其萬一之或從也而三子果以為不可則復正言之以明從違在彼雖不敢必而君臣大倫所繫之重雖欲不告而不敢以已其所以警夫三子者亦深矣語録曰夫子初告時真箇是欲討陳恆未有此意後人自流泝源知聖人之言可以警三子無君之心非是聖人托討陳恆以警三子耳聖人之心術不如此枉曲程子曰左氏記孔子之言曰陳恆弒其君民之不豫者半以魯之衆加齊之半可克也此非孔子之言誠若此言是以力不以義也若孔子之志必將正名其罪上告天子下告方伯而率與國以討之至於所以勝齊者孔子之餘事也豈計魯人之衆寡哉當是時天下之亂極矣因是足以正之周室其復興乎魯之君臣終不從之可勝惜哉或問程子以左氏所記為非夫子之言然則夫子之戰將不復較其力之強弱而獨以大義驅之邪曰程子之言固有是矣然其所謂必有處置謀而後行者則亦非不量力而浪戰也但其意以為夫子之告魯君又當明君臣之大義以見弒逆之大惡天下所不容人人得誅況在鄰國而何可以不討之而意其為計則必請其君以上告天子下告方伯而舉天下之兵以誅之也以天下之兵討天下之賊彼雖衆強亦將奚以為哉固不當區區獨較齊魯之強弱而以天下之義為一國之私也左氏所記蓋當世傳聞之謬以衆人之腹為聖人之心者而程氏門人記其師説又不能盡其意之曲折所以啓讀者之疑耳胡氏曰春秋之法弒君之賊人得而討之孔子此舉先發後聞可也或問程子以為必告之天子而胡氏乃有先發後聞之説何邪曰考之春秋先王之時疑必自有此法凡弒君者人人得討之如漢所謂天下共擊之者晉李毅告王濬以為弒君之賊為惡尤大當不拘常制者則以當世本無此法而言爾然事非一槩告與不告又在乎時義之如何使其地近於天子而可以告也其事之未至乎迫遽而得以告也其力之不足以敵而不得不告也則告之而俟命以行甚則或不俟命而遂行皆可也使其地之相去也逺其事機之來也不可以少緩而吾之力又足以制之而乃區區焉徇請命之小節忘逆賊之大罪使彼得以植其根固其黨或遂奔逸而不可以復得則任其事者亦無以免乎春秋之責矣子路問事君子曰勿欺也而犯之犯謂犯顔諫爭語録曰犯只是有犯無隱之犯如三諫不聽之類諫便是犯范氏曰犯非子路之所難也而以不欺為難故夫子教以先勿欺而後犯也語録曰問子路豈是欺君者曰子路性勇凡言於人君便要他聽或至於説得太逼則近乎欺君唐人諫敬宗遊驪山謂驪山不可行若行必有大禍夫驪山固是不可行以為有大禍則近於欺矣要之其實雖不失為愛君而其言則欺矣又曰以使門人為臣一事觀之子路之好勇必勝恐未免於欺也黃氏曰偽言不直謂之欺直言無隱謂之犯欺與犯正相反輔氏曰犯顔諫諍固非巽懦阿諛者之所能也然事君之義要以忠敬為主使吾心一於忠敬常恐其君有纎豪之失或至於不得已而犯之則庶其能感動若忠敬有所未至納交要譽惡其聲之意未能使之盡絶而乃以犯顔為事則其公也所以為私其直也反所以為曲非特無益於君而徒有喪於己子路之剛蓋不難於犯也而反已自盡之道意者猶有未加意者焉故因其問事君而教以先勿欺而後犯此如醫之治病因其證之有不足而投之以所當用之劑也若夫職有言之責平日之學問不加性情不治道義之氣不勝乎權勢之威天理之微反屈乎利欲之熾阿諛從順回互隱伏見其為政之失而不思救之知其用人之非而不思正之從君於昏陷君於惡而方且立言於人曰吾當飬吾之誠意以潛化而默移之是又子路之所不敢知子曰君子上達小人下達君子循天理故日進乎髙明小人徇人欲故日究乎汙下文集曰凡百事上皆有達處惟君子就中得箇髙明底道理小人就中得箇汙下底道理語録曰君子一日長進似一日小人一日沉淪似一日又曰究者究竟之義言究竟至於極也初間只是差些子少間究竟將去越見差得多今人做錯一件事説錯一句話不肯當下覺悟便改却只管去救其失少間救得過失越大無不是如此胡氏曰循天理徇人欲上達下達之原也進髙明究汙下上達下達之效也天道流行付與萬物人之生也萬理皆具人欲或得以奪之故有待於反之也所謂天理者仁義禮智之常也能全乎仁義禮智之常而不以一豪私欲自纍則髙矣不以一豪私意自蔽則明矣所謂人欲者耳目口鼻之好是也惟徇乎耳目口鼻之好益趨於貪濁之地則汙矣益流於茍賤之域削下矣進則升而愈崇究則沈而愈卑子曰古之學者為已今之學者為人為去聲程子曰為已欲得之於己也為人欲見知於人也輔氏曰為已為人之學其差只在豪釐之間唯欲得之於己則不必見知於人才欲見知於人則不必得之於已欲得於己者收斂篤實欲見知於人者輕浮淺露程子曰古之學者為已其終至於成物今之學者為人其終至於喪已語録曰程子兩假前假是低底為人後假是好底為人前為人只是欲見知於人而已後為人却是真箇要為人然不曽先去自家身已上做得功夫非惟是為那人不得末後連已也喪了愚案聖賢論學者用心得失之際其説多矣然未有如此言之切而要者於此明辨而日省之則庶乎其不昧於所從矣語録曰今學者且要分别箇路頭要緊是為已為人之際為已者直拔要理會這箇物事欲自家理會得不是且恁地理會做好看教人説道自家也曽理會來這假饒理會得十分是當也都不關自身已事蘧伯玉使人於孔子使去聲下同蘧伯玉衛大夫名瑗孔子居衛嘗主於其家既而反魯故伯玉使人來也孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎與之坐敬其主以及其使也夫子指伯玉也言其但欲寡過而猶未能則其省身克己常若不及之意可見矣使者之言愈自卑約而其主之賢益彰亦可謂深知君子之心而善於詞令者矣故夫子再言使乎以重美之輔氏曰使者不以伯玉之德著見於外者言而於伯玉之心克治於內者告且曰欲而未能不獨其言謙抑卑下而又深有得於聖賢為已之學常如不及之意亦可謂知德而能言矣案莊周稱伯玉行年五十而知四十九年之非又曰伯玉行年六十而六十化語録曰化只是消融了無固滯又曰此句亦説得不切實伯玉却是箇向裏做工夫莊子之説自有過當處蓋其進德之功老而不倦是以踐履篤實光輝宣著不唯使者知之而夫子亦信之也子曰不在其位不謀其政重出曽子曰君子思不出其位此艮卦之象辭也曽子蓋嘗稱之記者因上章之語而類記之也輔氏曰不在其位不謀其政専指仕者職位而言若艮象所謂思不出其位則泛言物所當止之處耳曽子蓋嘗稱之而記者以為可證前説故併記于此范氏曰物各止其所而天下之理得矣故君子所思不出其位而君臣上下大小皆得其職也子曰君子恥其言而過其行行去聲恥者不敢盡之意過者欲有餘之辭文集曰過猶行過恭喪過哀之過胡氏曰恥之義不可謂之不敢盡但其意如是過之義則為有餘故以辭言之諸説皆以為一事謂恥其言之過於行也於義固通但須易而為之字乃可循言求義必如集注釋為兩事斯得夫子立言之意子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼知去聲自責以勉人也胡氏曰聖人自以為無能則學者當知於此致謹也子貢曰夫子自道也道言也自道猶云謙辭胡氏曰在夫子自言則如此由他人觀之則不然蓋聖人未嘗有自足之心也尹氏曰成德以仁為先進學以知為先故夫子之言其序有不同者以此胡氏曰為學之序以知為先若德之成則仁又為百行之首子貢方人子曰賜也賢乎哉夫我則不暇夫音扶方比也乎哉疑辭比方人物而較其短長雖亦窮理之事然專務為此則心馳於外而所以自治者疏矣故褒之而疑其詞復自貶以深抑之謝氏曰聖人責人辭不迫切而意已獨至如此輔氏曰聖人發處渾涵詳密自然如此蓋非有意為之也子曰不患人之不已知患其不能也凡章指同而文不異者一言而重出也文小異者屢言而各出也此章凡四見而文皆有異則聖人於此一事蓋屢言之其丁寧之意亦可見矣胡氏曰此章與前後篇多同學而篇則欲其反而知人之賢否也里仁篇則欲其反而求取知之實也此章與衛靈公篇同而文則異矣蓋失於務外為學之通患聖人每欲其反己以自力故不一言而已也子曰不逆詐不億不信抑亦先覺者是賢乎逆未至而迎之也億未見而意之也詐謂人欺已不信謂人疑已胡氏曰逆與順為對蓋遡而上之故以為未至億以意為文蓋推而度之故以為未見逆詐雖人之欺我者未至而逆遡其欺也億不信雖人之疑我者未見而億度其疑也抑反語辭語録曰略反上文之意言雖不逆不億而於人之情偽自然先覺乃為賢也語録曰雖是不逆詐不億不信然須要先覺方是賢蓋逆詐億不信是才見那人便逆度之先覺却是他詐與不信底情態已露見了自家這裏便要先覺若是在自家面前逆與不信却都不覺時自家却在這裏做什麼理會甚事便是昏昧底相似此章固是要人不得先去逆度亦是要人自著些精采看方得楊氏曰君子一於誠而已然未有誠而不明者故雖不逆詐不億不信而常先覺也若夫不逆不億而卒為小人所罔焉斯亦不足觀也已語録曰楊氏誠則明矣之説大了與本文自不相干如説待誠而明其為覺也後矣蓋此章於日用間便要如此微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎與平聲微生姓畝名也畝名呼夫子而辭甚倨蓋有齒德而隱者栖栖依依也愚謂如鳥之栖木而不去為佞言其務為口給以恱人也孔子曰非敢為佞也疾固也疾惡也固執一而不通也聖人之於達尊禮恭而言直如此其警之亦深矣輔氏曰為佞以説人者失之不及執一而不通者失之過聖人只在中道上行然以大視小者明而易自下窺髙者惑而難故微生之言雖倨而疑夫子之言雖恭而決胡氏曰不恭則失長幼之序不直則失義理之正子曰驥不稱其力稱其德也驥善馬之名德謂調良也胡氏曰調者習熟而易控馭也良者順服而不踶齧也驥未嘗無其力任重致逺非力不可然説銜泛駕亦自其力為之故馬之有力者不足言必言其調良也尹氏曰驥雖有力其稱在德人有才而無德則亦奚足尚哉輔氏曰才與德皆本於天然才出於氣德根於理二者雖不可闕一然出於氣者固不若根於理者之為粹也胡氏曰聖人豈徒以馬言哉所以見於人不可無才凡建功立業皆才為之然不循繩檢逸出於規矩之外者亦才也茍有德以將之而惟理是循則才皆德之用故觀人者不當言其才而當言其德人亦不可徒恃其才而當以德為主也或曰以德報怨何如或人所稱今見老子書德謂恩惠也子曰何以報德言於其所怨既以德報之矣則人之有德於我者又將何以報之乎以直報怨以德報德於其所怨者愛憎取舍一以至公而無私所謂直也輔氏曰循理為直愛憎取舍一順乎理而不以一豪之私參焉是之謂直於其所德者則必以德報之不可忘也或人之言可謂厚矣然以聖人之言觀之則見其出於有意之私而怨德之報皆不得其平也或問以德報怨亦可謂忠且厚矣而夫子不之許何哉曰是亦私意之所為而非天理之正也夫有怨有德人情之所不能忘而所以報之各有所當亦天理之不能已也顧德無大小皆所當報而怨則有公私曲直之不同故聖人之教使人以直報怨以德報德以直云者不以私害公不以曲勝直當報則報不當報則止一視夫理之當然而不以己之私意加焉爾是則雖曰報怨而豈害其為公平而忠厚哉然而聖人終不使人忘怨而沒其報復之名者亦以容夫君父之讎有不得不報者而伸夫忠臣孝子之心耳若或人之言則以報怨為薄而必矯焉以避其名故於其所怨而反報之以德是則誠若忠且厚矣而於所德又將何以報之邪若等而上之每欲益致其厚則以德之上無復可加若但如所以報怨者而己則是所以報德者僅適其平而所以報怨者反厚於德且雖君父之讎亦將有時而忘之也是豈不反逆人情悖天理之甚也哉永嘉陳氏曰以德報怨是為嫌故饒他一著不是循理正大意思却是私心以直報怨初無怨惡心只看道理如何當舉則舉當廢則廢却是公心必如夫子之言然後二者之報各得其所然怨有不讎而德無不報則又未嘗不厚也此章之言明白簡約而其指意曲折反復如造化之簡易易知而微妙無窮學者所冝詳玩也陳氏曰以德報怨之言死定偏滯在一邊若聖人之言怨則以直報德則以德報二者各得其平極是明白簡約而其中旨意却反覆無窮且如此人舊於吾有怨今適相值有罪邪隨其罪之如何而公斷之果賢邪亦薦之果不肖邪則絶之設若不肖者後後能改而賢則吾又薦之一惟理之當然而吾無容私焉是之謂直而於怨固未嘗汲汲以圖報也如此人舊於吾有德今適相值果賢邪吾固薦之以為報若不肖邪吾則歡其輕重陵公義行於上而私恩伸於下於德亦未嘗失其報也子曰莫我知也夫夫音扶夫子自嘆以發子貢之問也子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎不得於天而不怨天不合於人而不尤人但知下學而自然上達此但自言其反己自修循序漸進爾無以甚異於人而致其知也然深味其語意則見其中自有人不及知而天獨知之之妙或問何以人莫之知而天獨知之曰其不怨不尤也則不責之人而責之已其下學人事也則又不求之逺而求之近此固無與於人而不駭於俗矣人亦何自而知之邪及其上逹而與天為一焉則又有非人之所及知者而獨於天理為相關耳黃氏曰窮通榮辱天也用舍豫奪人也常人之情不得所欲則怨天而尤人蓋揚己之善而歸過於天人也下學者所學日用常行之事也上達者道德性命之理也常人之情置事於淺近索理於渺茫足以惑人之耳目而以為能此所以人知之也聖人渾然天理窮通榮辱用舍豫奪皆理之所不能無者順而受之又何怨尤之有人事之中便是天理又何必捨人事而求之於渺茫哉如是則泊然若不見其所長者然天理流行而聖人與之無間如此所以人不知而天知也蓋在孔門唯子貢之智幾足以及此故特語以發之惜乎其猶有所未達也語録曰子貢若有以達之必須有説惜乎見夫子如此説便自住了聖門自顔曽以下惟子貢儘曉得聖人多是將這般話與子貢説他若未曉聖人豈肯説與他但他只知得箇頭耳程子曰不怨天不尤人在理當如此輔氏曰已與天人只是一理在已者既盡則天人無有不應者聖人與理為一自然無所怨尤又曰下學上達意在言表語録曰如下學只是下學如何便會上逹自是言語形容不得又曰此亦無可説説那下學上達便是意在言表了又曰學者須守下學上達之語乃學之要蓋凡下學人事便是上達天理然習而不察則亦不能以上達矣或問下學而上達者言始也下學而卒之上達云爾今程子以為下學人事便是上達天理何邪曰學者學夫人之事形而下者也而其事之理則固天之理也形而上者也學是事而通其理即夫形而下者而得其形而上者焉非達天理而何哉語録曰下學上達雖是兩件理會得透厮合只是一件下學是事上達是理理在事中事不在理外一物之中皆具一理就那物中見得箇理便是上達如大而化之之謂聖聖而不可知之之謂神然亦不離乎人倫日用之中但恐人不能盡所謂學耳果能學安有不能上達者又曰下學上達只要於事物上見理使邪正是非各有其辨若非子細省察則所謂理者何從而見之公伯寮訴子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝朝音潮公伯寮魯人愚案注疏史記皆以公伯寮為弟子胡氏嘗辨之今觀夫子如命何之語以常人待之則胡氏之説然矣故集注但云魯人子服氏景諡伯字魯大夫子服何也愚案孔注以為子服何忌左傳載吳將囚景伯景伯曰何也立後於魯矣杜注云何景伯名則景伯單名何而孔注云何忌誤矣夫子指季孫言其有疑於寮之言也肆陳尸也胡氏曰大夫以上於朝士以下於市言欲誅寮子曰道之將行也與命也道之將廢也與命也公伯寮其如命何與平聲謝氏曰雖寮之訴行亦命也其實寮無如之何愚謂言此以曉景伯安子路而警伯寮耳聖人於利害之際則不待決於命而後泰然也輔氏曰聖人純是義理義所當行則行義所當止則止其處利害之際唯其義而已更不問命之何如今其所以言命者直以曉景伯警伯寮耳子曰賢者辟世辟去聲下同天下無道而隱若伯夷太公是也其次辟地去亂國適治邦胡氏曰若夫子周遊列國不合則去是也其次辟色禮貌衰而去胡氏曰若夫子因衛靈公目視蜚鴈而去是也其次辟言有違言而後去也胡氏曰若夫子因問陳而行是也程子曰四者雖以大小次第言之然非有優劣也所遇不同爾黃氏曰四者固非有優劣然賢者之處世豈不能超然髙舉見幾而作乃至發見於顔色而後辟之邪曰出處之義自非一端隨其所居之位而量其所處之宜可也衛靈公顧蜚鴈則辟色矣問陳則辟言矣豈夫子於此為劣乎此所以不可以優劣言也子曰作者七人矣李氏曰作起也言起而隱去者今七人矣不可知其誰何必求其人以實之則鑿矣輔氏曰凡書所載有當深索者不深索之則失之略有不必過求者過求之則失之鑿所謂當深索者義理是也所謂不必過求者此處是也子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與與平聲石門地名晨門掌晨啓門蓋賢人隱於抱關者也自從也問其何所從來也胡氏曰晨門知世之不可而不為故以是譏孔子然不知聖人之視天下無不可為之時也輔氏曰賢者之視天下則有不可為之時其才力有限也聖人之視天下則無不可為之時其道無所不可也子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎荷去聲磬樂器荷擔也蕢草器也此荷蕢者亦隱士也聖人之心未嘗忘天下此人聞其磬聲而知之則亦非常人矣輔氏曰荷蕢聞磬音而能知夫子之心其存養純固精神昭徹不為事物所汨亂可謂賢於人一等矣既而曰鄙哉硜硜乎莫已知也斯己而已矣深則厲淺則揭硜苦耕反莫己之已音紀餘音以揭起例反硜硜石聲亦專確之意以衣涉水曰厲攝衣涉水曰揭此兩句衛風匏有苦葉之詩也譏孔子人不知已而不止不能適淺深之冝蔡氏曰深則厲淺則揭言不問深淺而必𣣔渡也匏有苦葉之詩意正如此故荷蕢舉此兩句以譏夫子人不知已而不止子曰果哉末之難矣果哉歎其果於忘世也末無也聖人心同天地視天下猶一家中國猶一人不能一日忘也故聞荷蕢之言而歎其果於忘世且言人之出處若但如此則亦無所難矣輔氏曰聖人之於天下猶天地之於萬物雖未嘗比之以為私然亦不能忘之以為公也夫豈以人之知不知而為作輟哉且果於忘世決去不反者能之何難之有若大聖人之出處因時卷舒與道消息而憂世之心終不能已濟世之用其出無窮此豈荷蕢所能與哉子張曰書云髙宗諒隂三年不言何謂也髙宗商王武丁也諒隂天子居喪之名未詳其義或問諒隂曰諒信也隂默也信或謂信任冡宰或謂信能默而不言為説不同或又讀作梁暗言居倚廬大抵古者天子居喪之名如此其義則古今言殊不可曉矣子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年言君薨則諸侯亦然總已謂總攝已職冢宰大宰也百官聽於冢宰故君得以三年不言也胡氏曰位有貴賤而生於父母無以異者故三年之喪自天子達於庶人子張非疑此也殆以為人君三年不言則臣下無所稟令禍亂或由以起也孔子告以聽於冢宰則禍亂非所憂矣子曰上好禮則民易使也好易皆去聲謝氏曰禮達而分定故民易使輔氏曰達謂達於下也上好禮則品節分明而誠意退遜故觀感於下者亦皆安已之分聽上之命而易使子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸修己以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之無他道也人者對已而言百姓則盡乎人矣或問此章之説曰修己以敬者語雖至約而所以齊家治國平天下之本舉積諸此子路不喻而少其言於是告以安人安百姓之説蓋言修己以敬而極其至則心平氣和靜虛動直而所施為無不自然各當其理是以其治之所及者羣黎百姓莫不各得其安也是皆本於修己以敬之一言然所謂敬者非若四端之善始然始達而可擴由敬而安人安百姓非若由格物致知以至於正身及物有待夫節節推之也非若老老幼幼由已及物而待夫舉斯心以加諸彼也亦謂其功效之自然及物者為然耳黃氏曰充積之盛非謂修己以敬之外又有充積之功也修己以敬而可為君子則是充積之盛在其中矣特言其功效之逺則指夫充積之盛者而言之也堯舜猶病言不可以有加於此以抑子路使反求諸近也輔氏曰此又指聖人之心無有窮已處以警子路使母徒騖於虛逺而不求之切近也蓋聖人之心無窮世雖極治然豈能必知四海之內果無一物不得其所哉故堯舜猶以安百姓為病若曰吾治已足則非所以為聖人矣程子曰君子修己以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣此體信達順之道聰明睿知皆由是出以此事天饗帝語録曰惟上下一於恭敬這却是上之人有以感發而興起之又曰信只是實理順只是和氣體信是致中底意思達順是致和底意思言能恭敬則能體信達順聰明睿知皆由此出者言能恭敬自然心便開明又曰體信是真實無妄達順是使萬物各得其所又曰體信是實體此道於身達順是發而中節推之天下而無所不通也又曰體信只盡這至誠道理達順即自此發出體信達順即是主忠行恕又曰敬則自是聰明人之所以不聰不明止緣身心惰慢便昏塞了敬則虛靜自然通達又曰且以一國之君看之此心才不專靜則姦聲佞辭雜進而不察何以為聰亂色諛恱之容交蔽而莫辨何以為明睿智皆出於心心既無主則應事接物之間其何以思慮而得其冝所以此心常要肅然虛明然後物不能蔽又曰聰明睿智皆由是出是自誠而明意思又曰此語非容易道得是他曽因此出些聰明睿知來愚謂天地位萬物育與安百姓只是一事若隂陽不和五榖不熟百姓何由而安原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛孫弟並去聲長上聲叩音口脛其定反原壤孔子之故人魯人母死而歌蓋老氏之流自放於禮法之外者夷蹲踞也愚謂鴟鳥始蹲故或謂之蹲鴟又或謂之鴟夷夷即蹲也俟待也言見孔子來而蹲踞以待之也述猶稱也賊者害人之名以其自幼至長無一善狀而久生於世徒足以敗常亂俗則是賊而已矣脛足骨也孔子既責之而因以所曵之杖微擊其脛若使勿蹲踞然闕黨童子將命或問之曰益者與與平聲闕黨黨名童子未冠者之稱將命謂傳賔主之言或人疑此童子學有進益故孔子使之傳命以寵異之也子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也禮童子當隅坐隨行胡氏曰隅坐無位可居也隨行不敢並也孔子言吾見此童子不循此禮非能求益但欲速成爾輔氏曰求益則浸長而不知欲速則亟進而無序聖門之教雖以敏行為先而又以躐等為戒故使之給使令之役觀長少之序習揖遜之容蓋所以抑而教之非寵而異之也論語纂疏卷七
