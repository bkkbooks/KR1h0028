body:
  text: 欽定四庫全書孟子纂疏卷五宋趙順孫撰朱子集注滕文公章句上凡五章滕文公為世子將之楚過宋而見孟子世子太子也孟子道性善言必稱堯舜道言也性者人所稟於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汨於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子與世子言每道性善而必稱堯舜以實之欲其知仁義不假外求聖人可學而至而不懈於用力也或問此一節曰性善者以理言之稱堯舜者質其事以實之所以互相發也其言蓋曰知性善則有以知堯舜之必可為矣知堯舜之可為則其於性善也信之益篤而守之益固矣文集曰天之生此人無不與之以仁義禮智之理亦何嘗有不善但欲生此物必須有氣然後此物有以聚而成質而氣之為物有清濁昏明之不同稟其清明之氣而無物欲之纍則為聖稟其氣清明而未純全則未免微有物欲之纍而能克以正之則為賢稟其昏濁之氣又為物欲之所蔽而不能去則為愚為不肖是皆氣禀物欲之所為而性之善未嘗不同也堯舜之生所受之性亦如是耳但以其氣稟清明自無物欲之蔽故為堯舜初非有所增益於性分之外也故學者知性善則知堯舜之聖非是强為識得堯舜做處則便識得性善砥規模樣子而凡吾日用之間所以去人欲復天理者皆吾分內當然之事其𫝑至順而無難此孟子所以首為文公言之而又稱堯舜以實之也語録曰七篇論性處只此一處較說得盡須是日日認一過又曰性善故人皆可為堯舜必稱堯舜所以驗性善之實又曰道性善與稱堯舜二句正相表裏蓋人所以不至於堯舜者是他力量不至固無可奈何然人須當以堯舜為法方做得箇人無所缺闕然也只是本分事問惟堯舜為能無物欲之蔽而充其性人蓋有恬於嗜欲而不能充其性者何故曰不蔽於彼則蔽於此不蔽於此則蔽於彼畢竟須有蔽處物欲亦有多少般如白日須是雲遮方不見若無雲豈應不見然此等處緊要在性字上今且合思量如何是性在我為何物反求吾心有蔽無蔽能充不能充必論堯如何舜又如何黃氏曰性者人之所得於天之理也堯舜者盡此性者也苟盡此性堯舜可為也道之不明久矣舉天下之人汨沒於利欲之中貪夫殉財烈士殉名夸者死權品庶馮生天之所以與我而堯舜可為者懵然莫覺也誠能深思孟子之言而厲之以自彊之志則將有超然獨立乎萬物之表而天下之至貴無以復加矣門人不能悉記其辭而撮其大㫖如此輔氏曰朱子既斷孟子之書以為孟子自著則似此處皆當改此是後來不曾改得程子曰性即理也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節即無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非文集曰天理固無對然既有人欲即天理便不得不與人欲為消長善亦本無對然既有惡即善便不得不與惡為盛衰譬如普天之下莫非王土率土之濱莫非王臣此本豈有對哉至於晉有五胡唐有三鎮則華夷逆順不得不相與為對矣但其初則有善而無惡有天理而無人欲耳語録曰性只是此理又曰性是天生成許多道理又曰性是許多理散在處為性又曰在心喚做性在事喚做理又曰性即理也四字攧撲不破實自己上見得出來又曰如性即理也一語直自孔子後惟是伊川說得盡是千萬世說性之根基理是箇公共砥物事不解會不善人做不是自是失了性却不是壞了著修又曰性即理也當然之理無有不善者問凡言善惡必先善而後惡何也曰先有理而後有氣也真氏曰性即理也乃自昔聖賢之所未言萬世言性之標凖世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣復扶又反夫音扶時人不知性之本善而以聖賢為不可企及故世子於孟子之言不能無疑而復來求見蓋恐别有卑近易行之說也孟子知之故但告之如此以明古今聖愚本同一性前言已盡無復有他說也或問世子疑孟子之言而孟子之不拒何也曰孟子之言非當時所常聞也故聞者非徒不之信而亦莫之疑也世子復來則豈其思之未得而不舍於心與故孟子雖若怪之而實喜其能思而將有以進乎此也文集曰當戰國之時聖學不明天下之人但知功利之可求而不知己性之本善聖賢之可學聞是說者非惟不信往往亦不復致疑於其問若文公則雖未能盡信而已能有所疑矣是其可與進善之萌芽也故孟子於其去而復來迎而謂之曰世子疑吾言乎而又告之曰夫道一而已矣蓋古今聖愚同此一性則天下固不容有二道但在篤信力行則天下之理雖有至難猶必可至況善乃人之所本有而為之不難乎輔氏曰二說自不相礙集注則言世子所以致疑者其意如此講義則言世子比當時之人則尚能致疑於其間二說相須其義始備性本一理則道無二致故也成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也豫何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉覸古莧反成覸人姓名彼謂聖賢也有為者亦若是言人能有為則皆如舜也公明姓儀名魯賢人也文王我師也蓋周公之言公明儀亦以文王為必可師故誦周公之言而歎其不我欺也孟子既告世子以道無二致而復引此三言以明之欲世子篤信力行以師聖賢不當復求他說也文集曰孟子引三段說話教人如此發憤勇猛向前日用之間不得存留一豪人欲之私在這裏此外更無别法若如此有箇奮迅興起處方有田地可下工夫不然即是畫脂鏤冰無真實得力處也今滕絶長補短將五十里也猶可以為善國書曰若藥不瞑眩厥疾不瘳瞑莫甸反眩音縣絶猶截也書商書說命篇瞑眩憒亂文集曰如服瞑眩之藥以除深錮之病直是不可悠悠又曰大要為聖賢須是猛喫瞑眩之藥相似服教他麻了一上及其定疊病自退了蔡氏曰方言曰飲藥而毒海岱之間謂之瞑眩言滕國雖小猶足為治但恐安於卑近不能自克則不足以去惡而為善也輔氏曰此可見孟子之所謂性與道非外事與物而言之也愚案孟子之言性善始見於此而詳具於告子之篇然默識而旁通之則七篇之中無非此理其所以擴前聖之未發而有功於聖人之門程子之言信矣輔氏曰性善是那義理之綱領識得性善則凡出處語默言論風㫖凡孟子所說許多義理皆自此流出無有一事是在外者因人不識其性善故言不及惟程子學已至到故知得孟子此說真能擴前聖所未發而有功於聖人之門也真氏曰七篇之中無非此意者如言仁義言四端蓋其大者至於因齊王之愛牛而勸之以行王政亦因其性善而引之當道也以此推之他可識矣滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事定公文公父也然友世子之傅也大故大喪也事謂喪禮然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子達於庶人三代共之齊音資疏所居反飦諸延反當時諸侯莫能行古喪禮而文公獨能以此為問故孟子善之又言父母之喪固人子之心所自盡者蓋悲哀之情痛疾之意非自外至宜乎文公於此有所不能自己也但所引曽子之言本孔子告樊遲者豈曽子嘗誦之以告其門人歟三年之喪者子生三年然後免於父母之懷故父母之喪必以三年也或問三年之喪曰人子之心無窮也聖人以為子生三年而後免於父母之懷也故為之立中制節使賢者不得過不肖者不得不及也齊衣下縫也不緝曰斬衰緝之曰齊衰疏粗也粗布也飦糜也喪禮三日始食粥既葬乃疏食語録曰孟子答滕文公喪禮不說到細碎上只說齊疏之服飦粥之食自天子達於庶人這二項便是大原大本此古今貴賤通行之禮也愚謂自天子達於庶人是無貴賤之别三代共之是無古今之異然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也父兄同姓老臣也滕與魯俱文王之後而魯祖周公為長兄弟宗之故滕謂魯為宗國也語録曰古宗法如周公兄弟之為諸侯者則皆以魯國為宗至戰國時滕猶稱魯為宗國也然謂二國不行三年之喪者乃其後世之失非周公之法本然也志記也引志之言而釋其意以為所以如此者蓋為上世以來有所傳受雖或不同不可改也然志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚者也謂然友曰吾他日未嘗學問好馳馬試劒今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冢宰啜粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之德風也小人之德草也草尚之風必偃是在世子好為皆去聲復扶又反啜川恱反不我足謂不以我滿足其意也然者然其不我足之言不可他求者言當責之於己輔氏曰是應前而固所自盡之說冡宰六卿之長也啜飲也深墨甚黑色也即就也尚加也論語作上古字通也偃仆也孟子言但在世子自盡其哀而已輔氏曰是應上句不可他求之意然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大恱諸侯五月而葬未葬居倚廬於中門之外居喪不言故未有命令教戒也可謂曰知疑有闕誤或曰皆謂世子之知禮也輔氏曰若如或者之說則可字當作皆字若作可字則不成文理林氏曰孟子之時喪禮既壞然三年之喪惻隱之心痛疾之意出於人心之所固有者初未嘗已也惟其溺於流俗之弊是以喪其良心而不自知耳文公見孟子而聞性善堯舜之說則固有以啓發其良心矣是以至此反躬自責悼其前行之不足以取信而不敢有非其父兄百官之心雖其資質有過人者而學問之力亦不可誣也及其斷然行之而逺近見聞無不恱服則以人心之所同然者自我發之而彼之心恱誠服亦有所不期然而然者人性之善豈不信哉輔氏曰林氏之說雖集注翦截增益以成之然辭順義精說得人心事理坦然明白學者苟能熟玩而深繹之則必有所發於己而知性善之㫖矣至論文公反躬自責悼其前行之不足取信而不敢有非其父兄百官之心以為學問之力則尤有益於學者大凡學者必須知此理然後有進而識古人為己之學之意矣滕文公問為國文公以禮聘孟子故孟子至滕而文公問之輔氏曰前則云使然友問後則云使畢戰問此但言滕文公問則知是文公親問孟子也蓋文公既即位固不可越國往見孟子則必是以禮聘孟子至滕而文公問之也孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖綯音陶亟紀力反民事謂農事詩豳風七月之篇于往取也綯絞也亟急也乘升也詩傳曰晝往取茅夜而絞索亟升其屋而治之不待督責而自相警戒不敢休息如此愚謂綯繩之絞也所用蓋野廬之屋者播布也言農事至重人君不可以為緩而忽之故引詩言治屋之急如此者蓋以來春將復始播百榖而不暇為此也輔氏曰詩言民之趨於農功自然如此其亟孟子引之以證其民事不可緩之說然熟玩之便見得民事真不可緩之意人君者若能真知民事之不可緩則於為國也思過半矣民之為道也有恆産者有恆心無恆産者無桓心苟無恆心放僻邪侈無不為己及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也音義並見前篇是故賢君必恭儉禮下取於民有制恭則能以禮接下儉則能取民以制愚謂人君才恭敬則自然能以禮接下才節儉則自然能取民以制禮下所以開世祿及學校之事也取民以制所以開制民常産及貢助徹之法也陽虎曰為富不仁矣為仁不富矣陽虎陽貨魯季氏家臣也天理人欲不容並立虎之言此恐為仁之害於富也孟子引之恐為富之害於仁也君子小人每相反而已矣輔氏曰天理人欲固不容於並立然先儒多以為孟子取陽貨之言是不以人廢言之公心惟集注以為所言雖同而所取各異君子小人每相反而已者其說尤為的當夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也徹敕列反藉子夜反此以下乃言制民常産與其取之之制也夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田語録曰貢助異法貢則直計其五畝之入自賦於官助則須計公田之中八家各助七畝只得五十六畝則十四畝須依古法折除一家各得一畝若千步為廬舍方成八家各助耕公田七畝也永嘉陳氏曰夏商若同是井田則皆八家同為一井但田分多寡耳夏之井則為五十畝者九其中五十畝為公田商之井則為七十畝者九其中七十畝為公田此以周井田法約之但孟子言唯助為有公田貢則什取其一即是夏之貢不井但於五十畝之中抽十之一以供貢商之助則井却於七十畝之外别取公田之什一以輸官周時一夫授田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分故謂之徹語録曰先王疆理天下之初做許多畎溝澮洫之類大段是費人力了若是自五十而增為七十自七十而增為百畝則田閒許多疆理都合更改恐無是理孟子當時未必親見只是傳聞如此恐亦難盡信也問鄉遂用貢法都鄙用助法耕則通力而作收則計畝而分永嘉諸人皆謂鄉遂都鄙初無二制不知何以考之也曰此亦不可詳知但因洛陽議論中通徹而耕之說推之耳或但耕則通力而耕收則各得其畝亦未可知也鄉遂都鄙田制不同周禮分明如近年新說只教畫在紙上亦畫不成如何行得去若如此則有田之家一處受田一處應役彼此交互難相統一官司實難稽考民間易生弊病公私煩擾不可勝言聖人立法必不如此也問都鄙用助法八家同井鄉遂用貢法十夫有溝鄉遂所以不為井者何故曰都鄙以四起數五六家始出一人故甸出甲士三人步卒七十二人鄉遂以五起數家出一人為兵以守衛王畿役次必簡故周禮惟挽匶則用之此役之最輕者陳氏曰周制國中鄉遂之地用貢法田不井授但為溝洫一夫受田百畝與同溝之人通力合作計畝均收大率什而賦其一野外都鄙之地用助法田以井授中百畝為公田八家各私外百畝同養公田永嘉陳氏曰鄉遂用貢法遂人是也都鄙用助法匠人是也案遂人云百夫有洫十夫有溝溝即不見得包溝洫在內若是在內當云百夫十夫之間矣匠人溝洫却在內故皆以間言方十里者以開方法計之為九百夫方百里者以開方法計之為九萬夫遂人匠人兩處各是一法朱子總其說謂貢法十夫有溝助法八家同井其言簡而盡矣但不知其必分二法者何故竊意鄉遂之地在近郊逺郊之間六軍之所從出必是平原廣野可畫為萬夫之田有溝有洫又有途路方員可以如圖蓋萬夫之地所占不多以井田一同法約之止有九分之一故以徑法攤算逐一見其子數若都鄙之地謂之甸稍縣都乃公卿大夫之采地包山林陵麓在內難用溝洫法整齊分畫故逐處畫為井田雖有溝洫不能如圖故但言在其間其地綿亘一同之地為萬夫者九故以徑法紐算但止言其母數其實皆什一者貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一蓋又輕於十一矣竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也輔氏曰其曰助法乃是九一者是以文王治岐耕者九一及下文請野九一而助知其然也而商制實無可考其曰竊料商制亦當如周制則一夫實耕公田七畝通私田七十畝亦為十一分而取其一也與九一之制亦不合然十一而取其一則亦與什一之制不爭多故曰其實皆什一也徹通也均也輔氏曰謂徹法耕則通力而共作收則計畝而均分也藉借也龍子曰治地莫善於助莫不善於貢貢者校數歲之中以為常樂歲粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也樂音洛盻五禮反從目從兮或音普莧反者非養去聲惡平聲龍子古賢人狼戾猶狼藉言多也糞擁也盈滿也愚謂此言豐樂之嵗其粒米狼藉饒多雖多取之而不為暴虐則以寡取之凶荒之年糞其田尚不足則以取滿其常數焉是則校數嵗之中以為常之意也盻恨視也勤動勞苦也稱舉也貸借也取物於人而出息以償之也益之以足取盈之數也稚幼子也夫世祿滕固行之矣夫音扶孟子嘗言文王治岐耕者九一仕者世祿二者王政之本也今世祿滕己行之惟助法未行故取於民者無制耳蓋世祿者授之土田使之食其公田之入實與助法相為表裏所以使君子野人各有定業而上下相安者也故下文遂言助法詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也雨于付反詩小雅大田之篇雨降雨也言願天雨於公田而遂及私田先公而後私也詩傳曰言農夫之心先公後私故望此雨而曰天其雨我公田而遂及我之私田乎當時助法盡廢典籍不存惟有此詩可見周亦用助故引之也語録曰考之周禮行助法處有公田行貢法處無公田又曰孟子不曽見周禮只據詩裏說用詩意帶將去設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也倫序也父子有親君臣有義夫婦有别長幼有序朋友有信此人之大倫也庠序學校皆以明此而已語録曰問鄉學如何曰皆於農隙而學曰孰與教之曰鄉大夫有德行而致其仕者教之輔氏曰養老序射皆學校教人之事特三代欲異其名故取義不同耳然此三者皆鄉學也故異名至於國學則但同謂之學而已言學則庠校序皆舉之矣鄉學雖有異名國學雖無異名然其明人倫以教之之事則同也有王者起必來取法是為王者師也滕國褊小雖行仁政未必能興王業然為王者師則雖不有天下而其澤亦足以及天下矣聖賢至公無我之心於此可見語録曰孟子只說有王者起必來取法是為王者師是亦要國大方做得小砥亦不奈何輔氏曰所謂聖賢則總五帝三王及輔佐之賢與夫孔子孟子而言之也恭儉德也禮下取民有制政事也貢助徹法度也學校教也所以成終也內外兩盡政教具舉本末始終有序為國之道備矣國雖褊小𫝑不能致王業之興然有王者作必來取法為王者師則德澤亦足以及於天下矣於此可見聖賢至公無我之心而或者猶疑孟子不當勸齊王行王道者何哉齊梁地廣民衆其不王者不為耳故孟子勸以行王政滕國壤地褊小雖行仁政未必能興王業也故教以彊為善以為王者師以此見孟子之道能大能小無不可為之事也詩云周雖舊邦其命惟新文王之謂也子力行之亦以新子之國詩大雅文王之篇言周雖后稷以來舊為諸侯其受天命而有天下則自文王始也子指文公諸侯未踰年之稱也使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖祿不平是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也夫音扶畢戰滕臣文公因孟子之言而使畢戰主為井地之事故又使之來問其詳也輔氏曰因其使畢戰來問故知是使畢戰主為其事而因使之來問其詳也度孟子之來滕國不久便去故使畢戰往問之若孟子尚留滕國則文公亦必親與之商略矣井地即井田也愚謂井地則言其始以地而畫井耳井田則因其田既已成井而言之也經界謂治地分田經畫其溝塗封植之界也輔氏曰治地謂開辟其方里為井之地也分田謂分為九百畝之田也田側有溝壑上有塗封植則封其所植之木以為界止也此法不修則田無定分而豪强得以兼并故井地有不均賦無定法而貪暴得以多取故榖祿有不平輔氏曰經畫界止之法不修則田無定制不定為一夫授田百畝之制而民之豪强者惟其所取得以兼并其他人之所有我之所占者既多則人之所得者或少故於井地有不均賦無定法則不特取公田十一之賦而暴君貪吏惟其所取得以裒斂其私田之所入此或得祿之多彼或得祿之少故於榖祿有不平此欲行仁政者之所以必從此始而暴君汙吏則必欲慢而廢之也輔氏曰若有仁君欲行仁政使彼此均平田無多少之差則必從經界之事做起而暴君汙吏貪得務多只知有我不知有民只知為己不知為人者則必欲慢而廢之也凡事須是敬則能立才有慢心事便日趨於弊壞也有以正之則分田制祿可不勞而定矣夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子夫音扶養去聲言滕地雖小然其間亦必有為君子而仕者亦必有為野人而耕者是以分田制祿之法不可偏廢也輔氏曰國無大小雖小國亦有仕於朝為君子者亦必有耕於野而為野人者無君子則孰治小人無野人則孰養君子言此以見分田制祿之法不可偏廢而有國者之於經畫誠不可以慢也請野九一而助國中什一使自賦此分田制祿之常法所以治野人使養君子也野郊外都鄙之地也九一而助為公田而行助法也國中郊門之內鄉遂之地也田不井授但為溝洫使什而自賦其一蓋用貢法也周所謂徹法者蓋如此語録曰野謂甸稍縣都行九一法國中什一以在王城豐凶易察又曰國中行鄉遂之法如五家為比五比為閭四閭為族四族為黨五黨為州又如五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍皆五五相連屬所以行不得那九一之法故只得什一使自賦如鄉遂却行井牧之法鄉遂之法次第是一家出一人兵且如五家為比比便有一箇長了井牧之法次第是三十家方出得士十人徒十人輔氏曰郊外都鄙用助法則收其公田之所入以為君子之祿食國中鄉遂用貢法則使耕者什而自賦其一以充國家之所用其逺近之所以不同者詳已見前段此周之所謂徹法也前所謂徹者通也均也者所以釋徹字之義此則正言其法是如此以此推之當時非惟助法不行其貢亦不止什一矣輔氏曰以其請野九一而助則知助法之不行又云國中什一使自賦則當時之貢法亦有彊取其賦於什一之外者矣卿以下必有圭田圭田五十畝此世祿常制之外又有圭田所以厚君子也語録曰卿受田六十邑乃當二百四十井此外又有圭田五十畝也問卿士大夫之有圭田必有耕之者豈亦有耕屬可耕乎恐圭田只是給公田之在民者如井九百𤱔而百畝為公田之類曰其制未及詳考大抵古者田祿皆是助法之公田充而八家因為之屬如有田一成有衆一旅是也圭田恐亦如此故王制云圭田無征圭潔也所以奉祭祀也不言世祿者滕己行之但此未備耳餘夫二十五畝程子曰一夫上父母下妻子以五口八口為率受田百畝如有弟是餘夫也年十六别受田二十五畝俟其壯而有室然後更受百畝之田愚按此百畝常制之外又有餘夫之田以厚野人也語録曰餘夫二十五畝乃是十六嵗以前所受在一夫百畝之外也死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦死謂葬也徙謂徙其居也同井者八家也友猶伴也守望防冦盜也輔氏曰鄉謂萬二千五百人為鄉之鄉死徙無出鄉者死而葬者徙而居者皆不可出其鄉也鄉田同井者同鄉之人則八家同為一井一井之中其出入則自相為伴防禦寇盜則自相為助疾病則自相扶持此張子所謂井田救災恤患之事也如此則朝夕同處自然親睦也此又言助法之善也方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也養去聲别彼列反此詳言井田形體之制乃周之助法也輔氏曰上既言助法之善故此下遂言周之助法也方里而井井九百畝其中為公田便是井田形體之制也公田以為君子之祿而私田野人之所受先公後私所以别君子野人之分也不言君子據野人而言省文耳上言野及國中二法此獨詳於治野者國中貢法當世已行但取之過於什一爾此其大略也若夫潤澤之則在君與子矣夫音扶井地之法諸侯皆去其籍此特其大略而已潤澤謂因時制冝使合於人情冝於土俗而不失乎先王之意也輔氏曰此非是解此二字之義乃就井田之法上言必能如此立法然後可謂之潤澤也吕氏曰子張子慨然有意三代之治論治人先務未始不以經界為急講求法制粲然備具要之可以行于今如有用我者舉而措之耳嘗曰仁政必自經界始貧富不均教養無法雖欲言治皆苟而已世之病難行者未始不以亟奪富人之田為辭然兹法之行恱之者衆苟處之有術期以數年不刑一人而可復所病者特上之未行耳乃言曰縱不能行之天下猶可驗之一鄉方與學者議古之法買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救菑恤患厚本抑末足以推先王之遺法明當今之可行有志未就而卒輔氏曰張子之學已到古聖人之心事故見得治天下先務必當以經界為急於是力考詳究知其法之行恱之者衆苟行之有術期以數年不刑一人而可復既不得行則又欲私為而小驗之以明先王之法無不可行者以待後之君子嗚呼仁哉愚案喪禮經界兩章見孟子之學識其大者是以雖當禮法廢壞之後制度節文不可復考而能因略以致詳推舊而為新不屑屑於既往之迹而能合乎先王之意真可謂命世亞聖之才矣輔氏曰常人而欲法古先哲王之事於後世者往往不曽先得古人之心屑屑然泥其既往之迹到行不得處則反出其私意穿鑿杜撰以求其必濟甚者至於嚴刑峻法以箝人之議彊民之從於是與先王之意背馳非徒無益而又害之者多矣唯孟子之學識其大者謂先得古先哲王之心也是以雖當禮法廢壞之後制度節文不可復考而能因略而致詳謂因其大體而詳其節目推舊以為新謂推其既往以為今日之制雖不屑屑於己往之迹而能合於先王之意此與聖賢同一心事同一軌轍信非命世亞聖之大才不能為也有為神農之言者許行自楚之滕踵門而告文公曰逺方之人聞君行仁政願受一廛而為氓文公與之處其徒數十人皆衣褐捆屨織席以為食衣去聲捆音閫神農炎帝神農氏始為耒耜教民稼穡者也為其言者史遷所謂農家者流也許姓行名也踵門足至門也仁政上章所言井地之法也輔氏曰此可見人心之所同不獨孟子以為仁政而當時之人亦莫不以為仁政也廛民所居也輔氏曰前言市廛則為市中之宅此但言㕓則為民所居而已氓野人之稱褐毛布賤者之服也捆扣之欲其堅也愚謂織屨必扣者蓋擊之使堅實也以為食賣以供食也程子曰許行所謂神農之言乃後世稱述上古之事失其義理者耳猶隂陽醫方稱黃帝之說也或問許行為神農之言而有君民並耕市不二賈之說何耶曰程子之言盡矣然以易考之二者皆神農之所為也當時民淳事簡容或有如許行之說者及乎世變風移至於唐虞之際則雖神農復生亦當隨時以立政而不容固守其舊矣況許行之妄乃欲以是而行於戰國之時乎輔氏曰隂陽醫方所稱黃帝之說如素問靈樞之類是也使真有神農黃帝之言傳於世孔孟豈得而不稱述之哉陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓陳良楚之儒者耜所以起土耒其柄也陳相見許行而大恱盡棄其學而學焉陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也賢者與民並耕而食饔飧而治今也滕有倉廩府庫則是厲民而以自養也惡得賢饔音雍飧音孫惡平聲饔飧熟食也朝曰饔夕曰飧言當自炊爨以為食而兼治民事也厲病也許行此言蓋欲隂壞孟子分别君子野人之法輔氏曰文公既有意於為國而問於孟子孟子既告之當以經界為始而文公又使畢戰主為其事矣故鄰國皆知之而有志之士各欲以其所學來告至於異端邪說亦皆欲來售其說如許行是也許行謂君民尚當並耕而食則為君子而仕者可知矣是其說正與孟子分别君子野人相反故知許行欲隂壞其法也孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釡甑爨以鐵耕乎曰然自為之與曰否以粟易之衣去聲與平聲釡所以煮甑所以炊爨然火也鐵耜屬也此語八反皆孟子問而陳相對也以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宫中而用之何為紛紛然與百工交易何許子之不憚煩曰百工之事固不可耕且為也舍去聲此孟子言而陳相對也械器釡甑之屬也陶為甑者冶為釡鐵者舍止也或讀屬上句舍謂作陶冶之處也然則治天下獨可耕且為與有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也與平聲食音嗣此以下皆孟子言也路謂奔走道路無時休息也輔氏曰此但言其勞耳若曰以一人之身而欲自為百工之事以足其用則譬如率天下之人奔走於道路而無時休息也其可哉治於人者見治於人也食人者出賦稅以給公上也食於人者見食於人也此四句皆古語而孟子引之也君子無小人則飢小人無君子則亂以此相易正猶農夫陶冶以粟與械器相易乃所以相濟而非所以相病也輔氏曰君子勞心以治人而食於人野人勞力以治於人而食人此理天實為之天下萬世之所共由也正猶農夫與陶冶相與易事而以相濟相成也豈有相病之理乎治天下者豈必耕且為哉當堯之時天下猶未平洪水橫流泛濫於天下草木暢茂禽獸繁殖五榖不登禽獸逼人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎瀹音藥濟子禮反漯他合反天下猶未平者洪荒之世生民之害多矣聖人迭興漸次除治至此尚未盡平也洪大也橫流不由其道而散溢妄行也泛濫橫流之貌暢茂長盛也繁殖衆多也五榖稻黍稷麥菽也登成熟也道路也獸蹄鳥跡交於中國言禽獸多也敷布也益舜臣名烈熾也禽獸逃匿然後禹得施治水之功疏通也分也九河曰徒駭曰太史曰馬頰曰覆釡曰胡蘇曰簡曰潔曰鉤盤曰鬲津蔡氏曰書傳案爾雅九河一曰徒駭二曰太史三曰馬頰四曰覆釜五曰胡蘇六曰簡潔七曰鉤盤八曰鬲津其一則河之經流也先儒不知河之經流遂分簡潔為二書傳引此與集注少異書傳實經朱子晚年所訂正當以為定也瀹亦疏通之意濟漯二水名愚案濟水出河東郡垣縣王屋山東南至武德入河軼出滎陽北地中又東至琅槐入海漯水出東郡東武陽縣東北至千乘入海決排皆去其壅塞也汝漢淮泗亦皆水名也據禹貢及今水路惟漢水入江耳汝泗則入淮而淮自入海此謂四水皆入于江記者之誤也語録曰決汝漢淮泗而注之江此但作文取其字數以足對偶而云耳若以水路之實論之便有不通說者見其不通便欲强為之說然亦徒為穿鑿而卒不能使之通也如沈括引李翺來南録云自淮沿流至于髙郵乃泝于江因謂淮泗入江乃禹之舊迹故道宛然但今江淮已深不能至髙郵耳此說甚似其實非也案禹貢淮水出桐柏㑹泗沂以入于海故以小江而列於四瀆正以其能專達于海耳若如此說則禹貢當云南入于江不應言東入于海而淮亦不得為瀆矣且翺沿泝二字似亦未當蓋古今往來淮南只行䢴溝運河皆築埭置閘儲間潮汐以通漕運非流水也若使當時自有禹迹故道可通舟楫則不須更開運河矣故自淮至髙郵不得為沿有髙郵以入江不得為泝而翺又有自淮順潮入新浦之言則是入運河時偶隨淮潮而入有似於沿意其過髙郵後又迎江潮而出故復有似於泝而察之不審致此謬誤今竟以是而說孟子是以誤而益誤也今案來南録中無此語未詳其故近世又有立說以為淮泗本不入江當洪水橫流之時排退淮泗然後能決汝漢以入江此語尤巧而尢不通蓋汝水入淮泗水亦入淮三水合而為一若排退淮泗則汝水亦見排退而愈不得入江矣漢水自嶓冢過襄陽南流至漢陽軍乃入于江淮自桐柏東流㑹汝水以入于海淮漢之間自有大山自唐鄧光黃以下至於潜霍地勢隔慕雖使淮泗橫流亦與江漢不相干涉不待排退二水而後漢得入江也大抵孟子之言只是行文之失無害於義理不必曲為之說間費心力也后稷教民稼穡樹藝五榖五榖熟而民人育人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之聖人之憂民如此而暇耕乎契音薛别彼列反長放皆上聲勞來皆去聲言水土平然後得以教稼穡衣食足然後得以施教化后稷官名棄為之然言教民則亦非並耕矣樹亦種也藝殖也契亦舜臣名也司徒官名也人之有道言其皆有秉彞之性也然無教則亦放逸怠惰而失之故聖人設官而教以人倫亦因其固有者而道之耳真氏曰父子之親君臣之義夫婦之别長幼之序朋友之信皆人性所自有舜之命官敷教亦因其有而導之耳非强之以所無也書曰天叙五典勑我五典五惇哉此之謂也輔氏曰舉書曰以為證者天叙即所謂固有也勑而厚之即所謂道之也放勳本史臣贊堯之辭孟子因以為堯號也德猶惠也堯言勞者勞之來者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之蓋命契之辭也語録曰問振德是施惠否曰是然不是財惠之惠只是施之以教化上文匡直輔翼等事是也彼既自得之復從而教之輔氏曰勞者勞之來者來之所以安其生也邪者正之枉者直之所以正其德也輔以立之翼以行之所以助其行也自得謂自得其性也振謂提撕警省也此乃大學新民之功也德謂加惠也此數句先儒注解皆只大綱提過都無意味至集注而後字字研究其理如此方見聖人之用又斷以為堯命契之辭始得允當堯以不得舜為己憂舜以不得禹臯陶為己憂夫以百畝之不易為己憂者農夫也夫音扶易去聲易治也堯舜之憂民非事事而憂之也急先務而已所以憂民者其大如此則不惟不暇耕而亦不必耕矣輔氏曰舉農者之所憂以並堯舜之憂見其小大廣狹之不倫則不暇耕與不必耕者可知矣分人以財謂之惠教人以善謂之忠為天下得人者謂之仁是故以天下與人易為天下得人難為易並去聲分人以財小惠而已教人以善雖有愛民之實然其所及亦有限而難久輔氏曰以己之善而教人使民皆為善則是有愛民之實矣然其所及亦止於吾力之所能與吾身之所及而已故有限而難久也惟若堯之得舜舜之得禹臯陶乃所謂為天下得人者而其恩惠廣大教化無窮矣此其所以為仁也輔氏曰堯之得舜舜之得禹臯陶則能廣吾力之所能而俾恩惠極於廣大繼吾身之所有而俾教化推於無窮矣然後可以謂之仁孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳與去聲則法也蕩蕩廣大之貌君哉言盡君道也巍巍髙大之貌不與猶言不相關言其不以位為樂也吾聞用夏變夷者未聞變於夷者也陳良楚産也恱周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之此以下責陳相倍師而學許行也夏諸夏禮義之教也變夷變化蠻夷之人也變於夷反見變化於蠻夷之人也産生也陳良生於楚在中國之南故北遊而學於中國也先過也豪傑才德出衆之稱言其能自拔於流俗也倍與背同言陳良用夏變夷陳相變於夷也輔氏曰陳良楚人而北學於中國則是用夏變夷陳相素學於陳良乃為許行所變則是變於夷也昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子游以有若似聖人欲以所事孔子事之彊曾子曾子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已任平聲彊上聲暴蒲木反皓音杲三年古者為師心喪三年若喪父而無服也任擔也場冢上之壇場也愚案皇覽云孔子冢前以瓴甓為祠壇方六尺有若似聖人蓋其言行氣象有似之者如檀弓所記子游謂有若之言似夫子之類是也所事孔子所以事夫子之禮也江漢水多言濯之潔也秋日燥烈言暴之乾也皓皓潔白貌尚加也言夫子道德明著光輝潔白非有若所能仿佛也輔氏曰此自是曾子見得如此他人不知其味也學者須是深思而熟玩之直到曾子見處方知其味或曰此三語者孟子贊美曾子之辭也今也南蠻鵙舌之人非先王之道子倍子之師而學之亦異於曾子矣鵙亦作鵙古役反鵙博勞也惡聲之鳥南蠻之聲似之指許行也吾聞出於幽谷遷于喬木者未聞下喬木而入於幽谷者小雅伐木之詩云伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木詩傳曰丁丁伐木聲嚶嚶鳥聲之和也以伐木之丁丁興鳥鳴之嚶嚶幽深遷升喬髙也魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣魯頌閟宫之篇也膺擊也荆楚本號也愚謂荆本州名春秋初以州舉曰荆後乃曰楚舒國名近楚者也愚案春秋傳杜氏注舒國今廬江舒縣懲艾也案今此詩為僖公之頌而孟子以周公言之亦斷章取義也從許子之道則市賈不二國中無僞雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五榖多寡同則賈相若屨大小同則賈相若賈音價下同陳相又言許子之道如此蓋神農始為市井故許行又託於神農而有是說也輔氏曰下繫謂神農取噬嗑之象日中為市交易而退各得其所也五尺之童言幼小無知也許行欲使市中所粥之物皆不論精粗美惡但以長短輕重多寡大小為價也輔氏曰若不著得精粗好惡來說則無由說得通此義自孟子來無人看得出至集注而後其義始明曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為僞者也惡能治國家夫音扶蓰音師又山綺反比必二反惡平聲倍一倍也蓰五倍也什伯千萬皆倍數也比次也孟子言物之不齊乃其自然之理其有精粗猶其有大小也若大屨小屨同價則人豈肯為其大者哉今不論精粗使之同價是使天下之人皆不肯為其精者而競為濫惡之物以相欺耳墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈我且往見夷子不來辟音壁又音闢墨者治墨翟之道者夷姓之名徐辟孟子弟子孟子稱疾疑亦託辭以觀其意之誠否輔氏曰初不言孟子有疾而忽言今吾尚病病愈我且往見則孟子之意可見此亦所謂不屑之教誨也他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也不見之見音現又求見則其意已誠矣故因徐辟以質之如此或問夷之請見而孟子不許何也曰孟子雖以闢邪說為己任然不過講明其說傳之當世使聞者有以發寤於心而自得之耳固不輕接其人交口競辨以屈吾道之尊也譬如蠻夷冦賊之害聖人固欲去之然豈肯被甲執兵而親與之角哉直盡言以相正也莊子曰墨子生不歌死無服桐棺三寸而無椁是墨之治喪以薄為道也易天下謂移易天下之風俗也夷子學於墨氏而不從其教其心必有所不安者故孟子因以詰之輔氏曰先儒皆以夷子葬其親厚則是以所賤事親也兩句為孟子設為此言以間夷子蓋於其事親至切處感發之今集注斷以為夷子實嘗厚葬其親不從墨子薄棺無椁之制者蓋墨子之說本是失於兼愛二本耳若薄葬則特其教中一事夷子雖受其教而至於葬親之時天理自然發動有不得如其師之說者故不用其制而凡事從厚也此於人情固宜有之故孟子因舉此一事以詰之而下文又專舉喪葬之說以發其意此政夷子之天理一㸃明處也徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也夫音扶下同匍音蒲匐蒲北反若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援儒而入於墨以拒孟子之非己輔氏曰夷子蓋以儒者所謂若保赤子一句有似於墨子愛無差等之說故舉之而問以此言何謂也是其意欲援儒以歸墨以拒孟子之非己也又曰愛無差等施由親始則推墨而附於儒以釋已所以厚葬其親之意語録曰施由親始一句乃是夷子臨時撰出來湊孟子意却不知愛無差等一句己自不是了他所謂施由親始便是把愛無差等之心施之然把愛人之心推來愛親是甚道理輔氏曰夷子蓋以墨子所謂愛無差等之說有似於儒者若保赤子之言是欲彊推墨以附儒又言施由親始謂愛無差等則皆當致原但其所施則當自親始以釋己之所以厚葬其親之意也皆所謂遁辭也輔氏曰蓋孟子之問與說已得夷子之心是他於理已去不得故彊為此辭說以避免也孟子言人之愛其兄子與鄰之子本有差等書之取譬本為小民無知而犯法如赤子無知而入井耳輔氏曰彼有取爾也一句先儒說皆不明白今斷以為書之取譬方說得通云若則是取譬也明矣蓋書之取譬本為小民無知而犯法正猶赤子無知而入井耳非謂愛凡人之赤子與兄弟之子一般也言兄弟之子而不言己子者蓋兄弟之子即與己之子無異也且人物之生必各本於父母而無二乃自然之理若天使之然也輔氏曰此理乃自然而然故若天使之若此故其愛由此立而推以及人自有差等輔氏曰書云立愛自親始蓋人之愛皆始於事親因事親以立其愛即所謂孝弟為仁之本也然後推以及民及物自有等差輕重此仁義之道所以相為用也今如夷子之言則是視其父母本無異於路人但其施之之序姑自此始耳非二本而何哉或問此一節曰天之生物有血氣者本於父母無血氣者本於根荄皆出於一而無二者也惟其本出於一故其愛亦主於一焉蓋一體而分血氣連屬眷戀之情自不能已固非他人之可比也自是之外則因其分之親疏逺近而所以為愛者有差焉此儒者之道所以親親仁民以至於愛物而無不各得其所也今夷之乃謂愛無差等則是不知此身之所從出而視其父母無以異於路人也雖其施之先後稍不悖於正理然於親而謂之施焉則亦不知愛之所由立矣是非二本而何哉語録曰人多疑其知所先後而不知此正是夷子錯處人之有愛本由親立推而及物自有等級今夷子先以愛為無差等而施之則由親始此夷子所以二本夷子但以此解厚葬其親之一言而不知愛無差等為二本也又曰既是一本其中便自然有許多差等若二本則二者並立無差等矣又曰愛有差等此所謂一本蓋親親仁民愛物具有本末也愛無差等何止二本蓋千萬本也又曰事他人之親如己之親則是兩箇一樣重了如一木有兩根也然其于先後之間猶知所擇則又其本心之明有終不得而息者此其所以卒能受命而自覺其非也輔氏曰此段言夷子雖陷於墨子之教而其天理一㸃之明終有不可息滅者此蓋秉彞之心也故其先親後踈之際猶知有所擇而不至妄行錯施故孟子之言得以因其明而入之夷子亦得因其明而受之也蓋上世嘗有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣蚋音汭嘬楚怪反泚七禮反睨昔詣為去聲虆力追反梩力知反因夷子厚葬其親而言此以深明一本之意輔氏曰此又孟子略其遁辭而專以其良心之發有不容己處深明夫人惟一本故其於親之喪哀痛迫􅋀非他人之所可得者而因以是先王所制葬埋之禮必誠必信勿之有悔者固皆自然之理而墨子二本薄葬之說為杜撰妄作而不可行也上世謂太古也委棄也壑山水所趨也蚋蚊屬姑語助聲或曰螻蛄也嘬攢共食之也顙額也泚泚然汗出之貌睨邪視也視正視也不能不視而又不忍正視哀痛迫􅋀不能為心之甚也非為人泚言非為他人見之而然也所謂一本者於此見之尤為親􅋀蓋惟至親故如此在他人則雖有不忍之心而其哀痛迫􅋀不至若此之甚矣反覆也虆土籠也梩土輿也於是歸而掩覆其親之尸此葬埋之禮所由起也此掩其親者若所當然則孝子仁人所以掩其親者必有其道而不以薄為貴矣徐子以告夷子夷子憮然為間曰命之矣憮音武間如字憮然茫然自失之貌為間者有頃之間也命猶教也言孟子已教我矣文集曰命之矣之字作夷之名方成句法若作虛字則不成句法蓋因其本心之明以攻其所學之蔽是以吾之言易入而彼之惑易解也輔氏曰此贊孟子之善於教人能因其明而入之得納約自牖之義是以力不勞而功自倍也孟子纂疏卷五
