body:
  text: 欽定四庫全書孟子纂疏卷一宋趙順孫撰朱子集注梁惠王章句上凡七章孟子見梁惠王梁惠王魏侯罃也都大梁愚案魏初都安邑在漢河東郡安邑縣至惠王徙大梁在漢陳留郡浚儀縣僭稱王諡曰惠史記惠王三十五年卑禮厚幣以招賢者而孟軻至梁或問孟子不是諸侯此其見梁惠王何也曰不見諸侯者不先往見也見梁惠王者答其禮也蓋先王之禮未仕者不得見於諸侯戰國之時士鮮自重而孟子猶守先王之禮故其所居之國而不仕焉則必其君先就見也然後往見之若異國之君不得越境而來則必以禮貌先焉然後往答其禮耳故史記以為梁惠王卑禮厚幣以招賢者而孟子至梁得其事之實矣語録曰此是梁惠王招之而至孟子出處必不至錯了王曰叟不逺千里而來亦將有以利吾國乎叟長老之稱王所謂利蓋富國強兵之類真氏曰孟子初見惠王惠王首以利國為問蓋自春秋至於戰國先王之道不明人心陷溺惟知有利而已孟子對曰王何必曰利亦有仁義而已矣仁者心之德愛之理義者心之制事之宜也語録曰問德與理俱以體言制與宜俱以用言否曰心之德是渾淪説愛之理方説到親切處心之制都是説義之體程子所謂處物為義是也又曰仁對義為體用仁又自有仁之體用義又自有義之體用心之制是就義之全體處説事之宜是就千條萬緒各有所宜處説事之宜非是就在外之事説凡事之來其中皆有箇宜處便是義又曰仁言心之德便見得可包四者義言心之制却只是説義而已問心之制是裁制曰是問莫是以制其心曰制如利斧事來劈將去可底從這一邊去不可底從那一邊去又曰我才見箇事來便知這箇事合恁地處此便是事之宜也義如刀相似其鋒可以割制他物才到面前便判將去若鋒與刀初未嘗相離也又曰事之宜雖若在外然所以制其宜者則在心也又曰所謂事之宜方是指事物當然之理未説到處置合宜處陳氏曰義就心上論則是心之裁制決斷處宜字乃裁斷後事裁斷當理然後得宜凡事到面前便須有剖判是可是否若可否都不能剖判便是此心頑鈍無義了此二句乃一章之大指真氏曰孟子七篇以仁義為首程子有曰孔子言仁未嘗兼義獨於易曰立人之道曰仁與義而孟子言仁必以義配可謂有功於聖門矣下文乃詳言之後多倣此王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜乘去聲饜於豔反此言求利之害以明上文何必曰利之意也征取也上取乎下下取乎上故曰交征國危謂將有弒奪之禍乘車數也萬乘之國者天子畿內地方千里出車萬乘千乘之家者天子之公卿采地方百里出車千乘也千乘之國諸侯之國百乘之家諸侯之大夫也愚謂古者方里為井四井為邑四邑為丘四丘為甸甸六十四井五百十二家通出甲士三人步卒七十二人牛十二頭兵車一乘故周禮甸讀為乘天子幾方千里提封百萬井除山川溝壑城池邑居園囿街路之屬定出賦六十四萬井兵車萬乘故稱萬乘之國天子之公卿采地在畿內周禮所謂都鄙也雖上公不過百里出賦六萬四千井兵車千乘故稱千乘之家諸侯之國則畿外五等之封也大國亦不過百里出賦六萬四千井兵車千乘故稱千乘之國諸侯之大夫采地其大者亦出賦六千四百井兵車百乘故稱百乘之家弒下殺上也饜足也言臣之於君每十分而取其一分亦已多矣若又以義為後而以利為先則不弒其君而盡奪之其心未肯以為足也輔氏曰此最説得人心求利之意出蓋尚義則循理而有制徇利則橫流而無節故雖弒其君而盡奪之而其心猶有所不足也真氏曰理明則尊卑上下之分定不然則凡有血氣者皆思自足其欲非盡攘上之所有不止也於是篡弒之事興其害有不勝計者吁可畏哉未有仁而遺其親者也未有義而後其君者也此言仁義未嘗不利以明上文亦有仁義而已之意也或問仁義未嘗不利則是所謂仁義者乃所以為求利之資乎曰不然也仁義天理之自然也居仁由義循天理而不得不然者也然仁義得於此則君臣父子之間以至於天下之事自無一物不得其所者而初非有求利之心也易所謂利者義之和正謂此爾曰然則孟子何不以是為言也曰仁義固無不利矣然以是為言則人之為仁義也不免有求利之心焉一有求利之心則利不可得而其害至矣遺猶棄也後不急也言仁者必愛其親義者必急其君或問或主於愛或主於宜而所施亦有君親之不同何也曰仁者人也其發則主於愛而愛莫切於愛親故人仁則必不遺其親矣義者宜也其發則事皆得宜而所宜者莫大於尊君故人義則必不後其君矣輔氏曰愛親者仁之實也故仁者必愛其親敬君者義之實也故義者必急其君急謂不後也蓋於義言之則莫急於君也故人君躬行仁義而無求利之心則其下化之自親戴於已也蔡氏曰不遺其親不後其君之説不過推仁義中有自然之利耳非謂方為仁時便計不遺其親之利方為義時便計不後其君之利也輔氏曰仁義人心之固有人君躬行仁義以感之而無求利之心以誘之則人心之固有者亦皆興起而自然尊君親上有不待外求而勉強為之者也王亦曰仁義而已矣何必曰利重言之以結上文兩節之意此章言仁義根於人心之固有天理之公也輔氏曰天以是理賦豫於人而人則具是理於其心者也曰根者如草木之根於地也曰固有者又見其非可移彼以植此氣聚乎此則理命乎此未有此氣而先有此理也人人具足物物圓成故曰天理之公也利心生於物我之相形人欲之私也輔氏曰利心人本無之只緣有已有物彼此相形便生出箇較短量長爭多競少之意來遂欲已長人短人少已多偏詖反側惟已是徇故曰人欲之私也循天理則不求利而自無不利輔氏曰無所為而為故不求利然成已成物各得其宜故自無不利蔡氏曰此發明未有仁而遺其親未有義而後其君之意徇人欲則求利未得而害已隨之輔氏曰有所為而為故雖求利而未必得然妨人害物招尤取禍故害常隨之蔡氏曰此發明苟為後義而先利不奪不饜之意所謂豪釐之差千里之繆此孟子之書所以造端託始之深意學者所宜精察而明辨也太史公曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎也曰嗟乎利誠亂之始也夫子罕言利常防其源也故曰放於利而行多怨自天子以至於庶人好利之弊何以異哉司馬氏名遷西漢龍門人為太史令自號太史公或問太史公之歎其果知孟子之學耶曰未必知也以其言之偶得其要是以謹而著之耳輔氏曰太史公之説似踈而實密似闊而實切似淡泊而實有意味嗟嘆而言誠有以深發於人心學者最宜深玩其曰自天子至於庶人好利之弊何以異哉者正説得孟子上下交征不奪不饜之意也程子曰君子未嘗不欲利但專以利為心則有害惟仁義則不求利而未嘗不利也當是之時天下之人惟利是求而不復知有仁義故孟子言仁義而不言利所以拔本塞源而救其弊此聖賢之心也輔氏曰利者民生所不可無者也故乾之四德曰利書之三德曰利此所謂君子未嘗不欲利也但專欲求利則不顧義理專欲利已則必害於人惟能循仁義而行則體順有常而自無不利孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎樂音洛篇內同沼池也鴻鴈之大者麋鹿之大者孟子對曰賢者而後樂此不賢者雖有此不樂也此一章之大指詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鱉古之人與民偕樂故能樂也亟音棘麀音憂鶴詩作翯戶角反於音烏此引詩而釋之以明賢者而後樂此之意詩大雅靈臺之篇經量度也靈臺文王臺名也詩傳曰國之有臺所以望氛祲察災祥時觀遊節勞佚也謂之靈者言其倐然而成如神靈之所為也愚案左傳云秦獲晉侯以歸乃舍諸靈臺杜預云在京兆鄠縣周之故臺也營謀為也攻治也不日不終日也詩傳曰庶民來作之不終日而成亟速也言文王戒以勿亟也詩傳曰文王心恐煩民戒令勿亟子來如子來趨父事也詩傳曰如子趨父事不召自來也靈囿靈沼臺下有囿囿中有沼也詩傳曰臺下有囿所以域養禽獸麀壯鹿也愚案鹿牡曰麚牝曰麀伏安其所不驚動也愚謂攸所也鹿至易驚動不驚動而攸伏者無害獸之心鹿信之而弗疑也濯濯肥澤貌鶴鶴潔白貌於歎美辭牣滿也孟子言文王雖用民力而民反歡樂之既加以美名而又樂其所有蓋由文王能愛其民故民樂其樂而文王亦得以享其樂也湯誓曰時日害喪子及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉害音曷喪去聲女音汝此引書而釋之以明不賢者雖有此不樂之意也湯誓商書篇名時是也日指夏桀害何也桀嘗自言吾有天下如天之有日日亡吾乃亡耳愚案此説出尚書大傳民怨其虐故因其自言而目之曰此日何時亡乎若亡則我寧與之俱亡蓋欲其亡之甚也孟子引此以明君獨樂而不恤其民則民怨之而不能保其樂也梁惠王曰寡人之於國也盡心焉耳矣河內凶則移其民於河東移其粟於河內河東凶亦然察鄰國之政無如寡人之用心者鄰國之民不加少寡人之民不加多何也寡人諸侯自稱言寡德之人也河內河東皆魏地凶歲不熟也移民以就食移粟以給其老稚之不能移者孟子對曰王好戰請以戰喻填然鼓之兵創既接棄甲曳兵而走或百步而後止或五十步而後止以五十步笑百步則何如曰不可直不百步耳是亦走也曰王如知此則無望民之多於鄰國也好去聲填音田填鼓音也愚謂此言鼓音之塞滿也兵以鼓進以金退直猶但也言此以譬鄰國不恤其民惠王能行小惠然皆不能行王道以養其民不可以此而笑彼也楊氏曰移民移粟荒政之所不廢也然不能行先王之道而徒以是為盡心焉則末矣輔氏曰周禮以荒政十有二聚萬民雖無所謂移粟之事然大荒大札則令邦國移民以辟災就賤蓋在後世歲或歉於此而豐於彼則移民移粟固有所不可廢若夫先王之道所以制民之産豐年固使之仰事俯育而無憾又積三十年之耕而有九年之食則雖有旱乾水溢而民無菜色其視區區移民移粟之事顧何足以為盡心而望民之多於鄰國哉不違農時穀不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也養生喪死無憾王道之始也勝音升數音促罟音古汙音烏農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃役之也不可勝食言多也數密也罟網也汙窊下之地水所聚也愚謂濁水不流之小坎也古者網罟必用四寸之目魚不滿尺市不得粥人不得食山林川澤與民共之而有厲禁草木零落然後斧斤入焉此皆為治之初法制未備且因天地自然之利而撙節愛養之事也輔氏曰為治之初法制所以未大備者一則民生淳厖未用多為之防二則天下之事要非一聖人之所能盡也天地自然之利謂五榖魚鱉材木之類撙節愛養之事謂不違農時不用數罟斧斤以時入山林之類然飲食宫室所以養生祭祀棺槨所以送死皆民所急而不可無者今皆有以資之則人無所恨矣王道以得民心為本故以此為王道之始輔氏曰養生送死乃人世之始終於是二者皆有以濟之則人世之始終一無所憾而民心得矣此其所以為王道之始也五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不飢不寒然而不王者未之有也衣去聲畜勑六反數去聲王去聲凡有天下者人稱之曰王則平聲據其身臨天下而言曰王則去聲後皆倣此五畝之宅一夫所受二畝半在田二畝半在邑愚謂古者一夫一婦受私田百畝公田十畝是為八百八十畝餘二十畝八家分之得二畝半以為廬舍城邑之居亦各得二畝半春令民畢出在野冬則畢入於邑在野曰廬在邑曰里廬各在其田中而里聚居也田中不得有木恐妨五榖故於牆下植桑以供𧖟事五十始衰非帛不暖未五十者不得衣也畜養也時謂孕字之時如孟春犧牲毋用牝之類也七十非肉不飽未七十者不得食也或問既曰魚鱉不可勝食矣又言老者然後可以食肉何也曰魚鱉自生之物養其小而食其大老幼之所同也至於芻豢之畜人力所為則非七十之老不得以食之矣先王制度之節姑於略而終於詳大率如此曰必五十而後衣帛七十而後食肉何也曰此先王品節之意所以教民尊長敬老而節用勤生也若其意則豈不欲少者之皆帛衣而肉食哉顧其財有不贍則老者或反不得其所當得耳百畝之田亦一夫所受愚謂古以百步為畝今以二百四十步為畝古之百畝當今之四十一畝也至此則經界正井地均無不受田之家矣愚謂經界謂治地分田經畫其溝塗封植之界也井地即井田也田有定分故無不受之家庠序皆學名也文集曰閭有序而鄉有庠序以明教庠則行禮而視化焉申重也丁寧反覆之意善事父母為孝善事兄長為悌頒與斑同老人頭半白黑者也負任在背戴任在首夫民衣食不足則不暇治禮義而飽暖無教則又近於禽獸故既富而教以孝悌則人知愛親敬長而代其勞不使之負戴於道路矣衣帛食肉但言七十舉重以見輕也黎黑也黎民黑髮之人猶秦言黔首也少壯之人雖不得衣帛食肉然亦不至於飢寒也此言盡法制品節之詳極財成輔相之道以左右民是王道之成也輔氏曰盡法制品節之詳極財成輔相之道則民情之變故已備見聖人之制作已大成以左右民則不惟制民之産使之有以養其生而又為之學校之教使之得以全其性如帝堯所謂匡之直之輔之翼之使自得之是為王道之大成也狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也王無罪歲斯天下之民至焉莩平表反刺七亦及檢制也莩餓死人也發發倉廪以賑貸也歲謂歲之豐凶也惠王不能制民之産又使狗彘得以食人之食則與先王制度品節之意異矣至於民飢而死猶不知發則其所移特民間之粟而已乃以民不加多歸罪於歲凶是知創之殺人而不知操創者之殺人也不罪歲則必能自反而益修其政天下之民至焉則不但多於鄰國而已程子曰孟子之論王道不過如此可謂實矣輔氏曰天下無理外之事亦無事外之理理貫於事事統於理唯物格知至則理事如一但言其事而理自無違矣如孟子之論王道是也又曰孔子之時周室雖微天下猶知尊周之為義故春秋以尊周為本至孟子時七國爭雄天下不復知有周而生民之塗炭已極當是時諸侯能行王道則可以王矣此孟子所以勸齊梁之君也蓋王者天下之義主也聖賢亦何心哉視天命之改與未改耳文集曰問程子説天命之改莫是大𫝑已去否曰然輔氏曰王者天下之義主云者在天下之義當以為主也春秋之時周室雖微而天下猶知尊周之為義則是於義猶以為主也故孔子以尊周為本至七國時天下已不復知有周則是人心之義不以為主矣故孟子勸齊梁之君以行王道而王孔孟亦何心哉視天命之改與未改耳然天命之改與未改亦視人心之向背而已人心猶知尊周之為義則是天命之未改也人心不復知有周則是天命之已改矣又况生民之塗炭已極仁者固不當坐視而莫之救此則所謂仁之至義之盡也永嘉陳氏曰此是孔孟灼見天心以天自處周有一日天命便當為周文王孔子是也一日天命去周便當為周武王孟子是也梁惠王曰寡人願安承教承上章言願安意以承教輔氏曰既著箇梁惠王曰字則已是分為兩章雖分為兩章然其實只是一時説話以梃與創以創與政有以異乎皆所以重明殺人非兵與不可罪歲之意孟子對曰殺人以梃與創有以異乎曰無以異也梃徒頂反梃杖也以創與政有以異乎曰無以異也孟子又問而王答也曰庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也厚斂於民以養禽獸而使民飢以死則無異於驅獸以食人矣獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也惡之之惡去聲惡在之惡平聲君者民之父母也惡在猶言何在也仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也俑音勇為去聲俑從葬木偶人也古之葬者束草為人以為從衛謂之芻靈略似人形而已中古易之以俑則有面目機發而大似人矣愚謂以木人送葬設機而能踊跳故名之曰俑故孔子惡其不仁而言其必無後也孟子言此作俑者但用象人以葬孔子猶惡之況實使民飢而死乎李氏曰為人君者固未嘗有率獸食人之心然徇一已之欲而不恤其民則其流必至於此故以為民父母告之夫父母之於子為之就利避害未嘗頃刻而忌于懷何至視之不如犬馬乎輔氏曰李氏發明得最好雖大無道之君亦孰有率獸食人之心然徇一已之私欲而不恤其民則其流必至於此人心之所以為危也故孟子以為民父母告之為人上者必能體父母於其子頃刻不忌之心則庶幾其能盡保民之道矣梁惠王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可長上聲喪去聲比必二反灑與洗同魏本晉大夫魏斯與韓氏趙氏共分晉地號曰三晉故惠王猶自謂晉國愚案魏斯者所謂文侯也與趙籍韓虔俱為晉大夫三分其地號曰三晉惠王文侯之孫故猶自謂晉國惠王三十年齊擊魏破其軍虜太子申十七年秦取魏少梁後魏又數獻地於秦又與楚將昭陽戰敗亡其七邑比猶為也言欲為死者雪其恥也輔氏曰惠王之志疑若剛勇而有為者然細考之史則其敗於三國皆非義舉也徒以爭城爭地不失之貪則失之繆事既如此猶不知所以自反乃於見賢之際厯敘其喪敗而欲與死者一洗之此正如匹夫賤人𫝑出無聊不勝其忿而求一快者所為耳豈有君人之度而知所謂大勇之理哉孟子對曰地方百里而可以王百里小國也然能行仁政則天下之民歸之矣王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣省所梗反斂易皆去聲耨奴豆反長上聲省刑罰薄稅斂此二者仁政之大目也輔氏曰仁政在於養民而已省刑罰則民不至無所措其手足而得以安其生薄稅斂則民不至有所闕於衣食而得以保其生故孟子言仁政首及此二者下面數句則又其效驗也深耕易耨則薄稅斂之所致也重稅厚斂則民不聊生民不聊生則其於農事亦苟且鹵莽而已壯者以暇日修其孝弟忠信入以事父兄出以事長上則省刑罰之所致也嚴刑峻罰則民不樂生民不樂生則其於人道亦何暇修為之哉易治也耨耘也盡已之謂忠以實之謂信君行仁政則民得盡力於農畝而又有暇日以修禮義是以尊君親上而樂於效死也彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散養去聲彼謂敵國也彼陷溺其民王往而征之夫誰與王敵夫音扶陷陷於阱溺溺於水暴虐之意征正也以彼暴虐其民而率吾尊君親上之民往正其罪彼民方怨其上而樂歸於我則誰與我為敵哉故曰仁者無敵王請勿疑仁者無敵蓋古語也百里可王以此而已恐王疑其迂闊故勉使勿疑也孔氏曰惠王之志在於報怨孟子之論在於救民所謂唯天吏則可以伐之蓋孟子之本意孔氏名文仲臨江人輔氏曰怨有當報者亦有不當報者若惠王之事則所謂不當報者也不當報而報則是忿􅓰者之所為耳忿􅓰者之所為則其心熏灼焚燒愈撲愈熾不至於大敗極壞而不已若所謂志於救民則至誠惻怛成已以成物一日有一日之功其曰為天吏則可以伐之則其所以自治者嚴矣孟子見梁襄王襄王惠王子名赫出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定于一語去聲卒七沒反惡平聲語告也不似人君不見所畏言其無威儀也卒然急遽之貌蓋容貌詞氣乃德之符其外如此則其中之所存者可知輔氏曰容貌詞氣形於外者德則存於中者形於外者則存於中者之符也襄王望之不似人君則容貌無可敬之儀也就之而不見可畏則容貌無可畏之威也卒然而問則其詞氣又急遽而無序也其形於外者如此則其中之輕脫荒肆可知矣王問列國分爭天下當何所定孟子對以必合于一然後定也孰能一之王問也對曰不嗜殺人者能一之嗜甘也輔氏曰如人口之嗜美味也孰能與之王復問也與猶歸也對曰天下莫不與也王知夫苗乎七八月之間旱則苗稿矣天油然作雲沛然下雨則苗浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就下沛然誰能禦之夫音扶浡音勃由當作猶古字借用後多放此周七八月夏五六月也油然雲盛貌沛然雨盛貌浡然興起貌禦禁止也人牧謂牧民之君也領頸也蓋好生惡死人心所同故人君不嗜殺人則天下恱而歸之輔氏曰言此以見理𫝑之當然非有為而為之者也蓋人君之心誠能不嗜殺人則舉天下皆在吾仁愛之中又孰有渙散乖離而不一歸於我哉固非以不嗜殺人為一天下之具也蘇氏曰孟子之言非茍為大而已然不深原其意而詳究其實未有不以為迂者矣豫觀孟子以來自漢髙祖及光武及唐太宗及我太祖皇帝能一天下者四君皆以不嗜殺人致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已故或合而復分或遂以亡國孟子之言豈偶然而已哉輔氏曰蘇氏所謂孟子之言豈偶然而已哉者亦直據理而言之耳然唯知學者知其為實語也不然須深原其意而詳究其實然後知之此亦窮理之一端齊宣王問曰齊桓晉文之事可得聞乎齊宣王姓田氏名辟疆愚案田氏本陳公子完之後初以陳為氏後改姓田至田和始篡齊而有之辟疆和之曽孫是為宣王諸侯僭稱王也齊桓公名小白晉文公名重耳皆霸諸侯者孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也無以則王乎道言也董子曰仲尼之門五尺童子羞稱五伯為其先詐力而後仁義也亦此意也董子名仲舒西漢廣川人輔氏曰孟子之説略董子之説詳故引以為説夫仲尼門人所學者大學之序所行者先難後獲之仁其心思念慮未嘗到功利上自然無有道桓文之事者真氏曰孟子之後其能深闢五霸者惟仲舒為然以已通用無已必欲言之而不止也王謂王天下之道或問王霸之辨曰古之聖人致誠心以順天理而天下自服王者之道也齊桓晉文則假仁義以濟私欲而已曰德何如則可以王矣曰保民而王莫之能禦也保愛護也輔氏曰保如保赤子之保有終始周旋之意言其愛護斯民始終無間斷周旋無遺闕直氏曰保云者愛護育養之意王道不外乎保民而保民又不外乎此心曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸齕音核舍上聲觳音斛觫音速與平聲胡齕齊臣也釁鐘新鑄鍾成而殺牲取血以塗其釁郤也愚謂古者器成而釁以血所以禳却不祥也周禮云上春釁寶鎮及寶器觳觫恐懼貌孟子述所聞胡齕之語而問王不知果有此事否曰有之曰是心足以王矣百姓皆以王為愛也臣固知王之不忍也王見牛之觳觫而不忍殺即所謂惻隱之心仁之端也擴而充之則可以保四海矣故孟子指而言之欲王察識於此而擴充之也或問齊王不忍一牛之死其事微矣而孟子遽以是心為足以王者何也曰不忍者心之發而仁者天地生物之心而人之所以為心者也是心之存則其於親也必知所以親之於民也必知所以仁之於物也必知所以愛之矣然人或蔽於物欲之私而失其本心之正故其所發有不然者然其根於天地之性者則終不可得而亡也故間而值其不蔽之時則必隨事而發見焉若齊王之興兵結怨而急於戰伐之功則其所蔽為不淺矣然其不忍一牛之死則不可不謂之惻隱之發而仁之端也古之聖王所以博施濟衆而仁覆天下亦即是心以推之而已豈自外至哉王既不能自知而反以桓文為問則孟子安得不指此以開示之耶然戰國之時舉世沒於功利而不知仁義之固有齊之百姓又未見王之所以及民之功是以疑其貪一牛之利非孟子得其本心之正而有以通天下之志盡人物之情亦孰知此為本心之發而足以王天下哉愛猶吝也王曰然誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也言以羊易牛其迹似吝實有如百姓所譏者然我之心不如是也輔氏曰使宣王而有學問之功知體察之要則因孟子之言反求而識其不忍之實矣亦何暇更辨百姓之言今宣王乃汲汲於百姓之譏是辨而但略及其所以不忍者以自解則是前日都不知講學也曰王無異於百姓之以王為愛也以小易大彼惡知之王若隱其無罪而就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓之謂我愛也惡平聲異怪也隱痛也擇猶分也言牛羊皆無罪而死何所分别而以羊易牛乎孟子故設此難欲王反求而得其本心王不能然故卒無以自解於百姓之言也輔氏曰宣王既無講學之功不知反求之理而徒自辨解於百姓之言故孟子又設此以問難之蓋欲王反求而得其本心不忍之實而王猶不能然也而但以百姓之言為宜是卒無以自解於百姓之言也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也逺去聲無傷言雖有百姓之言不為害也輔氏曰宣王既無以自解於百姓之言故孟子告以雖有百姓之言而不為害以解其心之所惑然後告以其羊易牛者是乃為仁之術而亦吾心本然之善而宣王實不知也術謂法之巧者語録曰術字本非不好砥字只緣後人把做變詐看了便道是不好却不知天下事有難處處須著有箇巧砥道理始得當齊宣王見牛之時惻隱之心己發乎中又見釁鐘事大似住不得只得以不見者而易之乃是他既周旋得那事又不抑遏了這箇不忍之心則此心乃得流行若當此之時無箇措置便抑遏了這箇不忍之心遂不得而流行矣此乃所謂術也輔氏曰巧亦非穿鑿以為巧蓋隨物賦形逶迤曲折而得以遂吾此心之用爾真氏曰處事不可無法雖有此心而無法以處之則亦徒善而已蓋殺牛既所不忍釁鐘又不可廢於此無以處之則此心雖發而終不得施矣然見牛則此心已發而不可遏未見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以為仁之術也輔氏曰殺牛既所不忍釁鐘又不可廢此乃事理膠轕之會而人之所難處者也苟或無以處之則此心雖發而終不得施矣此心雖發而終不得施則是天命有時而不流行也是以君子有貴於學問之功夫見牛則此心已發此心已發則不可遏其流行之體未見羊則其理未形其理未形則無所妨理則心之所具者也理既未形而彼雖用之則在我者不覺故無所妨此即下文所謂君子之於禽獸其不忍之心施於見聞之所及者是也見聞不及則於我無妨矣無妨謂理事無礙也於此之時而能以羊易牛則二者得以兩全而無害所謂仁義並行而不相悖是乃為仁之術也所謂法之巧者也宣王雖未嘗知學問然其所為能適其宜若此者蓋其良心之發偶無物欲之蔽而又習聞釁鐘之禮不可廢是以能暗合於義理也聲謂將死而哀鳴也蓋人之於禽獸同生而異類故用之以禮而不忍之心施於見聞之所及輔氏曰唯其生同而類異故其待禽獸與待人不同所謂用之以禮則如記所言國君無故不殺牛大夫無故不殺羊士無故不殺犬豕與天子無故歲三田之類皆是所謂不忍之心施於見聞之所及則如宣王見牛之觳觫而不忍殺乃以羊易之孟子所謂見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨之類皆是然二者人固多由之而不自覺也其所以必逺庖厨者亦以預養是心而廣為仁之術也輔氏曰唯其不忍之心止施於見聞之所及故古之君子知學問者必逺其庖厨乃所以預養是不忍之心不使之見其生聞其聲以推廣其為仁之術不必屑屑然以其所不見而易其所見也孟子言此以見宣王之初心本無不善以羊易牛然後仁義之心得以兩全而無害也王説曰詩云他人有心豫忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也説音悅忖七本反度待洛反夫我之夫音扶詩小雅巧言之篇戚戚心動貌輔氏曰戚戚心動而有所慘傷也王因孟子之言而前日之心復萌乃知此心不從外得然猶未知所以反其本而推之也輔氏曰孟子所言曲盡其理故宣王前日之心復動于中而委蛇曲折之意莫不盡見而亦莫非吾心本然之善非從外而得也向非孟子據理之極知言之要深得夫開導誘掖之術而抽其端緒以告之則亦何能使宣王前日不忍之心復萌也哉宣王此心雖發動而其端尚微其體未充而又未知所以用力推廣之方也故孟子此下復以用力用明用恩之説以曉切也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也與平聲為不之為去聲復白也鈞三十斤愚案五權之法二十四銖為兩十六兩為斤三十斤為鈞四鈞為石百鈞至重難舉也羽鳥羽一羽至輕易舉也秋毫之末毛至秋而末鋭小而難見也輿薪以車載薪大而易見也許猶可也今恩以下又孟子之言也蓋天地之性人為貴故人之與人又為同類而相親是以惻隱之發則於民切而於物緩推廣仁術則仁民易而愛物難輔氏曰此與上文所謂人與禽獸同生而異類故待之不同之説皆是從分金等子上説將來夫天地之性人為貴而人之與人乂為同類而相親故惻隱之發於民切而於物緩皆自然而然雖至愚之人亦莫不然學者須是臨事體察看教分曉不可糢糊率略聽其自然事過便休若夫推廣仁術則仁民易而愛物難所以難所以易者且以凡人言之推廣此心愛及同類者其𫝑便其事易至於物則有不得已而資以為用者使之皆被吾之愛而無傷則其𫝑遠其事難自君人者言之發政施仁使民得以遂其生者其𫝑便其事易極輔相財成之道使庶類繁殖鳥獸魚鱉咸若者其𫝑逺其事難真氏曰孟子為一羽輿薪之譬以明愛物而仁民之易宣王既能為其所難乃不能為其所易何哉今王此心能及物矣則其保民而王非不能也但自不肯為耳輔氏曰今王此心既發於見牛之際而又有以處之而使是心得以流行矣則是於其𫝑逺而事難者既能有以及之則以是心而施於𫝑近而事易與之同類而相親所謂保民而王者則豈有不能者哉但自不肯為耳曰不為者與不能者之形何以異曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也王之不王是折枝之類也語去聲為長之為去聲長上聲折之舌反形狀也挾以腋持物也超躍而過也為長者折枝以長者之命折草木之枝言不難也是心固有不待外求擴而充之在我而已何難之有輔氏曰是心乃我之固有擴而充之在我而已如有耳目而自視自聽有手足而自執自行固不難也老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣今恩足以及禽獸而功不至於百姓者獨何與與平聲老以老事之也吾老謂我之父兄人之老謂人之父兄幼以幼畜之也吾幼謂我之子弟人之幼謂人之子弟運於掌言易也或問老吾老以及人之老幼吾幼以及人之幼而天下可運於掌何也曰天地之間人物之衆其理本一而分未嘗不殊也以其理一故推已可以及人以其分殊故立愛必自親始為天下者誠能以其心而不失其序則雖天下之大而親踈逺邇無一物而不得其所焉其治豈不易哉詩大雅思齊之篇刑法也寡妻寡德之妻謙辭也御治也不能推恩則衆叛親離故無以保妻子蓋骨肉之親本同一氣又非但若人之同類而已輔氏曰此與天之生物一本同意蓋人之骨肉本同一氣而生又非但若人之同類而已故於心為至親至切而行仁必自孝悌始然後可以推而及民與物也故古人必由親親推之然後及於仁民又推其餘然後及於愛物皆由近以及逺自易以及難今王反之則必有故矣故復推本而再問之輔氏曰𫝑有近逺當由近以及逺事有難易當自易以及難老吾老幼吾幼以及人之老幼刑寡妻至兄弟以御於家邦此蓋自然之序而人所不能自已者若或反此則必有其故矣是不可不致其充復之功使之循序而進不然則倒行而逆施之如無源之水無根之木不旋踵而乾涸枯瘁矣真氏曰由親以及民由民以及物此古人之善推也能及物而不能及民此宣王之不善推也權然後知輕重度然後知長短物皆然心為甚王請度之度之之度待洛反權稱錘也愚謂稱上謂之衡稱錘謂之權度丈尺也愚謂分寸尺丈引各以十纍起謂之五度度之謂稱量之也言物之輕重長短人所難齊必以權度度之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有甚於物者或問心有輕重長短而又曰當以心為權度而稱量何也曰輕重長短之當然固本心之正理其為權度而稱量之者亦以此心之用而反求之耳語録曰物易見心無形度物之輕重長短易度心之輕重長短難度物差了只是一事差心差了時萬事差所以心為甚又曰本然之權度亦只是此心此心本然萬理皆具應物之時須是子細看合如何便是本然之權度也如齊王見牛而不忍之心見此是合權度處及至興甲兵危士臣結怨於諸侯又却忍為之便是不合權度失其本心今王恩及禽獸而功不至於百姓是其愛物之心重且長而仁民之心輕且短失其當然之序而不自知也輔氏曰此指宣王之心偏詖處言之也必先見得其輕重長短如此分明了然後究其所以然之故則吾心之蔽始可去而本然之理始可復此孟子所以引物資權度之説而使王自稱量其心也故上文既發其端而於此請王度之也抑王興甲兵危士臣構怨於諸侯然後快於心與與平聲抑發語辭士戰士也構結也孟子以王愛民之心所以輕且短者必其以是三者為快也然三事實非人心之所快有甚於殺觳觫之牛者故指以問王欲其以此而度之也輔氏曰孟子雖引物資權度之説而請王稱量其心然又恐不知所以稱量之要故舉興甲兵危士臣結怨於諸侯三事使王度之蓋宣王愛民之心所以輕且短者實以是三者之為快蔽之也夫此三事乃人心之所不忍有甚於殺觳觫之牛者王若以是為快則宜乎愛民之心輕且短也王曰否吾何快於是將以求吾所大欲也不快於此者心之正也而必為此者欲誘之也欲之所誘者獨在於是是以其心尚明於他而獨暗於此此其愛民之心所以輕短而功不至於百姓也輔氏曰辟土地朝秦楚涖中國撫四夷是其本志也興甲兵危士臣結怨於諸侯則末流之禍耳有是志則有是禍矣指其末流之禍則以為不快於此者心之明也而卒溺於初志之失而不知反者欲誘之也其心尚明於他者謂不忍一牛之觳觫也而獨暗於此者謂功不至於百姓也曰王之所大欲可得聞與王笑而不言曰為肥甘不足於口與輕暖不足於體與抑為采色不足視於目與聲音不足聽於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉曰否吾不為是也曰然則王之所大欲可知已欲辟土地朝秦楚涖中國而撫四夷也以若所為求若所欲猶緣木而求魚也與平聲為肥抑為豈為不為之為皆去聲便令皆平聲辟與闢同朝音潮便嬖近習嬖幸之人也已語助辭辟開廣也朝致其來朝也秦楚皆大國愚案秦跨有禹貢雍梁二州之地楚盡有荆州西接漢中北至汝南故皆為大國涖臨也若如此也所為指興兵結怨之事緣木求魚言必不可得王曰若是其甚與曰殆有甚焉緣木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災曰可得聞與曰鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵強海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉蓋亦反其本矣甚與聞與之與平聲殆蓋皆發語辭鄒小國楚大國齊集有其一言集合齊地其方千里是有天下九分之一也以一服八必不能勝所謂後災也反本説見下文今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴訴於王其若是孰能禦之朝音潮賈音古訴與訴同行貨曰商居貨曰賈發政施仁所以王天下之本也近者恱逺者來則大小強弱非所論矣蓋力求所欲則所欲者反不可得能反其本則所欲者不求而至與首章意同輔氏曰力求所欲則徇欲也有為而為之也計獲求得用力雖勞而所欲者反不如所期能反其本則循理者也無所為而為之也先難後獲先事後得而可大之業自爾循至此天理人欲之分也王曰吾惛不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之惛與昏同曰無恆産而有恆心者惟士為能若民則無恆産因無恆心茍無恆心放辟邪侈無不為己及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也恆胡登反辟與僻同焉於虔反恆常也産生業也常産可常生之業也常心人所常有之善心也輔氏曰常生之業則下文所言五畝之宅百畝之田是也常冇之善心則下文所言善與禮義是也善乂禮義之總名也士嘗學問知義理故雖無常産而有常心民則不能然矣罔猶羅網欺其不見而取之也輔氏曰緣民無常産所以無常心故不知禮義而陷於放僻邪侈也若遂從而刑之是誠無異於以羅網罔民欺其不見而取之也是故明君制民之産必使仰足以事父母俯足以畜妻子樂歲終身飽凶年免於死亡然後驅而之善故民之從之也輕畜許六反下同輕猶易也此言民有常産而有常心也今也制民之産仰不足以事父母俯不足以畜妻子樂歲終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉治平聲凡治字為理物之義者平聲為己理之義者去聲後皆放此贍足也此所謂無常産而無常心者也王欲行之則盍反其本矣盍何不也輔氏曰蓋亦反其本者言其當反本也則盍反其本者責其何不反本也其辭固有輕重矣使民有常産者又發政施仁之本也説具下文五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之有也音見前章此言制民之産之法也趙氏曰八口之家次上農夫也此王政之本常生之道故孟子為齊梁之君各陳之也輔氏曰八口乃上次農夫言此者舉其次多者耳所謂王政之本常生之道故以告齊梁之君者其説亦得其要楊氏曰為天下者舉斯心加諸彼而已然雖有仁心仁聞而民不被其澤者不行先王之道故也故以制民之産告之輔氏曰楊氏之説本末具舉首尾該盡亦深得孟子之意此章言人君當黜霸功行王道而王道之要不過推其不忍之心以行不忍之政而已齊王非無此心而奪於功利之私不能擴充以行仁政雖以孟子反覆曉告精切如此而蔽固已深終不能悟是可歎也黃氏曰儒術之不見用於世以其空言而無實用故功利之説常易以求售於人不知夫功利者乃空言而儒術則皆實用也為功利者則曰兵可強國可富也然挾區區之小數而不知為國之大體相傾相詐相戕相賊不惟為敵國之病而吾國之民固亦不得安其生矣豈不謂之空言乎儒術則不然自五畝之宅百畝之田使民養生喪死而無憾然後教之以孝弟忠信不惟吾之民皆知尊君親上而天下之人亦皆引領而望之其為實用孰過於此夫元后者民之父母也父母之於子必先有以養之而又有以教之然後為之子者得以全其父母之身今也為民父母聽其自生自死自愚自智而莫之問也又倡為功利之説以斫喪之豈為民父母之道哉虞氏九官周官六典無非儒者已試之效孰謂其皆空言而無實用必待管商之術而後可以為國乎輔氏曰集注所斷章指數語尤包括得意盡而深嘆孟子之精切與宣王之不悟熟讀而詳玩之尤使人慨然於世變之衰而聖賢之道不得行也孟子纂疏卷一
