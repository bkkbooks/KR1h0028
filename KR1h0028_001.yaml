body:
  text: 欽定四庫全書中庸纂疏卷一宋趙順孫撰朱子章句中者不偏不倚無過不及之名文集曰不偏者明道體之自然即無所倚著之意也不倚則以人而言乃見其不倚於物耳語録曰急些子便是過慢些子便不及庸平常也語録曰庸是依本分不為怪異之事堯舜孔子只是庸夷齊所為却不是庸了問以不偏不倚無過不及說中乃是精密切至之語而以平常說庸似不相黏著曰此其所以黏著蓋緣處得極精極密只是如此平常若有些子差異便不是極精極密便不是中庸陳氏曰庸只是日用平常之道如君臣之義父子之親夫婦之别長幼之序朋友之信皆日用事便是平常道理凡日用間人所常行而不可廢者便是平常或問名篇之義程子專以不偏為言吕氏專以無過不及為說二者固不同矣子乃合而言之何也曰中一名而有二義程子固言之矣今以其說推之不偏不倚云者程子所謂在中之義未發之前無所偏倚之名也語録曰在中者未動時恰好處才發時不偏於喜則偏於怒不得謂之在中矣又曰在中之義是言在裏面砥道理非以在中釋中字無過不及者程子所謂中之道也見諸行事各得其中之名也陳氏曰中之在事物即其恰好處而無過不及者也蓋不偏不倚猶立而不近四旁心之體地之中也無過不及猶行而不先不後理之當事之中也陳氏曰有在心之中有在事物之中所以朱子解中字必合內外而言故於未發之大本則取不偏不倚之名於己發而時中則取無過不及之義語固各有當也語録曰中庸之中本是說無過不及之中㫖在時中上若推其本則自喜怒哀樂未發之中而為時中之中陳氏曰未發之中只可言不偏不倚却下不得過不及字及發出來此事合當如此彼事合當如彼方有箇恰好準則無太過不及處然方其未發雖未有無過不及之可名而所以為無過不及之本體實在於是及其發而得中也雖其所主不能不偏於一事然其所以無過不及者是乃無偏倚者之所為而於一事之中亦未嘗有所偏倚也語録曰只要就無所偏倚一事處之得恰好則無過不及矣故程子又曰言和則中在其中言中則含喜怒哀樂在其中而吕氏亦云當其未發此心至虛無所偏倚故謂之中以此心而應萬物之變無往而非中矣是則二義雖殊而實相為體用語録曰未發之中是體已發之中是用此愚於名篇之義所以不得取此而遺彼也曰庸字之義程子以不易言之而子以為平常何也曰唯其平常故可常而不可易若驚世駭俗之事則可暫而不得為常矣二說雖殊其致一也但謂之不易則必要於久而後見不若謂之平常則直驗於今之無所詭異而其常久而不可易者可兼舉也况中庸之云上與髙明為對而下與無忌憚者相反其曰庸德之行庸言之謹又以見夫雖細微而不敢忽則其名篇之義以不易而為言者又孰若平常之為切乎語録曰譬如飲食如五穀是常自不可易若是珍羞異味不常得之物則暫一食之可也馬能久乎庸固是定理若以為定理則却不見那平常砥意思今以平常言則不易之定理自在其中矣陳氏曰程子以不易解庸字亦是謂萬古常然而不可易但其義未盡不若平常字最親切可包得不易字蓋天下事物之理惟平常然後可以常而不易若怪異之事人所罕見但可暫而不可以常耳佛老說道理便入於高逺𤣥妙不知自堯舜三代以來只是一箇平常砥道理所以萬世常然而不可易平常不易四字本作一意看曰然則所謂平常將不為淺近茍且之云乎曰不然也所謂平常亦曰事理之當然而無所詭異云爾是固非有甚高難行之事而亦豈同流合汙之謂哉既曰當然則自君臣父子日用之常推而至於堯舜之禪授湯武之放伐其變無窮亦無適而非平常矣語録曰問堯舜禪授湯武放伐皆聖人非常之變而謂之平常何邪曰事雖異常然皆是合當如此便只是常事曰此篇首章先明中和之義次章乃及中庸之說至其名篇乃不曰中和而曰中庸者何哉曰中和之中其義雖精而中庸之中實兼體用文集曰中和之中專指未發而言中庸之中則兼體用而言且其所謂庸者又有平常之意焉則比之中和其所該者尤廣而於一篇大指精粗本末無所不盡此其所以不曰中和而曰中庸也語録曰中庸該得中和之義庸是見於事和是發於心庸該得和曰張子之言如何案張子曰學者如中庸文字輩直須句句理㑹過其言互相發明曰其曰須句句理㑹使其言互相發明者真讀書之要法不但可施於此篇也語録曰讀書須是逐句逐字要見去著使互相發明事事窮到極至處曰吕氏為己為人之說如何案吕氏曰為己者心存乎德行而無意乎功名為人者心存乎功名而未及乎德行若後世學者有未及乎為人而濟其私欲者今學聖人之道而先以私欲害之則語之而不入導之而不行教之者亦何望哉聖人之學不使人過不使人不及立喜怒哀樂未發之中以為之本使學者擇善而固執之其學固有序矣學者盡亦用心於此乎用心於此則義理必明德行必修與夫自輕其身涉獵無本徼幸一旦之利者果何如哉曰為人者程子以為欲見知於人者是也吕氏以志於功名言之而謂今之學者未及乎此則是以為人為及物之事而涉獵徼幸以求濟其私者又下此一等也殊不知夫子所謂為人者正指此下等人爾若曰未能成已而遽欲成物此特可坐以不能知所先後之罪原其設心猶愛而公視彼欲求人知以濟一己之私而後學者不可同日語矣至其所謂立喜怒哀樂未發之中以為之本使學者擇善而固執之者亦曰欲使學者務先存養以為窮理之地耳而語之未瑩乃似聖人强立此中以為大本使人以是為準而取中焉則中者豈聖人之所强立而未發之際亦豈容學者有所擇取於其間哉但其全章大指則有以切中今時學者之病覽者誠能三復而致思焉亦可感悟而興起矣語録曰今學者且要分别箇路頭要緊是為己為人之際子程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理語録曰問正道定理恐道是總括之名理是道裏面有許多條目如天道有日月星辰陰陽寒暑之條理人道有仁義禮智君臣父子之條理曰緊要在正字與定字上中只是箇恰好道理為見不得是亘古今不可變易砥故更著箇庸字此篇乃孔門傳授心法陳氏曰卑不失之汚賤高不溺於空虛蓋真孔門傳授心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理語録曰始合為一理指天命謂性末復合為一理指無聲無臭始合而開其開也有漸末開而合其合也亦有漸又曰天下萬事須要逐一理㑹過方得所謂中散為萬事便是中庸又曰中散為萬事如知仁勇許多為學砥道理與為天下國家有九經與祭祀鬼神中間無些子罅隙放之則彌六合卷之則退藏於密三山陳氏曰其大無際其細無朕其味無窮皆實學也語録曰句句是實無些子空闕處善讀者玩索而有得焉則終身用之有不能盡者矣天命之謂性率性之謂道修道之謂教命猶令也陳氏曰似分付命令他一般性即理也文集曰有是性便有許多道理總在裏許性便是理之所㑹之地語録曰性是天生成許多道理又曰性是許多理散在處為性陳氏曰性即理也何以不謂之理而謂之性蓋理是泛言天地間人物公共之理性是在我之理只這道理受於天而為我所有故謂之性天以陰陽五行化生萬物氣以成形而理亦賦焉猶命令也陳氏曰天固是上天之天要之即理是也然天如何而命於人蓋藉陰陽五行之氣流行變化以生萬物理不外乎氣氣以成形而理亦賦焉便是上天命令之也又曰本只是一氣分來有陰陽又分來有五行二與五只管分合運行去萬古生生不息不止是箇氣必有主宰之者曰理是也理在其中為之樞紐故大化流行生生未嘗止息命即流行而賦豫於物者葉氏曰有理即有氣有天即有萬物故氣以成形理亦寓焉於是人物之生因各得其所賦之理以為健順五常之德所謂性也文集曰健順之體即性也合而言之則曰健順分而言之則曰仁義禮智仁禮健而義智順也語録曰此健順只是那陰陽之性又曰如牛之性順馬之性健即健順之性但只稟得來少不似人稟得來全耳又曰仁義禮智雖尋常昆蟲之類皆有之只偏而不全濁氣間隔真氏曰自昔言性者曰五常而已朱子乃易之以健順蓋陽之性健木火屬焉在人則為仁禮陰之性順金水屬焉在人則為義智而土則二氣之沖和信亦兼乎健順陰陽不在五行之外健順亦豈在五常之外乎率循也語録曰這循字是就道上說不是就行道上說陳氏曰循猶隨也道猶路也文集曰道之得名正以人生日用當然之理猶四海九州百千萬人當行之路爾人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也語録曰人與物之性皆同故循人之性則為人之道循馬牛之性則為馬牛之道若不循其性令馬耕牛馳則失其性而非馬牛之道矣陳氏曰是就人物己受得來處說隨其所受之性便自然有箇當行之路不待安排著只是日用人事所當然之理所以名之曰道永嘉陳氏曰人率循其人之性物率循其物之性此即人物各各當行道理故謂之道夫道若大路然真氏曰朱子於告子生之謂性章深言人物之異而於此章乃兼人物而言生之謂性以氣言者也天命之謂性以理言者也以氣言之則人物所稟之不同以理言之則天之所命一而已矣然則虎狼之搏噬馬牛之踶觸亦道耶曰子思之所謂率性云者循其天命之性也若夫搏噬踶觸則氣稟之所為而非天命之本然矣豈獨物為然凡人之為善者皆循天命之性也而為不善則發乎氣稟之性矣以是而觀則此章兼人物而言尚何疑哉修品節之也潘氏曰品節之者如親親之殺尊賢之等隨其厚薄輕重而為之制以矯其過不及之偏者也雖若出於人為而實原於性命之正性道雖同而氣稟或異故不能無過不及之差葉氏曰命於天曰性人物受而循行之曰道皆理之自然而然本無過不及之差也然陰陽五行迭運交禪不免相勝是以或厚或薄或清或濁賢智或失之過愚不肖或失之不及天之所受人之所率雖未嘗不善而亦不能不差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也語録曰問品節及於物否曰也是如此所以謂之盡物之性但於人較詳於物較略人上較多物上較少又曰所以咸若草木鳥獸使庶類蕃殖如周禮掌獸掌山澤各有官如周公驅虎豹犀象龍蛇如草木零落然後入山林昆蟲未蟄不以火田之類各有箇品節使萬物各得其所所謂教也黃氏曰修道二字須就道上及人氣稟上兼看道是大綱之名如孝是事父之道然孝之中有多少曲折人之氣稟不同柔者過於和剛者過於嚴則於孝道雖大綱是孝其曲折必有不中節者此禮樂刑政所以著為品節使之盡其道也蓋人之所以為人道之所以為道聖人之所以為教原其所自無一不本於天而備於我學者知之則其於學知所用力而自不能已矣故子思於此首發明之讀者宜深體而默識也語録曰子思說箇三句乃天地萬物之大本大根萬化皆從此出人若能體察方見聖賢所說道理皆從自已胸襟流出不假他求三山陳氏曰此章蓋中庸之綱領而此三句又一章之綱領也聖賢教人必先使之知所自來而後有用力之地此三句蓋與孟子言性善同意其示人切矣或問天命之謂性率性之謂道修道之謂教何也曰此先明性道教之所以名以見其本皆出乎天而實不外於我也天命之謂性言天之所以命乎人者是則人之所以為性也文集曰天之生此人如朝廷之命此官人之有此性如官之有此職蓋天之所以賦與萬物而不能自已者命也吾之得乎是命以生而莫非全體者性也愚謂天於賦豫處周流而不已斯之謂命人於稟受處該全而不偏斯之謂性故以命言之則曰元亨利貞而四時五行庶類萬化莫不由是而出以性言之則曰仁義禮智而四端五典萬物萬事之理無不統於其間文集曰元亨利貞天道之常仁義禮智人性之綱黃氏曰在天為元亨利貞在人為仁義禮智特殊其名以别天人之分耳理則同故健順不必易也又曰天地而非元亨利貞不能以行四時生萬物人而非仁義禮智又何以充四端制百事哉陳氏曰若就造化上論則天命之大自只是元亨利貞此四者就氣上論也得就理上論也得就氣上論則物之初生處為元於時為春物之發達處為亨於時為夏物之成遂處為利於時為秋物之斂藏處為貞於時為冬貞者正而固也自其生意之已定者而言故謂之正自其斂藏者而言故謂之固就理上論則元者生理之始亨者生理之通利者生理之遂貞者生理之固又曰人性之大目只是仁義禮智四者而已得天命之元在我謂之仁得天命之亨在我謂之禮得天命之利在我謂之義得天命之貞在我謂之智人性之有仁義禮智只是天地元亨利貞之理真實一致非引而譬之也蓋在天在人雖有性命之分而其理則未嘗不一陳氏曰性與命本非二物在天謂之命在人謂之性又曰性命只是一箇道理不分看則不分曉不合看又離了不相干涉須是就渾然一理中看得有界分不相亂在人在物雖有氣稟之異而其理則未嘗不同文集曰論萬物之一原則理同而氣異此吾之性所以純粹至善而非若荀楊韓子之所云也陳氏曰天所命於人以是理本只善而無惡故人所受以為性亦本善而無惡荀子以性為惡楊子以性為善惡混韓子又以為性有三品都只是說得氣若只論氣而不及大本便只說得粗砥而道理全然不明率性之謂道言循其所得乎天以生者則事事物物莫不自然各有當行之路是則所謂道也蓋天命之性仁義禮智而已循其仁之性則自父子之親以至於仁民愛物皆道也循其義之性則自君臣之分以至於敬長尊賢亦道也循其禮之性則恭敬辭讓之節文皆道也循其智之性則是非邪正之分别亦道也陳氏曰仁義禮智四者大處則大冇小處則小有蓋所謂性者無一理之不具故所謂道者不待外求而無所不備所謂性者無一物之不得故所謂道者不假人為而無所不周語録曰性是體道是用道便是在裏面做出砥道理雖鳥獸草木之生僅得形氣之偏而不能有以通貫乎全體然其知覺運動榮悴開落亦皆循其性而各有自然之理焉陳氏曰隨物之性而言之如牛之可耕馬之可乘雞之可司晨犬之可司夜其所發皆有箇自然之理又循其草木之理而言則桑麻之可衣穀粟之可食春宜耕夏宜耘秋宜穫凡物皆有箇自然之理永嘉陳氏曰飛潛動植各一其性而不可移换便是率處若飛者潛之動者植之即是違其性非物之所謂率性矣至於虎狼之父子蜂蟻之君臣豺獺之報本雎鳩之有别則其形氣之所偏又反有以存其義理之所得語録曰問虎狼螻蟻之類雖得其一偏然徹頭徹尾得義理之正人合下具此天命之全體乃為物欲氣稟所昏反不能如物之能通其一處而全盡何也曰只有這一處通便却專人却事事理㑹得些便却泛泛所以易昏尤可以見天命之本然初無間隔而所謂道者亦未嘗不在是也是豈有待於人為而亦豈人之所得為哉永嘉陳氏曰此是懸空說未著人事在修道之謂教言聖人因是道而品節之以立法垂訓於天下是則所謂教也蓋天命之性率性之道皆理之自然而人物之所同得者也人雖得其形氣之正然其清濁厚薄之稟亦有不能不異者是以賢知者或失之過愚不肖者或不能及而得於此者亦或不能無失於彼是以私意人欲或生其間而於所謂性者不免有所昏蔽錯雜而無以全其所受之正性有不全則於所謂道者因亦有所乖戾舛逆而無以適乎所行之宜惟聖人之心清明純粹天理渾然無所虧闕故能因其道之所在而為之品節防範以立教於天下使夫過不及者有以取中焉陳氏曰因人生氣質之異而有過不及之差故於性有昏蔽而不能全而所謂道者亦乖戾而失其本然也聖人清明純粹見理分明故因其性之自然者為之品節而歸之中使無過不及以為天下後世法使萬世皆得以通行是謂之教蓋有以辨其親疏之殺而使之各盡其情則仁之為教立矣陳氏曰如為之立五服自斬衰至緦麻之類有以别其貴賤之等而使之各盡其分則義之為教行矣陳氏曰如為之立君臣上下長幼之序為之制度文為使之有以守而不失則禮之為教得矣陳氏曰如三千三百之儀輕重疏密各有等級之不同為之開導禁止使之有以别而不差則知之為教明矣陳氏曰如司徒教民以任邱睦姻之行及糾民以不孝不弟之刑夫如是是以人無知愚事無大小皆得有所持循據守以去其人欲之私而復乎天理之正陳氏曰天理者上達之正途人欲者下達之邪徑萬一把守不牢則便是天理人欲勝負未分推而至於天下之物則亦順其所欲違其所惡因其材質之宜以致其用制其取用之節以遂其生皆有政事之施焉陳氏曰如教人春耕夏耘秋斂冬藏穿牛鼻絡馬首之類此則聖人所以財成天地之道而致其彌縫輔贊之功然亦未始外乎人之所受乎天者而强為之也文集曰修道之教當屬何處亦出乎天耳子思以是三言著於篇首雖曰姑以釋夫三者之名義然學者能因其所指而反身以驗之則其所知豈獨名義之間而已哉語録曰反身是著實向自家體分上求蓋有得乎天命之說則知天之所以與我者無一理之不備而釋氏所謂空者非性矣有以得乎率性之說則知我之所得乎天者無一物之不該而老氏所謂無者非道矣有以得乎修道之說則知聖人之所以教我者莫非因其所固有而去其所本無背其所至難而從其所甚易而凡世儒之訓詁詞章管商之權謀功利老佛之清淨寂滅與夫百家衆技之支離偏曲皆非所以為教矣語録曰問佛氏之空與老子之無一般否曰不同佛氏只是空豁豁然和有都無了所謂終日喫飯不曾咬破一粒米終日著衣不曽掛著一條絲若老氏猶還是有只是清淨無為一向恁地深藏固守自為𤣥妙教人摸索不得便是他有無做兩截看了陳氏曰釋氏以空為宗以未有天地之先為吾真體以天地萬物皆為幻人事都為粗迹盡欲屏除了一歸於真空老氏以無為宗說道都與人物不相干以道為超乎天地形器之外如云道在太極之先都是說未有天地萬物之初有箇空虛道理且自家身今見在天地之後只管想像未有天地之初一箇空虛砥道理與自家身有何干涉不知道只是人事之理耳又曰老氏清虛厭事釋氏屏棄人事他都是把道理做事物頂頭𤣥妙砥物看把人事做下面粗砥便都要撥脫去了又曰世儒或專於訓詁解析而理不明或專於詞章綴緝而義不通又如管商功利之徒雖做得事業亦只是權謀智術之私而非胸中理義去做得砥皆非所謂教矣由是以往因其所固有之不可昧者而益致其學問思辨之功語録曰今人把學問來做外面添砥事看了聖賢千言萬語只是使人反其固有而復其性耳因其所甚易之不能已者而益致其持守推行之力語録曰是日用常行合做砥道理是不可已者非空守著這一箇物事則夫天命之性率性之道豈不昭然日用之間而修道之教又將由我而後立矣曰率性修道之說不同孰為是耶曰程子之論率性正就私意人欲未萌之處指其自然發見各有條理者而言以見道之所以得名非指修為而言也案程子曰生之謂性人生而靜以上不容說才說性時便己不是性也此理天命也順而循之則道也又曰天降衷於下萬物流形各正性命者是所謂性也循其性是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛砥性牛則為牛底性又不為馬砥性此所謂率性也文集曰程子說人生而靜以上是人物未生時只可謂之理未可名為性所謂在天曰命也才說性時便是人生以後此理已墮在形氣之中不全是性之本體矣所謂在人曰性也語録曰程子說物物各有箇道理即此便是道循性者是循其理之自然又曰道是性中分派條理隨分派條理去皆是道吕氏良心之發以下至安能致是一節亦甚精密但謂人雖受天地之中以生而梏於形體又為私意小知所撓故與天地不相似而發不中節必有以不失其所受乎天者然後為道則所謂道者又在修為之後而反由教以得之非復子思程子所指人欲未萌自然發見之意矣案呂氏曰性與天道本無有異但人雖受天地之中以生而梏於蕞然之形體常有私意小知撓乎其間故與天地不相似所發遂至乎出入不齊而不中節如使所得於天者不喪則何患不中節乎故良心所發莫非道也在我者惻隱羞惡辭遜是非皆道也在彼者君臣父子夫婦昆弟朋友之交亦道也在物之分則有彼我之殊在性之分則合乎內外一體而已是皆人心所同然乃吾性之所固有隨喜怒哀樂之所發則愛必有差等敬必有節文所感重者其應也亦重所感輕者其應也亦輕自斬至緦喪服異等而九族之情無所憾自王公至皂隸儀章異制而上下之分莫敢爭非出於性之所有安能致是乎語録曰只是隨性去皆是道吕氏說以人行道若然則未行之前便不是道乎又曰不是人去循之吕說未是永嘉陳氏曰吕說只就人性起蓋不見天地大化故其說性說道說教皆不周普流通此朱子所以不取游氏所謂無容私焉則道在我楊氏所謂率之而已者似亦皆有吕氏之病也案游氏曰天之命萬物者道也而性者具道以生也因其性之固然而無容私焉則道在我矣若出於人為則非道矣楊氏曰性天命也命天理也道則性命之理而已謂性有不善者誣天也性無不善則不可加損也無俟乎修焉率之而已至於修道則程子養之以福修而求復之云却是未合子思本文之意案程子曰民受天地之中以生天命之謂性也人之生也直意亦如此若以生為生養之生却是修道之謂教也至下文始自云能者養之以福不能者敗以取禍又曰修道之謂教此則專在人事以失其本性故修而求復之則入於學若元不失則何修之有語録曰程子一時意各有指不可彊率合為一說獨其言修所謂循此修之各得其分而引舜事以通結之者為得其㫖故其門人亦多祖之但所引舜事或非論語本文之意耳案程子曰循此而修之各得其分則教也自天命以至於教我無加損焉此舜有天下而不與焉者也文集曰修道雖以人事言然其所以修之者莫非天命之本然非人私智所能為也然非聖人有不能盡故程子以舜事明之陵陽李氏謂此又自其性之本然者而推言之所引論語雖非本文之意大率以為一循其本然非私智所能與耳貴氏曰此段辨析極精吕氏所謂先王制禮達之天下傳之後世者得之但其本說率性之道處己失其指而於此又推本之以為率性而行雖已中節而所稟不能無過不及若能心誠求之自然不中不逺但欲達之天下傳之後世所以又當修道而立教焉則為太繁復而失本文之意耳案吕氏曰循性而行無物撓之雖無不中節者然人稟於天者不能無厚薄昏明則應於物者亦不能無小過小不及故品節斯斯之謂禮閔子除喪而見孔子子之琴而彈之切切而言曰先王制禮不敢過也子夏除喪而見孔子豫之琴而彈之侃侃而言曰先王制禮不敢不及也故心誠求之雖不中不逺矣然將達之天下傳之後世慮其所終稽其所蔽則其小遇小不及者不可以不修此先王所以制禮改本又以時位不同為言似亦不親切也案改本云道之在人有時與位之不同必故為法於後世不可不修曰楊氏所論王氏之夫如何案楊氏曰王氏云天使我有是之謂命命之在我之謂性是未知性命之理其曰使我正所謂使然也使然者可以為命乎以命在我為性則命自一物若中庸言天命之謂性性即天命也又豈二物哉如云在天為命在人為性此語似無病然亦不須如此說性命初無二理第所由之者異耳率性之謂道如易所調聖人之作易將以順性命之理是也曰王氏之言固為多病然此所云天使我有是者猶曰上帝降衷云爾豈真以為有或使之者哉其曰在天為命在人為性則程子亦云而楊氏又自言之蓋無悖於理者今乃指為王氏之失不惟似同浴而譏裸裎亦近於意有不平而反為王公之纍矣且以率性之道為順性命之理文意亦不相似若游氏以遁天倍情為非性案游氏曰惟皇上帝降衷於下民則天命也若遁天倍情則非性矣則又不若楊氏人欲非性之云也案楊氏曰天命之謂性人欲非性也語録曰楊氏此語却是直截曰然則吕游楊侯四子之說孰優曰此非後學所敢言也但以程子之言論之則於吕稱其深潜縝密於游稱其穎悟溫柔謂楊不及游而亦每稱其穎悟謂侯生之言但可隔壁聽今且熟復其言究核其意而以此語證之則其高下淺深亦可見矣過此以往則非後學所敢言也語録曰吕本是剛砥氣質涵養得到如此其說得好處如千兵萬馬飽滿伉壯又曰游楊諸公皆才高雖其說有疏略然皆通明又曰侯氏說前後相反沒理㑹道也者不可須㬰離也可離非道也是故君子戒愼乎其所不睹恐懼乎其所不聞離去聲道者日用事物當行之理皆性之德而具於心陳氏曰道是日用事物所當行之路即率性之謂而得於天之所命者而其理總㑹於吾必無物不有無時不然陳氏曰在父子則父子所當親在君臣則君臣所當敬在夫婦則夫婦所當别在朋友則朋友所當信微而起居飲食蓋無物而不有自古及今流行乎天地之間無一息之間蓋無時而不然所以不可須㬰離也永嘉陳氏曰道只是眼前當然砥一時走離不得蔡氏曰須㬰頃刻也言道不可頃刻而離也若其可離則為外物而非道矣陳氏曰才可離便是外物而非本然矣三山陳氏曰使其可離而去則亦身外物耳潘氏曰未發之前固未有人欲之私可言所以朱子特謂之外物是以君子之心常存敬畏雖不見聞亦不敢忽語録曰不顯不見全然無形暗昧不可得知只於此時便戒謹了便不敢忽所以存天理之本然陳氏曰未感物時渾是天理而不使離於須㬰之頃也莫見乎隱莫顯乎微故君子愼其獨也見音現隱暗處也微細事也語録載陸氏曰前後說者一衮說了更不見切體處今如此分别却是使人有㸃檢處獨者人所不知而已所獨知之地也語録曰如一片止水中間忽有一㸃動處此最緊要著功夫又曰這獨也不只是恁獨時如與衆人對坐自心中發一念或不正此亦是獨處言幽暗之中微細之事跡雖未形而幾則己動人雖不知而已獨知之則是天下之事無有著見明顯而過於此者語録曰問莫見莫顯則己是先形了如何却說迹未形幾己動曰莫見乎隱莫顯乎微這是大綱說黃氏曰莫見莫顯不特指他人之聞見只是吾所獨知己是十分顯見了况人亦未有不知者乎須是認得章句兩轉意是以君子既常戒懼而於此尤加謹焉語録曰戒謹恐懼是普說到得隱微之間人所易忽又更用謹這個却是喚起說又曰是從見聞處至不睹不聞處皆戒謹了又就其中於獨處更加謹也是無處不謹而謹處更加謹也陳氏曰雖是平時已常戒懼至此又當十分加謹才加謹則所發便都是善不加謹則所發便流於惡去所以遏人欲於將萌文集曰人欲云者正天理之反耳天理中本無人欲惟其流之有差是以生出人欲來問未發之前無一毫私意之雜此處無走作只是存天理而已未說到遏人欲處已發之初天理人欲由是而分此處不放過即是遏人欲天理之存有不待言者曰此說分得好然又須見不可分處如兵家攻守相似各是一事而實相為用也語録曰問上一節能存天理了則下面謹獨似多了一截曰雖是存得天理臨發時也須㸃檢這便是他密處而不使其潛滋暗長於隱微之中以致離道之逺也或問既曰道也者不可須㬰離也可離非道也是故君子戒愼乎其所不睹恐懼乎其所不聞矣而又曰莫見乎隱莫顯乎微故君子愼其獨也何也曰此因論率性之道以明由教而入者其始當如此蓋兩事也其先言道不可離而君子必戒謹恐懼乎其所不睹不聞者所以言道之無所不在無時不然學者當無須㬰毫忽之不謹而周防之以全其本然之體也語録曰是防之於未然以全其體又言莫見乎隱莫顯乎微而君子必謹其獨者所以言隱微之間人所不見而已獨知之則其事之纎悉無不顯著又有甚於他人之知者學者尤當隨其念之方萌而致察焉以謹其善惡之幾也語録曰是察之於將然以審其幾三山陳氏曰曰隱曰微則此念已萌矣特人未知之故隱而未見微而未顯耳然人雖未知而我已知之則固己甚見而甚顯矣此正善惡之幾也蓋所謂道者率性而已性無不有故道無不在大而父子君臣小而動靜食息不假人力之為而莫不各有當然之理所謂道也是乃天下人物之所共由充塞天地貫徹古今而取諸至近則常不外乎吾之一心陳氏曰天下豈有性外之物而不統於吾心是理之中也哉理之所至大極於無際而無不通細入於無倫而無不貫前後乎萬古而無不徹循之則治失之則亂蓋無須㬰之頃可得而暫離也若其可以暫合暫離而於事無所損益則是人力私智之所為者而非率性之謂矣語録曰無時而非道亦無適而非道若之何而可須㬰離也可須㬰離則非率性之謂矣聖人之所修以為教者因其不可離者而品節之也君子之所由以為學者因其不可離者而持守之也三山陳氏曰君子必欲存養持守以保全之者正為其不可離而去之如饑食渴飲之不可無也是以日用之間須㬰之頃持守工夫一有不至則所謂不可離者雖未嘗不在我而人欲間之則亦判然二物而不相管矣是則雖曰有人之形而其違禽獸也何逺哉陳氏曰日用不可須㬰失才失之便身心顚𡨕而入於夷狄禽獸矣是以君子戒愼乎其目之所不及見恐懼乎其耳之所不及聞瞭然心目之間常若見其不可離者而不敢有須㬰之間以流於人欲之私而陷於禽獸之域若書之言防怨而曰不見是圖禮之言事親而曰聽於無聲視於無形蓋不待其徵於色發於聲然後有以用其力也語録曰既是不見安得有圖只是要於未有兆朕無可睹聞時先戒懼耳又曰聽於無聲視於無形只是照管所不到念慮所不及處正如防賊相似須要塞其來路夫既已如此矣則又以謂道固無所不在而幽隱之間乃他人之所不見而已所獨見道固無時不然而細微之事乃他人之所不聞而已所獨聞是皆常情所忽以為可以欺天罔人而不必謹者而不知吾心之靈皎如日月既已知之則其毫髮之間無所潛遁又有甚於他人之知矣又况既有是心藏伏之久則其見於聲音容貌之間發於行事施為之實必有暴著而不可掩者又不止於念慮之差而已也語録曰隱微顯著未嘗有異豈怠於顯而偏於獨哉蓋獨者致用之源而人所易忽於此而必謹焉則亦無所不謹矣潘氏曰幽暗之中微細之事其是非善惡皆不能逃乎此心之靈所以當此之時尤為昭灼顯著也若其發之既逺為之既力則在他人十目所視十手所指雖甚昭灼而在我者心意方注於事為精神方運於酬酢其是非得失反有不自覺者矣此所以獨於隱微之際尤為顯著於此之時而能加省察之功則凡不善之萌其見之也明其回之也易不至潛藏隱伏於其中而不自知矣是以君子既戒懼乎耳目之所不及則此心常明不為物蔽而於此尤不敢不致其謹焉必使其幾微之際無一毫人欲之萌而純乎義理之發則下學之功盡善全美而無須㬰之間矣語録曰幾者動之微是欲動未動之間聖賢說謹獨便都是要就幾微處理㑹二者相須皆反躬為己遏人欲存天理之實事蓋體道之功莫有先於此者亦莫有切於此者輔氏曰此兩節是做工夫處見得聖賢體道之功甚密故子思於此首以為言以見君子之學必由此而入也曰諸家之說皆以戒愼不睹恐懼不聞即為謹獨之意子乃分之以為兩事無乃破碎支離之甚邪曰既言道不可離則是無適而不在矣而又言莫見乎隱莫顯乎微則是要切之處尤在於隱微也語録曰道不可離言道之至廣至大者莫見乎隱莫顯乎微言道之至精至密者既言戒謹不睹恐懼不聞則是無處而不謹矣又言謹獨則是其所謹者尤在於獨也語録曰戒謹不睹恐懼不聞此乃統同說謹獨又就中有一念萌動處說最緊要著功夫處是故不容於不異矣若其同為一事則其為言又何必若是之重復邪文集曰若果如此則上段文意已足不知何故又煩再說曷嘗有如此煩絮砥聖賢且此書卒章潛雖伏矣不愧屋漏亦兩言之正與此相首尾陳氏曰潜雖伏矣一節言人之所不見處申明首章謹獨意不愧屋漏一節言己之所不見處申明首章戒懼不睹不聞意但諸家皆不之察獨程子嘗有不愧屋漏與謹獨是持養氣象之言其於二者之間特加與字是固已分為兩事而當時聽者有未察耳案程子曰要修持他這天理則在德須有不言而信者言難為形狀養之則須直不愧屋漏與愼獨這是箇持養砥氣象也語録曰此分明是兩節事曰子又安知不睹不聞之不為獨乎曰其所不睹不聞者己之所不睹不聞也故上言道不可離而下言君子自其平常之處無所不用其戒懼而極言之以至於此也獨者人之所不睹不聞也故上言莫見乎隱莫顯乎微而下言君子之所謹者尤在於幽隱之地也語録曰其之一字便見得是說己不睹不聞處又曰方不聞不睹之時不惟人所不知自家亦未有所知若所謂獨即人所不知而已所獨知極是要戒懼自來人說不睹不聞與謹獨只是一意無分别便不是永嘉陳氏曰戒謹恐懼與謹獨是兩項地頭戒謹恐懼是自家不睹不聞之時養性如此謹獨是衆人不睹不聞之時存誠如此是其語勢自相唱和各有血脈理甚分明語録曰前段有是故字後段有故字聖賢不是要作文只是逐節次說出許多道理若是作一段說亦成是何文字陳氏曰莫見乎隱莫顯乎微對道不可須㬰離可離非道句君子必謹其獨對戒謹其所不睹恐懼其所不聞句惟其道不可須㬰離可離非道所以戒謹其所不睹恐懼其所不聞惟其莫見乎隱莫顯乎微所以必謹其獨如曰是兩條者皆為謹獨之意則是持守之功無所施於平常之處而專在幽隱之間也且雖免於破碎之譏而其繁復偏滯而無所當亦甚矣曰程子所謂隱微之際若與吕氏改本及游楊氏不同而子一之何耶曰以理言之則三家不若程子之盡以心言之則程子不若三家之密是固若有不同者矣然必有是理然後有是心有是心而後有是理則亦初無異指也合而言之亦何不可之有哉案程子曰人只以耳目所見聞者為顯微然不知理却甚顯也且如昔人彈琴見螳捕蟬而聞者以為有殺聲殺在心而人聞其琴而知之豈非顯乎人有不善而自謂人不知之然天地之理甚著不可欺也吕氏曰此章明道之要不可不誠道之在我猶飲食居處之不可去可去皆外物也誠以為己故不欺其心人心至靈一萌之思善與不善莫不知之他人雖明有所不與也故愼其獨者知為己而已游氏曰人所不睹可謂隱矣而心獨見之不亦見乎人所不聞可謂微矣而心獨聞之不亦顯乎楊氏曰獨非交物之時有動於中其違未逺也雖非視聽所及而其幾固已瞭然心目之間矣其為顯見孰加焉雖欲自蔽吾誰欺欺天乎此君子必愼其獨也語録曰問程子舉彈琴殺心處是就人知處言吕遊楊氏所說是就已自知處言章句是合二者而言否曰有動於中己固先自知亦不能掩人之知所謂誠之不可掩也問迹雖未形幾則已動上兩句是程子意人雖不知己獨知之下兩句是游氏意否曰然兩事只是一理幾既動則己必知之已既知則人必知之曰他說如何曰吕氏舊本所論道不可離者得之但專以過不及為離道則似未盡耳其論天地之中性與天道一節最其用意深處然經文所指不睹不聞隱微之間者乃欲使人戒懼乎此而不使人欲之私得以萌動於其間耳非欲使人虛空其心反觀於此以求見夫所謂中者而遂執之以為應事之準則也吕氏既失其指而所引用不得於言必有事焉參前倚衡之語亦非論孟本文之意至謂隱微之間有昭昭而不可欺感之而能應者則固心之謂矣而又曰正惟虛心以求則庶乎見之是又别以一心而求此一心見此一心也豈不誤之甚哉案吕氏曰率性之謂道則四端之在我者人倫之在彼者皆吾性命之理受乎天地之中所以立人之道不可須㬰離也絶類離倫無意乎君臣父子者過而離乎此者也賊恩害義不知有君臣父子者不及而離乎此者也雖過不及有差而皆不可以行於世故曰可離非道也非道者非天地之中而已非天地之中而自謂有道惑也又曰所謂中者性與天道也謂之有物則不得於言謂之無物則必有事焉不得於言者視之不見聽之不聞無聲形接乎耳目而可以道也必有事焉者莫見乎隱莫顯乎微體物而不可遺者也古之君子立則見其參於前在與則見其倚於衡是何所見乎洋洋乎如在其上如在其左右是果何物乎學者見乎此則庶乎能擇中庸而執之隱微之間不可求之於耳目不可道之於言語然有所謂昭昭而不可欺感之而能應乎正惟虛心以求之則庶乎見之故曰莫見乎隱莫顯乎微文集曰心者人之所以主乎身者也一而不二者也為主而不為客者也命物而不命於物者也故以心觀物則物之理得今復有物以反觀乎心則是此心之外復有一心而能管乎此心也然則所謂心者為一邪為二邪為主邪為客邪為命物者邪為命於物者邪若參前倚衡之云者則為忠信篤敬而發也蓋曰忠信篤敬不忘乎心則無所適而不見其在是云爾亦非有以見夫心之謂也且身在此而心參於前身在與而心倚於衡是果何理也邪若楊氏無適非道之云則善矣然其言似亦有所未盡蓋衣食作息視聽舉履皆物也其所以如此之義理準則乃道也若曰所謂道者不外乎物而人在天地之間不能違物而獨立是以無適而不有義理之準則不可頃刻去之而不由則是中庸之㫖也若便指物以為道而曰人不能頃刻而離此百姓特日用而不知耳則是不唯昧於形而上下之别而墮於釋氏作用是性之失且使學者誤謂道無不在雖欲離之而不可得吾既知之則雖猖狂妄行亦無適而不為道則其為害將有不可勝言者不但文義之失而已也案楊氏曰夫盈天地之間孰非道乎道而可離則道有在矣譬之四方有定位焉適東則離乎西適南則離乎北斯則可離也若夫無適而非道則烏得而離耶故寒而衣饑而食日出而作晦而息耳目之視聽手足之舉履無非道也此百姓所以日用而不知語録曰衣食動作即是物物之理乃道也楊氏將物便喚做道則不可又曰桀紂亦㑹手持足履目視耳聽如何便喚做道若便以為道是認欲為理也又曰釋氏所謂作用是性便是如此他都不理㑹是和非只認得那衣食作息視聽舉履便是道說我這箇㑹說話砥㑹作用砥呌著便應砥便是神通妙用更不問道理如何儒家則須是就這上尋討箇道理方是道曰吕氏之書今有二本子之所謂舊本則無疑矣所謂改本則陳忠肅公所謂程氏明道夫子之言而為之序者子於石氏集解雖嘗辨之而論者猶或以為非程夫子不能及也奈何曰是則愚嘗聞之劉李二先生矣舊本者吕氏太學講堂之初本也改本者其後所修之别本也陳公之序蓋為傳者所誤而失之及其兄孫幾叟具以所聞告之然後自覺其非則其書已行而不及改矣近見胡仁仲所記侯師聖語亦與此合蓋幾叟之師楊氏實與吕氏同出程門師聖則程子之內弟而劉李之於幾叟仁仲之於師聖又皆親見而親聞之是豈胸臆私見口舌浮辨所得而奪哉若更以其言考之則二書詳略雖或不同然其語意實相表裏如人之形貌昔腴今瘠而其部位神采初不異也豈可不察而遽謂之兩人哉又况改本厭前之詳而有意於略故其辭雖約而未免反有刻露峭急之病至於詞義之間失其本指則未能改於其舊者尚多有之校之明道平日之言平易從容而自然精切者又不翅碔砆之與美玉也於此而猶不辨焉則其於道之淺深固不問而可知矣喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也樂音洛中節之中去聲喜怒哀樂情也語録曰情只是所發之路陌其未發則性也陳氏曰在心裏面未發動砥是性無所偏倚故謂之中語録曰如處室中東南西北不倚於一方只是在中間陳氏曰未發之中只可言不偏不倚却下不得過不及字發皆中節情之正也陳氏曰情之中節是從本性發來其不中節是感物欲而動潘氏曰節者限節也其人情之凖的乎無所乖戾故謂之和陳氏曰只是得其當然之理無些過無些不及與是理不相咈戾故名之曰和大本者天命之性天下之理皆由此出道之體也陳氏曰是渾淪一大本砥乃天下萬理所從出是道之體達道者循性之謂天下古今之所共由道之用也陳氏曰是通衢達道一般古今天下之所通行是道之用此言性情之德語録曰中性之德和情之德以明道不可離之意致中和天地位焉萬物育焉致推而極之也語録曰致者推致其極之謂如射相似有中帖者有中垜者有中紅心邊暈者皆是未致須是到那紅心中央方始是致又曰致字是只管挨排去之義工夫極精密位者安其所也育者遂其生也語録曰此天地萬物真實效驗自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣語録曰致中和須兼表裏而言致中則欲其無少偏倚而又能守之不失致和則欲其無少差謬而又能無適不然黃氏曰無少偏倚無少差謬是橫致一致其守不失無適不然是直致一致橫致如一箇物打迸了四圍恁地潔淨相似直致則是今日如此潔淨後日亦如此以至無頃刻不如此又曰譬如掘井掘得深是直掘得濶是橫就一事上研窮到底是直推至萬事莫不皆到是橫一直一橫無不窮究到極處無少偏倚無少乖戾是就一時一事上直下功夫使一時一事無纎悉不到處其守不失無適不然是自始至終自大至小橫鋪㸃檢無一時一事有纎悉不到處愚謂約是收斂近裏之意精是别得不雜之意此二字尤朱子喫緊示人處蓋天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此黃氏曰既是中和皆當致則天地萬物之位育皆隨其所致而見其效陳氏曰心既正則天地自各安其所氣既順則萬物自各遂其生其功效自然感格須是到此地位方真知之此學問之極功聖人之能事陳氏曰此乃有位者之功非泛就君子說初非有待於外而修道之教亦在其中矣陳氏曰致中即天命之性致和即率性之道及天地位萬物育則修道之教亦在其中矣是其一體一用雖有動靜之殊然必其體立而後用有以行則其實亦非有兩事也文集曰人之一身知覺運用莫非心之所為則心者固所以主於身而無動靜之間者也然方其靜也事物未至思慮未萌而一性渾然道義全具其所謂中是乃心之所以為體而寂然不動者也及其動也事物交至思慮萌焉則七情迭用各有攸主其所謂和是乃心之所以為用感而遂通者也然性之靜也而不能不動情之動也而必有節焉是則心之所以寂然感通周流貫徹而體用未嘗相離者也三山陳氏曰體之立所以為用之行之地用之行所以為體之立之驗愚謂中和本一理位育非二事然體立而後用行則據其效而推本其所以然各有所從來而不可紊耳故於此合而言之以結上文之意右第一章子思述所傳之意以立言葉氏曰蓋孔子之意而子思述以為經首明道之本原出於天而不可易其實體備於己而不可離次言存養省察之要終言聖神功化之極黃氏曰此一章字數不多而義理本原工夫次第與夫效驗之大無不該備蓋欲學者於此反求諸身而自得之以去夫外誘之私而充其本然之善楊氏所謂一篇之體要是也陳氏曰此章乃子思總括一篇之義其下十章蓋子思引夫子之言以終此章之義或問喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉何也曰此推本天命之性以明由教而入者其始之所發端終之所至極皆不外於吾心也蓋天命之性萬理具焉喜怒哀樂各有攸當方其未發渾然在中無所偏倚故謂之中及其發而皆得其當無所乖戾故謂之和陳氏曰未發則是道理渾然在心裏不偏不倚便是中此即天命之性也及發出來皆當然而然與本然道理不相乖戾便是和謂之中者所以狀性之德道之體也以其天地萬物之理無所不該故曰天下之大本謂之和者所以著情之正道之用也以其古今人物之所共由故曰天下之達道陳氏曰中和是就性情說大抵心之體是性性不是别箇物只是心中所具之理耳萬般道理都從這裏出便為大本只這箇動出外來便是情萬般應接而無所不通是為達道蓋天命之性純粹至善而具於人心者其體用之全本皆如此不以聖愚而有加損也然靜而不知所以存之則天理昧而大本有所不立矣動而不知所以節之則人欲肆而達道有所不行矣語録曰未發時是那靜有箇體在裏子若靜而不失其體便是天下之大本立焉或失其體則大本便昏了已發時是那動有許多用若動而不失其用便是天下之達道行焉或失其用則達道便乖了又曰大本不立達道不行則雖天理流行未嘗間斷而其在我者或幾乎息矣惟君子自其不睹不聞之前而所以戒謹恐懼者愈嚴愈敬以至於無一毫之偏倚而守之常不失焉則為有以致其中而大本之立日以益固矣尤於隱微幽獨之際而所以謹其善惡之幾者愈精愈密以至於無一毫之差謬而行之每不違焉則為有以致其和而達道之行日以益廣矣永嘉陳氏曰戒謹於不睹不聞之時此即未發時工夫謹獨於隱微之時此即既發時工夫若曰致中除戒懼一條何以見其致處若曰致和除謹獨一條又何以為致血脈相承如此致之一字最是用工處愚謂愈嚴愈敬是自其未發之體而存養之愈精愈密是自其已發之用而省察之致者用力推致而極其至之謂致焉而極其至至於靜而無一息之不中則吾心正而天地之心亦正故陰陽動靜各止其所而天地於此乎位矣語録曰問言陰陽動靜何也曰天髙地下萬物散殊各有定所此未與物相感也動而無一事之不和則吾氣順而天地之氣亦順故充塞無間歡欣交通而萬物於此乎育矣語録曰和則交感而萬物育矣此萬化之本原一心之妙用聖神之能事學問之極功固有非始學所當議者然射者之的行者之歸亦學者立志之初所當知也故此章雖為一篇開卷之首然子思之言亦必至此而後己焉其指深矣曰然則中和果二物乎曰觀其一體一用之名則安得不二察其一體一用之實則此為彼體彼為此用如耳目之能視聽視聽之由耳目初非有二物也語録曰體是這箇道理用是他用處如耳聽目視自然如此是理也開眼看物著耳聽聲便是用陳氏曰體用未嘗相離有是體方有是用有是用方見是體曰天地位萬物育諸家皆以其理言子獨以其事論然則自古衰亂之世所以病乎中和者多矣天地之位萬物之育豈以是而失其常耶曰三辰失行山崩川竭則不必天翻地覆然後為不位矣兵亂凶荒胎殰卵殈則不必人消物盡然後為不育矣凡若此者豈非不中不和之所致而又安可誣哉今以事言者固以為有是理而後有是事彼以理言者亦非以為無是事而徒有是理也但其言之不備有以啓後學之疑不若直以事言而理在其中之為盡耳曰然則當其不位不育之時豈無聖賢生於其世而其所以致夫中和者乃不能有以救其一二何耶曰善惡感通之理亦及其力之所至而止耳語録曰問力是力分之力曰然彼達而在上者既曰有以病之則夫災異之變又豈窮而在下者所能救也哉但能致中和於一身則天下雖亂而吾身之天地萬物不害為安泰其不能者天下雖治而吾身之天地萬物不害為乖錯其間一家一國莫不皆然此又不可不知耳語録曰問以孔子言之如何是天地萬物安泰處曰在聖人之身則天地萬物自然安泰曰此是以理言之否曰然一家一國莫不如是又曰尊卑上下之大分即吾身之天地也應變曲折之萬端即吾身之萬物也黃氏曰如達而在上固是堯舜事業窮而在下只如在一鄉不擾便是一鄉萬物育在一家不擾便是一家萬物育曰二者之為實事可也而分中和以屬焉將不又為破碎之甚邪曰世固未有能致中而不足於和者亦未有能致和而不本於中者也未有天地己位而萬物不育者亦未有天地不位而萬物自育者也特據其效而推本其所以然則各有所從來而不可紊耳陳氏曰天地位便是大本立處萬物育便是達道行處此事灼然分明但二者常相須無有能此而不能彼者耳曰子思之言中和如此而周子之言則曰中者和也中節也天下之達道也乃舉中而合之於和然則又將何以為天下之大本也耶曰子思之所謂中以未發而言也周子之所謂中以時中而言也愚於篇首已辨之矣學者涵泳而别識之見其並行而不相悖焉者可也語録曰中庸之中是兼以其發而中節無過不及者得名若不識得此理則周子之言更解不得陳氏曰中有二義有已發之中有未發之中未發是就性上論已發是就事上論已發之中當喜而喜當怒而怒那恰好處無過不及便是中此中即所謂和也所以周子曰中者和也是指已發之中而言也曰程吕問答如何曰考之文集則是其書蓋不完矣然程子初謂凡言心者皆指已發而言而後書乃自以為未當向非吕氏問之之審而不完之中又失此書則此言之未當學者何自而知之乎以此又知聖賢之言固有發端而未竟者學者尤當虛心悉意以審其歸未可執其一言而遽以為定也案吕氏問曰先生謂凡言心者皆指已發而言然則未發之前謂之無心可乎竊謂未發之前心體昭昭具在已發乃心之用也程子曰凡言心者指已發而言此固未當心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也惟觀其所見何如耳文集曰程子所謂凡言心者皆指已發此却指心體流行而言非謂事物思慮之交也然與中庸本文不合故以為未當而復正之固不可執其已改之言而盡疑論說之誤又不可遂以為當而不究其所指之殊也語録曰程子初謂心為已發吕氏只是辨此一句程子後來又救前說語甚圓無病其說中字因過不及而立名又似并指時中之中而與在中之義少異蓋未發之時在中之義謂之無所偏倚則可謂之無過不及則方此之時未有中節不中節之可言也無過不及之名亦何自而立乎又其下文皆以不偏不倚為言則此語者亦或未得為定論也案吕氏曰中即性也程子曰中也者所以狀性之體段蓋中之為義自過不及而立名若只以中為性則中與性不合語録曰問程子說中自過不及而立名與平日異只為呂氏形容中太過故就其既發告之曰然吕氏又引允執厥中以明未發之㫖則程子之說書也固謂允執厥中所以行之蓋其所謂中者乃指時中之中而非未發之中也案吕氏曰大人不失其赤子之心乃所謂允執厥中也語録曰問呂氏引允執厥中如何曰他把做已發言故如此說吕氏又謂求之喜怒哀樂未發之時則程子所以答蘇季明之問又已有既思即是已發之說矣凡此皆其決不以吕說為然者獨不知其於此何故略無所辨學者亦當詳之未可見其不辨而遽以為是也案吕氏曰聖人之學以中為大本中者無過不及之謂也何所準則而知過不及乎求之此心而已此心之動出入無時何從而守之乎求之於喜怒哀樂未發之際而已又案蘇氏問於喜怒哀樂之前求中可否程子曰不可既思於喜怒哀樂未發之前求之又却是思也既思即是已發思與喜怒哀樂一般才發便謂之和不可謂之中也問吕氏言當求於喜怒未發之前信斯言也恐無著落如之何而可程子曰言存養於喜怒哀樂未發之時則可若言求中於喜怒哀樂未發之前則不可文集曰程子才思即是已發一句能發明子思言外之意蓋言不待喜怒哀樂之發但有所思即為已發此意已極精微說到未發界至十分盡頭不可以有加矣曰然則程子卒以赤子之心為已發何也曰衆人之心莫不有未發之時亦莫不有已發之時不以老稚賢愚而有别也但孟子所指赤子之心純一無僞者乃因其發而後可見若未發則純一無僞又不足以名之而亦非獨赤子之心為然矣是以程子雖改夫心皆已發之一言而以赤子之心為已發則不可得而改也案吕氏曰喜怒哀樂之未發則赤子之心當求其未發此心至虛無所偏倚故謂之中程子曰喜怒哀樂未發謂之中赤子之心發而未逺乎中若便謂之中是不識大本也又案蘇氏問赤子之心為已發是否程子曰已發而去道未逺也曰大人不失赤子之心如何程子曰取其純一近道也語録曰程子道赤子之心是已發而未逺如赤子饑則食渴則飲便是已發又曰吕氏以赤子即是未發則大失之蓋赤子之心動靜無常非寂然不動之謂故不可謂之中然無營欲知巧之思故為未逺乎中未發之中本體自然不須窮索又曰未發時僞不僞皆不可見不特赤子如此大人亦如此只是大人有主宰赤子則未有主宰三山陳氏曰指赤子之心為未發者非也蓋自為赤子四者之心已動矣未發既發凡人一日之間無時無之未發之時湛如止水未涉擬議曰程子明鏡止水之云固以聖人之心為異乎赤子之心矣然則此其為未發者耶曰聖人之心未發則為水鏡之體既發則為水鏡之用亦非獨指未發而言也案蘇氏問赤子之心與聖人之心如何程子曰聖人之心如明鏡如止水曰諸說如何曰程子備矣但其答蘇季明之後章記録多失本真答問不相對值如耳無聞目無見之答以下文若無事時須見須聞之說參之其誤必矣蓋未發之時但為未有喜怒哀樂之偏耳若其目之有見耳之有聞則當愈益精明而不可亂豈若心不在焉而遂廢耳目之用哉案蘇氏問當中之時耳無聞目無見否程子曰雖耳無聞目無見然見聞之理在始得文集曰心之有知與耳之有聞目之有見為一等時節雖未發而未嘗無心之有思與耳之有聽目之有視為一等時節一有此則不得為未發故程子以有思為已發則可而記者以無見無聞為未發則不可其言靜時既有知覺豈可言靜而引復以動見天地之心為說亦不可曉蓋當至靜之時但有能知覺者而未有所知覺也故以為靜中有物則可而便以才思即是已發為比則未可以為坤卦純坤而不為無陽則可而便以復之一陽已動為比則未可也所謂無時不中者所謂善觀者却於已發之際觀之者則語雖要切而其文意亦不能無斷續至於動上求靜之云則問者又轉而之它矣案蘇氏問中是有時而中否程子曰何時而不中以事言之則有時而中以道言之何時而不中曰固是所為皆中然而觀於四者未發之時靜時自有一般氣象及至接事時又自别何也程子曰善觀者不如此却於喜怒哀樂已發之際觀之賢且說靜時如何曰謂之無物則不可然自有知覺處程子曰既有知覺却是動也怎生言靜人說復其見天地之心皆以謂至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜自古儒者皆言靜見天地之心惟某言動而見天地之心或曰莫是於動上求靜否曰固是然最難文集曰至靜之時但有能知能覺者而無所知所覺此易卦為純坤不為無陽之象若論復卦則須以有所知覺者當之不得合為一說矣故邵子亦云一陽初動處萬物未生時此至微至妙處須虛心靜慮方始見得其答動字靜字之問答敬何以用功之問答思慮不定之問以至若無事時須見須聞之說則皆精當案或曰喜怒哀樂未發之前下動字下靜字程子曰謂之靜則可然靜中須有物始得這裏便是難處學者莫若且先理㑹得敬能敬則自知此矣或曰敬何以用功程子曰莫若主一曰某嘗患思慮不定或思一事未了他事如麻又生如何曰不可此不誠之本須是習能專一時便好不拘思慮與應事皆要求一或曰當靜坐時物之過乎前者還見不見程子曰看事如何若是大事如祭祀前旒蔽明黈纊充耳凡物之過者不見不聞也若無事時目須見耳須聞語録曰靜中有物者只是知覺不昧或引程子語才有知覺便是動為問曰若云知寒覺暖便是知覺已動今未曽著於事物但有知覺在何妨其為靜不成靜坐便只是瞌睡又曰有聞見之理在即是靜中有物但其曰當祭祀時無所見聞則古人之制祭服而設旒纊雖曰欲其不得廣視雜聽而致其精一然非以是為真足以全蔽其聰明使之一無見聞也若曰屨之有絇以為行戒樽之有禁以為酒戒然初未嘗以是而遂不行不飲也若使當祭之時真為旒纊所塞遂如聾瞽則是禮容樂節皆不能知亦將何以致其誠意交於鬼神哉程子之言決不如是之過也文集曰便是祭祀若耳無聞目無見即其升降饋奠皆不能知其時節之所宜雖有贊引之人亦不聞其告語之聲矣故前旒黈纊之說亦只是欲其専一於此而不雜他事之意非謂奉祭祀時都無見聞也至其答過而不留之問則又有若不相直而可疑者案或曰當敬時雖見聞莫過焉而不留否程子曰不說道非禮勿視勿聽勿者禁止之辭才說勿字便不得也大抵此條最多謬誤蓋聽他人之問而從旁竊記非唯未了答者之意而亦未悉問者之情是以致此亂道而誤人耳然而猶幸其間紕漏顯然尚可尋繹以别其僞獨微言之湮沒者遂不復傳為可惜耳文集曰此條記録前後差舛都無理㑹後來讀者若未敢便以為非亦且合存而不論吕氏此章之說尤多可疑如引屢空貨殖及心為甚者其於彼此蓋兩失之其曰由空而後見夫中是又前章虛心以求之說也其不陷而入於浮屠者幾希矣蓋其病根正在欲於未發之前求見夫所謂中者而執之是以屢言之而病愈甚殊不知經文所謂致中和者亦曰當其未發此心至虛如鏡之明如水之止則但當敬以存之而不使其小有偏倚至於事物之來此心發見喜怒哀樂各有攸當則又當敬以察之而不使其小有差忒而已未有如是之說也且曰未發之前則宜其不待著意推求而瞭然心目之間矣一有求之之心則是便為已發固已不得而見之况欲從而執之則其為偏倚亦甚矣又何中之可得乎且夫未發已發日用之間固有自然之機不假人力方其未發本自寂然固無所事於執及其當發則又當即事即物隨感而應亦安得塊然不動而執此未發之中耶此為義理之根本於此有差則無所不差矣此吕氏之說所以條理紊亂援引乖刺而不勝其可疑也程子譏之以為不識大本豈不信哉案吕氏曰人莫不知理義之當無過無不及之謂中不及乎所以中也喜怒哀樂未發之前反求吾心果何為乎回也其庶乎屢空惟空然後可以見其中而空非中也必有事焉喜怒哀樂之未發無私意小知撓乎其間乃所謂空由空然後見乎中實則不見也若子貢聚聞見之多其心已實如貨殖焉所蓄有素所應有限雖曰富有亦有時而窮故億則屢而未皆中也權然後知輕重度然後知長短物皆然心為甚則心之度物甚於權度之審其應物當無毫髮之差然人應物不中節者常多其故何也由不得中而執之有私意小知撓乎其間故理義不當或過或不及猶權度之法不精則稱量百物不能無銖兩分寸之差也此所謂性命之理出於天道之自然非人私知所能為也故曰喜怒哀樂之未發謂之中語録曰孟子乃是論心自度非是心度物又曰欲執喜怒哀樂未發之中不知如何執得那事來面前只得應他當喜便喜當怒便怒如何執得楊氏所謂未發之時以心驗之則中之義自見執而勿失無人欲之私焉則發必中節矣又曰須於未發之際能體所謂中其曰驗之體之執之則亦吕氏之失也其曰其慟其喜中固自若疑與程子所云言和則中在其中者相似然細推之則程子之意正謂喜怒哀樂已發之處見得未發之理發見在此一事一物之中各無偏倚過不及之差乃時中之中而非渾然在中之中也若楊氏之云中固自若而又引莊周出怒不怒之言以明之則是以為聖人方當喜怒哀樂之時其心漠然同於木石而姑外示如此之形凡所云為皆不復出於中心之誠矣大抵楊氏之言多雜於老佛故其失類如此其曰當論其中否不當論其有無則至論也案楊氏曰但於喜怒哀樂未發之際以心驗之則中之義自見非精一烏能執之又曰執而勿失無人欲之私焉發必中節矣發而中節中固未嘗亡也孔子之慟孟子之喜因其可慟可喜而已於孔孟何有哉其慟也其喜也中固自若也鑑之照物因物而異形而鑑之明未嘗異也所謂出怒不怒則怒出於不怒出為無為則為出於不為亦此意也若聖人而無喜怒哀樂則天下之達道廢矣一人橫行於天下武王亦不必恥也故於是四者當論其中節不中節不當論其有無也又曰須是於喜怒哀樂未發之際能體所謂中於喜怒哀樂已發之後能得所謂和致中和則天地可位萬物可育語録曰楊氏少時先去看莊列等文字後來雖見程子然而此念熟了不覺時發出來仲尼曰君子中庸小人反中庸中庸者不偏不倚無過不及而平常之理乃天命所當然精微之極致也陳氏曰中庸止一箇砥道理所以不析開說唯君子為能體之小人反是黃氏曰人莫不具是性亦莫不有是道然陰陽五行之氣雜揉不齊君子小人之分趨向亦異故中庸之道惟君子能之而小人則反是君子之中庸也君子而時中小人之中庸也小人而無忌憚也王肅本作小人之反中庸也程子亦以為然今從之君子之所以為中庸者以其有君子之德而又能隨時以處中也語録曰君子只是說箇好人時中只是說箇做得恰好砥事又曰有君子之德而不能隨時以處中則不免為賢知之過有君子之德而又能隨時以處中方得到恰好處小人之所以反中庸者以其有小人之心而又無所忌憚也語録曰小人固是愚所為固是不肖猶知忌憚則為惡猶較得些又曰為善者君子之德為惡者小人之心君子而處不得中者有之小人而不至於無忌憚者亦有之惟其反中庸則方見其無忌憚也又曰既是君子又要時中既是小人又無忌憚又曰二又字不用亦可但恐讀者不覺故特下此字要得分明蓋中無定體隨時而在是乃平常之理也語録曰堯授舜舜授禹都是當其時合當如此做做得來恰好所謂中也中即平常也不如此便非中便不是平常湯武亦然又如當盛夏時須要飲冷衣葛此便是中便是平常隆冬時須用飲湯重裘此便是中便是平常若極暑時重裘盛寒時衣葛便是差異便是失其中矣君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無所忌憚矣畨氏曰君子致存養省察之功是以無時而不中小人放肆而無忌憚是以與中庸相反右第二章此下十章皆論中庸以釋首章之義文雖不屬而意實相承也變和言庸者游氏曰以性情言之則曰中和以德行言之則曰中庸是也然中庸之中實兼中和之義黃氏曰性情天生砥德行人做砥性情人人一般德行人人不同中庸之中本是和然和自中出故兼中和之義陳氏曰中和以性情言是分體用動靜相對說中庸以德行言是兼行事相合說或問此其稱仲尼曰何也曰首章夫子之意而子思言之故此以下又引夫子之言以證之也曰孫可以字其祖乎曰古者生無爵死無諡則子孫之於祖考亦名之而已矣周人冠則字而尊其名死則諡而諱其名則固巳彌文矣然未有諱其字者也故儀禮饋食之祝詞曰適爾皇祖伯某父乃直以字而面命之况孔子爵不應諡而子孫又不得稱其字以别之則將謂之何哉若曰孔子則外之之辭而又孔姓之通稱若曰夫子則又當時衆人相呼之通號也不曰仲尼而何以哉語録曰問子思稱夫子為仲尼曰昔人未嘗諱其字程子云豫年十四五從周茂叔本朝先輩尚如此伊川亦嘗呼明道字曰君子所以中庸小人之所以反之者何也曰中庸者無過不及而平常之理蓋天命人心之正也唯君子為能知其在我而戒謹恐懼以無失其當然故能隨時而得中小人則不知有此而無所忌憚故其心每反乎此而不中不常也曰小人之中庸王肅程子悉加反字蓋疊上文之語然諸說皆謂小人實反中庸而不自知其為非乃敢自以為中庸而居之不疑如漢之胡廣唐之吕溫栁宗元者則其所謂中庸是乃所以為無忌憚也如此則不煩增字而理亦通矣曰小人之情狀固有若此者矣但以文勢考之則恐未然蓋論一篇之通體則此章乃引夫子所言之首章且當略舉大端以分别君子小人之趨向未當遽及此意之隱微也若語一章之語脈則上文方言君子中庸而小人反之其下且當平解兩句之義以盡其意不應偏解上句而不解下句又遽别生它說也故疑王肅所傳之本為得其正而未必肅之所增程子從之亦不為無所据而臆決也案程子曰小人更有甚中庸脫一反字小人不主於義理則無忌憚無忌憚所以反中庸也亦有其心畏謹而不中亦是反中庸語惡有淺深則可謂之中庸則不可諸說皆從鄭本雖非本文之意然所以發明小人之情狀則亦曲盡其妙而足以警乎鄉原亂德之姦矣今存吕氏以備觀考他不能盡録也案吕氏曰君子蹈乎中庸小人反乎中庸者也君子之中庸也有君子之心又達乎時中小人之中庸也有小人之心反乎中庸無所忌憚而自謂之時中也時中者當其可之謂也時止則止時行則行當其可也可以仕則仕可以止則止可以速則速可以久則久當其可也曽子子思易地則皆然禹稷顔回同道當其可也舜不告而娶周公殺管蔡孔子以微罪行當其可也小人見君子之時中唯變所適而不知當其可而欲肆其姦心濟其私欲或言不必信行不必果則曰唯義所在而已然實未嘗知義之所在有臨喪而歌人或非之則曰是惡知禮意然實未嘗知乎禮意猖狂妄行不謹先王之法以欺惑流俗此小人之亂德先王之所以必誅而不以聽者也子曰中庸其至矣乎民鮮能久矣鮮上聲下同過則失中不及則未至故惟中庸之德為至陳氏曰至者天下之理無以加之謂然亦人所同得初無難事但世教衰民不興行故鮮能之今已久矣論語無能字愚謂論語有之為德也四字不必言能而能在其中故下句無能字此章無之為德也四字則有能知與不能知能行與不能行故下句有能字意者論語是夫子本文此章是子思櫽括右第三章或問民鮮能久或以為民鮮能久於中庸之德而以下文不能朞月守者證之何如曰不然此章方承上章小人反中庸之意而泛論之未遽及夫不能久也下章自能擇中庸者言之乃可責其不能久耳兩章各是發明一義不當遽以彼而證此也且論語無能字而所謂矣者又已然之辭故程子釋之以為民鮮有此中庸之德則其與不能朞月守者不同文意益明白矣語録曰緣下文有不能朞月守之說故說者皆以為久於其道之久細考兩章相去甚逺自不相蒙亦只合依論語說蓋其下文正說道之不明不行鮮能知味正與程子意合也曰此書非一時之言也章之先後又安得有次序乎曰言之固無序矣子思取之而著於此則其次第行列決有意謂不應雜置而錯陳之也故凡此書之例皆文斷而意屬讀者先因其文之所斷以求本章之說徐次其意之所屬以考相承之序則有以各盡其一章之意而不失夫全篇之㫖矣陳氏曰子思此書分章亦有次序皆是相接續發明去然程子亦有久行之說則疑出於門人之所記蓋不能無差謬案程子曰中庸之為德民不可須㬰離民鮮有久行其道者也而自世教衰之一條乃論語解而夫子之手筆也案程子曰中庸天下之至理德合中庸可謂至矣自世教衰民不與於行鮮有中庸之德也諸家之說固皆不察乎此然吕氏所謂厭常喜新質薄氣弱者則有以切中學者不能固守之病讀者合諸朞月之章而自省焉則亦足以有警矣案吕氏曰中庸者天下之所共知天下之所共行猶寒而衣饑而食渴而飲不可須㬰離也衆人之情厭常而喜新質薄而氣弱雖知不可離而亦不能久也惟君子之學自明而誠明而未至乎誠雖心悅而不去然知不可不思行不可不勉在思勉之分而氣不能無衰志不能無懈故有日月至焉者有三月不違者皆德之可久者也若至乎誠則不思不勉至于常久而不息非聖人其孰能之侯氏所謂民不識中故鮮能久若識得中則手動足履無非中者則其疏闊又益甚矣如曰若識得中則手動足履皆有自然之中而不可離則庶幾耳案侯氏曰民不能識中故鮮能久若識得中則手動足履無非中者故能久子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也知者之知去聲道者天理之當然中而已矣陳氏曰道即中而已此乃天命之本然率性之當然砥知愚賢不肖之過不及則生稟之異而失其中也陳氏曰凡具於人者道理都一般但氣質之不同故有知愚賢不肖之别爾既有知愚賢不及之差過與不及皆非中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也語録曰知者恃其見之髙而以道為不足行陳氏曰知者說道理太高其實行不得愚者則又懵然無知不知所以行賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也語録曰賢者恃其行之過而以道為不足知陳氏曰賢者所行過當其實是見理未到不肖者不能行不求所以知黃氏曰道曷嘗有過與不及之偏哉過與不及此道所以不明不行也然嘗竊有疑焉賢與智人品之最髙者也一有過焉則無異於愚不肖何也蓋道之在天下中而已過非中也不及非中也賢且智而失之過則如楊墨而其充至於無父無君豈不深可畏哉明有所未通誠有所未立雖謂之愚與不肖可也聖賢衛道之嚴所以力勉夫人以大中之道者蓋若此人莫不飲食也鮮能知味也道不可離人自不察三山陳氏曰道曷嘗離人哉特百姓日用而不知耳是以有過不及之弊右第四章或問此其言道之不行不明何也曰此亦承上章民鮮能久之意也三山陳氏曰惟民之鮮於中庸也既久故知賢愚不肖各隨其氣質之偏而失馬曰知愚之過不及宜若道之所以不明也賢不肖之過不及宜若道之所以不行也今其互言之何也語録曰此正分明交互說曰測度深微揣摩事變能知君子之所不必知者知者之過乎中也昏昧蹇淺不能知君子之所當知者愚者之不及乎中也知之過者既唯知是務而以道為不足行愚者又不知所以行也此道之所以不行也三山陳氏曰世之髙明洞達識見絶人者其持論常高其視薄物細故若將浼焉則必不屑於中庸之行如老佛之徒本知者也求以達理而反滅人之類非過乎至於昏迷淺陋之人則又蔽於一曲而暗於大理是又不及矣二者皆不能行道刻意尚行驚世駭俗能行君子之所不必行者賢者之過乎中也卑汚茍賤不能行君子之所當行者不肖者之不及乎中也賢之過者既唯行是務而以道為不足知不肖者又不求所以知也此道之所以不明也三山陳氏曰世之刻意厲行勇於有為者其操行常高其視流俗汚世若將浼焉則必不復求知於中庸之理如晨門荷蓧之徒本賢者也果於潔身而反亂大倫非過乎至於闒茸卑汚之人則又安於故常而溺於物欲是又不及矣二者皆不能明道然道之所謂中者是乃天命人心之正當然不易之理固不外乎人生日用之間特行而不著習而不察是以不知其至而失之耳故曰人莫不飲食也鮮能知味也陳氏曰人莫不飲食是人間日用不可闕處但人鮮能知其味譬如道乃天之命於我性之所固有砥不可以須㬰離惟是人不自求知之所以行矣而不著習矣而不察知味之正則必嗜之而不厭矣知道之中則必守之而不失矣子曰道其不行矣夫夫音扶由不明故不行陳氏曰人之所以不能行道者以其不能知道也右第五章此章承上章而舉其不行之端以起下章之意黃氏曰因知之過愚之不及以嘆道之不行也又曰是引起舜事三山陳氏曰此一句自為一章子思取夫子之言比而從之蓋承上章以起下章之義若曰道不逺人猶日用飲食也由而不知故鮮能知味耳惟其不知是以不行故以道其不行之言繼之蓋所以承上章之義也必如下章舜之事則知而行行而明矣蓋又所以起下章之義子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎知去聲與平聲好去聲舜之所以為大知者以其不自用而取諸人也愚謂舜之知可謂大矣其所以為大者是不自用而樂取諸人所以常好問而好察爾言若只據一己所有便有窮盡不得謂之大矣邇言者淺近之言猶必察焉其無遺善可知文集曰淺近之言猶所謂尋常言語也尋常言語人之所忽而舜好察之非洞見道體無精粗差别不能然也語録曰雖淺近間言語中莫不有理都要見得破然於其言之未善者則隱而不宣其善者則播而不匿其廣大光明又如此則人孰不樂告以善哉語録曰其言之善者播揚之不善者隱而不宣則善者愈樂告以善而不善者亦無所愧而不惜言也若其言不善我又揚之於人說他說得不是則其人愧恥不復以言來告矣此其求善之心廣大如此人安得不盡以其言來告而吾亦安有不盡聞之言乎兩端謂衆論不同之極致蓋凡物皆有兩端如小大厚薄之類於善之中又執其兩端而量度以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與此語録曰問如衆論有十分厚者有十分薄者取極厚極薄之二說而中摺之則此為中矣曰不然此乃子莫執中矣安得謂之中自極厚以至極薄自極大以至極小自極重以至極輕於此厚薄大小輕重之中擇其說之是者而用之是乃所謂中也若但以極厚極薄為兩端而中摺其中間以為中則其中間如何見得便是蓋或極厚者說得是則用極厚之說極薄之說是則用極薄之說厚薄之中者說得是則用厚薄之中者之說至於輕重大小莫不皆然蓋惟其說之是者用之不是棄其兩頭不用而但取兩頭之中者用之也問所謂衆論不同都是善一邊砥曰惡砥已自隱而不宣了葉氏曰兩端非如世俗說是非兩端善惡兩端之謂乃是事已是而不非事己善而非惡己皆當為之事自斯道之不明往往以是非善惡為兩端而執其中則半是半非半善半惡之論興君子不必為十分君子小人不必為十分小人茍且酌中之習乃鄉原賊德之尤也可不辨哉此知之所以無過不及而道之所以行也黃氏曰因道之不行起於知者之過愚者之不及故必知如大舜而後可以冀斯道之行右第六章或問此其稱舜之大知何也曰此亦承上章之意言如舜之知而不過則道之所以行也三山陳氏曰上章既嘆道之不行此章遂以道之行者明之知者過之又鮮能知味此道之所以不行也若舜之大知知而不過則道行矣蓋不自恃其聰明而樂取諸人者如此則非知者之過矣又能執兩端而用其中則非愚者之不及矣此舜之知所以為大而非他人之所及也兩端之說吕楊為優案吕氏曰兩端過與不及也執其兩端乃所以用其時中猶持權衡而無物輕重皆得其平故舜之所以為舜取諸人用諸民皆以能執兩端而不失中也楊氏曰執其兩端所以權輕重而取中也由是而用於民雖愚者可及也程子以為執持過不及之兩端使民不得行則恐非文意矣蓋當衆論不同之際未知其孰為過孰為不及而執為中也故必兼總衆說以執其不同之極處而求其義理之至當然後有以知夫無過不及之在此而在所當行若其未然則又安能先識彼兩端者之為過不及而不可行哉案蘇氏問舜執其兩端注以為過不及之兩端是乎程子曰是曰既過不及又何執乎程子曰執猶今之所謂執持使不得行也舜猶持過不及使民不得行而用其中使民行之也子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也豫知之知去聲罟音古擭胡化反阱才性反辟避同期居之反罟網也擭機檻也陷阱坑坎也皆所以掩取禽獸者也愚謂此形容禍機之所伏擇乎中庸辨别衆理以求所謂中庸即上章好問用中之事也期月匝一月也言知禍而不知辟以况能擇而不能守皆不得為知也葉氏曰罟擭陷阱人皆知其為掩捕而設而不能避之此殆借此以興起能擇中庸而不能不變於旬月之後右第七章承上章大知而言又舉不明之端以起下章也黃氏曰因賢者之過不肖者之不及以嘆道之不明也又曰是引起顔子事或問七章之說曰此以上句起下句如詩之興耳或以二句各為一事言之則失之也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣回孔子弟子顔淵名拳拳奉持之貌服猶著也膺胸也奉持而著之心胸之間言能守也陳氏曰謂守之而牢固不失顔子蓋真知之故能擇能守如此陳氏曰惟其能擇而又能守之乃為真能知之此行之所以無過不及而道之所以明也黃氏曰因道之不明起於賢者之過不肖者之不及故必賢如顔子而後可以望斯道之明右第八章或問此其稱回之賢何也曰承上章不能朞月守者而言如回之賢而不過則道之所以明也蓋能擇乎中庸則無賢者之過矣服膺弗失則非不肖者之不及矣然則兹賢也乃其所以為知也歟曰諸說如何曰程子所引屢空張子所引未見其止皆非論語之本意案程子曰顔子所以大過人者只是得一善則拳拳服膺與能屢空耳張子曰顔子未至聖人而不已故仲尼賢其進未得中而不居故惜夫未見其止也唯吕氏之論顔子有曰隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可為象求見聖人之止欲罷而不能也此數言者乃為親切確實而足以見其深潛縝密之意學者所宜諷誦而服行也但求見聖人之止一句文義亦未安耳案吕氏曰如顔子者可謂能擇而能守也高明不可窮博厚不可極則中道不可識故仰之彌高鑽之彌堅瞻之在前忽焉在後察其志也非見聖人之卓不足謂之中隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可為像求見聖人之止欲罷而不能也侯氏曰中庸豈可擇擇則二矣其務為過高而不顧經文義理之實也亦甚矣哉案侯氏曰中庸豈可擇擇則二矣此云擇者如博學之審問之明辨之勉而中思而得者也故曰擇乎中庸子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也均平治也三者亦知仁勇之事陳氏曰可均似知可辭似仁可蹈似勇天下之至難也然不必其合於中庸則質之近似者皆能以力為之文集曰三者只知就其所長處著力做去而不擇乎中庸耳語録曰中庸便是三者之間非是别有箇道理只於三者做到那恰好處便是中庸陳氏曰天下國家至大難治也而資稟明敏者能之爵祿人之所欲難郤也而資稟高潔者能之白刃人之所畏難犯也而資稟勇敢者能之則是三者雖最難而皆可以力為若中庸則雖不必皆如三者之難然非義精仁熟而無一毫人欲之私者不能及也陳氏曰中庸乃天命人心之當然不可以資質勉强而為之須是學問工夫篤至到那義精仁熟處真有以自勝其人欲之私方能盡得此則若易而實難也三者難而易中庸易而難此民之所以鮮能也黃氏曰天下至難之事人或能之而中庸則鮮能也右第九章亦承上章以起下章黃氏曰是引起子路事或問中庸不可能何也曰此亦承上章之意以三者之難明中庸之尤難也蓋三者之事亦知仁勇之屬而人之所難然皆取必於行而無擇於義且或出於氣質之偏事勢之迫未必從容而中節也若曰中庸則雖無難知難行之事然天理渾然無過不及茍一毫之私意有所未盡則雖欲擇而守之而擬議之間忽已墮於過與不及之偏而不自知矣此其所以雖若甚易而實不可能也故程子以克己最難言之其㫖深矣案程子曰克己最難故曰中庸不可能也游氏以舜為絶學無為案游氏曰其曰其斯以為舜則絶學無為矣而楊氏亦謂有能斯有為之者其違道逺矣循天下固然之理而行其所無事焉夫何能之有案此皆楊氏全文則皆老佛之緒餘而楊氏下章所論不知不能為道逺人之意亦非儒者之言也二公學於程氏之門號稱髙弟而其言乃如此殊不可曉也已子路問强子路孔子弟子仲由也子路好勇故問强子曰南方之强與北方之强與抑而强與與平聲抑語辭而汝也寬柔以教不報無道南方之强也君子居之寬柔以教謂含容巽順以誨人之不及也不報無道謂橫逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人為强語録曰忍耐得便是南方之强或曰南方之性既曰寬柔矣何强之云三山陳氏曰守其氣質而不變是亦强也君子之道也陳氏曰此君子只平說如君子長者之謂衽金革死而不厭北方之强也而强者居之衽席也三山陳氏曰卧席曰衽金戈兵之屬革甲胄之屬北方風氣剛徑故以果敢之力勝人為强强者之事也故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯此四者汝之所當强也陳氏曰四者之强乃中庸之道所當强者矯强貌詩曰矯矯虎臣是也詩傳曰矯矯武貌倚偏著也語録曰如倚於勇倚於智皆是偏倚處塞未達也國有道不變未達之所守國無道不變平生之所守也語録曰未達時要行其所學既達了却變其所學當不變未達之所守也又曰國有道則有達之理故不變其未達之所守若國無道則有不幸而死之理故不變其平生之所守不變其未達之所守易不變其平生之所守難此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也陳氏曰凡此皆有以自勝其人欲之私能中庸之不可能者是乃能擇而能守所謂理義之勇而非血氣之勇矣君子之强孰大於是陳氏曰此君子是指成德之人夫子以是告子路者所以抑其血氣之剛而進之以德義之勇也或問此其記子路之問强何也曰亦承上章之意以明擇中庸而守之非强不能而所謂强者又非世俗之所謂强也蓋强者力有以勝人之名也凡人和而無節則必至於流陳氏曰和則易至於和光同塵失之太軟而流蕩中立而無依則必至於倚語録曰凡人中立而無所依則必至於倚不西而東國有道而富貴或不能不改其平素陳氏曰是富貴能淫國無道而貧賤或不能久處乎窮約陳氏曰是貧賤能移非持守之力有以勝人者其孰能及之故此四者汝子路之所當强也南方之强不及强者也北方之强過乎强者也四者之强强之中也三山陳氏曰南北之强雖不同要之皆偏耳至於汝之所當强者則必當如下文之說此則理義之强得强之中矣子路好勇故聖人之言所以長其善而救其失者類如此曰和與物同故疑於流而以不流為强中立本無所依又何疑於倚而以不倚為强哉曰中立固無所依也然凡物之情唯强者為能無所依而獨立弱而無所依則其不傾側而偃仆者幾希矣此中立之所以疑於必倚而不倚之所以為强也語録曰如和便有流若是中便自不倚何必又說不倚後思之柔弱砥中立則必欹倒若能中立而不倚方見硬健處又曰惟强壯有力者乃能中立不待所依而自無所倚如有病砥人氣弱不能自持他若中立必有一物憑依乃能不倚不然則傾倒而偃仆矣永嘉陳氏曰中立者四邊虛剛立不住易得求倚惟强有力者不假倚自然中立曰諸說如何曰大意則皆得之惟以矯為矯揉之矯案吕氏曰矯之為言猶揉木也木之性能曲能直將使成材而為器故曲者直者皆在所矯人之才有過有不及將使合乎中庸則過與不及皆在所矯以南方之强為矯哉之强與顔子之强以抑而强者為子路之强與北方之强者案侯氏曰南方之强顔子之强似之故曰君子居之北方之强子路之强似之故曰而强者居之君子以自勝為强故曰强哉矯為未然耳子曰素隱行怪後世有述焉吾弗為之矣素按漢書當作索蓋字之誤也索隱行怪言深求隱僻之理而過為詭異之行也語録曰問深求隱僻之理如漢儒災異之類否曰漢儒災異猶自有說得是處如戰國鄒衍推五德之事後漢䜟緯之書便是隱僻三山陳氏曰詭異之行荀子所謂茍難者於陵仲子申屠狄尾生之徒是也愚謂深求隱僻之理是求知乎人之所不能知過為詭異之行是求行乎人之所不能行然以其足以欺世而盜名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中語録曰索隱是知者過之行怪是賢者過之不當强而强者也聖人豈為之哉君子遵道而行半塗而廢吾弗能已矣遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮陳氏曰遵道而行似乎能知半塗而廢實未能行當强而不强者也已止也聖人於此非勉焉而不敢廢蓋至誠無息自有所不能止也君子依乎中庸遁世不見知而不悔唯聖者能之不為索隱行怪則依乎中庸而已不能半塗而廢是以遁世不見知而不悔也語録曰此兩句結上文兩意依乎中庸便是吾弗為之意遁世不見知而不悔便是吾弗能已之意此中庸之成德知之盡仁之至不賴勇而裕如者正吾夫子之事而猶不自居也故曰唯聖者能之而已右第十一章子思所引夫子之言以明首章之義者止此蓋此篇大㫖以知仁勇三達德為入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成德矣潘氏曰中庸之道至精至微非知者不足以知之至公至正非仁者不足以體之其為道也非須㬰可離非一蹴可到故惟勇者然後有以自强而不息焉大抵知仁勇三者皆此性之德也中庸之道即率性而行者也非有是德則無以體是道餘見第二十章或問十一章素隱之說曰吕氏從鄭注以素為傃固有未安案吕氏曰素讀如傃鄉之傃猶素其位之素也唯其舊說有謂無德而隱為素隱者於義略通又以遁世不見知之說反之似亦有據但素字之義與後章素其位之素不應頓異則又若有可疑者獨漢書藝文志劉歆論神仙家流引此而以素為索顔氏又釋之以為求索隱暗之事則二字之義既明而與下文行怪二字語勢亦相類其說近是蓋當時所𫝊本猶未誤至鄭氏時乃失之耳語録曰漢志引中庸云索隱行怪素索二字相近素隱從來解不分曉作索隱讀亦有理游氏所謂離人而立於獨與夫未免有念之云皆非儒者之語也案游氏曰遁世不見知而不悔者疑慮不萌於心確乎其不可拔也非離人而立於獨者不足以與此若不逺復者未免於有念也中庸纂疏卷一
