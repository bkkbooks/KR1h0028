body:
  text: 欽定四庫全書中庸纂疏卷三宋趙順孫撰朱子章句自誠明謂之性自明誠謂之教誠則明矣明則誠矣自由也德無不實而明無不照者聖人之德所性而有者也天道也先明乎善而後能實其善者賢人之學由教而入者也人道也語録曰此性謂是性之也此教字是學知也此一字却是轉一轉說與首章天命之謂性修道之謂教二字義不同葉氏曰聖人全體無一不實而明睿所照無一不盡此自誠而明也學者先明乎善無不精察故踐履之際始無不實此自明而誠也謂之性者全於天之賦豫謂之教者成於己之學習三山陳氏曰自誠明者由其內全所得之實理以照事物如天開日明自然無蔽此性之所以名天之道也自明誠者由窮理致知去其私欲以復全其所得之實理必由學而能此教之所以立人之道也誠則無不明矣明則可以至於誠矣語録曰以誠而論明則誠明合而為一以明而論誠則誠明分而為二三山陳氏曰自誠明者誠即明也非曰誠而後至於明自明誠者尚須由明而後至於誠雖然及其成功一也右第二十一章子思承上章夫子天道人道之意而立言也語録曰中庸言天道處皆自然無節次言人道處皆有下功夫節次自此以下十二章皆子思之言以反覆推明此章之意或問誠明之說曰程子諸說皆學者所𫝊録其以內外道行為誠明似不親切案程子曰自其外者學之而得於內者謂之明自其內者得之而兼於外者謂之誠誠與明一也又曰孔子之道發而為行如鄉黨之所載者自誠而明也由鄉黨之所載而學之以至於孔子者自明而誠也及其至焉一也唯先明諸心一條以知語明以行語誠為得其訓乃顔子好學論中語而夫子之手筆也亦可以見彼記録者之不能無失矣案程子曰君子之學必先明諸心知所養然後力行以求至所謂自明而誠也故學必盡其心知其性然後反而誠之則聖人也張子蓋以性教分為學之兩塗而不以論聖賢之品第故有由誠至明之語程子之辨雖已得之然未究其立言本意之所以失也其曰誠即明也恐亦不能無誤案張子曰自誠明者先盡性以至于窮理也謂先自其性理㑹來以至於理自明誠者先窮理以至於盡性也謂先從學問理㑹以推逹于天性也程子曰張子言由明以至誠此句却是言由誠以至明則不然誠即明也呂氏性教二字得之而於誠字以至簡至易行其所無事為說則似未得其本㫖也且於性教皆以至於實然不易之地為言則至於云者非所以言性之之事而不易云者亦非所以申實然之說也案呂氏曰自誠明性之者也自明誠反之者也性之者自成德而言聖人之所性也反之者自志學而言聖人之所教也成德者至于實然不易之地理義皆此出也天下之理如目睹耳聞不慮而知不言而喻此之謂誠則明志學者致知以窮天下之理則天下之理皆得卒亦至於實然不易之地至簡至易行其所無事此之謂明則誠然其過於游楊則逺矣案遊氏曰自誠明由中出也故可名於性自明誠自外入也故可名於教誠者因性故無不明明者致曲故能有誠楊氏曰自誠而明天之道也故謂之性自明而誠人之道也故謂之教天人一道而心之所至有差焉其歸則無二致也故曰誠則明矣明則誠矣唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣天下至誠謂聖人之德之實天下莫能加也文集曰至誠之至乃極至之至如至道至德之比陳氏曰至誠兩字乃是真實至極而無一毫之不盡惟聖人乃可當之葉氏曰至誠者蓋聖人之全德無一之不實而極其至之謂舉天下無以加亘古今莫能及者也盡其性者德無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髮之不盡也語録曰且如十件事能盡得五件而五件不能盡亦是不能盡如兩件事盡得一件而一件不能盡亦是不能盡只這一事上能盡其初而不能盡其終亦是不能盡能盡於蚤而不能盡於莫亦是不能盡陳氏曰知無不盡而行亦無不盡朱子謂察之由之是也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處之無不當也語録曰盡人物之性非特是曉得盡亦是要處之盡其道凡所以養人教人之政與夫利萬物之政皆是也贊猶助也與天地參謂與天地並立為三也語録曰若只明得盡如何得與天地參去這一箇是無不得砥故與天地參而為三此自誠而明者之事也右第二十二章言天道也或疑二十二章以後天道人道間見迭出永嘉陳氏曰道理縱橫說之無盡如何立定樣範只合逐章體認如天道人道才不費力處便是天道才著力便是人道或問至誠盡性諸說如何曰程子以盡己之忠盡物之信為盡其性蓋因其事而極言之非正解此文之意今不得而録也案程子曰盡己為忠盡物為信極言之則盡己者盡己之性也盡物者盡物之性也信者無僞而已於天性有所損益則為僞矣其論贊天地之化育而曰不可以贊助言案程子曰贊者參贊之義先天而天弗違後天而奉天時之類也非謂贊助只有一箇誠何助之有論窮理盡性以至於命而曰只窮理便是至於命案程子曰如言窮理以至於命以序言之不得不然其實只是窮理便能盡性至命也則亦若有可疑者蓋嘗竊論之天下之理未嘗不一而語其分則未嘗不殊此自然之勢也蓋人生天地之間稟天地之氣其體即天地之體其心即天地之心以理而言是豈有二物哉故凡天下之事雖若人之所為而其所以為之者莫非天地之所為也又況聖人純於義理而無人欲之私則其所以代天而理物者乃以天地之心而贊天地之化尤不見其有彼此之間也若以其分言之則天之所為固非人之所及而人之所為又有天地之所不及者其事固不同也但分殊之狀人莫不知而理一之致多或未察故程子之言發眀理一之意多而及於分殊者少蓋抑揚之勢不得不然然亦不無小失其平矣語録曰人在天地中間雖只是一理然人做得砥却有天做不得砥如天能生物而耕種必用人水能潤物而灌溉必用人火能熯物而薪爨必用人財成輔相須是人做非贊助而何程子言參贊之義非謂贊助此說非是唯其所謂止是一理而天人所為各自有分乃為全備而不偏而讀者亦莫之省也案程子曰自人而言之從盡其性至盡物之性然後可以贊天地之化育可以與天地參矣言人盡性所造如是若只是至誠更不須論所謂人者天地之心及天聰明止謂只是一理而天人所為各自有分至於窮理至命盡人盡物之說則程張之論雖有不同然亦以此推之則其說初亦未嘗甚異也蓋以理言之則精粗本末初無二致固不容有漸次當如程子之論若以其事而言則其親疏近逺深淺先後又不容於無别當如張子之言也案張子曰二程解窮理盡性以至於命只窮理便是至於命亦是失於太快此義儘有次序須是窮理便能盡得己之性既盡得己之性則推類又盡人之性既盡得人之性須是并萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下理㑹都了學者須是窮理為先如此則方有序今言知命與至於命儘有近逺豈可以知便謂之至也呂游楊說皆善而呂尤確實楊氏萬物皆備云者又前章格物誠身之意然於此論之則反求於身又有所不足言也胥失之矣案吕氏曰至於實理之極則吾生之所固有者不越乎是吾生所有既一於理則理之所有皆吾性也人受天地之中其生也具有天地之德柔强昏明之質雖異其心之所然者皆同特蔽有淺深故别而為昏明稟有多寡故分而為强柔至於理之所同然雖聖愚有所不異盡己之性則天下之性皆然故能盡人之性蔽有淺深故為昏明蔽有開塞故為人物稟有多寡故為强柔稟有偏正故為人物故物之性與人異者幾希惟塞而不開故知不若人之明偏而不正故才不若人之美然人有近物之性者物有近人之性者亦繫乎此於人之性開塞偏正無所不盡則物之性未有不能盡也已也人也物也莫不盡其性則天地之化幾矣故行其所無事順以養之而已是所謂贊天地之化育者也如堯命羲和欽若昊天至於民之析因夷隩鳥獸之孳尾希革毛毨氄毛無不與知則所贊可知矣天地之化育猶有所不及必人贊之而後備則天地非人不立故人與天地並立為三才此之謂與天地參遊氏曰萬物皆備於我矣反身而誠樂莫大焉故惟天下至誠為能盡其性千萬人之性一己之性是也故能盡其性則能盡人之性萬物之性一人之性是也故能盡人之性則能盡物之性同焉皆得者各安其常則盡人之性也至於盡物之性則和氣充塞故可以贊天地之化育夫如是則天覆地載教化各任其職而成位乎其中矣楊氏曰性者萬物之一源也非夫體天德者其孰能盡之能盡其性則人物之性斯盡矣言有漸次也贊化育參天地皆其分內耳又曰孟子曰萬物皆備於我則數雖多反而求之於吾身可也故曰盡己之性則能盡人之性盡人之性則能盡物之性以己與人物性無二故也其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化其次通大賢以下凡誠有未至者而言也陳氏曰此說大賢以下性之全體未至如聖人之渾然無缺闕者也致推致也語録曰凡事皆當推致其理如事父母便來這裏推致其孝事君便推致其忠交朋友便推致其信曲一偏也語録曰曲不是全體只是一偏之善形者積中而發外陳氏曰和順積中而英華發外便是形見著則又加顯矣語録曰如見面盎背是著明則又有光輝發越之盛也陳氏曰此明字却與誠則明之意又别彼明字是胸中通明無所不照之謂此乃充實而有輝光之明矣動者誠能動物變者物從而變化則有不知其所以然者語録曰動是方感動他變則已改其舊俗然尚有痕迹在化則都消化了無復痕迹矣蓋人之性無不同而氣則有異故惟聖人能舉其性之全體而盡之其次則必自其善端發見之偏而悉推致之以各造其極也語録曰人所稟各有偏善或稟得剛强或稟得和柔各有一偏之善能一一推之以至乎其極則能貫通乎全體矣又曰是隨其善端發見於此便自此上推致以造其極發見於彼便就彼上推致以造其極非是止就其發見一處推致之也如從此惻隱處發便從此發見處推至其極從羞惡處發便就此發見處推至其極曲無不致則德無不實而形著動變之功自不能己積而至於能化則其至誠之妙亦不異於聖人矣陳氏曰自形著至變化以致曲之效言之至此則人道極其至亦如天之道也右第二十三章言人道也或問致曲之說曰人性雖同而氣稟或異自其性而言之則人自孩提聖人之質悉已完具以其氣而言之則唯聖人為能舉其全體而無所不盡上章所言至誠盡性是也若其次則善端所發隨其所稟之厚薄或仁或義或孝或弟而不能同矣自非合因其發見之偏一一推之以至乎其極使其薄者厚而異者同則不能有以貫通乎全體而復其初即此章所謂致曲而孟子所謂擴充其四端者是也語録曰問既是四端安得謂之曲曰四端先後互發豈不是曲孟子云知皆擴而充之則是可見若謂只有此一曲則是夷惠之偏如何得該遍聖人具全體一齊該了而當用時亦只是發一端如用仁則義禮智如何上來得問雖發一端然其餘只平鋪在要用即用不似以下人有先後間斷之意須待擴而後充曰然程子之言大意如此案程子曰人自孩提聖人之質已完只先於偏勝處發或仁或義或孝或弟去氣偏處發便是致曲去性上修便是直養然同歸于誠語録曰問程子說從一偏致曰須件件致去如孝弟須件件致得到誠孝誠弟處如仁義須件件致到仁之誠義之誠處但其所論不詳且以由基之射為說案程子曰曲偏曲之謂非大道也曲能有誠就一事中用志不分亦能有誠且如技藝上可見如養由基射之類是也故有疑於専務推致其氣質之所偏厚而無隨事用力悉有衆善之意語録曰問程子說致曲先於偏勝處發似未安如此則専主一偏矣曰此說甚可疑須於事上論不當於人上論又以形為參前倚衡所立卓爾之意則亦若以為己之所自見而無與於人也豈其記者之略而失之與至於眀動變化之說則亦無以易矣案程子曰誠則形誠後便有物如立則見其參於前任輿則見其倚於衡如有所立卓爾皆若有物方見如無形是見何物也形則著又著見也著則明是有輝光之時也明則動誠能動人也君子所過者化豈非動乎或曰變與化何别曰變如物方變而未化化則更無舊迹自然之謂也莊子言變大於化非也若張子之說以明為兼照動為徙義變為通變化為無滯則皆以其進乎內者言之失其指矣蓋進德之序由中達外乃理之自然如上章之說亦自己而人自人而物各有次序不應専放內而遺其外也且夫進乎內之節目亦安得如是之繁促哉案張子曰致曲不二則德有定體體象誠定則文節著見一曲致文則餘善兼照明能兼照則必將徙義誠能徙義則德自通變能通其變則圓神無滯游氏說亦得之但說致曲二字不同非本意耳案游氏曰誠者不思不勉直心而徑行也其次則臨言而必思不敢縱言也臨行而必擇不敢徑行也故曰致曲曲折而反諸心也擬議之間鄙詐不萌而忠信立矣故曲能有誠有諸中必形諸外故誠則形形於身必著於物故形則著誠至於著則內外洞徹清明在躬故著則明明則有以動衆故明則動動則有以易俗故動則變變則革汚以為清革暴以為良然猶有迹也化則某迹泯矣日用飲食而已至於化則神之所為也非天下之至誠孰能與于此楊氏既以輝光發外為明矣而又引明則誠矣則似以明為通明之明既以鶴鳴子和為動矣而又曰化非學問篤行所及則似以化為大而化之之化此其上下文意不相承續且於明動之間本文之外别生無物不誠一節以就至誠動物之意尤不可曉今固不能盡録然亦不可不辨也案楊氏曰能盡其性者誠也其次致曲者誠之也學問思辨而篤行之致曲也用志不分故能有誠誠於中形於外參前倚衡不可掩也故形形則有物故著著則輝光發見於外故明明則誠矣未有誠而不動動而不變也鳴鶴在陰其子和之非動乎曲能有誠誠在一曲也明則誠矣無物不誠也至於化則非學問思辨篤行之所及也故惟天下至誠為能化至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神見音現禎祥者福之兆妖孽者禍之萌蓍所以筮龜所以卜四體謂動作威儀之間如執玉髙卑其容府仰之類凡此皆理之先見者也然唯誠之至極而無一毫私僞留於心目之間者乃能有以察其幾焉語録曰在我無一毫私僞故常虛明自能見得如禎祥妖彗與蓍龜所告四體所動皆是此理已形見但人不能見耳聖人至誠無私僞所以自能見得且如蓍龜所告之吉凶甚明但非至誠人却不能見也愚謂天地萬物不離一氣興亡之證見於妖祥卜筮動作之間禍福之來亦逆知其善否者非異也氣之感召理之當耳惟誠之至者無一毫之不實則萬物兆朕無不形見否則已然之事且不覺悟尚何能察其幾哉右第二十四章言天道也或問至誠如神之說曰呂氏得之矣其論動乎四體為威儀之則者尤為確實案吕氏曰至誠與天地同德與天地同德則其氣化運行與天地同流矣興亡之兆禍福之來感於吾心動於吾氣如有萌焉無不前知况乎誠心之至求乎蓍龜而蓍龜告察乎四體而四體應所謂莫見乎隱莫顯乎微者也此至誠所以達乎神明而無間故曰至誠如神動乎四體如傳所謂威儀之則以定命者也游氏心合於氣氣合於神之云非儒者之言也且心無形而氣有物若之何而反以是為妙哉案游氏曰至誠之道精一無間心合于氣氣合於神無聲無臭而天地之間物莫得以遁其形矣不既神矣乎程子用便近二之論蓋因異教之說案程子曰人固可以前知然其理須是用則知不用則不知知不如不知之愈蓋用便近二所以釋子謂又不是野狐精也如蜀山人董五經之徒亦有能前知者案程子曰蜀山人不起念十年便能前知又嵩前有董五經隱者也程子聞其名謂其亦窮經之士特往造焉董平日未嘗出是日不值還至中途遇一老人負茶果以歸且曰君非程先生乎程子異之曰先生欲來信息甚大某特入城置少茶果將以奉待也程子以其誠意復同至其舍語甚欵亦無大過人者但久不與物接心靜而明也故就之而論其優劣非以其不用而不知者為真可貴而賢於至誠之前知也至誠前知乃因其事理朕兆之已形而得之如所謂不逆詐不億不信而常先覺者非有術數推驗之煩意想測度之私也亦何害其為一哉誠者自成也而道自道也道也之道音導言誠者物之所以自成而道者人之所當自行也語録曰誠者是箇自然成就砥道理不是人去做作安排底物事道却是箇無情砥道理却須是人自去行始得又曰誠者自成如這箇草樹所以有許多根株枝葉條幹者是自實有砥如人便有耳目鼻口手足百骸都是你自實有砥道雖是自然砥道理然却須你自去做始得誠以心言本也語録曰問既說物之所以自成又云誠以心言莫是心者物之所存主處不曰誠以心言者是就一物上說凡物必有是心有是心然後有是事道以理言用也誠者物之終始不誠無物是故君子誠之為貴天下之物皆實理之所為故必得是理然後有是物語録曰有是理則有是物徹頭徹尾皆是此理所為未有無此理而有此物也所得之理既盡則是物亦盡而無有矣文集曰凡有一物則其成也必有所始其壞也必有所終而其所以始者實理之至而向於有也其所以終者實理之盡而向於無也若無是理則亦無是物矣故人之心一有不實則雖有所為亦如無有語録曰且如而今對人說話若句句說皆自心中流出這便是有物若是脫空誑誕不說實話雖有兩人相對話其實如無物也陳氏曰凡人做事自頭徹尾純是一箇真實心方有此一箇物若此心間斷無誠實雖做此一件事如不做一般而君子必以誠為貴也蓋人之心能無不實乃為有以自成而道之在我者亦無不行矣誠者非自成己而已也所以成物也成己仁也成物知也性之德也合外內之道也故時措之宜也知去聲誠雖所以成已然既有以自成則自然及物而道亦行於彼矣語録曰誠雖所以成己然在我真實無僞自然及物仁者體之存智者用之發是皆吾性之固有而無內外之殊陳氏曰仁之體在我者也知之用見于外者也仁與知皆非外物乃性之所固有者性之所有無內外之間既得於己則見於事者以時措之而皆得其宜也語録曰成己成物固無內外之殊但必先成己然後能成物此道之所以當自行也右第二十五章言人道也或問二十五章之說曰自成自道如程子說乃與下文相應案程子曰誠者自成如至誠事親則成人子至誠事君則成人臣又曰學者不可以不誠雖然誠者在知道本而誠之耳游楊皆以無待而然論之其說雖髙然於此為無所當且又老莊之遺意也案游氏曰誠者非有成之者自成而已其為道非有道之者自道而已自成自道猶言自本自根也楊氏曰誠自成道自道無所待而然也誠者物之終始不誠無物之義亦唯程子之言為至當然其言太略故讀者或不能曉請得而推言之蓋誠之為言實而已矣然此篇之言有以理之實而言者如曰誠不可掩之類是也有以心之實而言者如曰反諸身不誠之類是也讀者各隨其文意之所指而尋之則其義各得矣所謂誠者物之終始不誠無物者以理言之則天地之理至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也陳氏曰以造化言之如天地間生成萬物自古及今無一物之不實散殊上下自古有是到今亦有是非古有而今無皆是實理之所為大而觀之自太始以至萬古莫不皆然若就物觀之其徹始徹終亦只是一實理如此姑以一株花論來春氣流注到則萌蘖生花春氣盡則花亦盡又單一就花蘂論氣實行到此則花便開氣消則花便謝亦盡了方其花萌蘗此實理之初也至到謝而盡處此實理之終也以心言之則聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也陳氏曰自聖人論之合下天理渾全真實無妄從生至死無一事之不實又就聖人做一事論之自始至終皆此心真實之理所為如祭義云其立之也敬以詘其進之也敬以愈其薦之也敬以欲退而立如將受命已徹而退敬齊之色不絶於面此是祭之終始徹首徹尾皆一箇真實之心所為如此此所謂誠者物之終始者然也潘氏曰出於誠則有始有終茍未至於聖人而其本心之實者猶未免於間斷陳氏曰自大賢以下真實無妄未能如聖人故本心之實處不能無間斷則自其實有是心之初以至未有間斷之前所為無不實者及其間斷則自其間斷之後以至未相接續之前凡所云為皆無實之可言雖有其事亦無以異於無有矣語録曰如人做事未做得一半便棄了即一半便不成如曰三月不違則三月之間所為皆實而三月之後未免於無實蓋不違之終始即其事之終始也日月至焉則至此之時所為皆實而去此之後未免於無實蓋至焉之終始即其物之終始也陳氏曰如顔子三月不違仁在三月之內徹頭徹尾皆是一箇誠心若三月之後則未免有間斷而不實矣故就三月不違言之其三月乃顔子為仁之終始其餘則日月至焉之外其間斷固多只就日月至處觀之其日月之間徹頭徹尾亦門人為仁之終始也或疑事之終始與物之終始何别愚謂心不違仁就事見故以事言至其境界是實地故以物言是則所謂不誠無物者然也潘氏曰不誠則非惟無終而其始己非其有矣以是言之則在天者本無不實之理故凡物之生於天者必有是理方有是物未有無其理而徒有不實之物者也在人者或有不實之心故凡物之出於心者必有是心之實乃有是物之實未有無其心之實而能有其物之實者也程子所謂徹頭徹尾者蓋如此案程子曰誠者物之終始猶俗語徹頭徹尾不誠更有甚物也葉氏曰程子所謂徹頭徹尾便是不少間斷其餘諸說大抵皆知誠之在天為實理而不知其在人為實心是以為說太髙而往往至於交互差錯以失經文之本意正猶知愛之不足以盡仁而凡言仁者遂至於無字之可訓其亦誤矣呂氏所論子貢子思所言之異亦善而猶有未盡者蓋子貢之言主於知子思之言主於行故各就其所重而有賓主之分亦不但為成德入德之殊而已也案吕氏曰子貢曰學不厭智也教不倦仁也學不厭所以成己此則成己為仁教不倦所以成物此則成物為智何也夫盡性以成己則仁之體也推是以成物則智之事也自成德而言也學不厭所以致吾知教不倦所以廣吾愛自入德而言也此子思子貢之言所以異也楊氏說物之終始直以天行二字為解蓋本於易終則有始天行也之說假借依託無所發明楊氏之言蓋多類此最說經之大病也又謂誠則形而有物不誠則輟而無物亦未安誠之有物蓋不待形而有不誠之無物亦不待其輟而後無也其曰由四時之運己則成物之功廢蓋亦輟而後無之意而又直以天無不實之理喻夫人有不實之心其取譬也亦不親切矣彼四時之運夫豈有時而已者哉案楊氏曰其為物終始天行也誠則形形故有物不誠而著乎僞則有作輟故息息則無物矣由四時之運已則成物之功廢焉尚何終始之有故以習則不察以行則不著以進德則不可久以修業則不可大故君子唯誠之為貴故至誠無息既無虛假自無間斷陳氏曰凡假僞底物久則易間斷真實則無間斷不息則久久則徵久常於中也徴驗於外也語録曰久然後有證驗只一日兩日工夫如何有證驗陳氏曰道理真積力久充實於內自然昭著於外如見面盎背之類乃是證驗處徵則悠逺悠逺則博厚博厚則髙明此皆以其驗於外者言之陳氏曰自徵以下至髙明皆是實德驗於外處鄭氏所謂至誠之德著於四方者是也語録曰此是言聖人功業曰徵則悠逺至博厚高明無疆皆是功業著見如此故云德著于四方存諸中者既久則驗於外者益悠逺而無窮矣語録曰久是就他骨子裏說鎮常如此之意悠是自今觀後見其無終窮之意悠逺故其積也廣博而深厚博厚故其發也髙大而光明語録曰譬如為臺觀須是大做根基方始上面可以高大又如萬物精氣蓄於下者深厚則其發越于外者自然光明博厚所以載物也髙明所以覆物也悠久所以成物也悠久即悠逺兼內外而言之也潘氏曰久是久於內悠是久於外永嘉陳氏曰不息則久是誠積於內徴則悠逺是誠積於外下却變文為悠久則是兼上文內外而言本以悠逺致髙厚而髙厚又悠久也語録曰問以存諸中者而言則悠久在髙明博厚之前見諸用者而言則悠久在博厚高明之後如何曰此所以為悠久也若始初悠久末梢不悠久便是不悠久矣陳氏曰初頭本是悠逺方能至於髙厚今又由髙厚以至於悠久也此言聖人與天地同用博厚配地髙明配天悠久無疆此言聖人與天地同體陳氏曰同用以功言同體以德言如此者不見而章不動而變無為而成見音現見猶示也不見而章以配地而言也不動而變以配天而言也無為而成以無疆而言也陳氏曰不見而章是不待有所示而功用自然章著此處與地一般不動而變動則猶有形迹至於不動則如天之變化萬物無形迹此處與天一般無為而成有所為而成尚有形迹無所為而成其功用至於悠久自不見其形迹此以悠久無疆言之也天地之道可一言而盡也其為物不二則其生物不測此以下復以天地明至誠無息之功用天地之道可一言而盡不過曰誠而已不二所以誠也陳氏曰不二者純一之意誠故不息蔡氏曰不二則無間斷所以不息而生物之多有莫知其所以然者陳氏曰自開闢以至于今其生成萬物無有窮已蓋莫知其所以然天地之道博也厚也髙也明也悠也久也言天地之道誠一不二故能各極其盛而有下文生物之功今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚龞生焉貨財殖焉夫音扶華藏並去聲卷平聲勺市若反昭昭猶耿耿小明也此指其一處而言之及其無窮猶十二章及其至也之意蓋舉全體而言也語録曰管中所見之天也是天恁地大砥只是天振收也卷區也此四條皆以發明由其不二不息以致盛大而能生物之意三山陳氏曰大意蓋言天地聖人皆得此實理無有駁雜無有間斷始能有此功用耳然天地山川實非由積纍而後大語録曰舉此全體而言則其氣象功效自是如此讀者不以辭害意可也詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已於音烏乎音呼詩周頌維天之命篇於歎辭穆深逺也不顯猶言豈不顯也陳氏曰不顯者言甚顯也純純一不雜也真氏曰純是至誠無一毫人僞之雜引此以明至誠無息之意黃氏曰誠便是維天之命不息便是於穆不已程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後真氏曰惟其純誠無雜自然能不已如天之春而夏夏而秋秋而冬晝而夜夜而晝循環運轉一息不停以其誠也聖人之自壯而老自始而終無一息之懈亦以其誠也既誠自然能不已右第二十六章言天道也葉氏曰言聖人與天地合德是為天道或問二十六章之說曰此章之說最為繁雜如游楊無息不息之辨恐未然若如其言則不息則久以下至何地位然後為無息耶案游氏曰至誠無息天行健也若文王之德之純是也未能無息而不息者君子之自强也若顔子三月不違仁是也楊氏曰無息者誠之體也不息所以體誠也語録曰不息只如言無息游楊氏分無息為至誠不息所以體乎誠非是葉氏曰雖變文云不息若就聖人至誠言之只是自然無息不可以不字為學者用力事也游氏又以得一形容不二之意亦假借之類也字雖密而意則疏矣案游氏曰其為物不二天地之得一也一則不已故覆載萬物雕刻衆形而莫知其端也故生物不測呂氏所謂不已其命不已其德意雖無爽而語亦有病蓋天道聖人之所以不息皆實理之自然雖欲已之而不可得今曰不已其命不已其德則是有意於不已而非所以明聖人天道之自然矣案吕氏曰天之所以為天不已其命而已聖人之所以為聖不已其德而已其為天人德命則異其所以不已則一故聖人之道可以配天者如此而已又以積天之昭昭以至於無窮譬夫人之充其良心以至於與天地合德意則甚善而此章所謂至誠無息以至於博厚高明乃聖人久於其道而天下化成之事其所積而成者乃其氣象功效之謂若鄭氏所謂至誠之德著於四方者是已非謂在已之德亦待積而後成也故章末引文王之詩以證之夫豈積纍漸次之謂哉若如呂氏之說則是因無息然後至於誠由不已然後純於天道也失其㫖矣案吕氏曰雖天之大昭昭之多而已雖地之廣撮土之多而已山之一卷水之一勺亦猶是矣其所以髙明博厚神明不測者積之之多而已今夫人之有良心也莫非受天地之中是為可欲之善不充之則不能與天地相似而至乎大大而不化則不能不勉不思與天地合德而至於聖然所以至于聖者充其良心德盛仁熟而後爾也故曰過此以往未之或知也窮神知化德之盛也如指人之良心而責之與天地合德猶指撮土而求其載華嶽振河海之力指一勺而求其生蛟龍殖貨財之功是亦不思之甚也語録曰諸家多將此章做進德次第說只一箇至誠已該了豈復有許多節次楊氏動以天故無息之語甚善案楊氏曰誠自成非有假於物也而其動以天故無息其曰天地之道聖人之德無二致焉故方論聖人之事而又曰天地之道可一言而盡蓋未覺其語之更端耳案楊氏曰積而至於博厚髙明則覆載成物之能事備矣其用則不可得而見也故配天地無疆言之所以著明之也然天地之道聖人之德其為覆載成物之功則無二致焉故又曰天地之道可一言而盡也所謂一言者誠而已互相明也精一而不二故能生物不測不誠則無物矣至謂天之所以為天文王之所以為文皆原於不已則亦猶呂氏之失也案楊氏曰誠之一言足以盡之不息之積也若夫擇善而不能固執之若存若亡而欲與天地合德其可乎故又繼之天之所以為天文王之所以為文皆原於不已大抵聖賢之言內外精粗各有攸當而無非極致近世諸儒乃或不察乎此而於其外者皆欲引而納之於內於其粗者皆欲推而致之於精若致曲之明動變化此章之博厚髙明蓋不勝其繁碎穿鑿而於其本指失之愈逺學者不可不察也大哉聖人之道包下文兩節而言語録曰只章首便分兩節來洋洋乎發育萬物峻極於天峻髙大也此言道之極於至大而無外也陳氏曰此一節言道體之大處流動充滿乎天地之間而無所不在蓋極於至大而無外也優優大哉禮儀三百威儀三千優優充足有餘之意文集曰問以優優大哉冠於禮儀之上者蓋言道體之大散於禮儀之末者如此曰得之禮儀經禮也愚謂如冠昏喪祭朝覲㑹同之類威儀曲禮也愚謂如進退升降俯仰揖遜之類此言道之入於至小而無間也陳氏曰此一節言道體之小處雖三千三百之儀而無物不有蓋入於至小而無閒也待其人而後行總結上兩節陳氏曰道之大處小處皆須待其人而後行故曰茍不至德至道不凝焉至德謂其人至道指上兩節而言也文集曰大抵發育峻極三千三百皆至道其人則至德之人也凝聚也成也黃氏曰天地間有這箇物事自家要凝他須有此德凝是自家去聚他故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮尊者恭敬奉持之意德性者吾所受於天之正理道由也溫猶燖溫之溫愚謂燖火熟物也謂故學之矣復時習之也敦加厚也尊德性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也語録曰道之為體其大無外其小無內無一物之不在焉故君子之學既能尊德性以全其大便須道問學以盡其小黃氏曰存心則一念存萬理具致知則逐物皆當理㑹二者修德凝道之大端也陳氏曰此說修德凝道工夫不以一毫私意自蔽語録曰謂心胸開闊無此疆彼界之殊不以一毫私欲自纍語録曰謂無一毫人欲之私以纍於已才汨於人欲便卑汙矣或疑不以一毫私意自蔽若可以移解髙明不以一毫私欲自纍若可以移解廣大愚謂雖總說尊德性亦有先後之序意者萌動之始止可言蔽一為意所蔽則廣大處已被窒塞了欲則不止於意而為物所纍無所謂高明者矣所以止可言自纍涵泳乎其所己知語録曰言涵養此已知砥道理常在我也敦篤乎其所已能陳氏曰加之篤厚便守得有力此皆存心之屬也陳氏曰此皆存心以極乎道體之大也析理則不使有毫釐之差語録曰須是從灑掃應對進退問答色色留意陳氏曰是講究理義毫分縷析不可有一髮之差處事則不使有過不及之謬語録曰是事事件件理會得到一箇恰好處無些過與不及理義則日知其所未知語録曰如今日讀這一段所得如此明日讀這一段所得又如此兩日之間所讀同而所得不同節文則日謹其所未謹語録曰才說一箇禮字便有許多節文此皆致知之屬也陳氏曰此皆致知以極道體之細也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應語録曰此便是互相為用處尊德性至敦厚此上一截便是渾淪處道問學至崇禮此下一截便是詳密處道體之大處直是難守細處又難窮究若有上面一截而無下面一截只管道是我渾淪更不務致知如此則茫然無覺若有下面一截而無上面一截只管要纎悉皆知更不去行如此則又空無所寄聖賢所示入德之方莫詳於此學者宜盡心焉是故居上不驕為下不倍國有道其言足以興國無道其默足以容詩曰既明且哲以保其身其此之謂與倍與背同與平聲興謂興起在位也語録曰如興賢能之興詩大雅蒸民之篇右第二十七章言人道也或問二十七章之說曰程張備矣程子曰自大哉聖人之道至至道不凝焉皆是一貫又曰德性者言性之可貴與言性善其實一也又曰須是合內外之道一天人齊上下下學而上達極高明而道中庸又曰極高明而道中庸非二事中庸天理也天理固高明不極乎高明不足以道中庸中庸乃髙明之極也又曰理則極高明行之只是中庸也張子曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾游衍無一物之不體也又曰不尊德性則問學從而不道不致廣大則精微無所立其誠不極高明則擇乎中庸失時措之宜矣又曰尊德性猶據於德德性須尊之道行也問問得者學行得者凝學問也尊德性須是將前言往行所聞所知以參驗恐行有錯致廣大須盡精微不得鹵莾極髙明須道中庸之道又曰致廣大極髙明此則儘逺大所處則直是精約又曰溫故知新多識前言往行以畜德繹舊業而知新益思昔未至而今至之緣舊所見聞而察來皆其義也張子所論逐句為義一條甚為切於文義案張子曰尊德性而道問學致廣大而盡精微極高明而道中庸皆逐句為一義上言重下語輕故呂氏因之案吕氏曰道之在我者德性而已不先貴乎此則所謂問學者不免乎口耳為人之事而已道之全體者廣大而已不先充乎此則所謂精微者或偏或隘矣道之上達者高明而已不先止乎此則所謂中庸者同汙合俗矣然須更以游楊二說足之則其義始備耳案游氏曰懲忿窒欲間邪存誠此尊德性也非學以聚之問以辨之則擇善不明矣故繼之以道問學尊德性而道問學然後能致廣大尊其所聞行其所知充其德性之體使無不該備此致廣大也非盡精微則無以極深而研幾故繼之以盡精微致廣大而盡精微然後能極髙明始也未離乎方今則無方矣始也未離乎體今則無體矣離形去智廓然大通此極髙明也非道中庸則無踐履可據之地不幾於蕩而無執乎故繼之以道中庸高明者中庸之妙理而中庸者髙明之實德也其實非兩體也楊氏曰尊德性而後能致廣大致廣大而後能極高明道學問而後能盡精微盡精微而後能擇中庸而固執之入德之序也愚謂張子言逐句為義吕氏因之游氏以逐句相承接為說楊氏以逐句上一節承上一節下一節承下一節為說兼而讀之其義始備游氏分别至道至德為得之唯優優大哉之說為未善案游氏曰發育萬物峻極于天至道之功也禮儀三百威儀三千至道之具也洋洋乎言上際於天下蟠於地也優優大哉言動容周旋中禮也夫以三百三千之多儀非天下至誠孰能從容而盡中哉故曰待其人而後行蓋盛德之至者人也故曰茍不至德至道不凝焉至德非他至誠而已矣而以無方無體離形去智為極髙明之意見上注又以人德地德天德為德性廣大髙明之分則其失愈逺矣案游氏曰尊其德性而道問學人德也致廣大而盡精微地德也極高明而道中庸天德也自人之天則上達矣楊氏之說亦不可曉蓋道者自然之路德者人之所得故禮者道體之節文必其人之有德然後乃能行之也今乃以禮為德而欲以凝夫道則既誤矣而又曰道非禮則蕩而無止禮非道則梏於儀章器數之末而有所不行則是所謂道者乃為虛無恍惚元無準則之物所謂德者又不足以凝道而反有所待於道也其諸老氏之言乎誤益甚矣案楊氏曰道之峻極于天道之至也無禮以範圍之則蕩而無止而天地之化或過矣禮儀三百威儀三千所以體道而範圍之也故曰茍不至德至道不凝焉所謂至德者禮其是乎夫禮天所秩也後世或以為忠信之薄或以為僞皆不知天者也故曰待其人而後行蓋道非禮不止禮非道不行二者常相資也茍非其人而梏于儀章器數之末則愚不肖者之不及也尚何至道之凝哉溫故而知新敦厚以崇禮諸說但以二句相對明其不可偏廢大意固然然細分之則溫故然後有以知新而溫故又不可不知新敦厚然後有以崇禮而敦厚又不可不崇禮此則諸說之所遺也大抵此五句承章首道體大小而言故一句之內皆具大小二意如德性也廣大也髙明也故也厚也道之大也問學也精微也中庸也新也禮也道之小也尊之道之致之盡之極之道之溫之敦之崇之所以修是德而凝是道也語録曰問溫故恐做不得大看曰就知新言之便是新來方理㑹得那枝分節解砥舊來已見得大體與他溫尋去亦有大小之意黃氏曰至道大也有小也有至德大也盡小也盡君子所以貴修德尊德性是修大德便凝得大道道問學是修小德便凝得小道以其於道之大小無所不體故居上居下在治在亂無所不宜此又一章之通㫖也子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也好去聲烖古灾字以上孔子之言子思引之反復也語録曰以下文觀之非不師古之謂也陳氏曰謂生今之世而欲復古之道非天子不議禮不制度不考文此以下子思之言禮親疏貴賤相接之體也愚謂如有虞氏貴德而尚齒夏后氏貴尊而尚齒商人貴爵而尚齒周人貴親而尚齒之類度品制愚謂如虞書同律度量衡之類下文車同軌亦其一也文書名語録曰如大字喚做大字上字喚做上字下字喚做下字此之謂書名是那字砥名又曰古者人不甚識字字易得差所以每嵗一畨使大行人之屬巡行天下考過這字是正與不正今天下車同軌書同文行同倫行去聲今子思自謂當時也軌轍迹之度陳氏曰古之造車依在地之轍迹而為之倫次序之體語録曰次序如等威節文之類體如辨上下定民志君臣父子貴賤尊卑相接之體皆是天子制此禮通天下共行之故其次序之體等威節文皆如一也三者皆同言天下一統也雖有其位茍無其德不敢作禮樂焉雖有其德茍無其位亦不敢作禮樂焉鄭氏曰言作禮樂者必聖人在天子之位子曰吾說夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周此又引孔子之言杞夏之後徵證也宋殷之後三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法惟周禮乃時王之制今日所用孔子既不得位則從周而已右第二十八章承上章為下不倍而言亦人道也或問子思之時周室衰微禮樂失官制度不行於天下久矣其曰同軌同文何耶曰當是之時周室雖衰而人猶以為天下之共主諸侯雖有不臣之心然方彼此爭雄不能相尚下及六國之未亡猶未有能更姓改物而定天下于一者也則周之文軌孰得而變之哉三山陳氏曰案魯穆公元年子思作中庸蓋周威烈五之十七年也是時列國雖强猶有周制曰周之車軌書文何以能若是其必同也曰古之有天下者必改正朔易服色殊徽號以新天下之耳目而一其心志若三代之異尚其見於書傳者詳矣軌者車之轍迹也周人尚輿而制作之法領於冬官其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺邇莫不齊同凡為車者必合乎此然後可以行乎方內而無不通不合乎此則不惟有司得以討之而其行於道路自將偏倚卼臲而跬步不前亦不待禁而自不為矣古語所謂閉門造車出門合轍蓋言其法之同而春秋傳所謂同軌畢至者則以言其四海之內政令所及者無不來也文者書之㸃畫形象也周禮司徒教民道藝而書居其一又有外史掌達書名於四方而大行人之法則又每九嵗而一喻焉其制度之詳如此是以雖其末流海內分裂而猶不得變也必至於秦滅六國而其號令法制有以同於天下然後車以六尺為度書以小篆隸書為法而周制始改爾孰謂子思之時而遽然哉三山陳氏曰秦吞併後始用六為紀而輿六尺是改車之軌損於周者六寸矣又命李斯程邈更制小篆隸書而後書之文始不同王天下有三重焉其寡過矣乎王去聲呂氏曰三重謂議禮制度考文惟天子得以行之則國不異政家不殊俗而人得寡過矣上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從上焉者謂時王以前如夏商之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也三山陳氏曰上乎周而為夏商禮非不善然既於今而無所證則民將駭而不信矣下而不獲用於周如孔子者德非不善然不得顯位以行之則民亦玩而不信矣故君子之道本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此君子指王天下者而言其道即議禮制度考文之事也語録曰君子指在上之人上章言雖有其德茍無其位不敢作禮樂就那身上說只做得那般事看本諸身有其德也徵諸庶民驗其所信從也建立也立於此而參於彼也天地者道也語録曰問以上下文例之此天地似乎是形氣之天地蓋建諸天地之間而其道不悖於我也曰此天地只是道耳謂吾建於此而於道不相悖也鬼神者造化之迹也百世以俟聖人而不惑所謂聖人復起不易吾言者也質諸鬼神而無疑知天也百世以俟聖人而不惑知人也知天知人知其理也陳氏曰鬼神天理之至也聖人人道之至也惟知天理之至所以無疑惟知人道之至所以不惑是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭動兼言行而言道兼法則而言法法度也則準則也潘氏曰行有成迹故可效法言只言其理如此未有事迹之可言必在人準則而推行之詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也惡去聲射音妬詩作斁詩周頌振鷺之篇射厭也所謂此者指本諸身以下六事而言右第二十九章承上章居上不驕而言亦人道也或問二十九章之說曰三重諸說不同雖程子亦因鄭注然於文義皆不通案程子曰三重即三王之禮此即鄭注之說唯呂氏一說為得之耳至於上下焉者則呂氏亦失之惜乎其不因上句以推之而為是矛盾也案吕氏曰上焉謂上達之事如性命道德之本不驗之於民之行事則徒言而近於荒唐下焉者謂下達之事如刑名度數之末隨時變易無所稽考則臆見而出於穿鑿二者皆無取信於民是以民無所適從曰然則上焉者以時言下焉者以位言宜不得為一說且又安知下焉者之不為霸者事耶曰以王天下者而言則位不可以復上矣以霸者之事而言則其善又不足稱也亦何疑哉曰此章文義多近似而若可以相易者其有辨乎曰有三王以迹言者也故曰不謬言與其已行者無所差也陳氏曰謂考質諸三王驗其所已行之迹而不差繆天地以道言者也故曰不悖言與其自然者無所拂也陳氏曰謂立諸天地之間順其自然之理而不違悖鬼神無形而難知故曰無疑謂幽有以驗乎明也後聖未至而難料故曰不惑謂逺有以驗乎近也潘氏曰通天下一理耳無往不在無時不然是以達幽明貫古今而無所不通動舉一身兼行與言而言之也道者人所共由兼法與則而言之也法謂法度人之所當守也則謂準則人之所取正也逺者恱其德之廣被故企而慕之近者習其行之有常故久而安之也仲尼祖述堯舜憲章文武上律天時下襲水土祖述者逺宗其道憲章者近守其法陳氏曰堯舜人道之極故宗之法度至周而備故守之律天時者法其自然之運襲水土者因其一定之理陳氏曰天時者春夏秋冬之四時有自然之運故聖人法之水土者東西南北之四方各有一定之理故聖人因之皆兼內外該本末而言也語録曰兼本末內外精粗而言是言聖人功夫永嘉陳氏曰祖述者道法在其中憲章者法道在其中律天時者大則顯晦屈伸襲水土者小則採山釣水細砥道理為本為內粗砥為末為外辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明辟音譬幬徒報反錯猶迭也此言聖人之德葉氏曰是述夫子之德同乎天也萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也悖猶背也天覆地載萬物並育於其間而不相害陳氏曰天無不覆地無不載大化流行萬物止其所而不相侵害潘氏曰無不覆載者廣大之體也四時日月錯行代明而不相悖陳氏曰四時錯行日月代明一寒一暑一晝一暮似乎相反而其實非相違悖潘氏曰錯行代明者變通之用也所以不害不悖者小德之川流所以並育並行者大德之敦化語録曰大德是敦那化砥小德是流出那敦化砥出來這便如忠便是做那恕砥恕便是流出那忠來砥如中和中便是大德敦化和便是小德川流自古亘今都只是這一箇道理小德者全體之分大德者萬殊之本黃氏曰大德是心之本體無許多大砥亦做不得小砥出來川流者如川之流脈絡分明而往不息也敦化者敦厚其化根本盛大而出無窮也葉氏曰川流者言如川之流有支有派觸處彌滿流行不已也敦化者言藴蓄妙理深厚盛大其來無端莫窺其自也此言天地之道以見上文取辟之意也語録曰是言天地之大如此言天地則見聖人矣右第三十章言天道也或問小德大德之說曰以天地言之則髙下散殊者小德之川流於穆不已者大德之敦化以聖人言之則物各付物者小德之川流純亦不已者大德之敦化以此推之可見諸說之得失矣陳氏曰大德是就造化渾淪大本處論造化之大本處敦厚則根本盛大其出也流行而不窮小德是就造化中間條貫處細碎論造化之生成其條理如川水之流脈絡分明而晝夜之流不息若以天地言則萬物之或髙或下或散或殊者小德之川流維天之命於穆不已者大德之敦化若以本文言之則萬物有許多種類各正其所而不相害四時日月之運行而不相悖是小德之川流天地覆載而萬物並育四時日月其道並行是大德之敦化此說天地之道所以為大而孔子之德所以取譬於斯曰子之所謂兼內外該本末而言者何也曰是不可以一事言也姑以夫子已行之迹言之則由其書之有得夏時贊周易也由其行之有不時不食也迅雷風烈必變也以至於仕止久速之皆當其可也而其所以律天時之意可見矣由其書之有序禹貢述職方也由其行之有居魯而逢掖也居宋而章甫也以至於用舍行藏之所遇而安也而其襲水土之意可見矣若因是以推之則古先聖王之所以迎日推策頒朔授民而其大至於禪授放伐各以其時者皆律天時之事也其所以體國經野方設居方而廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何慊於是哉唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也知去聲齊側皆反别彼列反聰明睿知生知之質陳氏曰聰明睿智者聖人生知安行之資蓋首出庶物者也聰是耳之所聽無不聞明是目之所視無不見睿是無所不通知是無所不知聰明以耳目言睿知以心言臨謂居上而臨下也語録曰且如臨一人須是强得那一人方得至於百人千人萬人皆然若臨天下便須臨得天下方得其下四者乃仁義禮知之德陳氏曰寬是寬大裕是優裕溫和而柔順此仁也仁則度量寬洪廣大故曰有容發是奮發强是强而有力剛毅皆剛意此義也義則操執得牢固故曰有執齊是齊嚴莊是端莊中則無過不及正則不偏此言禮也故曰有敬文理密察此知也故曰有别文文章也語録曰如物之文縷陳氏曰是燦然而有文章理條理也語録曰理是有條辨逐一路子以各有條謂之理又曰如竹木之文理相似直是一般理橫是一般理密詳細也語録曰此是聖人於至纎至悉處無不詳審且如一物初破作兩箇又破作四片若未恰好又破作八片只管詳密察明辨也陳氏曰謂足以分别事物溥博淵泉而時出之溥博周遍而廣闊也淵泉靜深而有本也語録曰溥周遍博宏大淵深沈泉便有箇發達不已砥意出發見也言五者之德充積於中而以時發見於外也溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不說見音現說音悅言其充積極其盛陳氏曰此言上二句而發見當其可也陳氏曰此言下三句愚謂當其可即合理之謂也見是方出而未形於言行之間如下章所謂不動而敬不言而信是也下面方分言行是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天施去聲隊音墜舟車所至以下蓋極言之配天言其德之所及廣大如天也右第三十一章承上章而言小德之川流亦天道也唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚夫音扶焉於䖍反經綸皆治絲之事經者理其緒而分之綸者比其類而合之也語録曰治絲者先須逐條理其頭緒而分之所謂經也然後比其類而合之如打縧者必取所分之緒比類而合為一所謂綸也陳氏曰一是分疏條理一是牽聮相合經常也大經者五品之人倫陳氏曰即君臣父子兄弟夫婦朋友之大倫大本者所性之全體也陳氏曰即是中者天下之大本一般中乃未發之中就性論今所謂大本以所性之全體論惟聖人之德極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也陳氏曰如君是君臣是臣父是父子是子兄是兄弟是弟夫是夫婦是婦各有條理一定而不亂故曰經如君臣之相敬父子之相親夫婦之相倡和兄弟之相友睦朋友之相切磋琢磨牽比其倫類自然相合故曰綸惟聖人極誠無妄於人倫各盡其所當然之實皆可以為天下後世之標凖如使契教人倫蓋吾身已有箇標凖故人皆取法之其於所性之全體無一毫人欲之僞以雜之而天下之道千變萬化皆由此出所謂立之也陳氏曰聖人于所性之全體初無一毫人欲之雜及發而應事接物千條萬緒千變萬化皆從大本中流出其本根所在甚宏大非誠極其至不能立之其於天地之化育則亦其極誠無妄者有默契焉非但聞見之知而已語録曰天地化育如春夏秋冬日月寒暑無一息之差知化者真知其必然所謂知者至誠無僞有以默契也陳氏曰知字不可以聞見之知論只如肝膽相照一般聖人之德極誠無妄其生育變化萬物之功與天地造化吻合交契渾融一體所謂知也此皆至誠無妄自然之功用夫豈有所倚著於物而後能哉語録曰堂堂然流出夫焉有倚靠肫肫其仁淵淵其淵浩浩其天肫之純反肫肫懇至貌以經綸而言也陳氏曰經綸大經須加懇切詳細之功不可有急迫操切之意淵淵靜深貌以立本而言也陳氏曰靜深則有根本而不竭故以立本言浩浩廣大貌以知化而言也陳氏曰此誠之體與天同其大故其生育變化與天同其功故以知化言其淵其天則非特如之而已永嘉陳氏曰如天如淵猶是二物其天其淵即聖人便是天淵茍不固聰明聖知達天德者其孰能知之聖知之知去聲固猶實也鄭氏曰唯聖人能知聖人也語録曰問上面聖人是人下面聖人是聖人之道曰亦是人也惟有其人而後至誠之道乃始實見耳陳氏曰非若此等人則不能知得此等事右第三十二章承上章而言大德之敦化亦天道也前章言至聖之德此章言至誠之道然至誠之道非至聖不能知至聖之德非至誠不能為則亦非二物矣語録曰至聖至誠只是以表裏言至聖是其德之發見乎外者至誠則是那裏面骨子至誠處非聖人不自知至聖則外人只見得到這處或曰至誠至聖亦可以體用言否曰體用也不相似只是說得表裏葉氏曰至聖指發用神妙而言仍上文小德川流之意至誠指大經大本之實理而言仍上文大德敦化之意非至聖無以顯至誠之全體非至誠無以全至聖之妙用其實非二物也永嘉陳氏曰聖者靈通變化之稱人道之極功誠者真實無妄之謂與天合德也經中凡說天德處必曰至誠凡論人倫之至處必曰至聖此篇言聖人天道之極致至此而無以加矣或問至聖至誠之說曰楊氏以聰明睿智為君德者得之而未盡其寬裕以下則失之蓋聰明睿智者生知安行而首出庶物之姿也容執敬别則仁義禮智之事也案楊氏曰書曰惟天生聰明時乂易曰知臨大君之宜吉則聰明睿智人君之德也故足以有臨寬裕溫柔仁之質也故足以有容發强剛毅以致果故有執齊莊中正以直內故有敬文理密察理於義也故有别語録曰問理於義也曰便是怕如此說這一句了未得又添一句都不可曉經綸以下諸家之說亦或得其文義但不知經綸之為致和立本之為致中知化之為窮理以至於命且上於至誠者無所繫下於焉有所倚者無所屬則為不得其綱領耳游氏以上章為言至聖之德下章為言至誠之道者得之案游氏曰聰明睿智聖德也寬裕溫柔仁德也發强剛毅義德也齊莊中正禮德也文理密察智德也溥慱者其大無方淵泉者其深不測或容以為仁或執以為義或敬以為禮或别以為智惟其時而已此所謂時出之也夫然故外有以正天下之觀內有以通天下之志是以見而民敬言而民信行而民悅自西自東自南自北莫不心悅而誠服此至聖之德也天下之大經五品之民彛也凡為天下之常道皆可名於經而民彛為大經經綸者因性循理而治之無汨其序之謂也立天下之大本也建中于民也淵淵其淵非特如淵而已浩浩其天非特如天而已此至誠之道也其說自德者其用以下皆善案游氏曰德者其用也有目者所共見有心者所共知故凡有血氣者莫不尊親道者其本也非道同志一莫窺其奧故曰茍不固聰明聖知達天德者其孰能知之蓋至誠之道非至聖不能知至聖之德非至誠不能為故其言之序相因如此詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣衣去聲絅口迥反惡去聲暗於感反前章言聖人之德極其盛矣此復自下學立心之始言之而下文又推之以至其極也葉氏曰上三章極言孔子體天之德與夫至聖至誠之功用中庸之道至矣盡矣子思乂慮學者馳鶩於高逺而忘下學之功夫而或失其指歸故此章總論必自下學務內至親至切言之然後極於至精至微不可擬議之地詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同禪衣也語録曰古注以為禪衣所以襲錦衣者問禪與單字同異曰同沈拈謂絅與檾同是用檾麻織疏布為之不知是否尚加也陳氏曰衣錦而加絅衣以蔽之古之學者為己故其立心如此黃氏曰惡其文之著此君子之立心如此尚絅故暗然衣錦故有日章之實語録曰只暗暗地做工夫處這理自掩蔽不得陳氏曰衣錦者美在其中尚絅者不求知於外古之學者只欲此道理實得於已不是欲求人知惟其不求人知所以暗然雖曰暗然而道理自彰著而不可掩猶衣錦尚絅而錦之文采自然著見於外也淡簡溫絅之襲於外也不厭而文且理焉錦之美在中也語録曰淡則必厭簡則不文溫則不理而今却不厭而文且理只緣有錦在裏面若止著布衫著布襖便都內外黑淬淬地小人反是則暴於外而無實以繼之是以的然而日亡也語録曰小人不曽做時已報得滿地人知然實不曽做得逺之近見於彼者由於此也語録曰是以已對物言之知在彼之是非由在我之得失風之自著乎外者本乎內也語録曰是知其身之得失由乎心之邪正微之顯有諸內者形諸外也語録曰専指心說就裏來有為已之心而又知此三者則知所謹而可入德矣陳氏曰君子立心只是為已而又能知道理之見於逺者自近始故自近而謹見於風化者自身始故自身而謹有諸內者甚微而著於外者甚顯故自微而謹既知此三者而有所謹則可與之入德矣故下文引詩言謹獨之事詩云濳雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其唯人之所不見乎惡去聲詩小雅正月之篇承上文言莫見乎隱莫顯乎微也疚病也無惡於志猶言無愧於心此君子謹獨之事也陳氏曰正月詩潛雖伏矣即首章隱微處亦孔之昭即首章莫見莫顯意言隱伏之間其理甚昭明君子內省此處須是無一毫疚病如此則無愧於心君子所以不可及者只是能於人所不知而已獨知之地致其謹耳詩云相在爾室尚不愧於屋漏故君子不動而敬不言而信相去聲詩大雅抑之篇相視也屋漏室西北隅也文集曰曾子問謂之當室之白孫炎曰當室日光所漏入也語録曰古人室在東南隅開門東北隅為突西北隅為屋漏西南為奧人才進便先見東北隅却到西北隅然後始到西南隅此是至深密之地承上文又言君子之戒謹恐懼無時不然不待言動而後敬信陳氏曰抑詩即是首章戒謹其所不睹恐懼其所不聞意屋隅人迹所不到之地此處蓋已之所不睹須是真實無妄常加戒謹恐懼方能無愧怍君子為已之功至此不待於動而應事接物方始敬蓋於未應接之前無人處已無非敬矣不待見於發言而後估實蓋於未發言之前本來真實無非信矣則其為已之功益加密矣陳氏曰此處一節密一節首章先說戒謹恐懼後說謹獨是自密而疏蓋從內面發出來此處先說謹獨後說戒謹恐懼是自疏而密蓋從外面說入故下文引詩并言其效詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞假格同鈇音夫詩商頌烈祖之篇奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言說而人自化之也陳氏曰所以不待賞而民自勸不待怒而民自畏之威畏也鈇莝斫刀也鉞斧也詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩周頌烈文之篇不顯說見二十六章此借引以為幽深𤣥逺之意承上文言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣文集曰不顯二字二十六章者别無他義故只用詩意卒章所引緣自章首尚絅之云與章末無聲無臭皆有隱微深密之意故知其當别為一義與詩不同也語録曰問不顯其德案詩中例是言豈不顯也今借引此詩真作不顯說如何曰是箇幽深𤣥逺意是不顯中之顯篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至德淵微自然之應中庸之極功也語録曰此章到篤恭而天下平已是極處結局了他人孰不恭敬然却不能平天下聖人篤恭天下便平都不可測耳陳氏曰文章至此凡五引詩頭節說學者須為已不求人知第二節說致謹於人所不見處第三節說不特人所不見雖已所不聞不見處亦當致敬第四節說不待言說而人自化之第五節說不顯篤恭聖人至德功效有自然之應乃中庸之極功也詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣輶由酉二音詩大雅皇矣之篇引之以明上文所謂不顯之德者正以其不大聲與色也語録曰只是說至德自無聲色又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙三山陳氏曰是雖曰不大聲與色然猶有聲色者存焉特不大之耳蔡氏曰是猶未足以盡此理之妙不若蒸民之詩所言德輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙三山陳氏曰茍謂之如毛是尚容比類也蔡氏曰是亦未足以盡此理之妙不若文王之詩所言上天之載無聲無臭然後乃為不顯之至耳蓋聲臭有氣無形在物最為微妙而猶曰無之故唯此可以形容不顯篤恭之妙語録曰所謂不顯其德者幽深𤣥逺無可得而形容雖不大聲以色德輶如毛皆不足以形容直是無聲無臭到無迹之可尋然後已非此德之外又别有是三等然後為至也陳氏曰非是德之外又别有三等級如此右第三十三章子思因前章極致之言反求其本復自下學為已謹獨之事推而言之以馴致乎篤恭而天下平之盛又贊其妙至於無聲無臭而後已焉語録曰中庸後面愈說得向裏來凡八引詩一步退似一步都用那般不言不動不顯不大砥字直說到無聲無臭則至矣或曰到此裏還得本體曰然又曰此段自衣錦尚絅暗然日章漸漸收斂到後面一段密似一段直到聖而不可知處曰無聲無臭至矣蓋舉一篇之要而約言之其反復丁寧示人之意至深切矣學者其可不盡心乎或問卒章之說曰承上三章既言聖人之德而極其盛矣子思懼夫學者求之於髙逺𤣥妙之域輕自大而反失之也故反於其至近者而言之以示入德之方欲學者先知用心於內不求人知然後可以謹獨誠身而馴致乎其極也君子篤恭而天下平而其所以平者無聲臭之可尋此至誠盛德自然之效而中庸之極功也故以是而終篇焉蓋以一篇而論之則天命之性率性之道修道之教與夫天地之所以位萬物之所以育者於此可見其實德以此章論之則所謂淡而不厭簡而文溫而理知逺之近知風之自知微之顯者於此可見其成功皆非空言也然其所以入乎此者則無他焉亦曰反身以謹獨而已矣故首章以發其意此章又申明而極言之其㫖深哉其曰不顯亦充尚絅之心以至其極耳與詩之訓義不同蓋亦假借而言若大學敬止之例也諸說如何曰程子至矣案程子曰不愧屋漏便是箇持敬氣象又曰不愧屋漏則心安而體舒又曰尚不愧于屋漏是敬之事又曰聖人修已以安百姓篤恭而天下平惟上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道聰明睿智皆由此出以此事天享帝又曰道一本也知不二本便是篤恭而天下平之道又曰君子之遇事無巨細一於敬而已矣簡細故以自崇非敬也飾私智以為竒非敬也要之無敢慢而已語曰居處恭執事敬雖之夷狄不可棄也然則執事敬者固為仁之端也推是心而成之則篤恭而天下平矣又曰毛猶有倫入毫釐絲忽終不盡又曰中庸言道只消道無聲無臭四字總括了多少又曰中庸之語其本於無聲無臭其用至於禮儀三百威儀三千自禮儀三百威儀三千復歸於無聲無臭此言聖人心要處呂氏既失其章㫖又不得其綱領條貫而於文義尤多未當如此章承上文聖誠之極致而反之以本乎下學之初心遂推言之以至其極而後已也而以為皆言德成反本之事則既失其章㫖矣案吕氏曰此章皆言德成反本以盡中庸之道此章凡八引詩自衣錦尚絅以至不顯惟德凡五條始學成德疏密淺深之序也自不大聲色以至無聲無臭凡三條皆所以贊夫不顯之德也今以不顯惟德通前三義而并言之又以後三條者亦通為進德工夫淺深次第則又失其條理矣案吕氏曰不顯惟德百辟其刑之者蓋要其所以不動而敬不言而信不賞而勸不怒而威豈有他哉在德而已又曰德輶如毛謂之德者猶誠之者也未至乎誠也若至乎誠則與天為一無意無我非勉非思渾然不可得而名者也聲臭之於形微矣有物而不可見猶曰無之則上天之事可知矣又曰不動而敬不言而信不賞而勸不怒而威則德孚於人而忘乎言動矣然猶有德之聲色存焉至于不大聲色然後可以入乎無聲無臭而誠一於天至以知風之自為知見聞動作皆由心出案吕氏曰以見聞之廣動作之利推所從來莫非心之所出其知風之自歟以知微之顯為知心之精微明達暴著案呂氏曰心之精微至隱至妙無聲無臭然其理明達暴著若懸日月其知微之顯歟以不動而敬不言而信為人敬信之案吕氏曰其中有本不待言動而人敬信以貨色親長達諸天下為篤恭而天下平案吕氏曰君子之善與人同合內外之道則為德非特成已將以成物故君子言貨色之欲親長之始必達於天下而後已豈非篤恭而天下平者哉以德為誠之之事而猶有聲色至於無聲無臭然後誠一於天已見上注則又文義之未當者然也然近世說者乃有深取乎其知風之自之說而以為非大程夫子不能言者蓋習於佛氏作用是性之談而不察乎了翁序文之誤耳學之不講其陋至此亦可憐也語録曰吕氏却是作用是性之德於學無所統攝游氏所謂無藏於中無交於物泊然純素獨與神明居所謂離人而立於獨者皆非儒者之言案游氏曰無藏於中無交於物泊然純素獨與神明居此淡也然因性而已故不厭又曰無聲無臭則離人而立於獨矣不失足於人不失色於人不失口於人則又審於接物之事而非簡之謂也案游氏曰不失足於人不失色於人不失口於人此簡也然循理而已故文其論三知未免牽合之病案游氏曰欲治其國先齊其家知逺之近也人人親其親長其長而天下平可不謂近矣乎欲齊其家先修其身知風之自也易於家人曰風自火出而君子以言有物行有常可不謂所自乎欲修其身先正其心知微之顯也夫道視之不見聽之不聞而常不離心術日用之間可不謂顯矣乎其論德輶如毛以下則其失與呂氏同案遊氏曰所謂德者非甚高而難知也甚逺而難至也舉之則是故曰德輶如毛既已有所舉矣則必思而得勉而中是人道而有對也故曰毛猶有倫若夫誠之至則無思無為從容中道是天道也故曰上天之載無聲無臭矣楊氏知風之自案楊氏曰世之流風皆有所自清之隘和之不恭知其自此則君子不由也與呂氏舊本之說略同案吕氏曰墨子兼愛楊子為我其始未有害也其風之末則至於無君無父而近於禽獸伯夷之不屑就以為清栁下惠之不屑去以為和其風之末不免乎隘與不恭君子不由則其端不可不慎也故曰差之毫釐繆以千里其知風之自歟而其取證又皆太逺要當參取呂氏改本去其所謂見聞者而益以言語之得失動作之是非皆知其有所從來而不可不謹則庶乎其可耳案吕氏見聞之說已見上注以德輶如毛為有德而未化則又呂游之失也案楊氏曰德輶如毛未至於無倫猶有德也有而不化非其至也故上天之載無聲無臭然後為至侯氏說多疏闊惟以此章為再叙入德成德之序者獨為得之也案侯氏曰自衣錦尚絅至無聲無臭至矣子思再叙入德成德之序也中庸纂疏卷三讀論孟集注綱領集注如稱上稱來無異不髙些不低些如看得透存養熟甚生氣質朱子語録又曰某於論孟逐字稱等不教偏些小學者將注處宜子細看集注添一字不得減一字不得語録又曰不多一箇字不少一箇字看集注時不可遺了緊要字蓋解中有極散緩者有緩急之間者有極緊要者某下一字時直是稱輕等重方敢寫出語録又曰讀集注只是要看無一字間若意裏說做間字那箇正是緊要字集注至于訓詁皆子紬者蓋要人字字著意看字字思索到莫要只作等間看便了語録又曰要人精粗本末字字為咀嚼過問注或用者字或用謂字或用猶字或直言其輕重之意如何曰者謂是恁地直言者直訓如此猶云者猶是如此語録胡氏曰某某也正訓也某猶某也無正訓借彼以明此也某之為言某也前無訓釋特發此以明其義也為言謂其說如此也引經傳文以證者此字義不可以常訓通也集注於正文之下正解說字訓文義與聖經正意如諸家之說有切當明白者即引用而不沒其姓名如學而首章先尹氏而後程子亦只是順正文解下來非有髙下去取也章末用圈而列諸家之說者或文外之意而於正文有所發明不容略去或通論一章之意反覆其說切要而不可不知也朱在過庭所聞語録曰集注內載前輩之說於下句者是解此句文義載前輩之說於章後者是說一章之大㫖及反覆此章之餘意胡氏曰字義難明者各有訓釋一章意義可以分斷者逐節注之一章之後又合諸節而通言之欲學者先明逐字文義然後明逐節旨意明逐節旨意然後通一章之㫖意也每章只發本章之㫖者附注後或因發聖人言外之意者别為一段以附其後亦欲學者先明本㫖而後及之也集注乃集義之精髓語録又曰精義是許多語言而集注能有幾何言語一字是一字其間有一字當百十字底又曰前輩解說恐後學難曉故集注盡撮其要說出來不須更於注腳外又添一段說話只把這箇熟看自然曉得莫枉費心去外面思量又曰如精義諸老先生說非不好只是說得忒寬易使人向别處去集注便要人只恁地思量文義曉得了只管玩味便見聖人意思出來陳氏曰集注初遍聞諸家說或一兩段或一兩句或一兩字可取皆抄掇來續旋旋磨刮翦繁趨約是幾百畨過又曰學者先須專從事集注為一定標準復熟饜飫胸中已有定見然後方可將集義來參較方識破諸家是非得失了無遁情益見得集注明潔親切辭約而理當義精而味長信為萬世不刋之書程先生經解理皆在解語內集注只是發明其辭使人玩味經文理皆在經文內語録陳氏曰集注發明程子之說或足其所未盡或補其所未圓或白其所未瑩或貫其所未一其實不離乎程說之中必如是而後謂有功於程子未可以優劣較之問集注引前輩之說而增損改易本文其意如何曰其說有病不欲更就下面安注腳語録問集注中有兩存者何者為長曰使某見得長底時豈復存其短底只為是二說皆通故並存之然必有一說合得聖人之本意但不可知耳復曰大率兩說前一說勝語録又曰集注中有兩說相似而少異者亦要相資有說全别者是未定也又曰聖人言語固是㫖意歸一後人看得有未端的處大率意義長者録在前有當知而未甚穩者録在後胡氏曰有兩說相似而小異者彼此相資而義足也有自相抵牾者未決而並存之也集注某自三十嵗便下工夫到而今改猶未了不是草草看者語録黃氏曰朱子一部論語直解至死又曰朱子於一字未安一語未順栗思靜慮更易不置或一二日而未已夜坐親見至四鼓先生曰此心已孤且休矣退而就寢目未交睫復見遣小吏持板牌改數字以見示則是退而猶未寐也未幾而天明矣用心之苦如此而學者顧以易心讀之安能得聖賢之意哉集注後來改定處多遂與或問不相應又無功夫修得或問故不曾傳出今莫若只就正經上玩味有未通處參考集注更自思索為佳不可恃此未定之書便以為是也朱子文集語録曰論孟或問是十五年前文字與今說不類當時欲修後來精力衰那箇工夫大段掉了陳氏曰論孟須以集注為正如或問後來置之不修未得為成書今細觀之時覺有枯燥處亦多有不穩處亦多有失之太甚處比之大學中庸或問之書大不同若姑借之以參訂集注之所未詳則可矣未可全案之以為定論也愚案朱子自以論孟或問為未定之書今不敢用大學中庸例附于章後惟取其與集注同者疏于各條之下讀論語孟子法程子曰學者當以論語孟子為本論語孟子既治則六經可不治而明矣程伯子名皓叔子名頤河南人集注以其學同通稱程子云語録曰語孟工夫少得效多六經工夫多得效少輔氏曰今之治二書所患不精耳果能熟讀精思使其言皆出於吾之口使其意皆出於吾之心脈絡調理始終洞然而無纎介隱昧不明之處則六經之言固可以類推而無不明也讀書者當觀聖人所以作經之意與聖人所以用心聖人之所以至於聖人而吾之所以未至者所以未得者語録曰今人讀書只緣不曽求聖人之意才拈得些小便把自意硬入放裏面便胡亂說故教他就聖人意上求看如何輔氏曰聖人作經之意不過欲發明此理以曉人其所以用心而至為聖人者則二書固無不具也至於吾之所以未至聖人之地未得聖人之心者亦惟用心與二書背戾而不合耳陳氏曰到經明後方知得作經之意識聖人心體方知他所以用處句句而求之晝誦而味之中夜而思之輔氏曰學者茍能句句而求之勿使有一豪茍簡陵躐之意口誦其言心味其旨而又能於深夜反復研思則智日益明理日益得而聖人之心可漸識聖人之地可漸造矣平其心易其氣闕其疑則聖人之意可見矣語録曰平其心只是放教虛平易其氣只是放教寬慢闕其疑只是莫去穿鑿今人多要硬把捉教住如何得有箇難理㑹處便要刻畫百端討出來枉費心力少刻只說得自底那裏見聖人意輔氏曰不平其心則必有蔽陷離窮之病不易其氣則必有躁急鹵莾之失不闕其疑則又必至於穿鑿附㑹而反有害於經矣陳氏曰平其心者是虛其心如衡之平不可先立一箇定說才先把一說為主於中便如稱盤上先加一星了到稱物時如何得銖兩之正易其氣者欲見得聖人真意時須是和平其氣雍容和緩自然而得之乃能默契程子曰凡看文字須先曉其文義然後可以求其意未有不曉文義而見意者也語録曰讀書須從文義上尋今人却於文義外尋索程子曰學者須將論語中諸弟子問處便作自己問聖人答處便作今日耳聞自然有得雖孔孟復生不過以此教人輔氏曰若能如此看則不徒誦其言必將求其意不徒求其意必將見於行其進於聖賢也不難矣若能於語孟中深求玩味將來涵養成甚生氣質輔氏曰若能到得後來涵養成就則氣質變化可使愚必明柔必强矣程子曰凡看語孟且須熟讀玩味須將聖人言語切己不可只作一場話說人只看得此二書切己終身儘多也語録曰論孟不可只道理㑹文義得了便了須子細玩味以身體之見前後晦明生熟不同方是切實又曰二書若便恁地讀過只一二日可了若要將來做切己事玩味體察一日多看得數段或一兩段耳又曰讀論孟須是切己且如學而時習之切己看時曾時習與否句句如此求之則有益矣輔氏曰切己之說甚有力讀書者能將聖人言語切己體察則定無枉費工夫一日當有一日之功若欲只做一場話說則是口耳之學耳程子曰論孟只剩讀著便自意足學者須是玩味若以語言解著意便不足語録曰讀書之法先要熟讀須是正看背看左看右看看得是了未可便說道是更須反覆玩味輔氏曰學者須是將聖人語言熟讀深思晝夜玩味則可以開發吾之知識日就髙明涵養吾之德性日就廣大方始見得聖賢言近而旨逺故其意思自然厭飫飽足若以語言解著則意便死於言下自然局蹙蹇淺而有枵虛不足之意或問且將語孟緊要處看如何程子曰固是好但終是不浹洽耳語録曰莫云論孟中有緊要底有泛說底今且著力緊要底便是揀别此最不可蓋道體至廣至大聖人言語有說得粗底有說得細底有說得難底有說得易底有說得大底有說得小底皆著理㑹透徹若不盡見必有窒礙處又曰浹洽二字宜子細看凡於聖賢言語思量透徹乃有所得譬之浸物於水水若未入只是外面稍濕裏面依然乾燥必浸之久則透內皆濕輔氏曰人才只將二書緊要處看便只是要求近功速效與天理已不相似所謂固是好者蓋姑取其向學求道之意耳正使其有近功速效亦必至於偏枯蹇澀豈復有優游厭飫貫通浹洽之意程子曰孔子言語句句是自然孟子言語句句是事實語録曰孔子言語一似沒要緊說出來自是包含無限道理無些滲漏初不曾著氣力自是委曲詳盡道理更走他底不得若孟子便用著氣力依文案本據事實說無限言語方說得出此所以為聖賢之别程子曰學者先讀論語孟子如尺度權衡相似以此去量度事物便自見得長短輕重輔氏曰尺度可以量長短權衡可以稱輕重理義可以别是非能知道則何書不可讀何理不可究何事不可處哉程子曰讀論語孟子而不知道所謂雖多亦奚以為輔氏曰讀語孟而不知道則是口耳之學未嘗著心玩味未嘗至誠涵泳未嘗切己體察也故讀雖多何益於事論語朱子集注序說史記世家曰孔子名丘字仲尼其先宋人父叔梁紇母顔氏以魯襄公二十二年庚戌之嵗十一月庚子生孔子於魯昌平鄉陬邑為兒嬉戲常陳俎豆設禮容及長為委吏料量平委吏本作季氏史索隱云一本作委吏與孟子合今從之為司職吏畜蕃息職見周禮牛人讀為樴義與杙同蓋繫養犧牲之所此官即孟子所謂乘田適周問禮於老子語録曰問何以問禮於老聃曰老子曾為柱下史故知禮節文所以孔子問之聃雖知禮然其意以為不必盡行行之反以多事故欲絶滅之既反而弟子益進昭公二十五年甲申孔子年三十五而昭公奔齊魯亂於是適齊為髙昭子家臣以通乎景公有聞韶問政二事公欲封以尼溪之田晏嬰不可公惑之有季孟吾老之語語録曰問齊景公欲封孔子田楚昭王欲封孔子地晏嬰子西不可使無晏嬰子西則夫子還受之否曰既仕其國則須有采地受之可也孔子遂行反乎魯定公元年壬辰孔子年四十三而季氏强僭其臣陽虎作亂專政故孔子不仕而退修詩書禮樂弟子彌衆九年庚子孔子年五十一公山不狃以費畔季氏召孔子欲往而卒不行有答子路東周語語録曰聖人欲往之時是當他召聖人之時有這些好意思來接聖人聖人當時亦接他好意思所以欲往然他這箇人終是不好底人聖人待得重理㑹過一畨他許多不好又只在所以終不可去如陰雨蔽翳重結不解忽然有一處略略開霽雲收霧斂見得青天白日這些自是好定公以孔子為中都宰一年四方則之遂為司空又為大司寇十年辛丑相定公㑹齊侯于夾谷齊人歸魯侵地十二年癸卯使仲由為季氏宰墮三都收其甲兵孟氏不肯墮成圍之不克語録曰問成既不墮夫子如何别無處置了便休曰不久夫子亦去魯矣若使聖人久為之亦須别有箇道理十四年乙巳孔子年五十六攝行相事誅少正卯與聞國政三月魯國大治齊人歸女樂以沮之季桓子受之郊又不致膰俎於大夫孔子行魯世家以此以上皆為十二年事語録曰問季桓子才受女樂孔子不安便行孔子向來相定公做得許多事案亦是季桓子聽孔子之所為方始做得曰固是又曰當時若致膰俎孔子去得更從容惟其不致故孔子便行問設若魯亦致膰於大夫則夫子果止乎曰也須去只是不若此之速必須别討一箇事故去且如不致膰亦不是大段失禮處聖人便因此且求去胡氏曰是時政在季氏夫子攝行相事而已非為相也與聞國政而已非為政也定公素不能立季孫既有所惑其不足與有為可知也故不容於不行適衛主於子路妻兄顔濁鄒家孟子作顔讎由適陳過匡匡人以為陽虎而拘之有顔淵後及文王既沒之語既解還衛主蘧伯玉家見南子有矢子路及未見好德之語去適宋司馬桓魋欲殺之有天生德語及微服過宋事又去適陳主司城貞子家居三嵗而反于衛靈公不能用有三年有成之語晉趙氏家臣佛肸以中牟畔召孔子孔子欲往亦不果有答子路堅白語及荷蕢過門事語録曰夫子於公山氏之召却真箇要去做於佛肸之召但謂其不能浼我而已將西見趙簡子至河而反又主蘧伯玉家靈公問陳不對而行復如陳據論語則絶糧當在此時季桓子卒遺言謂康子必召孔子其臣止之康子乃召冉求史記以論語歸與之歎為在此時又以孟子所記歎詞為主司城貞子時語疑不然蓋語孟所記本皆此一時語而所記有異同耳孔子如蔡及葉冇葉公問答子路不對沮溺耦耕荷蓧丈人等事史記云於是楚昭王使人聘孔子孔子將往拜禮而陳蔡大夫發徒圍之故孔子絶糧於陳蔡之間有愠見及告子貢一貫之語案是時陳蔡臣服於楚若楚王來聘孔子陳蔡大夫安敢之且據論語絶糧當在去衛如陳之時楚昭王將以書社地封孔子令尹子西不可乃止史記云書社地七百里恐無此理時則有接輿之歌愚謂古者二十五家為里里則各立社書社者書其人名於籍又反乎衛時靈公已卒衛君輒欲得孔子為政有魯衛兄弟及答子貢夷齊子路正名之語而冉求為季氏將與齊戰有功康子乃召孔子而孔子歸魯實哀公之十一年丁巳而孔子年六十八矣有對哀公及康子語然魯終不能用孔子孔子亦不求仕語録曰問孔子當周衰時可以有為否曰聖人無不可為之事只恐權柄不入手問不知聖人有不可為之時否曰若時節變聖人又自處之不同問孔子豈不知時君必不能用已曰聖人豈有逆料君能用我與否到得後來說不復夢見周公與吾已矣夫聖人自知其不可為矣乃叙書傳禮記有杞宋損益從周等語刪詩正樂冇語太師及樂正之語序易彖繫象說卦文言有假我數年之語弟子蓋三千焉身通六藝者七十二人弟子顔回最賢蚤死後唯曾參得傳孔子之道十四年庚申魯西狩獲麟有莫我知之歎孔子作春秋有知我罪我等語論語請討陳恆事亦在是年語録曰據陳恆事是獲麟年那時聖人猶欲有為也明年辛酉子路死於衛十六年壬戌四月己丑孔子卒年七十三葬魯城北泗上弟子皆服心喪三年而去唯子貢廬於冢上凡六年孔子生鯉字伯魚先卒伯魚生伋字子思作中庸子思學於曾子而孟子受業子思之門人何氏曰魯論語二十篇齊論語别有問王知道凡二十二篇其二十篇中章句頗多於魯論古論出孔氏壁中分堯曰下章子張問以為一篇有兩子張凡二十一篇篇次不與齊魯論同何氏名晏魏南陽人或問今之論語其魯論與曰以何晏所叙篇數考之則信為魯論矣但據釋文則其文字亦或有不同者如以必為瓜之類豈何氏亦若鄭注就魯論篇章而又雜以齊古之文與然唐藝文志已不載齊古篇目陸氏蓋於諸家說中得之耳程子曰論語之書成於有子曾子之門人故其書獨二子以子稱或問程子之說出於栁宗元而不著栁說何也曰栁氏之言曰諸儒皆以論語孔子弟子所記不然也孔子弟子曾參最少又老乃死而是書記其將死之言則去孔子之時甚逺而當時弟子略無存者矣吾意孔子弟子嘗雜記其言而卒成其書者曾子弟子樂正子子思之徒也故是書之記諸弟子必以字而曾子不然蓋其弟子之號之云爾而有子亦稱子者孔子之殁諸弟子嘗以其似夫子而師之後乃叱避而退則固嘗有師之號矣凡此栁氏之言其論曽子者得之而有子叱避之說則史氏之鄙陋無稽而栁氏惑焉以孟子考之當時既以曾子不可而寢其議有子曷嘗輒據孔子之位而有其號哉故程子特因栁氏之言斷而裁之以為此說此所以不著栁說而獨以程子為據也胡氏曰子者弟子稱其師之號此書記有子曾子之言皆不曰字而曰子故知其成於二子門人之手然夫子沒一時皆以有子之言似夫子又曾子傳之子思子思傳之孟子豈二子之獨以子稱亦以是歟程子曰讀論語有讀了全然無事者輔氏曰不過是尋行數墨之徒耳陳氏曰是全未有一字之得而草率不精之故也有讀了後其中得一兩句喜者語録曰到這一二句喜處便是入頭處如此讀將去將久自解踏著他關捩子倏然悟時聖賢格言自是句句好須知道那一句有契於心著實理㑹得那一句透如此推來推去方解有得今只恁地包罩說道好如喫物事相似事事道好若問那般較好其好是如何却又不知如此濟得甚事輔氏曰是就其性之所進而偶有所感發焉者也如此則亦可以進矣陳氏曰是已入得一線路子開明是一兩句之精也有讀了後知好之者輔氏曰好之則知其味矣如食五穀者既知其味則必嗜之也陳氏曰是已覺其中有趣味之可嗜而於書之大義甚精也有讀了後直有不知手之舞之足之蹈之者輔氏曰嗜之而飽饜充足其樂有不可形容者是以見於手舞足蹈也陳氏曰是深有悟夫趣味之無窮而全書之已精也然精亦豈容易可至哉是用多少工夫積纍而然程子曰今人不㑹讀書如讀論語未讀時是此等人讀了後又只是此等人便是不曽讀輔氏曰程子言雖近而意則切使讀書者自知所以求益不至虛費工夫也須是熟讀涵泳使之通貫浹洽然有日新之功如是則氣質變化月異而戚不同也程子曰頤自十七八讀論語當時已曉文義讀之愈久但覺氣味深長語録曰所謂深長意味也别無說只是涵泳久自見得
