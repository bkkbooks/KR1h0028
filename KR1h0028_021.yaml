body:
  text: 欽定四庫全書孟子纂疏卷八宋趙順孫撰朱子集注離婁章句下凡三十三章孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也諸馮負夏鳴條皆地名或問舜卒於鳴條則湯與桀戰之地也而竹書有南巡不反禮記有葬於蒼梧之說何邪曰孟子之言必有所據二書駁雜恐難盡信然無他考驗則亦論而闕之可也愚案諸馮在冀州之分負夏春秋時衛地鳴條在安邑之西在東方夷服之地文王生於岐周卒於畢郢西夷之人也岐周岐山下周舊邑近畎夷畢郢近豐鎬今有文王墓愚案畢豐鎬俱在長安豐文王所都鎬武王所都豐鎬相去二十五里書云周公薨成王葬于畢史記云文武葬于畢皇覽云文王周公冢皆在鎬聚東杜中則畢在鎬東矣舊疏謂郢故楚都在南郡畢在郢之地者誤也地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節得志行乎中國謂舜為天子文王為方伯得行其道於天下也符節以玉為之篆刻文字而中分之彼此各藏其半有故則左右相合以為信也語録曰古人符節多以玉為之如牙璋以起軍旅又有竹符又有英簜符簜小節竹使者謂之簜節也漢有銅虎符竹使符銅虎以起兵竹使郡守用之凡符節右留君所左以與其人有故則君以其右合其左以為信也曲禮曰獻田地者執右契者取物之券也如發兵取物徵召皆以右取之也若合符節言其同也語録曰古人所為恰與我相合只此便是至善前乎千百世之已往後乎千百世之未來只是此箇道理先聖後聖其揆一也揆度也其揆一者言度之而其道無不同也輔氏曰不曽說著道字言行則便是道了范氏曰言聖人之生雖有先後逺近之不同然其道則一也輔氏曰先後以世之相後言逺近以地之相去言地雖相去干有餘里世雖相後千有餘嵗然揆度其道則一而已矣子産聽鄭國之政以其乘輿濟人於溱洧乘去聲溱音臻洧榮美反子産鄭大夫公孫僑也溱洧二水名也子産見人有徒涉此水者以其所乘之車載而渡之語録曰虎牢之下即溱洧之水後又名汜水關子産以乘輿濟人之所也或以為溱洧之水其深不可以施梁柱其淺不可涉豈可以濟乘輿蓋溱洧之水皆是沙故不可以施梁柱但可用舟渡而已李先生以為疑或是偶然橋梁壞故子産因用其車以渡人然此類亦何必深考孟子曰惠而不知為政惠謂私恩小利或問孔子以子産之惠為君子之道而子以私恩小利言之何也曰孔子之言通乎巨細故不害其為君子之道此承上文乘輿濟人而言則私恩小利而已矣輔氏曰唯其恩之出於私故其利之及者小此正指乘輿濟人之事而言也政則有公平正大之體綱紀法度之施焉輔氏曰公平正大之體以理言紀綱法度之施以事言言體則知施之為用言施則知體之為本下云嵗十一月徒杠成十二月輿梁成這箇便可見其體之為公平正大其用之有法度紀綱也嵗十一月徒杠成十二月輿梁成民未病涉也杠音江杠方橋也徒杠可通徒行者梁亦橋也輿梁可通車輿者周十一月夏九月也周十二月夏十月也夏令曰十月成梁蓋農功已畢可用民力又時將寒沍水有橋梁則民不患於徒涉亦王政之一事也文集曰先王之政細大具舉而無事不合民心順天理故其公平正大之體綱紀法度之施雖纎悉之間亦無遺恨如此君子平其政行辟人可也焉得人人而濟之辟與闢同焉於䖍反辟辟除也如周禮閽人為之辟之辟言能平其政則出行之際辟除行人使之避己亦不為過况國中之水當涉者衆豈能悉以乘輿濟之哉文集曰辟除之辟乃趙氏本說與上下文意正相發明蓋與舍車濟人正相反也又曰君子能行先王之政使細大之務無不畢舉則惠之所及亦已廣矣是其出入之際雖辟除人使之避己亦上下之分固所宜然何必曲意行私使人知己出然後為惠又况人民之衆亦安得人人而濟之哉故為政者每人而悅之日亦不足矣言每人皆欲致私恩以悅其意則人多日少亦不足於用矣輔氏曰此則正說子産之用心錯處也夫子産固賢但以不知聖人之學是以有時而內交要譽之私萌而不可掩孟子明辨之所以立教也諸葛武侯嘗言治世以大德不以小惠得孟子之意矣武侯名亮漢琅琊人文集曰武侯之治蜀也官府次舍橋梁道路莫不繕理而民不告勞其亦庶幾知為政矣輔氏曰此二句誠得孟子之意而真有王佐之心孟子告齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎孔氏曰宣王之遇臣下恩禮衰薄至於昔者所進今日不知其亡則其於羣臣可謂邈然無敬矣故孟子告之以此手足腹心相待一體恩義之至也如犬馬則輕賤之然猶有豢養之恩焉國人猶言路人言無怨無德也土芥則踐踏之而已矣斬艾之而已矣其賤惡之又甚矣寇讎之報不亦冝乎輔氏曰孟子此說特為宣王發所謂有為之言也孔氏之說正解著此意孟子之言雖是為宣王而發然臣之報君視君之所施常加厚一等手足之於腹心雖為同體然有大小之辨人類視犬馬為尊土芥視寇讎為甚其言雖若有迹然亦理勢之實然也王曰禮為舊君有服何如斯可為服矣為去聲下為之同儀禮曰以道去君而未絶者服齊衰三月王疑孟子之言太甚故以此禮為問曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣導之出疆防剽掠也先於其所往稱道其賢欲其收用之也三年而後收其田祿里居前此猶望其歸也輔氏曰𨗳之出疆所以盡防衛之道於在我之境先於其所往所以為其祿仕之地於所往之國去三年不反然後收其田里所以示拳拳屬望之恩義也今也為臣諫則不行言則不聽膏澤不下於民有故而去則君摶執之又極之於其所往去之日遂收其田里此之謂寇讎寇儲何服之有極窮也窮之於其所往之國如晉錮欒盈也潘興嗣曰孟子告齊王之言猶孔子對定公之意也而其言有迹不若孔子之渾然也蓋聖賢之别如此興嗣豫章人輔氏曰就聖賢言上觀之誠有差别然此豈容勉強為哉真氏曰孔孟之言可以見聖賢氣象之分雖然孟子為齊王言則然也而所以自處者則不然也千里見王不遇故去而三宿出晝未嘗有悻悻之心猶幸王之一寤而追己也曷嘗以寇讎視其君哉楊氏曰君臣以義合者也故孟子為齊王深言報施之道使知為君者不可不以禮遇其臣耳若君子之自處則豈處其薄乎孟子曰王庶幾改之豫日望之君子之言蓋如此輔氏曰楊氏發明得孟子所為言此意尤分明觀孟子於齊王其言如此則其視齊王也豈有視以為寇讎之心哉君子固自不肯處其薄然君人者則自不可不以禮遇其臣耳孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙言君子當見幾而作禍已迫則不能去矣輔氏曰可以者在時義為可也失此幾則有欲去而不能者矣此明夷之初所以不食而行遁之初所以有尾厲之戒而孔子往趙所以及河而復彼昏不仁猶或莫知轉身一路此孟子所以致戒也然此特言其常理耳其間更有多少義理在時與位之不同則所以處之者亦異若執此一說以為臣則凡茍免自私之徒者得以藉口矣孟子曰君仁莫不仁君義莫不義張氏曰此章重出然上篇主言人臣當以正君為急此章直戒人君義亦小異耳輔氏曰上篇言人臣當以正君為急此章言人君當以正已為先亦大學所謂其機如此之說也孟子曰非禮之禮非義之義大人弗為察理不精故有二者之蔽文集曰擇焉不精以為善而為之大人則隨事而順理因時而處宜豈為是哉輔氏曰如此則能盡時中之道矣孟子曰中也養不中才也養不才故人樂有賢父兄也如中也棄不中才也棄不才則賢不肖之相去其間不能以寸樂音洛無過不及之謂中足以有為之謂才輔氏曰中以德言才以才言德本於性才出於氣養謂涵育薰陶俟其自化也輔氏曰涵育以天地之生物言也薰陶以工冶之成物言也此循其理而彼自成其形焉無心也蓋父子兄弟之間皆難於責善正其在我者使之自化而已賢謂中而才者也輔氏曰賢則兼有才德者也樂有賢父兄者樂其終能成已也為父兄者若以子弟之不賢遂遽絶之而不能教則吾亦過中而不才矣其相去之間能幾何哉輔氏曰父兄之賢者棄子弟之不賢者而不教是其心固以為賢不賢之相去為甚逺而不可教也而不知其自悖於教育成就之道則是亦違乎中傷乎德而自陷於不才耳故孟子以其間不能以寸曉之使之自省也夫聖人有教無類而不賢者至於棄子弟而不之教天理人欲之相反也如此哀哉孟子曰人有不為也而後可以有為程子曰有不為知所擇也惟能有不為是以可以有為無所不為者安能有所為耶輔氏曰人能不為其所不當為則必能為其所當為矣蓋人心不可二用而精神氣力只有許多茍專於為善則必無暇於為惡茍溺於好利則必不能循乎義矣孟子曰言人之不善當如後患何此亦有為而言或問所謂後患者謂得罪於其人耶抑恐其亦言己之不善耶曰是皆有之然斯言必有為而發今不可知其所指矣輔氏曰揚人之善掩人之惡自是君子忠厚之心豈為有後患然後如此哉今言如後患何故知其有所為而言也此必有人或評人隂私公肆詆誣而無所忌憚者故孟子言此以警之或是此等人既已被禍故孟子嘆之以警後人也君子語默惟其時與義而已義所當言是是非非不茍默也豈計後患哉孟子曰仲尼不為已甚者已猶太也楊氏曰言聖人所為本分之外不加毫末非孟子真知孔子不能以是稱之或問楊氏之說曰所謂本分者乃義理之至當非茍然而已也學者於此冝深察之一有小差則流而入於鄉原之亂德矣輔氏曰楊氏說盡聖人用處聖人雖有過物之行而無過禮之為其作用處雖曰髙世絶俗非人所能及不過盡吾之性由仁義行耳孟子曰大人者言不必信行不必果惟義所在行去聲必猶期也大人言行不先期於信果但義之所在則必從之卒亦未嘗不信果也尹氏曰主於義則信果在其中矣主於信果則未必合義王勉曰若不合於義而必信必果則妄人爾輔氏曰尹氏最得此章之指而集注又述其意而著明之以必為期尤更有功不然則無忌憚者或得以藉口王氏則又有不合於義而不信不果則為妄人之說尤盡其敝尾生之信徒狄之果皆是物也孟子曰大人者不失其赤子之心者也大人之心通達萬變赤子之心則純一無僞而已然大人之所以為大人正以其不為物誘而有以全其純一無僞之本然是以擴而充之則無所不知無所不能而極其大也文集曰赤子之心固無巧僞但於理義未能知覺渾然赤子之心而已大人則有知覺擴充之功而無巧僞安排之鑿故曰不失著箇不失字便是不同處語録曰大人無所不知無所不能赤子無所知無所能此兩句正相拗如何無所不知無所不能却是不失其無所知無所能做出蓋赤子之心純一無僞而大人之心亦純一無僞但赤子是無知覺底純一無僞大人是有知覺底純一無僞又曰大人事事理㑹得只是無許多巧僞曲折便是赤子之心輔氏曰大人之心通乎動靜體用兼全譬如明鏡萬物畢照應變無窮赤子之心雖已發動而去本未逺固不能如大人之通逹萬變也純一無僞而已然大人之所以為大者正以其不為物欲所誘而有以全其純一無僞之本然由是而致知格物擴而充之至於無所不知無所不能以極其德之大耳夫不失其本之一而能極其用之妙者大人之事也溺於巧僞之末而遂失其純一之本然者細人之事也孟子曰養生者不足以當大事惟送死可以當大事養去聲事生固當愛敬然亦人道之常耳至於送死則人道之大變孝子之事親舍是無以用其力矣故尤以為大事而必誠必信不使少有後日之悔也輔氏曰此指孝子之誠心而言之也孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逄其原故君子欲其自得之也造七到反造詣也深造之者進而不已之意語録曰是日日恁地做又曰所謂深造者當知非淺迫所可致若欲淺迫求之便是強探力取只是既下工夫又下工夫直是深造道則其進為之方也語録曰是事事皆要得合道理輔氏曰道猶道路之道適燕則有適燕之道適越則有適越之道求仁則有求仁之道為義則有為義之道資猶藉也語録曰資有資藉之意又曰資字恰似資給資助一般左右身之兩旁言至近而非一處也逄猶值也原本也水之來處也語録曰若原頭深則源源來不竭若淺時則易竭矣言君子務於深造而必以其道者欲其有所持循以俟夫默識心通自然而得之於己也或問此一節曰學是理則必是理之得於身也不得於身則口耳焉而已矣然又不可以強探而力取也必其深造之以道然後有以默識心通而自然得之也蓋造道之不深者用力於皮膚之外而責效於日月之間不以其道者從事於虛無之中而妄意於言意之表是皆不足以致夫默識心通之妙而自得之必也多致其力而不急其功必務其方而不躐其等則雖不期於必得而其自然得之將有不可禦者矣輔氏曰且以求仁言之君子而深造乎仁必自求仁之道然後有所持循進進不己乃可俟其工夫至到而默識心通不假思惟而自然得之於己此正所謂亦在乎熟之而已也自得於己則所以處之者安固而不搖或問此一節曰未得之則固無可居之地得而不出於自然則雖有所居而不安惟自得之則理之在我者吾皆得以居之如人有室廬之安動作起居種種便適自眷戀而不去也輔氏曰既能自得於己則道已為我所有矣故處之安而無臲甈之虞處之固而無搖奪之患外物不能移橫議不能惑矣處之安固則所藉者深逺而無盡或問此一節曰未得其所居則無所藉以為用居而未安則其所藉以為用者淺迫而易窮惟居之安則理之在我者吾皆得藉以為用而無窮如富人蓄積之多金珠穀帛無求不獲見其出而不見其盡也輔氏曰所得在我而處之既安則所藉以為用者深逺浩博取之而無盡酌之而不竭也所藉者深則日用之間取之至近無所往而不值其所資之本也或問此一節曰無所資者固無本之可求資之淺者取之艱逺而或值或不值也惟資之深者不待逺求而所取無不得如既取諸其身之左而值其所資之本又取其身之右而復值其所資之本以水譬之茍其源之盛則滔滔汨汨不舍晝夜或泝或沿無不值其來處輔氏曰所藉者深逺而無盡則日用常行之處頭頭上明物物上顯在谷滿谷在坑滿坑雖取之至近而非一而其所資之本無所往而不相值矣程子曰學不言而自得者乃自得也有安排布置者皆非自得也然必潜心積慮優游厭飫於其間然後可以有得若急迫求之則是私己而已終不足以得之也語録曰道理本自廣大只是潛心積慮緩緩養將去自然透熟若急迫求之則是起意去趕趂他只是私意而已安足以入道又曰必須以道方可潛心積慮優游厭飫做甚底輔氏曰此纂集程子三說合而為一非親到自得之境者安能言此以覺人也自得如子貢悟性天之不可聞曽子唯吾道一貫之語此何待於言語而後見正張子所謂德性之知不萌於聞見者也豈容更有所安排布置哉蓋其平日潛心積慮優而遊之厭而飫之全身在義理之中及其真積力久理與心融物與性㑹然後可以有得若有一豪急迫之意便是私已與道便自間斷更如何到得自得田地孟子曰博學而詳說之將以反說約也言所以博學於文而詳說其理者非欲以誇多而鬬靡也欲其融㑹貫通有以反而說到至約之地耳輔氏曰文謂詩書六藝之文理謂詩書六藝所載許多道理也常人之博學詳說者則欲以夸多鬬靡耳若夫為已之學則不然所以博學於文詳說其理者蓋欲其心理融㑹貫通事物然後反而說到至約之地蓋必極其大然後中可求盡其博與詳然後約可說唯能如此然後可說一以貫之也蓋承上章之意而言輔氏曰博學詳說則是深造之意也反說約則是自得之事也但上章以行言此章以知言知與行蓋互相發也學非欲其徒博而亦不可以徑約也輔氏曰徒博則泛而荒唐徑約則亟而寡陋孟子曰以善服人者未有能服人者也以善養人然後能服天下天下不心服而王者未之有也服人者欲以取勝於人養人者欲其同歸於善蓋心之公私小異而人之嚮背頓殊學者於此不可以不審也文集曰以善服人者惟恐人之進於善如張華之對晉武帝恐吳人更立令主則江南不可取之類是也以善養人者惟恐人之不入於善若湯之事葛遺之牛羊又使人往為之耕是也輔氏曰以力服人以德服人其不同易見至於以善服人以善養人其不同則難見也孟子之言至此則愈密矣以德服人以力服人以事言也以善服人以善養人以心言也以善服人者以善為己私也以善養人者以善為天下之公也樂與人為善者也孟子曰言無實不祥不祥之實蔽賢者當之或曰天下之言無有實不祥者惟蔽賢為不祥之實或曰言而無實者不祥故蔽賢為不祥之實二說不同未知孰是疑或有闕文焉愚謂祥下若有者字則當從前說言下若有而字則當從後說至於蔽賢為不祥之實則一也徐子曰仲尼亟稱於水曰水哉水哉何取於水也亟去吏反亟數也水哉水哉歎美之辭孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾舍放皆去聲原泉有原之水也混混湧出之貌不舍晝夜言常出不竭也盈滿也科坎也言其進以漸也放至也言水有原本不已而漸進以至于海如人有實行則亦不已而漸進以至于極也茍為無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之澮古外反涸下各反聞去聲集聚也澮田間水道也涸乾也如人無實行而暴得虛譽不能長久也聲聞名譽也情實也恥者恥其無實而將不繼也林氏曰徐子之為人必有躐等干譽之病故孟子以是答之鄒氏曰孔子之稱水其旨微矣孟子獨取此者自徐子之所急者言之也孔子嘗以聞達告子張矣達者有本之謂也聞則無本之謂也然則學者其可以不務本乎輔氏曰此章指意都結在後兩句上故集注只以虛名實行為言而引林氏鄒氏之說以明之蓋孟子之意專欲救徐子蠟等干譽之病耳孔子之稱水固不專在此也然由是觀之雖一物具一理然亦隨人所取如何耳理固無盡也逹者有本謂質直而好義聞者無本謂色取仁而行違耻其無實而將不繼者羞惡之良心也能如是則既知本而能務實矣不以是為恥則失其本心亦將何所不至哉今人每見人來獻諂諛則必有慚愧之心此正是聲聞過情羞惡之心發處最好察孟子曰人之所以異於禽獸者幾希庶民去之君子存之幾希少也庶衆也人物之生同得天地之理以為性同得天地之氣以為形其不同者獨人於其間得形氣之正而能有以全其性為少異耳雖曰少異然人物之所以分實在於此衆人不知此而去之則名雖為人而實無以異於禽獸君子知此而存之是以戰兢惕厲而卒能有以全其所受之理也語録曰存是存其所以異於禽獸之道理今自謂能存只是存其與禽獸同者飢食渴飲之類皆其與禽獸同者耳真氏曰人之與物相去亦逺矣而孟子以為幾希者蓋人物均有一心然人能存而物不能存所不同者惟此而已人類之中有凡民者亦有是心而不能存是即禽獸也惟存之所以異於物耳舜明於庶物察於人倫由仁義行非行仁義也物事物也明則有以識其理也人倫說見前篇察則有以盡其理之詳也語録曰察深於明明只是大概明得這箇道理爾輔氏曰明只是知故以識字解之至於察則便帶行底意思故以盡其詳言之物理固非度外而人倫尤切於身故其知之有詳略之異輔氏曰天下無性外之物故凡物之理皆非在吾度外至於人倫則又是吾身至親切事故其所知自然有明與察詳與略之異然非特知之如此至於行亦如此親親而仁民仁民而愛物此則行之詳略也在舜則皆生而知之也輔氏曰此言舜乃是生知之聖人所以言知之事也由仁義行非行仁義則仁義已根於心而所行皆從此出非以仁義為美而後勉強行之所謂安而行之也輔氏曰由仁義行非行仁義所以言行之事也知既生知則行自安行真氏曰由仁義行則身與理一行仁義則身與理二此則聖人之事不待存之而無不存矣尹氏曰存之者君子也存者聖人也君子所存存天理也由仁義行存者能之輔氏曰尹氏說精確而平易辨君子聖人之分量尤為明切真氏曰存之者猶待於用力舜則身即理理即身渾然無間而不待於用力孟子曰禹惡旨酒而好善言惡好皆去聲戰國䇿曰儀狄作酒禹飲而甘之曰後世必有以酒亡其國者遂疏儀狄而絶旨酒書曰禹拜昌言輔氏曰惡㫖酒則物欲不行好善言則天理昭著湯執中立賢無方執謂守而不失中者無過不及之名方猶類也立賢無方惟賢則立之於位不問其類也輔氏曰執中則處義精審立賢無方則用人無間文王視民如傷望道而未之見而讀為如古字通用民已安矣而視之猶若有傷道已至矣而望之猶若未見聖人之愛民深而求道切如此不自滿足終日乾乾之心也或問以而為如亦有據乎曰詩曰垂帶而厲鄭箋云而亦如也此以而為如也春秋星隕如雨左氏曰與雨偕也此以如為而也則其混讀而互用之久矣曰是則然矣然其曰求道之切者恐非所以言聖人之心也奈何曰為是說者正以其德為聖人而心不自足如此是乃所以深明聖人之心也且子胡不以視民如傷者例而觀之乎夫文王之民固己無凍餒者矣而視之猶若有傷則其於道雖己與之為一亦何害其望之如未見哉輔氏曰民巳安而視之猶若有傷則愛民深切道已至而望之猶若未見則與道無窮武王不泄邇不忌逺泄狎也邇者人所易狎而不泄逺者人所易忌而不忌德之盛仁之至也或問有謂武王之不泄邇不忘逺非仁也勢不得不然也信乎曰此以世俗計較利害之私心窺度聖人者之言也聖人之心所以異於衆人者以其大公至正周流貫徹無所偏倚雖以天下之大萬物之多而視之無異於一身爾是以其於人之痾癢疾痛無有不知而所以按摩而抑搔之者無有不及此武王之不泄邇不忘逺所以為德之盛而仁之至也今曰迫於勢而非仁則不知其視聖人之心為如何而指所謂仁者為何物哉輔氏曰於人所易狎而不泄則敬心常存於人所易忘而不忘則誠心不息周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦三王禹也湯也文武也四事上四條之事也時異勢殊故其事或有所不合思而得之則其理初不異矣坐以待旦急於行也輔氏曰周公思兼三王則其於道也備矣以施四事則其於事也周矣於道也備所以成己於事也周所以及人有道然後能制事成己然後能及人且聖人之事同一軌轍安得有異而云其有不合者蓋以時異勢殊故其施之或有未宜行之或有未當然盡誠以思思之而通慮之而得則其事雖有時措從宜而其理亦初無有異坐以待旦則可見其知無不行行無不時舉而措之天下之民謂之事業者有不可失其幾者也此承上章言舜因歷叙羣聖以繼之而各舉其一事以見其憂勤惕厲之意蓋天理之所以常存而人心之所以不死也語録曰讀此一篇使人心惕然而常存也輔氏曰集注謂各舉其一事以見其憂勤惕厲之意者是矣而於其末又言周公所以備道以制事遭變以濟時皇皇汲汲不巳之誠如此學者茍能深體而默識之則聖人之心與理昭昭常存不死而在吾心目之間矣程子曰孟子所稱各因其一事而言非謂武王不能執中立賢湯却泄邇忌逺也人謂各舉其盛亦非也聖人亦無不盛輔氏曰程子恐後人執孟子之言而疑聖人於道互相得失故發明如此又曰聖人造道之極凡有所為無不各極其至豈容更以盛不盛言哉孟子曰王者之迹熄而詩亡詩亡然後春秋作王者之迹熄謂平王東遷而政教號令不及於天下也詩亡謂黍離降為國風而雅亡也語録曰王者之政存則禮樂征伐自天子出故雅之詩自作於上以教天下王迹滅熄則禮樂征伐不自天子出故雅之詩不復作於上而詩降而為國風問恐是孔子删詩之時降之曰亦是他當時自如此要識此詩便如周南召南當如在鎬豐之時其詩為二南後來在洛邑之時其詩為黍離只是自二南進而為二雅自二雅退而為王風二南之於二雅譬如登山到得黍離時節便是下坡了春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年也晉之乘楚之檮杌魯之春秋一也乘去聲檮音逃杌音兀乘義未詳趙氏以為興於田賦乘馬之事或曰取記載當時行事而名之也檮杌惡獸名古者因以為凶人之號取記惡垂戒之義也輔氏曰古人以善為常多不記載以惡為反常故特記之如堯典之末只載胤朱兜共鯀數子而已以楚史記之名觀之則楚雖夷蠻猶有古人遺意後世之人負大罪惡於身而初不知愧恥及一有小善則沾沾自喜以為莫己若者亦可哀已春秋者記事者必表年以首事年有四時故錯舉以為所記之名也古者列國皆有史官掌記時事此三者皆其所記冊書之名也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣春秋之時五霸迭興而桓文為盛史史官也竊取者謙辭也公羊傳作其辭則丘有罪焉爾意亦如此蓋言斷之在已所謂筆則筆削則削游夏不能贊一辭者也尹氏曰言孔子作春秋亦以史之文載當時之事也而其義則定天下之邪正為百王之大法輔氏曰夫子之作春秋不過以史之文載當時之事而已而其竊取之義則在於定天下之邪正為百王之大法也夫春秋善善惡惡撥亂世而反之正上明四代之禮樂下示百王之法程聖人之用備見此書而夫子之言則又謙抑如此略無自居其功之意此孟子所以因而述之以繼羣聖之後也此又承上章厯叙羣聖因以孔子之事繼之而孔子之事莫大於春秋故特言之孟子曰君子之澤五世而斬小人之澤五世而斬澤猶言流風餘韻也輔氏曰流風以風喻之也餘韻以聲喻之也父子相繼為一世三十年亦為一世斬絶也大約君子小人之澤五世而絶也輔氏曰父子五世經歷百五十年則君子小人之遺澤皆當絶也楊氏曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣服窮則遺澤寖微故五世而斬輔氏曰五世則親盡服窮其澤亦當斬絶矣蓋親也服也澤也實相因也豫未得為孔子徒也豫私淑諸人也私猶竊也淑善也李氏以為方言是也輔氏曰獨孟子用此二字而他無所見故知是當時方言俗語耳人謂子思之徒也自孔子卒至孟子遊梁時方百四十餘年而孟子已老然則孟子之生去孔子未百年也故孟子言豫雖未得親受業於孔子之門然聖人之澤尚存猶有能𫝊其學者故我得聞孔子之道於人而私竊以善其身蓋推尊孔子而自謙之辭也此又承上三章厯叙舜禹至於周孔而以是終之其辭雖謙然其所以自任之重亦有不得而辭者矣愚謂雖是謙辭然其所以自任之重亦有不得而辭者是非孟子之私言也實天下之公論也孟子曰可以取可以無取取傷亷可以與可以無與與傷惠可以死可以無死死傷勇先言可以者略見而自許之辭也後言可以無者深察而自疑之辭也過取固害於亷然過與亦反害其惠過死亦反害其勇蓋過猶不及之意也或問取者貪之屬不取者亷之屬猶與之為惠不與之為嗇死之為勇不死之為怯也今以過取者為傷於亷則宜以不與為傷惠不死為傷勇矣而反以與為傷惠死為傷勇何哉曰過取之傷亷過於此而侵奪於彼者也過與之傷惠過死之傷勇過於此而反病乎此者也蓋奪乎彼者其失為易見而病乎此者其失為難知故孟子舉傷亷以例二者亦是孔子過猶不及之意耳語録曰看來可以取是其初略見得如此可以無取是子細審察見得如此下二聫倣此林氏曰公西華受五秉之粟是傷亷也冉子與之是傷惠也子路之死於衛是傷勇也輔氏曰大凡擇善執中最為難事使心粗不得須思慮入於精微方可一有不審則雖孔門髙弟亦或陷於過當之域矣逄蒙學射於羿盡羿之道思天下惟羿為愈已於是殺羿孟子曰是亦羿有罪焉公明儀曰宜若無罪焉曰薄乎云爾惡得無罪逄薄江反惡平聲羿有窮后羿也蔡氏曰窮國名羿窮國君之名也逄蒙羿之家衆也羿善射篡夏自立後為家衆所殺愈猶勝也薄言其罪差薄耳鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乘矢而後反他徒何反矣夫夫尹之夫並音扶去上聲乘去聲之語助也僕御也尹公他亦衛人也端正也孺子以尹公正人知其取友必正故度庾公必不害已小人庾公自稱也金鏃也叩輪出鏃令不害人乃以射也乘矢四矢也孟子言使羿如子濯孺子得尹公他而教之則必無逢蒙之禍然夷羿篡弒之賊蒙乃逆儔庾斯雖全私恩亦廢公義其事皆無足論者孟子蓋特以取友而言耳孟子曰西子蒙不潔則人皆掩鼻而過之西子美婦人蒙猶冒也不潔汚穢之物也掩鼻惡其臭也雖有惡人齊戒沐浴則可以祀上帝齊側皆反惡人醜貌者也尹氏曰此章戒人之喪善而勉人以自新也輔氏曰西子之質本美而蒙以不潔則自喪其美而反致人之惡孟子言此所以戒人之喪其本有之善惡人之質本醜而能齊戒沐浴而至誠自潔則可以祀上帝孟子言此所以勉人以改過自新深玩尹氏之言令人惕然而懼聳然而作孟子曰天下之言性也則故而已矣故者以利為本性者人物所得以生之理也故者其已然之跡若所謂天下之故者也語録曰性自是箇難言底物事惟惻隱羞惡之類却是已發見者乃可得而言只看這箇便見得性故集注下箇迹字又曰故是箇已發見底物事便分明易見又曰故只是已然之迹如水之潤下火之炎上便是故也父子之所以親君臣之所以義夫婦之别長幼之序然皆有箇已然之迹又曰故字若不將已然之迹言之則下文茍求其故之言如何可推利猶順也語其自然之勢也語録曰利是不假人為而自然者如水之就下是其性本就下只得順他若激之在山是不順其性而以人為之也如無惻隱之心非人無羞惡之心非人皆是自然而然惟智者知得此理不假人為順之而行言事物之理雖若無形而難知然其發見之已然則必有迹而易見輔氏曰理即性也雖曰無形而難知然不能不感發而形見於外既已形見則必有迹而易見也又曰如仁之性雖難知然其見赤子入井時則㤓惕惻隱發而形見於外是則有迹而易見也故天下之言性者但言其故而理自明輔氏曰如言人性之仁但言其發見而為怵惕惻隱之迹則仁之理自明也猶所謂善言天者必有驗於人也輔氏曰此天字指天道而言天道無形而難知而其發動處則形而為人即其所以為人者而驗之則知其所以為天者矣然其所謂故者又必本其自然之勢如人之善水之下非有所矯揉造作而然者也若人之為惡水之在山則非自然之故矣輔氏曰所謂發見已然之迹然亦有遂有順自然而然如人之善水之下者順也凡有所矯揉造作而然如人之為惡水之在山者逆也故言其故者又當以順利為本言其故而不本於自然則以人性為惡水性為上者有矣永嘉陳氏曰善惡皆已然之迹但順者為本則善者其初也惡者非其初也水無有不下者水之本也若夫搏之使過顙激之使在山豈其本也哉所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣惡為皆去聲天下之理本皆順利小智之人務為穿鑿所以失之輔氏曰人物所得之理本皆順理無待於矯揉造作於其間却緣世人不明吾性之智而以私意為智於是每事務為穿鑿而失其順利之理歐陽氏曰言天下事物之理必自夫發見已然之迹者蓋本於天下順利自然之勢也天下事物之理莫不有順利自然之勢又莫不有迹之可驗自其已然之迹而驗之然後實見夫理之自然者為不可易而其穿鑿造作者非徒無益而又害之也禹之治水則因其自然之勢而導之未嘗以私智穿鑿而有所事是以水得其潤下之性而不為害也歐陽氏曰若禹之行水順夫水性之自然而不敢行夫已意之使然此其所以行其所無事也天之髙也星辰之逺也茍求其故千嵗之日至可坐而致也天雖髙星辰雖逺然求其已然之跡則其運有常雖千嵗之久其日至之度可坐而得況於事物之近若因其故而求之豈有不得其理者而何以穿鑿為哉語録曰厯家自今日推算而上極於太古開闢之時更無差錯只為有此已然之迹可以推測耳天與星辰間或躔度有少差錯久之自復其常以利為本亦猶天與星辰循常度而行茍不如此皆鑿之謂也必言日至者造歷者以上古十一月甲子朔夜半冬至為歷元也愚案古者必得甲子朔旦夜半冬至而日月五星皆㑹於子謂之上元以為歷始程子曰此章專為智而發輔氏曰此章先儒多只就性上說故皆失之鑿唯程子以為此章專為智而設然後其義可明愚謂事物之理莫非自然順而循之則為大智若用小智而鑿以自私則害於性而為不智輔氏曰害於性者應前水得潤下之性而言也蓋性本順利若不順其本然之理而求之則反害其性也歐陽氏曰天下之大智無所自為而常因天下之理天下之小智不知循理而常在一已之私程子之言可謂深得此章之旨矣公行子有子之喪右師往弔入門有進而與右師言者有就右師之位而與右師言者公行子齊大夫右師王歡也孟子不與右師言右師不恱曰諸君子皆與歡言孟子獨不與歡言是簡歡也簡略也孟子聞之曰禮朝廷不歷位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎朝音潮是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪涖其禁令序其事故云朝廷也歷更涉也位他人之位也右師未就位而進與之言則右師歷已之位矣右師已就位而就與之言則已歷右師之位矣孟子右師之位又不同階孟子不敢失此禮故不與右師言也孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心以仁禮存心言以是存於心而不忌也語録曰問是本有此仁禮只要常存而不忌否曰非也他這箇從存心上說下來言君子所以異於小人者以其存心不同耳君子則以仁以禮而存之於心小人則以不仁不禮而存之於心這箇存心與存其心養其性底不同輔氏曰以仁存心而不忌如造次顚沛必於是也以禮存心而不忌如視聽言動必以禮也仁者愛人有禮者敬人此仁禮之施輔氏曰由乎內以施外也愛人者人恆愛之敬人者人恆敬之此仁禮之驗輔氏曰獲乎外以驗於內也有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物奚宜至哉橫去聲下同橫逆謂強暴不順理也輔氏曰強暴橫也不順理逆也物事也其自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠由與猶同下放此忠者盡已之謂我必不忠恐所以愛敬人者有所不盡其心也輔氏曰理無窮盡人有作輟一息不存一物不體便是不盡其心自反而忠矣其橫逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉難去聲奚擇何異也又何難焉言不足與之校也是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可𫝊於後世我由未免為鄉人也是則可憂也憂之如何如舜而已矣若夫君子所患則亡矣非仁無為也非禮無行也如有一朝之患則君子不患矣夫音扶鄉人鄉里之常人也君子存心不茍故無後憂愚謂不茍二字不可淺看心一不存而不自覺不自強便是茍且也禹稷當平世三過其門而不入孔子賢之事見前篇顔子當亂世居於陋巷一簞食一瓢飲人不堪其憂顔子不改其樂孔子賢之食音似樂音洛孟子曰禹稷顔回同道聖賢之道進則救民退則修已其心一而已矣輔氏曰道則以其所行言之也心則以其所存言之也救民者修已之驗修己者救民之本有是心則有是道有是本則有是驗禹思天下有溺者由已溺之也稷思天下有飢者由已飢之也是以如是其急也由與猶同禹稷身任其職故以為已責而救之急也輔氏曰禹稷既委質以事舜而以身任拯溺救飢之責故視斯民之有飢溺者猶已使之飢溺是以救之如是其急所以盡其職分也禹稷顔子易地則皆然聖賢之心無所偏倚隨感而應各盡其道故使禹稷居顔子之地則亦能樂顔子之樂使顔子居禹稷之任亦能憂禹稷之憂也輔氏曰聖賢之心其本然之體停停當當直上直下無所偏無所倚此其所謂中者天下之大本也然不能不感於物故隨感而應有可喜之事感則喜心便應有可怒之事感則怒心便應如進則便須救民退則便須修已皆吾大本中自然之禮無或過無或不及各盡其道此其所謂和者天下之逹道也如是故使禹稷居顔子之地亦能樂顔子之樂使顔子居禹稷之任亦能憂禹稷之憂同一大本同一逹道故也今有同室之人鬭者救之雖被髮纓冠而救之可也不暇束髮而結纓往救言急也以喻禹稷鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也喻顔子也此章言聖賢心無不同事則所遭或異然處之各當其理是乃所以為同也輔氏曰聖賢之心無不同一本也事則所遭或異萬殊也然處之各當其理是乃所以為同者所謂萬殊一本吾道一以貫之也尹氏曰當其可之謂時前聖後聖其心一也故所遇皆盡善輔氏曰事雖萬殊心一以貫則凡所以語默云為皆逹道也皆時中也豈復有不盡善者哉公都子曰匡章通國皆稱不孝焉夫子與之遊又從而禮貌之敢問何也匡章齊人通國盡一國之人也禮貌敬之也輔氏曰禮貌猶所謂文貌謂其容貌有禮文也人心才敬則見人便自有禮貌也孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬬很以危父母五不孝也章子有一於是乎好養從皆去聲很胡懇反戮羞辱也很忿戾也夫章子子父責善而不相遇也夫音扶遇合也相責以善而不相合故為父所逐也責善朋友之道也父子責善賊恩之大者賊害也朋友當相責以善父子行之則害天性之恩也夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子已矣夫章之夫音扶為去聲屏必井反養去聲言章子非不欲身有夫妻之配子有子母之屬但為身不得近於父故不敢受妻子之養以自責罰其心以為不如此則其罪益大也此章之旨於衆所惡而必察焉可以見聖賢至公至仁之心矣輔氏曰衆惡之必察焉此孔子之明訓也而孟子之意正如此故可以見其至公至仁之心至公則無有私蔽於己至仁則不忍苛責於人必能至公然後能至仁必能至仁然後能至公楊氏曰章子之行孟子非取之也特哀其志而不與之絶耳語録曰孟子之於匡章蓋憐之耳非取其孝也據章之所為固責善於父而不相遇遂為父所逐雖是父不是已是然便至如此出妻屏子終身不養則豈得為孝故孟子言父子責善賊恩之大者此便是責之以不孝也但其不孝之罪未至於可絶之地耳然當時人則遂以為不孝而絶之故孟子舉世俗之不孝者五以曉之若如此五者則誠在所絶耳後世因孟子不絶之則又欲盡雪章子之不孝而以為孝此皆不公不正倚於一偏必若孟子之所處然後可以見聖賢至公至仁之心矣曽子居武城有越寇或曰寇至盍去諸曰無寓人於我室毁傷其薪木寇退則曰修我牆屋我將反寇退曽子反左右曰待先生如此其忠且敬也寇至則先去以為民望寇退則反殆於不可沈猶行曰是非汝所知也昔沈猶有負芻之禍從先生者七十人未有與焉與去聲武城魯邑名盍何不也左右曽子之門人也忠敬言武城之大夫事曽子忠誠恭敬也為民望言使民望而效之沈猶行弟子姓名也言曽子嘗舍於沈猶氏時有負芻者作亂來攻沈猶氏曽子率其弟子去之不與其難言師賔不與臣同輔氏曰師則父行也賔則兄行也故與為人臣者不同父兄則當尊也臣則比二者為微矣君之所以待三者固異而三者之所以自處亦不同也子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守言所以不去之意如此孟子曰曽子子思同道曽子師也父兄也子思臣也微也曽子子思易地則皆然微猶賤也尹氏曰或逺害或死難其事不同者所處之地不同也君子之心不繫於利害惟其是而已故易地則皆能為之輔氏曰曽子率子弟而去之是逺害也子思雖無死難之事然寇至不去則有死難之理也其事如此不同者蓋以曽子則處師賔之地而子思則處為臣之地有不同焉故也君子之心不論事之利與害唯顧理之是者則為之耳故雖易地而處皆能為其所當然者若其心一繫於利害則有隕穫而無安裕有茍且而無詳允為臣而死難者處賔師之地則或不能逺乎害為師賔而逺害者處為臣之地則或不能死于難變動遷徙或至於倒行逆施而不自知也孔氏曰古之聖賢言行不同事業亦異而其道未始不同也學者知此則因所遇而應之若權衡之稱物低昂屢變而不害其為同也輔氏曰古人言行事業皆就其所遇之時所處之地為之故各自不同至於道則一而已惟歸于是耳學者知此則隨所遇之時因所遇之地而應之如權衡之稱物物有輕重之不同則衡有低昂之或異我則進退其權以取平焉豈有不同者哉儲子曰王使人瞷夫子果有以異於人乎孟子曰何以異於人哉堯舜與人同耳瞷古莧反儲子齊人也瞷竊視也聖人亦人耳豈有異於人哉輔氏曰謂聖人亦人耳所以先解堯舜與人同一句然後却言豈有異於人逆而解之意愈明白雖然堯舜不獨與人同其形至於其心所具之理則亦與人無異也孟子之言固兼舉之矣齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻告其妾曰良人出則必饜酒肉而後反問其與飲食者盡富貴也而未嘗有顯者來吾將瞷良人之所之也蚤起施從良人之所之遍國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也其妻歸告其妾曰良人者所仰望而終身也今若此與其妾訕其良人而相泣於中庭而良人未之知也施施從外來驕其妻妾施音迤又音易墦音燔施施如字章首當有孟子曰字闕文也良人夫也饜飽也顯者富貴人也施邪施而行不使良人知也墦冢也顧望也訕怨詈也施施喜恱自得之貌由君子觀之則人之所以求富貴利達者其妻妾不羞也而不相泣者幾希矣孟子言自君子而觀今之求富貴者皆若此人耳使其妻妾見之不羞而泣者少矣言可羞之甚也趙氏曰言今之求富貴者皆以枉曲之道昏夜乞哀以求之而以驕人於白日與斯人何以異哉孟子纂疏卷八
