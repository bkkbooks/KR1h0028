body:
  text: 欽定四庫全書論語纂疏卷六宋趙順孫撰朱子集注先進第十一此篇多評弟子賢否愚謂評其賢則能者勸評其否則不能者勉無非教也然此篇所及其稱賢者蓋三倍於否亦足以見賢之衆矣凡二十五章胡氏曰此篇記閔子騫言行者四而其一直稱閔子疑閔氏門人所記也子曰先進於禮樂野人也後進於禮樂君子也先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也程子曰先進於禮樂文質得宜今反謂之質朴而以為野人後進於禮樂文過其質今反謂之彬彬而以為君子蓋周末文勝故時人之言如此不自知其過於文也語録曰問先進後進禮樂文質何以不同曰禮樂只是一箇禮樂用得自不同如升降揖遜古人只是誠實行許多威儀後人便忒好看古人只是正容謹節後人便近於巧言令色如古樂雖不可得而見只如誠實底人彈琴便雍容平淡自是好聽若弄手弄腳撰出無限不好底聲音只是繁碎耳如用之則吾從先進用之謂用禮樂輔氏曰言若當職任而用夫禮樂也孔子既述時人之言又自言其如此蓋欲損過以就中也黃氏曰野人君子安知非夫子之言從先進安知非損文從質邪曰聖人用禮樂當以中為尚不得已而遵時王之制則當以從周為貴不應捨君子而從野人也況前輩於禮樂亦未嘗主於質後單於禮樂又安能皆得中邪輔氏曰時俗易得逐流而徇末聖人常欲損過以就中聖人之所以轉移風俗者其過化存神之妙雖未易窺測至於損過就中之用則有不可易者子曰從我於陳蔡者皆不及門也從去聲孔子嘗厄於陳蔡之間弟子多從之者此時皆不在門故孔子思之蓋不忘其相從於患難之中也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏行去聲弟子因孔子之言記此十人或問何以知門人所記曰凡稱名者夫子之辭弟子師前相謂之辭稱字者弟子自相謂之辭亦或弟子門人之辭而并目其所長分為四科孔子教人各因其材於此可見或問四科之目曰德行者潛心體道默契於中篤志力行不言而信者也言語者善為辭令者也政事者達於為國治民之事者也文學者學於詩書禮樂之文而能言其意者也蓋夫子教人使各因其所長以入於道然其序則必以德行為先誠以躬行實造具體聖人學之所貴尤在於此非若三者為一事之長而已也黃氏曰注云教人各因其材或問云教人各因所長以入教人之法當先使之切己務內而今乃因言語政事而入何也曰聖門問答之間或及言語或及政事皆在所不廢耳非捨夫切己務內而專事夫言語政事也四科之目蓋亦因其所得而稱之舉其最優者而為言也非言其所學從入之路也程子曰四科乃從夫子于陳蔡者爾門人之賢者固不止此曽子傳道而不與焉故知十哲世俗論也輔氏曰夫子之門如此十人者固髙矣然受業身通者凡七十人則豈獨此十人可名為哲哉故程子引曽子以為證而斷十哲為世俗之論所以教學者使求於聖人之門不敢止此十人也子曰回也非助我者也於吾言無所不說說音恱助我若子夏之起豫因疑問而有以相長也輔氏曰聖人之心義理昭融固不因人之問而後有所知亦不以人之不問而遂有所昧顧豈有待於學者之助哉然疑而問問而益得以發其精微若子夏之起豫則亦不能無也顔子於聖人之言默識心通無所疑問故夫子云然胡氏曰顔子資稟髙明功夫深熟一聞夫子之言默識心融觸處洞然不待問辨而曉然如見其辭若有憾焉其實乃深喜之胡氏曰以非助我而言似有不足於顔子之意謂其無所不說則凡精凡粗若巨若細莫不歡然領受而略無豪髮之疑矣胡氏曰夫子之於回豈真以助我望之蓋聖人之謙德又以深贊顔子云爾輔氏曰胡氏說是矣然亦非都無事實而但為是辭也此又不可不知子曰孝哉閔子騫人不閒於其父母昆弟之言閒去聲胡氏曰父母兄弟稱其孝友人皆信之無異詞者蓋其孝友之實有以積於中而著於外故夫子歎而美之輔氏曰父母昆弟稱其孝友者固有之矣然或溺於愛蔽於私則誠否未可知也至於人皆信之無有閒言則誠著而德章矣胡氏曰案韓詩外傳閔子父再娶生三子繼母獨以蘆花衣子騫父覺之欲逐其妻子騫曰母在一子寒母去三子單母得免逐其母聞之待之均平遂成慈母令誦其言藹然惻怛之意溢於詞表故內則有以孚其家外則有以孚於人自內及外無有異詞也南容三復白圭孔子以其兄之子妻之三妻並去聲詩大雅抑之篇曰白圭之玷尚可磨也斯言之玷不可為也南容一日三復此言事見家語蓋深有意於謹言也語録曰不是一旦讀此乃是日日讀之玩味此詩而欲謹言也黃氏曰三復謂每誦至此必再三反復以識之非謂一次三復亦非謂一日三次誦之也此邦有道所以不廢邦無道所以免禍故孔子以兄子妻之范氏曰言者行之表行者言之實未有易其言而能謹於行者南容欲謹其言如此則必能謹其行矣輔氏曰言行表裏之符也固未有易其言而能謹於行者但言出於口而又未遽有實故人之易其言者常多行履於身而其失易為人所指擲故人之忽於行者差少南容能謹於人之所易則於人之所不敢忽者必能謹之矣季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡好去聲范氏曰哀公康子問同而對有詳略者臣之告君不可不盡若康子者必待其能問乃告之此教誨之道也輔氏曰哀公康子問同而對有詳略聖人一言之閒輕重等則有截然不可亂者顔淵死顔路請子之車以為之椁顔路淵之父名無繇少孔子六嵗孔子始教而受學焉椁外棺也詩為椁欲賣車以買椁也子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也鯉孔子之子伯魚也先夫子卒言鯉之才雖不及顔淵然已與顔路以父視之則皆子也孔子時已致仕尚從大夫之列言後謙辭胡氏曰孔子遇舊館人之喪嘗脫驂以賻之矣今乃不許顔路之請何邪葬可以無椁驂可以脫而復求大夫不可以徒行命車不可以與人而鬻諸市也且為所識窮乏者得我而勉强以副其意豈誠心與直道哉語録曰禮記言大夫賜命車輔氏曰葬之禮椁周於棺宜也然貧不能具則椁亦可廢車之制驂參於服宜也然欲輟而用則驂或可脫若大夫而徒行命車而與人使鬻諸市此義理之必不可者也若為所識我者之窮乏而欲得於我我故勉強而與之以副其意如此則非誠心與直道也出於勉強則非誠心副人之意則非直道此豈安於仁者之事哉義之所可則脫驂以賻舊館之喪而不吝義所不可則雖於顔子之厚而不從其父為椁之請此可見聖人處事之權衡或者以為君子行禮視吾之有無而已夫君子之用財視義之可否豈獨視有無而已哉輔氏曰蘇氏於常人之情每得之至義理之正大則多所不及非有以辨之則學者將惑於其說局於事而不究其理此非小失也顔淵死子曰噫天喪豫天喪豫喪去聲噫傷痛聲悼道無傳若天喪已也黃氏曰顔子在則夫子雖死而不亡以道存也顔子死則夫子雖存道既無傳終亦必亡而已矣故以顔子之死而為已之喪也顔淵死子哭之慟從者曰子慟矣從去聲慟哀過也胡氏曰過不可有然此非過也哭至於慟發而中節矣曰有慟乎哀傷之至不自知也非夫人之為慟而誰為夫音扶為去聲夫人謂顔淵言其死可惜哭之冝慟非他人之比也胡氏曰痛惜之至施當其可皆情性之正也顔淵死門人欲厚葬之子曰不可喪具稱家之有無貧而厚葬不循理也故夫子止之門人厚葬之蓋顔路聽之輔氏曰此與請車弗從事異而理同顔路請車為椁溺於愛也夫子不遂許之裁以義也夫子止門人之厚葬蔽以理也顔路從而聽之牽於私也聖庸之所以分天理人欲之閒而已子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也歎不得如葬鯉之得冝以責門人也黃氏曰門人違夫子之言而厚葬尊賢敬友之情厚也夫子不以情勝理故以此責之所謂愛人以德而不以姑息也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死焉於䖍反問事鬼神蓋求所以奉祭祀之意而死者人之所必有不可不知皆切問也輔氏曰祭祀之意非精義不足以究其說非體道不足以致其義此固學者之所當講求也又曰有生必有死其為變亦大矣醉生夢死者固不知求學者其可不求以知之乎此格物之大者子路之問可謂切矣然亦未免傷於剛勇故於道有强探力取略其所易知而遽欲求其所難知之病然非誠敬足以事人則必不能事神輔氏曰誠則有物敬則有禮有物有禮則內外兩盡矣此事人事神之大務也使在我之誠敬明猶不足以事人則幽而鬼神其何能事之乎非原始而知所以生則必不能反終而知所以死輔氏曰生死者氣之聚散耳儻不能推原於前而知氣聚故生則必不能反要於後而知氣散故死也蓋幽明始終初無二理但學之有序不可躐等故夫子告之如此輔氏曰人鬼雖有幽明之分生死雖有始終之辨然其理則未嘗有二也學者當有序若未能事人而遽求事神未知其生而遽欲知死則是躐等故夫子之告子路者如此程子曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也語録曰有是理則有是氣有是氣則有是理氣則二理則一輔氏曰盡夜者氣之明晦也死生者氣之聚散也故盡夜之道即死生之道也明則有晦聚則有散理之自然也一而二者人鬼死生雖是一理而有幽明始終之不同二而一者雖有幽明始終之不同而其理則未嘗有二也永嘉陳氏曰死生人鬼雖幽明之事了不相關然天地閒不過聚散陰陽屈伸聚則生散則死伸為人屈為鬼有聚必有散有伸必有屈理一而分則殊分殊而理則一非微眇不可信之事也蔡氏曰人鬼死生雖二而一不過一氣之屈伸而已但屈者幽而不可見伸者明而易行易知茍能盡理以事人及其至也不可度者亦可得而格之矣茍能窮察乎其生之所以然及其至也不可得而知者亦可從而識之矣夫子教人以可見者致其不可見者非聖人孰能如是乎又曰事人事鬼以心言知生知死以理言然人鬼生死之理雖一但既是人便與鬼不同既是生便與死不同故曰一而二然雖是二又是一理故曰二而一或言夫子不告子路不知此乃所以深告之也閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂誾侃音義見前篇行胡浪反樂音洛行行剛强之貌語録曰行行是大故發露得粗底子樂者樂得英材而教育之若由也不得其死然尹氏曰子路剛強有不得其死之理故因以戒之其後子路卒死於衛孔悝之難蔡氏曰子路侍夫子之側行行如此於他人可知故夫子謂其不得其死庶幾子路知之而能變其氣質也子路終不能變果死於孔悝之難惜哉洪氏曰漢書引此句上有曰字或云上文樂字即曰字之誤輔氏曰子樂之說雖有意味然反不若子曰之為協於文勢也魯人為長府長府藏名藏貨財曰府為蓋改作之閔子騫曰仍舊貫如之何何必改作仍因也貫事也王氏曰改作勞民傷財在於得已則不如仍舊貫之善王氏名安石臨川人輔氏曰古人改作必不得已者也改作府藏意必有可已而不已者故子騫以是諷之子曰夫人不言言必有中夫音扶中去聲言不妄發發必當理唯有德者能之子曰由之瑟奚為於丘之門程子曰言其聲之不和與己不同也家語云子路鼓瑟有北鄙殺伐之聲蓋其氣質剛勇而不足於中和故其發於聲者如此輔氏曰形氣聲音之相符自然之理也凡物皆然顧人弗之察耳聖人明睿所照物無遁情又烏有不知者哉門人不敬子路子曰由也升堂矣未入於室也門人以夫子之言遂不敬子路故夫子釋之升堂入室喻入道之次第言子路之學已造乎正大髙明之域特未深入精微之奧耳輔氏曰升堂入室乃入道次第之譬喻堂以喻夫正大髙明之域室以踰夫精微之奧子路剛明其於道之髙明正大處固己造之矣然其粗率之意未除故於導之精微深奧處則未能有所入耳觀其結纓而死與程子謂其有堯舜氣象則其能造於髙明正大之域可知至於以正名為迂而不知食輒之食為非義之類是未能深入精微之奧也未可以一事之失而遽忽之也子貢問師與商也孰賢子曰師也過商也不及子張才髙意廣而好為茍難故常過中子夏篤信謹守而規模狹隘故常不及輔氏曰子張才髙而矯亢子夏才短而篤實二子質性正相反才髙故意廣而好為苟難此所以常過乎中才短故篤信固守而規模狹隘此所以常不及乎中過與不及皆生乎氣稟之偏而中則指義理之當然處言也曰然則師愈與與平聲愈猶勝也子曰過猶不及道以中庸為至賢智之過雖若勝於愚不肖之不及然其失中則一也輔氏曰子貢所謂然則師愈與者以才質言也夫子所謂過猶不及者以義理言也以才質論之則賢智之過雖若勝於愚不肖之不及以義理論之則過與不及皆為失中而於道均為未至也尹氏曰中庸之為德也其至矣乎夫過與不及均也差之豪釐繆以千里故聖人之教抑其過引其不及歸於中道而已輔氏曰差之毫氂即謂過與不及也豪氂過乎中則為過豪氂不及乎中則為不及其初蓋甚微也過而不知所以自反則愈過不及而不知所以自勉則愈不及積而久之則相去不啻千里之逺矣聖人之心渾然天理不偏不倚而中持衡焉或抑或揚一進一退無不使之歸於中此古人所以貴親炙之也季氏富於周公而求也為之聚斂而附益之為去聲周公以王室至親有大功位冢宰其富宜矣季氏以諸侯之卿而富過之非攘奪其君刻剝其民何以得此冉有為季氏宰又為之急賦稅以益其富或問冉求學於夫子於門弟子中亦可謂明達者今乃為季氏聚斂何耶曰冉求之失不待於聚斂而後見自其仕於季氏則已失之矣蓋當是時之達官重任皆為公族之世官其下則尺地一民皆非國君之有士唯不仕則己仕則未有不仕於大夫者也冉求亦豈習於衰世之風而不自知其非與然使其仕於季氏而能勸之黜其強僭而忠於公室則庶乎小貞之吉矣今乃反為之聚斂是使權臣愈強而公室愈不振也故孟子以無能改於其德而賦粟倍他日言之蓋不自知其學之未至而以從仕為士之常職是以漸靡而至於此耳曰然則夫子曷為不於其仕季氏而責之也曰聖人以不仕為無義而猶望之以小貞之吉也子曰非吾徒也小子鳴鼓而攻之可也非吾徒絶之也小子鳴鼓而攻之使門人聲其罪以責之也聖人之惡黨惡而害民也如此然師嚴而友親故已絶之而猶使門人正之又見其愛人之無己也輔氏曰師道尊嚴而朋友親昵理固然也聖人愛人終無己天地之心也雖絶之而猶不忘乎愛雖不忘乎愛而事之當絶者又不但已此仁之至義之盡也范氏曰冉有以政事之才施於季氏故為不善至於如此由其心術不明不能反求諸身而以仕為急故也語録曰惟是心術不明到這般所在都不自知又曰他只緣以仕為急故從季氏見他所為如此又拔不出一向從其惡柴也愚柴孔子弟子姓髙字子羔衛人愚者知不足而厚有餘語録曰是一箇謹厚底人不曾見得道理家語記其足不履影啓蟄不殺方長不折執親之喪泣血三年未嘗見齒避難而行不徑不竇可以見其為人矣語録曰如不徑不竇只說安平無事時節若當有冦賊患難如何專守此以殘其軀此柴之所以為愚聖人微服而過宋微服是著那下賤人衣服觀這意如此只守不徑不竇之說不得途中萬一遇大盜賊也須走避那時如何要不由小徑去得然子羔也是守得定若更學到變通處儘好止緣他學有未盡處輔氏曰觀家語所載之事則其質性之厚可知然恐或不免於由之而不知者若知與行俱到則豈遽於顔閔哉參也魯魯鈍也輔氏曰鈍謂遲鈍凡事不能便明了須用工夫乃透程子曰參也竟以魯得之語録曰曽子魯鈍難曉只是他不肯放直是捱得到透徹了方住不似别人只略綽見得些小了便休今一樣敏底見得容易又不能堅守鈍底捱得到略曉得處便說道理止此更不深求惟曽子不肯放舍若這事看未透直是捱得到盡處所以竟得之又曰只曾子資質自得便宜了蓋他以遲鈍之故見得未透只得且去理㑹終要洞達而後已若理㑹不得便放下了如何得通透則是終於魯而已又曰只是魯鈍之人却能守其心專一明達者每事要入一分半上落下多不專一又曰曾子之學誠篤而已聖門學者聰明才辨不為不多而卒傳其道乃質魯之人爾故學以誠實為貴也輔氏曰大抵聰明才辨者所見雖快所造則淺方涉其藩而自謂入其奧者多矣惟誠則有物惟篤則有力曾子之才質魯於道初若難入而其求之也不敢有易心故內盡其誠而無始終之異外盡其力而無作輟之殊此所以其造反深也尹氏曰曽子之才魯故其學也確所以能深造乎道也師也辟辟婢亦反辟便辟也謂習於容止少誠實也輔氏曰子張務外留意於容儀由也唁唁五旦反唁粗俗也傳稱唁者謂俗論也輔氏曰子路粗鄙夫子嘗以為野楊氏曰四者性之偏語之使知自勵也輔氏曰愚者知不明魯者才不敏便辟則遺乎內粗俗則略乎外遺乎內則誠實不足略乎外則文飾不修此四子性質之偏也夫子所以言之者蓋欲使之自覺以治其偏而歸于中耳愚謂四者皆指其所偏惟曾子能於偏處用工故後來一貫之唯至鈍反成至敏吳氏曰此章之首脫子曰二字或疑下章子曰當在此章之首而通為一章輔氏曰畢竟前說為勝通為一章固可但其語勢若有不同子曰回也其庶乎屢空庶近也言近道也輔氏曰此與易大傳所謂其殆庶幾同屢空數至空匱也不以貧窶動心而求富故屢至於空匱也文集曰屢空只是空乏之空古人有簞瓢屢空之語是也下文以子貢貨殖為言正對此相反而言若曰心空則聖人平日之言無若此者且數數而空亦不勝其間斷矣此本何晏祖述老莊之言言其近道又能安貧也文集曰問又字似作兩截蓋樂道故能安貧而安貧所以樂道也曰世間亦有質美而能安貧者皆以為知道可乎賜不受命而貨殖焉億則屢中中去聲命謂天命輔氏曰此言天所賦貧富貴賤之命也貨殖貨財生殖也輔氏曰此蓋順其言而解之其實則是生殖貨財也億意度也言子貢不如顔子之安貧樂道然其才識之明亦能料事而多中也輔氏曰子貢於事億度而屢中者固以其才至於不受命而貨殖者以其才為之纍耳黃氏曰夫子之論回賜一則言其得道之不同二則言其處貧富之有異蓋舉兩事反覆言之貨殖則不如屢空億中則不如其庶也其庶固不專為屢空使不能安貧則亦決不能其庶不能其庶則決不能屢空億中固不專為貨殖然使其不貨殖則決不止於億中使其不止於億中則亦決不徇貨殖天理人欲相為勝負也程子曰子貢之貨殖非若後人之豐財但此心未忘耳然此亦子貢少時事至聞性與天道則不為此矣輔氏曰子貢後來所見煞髙所造煞逺至於聞性與天道則併與其初心忘之矣范氏曰屢空者簞食瓢飲屢絶而不改其樂也天下之物豈有可動其中者哉貧富在天而子貢以貨殖為心則是不能安受天命矣其言而多中者億而已非窮理樂天者也夫子嘗曰賜不幸言而中是使賜多言也聖人之不貴言也如是輔氏曰簞食瓢飲蓋人生之決不可闕者顔子於此猶屢絶而不改其樂則凡在外之物信無有可動其中者矣貧與富天之命也安而受之可也而子貢乃以貨殖為心是將以智力求富不能安受天命也世之富人往往得之於自然非必其才能智術真有以致之也是有命焉但人由之而不察耳又曰不受命而貨殖非樂天也億則屢中非窮理也人能樂天安命則心與理一自然發言中理不待億度億而後中雖其才識之明亦幸而已其曰屢中則其不中者固多矣子張問善人之道子曰不踐迹亦不入於室善人質美而未學者也輔氏曰質不美則不可謂之善人然質美而好學則進進不已雖大與聖可以循至又不止為善人而已也程子曰踐迹如言循途守轍善人雖不必踐舊迹而自不為惡然亦不能入聖人之室也文集曰循塗守轍猶言循規蹈矩輔氏曰善人質美雖不必循舊塗守舊轍而自不敢放肆過越然學未充知未致則局於見在之重故無自而能入於聖人之室也此室字與子路未入於室之室字同義皆謂聖道之奧耳張子曰善人欲仁而未志於學者也欲仁故雖不踐成法亦不蹈於惡有諸已也由不學故無自而入聖人之室也語録曰此只說善人是一箇好底資質不踐元本子亦未入於室須是要學方入聖賢之域輔氏曰欲仁則質美可知未有資質不美而欲仁者也有諸已則又進於信矣亦未有不自信而能不踐成法而自不蹈於惡者也子曰論篤是與君子者乎色莊者乎與如字言但以其言論篤實而與之則未知其為君子者乎為色莊者乎言不可以言貌取人也文集曰問論篤是與恐只是說不可以言取人下文又言不可以貌取人曰色莊便是兼著貌字輔氏曰惟夫人言論篤實之是與疑若可也然其言雖一而人品不同若夫人之為君子則言行必無異與之可也若夫人之為色莊則言行未必相副遽與之則傷吾之明矣子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之兼人謂勝人也胡氏曰言其勇於行非常人之所可及其退正相反也張敬夫曰聞義固當勇為然有父兄在則有不可得而專者若不禀命而行則反傷於義矣子路有聞未之能行惟恐有聞則於所當為不患其不能為矣特患為之之意或過而於所當稟命者有闕耳若冉求之資稟失之弱不患其不禀命也患其於所當為者逡巡畏縮而為之不勇耳聖人一進之一退之所以約之於義理之中而使之無過不及之患也胡氏曰勇於行者使之有所稟命則所行必審行之不勇者不專勉其行則愈流於退縮專勉其行者非可以不稟於父兄也蓋稟命自其所必能而不待於教之耳子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死女音汝後謂相失在後何敢死謂不赴鬬而必死也愚謂後為相失者因夫子以顔淵為死而知也死為赴鬬而死者因顔子言何敢死而知也死生亦大矣以為何敢死則不以死為重而以輕於死為重也當問答之時為師者知弟子必能赴義而已不疑其重死以求生為弟子者亦不以死為難但以死而合於義為難於死生猶然他可知已胡氏曰先王之制民生於三事之如一惟其所在則致死焉況顔淵之於孔子恩義兼盡又非他人之為師弟子者而已即孔子不幸而遇難回必捐生以赴之矣捐生以赴之幸而不死則必上告天子下告方伯請討以復讎不但已也夫子而在則回何為而不愛其死以犯匡人之鋒乎語録曰問顔路在顔子許人以死何也曰事偶至此只得死此與不許友以死之意别不許以死在未處難以前乃可如此處已遇難却如此說不得輔氏曰民生於三事之如一惟其所在則致死焉此晉語欒共子之辭三謂父生之師教之君食之也唯其所在則致死焉乃人道之宜一或有闕則則非人道也又曰師弟子云者多矣非惟百工技藝皆有之雖所謂傳道辨疑解惑者亦自有深淺輕重之不同唯顔淵之於孔子䝉博約之教而得聖道之傳真所謂受罔極之恩者恩深則義重信非他人為師弟子之比也又曰孔子不幸而遇難回必捐生以赴難此致死之義人道之宜顔子固優為之也又曰捐生以赴難死焉宜也然亦不必皆死幸而得生者有矣然義之所在不但已者故胡氏又推極其義以教學者又曰孔子遇難則顔淵有致死之義孔子免焉則顔淵無致死之理今孔子既免而顔淵相失在後脫有不知而遂死焉則非義矣故其既來而孔子迎謂之曰吾以女為死矣者恐其悮也而顔淵遽復之曰子在回何敢死者道其實也其言若相反而其意則相承顔淵於孔子雖曰未達一閒至此等處則殆相與為一矣愚謂弟子何緣有恩於師胡氏謂顔淵之於孔子恩義兼盡者恐誤當作孔子之於顔淵可也季子然問仲由冉求可謂大臣與與平聲子然季氏子弟自多其家得臣二子故問之輔氏曰二子以聖門髙弟而仕於季氏雖視顔閔為慊然其德望才業固非常人比季氏之家其必知所尊敬矣故子然以此自多而致問子曰吾以子為異之問曽由與求之問異非常也曽猶乃也輕二子以抑季然也輔氏曰季然自多其家得臣二子而致問則其言色之閒必有矜大之意且大臣既非家臣之可當而二子又不足以盡大臣之道故特輕二子以抑之所謂大臣者以道事君不可則止以道事君者不從君之欲不可則止者必行己之志輔氏曰以道事君則正其誼不謀其利明其道不計其功豈肯從君之欲哉可則行不可則止在我而已故不可則止者必行己之志也此兩句斷盡大臣之道不然則終不足以大有為於世若夫君淫則淫君奢則奢說以帝不入則王說以王不入則霸乃功利之徒所為姦子所謂妾婦之道者豈足與語大臣之事哉今由與求也可謂具臣矣具臣謂備臣數而已輔氏曰是不以道事其君直備數而已曰然則從之者與與平聲意二子既非大臣則從季氏之所為而已子曰弒父與君亦不從也言二子雖不足於大臣之道然君臣之義則聞之熟矣弒逆大故必不從之蓋深許二子以死難不可奪之節而又以陰折季氏不臣之心也尹氏曰季氏專權僣竊二子仕其家而不能正也知其不可而不能止也可謂具臣矣是時季氏己有無君之心故自多其得人意其可使從己也故曰弒父與君亦不從也其庶乎二子可免矣胡氏曰方子然欲假由求以誇人故夫子極言其失大臣之道及其欲資由求以助己故夫子又極言其有人臣之節應答之頃可以存宗國衰微之緒沮季氏強僣之心脫由求不得其死之禍一抑揚之間其效如此所以為聖人之言也子路使子羔為費宰子路為季氏宰而舉之也子曰賊夫人之子夫音扶下同賊害也言子羔質美而未學遽使治民適以害之輔氏曰前章注謂其知不足而厚有餘此又以為質美而未學者蓋質美則厚有餘未學則知不足人惟學然後雖愚必明若愚而未明遽使之為宰是乃所以賊害之子路曰有民人焉有社稷焉何必讀書然後為學言治民事神皆所以為學子曰是故惡夫佞者惡去聲治民事神固學者事然必學之已成然後可仕以行其學若初未嘗學而使之即仕以為學其不至於慢神而虐民者幾希矣輔氏曰神非可以嘗試事民非可以茍且治也故必學之已成然後可仕以行其所學若是者猶恐夫動與靜違用與體乖而或有失其宜者況乎初未嘗學而遽使之即仕以為學乎是將使之事神而先有慢之之意及其治民則必有虐之之實矣子路之言非其本意但理屈詞窮而取辦於口以禦人耳故夫子不斥其罪而特惡其佞也輔氏曰子路從夫子之久耳聞目見豈不知為學之不可以不讀書而其欲舉子羔也遽以何必讀書復於夫子蓋其勇率之資理屈詞窮不能反就義理故取辦於口以禦人耳是以夫子即就其病處針之曰是故惡夫佞者子路剛明因夫子之言而自知其取辦於口之失所以不復有言若其以前言為實則必有辨論矣范氏曰古者學而後入政未聞以政學者也蓋道之本在於修身而後及於治人其說具於方冊讀而知之然後能行何可以不讀書也子路乃欲使子羔以政為學失先後本末之序矣不知其過而以口給禦人故夫子惡其佞也文集曰上古未有文字之時學者固無書可讀而中人以上固有不待讀書而自得者但自聖賢有作則道之載於經者詳矣雖孔子之聖不能離是以為學也捨是不求而欲以政學失之矣況又責之中材之人乎然子路本意未必及此但因夫子之言而託此以自解耳故夫子以為佞而惡之子路曽晳冉有公西華侍坐坐才臥反晳曽參父名㸃子曰以吾一日長乎爾毋吾以也長上聲言我雖年少長於女然女勿以我長而難言蓋誘之盡言以觀其志而聖人和氣謙德於此亦可見矣輔氏曰以少侍長以卑侍尊易得有所隱覆而不敢盡其情故夫子先為謙辭以誘之使之盡言以觀其志聖人之和氣謙德即所謂天道之下濟也居則曰不吾知也如或知爾則何以哉言女平居則言人不知我如或有人知女則女將何以為用也子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之乘去聲饑音機饉音僅比必二反下同哂詩忍反率爾輕遽之貌輔氏曰子路剛勇故常有輕率之態攝管束也輔氏曰管束謂介乎兩國之間而為大國所攝制也二千五百人為師五百人為旅因仍也榖不熟曰饑菜不熟曰饉方向也謂向義也民向義則能親其上死其長矣輔氏曰方只訓向然子路之所謂向則義也有勇而不向義則是血氣之勇犯上作亂者有之勇而向義則是義理之勇夫然後能親其上死其長也子路之能使民如此蓋必有教化存焉商鞅之使秦民怯於私鬬勇於公戰似亦可矣然特劫之以刑賞耳固非有以教之而使民知其必不可不如此也哂微笑也求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子求爾何如孔子問也下放此方六七十里小國也如猶或也五六十里則又小矣足富足也俟君子言非己所能冉有謙退又以子路見哂故其詞益遜赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉相去聲公西華志於禮樂之事嫌以君子自居故將言己志而先為遜詞言未能而願學也輔氏曰求赤之遜大抵是因子路被哂而然深味此時此意殆有虞朝相遜之氣象聖人一嚬一笑而成德達才之效如此宗廟之事謂祭祀諸侯時見曰會衆俯曰同輔氏曰周禮春官大宗伯時見曰㑹殷見曰同又曰殷俯曰視殷即衆也俯即見也鄭氏謂朝宗覲遇皆有常期若時見則無常期諸侯有不順服者王將有征討之事則既已朝覲王為壇於國外合諸侯而命事焉十二嵗王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來終嵗則遍端元端服輔氏曰禮象云有元端而冕若玉藻天子龍衮以祭元端朝日諸侯元端以祭是已有元端而冠若朝元端夕深衣是已有元端而章甫如公西赤端章甫願為小相焉是已有元端而委貌若晏平仲端委立于虎門是已鄭云端取其正謂士之衣袂皆二尺二寸而屬幅廣袤等也然則元端之服古者君臣皆得服之章甫禮冠輔氏曰章甫緇布冠也三禮夏曰母追商曰章甫周曰委貌後代轉以巧意改新而易其名耳其制相比皆以漆布為之蓋三代常服行道之冠也相贊君之禮者言小亦謙辭㸃爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也鏗苦耕反舍上聲撰士免反莫冠並去聲沂魚依反雩音于四子侍坐以齒為序則㸃當次對以方鼓瑟故孔子先問求赤而後及㸃也或問何以知以齒為序曰子路少孔子九嵗曾參少孔子四十六嵗而晳參之父也則其齒或亞於子路矣希間歇也作起也撰具也輔氏曰具猶言所具陳者春服單夾之衣浴盥濯也今上已袚除是也或問浴之為盥濯袚除曰漢志三月上已袚除官民潔於東流水上而蔡雍引此為證是也韓李疑夫裸身川浴之非禮而改浴為㳂蓋不察乎此爾沂水名在魯城南地志以為有溫泉焉理或然也風乘涼也舞雩祭天禱雨之處有壇墠樹木也詠歌也曽㸃之學蓋有以見夫人欲盡處天理流行隨處充滿無少缺闕故其動靜之際從容如此語録曰曽㸃見得事事物物上皆是天理流行良辰美景與幾箇好朋友行樂去他看得那幾箇說底功名事業都不見了他看見日用之閒莫非天理在在處處莫非可樂黃氏曰人稟陰陽五行之氣以生則莫不均具仁義禮智之性此理之妙茍無人欲以閒之則流行不息隨處充滿蓋一言語則言語無非天理也一舉動則舉動無非天理也一好樂則皆天理之所當好樂也一趨向則皆天理之所當趨向也何往而非天理亦何處而有缺闕哉天命之謂性率性之謂道未發則為中既發則為和孰非天理之當然哉曽晳之學有見乎此故問未及之也則不當思而不思天理也其及之也則當思而後思天理也其快於心也則不得不作而對天理也其異於人也則不得不疑而發天理也夫子之所問者吾心所存之志吾之所答者吾身日用之常天理也春之莫服之成可樂之日也童子冠者之相從浴沂風詠之得所可樂之事也可樂而樂天理也曾晳之心舉無一塵之為纍但見天理之流行人之所以為學者亦不過存此心之天理而已今吾心之天理流行發用如此此志之外又豈復更有他念哉堯舜以道心精一之傳發而為垂拱無為之治亦不過由仁義行而已豈復有他道哉回視三子見事而不見理則雖有蓋世無前之事業且不足道而況其區區者乎至其與天地萬物同流各得其所亦天理流行其氣象功效自如此耳輔氏曰天理人欲不兩立才有一豪人欲則天理便沮遏而不得行須是克盡人欲全無透漏到此地位然後天理自然流行也天理既遂其流行則隨事隨處自然充足優裕不待勉強著力自無纎豪缺闕處然唯聖人心與理一然後能體用兼備不待強勉自然而然若曽晳則以天資之髙而於此有見焉耳固未能如聖人之為也故集注著有以見夫四字於其首便自斷置得曽晳所學之分量分曉與後面程子所謂曽㸃狂者未必能為聖人之事而能知夫子之志之說相應曽晳之學唯有見乎此故其侍坐之時心平氣和照顧得到遂能於動靜之際從容如此胡氏曰天理所在未嘗不流行於日用之閒其在人也一為私欲所蔽則壅遏而不通然非天理之本體也故人欲既盡則天理自若又曰人患為私欲所蔽耳其實窮固未嘗不足達亦未嘗有餘不假它求也故隨處充滿無少缺闕而其言志則又不過即其所居之位樂其日用之常初無舍己為人之意而其胸次悠然直與天地萬物上下同流各得其所之妙隱然自見於言外或問何以言其與天地萬物各得其所曰莫春之日生物暢茂之時也春服既成人體和適之候也冠者五六人童子六七人長少有序而和也沂上舞雩魯國之勝處也既浴而風又詠而歸樂而得其所也夫以所居之位而言其樂若止於一身然以其心論之則固藹然天地生萬物之心聖人對時育物之事也夫又安有物我內外之閒哉輔氏曰曽晳所居之地不過只做得此等事而浴沂詠歸數語亦其平時日用之常夫即其所居之位則無出位之思樂其日用之常則無作意之為只此兩句便又見得曽晳不願乎其外無入而不自得之意不過與諸朋友徜徉自適初不見其有三子之志而其胸次悠然自適直與天地萬物上下同流各得其所之妙隰然自見於言語之外是則曽㸃之所樂也初無舍己為人之意一句說得㸃之事實胸次悠然而下數句又形容得㸃之樂處分曉集注於此一段凡三次改削然後得如此平實學者當深味之胡氏曰即其所居之位樂其日用之常者莫春融和之時沂水祓除之事與其朋儕游泳自得乃其分之所冝為而目前之所可為也初無舍己為人之意者如必得國而治之然後見其用則在我者輕在人者重人必知我則方有以自見人不我知則將無所用於世矣此晳之所以異於三子也人欲淨盡天理流行動靜之閒無往非此則上下與天地同流矣達而在上窮而在下無所不在無時不然則與萬物各得其所以晳之所對雖未及此而非倉猝之談故可以由其言而觀其所存也視三子之規規於事為之末者其氣象不侔矣故夫子歎息而深許之語録曰曽㸃雖超然事物之外而實不離乎事物之中是箇無事無為底道理却做有事有為底功業此所謂大本所謂忠所謂一者是也㸃操得柄欛據著源頭諸子則從支流上做功夫諸子底小他底大輔氏曰不言其德之有異而言其氣象之不侔者曽晳之學但有以知之而已固未能有以得之故也夫三子之言志固皆實事使各極其才力而為之亦非常人所及但以曽晳見處觀之終是有所待於外而樂於見其能又其才各有所偏能於此者或不能於彼若曽晳之志則大以成大小以成小隨物賦形無所不利此夫子所以歎息而深許之而門人記其本末獨加詳焉蓋亦有以識此矣三子者出曽晳後曽晳曰夫三子者之言何如子曰亦各言其志也已矣夫音扶曰夫子何哂由也㸃以子路之志乃所優為而夫子哂之故請其說輔氏曰子路才能非不足於此今乃見哂於夫子故請其說曰為國以禮其言不讓是故哂之夫子蓋許其能特哂其不遜唯求則非邦也與安見方六七十如五六十而非邦也者與平聲下同曽㸃以冉求亦欲為國而不見哂故微問之而夫子之答無貶詞蓋亦許之唯赤則非邦也與宗廟會同非諸侯而何赤也為之小孰能為之大此亦曽晳問而夫子答也孰能為之大言無能出其右者亦許之之詞程子曰古之學者優柔厭飫有先後之序如子路冉有公西華言志如此夫子許之亦以此自是實事後之學者好髙如人游心千里之外然自身却只在此輔氏曰優柔則無急迫之意故不至於凌躐厭飫則有飽足之心故不至於虛妄其於進學先後之序皆身親經厯之必盈科而後進成章而後達自然步步著實無有虛夸妄想之事若後之學者好髙如人游心千里之外然自身却只在此則全是虛夸妄想者之所為此數語斷得古今學者得失最為的當又曰孔子與㸃蓋與聖人之志同便是堯舜氣象也誠異三子者之撰特行有不掩焉爾此所謂狂也子路等所見者小子路只為不達為國以禮道理是以哂之若達却便是這氣象也文集曰行有不掩非言行背馳之謂但行不到所見處耳倚門而歌亦略見其狂處只此舍瑟言志處固是聖人所與然亦不害其為狂也過此流入莊老去矣語録曰曽㸃與聖人志同蓋道體流行無虧無缺是天生自然如此與聖人安老懷少信朋友底意思相似聖人見老者合安便安之朋友合信便信之少者合懷便懷之惟曽㸃見得到這裏聖人做得到這裏又曰且看莫春時物態舒暢如此曽㸃情思又如此便是各遂其性處堯舜之心亦只是要萬物皆如此爾又曰三子所志雖皆是實然未免局於一君一國之小向上更進不得若曽㸃所見乃是大根大本使推而行之則將無所不能雖其功用之大如堯舜之治天下亦可為矣蓋言其所志者大而不可量也然使㸃遂行其志則恐未能掩其言故以為狂又曰子路若達為國道理時事事都見得是自然底天理既是天理無許多費氣力生受問子路就使達得却只是事為之末如何比得這箇曰理㑹得這道理雖事為之末亦是道理莫春者春服既成何嘗不是事為來間三子皆事為之末何故子路達得便是這氣象曰子路才氣去得雖粗暴些才理㑹這道理便就這箇比及三年可使有勇且知方上面却是這箇氣象求赤二子雖是謹細却只是安排來底又更是他才氣小了子路是甚麼樣才氣又曰到為國以禮分上便自理明自然有曾㸃氣象永嘉陳氏曰天髙地下萬物散殊而禮制行矣曽㸃胸次正如此子路參得此透時即油然天理呈露無許多粗骨氣矣又曰為國以禮則君君臣臣父父子子事各當事物各當物終日在天理上行此堯舜氣象又曰三子皆欲得國而治之故孔子不取曽㸃狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在於老者安之朋友信之少者懷之使萬物莫不遂其性曽㸃知之故孔子喟然歎曰吾與㸃也輔氏曰樂而得其所者言隨所寓而樂自其斂於一己者言也使萬物莫不遂其性者言物皆得其樂自散於物者言也此聖賢之分也然必有得於曽晳之樂然後可以進於聖人之樂固不可凌節躐等而進也又曰曽㸃漆雕開已見大意語録曰他只是見得這大綱意思於細密處未必便㑹得如千兵萬馬他只是見得這箇其中隊伍未必知又曰曽㸃見雖髙漆雕開却確實顔淵第十二凡二十四章顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉仁者本心之全德黃氏曰謂此心所具之理如仁義禮智者皆仁也輔氏曰仁義禮智信皆心之德而仁實包義禮智信四者故曰心之全德蔡氏曰以其心之全得乎天者也克勝也語録曰聖人下箇克字譬如相殺相似定要克勝得他又曰克訓治緩了且如睚得一分也是治睚得二分也是治勝便是打疊殺了他已謂身之私欲也語録曰已有兩義物我亦是己私欲亦是已輔氏曰人有身故有欲如飢欲食渴欲飲皆是也但欲有公私之不同此所謂己則指身之私欲者也胡氏曰耳目口體之欲皆因己而有故謂之私復反也輔氏曰反猶歸也如行者之反歸於家也禮者天理之節文也黃氏曰謂此心所具之理莫非天理而理之有節冇文者即禮也胡氏曰天理即全德也節者其限制等級也文者其儀章脈理也不曰理而曰禮者理虛而禮實以其有品節文章可以依據也為仁者所以全其心之德也蓋心之全德莫非天理而亦不能不壞於人欲故為仁者必有以勝私欲而復於禮則事皆天理而本心之德復全於我矣語録曰人只有天理人欲兩途不是天理即是人欲即無不屬天理又不屬人欲底且如坐如尸是天理跛倚是人欲克去跛倚而未能如尸即是克得未盡却不是未能如尸之時不係人欲也須與立箇界限將那未能復禮時底都把做人欲斷定黃氏曰心之全德莫非天理則言仁而禮在其中事皆天理而心德復全則言禮而仁在其中蓋皆以天理為言則仁即禮禮即仁安有復禮而非仁也哉其曰事皆天理者以視聽言動之屬乎事也復歸於禮則事皆合乎天理矣輔氏曰仁者天理之㑹而心德之全也禮者天理之著而心德之則也身之私欲乃天理之反而心德之蔽也克己者有以勝夫私欲而不使之滋萌於念慮之間復禮者動靜周旋循規蹈矩如行者之得反於家委蛇自適而無有絲豪頃刻違叛之迹也夫如是則應事接物之際無非天理之流行而本心之德始復全於我矣克己而不復禮則譬如人雖無向外馳騖之意然退而無家可歸久則必至於橫潰四出也蔡氏曰人既有是軀殼其耳目鼻口不能無私欲之纍視聽言動一有非禮則本心全德存者鮮矣所謂不能不壞於人欲之私惟克去非禮以復乎天理之節文則仁即此而存所謂事皆天理而本心之德復全於我者也學者玩箇克字便須求勇猛力戰決勝之意玩箇復字便須求天理復還之實蓋仁即禮之全體禮乃仁之子目克己復禮即所以為仁也歸猶與也又言一日克己復禮則天下之人皆與其仁極言其效之甚速而至大也語録曰克己復禮則事事皆是天下之人聞之見之莫不皆與其為仁也又曰今一日克己復禮天下人來㸃檢他一日內都是仁底事則天下都以仁與之一月能克己復禮天下人來㸃檢他一月內都無不仁底事則一月以仁與之若今日如此明日不如此便不㑹以仁與之也輔氏曰一日極言其效之甚速也天下極言其效之至大也蔡氏曰天下之大人人皆稟受得天所豫之仁若我真能一日克己復禮為仁即此仁便與天下之人都湊得著所以天下皆以仁稱之又言為仁由己而非他人所能預又見其機之在我而無難也語録曰這裏都是自用著力使他人不著輔氏曰為仁由已而非他人所能與則其機要實在於我矣為之則是何難之有又曰極言其效而深發其機其效之甚速而至大者實由其機之在我而無難也日日克之不以為難則私欲淨盡天理流行而仁不可勝用矣語録曰做到私欲淨盡天理流行便是仁輔氏曰日日克之不以為難此言克己之能果決也私欲淨盡天理流行而仁不可勝用則又言克己復禮之為仁其效甚速而至大也胡氏曰日日克之不以為難者所謂一日非一日而上也私欲淨盡天理流行者蓋私欲有一豪之末克則天理必因是而有壅遏者矣程子曰非禮處便是私意既是私意如何得仁須是克盡己私皆歸於禮方始是仁語録曰至私欲盡後便粹然是天地生物之心又曰克己復禮則事事皆仁故曰天下歸仁語録曰問集注云歸猶與也謂天下皆與其仁後而却載程子語天下歸仁謂事事皆仁恰似兩般曰為其事事皆仁所以天下歸仁又曰於這事做得恁地於那事亦做得恁地所以天下皆稱其仁若冇一處做得不是必被人看破了又曰一日克巳復禮了雖無一事亦不害其為事事皆仁雖不見一人亦不害其為天下歸仁胡氏曰程子初說所以明天理界限之分次說又明克復之功非一端而已也謝氏曰克己須從性偏難克處克將去語録曰問此性是氣質之性否曰然然亦無難易凡氣質之偏處皆須從頭克去謝氏恐人只克得裏面小小不好底氣質而忘其難者故云然又曰人之氣稟有偏所見亦往往不同如氣稟剛底人則見剛處多而處事必失之太剛柔底人則見柔處多而處事必失之太柔須先就氣稟偏處克治又曰如偏底固是要克也有不偏而事為有不穩當底也當克且如偏於嚴克而就寬那寬中又有多少不好處要克胡氏曰謝氏之說蓋欲使人先勝其難則易者退聽矣顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣目條件也顔淵聞夫子之言則於天理人欲之際己判然矣故不復有所疑問而直請其條目也語録曰聖人是一箇赤骨立底天理顔子早是有箇物包裹了但是其包裹者薄剝去容易聖人一為指出這是天理這是人欲他便洞然都曉得了非禮者己之私也胡氏曰己與理對非禮則為己私矣勿者禁止之辭是人心之所以為主而勝私復禮之機也私勝則動容周旋無不中禮而日用之間莫非天禮之流行矣語録曰說文謂勿字似旗腳此旗一麾三軍盡退功夫只在勿字上才見非禮來則禁止之才禁止便克去才克去便能復禮又曰只是勿便是箇主宰若恁地持守勿令走作也由他若不收斂一向放倒去也由他又曰主在勿字上才覺非禮意思萌作便提起這勿字一刀兩段已私便可去私去則能復禮而仁矣又曰今人與顔子只爭箇勿字輔氏曰勿者禁止之辭是釋勿字之義人心所以為主而勝私復禮之機是釋勿字之用也必也心為之主宰然後能有所禁止而不為然後可以有為此所以為勝私復禮之機也能勝其私則動容周旋無不復於禮而日用之間莫非天理之流行矣事如事事之事請事斯語顔子默識其理又自知其力有以勝之故直以為己任而不疑也輔氏曰顔子之明既能默識其理顔子之健人能遂致其勿故不復再問而直以事斯語為己任而無所疑畏也程子曰顔淵問克已復禮之目子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也蔡氏曰視聽言動身之用也心則其體也由乎中而應乎外制於外所以養其中也語録曰由乎中而應乎外是推本視聽言動四者皆是由中而出泛言其理之如此耳非謂從裏面做功夫也制乎外所以養其中方是說做功夫處全是自外而內自葉流根之意問制於外所以養其中此是說仁之體而不及用曰制於外便是用問克己功夫從內面做去反說制於外如何曰制知在內黃氏曰體用之相應如人心手足一氣所貫初非截然為二物也心所念慮則手足隨之手足痛癢未有不達乎心者仁之與禮本未發之體也一有私欲出於非禮則天理之節文者亦為之動而心之全德亦不得以自全矣故程子於四針之序曰由乎中而應乎外制於外所以養其中蓋謂此也顔淵事斯語所以進於聖人後之學聖人者冝服膺而勿失也輔氏曰禮乃仁之著聖乃仁之極欲為聖人當自求仁始欲求夫仁當自復禮始因針以自警其視針曰心兮本虛應物無迹語録曰問視針何以特說心曰諺云開眼便錯所以就心上說陳氏曰心之為體其中洞然本無一物只純是理而已然理亦未嘗有形狀也又曰心虛靈知覺事物才觸即動而應無蹤跡之可尋捉處胡氏曰心兮本虛者體也應物無迹者用也體無所窒則用無所滯此其本然也蔡氏曰人之一心本自虛靈雖酬酢萬變而隨感隨應更無留迹此即無思無為寂而感之本體也操之有要視為之則語録曰人之視聽言動視最在先是乃操心之準則此兩句末是不好輔氏曰人心出入無時莫知其鄉何有形迹可見然操則存舍則亡而操之之要則以視而為則而已蓋人之視最在先遇不當視者才起一念要視他便是非禮故當以是為操心之則陳氏曰即此處而操存之庶乎得其要而有一定之準葉氏曰目者一身之昭鍳五行精華之所聚於心尤切目動心必隨心動目必注心之虛靈千變萬化欲加檢防先以視為準則蔡氏曰則猶法則準則之謂蔽交於前其中則遷語録曰至蔽交於前方有非禮而視輔氏曰此則所謂物交物而失之者也陳氏曰蔽指物欲之私而言又曰中指心之體而言即天理之謂也物欲之蔽接於前則心體逐之而去矣胡氏曰因有所見而心為之動也制之於外以安其內語録曰視是將這裏底引去所以云以安其內陳氏曰物欲克去於外則無以侵撓吾內而天理寧定矣胡氏曰禁其視之非禮則心得其平矣克己復禮久而誠矣語録曰如是功夫無閒斷則久而自從容不勉矣輔氏曰常常克去己私以復於禮久久不息則其意誠實無歉而不復有作輟之弊矣陳氏曰上以一節言此以全體言又曰誠者真實無妄之理也克復工夫真積力久則私欲淨盡徹表裏一於誠純是天理之流行而無非仁矣胡氏曰克己復禮者言上文乃所以用力於此也久而誠矣者非禮勿視未是仁真積力久自然誠實則可以謂之仁也蔡氏曰始而克己復禮有以用其力久而誠則自無所用其力矣其聽針曰人有秉彛本乎天性輔氏曰人心所秉之常性乃得之於天而聽其所當聽不聽其所不當聽者即秉彞之性也陳氏曰人均執此常道而生其原出於天之所賦而人受之以為性者也胡氏曰亦猶視針原其本然也彼以心言此以性言微有緩急之異也知誘物化遂亡其正語録曰樂記云人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣人莫不有知知者所當有也物至則知足以知之而有好惡這是自然如此到得好惡無節於內知誘於外方始不好去輔氏曰人雖有是性而為知所誘為物所化然後有聽其所不當聽而不聽其所當聽者焉陳氏曰知指形氣之感而言物欲至而知覺萌遂為之引去矣化則與之相忘如一而無彼我之閒也又曰正以理言至是則天理俱滅而無復存矣胡氏曰知誘物化者因有所聞而隨物以往也又曰不言聽而言知者聽者知之初知者聽之後因知而此心為之動故以知言其實一也卓彼先覺知止有定陳氏曰悟此理之全而體之者又曰事事物物各有所當止之處即理之當然者是也能一一知其然則此心明徹於日用應接皆有定理不為之誘而化矣胡氏曰每聽則審所當止而不為物遷也蔡氏曰常人失其本性唯先覺者能知止於至善而心有定向間邪存誠非禮勿聽語録曰問間邪莫是為防間扺拒那外物使不得侵近否曰固是凡言邪皆自外至者也然只視聽言動無非禮便是間又曰聽得外面底來所以云間邪存誠輔氏曰間其邪使不為吾舍之入存其誠使不雜於人欲之私則自然非禮勿聽也蔡氏曰或疑聽針之說似乎寬亦可移為視針用殊不知視是自內而引出外所以云以安其內聽是自外而引入內所以云間邪存誠視為先聽次之所以視針說得尤力其言針曰人心之動因言以宣文集曰言有不順理不自得處即是心有不順理不自得處故不得於言須求之於心就心上理㑹也心氣和則言理順矣然亦須就言上做工夫始得內外表裏照管無少空闕始得相應陳氏曰一念之動於中或善或惡必由言以聲之而後見於外胡氏曰心有所感必賴言以宣布也發禁躁妄內斯靜專語録曰上四句是說身上最緊切處須是不躁妄方始靜専才不靜專自家這心自做主不成如何去接物輔氏曰躁屬氣妄屬欲不為氣所動故靜不為欲所分故專陳氏曰疾而動曰躁虛而亂曰妄人之欲言大槩不出此二者皆人欲之所為也故必禁之又曰靜安專一皆天理之所存也外不躁則內靜外不妄則內專此二句為一篇之關要處矧是樞機興戎出好文集曰好善也戎兵也言發於口則有二者之分利害之幾可畏如此陳氏曰門之闢闔所繫在樞弩之張弛所繫在機人心之動有善惡由言以宣之而後見於外是亦人之樞機也又曰言非禮則有躁妄而起爭言以禮則無躁妄而生愛吉凶榮辱惟其所召語録曰中四句却是說言底道理胡氏曰惟其所召以上謹於處已也蔡氏曰出好則吉則榮興戎則凶則辱發於口者甚微而召於彼者甚捷可不畏哉可不謹哉傷易則誕傷煩則支輔氏曰易則心不管攝故必至於妄誕煩則心不精一故必至於支離陳氏曰易者輕快之謂躁則傷於易誕者欺誑之謂而易中之病也煩者多數之謂妄則傷於煩支猶木之枝從身之旁而迸出者乃煩中之失也胡氏曰傷易則誕以下謹於接物也蔡氏曰易則誕由其妄而不專也煩則支由其躁而不靜也已肆物忤出悖來違語録曰下四句却說四項病又曰如言針說許多也是人口上有許多病痛從頭起至吉凶榮辱惟其所召是就身上謹傷易則誕至出悖來違是當謹於接物閒都說得周備輔氏曰己肆物忤則人與已非兩物出悖來違則感與應非二事陳氏曰傷易而誕則無有成法在已者肆而與物忤矣內何復靜之云傷煩而支則不合正理所出者悖而來亦違矣內何復專之云蔡氏曰內不靜故已肆而物忤內不專故出悖而來違非法不道欽哉訓辭陳氏曰法謂先王之格言欽謂敬謹其出而無躁妄也其動針曰哲人知幾誠之於思志士勵行守之於為語録曰哲人便於思量閒便見得合做與不合做志士便於做出了方見得又曰思是動之於心為是動之於身又曰思是動之微為是動之著這箇是該動之精粗為處動思處亦動思是動於內為是動於外蓋思於內不可不誠為於外不可不守專誠於思而不守於為不可專守於為而不誠於思亦不可又曰非是兩般人只是誠之於思底却覺得速守之於為者及其形於事為早是見得遲了此却是覺得有遲速不可道有兩般却兩般做工夫去又曰須著隨處照管不應這裏失了後面更不去照管覺得思處失了便著去事上看便舍彼取此須看如此方得輔氏曰哲人知幾誠之於思顔子無形顯之過是也志士勵行守之於為如顔子不善未嘗復行是也陳氏曰幾者善惡欲動而未形之間其兆甚微哲人心通理明能燭之於先於一念微動而未形之間便已知覺而實之無妄則天理之本然者流行無壅矣見於所行之謂行志士激厲能勇於有行為事動之已著也至此方知覺而守之不放則事亦中理而無過舉矣蔡氏曰知幾其神乎哲人其上也見幾而作不俟終日志士其次也順理則裕從欲惟危語録曰哲人志士雖則是有兩樣大抵都是順理便安裕從欲便危險又曰此兩句是生死路頭陳氏曰結上文二者之動雖微顯不同然循天理之公則皆無餒於中故裕逐人欲之私則易陷於小故危蔡氏曰哲人志士雖有閒然安危之機只在乎天理人欲之間耳造次克念戰兢自持輔氏曰造次克念不息之誠也戰兢自持敬謹之體也陳氏曰雖急遽苟且之時亦必誠之於思則其涵養之功密矣常恐懼戒謹守之於為則其操存之力篤矣蔡氏曰造次克念以誠於思言凡學者動於心不可不存克念之誠戰兢自持以守於為言凡學者動於身不可不加自持之念習與性成聖賢同歸輔氏曰此兩句必於動上言之者動則該夫三者而君子之學惟行之為貴也胡氏曰禁止之初特為仁之事至於自然則賢亦聖矣蔡氏曰聖性之也謂哲人賢習之也謂志士及其成功一也故曰同歸愚按此章問答乃傳授心法切要之言非至明不能察其幾非至健不能致其決故唯顔子得聞之而凡學者亦不可以不勉也輔氏曰非顔子之至明則雖告之以克己復禮天下歸仁之說必不能察夫為仁之機要在此而遂請其條目非顔子之至健則雖告之以為仁由己與夫四勿之說必不能致其勇決於此而遂以為己任此夫子所以獨以是告顔子而他弟子有不與焉然學者所以學為聖人也又豈可不加勉焉而遂以為智不足以及此力不足以任此而自棄哉固當發憤以致人一己百人十己千之功使雖愚必明雖柔必強以庶幾於聖人之事可也愚謂非至明則不能察天理人欲邪正所由動之幾將有誤認天理為人欲人欲為天理而不自覺於冥冥之中矣非至健則不能決天理人欲勝負所由分之勢將有玩天理而不肯進戀人欲而不忍割而依違於二者之閒矣程子之針發明親切學者尤冝深玩文集曰四針旨意精密真所謂一棒一條痕一摑一掌血者又曰四針之意蓋欲學者循其可見易守之法以養其不可見不可繫之心也至於久而不懈則表裏如一而私意無所容矣仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣敬以持己恕以及物則私意無所容而心德全矣輔氏曰出門如見大賔使民如承大祭此是持敬工夫已所不欲勿施於人此是強恕工夫才不敬便私欲萬端害仁之體才不恕便徇已遺物柅仁之用敬以養之恕以達之則天理流行不至閒斷而私欲自無可萌之時可著之處矣陳氏曰敬者吾心之所以生而仁之存也恕者吾心之所以達而仁之施也主敬持己則私意無所萌於內矣行恕及物則私意無所形於外矣內外無私意而仁在是矣內外無怨亦以其效言之使以自考也輔氏曰蓋使之考其效以驗其實也胡氏曰驗之於人而內外皆無所憾也猶天下歸仁之意借是以驗其所至非有計效之心也程子曰孔子言仁只說出門如見大賔使民如承大祭看其氣象便須心廣體胖動容周旋中禮唯謹獨便是守之之法或問出門使民之時如此可也未出門使民之時如之何曰此儼若思時也有諸中而後見於外觀其出門使民之時其敬如此則前乎此者敬可知矣非因出門使民然後有此敬也語録曰程子答或人之說固是好足以明聖人之說見得前面有一段工夫但是當初正不消恁地答他却好與他說今且就出門使民時做若是出門使民時果能如見大賔如承大祭則他未出門使民以前自住不得輔氏曰程子二說實相通心廣體胖周旋中禮便是仁者之氣象熟於仁者但說此氣象則不須言仁而仁自可知然出門使民是與物接時獨是未與物接時自後說所謂儼若思之時也未與物接之時能敬謹以守之則與物接時自然有此氣象矣胡氏曰程子專主出門使民二句而言所以發不但此二事而己之意此心未嘗不敬應事之時則如是也敬又恕之本故專以敬為言而謹獨一語專為學者發也愚按克己復禮乾道也主敬行恕坤道也顔冉之學其髙下淺深於此可見語録曰克己復禮是一服藥打疊了這病主敬行恕是漸漸服藥消磨了這病又曰克己復禮如撥亂反正主敬行恕如待盈守成又曰乾卦自君子進德修業以至於知至至之可與幾也知終終之可與存義也從知處說來如坤則但是說敬以直內義以方外只就持守處說只說得一截如顔子克己復禮工夫却是從頭做起來是先要見得後却做去工夫較大仲弓不解做得那前一截只據見在底道理持守將去又曰乾道奮發而有為如庸言之信庸行之謹間邪存其誠之類是也坤道靜退而持守如敬以直內義以方外之類是也觀夫子告二子氣象各有所類又曰仲弓資質溫粹顔子資質剛明顔子之於仁剛健果決如天旋地轉雷動風行做將去仲弓則自斂藏嚴謹做將去永嘉陳氏曰顔子工夫索性豁開雲霧便見青天故屬乾仲弓工夫著力淘盡泥沙方見凊泉故屬坤此處最難認須細心玩聖賢氣象便㑹得蔡氏曰克已復禮是已與天對做得到便純是天持敬行恕是己與人對做得到猶是人若又以應效言之則又有大小淺深之不同顔子底便可天下歸仁仲弓底便只可邦家無怨天下歸仁其應廣而速邦家無怨其應狹而緩氣象則不侔矣然學者誠能從事於敬恕之間而有得焉亦將無已之可克矣語録曰持敬行恕雖不曾著力去克己復禮然却與克己復禮只一般蓋如是把這箇養來養去那私意自是著不得出門若見大賔使民如承大祭時也著私意不得己所不欲勿施於人時也著私意不得司馬牛問仁司馬牛孔子弟子名犂向魋之弟宋人子曰仁者其言也訒訒音刃訒忍也難也胡氏曰忍者禁止於將發之時難者欲發而不敢輕也仁者心存而不放故其言若有所忍而不易發蓋其德之一端也語録曰仁者之人言自然訒在學仁者則當自謹言語中以操持此心且如而今人愛胡亂說話輕易言語是他此心不在奔馳四出如何有仁輔氏曰言心聲也忍則心之用也故心存而不放則其言自然若有所忍而不易發仁德固多端而其言之訒則特其一端耳胡氏曰仁者之人常有所主於中動靜語默皆合於理其出言也不持禁止亦非欲言而不敢輕發故借以曉之夫子以牛多言而躁故告之以此使其於此而謹之則所以為仁之方不外是矣文集曰這是司馬牛身上一病去得此病則方好將息充養耳輔氏曰仁者本心之全德惟己私盡去天理渾然是為得之一或役於氣動於欲則為心德之病而仁始虧矣司馬牛多言而躁正所謂役於氣動於欲者故因其問而即其病之反處告之使牛因其言而深思以去其病於此一端以加謹焉則所以為仁之方固不外此所謂曲能有誠者是也陳氏曰語司馬牛之說又下於雍非祕其精義而不以語之也以牛多言而躁若不以其病之所切者而語之則彼之躁必不能自覺終身為此心之纍而無由可達故必使之先致謹於此去煩而簡反躁而靜則心無所放而常定於中然後入德次第皆可漸進而仁可求矣曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎牛意仁道至大不但如夫子之所言輔氏曰此牛多言而躁之證也蓋心粗氣暴易視忽聽惟知虛夸妄想而不知反諸心以味其理之實此最學者之大病也故夫子又告之以此蓋心常存故事不茍事不茍故其言自有不得而易者非彊閉之而不出也語録曰仁者常存此心所以難其出不仁者已不識痛癢得說便說如夢中讝語豈復知是非善惡輔氏曰心存則行自然難而不茍動言自然訒而不茍發此心德之自然豈易能哉而牛之意則以訒其言為彊閉而不出故易視之而以為仁道之大不但如此而已也楊氏曰觀此及下章再問之語牛之易其言可知程氏曰雖為司馬牛多言故及此然聖人之言亦止此為是愚謂牛之為人如此若不告之以其病之所切而泛以為仁之大槩語之則以彼之躁必不能深思以去其病而終無自以入德矣故其告之如此輔氏曰人之躁者多忽小而慕大舍近而騖逺不察在己之實病而唯世之虛美是求故教之者要當直指其病之所切使之動心忍性以求去其病而後可以入德不然泛以為仁之大槩告之則彼亦將泛然聽驟然領多言而躁之病既足以痼其中而妄想橫騖之意又如無源之水雖溝壑暴盈其涸可立而待也亦將何自而入德哉蓋聖人之言雖有髙下大小之不同然其切於學者之身而皆為入德之要則又初不異也讀者其致思焉司馬牛問君子子曰君子不憂不懼向魋作亂牛常憂懼故夫子告之以此曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼夫音扶牛之再問猶前章之意故復告之以此輔氏曰牛之再問雖可見其易於言然亦足以發聖人未盡之藴未可遂非也疚病也言由其平日所為無愧於心故能內省不疚而自無憂懼未可遽以為易而忽之也朝氏曰不憂不懼由乎德全而無疵故無入而不自得非實有憂懼而强排遣之也輔氏曰不憂不懼者疑若有之而強排遣之也何憂何懼則是自無憂懼耳蓋君子自然之德也又曰若於吾之德少有疵病則不免於憂懼矣憂是氣索懼是氣歉夫內省不疚何憂何懼與孟子集義生氣之意同雖非勉强所能到然在學者則亦不可以不加勉強之功也司馬牛憂曰人皆有兄弟我獨亡牛有兄弟而云然者憂其為亂而將死也或問牛之無令兄弟何也曰以傳考之桓魋嘗欲弒宋公而殺孔子其惡著矣而其弟子頎子車亦與之同惡此牛之所以為憂也胡氏曰牛知其必不能保身故言亡也子夏曰商聞之矣蓋聞之夫子輔氏曰觀子夏之言有尊敬而不敢易言之意是以知之死生有命富貴在天命禀於有生之初非今所能移天莫之為而為非我所能必但當順受而已輔氏曰稟於有生之初皆命也有生必有死是其生之所稟已有定矣豈今之所能移哉莫之為而為者天也富貴儻來之物其所以遇之者蓋莫知其所以然也豈我之所能必哉順謂不咈受謂不拒只此二字便是處死生富貴之要訣陳氏曰天者命之所自出命則天之所賦於人者故以理言之謂之天自人言之謂之命其實一而已君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也既安於命又當修其在己者愚謂安於命而不修己則是有命而無義聽乎天而不盡乎人矣故又言茍能持己以敬而不閒斷接人以恭而有節文則天下之人皆愛敬之如兄弟矣輔氏曰持己以敬而更無閒斷仁也接人以恭而各有節文禮也仁者愛人故人常愛之有禮者敬人故人常敬之此所以如兄弟也蓋子夏欲以寬牛之憂故為是不得已之辭讀者不以辭害意可也輔氏曰有兄弟而為惡怙終日趨於死亡之地而不自知則其以為憂是人情之常也善其身以化率之盡其心以教迪之誠已至而彼方悍然不我聽則致其憂思惻怛之意而不能已是又君子之當然也若夫憂之過而至於傷生失己則為之朋友者以義理開釋之如子夏之於司馬牛既詔之以安命又勉之以修身使之兩盡其道以致人之愛敬若兄弟然則可以廣其意寬其憂矣但其言未免有激揚助長之病或以啓夫人輕視天倫之心故集注戒讀者不可以辭害意胡氏曰子夏四海皆兄弟之言特以廣司馬牛之意意圓而語滯者也唯聖人則無此病矣且子夏知此而以哭子喪明則以蔽於愛而昧於理是以不能踐其言爾語録曰問意圓語滯以其近於二本否曰子夏當初之意只謂在我者敬而無失與人恭而有禮如此則四海之內皆親愛之何患乎無兄弟要去開廣司馬牛之意只不合下箇皆兄弟字便成無差等了輔氏曰聖人無我渾是義理故口無擇言言滿天下無口過若夫賢者則循理者也心少有所倚著則言語之間便自有病痛出來如子夏之言不過是要廣司馬牛之意耳不知不覺便有過差意圓謂說得自家意思却盡語滯謂言語滯著在那偏處此君子所以謹言語也以至哭子喪明之事則牛之失乃移在子夏之身而不自知故為蔽於愛昧於理而不能踐其言由此觀之則學者其可自恃其所已知而不務朝夕兢惕以自㸃檢也哉子張問明子曰浸潤之譖膚受之訴不行焉可謂明也已矣浸潤之譖膚受之訴不行焉可謂逺也已矣譖莊䕃反訴蘇路反浸潤如水之浸灌滋潤漸漬而不驟也譛毁人之行也膚受謂肌膚所受利害切身如易所謂剝牀以膚切近災者也訴訴已之寃也毁人者漸漬而不驟則聽者不覺其入而信之深矣訴寃者急迫而切身則聽者不及致詳而發之暴矣或問何以言膚受為切於身曰易曰剝牀以膚而傳以切近釋之且傳亦有揃爪及膚之言則凡言膚者皆為切於身無疑矣蓋譖為毁人之行訴為伸己之寃若事本非實而譖者遽然極言其事訴者泛然不切於身則亦不足以感人矣故以此二者之相為反對而互言之見其事變之不同而明無不照矣若以膚受為微淺之意則與浸潤何以異而其不行不足以為難矣語録曰譖是譖人是不干已底事才說得驟便不能入他須是閒言冷語掉放那裏說教來不覺訴是訴切己底事才說得緩慢人便不將做事須是說得緊切要忽然閒觸動他如被人罵便說被人打被人打便說人要殺蓋不如此不足以觸動他也二者難察而能察之則可見其心之明而不蔽於近矣黃氏曰集注所謂遠特指明之逺而言蓋不為目前之言所惑而深究乎人心之微此所以為逺此亦必因子張之失而告之故其詞繁而不殺以致丁寧之意云輔氏曰即其詞之繁意之復固足以知之然考子張之為人亦宜不足於此夫浸潤膚受皆以巧譎而行其譖訴者也然使之不行則非文理密察既明且逺者有所不能子張之為人務外好髙於事已有忽略自足之病而無深潛縝密之功是其平日之所謂明者不過一觀其皮毛意象便自以為有得於人情之細密事理之精微則未必能察也故夫子因其問明而姑舉此二條以告之使子張因其言而反之身則夫不覺其入而信之深不及致詳而發之暴者其必知有所不能免而能有所戒矣楊氏曰驟而語之與利害不切於身者不行焉有不待明者能之也故浸潤之譖膚受之訴不行然後謂之明而又謂之逺逺則明之至也書曰視逺惟明輔氏曰明心之明也逺則明之至也知其著見其近未足以為至明也惟察其微照其逺然後為明之至耳子貢問政子曰足食足兵民信之矣言倉廩實而武備修然後教化行而民信於我不離叛也或問此一節曰制其田里薄其賦斂使民有常産而不失時則倉廩實而足於食矣比其什伍時其簡教使民有勇而知方則戎備飭而足於兵矣有是二者則民以信事其上而無詐欺離叛之心所謂民信之矣子貢曰必不得已而去於斯三者何先曰去兵去上聲下同言食足而信孚則無兵而守固矣或問此一節曰食足而民信則民親其上死其長如子弟之衛父兄手足之捍頭目可使制梃以撻秦楚之堅甲利兵矣故必不得已而去則兵或可無也子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立民無食必死然死者人之所必不免無信則雖生而無以自立不若死之為安文集曰安字極有味故寧死而不失信於民使民亦寧死而不失信於我也或問此一節曰以序言之則食為先以理言之則信為重蓋死生常理人之所必不免者若民無信則失其所以為民者而無以立乎天地之閒是以必有以使民寧無食以死而不失其尊君親上之心則其政之所以得民心而善民俗者可得而言矣程子曰孔門弟子善問直窮到底如此章者非子貢不能問非聖人不能答也輔氏曰問必窮到底者非於理己有所見而必欲究其精微之藴者不能也故惟子貢然後能如此問答必極其至者非據理之極而於膠轕肯綮之際如燭照數計無纎豪之疑者不能也故必聖人然後能如此答愚謂以人情而言則兵食足而後吾之信可以孚於民以民德而言則信本人之所固有非兵食所得而先也是以為政者當身率其民而以死守之不以危急而可棄也輔氏曰信本民德之固有人若無信則無以自立於世而上下相孚然後足以為國是乃為政之本而尤不可後者當身率其民以死守之不以危急而可以棄去也凡人於事之或有所棄者是其心必以為可以棄去耳惟知其不可得而棄去庶其寧死而終不棄之也棘子成曰君子質而己矣何以文為棘子成衛大夫疾時人文勝故為此言子貢曰惜乎夫子之說君子也駟不及舌言子成之言乃君子之意然言出於舌則駟馬不能追之又惜其失言也語録曰問古注只作一句說集注作兩句說如何曰若作一句說則惜乎二字無著落文猶質也質猶文也虎豹之鞟猶犬羊之鞟鞟其郭反鞟皮去毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣語録曰無世間許多禮法如何辨得君子小人如老莊之徒絶滅禮法則都打箇沒理㑹去輔氏曰有質斯有文有文須有質二者不可相無如陰陽晝夜之相須也皮譬則質也毛譬則文也皮毛具在然後虎豹犬羊之可辨文質兼存然後君子小人之可明若盡去其毛獨存其皮譬則盡去其文獨存其質耳如是則虎豹犬羊之貴賤君子小人之賢否皆不可辨矣夫棘子成矯當時之弊固失之過而子貢矯子成之弊又無本末輕重之差胥失之矣或問何以言子貢之言有病曰子成之說偏矣而子貢於文質之閒又一視之而無本末輕重緩急之差焉則又矯子成之失而過中者也蓋立言之難如此自非聖人孰能無所偏倚而常適其中也哉語録曰棘子成全說質固未盡善子貢全說文以矯子成又錯若虎皮羊皮雖除了畢竟自别事體不同試使一箇君子與屠販之人相對坐並不以文處之畢竟兩人好惡自别大率固不可無文尤當以質為本哀公問於有若曰年饑用不足如之何稱有若者君臣之詞用謂國用公意蓋欲加賦以足用也有若對曰盍徹乎徹通也均也周制一夫受田百畝而與同溝共井之人通力合作計畝均收大率民得其九公取其一故謂之徹語録曰徹是八家皆通出力合作九百畝田收則計畝均收公取其一魯自宣公稅畝又逐畝什取其一則為什而取二矣故有若請但專行徹法欲公節用以厚民也曰二吾猶不足如之何其徹也二即所謂什二也公以有若不喻其㫖故言此以示加賦之意對曰百姓足君孰與不足百姓不足君孰與足民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂為人上者所宜深念也楊氏曰仁政必自經界始經界正而後井地均穀祿平而軍國之須皆量是以為出焉故一徹而百度舉矣上下寧憂不足乎以二猶不足而教之徹疑若迂矣然什一天下之中正多則桀寡則貉不可改也後世不究其本而唯末之圖故征斂無藝費出無經而上下困矣又惡知盍徹之當務而不為迂乎或問哀公之不足非不足也什取其二不歸於公室而歸於三家也然則雖徹而何補於哀公之不足邪曰徹法行則自一夫百畝等而上之士大夫卿各有等差以至於君什卿祿之制皆可以次第而舉蓋不惟野人之井地均而君子之穀祿亦平矣輔氏曰不特君子穀祿之平至於軍國之須皆量是以為出所入者少則所出者不敢多故雖百度具舉而上下無不足之患也又曰哀公欲加賦以足用唯末是圖者也有若所謂盍徹乎則反本之論也以私意而觀其目前則反本之論為迂而圖末者有一旦之效若以理而觀於長久則一旦之效適所以重為後日之憂而反本之論實當務之急而經久之利也大抵末流之弊必愈求其末不至於覆亡則不知反古今一律也有若之言始末有序而不失其本旨此所謂似乎夫子者也子張問崇德辨惑子曰主忠信徙義崇德也主忠信則本立徙義則日新或問此一節曰主忠信則其徙義也有地而可據能徙義則其主忠信也有用而日新內外本末交相培養此德之所以日積而益髙也語録曰忠信是箇基本徙義又是進處無基本徒進不得有基本矣不徙義亦無緣得進又曰主忠信是劄腳處徙義是進步處漸漸進去則德自崇矣陳氏曰主忠信則存無不誠而本以立徙義則動無非理而行以進又互而言之能主忠信則所徙者溥博淵泉而時出能徙義則所主者篤實輝光而日新此德所以日積而髙自有不容己者愛之欲其生惡之欲其死既欲其生又欲其死是惑也惡去聲愛惡人之常情也然人之生死有命非可得而欲也以愛惡而欲其生死則惑矣既欲其生又欲其死則惑之甚也或問此一節曰溺於愛惡之私而以彼之死生定分為可以隨己之所欲且又不能自定而一生一死交戰於胸中虛用其力於所不能必之地而實無所損益於彼也可不謂之惑乎誠不以富亦祇以異此詩小雅我行其野之詞也舊說夫子引之以明欲其生死者不能使之生死如此詩所言不足以致富而適足以取異也程子曰此錯簡當在第十六篇齊景公有馬千駟之上因此下文亦有齊景公字而誤也胡氏曰集注例以前說為長然以舊說而姑存之非兩說並存之比也楊氏曰堂堂乎張也難與並為仁矣則非誠善補過不蔽於私者故告之如此輔氏曰誠善主忠信之事補過徙義之事不蔽於私辨惑之事堂堂乎張也難與並為仁蓋務外而不務內者故告之以此齊景公問政於孔子齊景公名杵臼魯昭公末年孔子適齊孔子對曰君君臣臣父父子子此人道之大經政事之根本也輔氏曰此乃三綱之大者故以為人道之經政事之根本是時景公失政而大夫陳氏厚施於國景公又多內嬖而不立太子其君臣父子之間皆失其道故夫子告之以此公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸景公善孔子之言而不能用其後果以繼嗣不定啓陳氏弒君篡國之禍楊氏曰君之所以君臣之所以臣父之所以父子之所以子是必有道矣景公知善夫子之言而不知反求其所以然蓋悅而不繹者齊之所以卒於亂也或問景公審能悅夫子之言而繹之則如之何曰舉齊國之政而授之夫子則君臣之倫一日而正之冇餘矣惜乎其不能此齊之所以卒於亂也子曰片言可以折獄者其由也與折之舌反與平聲片言半言或問片言之為半言曰言未畢而人已信之也折斷也胡氏曰折者析而二之也治獄之道兩辭具備曲直未分混為一區及乎别其孰為曲孰為直判然兩塗所謂折也子路忠信明決故言出而人信服之不待其辭之畢也輔氏曰忠信表裏之誠也明決智勇之用也忠信者折獄之本明決者折獄之用徒忠信而不明決則於折獄之際無以致其斷徒明決而不忠信則於折獄之際無以盡其誠子路之質篤實剛果而又學於聖門涵養有素則其於是四者固兼之矣此其所以於折獄之際言出而人信之愚謂忠信所以立於中明決足以照乎外忠信則人不忍欺明決則人不能欺子路無宿諾宿留也猶宿怨之宿急於踐言不留其諾也輔氏曰留人之諾則有時而不克副之矣子路已諾於人則不留於中胡氏曰舊說以宿訓豫乃宿戒之宿然徒有拒人之心而無取信之實惟宿怨之宿訓留則急於踐言乃孚於人之端也記者因夫子之言而記此以見子路之所以取信於人者由其養之有素也輔氏曰片言折獄非可以取辦於言也所以養其言之所自發者必有其素而人之信已在於未言之前也不然徒致力於言語之閒而求人之信則是頰舌之感也其能動於人乎尹氏曰小邾射以句繹奔魯曰使季路要我吾無盟矣千乘之國不信其盟而信子路之一言其見信於人可知矣一言而折獄者信在言前人自信之故也不留諾所以全其信也子曰聽訟吾猶人也必也使無訟乎范氏曰聽訟者治其末塞其流也正其本清其源則無訟矣楊氏曰子路片言可以折獄而不知以禮遜為國則未能使民無訟者也故又記孔子之言以見聖人不以聽訟為難而以使民無訟為貴胡氏曰無訟者躬行於上而人自不爭教化治而仁義孚非一日之所能至故聖人以之為難楊氏因以見折獄之未足為貴子張問政子曰居之無倦行之以忠居謂存諸心無倦則始終如一行謂發於事以忠則表裏如一語録曰居之無倦在心上說行之以忠在事上說居之無倦者便是要此心長在做主不可放倒便事事都應得去行之以忠者是事事要著實故集注云以忠則表裏如一謂心裏要如此者便外面也如此事事靠實去做也問行固是行其所居不知居是居箇甚物事曰常常恁地提省在這裏若有頃刻放倒便不得黃氏曰居之無倦則心常在事而思無不周行之以忠則事本於心而用無不盡二者為政之大要有志於及物者當以是為法則雖不中不逺矣程子曰子張少仁無誠心愛民則必倦而不盡心故告之以此輔氏曰不曰不仁而曰少仁者正與曽子所謂然而未仁難與為仁之說同聖人不輕絶人以不仁況子張乎唯其少仁故慘怛之意不足而無誠心愛民也既無誠心愛民則必倦而不盡心矣盡心則忠與無倦之本也子曰博學於文約之以禮亦可以弗畔矣夫重出子曰君子成人之美不成人之惡小人反是成者誘掖奬勸以成其事也語録曰成字只是欲他如此底意思胡氏曰誘掖者開導之於其先奬勸者從臾之於其後也君子小人所存既有厚薄之殊而其所好又有善惡之異故其用心不同如此輔氏曰厚者冀人之善薄者幸人之惡君子好善小人好惡所存根於所好所好發於所存所好者著所存者微學者能知君子小人用心之所以不同則知所當勉與所當戒者矣胡氏曰存以心言好以情言君子存心本於厚故待人亦厚而惟恐人之不厚小人存心本於薄故待人亦薄而惟恐人之不薄君子之好在於善故已有是善而亦欲人之趨於善小人之好在於惡故已有是惡而亦欲人之濟其惡季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正范氏曰未有已不正而能正人者輔氏曰政之所以得名以其能以正己者正人也己不能正烏能正人哉胡氏曰魯自中葉政由大夫家臣效尤據邑背叛不正甚矣故孔子以是告之欲康子以正自克而改三家之故惜乎康子之溺於利欲而不能也季康子患盜問於孔子孔子對曰茍子之不欲雖賞之不竊言子不貪欲則雖賞民使之為盜民亦知恥而不竊輔氏曰欲有公私貪欲云者是欲之私也上者下之倡在上者不貪欲則民之視之亦知以是為貴矣民知以不貪欲為貴則雖賞以誘之使為盜竊而其心愧恥自不肯為之矣尚何盜之患哉所謂雖賞之不竊者乃假設之言但以見夫必不肯為耳胡氏曰季氏竊柄康子奪嫡民之為盜固其所也盍亦反其本邪孔子以不欲啓之其㫖深矣奪嫡事見春秋傳蔡氏曰案春秋傳季孫有疾命正常曰南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃焉於䖍反為政者民所視效何以殺為欲善則民善矣真氏曰民性本善為上者以善迪之未有不趨於善者上一作尚加也偃仆也尹氏曰殺之為言豈為人上之語哉以身教者從以言教者訟而況於殺乎輔氏曰尹氏言涵蓄極有意味為人上者有能熟味而深思之則必當有所發矣子張問士何如斯可謂之達矣達者德孚於人而行無不得之謂語録曰如事親則得乎親事君則得乎君之類子曰何哉爾所謂達者子張務外語録曰問孔門學者如子張全然務外不知當初如何地學却如此曰也干他學甚事他資質是箇務外底人所以終身只是這意思夫子蓋已知其發問之意故反詰之將以發其病而藥之也輔氏曰聖人明睿之極物無遺照其於學者資品之髙下所學之醇醨所造之深淺無不洞徹於心目之間故其於答問之際髙下緩急雖或不同然其所以切於學者之身而皆為入德之要則又初無異也子張之學務外多於務內為名切於為實故夫子一聞其言而便知其意之所在遂反詰之以發其病而藥之譬如良醫之治疾既察其脉又驗其證必明知其疾之所以然然後寒涼溫熱之劑可得而施也子張對曰在邦必聞在家必聞言名譽著聞也子曰是聞也非達也聞與達相似而不同乃誠僞之所以分學者不可不審也語録曰達者實有而不居聞者却要做這模樣又曰達者是自家實去做而收斂近裏底聞者是做作底專務求人知而已輔氏曰二者之始雖若相似然所行通達者名譽自然著聞名譽著聞者所行未必通逹也故其實則有不同者且聞以名言達以實言務名者茍可以得名則無不矯以為之名得而其意怠矣務實者則無所為而為也不以人之有無而作輟不以事之始終而鋭怠行吾意而已此誠僞之所以分也故夫子既明辨之下文又詳言之夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫音扶下同好下皆去聲內主忠信而所行合宜審於接物而卑以自牧皆自修於內不求人知之事然德修於己而人信之則所行自無窒礙矣語録曰質與直是兩件輔氏曰主忠信質直也所行合宜好義也此存乎中以應乎外也審於接物察言觀色卑以自牧慮以下人也此審乎外以巽乎內也內外交相養而厥德修罔覺此豈求人知者之所為哉然德修於己而人自信之則行於邦家者自然無所窒礙矣夫聞也者色取仁而行違居之不疑在邦必聞在家必聞行去聲善其顔色以取於仁而行實背之又自以為是而無所忌憚此不務實而専務求名者故虛譽雖隆而實德則病矣輔氏曰善其顔色以取仁而行實背之所謂色取仁而行違也只此一句便是務名而不務實者之實證真實為仁者豈肯從事於顔色之間而又生襲取之心哉區區從事於顔色而欲襲取夫仁則其行自然違背而不相副也又自以為是而無所忌憚所謂居之不疑也使其色取行違而中不安焉則務實之心猶未盡喪也惟其自以為是而無所忌憚此所以見其專於務名夫名生於實則名亦何害惟其無實而徒有虛譽則驕矜之意日生而進修之力日怠故虛譽雖隆而實德日病也程氏曰學者須是務實不要近名有意近名大本已失更學何事為名而學則是僞也今之學者大抵為名為名與為利雖清濁不同然其利心則一也輔氏曰程子務實務名之論可謂切當為吾之未能事親也故學事親為吾之未能事長也故學事長為吾之未能正心誠意也故學正心而誠意為吾之未能齊家治國也故學齊家而治國是之謂務實務實而學則其修為之誠踐履之功淺深次序如魚飲水冷暖自知匆不自知其入於聖賢之域矣欲吾之有孝名也故勉焉以為孝欲吾之有忠名也故勉焉以為忠欲吾之有廉名也故勉焉以為廉欲吾之有信名也故勉焉以為信是之謂務名務名而學則唯欲其名之有聞而已有人作而無人輟鋭於始而怠於終終亦必亡而已矣所謂大本即實理也實理根於性具於心要在反求而自得一有向外近名之意則失之矣為名而學則是僞者謂其不循實理而騖外妄求也為名雖若清為利雖是濁然一有為之之意則便是利心也尹氏曰子張之學病在乎不務實故孔子告之皆篤實之事充乎內而發乎外者也當時門人親受聖人之教而差失有如此者況後世乎輔氏曰世有耳剽目竊先生長者之言未嘗窮究其㫖而遂轉相授受不惟誤已又且誤人者聞尹氏之說其亦當知所懼哉樊遲從遊於舞雩之下曰敢問崇德修慝辨惑慝吐得反胡氏曰慝之字從心從匿蓋惡之匿於心者修者治而去之子曰善哉問善其切於為已先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與與平聲先事後得猶言先難後獲也為所當為而不計其功則德日積而不自知矣語録曰但做自家合做底事不必望他功效今做一件好事便望他功效則心便兩岐了非惟是功效不見連那所做底事都壞了而今一向做將去不望他功效則德何緣不崇輔氏曰先難謂先從事於其所難後獲謂後其所得而不起計獲之心也夫為所當為本非難事然自學者言之則自惰而勤自利而義其機生其勢矯非勉彊則有所不能故以為難也為其事者固必有其功然方其為事之始而遽欲計其功焉則是利心也為利之心一萌則其大本已失易盈易涸輕得輕喜尚何德之可崇哉故必為所當為而不計其功則不亟不徐循吾理行吾義而已此所以德日積而不自知也陳氏曰先其事之所當為而後其效之所得是不計功謀利也只管為所當為則德日積不計效則德崇而不自知矣專於治已而不責人則己之惡無所匿矣輔氏曰常情觀人則明自觀則暗責人則嚴待已則恕故惡常藏匿於其心又才有心去攻人之惡則於己之惡便鹵莽而不暇鋤治矣知一朝之忿為甚微而禍及其親為甚大則有以辨惑而懲其忿矣輔氏曰人本無所惑惟為忿所蔽而不知利害之所在故惑蓋忿心之所發易得突兀而橫肆苟不有以懲之於其始則其終或至於忘其身以及其親此辨惑者所以當懲其忿也樊遲粗鄙近利故告之以此三者皆所以救其失也愚謂粗故為氣所使鄙故吝於改過近利故有計獲之心三者之病亦反覆相因也范氏曰先事後得上義而下利也人惟有欲利之心故德不崇惟不自省已過而知人之過故慝不修感物而易動者莫如忿忘其身以及其親惑之甚者也惑之甚者必起於細微能辨之於早則不至於大惑矣故懲忿所以辨惑也輔氏曰為所當為便是義才計其功便是利人唯有欲利之心故德不崇此語最切要蓋人欲天理不能兩立也久矣起於細微謂一朝之忿也至於大惑則忘其身以及其親也要當辨之於早此忿之始發不可以不懲也能懲其忿則惑自辨矣樊遲問仁子曰愛人問知子曰知人上知字去聲下同愛人仁之施知人知之務輔氏曰仁主於愛順而達之則無不愛矣故愛人則仁德之所施智者無不知也急先務之為貴故知人則是智者之先務觀此兩句亦可以識仁智之用矣樊遲未達曽氏曰遲之意蓋以愛欲其周而知有所擇故疑二者之相悖爾曽氏名幾河南人語録曰愛人則無所不愛知人則便有分别兩箇意思自相反了故疑之子曰舉直錯諸枉能使枉者直舉直錯枉者知也使枉者直則仁矣如此則二者不唯不相悖而相反為用矣語録曰每常說仁知一箇是慈愛一箇是辨别各自向一路惟是舉直錯諸枉能使枉者直方見得仁知合一處仁裏面有知知裏面有仁樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也鄉去聲見賢遍反遲以夫子之言專為知者之事又未達所以能使枉者直之理子夏曰富哉言乎歎其所包者廣不止言知輔氏曰子夏一聞其說便歎聖人之言所包者富不墮於一偏不滯於一隅即知人之中以見愛人之實推夫智之用以極夫仁之功其於仁知之體用蓋已深體而默識之矣不然何其言之明決精審沛然無疑而暗與聖人之言相發乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣選息戀反陶音遙逺好字伊尹湯之相也不仁者逺言人皆化而為仁不見有不仁者若其逺去爾所謂使枉者直也子夏蓋有以知夫子之兼仁知而言矣程子曰聖人之語因人而變化雖若有淺近者而其包含無所不盡觀於此章可見矣非若他人之言語近則遺逺語逺則不知近也輔氏曰他人之言皆出於一時之意見故偏狹固滯聖人之言皆由此廣大心中流出雖其深淺小大因人而變化然其包括自然無所不盡亦非有意而為之固非常人之所及也尹氏曰學者之問也不獨欲聞其說又必欲知其方不獨欲知其方又必欲為其事如樊遲之問仁知也夫子告之盡矣樊遲未達故又問焉而猶未知其何以為之也及退而問諸子夏然後有以知之使其未喻則必將復問矣既問於師又辨諸友當時學者之務實也如是輔氏曰聞其說則知夫善之可為也知其方則得其所以為之之術也為其事則力進以求其至也徒聞其說而不知其方徒知其方而不為其事則其於善也如說河如畫餅終亦何益於事哉便樊遲而未喻則必將復問無疑矣既問於師以啓其端又辨諸友以究其義非有意於踐修之實者不能也子貢問友子曰忠告而善道之不可則止無自辱焉告工毒反道去聲友所以輔仁故盡其心以告之善其說以道之語録曰告之之意固是忠了須又教道得善始得然以義合者也故不可則止若以數而見疏則自辱矣曽子曰君子以文㑹友以友輔仁講學以㑹友則道益明輔氏曰知之事也取善以輔仁則德日進輔氏曰行之事也為人由已由人乎哉雖朋友但能輔助之而已相觀以善攝以威儀切切偲偲忠告善道皆輔仁之道論語纂疏卷六
