body:
  text: 欽定四庫全書孟子纂疏卷十一宋趙順孫撰朱子集注告子章句止凡二十章告子曰性猶杞栁也義猶杯棬也以人性為仁義猶以杞栁為杯棬杯音杯棬邱圓反性者人生所禀之天理也杞栁櫃栁杯棬屈木所為若巵匜之屬語録曰杯棬似今棬杉合子杞栁恐是今做合箱底栁北人以此為箭謂之栁箭即蒲栁也告子言人性本無仁義必待矯揉而後成如荀子性惡之說也語録曰告子只是認氣為性見得性有不善須拗他方善孟子曰子能順杞栁之性而以為杯棬乎將戕賊杞栁而後以為杯棬也如將戕賊杞栁而以為杯棬則亦將戕賊人以為仁義與率天下之人而禍仁義者必子之言夫戕音墻與平聲夫音扶言如此則天下之人皆以仁義為害性而不肯為是因子之言而為仁義之禍也輔氏曰不言戕賊性而言戕賊人者人之所以為人者性也為仁義之禍者仁義何可禍哉人自禍之耳亦猶言道非亡也幽厲不繇也云耳真氏曰告子之說蓋謂人性本無仁義必用力而强為若杞栁本非杯棬必矯揉而後就也何其昧於理邪夫仁義即性也告子乃曰以人性為仁義如此則性自性仁義自仁義也其可乎夫以杞栁為杯棬必斬伐之屈折之乃克有成若人之為仁義乃性之所固有孩提之童皆知受親即所謂仁及其長也皆知敬兄即所謂義何勉强矯拂之有使告子之言行世之人必曰仁義乃戕賊人之物將畏憚而不肯為是率天下而害仁義其禍將不可勝計此孟子所以不容不辨也告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也湍他端反湍波流瀠回之貌也輔氏曰湍水者水急流也水急則波流自然作瀠回之貌告子因前說而小變之近於揚子善惡混之說或問湍水即揚子之說曰告子以善惡皆性之所無而生於習揚子以善惡皆性之所有而成於修此亦有小異也輔氏曰告子本以氣為性此說亦然故曰因前說然所謂小變之者但前說以性為惡必矯揉而後可為善而此說則以性為本無善惡但可以為善可以為惡耳此其為小變也然揚子則謂人性實有善惡相混於中此則謂性中實無善惡但由人所為而分善惡耳亦不全同故曰近也孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下言水誠不分東西矣然豈不分上下乎性即天理未有不善者也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也夫音扶搏補各反搏擊也躍跳也顙額也水之過額在山皆不就下也然其本性未嘗不就下但為搏激所使而逆其性耳此章言性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也輔氏曰告子之見正以為人之性本無定體可以為善可以為不善故也夫善是順性而為本非難事而為善者常若難惡是反性而為本是難事而為惡者常若易此蓋由氣禀所拘物欲所蔽積習之久以妄為真而然故學者須是主敬以涵養放教生處漸漸熟熟處漸漸生然後可以復歸其本順者自然易而逆者自然難也真氏曰告子杞栁之喻既為孟子所闢則又小變其說而取喻於湍水蓋前說專指人性為惡至是又謂可以為善可以為惡而借水以明之不知水之性未嘗不就下雖搏之過顙激之在山可暫違其本性而終不能使不復其本性也人之為不善者固有之矣然其所以然者往往為物欲所誘利害所移而非其本然之性也故雖甚愚無知之人詈之以惡逆斥之以盜賊鮮不變色者至於見赤子之入井則莫不怵惕而救之朱子章㫖數言盡之矣告子曰生之謂性生指人物之所以知覺運動者而言語録曰告子只說那生來底便是性手足運行耳目視聽與夫心有知覺之類他却不知生便屬氣稟自氣禀而言人物便有不同處若說理之謂性則可然理之在人在物亦不可做一等說又曰生之謂性只是就氣上說得蓋謂人也有許多知覺運動物也有許多知覺運動人物只一般却不知人之所以異於物者以其得正氣故具得許多道理如物則氣昏而理亦昏了黃氏曰知覺者人之精神非所以言性也輔氏曰人物之生則有知覺能運動死則無知覺不能運動也告子論性前後四章語雖不同然其大指不外乎此或問子以告子論性數章皆本乎生之謂性之一言何也曰告子不知理之為性乃即人之身而指其能知覺運動者以當之所謂生者是也始而見其但能知覺運動非教不成故有杞栁之譬既屈於孟子之言而病其說之偏於惡也則又繼而為湍水之喻以見其但能知覺運動而非有善惡之分又以孟子為未喻已之意也則又以此章極其立論之本意而索言之至於孟子折之則其說又窮而終不悟其非也其以食色為言蓋猶生之云爾而公都子之所引又湍水之餘論也以是考之凡告子之論性其不外乎生之一字明矣但前此未有深究其弊者往往隨其所向各為一說以與之辨而不察其所以失之之端獨在於此是以其說雖多而訖無一定之論也與近世佛氏所謂作用是性者略相似語録曰禪家說作用是性蓋謂目之視耳之聽手之捉執足之運奔皆性也說來說去只說得箇形而下者又曰且如手能執捉若執刀胡亂殺人亦可為性乎陳氏曰佛氏把作用是性便喚蠢動含靈皆有佛性運水搬柴無非妙用不過只認得箇氣而不說著那理爾輔氏曰謂略相似者蓋釋氏又說得周遮無畔岸爾大略則相類也孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然與平聲下同白之謂白猶言凡物之白者同謂之白更無差别也白羽以下孟子再問而告子曰然則是謂凡有生者同是一性矣文集曰今告子曰生之謂性如白之謂白而凡白無異白焉則是指形氣之生者以為性而謂人物之所得於天者亦無不同矣然則犬之性猶牛之性牛之性猶人之性與孟子又言若果如此則犬牛與人皆有知覺皆能運動其性皆無以異矣於是告子自知其說之非而不能對也黃氏曰告子既不知性與氣之所以分而直以氣為性又不知氣或不齊性因有異而遂指凡有生者以為同是以孟子以此語之而進退無所據也輔氏曰以告子無答辭而知之也孟子反復問之以盡告子之辭然後告子自知其說之非而不能對此孟子所以為知言而善教也愚案性者人之所得於天之理也生者人之所得於天之氣也語録曰生之謂氣生之理謂性性形而上者也氣形而下者也語録曰形而上者一理渾然無有不善形而下者則紛紜雜糅善惡有所分矣人物之生莫不有是性亦莫不有是氣然以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之禀豈物之所得而全哉此人之性所以無不善而為萬物之靈也文集曰問中庸章句謂人物之生各得其所賦之理以為健順五常之德或問亦言人物雖有氣禀之異而理則未嘗不同孟子集注謂以氣言之則知覺運動人與物若不異以理言之則仁義禮智之禀豈物之所得而全哉二說似不同豈氣既不齊則所賦之理亦隨以異歟曰論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同也氣之異者粹駁之不齊理之異者偏全之或異又曰形氣既具而有知覺能運動者生也有生雖同然形氣既異則其生而有得乎天之理亦異蓋在人則得其全而無有不善在物則有所蔽而不得其全是乃所謂性也語録曰氣相近如知寒暖識飢飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是他義上有一㸃明虎狼之父子只是他仁上有一㸃明其他更推不去又曰知覺運動人物皆異而其中却有同處仁義禮智是同而其中却有異處須是子細與看梳理教有條理告子不知性之為理而以所謂氣者當之是以杞栁湍水之喻食色無善無不善之說縱橫繆戾紛紜舛錯而此章之誤乃其本根所以然者蓋徒知知覺運動之蠢然者人與物同而不知仁義禮智之粹然者人與物異也孟子以是折之其義精矣文集曰此章乃告子迷繆之本根孟子開示之要切蓋知覺運動者形氣之所為仁義禮智者天命之所賦學者於此正當審其偏正全闕而求知所以自貴於物不可以有生之同反自陷於禽獸而不自知已性之大全也告子曰食色性也仁內也非外也義外也非內也告子以人之知覺運動者為性故言人之甘食悅色者即其性輔氏曰人之甘食者知其食之美而甘之也悅色者知其色之美而悅之也知即知覺也甘與悅即運動也故仁愛之心生於內而事物之宜由乎外學者但當用力於仁而不求合於義也輔氏曰告子以仁愛之心生於內故以仁為內事物之宜由乎外故以義為外殊不知愛雖生於心而可愛之物則在外事理之宜雖見乎外而所以宜之者則在內是於一物之中彊生此二見也孟子曰何以謂仁內義外也曰彼長而我長之非有長於我也猶彼白而我白之從其白於外也故謂之外也長上聲下同我長之我以彼為長也我白之我以彼為白也語録曰告子只知得人心却不知有道心只見那趨利避害飲食飽暖等處而不知辨别那義利等處正是本然之性所以道彼長而我長之蓋謂我無長彼之心由彼長故不得不長之所以指義為外也曰異於白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與且謂長者義乎長之者義乎與平聲下同張氏曰上異於二字疑衍李氏曰或有闕文焉愚案白馬白人所謂彼白而我白之也長馬長人所謂彼長而我長之也白馬白人不異而長馬長人不同是乃所謂義也義不在彼之長而在我長之之心則義之非外明矣輔氏曰白馬白人則但同謂之白可也至於長馬長人則不同矣人孰肯以長人之心以長馬乎其所以然者是乃吾心之義有不同耳以此觀之則義不在彼之長而在我長之之心明也豈可謂義為外而不事哉曰吾弟則愛之秦人之弟則不愛也是以我為悅者也故謂之內長楚人之長亦長吾之長是以長為悅者也故謂之外也言愛主於我故仁在內敬主於長故義在外曰耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與耆與嗜同夫音扶言長之耆之出於心也輔氏曰炙在外而耆之者在我長在外而長之者在我理初無異也林氏曰告子以食色為性故因其所明者而通之輔氏曰林氏正說著孟子意孟子正欲就告子之說明處以通之也自篇首至此四章告子之辨屢屈而屢變其說以求勝卒不聞其能自反而有所疑也此正其所謂不得於言勿求於心者所以卒於鹵莽而不得其正也輔氏曰告子自不見性又不能因孟子之言以致思徒守其舊所聞者以為說雖其辨屢屈不過屢變其說以求勝是其意只欲說得行便休終不肯反求深體以造乎自得之地皆其不得於言勿求於心者錮之是以卒於鹵莽而墮於詖淫邪遁之流也孟季子問公都子曰何以謂義內也孟季子疑孟仲子之弟也蓋聞孟子之言而未達故私論之曰行吾敬故謂之內也所敬之人雖在外然知其當敬而行吾心之敬以敬之則不在外也鄉人長於伯兄一歲則誰敬曰敬兄酌則誰先曰先酌鄉人所敬在此所長在彼果在外非由內也長上聲伯長也酌酌酒也此皆季子問公都子答而季子又言如此則敬長之心果不由中出也輔氏曰季子因公都子之言而復疑敬雖在內而長在外故以伯兄鄉人為問而曰所敬在此所長在彼則敬長之心果不由中出也公都子不能答以告孟子孟子曰敬叔父乎敬弟乎彼將曰敬叔父曰弟為尸則誰敬彼將曰敬弟子曰惡在其敬叔父也彼將曰在位故也子亦曰在位故也庸敬在兄斯須之敬在鄉人惡平聲尸祭祀所主以象神雖子弟為之然敬之當如祖考也在位弟在尸位鄉人在賓客之位也庸常也斯須暫時也言因時制宜皆由中出也愚謂因時制冝乃義之事也兄與叔父固所當敬此理之常也若弟在尸位鄉人在賓客之位則亦當敬然此只是暫時之敬耳或常或暫因時制宜則皆本於吾心爾故曰由中出也季子聞之曰敬叔父則敬敬弟則敬果在外非由內也公都子曰冬日則飲湯夏日則飲水然則飲食亦在外也此亦上章耆炙之意范氏曰二章問答大指略同皆反覆譬喻以曉當世使明仁義之在內則知人之性善而皆可以為堯舜矣輔氏曰若以義為外則便於性之本體偏枯了安能知人性之本善既不知人性之本善則豈能知人皆可以為堯舜也哉公都子曰告子曰性無善無不善也此亦生之謂性食色性也之意語録曰告子之意說這性是不管善不管惡底物事他說食色性也便見得他只道手能持足能履目能視耳能聽便是物事近世蘇氏胡氏之說蓋如此蘇氏名軾眉山人胡氏名宏安國子語録曰蘇氏論性說自上古聖人以來至孔子不得已而說中說一未嘗分善惡言也自孟子道性善而一與中支矣更不看道理只認我說得行底便是又曰胡氏知言云凡人之生粹然天地之心道義全具無適無莫不可以善惡辨不可以是非分即告子性無善無不善之論或曰性可以為善可以為不善是故文武興則民好善幽厲興則民好暴好去聲此即湍水之說也或曰有性善有性不善是故以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啓王子比干韓子性有三品之說蓋如此語録曰韓子分三品却只說得氣不曽說得性陳氏曰韓子謂人之所以為性者五曰仁義禮智信此語似看得性字端的但分為三品又差了三品之說只說得氣禀然氣禀之不齊蓋或相什百千萬豈但三品而已哉他本要求勝荀揚却又與荀掦無甚異案此文則微子比干皆紂之叔父而書稱微子為商王元子疑此或有誤字今曰性善然則彼皆非與與平聲孟子曰乃若其情則可以為善矣乃所謂善也乃若發語辭輔氏曰先儒皆訓若為順言順其本然之情則無不善恐不必如此說蓋情自善不待順之而善也且此若字正與下若夫字相對故斷以為發語詞情者性之動也語録曰心如水情即動處又曰情是這心裏動出有箇絡脉曲折隨物恁地去陳氏曰在心裏面未發動底是性事物觸著便發動出來底是情這動底只是就性中發出來不是别物人之情本但可以為善而不可以為惡則性之本善可知矣文集曰情未必皆善也然而本則可以為善而不可以為惡惟反其情故為惡耳語録曰性不可說情却可說所以公都子問性孟子却答他情輔氏曰情只是性之動性既如此則情亦如此也但此則因其情之善而可以知其性之本善耳若程子謂天下之理原其所自無有不善喜怒哀樂未發何嘗不善發而中節亦何往而不善此則又因其性之善而知其情之無不善也陳氏曰情之中節是從本性發來便是善更無不善其不中節是感物欲而動不從本性發來便有箇不善孟子論情有把做善者是專指其本於性之發者言之若夫為不善非才之罪也夫音扶才猶材質人之能也語録曰問才與材字之别曰才字是就理義上說材字是就用上說孟子說人見其濯濯也則以為未嘗有材是用木旁材字便是指適用底說非天之降才爾殊便是就理義上說問才字是以其能解作用底說材質是合形體說否曰是兼形體說便是說那好底材問如說材料相似否曰是又曰才是能主張運動做事底如這事有人㑹做得有不㑹做得有人㑹發揮得有不㑹發揮得這處可見其才輔氏曰凡物之能為是器人之能為是事者皆其材質也人有是性則有是才性既善則才亦善人之為不善乃物欲陷溺而然非其才之罪也或問公都子問性而孟子以情與才告之何也曰性之本體理而已情則性之動而有為才則性之具而能為者也性無形象聲臭之可形容也故以二者言之誠知二者之本善則性之為善必矣語録曰問孟子論才專言善何也曰才本是善但為氣所染故有善不善亦是人不能盡其才人皆有許多才聖人却做許多事我不能做得些事出故孟子謂或相倍蓰而無算者不能盡其才者也又曰孟子是說本來善底才又曰孟子所謂才止是指本性之發用無有不善處如人之有才事事做得出來一性之中萬善完備發將出來便是才也問孟子言情與才皆善如何曰情本自善其發也未有染汚何嘗不善才只是資質亦無不善譬物之白者未染時只是白也真氏曰善者性也而能為善者才也性以體言才以用言才本可以為善而不可以為惡今乃至於為不善者是豈才之罪哉陷溺使然也惻𨼆之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之或相倍蓰而無算者不能盡其才者也惡去聲舍上聲蓰音師恭者敬之發於外者也敬者恭之主於中者也陳氏曰恭就貌上說敬就心上說恭主容敬主事鑠以火消金之名自外以至內也算數也言四者之心人所固有但人自不思而求之耳所以善惡相去之逺由不思不求而不能擴充以盡其才也語録曰惻隱羞惡是心也所以能惻隱羞惡者才也輔氏曰仁義禮智性也惻隱羞惡恭敬辭遜是非情也今但謂之心者心統性情者也四者之心人所固有非猶火之鑠金自外而至內也但思而求之則常存舍而不思則失之矣存則善失則惡然有失之多者有失之少者有失之久者有失之暫者以至於相去之逺一倍十倍而不可數者皆由於不思不求而不能擴而充之以盡其才也真氏曰性我所固有非自外來獨患夫人之弗思弗求爾夫物有求而弗得者在外故也性則求其在我者何不得之有本然之才初無限量極天下之善無不可為者今乃善惡相去之逺由不能盡其才也曰思曰求而又曰盡此孟子教人用功之至要前篇言是四者為仁義禮智之端而此不言端者彼欲其擴而充之此直因用以著其本體故言有不同耳詩曰天生蒸民有物有則民之秉夷好是懿德孔子曰為此詩者其知道乎故有物必有則民之秉夷也故好是懿德好去聲詩大雅蒸民之篇蒸詩作蒸衆也物事也則法也夷詩作彞常也懿美也有物必有法如有耳目則有聰明之德有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿德者以此觀之則人性之善可見詩傳曰天生衆民有是物必有是則蓋自百骸九竅五藏而達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聽之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性故其情無不好此美德者輔氏曰莫非物也獨舉其耳目父子言者蓋耳目則人身之所具而最切者父子則人身之所接而最親者故特舉其耳目慈孝之則而言之使人就其切近者體而認之則餘皆可以類推而性之本善可得而見蔡氏曰末舉蒸民之詩者當然之則無物不體而此理之妙實根於人性之本然惟人之生各禀其有常之性所以應事接物皆好此懿美之德而不容已也所謂懿德即所謂物之則也其曰好是者即指上文秉彞而言也天命之所賦者謂之則人性之所禀者謂之彝存於心而有所得者則謂之德其實一而已矣孔子又加一必字於有則之上加一故字於好是之上其㫖愈明矣孟子舉此詩者蓋謂秉彞好德心之所好處即是性之發動處就性初發動處指出以示人方見得此性之木善而公都子所問之三說皆不辨而自明矣語録曰三者雖同為說氣質之性然兩或之說猶知分别善惡使其知以性而兼言之則無病矣惟告子無善無不善之說最無狀他就此無善無惡之名渾然無所分則雖為善為惡總不妨與今世之不擇善惡而顛倒是非稱為本性者何以異哉程子曰性即理也理則堯舜至於塗人一也才禀於氣氣有清濁禀其清者為賢禀其濁者為愚學而知之則氣無清濁皆可至於善而復性之本湯武身之是也孔子所言下愚不移者則自暴自棄之人也文集曰生而知者氣極清而理無蔽也學知以下則氣之清濁有多寡而理之全闕繫焉耳語録曰天地間只是一道理性便是理人之所以有善有不善只緣氣質之稟各有清濁又曰性與氣皆出於天性只是理氣則已屬於形象性之善固無不同氣便有不齊處問才禀於氣如何曰氣亦天也理精一故純氣粗故雜又曰理如寶珠氣如水有是理而後有是氣有是氣則必有是理但禀氣之清者為聖為賢如珠落在清水中稟氣之濁者為愚為暗如珠落在濁水中輔氏曰此所謂才則是就氣質之性言與孟子之說少異矣學而知之則氣無清濁皆可至於善而復性之本者即張子所謂善反之則天地之性存焉者是也又曰論性不論氣不備論氣不論性不明二之則不是或問程子之說曰孟子之言性善者前聖所未發也而此言者又孟子所未發也文集曰論性不論氣則無以見生質之異論氣不論性則無以見理義之同語録曰本然之性只是至善然不以氣質而論之則莫知其有昏明開塞剛柔强弱故有所不備徒論氣質之性而不自本原言之則雖知有昏明開塞剛柔强弱之不同而不知至善之源未嘗有異故有所不明須合性與氣觀之然後盡又曰性自是性氣自是氣須是兩邊都說理方明備二之者正指上兩句也黃氏曰知有天地之性而不知有氣質之性則如三品之類包括不盡故曰不備知有氣質之性而不知有天地之性則得之天地者無以自别於氣質故曰不明然二者本非有異特所從言之不同耳故二之則非也陳氏曰只論大本而不及氣禀非所論有缺闞未備若只論氣禀而不及大本便只說得粗底而道理全然不明千萬世而下學者只得按他說更不可改易蔡氏曰論性不論氣是語上而遺下故不備論氣不論性是語下而遺上故不明張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉或問氣質之性曰天地之所以生物者理也其生物者氣與質也人物得是氣質以成形而其理之在是者則謂之性然所謂氣質者有偏正純駇昏明厚薄之不齊故性之在是者其為品亦不二所謂氣質之性者告子所謂生之謂性程子所謂生質之性所禀之性所謂才者皆謂是也然其本然之理則純粹至善而已所謂天地之性者也孟子所謂性善程子所謂性之本所謂極本窮源之性皆謂此者也語録曰論天地之性則專指理而言論氣質之性則以理與氣雜而言之又曰天地之性是理也才到隂陽五行便有氣質之性至此便有昏明厚薄之殊得其秀而最靈乃氣質以後事又曰天地之性則太極本然之妙萬殊之一本也氣質之性則二氣交運而生一本而萬殊也又曰氣質之性便只是這箇天地之性却從那裏過好底性如水氣質之性如殺些醬與鹽便是一般滋味又曰性只是理然無那天氣地質則此理沒安頓處但得氣之清明則不蔽錮此理順發出來蔽錮少者發出來天理勝蔽錮多者則私欲勝便見得本原之性無有不善只被氣質有昏濁則隔了學以反之則天地之性存矣故說性須兼氣質言方備又曰氣質陰陽五行所為性即太極之全體但論氣質之性即此體墮在氣質之中耳非别有一性也又曰氣質之說起於張程極有功於聖門有補於聖學讀之使人深有感黃氏曰張子分為天地之性氣質之性然後諸子之說定性善者天地之性也餘則所謂氣質之性也然嘗有疑焉所謂氣質之性形而後有則天地之性乃未受生以前天理之流行者如此則可謂之命而不可謂之性曰非此之謂也蓋自其理而言之不雜乎氣質而為言則是乃天地賦與萬物之本然者而寓乎氣質之中也故其言曰善反之則天地之性存焉蓋謂天地之性未嘗離乎氣質之中也其以天地為言但指其純粹至善乃天地賦豫之本然也曰形而後有氣質之性其所以有善惡之不同何也曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性有善惡也陳氏曰氣質之性是以氣禀言之天地之性是以大本言之其實天地之性亦不離乎氣質之中只是就那氣質中分别出天地之性不與相離為言爾愚案程子此說才字與孟子本文小異蓋孟子專指其發於性者言之故以為才無不善程子兼指其禀於氣者言之則人之才固有昏明强弱之不同矣張子所謂氣質之性是也二說雖殊各有所當然以事理考之程子為密蓋氣質所禀雖有不善而不害性之本善性雖本善而不可以無省察矯揉之功學者所當深玩也或問程子何以言才之有不善也曰此以其禀於氣者言之也蓋性不自立依氣而形故形生質具則性之在是者為氣所拘而其理之為善者終不可得而變但氣之不美者則其情多流於不善才亦有時而偏於不善若其所以為情與才之本然者則初亦未嘗不善也此孟子程子之說所以小異而不害其為同也文集曰集注中以程子為密即見得孟子所說未免少有疏處今但以程子為主而推其說以陰補孟子之不足則於理無遺矣語録曰孟子所謂才止是指本性之發用無有不善處如人之有才事事做得出來一善之中萬善完備發將出來便是才也如程子論才却是指氣質而言所以云有善不善問孟程所論才字同異曰才只一般能為之謂才才之初亦無不善緣他氣禀有善惡故其才亦有善惡孟子自其同者言之故以為出於性程子則自其異者言之故以為禀於氣大抵孟子多是專以性言故以為性善才亦無不善到周子程子張子方始說到氣上要之須兼是二者言之方備又曰程子說才與孟子說才自不同然不相妨須是子細看始得輔氏曰孟子專以其發於性者言之故以為性本善情與才皆無不善此固足以使人知性善而皆可為堯舜矣程子兼指其稟於氣者言之則才雖有善而初不害所謂本善又可見性雖本善而賦命受生之後又不可不加省察矯楺之功也故學者於程子之說尤當深玩孟子曰富歲子弟多賴凶歲子弟多暴非天之降才爾殊也其所以陷溺其心者然也富嵗豐年也賴藉也豐年衣食饒足故有所賴藉而為善凶年衣食不足故有以陷溺其心而為暴今夫牟麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也夫音扶牟音牟耰音憂磽苦交反牟大麥也耰覆種也日至之時謂當成熟之期也磽瘠薄也故凡同類者舉相似也何獨至於人而疑之聖人與我同類者聖人亦人耳其性之善無不同也故龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也蕢音匱蕢草器也不知人足之大小而為之屨雖未必適中然必似足形不至成蕢也口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也耆與嗜同下同易牙古之知味者愚案易牙齊桓公臣也淄澠二水為食易牙亦知二水之味桓公試之輒驗言易牙所調之味則天下皆以為美也惟耳亦然至於聲天下期於師曠是天下之耳相似也師曠能審音者也言師曠所和之音則天下皆以為美也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也姣古卯反子都古之美人也姣好也故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之悅我心猶芻豢之悅我口然猶可也草食曰芻牛羊是也榖食曰豢犬豕是也程子曰在物為理處物為義體用之謂也語録曰理是在此物上便有此理義是於此物上自家處置合如此便是義義便有箇區處又曰凡物皆有理蓋理不外乎事物之間處物為義義宜也是非可否處之得宜之謂義也又曰且如這桌子是物於理可以安頓物事我把他如此用便是義又曰揚雄言義以宜之韓愈言行而宜之之謂義若以義為宜則義有在外意思須如程子言處物為義是則處物者在心而非外也又曰非處物為義一句則後來人恐未免有義外之見蓋物之宜雖在外而所以處之使得其宜者則在內也輔氏曰事亦物也凡一事一物各有一理理體也處其事物使之各得其理則為義用也此亦先儒之所未及到程子而其義始明孟子言人心無不悅理義者但聖人則先知先覺乎此耳非有以異於人也輔氏曰雖聖人亦只是先知先覺乎此而已無有不同也程子又曰理義之悅我心猶芻豢之悅我口此語親切有味須實體察得理義之悅心真猶芻豢之悅口始得輔氏曰芻豢謂蔬果五穀也人之口悅芻豢自是相投入相宜相悅有不可形容者心之悅理義也亦然故程子以為親切有味學者須是著實體察其意味方為有益孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材馬此豈山之性也哉蘖五割反牛山齊之東南山也邑外謂之郊言牛山之木前此固嘗美矣今為大國之郊伐之者衆故失其美耳息生長也日夜之所息謂氣化流行未嘗間斷故日夜之間凡物皆有所生長也輔氏曰問此但言夫物耳而人之良心亦係於氣化乎曰古者氣化盛而聖人多後世氣化衰而聖人少雖有之而又不得其時與位焉是亦係乎氣化也至於平旦之氣清明之時良心油然而生長者則又係乎一身之氣耳是亦一氣化也萌芽也蘖芽之旁出者也濯濯光潔之貌材材木也言山木雖伐猶有萌蘖而牛羊又從而害之是以至於光潔而無草木也雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉好惡並去聲良心者本然之善心即所謂仁義之心也愚謂仁義性也而以心言者心統乎性也良心即仁義之心即所謂性也平旦之氣謂未與物接之時清明之氣也語録曰平旦之氣只是夜間息得許多時節不與事物接才醒來便有得這些自然清明之氣此心自恁地虛靜少間才與物接依舊又汩沒了好惡與人相近言得人心之所同然也幾希不多也語録曰其好惡與人相近但此心存得不多時也又曰幾希不逺也後人來就幾希字下注開了便覺意不連輔氏曰言一身之氣清明則其良心自然發見雖未能與聖人同其極致然亦大綱與人相近所爭不多也梏械也語録曰如被他禁械在那裏更不容轉動反覆展轉也文集曰反覆非顛倒之謂蓋有互換更迭之意又曰反覆只是循環言人之良心雖已放失然其日夜之間亦必有所生長語録曰問凡物日夜固有生長若良心既放而無操存之功則安得自能生長曰放去未逺故亦能生長故平旦未與物接其氣清明之際良心猶必有發見者語録曰氣清則心清其日夜之所息平旦之氣蓋是靜時有這好處發見但其發見至微而旦晝所為之不善又已隨而梏亡之語録曰問平旦之氣甚微小如何㑹養得完全曰不能存得夜氣皆是旦晝所為壞了只是去旦晝理㑹這兩字是箇大關鍵這裏有工夫如山木既伐猶有萌蘖而牛羊又牧之也語録曰牛山之木嘗美矣是喻人仁義之心斧斤伐之猶人之放其良心非無萌蘖之生便是平旦之氣其好惡與人相近處旦晝之所梏亡則又所謂牛羊又從而牧之雖芽蘖之萌亦且戕賊無餘矣晝之所為既有以害其夜之所息夜之所息又不能勝其晝之所為是以展轉相害至於夜氣之生日以浸薄而不足以存其仁義之良心則平旦之氣亦不能清語録曰氣只是這箇氣日裏也生夜間也生只是日間生底為物欲梏亡隨手又耗散了夜間生底則聚得在那裏不曽耗散所以養得那良心且如日間目視耳聽口裏說話手足蓮動若不曽操存得無非是耗散底時節夜間則停留得在那裏如水之流夜間則關得許多水住在這裏這一池水便蒲次日又放乾了到夜裏又聚得些少若從平旦起時便接續操存而不放則此氣常生而不已若日間不存得此心夜間雖聚得些小又不足以勝其旦晝之梏亡少間這氣都乾耗了便不足以存其仁義之心又曰夜氣是母所息者是子蓋所息者本自微了旦晝只管梏之今日梏一分明日梏一分所謂梏之反覆而所息者泯夜氣亦不足以存若能存便是息得仁義之良心又曰良心當初本有十分被他展轉梏亡則他長一分自家只有九分明日他又進一分自家又退止有八分他日會進自家日會退又曰今若壞了一分夜氣漸薄明日又壞便壞成兩分漸漸消只管無到消得多夜氣益薄雖息一夜也存不得又曰氣清則能存固有之良心如旦晝之所為有以汨亂其氣則良心為之不存矣然暮夜止息稍不紛擾則良心復生譬如一井水終日攪動他便渾了那水至夜稍靜便有清水出所謂夜氣不足以存者便是攪動得太甚則雖有止息時此水亦不能清矣而所好惡遂與人逺矣故茍得其養無物不長茍失其養無物不消長上聲山木人心其理一也輔氏曰此總結上二段意也孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與舍音捨與平聲孔子言心操之則在此捨之則失去其出入無定時亦無定處如此語録曰問既云操則常存則疑若有一定之所矣曰無定所此四句但言本心神明不測不存即亡不出即入本無定所如今處處常要操存安得有定所陳氏曰忽然出忽然入無有定時忽在此忽在彼亦無定處操之則存在此舍之便亡失了孟子引之以明心之神明不測得失之易而保守之難不可頃刻失其養學者當無時而不用其力使神清氣定常如平旦之時則此心常存無適而非仁義也輔氏曰孔子之說是直指人心言之孟子引之是言人心神明不測得失之易而保守之難學者不可以無持養工夫也程子曰心豈有出入亦以操舍而言耳操之之道敬以直內而已或問程子以為心無出入然則其有出入者其無乃非心之正邪曰出而逐物者固非本心之正然不可謂本心之外别有出入之心也但不能操而存之則其出而逐物於外與其偶存於內者皆荒忽無常莫知其定處耳然所謂入者亦非此心既出而復自外入也亦曰逐物之心暫息則此心未嘗不在內矣學者於此茍能操而存之則此心不放而常為主於內矣語録曰心豈有出入出只指外而言入只指內而言只是要人操而存之耳非是如物之散失而後收之也又曰操之之道惟在敬以直內如今做工夫却只是這一事最緊要這主一無適底道理却是一箇大底其他道理總包在裏面愚聞之師曰人理義之心未嘗無唯持守之即在爾若於旦晝之間不至梏亡則夜氣愈清夜氣清則平旦未與物接之時湛然虛明氣象自可見矣語録曰氣與理本相依旦晝之所為不害其理則夜氣之所養益厚夜之所息既有助於理則旦晝之所為益無不當矣日間梏亡者寡則夜氣自然清明虛靜至平旦亦然至旦暮應事接物時亦莫不然永嘉陳氏曰此段境界乃指示喪失良心者欲其認取此時體段從此養去也蓋平旦之氣乃夜氣之所生又關乎旦晝之所為惟旦晝之所為者能不與物俱往則夜氣方和平既和平則平旦之氣亦清明那時有隙光半㸃萌蘖便是良心發見處人於此時能持循涵養使其萌蘖漸漸光明則雖當旦晝也如平旦矣今人但晨興略略見得微眇轉步便去利欲血氣上走終日昏昏所以索然無有平旦之氣形雖具而心則亡於禽獸奚擇馬孟子發此夜氣之說於學者極有力宜熟玩而深省之也孟子曰無或乎王之不智也或與惑同疑怪也王疑指齊王雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉易去聲暴步卜反見音現暴溫之也我見王之時少猶一日暴之也我退則諂諛雜進之日多是十日寒之也雖有萌蘖之生我亦安能如之何哉真氏曰人主之心養之以理義則明蔽之以物欲則昏猶草木然暖之以陽則生寒之以陰則悴正人賢士進見之時常少理義灌溉之益其能幾何退而以邪說進者至矣猶暖之日寡而寒之日多雖有萌芽旋復摧折其如之何哉今夫奕之為數小數也不專心致志則不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其智弗若與曰非然也夫音扶繳音灼射食亦反為是之為去聲若與之與平聲奕圍棊也數技也致極也奕秋善奕者名秋也繳以繩繫矢而射也程子為講官言於上曰人主一日之間接賢士大夫之時多親宦官宫妾之時少則可以涵養氣質而薰陶德性時不能用識者恨之范氏曰人君之心惟在所養君子養之以善則智小人養之以惡則愚然賢人易疏小人易親是以寡不能勝衆正不能勝邪自古國家治日常少而亂日常多蓋以此也輔氏曰後世作事無本知求治而不知正君知攻過而不知養德若程子范氏之說是乃所謂正君養德之道必如是然後君德成而治有本庶幾三代可復不然雖欲言治亦茍而已孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也舍上聲魚與熊掌皆美味而熊掌尤美也生亦我所欲所欲有甚於生者故不為茍得也死亦我所惡所惡有甚於死者故患有所不辟也惡辟皆去聲下同釋所以舍生取義之意得得生也欲生惡死者雖衆人利害之常情而欲惡有甚於生死者乃秉彞義理之良心輔氏曰只此二句便可盡得此一章意利害者天下之常情即所謂私欲也義理者秉彝之良心即所謂天理也孟子只就欲惡二者之中分别出天理人欲最為明切使學者易於體察也是以欲生而不為茍得惡死而有所不避也如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚於死者則凡可以辟患者何不為也設使人無秉彞之良心而但有利害之私情則凡可以偷生免死者皆將不顧禮義而為之矣輔氏曰偷謂偷竊免謂茍免此兩字說盡私情之意象惟其不然則知秉彝之良心乃吾所固有而利害之私情乃因物而旋生出耳由是則生而有不用也由是則可以辟患而有不為也由其必有秉彝之良心是以其能舍生取義如此輔氏曰由是之是蓋指秉彝之良心而言也是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿喪耳喪去聲羞惡之心人皆有之但衆人汨於利欲而忘之惟賢者能存之而不喪耳輔氏曰羞惡之心即所謂秉彞之良心也秉彞之良心是指其全體而言羞惡之心則又於全體之中指其所謂義者言之也忘猶失記也義乃吾之性不解亡失人但汩沒於利欲中而失記之耳才失記便與無相似則是喪亡之矣存則操而存也喪則舍而亡也存之之道亦惟敬而已矣一簞食一豆羮得之則生弗得則死呼爾而與之行道之人弗受蹴爾而與之乞人不屑也食音嗣呼呼故反蹴子六反豆木器也呼咄啐之貌行道之人路中凡人也蹴踐踏也乞人丐乞之人也不屑不以為潔也言雖欲食之急而猶惡無禮有寧死而不食者是其羞惡之本心欲惡有甚於生死者人皆有之也輔氏曰路人與乞丐人之至微賤者也簞食豆羮生死所繫利害之至急切者也於此而猶惡無禮寧舍之而不食則羞惡之本心欲惡有甚於生死者可見人無有無是心者矣言羞惡而併及夫欲者羞惡則固為惡矣及反之而不羞惡焉者則是所欲也萬鍾則不辨禮義而受之萬鍾於我何加焉為宫室之美妻妾之奉所識窮乏者得我與為去聲與平聲萬鍾於我何加言於我身無所增益也所識窮乏者得我謂所知識之窮乏者感我之惠也上言人皆有羞惡之心此言衆人所以喪之由此三者蓋理義之心雖曰固有而物欲之蔽亦人所易昏也輔氏曰几人所以喪其良心者固不止此三事但姑舉其端而言之則其他可以類推矣理義之心雖是本來固有然微妙而難存物欲之蔽雖是旋旋生出然汚下而易溺此君子所以貴於戰兢自持而於窒欲克已不敢緩也鄉為身死而不受今為宫室之美為之鄉為身死而不受今為妻妾之奉為之鄉為身死而不受今為所識窮乏者得我而為之是亦不可以己乎此之謂失其本心鄉為並去聲為之之為並如字言三者身外之物其得失比生死為甚輕鄉為身死猶不肯受呼蹴之食今乃為此三者而受無禮義之萬鍾是豈不可以止乎輔氏曰生死至重三者至輕今乃以重為輕以輕為重者蓋為物欲所昏是以倒行而逆施之故以是不可以已乎警之深味此言自能使人惕然有省也本心謂羞惡之心此章言羞惡之心人所固有或能決死生於危迫之際而不免計豐約於宴安之時是以君子不可頃刻而不省察於斯焉輔氏曰羞惡之心雖人之所固有但危迫之際私欲末肆三者之念都未萌芽故天理之發其不可遏有如此者至於宴安之時私欲紛紜展轉不已以至計較豐約都忘義理之心乃其勢之使然也人能於此而省察焉則知所以存天理而遏人欲矣孟子曰人仁心也義人路也仁者心之德程子所謂心如榖種仁則其生之性是也語録曰仁只是天地間一箇生底道理程子所謂譬如榖種仁則其生之性玩此則仁可識矣又曰生之性便是愛之理黃氏曰心是榖種心之德是榖種中生之性也生之性便是理謂其具此生理而未生也又曰若生出了後已是情須認得生字不步那喜怒哀樂去然但謂之仁則人不知其切於己故反而名之曰人心則可以見其為此身酬酢萬變之主而不可須臾失矣輔氏曰但謂之仁而不著人身上說則人不知己之所自有或不知求或求之外故反而名之曰人心反謂反之於身也既曰人心則是吾身之所以酬酢萬變之王豈可以須臾失哉失對放字而言真氏曰仁者心之德也而孟子直以為人心者蓋有此心即有此仁心而不仁則非人矣孔門之言仁多矣皆指其用功處而言此則徑舉全體使人知心即仁仁即心而不可以二視之也義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須㬰舍矣輔氏曰謂之人路則是乃吾身出入往來之道又豈可以須㬰舍也舍對弗求而言問孟子謂道若大路然又曰義路也道為義體義為道用均謂之路何邪永嘉陳氏曰道以路言謂事事物物各有當行之路義亦言路者謂處事處物各就他當行路上行故各以路言然道若大路則取其明白易知義為人路則取其往來必由不知道之猶路無目者也不知義之猶路無足者也此孟子言意别處真氏曰義者人所當行之路跬步而不由乎此則陷於邪僻之徑矣舍其路而弗由放其心而不知求哀哉舍上聲哀哉二字最宜詳味令人惕然有深省處輔氏曰集注拈起這兩字說其警切學者至矣惕然則仁之發也深省則智之用也人有雞犬放則知求之有放心而不知求程子曰心至重雞犬至輕雞犬放則知求之心放則不知求豈愛其至輕而忘其至重哉弗思而已矣輔氏曰程子重輕之說正說著孟子意脉夫人皆有是心豈肯愛其至輕而忘其至重哉特以不思之故是以昧夫輕重之分如此也真氏曰借至輕而喻至重所以使人知警也愚謂上兼言仁義而此下專論求放心者能求放心則不違於仁而義在其中矣輔氏曰立人之道曰仁與義仁體也義用也體用不可相離故上兼言之然仁義之理具於一心若心放而不知求則兩失之矣能求其心則心存心存則無適而非天理之流行故曰不違仁既曰無通而非天理之流行則其應事接物之際必能合乎時措之宜矣故曰義在其中蓋有體則不能無用矣學問之道無他求其放心而已矣學問之事固非一端然其道則在於求其放心而已語録曰學問亦多端矣而孟子直以為無他蓋身如一屋子心如一家主有此家主然後能灑掃門户整頓事務若是無主則此屋不過一荒屋爾實何用焉且如中庸言學問思辨四者甚切然而放心不收則何者為學問思辨哉收斂此心不容一物乃是用功也輔氏曰誦詩讀書孝悌忠信無非學之事也然其道則皆只欲求其放心而已蔡氏曰或者但見孟子有無他而已矣之語便立為不必讀書不必窮理只要存本心之說所以卒流於異學集注學問之事固非一端然其道則在於求放心而已正所以發明孟子之本意以救異學之失學者切宜字字玩味不可容易讀過也蓋能如是則志氣清明義理昭者而可以上達不然則昏昧放逸雖曰從事於學而終不能有所發明矣輔氏曰志者心也氣者一身之氣所謂夜氣與平旦之氣是也志氣之帥也義理則性之所具也人心存則志與氣皆清明而義理自然昭著由是而可以知性知天不然則志氣昏昧而不清明放逸而不收斂雖曰從事於學問而終不能有所發明於己也故程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也語録曰須就心上做得主定方驗得聖賢之言有歸著自然有契又曰只是知求則心便在便是反復入身來又曰自能尋向上去這是已得此心方可做去不是塊然守得這心便了又曰看自能尋向上去下學而上達也二句必不至空守此心無所用心輔氏曰聖賢教人雖曰多方然其道則不過欲人將己放之心收約之使反復入身來則志足以帥氣無放逸之失而日就於清明道足以制欲無蠱蝕之病而日趨於理義自能尋向上去下學而上達也此乃孟子開示要切之言程子又發明之曲盡其指學者宜服膺而勿失也孟子曰今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也信與伸同為去聲無名指手之第四指也指不若人則知惡之心不若人則不知惡此之謂不知類也惡去聲不知類言其不知輕重之等也孟子曰拱把之桐梓人茍欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉弗思甚也拱兩手所圍也把一手所握也桐梓二木名孟子曰人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則無尺寸之膚不養也所以考其善不善者豈有他哉於己取之而已矣人於一身固當兼養然欲考其所養之善否者惟在反之於身以審其輕重而已矣愚謂人之於身無所不愛則固當無所不養然體有貴賤小大養其貴且大者則善養其賤且小者則不善此豈待他人言之而後知哉則亦反之於身而審其輕重於心焉則自知矣體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人賤而小者口腹也貴而大者心志也今有場師舍其梧檟養其樲棘則為賤場師焉舍上聲檟音賈樲音二場師治場圃者梧桐也檟梓也皆美材也樲棘小棗非美材養其一指而失其肩背而不知也則為狼疾人也狼善顧疾則不能故以為失肩背之喻飲食之人則人賤之矣為其養小以失大也為去聲飲食之人專養口腹者也飲食之人無有失也則口腹豈適為尺寸之膚哉此言若使專養口腹而能不失其大體則口腹之養軀命所關不但為尺寸之膚而己但養小之人無不失其大者故口腹雖所當養而終不可以小害大賤害貴也語録曰此章言身則心具焉飲食之人無有失也則口腹豈適為尺寸之膚哉此數句說得倒了也自難曉意謂使飲食之人真無所失則口腹之養本無害然人屑屑理㑹口腹則必有所失無疑是以當知養其大體而口腹底他自㑹去討喫不到得餓了也公都子問曰鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人鈞同也從隨也大體心也小體耳目之類也曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者弗能奪也此為大人而已矣官之為言司也耳司聽目司視各有所職而不能思是以蔽於外物既不能思而蔽於外物則亦一物而已又以外物交於此物其引之而去不難矣語録曰問蔽是遮蔽否曰然問如目之視色從他去時便是為他所蔽若能思則視其所當視不視其所不當視則不為他所蔽矣曰然若不思則耳目亦只是一物又曰耳目一物也外物一物也以外物而交乎耳目之物自然被他引去又曰上箇物字主外物言下箇物字主耳目言心則能思而以思為職凡事物之來心得其職則得其理而物不能蔽失其職則不得其理而物來蔽之語録曰心固是元有此思只恃其有此任他如何却不得須是去思方得之不思則不得也此是最要緊須是人自主張起來此三者皆天之所以與我者而心為大若能有以立之則事無不思而耳目之欲不能奪之矣此所以為大人也語録曰立者卓然竪起此心又曰君子固當於思處用功能不妄思是能先立其大者立字下得有力夫然後耳目之官小者弗能奪也是安得不為大人哉然此天之此舊本多作比而趙注亦以比方釋之今本既多作此而注亦作此乃未詳孰是但作比方於義為短故且從今本云范浚心針曰茫茫堪輿俯仰無垠人於其間眇然有身是身之微太倉稊米參為三才曰惟心耳往古來今孰無此心心為形役乃獸乃禽唯口耳目手足動靜投間抵隙為厥心病一心之微衆欲攻之其與存者嗚呼幾希君子存誠克念克敬天君泰然百體從令浚婺州人或問此章之說曰其要正在夫先立乎其大者之一言耳蓋大者既立則凡動靜云為皆主於思而不隨於物其不中理者鮮矣范氏之針蓋得其指未可易之也孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也樂音洛天爵者德義可尊自然之貴也古之人修其天爵而人爵從之修其天爵以為吾分之所當然者耳人爵從之蓋不待求之而自至也或問有以為從之者猶言其任之云爾如何曰是蓋嫌其猶有意於人爵之求耳殊不知此章之意所以為天理人欲之别者特在乎求與不求之間有意於求則是乃所謂修天爵以要人爵者孟子固己斥之矣其或不求而自至則是乃理勢之必至者而又何嫌之有哉今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也終亦必亡而已矣要音邀要求也修天爵以要人爵其心固己惑矣得人爵而棄天爵則其惑又甚焉終必并其所得之人爵而亡之也或問修天爵以要人爵者雖曰修之而實已棄之久矣何待得人爵之後始謂之棄邪曰若是者猶五霸之假仁猶愈於不假而不修耳聖人之心寬宏平正善善蚤而惡惡遲不如是之急迫也且若是言則彼直棄而不修者又將何以處之邪孟子曰欲貴者人之同心也人人有貴於己者弗思耳貴於己者謂天爵也人之所貴者非良貴也趙孟之所貴趙孟能賤之人之所貴謂人以爵位加已而後貴也良者本然之善也趙孟晉卿也能以爵祿與人而使之貴則亦能奪之而使之賤矣若良貴則人安得而賤之哉詩云既醉以酒既飽以德言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也聞去聲詩大雅既醉之篇飽充足也願欲也膏肥肉粱美榖令善也聞亦譽也文繡衣之美者也仁義充足而聞譽彰著皆所謂良貴也尹氏曰言在我者重則外物輕黃氏曰善學者要當深明夫內外輕重之分在內者重則在外者輕在外者愈輕則在內者愈重真積力久胸中泰然天理流行一毫物欲不能為之纍顔子之簞瓢陋巷曽㸃之鼓瑟浴沂翛然悠然蓋將與造物相為酬酢天下之至貴無以復加於此矣孟子曰仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也與猶助也仁之能勝不仁必然之理也但為之不力則無以勝不仁而人遂以為真不能勝是我之所為有以深肋於不仁者也語録曰以理言之則正之勝邪天理之勝人欲甚易而邪之勝正人欲之勝天理若甚難以事言之則正之勝邪天理之勝人欲甚難而邪之勝正人欲之勝天理却甚易蓋才是蹉跌一兩件事便被邪來勝將去若以正勝邪則須是做得十分工夫方勝得他然猶自恐怕勝他未盡在正如人身正氣稍不足邪便得以干之矣愚謂仁之勝不仁也猶水勝火此以仁之理而言也今之為仁者猶以一杯水救一車薪之火此就人之為仁者言也不熄則謂之水不勝火此又與於不仁之甚也此則指當時之人為仁不至不能反已遂謂真不能勝而自怠於為仁者言也如此則深有助於為不仁者矣亦終必亡而已矣言此人之心亦且自怠於為仁終必并與其所為而亡之趙氏曰言為仁不至而不反諸己也輔氏曰能反求諸己則其身正而天下歸之如水勝火斯可見焉趙氏雖未知夫仁然以其能求句中意而得之凡解經者只當如此孟子曰五穀者種之美者也茍為不熟不如荑稗夫仁亦在乎熟之而已矣荑音蹄稗蒲賣反夫音扶荑稗草之似榖者其實亦可食然不能如五榖之美也但五榖不熟則反不如荑稗之熟猶為仁而不熟則反不如為他道之有成是以為仁必貴乎熟而不可徒恃其種之美又不可以仁之難熟而甘為他道之有成也輔氏曰學者於上一病猶少於下一病極多尹氏曰日新而不已則熟輔氏曰日新者日進也不已者無間斷也必如是然後能熟夫仁孟子曰羿之教人射必志於彀學者亦必志於彀彀古候反羿善射者也志猶期也彀弓滿也滿而後發射之法也學謂學射大匠誨人必以規矩學者亦必以規矩大匠工師也規矩匠之法也此章言事必有法然後可成師舍是則無以教弟子舍是則無以學曲藝且然況聖人之道乎輔氏曰集注謂事必有法然後可成者當矣然彀之所以為射法者蓋射必滿而後力始有則故易於求中規矩之為匠法者器必先正其方圓而無失方可以言巧故射者志乎彀而真積力久焉則能中矣工者守乎規矩而真積力久焉則能巧矣若夫教者與受教者舍彀而言中舍規矩而言巧則皆所謂誣也若夫欲學乎道而處下窺高舍近鶩逺不務下學而徑欲上達者則亦終無所成而已矣孟子纂疏卷十一
