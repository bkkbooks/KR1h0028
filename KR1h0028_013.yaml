body:
  text: 欽定四庫全書論語纂疏卷十宋趙順孫撰朱子集注子張第十九此篇皆記弟子之言而子夏為多子貢次之蓋孔門自顔子以下穎悟莫若子貢自曾子以下篤實無若子夏故特記之詳焉輔氏曰詳考論語所載二子之言行可見然穎悟篤實皆以資質言也子貢穎悟之質固次於顔子子夏篤質之質固次於曾子矣而顔曾之學力又有非二子之所能及者蓋顔子之穎悟知之固徹而行之又至曾子之篤實行之固至而知之又徹至於子貢之行子夏之知則皆未能冇以充之而極其至也胡氏曰以顔子之明睿則穎悟不足言以曾子之純誠則篤實不足言故但以稱子貢子夏也凡二十五章子張曰士見危致命見得思義祭思敬喪思哀其可已矣致命謂委致其命猶言授命也語録曰致命猶送這命與他不復為我之有論語中致命字都是委致之致見危授命皆是此意授亦致字之意言將這命授與之也真氏曰義敬哀皆言思而致命獨不言思者蓋死生之際惟義是徇有不待思而決也四者立身之大節一有不至則餘無足觀故言士能如此則庶乎其可矣或問其可已矣與首篇可也之説曰可則同然曰可也則其語抑曰其可已矣則其語揚黃氏曰四者立身之大節危人所畏也得人所欲也祭與喪人所忽也於此而各盡其道也是人之所難能者而獨能之也其可已矣若曰大莭既得為人之道可以無憾矣此與子夏竭力致身必謂之學之意同夫大節固所當盡然斷之以其可已矣則似失之快而不類乎聖人之言也集注以為庶乎其可則固惡其言之大快然或問之意則又與集注不同讀者兩存之可也子張曰執德不𢎞信道不篤焉能為有焉能為亡焉於虔反亡讀無下同有所得而守之太狹則德孤輔氏曰有所得謂德也守謂執也太狹謂不𢎞也德孤蓋用坤卦文言之辭言不能兼有衆德而孑然固守一節者也𢎞以量言然量有氣量有德量此蓋兼氣與德而言者也德得諸己而居之不𢎞則輕喜易足有一善則自以為天下莫已若矣有所聞而信之不篤則道廢輔氏曰有聞謂道也篤謂專而厚也道廢則猶言終亦必亡而已矣也道有所聞而信之不篤則亦或作或輟鋭始怠終終亦必亡而已矣焉能為有亡猶言不足為輕重語録曰有此人亦不當得是有無此人亦不當得是無言皆不足為輕重子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也賢與之與平聲子夏之言迫狹輔氏曰可者與之之言美矣若曰不可者拒之則傷亟過中而害義理之正矣迫則不寬狹則不廣子張譏之是也但其所言亦有過髙之病黃氏曰以能容人為髙故有不拒人之言則其於善惡必有所不察蓋大賢雖無所不容然大故亦所當絶不賢固不可以拒人然損友亦所當逺學者不可不察輔氏曰必如是然後得義之中無掠虛務髙之意而有切於學者為己之實子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也泥去聲小道如農圃醫卜之屬或問小道為農圃之屬曰小者對大之名正心修身以治人道之大者也專一家之業以治於人道之小者也然是皆用於世而不可無者其始固皆聖人之作而各有一物之理焉是以必有可觀也然能於此者或不能於彼而皆不可以達於君子之大道黃氏曰聖人之道自修身而齊家治國平天下與夫參天地贊化育無適而不通也農圃醫卜之屬施之目前淺近不為無益然求其聖人之道無所不通則不可也許行欲以並耕而治天下此孟子所以譏其相率而為偽也或曰安知所謂小道者不指楊墨佛老之類而言邪曰小道合聖人之道而小者也異端者違聖人之道而異者也小者猶可以施之近異者則不可以頃刻而施也揚墨老佛之無父無君又何待致逺而後不通哉所謂正牆面而立跬步而不可行者也泥不通也楊氏曰百家衆技猶耳目鼻口皆有所明而不能相通非無可觀也致逺則泥矣故君子不為也子夏曰日知其所亡月無忘其所能可謂好學也已矣亡讀作無好去聲亡無也謂己之所未有尹氏曰好學者日新而不失黃氏曰求之敏則能日新守之篤則能不失進學之道無以復加於此矣子夏曰博學而篤志切問而近思仁在其中矣四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣語録曰此四者只是為學功夫未是為仁必如夫子所以語顔冉者乃正言為仁耳然人能博學而篤志切問而近思則心不放逸天理可存故曰仁志其中黃氏曰集注初本謂心不外馳而事皆有益後乃以所存自熟易之蓋初本以博篤切近為心不外馳學志問思為事皆有益其後易之者則專主於心之所存而言也若以學志問思有益於事而為言乃是有所求而自得之不可以為求此而得彼也以此見集注愈改而愈精也或曰何以言四者之專主於心之所存而言曰人惟無所用其心則其心放逸而不收學之博則此心常有所繫著而不放逸矣人惟所志茍簡而不堅也則其心泛濫而不一志之篤則此心常有定向而不泛濫矣問不切思不近則其所用心皆在吾身之外矣切問而近思則皆求其在己者而無復外馳之患矣人能盡此四者則雖學問思辨之事而自有以得夫操存涵養之效所以謂仁在其中矣胡氏曰力行固所以為仁然學問思辨皆所以求為仁之方心存乎學問思辨則雖未見於行而已不外馳矣心不外馳則所存日熟是乃力行之本故曰仁在其中也永嘉陳氏曰博而能篤切而又近如此學問儘鞭辟向裏心不外馳故言仁在其中蓋心存則仁便存指存心便喚做仁固不可但離了心外便何處求仁程子曰博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道語録曰於是四者中見得箇仁底道理便是徹上徹下之道又曰徹上徹下是這箇道理深説淺説都如此永嘉陳氏曰徹上徹下謂下學中天理便在此無兩箇塗轍又曰學不博則不能守約志不篤則不能力行切問近思在己者則仁在其中矣輔氏曰必先盡乎博然後有以得其約而守之不然則寡聞淺見將何以識其約哉必先立其志則自然住不得須著去力行不然則若有若亡何能見於行哉不惟如此又見四者之中已具力行之意若能切問近思在己者則仁固在其中矣所謂切與近只是在己之事耳又曰近思者以類而推語録曰此語道得好不要跳越望逺亦不是縱橫陡頓只是就這裏近傍那曉得處挨將去如這一件事理會得透了便又因這件事推去做那一件事知得亦是恁地如親親便推類去仁民仁民是親親之類仁民便推類去愛物愛物是仁民之類如刑于寡妻便推類去至于兄弟至于兄弟便推類去御于家邦如修身便推去齊家齊家便推去治國須是一步了又一步如升階升第一級了便因第一級進到第二級又因第二級進到第三級只管恁地挨將去只管見易不見其難前面逺處只管近若第一級便要跳到第三級舉步闊了便費力只管見難只管見逺又曰今人不曾以類而推蓋謂不曾先理會得一件却又理會一件若理會得一件逐件推將去相次亦不難須是劈初頭要理會直理會得分曉透徹且如煮物事合下便用慢火養却煮得頑了越不能得軟政如義理只理會得二三分便道只恁地得了却不知前面撞頭搕腦人心裏若是思索得到時遇事自不難須是將心來一如鏖戰一番見了行陳便自然向前得去如何不教心經履這辛苦經一番便自知得許多道路方能透徹蘇氏曰博學而志不篤則大而無成泛問逺思則勞而無功子夏曰百工居肆以成其事君子學以致其道肆謂官府造作之處致極也文集曰致者極其所至也工不居肆則遷於異物而業不精君子不學則奪於外誘而志不篤黃氏曰居肆之與學二事若不相類然以下文成其事致其道以致訓極則成猶極也極猶成也事之與道欲至於成非用力之專不可也居肆如務學則心不外用而其業日廣此事與道之所以成也不然則皆將半塗而廢矣尹氏曰學所以致其道也百工居肆必務成其事君子之於學可不知所務哉愚案二説相須其義始備語録曰百工居肆方能做得事成不居肆則做事不成君子學便可以致其道不學則不能致其道然而居肆亦有不能成其事如間坐打閧過日底學亦有不能致其道如學小道與夫中道而廢之類故後説云居肆必須務成其事學必須務致其道是皆各説得一邊故必二説相須而義始備也輔氏曰由朱子之説則見君子之欲致道不可不由於學由尹氏之説則見君子之學必當務致乎道夫欲致道而不由學則心志為外物所遷誘而不能專一固不足以致其道然學而不足以致道則其所學者又不過口耳之習耳欲致其道則必由學既曰為學則必務致道然後為君子之事也胡氏曰前説則重在居肆與為學後説則重在成事與致道一主於用功一主於立志然知所以用功而志不立不可也知所以立志而功不精亦不可也故二説相須而備非如他章存兩説之比也子夏曰小人之過也必文文去聲文飾之也小人憚於改過而不憚於自欺故必文以重其過黃氏曰不能謹身而至於有過者過也不能改悔而文以為欺又過也故曰重其過胡氏曰憚於改過而不憚於自欺者以改悔為難而自昧其本然之善心反不以為難重其過者始焉不能審思而遂與理悖過矣而又飾之以為欺是再過也子夏曰君子有三變望之儼然即之也溫聽其言也厲儼然者貌之莊溫者色之和厲者辭之確黃氏曰儼然手恭而足重溫者心平而氣和厲者義精而辭確程子曰他人儼然則不溫溫則不厲惟孔子全之謝氏曰此非有意於變蓋並行而不相悖也如良玉溫潤而栗然輔氏曰謝氏發明得變字分曉所以足程子之説蓋他人所以儼然則不溫溫則不厲者皆冇意為之蓋道並行而不相悖也如良玉溫潤而栗此喻甚切子夏曰君子信而後勞其民未信則以為厲已也信而後諫未信則以為謗已也信謂誠意惻怛而人信之也輔氏曰信謂上下交孚已雖有信而人或未之信猶未可謂之信也厲猶病也事上使下皆必誠意交孚而後可以有為輔氏曰若上下未交孚則君之勞民所以安其生也而反以為厲己也臣之諫君所以成其德也而反以為謗己也如湯武之使民則可謂信而後勞之矣如伊傅之告君則可謂信而後諫之矣子夏曰大德不踰間小德出入可也大德小德猶言大節小節胡氏曰書以細行對大德而言細行即小德之類故云猶大節小節蓋以其所關有小大也父子君臣天婦長幼朋友之倫大德之所在也一動一靜一語一默與凡應對進退之文小德之所在也間闌也所以止物之出入言人能先立乎其大者則小節雖或未盡合理亦無害也吳氏曰此章之言不能無弊學者詳之語録曰大節既定小節有差亦所不免然吳氏謂此章不能無弊學者正不可自恕一以小差為無害則於大節必將有枉尋而直尺者矣黃氏曰子夏此語信有病矣然大德小德皆不踰間者上也大德盡善而小德未純者猶其次也若夫拘拘於小亷曲謹而臨大節則顛倒錯亂者無可觀也矣子夏之言豈有激而云乎此又學者之不可不察輔氏曰道理無空闕處亦無間斷時無大小精粗一有空闕間斷便是這裏欠少了更無填補處是以君子之學戰戰兢兢無時不然直至死而已豈有大小久近之間邪子夏篤實次於曾子而有小節出入可也之論則是未免有自恕之意此所以不及曾子歟胡氏曰觀人之道取大端而略小失猶可也若立心自處但曰謹其大者而小者不致意焉則併其大者失之矣子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何灑色賣反掃素報反子遊譏子夏弟子於威儀容節之間則可矣然此小學之末耳推其本如大學正心誠意之事則無有子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎别彼列反焉於虔反倦如誨人不倦之倦區猶類也言君子之道非以其末為先而傳之非以其本為後而倦教但學者所至自有淺深如草木之有大小其類固有别矣若不量其淺深不問其生熟而槩以髙且逺者強而語之則是誣之而已君子之道豈可如此輔氏曰窮理之至知言之極則學者所得之淺深不啻白黑之易見故如草木之有大有小其類各不同而無不昭然在吾之目中然後循其次第等級而教之若夫先傳後倦則君子無是心也但時其可而已至於言之未知知之未至不察學者淺深生熟之異而一槩以子遊之所謂本者強而語之則學者漫而聽之實不知其味勉而行之終不得其方則是誣之而已君子教人之道豈有誣之之理若夫始終本末一以貫之則惟聖人為然語録曰問聖人事是甚麼樣子曰如云下學而上達當其下學便上達天理是也豈可責之門人小子乎程子曰君子教人有序先傳以小者近者而後教以大者逺者非先傳以近小而後不教以逺大也或問既以為理無大小而又以為教人有序何也曰無大小者理也有序者事也正以理無大小而無不在是以教人者不可以不由其序而有所遺也蓋由其序則事之本末巨細無不各得其理而理之無大小者莫不隨其所在而無所遺不由其序而舍近求逺處下窺髙則不惟其所妄意者不可得理之全體固已虧於切近細微之中矣此所以理無大小而教人者尤欲必由其序也子遊之説蓋失於此故不知理之無大小則以灑掃應對為末而無本不知教人之有序故於門人小子而欲直教之精義入神之事以盡夫形而上者之全體也語録曰此章將謂無本末無小大後來忽然思得乃知却是有本末小大然若不得程子説得君子教人有序四五句也無緣看得出聖人有始有卒者不是自始做到終乃是合下便始終皆備灑掃應對精義入神便都在這裏了若學者便須從始做去方得聖人則不待如此做也又曰理無大小無乎不在本末精粗皆要從頭做去不可揀擇此所謂教人有序也非是謂灑掃應對便是精義入神更不用做其他事也陳氏曰須是先從事其小者近者而後從事其逺者大者是謂循序漸進由末以逹本工夫不偏靠在一邊又曰灑掃應對便是形而上者理無大小故也故君子只在謹獨或問灑掃應對便是形而上者曰灑掃應對所以習夫形而下之事也精義入神所以究夫形而上之理也此其事之大小固不同矣然以理言則未嘗有大小之間而無不在也程子之言意蓋如此爾但方舉灑掃應對之一端未及乎精義入神之云者而通以理無大小結之故其詞若有所不足而意亦難明耳徐繹其緒而以是説通之則其詞備而意可得矣抑程子之意正謂理無大小故君子之學不可不由其序以盡夫小者近者而後可以進夫逺者大者故曰其要只在謹獨此甚言小之不可忽也而説者反以為理無大小故學者即是小者而可以并舉其大則失之逺矣其曰便是云者亦曰不離乎是耳非即以此為形而上者也文集曰灑掃應對是事所以灑掃應對是理事即理理即事道散在萬事那箇不是若事上有豪髮蹉過則理上便有間斷欠闕故君子直是不放過只在謹獨但不知無盡時當如何耳謹獨須貫動靜做功夫始得語録曰事有大小理却無大小合當理會處便用與他理會故君子只在謹獨不問大事小事精粗巨細盡用理會不可説箇是粗底事不理會只理會那精底既是合當做底事便用做去又不可説灑掃應對便是精義入神灑掃應對只是粗底精義入神自是精底然道理却一般須是從粗底小底理會起方漸而至於精者大者或曰灑掃應對非道之全體只是道中之一節曰合起來便是道之全體非大底是全體小底不全體也問此只是獨處少有不謹則形而上下便相間斷否曰亦是蓋不能謹獨只管理會大處小小底事便照管不到理無小大大處小處都是理小處不到理便不周匝黃氏曰以易考之其曰形而上者蓋對形而下者而言形非有象之可見特因下文形而下者而為文言器乃形而下而道則形而上也形而上謂超乎事物之表專指夫事物之理而言也灑掃應對事物至粗然其所以然者便是至精之理其曰理無大小者非以灑掃應對為小形而上者為大也蓋不但至大之事方有形而上之理雖至小之事亦有之矣故曰理無大小也又曰聖人之道更無精粗從灑掃應對與精義入神貫通只一理雖灑掃應對只看所以然如何語録曰此言灑掃應對與精義入神是一樣道理灑掃應對必有所以然精義入神亦有所以然其曰貫通只一理言二者之理只一般非謂灑掃應對便是精義入神固是精義入神有形上之理即灑掃應對亦有形而上之理黃氏曰其曰精義入神者蓋言精究義理極其微妙以至入神神者理之妙而不可測者今其所精之義至於入神則義之至精者也如夫子之言性與天道之類是也程子引此以與灑掃應對對言蓋以至粗之事對至精之義也至粗之事與至精之義固不同然至粗之事其所以然者即至精之義也又曰凡物有本末不可分本末為兩段事灑掃應對是其然必有所以然或問其然所以然之説曰灑掃應對之事其然也形而下者也灑掃應對之理所以然也形而上者也自形而下者而言則灑掃應對之與精義入神本末精粗不可同日而語矣自夫形而上者言之則未嘗以其事之不同而有餘於此不足於彼也曰其曰物有本末而本末不可分者何也曰有本末者其然之事也不可分者以其所以然之理也語録曰治心修身是本灑掃應對是末皆其然之事也至於所以然則理也理無精粗本末皆是一貫又曰須是就事上理會道理非事何以識理灑掃應對末也精義入神本也不可説這箇是末不足理會只理會那本這便不得又不可説這末便是本但學其末則本便在此也黃氏曰然之為言猶曰如此也其如此者謂灑掃應對之節文也所以如此者謂有此理而後其節文之著見者如此也又曰自灑掃應對上便可到聖人事黃氏曰灑掃應對雖至小亦不過由天理之全體而著見於事物之節文聖人之所以為聖人者初不外乎此理特其事事物物皆由此理而不勉不思從容自中耳愚案程子第一條説此章文意最為詳盡其後四條皆以明精粗本末其分雖殊而理則一學者當循序而漸進不可厭末而求本蓋與第一條之意實相表裏非謂末即是本但學其末而本便在此也黃氏曰以集注所引程子四段細推之則首言理無大小以見事有大小而理則一也次言道無精粗以見學有精粗而道則一也又次言是其然必有所以然所以發明上二段所以無大小無精粗之意又次言便可至聖人事則亦以其所以然而無小大精粗者為之也亦足以見編次之意至精而不茍矣或曰集注又以程子第一條説本章文意最為詳盡者然乎曰此亦取其所釋傳與倦之義為詳盡耳然以先後二字考之則程子先後以教者所施之次第而言集注先後以義理之精粗而言則程子之説又不若集注之説為當也愚謂學其末而本便在此者理貫於萬事不以事之近小而理有不該也子夏曰仕而優則學學而優則仕優有餘力也仕與學理同而事異故當其事者必先有以盡其事而後可及其餘輔氏曰仕所以行其學而學所以基其仕故曰理同然仕則以陳力就列致君澤民為事學則以誦詩讀書格物致知為事故曰事異胡氏曰仕與學理同者皆所當然也事異者有治己治人之别也學以為仕之本仕以見學之用特治己治人之異耳以理言則學其本也以事言則當其事者隨所主而為之緩急必先盡心於所主之事有暇日則及其餘非有所輕重於其間也然仕而學則所以資其仕者益深學而仕則所以驗其學者益廣輔氏曰此又推極此章之義而言之也仕而優則學為已仕者言也謂仕有餘則不可以不學不學則無知新之益以資其仕學而優則仕為未仕者言也謂學有餘力則不可以不仕不仕則無行道之功以驗其學要之學是終始事子遊曰喪致乎哀而止致極其哀不尚文飾也楊氏曰喪與其易寧戚不若禮不足而哀有餘之意愚案而止二字亦微有過於髙逺而簡略細微之弊學者詳之輔氏曰喪與其易也寧戚喪與其哀不足而禮有餘不若禮不足而哀有餘皆假設得失兩端而言之故不害子遊直以為喪致乎哀而止則其言便有過於髙逺而簡忽禮文之意要之喪固貴乎哀然禮不可廢故曰直情而徑行戎狄之道也君子造次顛沛不違乎仁豈以哀戚之故而遂廢乎禮哉子遊曰吾友張也為難能也然而未仁子張行過髙而少誠實惻怛之意愚謂不誠實則無真切之意不惻怛則無隱痛之情子張務外好髙故於此四字皆有所不足曾子曰堂堂乎張也難與並為仁矣堂堂容貌之盛言其務外自髙不可輔而為仁亦不能有以輔人之仁也輔氏曰難與並為仁實具此兩意蓋務外好髙則於己無體認密察之功既不可輔之為仁於人無切偲觀感之助亦不能有以輔人之仁范氏曰子張外有餘而內不足故門人皆不與其為仁子曰剛毅木訥近仁寧外不足而內有餘庶可以為仁矣曾子曰吾聞諸夫子人未有自致者也必也親喪乎致盡其極也蓋人之真情所不能自已者胡氏曰上智之資於理所當然者固不待勉強而皆極其至中人以下則罕能之惟父母之喪哀痛慘怛蓋其真情之不能自已者聖人指以示人使之自識其良心非專為喪禮發也尹氏曰親喪固所自盡也於此不用其誠惡乎用其誠曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟莊子魯大夫名速其父獻子名蔑獻子有賢德而莊子能用其臣守其政故其他孝行雖有可稱而皆不若此事之為難文集曰獻子賢大夫其臣必賢其政必善莊子之賢不及其父而能守之終身不改故夫子以為難蓋善之也語録曰人固有用父之臣者然稍拂他私意便自容不得亦有行父之政者於私欲稍有不便處自行不得古今似此者甚多如唐太宗為髙宗擇許多人如長孫無忌禇遂良之徒髙宗因立武昭儀事便不能用又季文子相三君無衣帛之妾無食粟之馬到季武子便不如此便是不能行父之政以此知孟莊子豈不為難能孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜陽膚曾子弟子民散謂情義乖離不相維繫或問民散之説曰生業不厚教化不修內則無尊君親上之心外則無仰事俯育之賴是以恩疏義薄不相維繫而日有離散之心耳謝氏曰民之散也以使之無道教之無素故其犯法也非迫於不得已則陷於不知也故得其情則哀矜而勿喜黃氏曰得情而喜則太刻之意或溢於法之外得情而矜則不忍之意常行於法之中仁人之言蓋如此輔氏曰民之犯罪有二迫於不得已則使之無其道故也陷於不自知則教之無其素故也後世治獄之官每志不得其情茍得其情則喜矣豈知哀矜而勿喜之味哉且人喜則意逸逸則心放放則哀矜之意不萌其於斷獄剖訟之際必至於過中失入有不自知者唯能反思夫民情之所以然則哀矜之意生而喜心忘矣詳味曾子之言至誠惻怛而體恤周盡如此嗚呼仁哉子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉惡居之惡去聲下流地形卑下之處衆流之所歸喻人身有汙賤之實亦惡名之所聚也子貢言此欲人常自警省不可一置其身於不善之地非謂紂本無罪而虛被惡名也輔氏曰此章之意全在下兩句而世儒乃以上兩句生説曰子貢服行恕之一字故能見得紂之不善本不如是之甚而或者又從而推衍其説以為真得子貢之心者故朱子於此既述其正意而又明言或者之説而斥以為非也子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之更乎聲衛公孫朝問於子貢曰仲尼焉學朝音潮焉於虔反公孫朝衛大夫子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有識音志下焉字於虔反文武之道謂文王武王之謨訓功烈與凡周之禮樂文章皆是也在人言人有能記之者識記也或問文武之道為周之禮樂曰此固好髙者之所不樂聞然其文意不過如此以未墜在人之云者考之則可見矣若曰道無適而非唯所取而得則又何時而墜地且何必賢者識其大不賢者識其小而後得師邪此所謂人正謂老𣆀萇𢎞郯子師襄之儔耳若入太廟每事問焉則廟之祝史亦其一師也大率近世學者習於老佛之言皆有厭薄事實貪騖髙逺之意故其説常如此不可以不戒也然彼所謂無適而非者亦豈離於文章禮樂之間哉但子貢本意則正指其事實而言不如是之空虛恍忽而無所據也叔孫武叔語大夫於朝曰子貢賢於仲尼語去聲朝音潮武叔魯大夫名州仇子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好牆卑室淺夫子之牆數仞不得其門而入不見宗廟之美百官之富七尺曰仞不入其門則不見其中之所有言牆髙而宫廣也得其門者或寡矣夫子之云不亦冝乎此夫子指武叔叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也量去聲無以為猶言無用為此土髙曰丘大阜曰陵日月喻其至髙自絶謂以謗毁自絶於孔子胡氏曰聖人之心如化工之生物未嘗不欲物物而生之也彼傾者覆之物自傾而不得受化工之生也聖人未嘗有絶人之心彼謗毁者自絶於聖人耳多與祗同適也不知量謂不自知其分量陳子禽謂子貢曰子為恭也仲尼豈賢於子乎為恭謂為恭敬推遜其師也子貢曰君子一言以為知一言以為不知言不可不愼也知去聲責子禽不謹言夫子之不可及也猶天之不可階而升也階梯也大可為也化不可為也故曰不可階而升輔氏曰大則思勉之所可及力行之所可至故曰可為若化非思勉之所可及力行之所可至故曰不可為唯其非人力之可為故曰不可階而升夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也道去聲立之謂植其生也語録曰問那處見得曰五畝之宅樹之以桑百畝之田勿奪其時便是胡氏曰植其生者制民之産使足以仰事俯育之類斯立則民即得以遂其生矣道引也謂教之也行從也黃氏曰行謂惟命之從綏安也來歸附也黃氏曰綏謂撫安之來謂來歸已動謂鼓舞之也和所謂於變時雍語録曰問那處見得鼓舞曰放勳曰勞之來之又從而振德之振德處便是鼓舞使之歡喜踴躍遷善改過而不自知如書之俾豫從欲以治惟動丕應徯志皆是動之斯和意思言其感應之妙神速如此陳氏曰感乃上四者應乃下四者榮謂莫不尊親哀則如喪考妣程子曰此聖人之神化上下與天地同流者也愚謂神化謂所存者神所過者化也上下與天地同流此則非人力之所能為而所謂不可階而升者也謝氏曰觀子貢稱聖人語乃知晚年進德蓋極於髙逺也夫子之得邦家者其鼓舞羣動捷於桴鼓影響人雖見其變化而莫窺其所以變化也蓋不離於聖而有不可知者存焉此殆難以思勉及也輔氏曰謝氏既足以發明子貢之所謂而又有以深探夫聖人動化之妙則其所見蓋已極於髙逺矣學者所冝熟玩而深思也堯曰第二十凡三章堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終此堯命舜而禪以帝位之辭咨嗟嘆聲歷數帝王相繼之次第猶歲時氣節之先後也或問歷數之説若後世讖緯之學者奈何曰帝玉相承其次第之數若歷之歲月日時亦有先後之序也然聖人所以知其序之屬於此人則亦以其人之德知之非若讖緯之説徒以其姓名見於圖籙而為言也允信也語録曰是真箇執得中者無過不及之名或問執中之為無過不及曰聖賢所言中有二義大本云者喜怒哀樂未發之理其氣象如此也中庸云者理之在事而無過不及之地也曰允執其中蓋以其在事者而言若天下之大本則不可得而執矣且聖人之道時止時行夫豈專以塊然不動者為是而守之哉四海之人困窮則君祿亦永絶矣戒之也輔氏曰天祿謂天所賦子人君之崇髙富貴也如人臣然有職則有祿天生民而立之君使司牧之則君之職在是矣儻四海之人有困窮則是君失其職則天祿固當永絶矣舜亦以命禹舜後遜位於禹亦以此辭命之今見於虞書大禹謨比此加詳曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬此引商書湯誥之辭蓋湯既放桀而告諸侯也與書文大同小異曰上當有湯字履蓋湯名用玄牡夏尚黑未變其禮也簡閲也語録曰善與罪天皆知之如天檢點數過相似爾之有善也在帝心我之有惡也在帝心言桀有罪已不敢赦而天下賢人皆上帝之臣已不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之詞也輔氏曰桀有罪已不敢赦者為天吏而行天討也天下賢人皆上帝之臣已不敢蔽簡在帝心惟帝所命者不敢有一毫利天下之心也又言君有罪非民所致民有罪實君所為見其厚於責己薄於責人之意此其告諸侯之辭也輔氏曰所以見其厚於責己薄於責人之意者蓋以其身教之湯曰萬方有罪罪在朕躬武王曰百姓有過在豫一人誠是不關他事此蓋言其實理然耳後世以己私窺聖人者曰此聖人以道媚天下也聖人寧有是心哉侮聖人之言甚矣周有大賚善人是富賚來代切此以下述武王事賚豫也武王克商大賚于四海見周書武成篇此言其所富者皆善人也詩序云賚所以錫豫善人蓋本於此雖有周親不如仁人百姓有過在豫一人此周書泰誓之詞孔氏曰周至也言紂至親雖多不如周家之多仁人謹權量審法度修廢官四方之政行焉權稱錘也量斗斛也法度禮樂制度皆是也興滅國繼絶世舉逸民天下之民歸心焉興滅繼絶謂封黃帝堯舜夏商之後舉逸民謂釋箕子之囚復商容之位三者皆人心之所欲也輔氏曰興滅繼絶所以順天命而不忘前聖之功舉逸民所以順天理而不廢天下之才此民心所由歸也所重民食喪祭武成曰重民五教惟食喪祭蔡氏曰五教君臣父子夫婦兄弟長幼五典之教也食以養生喪以送死祭以追逺五教三事所以立人紀而厚風俗聖人之所甚重焉者寬則得衆信則民任焉敏則有功公則説説音恱此於武王之事無所見恐或汛言帝王之道也楊氏曰論語之書皆聖人微言而其徒傳守之以明斯道者也故於終篇具載堯舜咨命之言湯武誓師之意與夫施諸政事者以明聖學之所傳者一於是而已所以著明二十篇之大旨也孟子於終篇亦歷敘堯舜湯文孔子相承之次皆此意也輔氏曰記者以是終篇則其慮後世逺矣聖人之學始於格物而終於國治天下平本末具舉體用不遺其為之有序其成之有驗固非如異端邪説之坐談空妙展轉相迷自以為窮神知化而不足以開物成務者之為也子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛費芳味反子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎焉於虔反子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司出去聲虐謂殘酷不仁暴謂卒遽無漸致期刻期也賊者切害之意緩於前而急於後以誤其民而必刑之是賊害之也陳氏曰暴與賊意相似何以分别上句是工役等事下句是約束立限輸納及禁止等事猶之猶言均之也語録曰言一等是如此史家多有此般字均之以物與人而於其出納之際乃或吝而不果則是有司之事而非為政之體所與雖多人亦不懷其惠矣項羽使人有功當封刻印刓忍弗能豫卒以取敗亦其驗也語録曰只是戒人遲疑不決底意思若當賞便用賞當做便用做若遲疑怠忽之間澀縮靳惜便誤事機如李絳勸唐憲宗速賞魏博將士曰若待其來請而後賞之則恩不歸止矣正是此意若有司出納之間吝惜而不敢自專却是本職當然人君為政大體則凡事皆不可如此當為處便果決為之也尹氏曰告問政者多矣未有如此之備者也故記之以繼帝王之治則夫子之為政可知也愚謂孔子論為政之方莫詳於此故門人取以附前章之後夫子之為政蓋與帝王若合符節也子曰不知命無以為君子也程子曰知命者知有命而信之也人不知命則見害必避見利必趨何以為君子語録曰學者所以學為君子若不知命則做君子不成死生自有定命若合死於水火須在水火裏死合死於刀兵須在刀兵裏死看如何逃不得此説雖甚粗然所謂知命者不過如此若這裏信不及才見利便趨見害便避如何成得君子也又曰此是至粗底此處人都信不及便講學得待如何亦沒安頓處今人開口亦解説一飲一啄自有定分及遇小小利害便生趨避計較之心古人刀鋸在前鼎鑊在後視之如無者蓋緣只見得道理都不見那刀鋸鼎鑊輔氏曰程子知而信之之説甚善此政孟子所謂知而弗去者是也若知而未信則知猶未至也知而信之則如人之知東西南北無一毫疑惑之心也命固天之所賦豫也然有指理而言者有指氣而言者此所謂命則指氣而言謂貧富貴賤窮通得喪一定而不可易者也學者必知此命而信之始有箇地盤可以進修見害亦不茍避見利亦不茍就故全得在我之義理然後可以為君子也不然隕穫於貧賤怵迫於利害倀倀然無容足之地其何以為君子乎不知禮無以立也不知禮則耳目無所加手足無所措輔氏曰禮謂三千三百之禮文是乃天理之節文人事之儀則也茍不知之則耳目真無所加手足真無所措一視一聽手持足履皆冥行妄作而已矣將何所據而能立乎不知言無以知人也言之得失可以知人之邪正輔氏曰言者心之聲也故因言之得失則可以知其人之邪正繫辭所謂吉人之辭寡躁人之辭多孟子所謂詖淫邪遁云者皆是也此其工夫密矣固非臆度意料者之所為必先格物窮理然後能之尹氏曰知斯三者則君子之事備矣弟子記此以終篇得無意乎學者少而讀之老而不知一言為可用不幾於侮聖言者乎夫子之罪人也可不念哉黃氏曰知命知其在天者知禮知其在己者知言知其在人者知天則利害不能動乎外而後可以修諸己知己則義理有以養乎內而後可以察諸人知天而不能知己者未必能安乎天知己而不能知人者未必能益乎己三言之簡而其意無窮列之論語之末其旨逺矣輔氏曰知命則在我者有定見知禮則在我者有定守知言則在人者無遁情能是三者則內足以成己之德外足以盡人之情故尹氏以為君子之事備矣論語纂疏卷十孟子纂疏序説史記列傳曰孟軻趙氏曰孟子魯公族孟孫之後漢書注云字字車一説字子輿趙氏名岐東漢京兆人騶人也騶亦作鄒本邾國也愚案鄒在漢魯國騶縣受業子思之閂人子思孔子之孫名伋索隱云王劭以人為衍字而趙氏注及孔叢子等書亦皆云孟子親受業於子思未知是否文集曰孔叢子雖偽書然與趙岐未知其孰先後也姑存之輔氏曰子思之門人無有顯名於後者而孟子真得子思之傳則疑親受業於子思者為是而集注兩存其説蓋自古聖賢固有聞而知之者不必待耳傳面命而後得也又以中庸一書觀之所以傳授心法開示藴奧如此其至則當時門弟子中豈無見而知之者哉孟子從而受之愈益光明亦宜有之也道既通趙氏曰孟子通五經尤長於詩書程子曰孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子聖之時者也故知易者莫如孟子又曰王者之迹熄而詩亡詩亡然後春秋作又曰春秋無義戰又曰春秋天子之事故知春秋者莫如孟子尹氏曰以此而言則趙氏謂孟子長於詩書而已豈知孟子者哉輔氏曰趙氏但引詩書而云爾非能有見於孟子之道也至於程子知易知春秋之説則皆以其言而得之非真有見於孟子之心與道者不能也五經雖異其理則一其時又去孔子未逺孟子必皆一一理會得透徹又何有長短於其間哉遊事齊宣王宣王不能用適梁梁惠王不果所言則見以為迂逺而闊於事情案史記梁惠王之三十五年乙酉孟子始至梁其後二十三年當齊湣王之十年丁未齊人伐燕而孟子在齊故古史謂孟子先事齊宣王後乃見梁惠王襄王齊湣王獨孟子以伐燕為宣王時事與史記荀子等書皆不合而通鑑以伐燕之嵗為宣王十九年則是孟子先遊梁而後至齊見宣王矣然考異亦無它據又未知孰是也輔氏曰詳考朱子之説則當以史記古史為正伐燕實湣王時事恐是後世傳寫誤以湣作宣耳當是之時秦用商鞅楚魏用吳起齊用孫子田忌天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之德輔氐曰此是太史公所見略與韓子論其所傳相似是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇趙氏曰凡二百六十一章三萬四千六百八十五字韓子曰孟軻之書非軻自著軻既沒其徒萬章公孫丑相與記軻所言焉耳愚案二説不同史記近是韓子名愈唐鄧州人文集曰問序説謂史記近是而於滕文公首章注曰門人不能盡記其辭又第四章注曰記者之誤如何曰前説是後兩處失之熟讀七篇觀其筆勢如鎔鑄而成非綴緝可就也論語便是記録綴緝所為非一筆文字矣韓子曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳程子曰韓子此語非是蹈襲前人又非鑿空撰得出必有所見若無所見不知言所傳者何事荀子名況楚蘭陵人揚子名雄漢蜀郡人文集曰此非深知所傳者何事則未易言也堯舜之所以為堯舜以其盡此心之體而已禹湯文武周公孔子傳之以至於孟子其間相望有或數百年者非得口傳耳授密相付屬也特此心之體隱乎百姓日用之間賢者識其大不賢者識其小而體其全且盡者則為得其傳耳又曰孟氏醇乎醇者也荀與揚大醇而小疵程子曰韓子論孟子甚善非見得孟子意亦道不到其論荀揚則非也荀子極偏駁只一句性惡大本已失揚子雖少過然亦不識性更説甚道文集曰韓子謂荀揚大醇小疵非是就他論性處説只是泛説其與田駢慎到申不害韓非之徒觀之則荀揚為大醇耳韓子只是説那一邊然以這邊觀之則湊不著故覺得為非若是會説底説那一邊亦自湊著這一邊語録曰程子説荀揚等語是就分金稱上説下來又曰孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分惟孟軻師子思而子思之學出於曾子自孔子沒獨孟軻氏之傳得其宗故求觀聖人之道者必自孟子始程子曰孔子言參也魯然顔子沒後終得聖人之道者曾子也觀其啓手足時之言可以見矣所傳者子思孟子皆其學也文集曰問大是就渾淪處説博是就該貫處説否曰韓子亦未必有此意但如此看亦自好問學焉而皆得其性之所近曰政事者就政事上學得文學者就文學上學得德行言語者就德行言語上學得輔氏曰韓子但言孔門諸子唯曽子之學獨傳而有子思孟軻然不言其所以獨傳之故故程子又從而發明之以為曾子只緣資質魯鈍故用功於內者深篤確實觀其啓手足之言所謂一息尚存此志不容少懈者此聖道之所以終傳而有子思孟子之學也又曰揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖􅋀何補然賴其言而今之學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也或問於程子曰孟子還可謂聖人否程子曰未敢便道他是聖人然學已到至處愚案至字恐當作聖字輔氏曰學已到聖處以其知言也未敢便道他是聖人以其行言也孟子論大而化之之謂聖聖而不可知之之謂神與夫聖知巧力之譬精密切當非想像臆度之所能及是其學已到聖處也然其英氣未化有圭角見處故未敢便道他是聖人此其權度審矣程子又曰孟子有功於聖門不可勝言仲尼只説一箇仁字孟子開口便説仁義仲尼只説一箇志孟子便説許多養氣出來只此二字其功甚多輔氏曰或疑二字當作二事言仁義養氣自是二事言二字則包不盡矣曰不然孟子有功於聖門不可勝言者蓋總言仁義養氣二事若只此二字其功甚多則又専指養氣言也蓋夫子只説一箇立人之道曰仁義而已孟子則開口便説仁義如對梁惠王與宋牼可見義氣二字則又發夫子之所未發使夫氣質剛柔之不齊者皆無有巽懦怯弱之態勇猛奮發於道義而各得以充滿夫仁義之量其功多矣又曰孟子有大功於世以其言性善也輔氏曰孟子言性善使天下之人資質之美者聞之必求其所以善而復其本資質之不善者聞之則亦庶乎知所以自反而不流於惡此其所以有大功於世也又曰孟子性喜養氣之論皆前聖所未發輔氏曰孟子之學已到聖處見得透徹所以發明得出又曰學者全要識時若不識時不足以言學顔子陋巷自樂以有孔子在焉若孟子之時世既無人安可不以道自任輔氏曰時固不可不識記言堯授舜舜授禹湯放桀武王伐紂時也此識時者也與程子所論顔孟之意同若不識時則以數聖賢之道為不同矣孟子謂孔子為聖之時又論禹稷顔回曾子子思同道且曰易地則皆然孟子可謂識時矣則其以道自任者宜也又曰孟子有些英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只豪髮間孟子大賢亞聖之次也或曰英氣見於甚處曰但以孔子之言比之便可見且如氷與水精非不光比之玉自是有溫潤含蓄氣象無許多光耀也輔氏曰英氣是剛明秀發之氣此自是好底氣質然在學者分上則不必論此學要變化氣質渾然純是義理如張子所謂德勝於氣性命於德方始是成就處雖是好氣質若銷化未盡猶有圭角則有時而發故於義理甚害事也若顔子之質雖甚剛明然其學力到後便自渾厚不同其去聖人只隔一膜故可為聖人之亞而孟子地位又為其次也又曰冰與水精及玉之比固自精切然却只以言語論之何也言心聲也德之符也有德者必有言若就言上看得分明則其德無餘藴矣玉有溫潤含蓄氣象所以為寶人有溫潤含蓄氣象所以為聖其理一也楊氏曰孟子一書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隱羞惡辭遜是非之心為之端論邪説之害則曰生於其心害於其政論事君則曰格君心之非一正君而國定千變萬化只説從心上來人能正心則事無足為老矣大學之修身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善故孟子遇人便道性善或問心得其正然後知性之善語若倒置何邪曰此語亦非無理但文意不全如有病者蓋知性之善然後能正其心心得其正然後有以真知性之為善而不疑耳輔氏曰楊氏發明孟子千變萬化只説從心上來甚説得孟子意而又可以使學者知為學之要至論人能正心則事無足為者則其語亦失之太快觀大學正心之後於修身齊家治國平天下更有工夫在後又説大學之修身齊家治國平天下其本只是正心誠意而已却自説得好心得其正然後知性之善此説尤精心者性之郛郭心不得其正則性亦不得其正矣必使忿懥恐懼好樂憂患一循其自然之則而不失其正然後吾之性本然純粹至善可見矣歐陽永叔却言聖人之教人性非所先可謂誤矣永叔名修廬陵人輔氏曰歐陽子未及識孔孟之所謂性而但見老釋氏清淨寂滅之云故曰聖人之教人性非所先耳人性上不可添一物堯舜所以為萬世法亦是率性而已所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔輔氏曰此説判斷二帝三王及漢唐以後為治之道所以不同明白詳盡真可以繼孟子之傳矣
