body:
  text: 欽定四庫全書論語纂疏卷九宋趙順孫撰朱子集注陽貨第十七凡二十六章陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗歸如字一作饋陽貨季氏家臣名虎嘗囚季桓子而專國政欲令孔子來見已而孔子不往貨以禮大夫有賜於士不得受於其家則往拜其門故瞰孔子之亡而歸之豚欲令孔子來拜而見之也謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣好亟知並去聲懷寶迷邦謂懷藏道德不救國之迷亂亟數也失時謂不及事幾之㑹將者且然而未必之辭貨語皆譏孔子而諷使速仕黃氏曰日月逝矣歲不我與此陽貨之言集注所謂諷使速仕亦謂是也其語意蓋謂夫子既老可以有為之日月已過矣歲運而往其去甚速豈復與我而為我少緩乎是亦諷使速仕也孔子固未嘗如此而亦非不欲仕也但不仕於貨耳故直據理答之不復與辨若不諭其意者輔氏曰君子未嘗不欲仕曰吾將仕矣此所謂據理而答之也不復與辨者不與辨已固未嘗如此亦非不欲仕直不可仕於貨之意也蓋陽虎雖暴戾然其與夫子言亦未嘗悖違乎理也曰懷寶則貴之矣曰亟失時則惜之矣曰仁曰知則亦嘗聞其說而非懵然全不曉矣此固聖人盛德之容儀有以感之故夫子亦據直理答之若夫聖人之心事則非虎之可知而可語也陽貨之欲見孔子雖其善意然不過欲使助已為亂耳輔氏曰觀其懷寶失時之說有敬愛聖人之心則知其為善意觀其欲見孔子而孔子不見及見孔子而諷使速仕之說則知其不過欲使助已為亂也故孔子不見者義也其往拜者禮也必時其亡而往者欲其稱也遇諸塗而不避者不終絶也隨問而對者理之直也對而不辨者言之孫而亦無所詘也語録曰問陽貨之瞰亡此不足責如孔子亦瞰亡而往則不幾於不誠乎曰非不誠也據道理合當如此彼以瞰亡來我以瞰亡往一往一來禮甚相稱但孔子不幸遇諸塗耳輔氏曰禮無不答亦無不稱貨雖假禮夫子自行禮以答之也然其往拜也必時其亡而往焉則又時措之求其稱也又曰聖人之事雖縱橫曲折千條萬緒然無非義理之當然固不可執其一節而論也必周旋反覆而觀之然後為盡愚亦謂不自往見者義也時其亡而往拜者禮也不終絶者仁也隨問而答對而不辨者智也四者一出於誠信也只此一事而五性具焉夫然後見聖人之全備楊氏曰揚雄謂孔子於陽貨也敬所不敬為詘身以信道非知孔子者蓋道外無身身外無道身詘矣而可以信道吾未之信也語録曰陽貨是惡人本不可見孔子乃見之亦近於詘身却不知聖人是禮合去見他不為詘到與他說話時只把一兩字答他辭溫氣厚而不自失非聖人斷不能如此輔氏曰道外無身者身乃道之所㑹也身外無道者道乃身之所出也身詘則道詘矣若曰詘身以信道則是離身與道為二物矣此雄之所以黽勉於莽賢之間而不去也子曰性相近也習相逺也此所謂性兼氣質而言者也或問氣質之性曰張子有言形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉蓋天地之所以生物者理也其生物者氣與質也人物得是氣質以成形而其理之在是者則謂之性然所謂氣質者有偏正純駁昏明厚薄之不齊故性之在是者其為品亦不一所謂氣質之性者也告子所謂生之謂性程子所謂生質之性所稟之性所謂才者皆謂是也然其本然之理則純粹至善而已所謂天地之性者也孟子所謂性善程子所謂性之本所謂極本窮原之性皆謂此者也若夫子此章論性而以相近為言則固指夫氣質而言之矣曰然則夫子不言性之本何也曰於易大傳詳矣語録曰性是天賦與人只一同氣質所稟却自有厚薄人只是一般人厚於仁而薄於義有餘於禮而不足於智便自氣質上來又曰天命之性若無氣質却無安頓處且如一勺之水非有物盛之則水無歸著又曰性非氣質則無所寄氣非天性則無所成又曰質並氣而言則是形質之質若生質則是資質之質又曰氣質之說起於張程極有功於聖門有補於後學讀之使人深有感愚謂此所謂性固不可即指為本然之性然其所以相近者正以本然之性不離乎氣質之中故集注下一兼字氣質之性固有美惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺耳或問習之相逺曰自其常者而言之則性之善者習於善而日進乎髙明性之惡者習於惡而日流乎汙下也自其變者而言之則性之善者或習於惡而失其善性之恶者或習於善而失其惡也凡是四者始皆相近而終則逺矣程子曰此言氣質之性非言性之本也若言其本則性即是理理無不善孟子之言性善是也何相近之有哉語録曰性相近是氣質之性本然之性一般無相近又曰性相近以氣質言性善以理言輔氏曰性之本謂不兼乎氣質而言之也既不兼乎氣質則純指乎理而言耳理則天地人物一而已矣謂之同謂之一則言已贅矣又何相近之可言哉子曰惟上知與下愚不移知去聲此承上章而言人之氣質相近之中又有美惡一定而非習之所能移者語録曰性相近是通善恶智愚說上智下愚是就中摘出懸絶者說程子曰人性本善有不可移者何也語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴自棄也人茍以善自治則無不可移雖昏愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然其質非必昏且愚也往往彊戾而才力有過人者商辛是也聖人以其自絶於善謂之下愚然考其歸則誠愚也語録曰問集注謂氣質相近之中又有一定而不可易者復舉程子無不可移之說似不合曰且看孔子說底如今却自有不移底人如堯舜不可為桀紂桀紂不可使為堯舜之類夫子說底只如此程子却又推其說須知其異而不害其為同又曰拒之以不信只是說道沒這道理絶之以不為是知有道理自割斷了不肯斂自暴者有彊悍意自棄者有懦弱意又曰習與性成而至於相逺則固有不移之理然人性本善雖至惡之人一日而能徒善則為一日之善人豈有終不可移之理程子所謂雖戾如商辛之人亦有可移之理是也或曰此與上章當合為一子曰二字蓋衍文耳輔氏曰此必一時之言但録之者以其兩意故著二子曰字以分其章然兩章既相承則亦不害其為一時之言也子之武城聞絃歌之聲絃琴瑟也時子游為武城宰以禮樂為教故邑人皆絃歌也黃氏曰絃歌絃且歌也合樂曰歌人聲絲聲皆堂上之樂也夫子莞爾而笑曰割雞焉用牛刀莞華版反焉於䖍反莞爾小笑貌蓋喜之也因言其治小邑何必用此大道也子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也易去聲君子小人以位言之子游所稱蓋夫子之常言言君子小人皆不可以不學黃氏曰上撫乎下下順乎上此道之當然也君子在上者能學道則知撫乎下矣小人在下者能學道則知順乎上矣上撫乎下下順乎上安有不治者乎故武城雖小亦必教以禮樂子曰二三子偃之言是也前言戲之耳嘉子游之篤信又以解門人之惑也治有大小而其治之必用禮樂則其為道一也輔氏曰治之用禮樂如飢之必用食渴之必用飲豈謂小邑寡民而可無以禮樂為哉舍禮樂則必將專於刑罰而民無措其手足矣豈聖學之所尚邪但衆人多不能用而子游獨行之故夫子驟聞而深喜之因反其言以戲之而子游以正對故復是其言而自實其戲也輔氏曰詳味集注章末之說則於其辭氣抑揚之間真得聖人寬廣樂易之氣象學者所冝深加玩索也公山弗擾以費畔召子欲往弗擾季氏宰與陽虎共執桓子據邑以叛子路不說曰末之也已何必公山氏之之也說音恱末無也言道既不行無所往矣何必公山氏之往乎子曰夫召我者而豈徒哉如有用我者吾其為東周乎夫音扶豈徒哉言必用我也為東周言興周道於東方語録曰此是古注說又曰問公山弗擾果能用夫子夫子果往從之亦不過勸得他改過自新舍逆從順而已亦如何便興得周道曰聖人自不可測且是時名分亦未定若謂弗擾既為季氏臣便不當畔季氏所謂改過者不過於臣順季氏而已此只是常法聖人須有措置問如此則必大冇所更張否曰聖人須驚天動地然卒於不往者亦料其做不得爾輔氏曰魯在周之東故云爾也蓋聖人無小成茍就之事如獲用焉不興周道以繼文武不已也程子曰聖人以天下無不可有為之人亦無不可改過之人故欲往然而終不往者知其必不能改故也子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏惠恭則不侮寬則得衆信則人任焉敏則有功惠則足以使人行是五者則心存而理得矣黃氏曰心主於五者則無非僻之雜而心之德常存以五者而施之事則無悖繆之失而事之理常得輔氏曰五者皆吾心所具之理而仁之發也蓋恭則仁之著也寬則仁之量也信則仁之實也敏則仁之力也惠則仁之澤也故能行是五者則心存理得而仁不外是也胡氏曰心主於五者則本心不失故曰心存以是五者施之事則揆之於理而合故曰理得於天下言無適而不然猶所謂雖之夷狄不可棄者輔氏曰行是五者則固心存而理得矣然是心一有間斷之時則亡矣是理一有虧闕之處則失矣故其行是五者又必自一家一國以至於天下無適而不然然後其心公平其理周遍而仁之體用舉矣五者之目蓋因子張所不足而言耳輔氏曰仁道無所不該乃萬善之綱領也今特以此五者言之故以為因子張所不足而言耳又曰堂堂乎張也難與並為仁矣則疑其不足於恭也愛之欲其生惡之欲其死疑其不足於寬也問行而告以忠信則疑其不足於信也問政而告之以無倦則疑其不足於敏也以至於色取仁而行違則疑其不足於惠也五者咸備則在子張為仁矣胡氏曰五常百行何莫非仁而獨以是言故疑其為子張之所不足也任倚仗也語録曰任是堪倚靠又曰任如謂任俠者是能為人擔當事也又言其效如此黃氏曰通指恭則不侮以下五句而言也輔氏曰恭則無不敬故能不侮於人寬則無不容故能得於人信則識實於己而人知所倚仗敏則專力於事而功無不成惠則有以浹洽於人心故人皆易使此皆以其效言也胡氏曰併及其效者欲其因是而驗之張敬夫曰能行此五者於天下則其心公平而周遍可知矣然恭其本與輔氏曰所謂其心公平而周遍者非體仁之深者不知此味也所謂恭其本與者所以指示學者尤切蓋恭則此心收斂不至於放縱此心收斂不放縱則夫寬信敏惠自有所不能己者胡氏曰謂恭其本者四者皆以事言而恭則切於身也李氏曰此章與六言六蔽五美四惡之類皆與前後文體大不相似輔氏曰李氏於文體亦可謂密者此必記者有工拙之不相同也佛肸召子欲往佛音弼肸許密反佛肸晉大夫趙氏之中牟宰也子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何子路恐佛肸之浼夫子故問此以止夫子之行輔氏曰所謂親於其身為不善而君子不入者正恐其汚己也此固子路之所知也至於人之不善不能浼聖人則非子路之所能知也故引此為問欲以止夫子之行耳親猶自也不入不入其黨也子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇磷力忍反涅乃結反磷薄也涅染早物言人之不善不能浼己輔氏曰聖人道大德洪所過者化人之不善一經聖人照臨之則大者革心小者革面之不暇何至有浼於聖人若夫昏頑之至不可以常理化者則聖人又自有以處之在上則或若堯舜之待三苖在下則若夫子之待陽貨公山佛肸亦豈能浼於聖人哉楊氏曰磨不磷涅不緇而後無可無不可堅白不足而欲自試於磨涅其不磷緇也者幾希輔氏曰磨不磷涅不緇而後無可無不可者聖人之事也堅白不足而欲自試於磨涅則後世不度德不量力輕舉妄動始欲自附於聖人而終則陷其身於不義之流也吾豈匏瓜也哉焉能繫而不食焉於䖍反匏瓠也匏瓜繫於一處而不能飲食人則不如是也黃氏曰匏瓜蠢然一物繫則不能動不食則無所知吾乃人類在天地間能動作有思慮自當見之於用而有益於人豈徽物之比哉世之奔走以糊其口於四方者往往借是言以自況失聖人之旨矣此不可以不辨張敬夫曰子路昔者之所聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之召皆欲往者以天下無不可變之人無不可為之事也其卒不往者知其人之終不可變而事之終不可為耳一則生物之仁一則知人之智也輔氏曰守身之常法學者所當謹守體道之大權則學者所當致知而未可遽行也至於論聖人之仁智則又因程子之說而發明之生物之仁天地之心無所擇也知人之知聖人之事有所别也二者蓋並行而不相悖焉夫弗擾佛肸之召夫子欲往者無不可也不絶人之仁也然而終不往者無可也明庶物之知也自聖人觀之則固無不可為之時亦無不可為之事亦無不可教之人然其所遇則有不可必者天未欲平治天下則在時者有不可為也上之人不我用則在事者有不可為也誨之諄諄聽之藐藐則在人者有不可教也子曰由也女聞六言六蔽矣乎對曰未也女音汝下同蔽遮掩也黃氏曰遮掩言有所不見之謂也孟子言詖辭知其所蔽詖者跛躄之類謂倚於一偏也所以倚於一偏者見彼一偏而不見此一偏是有所遮蔽也輔氏曰其所以遮掩者謂各隨其意之所向以遮掩其正理也胡氏曰亦猶為物所遮掩僅得其一偏而不見其全體也居吾語女語去聲禮君子問更端則起而對故孔子諭子路使還坐而告之好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂好知並去聲六言皆美德然徒好之而不學以明其理則各有所蔽黃氏曰仁知信直勇剛皆美德也又必學以明天理者何也六者德之大目耳輕重淺深當施不當施之間其理固多端也今但見其大目而篤好之不復務學以究其理之曲折則見其一而蔽其一未有不流於一偏者也輔氏曰六言謂仁知信直勇剛之六言也是六者皆人之美德茍能學以明之則存於中者固有夫本然之理而發於外者固有夫當然之則矣人之好之是秉彝之良心也然徒好之而不知學以明其本然之理則隨其意之所向而各有所蔽是以其發也皆失其當然之則而又陷於焉故好仁不好學則蔽於愛而為可陷可罔之愚好知不好學則蔽於通而為窮髙極廣而不知止之蕩好信不好學則蔽於固守而賊害於物好直不好學則蔽於徑行而訐人之私好勇不好學則蔽於敢為而或至於作亂好剛不好學則蔽於不屈而或至於為狂是以君子惟學之為貴愚若可陷可罔之類蕩謂窮髙極廣而無所止賊謂傷害於物輔氏曰人若固執必信而不知學則必至害物勇者剛之發剛者勇之體輔氏曰人之資稟得於隂陽者唯有剛有柔而已勇則剛之發出者也狂躁率也輔氏曰此狂字與狂狷之狂又不同躁率則近乎剛惡也故特釋之范氏曰子路勇於為善其失之者未能好學以明之也故告之以此曰勇曰剛曰信曰直又皆所以救其偏也輔氏曰范氏就子路身上發明得好子路勇以為善且嘗有何必讀書之說則其失在於未能學以明善也冝矣曰勇曰剛曰信直又皆子路氣質之偏故夫子特告之子曰小子何莫學夫詩夫音扶小子弟子也詩可以興感發志意語録曰須是反復讀使書與心相乳入自然有感發處輔氏曰詩所以吟咏情性故可以感人之志意志謂心之所之意謂心之發動處也可以觀考見得失黃氏曰興羣怨皆指學詩者而言觀則似指詩而言謂可考詩人之得失也然以為觀己得失亦可通下文既有多識為此以識彼則此觀為觀己然後四語皆一意也輔氏曰詩所以形四方之風言天下之事冇古今治亂之變人情物理之微故可以觀所謂考見得失者合於理則為得悖於理則為失也可以羣和而不流輔氏曰羣居之道雖止於和和而無節以至於流則又失己詩之言雖發乎情性而溫厚和平然止乎禮義而未嘗流失故可以羣可以怨怨而不怒輔氏曰怨者人情所不免當怨而不怨則失之疏怨而至於怒則又失之過而或至於傷物凡詩之所譏刺者固不免於怨然亦止乎禮義而不失其溫厚和平之意故可以怨程子所謂小辨擊鼓皆怨而各當乎理者是也邇之事父逺之事君人倫之道詩無不備二者舉重而言輔氏曰父子君臣兄弟夫婦朋友之道詩固備矣五者之中君臣父子又其重者故特舉而言之其曰邇曰逺則所包者間矣多識於鳥獸草木之名其緒餘又足以資多識學詩之法此章盡之讀是經者所冝盡心也輔氏曰論語之論及詩者多矣而惟此章為備反覆周悉無一或遺學詩者不可以不盡心於此茍於此而盡心焉則有以感發其志意而為善不懈有以考見其得失而於事無惑和而不流則得羣居之道怨而不怒則盡人情之微以至邇之事父逺之事君則於人倫之際各盡其道多識於鳥獸草木之名則可以為博物洽聞之君子子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與女音汝與平聲為猶學也周南召南詩首篇名或問二南何以為詩之首篇曰周南之詩言文王后妃閨門之化召南之詩言諸侯之國夫人大夫妻被文王后妃之化而成德之事蓋文王治岐而化行於江漢之域自北而南故其樂章以南名之蓋詩之正風也所言皆修身齊家之事輔氏曰二南之詩於文王齊家之事則見之矣至於修身之事則未嘗及也今乃謂所言皆修身齊家之事者何也曰身者家之本也聖人之化未有不本於身者文王之化自內及外如此則其修身之事固在其中矣正牆面而立言即其至近之地而一物無所見一步不可行語録曰問若不修身齊家則自然推不去是一步不可行也如何是一物無所見曰自家一身一家已自都理㑹不得況其逺者乎問此可見知與行相須之義否曰然子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉敬而將之以玉帛則為禮和而發之以鐘鼓則為樂遺其本而專事其末則豈禮樂之謂哉輔氏曰敬者在中之禮禮之本也玉帛則禮之器所以將吾敬而播之於外者也禮之末也和者在中之樂樂之本也鐘鼓則樂之器所以發吾和而播之於外者也樂之末也本末具舉內外兼備夫然後可謂禮樂之全茍惟專務其本而不事於末固為不可至於徒事其末而反遺其本則又豈所謂禮樂者哉云乎哉者猶言此不得謂之禮樂也胡氏曰玉帛五玉三帛禮文之重者也鍾金聲鼓革聲樂器之大者也非玉帛無以為禮非鐘鼓無以為樂然禮樂有本有末玉帛鐘鼓末也禮之本在於敬假玉帛以將之樂之本在於和假鐘鼓以發之周末文滅其質但以玉帛為禮鐘鼓為樂程子曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖便不和又如盜賊至為不道然亦有禮樂蓋必有總屬必相聽順乃能為盜不然則叛亂無統不能一日相聚而為盜也禮樂無處無之學者須要識得黃氏曰程子集注之言樂則同主於和至於言禮則集注主於敬程子主於序二說之不同何也曰不但敬與序之不同雖言和則同而所以為和亦不同也集注之敬與和主人心而言也程子之序與和主事理而言也然有人心之敬與和則見於事理者始有序而和矣輔氏曰禮樂之本雖細微之事凶惡之人一皆有之蓋不特見於玉帛鐘鼓之間要之只是箇序與和底道理而已人能識得此箇禮樂則知天下無一物無禮樂隨處體㑹隨處受用然其實不出序與和二字也胡氏曰程子欲人知禮樂之理無所不在然學者紀録雜以方言至於盜賊亦有禮樂姑借其近且粗者極言之非真所謂禮樂也然序和二字尤親切又見禮為樂之本也愚謂朱子以敬與和言是就心上說程子以序與和言是就事上說二說相須其義始備子曰色厲而內荏譬諸小人其猶穿窬之盜也與荏而審反與平聲厲威嚴也荏柔弱也小人細民也穿穿壁窬踰牆言其無實盜名而常畏人知也語録曰為他意在要瞞人故其心常怕人知如做賊然子曰鄉原德之賊也鄉者鄙俗之意黃氏曰鄉之得名本以鄙俗為言也故曰我猶未免為鄉人也亦猶都鄙之稱都之為言美矣鄙之為言俗也然則鄉者亦鄙之類歟原與願同荀子原慤注讀作願是也輔氏曰原若如字讀則無義故依荀子讀作願願有謹信之意鄉原鄉人之願者也蓋其同流合汙以媚於世故在鄉人之中獨以願稱黃氏曰其稱原人而必加之以鄉者以見其鄙俗非公論之所在故是非錯繆而稱之以為願也輔氏曰其同流合汗不敢少異於人而又居之似忠信故在鄉人之中獨以願稱也夫子以其似德非德而反亂乎德故以為德之賊而深惡之黃氏曰德者務合乎理者也鄉原求媚於世則不必皆合乎理而委曲遷就似乎理而實非理使人之為善者莫知平理之正是天下之正理反為鄉原所害也如廉潔理之正也鄉原不欲為廉潔以異俗故亦同乎汙俗而外為說以自蓋使人視之似廉潔然實非廉潔而反以害廉潔之正也故貪夫不足以害夫廉似廉者乃所以害夫廉夫子所以深惡之也胡氏曰賊害也詳見孟子末篇子曰道聽而塗說德之棄也雖聞善言不為己有是自棄其德也輔氏曰聞一善則當畜之於己以成就其德此學問自修之道也若是方聽道塗之說而復以道塗言之務以恱人而不知為己則是自棄其德矣胡氏曰德之棄與上章德之賊文勢相類彼似德而亂德故云德之賊此可以進德而不進故云德之棄王氏曰君子多識前言往行以畜其德道聽塗說則棄之矣輔氏曰王氏引大畜之象以解此甚為的當但於道聽塗說少分别耳其意似以四字為一意只是箇輕聽易說而已子曰鄙夫可與事君也與哉與平聲鄙夫庸惡陋劣之稱輔氏曰庸謂凡常惡只是惡陋謂猥瑣劣謂昏弱四者皆鄙也其未得之也患得之既得之患失之何氏曰患得之謂患不能得之胡氏曰蓋如有周不顯帝命不時語急而文省耳茍患失之無所不至矣小則吮癰䑛痔大則弒父與君皆生於患失而已輔氏曰此解無所不至矣一句甚當夫患得患失則惟利欲是徇而不復顧理義之所在矣其可與之事君也哉然其患得也則求以得之而已雖行險徼幸乘間抵隙然其惡猶有底止也至於患失則無不至矣小則吮癰䑛痔不惜身命大則弒父與君禍及國家胡氏曰許昌靳裁之有言曰士之品大槩有三志於道德者功名不足以纍其心志於功名者富貴不足以纍其心志於富貴而已者則亦無所不至矣志於富貴即孔子所謂鄙夫也輔氏曰志於道德則功名不必外求而得其或終無所成則亦全吾道德而已矣在我亦何所損哉若夫志於功名則其心已是謀利計功了幸而得之則已矣不然則行險徼幸枉尺直尋殆將不能免志於富貴則患得患失終必至於無所不至矣其為庸惡陋劣之態亦可想而見也胡氏曰靳氏三品之說本非此章正意然能推見鄙夫之所以若此志於道德聖賢之徒也志於功名豪傑之士也志於富貴即鄙夫也聖賢非不事功名也可為則為不得為則不為不害於道德也豪傑非惡富貴也視功名為重則富貴為輕也鄙夫則富貴之外它無所志故得失之為患至於如此子曰古者民有三疾今也或是之亡也氣失其平則為疾故氣稟之偏者亦謂之疾輔氏曰氣稟之偏亦謂之疾此以德言之也人身之氣常平和則安寧一失其平則為疾矣人之德氣稟得中則為善一失之偏則亦為疾矣昔所謂疾今亦無之傷俗之益衰也輔氏曰古今氣數固有箇大盛衰而一代一世又各自有小盛衰此之所言蓋兼舉之古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣狂者志願太髙肆謂不拘小節蕩則踰大間矣矜者持守太嚴廉謂稜角峭厲語録曰廉是側邊廉隅這只是那分處所謂廉者為是分得那義利去處譬如物之側稜兩下分去忿戾則至於爭矣愚者暗昧不明直謂徑行自遂詐則挾私妄作矣范氏曰末世滋僞豈惟賢者不如古哉民性之蔽亦與古人異矣愚謂論語中說古今處皆是歎今之不如古子曰巧言令色鮮矣仁重出子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者惡去聲覆芳服反朱正色紫間色陳氏曰朱是南方正火色赤紫是北方間水克火赤黑色似朱而非朱雅正也利口捷給覆傾敗也輔氏曰利之可惡雖堯舜之聖猶自長之凡天地之間是非賢不肖一切變亂而移易之且其持之有故其言若有理人君一或信之則其危亡蓋有不覺其然而然者自古以來國家之傾敗皆可覆也范氏曰天下之理正而勝者常少不正而勝者常多聖人所以惡之也利口之人以是為非以非為是以賢為不肖以不肖為賢人君茍恱而信之則國家之覆也不難矣輔氏曰氣數難得相值時節難得常好故邪正相乘之際而正常屈於邪疑似之間每惡其雜亂而致詳焉此亦贊天地之一端也子曰豫欲無言學者多以言語觀聖人而不察其天理流行之實有不待言而著者是以徒得其言而不得其所以言故夫子發此以警之輔氏曰此亦有兩意一是天理流行之實凡動靜語默皆是初不待言而著學者惟不察乎此而但以言語觀聖人是以徒得其言而不得其所以言故夫子發此以警之一是以言而教人固聖人之本心因言以進道亦學者之當務但學者心粗氣暴其於聖人之言領略之意常多而體察之意常少是以徒得其言而不得其所以言故夫子發此以警之子貢曰子如不言則小子何述焉子貢正以言語觀聖人者故疑而問之輔氏曰觀子貢之說則可見矣然此語必須在未聞性與天道之前也子曰天何言哉四時行焉百物生焉天何言哉四時行百物生莫非天理發見流行之實不待言而可見聖人一動一靜莫非妙道精義之發亦天而已豈待言而顯哉輔氏曰百物生是天理之發見也四時行是天理之流行也又發見則自其初而言之流行則併舉其終也妙道則言其體也精義則言其用也靜而涵動動不離靜自然而然莫知其所以然故謂之精義夫子但言天之理更不及己之事則天人一貫而天即己巳即天矣此所謂聖人之言也此亦開示子貢之切惜乎其終不喻也程子曰孔子之道譬如日星之明猶患門人未能盡曉故曰豫欲無言若顔子則便默識其他則未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉則可謂至明白矣愚案此與前篇無隱之意相發學者詳之輔氏曰前篇所謂吾無隱乎爾吾無行而不與二三子而已未及夫隱之事實也今舉四時行百物生則夫無隱與無行而不與二三子者益更明白蔡氏曰集注以此章與前篇無隱之意相發蓋四時行百物生莫非天理發見流行之實正所以發夫子之無隱也學者玩此而有得焉不惟見聖人一動一靜純乎天理之妙不待言而顯便當反之於踐履事為之實俯焉孳孳庶幾有得乎希聖希天之事更玩四時行百物生尤見其體用一原隂陽之理運行不息而萬物各遂其生之妙聖人亦天而已孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之孺悲魯人嘗學士喪禮於孔子胡氏曰禮記恤由之喪魯哀公使孺悲之孔子學士喪禮當是時必有以得罪者故辭以疾而又使知其非疾以警教之也輔氏曰聖人之門來者不拒儻非有故未有卻之如此其峻者然其所以得罪之事不可知矣辭之以疾者義不當見也歌瑟使聞者仁不容絶也夫子於此仁義並行而不悖然其愛人之心則終無己也程子曰此孟子所謂不屑之教誨所以深教之也胡氏曰聖人無疾而託以疾則雖庸人亦能自省其所以見絶之由是不屑之教誨也宰我問三年之喪期已久矣期音基下同期周年也君子三年不為禮禮必壞三年不為樂樂必崩恐居喪不習而崩壞也輔氏曰此述宰我之意也然禮樂自事親從兄而出不能三年之喪則禮樂之本蹙矣宰我慮其崩壞而急急於玉帛鐘鼓之間則亦不知務甚矣舊榖既沒新榖既升鑽燧改火期可已矣鑽祖官反沒盡也升登也燧取火之木也改火春取榆柳之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火亦一年而周也愚謂榆柳青棗杏赤桑柘黃柞楢白槐檀黑各隨其時之方色取之周禮司爟掌行火之政令四時變國火正此謂也已止也言期年則天運一周時物皆變喪至此可止矣輔氏曰此亦述宰我之意也然天運固一周矣時物固皆變矣而吾心哀怛之實自有不能己者又可因彼而廢此乎尹氏曰短喪之說下愚且恥言之宰我親學聖人之門而以是為問者有所疑於心而不敢強焉爾輔氏曰尹氏說固忠厚然宰我之失亦自在但其致問之時猶出於情實較之後世匿情行詐而口不相副者則猶為無隱耳子曰食夫稻衣夫錦於女安乎曰安夫音扶下同衣去聲女音汝下同禮父母之喪既殯食粥粗衰既葬疏食水飲受以成布語録曰成布是稍細成布初來未成布也八十縷為一升古尺一幅只闊二尺二寸算來斬衰三升如今網一般又如今漆布一般所以為未成布也期而小祥始食菜果練冠縓緣語録曰縓今淺絳色小祥以縓為緣看古人小祥源緣者一入為縓禮有四入之說亦是漸漸加深色耳然古人亦不專把素色為凶蓋古人常用皮升皮辨純白自今言之則為大凶矣要絰不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故問之以此而宰我不察也輔氏曰宰我二說皆是其所執而欲以短喪者然未嘗反其心哀怛之實自有不能己者故夫子但以食稻衣錦於女安乎問之此蓋欲其反諸心以求其不忍之實也女安則為之夫君子之居喪食旨不甘聞樂不樂居處不安故不為也今女安則為之樂上如字下音洛此夫子之言也旨亦甘也初言女安則為之絶之之辭又發其不忍之端以警其不察而再言女安則為之以深責之輔氏曰宰我蔽執之深雖聞夫子之言而不察其所以言之意不反諸心以求其不忍之實而遽以曰安為答則其不仁甚矣故夫子又言凡君子之居喪食旨不甘故不食聞樂不樂故不聞居處不安故不處皆自然而然以發其本心不忍之端以警其不察然後復言女安則為之以深責之也宰我出子曰豫之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也豫也有三年之愛於其父母乎宰我既出夫子懼其真以為可安而遂行之故深探其本而斥之言由其不仁故愛親之薄如此也輔氏曰孝者為仁之本於此而閼絶之使不行則人之道息矣且夫宰我之所謂安者使其不求諸心隨口而言則固己為不仁矣若其心誠以為安則其不仁又甚焉此所以見其出而深探其本以斥之言由其不仁故愛親之薄如此也懷抱也又言君子所以不忍於親而喪必三年之故使之聞之或能反求而終得其本心也輔氏曰子生三年然後免於父母之懷此君子所以不忍於親而喪必三年之故自天子達於庶人而為天下之通喪也至於使之聞之或能反求而終得其本心則聖人之仁也始也問以食稻衣錦於女安乎所以使宰我反求諸心自得其所以不忍及宰我不察則又言君子居喪之禮皆出於自然以發其不忍於親而喪必三年之故使之聞之尚庶幾其能反求而得其本心不至於終迷而不反也然則聖人之心所以愛人無己者於此亦可得而見矣范氏曰喪雖止於三年然賢者之情則無窮也特以聖人為之中制而不敢過故必俯而就之非以三年之喪為足以報其親也所謂三年而後免於父母之懷特以責宰我之無恩欲其有以跂而及之爾輔氏曰范氏發明非以三年之喪為足以報其親之說尤為忠厚所謂喪三年以為極亡則弗之忘矣者是也至於聖人既於此為之中制則賢者必當俯而就不肖者必當跂而及夫如是然後其說始圎而宰我之失夫子之意始皆坦然明白矣子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎己博局戲也奕圍碁也已止也李氏曰聖人非教人博奕也所以甚言無所用心之不可爾文集曰此非是啓博奕之端然聖人乃假此以甚彼之辭子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜尚上之也君子為亂小人為盜皆以位而言者也尹氏曰義以為尚則其勇也大矣子路好勇故夫子以此救其失也輔氏曰尚義而勇義理之勇也勇而無義血氣之勇也唯血氣所使而不以義理制之則其為害隨所居而為大小故在上則逆理犯上而為亂在下則肆欲陵上而為盜子路好勇故夫子以是告之胡氏曰疑此子路初見孔子時問答也輔氏曰詳味其言尚有自負其勇之意而始疑聖門之或不以勇為尚耳若子路後來進德地位煞髙必不復以此為問也子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者惡夫聲下同惟惡者之惡如字訕所諫反訕謗毁也窒不通也稱人惡則無仁厚之意下訕上則無忠敬之心勇無禮則為亂果而窒則妄作故夫子惡之曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者徼古堯反知孫並去聲訐居謁反惡徼以下子貢之言也徼伺察也訐謂攻發人之隂私楊氏曰仁者無不愛則君子疑若無惡矣子貢之有是心也故問焉以質其是非侯氏曰聖賢之所惡如此所謂唯仁者能惡人也輔氏曰楊氏說得子貢所以發問之意出侯氏說得聖賢不能無惡要當於理之意明然夫子因子貢之問而又以賜也亦有惡乎發之使之得以盡其說又見聖人氣象從容誠意審密有以盡人之情如此子曰唯女子與小人為難養也近之則不孫逺之則怨近孫逺並去聲此小人亦謂僕𨽻下人也或問何以知其為僕𨽻下人曰若為惡之小人則君子逺之惟恐不嚴怨亦非所恤矣君子之於臣妾莊以涖之慈以畜之則無二者之患矣輔氏曰此正所謂不近不逺之間道理也夫小人女子雖有難養之情在君子則有善養之道莊以涖之則有以銷其不孫之心慈以畜之則有以弭其多怨之意子曰年四十而見惡焉其終也已惡去聲四十成德之時見惡於人則止於此而已勉人及時遷善改過也蘇氏曰此亦有為而言不知其為誰也輔氏曰聖人之言特限於四十則可知矣微子第十八此篇多記聖賢之出處凡十一章微子去之箕子為之奴比干諫而死微箕二國名胡氏曰皆圻內國名子爵也微子紂庶兄箕子比干紂諸父微子見紂無道去之以存宗祀箕子比干皆諫紂殺比干囚箕子以為奴箕子因佯狂而受辱孔子曰殷有三仁焉三人之行不同而同出於至誠惻怛之意語録曰問微子之去欲存宗祀比干之死欲紂改行可見其至誠惻怛處不知箕子至誠惻怛何以見曰箕子比干都是一樣心箕子偶然不衝著紂之怨不殺他然見比干恁地死若更死諫無益於國徒使人君有殺諫臣之名他處此最難微子去却易比干一向諫死又却索性箕子在半上落下最是難處被他監繫在那裏不免佯狂所以易中特說箕子之明夷可見其難處故不咈乎愛之理而有以全其心之德也輔氏曰愛之理此分言之心也仁之德此專言之仁也不咈乎愛之理指惻怛而言也有以全其心之德指至誠而言也蔡氏曰比干之死非沽名也箕子之生非懼禍也微子之去非要利以忌君也此可見其同出於至誠惻怛之意比干以諫死猶庶幾感悟乎紂之心箕子佯狂為奴意其猶有規諫之意微子抱祭器而去蓋不忍坐視其宗祀之絶此可見不咈乎愛之理三子之去就死生其志不在乎一身而惟在乎愛君憂國此可見有以全其心之德楊氏曰此三人者各得其本心故同謂之仁愚謂三人之事雖不同而各得其本心則同故同謂之仁仁則本心之全德也柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦三去聲焉於䖍反士師獄官黜退也柳下惠三黜不去而其辭氣雍容如此可謂和矣然其不能枉道之意則有確乎其不可拔者是則所謂必以其道而不自失焉者也或問柳下惠仕而屢黜黜而復仕至於三黜而又不去焉何也曰進不隱賢必以其道不以三公易其介所以屢黜而至於三降志辱身援而止之而止雖袒裼裸程於我側不以為凂所以黜而復仕既三黜而遂不去也或曰惠知直道之必黜而不去然則其將枉道以事人乎曰不然也惠之意若曰我但能直道事人則固不必去魯而適他國矣其言泛然若無所指蓋和者之氣象如此而其道則固自信其不能枉道而事人矣是以三黜之後雖不屑去然亦意其遂不復仕故孔子得以列之於逸民之目胡氏曰此必有孔子斷之之言而亡之矣輔氏曰以前章例之而知之也齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行魯三卿季氏最貴孟氏為下卿孔子去之事見世家然此言必非面語孔子蓋自以告其臣而孔子聞之爾輔氏曰景公之言雖實而失於率易聖人德盛道尊見者必加敬而盡禮況景公素知聖人者必不敢以是言而面瀆之所謂自以告其臣而孔子聞之之說當矣程子曰季氏強臣君待之之禮極隆然非所以待孔子也以季孟之間待之則禮亦至矣然復曰吾老矣不能用也故孔子去之蓋不繫待之輕重特以不用而去爾愚謂茍以利心觀則必以為聖人之去有繫乎待之輕重也故特釋之齊人歸女樂季桓子受之三日不朝孔子行歸如字或作饋朝音潮季桓子魯大夫名斯案史記定公十四年孔子為魯司寇攝行相事齊人懼歸女樂以沮之尹氏曰受女樂而怠於政事如此其簡賢棄禮不足與有為可知矣夫子所以行也所謂見幾而作不俟終日者與或問史記載孔子之去魯也有彼婦之口可以出走之歌今尹氏直以為知魯之君相無敬賢之心而去何邪曰齊人之謀固欲以是沮孔子矣蓋欲以女子為間於魯之君相使之先有以熒惑其耳目感移其心志遂乘間而進說以沮敗其所為甚則或遂中以不測之禍而不慮孔子之覺之早去之速也然孔子之覺之也直以其無敬賢之心知其不足與有為耳而其禍之將至者則固亦不外乎此也尹氏之言不及其他其有得於孔子之初心與范氏曰此篇記仁賢之出處而折中以聖人之行所以明中庸之道也輔氏曰仁謂三仁賢謂柳下惠及下章隱逸之人皆是也夫子於齊於魯非不欲仕也亦未嘗必於仕也但可仕則仕可止則止此所以為中庸之道也三仁柳下惠則庶幾矣接輿以下則皆未免於偏也楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰往者不可諫來者猶可追己而已而今之從政者殆而接輿楚人佯狂辟世夫子時將適楚故接輿歌而過其車前也鳯有道則見無道則隱接輿以比孔子而譏其不能隱為德衰也輔氏曰鳯靈物也有道則見無道則隱鳯固然也至於無道而不隱則鳯之德衰矣然以此論君子守身之常法則可至於聖人體道之大權則又不可以此例論也來者可追言及今尚可隱去已止也而語助辭殆危也接輿蓋知尊孔子而趨不同者也輔氏曰觀接輿之言既比之以鳯而又疑其衰既幸其或止而又慮其殆語意殷勤諄復是誠知尊聖人者矣然其所趨則在於絶人逃世以逺害全身而已其與聖人之心蓋不啻如氷炭白黑之不同也胡氏曰接輿之於孔子既比以鳯又議其衰既欲其己又懼其殆可謂知尊聖人矣然曰往者不可諫來者猶可追則不知聖人無過之可悔無善之可遷是知尊聖人而未知聖人也其趨不同者有避世之心而無救世之意有堅守之操而無變通之學也孔子下欲與之言趨而避之不得與之言孔子下車蓋欲告之以出處之意接輿自以為是故不欲聞而辟之也長沮桀溺耦而耕孔子過之使子路問津焉沮七餘反溺乃歷反二人隱者耦並耕也時孔子自楚反乎蔡津濟渡處長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣夫音扶與平聲執輿執轡在車也蓋本子路御而執轡今下問津故夫子代之也知津言數周流自知津處問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟徒與之與平聲滔吐刀反辟去聲耰音憂滔滔流而不反之意以猶與也言天下皆亂將誰與變易之輔氏曰桀溺之意以為夫人有反之之意則夫子有易之之理今天下皆亂如水之流而不反則誰肯聽夫子之言行夫子之道而夫子亦安能有所變易其人也哉而汝也辟人謂孔子辟世桀溺自謂輔氏曰夫子嘗去魯適衛適楚以至微服而過宋以辟陽貨之難此又其辟人之實也故桀溺以夫子為辟人至於桀溺之見則以為天下皆滔滔而不反則世人無一不可辟者故絶人逃世以為潔而自謂其能辟世耰覆種也胡氏曰孟子曰播種而耰之既播布所種乃耰以覆之亦不告以津處子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也憮音武與如字憮然猶悵然惜其不喻己意也言所當與同羣者斯人而已豈可絶人逃世以為潔哉天下若已平治則我無用變易之正為天下無道故欲以道易之耳輔氏曰天之生聖賢欲其平治天下者理之常也其或雖生聖賢而未欲平治天下者理之變也然既曰聖賢則必以天地之常者為心而其所以平治天下之道又備盡於己舉而措之易亂為治易危為安固必有自然之應而天果未欲平治天下也則亦安於理而已矣若天下既已平治則亦何用聖人以易之哉程子曰聖人不敢有忘天下之心故其言如此也張子曰聖人之仁不以無道必天下而棄之也愚謂程子之言切張子之言婉子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而藝蓧徒弔反植音值丈人亦隱者蓧竹器分辨也五榖不分猶言不辨菽麥爾責其不事農業而從師逺遊也植立之也藝去草也子路拱而立知其隱者敬之也止子路宿殺雞為黍而食之見其二子焉食音嗣見賢遍反明日子路行以告子曰隱者也使子路反見之至則行矣孔子使子路反見之蓋欲告之以君臣之義輔氏曰夫子所以使子路反見之豈徒然哉必有以也而丈人絶人逃世藐然不復知有君臣之義則夫子之欲告之宜莫先於此也觀子路所述夫子之意則固可見矣而丈人意子路必將復來故先去之以滅其跡亦接輿之意也子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣長上聲子路述夫子之意如此愚謂子路所言雖未可即以為夫子之語然使之反見則必授以見之之意矣故知其述夫子之意無疑也蓋丈人之接子路甚倨而子路益恭丈人因見其二子焉則於長幼之節固知其不可廢矣故因其所明以曉之輔氏曰丈人之接子路雖倨而子路益恭此固子路學力之所致丈人因見其二子蓋因子路之敬長有以感發其心而知長幼之節不可廢耳夫長幼之節君臣之義皆天叙之典人之所不能無也丈人知長幼之節不可廢而不知君臣之義不可廢是其心必有蔽故一得一失或明或暗而不自知其然也聖人於此因其所明而曉之倫序也人之大倫有五父子有親君臣有義夫婦有别長幼有序朋友有信是也仕所以行君臣之義故雖知道之不行而不可廢然謂之義則事之可否身之去就亦自有不可茍者是以雖不潔身以亂倫亦非忘義以徇祿也或問知道之不行矣而徒仕可乎曰仕所以行義也義則有可不可矣義合而從則道固不患於不行不合而去則道雖不行而義亦未嘗廢也是以君子雖知道之不行而未嘗不仕然亦未嘗懷私徇祿而茍一時之安也由此觀之道義之未嘗相離也亦可見矣語録曰問仕所以行君臣之義又云亦非忘義徇祿此義字似有兩意曰只是一意才說義便是總去就都說道合則從不合則去即此是義非但只說要出仕為義然合則從不合則去唯是出仕方見得不仕無義才說不仕便都無了這義聖人憂世之心固是急欲得君行道到得靈公問陳明日遂行景公以季孟之間待之曰吾老矣不能用也孔子行季桓子受女樂孔子行無一而非義又曰舊時人說此假只說道合出仕才仕便是義殊不知所謂仕不是埋頭一向只要仕如孟子說所就三所去三與孔子有見行可之仕有際可之仕有公養之仕雖是未嘗不欲仕亦未嘗不顧其義之如何輔氏曰君臣之義雖本乎天而具乎我者也道雖存乎我而其行止則繫平天者也具乎我者不可廢而繫乎天者則非敢必也故孔子雖卒老于行而終不敢深藏固閉以自潔而廢君臣之義然義之為言冝也既曰義則事便有去就可則就之否則去之固有截然不可移易者故聖人之法君子之行既不可以潔身而亂倫如隱者之為亦不可以忘義而徇祿如世俗之仕者也福州有國初時寫本路下有反子二字以此為子路反而夫子言之也未知是否范氏曰隱者為髙故往而不反仕者為通故溺而不止不與鳥獸同羣則決性命之情以叨富貴此二者皆惑也是以依乎中庸者為難惟聖人不廢君臣之義而必以其正所以或出或處而終不離於道也輔氏曰范氏言隱與仕者之弊詳且盡矣與鳥獸同羣隱者之弊也決性命之情以叨富貴此語出莊子謂決絶其在我性命之情而不顧而唯在外之富貴是貪是欲者也世之人茍不知學則不陷乎此必溺乎彼夫然後知依乎中庸者為難也惟聖人之心渾是義理故既不廢君臣之義而必以其正所以仕止久速無可無不可而終不離於中庸之道也夫所謂依乎中庸之難者蓋非義精仁熟周旋中禮而無一豪人欲之私者不能也逸民伯夷叔齊虞仲夷逸朱張柳下惠少連少去聲下同逸遺逸民者無位之稱虞仲即仲雍與大伯同竄荆蠻者夷逸朱張不見經傳少連東夷人子曰不降其志不辱其身伯夷叔齊與與平聲謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣行去聲下同柳下惠事見上倫義理之次第也慮思慮也中慮言有意義合人心輔氏曰慮對倫而言倫是義理之次第則慮亦人之正思慮也言中倫謂所言有得乎義理之次第行中慮謂所行犂然有當於人心也即義理所在也所謂有意義合人心者其味深矣人心乃人之公心也諸說多以為中我之思慮者誤矣少連事不可考然記稱其善居喪三日不怠三月不解朞悲哀三年憂則行之中慮亦可見矣謂虞仲夷逸隱居放言身中清廢中權仲雍居吳斷髮文身裸以為飾隱居獨善合乎道之清放言自廢合乎道之權輔氏曰遁處勾吳以獨善其身此所以合乎道之清清即伯夷之清也放言以自示其不可用此所以合乎道之權放言事雖無所考然觀其斷髮文身之為則放言自廢固冝有之矣我則異於是無可無不可孟子曰孔子可以仕則仕可以止則止可以久則久可以速則速所謂無可無不可也輔氏曰孟子只言無不可而已不言無可也然反而觀之則為可矣知可仕而仕則是無不可也不可仕而不仕則是無可也要之七人者皆是有可有不可之人故其制行各異孔子則無可無不可唯其時與義而已謝氏曰七人隱遁不汙則同其立心造行則異伯夷叔齊天子不得臣諸侯不得友蓋已遁世離羣矣下聖人一等此其最髙與柳下惠少連雖降志而不枉己雖辱身而不求合其心有不屑也故言能中倫行能中慮虞仲夷逸隱居放言則言不合先王之法者多矣然清而不汙也權而適冝也與方外之士害義傷教而亂大倫者殊科是以均謂之逸民輔氏曰遁世離羣皆乾卦文言之辭然遁世無悶固聖人事至於離羣二字則似乎未善今并言之者但取二字以足遁世為句耳不取其義也伯夷惟於清之一德極於聖耳他固有未盡也故曰下聖人一等然視數子之性行則固為髙矣隱居雖非君子庸行然身中乎清而不汙而已去伯夷之清則有徑庭矣故言雖不合先王之法然自廢則中乎權而得冝權而得冝則權不失正也方外之士蓋接輿沮溺丈人之徒然此兩言實出莊子所謂逰方之外不可拘於禮法也故其弊必至於害君臣之義傷先王之教而賊亂人之大倫也尹氏曰七人各守其一節孔子則無可無不可此所以常適其可而異於逸民之徒也揚雄曰觀乎聖人則見賢人是以孟子語夷惠亦必以孔子斷之大師摰適齊大音泰大師魯樂官之長摰其名也亞飯干適楚三飯繚適蔡四飯缺適秦飯扶晚反繚音了亞飯以下以樂侑食之官或問何以知為侑食之官也曰白虎通曰王者平旦食晝食晡食莫食凡四飯諸侯三飯大夫再飯故魯之樂官自亞飯以下蓋三飯也干繚缺皆名也鼓方叔入於河鼓擊鼓者方叔名河河內播鼗武入於漢鼗徒刀反播搖也鼗小鼓兩旁有耳持其柄而搖之則旁耳還自擊武名也漢漢中少師陽擊磬襄入於海少去聲少師樂官之佐陽襄二人名襄即孔子所從學琴者海海島也此記賢人之隱遁以附前章輔氏曰自大師而下皆傷時之衰禮樂僭妄去而辟亂者故以記逸民之後然未必夫子之言也輔氏曰以章首皆無子曰二字故知之末章放此張子曰周衰樂廢夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益衰三桓僭妄自大師以下皆知散之四方逾河蹈海以去亂聖人俄頃之助功化如此如有用我期月而可豈虛語哉輔氏曰張子以為記者及此必有所謂故推言如此周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人施陸氏本作弛詩紙反福本同或問施之為弛曰陸氏釋文云爾而吳氏考開元五經文字亦作弛是唐本初未嘗誤也然孔說已訓為易則漢本已作施而讀如衛綰傳之施易者耳此不可曉然作弛者於義為得魯公周公子伯禽也弛遺棄也以用也大臣非其人則去之在其位則不可不用大故謂惡逆李氏曰四者皆君子之事忠厚之至也輔氏曰四者皆君國子民之事胡氏曰不弛其親親親也不使大臣怨不以任賢也故舊無大故不棄敬故也無求備於一人用才也親親而不遺任賢而不二敬故而不忘用才而不苛皆忠厚之意胡氏曰此伯禽受封之國周公訓戒之辭魯人傳誦久而不忘也其或夫子嘗與門弟子言之歟周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧騧烏瓜反或曰成王時人或曰宣王時人蓋一母四乳而生八子也輔氏曰謂母孕乳而二人也古者以伯仲叔季為長少之次如仲孫叔孫之類今重復命名故意其四乳也然不可考矣張子曰記善人之多也愚案此篇孔子於三仁逸民師摰八士既皆稱贊而品列之於接輿沮溺丈人又每有惓惓接引之意皆衰世之志也其所感者深矣在陳之嘆蓋亦如此三仁則無間然矣其餘數君子者亦皆一世之髙士若使得聞聖人之道以裁其所過而勉其所不及則其所立豈止於此而已哉黃氏曰接輿沮溺丈人此四子者若律以聖人之中道則誠不為無病然味其言觀其容止以想見其為人其清風髙節猶使人起敬起慕恨不得識其面而端拜之彼於聖人猶有所不滿於心如此則其視世之貪利慕祿而不知止者真不啻若犬彘求欲為之奴𨽻而不可得也是亦豈非當世之賢而特立者歟惟夫子然後可以議其不合於聖人之道未至於夫子者皆未可以妄議也貪利慕祿之徒求以自便其私亦借四子而詆之欲以見其不可以不仕多見其不知量也論語纂疏卷九
