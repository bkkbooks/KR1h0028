body:
  text: 欽定四庫全書論語纂疏卷四宋趙順孫撰朱子集注述而第七此篇多記聖人謙己誨人之辭及其容貌行事之實凡三十七章子曰述而不作信而好古竊比於我老彭好去聲述傳舊而已作則創始也故作非聖人不能而述則賢者可及輔氏曰因舊而傳明者能之故賢者可及自我創始則非聖人之神明莫測而變通不窮有所不能也竊比尊之之辭我親之之辭老彭商賢大夫見大戴禮蓋信古而傳述者也胡氏曰包氏謂商賢大夫大戴禮虞戴德篇有商老彭之語孔子刪詩書定禮樂贊周易修春秋皆傳先王之舊而未嘗有所作也故其自言如此語録曰如刪詩書定禮樂皆述他見在底不是别自創意做出春秋雖云孔子作如曰其事則齊桓晉文其文則史亦只是寫出魯史只是中間略有改更蓋不惟不敢當作者之聖而亦不敢顯然自附於古之賢人蓋其德愈盛而心愈下不自知其辭之謙也然當是時作者略備夫子蓋集群聖之大成而折衷之其事雖述而功則倍於作矣此又不可不知也輔氏曰作者略備觀於六藝可見集群聖之大成而折衷亦於六藝見之然群聖之所作因事制宜以成一代之制者也夫子集其成而折衷之參互發明以垂萬世之法者也此夫子之所以賢於堯舜者在是子曰默而識之學而不厭誨人不倦何有於我哉識音志又如字識記也默識謂不言而存諸心也陳氏曰謂口雖不言而歷歷記在心也一說識知也不言而心解也前說近是或問默識二義曰不言而得其理者不待問辨而無疑也不言而存諸心者拳拳服膺而弗失也二義皆通蓋皆聖人之所不居也何有於我言何者能有於我也三者已非聖人之極至而猶不敢當則謙而又謙之辭也語録曰此必因人稱聖人有此聖人謙辭承之後來記者却失上面一節只做聖人自話記了輔氏曰猶不敢當四字寫出聖人心來子曰德之不修學之不講聞義不能徙不善不能改是吾憂也尹氏曰德必修而後成學必講而後明見善能徙改過不吝此四者日新之要也茍未能之聖人猶憂况學者乎輔氏曰能如是則一日有一日之功故尹氏以為日新之要子之燕居申申如也夭夭如也燕居閒暇無事之時楊氏曰申申其容舒也夭夭其色愈也輔氏曰燕居閒暇無事之時故其容儀得以遂其舒緩而無迫遽之意其顔色得以全其愈怡而無勃如之變申申夭夭聖人燕居容色自然之符也胡氏曰申有展布之意夭有和悅之意惟一身可以言舒布故知以容言惟顔貌可以言愈悅故知以色言程子曰此弟子善形容聖人處也為申申字說不盡故更著夭夭字今人燕居之時不怠惰放肆必太嚴厲嚴厲時著此四字不得怠惰放肆時亦著此四字不得唯聖人便自有中和之氣胡氏曰程子以怠惰放肆對嚴厲而言於嚴厲之上特加太字蓋嚴厲亦不可無若太嚴厲則不可耳蔡氏曰申申夭夭此聖人得於天自然中和之氣象也若學者於燕居私處之際有心於舒泰則易入於放肆有心於收束則易入於矜持將若何而用工邪聞之師云亦須稍嚴厲方可不然則無下手處矣蓋收斂身心則自然和樂然亦非别有一箇和樂也能整肅則自然和樂子曰甚矣吾衰也久矣吾不復夢見周公復扶又反孔子盛時志欲行周公之道而夢寐之間如或見之至其老而不能也則無復是心而亦無復是夢矣輔氏曰此一句斷制得極分明故因此而自嘆其衰之甚也程子曰孔子盛時寤寐常存行周公之道及其老也則志慮衰而不可以有為矣蓋存道者心無老少之異而行道者身老則衰也語録曰問孔子寤寐常存行周公之道恐涉於心動否曰心是箇動物怎生交他不動得夜之夢猶晝之思也思亦是心動處但無邪思可矣夢得其正何害心存這事便夢這事常人便胡亂夢子曰志於道志者心之所之之謂道則人倫日用之間所當行者是也語録曰道是君臣父子夫婦兄弟之道又曰道是日用常行合做底愚謂道者古今人物所共由之路也日用二字已足以該之矣又曰人倫者舉其重而先之也知此而心必之焉則所適者正而無他岐之惑矣語録曰這須知是箇生死路頭這一邊是死路那一邊去是生路這去便善那去便惡知得此路是了只管向此路去念念不忘處已也在是接人也在是講論也在是思索也在是胡氏曰謂之知此者不先知之則所志未必不差也又曰道猶路也故適字岐字皆以路言據於德據者執守之意或問據之說曰既已得之而謹守不失者據也德者得也得其道於心而不失之謂也語録曰德是自家心下得這箇道理如欲為忠而得其所以為忠如欲為孝而得其所以為孝愚謂德字之訓為政篇云得於心而不失是統釋德字此云得其道於心而不失是從志道上來得之於心而守之不失則終始惟一而有日新之功矣語録曰德者得之於心然既得之守不定亦㑹失了須當照管不要失了輔氏曰若為父子而得乎仁則謹守乎仁為君臣而得乎義則謹守乎義得寸守寸得尺守尺不始鋭而終怠不或作而或輟執而據之無少間斷則將隨其所得而篤實輝光日進於又新之域矣胡氏曰言得復言不失所以見其得之固依於仁依者不違之謂語録曰如依乎中庸之依相依而不捨之意黃氏曰依者隨之而不離仁則私欲盡去而心德之全也輔氏曰仁者本心之全德非有一毫人欲之私以雜之功夫至此而無終食之違則存養之熟無適而非天理之流行矣語録曰依於仁則是此心常在不令少有走作又曰依於仁則無物欲之纍而純乎天理道至此亦活德至此亦活游於藝游者玩物適情之謂語録曰游者從容潛玩之意胡氏曰玩物本非美辭然以六藝為物而玩之非喪志之物也藝則禮樂之文射御書數之法皆至理所寓而日用之不可闕者也或問六藝之目曰五禮吉凶軍賓嘉也六樂雲門大咸大韶大夏大濩大武也五射白矢參連剡注襄尺井儀也五馭鳴和鸞逐水曲過君表舞交衢逐禽左也六書象形㑹意指事轉注假借諧聲也九數方田粟米差分少廣商功均輸方程羸不足旁要也是其名物度數皆有至理存焉又皆人所日用而不可無者胡氏曰藝亦日用之不可無者乃是理之妙散於日用茍有未通亦可以為全體之纍愚謂凡登降上下聲音節奏皆有自然之準則移易不得即是至理之所寓朝夕游焉以博其義理之趣則應務有餘而心亦無所放矣語録曰游乎此則心無所放而日用之間本末具舉而內外交相養矣此章言人之為學當如是也蓋學莫先於立志志道則心存於正而不他據德則道得於心而不失依仁則德性常用而物欲不行游藝則小物不遺而動息有養輔氏曰德性常用而物欲不行者天理人欲不兩勝一盛則一衰也小物不遺而動息有養者不外物以求理而常玩物之理以養性也學者於此有以不失其先後之序輕重之倫焉則本末兼該內外交養日用之間無少間隙而涵泳從容忽不自知其入於聖賢之域矣輔氏曰先後之序謂道德仁藝之序輕重之倫謂志據依游之倫先者重而後者輕也本與內謂道德仁末與外謂藝在彼之序雖有先後在我之倫雖有重輕而未嘗偏廢所謂兼該而交養也日用之間如是用功無少間隙涵泳從容於義理事物之間則將優游饜飫而忽不知其入於聖賢之域矣陳氏曰初學須循四者之序而不可亂到成德後日用間四通八達穿穴玲瓏方有更相為用處胡氏曰總而論之道德仁所當先者也藝可以少後焉志據依所當重者也游可以少輕焉務本而不廢其末事內而不忽乎外以其輕重先後之倫序而言固不無差别以其本末兼該內外交養而言則又未嘗不相資也問古者八嵗即教以六藝之事明為學之所當先也今於此章末言之而朱子復以為學者於此當求其先後之序輕重之倫似以藝為可後永嘉陳氏曰教之六藝小學之初事游於藝成德之餘功小學之初習其文成德之游適於意生熟滋味逈别子曰自行束修以上吾未嘗無誨焉修脯也十脡為束古者相見必執贄以為禮束修其至薄者胡氏曰周官膳夫凡祭祝之致福者受而膳之以贄見者亦如之賤之事貴少之事長當有以奉之也然在禮無以束修為贄惟記檀弓曰束修之問不出境少儀曰其以乘壺酒束修一犬春秋穀梁傳曰束修之肉不行竟中則是亦有以此為禮不但婦人用棗修矣然比羔鴈雉雞為薄故云至薄也蓋人之有生同具此理故聖人之於人無不欲其入於善但不知來學則無往教之禮故茍以禮來則無不有以教之也輔氏曰聖人之教雖不輕棄人亦不茍受人仁義並行而不相悖也但聖人之心其愛人也終無窮已而其責人也終不至於太甚爾胡氏曰人之有生同具此理雖氣稟物欲之纍而趨於惡然皆可反而之善聖人仁天下之心曷嘗不欲啓其為善之塗哉惟自暴自棄在聖人亦無如之何故有不往教之禮執贄而來禮雖至薄意則可取故未嘗不教之也子曰不憤不啓不悱不發舉一隅不以二隅反則不復也憤房粉反悱芳匪反復扶又反憤者心求通而未得之意輔氏曰心求通而未得通則其意憤然而不能自己憤者有鬱悶之意悱者口欲言而未能之貌輔氏曰口欲言而未能言則其貌悱悱然而不能自伸悱者屈抑之貌啓謂開其意發謂達其辭物之有四隅者舉一可知其三反者還以相證之義或問還以相證曰如易所謂原始反終者也復再告也上章已言聖人誨人不倦之意因并記此欲學者勉於用力以為受教之地也程子曰憤悱誠意之見於色辭者也待其誠至而後告之又必待其自得乃復告爾語録曰憤悱便是誠意到不憤悱便是誠不到又曰不待憤悱而發則知之不能堅固待其憤悱而後發則沛然矣輔氏曰不待其憤悱而發則是彊聒之政使其有所知亦必不能深切而堅固待其憤悱而發則如水之流壅閼於此有以決之則沛然而往莫之能禦矣此沛然與孟子躍如二字相似此謂學者因有所決而進彼謂學者因有所覺而躍非受教於人而身履其事施教於人而親收其效者不能言此也子食於有喪者之側未嘗飽也臨喪哀不能甘也語録曰有食不下咽之意子於是曰哭則不歌哭謂弔哭一日之內餘哀未忘自不能歌也謝氏曰學者於此二者可見聖人情性之正也能識聖人之情性然後可以學道輔氏曰二者在聖人分上皆自然而然不知其所以然此所以為情性之正聖人之情性莫非道也故識之者可以學道愚謂情之正者發於本然之性情之不正者發於氣質之性子謂顔淵曰用之則行舍之則藏惟我與爾有是夫舍上聲夫音扶尹氏曰用舍無與於己行藏安於所遇命不足道也顔子幾於聖人故亦能之語録曰用舍是由在别人不由得我行藏是由在那人用舍亦不由得我又曰常人用之則行乃所願舍之則藏非所欲舍之則藏是自家命恁地不得已不奈何聖人無不得已底意思聖人用我便行舍我便藏無不奈何底意思何消更得言命又曰只看義理如何都不問那命了雖使前靣做得去若義去不得也只不做所謂殺一不辜行一不義而得天下有所不為若中人之情則見前靣做得他定不肯已所謂不得已而安之若命者也此固賢於世之貪冒無恥者矣然實未能無求之之心也聖人更不問命只看義如何貧富貴賤惟義所在所謂安於所遇也如顔子之安於陋巷他那曽計較命如何輔氏曰用舍在時何與於已行藏無必安於所遇道合則從不合則去樂則行之憂則違之在我而已不必言命也顔子龍德而隱幾於聖人故亦能之胡氏曰用舍無與於己在人者不必過而問也行藏安於所遇在我者未嘗不自得也命不足道者中人以上以義處命中人以下以命處義命處義者未免有不得已之意義處命則義所可為然後為之子路曰子行三軍則誰與萬二千五百人為軍大國三軍子路見孔子獨美顔淵自負其勇意夫子若行三軍必與已同輔氏曰此便是子路學未到處大凡人有才能而學問之功未到義理之趣未深則遇事必發見便有較量人已矜眩所長之意胡氏曰子路有勇不能自遏故有是問是舍之而不知藏者也子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也馮皮冰反好去聲暴虎徒搏馮河徒涉黃氏曰暴固徒搏馮固徒涉然所謂暴與馮者皆有慢侮欺陵之意懼謂敬其事成謂成其謀輔氏曰敬其事則無忽心無惰氣如此則凡事必能有所戒懼非謂怯弱而恐懼也成其謀則不妄動不亟取如此則凡事必有一定之謀既成而不愆於素自無僥幸速成之弊也言此皆以抑其勇而教之然行師之要實不外此子路蓋不知也輔氏曰行三軍固不可以無勇然子路之勇猶未離乎血氣也若夫臨事而能有所戒懼好謀而能必要其成其深沉厚重之意蓋義理之所為所謂大勇也故為行師之要夫子言此以抑子路血氣之勇而教之義理之勇子路初年於此蓋有所未知也若夫子云我戰必克亦不過敬其事而成其謀耳謝氏曰聖人於行藏之間無意無必其行非貪位其藏非獨善也若有欲心則不用而求行舍之而不藏矣是以惟顔子為可以與於此子路雖非有欲心者然未能無固必也至以行三軍為問則其論益卑矣夫子之言蓋因其失而救之夫不謀無成不懼必敗小事尚然而况於行三軍乎黃氏曰用之舍之存乎人則行則藏應乎已則無意無我可見矣用之行矣至舍之則藏舍之藏矣至用之則行則無必無固可見矣謝氏引無意無必者得之惜乎其文之不具也又以非有欲心者言之則非所以言孔顔也輔氏曰聖人行非貪位義所當行也藏非獨曽義所當止也無適無莫義之與比而天與命有不能違也一有欲心則更違於義才違於義則便以人咈天不用則必欲求行舍之則不肯退藏子路之病正如此也故惟顔子而後可以與於此子路雖非有欲心然未能無固必便是欲固必是欲之細微處子路資稟之髙又已受教於夫子則其於欲之大者固無之矣至於細微處則猶有所不能免故不知不覺發出行三軍之問夫學者於行軍之外有多少合進修處今遽及此故以為其論益卑然却不是聖人不屑為行軍之事觀其所謂臨事而懼好謀而成則行軍之事聖人固非不屑為也但子路之勇雖使之行三軍未保其能必濟也故不惟有以抑之又以是教之子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好好去聲執鞭賤者之事胡氏曰執鞭之士周禮秋官條狼氏以下士為之王出入則趨走而辟去道路行者自王公以下至子男皆有職是者焉所以謂之賤役太史公謂假令晏子尚在願為之執鞕者本此也設言富若可求則雖身為賤役以求之亦所不辭然有命焉非求之可得也則安於義理而已矣何必徒取辱哉蘇氏曰聖人未嘗有意於求富也豈問其可不可哉為此語者特以明其決不可求爾楊氏曰君子非惡富貴而不求以其在天無可求之道也輔氏曰蘇氏發得此章語脉分明楊氏又說得聖賢所以不求富貴之理確實二說相須其義始備子之所慎齊戰疾齊側皆反齊之為言齊也將祭而齊其思慮之不齊者以交於神明也誠之至與不至神之饗與不饗皆決於此輔氏曰齊謂一也二三則不齊矣思慮一則誠之至而神饗之思慮二三則誠不至而神亦不饗之矣故鬼神之德誠而已故有其誠則有其神無其誠則無其神也戰則衆之死生國之存亡繫焉疾又吾身之所以死生存亡者皆不可以不謹也輔氏曰戰與疾皆危殆之事雖有小大親疏之殊然其為利害則同也故皆不可以不謹尹氏曰夫子無所不謹弟子記其大者耳輔氏曰聖人之心不待操而常存者豈容有不謹之時不謹之事哉特於此三事謹之又謹故弟子記之以垂教後世子在齊聞韶三月不知肉味曰不圖為樂之至於斯也史記三月上有學之二字不知肉味蓋心一於是而不及乎他也輔氏曰凡人至誠做一事猶有耳無所聞目無所見者况聖人之誠則心一於是而口不知味亦宜也曰不意舜之作樂至於如此之美則有以極其情文之備而不覺其歎息之深也蓋非聖人不足以及此輔氏曰聲謂文也情謂實也夫子之學韶樂非但有以極其聲容節奏而已併當與大舜無不懤載之德當時雍熙平成之治所謂盡善盡美之實而得之不翅如身有其事親歷其時也則其誠感之深而見於歎息者如此誠非聖人不足以及是固非常情之所能測也范氏曰韶盡美又盡善樂之無以加此也故學之三月不知肉味而歎美之如此誠之至感之深也冉有曰夫子為衛君乎子貢曰諾吾將問之為去聲為猶助也衛君出公輒也靈公逐其世子蒯聵公薨而國人立蒯聵之子輒於是晉納蒯聵而輒拒之時孔子居衛衛人以蒯聵得罪於父而輒嫡孫當立故冉有疑而問之輔氏曰世俗知其一不知其二見其一節之或得而於其大義之乖則不之察也蒯聵固得罪於父矣而以輒言之則子獨可以拒父乎輒嫡孫固在所當立矣然上不稟於天王下不受命於君父又豈可以擅有其國乎是故為國家者不可無君子之論而世俗之說未可遽為信也諾應辭也入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷叔齊孤竹君之二子其父將死遺命立叔齊父卒叔齊遜伯夷伯夷曰父命也遂逃去叔齊亦不立而逃之國人立其中子其後武王伐紂夷齊扣馬而諫武王滅商夷齊耻食周粟去隱於首陽山遂餓而死怨猶悔也君子居是邦不非其大夫况其君乎故子貢不斥衛君而以夷齊為問夫子告之如此則其不為衛君可知矣蓋伯夷以父命為尊叔齊以天倫為重文集曰問伯夷何以只知有父命而不知有天倫叔齊何以只知有天倫而不知有父命恐在伯夷則其兄弟繫於己而父命繫於公以二者權之則父命為尊而兄弟為卑在叔齊則其父子繫於己而天倫繫於公以二者權之則天倫為重而父子為輕否曰以天下之公義裁之則天倫重而父命輕以人子之分言之則又不可分輕重但各認取自家不利便處退一步便是伯夷叔齊得之矣其遜國也皆求所以合乎天理之正而即乎人心之安既而各得其志焉則視棄其國猶敝屣爾何怨之有輔氏曰必合乎天理之正然後可以得吾心之安此即伯夷之所求所得也理得而心安則外物之去來何與於我豈復有所怨悔哉若衛輒之據國拒父而唯恐失之其不可同年而語明矣語録曰一箇是父子爭國一箇是兄弟遜國此是則彼非可知程子曰伯夷叔齊遜國而逃諌伐而餓終無怨悔夫子以為賢故知其不與輒也胡氏曰程子兼諌伐而言所以驗其不悔之實子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲飯符晚反食音嗣枕去聲樂音洛飯食之也疏食粗飯也聖人之心渾然天理雖處困極而樂亦無不在焉語録曰聖人表裏精粗無不昭徹其形骸雖是人其實只是一團天理如何不快活其視不義之富貴如浮雲之無有漠然無所動於其中也程子曰非樂疏食飲水也雖疏食飲水不能改其樂也不義之富貴視之輕如浮雲然又曰須知所樂者何事語録曰問程子之說似無甚異於論顔子者集注載之何邪曰孔顔之樂亦不必分不改是從這頭說入來在其中是從那頭說出來陳氏曰樂在其中與不改其樂誠有間但程子於此却用不改字主意全别其添一能字而又繫之疏食飲水之下者是雖疏食飲水亦不能改聖人之樂便見本然渾然之樂元不曽動比之顔子不改繫之回也之下是回不為簞瓢陋巷所改語意輕重自不同矣又曰若欲知樂之實味須到萬理明徹私欲淨盡後胸中灑然無纎亳窒礙而無入不自得處方庶幾其有以得之矣子曰加我數年五十以學易可以無大過矣劉聘君見元城劉忠定公名安世大名人自言嘗讀他論加作假五十作卒蓋加假聲相近而誤讀卒與五十字相似而誤分也愚案此章之言史記作假我數年若是我於易則彬彬矣加正作假而無五十字蓋是時孔子年已幾七十矣五十字誤無疑也語録曰問集注舉史記云孔子年已及七十欲贊易故發此語少年不學易到老方學易乎曰作彖象文言以為十翼不是方讀易也學易則明乎吉凶消長之理胡氏曰吉凶消長以卦體言真氏曰以陰陽對而言之則陽為善為吉陰為惡為凶獨言陽則陽亦有吉有凶蓋陽得中則吉不中則凶陰亦有吉有凶陰得中則吉不中則凶又曰陽長則陰消自十一月為復一陽生則一陰消至四月成六陽為乾則六陰盡消陰長則陽消自五月為姤一陰生而一陽消至十月成六陰為坤而六陽盡消一消一長天之道也進退存亡之道胡氏曰進退存亡以人事言真氏曰以天道言則為消息盈虗以人事言則為存亡進退蓋消則虗長則盈如日中則昃月盈則虧暑極則寒寒極則暑此天道所不能已也人能體此則當進而進當退而退當存而存當亡而亡如此則人道得而與天合矣故可以無大過語録曰所謂大過如當潛而不潛當見而不見當飛而不飛皆是過蓋聖人深見易道之無窮而言此以教人使知其不可不學而又不可以易而學也輔氏曰易道無窮皆自然而然非年髙德邵心與理叶默識神㑹未易學也不然者必失之鑿而人之處世履於憂患之塗又不可以不學易故抑揚其辭以垂教如此學者案乎二者之間則知易固不可不學且以夫子之德與年而尚欲假之以數年則又見其不可以輕易而學耳胡氏曰教人以不可不學者欲人知聖人至老而猶學也不可以易而學者欲人知聖人雖老而猶欲卒學也子所雅言詩書執禮皆雅言也雅常也執守也詩以理情性書以道政事禮以謹節文皆切於日用之實故常言之輔氏曰詩所以吟咏情性故誦之者可以理情性理猶治也書所以紀載政事故誦之者可以道政事道猶述也禮所以著天理之節文故執之者可以謹節文謹謂毫釐有所必計也情性在內者政事節文在外者政事節文雖在外而又有廣狹之殊然皆切於日用之實故夫子常言之禮獨言執者以人所執守而言非徒誦說而已也輔氏曰詩書須假誦讀然後能知其義而達諸用禮則全在人執守而行之故禮獨言執也然詩書始雖假於誦讀然終亦必須見於所行禮固在於執守而行之然始亦不可不講讀之也程子曰孔子雅素之言止於如此若性與天道則有不可得而聞者要在默而識之也輔氏曰聖人教人莫非日用常行之事每即事以明理不泥理而遺事言雖近而指則逺務使學者力加踐履以自得其味其於性與天道未數數然也故學者有所不得閒要在默而識之者謂不言而自得之也謝氏曰此因學易之語而類記之葉公問孔子於子路子路不對葉舒涉反葉公楚葉縣尹沈諸梁字子髙僭稱公也輔氏曰楚君僭稱王縣尹僭稱公葉公不知孔子必有非所問而問者故子路不對抑亦以聖人之德實有未易名言者與輔氏曰此是兩說一以葉公之智不足以知夫子其所問者或有乖謬故子路不答一以夫子之德實有未易名言者故子路不敢答雖是兩說其意皆所以尊夫子也子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾未得則發憤而忘食已得則樂之而忘憂以是二者俯焉日有孳孳而不知年數之不足文集曰問發憤忘食是始者著力去求之時樂以忘憂是後來有得而安之時二者先後自不同而氣象亦自不相並集注意是二者齊著力到老如何曰忘食忘憂是逐事上說一憤一樂循環代至非謂終身只此一憤一樂也逐事上說故可遂言不知老之將至而為聖人之謙辭若作終身說則憤短樂長不可并連下句而亦不見聖人自貶之意矣語録曰聖人未必有未得之事且如此說設有未得便發憤做將去輔氏曰俯焉謂刺著頭了做向前去逐日孳孳然更無少息時亦不計年數之短長但一息尚存此志不容少懈直至斃而後已豈復計夫老之將至哉聖猶如此况學者乎一息間斷則便成自棄也但自言其好學之篤耳然深味之則見其全體至極純亦不已之妙有非聖人不能及者輔氏曰全體至極言始終無虧也純亦不已言至誠不息也此其所以為妙而非聖人不能及也愚謂憤與樂相反如陰陽寒暑然聖人發憤至忘食樂至忘憂是兩邊各盡其極如寒到寒之極處暑到暑之極處故曰全體至極兩者循環不已所以不知老之將至此是聖人之心純乎天理别無他嗜好故曰純亦不已蓋凡夫子之自言類如此學者宜致思焉輔氏曰凡聖人之自言非是嫌其不遜慮其或過而固為是謙抑之辭也德盛仁熟肆口而言愈近愈下而其意味愈深愈長故凡夫子之自言類如此而學者所當深思其所以然而詳玩其義理之實也子曰我非生而知之者好古敏以求之者也好去聲生而知之者氣質清明義理昭著不待學而知也輔氏曰聖人稟得天地五行之氣清明純粹故能全得天地五行之理自然昭著不待學而後知故謂之生知也敏速也謂汲汲也尹氏曰孔子以生知之聖每云好學者非惟勉人也蓋生而可知者義理爾若夫禮樂名物古今事變亦必待學而後有以驗其實也語録曰聖人雖是生知然也事事理㑹過這道理不是只就一件事上理㑹見得便了學時要無所不學輔氏曰孔子以生知之聖每云好學者諸家多以為勉人之辭故尹氏辨之以為生而可知者自然昭著之義理耳若夫禮樂名物古今事變亦必待學而後有以驗其實也又曰好古敏求非生知者不能既知其義理則自然敏於學以驗其實也故生而知之者義理也好古敏求者事實也理與事一貫知與行相資子不語怪力亂神怪異勇力悖亂之事非理之正固聖人所不語鬼神造化之迹雖非不正然非窮理之至有未易明者故亦不輕以語人也輔氏曰怪異非常也勇力非德也悖亂非治也三者皆非正理而聖人之心廣大光明隱惡揚善自然不語及此至於鬼神雖非不正然乃造化之迹二氣之良能其理幽深非格物知至者而驟以語之則反滋其惑故亦不輕以語人然能知所以為人則知所以為鬼神矣謝氏曰聖人語常而不語怪語德而不語力語治而不語亂語人而不語神子曰三人行必有我師焉擇其善者而從之其不善者而改之三人同行其一我也彼二人者一善一惡則我從其善而改其惡焉是二人者皆我師也語録曰人若以自修為心則舉天下萬物凡有感乎前者無非足以發吾義理之正善者固可師不善者這裏便恐懼修省恐落在裏靣去是皆師也尹氏曰見賢思齊見不賢而內自省則善惡皆我之師進善其有窮乎子曰天生德於豫桓魋其如豫何魋徒雷反桓魋宋司馬向魋也出於桓公故又稱桓氏魋欲害孔子孔子言天既賦我以如是之德則桓魋其奈我何言必不能違天害己或問孔子何以知天之生德於己曰天之生我而使之氣質清明義理昭著則是天生德於我矣豈其不自知哉語録曰天生德於聖人桓魋如何害得故知其不能違天害己也問聖人見其事勢不可害己還以理度其不能害邪曰若以勢論則害聖人甚易唯聖人自知其理有終不能害者子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也諸弟子以夫子之道髙深不可幾及故疑其有隱輔氏曰程子以夫子之道為髙逺而集注易之以髙深言髙則見其不可企及言深則見其不可窺測言逺則恐人求之於逺而不切於人倫日用之實故以深易逺也而不知聖人作止語默無非教也故夫子以此言曉之與猶示也程子曰聖人之道猶天然門弟子親炙而冀及之然後知其髙且逺也使誠以為不可及則趨向之心不幾於怠乎故聖人之教常俯而就之如此非獨使資質庸下者勉思企及而才氣髙邁者亦不敢躐易而進也輔氏曰聖人之道如天然者止以其髙逺而不可及言之乎曰非但以其髙逺也蓋言其至誠無息自然體用一源顯微無間如天之不言而四時自爾行百物自爾生耳固非勉力用意者之可到也又曰聖人之道固如天矣然自不知學者而觀之則天自天聖自聖我自我道自道判然不相連又曰惟夫二三子親炙而冀及之盡其力竭其才以求焉然後有知夫仰之彌髙窮之益逺既以為不可及故疑其有隱也然其所謂道亦非虛無冥漠之謂不過人倫日用所當行者耳但聖人由之則從容而中無適不然而真有如天之實耳又曰使學者求之而力盡才竭自以為不可及則懈怠之意乘之而趨向之心息矣故聖人之道雖曰如天之不可及而其教人則每每俯而就之又曰人之才品不同固自有髙下然以為學論之則資質庸下者多失之不及易得懈怠而止才氣髙邁者多失之過易得陵躐而進懈怠而止者固無可望矣陵躐而進者亦惡保其能終乎懈怠而止者病在苦其難陵躐而進者病在忽其易今夫子自以為無隱且曰吾無行而不與二三子則資質庸下者不至病其難而必有以發其勉思企及之志才髙氣邁者不敢忽其易而必有以致其謹重密察之功在我者一施之在彼者各以其資質髙下而有益焉此又聖道如天之一證也陳氏曰如性與天道是深隱髙逺處日用人事是淺近卑顯處然深隱髙逺之理實流行乎淺近卑顯之中而淺近卑顯之事實根原於深隱髙逺之處其分不同而其理則一而已由其理之一所以夫子無行而不與二三子作止語默無非教也由其分之殊故學者當循序而漸進不可躐等而頓造也吕氏曰聖人體道無隱與天象昭然莫非至教常以示人而人自不察輔氏曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也聖人體道無隱作止語默亦無非教也但人自不察耳子以四教文行忠信行去聲程子曰教人以學文修行而存忠信也忠信本也語録曰文便是窮理豈可不見於行然既行矣又恐行之未有誠實故又教之以忠信所以程子言以忠信為本蓋非忠信則所行不成耳陳氏曰須知學文所以窮理修行所以體是理於身而存忠信又所以萃是理於心者也子曰聖人吾不得而見之矣得見君子者斯可矣聖人神明不測之號陳氏曰聖與神無甚分别合而言之只一套事分而言之神只是聖之不可知非於聖人之上又别有一等神人也所謂神明不測者自其底藴言之則淵而不可測自其施為言之則妙而不可測不可以偏看也君子才德出衆之名語録曰有德而有才方見於用如有德而無才則不能為用亦何足為君子子曰善人吾不得而見之矣得見有恆者斯可矣恆胡登反子曰字疑衍文輔氏曰此只是一章不應重出子曰字故疑其為衍文也恆常久之名輔氏曰訓恆為常為久皆未盡蓋兼有常久之意也張子曰有常者不二其心輔氏曰人之所以無常者以其有二心故也心一於是則能有常矣善人者志於仁而無惡語録曰善人是資質自好底人要做好事而自然無惡者也亡而為有虛而為盈約而為泰難乎有恆矣亡讀為無三者皆虛夸之事凡若此者必不能守其常也語録曰正謂此皆虛夸之事不可以久是以不能常非謂此便是無常也又曰此三病皆受於無常之前黃氏曰亡為有虛為實約為泰三者夸大欺妄之意不實之謂也人惟實也則始終如一故能有常今其人不實如此又豈敢望其有常哉張敬夫曰聖人君子以學言善人有恆者以質言輔氏曰學至於聖人則造乎極而無以復加矣君子雖未及乎聖人然其才德超出於衆則其為學亦已成矣善人雖未必知學然其資質之美自然志於善而不志於惡至於有恆者則資質又不及善人但亦純固而不務虛夸守其一端則終身不易者也愚謂有恆者之與聖人髙下固懸絶矣然未有不自有恆而能至於聖者也故章未申言有恆之義輔氏曰有恆者無二心有特操雖視聖人等級髙下為懸絶然未有不自有恆而能至於聖者故夫子於章末申言無恆者之虛夸以見有恆者之篤實其示人入德之門可謂深切而著明矣子釣而不綱弋不射宿射食亦反綱以大繩屬網絶流而漁者也弋以生絲繫矢而射也宿宿鳥洪氏曰孔子少貧賤為養與祭或不得已而釣弋如獵較是也然盡物取之出其不意亦不為也此可見仁人之本心矣待物如此待人可知小者如此大者可知輔氏曰洪氏之說於事實義理備盡無餘矣但常人之情漁者必有求多之意弋者必有幸中之心然聖人之事止於如此則可見其從心不踰矩之一端矣不曰聖人之心而曰仁人之本心者據此事只可謂之仁然曰本心則雖聖人亦不能加毫末於此矣子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也識音志不知而作不知其理而妄作也輔氏曰作為也一事必有一理為其事而不循其理則是妄作也孔子自言未嘗妄作蓋亦謙辭然亦可見其無所不知也輔氏曰夫子言此雖是謙辭然於無所不通之聖自有不可掩者識記也所從不可不擇記則善惡皆當存之以備參考如此者雖未能實知其理亦可以次於知之者也互鄉難與言童子見門人惑見賢遍反互鄉鄉名其人習於不善難與言善惑者疑夫子不當見之也子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也疑此章有錯簡人潔至往也十四字當在與其進也之前潔修治也與許也往前日也言人潔已而來但許其能自潔耳固不能保其前日所為之善惡也但許其進而來見耳非許其既退而為不善也蓋不追其既往不逆其將來以是心至斯受之耳唯字上下疑又有闕文大扺亦不為已甚之意輔氏曰以往為往前之事然後見聖人不追其既往不逆其將來之意末乃以不為已甚結之然唯何甚一句亦不明白故又疑上下必有闕文愚謂人前日不善而今日向善未可知今日向善後日又為不善亦未可知若追其既往又逆其方來則已甚矣故夫子云然程子曰聖人待物之洪如此子曰仁逺乎哉我欲仁斯仁至矣仁者心之德非在外也放而不求故有以為逺者反而求之則即此而在矣夫豈逺哉輔氏曰仁者心之德我固有之非在外也如手之執足之履目之視耳之聽不假外求欲之則至何逺之有而人不知反求而病其逺此夫子所以發此論也蔡氏曰仁者心之德才一收斂則此心便在程子曰為仁由己欲之則至何逺之有輔氏曰程子最得其文意之曲折讀之者自當有所發明陳司敗問昭公知禮乎孔子曰知禮陳國名司敗官名即司寇也胡氏曰左氏傳注陳楚名司寇為司敗昭公魯君名稠習於威儀之節當時以為知禮故司敗以為問而孔子答之如此孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮取七柱反巫馬姓期字孔子弟子名施魯人司敗揖而進之也相助匿非曰黨禮不娶同姓而魯與吳皆姬姓謂之吳孟子者諱之使若宋女子姓者然輔氏曰婦人稱姓周女曰姬宋女曰子齊女曰姜楚女曰芉是也巫馬期以告子曰丘也幸茍有過人必知之孔子不可自謂諱君之惡又不可以娶同姓為知禮故受以為過而不辭輔氏曰自言諱君之惡又不可以娶同姓為知禮則又顚倒是非而有害於義理也吳氏曰魯蓋夫子父母之國昭公魯之先君也司敗又未嘗顯言其事而遽以知禮為問其對之宜如此也及司敗以為有黨而夫子受以為過蓋夫子之盛德無所不可也然其受以為過也亦不正言其所以過初若不知孟子之事者可以為萬世之法矣輔氏曰世之褊心狹量雖一身無非過惡然人一以過歸之則拂然固拒而不受惟聖人之盛德無所不可故受以為過而不辭也又曰聖人本無過也而其所以過者為君諱也若正言之則卒成彰君之惡矣故只曰丘也幸茍有過人必知之初若不知孟子之事者其誠意懇惻從容中道盡已而不責人之心真可以為萬世之法矣且以有過而人知為幸又以垂教以警夫護疾而忌醫者陳氏曰吳氏之說甚精甚密最發得聖人盛德之言隨觸而應自然從容中節而不失乎人情事理之宜真可為萬世法矣子與人歌而善必使反之而後和之和去聲反復也必使復歌者欲得其詳而取其善也而後和之者喜得其詳而與其善也輔氏曰詳謂首尾節奏之備也取其善者取人之善也與其善者與人為善也此兩句已說盡孔子當時之意此見聖人氣象從容誠意懇至而其謙遜審密不掩人善又如此或問謙遜審密不掩人善曰聖人天縱多能其於小藝不待取於人而後足而必欲得其詳如此其謙遜審密可知也然若不俟其曲終而遽和之則亦幾於伐己之能以掩彼之善矣故必俟其曲終以盡見其首尾節奏之善然後使人復歌而始和之則既不失其與人為善之意而又不掩其善也然此亦聖人動容周旋自然中禮非有意於為之也抑又見其從容不迫不輕信而易悅之意語録曰他歌既善使他復歌聖人未遽和以攙雜之如今人見人說得一話好未待人了便將話來攙他底則是掩善輔氏曰自氣象從容以下乃集注推言事外之意也氣象從容則在我謙遜而無攙言勦人之事誠意懇至則臨事審密而無茍簡率略之為謙遜者禮之實審密者知之用不掩人善又仁者之心也胡氏曰氣象從容誠意懇至者歌而反反而和好善篤而取之不厭也謙遜者一藝之長領㑹不暇也審密者不輕聽易悅也不掩人善者不矜已而忽人也蓋一事之微而衆善之集有不可勝既者焉永嘉陳氏曰使復歌者既欲彰其善之實又欲暢其歌之情而後和之者示我樂善之無倦詠歎而淫泆之也只一歌詩耳而意思綢繆容與若此豈非衆善之集乎讀者宜詳味之子曰文莫吾猶人也躬行君子則吾未之有得莫疑辭語録曰猶今人云莫是如此否猶人言不能過人而向可以及人未之有得則全未有得皆自謙之詞而足以見言行之難易緩急欲人之勉其實也輔氏曰教人者務盡其辭多不謙下惟聖人則不然雖其言之謙下而教亦自行於中此所以為不可及也文雖不能過人而尚可及人則見文之在人不難為而不必於求工之意躬行君子全未有得則見行之在人有難為之實當勉而求之不可有半塗而廢之失且勉人以為其實而亦不廢其文但有先後緩急之序合而觀之又見其雖不遜其能而亦不失其謙一言之中指意反覆更出互見曲折淵永非聖人而能若是哉謝氏曰文雖聖人無不與人同故不遜能躬行君子斯可以入聖故不居猶言君子道者三我無能焉子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也此亦夫子之謙辭也聖者大而化之仁則心德之全而人道之備也輔氏曰德極其大而渣滓渾化泯然無復可見之迹斯謂之聖仁之一字偏言之則一事専言之則包義禮智信四者此對聖而言則是專言之也故以為心德之全人道之備胡氏曰心德內也人道外也全與備皆極至之謂也兼內外限量而極言之為之謂為仁聖之道誨人亦謂以此教人也語録曰他也不曽說是仁聖但為之畢竟是箇甚麼誨人畢竟是箇甚麼物事誨人這便知得是為之是為仁聖之道誨人是以仁聖之道誨人然不厭不倦非己有之則不能輔氏曰為之不厭者仁聖之實誨人不倦者仁聖之施非在己有仁聖之德豈能如是所以弟子不能學也朝氏曰當時有稱夫子聖且仁者以故夫子辭之茍辭之而已焉則無以進天下之材率天下之善將使聖與仁為虛器而人終莫能至矣故孔子雖不居仁聖而必以為之不厭誨人不倦自處也可謂云爾已矣者無他之辭也公西華仰而嘆之其亦深知夫子之意矣朝氏名說之清豐人輔氏曰朝氏於辭意尤更明備若非當時有稱夫子聖且仁者則夫子何為而自為謙辭如此哉既為謙辭而不居仁聖矣若非慮其所終而為勉進後世學者之計則又何為而復以為之不厭誨人不倦之說繼其後哉則可謂云爾已矣者極言其無復他說而使學者致其思也公西華便能仰而嘆曰正唯弟子不能學也蓋即其為之不厭誨人不倦二事而見夫子實全仁聖之德非學者所能企及也然則華之學識蓋亦亞於子夏矣子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾於上下神祇子曰丘之禱久矣誄力軌反禱謂禱於鬼神有諸問有此理否誄者哀死而述其行之詞也胡氏曰哀死者憂其或不可求也述其行者恐其行有未至也上下謂天地天曰神地曰祇文集曰只是引此古語以明有禱之理非謂欲禱於皇天后土也禱者悔過遷善以祈神之佑也或問此一節曰禱雖臣子之禮而其詞則固述其君父悔過遷善之詞以解謝鬼神之譴怒也無其理則不必禱既曰有之則聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣文集曰聖人固有不居其聖時節又有直截擔當無所推遜時節又士喪禮疾病行禱五祀蓋臣子迫切之至情有不能自己者初不請於病者而後禱也故孔子之於子路不直拒之而但告以無所事禱之意或問行禱五祀著於禮經今子路請之而夫子不從何也曰以理言之則聖人之言盡矣以事言之則禱者臣子至情迫切之所為非病者之所與聞也病而與聞乎禱則是不安其死而諂於鬼神以茍須臾之生君子豈為是哉曰然則聖人直以為無事於禱何也曰是蓋有難言者然以理言則既兼舉之矣蓋祈禱卜筮之屬皆聖人之所作至於夫子而後教人一決諸理而不屑於冥漠不可知之間其所以建立人極之功於是為備文集曰疾病行禱者臣子之於君父各禱於其所當祭士則五祀是也子路所欲禱必非淫祀但不當請耳故孔子不以為非而但言不必禱之意輔氏曰疾病而行禱乃臣子迫切之至情在周公猶為之然於周公則可武王則不可子路則可夫子則不可領子路之至情明在己之正理夫子之心即天地鬼神之心也子曰奢則不孫儉則固與其不孫也寧固孫去聲孫順也固陋也奢儉俱失中而奢之害大輔氏曰奢則不孫以犯上儉則固陋而已不孫之害其流無窮固之害止此而已朝氏曰不得已而救時之敝也輔氏曰道以中為至奢儉皆非理之中夫子此言出於不得已以救時奢靡之失耳子曰君子坦蕩蕩小人長戚戚坦平也蕩蕩寬廣貌程子曰君子循理故常舒泰小人役於物故多憂戚輔氏曰惟平故寬廣惟險故多憂天理常平人欲常險胡氏曰程子以循理役於物分言乃蕩蕩戚戚之所由生也理者本乎自然人能循其自然而行之則上下四旁不相侵越故坦然而平平則仰不愧俯不怍此所以舒泰也役於物者為物所役也求名者役於名求利者役於利凡意之所發不與理合者皆役於物也行險僥幸患得患失此所以憂戚也程子曰君子坦蕩蕩心廣體胖輔氏曰心廣體胖所以指言坦蕩蕩之氣象子溫而厲威而不猛恭而安厲嚴肅也人之德性本無不備而氣質所賦鮮有不偏輔氏曰德性指無極之真而言也理之在人固無所不備矣氣質指陰陽五行之氣而言也氣之在人則有厚薄昏明之異故鮮有不偏者惟聖人全體渾然陰陽合德故其中和之氣見於容貌之間者如此輔氏曰陰陽合德指氣而言中者性也和者氣也而曰中和之氣者併性與氣而言之陳氏曰自陽根陰而言則溫者陽之和厲者陰之嚴威者陽之震不猛者陰之順恭者陽之主安者陰之定自陰根陽而言則溫者陰之柔厲者陽之剛威者陰之慘不猛者陽之舒恭者陰之肅安者陽之健蓋渾然無適而非中和之極不可得而偏指也胡氏曰全體渾然者非一氣之偏也陰陽合德者兼乎二氣乃得中也愚謂全體渾然應上文德性而言陰陽合德應上文氣質而言所以言全體渾然於陰陽合德之上門人熟察而詳記之亦可見其用心之密矣輔氏曰用心不密則見其溫而不見其厲見其威而不見其不猛見其恭而不見其安抑非知足以知聖人而善言德行不能記故程子以為曽子之言學者所宜反復而玩味也泰伯第八凡二十一章子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉泰伯周大王之長子至德謂德之至極無以復加者也三讓謂固遜也無得而稱其遜隱微無迹可見也或問三讓之為固遜曰古人辭遜以三為節一辭為禮辭再辭為固辭三辭為終辭古注但言三遜而不解其目也今必求其事以實之則亦無所據矣曰何以言其遜於隱微之中也曰泰伯之遜無揖遜授受之跡人但見其逃去不反而已不知其遜者見其遜國而已而不知所以使文武有天下者實由於此則是以天下遜也曰其為至德何也曰遜之為德既美至於三則其遜誠矣以天下遜則其所遜大矣而又隱晦其迹使民無得而稱焉則其遜也非有為名之纍矣此其德所以為至極而不可以有加也蓋大王三子長泰伯次仲雍次季歷大王之時商道寖衰而周曰彊大季歷又生子昌有聖德大王因有翦商之志而泰伯不從語録曰問大王有翦商之志果如此否曰詩裏分明說實始翦商問恐詩是推本得天下之由如此曰若推本說不應下實始翦商又曰大王翦商自是他周人恁麼說若無此事他豈肯自誣其祖左氏分明說泰伯不從不知不從是不從甚麼事大王遂欲傳位季歷以及昌泰伯知之即與仲雍逃之荆蠻語録曰泰伯只見大王有翦商之志自是不合他意便掉了去問泰伯固足以遂其所志其如父子之情何曰到此却顧恤不得父子君臣一也大王見商政日衰知其不久是以有翦商之意亦至公之心也至於泰伯則惟君臣之義截然不可犯是以不從二者各行其心之所安聖人未嘗說一邊不是亦可見矣於是大王乃立季歷傳國至昌而三分天下有其二是為文王文王崩子發立遂克商而有天下是為武王夫以泰伯之德當商周之際固足以朝諸侯有天下矣乃棄不取而又泯其迹焉則其德之至極為何如哉文集曰至德有兩處一為文王而發對武王誓師而言一為泰伯而發對大王翦商而言若論其志則文王固髙於武王而泰伯所處又髙於文王若論其事則泰伯王季文王武王皆處聖人之不得已而泰伯為獨全其心表裏無憾也蓋其心即夷齊扣馬之心而事之難處有甚焉者語録曰夷齊處君臣間道不合則去泰伯處父子之際又不可露形迹只得不分不明且去某書謂大王有疾泰伯採藥不返疑此時去也宜夫子之歎息而贊美之也泰伯不從事見春秋傳子曰恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞葸絲里反絞古卯反葸畏懼貌絞急切也語録曰絞如繩兩頭絞得緊都不寬舒則有證父攘羊之事矣無禮則無節文故有四者之弊輔氏曰禮者天理之節文所以防其過而使之中也恭慎柔德也勇直剛德也四者雖皆美德然無禮以為之節文則過而為四者之弊故恭而無禮以節文之則巽在牀下故勞而不安謹而無禮以節文之則臨事懾怯故葸而多懼勇而無禮以節文之則尚氣任力而必至於作亂直而無禮以節文之則率情徑行而必至於絞訐惟有禮以為之節文則中焉止矣寧有弊哉君子篤於親則民興於仁故舊不遺則民不偷君子謂在上之人也愚謂前一節言在己之德而已後一節則其效下及於民故知君子在上之人也興起也偷薄也張子曰人道知所先後則恭不勞謹不葸勇不亂直不絞民化而德厚矣吳氏曰君子以下當自為一章乃曽子之言也愚案此一章與上文不相䝉而與首篇愼終追逺之意相類吳說近是胡氏曰張子通解為一章者以六句皆以則為轉語上四則字其弊也下二則字其效也弊亦效之不善者也謂人道知所先後者上四句以有禮為先也下二句以篤親不遺故舊為先也然析而觀之前四句反說後二句正說各為一類故吳氏疑為兩章又疑為曾子之言者固與慎終追逺之意同而下文五章亦皆曾子事或者以類相從也曽子有疾召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子夫音扶啓開也曽子平日以為身體受於父母不敢毁傷故於此使弟子開其衾而視之詩小旻之篇戰戰恐懼兢兢戒謹臨淵恐隊履冰恐陷也曽子以其所保之全示門人而言其所以保之之難如此至於將死而後知其得免於毁傷也語録曰曽子奉持遺體無時不戒謹恐懼直至啓手足之時方得自免又曰君子未死之前此心常恐小子門人也語畢而又呼之以致反復丁寧之意其警之也深矣程子曰君子曰終小人曰死君子保其身以沒為終其事也故曽子以全歸為免矣輔氏曰君子曰終小人曰死此檀弓所載子張將死之言也終者所以成其始之辭而死則澌盡無餘之義君子平日以保身為事故於將殁而以為終也如曽子所謂免者是也尹氏曰父母全而生之子全而歸之曽子臨終而啓手足為是故也非有得於道能如是乎輔氏曰父母全而生之子全而歸之此祭義所載曽子述孔子之言也今若此可謂非苟知之亦允蹈之矣曽子平日見道明信道篤故能始終不息如此非謂一旦有得於道便能超脫生死而不怛不怖如釋氏之說也范氏曰身體猶不可虧也况虧其行以辱其親乎輔氏曰范氏警切學者於德性上做工夫尤為切至胡氏曰范氏正恐學者但以曽子不虧其身而已則將有僥幸茍免之意故又特以不虧其行申言之所以厲中人也曽子有疾孟敬子問之孟敬子魯大夫仲孫氏名捷問之者問其疾也曽子言曰鳥之將死其鳴也哀人之將死其言也善言自言也胡氏曰禮自言曰言答述曰語鳥畏死故鳴哀人窮反本故言善輔氏曰人性本善凡為惡者役於氣動於欲而陷溺焉耳非其本性然也至於將死氣消矣欲息矣則反本而言善乃理之宜此曽子之謙辭欲敬子知其言之善而識之也君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存逺近並去聲貴猶重也陳氏曰此章主意最重在貴字上容貌舉一身而言暴粗厲也慢放肆也語録曰如人狠戾固是暴稍不溫恭亦是暴如人倨肆固是慢稍或怠緩亦是慢又曰粗不精細也信實也正顔色而近信則非色莊也文集曰此言持養久熟之功正其顔色即近於信蓋表裏如一非但色莊而已以上下兩句考之可見非謂正顔色即是近信也若非持養有素則正顔色而不近信者多矣語録曰信是信實色有色厲而內荏者色莊者色取仁而行違者茍不近實安能表裏如一乎問正是著力之辭否曰亦著力不得若不到近實處正其顔色但見作僞而已又曰這須是裏面正後顔色自恁地正方是近信辭言語氣聲氣也鄙凡陋也倍與背同謂背理也語録曰今人議論有見得雖無甚差錯只是淺近者此是鄙又有說得甚髙而實背於理者此是倍又曰鄙便是說一樣卑底說話倍是逆理籩竹豆豆木豆言道雖無所不在然君子所重者在此三事而已是皆修身之要為政之本學者所當操存省察而不可有造次顚沛之違者也文集曰修身之要為政之本二句最宜玩味但莊敬誠實涵養亦非動容貌正顔色出辭氣之外别有一假工夫只是就此持守著力至其積久純熟乃能有此效而不費力耳黃氏曰容貌顔色辭氣見於外者也欲正其外亦不過致謹於言動之間而已今集注以為操存省察則反用力於其內未有不正其內而能正其外者也况夫暴慢也信也鄙倍也皆心術之所形見者也不正其內安能使其外之無不正乎有諸中以形諸外制於外以養其中則心可正理可明敬可存誠可固修身之要孰有急於此者乎陳氏曰集注舊本以為修身之驗非莊敬誠實涵養有素者不能則平時涵養之說也今本以為修身之要學者所當操存省察而不可有造次顛沛之違則臨事持守之說也舊說雖有根源然却在三言之外起意其工夫全在目前而目下則疏濶任其自爾不若今工夫縝密親切既可以包平日涵養在內今臨事以至於將死一息未絶之前皆無有頃刻之違其所謂操存則在上三句所謂省察則在下三句本末不偏絡始兼貫其義為長若夫籩豆之事器數之末道之全體固無不該然其分則有司之守而非君子之所重矣語録曰籩豆之事雖亦道之所寓然自有人管了君子只修身而已又曰人於身已上事都不照管却只去理㑹那籩豆等小事便不得只這箇自有有司但責之有司便得若全不曉如何解任那有司若籩裏盛有汁底物事豆裏盛乾底物事自是不得也須著曉始得但所重者是上面三事耳程子曰動容貌舉一身而言也周旋中禮暴慢斯逺矣正顔色則不妄斯近信矣出辭氣正由中出斯逺鄙倍三者正身而不外求故曰籩豆之事則有司存語録曰明道之言簡約明白意旨深逺尹氏曰養於中則見於外曽子蓋以修已為為政之本若乃器用事物之細則有司存焉語録曰尹氏溫淳易直故有得於平日涵養之源曾子曰以能問於不能以多間於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣校計校也友馬氏以為顔淵是也胡氏曰今從之者非顔子不足以當之也顔子之心唯知義理之無窮不見物我之有間故能如此胡氏曰唯知義理之無窮者自修之念不已也故雖能而常若不能雖多而常若寡雖有且實而常若無若虛焉不見物我之有間者視人猶已也故人雖有侵犯於我在我不起計校之心焉謝氏曰不知有餘在我不足在人不必得為在已失為在人非幾於無我者不能也語録曰問顔子已是無我集注如何下幾字曰聖人全是無我顔子却但是不以我去壓人却尚是有箇人與我相對在聖人便和人我都無了輔氏曰不知有餘在己不足在人以理言也所以釋以能問於不能至實若虛四句也不必得為在己失為在人以事言也所以釋犯而不校一句也曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也與平聲其才可以輔幼君攝國政其節至於死生之際而不可奪可謂君子矣語録曰托六尺之孤謂輔幼主寄百里之命謂攝國政又曰託六尺之孤寄百里之命才者能之至於臨大節而不可奪則非有德者不能也又曰知霍光擁昭立宣可謂有才而其妻毒許后事不能制便不是臨大節不可奪又曰問此本是兼才節說然緊要處却在節操上曰不然三句都是一般說須是才節兼全方謂之君子若無其才是徒有其節雖死何益如受人託孤之責自家雖無欺之之心却被别人欺了也是自家不了事不能受人之託矣如受人百里之寄自家雖無竊之之心却被别人竊了也是自家不了事不能受人之寄矣自家徒能臨大節而不可奪却不能了得他事雖能死也只是箇枉死濟得甚事如晉之荀息是也所謂君子者豈是斂手並腳底村人既曰君子須是事事理㑹得方可若但有節而無才也喚做好人只是不濟得事耳輔氏曰才者德之用節者德之守而君子則成德之名也胡氏曰周禮疏云六尺年十五故知為幼君也孟子曰公侯皆方百里故知為國政也輔幼君攝國政言其可者度其能也故云才臨大事言其不可奪者論其操也故云節才者德之用節者德之守二者不可偏廢有其節無其才雖無欺人之心而未必足以託恐不免為他人所欺也雖無竊之之心而未足以寄恐不免為他人所竊也為人欺竊而徒死無益也荀息之徒是也有其才無其節則大者不足觀矣霍光奪於妻子之愛是也二者雖若並言而節為之本上二句皆云可以下一句乃所以承上文也謂既能為彼而又所守如此始決然可謂之君子與疑詞也決詞設為問答所以深著其必然也程子曰節操如是可謂君子矣愚謂集注既以才與節並言而復引程子節操之說蓋其重在節也曽子曰士不可以不𢎞毅任重而道逺𢎞寬廣也語録曰𢎞是寬廣耐事事事都著得道理也著得多人物也著得多若著得這一箇著不得那一箇便不是𢎞又曰𢎞雖是寬廣却被人只把做度量寬容看了便不得且如執德不𢎞便是此𢎞字謂如人有許多道理及至學來下梢却做得狹窄了便是不𢎞又曰若容民蓄衆底事也是𢎞便是外靣事而今人說𢎞字多做容字說了則這𢎞字裏靣無用工夫處又曰𢎞字只對隘字看便見得如看文字相似只執一說見衆說皆不復取便是不𢎞若是𢎞底人便包容衆說又非是於中無所可否包容之中又為判别此便是𢎞胡氏曰寬則容受之多廣則承載之闊也毅彊忍也語録曰毅是立腳處堅忍强厲擔負得去底意又曰毅是忍耐持守著力去做又曰毅却是發處勇猛行得來彊忍胡氏曰彊則執持之堅忍則負荷之久也非𢎞不能勝其重非毅無以致其逺語録曰𢎞乃能勝得箇重任毅便是能擔得逺去𢎞而不毅雖勝得重任却恐去前靣倒了輔氏曰寬廣故能容受能容受然後能勝其重彊忍故能堅決能堅決然後能致其逺胡氏曰惟𢎞然後能任重不以善而自足也惟毅然後能道逺不以半塗而自廢也仁以為己任不亦重乎死而後已不亦逺乎仁者人心之全德而必欲以身體而力行之可謂重矣一息尚存此志不容少懈可謂逺矣輔氏曰仁包四者無物不體以為己任可謂重矣非寬洪容受何以勝其任且曰必欲身體而力行之則異乎說仁而但欲知之者矣與生俱生無有間斷死而後已可謂逺矣非强忍堅決何以致其逺且曰此志不容少懈則信乎求仁者不可有造次顚沛之違矣程子曰𢎞而不毅則無規矩而難立毅而不𢎞則隘陋而無以居之語録曰𢎞而不毅如近世楊氏之學者其流與世之常人無以異毅而不𢎞如胡氏門人都恁地撑腸拄肚少間都沒頓著處陳氏曰如柳下惠是𢎞底人其流失之不恭則無規矩而難立然惠却不以三公易其介是𢎞而能毅也伯夷是毅底人其流失之隘則是隘陋而無以居之然夷却不念舊惡是毅而能𢎞也𢎞而能毅則和而不流而有規矩矣毅而能𢎞則中立而不倚而有以居之矣又曰𢎞大剛毅然後能勝重任而逺到輔氏曰此又釋先𢎞而後毅之義也譬如重擔子必先擔得起然後可論其所行之逺近胡氏曰程子初言𢎞毅不可以偏廢再言必𢎞毅而後可以任重而道逺也子曰興於詩興起也詩本性情有邪有正胡氏曰如二南之正始為正鄭衛之淫奔為邪也其為言既易知胡氏曰詩之詞明白洞達也而吟詠之間抑揚反復其感人又易入輔氏曰吟咏謂詠歌其詩抑揚謂詠嘆之聲或髙下反復謂詠歌之不一而足胡氏曰吟詩者歌永言也抑揚者聲音髙下也反復者前後重復也故學者之初所以興起其好善惡惡之心而不能自已者必於此而得之胡氏曰詩之正可以感發其善心詩之邪可以懲創其逸志所以興也立於禮禮以恭敬辭遜為本而有節文度數之詳胡氏曰恭主一身而言敬主一心而言處己之道也辭者解使去已遜者推以與人接物之方也節文品節文章也度數制度數目也既有以為處己接物之本而周旋曲折又能纎悉如此可以固人肌膚之㑹筋骸之束胡氏曰人之肌膚本有所㑹筋骸本有所束至此又愈堅固也故學者之中所以能卓然自立而不為事物之所搖奪者必於此而得之輔氏曰禮雖本於恭敬辭遜然規矩森嚴節月明備外足以固人之肌膚筋骸而內足以禁人之非心逸志學者之中於此固執而允蹈焉則足蹈實地卓然自立而外物不足以搖奪之成於樂樂有五聲十二律更唱迭和以為歌舞八音之節語録問樂有五聲十二律更唱迭和恐是迭為賓主否曰書所謂聲依永律和聲蓋人聲自有髙下聖人制五聲以括之宫聲洪濁其次為商羽聲輕清其次為徴清濁洪纎之中為角此五聲之别以括人聲之髙下聖人又制十二律以節五聲中又各有髙下每聲又分十二等謂如以黃鍾為宫則是太簇為商姑洗為角林鍾為徵南吕為羽還至無射為宫便是黃鍾為商太簇為角中吕為徴林鍾為羽然而無射之律只長四寸六七分而黃鍾長九寸太簇長八寸林鍾長六寸則宫聲概下靣商角羽三聲不過故有所謂四清聲夾鍾大吕黃鍾太簇是也蓋用其半數謂如黃鍾九寸只用四寸半餘三律亦然如此則宫聲可以槩之其聲和矣看來十二律皆有清聲只說四者意其取數之甚多者言之又曰人以五聲十二律為樂之末若不是五聲十二律如何見得這樂便是無樂了五聲十二律皆有自然之和氣古樂不可見然今之歌曲亦有所謂五聲十二律方做得曲亦似古樂一般如彈琴亦然只他底是邪古樂是正所以不同可以養人之性情而蕩滌其邪穢消融其查滓語録曰查滓是他勉强用力不出於自然而不安於為之之意聞樂則可以融化了胡氏曰邪穢隱惡之未去者也查滓病根之未除者也故學者之終所以至於義精仁熟而自和順於道德者必於此而得之是學之成也語録曰問五聲十二律作者非一人不知如何能和順道德曰如金石絲竹匏土革木雖是有許多却打成一片清濁髙下長短小大更唱迭和皆相應渾成一片有自然底和氣不是各自為節奏歌者歌此而已舞者舞此而已所以聼之可以和順道德者須是先有與詩立禮工夫然後用樂以成之輔氏曰樂雖始於詩歌而聖人依之以五聲和之以十二律更唱迭和而以為歌舞八音之節所以合天人之和以養人之耳目說人之情性蕩滌其邪穢而使之不存消融其查滓而使之盡化學者於此涵泳而優游焉則能至義精仁熟之地而於道德各極其和順而無一毫彊勉拂戾之意也興則起立則不反成則渾全此三節其間甚闊學者於此真積而力久焉則自當知之按內則十歲學幼儀十三學樂誦詩二十而後學禮則此三者非小學傳授之次乃大學終身所得之難易先後淺深也語録曰這處是大學終身之所得如十歲學幼儀十三學誦詩從小時皆恁地學一番了做一箇骨子在這裏到後來方得他力禮小時所學則是學事親事長之節乃禮之小者年到二十所學乃是朝廷宗廟之禮乃禮之大者到立於禮時始得禮之力樂小時亦學了到成於樂時始得樂之力不是大時方去學詩却是初間便得力說善說惡却易曉可以勸可以戒禮只捉住在這裏樂便難精詩有言語可讀禮有節文可守樂是他人作與我有甚相關如人唱曲好底凡有聞者人人皆道好樂雖作於彼而聽者自然竦動感發故能義精仁熟而和順道德輔氏曰少儀謂幼少奉事長上之禮禮之小者也樂則六樂之器鍾鼓管磬之屬樂之一物耳先禮而後樂亦宜也學詩反在其後者凡樂之器皆所以節夫詩之音律須以漸習之而未可以一旦盡能也故先學樂而後誦詩二十而後學禮此則禮之大者如六禮之屬三千三百之大全也故成而後學焉此蓋小學傳授之次而此章所記乃大學終身所得之難易先後淺深焉詩易於禮禮易於樂興者淺立者深成則又其深者也故其先後之序如此此三者之序所以不同也而小學於學禮之後亦終之以舞大夏大夏禹樂樂之文武備者也是亦所以終於樂也永嘉陳氏曰此章先禮而後樂內則先樂而後禮此章非為學之序乃論其終身所得之先後也學之序當如內則至其將來得力處其先善心興起是於詩上得力其次操守植立是於禮上得力至未梢德性純熟是於樂上得力程子曰天下之英才不為少矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習聞之而知其說故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興於詩也古人自灑掃應對以至冠昏喪祭莫不有禮今皆廢壞是以人倫不明治家無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脉今皆無之是不得成於樂也是以古之成材也易今之成材也難胡氏曰程子以為今皆無此蓋因世變而傷嘆焉學者則當因其尚存者而深考之不可以自畫也真氏曰自周衰禮樂崩壞然禮書猶有存者制度文為尚可考尋樂書則盡闕不存後之為禮者既不能合先王之制而樂尤甚焉今世所用大扺鄭衛之音雜以夷狄之聲而已適足以蕩人心壞風俗何能有補乎然禮樂之制雖亡而禮樂之理則在故樂記又謂致禮以治身致樂以治心外貌斯須不莊不敬而嫚易之心入之矣中心斯須不和不樂則鄙詐之心入之矣莊敬者禮之本也和樂者樂之本也學者誠能以莊敬治其身和樂養其心則於禮樂之本得之矣是亦足以立身而成德也三百篇之詩雖云難曉今諸老先生發明其義了然可知如能反復涵泳直可以感發其性情則所謂興於詩者亦未嘗不存也子曰民可使由之不可使知之民可使之由於是理之當然而不能使之知其所以然也或問此一節曰理之所當然者所謂民之秉彞百姓所日用者也聖人之為禮樂刑政皆所以使民由之也其所以然則莫不原於天命之性雖學者有未易得聞者而况於庶民乎蓋不能使之知非不使之知也陳氏日理之當然如父慈子孝之類亦是大綱說其纎悉曲折乃是中間慈孝節目如內則許多事件之類皆日用常行當然底非謂其所以然者所以然乃根原來歷是性命之本處程子曰聖人設教非不欲人家喻而户曉也然不能使之知但能使之由之爾若曰聖人不使民知則是後世朝四暮三之術也豈聖人之心乎輔氏曰所謂聖人不使民知者乃老氏愚民莊子以智籠愚之說朝三暮四朝四暮三詭譎不誠聖人而肯為是哉使民家喻而户曉者聖人之本心不能使之知之但能使之由之者聖人之不得已也真氏曰朝四暮三出列子租公賦芧曰朝三暮四衆徂皆怒曰朝四暮三衆狙皆喜猿狙無知而易誑亦如愚民不知義理輕為喜怒也聖人之教惟恐不能開明下民之心如申韓斯鞅之徒所以治其國者專用愚黔首之術不知民可欺以暫不可欺以久故卒以此亡可不戒哉子曰好勇疾貧亂也人而不仁疾之已甚亂也好去聲好勇而不安分則必作亂惡不仁之人而使之無所容則必致亂輔氏曰亂謂害理傷道爭鬪悖逆之事好勇則有作亂之資不安分則有作亂之理此其亂在我惡不仁之人而使之無所容事窮勢迫則必有不肖之心應之此其亂在人二者之心善惡雖殊然其生亂則一也輔氏曰好勇疾貧則其心固惡矣若其惡不仁之心則本善也但疾之已甚則亦流於不仁矣故好勇疾貧之亂乃不知義者之所為疾不仁已甚之亂乃不依仁者之所致使其心終於善則亦何由致亂哉子曰如有周公之才之美使驕且吝其餘不足觀也已才美謂智能技藝之美輔氏曰凡能有為者皆才也然有美有惡若周公之智能技藝則又才之美者也金縢之書周公自言其多才多藝勝於武王又觀其作周禮一書天下細微之事蓋無不知無不能也其智能技藝之美可見驕矜夸吝鄙嗇也程子曰此甚言驕吝之不可也蓋有周公之德則自無驕吝若但有周公之才而驕吝焉亦不足觀矣輔氏曰德出於理才出於氣世固有優於德而短於才者然德極其盛則才亦無不足若但有其才而無其德則雖有智能技藝之美必不能居廣居立正位行大道為向上一著事又曰驕氣盈吝氣歉文集曰吝之所有乃驕之所恃也故驕而不吝無以保其驕吝而不驕無所用其吝此盈於虛者所以必歉於實而歉於實者所以必盈於虛也愚謂矜夸鄙嗇所以釋字義氣盈氣歉則又推原矜夸鄙嗇之所由生也愚謂驕吝雖有盈歉之殊然其勢常相因蓋驕者吝之枝葉吝者驕之本根故嘗驗之天下之人未有驕而不吝吝而不驕者也語録曰驕却是枝葉發露處吝却是根本藏蓄處如說道理這自是世上公共底物事合當大家說出來世上自有一般人自恁地吝惜不肯說與人他只怕人都識了却沒差異所以吝惜在此獨有自家㑹别人都不㑹自家便驕得他便欺得他如貨財也只是公共底物事合使便著使若只恁地吝惜合使不使只怕自家無了别人却有無可强得人所以吝惜在此獨是自家有别人無自家便做大便欺得他胡氏曰驕其張皇吝其收縮也姑以驕吝於財者觀之方其吝也收縮閉藏惟恐人知及其驕也張王矜夸惟恐人不知其迹若相背而馳者然其所以閉藏者乃欲資以矜夸也其所以矜夸者即前日閉藏者為之地也譬之枝葉本根相為貫通也集注特發此義以曉人欲人知其病根而藥之驕之證發於外吝之證藏於內發者易見藏者難知學者欲翦其枝葉又當先拔其本根也永嘉陳氏曰朱子是主驕說故以吝為本根驕為枝葉若主吝說則驕亦吝之本根吝亦驕之枝葉如此看方著得下兩句未有驕而不吝吝而不驕但吝是氣斂藏在內驕則發見在外有夸滿盈溢之意立辭只可以吝為本根驕為枝葉到下兩句方見得相為用子曰三年學不至於榖不易得也易去聲榖祿也至疑當作志胡氏曰榖之訓不一舊說皆訓善不易得謂善之難成也然善之與惡在人所向特反覆間耳何至於三年之久而無成亦非所以勉人也惟邦有道無道榖之榖正指為祿以此例之則前後相應以至為志則其義益精或聲同而字誤也為學之久而不求祿如此之人不易得也輔氏曰後世之士求祿之志皆在為學之先不然則不學矣楊氏曰雖子張之賢猶以干祿為問况其下者乎然則三年學而不至於榖宜不易得也子曰篤信好學守死善道好去聲篤厚而力也愚謂篤信者言信得深厚牢固不走作也不篤信則不能好學然篤信而不好學則所信或非其正不守死則不能以善其道然守死而不足以善其道則亦徒死而已蓋守死者篤信之效善道者好學之功或問四者更相為用何也曰非篤信則不能好學非守死則無以善道然徒篤信而不能好學徒守死而不足以善道則又君子之所不取也蓋能守死者篤信之效而能善道者好學之力然雖曰篤信而未能至死不變則其信亦不篤矣雖曰好學而不能推以善道則其學亦無用矣此四者之所以更相為用而不可一有闕焉者也胡氏曰不篤信則不能好學不守死則不能善道順而言之也不好學則所信或非其正不善道則所死或失其所逆而推之也守死者篤信之效善道者好學之功互而求之也危邦不入亂邦不居天下有道則見無道則隱見賢遍反君子見危授命則仕危邦者無可去之義在外則不入可也亂邦未危而刑政紀綱紊矣故潔其身而去之語録曰危邦不入是未仕在外則不入亂邦不居是已仕在內見其紀網亂不能從吾之諫則當去之問危邦固是不可入但或有見居其國則當與之同患難豈復可去曰然到此無可去之理矣然其失則在於不能早去當及其方亂未危之時去之可也天下舉一世而言無道則隱其身而不見也語録曰天下無道譬如天之將夜雖未甚暗然自此只向暗去知其後來必不可支持亦須見幾而作可也胡氏以一國言猶可視時而出入通天下言當與斯道相為隱顯此去就之大義也此惟篤信好學守死善道者能之輔氏曰篤信好學守死善道此士之先務必如此然後其本立去就出處乃其末節爾且夫好學以善道則見道明矣篤信以守死則信道篤矣見道明信道篤雖生死猶不能使之變况出處去就之際宜乎其優為之矣邦有道貧且賤焉恥也邦無道富且貴焉恥也世治而無可行之道世亂而無能守之節碌碌庸人不足以為士矣可恥之甚也輔氏曰所貴於士者謂其進而用則有可行之道退而藏則有能守之節故退不失已進不失義若咸無焉則是碌碌庸人而不足以為有亡矣冒士之名而無士之實豈不可恥之甚哉胡氏曰邦有道則賢者必見用茍猶貧賤是無可行之道也邦無道則賢者當知退茍居富貴是無能守之節也以是為恥則世治必能有為世亂必能有守朝氏曰有學有守而去就之義潔出處之分明然後為君子之全德也輔氏曰好學善道者有學也篤信守死者有守也不入不居則見則隱者去就之義潔也以有道而貧賤無道則富貴為恥者出處之分明也必如是然後知與行相應始與終無虧可謂君子之全德子曰不在其位不謀其政程子曰不在其位則不任其事也若君大夫問而告者則有矣輔氏曰不在其位而謀其政不義而不可為也君大夫問而不以告不仁而不可為也子曰師摰之始關睢之亂洋洋乎盈耳哉摰音至睢七余反師摰魯樂師名摰也亂樂之卒章也胡氏曰國語云以那為首其輯之亂曰自古在昔正指篇末古賦亂曰皆卒章也樂記又亂以武復有總結之意史記曰關睢之亂以為風始語録曰自關關雎鳩至鐘鼓樂之皆是亂想其初必是已作樂只無此辭到此處便是亂洋洋美盛意孔子自衛反魯而正樂適師摰在官之初故樂之美盛如此胡氏曰論語論正樂者四語魯太師當在先此章次之樂正又次之適齊最後蓋此章與樂正章意一也子曰狂而不直侗而不願悾悾而不信吾不知之矣侗音通悾音空侗無知貌語録曰侗是愚模樣不解一事底人願謹厚也悾悾無能貌語録曰悾悾是拙模樣無能為底人吾不知之者甚絶之之辭亦不屑之教誨也輔氏曰狂者多率直無知者多謹厚無能者不解作僞今乃不然非常理也事出非常則非聖人之所知此雖是甚絶之之辭然天地無棄物聖人無棄人故又知其為不屑之教誨也蘇氏曰天之生物氣質不齊其中材以下有是德則有是病有是病必有是德故馬之蹄齧者必善走其不善者必馴有是病而無是德則天下之棄才也輔氏曰天之生物氣質不齊中才已上則有德而無病此固善也中才以下則有是德必有是病有是病亦必有是德此猶可取也智以照之道以御之可也若夫有是病而無是德則又下之下者是天下之棄才也以是三者品量天下之才則無餘藴矣子曰學如不及猶恐失之言人之為學既如有所不及矣而其心猶竦然惟恐其或失之警學者當如是也黃氏曰為學之勤若有所追逐然惟恐不及其用心如此猶恐果不可及而竟失之况可緩乎程子曰學如不及猶恐失之不得放過才說姑待明日便不可也陳氏曰此章大意說為學用工如此之急程子不得放過又發明恐失之義才放過待明日便緩便失了愚謂才放過時即是間斷子曰巍巍乎舜禹之有天下也而不與焉與去聲巍巍髙大之貌不與猶言不相關言其不以位為樂也語録曰不與只是不相干之義言天下自是天下我事自是我事不被那天下來移著子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉唯猶獨也則猶準也輔氏曰準者五則之一所以準平髙下也故以準訓則蕩蕩廣逺之稱也言物之髙大莫有過於天者而獨堯之德能與之準故其德之廣逺亦如天之不可以言語形容也輔氏曰堯非有意於則之也與天同德而自不能不則之也巍巍乎其有成功也煥乎其有文章成功事業也煥光明之貌文章禮樂法度也堯之德不可名其可見者此爾語録曰堯與天為一處民無能名所能名者事業禮樂法度而已尹氏曰天道之大無為而成唯堯則之以治天下故民無得而名焉所可名者其功業文章巍然煥然而已陳氏曰尹氏說當與前合作一意看無為而成是大裏靣事準則之以治天下亦是德裏靣事舜有臣五人而天下治治去聲五人禹稷契臯陶伯益武王曰豫有亂臣十人書泰誓之辭馬氏曰亂治也輔氏曰荀卿子曰治亂謂之亂猶治汚謂之汚也則亂之訓治其來久矣十人謂周公旦召公奭太公望畢公榮公太顚閎夭散宜生南宫適其一人謂文母劉侍讀以為子無臣母之義蓋邑姜也九人治外邑姜治內或曰亂本作乿古治字也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已稱孔子者上係武王君臣之際記者謹之才難蓋古語而孔子然之也輔氏曰詳味夫子之言便使人有敬重愛惜人才之意才者德之用也輔氏曰德出於性才出於氣程子論性與氣以為二之則不是則以才為德之用宜也唐虞堯舜有天下之號際交㑹之間言周室人才之多惟唐虞之際乃盛於此語録曰問集注此句恐將舜有五人一句間了曰寧可將上一句存在這裏若從元注說則是亂臣十人却多於前於今為盛却是舜臣五人不得如後來盛降自夏商皆不能及然猶但有此數人爾是才之難得也三分天下有其二以服事殷周之德其可謂至德也已矣春秋傳曰文王率商之畔國以事紂蓋天下歸文王者六州荆梁雍豫徐揚也惟青兖冀尚屬紂耳范氏曰文王之德足以代商天與之人歸之乃不取而服事焉所以為至德也孔子因武王之言而及文王之德且與泰伯皆以至德稱之其指微矣語録曰孔子稱至德只二人皆可為而不為者也或曰宜斷三分以下别以孔子曰起之而自為一章子曰禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣間去聲菲音匪黻音弗洫呼域反間罅隙也謂指其罅隙而非議之也菲薄也致孝鬼神謂享祀豐潔衣服常服黻蔽膝也以韋為之語録曰韋熟皮也有虞氏以革夏后氏以山殷火周龍章祭服謂之黻朝服謂之韠左氏帶裳韠舄冕冠也胡氏曰冕冠上版前低後髙因俯而得名皆祭服也溝洫田間水道以正疆界備旱潦者也或問溝洫之制曰見於周禮遂人匠人之職詳矣蓋禹既平水患又治田間之水道使無水旱之災所謂濬畎澮距川是也胡氏曰周禮匠人職云九夫為井井間有溝十里為成成間有洫洫深廣皆八尺溝半之夏制當不甚異也既用以定經界又旱則瀦水潦則泄水也或豐或儉各適其宜所以無罅隙之可議也輔氏曰言禹之自奉常薄而宗廟朝廷之禮百姓衣食之源則未嘗不盡心所以不容於非議也故再言以深美之楊氏曰薄於自奉而所勤者民之事所致飾者宗廟朝廷之禮所謂有天下而不與也夫何間然之有論語纂疏卷四
