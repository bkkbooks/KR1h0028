body:
  text: 欽定四庫全書論語纂疏卷一宋趙順孫撰朱子集注學而第一此為書之首篇故所記多務本之意語録曰此一篇都是先說一箇根本胡氏曰此篇首取其切於學者記之故以為多務本之意乃入道之門積德之基學者之先務也語録曰入道之門是將自家身已入那道理中去漸漸相親久之與已為一輔氏曰道者人之所共由必有所從入德雖我之所自得必積而後成凡此篇所論務本之事乃道所從入之門而德所積纍之基學者必先務此然後道可入而德可積矣凡十六章子曰學而時習之不亦說乎說悅同學之為言效也或問學之為效曰所謂學者有所效於彼而求其成於我之謂也以己之未知而效夫知者以求其知以己之未能而效夫能者以求其能皆學之事也語録曰效字所包甚廣凡傅學審問謹思明辨篤行皆學之事黃氏曰集注言學而或問以知與能並言言人之效學於人有此二者先覺之人於天下之理該洽貫通而吾懵然未有所知也於是日聽其議論而向之未知者始知矣先覺之人於天下之事躬行實踐而吾悵然未有所能也於是日觀其作為而向之未能者始能矣人性皆善而覺有先後後覺者必效先覺之所為乃可以明善而復其初也或問此一節曰人之所以為人者以其受天之命而有是性也性之所以為性者以其具足萬理而無不善之雜也是以人之有生則仁義禮智之德無一不根於心其君臣父子兄弟夫婦朋友之倫動作威儀之節以至天地事物之所以然而當然者皆不待求於外而知之能之也然既有是形則氣質之稟或不能無所偏物欲之私或不能無所蔽是以於性之德有所不明而觸意妄行或墯於夷狄禽獸之域惟聖人則氣稟清明而物欲不得以蔽之是以能盡其性而全其所以為人之道若衆人者既已昧其性矣而又求夫能盡其性之人問而講焉以效其所知觀而法之以效其所能則可以明善而復其初矣若本不失其性則亦何必效於人以復之乎黃氏曰學問之道固多端然其歸在於全其本性之善而已明善謂明天下之理復其初則復其本然之善也陳氏曰所謂明善而復其初者其中極有含蓄乃兼知行而言非止知之便是復其初也學自是兼知行工夫豈但明此理而已胡氏曰人性皆善人皆可學也覺有先後後覺者必效先覺之所為學之端也乃可以明善而復其初學之效也莆田黃氏曰人雖由氣以或形而氣原於理故曰人性皆善也然氣無定形升降上下往來消息交互錯糅易於昏雜而難得清明故人之受是氣也亦通者少蔽者多通則為先覺故曰覺有先後也理寓氣中則未嘗變惟理不變故學可勝氣雖昏蔽之甚者得先覺覺之則亦覺焉故曰後覺必效先覺之所為乃可以明善而復其初也必曰明善者蓋不明乎善則雖欲為善而不知其孰為善今因先覺之所為然後能明其為善而效之復其初者又明此善乃吾有生之初元得於天者如此向也為氣稟之昏蔽而不知今始知其善而為之非取彼先覺之有以增我所無亦復其初而已又曰先覺之所為理之所當為也理乃天所同命以為人者不如是則不能為人矣蔡氏曰性者人心所稟之天理寂然不動之時萬善具足之名也由是而之五常百行無非至善但人為氣質所昏物欲所汨又不能學以通之既無以知其本然之善則亦無以施其存養之功惟能效夫先覺者之所為乃可以明善而復其初明以知者言也復以能者言也朱子以明善復其初以求知求能開示學者切矣習鳥數飛也學之不已如鳥數飛也或問習為鳥數飛曰說文習字從羽從白月令所謂鷹乃學習是也語録曰只是這一樣飛習只是飛了又飛胡氏曰學之不已者學與習非一事也說喜意也既學而又時時習之則所學者熟而中心喜說其進自不能已矣或問學而時習何以說也曰人既學而知且能矣而於其所知之理所能之事又以時反復而溫繹之如鳥之始學飛者既已能之而又數習焉則其所學者熟而中心悅懌也蓋人而不學則無以知其所以為人之理無以能其所以為人之事固不足以謂之人矣然學矣而不習則表裏扞格而無以致其學之之道習矣而不時則工力間斷而無以成其習之之功是以雖曰知之而枯燥生澀無可嗜之味雖曰能之而危殆杌隉無可即之安如是而求有以勝夫氣稟物欲之私而復其初亦何自而能得哉是以聖人之教使人既學矣而於其所學又必時時習之如鳥之始學飛而數習焉者則其心與理相涵而所知者益精身與事相安而所能者益熟蓋朝夕從容俯仰於道德仁義之中而凡人之所以為人性之所以為性者莫不沛然有以自得於心而知其非由外鑠矣此其中心油然悅懌之味雖芻豢之甘於口亦不足以喻其美也語録曰學只是要一箇習習熟後自然喜說不能自已今人學所以便住了只是不曾習熟不見得好又曰大抵學到說時已是進一進了只說後便要住不得陳氏曰時時習之而無間斷則所學者熟趣味源源而出中心不期悅懌而進進自不能止程子曰習重習也時復思繹浹洽於中則說也又曰學者將以行之也時習之則所學者在我故說或問程子兩義曰重復思繹者以知者言也所學在我者以能者言也學之為道不越乎兩端矣曰時習之所以說諸說孰近曰夫習而熟熟而說脈絡貫通最為親切程子所謂浹洽者是也胡氏曰時復思繹則習之於心將以行之則習之於身內外交致其力也謝氏曰時習者無時而不習坐如尸坐時習也立如齊立時習也謝氏名良佐上蔡人語録曰學時是知得坐如尸立如齊及做時坐常是如尸立常是如齊此是習之事又曰程子謝氏各只說得一邊尋繹義理與居處皆當習可也又曰程子意是說習於思天下事若不先思如何㑹行得謝氏說習於行者亦不是外於思思與行亦不可分說有朋自逺方來不亦樂乎樂音洛朋同類也自逺方來則近者可知程子曰以善及人而信從者衆故可樂或問以善及人而信從者衆若何而可樂耶曰聞之張子曰性者萬物之一原非有我之所得私也惟大人為能盡其道故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不能順吾理者則亦末如之何矣嘗以是言觀之而朋來之樂其指可知蓋性之為性固物之所同得也向也以其拘於氣稟汨於物欲而皆梏亡之今也吾獨幸知學以復之而既有以悅諸心矣彼則未嘗知學而梏亡猶故也夫以昔之得於天者皆同而今之得于已者獨異則亦豈吾之所欲哉然遽欲推吾之所得以及之則吾之善未充而無以取信于彼雖欲求而告之彼亦且掉頭而不之顧矣况望其能因吾言以復其初而與之同其樂邪惟其有以充諸身而形於外則彼之聞風而覿德者自將敬信服從之不暇蓋近者既至而逺者畢來以學於吾之所學而求以復其初凡吾之所得而悅諸心者彼亦且將有以得而悅之而無物我之間則夫所謂萬物之一原者信乎其俱立而不獨成矣是其歡欣交通融怡和樂之意所以盈於內而達于外者又豈手舞足蹈之可言哉且程子以善及人而信從者衆之云才九字爾而無一字之虛設也非見之明而驗之實其孰能與於此語録曰須是自家有這善方可及人無這善如何及得人看聖人所言多少氣象寬大又曰善不是自家獨有人皆有之我自得未能及人雖說未樂又曰信從者衆足以驗已之有得然已既有得何待人之信從始為可樂須知己之有得亦欲他人之皆得然信從者但一二亦未能愜吾之意至于信從者衆則豈不可樂又曰大抵私小底人或有所見不肯告人持以自多君子存心廣大已有所得足以及人今既信從者自逺而至其衆如是安得不樂問初學將自謀不暇何以及得人曰謂如傳師友些好說話好文字歸與朋友亦喚做及人如有好說話好文字緊緊藏在籠篋中如何及得人黃氏曰以善及人原其所以逺來也信從者衆實其自逺而來也又曰說在心樂主發散在外或問說樂皆出於心而程子有內外之辨曰非以樂為在外也以為積滿乎中而發越乎外爾說則方得於內而未能達於外也語録曰說是感於外而發於中樂則充於中而溢乎外輔氏曰說是自知自能而自說及夫樂則人皆知皆能而始至說今發散於外非有他也人不知而不愠不亦君子乎愠紆問反愠含怒意語録曰但心裏略有些不平意便是愠了又曰愠非悖然而怒之謂只有些小不快活處便是君子成德之名易本義曰成德已成之德也尹氏曰學在己知不知在人何愠之有尹氏名焞河南人文集曰尹氏最為的當蓋如此而言乃見為已用心之約處若以容人為說竊恐為己之心不切而又涉乎自廣狹人之病其去道亦逺矣語録曰此等句極好君子之心如一泓清水更不起些微波程子曰雖樂於及人不見是而無悶乃所謂君子黃氏曰程子之說是不愠然後君子也以說樂兩句例之則須如此說方為穩當愚謂及人而樂者順而易不知而不愠者逆而難故惟成德者能之或問人不知而不愠何以為君子曰常人之情人不知而不能不愠者有待於外也若聖門之學則其本心正以為己而已矣初非為是以求人之知也人知之人不知之亦何加損於我哉然人雖或聞此矣而信之有不篤養之有不厚守之有不固則居之不安而臨事未必果能真不動也今也人不見知而處之泰然且略無纎芥舍怒不平之意非成德之士信之篤而養之厚守之固而居之安其孰能之故必如是然後可以得夫君子之名茍自是日進而不已焉則不怨不尤下學上達以馴致於聖人亦不改塗而至矣語録曰問不知而不愠者逆而難曰人之待已平平恁地過亦不覺若被人做箇全不足比數底人看待心下便不甘便愠輔氏曰順謂理之順逆謂理之逆曰順曰逆皆理也但處其順者易故及人而樂者猶可及處其逆者難故不見是而無悶非成德之士安土樂天者不能及也蔡氏曰程子謂不愠然後君子也朱子謂故惟成德者能之則是君子然後不愠朱子非正解本句特統而論之耳所以繼於尹氏程子之後然德之所以成亦曰學之正習之熟說之深而不已焉耳黃氏曰言君子而復歸於學之正習之熟說之深何也學而至於成德又豈有他道哉其所自來者亦不過是而已非體之之實孰能知之輔氏曰此章總言為學始終三者之序有淺深而無二道也又慮夫敏者躐等而進怠者半塗而止昧者又或離析以求之或失其正而陷於異端故復發此義而使之正其始之所學然後時習以熟之則夫說之與樂可以馴致初不待外求而得也程子曰樂由說而後得非樂不足以語君子語録曰惟樂後方能進這一步不樂則何以為君子輔氏曰不極其至則無以成其德故又以此說終之有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也弟好皆去聲鮮上聲下同有子孔子弟子名若魯人善事父母為孝善事兄長為弟葉氏曰善字不可等間看且如平常事父母其誰不能須知承顔順色不失其歡心之為貴又須知父母有過下氣怡色柔聲以諫必諭父母於道之為貴如舜處父母之變卒致得底豫方謂之善事若善處兄弟尤難須是思量同受遺體方不至有二心犯上謂干犯在上之人語録曰少有拂意便是犯又曰干犯便是那小底亂鮮少也文集曰鮮只是少聖賢之言大槩寬裕不似今人蹙迫便說殺了語録曰此鮮字只訓少與鮮矣仁鮮字不同鮮矣仁非只是少直是無了問朱子謂鮮是少則未以為絶無孝弟之人猶有犯上之意邪永嘉陳氏曰孝弟之人資質粹美雖未嘗學問自是無世俗一等粗暴氣象縱是有之終是罕見到得粗惡太過可保其決無言孝弟之人占得好處多不好處少作亂則為悖逆爭鬬之事矣輔氏曰悖逆便是程子所謂逆理亂常之事但就犯上意說故更添箇爭鬬字此言人能孝弟則其心和順少好犯上必不好作亂也君子務本本立而道生孝弟也者其為仁之本與與平聲務專力也輔氏曰謂專用其力而為之本猶根也仁者愛之理心之德也或問仁何以為愛之理也曰人稟五行之秀以生故其為心也未發則具仁義禮智信之性以為之體己發則有惻隱羞惡恭敬是非誠實之情以為之用蓋木神曰仁則愛之理也而其發為惻隱火神曰禮則敬之理也而其發為恭遜金神曰義則宜之理也而其發為羞惡水神曰智則别之理也而其發為是非土神曰信則實有之理也而其發為忠信是皆天理之固然人心之所以為妙也故以仁為愛則不可以仁為愛之理則可蓋性情雖有體用之殊然其血脈貫通則相為體用而不能以相離也曰其又為心之德何也曰仁之道大不可以一言而盡也程子論乾四德而曰四德之元猶五常之仁偏言則一事專言則包四者推此而言則仁雖心德之一體而心之全德不能外是亦可見矣蓋人之生也莫不得夫天地生物之心以為心故雖具有五常四端之妙而其發生之理溫然而和粹者實為之體以該夫義禮智信之間而其怵惕惻隱之端亦行乎羞惡是非辭遜之內是以語心之德而可以一言以蔽之曰仁猶夫元之包四德也故仁之為義偏言之則曰愛之理專言之則曰心之德其實愛之理所以為心之德蓋亦未嘗有二致也語録曰愛非仁愛之理是仁心非仁心之德是仁又曰心之德是統言愛之理是就仁義禮智上分言如義者宜之理禮者遜之理智者知之理相似問心之德以専言愛之理以偏言曰固是愛之理即是心之德不是心之德了又别有箇愛之理偏言專言亦不是兩箇仁小處只在大裏面又曰以心之德而專言之則未發是體己發是用以愛之理而偏言之則仁便是體惻隱是用又曰愛是箇動物事理是箇靜物事又曰愛是情愛之理是仁仁者愛之理愛者仁之事仁者愛之體愛者仁之用又曰理便是性緣裏面有這愛之理所以發出來無不愛又曰理是根愛是苗又曰耳之德聰目之德明心之德仁且將這意去體認又曰義禮智皆是心之德只是仁却專是此心之德黃氏曰仁性也既曰愛又曰心何也天地之大德曰生天地之所以為德語其全體而極其大用不過生生而已生之外無他道也天地以是為心而人得天地之心以為心故其所以為仁者愛是也仁固主於愛然人之一心有仁有義有禮有智其所為德者非一然仁包四德而貫四端則凡吾心之全德莫非仁也論仁之所專主而至切者則曰愛論仁之所兼統而至廣者則曰心不若是不足以盡其義也曰愛矣而又曰愛之理曰心矣而又曰心之德何也愛自是情仁自是性程子言之矣愛非所以言仁也曰愛之理則是仁者乃愛之理而非愛也蓋指性而言也合性與知覺有心之名張子言之矣言心則合性知覺而言曰心之德則專指此心所得之理所謂性也而凡所具之理皆在其中矣既曰愛之理心之德則釐而為二矣又曰其實愛之理所以為心之德何也論其專主而至切者固曰愛之理然其兼統而至廣者亦豈離乎愛之理哉故春者生意之生也夏者生意之長也秋者生意之斂也冬者生意之藏也蓋無適而非生意也方其靜也則一生意足以包四德及其動也則一生意足以貫四端則愛之理心之德又豈有二事哉但别而言之使其部分位置截然不亂又合而言之使其倫理脈絡渾然無間也又曰人之一心虛靈洞徹而所具之理乃所謂德也指虛靈洞徹而謂之德固不可捨虛靈洞徹而謂之德亦不可於虛靈洞徹之中而有理存焉此心之德也乃所謂仁也又曰有子是說仁之用朱子是說仁之體所以於此言之者直以仁道至大孔門所常言論語所言仁字乃自此始故於此發之為仁猶曰行仁語録曰為仁只是推行仁愛以及物不是就這上求仁與者疑詞謙退不敢質言也言君子凡事專用力於根本輔氏曰君子務本本立而道生此兩句泛說凡事是如此與上文自不相干下文乃言孝弟也者其為仁之本與方是應上面說故集注下一凡字根本既立則其道自生語録曰凡事若是務本時道便自然生若上文所謂孝弟乃是為仁之本文集曰孝弟乃推行仁道之本仁字則流通該貫不專主於孝弟之一事也但推行之本自此始耳學者務此則仁道自此而生也語録曰仁民愛物都從親親上生去孝弟也是仁仁民愛物也是仁只孝弟是初頭事程子曰孝弟順德也故不好犯上豈復有逆理亂常之事德有本本立則其道充大孝弟行於家而後仁愛及於物所謂親親而仁民也故為仁以孝弟為本論性則以仁為孝弟之本或問孝弟為行仁之本論性則以仁為孝弟之本曰仁之為性愛之理也其見於用則事親從兄仁民愛物皆其為之之事也此論性而以仁為孝弟之本者然也但親者我之所自出兄者同出而先我故事親而孝從兄而弟乃愛之先見而尤切人茍能之則心順氣和必有不好犯上作亂之效若君子以此為務而力行之至於行成而德立則自親親而仁民自仁民而愛物其愛有等差其施有漸次而為仁之道生生而不窮矣又豈特不好犯上作亂而已哉此孝弟所以為行仁之本也文集曰孝弟行於家而後仁愛及於物乃著實指事而言其言雖近而㫖則逺語録曰如義主羞惡羞惡則有違逆處惟孝弟則皆是順程子說順德直是說得好又曰論性則仁是孝弟之本惟其有這仁所以能孝弟仁是根孝弟是發出來底仁是體孝弟是用仁是性孝弟是仁裏面事問為仁以孝弟為本這箇仁字是指其周遍及物者言之以仁為孝弟之本這箇仁字是指其本體發動處言之否曰是道理都自仁裏發出首先是發出為愛愛莫切於愛親其次便到弟其兄又其次便到事君以及於他皆從這裏出如水相似愛是箇源頭漸漸流出黃氏曰有仁有行仁仁是性行仁是行仁之事有凡性故能愛其親是仁為孝弟之本能愛其親是仁之事也充此以仁民愛物亦仁之事均是仁之事然必先能愛親而後能仁民愛物故孝弟為行仁之本輔氏曰既曰本猶根也然則孝弟為仁之本仁為孝弟之本同乎否乎曰本之為根則同而其所以為根則異行仁以孝弟為根以其施於外者言也論性以仁為孝弟之根以其發於內者言也行仁不以孝弟為根則其施無序而無以極夫仁民愛物之效論性而不以仁為孝弟之根則其發無所而無以充乎孝親弟長之實蔡氏曰仁就性上說孝弟就事上說譬如桃仁杏仁中具生理凡其根幹枝葉自華而實無非生理之貫通此論性以仁為孝弟之本也然生理貫通又必自根幹而枝葉其發動萌芽必有其初以至于華而實焉此謂為仁以孝弟為本也或問孝弟為仁之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始孝弟是仁之一事謂之行仁之本則可謂是仁之本則不可蓋仁是性也孝弟是用也性中只有箇仁義禮智四者而已曷嘗有孝弟來然仁主於愛愛莫大於愛親故曰孝弟也者其為仁之本與或問性中有仁義禮智而無孝弟曰此亦以為自性而言則始有四者之名而未有孝弟之日耳非謂仁與孝弟自為别物孝弟之理不本於性而生於外也文集曰性中只有仁義禮智曷嘗有孝弟來此語亦要體㑹得是若差了即不成道理蓋天下無性外之物豈性外别有一物名孝弟乎但方在性中則但見仁義禮智四者而已仁便包攝了孝弟在其中但未發出來未有孝弟之名耳非孝弟與仁各是一物性中只有仁而無孝弟也所包攝不止孝弟凡慈愛惻隱之心皆所包也猶天地一元之氣只有水火木金土言水而不曰江河淮濟言木而不曰梧檟樲棘非有彼而無此也語録曰仁不可言至仁者義理之言不是地位之言地位則可以言至又不是孝弟在這裏仁在那裏便由孝弟可以至仁無此理如所謂何事於仁必也聖乎聖却是地位之言問仁是性也仁便是性否曰如所謂乾卦相似卦便有乾坤之類性便有仁義禮智却不是把性便作仁看性其理情其用孝弟者性之用也惻隱羞惡是非辭遜皆情也問仁主乎愛愛便是仁否曰仁主乎愛者仁發出來便做那慈愛底事如燈有光若把光做燈又不得又曰仁便是本仁更無本了若說孝弟是仁之本則是頭上安頭以腳為頭伊川所以將為字屬仁字讀蓋孝弟是仁裏面發出來底性中只有箇仁義禮智何嘗有箇孝弟來他所以恁地說時緣是這四者是本發出來却有許多事千條萬緒皆只是從這四箇物事裏面發出來又曰仁是理之在心者孝弟是此心之發見者孝弟即仁之屬但方其未發則此心所存只是有愛之理而已未有所謂孝弟名件故曰何曽有孝弟來葉氏曰須看性字透方得性中只具四端之理無形無影隨感而見當其未發止是愛之理既發為孝弟方是著在事為上乃是仁之用所以止可謂行仁自孝弟始蓋仁是根本孝弟是枝葉若謂孝弟便是仁之本則是以枝葉為根本却顚倒了道理也問今人生則知愛其親長則知敬其兄皆是心中流出略無一毫勉强意思惡知其非性中所有邪永嘉陳氏曰此不待說但先儒慮學者以仁從孝弟入先有孝弟而後有仁故特轉此語以别之蓋孝弟乃是仁流出不是仁從孝弟中入性只是四者其他衆善皆四者之支分派别也仁是性孝弟是用用便是情情便是發出來底子曰巧言令色鮮矣仁巧好令善也好其言善其色致飾於外務以悅人則人欲肆而本心之德亡矣文集曰求以悅人則失其本心之德矣不待利己害人然後為不仁也語録曰他自使出了此心在外如何得仁又曰只心在外便是不仁也不是别更有仁黃氏曰仁性也根於人心惟用心於內無私而當理者為足以存之致飾謂巧令也於外謂言色也務以悅人指其所以巧言令色之本情也致飾於外則心不存於內矣務以悅人則皆私心而非當理矣心不存於內皆私心而非當理則人欲肆而本心之德亡矣聖人詞不迫切專言鮮則絶無可知語録曰聖人詞不迫切有含容之意若云鮮矣仁者猶有些在則失聖人之意矣問仁恐未至絶無處否曰人多解此尚有些箇仁便粘滯咬不斷了子細看巧言令色心皆逐物于外大體是不仁縱有些箇仁亦成甚麼仁學者所當深戒也程子曰知巧言令色之非仁則知仁矣或問夫子謂鮮仁程子乃以非仁釋之曰夫子之言所謂詞不迫切而意已獨至者也程子則懼夫讀者之不察而謂巧言令色未足以甚害夫仁是以推本聖人之意直斷其不仁以解害辭之惑也黃氏曰若知心馳於外務以悅人者之非仁則反而求之存乎內而無私當理者即仁也愚謂程子以知為言蓋不先知之則未有能行之者也人皆知何者為仁何者為非仁禁其非仁而勉其仁則庶幾矣曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎省悉井反為去聲傳平聲曾子孔子弟子名參字子輿魯人盡己之謂忠語録曰盡己只是盡自家之心不要有一毫不盡如為人謀一事須直與他說這事合做與否若不合做則直與說這事決然不可為不可說道這事恐也不可做或做也不妨此便是不盡又曰須是盡自家伎倆與他思量便盡己之心如鳥喙是殺人之藥須向他道是殺人不得說道有毒又曰須是十分盡得方始是盡若七分盡得三分未盡也是不忠以實之謂信語録曰以用也又曰如甲謂之甲乙謂之乙信也以甲為乙則非信矣又曰有這事說這事無這事須說無便是信或問盡己之謂忠以實之謂信曰盡己之心而無隱所謂忠也以其出乎內者而言也以事之實而無違所謂信也以其驗乎外者而言也然未有忠而不信未有信而不出於忠者也陳氏曰盡己是盡自家心裏面以所存主者而言以實是就言上據此實說忠信非判然二物從內面發出無一不盡是忠發出外來皆以實是信傳謂受之於師習謂熟之於已黃氏曰既傳矣必熟之使之該通而無毫髮之窒也不習則雖曰傳之而未嘗實得於心也曾子以此三者日省其身有則改之無則加勉其自治誠切如此可謂得為學之本矣黃氏曰曾子日日以此三者省察其身是其自治篤實而懇切也為學之本在於檢身曾子之自省如此是得為學之本又曰曾子此章固足以見其嚴於自治而所以自治者又見其皆出於誠蓋不極乎誠則凡所作為無非茍簡滅裂豈足以盡人事之當然而合天理之本然哉輔氏曰省者思而有所檢察之謂曾子以此三事日加省察有則便與他理㑹了改之無則又加勉厲以持守之而不使之竊發則其終自治工夫可謂至誠懇切矣而三者之序則又以忠信為傳習之本也語録曰人若不忠信更無可得說傳箇甚底習箇甚底尹氏曰曾子守約故動必求諸身語録曰守約是於朴實頭處用功又曰守約不是守那約言所守者約耳輔氏曰曽子資質魯鈍故其為學不外騖不泛求凡事只向自己身心上著工夫檢察修治謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曾子之學專用心於內故傳之無弊觀於子思孟子可見矣惜乎其嘉言善行不盡傳於世也其幸存而未泯者學者其可不盡心乎輔氏曰所謂用心於內故其傳無弊警䇿學者尤為有功然其所謂用心於內者亦非息心絶念屏棄外事之謂但當常存是心不可放失子曰道千乘之國敬事而信節用而愛人使民以時道乘皆去聲道治也或問道之為治曰道者治之理也以為政者之心而言也曰然則曷為不言治曰治者政教法令之為治之事也夫子之所言者心也非事也陳氏曰治其事也以政言道其理也以為政者之心言其目五者則皆其心之所存而未及為政乃所以為政之本也千乘諸侯之國其地可出兵車千乘者也輔氏曰古注馬氏曰司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成出革車一乘然則千乘之賦其地千成居地方三百一十六里有畸唯公侯之封乃能容之包氏曰千乘之國者百里之國也古者井田方里為井井十為乘百里之國適千乘也融依周禮包依王制敬者主一無適之謂語録曰主一只是心專一不以他念亂之無適只是不走作問敬事而信疑此敬是小心畏謹之謂非主一無適之謂曰遇事臨深履薄而為之不敢輕不敢慢乃是主一無適陳氏曰主一是心只在此所主惟一不二不三無適是心只在此亦不之東亦不之西亦不之南亦不之北然主一即是無適只展轉相解釋要分明非於主一之外又别有無適之功也詳見大學疏敬事而信者敬其事而信於民也輔氏曰一國之事多矣為其事者固當主一無適又當有始有終而使人信之也胡氏曰發於我者敬則施於人者信故謂之敬其事而信於民也黃氏曰信雖在己而驗於外所行在己而人見其可信故曰信於民也時謂農隙之時輔氏曰左傳農隙杜氏注謂各隨時事之間是也言治國之要在此五者亦務本之意也語録曰問學而一篇多務本之意獨此章言及為政曰此便是為政之本若無此基本如何做去黃氏曰但言所存而未及治具故曰務本輔氏曰前四章是為學之本此五者是治國之本也程子曰此言至淺然當時諸侯果能此亦足以治其國矣聖人言雖至近上下皆通此三言者若推其極堯舜之治亦不過此若常人之言近則淺近而已矣語録曰問聖人之言兼通上下曰聖人說得自别便是大賢說話也自是不及聖人如這五事衆人豈不見得但說時定是别有關竅決不及聖人也輔氏曰此三語平易明白無甚髙難行之事而聖人所以治天下之道實不外此當時諸侯果能奮然用力行之則國必可治不必舍己而求人也又自此而推之而至於內外兩全本末具舉則堯舜之治天下誠不過此矣又曰聖人於天下事理洞照無遺其發而為言自然包括得盡故能小大高下皆宜而前後左右之不相悖所以上下皆通常人之見則明於小者或蔽於大得其一說者不知其又有一說故其言近時便則淺近而已矣此內外之符也然學者亦不可徒歎聖人之言包括得廣大如此又須實見得雖堯舜之治亦不過五者之意方可爾楊氏曰上不敬則下慢不信則下疑下慢而疑事不立矣敬事而信以身先之也易曰節以制度不傷財不害民蓋侈用則傷財傷財必至於害民故愛民必先於節用然使之不以其時則力本者不獲自盡雖有愛人之心而人不被其澤矣然此特論其所存而已未及為政也茍無是心則雖有政不行焉楊氏名時延平人語録曰楊氏最說得好須看此五者是要緊古先聖王所以必如此者蓋有是五者而後上之意接於下下之情方始得親於上上下相關方始可以為治若無此五者則君抗然於上而民不知所向有此五者方始得上下交接問未及為政今觀使民以時又似為政曰孟子說不違農時只言王道之始末大段是政事輔氏曰朱子正解此一句之義故以敬主於事而言信主於民而言楊氏則推言其反此之弊故曰上不敬則下慢不信則下疑兩說相須其義始備問此章似皆就政事上說集注謂此特論其所存未及為政永嘉陳氏曰治國有刑政禮樂紀綱文章萬日皆當開張此條且論他存心處乃為政之本其他未暇及胡氏曰凡此數者又皆以敬為主胡氏名寅建安人語録曰大事小事皆要敬若是敬時方解信與愛人節用使民若是不敬則其他都做不得陳氏曰敬者萬事之根本為信而不敬則出令必茍而不能確定矣節用而不敬則所節必茍而不以制度矣愛人而不敬則所愛必茍而不免姑息矣使民而不敬則所使必茍而不復計其勞逸矣愚謂五者反復相因各有次第讀者宜細推之語録曰五者相因只消從上順說人須是事事敬方㑹信才信便當定如此若恁地慢忽便沒十成今日恁地明日不恁地到要節用今日儉明日奢便不是節用不㑹節用便急征重斂如何得愛民既無愛民之心如何自㑹使民以時這是相因之說又一說雖則是敬又須著信於民只恁地守箇敬不得雖是信又須著務節儉雖㑹節儉又須著有愛民之心終不成自儉嗇而愛不及民雖則是愛民又須著課農桑不奪其時子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文弟子之弟上聲則弟之弟去聲謹者行之有常也信者言之有實也輔氏曰謹謂所行不放縱不放縱則有常矣信謂所言不虛妄不虛妄則有實也泛廣也衆謂衆人親近也仁謂仁者語録曰仁者自當親其他自當泛愛蓋仁是箇生底物便具生之理發出來便是愛才是交接之際便須自有箇恩意如何漠然無情得聖人說出話兩頭都平若不說親仁則又流於兼愛矣餘力猶言暇日輔氏曰此只是行此數事之外有餘底工夫以用也文謂詩書六藝之文語録曰詩書是大槩說詩書六藝是禮樂射御書數黃氏曰古人言文蓋指乎此非世俗華藻之文也程子曰為弟子之職力有餘則學文不修其職而先文非為己之學也輔氏曰程子順文解義可謂得聖人之㫖矣凡說經者要當如此尹氏曰德行本也文藝末也窮其本末知所先後可以入德矣語録曰此論本末先本後末今人只是先去學文須是驗平日果能孝弟恭謹誠信愛衆親仁乎如此了方學文此五句又以孝弟為本不孝則不能弟不孝而能弟弟亦何用不孝不弟縱行謹言信愛衆親仁亦何用輔氏曰孝弟謹信愛衆親仁所謂德行也必先行此而有餘力然後用以學詩書六藝之文則其文也適足以成其質其博也適足以養其心此大學所以貴於能窮其本末知所先後也又曰大學所言體面闊故曰近道此但言弟子之職體而敕小故曰可入德必能入乎德然後能近道也又曰尹氏推說其言外之意而得其㫖洪氏曰未有餘力而學文則文滅其質有餘力而不學文則質勝而野洪氏名興祖丹陽人輔氏曰洪氏推說其反此之弊愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於私意非但失之於野而已語録曰問六藝如何考究得成法曰如禮樂須知所以為禮樂者從此上推將去如何不可考成法緣今人都無此學所以無考究處然今詩書亦可考或前言往行亦可考如前輩有可法者都是人須是知得古人之法方做不錯若不學文任意自做安得不錯只是不可先學文耳又曰若不學文則無以知事理之當否如為孝為弟亦有不當處如孝於事親然事父之敬事母之愛便别了胡氏曰言學文則能考聖賢之成法識事理之當然者固以補洪氏之所未及亦恐人因是而緩於為學也愚謂尹氏以文對德行有本末先後之分說得文字輕洪氏以文對質而言不可偏勝說得文字差重朱子以學文為致知與力行為對謂所知不明則所行不當於理說得文字極重三者互相發明蓋但知文之為輕而不知其為重則將有廢學之弊故不得不交致抑揚之意然德固不可以一日而不修而學亦不可一日而不講也子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣子夏孔子弟子姓卜名商衛人賢人之賢而易其好色之心好善有誠也輔氏曰好賢與好色皆人之本心也但好賢之心終不若好色之心為至今能賢人之賢而易其好色之心是為誠於好賢也愚謂舊說作變易其顔色如此却是虛僞故此說見敬賢無二心致猶委也委致其身謂不有其身也語録曰一如送這身與他便看他將來如何使輔氏曰死生勞逸惟君所命不敢自有其身而為避就也四者皆人倫之大者而行之必盡其誠學求如是而已愚謂經文只有事父事君交友三者為人倫之目而集注以四者言蓋賢賢亦朋友之倫也故子夏言有能如是之人茍非生質之美必其務學之至雖或以為未嘗為學我必謂之己學也語録曰問為學之道只要就人倫上做得是當今既能如此雖或以為未學我必以為已學曰畢竟是曾學未學曰集注所謂非其生質之美必其務學之至曰是又曰資質好底也㑹恁地向學也只是理㑹許多事游氏曰三代之學皆所以明人倫也能是四者則於人倫厚矣學之為道何以加此子夏以文學名而其言如此則古人之所謂學者可知矣故學而一篇大抵皆在於務本游氏名酢建安人輔氏曰古人之學明人倫而已自舜命司徒以教民則既有成說矣此其為學之本也人能務此四者又行之必盡其誠而無一毫勉强不得已之意則其於人倫既明且篤矣學之道豈有過於此者乎吳氏曰子夏之言其意善矣然詞氣之間抑揚太過其流之弊將或至於廢學必若上章夫子之言然後為無弊也吳氏名棫建安人語録曰聖人之言由本反末先後有序其言平正無險絶之意子夏則其言頽側而不平正險絶而不和易狹隘而不廣大故未免有弊然子夏之意欲人務本不可謂之不是但以夫子之言比之則見其偏又曰世間也有資稟髙㑹做許多事底但子夏此兩句被他說殺了所以謂其言之有弊胡氏曰以未學為生質之美者人固有得氣之清而所為與理暗合然質之美有限而學之益無窮故吳氏又慮其抑揚之有偏也子曰君子不重則不威學則不固重厚重威威嚴固堅固也輔氏曰厚重以質言威嚴以見於外者言堅固以存諸中者言輕乎外者必不能堅乎內故不厚重則無威嚴而所學亦不堅固也輔氏曰人之資質若不厚則見於外者必無威嚴之可畏存諸中者必不能堅固而不忘此乃氣志表裏必然之符也學者當於言行容貌之間常自警覺不可稍有忽易主忠信人不忠信則事皆無實為惡則易為善則難輔氏曰善所固有本實而易為惡自外來本虛而難為然人不忠信則事皆無實故於虛者反易而於實者反難也故學者必以是為主焉語録曰主字最重凡事靠他做主陳氏曰主與賔相對賔是外人出入無常主人是吾家之主常存在屋裏主忠信是以忠信為吾心之主是心中常要忠信蓋無時而不在是也心中所主者忠信則其中許多道理便都實在這裏若無忠信則一切道理都虛了主字下得極有力程子曰人道唯在忠信不誠則無物且出入無時莫知其鄉者人心也若無忠信豈復有物乎語録曰物只是眼前事物都唤做物若誠實方有這物若口裏說莊敬肚裏自慢忽口裏說誠實肚裏自狡僞則所接事物還似無一般須是實見得是實見得非截定而不可易方有這物且如欲為善又有箇為惡意思這只是不實如何㑹有物又曰凡應于事物之來皆當盡吾誠心以應之方始是有這箇物事且幹一件事自家心不在這上這一事便不成便是沒了這事如讀書自家心不在此便是沒這書又曰心無形影惟誠時方有這物事今人做事若初間有誠意到半截後意思懶散謾做將去便只是前半截有物到半截後無了若做到九分這一分無誠意便是一分無物輔氏曰人有為人之道自天地儲精而為人則實理具焉故人道惟在忠信不誠則無物言人不忠信則渾是虛妄雖有人之形而無人之實也真氏曰論語止言忠信不言誠至子思孟子始言誠程子於此乃合忠信與誠而並言之蓋誠指全體而言忠信指用功處而言盡得忠與信即是誠故孔子雖不言誠但欲人於忠信上著力忠信無不盡則誠在其中矣孔子教人大抵只就行處說行到盡處自然識得本原無友不如己者無毋通禁止辭也友所以輔仁不如己則無益而有損語録曰交朋友須求有益若不如我者豈能有益仍是朋友才不如我時便無敬畏之意而生狎侮之心如此則無益過則勿憚改勿亦禁止之辭憚畏難也自治不勇則惡日長故有過則當速改不可畏難而茍安也程子曰學問之道無他也知其不善則速改以從善而已語録曰最要在速字上著力過愈深則善愈微若從今日便改則善可自此而積今人只是憚難過了日子真氏曰過雖聖賢不能無知其為過而速改則無矣蓋無心而誤則謂之過有心而為則謂之惡不待别為不善方謂之惡只如過不改是有心便謂之惡愚謂改者併其通體而更為之也程子曰君子自修之道當如是也輔氏曰此蓋舉一章言之所以教學者做工夫其事密矣游氏曰君子之道以威重為質而學以成之學之道必以忠信為主而以勝己者輔之然或吝於改過則終無以入德而賢者亦未必樂告以善道故以過勿憚改終焉輔氏曰威由重而後有先言威者便文耳又曰茍未至於聖人孰能無過儻或畏難而茍安則過益以大志益以昏不惟勝己之友將舍我而去而忠信之德亦無以自進矣故以過勿憚改終焉要之自始學至於成德唯改過為最急曾子曰愼終追逺民德歸厚矣慎終者喪盡其禮追逺者祭盡其誠語録曰是専主喪祭而言若把得喪祭事重時亦自不易只就喪祭上推亦是多少事輔氏曰自殯至葬附於身與棺者必誠必信勿之有悔以至凡喪親之禮已所得為者舉無違焉則可謂喪盡其禮矣自考妣而丄及於曾髙自一廟而上至於七廟推而極於王者之禘祫必如是而後於心為無慊凡己之所得祭者無不舉焉則可謂祭盡其誠矣民德歸厚謂下民化之其德亦歸於厚葉氏曰謂感化於下風俗醇美莫不有孝愛之行蓋終者人之所易忽也而能謹之逺者人之所易忘也而能追之厚之道也故以此自為則己之德厚下民化之則其德亦歸於厚也文集曰問此章止為化民不見有自為之意曰慎終追逺自是人所當然不為化民而後為之也故已德厚而民德亦歸趨之雖不明言然味其間隱然有此意也黃氏曰親之終也人子悲痛之情切而於恭敬之意常不足親之逺也人子恭敬之意勝而思慕之情疏故又以其所不足者言之謹謂謹而不忽追謂念而不忘輕忽遺忘此薄俗之常情於人所易忽易忘者亦未嘗輕忽遺忘焉則加於人一等矣是則厚德之人也民安得不化而趨於厚哉子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與之與之與平聲下同子禽姓陳名亢陳人子貢姓端木名賜衛人皆孔子弟子或曰亢子貢弟子未知孰是輔氏曰或以陳亢為子貢弟子此以論語中所載三章推之蓋兩章問於子貢一章問於伯魚皆無請問於夫子之事故也家語收陳亢在孔子弟子中而史記七十二子傳却無故兩存之抑反語辭子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求與溫和厚也真氏只和一字不足以盡溫之義只厚一字亦不足以盡溫之義必兼二字者和如春風和氣之和厚如坤厚載物之厚和不慘暴也厚不刻薄也良易直也語録曰易平易和易直無屈曲又曰易乃坦易之易直如世人所謂白直之直無姦詐險詖底心如所謂開口見心是也恭莊敬也真氏曰莊主容貌而言敬主內心而言自中而發外故曰恭儉節制也語録曰儉謂節制非儉約之謂只是不放肆常收斂之意黃氏曰節刮只是有界限不侈縱真氏曰節制二字相似而實不同節乃自然之限節且如一年有八節四立二分二至是也四十五日而一換乃天道自然之界限制乃用力裁制之意讓謙遜也真氏曰謙謂不矜己之善遜謂推善以及人五者夫子之盛德光輝接於人者也其諸語辭也人他人也言夫子未嘗求之但其德容如是故時君敬信自以其政就而問之耳非若他人必求之而後得也語録曰最要看得此五字是如何氣象體之於義則見得聖人有不求人而人自來就問底意思聖人過化存神之妙未易窺測然即此而觀則其德盛禮恭而不願乎外亦可見矣學者所當潛心而勉學也黃氏曰過謂身所經歷化謂人無不從存謂心所存主神謂意無不達所謂立之斯立道之斯行綏之斯來動之斯和是也曰存神過化則不待見於容貌而人服之又曰德盛禮恭則禮之所以恭者又未嘗無其本也觀其言引而不發味其意則若有所不足於子貢之云者其㫖深矣學者玩味而有得焉則有以見聖人正大之情而不流於卑諂之私矣謝氏曰學者觀於聖人威儀之間亦可以進德矣若子貢亦可謂善觀聖人矣亦可謂善言德行矣今去聖人千五百年以此五者想見其形容尚能使人興起而况於親炙之者乎輔氏曰有是德然後有是威儀內外之符也故學者觀於聖人威儀之間亦可以進己之德又曰世雖有先後人雖有智愚然理義之在人心則無間也故學者能以是五者想見聖人之形容則皆興起向慕有不能自已者况於親見聖人之威儀親陶聖人之神化則其成德達才又當如何哉永嘉陳氏曰此最善形容處如畫出一夫子若張而大之却與聖人不相似也愚謂集注過化存神未易窺測之語與謝氏三亦字皆微寓抑揚意子貢特舉聖人可親之一節而未及其全體歟張敬夫曰夫子至是邦必聞其政而未有能委國而授之以政者蓋見聖人之儀刑而樂告之者秉彛好德之良心也而私欲害之是以終不能用耳張氏名栻廣漢人輔氏曰好德之心固有而易發私欲之害蔽深而難除此所以夫子至是邦必聞其政而未有能委國而授之以政者也子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣行去聲父在子不得自專而志則可知父沒然後其行可見故觀此足以知其人之善惡語録曰父在時使父賢而子不肖雖欲為不肖之事猶以父在而不敢為然雖無甚不肖之行而其志可知矣使子賢而父不肖雖欲為善事而父有所不從時有勉强而從父之為者此雖未見其善行而要其志之所存則亦不害其為賢矣至於父沒則已自得為於是其行之善惡可於此而見矣父在時子非無行也而其所主在志父沒時子非無志也所主在行永嘉陳氏曰舊說父在觀其父之志父沒觀其父之行若如此說連下面三年無改於父之道可謂孝矣說不通蓋才說孝便主子說了所以上面志與行都就子邊說然又必能三年無改於父之道乃見其孝不然則所行雖善亦不得為孝矣輔氏曰就其事上言雖可謂之善就其心上言則不得為孝矣尹氏曰如其道雖終身無改可也如其非道何待三年然則三年無改者孝子之心有所不忍故也游氏曰三年無改亦謂在所當改而可以未改者耳或問尹游氏之說曰尹氏得其用心之本游氏得其制事之宜二說相須為不可易矣曰必若尹游之說則夫子之言得無有所不盡者乎曰為人子者本以守父之道不忍有改為之心至有所遇之不同則隨其輕重而以義制之耳三年而改者意其有為而言也其不可改則終身不改固不待言其不可以待三年者則又非常之變亦不可預言矣善讀者推類而求之或終身不改或三年而改或甚不得已則不待三年而改顧其所遇之如何但不忍之心則不可無耳語録曰尹氏說得孝子之心未說得事若如其說則孔子何必更說三年無改必若游氏說則說得聖人語意出葉氏曰須思當改而可以未改是多少舍容精微意思若說大段有害於物不待三年此是在上位者關繫民物如元祐欲改新法之類不容不改若其他未至於大害當常存不忍之心可也永嘉陳氏曰事變隨宜雖孝子繼父豈能無當改處但方哀戚之中雖所當改亦未暇改蓋哀戚之心有以勝之耳有子曰禮之用和為貴先王之道斯為美小大由之禮者天理之節文人事之儀則也語録曰節者等級也文不直回互之貌又曰文是裝裹得好如升降揖遜黃氏曰朱子於仁禮義之訓皆以本心未發之體而言蓋已發則為惻隱恭敬羞惡而不謂之仁禮義矣仁曰心之德禮曰天理之節文義曰心之制此皆即心之體而形容其理也仁曰愛之理禮曰人事之儀則義曰事之宜此皆因其見於用者以形容其體也雖若各有二義其實愛之理所以為心之德人事之儀則所以為天理之節文事之宜所以為心之制也又曰天理之節文此是從裏說人事之儀則此是從外說又曰且如天子十二章上公九章各有等數此是節若山龍華蟲之類為飾此是文如下不敢僭上諸侯當用九章則安用十二章則不安此是天理自然處如冠如婚此是人事若冠禮裏面有三加揖遜升條處此是儀若天子冠禮則當如何諸侯則當如何嫡子則如何衆子則如何各有則樣此是則處則如曰恰好陳氏曰四字相對說節則無太過文則無不及則定法也儀在外有可觀則在內有可守又曰如做事太質無文彩是失之不及末節繁文太盛是流於太過天理之節文乃其恰好處便是理合當如此更無太過更無不及又曰天理只是人事中之理而具於心者也天理在中而著見於事人事在外而根於中天理其體而人事其用也儀謂容儀而形見於外者有粲然可象底意與文字相應則謂法則凖則是箇骨子所以存於中者有確然不易底意與節字相應文而後儀節而後則必有天理之節文而後有人事之儀則須兼此二者意乃圓備胡氏曰以其本於性分而言則曰天理之節文以其見於日用而言則曰人事之儀則節即則文即儀隨所寓而互言之也輔氏曰節是品節文是文理儀是威儀則是法則就理上言故曰節文就事上言故曰儀則天理之節文是自內說向外人事之儀則自外說向內天理之節文所以為人事之儀則也和者從容不迫之意語録曰只是說行得自然如此莫教有牽强底意思便是從容不迫那禮中自有箇從容不迫不是有禮後更添箇從容不迫若離了禮說從容不迫便是自恣胡氏曰以和為從容不迫者無勉强矯拂之態而有安詳容與之意也𥚹急局促則非和矣禮中自有從容氣象非禮之外又加從容也蓋禮之為體雖嚴而皆出於自然之理故其用必從容而不迫乃為可貴黃氏曰禮之體主於嚴者以其天髙地下萬物散殊分之一定而不可移也禮主於嚴則心不可不敬貌不可不莊也所以不和者恐懼拘迫而無從容之意耳然禮之嚴皆本於自然則是不容不敬不容不莊非有所强而為之尚何恐懼拘迫之有惟不知其出於自然故若出於人為而不敢不然者是以不能從容而不迫也輔氏曰天理之節文人事之儀則固有截然而不可亂者是其體之嚴也然其所以然者非故為是以强世矯俗也蓋亦本於自然之理而已惟其出於自然之理故其為禮必從容和緩而無急迫勉强勞苦之意乃可為貴先王之道此其所以為美而小事大事無不由之也有所不行知和而和不以禮節之亦不可行也承上文而言如此而復有所不行者以其徒知和之為貴而一於和不復以禮節之則亦非復理之本然矣所以流蕩忘反而亦不可行也黃氏曰知其從容而不迫之為貴矣而一於和則心之敬者或怠矣貌之莊者或慢矣而吾又不能以禮之本然者約而歸於莊且敬焉則流蕩放肆其與恐懼拘迫者均於不可行也輔氏曰體嚴而用和則禮固可貴而可由矣然如此而亦有不可行者蓋以人情便於和而憚於嚴茍徒知以和為貴而遂一於用和逐末忘本而不知以禮節止之則又失其自然之理而隨於私欲必至於流蕩而亦不可行也程子曰禮勝則離故禮之用和為貴先王之道以斯為美而小大由之樂勝則流故有所不行者知和而和不以禮節之亦不可行語録曰問既云離與流則不特謂之勝禮樂已亡矣曰不必如此說正好就勝字上看只爭這些子禮才勝些子便是離了樂才勝些子便是流了知其勝而歸之中即是禮樂之正不可云禮樂已亡也輔氏曰此章自舊以有所不行一句承上文說至程子方截得分明只以禮勝則離樂勝則流兩句觀之便自可見程子於本文只添了一箇以字一箇而字一箇者字兩箇故字而一章之㫖自然分明永嘉陳氏曰禮之和處便是樂所謂行而樂之樂也故以樂字襯貼和字非謂禮之外别取一物來解和也真氏曰以其太嚴而不通乎人情故離而難合以其太和而無所限節則流蕩忘返所以冇禮須用有樂有樂須用有禮此禮樂且是就性情上說然精粗本末亦初無二理范氏曰凡禮之體主於敬而其用則以和為貴敬者禮之所以立也和者樂之所由生也若有子可謂達禮樂之本矣范氏名祖禹成都人文集曰和固不可便指為樂然乃樂之所由生語録曰自心而言則心為體敬和為用以敬對和而言則敬為體和為用大抵體用無盡時只管恁地移將去輔氏曰程子論禮樂之弊范氏原禮樂之本胡氏曰程子范氏以和為樂又禮中之樂也愚謂嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣輔氏曰禮之體則嚴其用則和而人之於禮則當嚴而不失其泰和而不失其節不倚於一偏不昧於全體則無處而不可行矣陳氏曰禮之體嚴而用和本非判然不相入其嚴也無不泰而所謂和者中已具豈復有勝而離其和也無不節而所謂嚴者未嘗失豈復有勝而流必如是然後得性情之正而為禮之全也若稍過中而流於一偏則其不可行均矣豈但和之流然後為不可行哉蔡氏曰有子専以禮之用為言朱子兼以禮之體為言論禮之用固以和為貴論禮之體則禮中本有自然之和若謂知和而和不以禮節之則禮與和成二物矣此朱子所以因有子言禮之用而以禮之體發其所未發也真氏曰嚴而泰即禮中有樂和而節即樂中有禮有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也近逺皆去聲信約信也黃氏曰前所謂以實之謂信事之己見而以其實也此所謂約信與人期約而求其實者也故雖皆不出于實而其言不同若亦以事之己見者言之非謹之於始之意也輔氏曰此信字本是約信若只是誠信之信則信是實理豈有不近義者哉義者事之宜也語録曰事之宜是指那事物當然之理復踐言也恭致敬也胡氏曰信為約信恭為致敬皆指人之行此而言非信恭之本體也禮節文也因猶依也宗猶主也言約信而合其宜則言必可踐矣或問此一節曰人之約信固欲其言之必踐也然其始也或不度其宜焉則所言將有不可踐者矣以為義有不可而遂不踐則失其信以為信之所在而必踐焉則害於義二者無一可也若約信之始而必求其近於義者焉則其言無不可踐而無二者之失矣語録曰約信而合其宜只是不妄發曰萬一料事不過則如之何曰這却無可奈何却是自家理不明耳致恭而中其節則能逺恥辱矣或問此一節曰致敬於人固欲其逺於恥辱然不合於節文則或過或不及皆所以自取恥辱惟致恭而必求其近於禮焉則其可逺恥辱也必矣語録曰且如見尊長而拜禮也我却不拜被詰問則無以答這便是為人所恥辱有一般人不當拜而拜之便是諂諛這則可恥可辱者在我矣問合其宜便是義中其節便是禮如何是近義近禮曰此亦大綱說如巧言令色鮮矣仁之意然只得近於義近於禮亦好若是便合其宜中其節更好所依者不失其可親之人則亦可以宗而主之矣或問此一節曰因之為依勢之敵而交之淺若諸葛亮之依劉表是也宗之為主彼尊我賤而以之為歸如孔子之於司城貞子蘧伯玉顔讎由是也所依而失其親若未甚害也所宗而失其親則其為害大矣然今日依之則後日有時而宗之是以君子之有所因也必求不失其親焉則異日所宗無失所親之患矣語録曰如夫子之於衛主顔讎由是則可親之人若主癰疽與侍人瘠環便是不可親之人此是教人接人底道理此言人之言行交際皆當謹之於始而慮其所終語録曰問恐言是約信行是致敬交際是依人曰大綱如此說皆交際也言可復便是行又曰此一章皆是言謹始之意只如初與人約便用思量他日行得方可諾之若輕諾之他日言不可復便害信也如合當在堂上却下堂被人非笑固是辱合當堂下却堂上被人斥罵亦是辱如此人不好初去親時似不害將來主其人便錯了須是始初揀擇見得好方可親他永嘉陳氏曰三事皆欲慮終而謹始不可一時茍且不然則因仍茍且之間將有不勝其自失之悔者矣語録曰因仍與茍且一樣字因仍猶因循茍且是且恁地做子曰君子食無求飽居無求安敏於事而愼於言就有道而正焉可謂好學也已好去聲不求安飽者志有在而不暇及也輔氏曰食欲飽居欲安人情之常也今食無求飽居無求安則是志有在而不暇及此矣敏於事者勉其所不足慎於言者不敢盡其所有餘也語録曰行常苦於不足言常苦於有餘又曰言底易得多便不敢盡行底易得不足故須敏然猶不敢自是而必就有道之人以正其是非則可謂好學矣語録曰有許多功夫不能就有道以正其是非也不得若無許多功夫雖欲正亦徒然凡言道者皆謂事物當然之理人之所共由者也文集曰道即理也以人所共由則謂之道以其各有條理而言則謂之理尹氏曰君子之學能是四者可謂篤志力行者矣然不取正於有道未免有差如楊墨學仁義而差者也其流至於無父無君謂之好學可乎語録曰楊墨只是差些子其末流遂至於無父無君蓋楊氏以世人營營於名利埋沒其身而不自知故獨潔其身以自高如荷蕢接輿之徒是也然使人皆如此潔身而自為則天下事教誰理㑹此便是無君也墨氏見世間人自私自利不能及人故欲兼天下之人而盡愛之然不知或有一患難在君親則當先救之在他人則當後救之若君親與他人不分先後則是待君親猶他人也此便是無父黃氏曰尹氏所謂篤志為不求安飽而言也所謂力行為敏事愼言而言也以是四字而繼之以集注不敢自是之言然後足以盡此章之㫖蓋此章謂之好學非篤志力行而不自是亦無以見其所以為好也子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也樂音洛好去聲諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病輔氏曰為貧所勝則氣隨以歉而為卑屈故多求而諂為富所勝則氣隨以盈而為矜肆故有恃而驕無諂無驕則知自守矣而未能超乎貧富之外也語録曰無諂無驕此就貧富裏用功凡曰可者僅可而有所未盡之辭也語録曰聖人只云可也蓋可也時便也得了只是比他樂與好禮者自分明爭一等樂則心廣體胖而忘其貧好禮則安處善樂循理亦不自知其富矣語録曰若為貧而樂與富而好禮便是不能超貧富了樂自不知有貧好禮自不知有富輔氏曰心廣體胖者指其樂之之象安處善樂循理者論其好禮之實子貢貨殖蓋先貧後富而嘗用力於自守者故以此為問而夫子答之如此語録曰問先貧後富則是亦嘗如後世之生産作業矣曰怕是如此聖人既說貨殖須是有些如此看來子貢初年也是把貧與富煞當事了蓋許其所已能而勉其所未至也語録曰子貢於此煞是用工夫了聖人更進他上面一節以見義理不止於此然亦不止於就貧富上說凡講學皆如此天下道理更䦚在子貢曰詩云如切如磋如琢如磨其斯之謂與磋七多反與平聲詩衛風淇澳之篇言治骨角者既切之而復磋之治玉石者既琢之而復磨之治之已精而益求其精也或問切磋琢磨之别曰古之工事不可考也以今言之則治骨角者切以刀磋以鑢治玉石者琢以錐鑿而磨以沙石也大抵切琢成形磋磨入細以理觀之古今當亦不相逺耳真氏曰凡製物為器須切琢成形質了方可磋磨既切琢了若不磋磨如何得他精細潤澤子貢自以無諂無驕為至矣聞夫子之言又知義理之無窮雖有得焉而未可遽自足也故引是詩以明之語録曰所謂義理無窮者不是說樂與好禮自是說切磋琢磨處精而益精爾黃氏曰若謂無諂無驕為如切如琢樂與好禮為如磋如磨則下文告往知來一句便說不得切磋琢磨兩句說得來也無精采只是小小文義間要用理㑹子貢言無諂無驕孔子但云僅可而已未若樂與好禮子貢便知義理無窮人須就學問上做工夫不可少有得而遽止子曰賜也始可與言詩已矣告諸往而知來者往者其所已言者來者其所未言者黃氏曰此章須是見得切磋琢磨在無諂無驕樂與好禮之外方曉得所已言所未言前之問答蓋言德之淺深今之引詩乃言學之疏密葉氏曰若淺看切磋琢磨之語不過形容樂與好禮勝於諂驕而已既止就此二事說如何下一往字一來字往者是只就貧富二事告之是所已言若切磋琢磨是統形容學問工夫義理無窮一節髙一節一步闊一步此却是夫子未及說出所以謂之來者所未言子貢能解悟所以謂之知來愚案此章問答其淺深髙下固不待辨說而明矣然不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造道之極致亦不可騖於虛逺而不察切已之實病也語録曰固是要進然有第一步方可進第二步陳氏曰若安於無諂無驕而不求進於樂與好禮固為自畫然諂驕未去而曰吾欲樂與好禮則是又未嘗切琢而專事磋磨未免為虛躐矣子曰不患人之不已知患不知人也尹氏曰君子求在我者故不患人之不已知不知人則是非邪正或不能辨故以為患也輔氏曰尹氏說已得其意蓋人不知己其病在人己不知人其病在己君子之學為己故不暇病人之病而病已之病耳葉氏曰所謂求在我者此正為己之學不係人之知不知也不能知人若為士而取友則便辟善柔便佞者反親之直諒多聞者反疏之若為君而擇臣則巧言令色逢君之惡者反見愛守正不阿責難正救者反見惡其所關豈不大哉為政第二凡二十四章子曰為政以德譬如北辰居其所而衆星共之共音拱亦作拱政之為言正也所以正人之不正也輔氏曰此訓政字之義若三章政謂法制禁令云者則指政之實事而言之也德之為言得也得於心而不失也語録曰德是自家心下得這箇道理如欲為忠而得其所以忠如欲為孝而得其所以孝又曰凡人作好事只做得一件兩件亦只是勉强非是有得所謂得者謂其行之熟而心安於此也愚案舊說德者行道而有得於身今作得於心而不失不言身而言心心切於身也北辰北極天之樞也居其所不動也共向也言衆星四面旋繞而歸向之也或問北辰之為天樞曰天圓而動包乎地外地方而靜處乎天中故天之形半覆乎地上半繞乎地下而左旋不息其樞紐不動之處則在天南北之端焉謂之極者猶屋脊之謂極也然南極低入地三十六度故周回七十二度常隱不見北極髙出地三十六度故周回七十二度常見不隱北極之星正在常見不隱七十二度之中常居其所而不動其旁則經星隨天左旋日月五緯右轉更迭隱見皆若環繞而歸向之語録曰北辰乃天之北極天如水車北辰乃軸處水車動而軸未嘗動又曰北辰是那中間無星處些子不動是天之樞紐北辰無星緣人要取此為極不可無箇記認所以就其旁取一小星謂之極星天之樞紐如門簨子相似又似箇輪藏心藏在外面動這裏而心都不動問極星動否曰極星也動只是他近那辰後雖動而不覺今人以管去窺那極星見其動來動去只在管裏面不動出去向來人說北極便是北辰皆只說北極不動至本朝人方去推得是北極只在北辰邊頭而極星依舊動為政以德則無為而天下歸之其象如此語録曰不是欲以德去為政亦不是塊然全無所作為但德修於己而人自感化然感化不在政事上却在德上蓋政者所以正人之不正豈無所作為但人所以歸往乃以德耳故不待作為而天下歸之如衆星之共北極也程子曰為政以德然後無為語録曰此不是全然不為但以德則自然感化不見其有為之迹耳輔氏曰不能以德為政而遽欲無為則是怠惰弛廢而已以德為政則非不為也循天下之理而行其所無事所謂法制禁令固在其中矣范氏曰為政以德則不動而化不言而信無為而成所守者至簡而能御煩所處者至靜而能制動所務者至寡而能服衆輔氏曰范氏正推演程子之意至於曰化曰信曰成及御煩制動服衆云者則又併舉其效而言之蔡氏曰案集注凡三言無為非是泊然無為也蓋為政以德人自不見其有為之迹耳子曰詩三百一言以蔽之曰思無邪詩三百十一篇言三百者舉大數也蔽猶蓋也思無邪魯頌駉篇之辭凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已語録曰如正風雅頌等詩可以起人善心如變風刺淫等詩極不好可以使人知戒懼不敢做大段好詩是士大夫作一等刺詩只是閭巷小人作人讀好底詩固是知勸若讀不好底詩便悚然戒懼知得此心不可如此其所以如此者是知心之放所以讀詩者便思無邪也此詩之功用如此又曰情性是貼思正是貼無邪若好善惡惡皆出於正便㑹無邪若果是正自無虛僞自無邪若有時也自入不得胡氏曰因詩之言善而善心有所感發因詩之言惡而逸志有所懲創非作詩者乃讀詩者也或以為三百篇之詩其詞㫖皆出于思慮之正雖淫奔之詩亦以為刺奔者而作由此章之義不明故也蓋好善惡惡人之至情為善而發於歌詠則令聞益彰為惡而發於歌詠則遺臭益逺所以讀詩者因詩之善惡而有感發懲創之心也然其言微婉輔氏曰微謂隱微婉謂委曲蓋詩人作詩主於諷詠規諫故其言不直截說破而常有隱微委曲之意如凱風言孝但以自責而已不直言孝之當如何也北門言忠但以自歎而已不直言忠之當如何也餘皆可以類推且或各因一事而發語録曰如淫奔之詩只刺淫奔之事如暴虐之詩只刺暴虐之事求其直指全體則未有若此之明且盡者語録曰詩三百篇皆無邪思然但逐事無邪耳唯此一言舉全體言之又曰只是說思無邪一語直截見得詩教之本意是全備得許多零碎底意黃氏曰直指則非微婉矣全體則非一事矣直指故明全體故盡就人心之思而言其無邪故曰直指全體故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣黃氏曰三百篇之詩亦多矣而一言足以盡蓋其義辭約而理盡也程子曰思無邪者誠也語録曰程子非是不㑹說只著此二字不可不深思大凡看文字這般所在須教看得出思無邪誠也是表裏皆無邪徹底無毫髮之不正世人固有修飭於外而其中未必能純正惟至於思亦無邪斯可謂之誠輔氏曰誠者天所賦於人之實理在人則謂之實心即所謂全體也惟無一思之邪則是心無間斷無虧闕而可謂之誠矣范氏曰學者必務知要知要則能守約守約則足以盡博矣經禮三百曲禮三千亦可以一言蔽之曰毋不敬輔氏曰知要則便從要處做將去是謂守約既從要處做去則所知所行漸漸充拓開去自然能盡博此與博聞之博異博聞是從聞上說去此是從行上說去先博聞然後能知要守約能知要守約然後能盡博子曰道之以政齊之以刑民免而無恥道音導下同道猶引導謂先之也輔氏曰前章道千乘之國以道為治者指為治者之意思而言也此以道為引導者言以政與德引導乎民爾音雖同而義則異不可互也政謂法制禁令也輔氏曰法制禁令者皆為政之具也齊所以一之也道之而不從者有刑以一之也免而無恥謂茍免刑罰而無所羞愧蓋雖不敢為惡而為惡之心未嘗亡也語録曰道之以法制禁令是合下有猜疑關防之意故民不從又却齊之以刑民不見德而畏威但圖目前茍免於刑而為惡之心未嘗不在道之以德齊之以禮有恥且格禮謂制度品節也輔氏曰制度品節謂五禮之秩胡氏曰品者尊卑髙下之差節者界限等級之分格至也語録曰至是真箇有到處有勉强做底便是不至言躬行以率之則民固有所觀感而興起矣而其淺深厚薄之不一者又有禮以一之則民恥於不善而又有以至於善也語録曰淺深厚薄之不一本謂其間資稟信向不齊如此雖是感之以德自有不肯信向底亦有太過底故齊一之以禮須令他一齊如此所謂賢者俯而就不肖者企而及又曰觀感得深而厚者固好若其淺而薄者須是有禮以齊之則民將視吾之禮必恥於不善而至於善矣一說格正也書曰格其非心愚謂政者為治之具刑者輔治之法胡氏曰政者為治之具治之所不能無也刑者輔治之法刑以助政之所不及也德禮則所以出治之本而德又禮之本也輔氏曰禮即德之一端然以制度品節言之則與德有內外之辨本末之分也此其相為終始雖不可以偏廢然政刑能使民逺罪而已德禮之效則有以使民日遷善而不自知故治民者不可徒恃其末又當深探其本也輔氏曰政刑德禮之用雖有本末先後而實相終始不可偏廢而德禮必以效言者又當要之以久也責其應於一日之間蓋有不如政刑齊其迹之速者矣子曰吾十有五而志于學古者十五而入大學陳氏曰古者八嵗入小學至十五而後入大學心之所之謂之志或問志曰潛心在是而期於必至者志也語録曰如人要向箇所在處便是志陳氏曰之猶向也謂心之正面全向那裏去此所謂學即大學之道也或問大學之道曰格物致知誠意正心修身齊家治國平天下之道其說具于大學之篇矣志乎此則念念在此而為之不厭矣語録曰志學字最有力須是意念常在於學方得又曰今學者誰不為學只是不可謂之志于學果能志于學則自住不得如人當寒月自然向有火處去當暑月自然向有風處去事君便從敬上去事親便從孝上去直做教徹三十而立有以自立則守之固而無所事志矣語録曰立是心自定了事物不能動搖然猶是守住又曰志是要求箇道猶是兩件物事到立時便是腳下已踏著了又曰志方是趨向恁去求討未得到此則志盡矣無用志了問恐未有不惑而能守者曰此有三節自志學至於立是知所向而大綱把捉得定守之事也不惑是就把捉裏面理㑹得知之事也於此則能進自不惑至耳順是知之極也不踰矩是不待守而自固者守之極也陳氏曰謂有以自立於斯道之中已踐及實地而卓然無所跛倚所守者固而不為事物搖奪如富貴不能淫貧賤不能移威武不能屈是也至是則物格知至而意誠心正身修蓋已實得之在己而無所事乎志矣四十而不惑於事物之所當然皆無所疑則知之明而無所事守矣語録曰不惑是隨事物上見這道理合是如此又曰不惑則見得事自如此更不用守陳氏曰凡於事事物物之所當然大如君當止仁臣當止敬父當止慈子當止孝之類小如坐當如尸立當如齊視當思明聽當思聰之類皆洞識其綱條品節之實而一無所疑至此則豁然如大明中覩萬象所知者益明而無所事乎守矣五十而知天命天命即天道之流行而賦於物者乃事物所以當然之故也知此則知極其精而不惑又不足言矣語録曰天命處未消說在人之性且說是賦與萬物乃是事物所以當然之故如父之慈子之孝須知父子只是一箇人慈孝是天之所以與我者又曰知天命是知這道理所以然如父子之親須知其所以親只緣元是一箇人凡事事物物上須知他本原一線來處便是天命又曰問如何是所以當然之故曰如孝親弟長此當然之事推其所以然處因甚如此黃氏曰天命者天以其所做底道理而命與人如雨露天之仁霜雪天之義天底道理如此命與人亦如此只是自人觀之便且見得仁義是我所當然久之純熟精到方知得我所做底與天所命一同陳氏曰天命即天道之流行而賦於物者蓋專以理言而事物所以當然之故也如君之所以當仁臣之所以當敬父之所以當慈子之所以當孝坐之所以當如尸立之所以當如齊視之所以當思明聽之所以當思聰之類皆天之命我而非人之所為者吾皆知其根原所自來無復遁情至此則所知者又極其精而不惑又不足以言之矣六十而耳順聲入心通無所違逆知之之至不思而得也語録曰耳順是不思而得如臨事迎刃而解自然中節不待思索陳氏曰聲才入心即通是非判然更不待少致思而後得其理才容少思而後得則是內與外有相扞格違逆而不得謂之順矣如夫子聞滄浪之歌即悟自侮自伐之義是其順之證也至此則所知者又至熟而絶無人力矣即中庸所謂不思而得處也輔氏曰所知至極而精熟徹表徹裏故聲才入心便通其貫通神速之妙不假思惟而自得之也胡氏曰耳之所聽非用力之地一有聽聞而是非可否毫髮不能隱遁不待思惟而了然於胸次此知之至也七十而從心所欲不踰矩從如字從隨也矩法度之器所以為方者也隨其心之所欲而自不過於法度安而行之不勉而中也語録曰左來右去盡是這天理陳氏曰至此則心體瑩徹純是天理渾為一物凡日用間隨吾意欲之所之皆莫非天理大用流行而自不越乎法度之外所謂道心常為此身之主而人心一聽命矣即中庸所謂不勉而中地位也輔氏曰至此則心體渾淪全是義理無渣滓可化無表裏可言動容周旋從容中禮喜怒哀樂自然中節凡所動為皆隨心之所欲而莫非凖繩規矩之至此則聖人之道終矣程子曰孔子生而知之也言亦由學而至所以勉進後人也立能自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心所欲不踰矩則不勉而中矣或問程子於知命直以窮理盡性言之何也曰程子以理性命初非二物而有是言耳夫三者固非二物然隨其所在而言則亦不能無小分别蓋理以事别性以人殊命則天道之全而性之所以為性理之所以為理者也自天命者而觀之則性理云者小德之川流自性理者而觀之則天命云者大德之敦化也故自窮理盡性而知天命雖非有漸次階級之可言然其言之先後則亦不能無眇忽之間也又曰孔子自言其進德之序如此者聖人未必然但為學者立法使之盈科而後進成章而後達耳輔氏曰章謂文章著見達者足於此而通於彼也胡氏曰聖人之教亦多術然其要使人不失其本心而已欲得此心者惟志乎聖人所示之學循其序而進焉至於一疵不存萬理明盡之後則其日用之間本心瑩然隨所意欲莫非至理蓋心即體欲即用體即道用即義聲為律而身為度矣語録曰胡氏不失其本心一段極好儘用子細玩味聖人千言萬語許多說話只是要人收拾得箇本心不要失了日用間著力屏去私欲扶持此心出來理是此心之所當知事是此心之所當為不要埋沒了他可惜只如修身齊家治國平天下至大至小皆要此心為之人心皆自有許多道理不待逐旋安排入來聖人立許多節目只要人剔刮將自家心裏許多道理出來而已黃氏曰聖人身便是度不是以我身做箇權度去教人也輔氏曰一疪不存謂德性純粹萬理明盡謂心體昭融學至於聖人則渣滓化盡體用一源心即是體欲即是用體即是道用即是義聲即天地中和之聲自然可以為律身即天地正大之體自然可以為度也莆田黃氏曰心體欲用道義皆一也以其渾然在內如有所立而言則曰體以其由體而發於外萬變不窮則曰用道便是言所以具是而有是體者義是言所以隨事而當於用者人惟心有所放則雖有是心而非其本然之體非本然之體則非道矣欲有所私則雖未嘗無用而非其本然之用非本然之用則非義矣故學至於從心所欲不踰矩則心即其體欲即其用體即其道用即其義乃言功夫到此各得其本則也又曰聖人言此一以示學者當優游涵泳不可躐等而進一以示學者當日就月將不可半途而廢也輔氏曰學者之病二曰亟曰怠而已方其亟也則務强探力取躐等而進及其怠也則又先獲效計功半途而止二者皆由等級不明私意橫出反復相因此所以終不能有所成也今聖人為之明著其次序而又以身處之使學者知夫聖人之學猶且循序而進有始有卒如此吾其可亟乎吾其可怠乎亟心亡則能優游涵泳於義理之中怠心亡則能日就月將於緝熙之地而忽不自知其人於聖賢之域矣愚謂聖人生知安行固無積纍之漸然其心未嘗自謂已至此也是其日用之間必有獨覺其進而人不及知者故因其近似以自名欲學者以是為則而自勉非心實自聖而姑為是退託也語録曰聖人此語固是為學者立法然當初必亦是有這般意思聖人自覺見冇進處故如此說黃氏曰聖人生知安行之資固無待於學而其為學也亦何待於十年十五年而後一進邪曰天下之理惟其知之深言之篤而後好之切常人之所以不切於好學者以其不知夫學之味也聖人生知安行有見夫義理之在人不啻如飢食渴飲之急則夫知而必學學而必好者此其所以為聖人也十年十五年而後一進亦聖人之心至此而自信耳學雖已至而不敢自信必其反覆參驗有以見其必然而無疑然後有以自信焉說者以為聖人立法謙辭以勉人則聖人皆是架空虛誕之辭豈聖人正大之心哉故集注雖以勉人為辭而又以獨覺其進為說亦可見矣輔氏曰聖人生知安行豈有積纍之漸今乃云然則知聖人之意必有為也故程子以為勉進後人為學者立法耳雖是如此然却不是心實自聖謂已自不消如此說姑為學者設此言故集注於章末詳言之後凡言謙詞之屬意皆放此孟懿子問孝子曰無違孟懿子魯大夫仲孫氏名何忌無違謂不背於理輔氏曰事物各有箇當然之道理不可違背樊遲御子告之曰孟孫問孝於我我對曰無違樊遲孔子弟子名須御為孔子御車也孟孫即仲孫也夫子以懿子未達而不能問恐其失指而以從親之令為孝故語樊遲以發之輔氏曰夫子但言無違而已自非善學通倫類豈能知其為不違於理也懿子既不能問則將執此二字不顧義理唯親意之是徇唯親令之是從既陷其親於不義而又陷其身於不孝矣樊遲則知學者其必能問而辨之故夫子特語之以發其問樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮生事葬祭事親之始終具矣禮即理之節文也輔氏曰理則指前所謂不違於理之理言也禮則生事葬祭之禮是先王據事物之理品節以成文使天下之人行之者也初言無違只是統言不可違背道理而已後舉生事葬祭而言則先王既有定制矣故直言以禮也人之事親自始至終一於禮而不茍其尊親也至矣黃氏曰若不合禮便是不以君子之道待其親便是違悖理義陳氏曰須熟究以禮事其親之正意始終一以禮事其親則為敬親之至矣然若何而為以禮事其親其中節文纎悉委曲多少事皆不可以不講也是時三家僭禮故夫子以是警之然語意渾然又若不專為三家發者所以為聖人之言也或問三家僭禮其有考乎曰三家殯而設撥則其葬也僭而不以禮矣祭而歌雍則其祭也僭而不以禮矣其事生之僭雖不可考然亦可想而知矣彼為是者其心豈不以為是足以尊榮其親而為莫大之孝夫豈知一違於禮則反置其親於僭叛不臣之域而自陷於莫大之不孝哉夫子因其問孝而知其有愛親之心故以此告之庶其有所感發而能自改也雖然聖人亦豈務為險語以中人之隱而脅之以遷善哉亦循理而言而物情事變自有所不得而遁焉爾嗚呼此其所以為聖人之言也歟語録曰聖人之言皆是人所通行得底不比他人說得只就一人面上做得其餘人皆做不得所謂生事葬祭須一于禮此是人人皆當如此然其間亦是警孟氏不可不知也蔡氏曰違禮亦多端有茍且事親而違禮者有因儉事親而違禮者有以僭事親而違禮者何可勝數詳味無違一語渾然皆涵蓄于其中其真聖人之言歟胡氏曰人之欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為者而已矣語録曰為其所得為只是合得做底諸侯以諸侯之禮事其親大夫以大夫之禮事其親便是合得做底然此句在人看如何孔子當初就三家僭禮上說較精彩在三家身上又切當初却未有胡氏說底意思就今論之有一般人因陋就簡不能以禮事其親又有一般人牽於私意却不合禮孟武伯問孝子曰父母惟其疾之憂武伯懿子之子名彘言父母愛子之心無所不至惟恐其有疾病常以為憂也人子體此而以父母之心為心則凡所以守其身者自不容於不謹矣豈不可以為孝乎愚謂集注下一凡字蓋不獨謹疾而已舊說人子能使父母不以其陷於不義為憂而獨以其疾為憂乃可謂孝亦通語録曰前說佳後說只說得一截蓋只照管得不義不曾照管得疾了子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎養去聲别彼列反子游孔子弟子姓言名偃吳人養謂飲食供奉也犬馬待人而食亦若養然言人畜犬馬皆能有以養之若能養其親而敬不至則與養犬馬者何異甚言不敬之罪所以深警之也或問父母至尊親犬馬至卑賤聖人之言豈若是之不倫乎曰此設戒之言也故特以其尊卑懸絶之甚者明之所以深著夫能養而不敬者之罪也胡氏曰世俗事親能養足矣狎恩恃愛而不知其漸流於不敬則非小失也子游聖門高弟未必至此聖人直恐其愛踰於敬故以是深警發之也輔氏曰胡氏發明至明切且養則不必能敬敬則必不至於不能養也但以能養為孝則亦易流於不敬私愛或勝而正理失禮法不足而瀆嫚生其害有不可勝言者記曰仁人事親如事天則事親其可徒愛而不知敬乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎食音嗣色難謂事親之際惟色為難也語録曰人子胸中才有些子不愛於親之意便有不順氣象此所以愛親之色為難食飯也先生父兄也饌飲食之也曾猶嘗也蓋孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容故事親之際惟色為難耳服勞奉養未足為孝也黃氏曰事親之道非貴於聲音笑貌也而以色為難者色非可以强為也非其真有深愛存乎心惟恐一毫怫其親之意者安能使愈婉之狀貌見於面顔哉舊說承順父母之色為難亦通胡氏曰舊說添承順父母四字於本文之首不若専以孝子之容色為言則為依文解義而意味轉深長也程子曰告懿子告衆人者也對武伯者以其人多可憂之事子游能養而或失於敬子夏能直義而或少溫潤之色各因其材之高下與其所失而告之故不同也輔氏曰告懿子為告衆人之言蓋以其所包者廣正集注所謂語意渾然若不專為三家發者是也武伯之事於經傳雖無所見然即其諡武則非有柔嘉之德者亦可見也子游之資近簡率觀其論子夏門人及喪致乎哀而止皆有簡略節文之意則其於敬恐或有未至者子夏之資近質直觀其論友所謂可者與之不可者拒之及孟子論北宫黝似子夏之說則能直義而少溫潤之色政恐其未免有之才之髙下以資稟言其失則就所行上言也子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚回孔子弟子姓顔字子淵魯人不違者意不相背有聽受而無問難也語録曰是顔子於孔子說話都曉得私謂燕居獨處非進見請問之時語録曰私字儘闊與中庸謹獨之獨同發謂發明所言之理語録曰是聽得夫子說話便能發明於日用躬行之間愚聞之師曰李氏名侗延平人朱子之師也顔子深潛純粹輔氏曰深潛謂不淺露而德性淵宏純粹謂無瑕疵而氣質明淨也其於聖人體段已具語録曰問體段二字只是言箇模樣否曰然莆田黃氏曰具體段只是聖人所知所到處顔子亦皆能知能到也而微則比聖人猶有些充拓未盡處耳其聞夫子之言默識心融觸處洞然自有條理語録曰顔子聞夫子之言自原本至條目一一理㑹得所以與夫子意不相背又曰融字如消融相似如雪在湯中若不融一句只是一句在肚裏如何發得出來如人喫物事若不消只生在肚裏如何能滋益體膚問心融恐是功深力到曰固是亦是天資髙顔子自是鄰於生知者也輔氏曰默識是不待言說而自喻其意心融是不待思惟而自與之為一觸處洞然自有條理者謂如行自己家庭中蹊徑曲折器用安頓條理次序曉然在吾心目之間也故終日言但見其不違如愚人而已及退省其私則見其日用動靜語默之間皆足以發明夫子之道語録曰集注已說得分明蓋與之言顔子都無可否似箇愚者及退而觀其所行皆夫子與之言者一一做得出來不差豈不是足以發明得夫子之道其語勢只如此恰如今人說與人做一器用方與他說箇尺寸髙低形製他聽之全然似不曉底及明日做得來却與昨日所說底更無分毫不似坦然由之而無疑語録曰是他真箇見得真箇便去做陳氏曰只是見得此理明甚坦然平步進去更無阻礙耳莆田黃氏曰坦然是直截在前無疑礙之意然後知其不愚也陳氏曰延平發得固明白亦須自體認得灑落方見趣味蓋聖人言語皆從大本中流出雖一言半句若常談而莫非妙道精義所形見他人聞之只如平常豈曾識破顔子工夫至到見識明睿其於夫子之言耳才聞得口不待說而心中了了如冰之融釋隨入隨化此理洞然呈露自成條理不復疑礙所以雖終日言而意㫖相契不相違背此於聖人耳順地位雖未幾及而已同是一般趣味矣子曰視其所以以為也為善者為君子為惡者為小人語録曰大綱且看這一箇人是為善底人是為惡底人黃氏曰兼君子小人而視之觀其所由觀比視為詳矣由從也事雖為善而意之所從來者有未善焉則亦不得為君子矣語録曰若是為善底人又須觀其意之所從來若是本意以為己事所當然無所為而為之是乃為己若以為可以求知於人而為之則是其所從來處已不善了黃氏曰前之為小人者不復觀之矣所觀者君子也胡氏曰有名為君子而意實不然者故又觀其意之所從來或曰由行也謂所以行其所為者也語録曰行其所為只是就事上子細看過不如意之所從來只就他心術上看察其所安察則又加詳矣安所樂也所由雖善而心所樂者不在於是則亦僞耳豈能久而不變哉語録曰若是所從來處既善又須察其中心樂與不樂安是中心樂於為善自無厭倦之意則有日進之益若是中心所樂不在是便或作或輟未免於僞又曰安大率是他平日存主習熟處他本心愛如此雖所由偶然不如此終是勉强畢竟所樂不在此次第依舊又從熟處去平日愛倨傲勉强教他恭敬一時亦能恭敬次第依舊自倨傲了心方安黃氏曰君子所由之未善者亦不復察察其所由之善而欲知其安不安也陳氏曰意是發端處心是全體處人焉廋哉人焉廋哉焉於虔反廋所留反焉何也廋匿也重言以深明之程子曰在己者能知言窮理則能以此察人如聖人也蔡氏曰此章不惟可以知人亦當可以自考如吾之所為者雖善而意之所從來者果有未善否乎所由者雖善而心之所樂者果有不在於是否乎以其觀人者反以自觀以其察人者反以自察庶乎可矣子曰溫故而知新可以為師矣溫尋繹也故者舊所聞新者今所得黃氏曰溫故謂昔所已知者今復溫繹也知新謂昔所未知者今則通曉也溫故者學之篤知新者識之明言學能時習舊聞而每有新得則所學在我而其應不窮故可以為人師語録曰道理只這一箇道理理㑹得了時時溫習覺滋味深長自有新得又曰新者只是故中底道理時習得熟漸漸發得出來且如一理著幾箇人來問只就此一理上一人與說一箇理都是自家就此理上推究出來所以其應無窮非可以淺近求亦非可以茍簡得也然天下事物之理具於人心其纎微曲折粲然而甚明人心之靈通乎事物者其纎微曲折亦炯然而不昧然人之生也未免於氣裏之昏物欲之雜其於學也往往先得其粗而不能盡究其纎微先舉其略而不能盡通其曲折小有所得而遽止焉則亦不過於小有所見若夫加溫習之功而每有新益焉則非用功之深不能也故學者必當盡用其心實用其力學之博則倫類無不通思之精則淵微無不照體之實則切近而易知積之久則純熟而易辨能如此則其溫故也蓋不容以自已其知新也亦莫知其所以然而然也若夫記問之學則無得於心而所知有限故學記譏其不足以為人師正與此意互相發也語録曰若溫習舊聞則義理日通無有窮已若記問之學雖是記得多雖是讀得久雖是千卷萬卷只有千卷萬卷未有不窮又曰記問之學不足為人師只緣這箇死殺了若知新則引而仲之觸類而長之則常活不死殺又曰且如記問之學記得一事只說得一事更推第二事不去記得十事便說十一事不出所以不足為人師黃氏曰記問之學所謂學而不思者也學於人而不思則所學不在我而無得於心也因其所聞見而有得則所知有限而其應易窮也永嘉陳氏曰於溫故中知識又長一格乃不竭矣此與記問之學正相反記問雖多是死底知新是生底子曰君子不器器者各適其用而不能相通黃氏曰以物而言舟不可以為車之類是也以人而論優於趙魏老不可為滕薛大夫之類是也成德之士體無不具故用無不周非特為一才一藝而已語録曰所謂體無不具人心原有這許多道理充足若慣熟時自然看要如何無不周遍子貢瑚璉只在廟中可用移去别處便用不得如原憲只是一箇喫菜根底人邦有道出來也做一事不得邦無道也不能撥亂反正夷清惠和亦只做得一件事黃氏曰用無不周見君子之不器體無不具原君子之所以不器也蓋萬物皆備於我反身而誠樂莫大焉人具是性以生則萬事萬物之理無一不具於此性之中顧為氣質所拘物欲所蔽故偏暗而不通耳惟夫格物致知誠意正心使天下之理無不明無不實則心之全體無所不具而措之於用者宜其無不周也又豈可以器言哉子貢問君子子曰先行其言而後從之周氏曰先行其言者行之於未言之前而後從之者言之於既行之從周氏名孚先毗陵人輔氏曰行之於未言之前則其行專而力言之於既行之後則其言實而信正君子進德修業之道也范氏曰子貢之患非言之艱而行之艱故告之以此語録曰只為子貢多言故告之如此若道只要自家行得說都不得亦不是道理聖人只說敏於事而謹於言敏於行而訥於言言顧行行顧言何嘗教人不言又曰此為子貢而發其實有德者必有言若有此德其言自足以發明之無有說不出之理子曰君子周而不比小人比而不周輔氏曰比必二反此處偶失音當添入周普遍也比偏黨也皆與人親厚之意但周公而比私耳語録曰周者大而遍之義比便小所謂兩兩相比無一人使之不得其所這便是周但見同於己者與之不同於己者惡之這便是比君子非是全無惡人處但好善惡惡皆出於公用一善人於國則一國享其治用一善人於天下則天下享其治於一邑一鄉之中去一惡人則一邑一鄉受其安豈不是周小人之心一切反是又曰周是遍人前背後都如此心都一般不偏滯在一箇如老者安之朋友信之少者懷之亦是周遍如這一箇人合當如何待那一箇人又合如何待自家只看理無輕重厚薄便是周遍周是公底比比是私底周周是無所不比也如為臣則忠為子却不能孝便是偏比不周遍只知有君而不知有親又曰君子心公而大所以周普小人心狹而常私便親厚也只親厚得一邊又曰君子小人皆是與人親厚但君子意思自然廣大小人與人相親時便生計較與我善底做一般不與我善底做一般周與比相去不逺要須分别得大相逺處又曰君子與人相親也有輕重厚薄但意思自是公君子小人所為不同如陰陽晝夜每每相反然究其所以分則在公私之際毫釐之差耳語録曰問毫釐之差曰君子也是如此親愛小人也是如此親愛君子公小人私輔氏曰君子小人所為善惡相反真不啻如隂陽晝夜然天理人欲同行異情公即是理私即是欲其所差直毫釐而已故聖人於周比和同驕泰之屬常對舉而互言之欲學者察乎兩間而審其取舍之幾也語録曰問取舍之幾當在思慮方萌之初與人交際之始於此審決之否曰致察於思慮固是但事上亦須照管覺得思處失了便著去事上看便舍彼取此須著如此方得子曰學而不思則罔思而不學則殆不求諸心故昏而無得不習其事故危而不安或問既曰昏且危矣而又繫以無得不安之說不已贅乎曰罔者其心昏昧雖安於所安而無自得之見殆者其心危迫雖得其所得而無可即之安此固兼夫內外始終而言而後足以盡夫罔殆之義也昏以心言無得者無得於理而卒於罔也危以心言不安者不安于理而卒於殆也黃氏曰昏而無得危而不安合心與理而言心昏而於理無得心危而於理不安輔氏曰學之義廣矣雖不專謂習其事然此之謂學則指習事而言耳徒學而不求諸心則內外不協外雖勉强而中無意味故昏而無得徒思而不習其事則理事為二理雖若有所得事則扞格而無可即之安故危而不安胡氏曰學之一字前既以效為言矣然專言之則思在其中程子以時習為時復思繹是也分言之則思自為思後章所謂思不如學是也此章思與學對說故學但為習其事然不能思則不明於心未免於行之不著習矣不察故昏而無得至於思者專求於心而未見於行事則身與事不能帖泰故危而不安要必兼二者而後可也程子曰博學審問愼思明辨篤行五者廢其一非學也語録曰凡學字便兼行字意思如講明義理學也才效其所為便有行意輔氏曰此學字却不專主於習其事子曰攻乎異端斯害也已范氏曰攻專治也故治木石金玉之工曰攻輔氏曰此周禮冬官所謂攻木之工異端非聖人之道而别為一端如楊墨是也輔氏曰物必有端有末端為始末為終單言端則可以該其末矣故常言一事一件皆謂之一端異端謂非聖人之道而别自為一件道理也楊氏以為我為義而非聖人之所謂義墨氏以兼愛為仁而非聖人之所謂仁此其所以為異端也其率天下至於無父無君專治而欲精之為害甚矣語録曰不惟說不可專治之便略去理㑹他也不得若是自家學有定止去看他病痛却得也是自眼目髙方得若只恁地便也奈他不得程子曰佛氏之言比之楊墨尤為近理所以其害為尤甚學者當如淫聲美色以逺之不爾則駸駸然入於其中矣語録曰問為我兼愛其禍已不勝言佛氏如何又却甚焉曰楊墨只是硬恁地做佛氏最有精微動得人處問佛氏所以差曰從他劈初頭便錯了如天命之謂性他把這箇便都做空虛說了吾儒見得都是實又曰楊墨為我兼愛做來也淡却不能惑人只為釋氏最能惑人初見他說出來自有道理從他說愈深愈是害人問何以言佛而不言老子曰老便只是楊氏子曰由誨女知之乎知之為知之不知為不知是知也女音汝由孔子弟子姓仲字子路魯人子路好勇蓋有彊其所不知以為知者語録曰子路粗暴見事便自說是曉㑹得如正名一節便以為迂故和那箇知處也不知了故夫子告之曰我教女以知之之道乎但所知者則以為知所不知者則以為不知如此則雖或不能盡知而無自欺之蔽亦不害其為知矣輔氏曰己所不知而强以為知則是自欺也豈得謂知若夫知之為知之不知為不知則是於事理雖有不知而其心則無自欺之蔽故不害其為知也况由此而求之又有可知之理乎蔡氏曰集注發出求知一節且使人不安於其所不知然後上不失於自欺下不失於自畫而經意方備子張學干祿子張孔子弟子姓顓孫名師陳人干求也祿仕者之奉也子曰多聞闕疑愼言其餘則寡尤多見闕殆愼行其餘則寡悔言寡尤行寡悔祿在其中矣行寡之行去聲吕氏曰疑者所未信殆者所未安吕氏名大臨藍田人黃氏曰言有未曉故疑而未敢信行則無疑矣而察之事理於心或不安程子曰尤罪自外至者也悔理自內出者也語録曰出言或至傷人故多尤行有不至已必先覺故多悔然此亦以其多少言之耳言而多尤豈不自悔行而多悔亦必至於傷人愚謂多聞見者學之博闕疑殆者擇之精慎言行者守之約語録曰此章是三截事若人少聞寡見則不能參考得是處故聞見須要多若聞見已多而不能闕其疑殆則胡亂把不是底也將做是了既能闕其疑殆而不能謹言行其餘則必有尤悔輔氏曰學不博則無以致詳擇不精則無以知要守不約則無以自得此又為學始終之序蔡氏曰學之博擇之精守之約三語已極明切但人皆知擇精守約之為重而於多聞多見者或輕易讀過殊不知此亦正是學者要緊用功處聖人所以好古敏求多聞擇善多見而識者皆欲求其多也不然則聞見孤陋亦且何所據以為擇精守約之地也凡言在其中者皆不求而自至之辭語録曰如耕也餒在其中耕何嘗要求餒而自有餒在其中學也祿在其中學何嘗要求祿而自有祿在其中又如父子相隱直在其中本只是相為隱何嘗理㑹直然直却亦自在其中如此等類皆當如此看言此以救子張之失而進之也語録曰孔子不教他干但云得祿之道在其中正是欲抹殺了他干字程子曰修天爵則人爵至君子言行能謹得祿之道也子張學干祿故告之以此使定其心而不為利祿動若顔閔則無此問矣或疑如此亦有不得祿者孔子蓋曰耕也餒在其中惟理可為者為之而已矣語録曰修天爵而人爵自至說得重了此章重處只在言行若言行能謹便自帶得祿來輔氏曰聖人之言理而已矣謹言行而得祿理之常也其或不然則理之變也君子處順而安常不計利以為善亦惟其理所當為者為之而已矣哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服哀公魯君名蔣凡君問皆稱孔子對曰者尊君也錯捨置也諸衆也程子曰舉錯得義則人心服輔氏曰義者天理之所宜而人心之所同得者也合於義則上當天理下愜人心民焉有不服者哉謝氏曰好直而惡枉天下之至情也順之則服逆之則去必然之理也然或無道以照之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也語録曰若不居敬如何窮理如何識人為舉直錯枉之本又曰須是居敬窮理自做工夫方解照得人破若心不在焉則視之而不見聽之而不聞以枉為直以直為枉矣陳氏曰好惡情也好直而惡枉則情之由性而發者也不可無辨謝氏居敬窮理之云乃因而及之其實此二者聖學之要訣大有工夫在未可以易視之輔氏曰居敬者窮理之本窮理者居敬之效二者蓋互相發季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸季康子魯大夫季孫氏名肥莊謂容貌端嚴也臨民以莊則民敬於己孝於親慈於衆則民忠於己善者舉之而不能者教之則民有所勸而樂於為善語録曰莊只是一箇字上能端莊則便尊敬至於孝慈則是兩件事孝是以躬率之慈是以恩結之如此人方忠於己舉善而教不能若善者舉之不善者便去之誅之罰之則民不解便勸惟是舉其善者而教其不能者所以皆勸張敬夫曰此皆在我所當為非為欲使民敬忠以勸而為之也然能如是則其應蓋有不期而然者矣輔氏曰聖人之言與事凡若此者皆當以此說例之雖大學誠意正心以治國平天下亦不過如此而已豈有謀利計功之心於其先哉葉氏曰張氏謂此乃在上當為之事非因欲彼而後為此欲彼而為此則或作或輟一暴十寒非感人動物之誠也愚謂是數者皆上之人所當為不可有責效於下之心也一有責效之心則本原之地虧矣或謂孔子曰子奚不為政定公初年孔子不仕故或人疑其不為政也愚謂聖人未嘗不仕惟定公初年季氏彊僭陽虎作亂聖人退而修詩書禮樂故知其為是時也子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政書周書君陳篇書云孝乎者言書之言孝如此也善兄弟曰友書言君陳能孝於親友於兄弟又能推廣此心以為一家之政孔子引之言如此則是亦為政何必居位乃為為政乎語録曰推廣此心以為一家之政緣下面有箇是亦為政故知不是國政又云在我者孝則人皆知孝在我者弟則人皆知弟豈不行於一家蓋孔子之不仕有難以語或人者故託此以告之要之至理亦不外是或問聖人未嘗忘天下今不為政而其言如此將不為獨善之私耶曰聖人未嘗不欲仕而亦不求仕也况定公之初陽虎用事又非可仕之時乎然此意有難以告或人者故特告之以此子曰人而無信不知其可也大車無輗小車無軏其何以行之哉輗五兮反軏音月大車謂平地任載之車輗轅端橫木縛軛以駕牛者小車謂田車兵車乘車軏轅端上曲鉤衡以駕馬者車無此二者則不可以行人而無信亦猶是也黃氏曰車譬則事也輗軏之譬則信也大車小車無輗軏則不行大事小事無信則不行也欺罔不實人不吾信其何以行之哉子張問十世可知也陸氏曰也一作乎陸氏名元朗唐蘇州人王者易姓受命為一世胡氏曰世有以三十年為一世者必世後仁是也有以易姓受命為一世者此章所舉是也子張問自此以後十世之事可前知乎子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也馬氏曰所因謂三綱互常所損益謂文質三統馬氏名融東漢扶風人愚案三綱謂君為臣綱父為子綱夫為妻綱五常謂仁義禮智信文質謂夏尚忠商尚質周尚文語録曰忠只是渾然誠確質便自有文了但文未盛比之文則此箇質耳又曰忠只是朴實頭白直做將去質則漸有形質制度而未及于文采文則就制度上事事加文采然亦天下之勢自有此三者非聖人之欲尚忠尚質尚文也夏不得不忠商不得不質周不得不文彼時亦無此名字後人見得如此故命此名又曰質朴則未有文忠則混然無質可言矣三統謂夏正建寅為人統商正建丑為地統周正建子為天統語録曰問三正之建不同曰天開於子地闢於丑人生於寅蓋天運至子始有天故曰天正至丑始有地故曰地正至寅始有人故曰人正三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度小過不及之間而其已然之迹今皆可見則自今以往或有繼周而王者雖百世之逺所因所革亦不過此豈但十世而已乎語録曰所因之禮是天做底萬世不可易所損益之禮是人做底故隨時變更又曰三綱五常亘古亘今不可易至於變易之時與其人雖不可知而其勢必變易可知也蓋有餘必損不及必益雖百世之逺可知也猶寒極生暖暖甚生寒雖不可知其勢必如此可知也又曰綱常千萬年磨滅不得只是盛衰消長之勢自不可已盛了又衰衰了又盛其勢如此聖人出來亦只是就這上損其有餘益其不足聖人做得來自是恰好不到有悔憾處三代以下做得不恰好定有悔憾雖做得不盡善要亦是損益前人底雖是人謀要是大勢不得不出此但這綱常自要壞滅不得聖人所以知來者蓋如此非若後世䜟緯術數之學也胡氏曰子張之問蓋欲知來而聖人言其既往者以明之也夫白修身以至於為天下不可一日而無禮天叙天秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制度文為或太過則當損或不足則當益益之損之與時宜之而所因者不壞是古今之通義也因往推來雖百世之逺不過如此而已矣輔氏曰胡氏說尤得聖人之意蓋時雖有古今之異而理則一而已矣不言三綱五常而但言禮與天叙天秩者蓋三綱五常即天叙之典天秩之禮也至所謂天地之常經古今之通義尤更發明得所因所損益之義分曉子曰非其鬼而祭之諂也非其鬼謂非其所當祭之鬼語録曰如天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先上得以兼乎下下不得以兼乎上士庶人而祭五祀大夫而祭山川諸侯而祭天地皆所謂非其鬼也問尋常人家所當祭者只是祖先否曰然問土地山川之神人家所在不當祭否曰山川之神季氏祭之尚以為僭况士庶乎如土地之神人家却可祭之禮云庶人立一祀或立户或立竈户竈亦可祭也問士庶祭其旁親逺族亦是非其鬼否曰是又如今人祭甚麼廟神都是非其鬼問如旁親逺族不當祭若無後者則如之何曰若是無人祭只得為他祭永嘉陳氏曰今世淫祀若浮屠老子之類皆係非鬼之數若先聖先師則所當祭而祭者諂求媚也見義不為無勇也知而不為是無勇也胡氏曰義者事之宜也不知則已既知之矣猶不能為志不能勝氣也故以為無勇論語纂疏卷一
