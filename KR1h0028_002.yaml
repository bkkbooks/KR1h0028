body:
  text: 欽定四庫全書中庸纂疏卷二宋趙順孫撰朱子章句君子之道費而隱費符味及費用之廣也隱體之微也語録曰道者兼體用該隱費而言也或說形而下者為費形而上者為隱曰形而下者甚廣其形而上者實行乎其間而無物不具無處不有故曰費就其中形而上者有非視聽所及故曰隱黃氏曰如今風雨之時滿室皆隂氣然不可見此體之隱也其著人衣服則覺得濕潤著人腠理則覺得酸楚此顯而可見者用之廣也然著人衣服身體即是那滿室陰濕之氣耳夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉與去聲君子之道近自夫婦居室之間文集曰男女居室人事之至近而道行乎其間逺而至於聖人天地之所不能盡語録曰道無所不在無窮無盡聖人亦做不盡天地亦做不盡其大無外其小無內語録曰如云天下莫能載是無外天下莫能破是無內謂如物有至小而可破作兩者是中著得一物在若云無內則是至小更不容破了可謂費矣然其理之所以然則隱而莫之見也文集曰大抵自夫婦之所能知能行直至聖人天地之所不能盡皆是說費處而所謂隱者不離於此也語録曰費是道之用隱是道之所以然而不可見處蓋可知可能者道中之一事陳氏曰是就日用間一二事論如事親事長之類及其至而聖人不知不能則舉全體而言聖人固有所不能盡也語録曰人多以至為道之精妙處若是道之精妙有所不知不能便與庸人無異何足為聖人這至只是道之盡處所不知所不能是沒緊要砥事他大本大根元無缺闕只是古今事變禮樂制度便也須學又曰聖人不能知不能行者非至妙處聖人不能知而不能行天地間固有不緊要砥事聖人不能盡知緊要砥則聖人能知之能行之若至妙處聖人不能知不能行粗處却能之非聖人乃凡人也又曰道無不包若盡論之聖人豈能纎悉盡知侯氏曰聖人所不知如孔子問禮問官之類所不能如孔子不得位堯舜病博施之類文集曰侯氏之說是非全體中之不能者語録曰問侯氏止尋得一二事元不曽說著及其至也之意此是聖人看得徹砥故於此理亦有未肯自居處曰夫婦之與知能行是萬分中有一分聖人不知不能是萬分中缺得一分問以孔子不得位為聖人所不能祿位名夀此在天者聖人如何能必得曰中庸明說大德必得其位孔子有大德而不得其位如何不是不能愚謂人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者文集曰問所憾恐非謂天能生覆而不能形載地能形載而不能生覆恐只在於陰陽寒暑之或乖其常吉凶災祥之或失其宜品類之枯敗夭折而不得遂其理此雖天地不能無憾人固不能無憾此也曰既是不可必望其全便是有未足處詩云鳶飛戾天魚躍于淵言其上下察也鳶余専反詩大雅旱麓之篇鳶鴟類戾至也察著也文集曰察者昭著之義言道體之流行發見昭著如此也語録曰察非審察之察如天地明察之察子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隱也語録曰鳶飛魚躍上下昭著莫非至理但又視之不見聽之不聞將出來不得須是於此自有所見又曰如鳶飛亦是費魚躍亦是費而所以為費者試討箇物來看又曰鳶飛魚躍費也必有一箇什麼物使得如此此便是隱三山陳氏曰天地之間有一物必有一理有所謂已然者必有所謂所以然者鳶則天而不能淵魚則淵而不能天此其用也已然者也是必有所謂所以然者以為之體然體之隱初不離於用之顯也故程子曰此一節子思喫緊為人處活潑潑地語録曰活只是不滯於一隅永嘉陳氏曰大要不要人去昏默窈冥中求道理處處平平㑹得時多少分明快活讀者其致思焉君子之道造端乎夫婦及其至也察乎天地結上文右第十二章子思之言蓋以申明首章道不可離之意也其下八章雜引孔子之言以明之或問十二章之說曰道之用廣而其體則微密而不可見所謂費而隱也即其近而言之男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事物之多聖人亦容有不盡知盡能者也永嘉陳氏曰自其明白坦蕩者言之則雖夫婦之愚不肖皆可得而知可得而行自其纎悉極至者言之雖聖人有所不能盡知不能盡行然非獨聖人有所不知不能也天能生覆而不能形載地能形載而不能生覆至於氣化流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以雖以天地之大而人猶有憾也或曰夫既謂之聖人矣尚何不知不能之有三山陳氏曰天地之大也尚有所憾焉况聖人乎水旱螟蝗祁寒暑雨人將怨咨又不能使物物皆得其所欲是有憾已舉此以明聖人之所不知不能者也夫自夫婦之愚不肖所能知行至於聖人天地之所不能盡道蓋無所不在也陳氏曰自夫婦之與知能行處道固無所不在及聖人之所不能知不能行處而道亦無所不在至於天地之大猶有所憾處而道亦無所不在故君子之語道也其大至於天地聖人之所不能盡而道無不包則天下莫能載矣其小至於愚夫愚婦之所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離乎此而有非視聽之所及者此所以為費而隱也黃氏曰道之見於用者費也其所以為是用者隱也費猶木之有枝葉可見者隱猶木之有根本不可見者也永嘉陳氏曰語其大而天下莫能載語其小而天下莫能破凡此是說道之費處其體之隱則在其中矣故不言隱非於費之外别有所謂隱也使别有隱可見有隱可言則非體用一源顯微無間已不足為道矣子思之言至此極矣然猶以為不足以盡其意也故又引詩以明之曰鳶飛戾天魚躍于淵所以言道之體用上下昭著而無所不在也陳氏曰道之體用甚昭朗流動充滿上下之間無所不在造端乎夫婦極其近小而言也察乎天地極其逺大而言也文集曰君子之道造端乎夫婦之微密而語其極則察乎天地之髙深三山陳氏曰造端乎夫婦其道甚近而小也然要其極以至於逺且大則凡昭然天地之間者莫非其理之不可掩蓋夫婦之際隱微之間尤見道之不可離處知其造端乎此則其所以戒謹恐懼之實無不至矣文集曰幽暗之中衽席之上人或䙝而慢之則天命有所不行矣易首乾坤而重咸恆詩首關雎而戒淫佚書記釐降禮謹大昏皆此意也曰諸說如何曰程子至矣張子以聖人為夷惠之徒既已失之案張子曰聖人若夷惠之徒亦未知君子之道若知君子之道亦不入於偏又曰君子之道逹諸天故聖人有所不知夫婦之智淆諸物故聖人有所不與案此皆張子全語則又析其所不知不能而兩之皆不可曉也已曰諸家皆以夫婦之能知能行者為道之費聖人之所不知不能而天地有憾者為道之隱其於文義協矣若從程子之說則使章內専言費而不及隱恐其有未安也曰謂不知不能為隱似矣若天地有憾鳶飛魚躍察乎天地而欲亦謂之隱則恐未然且隱之為言正以其非言語指陳之可及耳故獨舉費而隱常默具乎其中若於費外别有隱而可言則已不得為隱矣程子之云又何疑耶三山陳氏曰先儒有以聖人所不知不能語大語小者明其為隱矣繹其義反諸理而不安也夫所謂隱者而聖人不知不能則聖人亦不足貴矣謂小而莫能破者為隱則小之為義非要妙之謂也曰費而隱者費中有隱非費之外别有隱者也曰然則程子所謂鳶飛魚躍子思喫緊為人處與必有事焉而勿正心之意同活潑潑地者何也曰道之流行發見於天地之間無所不在在上則鳶之飛而戾于天者此也在下則魚之躍而出于淵者此也其在人則日用之間人倫之際夫婦之所知所能而聖人之所不知不能者亦此也此其流行發見於上下之間者可謂著矣子思於此指而言之惟欲學者於此默而識之則為有以洞見道體之妙而無疑而程子以為子思喫緊為人處者正以示人之意為莫切於此也文集曰喫緊為人處是要人就此瞥地便見得箇天理全體其曰與必有事焉而勿正心之意同活潑潑地則又以明道之體用流行發見充塞天地亘古亘今雖未嘗有一毫之空闕一息之間斷然其在人而見諸日用之間者則初不外乎此心故必此心之存而後有以自覺也文集曰必有事焉而勿正心者乃指此心之存主處活潑潑地者方是形容天理流行無所滯礙之妙蓋以道之體用流行發見雖無間息然在人而見諸日用者初不外乎此心故必此心之存然後方見其全體呈露妙用顯行活潑潑地略無滯礙耳若見得破則即此須㬰之頃此體便已洞然黃氏曰看中庸到此一章若無所見則亦不足以為道矣充塞天地間無非是理無一毫空闕無一息間斷是非拘牽文義者之所能識也必有事焉而勿正心活潑潑地亦曰此心之存而全體呈露妙用顯行無所滯礙云爾非必仰而視乎鳶之飛俯而觀乎魚之躍然後可以得之也抑孟子此言固為精密然但為學者集義養氣而發耳至於程子借以為言則又以發明學者洞見道體之妙非但如孟子之意而已也文集曰程子借孟子之語發明已意說不到處後人却作實語看了蓋此一言雖若二事然其實則必有事焉半詞之間已盡其意善用力者苟能於此超然默㑹則道體之妙已躍如矣何待下句而後足於言耶聖賢特恐學者用力之過而反為所纍故更以下句解之欲其雖有所事而不為所纍耳非謂必有事焉之外又當别設此念以為正心之防也永嘉陳氏曰今世做工夫人心却不曽放去又多失於迫切不做工夫人心裏自在又却都沒一事曰然則其所謂活潑潑地者毋乃釋氏之遺意耶曰此但俚俗之常談釋氏蓋嘗言之而吾亦言之耳彼固不得而専之也况吾之所言雖與彼同而所形容實與彼異若出於吾之所謂則夫道之體用固無不在然鳶而必戾于天魚而必躍于淵是君君臣臣父父子子各止其所而不可亂也若如釋氏之云則鳶可以躍淵而魚可以戾天矣是安可同日而語哉語録曰問引君臣父子為言此吾儒之所以異於佛者如何曰鳶飛魚躍只是言其發見耳釋亦言發見但渠言發見却一切混亂至吾儒須辨其定分君臣父子皆定分也鳶必戾于天魚必躍于淵且子思以夫婦言之所以明人事之至近而天理在焉釋氏則舉此而絶之矣又安可同年而語哉曰吕氏以下如何曰吕氏分此以上論中以下論庸又謂費則常道隱則至道恐皆未安案吕氏曰此以上論中此以下論庸此章言常道之終始費則常道隱則至道惟能盡常道乃所以為至道謝氏既曰非是極其上下而言矣又曰非指鳶魚而言蓋曰子思之引此詩姑借二物以明道體無所不在之實非以是為窮其上下之極而形其無所不包之量也又非以是二物専為形其無所不在之體而欲學者之必觀乎此也此其發明程子之意蓋有非一時同門之士所得聞者而又别以夫子與㸃之意明之則其為說益以精矣但所謂察見天理者恐非本文之訓而於程子之意亦未免小失之耳案謝氏曰鳶飛戾天魚躍于淵非是極其上下而言蓋真箇見得如此此正是子思喫緊道與人處若從此解悟便可入堯舜氣象又曰鳶飛戾天魚躍于淵無些私意丄下察以明道體無所不在非指鳶魚而言也若指鳶魚言則上面更有天下面更有地在知勿忘勿助長則知此知此則知夫子與㸃之意又曰詩云鳶飛戾天魚躍于淵猶韓愈所謂魚川泳而鳥雲飛上下自然各得其所也子思之意言上下察猶孟子所謂必有事焉而勿正察見天理不用私意也游氏之說其不可曉者尤多如以良知良能之所自出為道之費則良知良能者不得為道而在道之外矣又以不可知不可能者為道之隱則所謂道者乃無用之長物而人亦無所賴於道矣所引天地明察似於彼此文意兩皆失之至於所謂七聖皆迷之地則莊生邪遁荒唐之語尤非所以論中庸也案游氏曰唯費也則良知良能所自出故夫婦之愚不肖可以與知而能行焉惟隱也則非有思者所可知非有為者所可能故聖人有所不知不能焉蓋聖人者德之成而業之大也過此以往則神矣無方也不可知無體也不可能此七聖皆迷之地也孝經曰事父孝故事天明事母孝故事地察蓋事父母之心雖夫婦之愚不肖亦與有焉及其至也天地明察神明彰矣則雖聖人之德又何以加此此中庸所以為至也語録曰遊氏有七聖皆迷之說設如把至作精妙說則下文語大語小便如何分楊氏以大而化之非智力所及為聖人不知不能以祁寒暑雨雖天地不能易其節為道之不可能而人所以有憾於天地則於文義既有所不通而又曰人雖有憾而道固自若則其失愈逺矣其曰非體物而不遺者其孰能察之其用體字察字又皆非經文之正意也案楊氏曰自可欲之善至於充實輝光之大致知力行之積也大而化之至於不可知之神則非知力所及也德盛仁熟而自至焉耳故及其至也聖人有所不知不能焉又曰祁寒暑雨之變其機自爾雖天地之大不能易其節也夫道之不可能也如是而人雖猶有憾焉道固自若也又曰鳶飛魚躍非夫體物而不遺者其孰能察之大抵此章若從諸家以聖人所不知不能為隱則其為說之弊必至於此而後已嘗試循其說而體驗之若有以使人神識飛揚眩瞀迷惑而無所底止子思之意其不出此也必矣唯侯氏不知不能之說最為明白但所引聖而不可知者孟子本謂人所不能測耳非此文之意也其他又有大不可曉者亦不足深論也案侯氏曰所不能者如聖而不可知之神子曰道不逺人人之為道而逺人不可以為道道者率性而已固衆人之所能知能行者也故常不逺於人黃氏曰率性之謂道道何嘗逺人此人字兼人已而言乃一章之綱領也自己觀之已便具此道自人觀之人亦具此道若為道者厭其卑近以為不足為而反務為髙逺難行之事則非所以為道矣黃氏曰此指為道之人已身而言己之身便具此道又豈可逺此身以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止睨研計反詩豳風伐柯之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳語録曰執柯以伐柯不用更别去討法則只你那手中所執者便是則然猶有彼此之别故伐者視之猶以為逺也葉氏曰睨視所伐之柯猶見其未施工治與所執之柯未為一體則是猶有忖量之意若以人治人則所以為人之道各在當人之身初無彼此之别語録曰若此箇道理人人具有才要做砥便是初無彼此之别放去收回只在這些子間何用别處討三山陳氏曰以身為道道即在身其近不止於以此柯視彼柯也特人自不察耳故君子之治人也即以其人之道還治其人之身其人能改即止不治蓋責之以其所能知能行非欲其逺人以為道也語録曰未改以前是失却人道既改便是復得人道了更何用治他又曰人人本自有許多道理只是不曽依得這道理却做從不是道理處去今欲治之不是將他人砥道理去治他又不是分我砥道理與他他本有此道理我但因其自有者還以治之而已黃氏曰此指已所治之人乃指他人而言人之身亦具此道故但以人所具之道還以導之能改則止亦不可外人以求道又曰人即道也以彼之道治彼之身能改其不善則本人之身還得本人之道矣又安得不止而尚他求哉陳氏曰君子之治人只就本人身上當然道理還治本人之身初無彼此之别也及其人能改了便止如此則不以髙逺難行砥去責他只把他能知能行砥去治他張子所謂以衆人望人則易從是也語録曰道者衆人之道衆人所能知能行者今人自做未得衆人耳此衆人不是說不好砥人永嘉陳氏曰衆人之說即天生蒸民凡厥庶民之謂亦是將他共有道理治他乃天理人倫之類若以蠢蠢昏昏為衆人非聖人意忠恕違道不逺施諸已而不願亦勿施於人盡已之心為忠語録曰忠者盡已之心無少僞妄又曰只是盡自家之心不要有一毫不盡又曰須是十分盡得方始是盡若七分盡得三分未盡也是不忠陳氏曰忠是就心說是盡已之心無不真實者推己及人為恕語録曰恕者推已及物各得所欲又曰知得我是要恁地想人亦要恁地而今不可不教他恁地三反五折便是推已及物陳氏曰恕是就待人接物處說只是推已心之所真實者以及人物而已又曰推己心以及人要如己心之所欲便是恕違去也如春秋傳齊師違榖七里之違言自此至彼相去不逺非背而去之之謂也道即其不逺人者是也施諸已而不願亦勿施於人忠恕之事也語録曰問此只是恕何故將作忠恕說曰忠恕兩箇離不得方忠時未見得恕及至恕時忠行乎其間施諸已而不願亦勿施諸人非忠者不能也以已之心度人之心未嘗不同則道之不逺於人者可見故已之所不欲則勿以施之於人亦不逺人以為道之事黃氏曰此即已之身而得待人之道待人之道不必逺求觀其施於已者而已張子所謂以愛已之心愛人則盡仁是也語録曰凡人責人處急責已處緩愛已則急愛人則緩若拽轉頭來便自道理流行永嘉陳氏曰此因恕而言仁耳恕是求仁之事推愛已之心以愛人恕者之事也以愛已之心愛人仁者之事也忠恕違道不逺轉一過即仁矣故張子以仁言君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾子臣弟友四字絶句求猶責也道不逺人凡已之所以責人者皆道之所當然也故反之以自責而自修焉黃氏曰此即人之身而得治已之道治已之道初不難見觀其責於人者而已庸平常也行者踐其實謹者擇其可陳氏曰雖平常之行亦必踐其實平常之言亦必致其謹德不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣三山陳氏曰人之言常有餘於行而其行常不足於言苟言而顧其行則言之有餘者將自損行而顧其言則行之不足者將自勉矣慥慥篤實貌愚謂篤實者篤厚而真實也言君子之言行如此豈不慥慥乎贊美之也凡此皆不逺人以為道之事三山陳氏曰此一章起於道不逺人至此而畢語若雜出而意脈貫通反復於人已之間者詳盡明切而有序其歸不過致謹於言行以盡其實耳苟繹思而從事焉則其於處人已之道兩盡而無間矣張子所謂以責人之心責已則盡道是也愚謂我之所望於人者即我所當自盡之則不是將他人道理來治我蓋以得於天之所同然者而自治其身爾右第十三章道不逺人者夫婦所能丘未能一者聖人所不能或疑四者乃聖人切身事如前所援堯舜病博施之類則聖人有不能處若此四者豈真有所不能耶永嘉陳氏曰只此四者才處得不恰好皆未能盡道前章說聖人不能即謂此類如博施濟衆豈真不能耶或百中遺一或千中遺一亦聖人所病也豈是都做不得皆費也而其所以然者則至隱存焉輔氏曰即人之所行言之故但及其費而隱自存下章放此或問十三章之說子以為以人治人為以彼人之道還治彼人善矣又謂責其所能知能行而引張子之說以實之則無乃流於姑息之論而所謂人之道者不得為道之全也耶曰上章固言之矣夫婦之所能知能行者道也聖人之所不知不能而天地猶有憾者亦道也然自人而言則夫婦之所能知能行者人之所切於身而不可須㬰離者也至於天地聖人所不能及則其求之當有漸次而或非日用之所急矣然則責人而先其切於身之不可離者後其有漸而不急者是乃行逺自邇升髙自卑之序使其由是而不已焉則人道之全亦將可以馴致今必以是為姑息而遽欲盡道以責於人吾見其失先後之序違緩急之冝人之受責者將至於有所不堪而道之無窮則終非一人一日之所能盡也是亦兩失之而已焉爾曰子臣弟友之絶句何也曰夫子之意蓋曰我之所責乎子之事已者如此而反求乎已之所以事父則未能如此也所責乎臣之事已者如此而反求乎已之所以事君則未能如此也所責乎弟之事已者如此而反求乎已之所以事兄則未能如此也所責乎朋友之施已者如此而反求乎已之所以先施於彼者則未能如此也於是以其所以責彼者自責於庸言庸行之間蓋不待求之於他而吾之所以自修之則具於此矣語録曰常人責子必欲其孝於我然不知我之所以事父者曾孝否以我責子之心而反推已之所以事父此便是則也常人責臣必欲其忠於我然不知我之事君者盡忠否以我責臣之心而反之於我則其則在此矣黃氏曰或以所求于臣一句而有疑非也古人君臣字多通用諸侯大夫有土者皆稱君其下皆稱臣凡卑之於尊僕隸之於主便有臣義今或不得其讀而以父君兄之四字為絶句則於文意有所不通而其義亦何所當哉文集曰此處主意立文與大學潔矩一章相似人多誤讀葉氏曰舊讀是以恕已之心恕人今讀是以責人之心責已若如舊說當云所求乎子以事父以字全是起句意義一讀之間直繫利害如此曰諸說如何曰諸家說論語者多引此章以明一以貫之之義說此章者又引論語以釋違道不逺之意一矛一盾終不相謀而牽合不置學者蓋深病之及深考乎程子之言有所謂動以天者然後知二者之為忠恕其迹雖同而所以為忠恕者其心實異非其知德之深知言之至其孰能判然如此而無疑哉然盡已推已乃忠恕之所以名而正為此章違道不逺之事若動以天而一以貫之則不待盡已而至誠者自無息不待推已而萬物已各得其所矣曽子之言蓋指其不可名之妙而借其可名之粗以明之學者默識於言意之表則亦足以互相發明而不害其為同也餘說雖多大槩放此推此意以觀之則其為得失自可見矣案程子曰以已及物忠也推已及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾語録曰論著忠恕名義自合依子思忠恕違道不逺是也曾子所說却是移上一階說聖人之忠恕到程子又移上一階說天地之忠恕其實只一箇忠恕須自看教有許多等級分明又曰曽子忠恕與子思忠恕不同曽子忠恕是天子思忠恕尚是人在黃氏曰今且把違道不逺之忠恕來看便分曉聖人之忠恕天道也學者便是人道也如何又說忠是天道恕是人道以聖人去比學者聖人之忠是天之天聖人之恕是天之人學者之忠是人之天學者之恕是人之人畢竟忠喚做體便是近那未發處故雖學者亦有箇天恕喚做用便是推出外去了雖聖人亦有箇人忠只是盡自家心便較易恕是逐一去做便著力輔氏曰違道不逺者學者之忠恕也動以天者聖人之忠恕也曾子一貫之忠恕雖借學者之事而言其所以異者只是動以天爾所謂動以天爾者蓋於忠上已全盡了不待推而自然及物也如所謂以已及物仁也此則夫子之一貫所謂動以天也陳氏曰中庸說忠恕違道不逺正是說學者之忠恕曾子說夫子之道忠恕乃是說聖人之忠恕聖人忠恕是天道學者忠恕是人道違道不逺如齊師違榖七里之違非背而去之之謂愚固已言之矣諸說於此多所未合則不察文義而强為之說之過也夫齊師違榖七里而榖人不知則非昔已在榖而今始去之也蓋曰自此而去以至於榖才七里耳孟子所云夜氣不足以存則其違禽獸不逺矣非謂昔本禽獸而今始違之也亦曰自此而去以入於禽獸不逺耳蓋所謂道者當然之理而已根於人心而見諸行事不待勉而能也然唯盡已之心而推以及人可以得其當然之實而施無不當不然則求之愈逺而愈不近矣此所以自是忠恕而往以至於道獨為不逺其曰違者非背而去之之謂也三山陳氏曰違非背違之違乃相去之義猶言某去某云爾程子又謂事上之道莫若忠待下之道莫若恕案此乃程子全語此則不可曉者若姑以所重言之則似亦不為無理若究其極則忠之與恕初不相離程子所謂要除一個除不得案程子曰忠恕兩字要除一箇除不得而謝氏以為猶形影者案謝氏曰忠恕猶形影也無忠做恕不出來意可見矣今析為二事而兩用之則是果有無恕之忠無忠之恕而所以事上接下者皆出於强為而不由乎中矣豈忠恕之謂哉是於程子他說殊不相似意其記録之或誤不然則一時有為言之而非正為忠恕發也語録曰忠恕只是一件事不可作兩箇看又曰忠與恕不可相離一步陳氏曰大槩忠恕只是一物就中截作兩片則為二物蓋存諸中者既忠則發出外來便是恕應事接物處不恕則是在我者必不十分真實故發出忠砥心便是恕砥事做成恕砥事便見忠砥心張子二說皆深得之案張子曰所求乎君子之道四是實未能道何嘗有盡聖人人也人則有限是誠不能盡能也聖人之心則直欲盡道事則安能得盡如博施濟衆堯舜實病諸堯舜之心其施直欲至于無窮方為博施然安得若是修己以安百姓是亦堯舜實病之欲得人人如此然安得如此又以責人之心責己一條已分入章句但虛者仁之原忠恕與仁俱生之語若未瑩耳案張子曰虛者仁之原忠恕者與仁俱生義禮者仁之吕氏改本太略不盡經意舊本乃推張子之言而詳實有味但柯猶在外以下為未盡案吕氏曰妙道精義常存乎君臣父子夫婦朋友之間不離乎交際酬酢應對之末皆人心之所同然未有不出於天者也若絶乎人倫外乎世務窮其所不可知議其所不可及則有天人之分內外之别非所謂大而無外一以貫之安在其為道也歟執斧之柄而求柯於木其尺度之則固不逺矣然柯猶在外睨而視之始得其則若夫治已治人之道於己取之不必睨視之勞而自得於此矣故君子推是心也其治衆人也以衆人之道而已以衆人之所知責其所知以衆人之能行責其所行改而後止不厚望也其愛人也以忠恕而已忠者誠有是心而不自欺恕者推待已之心以及人者也忠恕不可謂之道而道非忠恕不行此所以言違道不逺者其治已也以求乎人者反於吾身事父事君事兄先施之朋友皆衆人之所能盡人倫之至則雖聖人亦自謂未能此舜所以盡事親之道必至瞽瞍底豫者也庸者常道也事父孝事君忠事兄弟交朋友信庸德也必行而已有問有答有倡有和不越乎此者庸言也無易而已不足而不勉則德有止而不進有餘而盡之則道難繼而不行無是行也不敢苟言以自欺故言顧行有是言也不敢不行而自棄故行顧言若易之曰所謂則者猶在所執之柯而不在所伐之柯故執柯者必有睨視之勞而猶以為逺也若夫以人治人則異於是蓋衆人之道止在衆人之身若以其所及知者責其知以其所能行者責其行人改即止不厚望焉則不必睨視之勞而所以治之之則不逺於彼而得之矣忠者誠有是心而不自欺也恕者推待已之心以及人也推其誠心以及於人則其所以愛人之道不逺於我而得之矣至於事父事君事兄交友皆以所求乎人者責乎已之所未能則其所以治已之道亦不逺於心而得之矣夫四者固皆衆人之所能而聖人乃自謂未能者亦曰未能如其所以責人者耳此見聖人之心純亦不已而道之體用其大天下莫能載其小天下莫能破舜之所以盡事親之道必至乎瞽瞍底豫者蓋為此也如此然後屬乎庸者常道之云則庶乎其無病矣且其曰有餘而盡之則道難繼而不行又不若游氏所引恥躬不逮為得其文意也案遊氏曰有所不足不敢不勉將以踐言也則其行顧言矣有餘不敢盡恥躬之不逮也則其言顧行矣謝氏侯氏所論論語之忠恕獨得程子之意案謝氏曰以天地之理觀之忠譬則流而不息恕譬則萬物散殊知此則可以知一貫之理矣侯氏曰忠恕一也性分不同夫子聖人也故不待推但程子所謂天地之不恕亦曰天地之化生生不窮特以氣機闔闢有通有塞故當其通也天地變化草木蕃則有似於恕當其塞也天地閉而賢人隱則有似於不恕耳其曰不恕非若人之閉於私欲而實有忮害之心也謝氏推明其說乃謂天地之有不恕乃因人而然則其說有未究者蓋若以為人不致中則天地有時而不位人不致和則萬物有時而不育是謂天地之氣因人之不恕而有似於不恕則可若曰天地因人之不恕而實有不恕之心則是彼為人者既以忮心失恕而自絶於天矣為天地者反效其所為以自己其於穆之命也豈不誤哉案謝氏舉程子曰天地變化草木蕃是天地之恕天地閉賢人隱是天地之不恕或言天地何故亦有不恕曰天地因人者也若不因人何故人能與天地為一故有意必固我則與天地不相似游氏之說其病尤多至謂道無物我之間而忠恕將以至於忘已忘物則為已違道而猶未逺也是則老莊之遺意而逺人甚矣豈中庸之㫖哉案游氏曰夫道一以貫之無物我之間也既曰忠恕則已違道矣然忠以盡已則將以至忘已也恕以盡物則將以至忘物也則善為道者莫近焉故雖違而不逺矣楊氏又謂以人為道則與道二而逺於道故戒人不可以為道如執柯以伐柯則與柯二故睨而視之猶以為逺則其違經背理又有甚焉使經而曰人而為道則逺人故君子不可以為道則其說信矣今經文如此而其說乃如彼既於文義有所不通而推其意又將使道為無用之物人無入道之門而聖人之教人以為道者反為誤人而有害於道是安有此理哉既又曰自道言之則不可為自求仁言之則忠恕者莫近焉則已自知其有所不通而復為是說以救之然終亦矛盾而無所合是皆流於異端之說不但毫釐之差而已也案楊氏曰仁者人也合而言之道也道豈嘗離人哉人而為道與道二矣道之所以逺執柯以伐柯與柯二矣為道之譬也睨而視之猶以為逺為道而逺人之譬也執柯以伐柯其取譬可謂近矣睨而視之猶且以為逺况不能以近取譬乎則其違道可知矣故君子以人治人改而止以人治人仁之也改而止不為巳甚也蓋道一而已仁是也視天下無一物之非仁則道其在是矣然則道終不可為乎曰自道言之則執柯伐柯猶以為逺也自求仁言之則唯忠恕莫近焉故又言之以示進為之方庶乎學者可與入德矣侯氏固多疏闊其引顔子樂道之說愚於論語已辨之矣案侯氏曰為道如言顔子樂道同至於四者未能之說獨以為若止謂恕已以及人則是聖人將使天下皆無父子君臣矣此則諸家皆所不及案侯氏曰父子之仁天性也君臣之義也兄弟亦仁也朋友亦義也孔子自謂皆未能何也只謂恕已以及人則聖人將使天下皆無父子無君臣乎蓋以責人之心責已則盡道也蓋近世果有不得其讀而輒為之說曰此君子以一已之難克而知天下皆可恕之人也嗚呼此非所謂將使天下皆無父子君臣者乎侯氏之言於是乎驗矣君子素其位而行不願乎其外素猶見在也言君子但因見在所居之位而為其所當為無慕乎其外之心也三山陳氏曰因其見在所居之位而行之其在外者非所願也素冨貴行乎冨貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉難去聲此言素其位而行也陳氏曰素富貴行乎富貴如舜之被袗鼓琴是也素貧賤行乎貧賤如舜之飯糗茹草若將終身是也素夷狄行乎夷狄如孔子欲居九夷曰君子居之何陋之有是也素患難行乎患難如孔子曰天之未喪斯文也匡人其如豫何是也蓋君子無所往而不自得惟為吾之所當為而已此說素其位而行之意在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人援平聲此言不願乎其外也陳氏曰吾居上位則不陵忽乎下吾居下位則不攀援於上惟反自責於已初無求取於人之心自然無怨蓋有大責望於天而天不副所望則必怨天有求取於人而人不我應則必歸罪於人聖人無責望於天之心無求取於人之意又何怨尤之有此處見聖人胸中多少灑落明瑩真如光風霽月無一㸃私纍此說不願乎其外之意故君子居易以俟命小人行險以徼幸易去聲易平地也居易素位而行也俟命不願乎外也愚謂君子胸中甚平易所居者安素位而行也富貴貧賤惟聽於天之所命不願乎外也徼求也幸謂所不當得而得者語録曰行險徼幸本是連上文不願乎其外說言强生意智取所不當得子曰射有似乎君子失諸正鵠反求諸其身正音征鵠工毒反畫布曰正棲皮曰鵠皆侯之中射之的也詩傳曰侯張布而射之者也正設的於侯中而射之者也大射則張皮侯而設鵠賔射則張布侯而設正子思引此孔子之言以結上文之意陳氏曰如射法之有不中只是自責恐我步法之或不正手法之或不端所致曽不責之他人此以證君子以求諸已不願乎其外之意右第十四章子思之言也凡章首無子曰字者放此或問十四章之說曰此章文義無可疑者而張子所謂當知無天下國家皆非之理者尤為切至案張子曰責已者當知無天下國家皆非之理故學至於不尤人學之至也吕氏說雖不免時有小失然其大體則皆平正慤實而有餘味也案吕氏曰達則兼善天下得志則澤加於民素富貴行乎富貴也不驕不淫不足以道之也窮則獨善其身不得志則修身見於世素貧賤行乎貧賤者也不諂不懾不足以道之也言忠信行篤敬雖蠻貊之邦行矣素夷狄行乎夷狄者也文王內文明而外柔順以蒙大難箕子內難而能正其志素患難行乎患難者也愛人不親反其仁治人不治反其智此在上位所以不陵下也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉此在下位所以不援上也陵下不從則罪其下援上不得則非其上是所謂尤人者也庸德之行庸言之謹居易者也國有道不變塞焉國無道至死不變心逸日休行其所無事如子從父命無所往而不受俟命者也若夫行險以徼一旦之幸得之則貪為已力不得則不能反躬是所謂怨天者也故君子正已而不求於人如射而已射之不中由吾巧之不至也故失諸正鵠者未有不反求諸身如君子之治已行有不得亦反求諸身則德之不進豈吾憂哉游氏說亦條暢而存亡得喪窮通好醜之說尤善案游氏曰素其位而行者即其位而道行乎其中若其素然也舜之飯糗茹草若將終身此非素貧賤而道行乎貧賤不能然也及其為天子被袗衣鼓琴若固有之此非素富貴而道行乎富貴不能然也飯糗袗衣其位雖不同而此道之行一也至於夷狄患難亦若此而已道無不行則無入而不自得矣蓋道之在天下不以易世而有存亡故無古今則君子之行道不以易地而有加損故無得喪至於在上位不陵下知富貴之非泰也在下位不援上知貧賤之非約也此惟正已而不求於人者能之故能上不怨天下不尤人蓋君子為能循理故居易以俟命居易未必不得也故窮通皆好小人反是故行險以徼幸行險未必常得也故窮通皆醜學者要當篤信而已但楊氏以反身而誠為不願乎外則本文之意初未及此而詭遇得禽亦非行險徼幸之謂也案楊氏曰君子居其位若固有之無出位之思素其位也萬物皆備於我反身而誠樂莫大焉何願乎外之有故能素其位而行無入而不自得也居易以俟命行其所無事也行險以徼幸不受命者也詭遇而得禽者蓋有焉君子不為也射有似乎君子者射以容節比於禮樂為善內志正外體直然後持弓矢審固持弓矢審固然後可以言中射而失正鵠者未能審固也知射者豈他求哉反而求諸身以正吾志而已此君子居易之道也世之行險以徼幸者一有失焉益思所以詭遇也則異於是矣侯氏所辨常總默識自得之說甚當近世佛者妄以吾言傳著其說而指意乖刺如此類者多矣甚可笑也案常總嘗問二士人曰論語云默而識之識是識箇甚子思言君子無入不自得得是得箇甚或者無以對侯氏曰是不識吾儒之道猶以吾儒語為釋氏用在吾儒為不成說話既曰默識與無入不自得更理㑹甚識甚得之事是不成說話也令人見筆墨須謂之筆墨見人須謂之人不須問默而識之是默識也聖賢於道猶是也庸言之信庸行之謹是自得也豈可名為所得所識之事乎但侯氏所以自為說者却有未善若曰識者知其理之如此而已得者無所不足於吾心而已則豈不明白真實而足以服其心乎君子之道辟如行逺必自邇辟如登高必自卑辟譬同詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑好去聲耽詩作湛亦音耽樂音洛詩小雅常棣之篇鼓瑟琴和也翕亦合也耽亦樂也帑子孫也子曰父母其順矣乎夫子誦此詩而贊之曰人能和於妻子冝於兄弟如此則父母其安樂之矣子思引詩及此語以明行逺自邇登髙自卑之意右第十五章或問十五章之說曰章首二句承上章而言道雖無所不在而其進之則有序也其下引詩與夫子之言乃指一事以明之非以二句之義為止於此也諸說唯吕氏為詳實然亦不察此而反以章首二言發明引詩之意則失之矣案吕氏曰不得乎親不可以為人不順乎親不可以為子故君子之道莫大乎孝孝之本莫大乎順父母故仁人孝子欲順乎親必先乎妻子不失其好兄弟不失其和室家宜之妻帑樂之致家道成然後可以養父母之志而無違行逺登高者謂孝莫大乎順其親者也自邇自卑者謂本乎妻子兄弟者也故身不行道不行於妻子文王刑于寡妻至於兄弟則治家之道必自妻子始三山陳氏曰行逺自邇登高自卑凡君子之道其推行之序皆然中庸舉詩以明之特指一事而言耳或者以行逺登高辟順父母以自邇自卑辟和妻子則泥矣子曰鬼神之為德其盛矣乎程子曰鬼神天地之功用語録曰功用兼精粗而言天地是體鬼神是用又曰功用只是論發見者又曰如寒來暑往日往月來春生夏長秋收冬藏皆鬼神之功用而造化之迹也語録曰鬼神是天地間造化只箇二氣屈伸往來神屬陽鬼屬陰往者屈來者伸便有箇迹恁地又曰雨風露雷日月晝夜此鬼神之迹也此是白日公平正直之鬼神若所謂有嘯于梁觸吾躬此其所謂不正邪暗或有或無或去或來或聚或散者又有所謂禱之而應祈之而獲此亦所謂鬼神同一理也世間萬事皆此理但精粗小大之不同耳陳氏曰造化之迹以陰陽流行著見於天地者言之張子曰鬼神者二氣之良能也語録曰是說往來屈伸乃理之自然非有安排措置又曰二氣即陰陽也良能是其靈處愚謂以二氣言則鬼者隂之靈也神者陽之靈也語録曰二氣謂陰陽對峙各有所屬陳氏曰靈云者只是自然屈伸往來恁地活爾以一氣言則至而伸者為神反而歸者為鬼語録曰一氣即陰陽運行之氣至則皆至去則皆去之謂也又曰以一氣言則方伸之氣亦有伸有屈其方伸者神之神其既屈者神之鬼既屈之氣亦有屈有伸其既屈者鬼之鬼其來格者鬼之神天地人物皆然不離此氣之往來屈伸合散而已陳氏曰自一氣言之則氣之方伸而來者屬陽為神氣之已屈而往者屬陰為鬼如春夏是氣之方長屬陽為神秋冬是氣之已退屬陰為鬼又曰神之為言伸也伸是氣之方長者鬼之為言歸也歸是氣之已退者其實一物而已陳氏曰其實則一物如手之正面屬陽覆手則屬陰為德猶言性情功效語録曰性情乃鬼神之情狀能使天下之人齊明盛服以承祭祀便是功效又曰視之而不見聽之而不聞是情性體物而不可遺是功效問有性情便有功效有功效便有性情所謂性情莫便是二氣之良能否所謂功效者莫便是天地之功用否曰鬼神視之而不見聽之而不聞人須是於那良能與功用上認取其德黃氏曰性情功效只是造化之迹日月自有日月之性情功效風雷自有風雷之性情功效視之而弗見聽之而弗聞體物而不可遺鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也文集曰天地之升降日月之盈縮萬物之消息變化無一非鬼神之所為者是以鬼神雖無形聲而遍體乎萬物之中物莫能遺又曰鬼神者氣之往來須有此氣方有此物是為物之體也又曰物之聚散始終無非二氣之往來伸屈是鬼神之德為物之體而無物能遺之也語録曰有是實理而後有是物鬼神之德所以為物之體而不可遺也其言體物猶易所謂幹事語録曰體幹是主宰體物是與物為體幹事是與事為幹使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右齊側皆反齊之為言齊也所以齊不齊而致其齊也易本義曰湛然純一之謂齊陳氏曰齊其思慮之不齊以至於齊明猶潔也陳氏曰是明潔其心洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也陳氏曰言鬼神之德無所不在能奉承畏敬則此理昭然流動充滿於上下左右間此是鬼神陰陽之發見昭著處蓋體物而不遺之驗也孔子曰其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾語録曰如鬼神之露光處是昭明其氣蒸上處是焄蒿使人精神竦然是悽愴又曰昭明是光耀砥焄蒿是衮然砥悽愴是凛然砥又曰昭明乃先景之屬焄蒿氣之感觸人者悽愴如漢書所謂神君至其風颯然之意又曰焄蒿是鬼神精氣交感處詩曰神之格思不可度思矧可射思度待洛反射音亦詩作斁詩大雅抑之篇格來也矧況也射厭也言厭怠而不敬也陳氏曰言神明之來視不見聽不聞皆不可得而測度矧可厭射而不敬乎思語辭夫微之顯誠之不可掩如此夫夫音扶誠者真實無妄之謂陳氏曰誠字後世都說差了到程子方云無妄之謂誠字義始明至朱子又增兩字曰真實無妄之謂尤見分明隂陽合散無非實者故其發見之不可掩如此文集曰鬼神只是氣之屈伸其德則天命之實理所謂誠也又曰鬼神是實有者屈是實屈伸是實伸屈伸合散無非實者又曰鬼神皆是實理處發見故未有此氣便有此理既有此理必有此氣陳氏曰此理雖隱微而甚顯以陰陽之往來屈伸皆是真實而無妄所以發見之不可掩如此右第十六章不見不聞隱也體物如在則亦費矣此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隱包小大而言語録曰不見不聞此正指隱處如前後章只舉費以明隱也愚謂此前三章曰道不逺人曰素位而行曰行逺自邇者言日用之間事雖至近而道無不在此費之小者也此後三章曰舜大孝曰文王無憂曰武王周公達孝者言道雖至近而推之則放乎至逺而無窮此費之大者也此章曰不見不聞者即其體之隱而又曰體物如在所謂隱者亦未嘗不昭著此則兼費隱包小大而言也或問鬼神之說其詳奈何曰鬼神之義孔子所以告宰豫者見於祭義之篇其說已詳而鄭氏釋之亦已明矣其以口鼻之噓吸者為魂耳目之精明者為魄蓋指血氣之類以明之語録曰口鼻之噓吸以氣言也目之精明以血言也耳之精明何故以血言醫家以耳屬腎精血盛則聽聰精血耗則耳瞶矣氣為魂血為魄問眼體也眼之光為魄耳體也何以為耳之魄曰能聽者便是如老人耳重目昏便是魄漸要散程子張子更以隂陽造化為說則其意又廣而天地萬物之屈伸往來皆在其中矣陳氏曰鬼神之義甚博程子就陰陽二字發用之迹顯然可見者言之張子亦言二氣自然能如此大綱只是往來屈伸之謂耳蓋陽魂為神隂魄為鬼語録曰問魂魄如何是隂陽曰魂如火魄如水是以其在人也隂陽合則魄凝魂聚而有生隂陽判則魂升為神魄降為鬼語録曰天地陰陽之氣交合便成人氣便是魂精便是魄到得將死熱氣上出所謂魂升下體漸冷所謂魄降魂歸于天魄降于地而人死矣易大𫝊所謂精氣為物遊魂為變故知鬼神之情狀者正以明此語録曰精氣為物精與氣合而生者逰魂為變則氣散而死其魄降矣又曰精氣聚而為物何物而無鬼神逰魂為變魂逰則魄之降可知陳氏曰隂精陽氣聚而生物乃神之伸也而屬乎陽魂逰魄降散而為變乃鬼之歸也而屬乎隂鬼神情狀大槩不過如此而書所謂徂落者亦以其升降為言耳陳氏曰徂是魂之升上落是魄之降下若又以其往來者言之則來者方伸而為神往者既屈而為鬼陳氏曰氣之伸與來處屬陽為神氣之屈與往處屬陰為鬼蓋本上下氣耳蓋二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其義焉學者熟玩而精察之葉氏曰學者先看天地二氣之屈伸若朝暮若寒暑若榮謝大綱已明却反驗之一身自父母成育之始及少長壯老之變起居動息晝夜夢覺熟體而精察之無餘藴矣如謝氏所謂做題目入思議者則庶乎有以識之矣案謝氏曰這箇便是天地間妙用須是將來做箇題目入思議始得講說不濟事曰諸說如何曰吕氏推本張子之說尤為詳備案吕氏曰鬼神者二氣之往來爾物感雖微無不通於二氣故人有是心雖自謂隱微心未嘗不動動則固已感於氣矣鬼神安有不見乎其心之動又必見於聲色舉動之間人乘閒以知之則感之著者也但改本有所屈者不亡一句案吕氏曰往者屈也來者伸也所屈者不亡所伸者無息乃形潰反原之意張子他書亦有是說案張子曰形聚為物形潰反原反原者其游魂為變歟而程子數辨其非東見録中所謂不必以既反之氣復為方伸之氣者其類可考也案程子曰近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終又曰若謂既返之氣復將為方伸之氣必資於此則殊與天地之化不相似天地之化自然生生不窮更何復資於既斃之形既返之氣以為造化近取諸身其開闔往來見之鼻息然不必須假吸復入以為呼氣則自然生人氣之生生於真元天之氣亦自然生生不窮至如海水因陽盛而涸及隂盛而生亦不是將已涸之氣却生水自然能生往來屈伸只是理也盛則便有衰畫則便有夜往則便有來愚謂屈伸往來者氣也其所以屈伸往來者理也往而屈者其氣已散來而伸者其氣方生生生之理自然不窮若謂以既屈之氣復為方伸之氣則是天地間只有許多氣來來去去是輪回之說而非理之本然也謝氏說則善矣但歸根之云似亦微有反原之纍耳案謝氏曰動而不已其神乎滯而有迹其鬼乎往來不息神也摧仆歸根鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知死而致死之不仁聖人所為神明之也語録曰歸根本老氏語畢竟無歸這箇何曽動此性只是天地之性當初亦不是自彼來而入此亦不是自往而復歸如月影在這盆水裏除了這盆水這影便無了豈是這月飛上天去歸那月又如這花落便無這花了豈是歸去那裏明年又復來生這枝上游楊之說皆有不可曉者案遊氏曰道無不在鬼神具道之妙用也其德顧不盛歟夫欲知鬼神之德者反求諸其心而已神將來舍則是神之格思也若正心以度之則乖矣所謂不可度思也正心度之猶不可又况得而忘之乎所謂不可射思也不可度故視不見聽不聞不可射故如在其上如在其左右也夫微之顯如此以其誠之不可掩也誠則物物皆彰矣故不可掩微之顯者其理也誠之不可掩以其德言也楊氏曰鬼神之德唯誠而已誠無幽明之間故其不可掩如此夫不誠則無物所謂體物而不可遺者尚何顯之有知此則知鬼神矣唯妙萬物而無不在一語近是而以其他語考之不知其於是理之實果如何也案楊氏曰鬼神體物而不可遺蓋其妙萬物而無不在故也侯氏曰鬼神形而下者非誠也鬼神之德則誠也案經文本贊鬼神之德之盛如下文所云而結之曰誠之不可掩如此則是以為鬼神之德所以盛者蓋以其誠耳非以誠自為一物而别為鬼神之德也今侯氏乃析鬼神與其德為二物而以形而上下言之乍讀如可喜者而細以經文事理求之則失之逺矣程子所謂只好隔壁聽者其謂此類也夫案侯氏曰只是鬼神非誠也經不曰鬼神而曰鬼神之為德其盛矣乎鬼神之德誠也易曰形而上者謂之道形而下者謂之器鬼神亦器也形而下者也學者心得之可也語録曰侯氏解鬼神之為德謂鬼神為形而下者鬼神之德為形而上者且如中庸之為德不成說中庸形而下者中庸之德為形而上者曰子之以幹事明體物何也曰天下之物莫非鬼神之所為也故鬼神為物之體而物無不待是而有者然曰為物之體則物先乎氣必曰體物然後見其氣先乎物而言順耳語録曰不是有此物時便有此鬼神凡是有這鬼神了方有此物及至有此物了又不能違乎鬼神也體物將鬼神做主將物做賔方看得出是鬼神去體那箇物鬼神却是主也幹猶木之有幹必先有此而後枝葉有所附而生焉貞之幹事亦猶是也子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之與平聲子孫謂虞思陳胡公之屬故大德必得其位必得其祿必得其名必得其壽舜年百有十嵗故天之生物必因其材而篤焉故栽者培之傾者覆之材質也篤厚也語録曰是因材而加厚些子栽植也氣至而滋息為培氣反而遊散則覆語録曰物若扶植種在土中自然生氣湊泊他他若已傾倒則生氣無所附著從何處來相接如人疾病此自有生氣則藥力之氣依之而生意滋長君已危殆則生氣流散而不復相湊矣問上言德而受福而以氣為言者何曰道理是如此亦非定定有箇物使之然若是成時自節節恁地長將去恰似有箇物常扶助他若是敗時自節節恁地消磨將去恰似有箇物來推倒他道理都如此詩曰嘉樂君子憲憲令德冝民冝人受祿于天保佑命之自天申之詩大雅假樂之篇假當依此作嘉憲當依詩作顯申重也故大德者必受命受命者受天命為天子也右第十七章此由庸行之常推之以極其至見道之用廣也而其所以然者則為體微矣後二章亦此意或問十七章之說曰程子張子吕氏之說備矣案程子曰知天命是達天理也必受命是得其應也命者是天之付與如命令之命天之報應皆如影響得其報者是常理也不得其報者非常理也然而細推之則須有報應但人以淺狹之見求之便為差至天命不可易也然有可易者唯有德者能之如修養之引年世祚之祈天永命常人之至於聖賢皆此道也張子曰德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天命命天德氣之不可變者獨死生修夭而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大德所以必受命吕氏曰天命之所屬莫踰於大德至於祿位名夀之皆極則人事至矣天命申矣天之萬物其所以為吉凶之報莫非因其所自取也植之固者加雨露之養則其末必盛茂植之不固者震風凌雨則其本先撥至于人事則得道者多助失道者寡助是皆因其材而篤焉栽者培之傾者覆之者也古之君子既有憲憲之令德而又有宜民宜人之大功此宜受天祿矣故天保佑之申之以受天命此大德所以必受命是亦栽者培之之義與又曰命雖不易惟至誠不息亦足以移之此大德所以必受命楊氏所辨孔子不受命之意則亦程子所謂非常理者盡之案楊氏曰孔子當衰周之時猶之生非其地也雖其雨露之滋而牛羊斧斤相尋於其上則其濯濯然也豈足怪哉而侯氏所推以謂舜得其常而孔子不得其常者尤明白也案侯氏曰舜匹夫也而有天下此所謂必得者先天而天弗違也孔子亦匹夫也亦德為聖人也而不得者後天而奉天時也必得者理之常也不得者非常也得其常者舜也不得其常者孔子也至於顔跖壽夭之不齊則亦不得其常而已楊氏乃忘其所以論孔子之意而更援老𥅆之言以為顔子雖夭而不亡者存則反為衍說而非吾儒之所冝言矣且其所謂不亡者果何物哉若曰天命之性則是古今聖愚公共之物而非顔子所能専若曰氣散而其精神魂魄猶有存者則是物而不化之意猶有滯於冥漠之間尤非所以語顔子也案楊氏曰顔跖之夭夀不齊何也老子曰死而不亡曰夀顔雖夭而不亡者猶在也非夫知性知天者其孰能識之侯氏所謂孔子不得其常者善矣然又以為天於孔子固已培之則不免有自相矛盾處蓋德為聖人者固孔子之所以為栽者也至於祿也位也壽也則天之所當以培乎孔子者而以適丁氣數之衰是以雖欲培之而有所不能及爾是亦所謂不得其常者何假復為異說以汩之哉案侯氏曰天之生物必因其材而篤焉栽者培之傾者覆之如孔子者培之耶覆之耶何其窮也曰培之覆之非謂如孔子者也孔子德為聖人其名與祿夀孰禦焉固已培之矣孟子所謂天爵者也何歉於人爵哉子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之此言文王之事書言王季其勤王家蓋其所作亦積功纍仁之事也語録曰自公劉太王積功纍仁至文王適當天運恰好處武王纘大王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之大音泰下同此言武王之事纘繼也大王王季之父也書云大王肇基王迹三山陳氏曰周家之業自大王遷岐從如歸市是時人心天意已有為王之基矣詩云至于大王實始翦商詩傳曰翦斷也蔡氏曰大王雖未始有翦商之志然大王始得民心王業之成實基於此緒業也戎衣甲胄之屬一戎衣武成文言一著戎衣以伐紂也三山陳氏曰武王一擐戎衣以有天下此蓋天命人心之極不得而辭者武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也追王之王去聲此言周公之事末猶老也追王蓋推文武之意以及乎王迹之所起也語録曰問牧野之奠追王太王王季文王疑武王時已追王曰武王之時恐只是喚呼作玉至周公制禮樂方行其事如今奉上冊寶之類然無可證姑闕之可也先公組紺以上至后稷也愚案組紺大王之父也上祀先公以天子之禮又推大王王季之意以及於無窮也語録曰禮家載祀先王服衮冕祀先公服鷩冕鷩冕諸侯之服雖上祀先公以天子之禮然不敢以天子之服臨其先公但鷩冕七旒十二玉與諸侯不同愚謂組紺以上雖追王所不及然又欲推大王王季之意故以天子之禮祀之制為禮法以及天下使葬用死者之爵祭用生者之祿喪服自期以下諸侯絶大夫降語録曰如期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妹姪在諸侯則亦不絶不降而父母之喪上下同之永嘉陳氏曰伸情於父母處獨齊衰之喪上同於天子其他各有限節等殺不可盡伸也推已以及人也陳氏曰周公以文武之意追尊其先祖又設為禮法通行此意於天下右第十八章子曰武王周公其逹孝矣乎逹通也承上章而言武王周公之孝乃天下之人通謂之孝陳氏曰通天下皆稱之非一人私謂之孝也真氏曰舜之孝如天之不可名故曰大武王周公之孝天下稱之無異辭故曰達猶孟子之言逹尊也夫孝者善繼人之志善述人之事者也上章言武王纘大王王季文王之緒以有天下而周公成文武之德以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通于上下者言之春秋修其祖廟陳其宗器設其裳衣薦其時食祖廟天子七諸侯五大夫三適士二官師一文集曰王制天子七廟三昭三穆與大祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無大祖而皆及其祖考也語録曰適士二廟即祭祖祭禰皆不及髙曾大夫三廟一昭一穆與大祖廟而三大夫亦有始封者又曰官師諸有司之長也只是一廟祭得父母更不及祖矣位卑則流澤淺其理自然如此問今雖士庶人家亦祭三代如此却是違禮曰雖祭三代却無廟亦不可謂之僭古之所謂廟者其體面甚大皆是門堂寢室勝如所居之宫非如今人但以二室為之宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也蔡氏曰赤刀赤削也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓球鳴球也玉磬名河圖伏羲時龍馬負圖出於河所謂一六位北二七位南三八位東四九位西五十位中者易大傳所謂河出圖是也裳衣先祖之遺衣服祭則設之以授尸也愚謂如守祧所藏者是也祭以授尸所以依神也時食四時之食各有其物如春行羔豚膳膏香之類是也愚謂四時之食各有其物以其所以奉諸人者薦諸神蓋以生事之也羔稚羊也豚稚豖也物嫩而肥故用之於春香謂牛膏也調膳之時各以物之所便而和之宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也昭如字為去聲宗廟之次左為昭右為穆而子孫亦以為序文集曰昭穆之次既定則其子孫亦以為序禮所謂昭與昭齒穆與穆齒者是也有事於太廟則子姓兄弟羣昭羣穆咸在而不失其倫焉愚謂左昭右穆者死者之昭穆也羣昭羣穆者生者之昭穆也宗廟之禮非特序死者之昭穆亦所以序生者之昭穆爵公侯卿大夫也事宗祝有司之職事也旅衆也酬導飲也旅酬之禮賔弟子兄弟之子各舉觶於其長而衆相酬蓋宗廟之中以有事為榮故逮及賤者使亦得以申其敬也語録曰主人酌以獻賔賔酢主人曰酢主又自飲而復飲賔曰酬其主人又自飲者是導賔使飲也賔受之却不飲奠於席前至旅時亦不舉又自别舉爵問行旅酬時祭事已畢否曰其大節目則已了亦尚有零碎禮數未竟又問想在飲福受胙之後曰固是古人酢賔便是受胙胙與酢字古通用又曰旅酬者以其家臣或鄉吏之屬大夫則有鄉吏一人先舉觶獻賔賔飲畢即以觶授于執事者執事者則以獻於其長遞遞相承獻及於沃盥者而止焉沃盥謂執盥洗之事至賤者也燕毛祭畢而燕則以毛髮之色别長幼為坐次也齒年數也語録曰燕時擇一人為上賔不與衆賔齒餘者皆序齒踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也踐猶履也其指先王也葉氏曰其字指文王而言所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊祭天社祭地不言后土者省文也語録曰周禮只說祀昊天上帝不說祀后土先儒說祭社便是如郊特牲社稷太牢又如用牲于郊牛二及社于新邑此乃明驗禘天子宗廟之大祭追祭太祖之所自出於太廟而以太祖配之也語録曰禘只祭始祖及所自出之帝二者而已又曰程子曰禘其祖之所自出始封姓者也其祖配之以始祖配也文武必以稷配後世必以文王配所出之祖無廟於太祖之廟祀之而已嘗秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也此與論語文意大同小異記有詳略耳右第十九章或問十八章十九章之說曰吕氏楊氏之說於禮之節文度數詳矣其間有不同者讀者詳之可也案吕氏曰期之喪達乎大夫者期之喪有二有正統之期為祖父母者也有旁親之期為世父母叔父母衆子昆弟昆弟之子是也正統之期雖天子諸侯莫降旁親之期天子諸侯絶服而大夫降所謂尊不同故或絶或降也大夫雖降猶服大功不如天子諸侯之絶服也如旁親之期亦為大夫則大夫亦不降所謂尊同則服其親之服也諸侯雖絶服旁親尊同亦不降所不臣者猶服之如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟是也三年之喪達乎天子者三年之喪為父為母適孫為祖為長子為妻而已天子達乎庶人一也父在為母及妻雖服期然本為三年之喪但為父為夫屈者也故與齊期之餘喪異者有三服而加杖一也十一月而練十三月而祥十五月而禫二也夫必三年而後娶三也周穆后崩太子晉卒叔向曰王一嵗而有三年之喪二則包后亦為三年也又曰宗廟之禮所以序昭穆别人倫也親親之義也父為昭子為穆父親也親者邇則不可不别也祖為昭孫亦為昭祖為穆孫亦為穆祖尊也尊者逺則不嫌於無别也故孫可以為王父尸子不可以為父尸此昭穆之别於尸者也喪禮卒哭而祔男祔于皇祖考女祔于皇祖妣婦祔于皇祖姑喪服小記士大夫不得祔于諸侯祔于諸祖父之為士大夫者亡則中一以上而祔祔必以其昭穆此昭穆之别于祔者也有事于太廟子姓兄弟亦以昭穆别之羣昭羣穆不失其倫凡賜爵昭與昭齒穆與穆齒此昭穆之别於宗者也序爵者序諸侯諸臣與祭者之貴賤也貴貴之義也詩曰相維辟公天子穆穆此諸侯之助祭者也於穆清廟肅雍顯相濟濟多士秉文之德此諸臣之助祭者也序事者别賢與能而援之事也尊賢之義也孰可以為宗而詔相孰可以為祝而祝嘏孰可以贊祼獻孰可以執籩豆至于執爵沃盥莫不辨其賢能之大小而序之也旅酬下為上者使賤者亦得申其敬也下下之義也若特牲饋食之禮賔弟子兄弟弟子各舉觶於其長以行旅酬於宗廟之中以有事為榮也燕毛者既祭而燕則尚齒也長長之義也毛髮色也以髮色别長少而為之序也祭則貴貴貴貴則尚爵燕則親親親親則尚齒其義一也天下之大經親親長長貴貴尊賢而已人君之至恩下下而已一祭之間大經以正至恩以宣天下之事盡矣楊氏曰祭有昭穆所以别父子逺近長幼親疏之序也故有事于太廟則羣昭羣穆咸在而不失其倫焉此宗廟之禮所以序昭穆也尸飲五君洗玉爵獻卿尸飲七以瑤爵獻大夫尸飲九以散爵獻士及羣有司此序爵而尊卑有等所以辨貴賤也玉幣交神明也祼鬯求神於幽也故天地不祼則玉幣尊於鬯也故太宰贊之鬯則大宗伯蒞之祼時又卑於鬯也故小宰贊之若此類所謂序事也先王量德授位因能授職此序事所以辨賢也饋食之終酳尸之獻下逮羣有司更為獻酬此旅酬下為上所以逮賤也既祭而以燕毛為序所以序齒也序昭穆親親也序爵貴貴也序事尚德也旅酬逮賤燕毛序齒尚恩也敬親者不敢慢於人况其所尊乎愛親者不敢惡於人况其所親乎事死如事生若餘閣之奠是也事亡如事存若齊必見其所祭者是也游氏引泰誓武成以為文王未嘗稱王之證深有補於名教案游氏曰武王於泰誓三篇稱文王為文考至武成而柴望然後稱文考為文王仍稱其祖為太王王季然則周公追王大王王季者乃文王之德武王之志也故曰成文武之德不言文王者武王既追王矣武王既追王而不及大王王季以其末受命而其序有未暇也禮記大傳載牧野之奠追王大王亶父王季歷文王昌亦據武成之書以明追王之意出於武王也世之說者因中庸無追王文王之文遂以謂文王自稱王豈未嘗考泰誓武成之書乎君臣之分猶天尊地卑紂未可去而文王稱王是二天子也曽謂至德如文王一言一動順帝之則而反盜虛名而拂天理乎且武王觀政于商而須暇之五年非僞為也使紂一日有悛心則武王當與天下共尊之必無牧野之事然則文王已稱之名將安所歸乎此天下之大戒故不得不辨然歐陽蘇氏之書亦已有是說矣案歐陽氏曰孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事於商乎伯夷叔齊讓國而去顧天下皆莫可歸往歸西伯當是時紂雖無道天子在上諸侯不稱臣而稱王是僣叛之國也彼二子者不食其粟而非其子此豈近於人情耶由是言之謂西伯受命稱王十年者妄說也泰誓稱十有一年說者謂自文王受命九年及武王居喪二年并數之是以聽虞芮之訟謂之受命以為元年古者人君即位必稱元年西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄說也案眉山二蘇氏說與歐陽氏殊不同朱子所引未知何蘇氏也當考郊禘吕游不同然合而觀之亦表裏之說也案吕氏曰事上帝者所以立天下之大本道之所由出也祀乎其先者所以正天下之大經仁義之所由始也洋洋乎如在其上如在其左右雖隱微之間恐懼戒慎而不敢欺則所以養其誠心至矣蓋以為不如是則不足以立身身且不立烏能治國家哉游氏曰祭祀之義非精義不足以究其說非體道不足以致其義蓋惟聖人為能饗帝為其盡人道而與帝同德孝子為能饗親為其盡子道而與親同心也仁孝之至通乎神明而神祗祖考安樂之則於郊社之禮禘嘗之義始可以言明矣夫如是則於為天下國家也何有曰昭穆之昭世讀為韶今從本字何也曰昭之為言明也以其南面而向明也其讀為韶先儒以為晉避諱而改之然禮書亦有作紹字者則假借而通用耳愚案晉避司馬昭之諱故改昭為韶曰其為向明何也曰此不可以空言曉也今且假設諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆當在公宫之東南矣其制則孫育以為外為都宫太祖在北二昭二穆以次而南是也語録曰孫育說出江都集禮愚案孫育云宗廟之制外為都宫內各有寢廟别有門垣太祖在北左昭右穆差次而南蓋太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而墻宇四周焉文集曰一世各為一廟廟有門有堂有室有房有夾室有寢四面有牆太祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔于其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太廟之西夾室而謂之祧語録曰古者始祖之廟有夾室凡祧主皆藏之於夾室凡廟主在本廟之室中皆東向及其祫於太廟之室中則唯太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向文集曰古人廟堂南向室在其北東戶西牖皆南向室西南隅為奧尊者居之故神主在焉詩所謂宗室牖下者也主既在西壁下即須東向故行事之際主人入户西向致敬凡廟皆南向而主皆東向惟祫祭之時羣昭羣穆皆升合食于太祖之時則太祖之主仍東向自如羣昭南向羣穆北向列於太祖之前此前代禮官所謂太祖正東向之位者為祫祭時言也非祫時則羣廟之主在其廟中無不東向矣南向者取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆禮家之說有明文矣蓋二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動文集曰遷毁之序則昭常為昭穆常為穆假令新死者當祔昭廟則毁髙祖之廟而祔其主于左祧遷其祖之主于高祖之故廟而祔新死者于祖之故廟即當祔於穆者其序亦如此祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動此所以祔必以班文集曰儀禮所謂以其班祔檀弓所謂祔于祖父是也尸必以孫語録曰古者立尸必隔一位孫可以為祖尸子不可以為父尸以昭穆不可亂也而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭䢴晉應韓為武之穆則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉愚按后稷至文武十有六世文王於廟次為穆故謂其子為昭管蔡郕霍者文王之子也武王於廟次為昭故謂其子為穆䢴晉應韓者武王之子也曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭是則右反為尊而左反為卑也而可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而內有以各全其尊文集曰諸廟别有門垣足以各全其尊初不以左右為尊卑也必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易文集曰一昭一穆固有定次而其自相為偶亦不可易但其散居本廟各自為主而不相厭則武王進居王季之位而不嫌尊於文王及其合食于祖則王季雖遷而武王自當與成王為偶未可以遽進而居王季之處也唯四時之祫不陳毁廟之主愚謂祫祭有二曽子問曰祫祭於祖則祝迎四廟之主王制云天子祫嘗祫蒸諸侯嘗祫蒸祫此時祭之祫也公羊傳曰毁廟之主陳于大祖未毁廟之主皆升合食于大祖此大祫毁廟未毁廟之主而祭之也則髙祖有時而在穆其禮未有考焉意或如此則髙之上無昭而特設位於祖之西禰之下無穆而特設位於曽之東也與語録曰髙祖四世祖也世與太字古多互用如太子為世子太室為世室之類問髙為穆之義曰新死之主新祔便在昭這一排且如諸侯五廟一是大祖便居中二昭二穆相對令新死者袝則髙過昭穆這一排對空坐禰在昭一排亦對坐以意推之當是如此但禮經難考曰然則毁廟云者何也曰春秋𫝊曰壞廟之道易檐可也改塗可也說者以為將納新主示有所加耳非盡撤而悉去之也語録曰改塗易檐言不是盡除只改其灰飾易其屋檐而已曰然則天子之廟其制若何曰唐之文祖虞之神宗商之七世三宗其詳今不可考獨周制猶有可言然而漢儒之記又已有不同矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之說也文集曰韋元成等謂王者始受命諸侯始封之君皆為大祖以下五世而迭毁毁廟之主藏於太祖周之所以七廟者以后稷始封文武受命三廟不毁與親廟四而七謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆之說也文集曰歆謂七者其正法數可常數者宗不在此數中宗變也苟有功德則宗之不可預為設數故於殷有三宗周公舉之以勸成王由是言之宗無數也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之說則武王初有天下之時后稷為太祖而組紺居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而已至成王時則組紺祧王季遷而武王祔至康王時則太王祧文王遷而成王祔至昭王時則王季祧武王遷而康王祔自此以上亦皆且為五廟而祧者藏於太祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣自是以後則穆之祧者藏於文世室昭之祧者藏於武世室而不復藏於太廟矣如劉歆之說則周自武王克商即增立二廟於二昭二穆之上以祀髙圉亞圉如前遞遷至於懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳文集曰昭之二廟親盡則毁而遷其主于昭之宗曽祖遷于昭之二新入廟者祔于昭之三而髙祖及祖在穆如穆廟親盡放此新死者如當為昭則祔于昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曽祖自次廟遷其髙祖於昭之世室蓋于主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為高祖其近廟于主祭者為祖也主祭者沒則祔于穆之近廟而遞遷其主放此語録曰天子七廟如周文武之廟不祧文為穆則凡後之屬乎穆者皆歸於文之廟武為昭則凡後之為昭者皆歸乎武之廟也愚謂父昭子穆而有常數者禮也祖功宗德而無定法者義也周於三昭三穆之外而有文武之廟觀春秋傳稱襄王致文武胙於齊侯史記稱顯王致文武胙於秦孝公方是時文武固已逺矣襄王顯王猶且祀之則其廟不毁可知矣曰然則諸儒與劉歆之說孰為是曰前代說者多是劉歆愚亦意其或然也語録曰歆說得較是他謂宗不在七廟中者恐有功德者多則占了那七廟數也愚謂若從諸儒之說則王者不過立親廟四與太祖為五其與諸侯五廟又何别乎商書已云七世之廟可以觀德則自昔有七廟矣故朱子以歆說為是曰祖功宗德之說尚矣而程子獨以為如此則是為子孫者得擇其先祖而祭之也子亦嘗考之乎曰商之三宗周之世室見於經典皆有明文而功德有無之實天下後世自有公論若必以此為嫌則秦政之惡夫子議父臣議君而除諡法者不為過矣語録曰商之三宗若不是别立廟只是親廟時何不胡亂將三箇來立如何恰曰取祖甲太戊髙宗為之那箇祖有功宗有德天下後世自有公論不以揀擇為嫌所謂名之曰幽厲雖孝子慈孫百世不能改那箇好砥自是合當祭祀如何毁得且程子晚年嘗論本朝廟制亦謂太祖太宗皆當為百世不遷之廟以此而推則知前說若非記者之誤則或出於一時之言而未必其終身之定論也案程子曰祖有功宗有德文武之廟永不祧也所祧者文武以下廟如本朝太祖太宗皆萬世不祧之廟河東閩浙皆太宗取之無可祧之理曰然則大夫士之制奈何曰大夫三廟則視諸侯而殺其二然其太祖昭穆之位猶諸侯也適士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂室寢之備猶大夫也語録曰古者各有始祖之廟以藏祧主如適士二廟各有門堂寢各三間是十八間曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻梲復廟重檐諸侯固有所不得為者矣愚案山節謂欂櫨刻為山形即今之斗拱藻梲者謂侏儒柱畫為藻文梁上短柱也復廟者上下重屋也重檐重承壁材也謂就外檐下壁復安板檐以辟風雨之灑壁諸侯之黝堊斫礱大夫有不得為矣愚案􅉳黑也堊白也地謂之􅉳牆謂之堊斫削也礱磨也大夫之倉楹斫桷士又不得為矣愚案倉楹者蒼其柱也斫桷者磨其榱也曷為而不降哉獨門堂室寢之合然後可名於宫則其制有不得而殺耳蓋由命士以上父子皆異宫生也異宫而死不得異廟則有不得盡其事生事存之心者是以不得而降也曰然則後世公私之廟皆為同堂異室而以西為上者何也曰由漢明帝始也夫漢之為禮略矣然其始也諸帝之廟皆自營之各為一處雖其都宫之制昭穆之位不復如古然猶不失其獨専一廟之尊也語録曰西漢時髙帝廟文帝顧成之廟猶各在一處但無法度不同一處愚案漢不特髙文有廟景帝廟號德陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂游元帝廟號長夀成帝廟號陽池至於明帝不知禮義之正而務為抑損之私遺詔藏主於光烈皇后更衣别室而其臣子不敢有加焉文集曰明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制魏晉循之遂不能革而先王宗廟之禮始盡廢矣降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏於漢明非禮之禮而不得以致其備物之孝蓋其别為一室則深廣之度或不足以陳鼎爼而其合為一廟則所以尊其太祖者既䙝而不嚴所以事其親廟者又厭而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦為虛文矣文集曰更歷魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎俎而陰損其數子孫之心宜亦有所不安矣宗廟之禮既為虛文而事生事存之心有終不能以自已者於是原廟之儀不得不盛然亦至于我朝而後都宫别殿前門後寢始略如古者宗廟之制文集曰本朝原廟之制外為都宮而各為寢廟門垣是其㳂襲之變不唯窮鄉賤士有不得聞而自南渡之後故都淪沒權宜草創無復舊章則雖朝廷之上禮官博士老師宿儒亦莫有能知其原者幸而或有一二知經學古之人乃能私議而竊歎之然於前世則徒知譏孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之苟從則未有正其罪者於今之世則又徒知論其惑異端徇流俗之為陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也文集曰不起寢廟之詔明帝固不得為無失然使章帝有魏顆之孝其羣臣有宋仲幾楚子囊之忠則於此别有處矣况以一時之亂命而壞千古之彜制其事體之輕重又非如三子者之所正者而已耶又曰如李氏所謂略于七廟之室而為祠於佛老之側不為木主而為之象不為禘祫蒸嘗之祀而行一酌莫之禮楊氏所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉抑嘗觀於陸佃之議而知神祖之嘗有意於此矣然而考於史籍則未見其有紀焉若曰未及營表故不得書則後日之秉史筆者即前日承詔討論之臣也所宜深探遺㫖特書總叙以昭示來世而略無一詞以及之豈天未欲使斯人者復見二帝三王制作之盛故尼其事而嗇其傳耶嗚呼惜哉文集曰神祖慨然深詔儒臣討論舊典蓋將以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然陸氏所定昭穆之次又與前說不同文集曰佃謂昭穆者父子之號昭以明下為義穆以恭上為義古其為父則稱昭取其昭以明下也方其為子則稱穆取其穆以恭上也豈可膠哉殊不知昭穆本以廟之居東居西主之向南向北而得名初不為父子之號也必曰父子之號則穆之子又安可復為昭哉且必如佃說新死者必入穆廟而自其父以上穆遷於昭昭遷於穆祔一神而六廟皆為之動則其祔也又何不直祔於父而必隔越一世以祔于其所未應入之廟乎而張琥之議庶幾近之語録曰佃以為祧廟祔廟皆移一匝琥以為祧廟祔廟只移一位讀者更詳考之則當知所擇矣哀公問政哀公魯君名蔣子曰文武之政布在方䇿其人存則其政舉其人亡則其政息方版也䇿簡也愚謂木曰方竹曰䇿䇿以衆聮方一而已先方而後䇿者小大之序聘禮束帛加書百名以上書于䇿不及百名書於方既夕禮書賵於方若九若七若五書遣於䇿息猶滅也有是君有是臣則有是政矣人道敏政地道敏樹夫政也者蒲盧也夫音扶敏速也蒲盧沈括以為蒲葦是也以人立政猶以地種樹其成速矣三山陳氏曰人有良心人之道也敏於從政令之必行地有生意地之道也敏于種樹植之必生而蒲葦又易生之物其成尤速也三山陳氏曰人之易化於政可見物之易生於蒲葦可見言人存政舉其易如此故為政在人取人以身修身以道修道以仁此承上文人道敏政而言也為政在人家語作為政在於得人語意尤備人謂賢臣身指君身道者天下之達道文集曰道是統言義理公共之名仁者天地生物之心而人得以生者所謂元者善之長也文集曰天地以生物為心者也而一物之生又各得夫天地之心以為心者也又曰仁乃天地生物之心而在人者故特為衆善之長語録曰元者天地生物之端倪也仁便是這意思又曰須先識得元與仁是箇甚物事只是初砥意思便是又曰元亨利貞皆是善而元則為善之長亨利貞皆是那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出爾言人君為政在於得人而取人之則又在修身三山陳氏曰為政雖在得賢然使吾身有所未修則取舍不明無以為取人之則能仁其身則有君有臣而政無不舉矣仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也殺去聲人指人身而言真氏曰人之所以為人者以其有是仁也有是仁而後命之曰人不然則非人矣具此生理自然便有惻怛慈愛之意深體味之可見語録曰以生字說仁生自是上一節事當來天地生我砥意我如今須要自體認得宜者分别事理各有所宜也語録曰宜是指事物當然之理又曰道理宜如此禮則節文斯二者而已語録曰節者等級也文不直回互之貌又曰文是裝裹得好如升降揖遜陳氏曰節則無太過文則無不及三山陳氏曰親親之中有隆殺觀五服之義可見矣尊賢之中有等降觀隆師親友之類可推矣惟其有等殺而後禮生焉孟子所謂節文斯二者是也在下位不獲乎上民不可得而治矣鄭氏曰此句在下誤重在此故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天為政在人取人以身故不可以不修身語録曰根本在修身修身以道修道以仁故思修身不可以不事親語録曰事親是仁之根實處最初發得來分曉三山陳氏曰修身而不本於事親則施之無序失為仁之本矣欲盡親親之仁必由尊賢之義故又當知人語録曰知人只如知人則哲之知不是思欲事親先要知人只是思欲事親更要知人若不好砥人與他處豈不為親之纍三山陳氏曰事親之仁不由尊賢之義則善惡不明失事理之宜矣親親之殺尊賢之等皆天理也故又當知天語録曰修身得力處却是知天知天是知至物格知得箇自然道理學若不知天理記得此又忘彼得其一失其二未知天見事頭項多既知天了這裏便都定這事也定那事也定又曰知天是起頭處能知天則知人事親修身皆得其理矣三山陳氏曰事親知人而等殺不明不知天理者也書曰天秩有禮故于此又當知天自禮所生也以上推其理之所由生自君子不可不修身以下繹其義之所以貫天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達德也所以行之者一也知去聲達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長幼有序朋友有信是也三山陳氏曰書言五典孟子言五者人之大倫典常也倫理也出於天理而可以常行其中庸達道之謂乎知所以知此也仁所以體此也勇所以强此也語録曰理㑹得砥是知行得砥是仁著力去做砥是勇潘氏曰體謂所存守處謂之達德者天下古今所同得之理也一則誠而已矣蔡氏曰逹道本於達德而達德又本於誠誠者達道達德之本而一貫乎逹道逹德者也真氏曰一者誠也三者皆真實而無妄是之謂誠達道雖人所共由然無是三德則無以行之真氏曰道雖人所共由然其知不足以及之則君之當仁臣之當敬子之當孝父之當慈未必不昧其所以然知雖及之而仁不能守仁雖能守而勇不能斷則於當行之理或奪於私欲或蔽於利害以至蔑天常而敗人紀者多矣達德雖人所同得然一有不誠則人欲間之而德非其德矣真氏曰德雖人所同得然或勉强焉或矯飾焉則智出於數術仁流于姑息勇過於彊暴而德非其德矣故行之必本於誠程子曰所謂誠者止是誠實此三者三者之外更别無誠語録曰知仁勇是做砥事誠是行此三者都要實陳氏曰只是實有是知實有是仁實有是勇而已不誠實則無三者之德矣或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也强上聲知之者之所知行之者之所行謂達道也以其分而言則所以知者知也所以行者仁也所以至於知之成功而一者勇也以其等而言則生知安行者知也學知利行者仁也困知勉行者勇也語録曰生知安行以知為主學知利行以仁為主困知勉行以勇為主又曰生知安行主於知而言不知如何行安行者只是安而行之不用著力然須是知得方能行得也學知利行主於仁而言雖是學而知得然須是著意去力行則所學而知得者不為徒知也陳氏曰就知仁勇等級而言之生知安行為知知主於知就知上放重蓋先能知之而後能行之也學知利行為仁仁主於行以行處為重故知得須是行得也困知勉行為勇此氣質昏懦之人昏不能知懦不能行非勇則不足以進道蓋人性雖無不善而氣稟有不同者故聞道有蚤莫行道有難易然能自强不息則其至一也語録曰就人之所稟而言又有昏明清濁之異故上知生知之資是氣清明純粹而無一毫昏濁所以生知安行不待學而能如堯舜是也其次則亞於生知必學而後知必行而後至又其次者資稟既偏又有所蔽須是痛加工夫人一已百人十已千然後方能又亞於生知而及進而不已則成功一也吕氏曰所入之塗雖異而所至之域則同此所以為中庸若乃企生知安行之資為不可幾及輕困知勉行謂不能有成此道之所以不明不行也語録曰今之學者本是困知勉行砥資質却要學他生知安行砥功夫便是生知安行砥資質亦用下困知勉行功夫况是困知勉行砥資質子曰好學近乎知力行近乎仁知恥近乎勇好近乎知之知並去聲子曰二字衍文此言未及乎達德而求以入德之事文集曰上既言達德之名恐學者無所從入故又言其不逺者以示之使由是而求之則可以入德也聖人之言淺深逺近之序不可差次如此真氏曰既言三達德又教人以入德之路夫智必上智仁必至仁勇必大勇然後為至然豈易遽及哉苟能好學不倦則亦近乎知矣力行不已則亦近乎仁矣以不若人為恥則亦近乎勇矣蓋好學所以明理也力行所以進道也知恥所以立志也能於是三者用其功則所謂三達德者庶乎可漸致矣愚謂理之同得者為達德近此德者為入德通上文三知為知三行為仁則此三近者勇之次也語録曰交互說三知都是知三行都是仁三近都是勇生知安行好學又是知學知利行力行又是仁困知勉行知恥又是勇蔡氏曰三知主知三行主仁三近主勇生知者知之知也學知者仁之知也困知者勇之知也安行者仁之仁也利仁者知之仁也勉强行者勇之仁也好學者知之勇也力行者仁之勇也知恥者勇之勇也吕氏曰愚者自是而不求自私者徇人欲而忘反懦者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦三山陳氏曰所謂力行足以忘私者蓋世之怠惰不為者皆所以自便其所欲故曰私知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣斯三者指三近而言人者對己之稱天下國家則盡乎人矣言此以結上文修身之意起下文九經之端也蔡氏曰言修身而以治人治天下國家結之德必有道也言天下國家九經而以修身起之道必本德也凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也經常也三山陳氏曰施之治天下國家可以常行而不變故曰經體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也陳氏曰逺人非四夷之謂如商賈賔旅之人皆是離其家鄉而來須寬柔恤之此列九經之目也吕氏曰天下國家之本在身故修身為九經之本三山陳氏曰九經始於修身身既修則足以為萬事之本然必親師取友然後修身之道進故尊賢次之陳氏曰不與賢者相講磨如何能修身惟知尊敬賢者則見道理明三山陳氏曰下文既有大臣又有羣臣而此又有尊賢之别者蓋此所謂尊者非臣之謂正書所謂能自得師禮所謂當其為師則不臣者也道之所進莫先其家故親親次之陳氏曰欲行道必先從家起由家以及朝廷故敬大臣體羣臣次之陳氏曰由家而推之朝廷則君使臣以禮由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懷諸侯次之此九經之序也陳氏曰九經亦鋪排有次序視羣臣猶吾四體視百姓猶吾子此視臣視民之别也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之此言九經之效也道立謂道成於己而可為民表所謂皇建其有極是也愚謂有此一句方生得下面許多事不惑謂不疑於理陳氏曰是理義昭著無所疑也不眩謂不迷於事敬大臣則信任専而小臣不得以間之故臨事而不眩也陳氏曰是信任専政事舉無所眩迷也來百工則通功易事農末相資故財用足語録曰既有箇國家則百工所為皆少不得都要用若百工聚則事事皆有豈不足以足財用乎如織紝可以足布帛工匠可以足器皿之類柔逺人則天下之旅皆恱而願出於其塗故四方歸懷諸侯則德之所施者博而威之所制者廣矣故曰天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以勸士也時使薄斂所以勸百姓也日省月試既稟稱事所以勸百工也送往迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也齊側皆反去上聲逺好惡斂並去聲既許氣反稟彼錦力錦二反稱去聲朝音潮此言九經之事也陳氏曰九經之事是做工夫處官盛任使謂官屬衆盛足任使令也蓋大臣不當親細事故所以優之者如此忠信重祿謂待之誠而養之厚蓋以身體之而知其所賴乎上者如此也既讀曰餼餼稟稍食也語録曰餼牲餼也如今官員請受有生羊肉廩即廩給折送錢之類是也稱事如周禮稿人職曰考其弓弩以上下其食是也往則為之授節以送之來則豐其委積以迎之語録曰問授節以送其往曰逺人來至去時有節以授之過所在為照如漢之出入關者用繻唐謂之給過所朝謂諸侯見於天子聘謂諸侯使大夫來獻王制比年一小聘三年一大聘五年一朝厚往薄來謂燕賜厚而納貢薄凡為天下國家有九經所以行之者一也一者誠也一有不誠則是九者皆為虛文矣此九經之實也潘氏曰三德行之者一所以實其德九經行之者一所以實其事凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮跲其劫反行去聲凡事指達道達德九經之屬豫素定也跲躓也愚謂躓者礙不行也疚病也此承上文言凡事皆欲先立乎誠如下文所推是也在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣此又以在下位者推言素定之意反諸身不誠謂反求諸身而所存所發未能真實而無妄也語録曰反諸身是反求於心不誠是不曽實有此心如事親以孝須是實有這孝之心若外面假為孝之事裏面却無此心便是不誠矣不明乎善謂未能察於人心天命之本然而真知至善之所在也潘氏曰雖無邪妄茍不合乎正理亦未免乎有眚要之此亦是未知至善之所在誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也中並去聲從七容反此承上文誠身而言誠者真實無妄之謂天理之本然也語録曰誠者都是實理了又曰是自然底實是自然無妄之謂又曰是天性之實然更無纎毫作為誠之者未能真實無妄而欲其真實無妄之謂人事之當然也語録曰誠之者是實其實理又曰恐有不實處便思去實他聖人之德渾然天理真實無妄不待思勉而從容中道則亦天之道也陳氏曰聖人純是天理合下無缺闕處渾然無變動徹內外本末皆真實無一豪之妄不待思而自得此生知也不待勉而自中此安行也且如人行路須是照管方行出路中不然則蹉向邊去聖人如不看路自然在路中間行所謂從容無不中道此天道也未至於聖則不能無人欲之私而其為德不能皆實故未能不思而得則必擇善然後可以明善未能不勉而中則必固執然後可以誠身此則所謂人之道也陳氏曰自大賢以下氣稟不能純乎清明道理未能渾然真實無妄所以不能無人欲之私惟其未能生知故知有不實必思而後得未能安行故行有不實必勉而後中必思而得故須做擇善工夫必勉而中故須做固執工夫擇善是辨析衆理而求其所謂善固執是所守之堅而不為物移未得善則精擇之既得善則固守之擇善是致知之功固執是力行之功須是二者並行乃能至於真實無妄此人道也三山陳氏曰善而不擇則有誤認人欲為天理者矣執之不固則天理有時奪乎人欲矣不思而得生知也不勉而中安行也擇善學知以下之事固執利行以下之事也蔡氏曰不勉而中不思而得先言仁後言知擇善而固執之先言知後言仁亦可見聖人君子之德而不亂博學之審問之慎思之明辨之篤行之此誠之之目也學問思辨所以擇善而為知學而知也篤行所以固執而為仁利而行也語録曰前面四項只是理㑹這物事理㑹得後方去行陳氏曰擇善有博學學問謹思明辨工夫是儘用功多固執只有篤行一件工夫是擇善處真能行之則到行處功自易也程子曰五者廢其一非學也語録曰五者無先後有緩急不可謂博學時未暇審問審問時未暇謹思謹思時未暇明辨明辨時未暇篤行五者從頭做將下去只微有差耳初無先後也有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之己百之人十能之己千之君子之學不為則已為則必要其成故常百倍其功語録曰此是言下工夫人做得一分自已做百分此困而知勉而行者也勇之事也語録曰弗措却是勇事到得後面說人一己百人十己千此方正是說勇處陳氏曰學問思辨知之事篤行仁之事弗措勇之事果能此道矣雖愚必明雖柔必强明者擇善之功强者固執之效語録曰雖愚必明是致知之效雖柔必强是力行之效吕氏曰君子所以學者為能變化氣質而已德勝氣質則愚者可進於明柔者可進於强陳氏曰是雖氣稟十分愚而柔至此德勝氣稟而能變化向也愚而今則明向也柔而今則强矣故學問須是氣質變化然後有以復其初不能勝之則雖有志於學亦愚不能明柔不能立而已矣蓋均善而無惡者性也人所同也昏明强弱之稟不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣語録曰吕氏解得此段痛快讀之未嘗不竦然警厲奮發人若有向學之志須是如此做工夫方得右第二十章黃氏曰此章當一部大學須著反覆看越看越好又曰此章語甚宏博其間語意若不相接而實倫理貫通善讀者當細心以求之求之既得則當優游玩味使心理相涵則大而天下國家近而一身無不曉然見其施為之次第矣此引孔子之言以繼大舜文武周公之緒明其所𫝊之一致舉而措之亦猶是耳陳氏曰前說舜文武周公能盡中庸之道此說孔子能盡中庸之道子思引此以明羣聖道統之相傳蓋包費隱兼小大以終十二章之意業氏曰此章以孔子告哀公之言推廣中庸之道包費隱兼小大以歸於學問之本原章內語誠始詳而所謂誠者實此篇之樞紐也黃氏曰中庸著箇誠字鎖盡愚謂中庸一篇無非說誠自篇首至十六章始露出誠之不可掩一句然不過專說鬼神是以天道言之至此章說許多事末乃說誠身工夫便是人道自此以下分說天道人道極為詳悉又案孔子家語亦載此章而其文尤詳成功一也之下有公曰子之言美矣至矣寡人實固不足以成之也葉氏曰哀公能問以政而不能行其言所謂從而不改說而不繹雖聖人末如之何也故其下復以子曰起答辭今無此問詞而猶有子曰二字蓋子思刪其繁文以附于篇而所刪有不盡者今當為衍文也博學之以下家語無之意彼有闕文抑此或子思所補也歟或問二十章蒲盧之說何以廢舊說而從沈氏也曰蒲盧之為果裸他無所考且於上下文義亦不甚通唯沈氏之說乃與地道敏樹之云者相應故不得而不從耳曰沈說固為善矣然夏小正十月𤣥雉入于淮為蜄而其𫝊曰蜄者蒲盧也則似亦以蒲盧為變化之意而舊說未為無所據也曰此亦彼書之𫝊文耳其他蓋多穿鑿不足據信疑亦出於後世迂儒之筆或反取諸此而附合之決非孔子所見夏時之本文也且又以蜄為蒲盧則不應二物而一名若以蒲盧為變化則又不必解為果裸矣況此等瑣碎既非大義所繫又無明文可證則姑闕之其亦可也何必詳考而深辨之耶曰達道達德有三知三行之不同而其致則一何也曰此氣質之異而性則同也生而知者生而神靈不待教而於此無不知也安而行者安於義理不待習而於此無所咈也此人之稟氣清明賦質純粹天理渾然無所虧喪者也陳氏曰此謂聖人地位學而知者有所不知則學以知之雖非生知而不待困也利而行者真知其利而必行之雖有未安而不待勉也此得清之多而未能無蔽得粹之多而未能無雜天理小失而能亟反之者也陳氏曰此是大賢地位困而知者生而不明學而未達困心衡慮而後知之者也勉强而行者不獲所安未知其利勉力强矯而行之者也此則昏蔽駁雜天理幾亡久而後能反之者也陳氏曰此又次等人地位此三等者其氣質之稟亦不同矣然其性之本則善而已故及其知之而成功也則其所知所至無少異焉亦復其初而已矣陳氏曰凡此皆隨其氣稟之不同然本然之性無有不善或生知或學知或困知及已知處則一般或安行或利行或勉行及其行之成功則一般至此為能復其本然之初矣曰張子吕楊侯氏皆以生知安行為仁學知利行為知困知勉行為勇其說善矣子之不從何也曰安行可以為仁矣然生而知之則知之大而非仁之屬也利行可以為知矣然學而知之則知之次而非知之大也且上文三者之目固有次序而篇首諸章以舜明知以回明仁以子路明勇其語知也不卑矣夫豈専以學知利行者為足以當之乎故今以其分而言則三知為智三行為仁所以勉而不息以至於知之成功之一為勇以其等而言則以生知安行者主於知而為智學知利行者主於行而為仁困知勉行者主於强而為勇又通三近而言則又以三知為智三行為仁而三近為勇之次則亦庶乎其曲盡也歟語録曰問諸說皆以生知安行為仁學知利行為知今反是何也曰論語說仁者安仁知者利仁與中庸說知仁勇意思自别生知安行便是仁在知中學知利行便是仁在知外既是生知必能安行所以謂仁在知中若是學知便是知得淺些了須是力行方始至仁處所以謂仁在知外譬如卓子論語說仁便是直腳處說知便是橫檔處中庸說仁便是橫檔處說知又是直腳處且將諸說録出看看這一邊了又看那一邊便自見得不相礙曰九經之說奈何曰不一其內則無以制其外不齊其外則無以養其內靜而不存則無以立其本動而不察則無以勝其私故齊明盛服非禮不動則內外交養而動靜不違所以為修身之要也陳氏曰齊明以一於內盛服以肅其外內外交相養也齊明盛服是靜而未應接之時以禮而動是動而已應接之時動靜交相養也如此所以修其身真氏曰齊戒明潔所以正其心也盛服儼然所以正其容也心正則容正故曰正其內所以制其外容正則心亦正故曰齊於外者所以養其中此內外交致其功也靜者未應物之時動者應物之際靜而存養則有以全天理之本然動而省察則有以防人欲於將萌此動靜兼用其力也然蔽以一言曰敬而已矣內外動靜無乎不敬身安得而不修乎信讒邪則任賢不専徇貨色則好賢不篤賈捐之所謂後宫盛色則賢者隱微佞人用事則諍臣杜口蓋持衡之勢此重則彼輕理固然矣故去讒逺色賤貨而一於貴德所以為勸賢之道也三山陳氏曰有好賢之心而為讒諂之人貨色之欲奪之則好賢之心衰而賢者去矣故必去讒逺色賤貨而惟德之為貴然後賢者肯為我留也親之欲其貴愛之欲其富兄弟婚姻欲其無相逺故尊位重祿同其好惡所以為勸親親之道也三山陳氏曰親之欲其貴故必尊其位愛之欲其富故必重其祿寧適不來微我弗顧兄弟㛰姻無胥逺矣故必同其好惡也大臣不親細事則以道事君者得以自盡故官屬衆盛足任使令所以為勸大臣之道也三山陳氏曰庶官無曠則大臣得以總其凡於上而以道佐人主若官少不足以備任使則大臣將親細務而不暇於佐主矣盡其誠而恤其私則士無仰事俯育之纍而樂趨事功故忠信重祿所以為勸士之道也三山陳氏曰士者百官之總稱待之不以誠則士不肯盡其心仕有時而為貧使仰事俯育之不給則士不肯盡其力此勸之之道所以既先忠信而又當重祿也愚謂苟無忠信而謂爵祿可以驕士則士有守死而不食其祿者其所得不過庸才耳人情莫不欲逸亦莫不欲富故時使薄斂所以為勸百姓之道也三山陳氏曰使民以時而薄其稅斂則民有餘力餘財而樂於勸功矣日省月試以程其能既稟稱事以償其勞則不信度作淫巧者無所容惰者勉而能者勸矣三山陳氏曰辨其苦良而制其食如槀人春獻素秋獻成書其等以饗工乘其事考其功以下上其食而誅賞之之類則工之不信度者既無所容而能者亦以見知而勸矣為之授節以送其往待以委積以迎其來因能授任以嘉其善不强其所不欲以矜其不能則天下之旅皆恱而願出於其塗矣語録曰因能授任以嘉其善謂願留於其國者也無後者續之己滅者封之治其亂使上下相安持其危使大小相恤朝聘有節而不勞其力貢賜有度而不匱其財則天下諸侯皆竭其忠力以蕃衛王室而無倍畔之心矣真氏曰無後者續之如周武王立夏商之後已滅者封之如齊桓公封衛國凡此九經其事不同然總其實不出乎修身尊賢親親三者而已敬大臣體羣臣則自尊賢之等而推之也子庶民來百工柔逺人懷諸侯則自親親之殺而推之也至於所以尊賢而親親則又豈無所自而推之哉亦曰修身之至然後有以各當其理而無所悖耳陳氏曰其經常有九其實總者有三件三件合來其實歸一件蓋敬大臣體羣臣其本從尊賢來子庶民來百工柔逺人懷諸侯其本從親親來而親親尊賢之本又從修身來曰親親而不言任之以事者何也曰此親親尊賢並行不悖之道也苟以親親之故不問賢否而輕屬任之不幸而或不勝焉治之則傷恩不治則廢法是以富之貴之親之厚之而不曰任之以事是乃所以親愛而保全之也若親而賢則自當置之大臣之位而尊之敬之矣豈但富貴之而已哉觀於管蔡監商而周公不免於有過及其致辟之後則惟康叔𣆀季相與夾輔王室而五叔者有土而無官焉則聖人之意亦可見矣曰子謂信任大臣而無以間之故臨事而不眩使大臣而賢也則可其或不幸而有趙髙朱异虞世基李林甫之徒焉則鄒陽所謂偏聽生姦獨任成亂范睢所謂妬賢嫉能御下蔽上以成其私而主不覺悟者亦安得而不慮耶曰不然也彼其所以至此正坐不知九經之義而然耳使其明於此義而能以修身為本則固視明聽聰而不可欺以賢否矣能以尊賢為先則其所置以為大臣者必不雜以如是之人矣不幸而或失之則亦亟求其人以易之而已豈有知其必能為姦以敗國顧猶置之大臣之位使之姑以奉行文書為職業而又恃小臣之察以防之哉夫勞於求賢而逸於得人任則不疑而疑則不任此古之聖君賢相所以誠意交孚兩盡其道而有以共成正大光明之業也如其不然吾恐上之所以猜防畏備者愈密而其為眩愈甚下之所以欺罔蒙蔽者愈巧而其為害愈深不幸而臣之姦遂則其禍固有不可勝言者幸而主之威勝則夫所謂偏聽獨任御下蔽上之姦將不在於大臣而移於左右其為國家之禍尤有不可勝言者矣嗚呼危哉曰子何以言柔逺人之為無忘賔旅也曰以其列於懷諸侯之上也舊說以為蕃國之諸侯則以逺先近而非其序書言柔逺能邇而又言蠻夷率服則所謂柔逺亦不止謂服四夷也況愚所謂授節委積者比長遺人懷方氏之言掌之於經有明文耶曰楊氏之說有虛器之云者二而其指意所出若有不同者焉何也曰固也是其前段主於誠意故以為有法度而無誠意則法度為虛器正言以發之也其後段主於格物故以為若但知誠意而不知治天下國家之道則是直以先王之典章文物為虛器而不之講反語以詰之也此其不同審矣但其下文所引明道先生之言則又若主於誠意而與前段相應其於本段上文之意則雖亦可以宛轉而說合之然終不免於迂回而難通也豈記者之誤耶然楊氏他書首尾衡決亦多有類此者殊不可曉也案楊氏曰天下國家之大不誠未有能動者也雖法度彰明無誠心以行之皆虛器也又曰九經行之者一一者何誠而已然而非格物致知烏足以知其道哉若謂意誠便足以平天下則先王之典章文物皆虛器也故明道先生嘗謂有關雎麟趾之意然後可以行周官之法度正謂此耳曰所謂前定者何也曰先立乎誠也先立乎誠則言有物而不躓矣事有實而不困矣行有常而不疚矣道有本而不窮矣陳氏曰此心之誠平時常常存在無少間斷乃前定之謂言據實物而出則不跲躓矣做事實有箇骨子則不困敗矣行終始如一無破病處矣道如源泉混混不舍晝夜自不窮竭矣諸說惟游氏誠定之云得其要案游氏曰惟至誠為能定惟前定為能應故以言則必行以守則必成以行則無悔以道則無方誠定之效如此張子以精義入神為言是則所謂明善者也案張子曰事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣曰在下獲上明善誠身之說奈何曰夫在下位而不獲乎上則無以安其位而行其志故民不可治然欲獲乎上又不可以諛說取容也其道在信乎友而已蓋不信乎友則志行不孚而名譽不聞故上不見知然欲信乎友又不可以便佞苟合也其道在恱乎親而已蓋不恱乎親則所厚者薄而無所不薄故友不見信然欲順乎親又不可以阿意曲從也其道在誠乎身而已蓋反身不誠則外有事親之禮而內無愛敬之實故親不見恱然欲誠乎身又不可以襲取强為也其道在明乎善而已蓋不能格物致知以真知至善之所在則好善必不能如好好色惡惡必不能如惡惡臭雖欲勉焉以誠其身而身不可得而誠矣此必然之理也三山陳氏曰此言必明善而後身可誠必誠身而後親可順必順親而後友可信必信乎友而後君信之必得乎君而後民可治也遡而言之則君子之學求為有用本欲及人然不得乎君則不能安其位以行其道而得君之道非由容悅必素行信於朋友則名實加於上下矣信於友之道又非可以苟合也所厚者薄於親而不順朋友亦疑之矣然悅親之道又非止於奉養無違而已敬身所以敬親也反諸身而無不誠而後有愛敬之實矣至於誠身之道非真有見於此則好之必不篤辨之必不明有時而入於不善矣此誠身之道所以必始於明善也故夫子言此而其下文即以天道人道擇善固執者繼之蓋擇善所以明善固執所以誠身擇之之明則大學所謂物格而知至也執之之固則大學所謂意誠而心正身修也知至則反諸身者將無一毫之不實意誠心正而身修則順親信友獲上治民將無所施而不利而達道達德九經凡事亦一以貫之而無遺矣輔氏曰始則大學之次序終則中庸之極功曰諸說如何曰此章之說雖多然亦無大得失唯楊氏反身之說為未安耳蓋反身而誠者物格知至而反之於身則所明之善無不實有如前所謂如惡惡臭如好好色者而其所行自無內外隱顯之殊耳若知有未至則反之而不誠者多矣安得直謂但能反求諸身則不待求之於外而萬物之理皆備於我而無不誠哉況格物之功正在即事即物而各求其理今乃反欲離去事物而専務求之於身尤非大學之本意矣案楊氏曰反身者反求諸身也蓋萬物皆備於我非自外得反諸身而已反身而至於誠則利仁者不足道也曰誠之為義其詳可得而聞乎曰難言也姑以其名義言之則真實無妄之云也若事理之得此名則亦隨其所指之大小而皆有取乎真實無妄之意耳蓋以自然之理言之則天地之間惟天理為至實而無妄故天理得誠之名若所謂天之道鬼神之德是也以德言之則有生之類惟聖人之心為至實而無妄故聖人得誠之名若所謂不勉而中不思而得者是也至於隨事而言則一念之實亦誠也一言之實亦誠也一行之實亦誠也是其大小雖有不同然其義之所歸則未始不在於實也愚謂誠之一字有以自然之理言者有以德言者有以事言者隨其所指之大小固有不同然皆有取乎真實無妄之意論其大者天也只是一箇誠字聖人也只是一箇誠字論其小者一物一事之實亦是誠一言一行之實亦是誠曰然則天理聖人之所以若是其實者何也曰一則純二則雜純則誠雜則妄此常物之大情也陳氏曰凡物一色謂之純又曰只一箇誠若不誠則二雜之矣夫天之所以為天也沖漠無朕而萬理兼該無所不具然其為體則一而已矣未始有物以雜之也是以無聲無臭無思無為而一元之氣春秋冬夏晝夜昏明百千萬年未嘗有一息之繆天下之物洪纎巨細飛動植亦莫不各得其性命之正以生而未嘗有一毫之差此天理之所以為實而不妄者也陳氏曰天道流行自古及今無一毫之妄暑往則寒來日往則月來春生了便夏長秋殺了便冬藏元亨利貞終始循環萬古常如此皆理之真實處凡天下之物洪纎髙下飛潜動植青黃黑白萬古皆常然不易如以木葉觀之缺者常缺圖者常圓修者常修短者常短無一毫差錯便待人力十分安排撰造來終不相似都是真實道理自然而然若夫人物之生性命之正固亦莫非天理之實但以氣質之偏口鼻耳目四支之好得以蔽之而私欲生焉是以當其惻隱之發而忮害雜之則所以為仁者有不實矣當其羞惡之發而貪昧雜之則所以為義者有不實矣此常人之心所以雖欲勉於為善而內外隱顯常不免於二致其甚至於詐僞欺罔而卒墮於小人之歸則以其二者雜之故也惟聖人氣質清純渾然天理初無人欲之私以病之是以仁則表裏皆仁而無一毫之不仁義則表裏皆義而無一毫之不義語録曰聖人之生其稟受渾然氣質清明純粹全是此理更不待修為而與天為一又曰天無不實寒便是寒暑便是暑更不待使他恁地聖人仁便真箇是仁義便真箇是義無不實處其為德也固舉天下之善而無一事之或遺而其為善也又極天下之實而無一毫之不滿此其所以不勉不思從容中道而動容周旋莫不中禮也曰然則常人未免於私欲而無以實其德者奈何曰聖人固己言之亦曰擇善而固執之耳夫於天下之事皆有以知其如是為善而不能不為知其如是為惡而不能不去則其為善去惡之心固己篤矣於是而又加以固執之功雖其不睹不聞之間亦必戒謹恐懼而不敢懈則凡所謂私欲者出而無所施於外入而無所藏於中自將消磨泯滅不得以為吾之病而吾之德又何患於不實哉是則所謂誠之者也曰然則大學論小人之隂惡陽善而以誠於中者目之何也曰若是者自其天理之大體觀之則其為善也誠虛矣自其人欲之私分觀之則其為惡也何實如之而安得不謂之誠哉但非天理真實無妄之本然則其誠也適所以虛其本然之善而反為不誠耳語録曰問誠於中形於外是實有惡於中便形見於外然誠者真實無妄安得有惡有惡不幾於妄乎曰此便是惡砥真實無妄善便虛了誠只是實而善惡不同實有一分惡便虛了一分善實有二分惡便虛了二分善曰諸說如何曰周子至矣其上章以天道言其下章以人道言愚於通書之說亦既略言之矣案周子上章曰誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一陰一陽之謂道繼之者善也成之者性也元亨誠之道利貞誠之復大哉易也性命之源乎下章曰聖誠而已矣誠五常之本百行之源也靜無而動有至正而明達也五常百行非誠非也邪暗塞也故誠則無事矣至易而行難果而確無難矣故曰一日克己復禮天下歸仁焉愚案朱子謂上章言太極陰陽五行下章言太極之在人者此兩語已括盡大意程子無妄之云至矣案程子曰無妄之謂誠不欺其次矣語録曰無妄是我無妄故誠不欺者對物而言故次之無妄是自然之誠不欺是著力去做底其他說亦各有所發明案程子曰誠者天之道敬者人事之本敬者用也敬則誠又曰主一之謂敬一者之謂誠敬則有意在讀者深玩而默識焉則諸家之是非得失不能出乎此矣曰學問思辨亦有序乎曰學之博然後有以備事物之理故能參伍之以得所疑而有問問之審然後有以備師友之情故能反復之以發其端而可思思之謹則精而不雜故能自有所得而可以施其辨辨之明則斷而不差故能無所疑惑而可以見於行行之篤則凡所學問思辨而得之者又皆必踐其實而不為空言矣此五者之序也陳氏曰學不止於博覽羣書凡天下事事物物道理皆須一一理㑹故曰博問不可粗略須是詳審凡事物之理紛綸交錯輕重淺深看端的可疑是何處然後問乃能盡師友之情而疑可釋故曰審思不可泛濫而失之放蕩須是謹思則能精而不雜然後實有得于心實有所得則可以辨别衆理毫分縷析自然精明不差自學問思辨至此見得道理真實分曉然後篤力而行之則所以踐其實而不為空言此五者不可廢一然亦有次序須從博學起又須經四節目道理方真知所謂至善所在知得端的確然不可易然後守之方可牢固三山陳氏曰學之博而後有疑有疑然後有問既問而反求諸己然後有思思而有所未安則必尚辨析以精之既精矣然後可以從事於行苟無志於學則已志於學而不序進於此五者則亦自棄之人也曰吕氏之說之詳不亦善乎曰吕氏此章最為詳實然深考之則亦未免乎有病蓋君子之於天下必欲無一理之不通無一事之不能故不可以不學而其學不可以不博及其積纍而貫通焉然後有以深造乎約而一以貫之非其博學之初已有造約之心而姑從事於博以為之地也案吕氏曰君子將以造其約則不可不學學以聚之聚不博則約不可得博學而詳說之將以反說約也為學之道造約為功約即誠也不能至是則多聞多見徒足以飾口耳而已語誠則未也至於學而不能無疑則不可以不問而其問也或粗略而不審則其疑不能盡決而與不問無以異矣故其問之不可以不審若曰成心亡而後可進則是疑之說也非疑而問問而審之說也案吕氏曰學者不欲進則已欲進則不可以有成心有成心則不可與進于道矣故成心存則自處以不疑成心亡然後知所疑矣小疑必小進大疑必大進蓋疑者不安於故而進於新者也如問之審審而知則達孰禦焉學也問也得於外者也若専恃此而不反之心以驗其實則察之不精信之不篤而守之不固矣故必思索以精之然後心與理熟而彼此為一然使其思也或太多而不専則亦泛濫而無益或太深而不止則又過苦而有傷皆非思之善也故其思也又必貴於能謹非獨為反之於身知其為何事何物而已也案吕氏曰不致吾思以反諸身則學問聞見非吾事也故知所以為性知所以為命反之於我何物也知所以為名知所以為義反之於我何事也故曰思則得之不思則不得也慎其所以思必至于得而後己則學問聞見皆非外鑠是乃所謂誠也其餘則皆得之而所論變化氣質者尢有功也曰何以言誠為此篇之樞紐也曰誠者實而已矣語録曰誠是實理自然不假修為者也天命云者實理之原也通書解義曰天之所賦物之所受皆實理之本然無不善之雜性其在物之實體道其當然之實用而教也者又因其體用之實而品節之也不可離者此理之實也隱之見微之顯實之存亡而不可掩者也戒謹恐懼而謹其獨焉所以實乎此理之實也中和云者所以狀此實理之體用也天地位萬物育則所以極此實理之功效也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隱者言實理之用廣而體微也鳶飛魚躍流動充滿夫豈無實而有是哉道不逺人以下至於大舜文武周公之事孔子之言皆實理應用之當然而鬼神之不可掩則又其發見之所以然也陳氏曰自天地以至人物小者大者皆是真實道理如此愚謂朱子言萬理皆實又言實理者合當決定是如此其誠之謂歟聖人於此固以其無一毫之不實而至於如此之盛其示人也亦欲其必以其實而無一毫之僞也蓋自然而實者天也必期於實者人而天也誠明以下纍章之意皆所以反復乎此而語其所以至於正大經而立大本參天地而贊化育則亦真實無妄之極功也通書解義曰聖人之所以聖不過全此實理而已卒章尚絅之云又本其務實之初心而言也內省者謹獨克己之功不愧屋漏者戒謹恐懼而無已可克之事皆所以實乎此之序也時靡有爭變也百辟刑之化也無聲無臭又極乎天命之性實理之原而言也黃氏曰中庸前面教人做工夫中庸又怕人做得不實故教之以誠到衣錦尚絅以後又歸天命之謂性處蓋此篇大指専以發明實理之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一言也黃氏曰道皆實理人惟誠足以盡道至此中庸一篇之義盡矣嗚呼深哉中庸纂疏卷二
