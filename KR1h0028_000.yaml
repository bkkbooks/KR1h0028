body:
  text: 欽定四庫全書經部八四書纂疏四書類提要臣等謹案四書纂疏二十八卷宋趙順孫撰順孫字格菴括蒼人其父雷嘗師事朱子門人滕璘故順孫之學一本於朱子是書備引朱子之説以暢章句集注之旨所旁引者黃幹輔廣陳淳陳孔碩蔡淵蔡沈葉味道胡泳陳埴潘柄黃士毅真德秀蔡模凡一十三家皆為朱子之學者也可謂篤守師説矣昔之論者頗病此書之冗濫然經師著述體例各殊注者辭尚簡明疏者義存曲證順孫書以疏為名而自序云陪穎達公彥後則固疏體也繁而不殺於理亦宜略其蕪雜取其宗旨之正可矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀四書纂疏序格菴趙氏四書纂疏共二十六卷前有清源洪天錫序而陵陽牟子才又分序之其書一以朱子為歸不雜異論於大學中庸先之以章句次以或問間以所聞附其後又以語録暨諸儒發明大義者注其下於論語孟子則一本集注而采或問集義詳説語録所載分注焉昔朱子之為章句也大學則宗程子會衆説而折其中中庸則以己意分之復取石子重集解刪其繁名以輯略其為集注也取二程張范二呂謝遊楊侯尹十一家之説輯為要義更名之曰精義載更集義又本注疏參説又會諸家之言為訓蒙口義更名之曰詳説然後約其精粹為集注而於集注章句之外記其所辨論取舍之意别為或問若是其嚴密也朱子自言集注如稱上稱來無異不髙不低又言添減一字不得然學者非由集義詳説或問語録以觀其全無由審章句集注之精粹則是書之有功於朱子多矣今學宫所頒四書大全蓋即倪仲𢎞之輯釋而是編之流傳者少乃較而刋行之俾相為表裏云康熙丁已納蘭成德容若序四書纂疏序或問尹和靜讀易傳之法和靜曰體用一源顯微無間李延平聞之曰此語固好然學者須理會六十四卦三百八十四爻皆有歸著方可及此二先生豈異旨哉言各有當也蓋學不可以徒博亦不可以徑約徒博則雜徑約則孤此約禮必先之以博文而詳説乃所以反約也文公朱子之於論孟既成集義又作詳説既約其精者為集注又疏其所以去取之意為或問其後集注刪改日以精密而或問遂不復修文公自謂集注乃集義之精髓一字稱輕等重不可增減讀論孟者取足是書焉可也格菴趙公復取文公口授及門人髙弟退而私淑與集注相發者纂而疏之間以所聞附於其後使讀之者如侍考亭師友之側所問非一人所答非一日一開卷盡得之博哉書乎然非約之外有所謂博也人莫不飲食也知味者鮮文公一生精力多在此書一章之旨一字之義或數年更易而後定或終夜思索而未安學者以易心讀之豈能得聖賢之意哉如援先儒與諸家之説有隨文直解不以先後為髙下者有二説俱通終以前説為正者有二説相須其義始備不可分先後者設非親聞未易意逆此纂疏所以有功於後學也僕晚未聞道加以衰瞶廢學公不鄙辱教且命之曰序以幸子竊惟論孟二書文公凡幾序矣僕於要義而得熟讀深思優遊涵泳之説於訓蒙而得本末精粗無敢偏廢之説又於集義而得操存涵養體驗充廣之説終身受持猶懼不蔇何敢復措一辭抑文公曽有言曰大學一書有正經有注解有或問看來看去不用或問只注解足矣久之不用注解只正經足矣又久之自有一部大學在吾胸中正經亦不用矣此文公喫緊教人處也僕於集注纂疏亦云清源洪天錫序四書纂疏序子朱子四書注釋其意精密其語簡嚴渾然猶經也順孫舊讀數百過茫若望洋因遍取子朱子諸書及諸髙第講解有可發明注意者悉彚于下以便觀省間亦以鄙見一二附焉因名曰纂疏顧子朱子之奧順孫何足以知之架屋下之屋強陪於穎達公彥後祗不韙爾遇大方之家則斯疏也當在所削後學趙順孫書四書纂疏引用總目晦庵先生易本義啓蒙詩集解太極解通書解西銘解文集語録三山黃氏幹論語通釋孟子講義直卿諸經講義文集語録慶源輔氏廣論語答問孟子答問漢卿臨漳陳氏淳大學口義中庸口義安卿字義文集語録三山陳氏孔碩大學講義中庸講義膚仲建安蔡氏淵易傳中庸通旨伯靜中庸思問大學思問化原問辨性情幾要建安蔡氏沈書傳仲默栝蒼葉氏味道講義文集知道南康胡氏泳論語衍説伯量永嘉陳氏埴經説木鍾集器之三山潘氏柄講説謙之莆田黃氏士毅講義子洪建安真氏德秀大學衍義讀書記景元文集建安蔡氏模大學演説論語集疏仲覺孟子集疏講義纂疏所載二黃氏三陳氏惟勉齋北溪不書郡餘以郡書若三蔡氏則一門之言更不别異大學章句序大學之書古之大學所以教人之法也朱子語録曰大學之教所以教人先要理會得箇道理蓋自天降生民則既莫不與之以仁義禮智之性矣朱子文集曰天之生物各付一性性非有物只是一箇道理之在我者耳仁則是箇溫和慈愛底道理義則是箇斷制裁割底道理禮則是箇恭敬撙節底道理智則是箇分别是非底道理凡此四者具於人心乃是性之本體然其氣質之稟或不能齊是以不能皆有以知其性之所有而全之也語録曰天地間只是一箇道理性便是理人之所以有善有惡只緣氣質之稟各有清濁又曰氣出於天理亦出於天性是這箇理氣則已屬於形象性之善只一般氣便有不齊處問既與之以仁義禮智之性又有氣質之稟曰氣是那初稟底質是成這模樣了底只一箇隂陽五行之氣衮在天地中精英者為人查滓者為物精英之中又精英者為聖為賢精英之中查滓者為愚為不肖問氣質有昏濁不同則天命之性有偏全否曰非有偏全謂如日月之光若在露地則盡見之若在蔀屋之下有所蔽塞有見有不見昏濁者是氣昏濁了故自蔽塞陳氏曰流行乎一身之間是氣凝定成形者是質一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性語録曰主宰底驀忽生得箇人恁地聰明便是要他作之君作之師書中多是説聰明蓋不是聰明底人則一箇説白一箇説黑如何遏伏得他問何處見得天命處曰此也如何知得只是才生得一箇恁底人定是為億兆之君師便是天命之也他既有許多氣魄才德決不但己必統御億兆之衆人亦自是歸他如三代已前聖人都是如此及至孔子方不然雖不為帝王然也間他不得也做出許多事來以教天下後世是亦天命也又曰秦漢以來講學不明世之人君間有因其才質之美做得功業然無人能知明德新民之事君道間有得其一二而師道則絶無矣此伏羲神農黃帝堯舜所以繼天立極語録曰天只生得許多人物與你許多道理然天却自做不得所以必得聖人為修道立教以教化百姓蓋天做不得底却須聖人為他做此繼天立極也而司徒之職典樂之官所由設也語録曰古者教法禮樂射御書數不可闕一就中樂之教尤親切夔教胄子只用樂大司徒之職也是用樂蓋是教人朝夕從事於此物束得心長在這上面蓋為樂有節奏學他底急也不得慢也不得久之都换了他情性三代之隆其法寖備然後王宮國都以及閭巷莫不有學人生八歲則自王公以下至於庶人之子弟皆入小學陳氏曰初間未知智愚皆當教之而教之以灑掃應對進退之節語録曰古人初學只是教他灑掃應對進退而已未便説到天理處禮樂射御書數之文語録曰古人如禮樂射御書數大綱都從小學中學了大來都不費力又曰今則無所用乎御如禮樂射書數也是合當理會底皆是切用問書莫只是字法否曰此類有數法如日月字是象其形也江河字是諧其聲也考老字是假其類也如此數法若理會得則天下之字皆可通矣愚考之內則成童學射御注謂年十五以上以理推之射御非幼年之所能小學先教其儀式爾及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學陳氏曰到十五年則智愚可見矣故入大學須有别天子之元子當有天下之責衆子當建國為侯公卿大夫元士之適子當有家之責故皆在所教庶人則唯俊秀者乃得與以其亦將任之以位也而教之以窮理正心修己治人之道此又學校之教大小之節所以分也語録曰小學者學其事大學者學其小學所學之事之所以又曰只是一箇事小學是學事親學事長大學便就上面講究委曲其所以事親是如何事長是如何又曰小學只是教他依此規矩做去大學是發明此事理又曰古人小學教之以事便自養得他心不覺自存了到得漸長漸更歷通達事物將無所不能又曰古者小學已自是聖賢坯朴子但未有聖賢許多知見及其長也令入大學使之格物致知長許多知見又曰古人於小學存養已自熟了根基已深厚了到大學只就上點化出些精彩又曰如小學前面許多恰似勉強使人為之又須是恁地勉強到大學功夫方知箇天理當然之則夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彞倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力語録曰俯字是刺著頭只管做將去底意思此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔三山陳氏曰觀其所記皆弟子事父兄童子事先生之禮其條目品節甚悉則知其為小學之書明矣而此篇者則因小學之成功以著大學之明法外有以極其規模之大而內有以盡其節目之詳者也語録曰明德新民便是節目止於至善便是規模之大又曰須先識得外面一箇規模如此大了而內做工夫以實之所謂規模之大凡人為學便當以明明德新民止於至善及明明德於天下為事不成只要獨善其身便了須是志於天下所以大學第二句便説在新民三千之徒蓋莫不聞其説而曽氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用文集曰自聖學不傳為士者不知學之有本而所以求於書不越乎記誦訓詁文詞之間是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗議論愈髙而其德業事功之實愈無以逮乎古人異端虛無寂滅之教其髙過於大學而無實語録曰吾儒更著讀書逐一就事物上理會道理他便都掃了只恁地空空寂寂恁地便道事都了若將些子事付之便都沒奈何其他權謀術數一切以就功名之説與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間文集曰秦漢以來隨世以就功名者未必自其本而推之是以天理不明而人欲熾道學不傳而異端起人挾其私智以馳騖於一世使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沈痼以及五季之衰而壞亂極矣天運循環無往不復宋德隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附己意補其闕略以俟後之君子極知僭踰無所逃罪然於國家化民成俗之意學者修己治人之方則未必無小補云淳熙己酉二月甲子新安朱熹序讀大學章句綱領看大學且逐章理會須先讀本文念得次將章句來解本文又將或問來參章句須逐一令記得反覆尋究待他浹洽既逐段曉得却將來統看溫尋過朱子語録大學一書有正經有解有或問看來看去不用或問只看注解便了久之又只看正經便了又久之自有一部大學在我胸中而正經亦不用矣然不用某許多工夫亦看某底不出不用聖賢許多工夫亦看聖賢底不出語録伊川舊日教人先看大學那時未解説而今有注解覺大段分曉了只在子細去看語録陳氏曰大學章句已示學者一定之準只直案他見成底熟就裏面看意思滋味便見得無窮義理出焉一日教看大學曰我平生精力盡在此書先須通此方可讀他書語録又曰某一生只看得這文字透見得前賢所未到處黃氏曰朱子大學修改甚多三四十年日夜用工不肯輕下皆有深意寓乎其間陳氏曰朱子一生精力在是至屬纊而後絶筆為義極精大學解本文未詳者於或問中則詳之語録陳氏曰大學約其旨於章句已的確真切而詳其義於或問又明實敷暢章句中太簡而或未喻則易枯必於或問詳之或問中太博而或未貫則易泛必於章句約之或問未要看俟有疑處方可去看語録又曰某作或問恐人有疑所以設此要他通曉而今學者未有疑却反被這箇生出疑又曰大學章句次序得皆明白易曉不必或問但致知格物與誠意較難理會不得不明辨之耳欽定四庫全書大學纂疏宋趙順孫撰朱子章句子程子曰大學孔氏之遺書而初學入德之門也於今可見古人為學次第者獨賴此篇之存語録曰大學一書如一部行程歷相似皆有節次今人看了須是行去今日行得到何處明日行得到何處方可漸到那田地而論孟次之語録曰大學語孟最是聖賢為人切要處然語孟却是隨事答問難見要領惟大學一書是曽子述孔子説古人為學之大方而門人又傳述以明其旨體統都具玩味此書知得古人為學所鄉却讀語孟便易入後面工夫雖多而大體已立矣學者必由是而學焉則庶乎其不差矣大學之道在明明德在親民在止於至善程子曰親當作新大學者大人之學也蔡氏曰大人之學者兼齒德而言也明明之也葉氏曰上一箇明字謂用意去明此明德故曰明之也蔡氏曰明之者猶言澡雪揩磨也明德者人之所得乎天語録曰明德是我得之於天而方寸中光明底物陳氏曰是得乎天之理而虛靈不昧以具衆理而應萬事者也語録曰虛靈自是心之本體非我所能虛也耳目之視聽所以視聽者即其心也豈有形象然有耳目以視聽之則猶有形象也若心之虛靈何嘗有物又曰虛靈不昧便是心此理具足於中無少欠闕便是性隨感而動便是情又曰禪家但以虛靈不昧者為性而無具衆理以下之事黃氏曰虛靈不昧明也具衆理應萬事德也具衆理者德之體未發者也應萬事者德之用已發者也而所以應萬事者即其具衆理者之所為也以其所以為德者皆虛靈而不昧故謂之明德也陳氏曰人生得天地之理又得天地之氣理與氣合所以虛靈然虛靈二字只見得氣未見得理到得不昧處便見得理虛靈以氣言不昧以理言又曰只虛靈不昧四字説明德意已足矣更説具衆理應萬事包體用在其中又却實而不為虛其言的確渾圓無可破綻處蔡氏曰虛靈謂知覺不昧謂純瑩昭著也知覺者物格知至也純瑩昭著者意誠心正而可以齊家治國平天下也德即理也具衆理者德之體應萬事者德之用用固不離乎體也但為氣稟所拘人欲所蔽則有時而昏語録曰氣稟所拘多只通得一路或厚於此而薄於彼或通於彼而塞於此有人能盡通天下利害而不識義理或工於百工技藝而不解讀書或只知孝於親而薄於他人便是有所通有所蔽是他性中只通得一路故於他處皆礙又曰物欲所亂如目之於色耳之於聲口之於味鼻之於臭四肢之於安佚所以不明蔡氏曰上天以此而均賦乎人但人之始生氣以成形而氣不無清濁厚薄強弱之殊此所謂氣稟所拘也及人之既生感物而動則耳目口鼻四肢不能無欲此所謂物欲所蔽也氣稟拘之物欲蔽之則人之所得於天之本明者於是乎有時而昏矣然其本體之明則有未嘗息者語録曰此是本領不可不如此説破又曰本是至明物事終是遮不得蔡氏曰雖昏蔽之極而其本體之明終不可得而泯沒必有時而發露此所謂未嘗息也故學者當因其所發而遂明之以復其初也語録曰明德未嘗息時時發見於日用之間如見非義而羞惡見孺子入井而惻隱見尊賢而恭敬見善事而歎慕皆明德之發見也如此推之極多又曰人之明德未嘗不明雖其昏蔽之極而其善端之發終不可絶但當於其所發之端而接續光明之則其全體可以常明且如人知己德之不明而欲明之只這知其不明而欲明之者便是明德就這裏便明將去又曰明明德是明此德只見一點明便於此明去正如人醉醒初間少醒至於大醒亦只是一醒學者貴復其初至於己到地位則不著箇復字黃氏曰明德者一體一用無時而不明也因其所發特言人雖昏憒忽有醒時初不分體用又曰平旦之氣好惡與人相近固是發處處事接物而行其所當然讀書玩理而喜其所可法皆是發處因其發而遂明之則若火然泉達有不可禦者發者自發而不加明之之功則雖有萌蘖之生牛羊又從而牧之矣明之如何曰玩繹思索以盡吾格物致知之功戒謹恐懼以致吾誠意正心修身之實如此而後能明之以復其初也蔡氏曰學者當因其發端之明而遂明之使超然不為氣稟物欲所纍而有以全其本體之明此所謂復其初也新者革其舊之謂也言既自明其明德又當推以及人使之亦有以去其舊染之汚也語録曰新是對舊染之汚而言新與舊非是去外面討來昨日之舊乃是今日之新又曰既是明得此理須當推以及人使各明其德止者必至於是而不遷之意語録曰未至其地則求其至既至其地則不當遷動而之他又曰未到此便住不可謂止到得此而不能守亦不可言止蔡氏曰是者指至善而言至善則事理當然之極也蔡氏曰凡事理皆有當然之則其當然者善也其極則至善也不至於當然不足以為善不至於當然之極不足以為至善至者極也至善猶言至極之理也言明明德新民皆當止於至善之地而不遷語録曰止於至善是包在明明德在新民已也要止於至善人也要止於至善蓋天下只是一箇道理在他雖不能在我之所以望他者則不可不如是也又曰明德新民二者皆要至於極處明德不是只略略底明得便了新民不是只略略底新得便休須是要至於至極處蓋必其有以盡夫天理之極而無一豪人欲之私也蔡氏曰經言至善雖若近指事物當然之理而明德新民推其至極之理是即天命之性而道之大原大本固已涵蓄該貫於其中章句釋至善既曰事理當然之極又日盡其天理之極則所謂事理當然之極者即物物各具一太極也所謂天理之極者即萬物統體一太極也此三者大學之綱領也黃氏曰明明德新民止至善此八字已括盡一篇之意或問大學之道吾子以為大人之學何也曰此對小子之學言之也文集曰古之為教者有小子之學有大人之學小子之學灑掃應對進退之節詩書禮樂射御書數之文是也大人之學窮理修身齊家治國平天下之道是也曰敢問其為小子之學何也曰愚於序文已略陳之而古法之宜於今者亦既輯而為書矣學者不可以不之考也語録曰後生小子且看小學之書那箇是做人底樣子陳氏曰朱子小學書綱領甚好最切於日用雖至大學之成亦不外是曰吾聞君子務其逺者大者小人務其近者小者今子方將語人以大學之道而又欲其考乎小學之書何也曰學之大小固有不同然其為道則一而已是以方其幼也不習之於小學則無以收其放心養其德性而為大學之基本語録曰問放心者或心起邪思意有妄念耳聽邪言目觀亂色口談不道之言至於手足動之不以禮皆是放也收者便於邪思妄念處截斷不續至於耳目言動皆然此乃謂之收既能收此放心德性自然養得不是收放心之外又養箇德性也曰然真氏曰德性謂得之于天者仁義禮智信是也收放心養德性雖云二事其實一事蓋德性在人本皆全備緣放縱其心不知操存是致賊害其性若能收其故心即是養其德性非有二事也及其長也不進之於大學則無以察夫義理措諸事業而收小學之成功文集曰古人由小學而進於大學其於灑掃應對進退之間持守堅定涵養純熟固已久矣大學之序特因小學已成之功是則學之大小所以不同特以少長所習之異宜而有髙下淺深先後緩急之殊文集曰小學之事知之淺而行之小者也大學之道知之深而行之大者也非若古今之辨義利之分判然如薰蕕氷炭之相反而不可以相入也今使幼學之士必先有以自盡乎灑掃應對進退之間禮樂射御書數之習俟其既長而後進乎明德新民以止於至善是乃次第之當然又何為而不可哉文集曰古人之學固以致知格物為先然其始也必養之於小學則亦灑掃應對進退之節禮樂射御書數之習而已是皆酬酢講貫之事也大抵聖賢開示後學進學門庭先後次序極為明備曰幼學之士以子之言而得循序漸進以免於躐等陵節之病則誠幸矣若其年之既長而不及乎此者欲反從事於小學則恐其不免於扞格不勝勤苦難成之患欲直從事於大學則又恐其失序無本而不能以自達也則如之何曰是其歲月之已逝者則固不可得而復追矣若其功夫之次第條目則豈遂不可得而復補耶蓋吾聞之敬之一字聖賢所以成始而成終者也文集曰敬字真是學問始終日用親切之妙為小學者不由乎此固無以涵養本原而謹夫灑掃應對進退之節與夫六藝之教為大學者不由乎此亦無以開發聰明進德修業而致夫明德新民之功也語録曰敬已是包得小學是徹上徹下工夫又曰古人自少小時便做了敬工夫故方其灑掃時加帚之禮至於學詩學樂學舞學絃誦皆要専一且如學射時心若不在何以能中學御時心若不在何以使得他馬書數皆然又曰今人不曽做得小學工夫一旦學大學是以無下手處今且當自持敬始使端的純一靜專然後能致知格物是以程子發明格物之道而必以是為説焉不幸過時而後學者誠能用力於此以進乎大而不害兼補乎其小則其所以進者將不患於無本而不能以自達矣語録曰問大學首云明德却不曽説主敬莫是已具於小學否曰然自小學不傳伊川却是帶補一敬字又曰小學而今都蹉過了不能更轉去做得只據而今地頭便劄住立定腳跟做去栽種後來根株補填前日欠闕如二十歲覺悟便從二十歲立定腳跟做去如三十歲覺悟便從三十歲立定腳跟做去便年八九十歲覺悟亦當據現定劄住硬寨做出陳氏曰程子説一箇主敬工夫可以補小學之闕蓋主敬工夫可以收放心而立大本大本既立然後大學工夫循次序而進無往不通大抵立敬之功貫始終一動靜合內外小學大學皆不可無其或摧頽已甚而不足以有所兼則其所以固其肌膚之會筋骸之束而養其良知良能之本者亦可以得之於此而不患其失之於前也顧以七年之病而求三年之艾非百倍其功不足以致之若徒歸咎於既往而所以補之於後者又不能以自力則吾見其扞格勤苦日有甚焉而身心顛倒眩瞀迷惑終無以為致知力行之地矣況欲有以及乎天下國家也哉語録曰失時而後學必著如此趲補得許多欠闕處人一能之已百之人十能之已千之若不如是悠悠度日一日不做得一日工夫如何要補填前面曰然則所謂敬者又若何而用力耶曰程子於此嘗以主一無適言之矣語録曰主一只是心専一不以他念亂之無適只是不走作又曰了這一事又做一事今人一事未了又要做一事心下千頭萬緒又曰主一又是敬字注解要之事無小無大常令自家精神思盧盡在此遇事時如此無事時也如此又曰且如這事當治不治當為不為便不是主一了若主一時坐則心坐行則心行身在這裏心亦在這裏問主一工夫兼動靜否曰若動時收斂心神在一事上不胡亂思想便是主一問作事時多不能主一曰只是心不定人亦須是定其心這箇須是習須涵養本原則自然别或疑主一則滯滯則不能周流無窮曰所謂主一者何嘗滯於一事不主一則方理會此事而心留於彼這却是滯又問以大綱言之有一人焉方應此事未畢復有一事至則當何如曰也須是做這一件了又理會一件亦無雜然而應之理但甚不得已則權其輕重可也陳氏曰主一是心只在此所主惟一不二不三無適是心只在此亦不之東亦不之西亦不之南亦不之北然主一即是無適只展轉相解釋要分明非於主一之外又别有無適之功也嘗以整齊嚴肅言之矣語録曰整齊嚴肅是切至工夫説與人問主一無適與整齊嚴肅不同否曰如何有兩樣只是箇敬若語言不同自是那時就那事説陳氏曰整齊嚴肅敬之容如坐傾側衣冠落魄便是不敬又曰須是整齊嚴肅烏有外慢而中不放者至其門人謝氏之説則又有所謂常惺惺法者焉語録曰惺惺乃心不昏昧之謂只此便是敬整齊嚴肅固是敬然心昏昧燭理不明雖強把捉豈得為敬又曰今人將敬來别做一事所以有厭倦為思慮引去敬只是自家一箇心常惺惺底不昧將來别做一事又豈可指擎跽曲拳塊然在此而後為敬又曰今人心聳然在此尚無惰慢之氣況心常能惺惺者乎故心常惺惺自無客慮問佛氏亦有此語曰其唤醒此心則同而其為道則異吾儒唤醒此心欲他照管許多道理佛氏則空唤醒在此無所作為其異處在此陳氏曰是就心地上做工夫處蓋心常醒在這裏便常惺惺恁地活若不在便死了心才在這裏則萬理便森然於其中尹氏之説則又有所謂其心收斂不容一物者焉語録曰這心都不著一物便收斂緊密都無些子空罅若這事思量未了又走做那邊去心便成兩路又曰心主這一事不為他事攙亂便是不容一物也觀是數説足以見其用力之方矣語録曰程子謝尹説敬處譬如此屋四方皆入得若從一方入到這裏則那三方入處都在這裏了問諸説有內外之分否曰不必分內外都只一般只認行著都是敬黃氏曰且將自家身心去體察見得如何是主一無適如何是整齊嚴肅如何是常惺惺如何是其心收斂不容一物是四者皆以有所畏而然朱子晚年言敬字之義惟畏字近之其意精矣真氏曰持敬之道合三先生之言而用力焉然後內外交相養之功始備曰敬之所以為學之始者然矣其所以為學之終也奈何曰敬者一心之主宰而萬事之本根也陳氏曰心之為物虛靈知覺所以為一身之主宰也身無此為之主宰則四肢百骸皆無所管攝矣然所以為心者又當由我有以主宰之我若何而主宰之乎所謂敬者是又一心之主宰也知其所以用力之方則知小學之不能無賴於此以為始知小學之賴此以始則夫大學之不能無賴乎此以為終者可以一以貫之而無疑矣蓋此心既立由是格物致知以盡事物之理則所謂尊德性而道問學由是誠意正心以修其身則所謂先立其大者而小者不能奪由是齊家治國以及乎天下則所謂修己以安百姓篤恭而天下平是皆未始一日而離乎敬也語録曰敬不是閉眼默坐便為敬當格物時便敬以格之當誠意時便敬以誠之以至正心修身以後節節常要惺覺執持令此心常在方是能持敬又曰敬字是徹頭徹尾工夫自格物致知至治國平天下皆不外此然則敬之一字豈非聖學始終之要也哉語録曰敬之一字乃聖學始終之要未知者非敬無以知己知者非敬無以守曰然則此篇所謂在明明德在新民在止於至善亦可得而聞其説之詳乎曰天道流行發育萬物語録曰問發育是理發育之否曰有這理便有這氣流行發育理無形體其所以為造化者隂陽五行而已語録曰總而言之只是隂陽分而言之有五黃氏曰天道是理隂陽五行是氣合而言之氣即是理一隂一陽之謂道也分而言之理自為理氣自為氣形而上下是也又曰未有五行只得唤做隂陽既有五行則隂陽在五行之中矣而所謂隂陽五行者又必有是理而後有是氣文集曰天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也語録曰此本無先後之可言然必欲推其所從來則須説先有是理然理又非别為一物即存乎是氣之中無是氣則是理亦無挂搭處氣則為金木水火理則為仁義禮智又曰理未嘗離乎氣然豈無先後理無形氣便粗有查滓黃氏曰理氣無先後謂有是理方有是氣亦可謂有是氣則具是理亦可其實不可以先後言但捨氣則理無安頓處故有是氣則具是理理無迹而氣有形理無際而氣有限理一本而氣萬殊故言理者常先乎氣深思之則無不通也蔡氏曰先有理後有氣者形而上為道形而下為器之謂也有則俱有者道即器之謂也蓋不分先後則理氣不明不合理氣則判為二物如性之與情未發已發自有先後固不可道性情同時也然情之本實具於性非先有此性而後别生一情是有此性即有此情也須著如此兩説及其生物則又必因是氣之聚而後有是形黃氏曰氣虛而形實虛者聚而後實者成如人氣噓呵而能成水也故人物之生必得是理然後有以為健順仁義禮智之性文集曰未分五性時只謂之健順及分而言之則健為仁禮順為智義語録曰此承上文隂陽五行而言健陽也順隂也四者五行也分而言之仁禮屬陽義智屬隂又曰健是稟得那陽之氣順是稟得那隂之氣五常是稟得五行之理人物皆稟得健順五常之性如草木直底硬底是稟得那剛底軟底弱底是稟得那順底必得是氣然後有以為魂魄五藏百骸之身陳氏曰人始於氣感則得魂為先既而體凝焉則魄次之魂主乎動所以行乎此身之中隨所貫而無不生也魄主乎靜所以實乎此身之中隨所注而無不定也故自著者而言之則口鼻靈於呼吸而不息者魂也耳目精於視聽而不散者魄也統而言之則所以貫乎耳目視聽之間使之常靈而不匱者亦魄也至於四肢之靈於舉履五臟六腑之靈於傳送凡氣之所貫常發越而有生意者皆魄也所以注乎口鼻呼吸之間使之常精而不爽者亦魄也至於四肢之精於舉履五臟六腑之精於傳送凡體之所注各凝實而有定理者皆魄也周子所謂無極之真二五之精妙合而凝者正謂是也太極圖解曰真以理言無妄之謂也精以氣言不二之名也語録曰無極是理二五是氣無極之理便是性性為之主而二氣五行經緯錯綜於其間也凝只是此氣結聚自然生物若不如此結聚亦何由造化得萬物出來然以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也語録曰以理言之則無不全以氣言之則不能無偏又曰二氣五行交感萬變故人物之生有精粗之不同自一氣而言之則人物皆受是氣而生自精粗而言則人得其氣之正且通者物得其氣之偏且塞者惟人得其正故是理通而無所塞物得其偏故是理塞而無所知且如人頭圓象天足方象地平生端直以其受天地之正氣所以識道理有知識物受天地之偏氣所以禽獸橫生草木頭生向下尾反在上物之間有知者不過只通得一路人則無不知無不能彼賤而為物者既梏於形氣之偏塞而無以充其本體之全矣語録曰惟其所受之氣只有許多故其理亦只有許多如犬馬他這形氣如此故只會得如此事唯人之生乃得其氣之正且通者而其性為最貴故其方寸之間虛靈洞徹萬理咸備陳氏曰此八字只是再詳虛靈不昧而具萬理之義又曰虛靈洞徹蓋理與氣合而有此妙用爾非可専指氣如心恙底人只有其氣存何故昏迷顛錯無此虛靈洞徹底意耶蓋其所以異於禽獸者正在於此語録曰人物之所以異只是爭這些子若更不能存得則與禽獸無以異矣而其所以可為堯舜而能參天地以贊化育者亦不外焉語録曰初言人之所以異於禽獸者至下須是見已之所以參化育者是則所謂明德者也愚謂此人之所以獨謂之明德而物不得與者也然其通也或不能無清濁之異其正也或不能無美惡之殊語録曰天地之氣有清有濁若值得晦暗昏濁底氣這便不好了又曰人雖皆是天地之正氣但衮來衮去便有昏明厚薄之異蓋氣是有形之物才是有形之物便自有美惡也黃氏曰美惡是有生之初便分了非以性言是以氣言譬如玉之與石則美惡固分而玉之中又有美惡分焉或疑通如何有濁正如何有惡愚謂通塞偏正蓋判人物之大分而言其清濁美惡又就人中分别故其所賦之質清者智而濁者愚美者賢而惡者不肖又有不能同者文集曰問智愚賢不肖是所稟之氣有清濁美惡之不同也不歸於所稟而歸於所賦何耶曰賦猶俗語云分俵均敷之意語録曰問世間有人聰明通曉是稟其氣之清者矣然却所謂過差或流而為小人之歸者又有為人賢而不甚聰明通曉何也曰或問中所謂又有智愚賢不肖之殊是也蓋其所賦之質便有此四樣聰明曉了者智也而或不賢便是稟賦中欠了清和溫恭之德又有人極溫和而不甚曉事便是賢而不智為學便是要克化教此等氣質令恰好耳必其上智大賢之資乃能全其本體而無少不明其有不及乎此則其所謂明德者已不能無蔽而失其全矣語録曰上知生知之資是氣清明純粹而無一豪昏濁所以生知安行不待學而能如堯舜是也其次則亞於生知必學而後知必行而後至又其次者資稟既備又有所蔽須是痛加工夫況乎又以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其德者又豈可勝言也哉真氏曰既有知識與外物接耳目鼻口之私欲一勝則本心為其所奪遂流於不善二者相因反覆深固是以此德之明日益昏昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而參天地而亦不能有以自充矣然而本明之體得之於天終有不可得而昧者是以雖其昏蔽之極而介然之頃一有覺焉則即此空隙之中而其本體已洞然矣語録曰這些覺如擊石之火只是些子才引著便可以燎原若必欲等大覺了方去格物致知如何等得這般時節那箇覺是物格知至了大徹悟到恁地時事都了若是介然之覺一日之間其發也無時無數只要人識認得操持充養將去又曰便是物欲昏蔽之極也無時不醒覺只是醒覺了自放過去不曽存得耳是以聖人施教既已養之於小學之中而後開之以大學之道其必先之以格物致知之説者所以使之即其所養之中而因其所發以啓其明之之端也繼之以誠意正心修身之目者則又所以使之因其己明之端而反之於身以致其明之之實也語録曰如格物致知誠意正心修身五者皆明明德之事格物致知便是要知得分明誠意正心修身便是要行得分明夫既有以啓其明之之端而又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之纍而復得其本體之全哉是則所謂明明德者而非有所作為於性分之外也語録曰性分是以理言之此理聖愚賢否皆同然其所謂明德者又人人之所同得而非有我之得私也語録曰此箇道理人人有之不是自家可専獨之物向也俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑沒溺於卑汚茍賤之中而不自知也豈不為之惻然而思有以救之哉故必推吾之所自明者以及之葉氏曰己德既明視他人之悖理傷道者未嘗不惻然于中又必以我之既明開彼之未明始於齊家終於治國而終及於平天下問齊家治國平天下中所以新之之道是只自明其明德而人自觀感為善耶或亦須有施為如禮樂刑政之類陳氏曰二者皆不可偏廢使彼有是明德而不能自明者亦皆有以自明而去其舊染之汚焉是則所謂新民者而亦非有所付畀增益之也陳氏曰新與舊對明者暗則舊矣今為之開導誘掖使之改過遷善去其舊染之汚又成一箇新底然亦不過復明其本然之德爾然德之在己而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意茍且而為也語録曰茍且如何得會到極處是其所以得之於天而見於日用之間者固已莫不各有本然一定之則真氏曰則者法則也天下之理皆天實為之莫不有一定之法非人力所可增損故曰則程子所謂以其義理精微之極有不可得而名者故姑以至善目之語録曰這是他見得十分極至陳氏曰所謂姑以至善目之者所以極形容其精微爾非謂精微之不為善而借此以形容之也而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也陳氏曰自其大者言之如仁敬慈孝即君臣父子所當止之處自其小者言之如足容重手容恭重與恭即手足所當止之處視思明聽思聰聰與明亦視聽所當止之處衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之教者所以慮其理雖粗復而有不純已雖粗克而有不盡且將無以盡夫修己治人之道故必指是而言以為明德新民之標的也欲明德而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無豪髮之遺恨矣語録曰明德新民初非是人力私意所為本自有一箇當然之則過之不可不及亦不可須是要到當然之則田地而不遷此方是止於至善大抵大學一篇之指總而言之不出乎八事而八事之要總而言之又不出乎此三者此愚所以斷然以為大學之綱領而無疑也然自孟子沒而道學不得其傳世之君子各以其意之所便者為學於是乃有不務明其明德而徒以政教法度為足以新民者語録曰如管仲之徒便是又有愛身獨善自謂足以明其明德而不屑乎新民者語録曰如佛老便是又有略知二者之當務顧乃安於小成狃於近利而不求止於至善之所在者語録曰如王通於己分上亦甚修飾其論為治本末亦有條理甚有志於斯世只是規模淺狹不曽就本原上著功便做不徹是皆不考乎此篇之過其能成己成物而不謬者鮮矣曰程子之改親為新也何所據子之從之何所考而必其然耶且以己意輕改經文恐非傳疑之義奈何曰若無所老而輒改之則誠若吾子之譏矣今親民云者以文義推之則無理新民云者以傳文考之則有據程子於此其所以處之者亦已審矣矧未嘗去其本文而但曰某當作某是乃漢儒釋經不得已之變例而亦何害於傳疑耶若必以不改為是則世蓋有承誤踵訛心知非是而故為穿鑿附會以求其説之必通者矣其侮聖言而誤後學也益甚亦何足取以為法耶知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得后與後同後倣此止者所當止之地即至善之所在也知之則志有定向語録曰知止只是識得一箇去處既已識得即心中便定更不他求如求之彼又求之此即是未定黃氏曰如知君止於仁則胸中定以仁為向葉氏曰心之所之只管望那道理邊而他物不足以搖之靜謂心不妄動語録曰靜則外物自然無以動其心安謂所處而安語録曰安則所處而皆當看扛做那裏去都移易他不得又曰靜謂遇物來能不動安謂隨所寓而安安蓋深於靜也潘氏曰靜謂未有事之時此心常虛靜而不妄動安謂當事物之來隨其所處安間而不亂慮謂處事精詳語録曰慮是見於應事處又曰慮者思之精審又曰是思之重復詳察者得謂得其所止陳氏曰得以實諸己而言乃實得其所當止之地而止之或問知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得何也曰此推本上文之意言明德新民所以止於至善之由也蓋明德新民固皆欲其止於至善然非先有以知夫至善之所在則不能有以得其所當止者而止之如射者固欲其中夫正鵠然不先有以知其正鵠之所在則不能有以得其所當中者而中之也語録曰真箇是知得到至善處便會到能得地位知止云者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也陳氏曰物果格而無一理之不到知果至而無一見之不盡則於天下之事所謂至善所當止者皆灼然有以知之矣能知所止則方寸之間事事物物皆有定理矣語録曰問注謂知之則志有定向或問謂能知所止則方寸之間事事物物皆有定理矣語似不同曰只一般又曰知得到時見事物上各有箇合當底道理理既有定則無以動其心而能靜矣語録曰定是理靜在心既定於理心便會靜若不定於理則此心只是東走西去陳氏曰理既有定則心之所主更無外慕凡外物皆無以動之而能靜矣心既能靜則無所擇於地而能安矣語録曰這箇本只是一意但靜是就心上説安是就身上説今人心才不得靜時雖有意在安頓那物事自是不安又曰既見得事物有定理而此心恁地寧靜了看處在那裏在這邊也安在那邊也安在富貴也安在貧賤也安在患難也安能安則日用之間從容間暇事至物來有以揆之而能慮矣陳氏曰身既能安則向者知所當止之事物或接乎吾前而吾從容以應之自能精於慮而不錯亂矣能慮則隨事觀理極深研幾無不各得其所止之地而止之矣語録曰極深研幾是更審一審當時下得四字未子細要之只著得研幾字又曰到得臨事又須研幾審處方能得所止然既真知所止則其必得所止固己不甚相逺語録曰只是分箇知與得知在外得便在我又曰某事當如此某事當如彼如君當仁此是知止事至物來對著胸中恰好底道理將這箇去應他此是得其所止其間四節蓋亦推言其所以然之故有此四者陳氏曰定靜安慮四節只是就此一事中間細破非如孔子之志學以至從心孟子之善信以至聖神實有等級之相懸為終身經歷之次序也語録曰也不是無等級中間許多只是小階級無那大階級如志學至從心中間許多便是大階級步却闊知止至能得只如志學至立相似立至不惑相似能靜安大抵皆相類只是就中間細分恁地物有本末事有終始知所先後則近道矣明德為本新民為末知止為始能得為終三山陳氏曰新民者自明德而推也己德不明未有能新民者此明明德所以為新民之本能得者原於知止而後致也茍始焉不知止於至善亦未見其卒於有得矣此知止所以為能得之始本始所先末終所後三山陳氏曰曰知所先後云者又以承本末終始而言蓋本與始所當先者也末與終所當後者也此結上文兩節之意或問物有本末事有終始知所先後則近道矣何也曰此結上文兩節之意也明德新民兩物而內外相對故曰本末語録曰明德新民是物明德是理會己之物新民是理會天下之萬物以己之一物對天下萬物便有箇內外本末知止能得一事而首尾相因故曰終始語録曰知止能得是事有箇首尾如耕便種種便耘到秋成後便斂這是事有箇首尾如此誠知先其本而後其末先其始而後其終也則其進為有序而至於道也不逺矣語録曰言知功夫先後次第則進為有序不忽近務逺處下窺髙而其入道為不逺矣所謂至道之近也黃氏曰知所先後方是曉得為學之序未能遂得夫道也然既知其進為之序則有至之階矣故云去道不逺古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物治平聲後倣此明明德於天下者使天下之人皆有以明其明德也陳氏曰明德本在我之物而曰明明德於天下者蓋人皆有是德欲使天下之人皆有以明其明德也乃直指全提蓋總大學之要又在乎此也真氏曰天下之人皆得其本心皆復其本性故曰明明德於天下見得須是天下之人皆明其明德心者身之所主也文集曰心則人之所以主於身而具是理者也又曰其主伊何神變不測發揮萬變立此人極誠實也語録曰誠是自然底實又曰是天理之實然更無纎豪作為黃氏曰誠即是實如一箇物透頭透尾裏面充足無一豪空闕處意者心之所發也語録曰心言其統體意是就其中發出陳氏曰意比心則心大意小心以全體言意只是就全體上發起一念慮處實其心之所發欲其一於善而無自欺也語録曰為善之意稍有不實照管稍有不到處便為自欺又曰只是一箇心便是誠才有兩心便自欺致推極也語録曰致如以手推送去之謂知猶識也推極吾之知識欲其所知無不盡也語録曰人各有箇知識須是推致而極其至不然半上落下終不濟事黃氏曰章句本云欲其所知無不切也今改切作盡切與盡意思自别以致字文義觀之則恐當為盡一物之中固不可使有不知之理萬物之中亦不可使有不窮之物格至也語録曰所謂實到得那地頭物猶事也窮至事物之理欲其極處無不到也語録曰謂於事物之理各極其至窮到盡頭若是裏面核子未破便是未極其至也又曰有一物便有一理窮得到後觸事觸物皆撞著這道理事君便遇忠事親便遇孝居處便恭執事便敬以至在輿倚衡無往不見這箇道理又曰窮理上須見得十分徹底窮到極處須是見得第一著方是不可到第三第四著便休了陳氏曰窮至事物之理表裏灼無遁情如親到而見其然此八者大學之條目也或問古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物何也曰此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心修身者明明德之事也齊家治國平天下者新民之事也語録曰就此八者理會得透徹明德新民都在這裏格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也語録曰格物致知是求知其所止誠意正心修身齊家治國平天下是求得其所止物格知至是知所止意誠心正身修家齊國治天下平是得其所止所謂明明德於天下者自明其明德而推以新民使天下之人皆有以明其明德也人皆有以明其明德則各誠其意各正其心各修其身各親其親各長其長而天下無不平矣文集曰問此處只言誠意正心修身而不及致知又益以親親長長而不及齊家治國平天下曰致知所以明之親親長長即齊家之大者問自昔明明德於天下者亦須由格物致知功夫次第曲折然後始能自明其明德也今使天下之人皆有以明其明德便能各誠其意各正其心各修其身各親其親各長其長而格物致知之功略不煩於用力焉豈不墮於不擇其本而直圖其末之弊曰若欲正心誠意須是格物致知然若説道各格其物各致其知則似不成言語只得如此説過如云一是皆以修身為本豈是刪了上四事耶然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以修其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉強以修之亦不可得而修矣故欲修身者必先有以正其心文集曰心之為物至虛至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殼之外則一身無主萬事無綱雖其俯仰顧盻之間蓋已不自覺其身之所在而心之發則意也一有私欲雜乎其中而為善去惡或有未實則心為所纍雖欲勉強以正之亦不可得而正矣故欲正心者必先有以誠其意語録曰心無形影教人如何撑拄須是從心之所發處下手先須去了許多惡根如人家裏有賊先去了賊方得家中寧如人種田不先去了草如何下種若夫知則心之神明妙衆理而宰萬物者也語録曰神是恁地精彩明是恁地光明又曰大凡道理皆是我自有之物非從外得所謂知者便只是知得我底道理非是以我之知去知彼道理也道理固本有用知方發得出來若無知道理何從而見所以謂之妙衆理猶言能運用衆理也運用字有病故只下得妙字問知如何宰物曰無所知覺則不足以宰制萬物要宰制他也須是知覺問宰萬物是主宰之宰宰制之宰曰主便是宰宰便是制問孟子集注中言心者具衆理而應萬物比妙衆理宰萬物如何曰妙字稍精彩但具字平穩黃氏曰理是不動底物不著妙字如何發得許多理出來人莫不有而或不能使其表裏洞然無所不盡則隱微之間真妄錯雜雖欲勉強以誠之亦不可得而誠矣故欲誠意者必先有以致其知語録曰四方八面都見得周匝無遺是表又要逼就身上來無一豪之不盡是裏陳氏曰致知言表裏洞然以心之內外而言又曰知不致則無以識是非善惡之真將從何而趨從何而舍必有錯認人欲作天理而不自覺者三山陳氏曰欲意之誠而不始於致知則有善否未明而誤於所向者多矣致者推致之謂如喪致乎哀之致言推之而至於盡也三山陳氏曰推之而至於盡有所用力之辭至於天下之物則必各有所以然之故與其所當然之則所謂理也語録曰所以然之故只是上面一層如君之所以仁蓋君是箇主腦人民土地皆屬他管自是用仁愛試不仁愛看便行不得非是説為君了不得已用仁愛自是理合如此又如父之所以慈子之所以孝蓋父子本同一氣只是一人之身分成兩箇其恩愛相屬自有不期然而然者其他大倫皆然皆天理使之如此又曰如事親當孝事兄當弟之類便是當然之則然事親如何却須要孝從兄如何却須要弟此即所以然之故人莫不知而或不能使其精粗隱顯究極無餘則理所未窮知必有蔽雖欲勉強以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物陳氏曰格物言精粗本末究極無餘方周匝物之曲折葉氏曰但能隨事觀理盡與理會將過卒之天下事物之理不惟知得一件兩件若隱若顯蓋將無所不知矣一事一物之間不惟知得一分兩分若精若粗蓋將無所不知矣格者極至之謂如格于文祖之格言窮之而至其極也三山陳氏曰窮之而至其極身至此處之辭此大學之條目聖賢相傳所以教人為學之次第至為纎悉然漢魏以來諸儒之論未聞有及之者至唐韓子乃能援以為説而見於原道之篇則庶幾其有聞矣然其言極於正心誠意而無曰致知格物云者則是不探其端驟語其次亦未免於擇焉不精語焉不詳之病矣何乃以是而議荀掦哉語録曰原道中舉大學却不説致知格物一句蘇氏古史舉中庸不獲乎上却不説不明乎善不誠乎身二句這樣底都是箇無頭學問物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平治去聲後倣此物格者物理之極處無不到也知至者吾心之所知無不盡也文集曰物格猶可以一事言知至則指吾心所可知處不容更有未盡矣語録曰物格是要得外面無不盡知至是裏面亦清徹無不盡又曰如親其所親長其所長而不能推之於天下則是不能盡之於外欲親其所親欲長其所長而自家裏面有所不到則是不能盡之於內須是外無不周內無不具方是知至又曰若知一而不知二知大而不知細知髙逺而不知幽深皆非知之至也知既盡則意可得而實矣語録曰知得此理盡則此箇意便實若有知未透處這裏面黑了意既實則心可得而正矣語録曰意誠後推蕩得查滓盡心總是義理修身以上明明德之事也齊家以下新民之事也物格知至則知所止矣意誠以下則皆得所止之序也或問物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平何也曰此覆説上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦隨所詣而無不盡矣陳氏曰天下事物無一之不格幽明巨細有以洞灼其表裏其知之至也瑩萬理於胸中是極其所真是而不可移非極其所真非而不容易善極其本之所由來而無不徹惡極其幾之所從起而無少遁知無不盡則心之所發能一於理而無自欺矣意不自欺則心之本體物不能動而無不正矣心得其正則身之所處不至陷於所偏而無不修矣陳氏曰物果格知果至由是而往則意極其誠而無一念之或欺心極其正而無一息之不存身極其修而無一動之或偏矣身無不修則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉陳氏曰大要自修身而上工夫最難自齊家而下工夫却易至於治國平天下特舉而措之耳曰篇首之言明明德以新民為對則固專以自明為言矣後段於平天下者復以明明德言之則似新民之事亦在其中何其言之不一而辨之不明邪曰篇首三言者大學之綱領也而以其賓主對待先後次第言之則明明德者又三言之綱領也至此後假然後極其體用之全而一言以舉之陳氏曰此書首三言固當無所不盡而所謂明明德者又通為一篇之統體以見夫天下雖大而吾心之體無不該事物雖多而吾心之用無不貫陳氏曰體具於方寸之間萬理無所不備而無一物能出乎是理之外用發於方寸之間萬事無所不貫而無一理不行乎其事之中此心之所以為妙蓋必析之有以極其精而不亂然後合之有以盡其大而無餘愚案朱子嘗言道體之全渾然一致而精粗本末之分粲然於其中此聖賢之言所以或離或合而乃所以為道體之全也若不知此則卒為無星之稱無寸之尺而已正是此意此又言之序也自天子以至於庶人一是皆以修身為本一是一切也語録曰一切如以刀切物取其整齊正心以上皆所以修身也齊家以下則舉此而錯之耳葉氏曰八者條目修身居中凡格物致知正心誠意許多工夫皆所以修身而齊家治國平天下則又因此身之既修而推之耳其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也本謂身也所厚謂家也文集曰所厚謂父子兄弟骨肉之恩理之所當然而人心之不能已者此兩節結上文兩節之意文集曰大學條目凡八事而章末獨以修身齊家二事結之亦猶前章知所先後之云而旨益深矣或問自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也何也曰此結上文兩節之意也以身對天下國家而言則身為本而天下國家為末語録曰修身是對天下國家説云此是本此是末以家對國與天下而言則其理雖未嘗不一然其厚薄之分亦不容無等差矣三山陳氏曰所厚者家也國與天下本非所薄自家言之則為薄耳故不能格物致知以誠意正心而修其身則本必亂而末不可治三山陳氏曰修身者自格物致知誠意正心而積也不知是則身不可修身之不修則其本亂矣本之既亂如天下國家何不親其親不長其長則所厚者薄而無以及人之親長此皆必然之理也三山陳氏曰事父母而不能孝事兄長而不能弟則是於其所厚者薄矣所厚者猶薄奚望其親天下之親長天下之長哉孟子所謂於所厚者薄無所不薄其言蓋亦本於此云曰治國平天下者天子諸侯之事也卿大夫以下蓋無與焉今大學之教乃例以明明德於天下為言豈不為思出其位犯非其分而何以得為為己之學哉曰天之明命有生之所同得非有我之得私也是以君子之心豁然大公其視天下無一物而非吾心之所當愛無一事而非吾職之所當為雖或勢在匹夫之賤而所以堯舜其君堯舜其民者亦未嘗不在其分內也語録曰小事大事只是道我合當做便如此做又曰那箇事不是分內事又況大學之教乃為天子之元子衆子公侯卿大夫士之適子與國之俊選而設是皆將有天下國家之責而不可辭者則其所以素教而預養之者安得不以天下國家為己事之當然而預求有以正其本清其原哉語録曰所謂天下之事皆我之所當為者只恁地強信不得須是學問到那田地經歷磨煉多後方信得過後世教學不明為人君父者慮不足以及此而茍徇於目前是以天下之治日常少亂日常多而敗國之君亡家之主常接迹於當世亦可悲矣論者不此之監而反以聖法為疑亦獨何哉大抵以學者而視天下之事以為已事之所當然而為之則雖甲兵錢榖籩豆有司之事皆為已也語録曰學者須是為已聖人教人只在大學明明德上以此立心則如今端已斂容亦為己也讀書窮理亦為己也做得一件事是實亦為己也又曰如甲兵錢榖籩豆有司當自家理會便理會不是為别人了理會以其可以求知於世而為之則雖割股廬墓弊車羸馬亦為人耳語録曰才説要人知便是有所為又曰如割股廬墓一則是不忍其親之病一則是不忍其親之死這都是為己若因要人知了去恁地便是為人善乎張子敬夫之言曰為己者無所為而然者也此其語意之深切蓋有前賢所未發者學者以是而日自省焉則有以察乎善利之間而無豪釐之差矣語録曰無所為只是見得自家合當做不是要人道好又曰張子此言與孟子性善養氣之論同功右經一章蓋孔子之言而曽子述之凡二百五字其傳十章則曽子之意而門人記之也舊本頗有錯簡今因程子所定更考經文别為序次如左凡千五百四十六字凡傳文雜引經傳若無統紀然文理接續血脈貫通深淺始終至為精密熟讀詳味久當見之今不盡釋也語録曰大學諸傳有解經處有只引經傳贊揚處其意只是提起一事使人讀著常惺惺底葉氏曰古人只將經傳中句語排列以發明其旨中間義理却自貫通或問子謂正經蓋夫子之言而曽子述之其傳則曽子之意而門人記之何以知其然也曰正經辭約而理備言近而指逺非聖人不能及也然以其無他左驗且意其或出於古昔先民之言也故疑之而不敢質至於傳文或引曽子之言而又多與中庸孟子者合則知其成於曽子門人之手而子思以授孟子無疑也蓋中庸之所謂明善即格物致知之功其曰誠身即誠意正心修身之效也中庸或問曰擇善所以明善固執所以誠身擇之之明則大學所謂物格而知至也執之之固則大學所謂意誠而心正身修也孟子之所謂知性者物格也盡心者知至也存心養性修身者誠意正心修身也語録曰物字對性字知字對心字又曰物理之極處無不到知性也吾心之所知無不盡盡心也又曰知得到時必盡我這心去做如事君必要極於忠為子必要極於孝不是備禮如此既知得到這裏若於心有些子未盡處便打不過便不足其他如謹獨之云不慊之説義利之分常言之序亦無不吻合焉者故程子以為孔氏之遺書學者之先務而論孟猶處其次焉亦可見矣曰程子之先是書而後論孟又且不及乎中庸何也曰是書垂世立教之大典通為天下後世而言者也論孟應機接物之微言或因一時一事而發者也是以是書之規橅雖大然其首尾該備而綱領可尋節目分明而工夫有序無非切於學者之日用陳氏曰大學規模廣大而本末不遺節目詳明而始終不紊學者所當最先講明者論孟之為人雖切然而問者非一人記者非一手或先後淺深之無序或抑揚進退之不齊其間蓋有非初學日用之所及者此程子所以先是書而後論孟蓋以其難易緩急言之而非以聖人之言為有優劣也至於中庸則又聖門傳授極致之言尤非後學之所易得而聞者故程子之教未遽及之豈不又以為論孟既通然後可以及此乎蓋不先乎大學無以提挈綱領而盡論孟之精微不參之論孟無以融貫會通而極中庸之歸趣然不會其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉以是觀之則務講學者固不可不急於四書而讀四書者又不可不先於大學亦已明矣文集曰看大學首尾貫通都無所疑然後可讀語孟又無所疑然後可讀中庸又曰先看大學次語孟次中庸果然下工夫句句字字涵泳切已看得透徹一生受用不盡只怕人不下工夫雖多讀古人書無益書只是明得道理却要人做出書中所説聖賢工夫來若果看此數書他書可一見而決矣陳氏曰讀書次序自有其要先須大學以為入德之門以其中説明明德新民具有條理實羣經之綱領也次則論語以為操存涵養之實又其次則孟子以為體驗充廣之端三者既通然後會其極於中庸今之教者乃或棄此不務而反以他説先焉其不溺於虛空流於功利而得罪於聖門者幾希矣康誥曰克明德康誥周書克能也語録曰此克字雖訓能字然克字比能字有力真氏曰要切處在克之一字大甲曰顧諟天之明命大讀作泰諟古是字大甲商書顧謂常目在之也語録曰目在如目存之常知得有此理不是親眼看只要常常提撕在這裏莫使他昏昧了又曰常在視曕之間存之而不忘又曰常要看教他光明燦爛昭然在目前問天命至微恐不可目在之想只是顧其發見處曰只是見得長長地在面前樣豈是有物可見諟猶此也語録曰顧諟是看此也或曰審也語録曰諟是詳審顧諟乃見得子細天之明命即天之所以與我而我之所以為德者也愚謂自天所與而言則曰命自我之所得而言則曰德常目在之則無時不明矣帝典曰克明峻德峻書作俊帝典堯典虞書峻大也皆自明也結所引書皆言自明已德之意右傳之首章釋明明德此通下三章至止於信舊本誤在沒世不忘之下或問一章而下以至三章之半鄭本元在沒世不忘之下而程子乃以次於此謂知之至也之文子獨何以知其不然而遂以為傳之首章也曰以經統傳以傳附經則其次第可知而二説之不然審矣三山陳氏曰以文𫝑與經傳之次序相統而知之曰然則其曰克明德者何也曰此言文王能明其德也蓋人莫不知德之當明而欲明之然氣稟拘之於前物欲蔽之於後是以雖欲明之而有不克也真氏曰明德人所同有其所以為聖愚之分者但以克明與不能明之異爾常人所以不能明者一則以氣稟昏弱之故二則以物欲蔽塞之故雖是蔽塞之餘若一旦悔悟欲自明其德亦無不可者患在自暴自棄而不肯為耳文王之心渾然天理亦無待於克之而自明矣然猶云爾者亦見其獨能明之而他人不能又以見夫未能明者之不可不致其克之之功也愚謂文王自誠而明者故其心渾然天理表裏澄瑩不待克之而自明若大賢而下未能如文王則不可無克之之功矣曰顧諟天之明命何也曰人受天地之中以生故人之明德非他也即天之所以命我而至善之所存也是其全體大用蓋無時而不發見於日用之間語録曰體用元不相離此身是體動作處便是用天是體萬物資始處便是用地是體萬物資生處便是用陳氏曰於寂然不動之時則合萬殊為一本而渾然之全體常昭融於方寸間及感而遂通之際則散一本為萬殊而縱橫曲直莫非大用之所流行又曰天理本體常生生而無一息之已而其大用亦無一息不流行乎日用之間真氏曰全體言性之本體渾然全備仁義禮智信是也大用言性之發用出來者惻隱羞惡辭遜是非之端是也人惟不察於此是以汩於人欲而不知所以自明常目在之而真若見其參於前倚於衡也語録曰若見其參於前而倚於衡此豈有物可見但是凡人不知省察常行日用每與是德相忘亦不自知其有是也今所謂顧諟者只是心裏常常存著此理在一出言則言必有當然之則不可失也一行事則事又有當然之則不可失也不過如此耳初豈實有一物之可以見其形象邪則成性存存而道義出矣語録曰成性如名明德如表德相似天命都一般又曰成性不曽作壞砥存謂常在這裏存之又存真氏曰言天之與我者自有混成之性如今俗言見成渾淪之物是也我但當存之又存不令頃刻失之則天下之道義無不從此出道義如事君忠事親孝事長弟之類皆是又曰人只要存得這些便見得此性發出底都是道理若不存得這些待做出那箇會合道理曰克明峻德何也曰言堯能明其大德也陳氏曰明德而至於大如光被四表使天下之人皆在吾盛德輝光之內曰是三者固皆自明之事也然其言之亦有序乎曰康語通言明德而已大甲則明天之未始不為人而人之末始不為天也帝典則専言成德之事而極其大焉其言之淺深亦略有序矣語録曰天即人人即天人之始生得於天也既生此人則天又在人矣凡語言動作視聽皆天也只今説話天便在這裏又曰只是言人之性本無不善而其日用之間莫不有當然之則則所謂天理也人若每事做得是則便合天理天人本只一理若理會得此意則天何嘗大人何嘗小也黃氏曰本文三引書乃斷章取義以明經文明明德之意其言之序則自淺而深最為有味克明德者泛言之曰顧諟則言明之之功曰明命則言明德之故次之曰峻德加一峻字則又見明德之極乃所謂止於至善者也湯之盤銘曰苟日新日日新又日新盤沐浴之盤也銘名其器以自警之辭也陳氏曰銘者刻其辭於器因外以警其中也茍誠也語録曰要緊在此一字湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤語録曰盤銘取沐浴之義者蓋謂早間盥濯才到晚下垢汚又生所以常要日新真氏曰身之有垢特形骸之礙耳然人猶知沐浴以去之惟恐塵垢存則其體汚穢至於心者神明之府乃甘心為利欲所昏而不肯一用其力以去之是以形體為重以心性為輕也豈不謬哉言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可略有間斷也陳氏曰誠能一日洗滌而新之則當因其已新者日日新之又日新之工夫無有間斷必到那光明盛大處康誥曰作新民鼓之舞之之謂作語録曰如擊鼓然自然使人跳舞踴躍言振起其自新之民也陳氏曰自新之民已能改過遷善又從而鼓舞振作之使之亹亹不能自已是作其自新之民也此正新民用工夫處詩曰周雖舊邦其命惟新詩大雅文王之篇言周國雖舊至於文王能新其德以及於民而始受天命也語録曰新民之極和天命也新是故君子無所不用其極自新新民皆欲止於至善也語録曰明明德便要如湯之日新新民便要如文王之周雖舊邦其命維新各求止於至善之地而後止也右傳之二章釋新民或問盤之有銘何也曰盤者常用之器銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其有所怠忽而或忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目每警乎心而不至於忽忘也曰然則沐浴之盤而其所刻之辭如此何也曰人之有是德猶其有是身也德之本明猶其身之本潔也德之明而利欲昏之猶身之潔而塵垢汚之也一旦存養省察之功真有以去其前日利欲之昏而日新焉則亦猶其疏瀹澡雪而有以去其前日塵垢之汚也然既新矣而所以新之之功不繼則利欲之交將復有如前日之昏猶既潔矣而所以潔之之功不繼則塵垢之集將復有如前日之汚也故必因其已新而日日新之又日新之使其存養省察之功無少間斷則明德常明而不復為利欲之昏亦如人之一日沐浴而日日沐浴又無日而不沐浴使其疏瀹澡雪之功無少間斷則身常潔清而不復為舊染之汚也愚謂塵垢之汚其害淺利欲之昏其害深塵垢之汚人知求以去之而利欲之昏則不知所以去之惟聖人則以為德之不可不新甚於身之不可不潔也且人之潔身也既知疏瀹澡雪以去前日塵垢之汚矣然其潔之之功不繼則塵垢復集將又如前日之汚故必日加疏瀹澡雪之功無少間斷而後其身常潔而不汚況欲去利欲之昏而復本然之明則存養省察之功其可一日而有間斷哉昔成湯所以反之而至於聖者正惟有得於此故稱其德者有曰不邇聲色不殖貨利又曰以義制事以禮制心有曰從諫弗咈改過不吝又曰與人不求備檢身若不及此皆足以見其日新之實至於所謂聖敬日躋云者則其言愈約而意愈切矣語録曰成湯工夫全是在敬字上看得來大段是一箇修飭底人故當時人説他做功夫處亦説得大段地著如云以義制事以禮制心不邇聲色不殖貨利等語可見日新之功或問中所以特地詳載者非説道人不知亦欲學者經心耳然本湯之所以得此又其學於伊尹而有發焉故伊尹自謂與湯咸有一德而於復政太甲之初復以終始惟一時乃日新為丁寧之戒蓋於是時太甲方且自怨自艾於桐處仁遷義而歸是亦所謂苟日新者故復推其嘗以告于湯者告之欲其日進乎此無所間斷而有以繼其烈祖之成德也其意亦深切矣真氏曰湯之於伊尹學焉而後臣之成湯之聖蓋由學入而其所以有一德者伊尹輔佐之力也又舉以告太甲焉一者純而不雜常而不息之謂也易以日新為盛德人之學不日進則日退故德不可以不日新不日新者不一害之也終始之間常一不變則德日以新矣其後周之武王踐祚之初受師尚父丹書之戒曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶退而於其几席觴豆刀劔戶牖莫不銘焉蓋聞湯之風而興起者今其遺語尚幸頗見於禮書願治之君志學之士皆不可以莫之考也語録曰敬便豎起怠便放倒以理從事是義不以理從事便是欲從順也這處敬與義是箇體用亦猶坤卦説敬義真氏曰武王之始踐祚也訪丹書於太公可謂急於聞道者矣而太公望所告不出敬與義之二言蓋敬則萬善俱立怠則萬善俱廢義則理為之主欲則物為之主上古聖人已致謹於此矣武王聞之惕若戒懼而銘之器物以自警焉蓋恐斯須不存而怠與欲得乘其隙也曰此言新民其引此何也曰此自其本而言之蓋以是為自新之至而新民之端也陳氏曰三句本新民事今引以證自新者蓋自新乃新民之本也葉氏曰上面既言能自新者如此下面始言所以作新斯民者曰康誥之言作新民何也曰武王之封康叔也以商之餘民染紂汚俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振奮踴躍以去其惡而遷於善舍其舊而進乎新也然此豈聲色號令之所及哉亦自新而已矣曰孔氏小序以康誥為成王周公之書而子以武王言之何也曰此五峰胡氏之説也蓋嘗因而考之其曰朕弟寡兄者皆為武王之自言乃得事理之實而其地證亦多小序之言不足深信於此可見文集曰康誥小序以為成王封康叔之書今考其詞謂康叔為弟而自稱寡兄又多述文王之德而無一字及武王者計乃是武王之書而序者失之然非此書大義所關故不暇於致詳當别為讀書者言之耳曰詩之言周雖舊邦其命惟新何也曰言周之有邦自后稷以來千有餘年至于文王聖德日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聽在民君德既新則民德必新民德既新則天命之新亦不旋日矣語録曰天豈曽有耳目以視聽只是自民之視聽便是天之視聽若一件事民人皆以為是便是天以為是若民人皆歸往之便是天命之也曰所謂君子無所不用其極者何也曰此結上文詩書之意也蓋盤銘言自新也康誥言新民也文王之詩自新新民之極也故曰君子無所不用其極極即至善之云也用其極者求其止於是而已矣文集曰二章兼明自新新民之事故通結之又曰觀上文三引詩書而此以無所二字總而結之則於自新新民皆欲用其極可知矣詩云邦畿千里惟民所止詩商頌玄鳥之篇邦畿王者之都也止居也言物各有所當止之處也愚謂此意重在止字上詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎緡詩作綿詩小雅綿蠻之篇緡蠻鳥聲丘隅岑蔚之處陳氏曰土髙曰丘隅是丘之一角危峻處木植森蔚人迹罕到鳥止於此其心甚安子曰以下孔子説詩之辭言人當知所當止之處也陳氏曰此意重在知字上詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信詩文王之篇穆穆深逺之意於歎美辭緝繼續也語録曰緝如緝麻之緝連緝不已之意陳氏曰連續而無一豪之間熙光明也陳氏曰光明而無一物之蔽真氏曰緝之與熙非二事也能緝則能熙矣敬止言其無不敬而安所止也黃氏曰敬止只得做兩字看注之意却未必謂敬其所止工夫全在緝熙字上敬止却是緝熙之效能接續光明則自無不敬而且安所止也真氏曰此敬字舉全體而言無不敬之敬也為人臣止於敬専指敬君而言乃敬中之一事也文玉之敬包得仁敬孝慈信引此而言聖人之止無非至善五者乃其目之大者也蔡氏曰緝熙敬止者所以為止至善之本仁敬孝慈信所以為止至善之目學者於此究其精微之藴而又推類以盡其餘語録曰大倫有五此言其三究其精微之藴是就三者裏面窮究其藴推類以通其餘是外面推廣如夫婦兄弟之類須是就君仁臣敬子孝父慈與國人信上推究精微各無不盡之理此章雖人倫大目亦只舉得三件必須就此上推廣所以事上當如何所以待下又如何尊卑小大之間處之各要如此真氏曰此二語乃是發聖人言外之意蓋理之淺近者易見而精微者難知若於義理只見得皮膚往往便以未善為己善小善為大善惟是窮究到精微處方知三分之善只是三分七分之善只是七分不至以下為髙以淺為深此學者所以貴於致知也推類云者以五者大倫言之此説君臣父子朋友而已若夫婦則止於有别長幼則止於有序又推之萬事萬物莫不有當止處則於天下之事皆有以知其所止而無疑矣詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也澳於六反菉詩作緑猗叶韻音阿僴下版反喧詩作咺喧詩作諼並況晚反恂鄭氏讀作峻詩衛風淇澳之篇淇水名澳隈也猗猗美盛貌興也詩傳曰以緑竹始生之美盛興其學問自修之進益也斐文貌詩傳曰文章著見之貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也文集曰切者以刀或鋸裁截骨角使成形質磋則或鑢或蕩使之平治也琢者以椎擊鑿鐫刻玉石使成形質磨則礱以沙石使之平治也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也真氏曰凡製物為器須切琢成形質了方可磋磨若未切琢如何磋磨此所謂治之有緒也既切琢了若不磋磨如何得他精細潤澤此所謂益致其精也瑟嚴密之貌語録曰此是就心言只是不粗疏須恁地縝密陳氏曰瑟是存心細密僴武毅之貌語録曰能剛強卓立不如此怠惰間颯陳氏曰僴是武毅不困赫喧宣著盛大之貌語録曰古人直是嚴密然後有威儀烜赫著見喧忘也道言也學謂講習討論之事陳氏曰致知格物是也自修者省察克治之功陳氏曰誠意正心修身是也真氏曰若只説過便了何益於事須是省察吾之言行有無未善吾之過失有無當改其合克去此即所謂克己也又曰學與自修二事相表裏不學問固不能自修學問了又不可不自修恂栗戰懼也語録曰問何以知其為戰懼曰莊子云木處則恂栗危懼問僴者武毅之貌而恂栗則戰懼之貌不知人當戰懼時果有武毅意否曰人而懷戰懼之心則必齋莊嚴肅又烏可已威可畏也儀可象也真氏曰威非徒事嚴猛而已正衣冠尊瞻視儼然人望而畏之夫是之謂威儀非徒事容飾而已動容周旋莫不中禮夫是之謂儀引詩而釋之以明明明德者之止於至善蔡氏曰此引詩以釋明明德之止於至善功夫如此其縝密也道學自修言其所以得之之由恂栗威儀言其德容表裏之盛卒乃指其實而嘆美之也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也於戲音烏呼樂音洛詩周頌烈文之篇於戲嘆辭前王謂文武也君子謂其後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也三山陳氏曰此又贊其新民之功其效如此之長且久也葉氏曰此非一時一世事也所謂君子乃後之君子小人乃後之小人沒世而猶慕之愈久而愈不忘也此兩節咏歎淫泆其味深長當熟玩之語録曰一章主意只是説所以止於至善工夫大概是反覆嗟咏其味深長右傳之三章釋止於至善此章內自引淇澳詩以下舊本誤在誠意章下或問此引玄鳥之詩何也曰此以民之止於邦畿而明物之各有所止也葉氏曰傳引此詩蓋言凡天下之物莫不各有所當止借邦畿以為喻也曰引綿蠻之詩而系以孔子之言孔子何以有是言也曰此夫子説詩之辭也蓋曰鳥於其欲止之時猶知其當止之處豈可人為萬物之靈而反不如鳥之能知所止而止之乎其所以發明人當知止之義亦深切矣曰引文王之詩而繼以君臣父子與國人交之所止何也曰此因聖人之止以明至善之所在也蓋天生蒸民有物有則是以萬物庶事莫不各有當止之所但所居之位不同則所止之善不一故為人君則其所當止者在於仁為人臣則其所當止者在於敬為人子則其所當止者在於孝為人父則其所當止者在於慈與國人交則其所當止者在於信是皆天理人倫之極致發於人心之不容已者而文王之所以為法於天下可傳於後世者亦不能加毫末於是焉但衆人類為氣稟物欲之所昏故不能常敬而失其所止唯聖人之心表裏洞然無有一豪之蔽故連續光明自無不敬而所止者莫非至善不待知所止而後得所止也故傳引此詩而歷陳所止之實使天下後世得以取法焉學者於此誠有以見其發於本心之不容已者而緝熙之使其連續光明無少間斷則其敬止之功是亦文王而已矣真氏曰常人之德業所以不能光明者以其乍作乍輟無繼續之功也惟聖人之心與天同運有緝熙之功詩所謂上天之載無聲無臭儀刑文王萬邦作孚正此意也愚謂天無聲臭可求茍儀刑文王則天德全矣萬邦所以信恱正天下後世得以取法之意曰子之説詩既以敬止之止為語助之辭而於此書又以為所止之義何也曰古人引詩斷章或姑借其辭以明己意未必皆取本文之義也陳氏曰敬止之止當為助語之辭引而釋知止之義蓋古人之言詩也如是而已矣商與賜之可與言詩者於詩之訓詁無當也而聖人嘉之此非可與後世之學詩者言也曰五者之目詞約而義該矣子之説乃復有所謂究其精微之藴而推類以通之者何其言之衍而不切邪曰舉其德之要而總名之則一言足矣論其所以為是一言者則其始終本末豈一言之所能盡哉得其名而不得其所以名則仁或流於姑息敬或墮於阿諛孝或陷父而慈或敗子且其為信亦未必不為尾生白公之為也又況傳之所陳姑以見物各有止之凡例其於大倫之目猶且闕其二焉茍不推類以通之則亦何以盡天下之理哉蔡氏曰所謂得其名而不得其所以名若細推之如為人君止於仁固同一仁也然仁亦何止一端生之育之固仁也刑之威之亦仁也若執著其仁之一端不能隨處止其仁之所止安得謂止於仁之至善為人臣止於敬固同一敬也然敬亦何止一端鞠躬盡力固敬也陳善閉邪亦敬也若執著其敬之一端不能隨處止其敬之所止安得謂止於敬之至善為人子止於孝固同一孝也然孝亦何止一端先意承志固孝也幾諫不違亦孝也若執著其孝之一端不能隨處止其孝之所止安得謂止於孝之至善以至為人父止於慈與國人交止於信皆當如此而又推類以及其餘則凡天下之事無大無小雖千條萬緒皆有以知其所當止而無不止於至善矣曰復引淇澳之詩何也曰上言止於至善之理備矣然其所以求之之方與其得之之驗則未之及故又引此詩以發明之也夫如切如磋言其所以講於學者已精而益求其精也如琢如磨言其所以修於身者已密而益求其密也此其所以擇善固執日就月將而得止於至善之由也語録曰學是起頭處修身是成就處中間工夫既講求又復講求既克治又復克治此謂已精而求其益精已密而求其益密也又曰只切而不磋亦未到至善處只琢而不磨亦未到至善處陳氏曰切是窮究事物之理逐件分析有倫有敘磋是講究到純熟處道理瑩徹所以如切而又磋琢是克去物欲之私使無瑕纇磨是磨礲至那十分純粹處所以如琢而又磨又曰學是知止於至善所在自修是止於至善所在恂栗者嚴敬之存乎中也威儀者輝光之著乎外也此其所以睟面盎背施於四體而為止於至善之驗也語録曰有主於中而不能發於外亦不是至善務飾於外而無主於中亦不是至善又曰到這裏睟面盎背發見於外便是學與自修之驗盛德至善民不能忘蓋人心之所同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也語録曰若非十分至善何以使民久而不能忘只是一時不忘亦不是至善又曰問大學引淇澳詩是學者事而盛德至善或問指聖人言之何也曰後面説得來大非聖人不能此是連上文文王於緝熙敬止説聖人也不是插手掉臂做到那處也須學始得所謂生而知之者便只是知得這箇盛德以身之所得而言也至善以理之所極而言也切磋琢磨求其止於是而已矣文集曰盛德至善此言聖人事蓋渾然一體不可得而分者但以人言則曰德以理言則曰善又不為無辨耳曰切磋琢磨何以為學問自修之别也曰骨角脈理可尋而切磋之功易所謂始條理之事也玉石渾全堅確而琢磨之功難所謂終條理之事也語録曰骨角却易開解玉石儘著得磨揩工夫問切磋是始條理琢磨是終條理較密否曰始終條理都要密講貫而益講貫修飭而益修飭曰引烈文之詩而言前王之沒世不忘何也曰賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛德至善之餘澤故雖已沒世而人猶思之愈久而不能忘也文集曰親賢樂利上四字皆自後人而言下四字或指前王之身或指前王之澤語録曰如孔子仰文武之德是賢其賢成康以後思其恩而保其基緒便是親其親上文之引淇澳以明明德之得所止言之而發新民之端也此引烈文以新民之得所止言之而著明明德之效也文集曰淇澳言明明德而可以新民以見明德之極功烈文因言非獨一時民不能忘而後世之民亦不能忘以見新民之極功曰淇澳烈文二節鄭本元在誠意章後而程子置之卒章之中子獨何以知其不然而屬之此也曰二家所繫文意不屬故有不得而從者且以所謂道盛德至善沒世不忘者推之則知其當屬乎此也子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異於人也葉氏曰言吾亦若人耳情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也語録曰大有以畏服斯民自欺之志又曰惟是先有以服其心志所以能使之不得盡其虛誕之辭觀於此言可以知本末之先後矣黃氏曰聽訟無訟亦大槩引此一端以見本末其他皆然論其所以然固本於明德新民然聖人不專以此一事為足以盡本末也右傳之四章釋本末此章舊本誤在止於信下或問聽訟一章鄭本元在止於信之後正心修身之前程子又進而置之經文之下此謂知之至也之上子不之從而置之於此何也曰以傳之結語考之則其為釋本末之義可知矣以經之本文乘之則其當屬於此可見矣二家之説有未安者故不得而從也曰然則聽訟無訟於明德新民之義何所當也曰聖人德盛仁熟所以自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之辭是以雖其聽訟無以異於衆人而自無訟之可聽蓋己德既明而民德自新則得其本之明效也或不能然而欲區區於分爭辨訟之間以求新民之效其亦末矣此傳者釋經之意也陳氏曰聽訟末也明德本也不能明己之德而専以智能決訟者抑末矣曰然則其不論夫終始者何也曰古人釋經取其大略未必如是之屑屑也且此章之下有闕文焉又安知其非本有而并失之也耶此謂知本程子曰衍文也此謂知之至也此句之上别有闕文此特其結語耳右傳之五章蓋釋格物致知之義而今亡矣此章舊本通下章誤在經文之下間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也文集曰格物者窮理之謂也理無形而難知物有迹而易睹故因是物以求之語録曰聖人不令人懸空窮理須要格物者是要人就那上見得道理破便實又曰事事物物皆有其理事物可見而其理難知即事即物便要見得此理大學不曰窮理而謂之格物只是使人就實處窮竟事事物物上有許多道理窮之不可不盡也真氏曰大學教人以格物致知蓋即物而理在焉庶幾學者有著實用功之地不至馳心於虛無之境蓋人心之靈莫不有知語録曰靈底是心知覺處又曰如孩提之童知愛其親及其長也知敬其兄以至於飢則知求食渴則知求飲是莫不有知也但所知者止於大略而不能推致其知以至於極耳陳氏曰此句就致知上生而天下之物莫不有理陳氏曰此句就格物上生真氏曰凡天下之物有形有象者皆器也其理便在其中大而天地亦形而下者乾坤乃形而上者天地以形體言乾坤以性情言日月星辰風雨霜露亦形而下者其理即形而上者以身言之身之形體皆形而下者曰性曰心之理乃形而上者至決一物一器莫不皆然如燈燭器也其所以能照物形而上之理也惟於理有未窮故其知有不盡也語録曰所謂窮理者窮之須要周盡若得一邊不見一邊便不該通真氏曰若不就事物上推求義理則極至處亦無緣知得盡是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極語録曰問經文物格而後知至却是知至在後今云因其已知則又在格物前曰知元自有才要去理會便是這些知萌露若懵然全不向著便是知之端未曽通又曰窮理者因其所已知而究其所未知人之良知本所固有然不能窮理以至於物格知至者只是足於己知而於其所未知者不能窮且盡也故見得一截却又不曽見得一截此其所以於理不精至於用力之久而一旦豁然貫通焉語録曰亦須銖積寸纍工夫到後自然貫通又曰知至只是到脫然貫通處雖未能事事都知得然理會得已極多萬一有插一件差異底事來也都識得他破只是貫通便不知底亦通將去則衆物之表裏精粗無不到語録曰表者人物之所共由裏者吾心之所獨得表者如父慈子孝雖九夷八蠻出這道理不得裏者乃是至隱至微至親至切處又曰粗是大綱精是裏面曲折處問既有箇定理如何又有表裏精粗曰理固自有表裏精粗人見識亦自有髙低深淺有人只理會得下許多都不見得上面一截這唤做知得表知得粗又有人合下便看得大體都不就中間細下工夫這唤做知得裏知得精二者俱是偏故大學必欲格物致知到物格知至則表裏精粗無不盡而吾心之全體大用無不明矣陳氏曰必致知之功到而吾本然之體皆有以周遍昭晰本然之用皆無所隔絶間斷體常涵用用不離體其實非兩截事也此謂物格此謂知之至也或問此謂知本其一為聽訟章之結語則既聞命矣其一鄭本元在經文之後此謂知之至也之前而程子以為衍文何也曰以其復出而他無所繫也曰此謂知之至也鄭本元隨此謂知本繫於經文之後而下屬誠意之前程子則去其上句之復而附此句於聽訟知本之章以屬明德之上是必皆有説矣子獨何據以知其皆不盡然而有所取舍於其間耶曰此無以他求為也考之經文初無再論知本知至之云者則知屬之經後者之不然矣觀於聽訟之章既以知本結之而其中間又無知至之説則知再結聽訟者之不然矣且其下文所屬明德之章自當為傳文之首又安得以此而先之乎故愚於此皆有所不能無疑者獨程子上句之所刪鄭氏下文之所屬則以經傳之次求之而有合焉是以不得而異也曰然則子何以知其為釋知至之結語而又知其上之當有闕文也曰以文義與下文推之而知其釋知至也以句法推之而知其為結語也以傳之例推之而知其有闕文也曰此經之序自誠意以下其義明而傳悉矣獨其所謂格物致知者字義不明而傳復闕焉且為最初用力之地而無復上文語緒之可尋也子乃自謂取程子之意以補之則程子之言何以見其必合於經意而子之言又似不盡出於程子何邪曰或問於程子曰學何為而可以有覺也程子曰學莫先於致知能致其知則思日益明至於久而後有覺爾書所謂思曰睿睿作聖董子所謂勉強學問則聞見博而智益明正謂此也學而無覺則亦何以學為也哉語録曰積纍之多自有箇覺悟時節勉強學問所以致其知也聞見博而智益明則其效著矣愚謂知是識其理之所當然覺是悟其理之所以然或問忠信則可勉矣而致知為難奈何程子曰誠敬固不可以不勉然天下之理不先知之亦未有能勉以行之者也故大學之序先致知而後誠意其等有不可躐者茍無聖人之聰明睿智而徒欲勉焉以踐其行事之迹則亦安能如彼之動容周旋無不中禮也哉惟其燭理之明乃能不待勉強而自樂循理爾夫人之性本無不善循理而行冝無難者惟其知之不至而但欲以力為之是以苦其難而不知其樂耳知之而至則循理為樂不循理為不樂何苦而不循理以害吾樂邪昔嘗見有談虎傷人者衆莫不聞而其間一人神色獨變問其所以乃嘗傷於虎者也夫虎能傷人人孰不知然聞之有懼有不懼者知之有真有不真也學者之知道必如此人之知虎然後為至耳若曰知不善之不可為而猶或為之則亦未嘗真知而已矣語録曰曽被虎傷者便知得是可畏未曽被虎傷底須逐旋思量箇被傷底道理見得與被傷者一般方是又曰程子論知之淺深從前未有人説到此且虎能傷人人所共知而懼之有見於色者以其知之深於衆人也學者之於道能如此人之於虎真有以知之則自有不容己者矣又曰真知是要徹骨都見得透又曰真知是知得真箇如此不是聽得又説便唤做知又曰今人有知不善之不當為及臨事又為之只是知之未至人知烏喙之殺人不可食斷然終於不食是真知之也知不善不可為而猶或為之是特未能真知也所以未能真知者緣於道理上只就外面理會裏面却未理會得十分瑩淨此兩條者皆言格物致知所以當先而不可後之意也語録曰致知是大學最初下手處若理會得透徹後面便容易又有問進修之術何先者程子曰莫先於正心誠意然欲誠意必先致知而欲致知又在格物致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也語録曰物理無窮故説得來亦自多端如讀書以講明道義則是理存於書如論古今人物而别其是非邪正則是理存於古今人物如應接事物而審處其當否則是理存於應接事物所存既非一物能専則所格亦非一端而盡陳氏曰事事物物固皆有理而聖賢書中又見成理義所萃而皆事物之則也在初學者入窮理工夫先且就聖賢言語實處為準則於幽間靜一之中虛心而詳玩隨章遂句一一實下講明工夫果實有得則是非邪正大分已明而胸中權度稍定然後次而及於論古今人物以相參質則其褒貶去取方可有定論最其後也乃及於應接事物以相證訂則其裁處剖決方中節而不至於差至是則吾之見有以照彼之情而歷練感觸又有以長吾之見內外交相發將何所往而非吾窮格之益也程子之言亦有序矣曰格物者必物物而格之耶將止格一物而萬理皆通耶曰一物格而萬理通雖顔子亦未至此唯今日而格一物焉明日又格一物焉積習既多然後脫然有貫通處耳文集曰一日一件者格物工夫次第也脫然貫通者知至效驗極致也不循其序而遽責其全則為自罔但求粗曉而不期貫通則為自畫語録曰天下豈有一理通解萬理皆通也須積纍將去如顔子髙明不過聞一以知十亦是大段聰明了學却有漸無急迫之理有人嘗説學問只用窮究一箇大處則其他皆通某正不敢如此説須是逐旋做將去不成只用窮究一箇其他更不用管便都理會得為此説者將謂是天理不知都是人欲又曰今日格一件明日格一件乃是零零碎碎湊合將來不知不覺自然醒悟其始固須用力及得之也又却不假用力又曰如讀書今日看一段明日看一段又如今日理會一事明日理會一事積習多後自然貫通又曰程子此語是真實做功夫來不説格一件便會通不説盡格得天下物理後方始通只云積習既多然後脫然有箇貫通處又曰自一身之中以至萬物之理理會得多自當豁然有箇覺處語録曰一身之中是仁義禮智惻隱羞惡辭遜是非與夫耳目手足視聽言動皆所當理會至若萬物之榮悴與夫動植小大這底是可以如何使那底是可以如何用車之可以行陸舟之可以行水皆當理會又曰此一段尤要切學者所當深究到得豁然處非人力勉強而至者又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積纍多後自當脫然有悟處語録曰今人務博者却要盡窮天下之理務約者又謂反身而誠則天下之物無不在我此皆不是如一百件事理會得五六十件了這三四十件雖未理會大概可曉了又曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各隨人淺深譬如千蹊萬徑皆可以適國但得一道而入則可以推類而通其餘矣蓋萬物各具一理而萬理同出一原此所以可推而無不通也語録曰所謂不必盡窮天下之物者如十事已窮得八九則其一二雖未窮得將來湊會都自見得又曰類推是從已理會得處推將去如此便不隔越若逺去尋討則不切於己又曰若一事上窮未得且别窮一事這是言隨人之量非曰遷延逃避也蓋於此處既理會不得若専一守在這裏却轉昏了須著别窮一事或又可以因彼而明此也又曰若謂窮一事不得便掉了别窮一事又輕忽了也不得程子為見學者有恁地底不得已説此話問千蹊萬徑皆可以適國恐是譬理之一原處不知從一事上便可窮到一原處否曰未解便如此只要以類推理固是一理然其間曲折甚多須是把這箇做樣子却從這裏推去始得且如事親固當盡其事之之道若得於親時是如何不得於親時又當如何以此而推之於事君則知得於君時是如何不得於君又當如何推以事長亦是如此自此推去莫不皆然又曰萬物皆有此理理皆同出一原但所居之位不同則其理之用不一如為君須仁為臣須敬為子須孝為父須慈物物各具此理而物物各異其用然莫非一理之流行也聖人所以窮理盡性而至於命凡世間所有之物莫不窮極其理所以處置得物物各得其所無一事一物不得其宜又曰物必有理皆所當窮若天地之所以髙深鬼神之所以幽顯是也若曰天吾知其髙而已矣地吾知其深而已矣鬼神吾知其幽且顯而已矣則是已然之詞又何理之可窮哉語録曰此處甚緊切學者須當知天如何而能髙地如何而能厚鬼神如何而能幽顯這方是格物又曰天只是氣非獨是髙只今人在地上便只見如此髙要之他連那地下亦是天天只管轉來旋去天大了故旋得許多查滓在中間世間無一箇物事恁地大地只是氣之查滓故厚而深鬼為幽神為顯鬼者隂也神者陽也氣之屈者謂之鬼氣之只管恁地來者謂之神洋洋然如在其上焄蒿悽愴此百物之精也神之著也這便是那發生之精神神者是生底以至長大故見其顯便是氣之伸者今人謂人之死為鬼是死後收斂無形無迹不可理會便是那氣之屈底又曰如欲為孝則當知所以為孝之道如何而為奉養之宜如何而為溫凊之節莫不窮究然後能之非獨守夫孝之一字而可得也陳氏曰如事親當孝非是空守一箇孝字必須窮格所以為孝之理當如何凡古人事親條目皆無一不講然後可以實能盡孝或問觀物察己者豈因見物而反求諸己乎曰不必然也物我一理才明彼即曉此此合內外之道也語其大天地之所以髙厚語其小至一物之所以然皆學者所宜致思也曰然則先求之四端可乎曰求之情性固切於身然一草一木亦皆有理不可不察語録曰這理是天下公共之理人又都一般初無物我之分不可道我是一般道理人又是一般道理將來相比如赤子入井皆有怵惕知得人有這箇便知自家亦有這箇更不消比並自知又曰內外未嘗不合自家知得物之理如此則因其理之自然而應之便見合內外之理又曰天地之所以髙厚一物之所以然只是舉其至大與其至細者言學者之窮理無一物而在所遺也又曰如一草一木皆有理草木春生秋殺好生惡死仲夏斬陽木仲冬斬隂木皆自順隂陽道理自家知得萬物均氣同體非其時不伐一木此便是合內外之理又曰致知之要當知至善之所在如父止於慈子止於孝之類若不務此而徒欲泛然以觀萬物之理則吾恐其如大軍之遊騎出太逺而無所歸也語録曰且窮實理令有切己功夫若只泛窮天下萬物之理不務切己即所謂遊騎無所歸矣兵陳須先立定家計然後以逰騎旋旋量力分外面與敵人合此便是合內外之道若遊騎太逺都歸不得問程子謂一草一木皆所當窮又謂恐如大軍遊騎出太逺而無所歸何也曰便是此等語疏得好平正不向一邊去又曰格物莫若察之於身其得之尤切語録曰前既説當察物理不可専在情性至此又言莫若得之於身為尤切皆是互相發處此十條者皆言格物致知所當用力之地與其次第功程也陳氏曰格物諸條其用功次第極為明備又曰格物窮理但立誠意以格之其遲速則在乎人之明暗耳語録曰問立誠意以格之誠意如何却在致知之先曰這箇誠意只是要著實用力所以下立字問知至而後意誠而此云格物窮理立誠意以格之何也曰此誠字説較淺未説到深處只是堅確其志朴實去做工夫又曰入道莫如敬未有能致知而不在敬者語録曰敬則心存心存則理具於此而得失可驗又曰心若走作不定何緣見得道理又曰涵養須用敬進學則在致知文集曰此二言者實學者立身進步之要而二者之功未嘗不交相發也然程子教人持敬不過以整衣冠齊容貌為先而所謂致知者又不過讀書史應事物之間求其理之所在而已非如近世荒誕怪譎不近人情之説也語録曰知與行須是齊頭做方能互相發程子下須字在字便是皆要齊頭著力不可道知得了方始行有一般人儘聰明知得而行不及是資質弱又有一般人儘行得而知不得又曰無事時且存養在這裏提掇警覺不要放肆到那講習應接便當思量義理用義理做將去無事時便著存養收拾此心又曰涵養於未發見之初窮格於己發見之後又曰致知在乎所養養知莫過於寡欲語録曰致知者推致其知識而至於盡也將致知者必先有以養其知有以養之則所見益明所得益固欲養其知者惟寡欲而已矣欲寡則無紛擾之患而知益明矣無變遷之患而得益固矣問是既知後便如此養否曰此不分先後未知之前若不養之此知如何發得既知之後若不養則又差了不可道未知之前便不必如此又曰三者自是箇兩頭説話本若無相干但得其道則交相為養失其道則交相為害又曰格物者適道之始思欲格物則固已近道矣是何也以收其心而不放也愚謂若非邪思妄念處截斷不續如何胸次得明可以格物此朱子所以謂此段甚好此五條者又言涵養本原之功所以為格物致知之本者也語録曰須先涵養清明然後能格物凡程子之為説者不過如此其於格物致知之傳詳矣今也尋其義理既無可疑考其字義亦皆有據語録曰程子説許多項初間説不可不格物致知中間却是指出箇格物箇地頭又見節次格處自立誠意以格之以下却是做工夫合如此又曰程子皆是因人資質説故有説向外處有説向內處要知學者用功六分內面四分外面便好一半己難若六分外面則尤不可今有一等人甚明白且於道理亦分曉却只恁地者只是向外做工夫至以他書論之則文言所謂學聚問辨中庸所謂明善擇善孟子所謂知性知天又皆在乎固守力行之先而可以驗夫大學始教之功為有在乎此也語録曰學聚問辨明善擇善盡心知性此皆是知皆始學之功也愚嘗反覆考之而有以信其必然是以竊取其意以補傳文之闕不然則又安敢犯不韙之罪為無證之言以自託於聖經賢傳之間乎曰然則吾子之意亦可得而悉聞之乎曰吾聞之也天道流行造化發育凡有聲色貌象而盈於天地之間者皆物也既有是物則其所以為是物者莫不各有當然之則而自不容已是皆得於天之所賦而非人之所能為也語録曰物乃形氣則乃理也物之理方為則又曰理之所當為者自不容已如孩提之童無不知愛其親及其長也無不知敬其兄自是有住不得處又曰今人未嘗看見當然而不容已者只就上較量一箇好惡耳如真見得這底是我合當為則自有所不可已者矣今且以其至切而近者言之則心之為物實主於身真氏曰圜外竅中者心之形體可以物言備具衆理神明不測此心之理不可以物言然有此形體方包得此理其體則有仁義禮智之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之所具則有口鼻耳目四肢之用又次而及於身之所接則有君臣父子夫婦長幼朋友之常是皆必有當然之則而自不容已所謂理也語録曰論其體則實是有仁義禮智論其用則實是有惻隱羞惡恭敬是非更假偽不得試看天下豈有假做得仁假做得義假做得禮假做得智又如一身之中裏面有五臟六腑外面有耳目口鼻四肢這是人人都如此存之為仁義禮智發出來為惻隱羞惡恭敬是非人人都有此更自一身推之於家實是有父子有夫婦有兄弟推之於天地之間實是有君有臣有朋友都不是待後人旋安排是合下元有此問口鼻耳目四肢之用曰貌曰恭言曰從視明聽聰又問君臣父子夫婦長幼朋友之常曰事君忠事親孝外而至於人則人之理不異於己也逺而至於物則物之理不異於人也極其大則天地之運古今之變不能外也盡於小則一塵之微一息之頃不能遺也愚謂理無物不在無時不然大而天地之一開一闔古今之一否一泰小而一塵之或飛或伏一息之或呼或吸皆此理之所寓也是乃上帝所降之衷語録曰衷只是箇無過不及之中今人言折衷折衷者以中為準則而取正也又曰緊要字却在降字上故自天而言則謂之降衷自人受此衷而言則謂之性如云天所賦為命物所受為性命便是那降字至物所受則謂之性而不謂之衷所以不同緣各據他來處與所受處而言也蒸民所秉之彞真氏曰吾衆民皆秉執此常理又曰彞而言秉何也渾然一理具於吾心不可移奪若秉執然劉子所謂天地之中語録曰此是未發之中黃氏曰是指天地而言所謂命也夫子所謂性與天道語録曰性便是自家底天道便是上面腦子上面有腦子下面便有許多物事徹底如此又曰譬如一條長連底物事其流行者是天道人得之者為性子思所謂天命之性陳氏曰天命即天道之流行而付豫於物者受於天而為我所有故謂之性孟子所謂仁義之心真氏曰人既得隂陽之理以為性則自然有仁義之心只舉仁義二字者仁包禮義包智故也禮是仁之著智是義之藏程子所謂天然自有之中語録曰此是時中黃氏曰是以人言所謂性也真氏曰言凡百事物皆有箇恰好底道理不可過不可不及也張子所謂萬物之一原語録曰所謂性者人物之所同得非惟己有是而人亦有是非惟人有是而物亦有是真氏曰凡人物之性皆自此流出如百川之同一源也邵子所謂道之形體者語録曰天之付與其理本不可見其總要却在此蓋人得之於天理元無欠闕只是其理却無形象不於性上體認如何知得又曰才説出只是虛空更無形影惟是説性者道之形體却見得實有不須談空説逺欲知此道之實有者當求之吾性分之內陳氏曰道者事物中所當然之理人之所共由者也性即在我之理具於吾心而道之所總會也所謂形體者正如此但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以人之與物賢之與愚相與懸絶而不能同耳文集曰問氣質物欲分聖愚人物似覺可疑若以清濁分聖愚偏正分人物則物欲厚薄淺深一句復將何指若謂指聖愚則聖人無物欲之私若謂説人物則物又不可以淺深厚薄論曰清濁偏正等説乃本正蒙中語然亦是將人物賢智愚不肖相對而分言之即須如此若大槩而論則人清而物濁人正而物偏又細别之則智乃清之清賢乃正之正愚乃清之濁不肖乃正之偏而張子所謂物有近人之性者又濁之清偏之正也物欲淺深厚薄乃通為衆人而言若作有無則此一等人甚少難入羣隊故只得且如此下語若以為疑則不若改聖字作賢字亦省得分解而聖人自不妨超然出於其外也以其理之同故以一人之心而於天下萬物之理無不能知以其稟之異故於其理或有所不能窮也語録曰氣稟之偏者自不求所以知若或有這心要求便即在這裏緣本來箇仁義禮智人人同有只被氣稟物欲遮了然這箇理未嘗亡才求便得理有未窮故其知有不盡知有不盡則其心之所發必不能純於義理而無雜乎物欲之私語録曰若知之有豪末未盡則當做處便夾帶這不當做底意在此其所以意有不誠心有不正身有不修而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教為之小學而使之習於誠敬則所以收其放心養其德性者已無所不用其至矣及其進乎大學則又使之即夫事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周遍精切而無不盡也若其用力之方則或考之事為之著或察之念慮之微或求之文字之中或索之講論之際語録曰問關於事為者不外乎念慮而入於念慮者往往是事為此分為二如何曰固是都相關然也有做在外底也有念慮方動底念慮方動便須辨别那箇是正那箇是不正這只就始末上大約如此説使於身心性情之德人倫日用之常以至天地鬼神之變鳥獸草木之宜語録曰天地鬼神之變如春生秋殺陽開隂閉趲去自住不得陽極了隂便生隂極了陽便生後面只管相趲如何住得陳氏曰在身如手容合當恭足容合當重之類在心如體合當寂用合當感之類性如仁合當愛義合當斷之類情如見赤子入井合當惻隱見大賓合當恭敬之類人倫如君合當止仁臣合當止敬之類日用如居處合當恭執事合當敬之類天地如天合當髙地合當厚鬼神二氣如陽合當伸隂合當屈鳥獸如牛合當耕馬合當乘草木如春合當生秋合當殺等類皆有理存乎其間也自其一物之中莫不有以見其所當然而不容已與其所以然而不可易者語録曰問上句是指理而言下句是指人心而言曰下句只是指事而言凡事固有所當然而不容已者然又當求其所以然者何故其所以然理也理如此故不可易又如人見赤子入井皆有怵惕惻隱之心此其事所當然而不容已者也然其所以者是何故必有箇道理之不可易者今之學者但止見其一邊只據眼前理會得箇皮膚便休為不曽都會得那徹心徹髓處陳氏曰當然是就目今直看其如此是理之見定形狀也所以然是就上面委曲看其因甚如此是理之來歷根原也真氏曰如為君當仁為臣當敬為子當孝為父當慈與人交當信之類此乃道理合當如此不如此則不可故曰所當然也然仁敬孝慈之屬非是人力強為有生之初即稟此理是乃天之所與也故曰所以然所當然是知性知其理當如此也所以然是知天謂知其理所自來也必其表裏精粗無所不盡而又益推其類以通之至於一日脫然而貫通焉則於天下之物皆有以究其義理精微之所極而吾之聰明睿智亦皆有以極其心之本體而無不盡矣語録曰不可盡者心之事可盡者心之理理既盡後謂如一物初不曽識來到面前便識得此物盡吾心之理此愚之所以補乎本傳闕文之意雖不能盡用程子之言然其指趣要歸則不合者鮮矣讀者其亦深考而實識之哉曰然則子之為學不求諸心而求諸迹不求之內而求之外吾恐聖賢之學不如是之淺近而支離也曰人之所以為學心與理而已矣心雖主乎一身而其體之虛靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎一人之心初不可以內外精粗而論也語録曰心包萬理萬理具於一心又曰理遍在天地萬物之間而心則管之心既管之則其用實不外乎此心矣然則理之體在物而其用在心也又曰此是以身為主以物為客故如此説要之理在物與在吾身只一般問用之微妙是心之用否曰理必有用何必又説是心之用夫心之體具乎是理理則無所不該而無一物不在然其用實不外乎人心蓋理雖在物而用實在心也然或不知此心之靈而無以存之則昏昧雜擾而無以窮衆理之妙不知衆理之妙而無以窮之則偏狹固滯而無以盡此心之全此其理勢之相須蓋亦有必然者語録曰不能存得心不能窮得理不能窮得理不能存得心真氏曰存心窮理二者當表裏用功蓋知窮理而不知存心則思慮紛擾物欲交攻此心既昏且亂如何窮得義理但知存心而不務窮理雖能執持靜定亦不過如禪家之空寂而已故必二者交進則心無不正而理無不通學之大端惟此而已是以聖人設教使人默識此心之靈而存之於端莊靜一之中以為窮理之本真氏曰窮理以此心為主必須以敬自持使心有主宰無私意邪念之紛擾然後有以為窮理之基本又曰端莊主容貌而言靜一主心而言蓋表裏交正之義合而言之則敬而已矣使人知有衆理之妙而窮之於學問思辨之際以致盡心之功陳氏曰古人每言學必欲其博所以極盡乎此心無窮之量也所謂盡心者須是盡得箇極大無窮之量無一理一物之或遺方是真能盡其心蔡氏曰盡心者言其心之所存更無一豪之不盡也然若要盡得須先知得所以學者要先窮理巨細相涵動靜交養初未嘗有內外精粗之擇及其真積力久而豁然貫通焉則亦有以知其渾然一致而果無內外精粗之可言矣蔡氏曰存此心於端莊靜一之中以立其本窮此理於學問思辨之際以達其用反之於身以踐其實則巨細相涵動靜交養及其真積力久而豁然融會然後可以造乎一之妙今必以是為淺近支離而欲藏形匿景别為一種幽深恍惚艱難阻絶之論務使學者莽然措其心於文字言語之外而曰道必如此然後可以得之則是近世佛學詖淫邪遁之尤者而欲移之以亂古人明德新民之實學其亦誤矣陳氏曰吾道工夫有節目次第非如釋氏妄以一超直入相誑眩須從下學便可上達須從格物致知然後融會貫通曰近世大儒有為格物致知之説者曰格猶扞也禦也能扞禦外物而後能知至道也又有推其説者曰人生而靜其性本無不善而有為不善者外物誘之也所謂格物以致其知者亦曰扞去外物之誘而本然之善自明耳是其為説不亦善乎曰天生蒸民有物有則則物之與道固未始相離也今曰禦外物而後可以知至道則是絶父子而後可以知孝慈離君臣然後可以知仁敬也是安有此理哉若曰所謂外物者不善之誘耳非指君臣父子而言也則夫外物之誘人莫甚於飲食男女之欲然推其本則固亦莫非人之所當有而不能無者也但於其間自有天理人欲之辨而不可以豪釐差耳惟其徒有是物而不能察於吾之所以行乎其間者孰為天理孰為人欲是以無以致其克復之功而物之誘於外者得以奪乎天理之本然耳今不即物以窮其原而徒惡物之誘乎已乃欲一切扞而去之則是必閉口枵腹然後可以得飲食之正絶滅種類然後可以全夫婦之别也是雖裔戎無居無父之教有不能充其説者況乎聖人大中至正之道而得以此亂之哉此評司馬溫公之説愚謂物與理未嘗相離若離物以求理則空虛而無據豈得一切扞而去之曰自程子以格物為窮理而其學者傳之見於文字多矣是亦有以發其師説而有助於後學者耶曰程子之説切於己而不遺於物本於行事之實而不廢文字之功極其大而不略其小究其精而不忽其粗學者循是而用力焉則既不務博而陷於支離亦不徑約而流於狂妄既不舍其積纍之漸而其所謂豁然貫通者又非見聞思慮之可及也是於説經之意入德之方其亦可謂反復詳備而無俟於發明矣若其門人雖曰祖其師説然以愚考之則恐其皆未足以及此也蓋有以必窮萬物之理同出於一為格物知萬物同出乎一理為知至如合內外之道則天人物我為一通晝夜之道則死生幽明為一達哀樂好惡之情則人與鳥獸魚鱉為一求屈伸消長之變則天地山川草木為一者似矣然其欲必窮萬物之理而専指外物則於理之在己者有不明矣但求衆物比類之同而不究一物性情之異則於理之精微者有不察矣不欲其異而不免乎四説之異必欲其同而未極乎一原之同則徒有牽合之勞而不睹貫通之妙矣其於程子之説何如哉此評藍田吕氏之説語録曰説許多一了理自無可得窮又格箇甚麼固是出於一只緣散了千岐萬徑今日窮理所以要收拾歸於一又有以為窮理只是尋箇是處然必以恕為本而又先其大者則一處理通而觸處皆通者其曰尋箇是處者則得矣而曰以恕為本則是求仁之方而非窮理之務也又曰先其大者則不若先其近者之切也又曰一處通而一切通則又顔子之所不能及程子之所不敢言非若類推積纍之可以循序而必至也此評上蔡謝氏之説語録曰尋箇是處者須是於其一二分是處直窮到十分是處方可又曰窮理自是我不曉這道理所以要窮如何説得恕字他當初説恕字大概只是説要推我之心以窮理便礙理了又曰恕乃求仁之方試看窮理如何著得恕窮理蓋是合下工夫恕則在窮理之後又有以為天下之物不可勝窮然皆備於我而非從外得也所謂格物亦曰反身而誠則天下之物無不在我者是亦似矣然反身而誠乃為物格知至以後之事言其窮理之至無所不盡故凡天下之理反求諸身皆有以見其如目視耳聽手持足行之畢具於此而無豪髮之不實耳固非以是方為格物之事亦不謂但務反求諸身而天下之理自然無不誠也中庸之言明善即物格知至之事其言誠身即意誠心正之功故不明乎善則有反諸身而不誠者其功夫地位固有序而不可誣矣今為格物之説又安得遽以是而為言哉此評龜山楊氏之説語録曰須是反身乃見得道理分明如孝如弟須見得孝弟我元有在這裏若能反身爭多少事他又却説萬物皆備於我不須外面求此却錯了又有以今日格一物明日格一物為非程子之言者則諸家所記程子之言此類非一不容皆誤且其為説正中庸學問思辨弗得弗措之事無所咈於理者不知何所病而疑之也豈其習於持敬之約而厭夫觀理之煩耶抑直以己所未聞而不信他人之所聞也夫持敬觀理不可偏廢程子固己言之若以己偶未聞而遂不之信則以有子之似聖人而速貧速朽之論猶不能無待於子遊而後定今又安得遽以一人之所未聞而盡廢衆人之所共聞者哉此評和靜尹氏之説語録曰和靜且是深信程子者想是此等説話不曽聞得或是其心不以為然故於此説有所不領會耳又有以為物物致察而宛轉歸己如察天行以自強察地勢以厚德者亦似矣然其曰物物致察則是不察程子所謂不必盡窮天下之物也又曰宛轉歸己則是不察程子所謂物我一理才明彼即曉此之意也又曰察天行以自強察地勢以厚德則是但欲因其已定之名擬其已著之迹而未嘗如程子所謂求其所以然與其所以為者之妙也此評胡文定公之説語録曰所謂物物致察只求之於外如所謂察天行以自強察地𫝑以厚德祗因其物之如是而求之耳初不知天如何而健地如何而順也所謂宛轉歸己則是理本非己有乃強委曲牽合使他入來爾這是隔陌多少獨有所謂即事即物不厭不棄而身親格之以精其知者為得致字向裏之意而其曰格之之道必立志以定其本居敬以持其志志立乎事物之表敬行乎事物之內而知乃可精者又有以合乎所謂未有致知而不在敬者之指但其語意頗傷急迫既不能盡其全體規模之大又無以見其從容潛玩積久貫通之功耳此評五峯胡氏之説語録曰身親格之説得親字急迫格自是格不成倩人格又曰人之為事必先立志以為本志不立則不能為事雖能立志苟不能居敬以持之此心亦迫然而無主悠悠終日亦只是虛言又曰志立乎事物之表看是甚麼都不能奪得他又不恁地細細碎碎敬行乎事物之內這箇便是細密處事事要這些子言也須敬動也須敬坐也須敬頃刻去他不得又曰此段本説得極精然却有病者只説得向裏來不曽説得外面所以語意頗傷急迫蓋致知本是廣大須用説得表裏內外周遍兼該方得其曰知乃可精便有局蹙氣象他便要就這裏便精其知殊不知致知之道不如此急迫須是寬其程限大其度量久久自然貫通又曰他説知未到精處方是可精此是説格物以前底事後面説又是格物以後底事中間正好用工曲折處都不曽説便是局蹙了嗚呼程子之言其答問反復之詳且明也如彼而其門人之所以為説者乃如此雖或僅有一二之合焉而不免於猶有所未盡也是亦不待七十子喪而大義已乖矣尚何望其能有所發而有助於後學哉語録曰諸公説初都見好後來段段録出排在那裏句句將來比對逐字稱停過方見得程子説攧撲不破諸公説挨著便成粉碎了又曰諸公致知格物之説皆失了程子意此正是入門欵於此既差則他可知矣間獨惟念昔聞延平先生之教以為為學之初且當常存此心勿為他事所勝凡遇一事即當且就此事反復推尋以究其理待此一事融釋脫落然後循序少進而别窮一事如此既久積纍之多胸中自當有灑然處非文字言語之所及也詳味此言雖其規模之大條理之密若不逮於程子然其功夫之漸次意味之深切則有非他説所能及者惟嘗實用力於此者為能有以識之未易以口舌爭也語録曰李先生説是教人若遇一事即且就上理會教爛熟離析不待擘開自然分解久之自當有灑然處自是見得快活天下事無他只是箇熟與不熟若只一時恁地約模得都不與自家相干久後皆忘却如借得人家事一般少間被人取將去又濟自家甚事愚謂程子言若一事窮未得且别窮一事延平則言且就一事推尋待其融釋脫落然後别窮一事其言不同蓋程子以人心各有明處有暗處若就明處推去則易為力非謂一事未窮得而可二以二參以三也若延平則専為不能主一者之戒讀者不可以辭害意曰然則所謂格物致知之學與世之所謂博物洽聞者奚以異曰此以反身窮理為主而必究其本末是非之極摰語録曰反身是著實向自家體分上求彼以徇外誇多為務而不核其表裏真妄之實然必究其極是以知愈博而心愈明不核其實是以識愈多而心愈窒永嘉陳氏曰格物致知研窮義理心學也記誦博識口耳外體喪心之學二事正相反此正為己為人之所以分不可不察也所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也惡好上字皆去聲謙讀為慊苦劫反誠其意者自修之首也語録曰誠意者行之始毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也語録曰且如為善自家也知得是合當為也勉強去做只是心裏又有些便不消如此做也不好底意思如不為不善心裏也知得不當為而不為雖是不為然心中又有些便為也不妨底意思此便是自欺便做九分九釐九毫要為善只那一毫不要為底便是自欺便是意不實矣永嘉陳氏曰才萌欺心便落小人旋渦中可畏之甚慊快也足也語録曰慊訓快意多又曰慊者無不足也獨者人所不知而已所獨知之地也語録曰如一片止水中間忽有一點動處此最緊要著功夫又曰這獨也不只是恁獨時如與衆人對坐自心中發一念或正或不正此亦是獨處言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於己不可徒茍且以徇外而為人也文集曰縱不自欺即其好惡真如好好色惡惡臭只為求以自快自足如寒而思衣以自溫飢而思食以自飽非有牽強茍且姑以為人之意才不如此即其好惡皆是為人而然非有自求快足之意也然其實與不實蓋有他人所不及知而已獨知之者故必謹之於此以審其幾焉語録曰正當於幾微毫釐處做工夫只幾微之間少有不實便為自欺又曰幾者動之微是欲動未動之間便有善惡便須就這處理會若到發出處更怎生奈何得所以聖賢説謹獨是要就幾微處理會又曰獨是幾之將然處不可不精察而謹守之又曰謹獨則於善惡之幾察之愈精愈密黃氏曰獨也者誠與不誠之本根此又指本根以示人使人即其本根而謹之小人間居為不善無所不至見君子而后厭然掩其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也間音間厭鄭氏讀為黶間居獨處也厭然銷沮閉藏之貌此言小人隂為不善而陽欲掩之沈僴録曰將那虛假之善來蓋覆真實之惡則是非不知善之當為與惡之當去也但不能實用其力以至此耳然欲掩其惡而卒不可掩欲詐為善而卒不可詐則亦何益之有哉文集曰知其為惡而掩之則既不足以自欺人之視己如見其肺肝則又不足以欺人亦何益之有哉此君子所以重以為戒而必謹其獨也曽子曰十目所視十手所指其嚴乎引此以明上文之意言雖幽獨之中而其善惡之不可掩如此可畏之甚也語録曰此是承上文人之視己如見其肺肝底意不可道是人不知人曉然共見如此富潤屋德潤身心廣體胖故君子必誠其意胖步丹反胖安舒也言富則能潤屋矣德則能潤身矣三山陳氏曰財積於中則屋潤於外德積於中則身亦潤於外矣潤猶華澤也故心無愧怍則廣大寬平而體常舒泰語録曰無愧怍是無物欲之蔽所以能廣大又曰心本是濶大底物事只是因愧怍了便卑狹便被他隔礙了只見得一邊所以體不能得舒泰三山陳氏曰心在內者也以理之無慊故能廣大體在外者也以心之既廣故能舒泰人之一心少有所慊則視聽怵迫而舉動局蹐雖吾四體將不得其所安矣皆自然之應也德之潤身者然也蓋善之實於中而形於外者如此陳氏曰上説小人實有是惡故其惡形見於外此説君子實有是善故其善亦形見於外故又言此以結之右傳之六章釋誠意語録曰意誠便全然在天理上行意未誠以前尚汨在人欲裏又曰過得此一關方是人不是賊經曰欲誠其意先致其知又曰知至而後意誠蓋心體之明有所未盡則其所發必有不能實用其力而茍焉以自欺者文集曰意雖心之所發然誠意工夫却自致知上做來又曰大學雖使人戒夫自欺而推其本則必其有以用力於格物致知之地然後理明心一而所發自然莫非真實如其不然則正念方萌私欲隨起亦非力之所能制矣然或己明而不謹乎此則其所明又非己有而無以為進德之基語録曰問知至以後何由意有未誠處曰一念才放下便是失其正所當深謹陳氏曰於知己至後亦非聽之自誠蓋無一刻不用其戒謹之功故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云蔡氏曰此章改定實朱子之絶筆也學者其深玩而精體之或問六章之指其詳猶有可得而言者耶曰天下之道二善與惡而已矣然揆厥所元而循其次第則善者天命所賦之本然惡者物欲所生之邪穢也是以人之常性莫不有善而無惡其本心莫不好善而惡惡陳氏曰造化流行生育賦豫更無别物只是箇善而已所謂善者以實理言人受得此理以為善亦本善而無惡然既有是形體之纍而又為氣稟之拘是以物欲之私得以蔽之而天命之本然者不得而著其於事物之理固有瞢然不知其善惡之所在者亦有僅識其粗而不能真知其可好可惡之極者陳氏曰一等未實見道理人雖分明有好善之心終是不能徹表裏須是真知善惡分明然後有真好真惡之功夫不知善之真可好則其好善也雖曰好之而未能無不好者以拒之於內不知惡之真可惡則其惡惡也雖曰惡之而未能無不惡者以挽之於中是以不免於茍焉以自欺而意之所發有不誠者語録曰如自家欲好善後面又有箇心在這裏拗你莫去好善欲惡惡又似有箇心在這裏拗你莫要惡惡此便是自欺夫好善而不誠則非唯不足以為善而反有以賊乎其善惡惡而不誠則非惟不足以去惡而適所以長乎其惡是則其為害也徒有甚焉而何益之有哉聖人於此蓋有憂之故為大學之教而必首之以格物致知之目以開明其心術使既有以識夫善惡之所在與其可好可惡之必然矣至此而復進之以必誠其意之説焉則又欲其謹之於幽獨隱微之奧以禁止其茍且自欺之萌黃氏曰須是幽獨之中常致其謹常為善而不為惡九分為善矣而幽獨之中有一分不善此一分不善處便是一分自欺有一分自欺則在我為善之意便有一分不實而凡其心之所發如曰好善則必由中及外無一豪之不好也如曰惡惡則必由中及外無一豪之不惡也陳氏曰如外好善而內不好善外惡惡而內不惡惡便是不真實夫好善而中無不好則是其好之也如好好色之真欲以快乎己之目初非為人而好之也惡惡而中無不惡則是其惡之也如惡惡臭之真欲以足乎己之鼻初非為人而惡之也葉氏曰今人一見好色即真切好之一聞惡臭即真切惡之此好此惡非是他人強之如此亦非為他人好之惡之乃是自家真知其可好可惡不容自己所發之實既如此矣而須臾之頃纎芥之微念念相承又無敢有少間斷焉則庶乎內外昭融文集曰內謂理之隱微處外謂理之周遍處表裏澄徹而心無不正身無不修矣黃氏曰此指表裏如一者而言若彼小人幽隱之間實為不善而猶欲外託於善以自蓋則亦不可謂其全然不知善惡之所在但以不知其真可好惡而又不能謹之於獨以禁止其茍且自欺之萌語録曰是箇半知半不知底人不知不識只唤做不知不識却不唤做自欺是以淪陷至於如此而不自知耳黃氏曰此指表裏異者而言此章之説其詳如此是固冝為自修之先務矣然非有以開其知識之真則不能有以致其好惡之實故必曰欲誠其意者先致其知又曰知至而后意誠然猶不敢恃其知之已至而聽其所自為也故又曰必誠其意必謹其獨而毋自欺焉語録曰知既至到這裏方可著手下工夫不是知至後下面許多一齊掃了則大學功夫次第相承首尾為一而不假他術以雜乎其間亦可見矣後此皆然今不復重出也曰然則慊之為義或以為少又以為恨與此不同何也曰慊之為字有作嗛者而字書以為口銜物也然則慊亦但為心有所銜之義而其為快為足為恨為少則以所銜之異而别之耳孟子所謂慊於心樂毅所謂慊於志則以銜其快與足之意而言者也孟子所謂吾何慊漢書所謂嗛栗姬則以銜其恨與少之意而言者也讀者各隨所指而觀之則既並行而不悖矣語録曰字有同一義而二用者吾何慊乎哉彼心中不以彼之富貴而懷不足也行有不慊於心謂義須充足於中不然則餒也如銜字或為銜恨或為銜恩亦同此義字書又以其訓快與足者讀與愜同則義愈明而音又異尤不患於無别也所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正忿弗粉反懥敕值反好樂並去聲程子曰身有之身當作心忿懥怒也語録曰忿懥是怒之甚者蓋是四者皆心之用而人所不能無者陳氏曰心之用便是情情亦人之所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣陳氏曰章句緊要説一察字此察字亦非從外撰來蓋因下文心不在焉一句發出察者察乎理也又曰當其接物之初才發便察其理當應與不當應才察則此心便存在理便分明當應而應則喜怒隨物各正其分而此心無不得其正不當應而應則喜怒起吾私意便有偏勝處如此則欲動情勝此心便逐物去了何復能正之有心不在焉視而不見聽而不聞食而不知其味心有不存則無以檢其身語録人有此心便知有此身人昏昧不知有心此便如人困睡不知有此身是以君子必察乎此而敬以直之語録曰敬是常要此心在這裏直是直上直下無纎豪委曲陳氏曰主敬則私意不萌更有甚嶢曲所以謂之直也然後此心常存而身無不修也語録曰人心常炯炯在此則四體不待羈束而自入規矩此謂修身在正其心右傳之七章釋正心修身此亦承上章以起下章蓋意誠則真無惡而實有善矣陳氏曰誠意章中注意於誠善誠惡之辨必透過此關而後實有善而真無惡所以能存是心以檢其身文集曰意誠然後心得其正自有先後然或但知誠意而不能密察此心之存否則又無以直內而修身也問心意未嘗離也意特心之所發耳今言但知誠意而不能密察此心之存否毋乃心自心意自意耶永嘉陳氏曰本是長匹無縫底物事聖賢欲人警悟處剪下逐段向人看理會得時仍是長匹無縫不曾剪斷又問密察此心不知又將一箇心密察處便是心更復何處外討一箇來自此以下並以舊文為正或問人之有心本以應物而此章之傳以為有所喜怒憂懼便為不得其正然則其為心也必如稿木之不復生死灰之不復然乃為得其正耶曰人之一心湛然虛明如鑑之空如衡之平以為一身之主者固其真體之本然而喜怒憂懼隨感而應妍蚩俯仰因物賦形者亦其用之所不能無者也故其未感之時至虛至靜所謂鑑空衡平之體雖鬼神有不得窺其際者固無得失之可議及其感物之際而所應者又皆中節則其鑑空衡平之用流行不滯正大光明是乃所以為天下之達道亦何不得其正之有哉陳氏曰感自外入以彼物之至吾前而言應由中出以此心之接彼物而言彼物之來有千變萬狀之不齊而吾心之應各隨天則之自然爾當好當惡當喜當怒輕重深淺分數無毫髮差是謂物各付物各止其所而我無與焉然亦須吾胸中鑑空衡平之體素定然後能如此而非臨時區處之謂也蔡氏曰鑑之空方能照人若先有人形滯其中則人之繼至者不復可得而照矣衡之平方能稱物若先有物重滯於上則物之繼至者不復可得而稱矣以鑑空衡平喻心體之虛明最為精切真氏曰鑑空衡平之體鑑空衡平之用此二句切須玩味蓋未曽應物之時此心只要清明虛靜不可先有一物如鑑未照物只是一箇空衡未稱物只是一箇平此乃心之本體此即中庸所謂喜怒哀樂之未發謂之中蓋喜怒哀樂未曽發動渾然一理不偏不倚故謂之中此所謂鑑空衡平之體也及至事物之來隨感而應因其可喜而喜因其可怒而怒因其當憂而憂因其當懼而懼在我本未嘗先有此心但隨物所感而應之耳故其喜怒憂懼無不中節此所謂鑑空衡平之用唯其事物之來有所不察應之既或不能無失且又不能不與俱往則其喜怒憂懼必有動乎中者而此心之用始有不得其正者耳語録曰心不可有一物外間酬酢萬變只隨其分限應之元不關自家心事才繫於物心便為其所動如何會得其正陳氏曰此章只是四者感物而應不中其節則此心便為四者所動而不得其正矣傳者之意固非以心之應物便為不得其正而必如枯木死灰然後乃為得其正也真氏曰若如稿木死灰則此心遂為無用之物此乃釋老之學若吾道則有體有用唯是此心之靈既曰一身之主茍得其正而無不在是則耳目鼻口四肢百骸莫不有所聽命以供其事而其動靜語默出入起居唯吾所使而無不合於理愚謂此范浚心針所謂天君泰然百體順令者也如其不然則身在於此而心馳於彼血肉之軀無所管攝其不為仰面貪看鳥回頭錯應人者幾希矣陳氏曰若世俗心慮昏昏莫克主宰體用動靜無復準則目隨物視耳隨物聽行信足步言信口説矣孔子所謂操則存舍則亡孟子所謂求其放心從其大體者蓋皆謂此學者可不深念而屢省之哉所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣辟讀為僻惡而之惡敖好並去聲鮮上聲人謂衆人之猶於也語録曰之其亦如於其即其所向處辟猶偏也黃氏曰偏字只是或過或不及真氏曰此一字為修身齊家之深病五者在人本有當然之則然常人之情唯其所向而不加審焉則必陷於一偏而身不修矣語録曰如愛其人之善若愛之過則不知其惡便是因其所重而陷於所偏惡惡亦然故諺有之曰人莫知其子之惡莫知其苖之碩諺音彥碩叶韻時若反諺俗語也溺愛者不明貪得者無厭愚謂溺愛之深者子有惡而弗知貪得之甚者苖已碩而弗知此兩語狀出偏之所由生尤為親切是則偏之為害而家之所以不齊也語録曰上面許多偏辟不除必至於此此謂身不修不可以齊其家右傳之八章釋修身齊家或問八章之辟舊讀為譬而今讀為僻何也曰舊音舊説以上章例之而不合也以下文逆之而不通也是以間者竊以類例文意求之而得其説如此三山陳氏曰為鄭氏之説云譬喻也言適彼而以心度之曰吾何以親愛此人非以其德美歟吾何以敖惰此人非以其志行薄歟反以諭己則其身修與否可自知也似亦可通矣然而求之不可齊其家之義則語意若不相貫由此論之朱子之説最為切而有功蓋曰人之常情於此五者一有所向則失其好惡之平而陷於一偏是以身有不修不能齊其家耳蓋偏於愛則溺焉而不知其惡矣偏於惡則阻焉而不知其善矣是其身之所接好惡取舍之間將無一當於理者而況於閨門之內恩常掩義亦何以勝其情愛昵比之私而能有以齊之哉陳氏曰若一偏於好則懵然不知其人之有惡一偏於惡則人雖有美亦不得而知此只是行一己之私好惡出於私則身不可修身不修則家不可得而齊身者家之主也大槩閨門之內恩常掩義常易至於偏治家非如治國治國則可用刑咸治家則刑威不可得而施只是公其心而已耳愚謂閨門之內義常不勝乎恩情愛昵比之私尤所難克使一有偏焉則長幼親疏欲其心之齊一不可得矣蓋至近至密之地一豪之偽無所容欺此常情之所易忽而君子之所以甚謹也曰凡是五者皆身與物接所不能無而亦既有當然之則矣今曰一有所向便為偏倚而身不修則是必其接物之際此心漠然都無親踈之等貴賤之别然後得免於偏也且心既正矣則宜其身之無不修今乃猶有若是之偏何哉曰不然也此章之義實承上章其立文命意大抵相似蓋以為身與事接而後或有所偏非以為一與事接而必有所偏所謂心正而后身修亦曰心得其正乃能修身非謂此心一正則身不待檢而自修也語録曰正心是就心上説修身是應事接物上説那事不是心上做出來但正心是萌芽上理會若修身以後却是各就地頭上理會又曰大學所以有許多節次正欲教人節節省察用功經但言心正者必自誠意而來修身者必自正心而來非謂意既誠而心無事乎正心既正而身無事乎修也曰親愛賤惡畏敬哀矜固人心之所冝有若夫敖惰則凶德也曽謂本心而有如是之則哉曰敖之為凶德也正以其先有是心不度所施而無所不敖爾若因人之可敖而敖之則是常情所冝有而事理之當然也今有人焉其親且舊未至於可親而愛也其位與德未至於可畏而敬也其窮未至於可哀而其惡未至於可賤也其言無足去取而其行無足是非也則視之泛然如塗之人而已爾又其下者則夫子之取瑟而歌孟子之隱几而卧蓋亦因其有以自取而非吾故有敖之之意亦安得而遽謂之凶德哉又況此章之指乃為慮其因有所重而陷於一偏者發其言雖曰有所敖惰而其意則正欲人之於此更加詳審雖曰所當敖惰而猶不敢肆其敖惰之心也亦何病哉語録曰問如敖惰之心則豈可有曰此處亦當看文勢大意敖惰只是一般人所為得人厭棄不起人敬畏心若把敖惰做不當有則親愛敬畏也不當有又曰此如明鑑之懸妍者自妍醜者自醜隨所來而應之不成醜者至前須要唤作妍者又敖惰是輕賤惡是重既得賤惡如何却不得敖惰然聖人猶戒其僻則又須檢點不可有過當處所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也弚去聲長上聲身修則家可教矣孝弟慈所以修身而教於家者也然而國之所以事君事長使衆之道不外乎此此所以家齊於上而教成於下也語録曰孝以事親而使一家之人皆孝弟以事長而使一家之人皆弟慈以使衆而使一家之人皆慈是乃成教於國者也陳氏曰在我事親之孝即國之所以事君者在我事兄之弟即國之所以事長者在我愛子之慈即國之所以使衆者能修之於家則教自行於國矣康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也中去聲此引書而釋之又明立教之本不假強為黃氏曰言但以誠心求之則自然得赤子之意不待勉強而後知之也在識其端而推廣之耳陳氏曰在識其仁愛之端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國僨音奮一人謂君也機發動所由也愚謂機弩牙也是發動之所由僨覆敗也三山陳氏曰僨仆也僨事猶言敗事也此言教成於國之效堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也好去聲此又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡三山陳氏曰己有此善而後可以求人有此善己無此惡而後可以非人有此惡皆己先之也皆推己以及人語録曰知得我是要恁地想人亦要恁地而今不可不教也恁地三反五折便是推己及物所謂恕也陳氏曰恕只是己心底流去到那物而已不如是則所令反其所好而民不從矣喻曉也故治國在齊其家通結上文詩云桃之夭夭其葉蓁蓁之子于歸宜其家人冝其家人而后可以教國人夭平聲蓁音臻詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子此指女子之嫁者而言也婦人謂嫁曰歸宜猶善也詩傳曰宜者和順之意詩云宜兄宜弟冝兄冝弟而后可以教國人詩小雅蓼蕭篇詩云其儀不忒正是四國其為父子兄弟足法而后民法之也詩曹風鳲鳩篇忒差也此謂治國在齊其家此三引詩皆以咏歎上文之事而又結之如此其味深長最宜潛玩右傳之九章釋齊家治國或問如保赤子何也曰程子有言赤子未能自言其意而為之母者慈愛之心出於至誠則凡所以求其意者雖或不中而不至於大相逺矣豈待學而后能哉三山陳氏曰赤子雖有所欲不能以自言然慈母獨得其所欲縱有不中亦不甚相逺此無他愛出於誠性己不隔以心求之不待學而後能也若民則非如赤子之不能自言矣而使之者反不能無失於其心則以本無慈愛之實而於此有不察耳三山陳氏曰長民者往往不能得下之情蓋亦視之不切於己不若慈母之心耳傳之言此蓋以明夫使衆之道不過自其慈幼者而推之語録曰心誠求之者求赤子之所欲也於民亦當求其有不能自達者此是推其慈幼之心以使衆也而慈幼之心又非外鑠而有待於強為也陳氏曰慈愛出於天性之所固有非由外鑠我也事君之孝事長之弟亦何以異於此哉既舉其細則大者可知矣三山陳氏曰孝弟與慈初無二心苟自切己而推之則舉慈可以見孝弟矣曰仁讓言家貪戾言人何也曰善必積而后成惡雖小而可懼古人之深戒也三山陳氏曰仁遜以家言貪戾以人言者言為惡之效捷於為善也仁與遜必積而形於一家而後可以化一國若夫貪戾則才出於一人之身而一國已作亂矣以此見為善者不可無悠久之積為惡者不可有斯須之暫示深戒也書所謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗亦是意爾語録曰問所引書下一句正合本文而上一句不幾反乎曰爾惟德罔小正言其不可小也與此正合曰此章本言上行下效有不期然而然者今曰有諸己而后求諸人無諸己而后非諸人則是猶有待於勸勉程督而後化且內適自修而遽欲望人之皆有己方僅免而遂欲責人以必無也曰此為治其國者言之則推吾所有與民共由其條教法令之施賞善罰惡之政固有理所當然而不可已者語録曰是有天下國家者勢不可以不責他但以所令反其所好則民不從故又推本言之欲其先成於己而有以責人固非謂其專務修己都不治人而拱手以俟其自化亦非謂其矜己之長愧人之短而脅之以必從也故先君子之言曰有諸己不必求諸人以為求諸人而無諸己則不可也無諸己不必非諸人以為非諸人而有諸己則不可也正此意也此韋齋朱公之説語録曰大凡治國禁人為惡而勸人為善便是求諸人非諸人然須是在己有善無惡然後可以求諸人非諸人也曰然則未能有善而遂不求人之善未能去惡而遂不非人之惡斯不亦恕而終身可行乎哉曰恕字之指以如心為義蓋曰如治己之心以治人如愛己之心以愛人而非茍然姑息之謂也語録曰如比也比自家心推將去輔氏曰謂如我之心而推之於外無彼此之間也然人之為心必嘗窮理以正之使其所以治己愛己者皆出於正然後可以即是推之以及於人而恕之為道有可言者故大學之傳最後兩章始及於此則其用力之序亦可見矣至即此章而論之則欲如治己之心以治人者又不過以強於自治為本蓋能強於自治至於有善而可以求人之善無惡而可以非人之惡然後推以及人使之亦如我之所以自治而自治焉則表端景正源潔流清而治己治人無不盡其道矣所以終身力此而無不可行之時也今乃不然而直欲以其不肖之身為標準視吾治教所當及者一以姑息待之不相訓誥不相禁戒將使天下之人皆如己之不肖而淪胥以陷焉是乃大亂之道而豈所謂終身可行之恕哉葉氏曰茍此心未得其正雖欲推以及人斷未能恰好譬如自己怠惰遂恕他人之怠惰以為我既如此何須過望於人自己踈放遂恕他人之疏放以為我既如此何須苛責於人自暴自棄貪財好色亦推此心以及人則是以其不肖之身而為他人之準的豈得謂之恕乎子貢問有一言可以終身行之者夫子告以其恕乎若將不肖之心推以及人以此為恕豈謂之終身可行近世名卿之言有曰人雖至愚責人則明雖有聰明恕己則昏茍能以責人之心責己恕己之心恕人則不患不至於聖賢矣此言近厚世亦多稱之者但恕字之義本以如心而得故可以施之於人而不可以施之於己今曰恕己則昏則是已知其如此矣而又曰以恕己之心恕人則是既不知自治其昏而遂推以及人使其亦將如我之昏而後已也乃欲由此以入聖賢之域豈不誤哉藉令其意但為欲反此心以施於人則亦止可以言下章愛人之事而於此章治人之意與夫中庸以人治人之説則皆有未合者蓋其為恕雖同而一以及人為主一以自治為主則二者之間豪釐之異正學者所當深察而明辨也此評范忠宣公之説語録曰以恕己之心恕人此句未善聖賢説恕不曽如是倒説了蓋恕是箇推出來底今收入來故恕己便成忽略了不若張子説以責人之心責己以愛己之心愛人則是見他人不善我亦當無是不善我有是善亦要他人有是善推此計度之心此乃恕也於己不當下恕字若漢之光武亦賢君也一旦以無罪黜其妻其臣郅惲不能力陳大義以救其失而姑為緩辭以慰解之是乃所謂不能三年而緦功是察放飯流啜而齒決是憚者光武乃謂惲為善恕己量主則其失又甚逺而大啓為人臣者不肯責難陳善以賊其君之罪一字之義有所不明而其禍乃至於此可不謹哉曰既結上文而復引詩者三何也曰古人言必引詩蓋取其嗟嘆詠歌優遊厭飫有以感發人之善心非徒取彼之文證此之義而已也夫以此章所論齊家治國之事文具而意足矣復三引詩非能於其所論之外别有所發明也然嘗試讀之則反復吟咏之間意味深長義理通暢使人心融神會有不知手舞而足蹈者是則引詩之助與為多焉蓋不獨此他凡引詩云者皆以是而求之則引者之意可見而詩之為用亦得矣三山陳氏曰古之人凡辭有盡而意無窮者多援詩以吟詠其餘意此章言治國在齊其家義不難釋也上文言之備矣至是復三援詩幾於贅辭然其味實深且長曰三詩亦有序乎曰首言家人次言兄弟終言四國亦刑于寡妻至于兄弟以御于家邦之意也所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也長上聲弟去聲倍與背同潔胡結反老老所謂老吾老也興謂有所感發而興起也語録曰興謂興起其善心孤者幼而無父之稱潔度也葉氏曰潔蓋忖度之義矩所以為方也真氏曰矩製方之器俗謂曲尺是也天下之為方器者必以此為則言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣語録曰此三節見得上行而下效又見得上下雖殊而心則一又曰老老長長恤孤方是就自家身上切近處説所謂家齊也民興孝興弟不倍此方是就民之感發興起處説治國而國治之事又曰人心之同然我要恁地彼亦要恁地又曰不使一夫之不獲者無一夫不得此理也是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣語録曰人心之所同如此君子見人之心與己之心同故必以己之心度人之心使皆得其平愚謂不言天下治而言天下平者蓋欲無一物之不得其平也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道惡先並去聲此覆解上文潔矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然語録曰上下前後左右都只一樣心無彼己之異只是將那頭折轉來比這頭在我上者使我如此而我惡之更不將來待下人如此則自家在中央上面也占許多地步下面也占許多地步便均平正方若將所責上底人之心更來待下上面長下面短不方了下之事我如此而我惡之若將去事上便又下面長上面短左右前後皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣語録曰問在矩則可以彼此如一而無不方在人則有天子諸侯大夫士庶人之分何以使之均平曰非是言上下之分欲其均平蓋事親事長當使之均平上下皆得行上之人得事其親下之人也得以事其親上之人得長其長下之人也得以事其長彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章內之意皆自此而推之蔡氏曰大學末章始終以潔矩言蓋平天下之道莫切於潔矩此章節目雖多無非發明潔矩二字詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母樂音洛只音紙好惡並去聲下並同詩小雅南山有臺之篇只語助辭言能潔矩而以民心為己心則是愛民如子而民愛之如父母矣葉氏曰此言能潔矩之美也詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣節讀為截辟讀為僻僇與戮同詩小雅節南山之篇節截然髙大貌師尹周太師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能潔矩而好惡徇於一己之偏則身弒國亡為天下之大戮矣葉氏曰此言不能潔矩之禍也詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國喪去聲儀詩作冝峻詩作駿易去聲詩文王篇師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻大也不易言難保也道言也引詩而言此以結上文兩節之意葉氏曰上面既説兩項好惡之驗如此下面又舉文王之詩總結之言殷未喪衆時猶能克配上帝今日只以殷為監視便見得天命無常甚不易保有天下者能存此心而不失則所以潔矩而與民同欲者自不能已矣是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用先愼乎德承上文不可不謹而言德即所謂明德有人謂得衆有土謂得國有國則不患無財用矣德者本也財者末也本上文而言外本內末爭民施奪人君以德為外以財為內則是爭鬭其民而施之以劫奪之教也蓋財者人之所同欲不能潔矩而欲専之則民亦起而爭奪矣語録曰民本不是要如此惟上之人以德為外而急於貨財暴征橫斂民便效尤相攘相奪則是上教得他如此是故財聚則民散財散則民聚外本內末故財聚爭民施奪故民散反是則有德而有人矣葉氏曰為國者豈可惟知聚財而不思所以散財此有天下者之大患也是故言悖而出者亦悖而入貨悖而入者亦悖而出悖布內反悖逆也此以言之出入明貨之出入也三山陳氏曰以惡聲加人人必以惡聲加己以非道取人之財人亦以非道奪之言與貨其出入雖不同而皆歸諸理其為不可悖一也自先愼乎德以下至此又因財貨以明能潔矩與不能者之得失也語録曰潔矩之大者又在於財用所以後面只管説財康誥曰惟命不于常道善則得之不善則失之矣道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣楚書曰楚國無以為寶惟善以為寶楚書楚語三山陳氏曰楚史官所記之䇿書也言不寶金玉而寶善人也舅犯曰亡人無以為寶仁親以為寶舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也仁愛也事見檀弓此兩節又明不外本而內末之意三山陳氏曰舉此二事以實上文財德本末之言秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若己有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉個古賀反書作介斷丁亂反媢音冒秦誓周書斷斷誠一之貌彥美士也聖通明也三山陳氏曰聖之為義舉一事而言則為衆善之極對衆善而言則止於一事尚庶幾也媢忌也違拂戾也三山陳氏曰言逆沮之意殆危也唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人迸讀為屏古字通用迸猶逐也三山陳氏曰迸屛逺也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也葉氏曰此蓋仁人深得好惡之正始能如此決裂見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也逺去聲命鄭氏云當作慢程子云當作怠未詳孰是若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也葉氏曰若見賢不能舉縱能舉之又不能推先之見不善不能退縱能退之又不能逺絶之是猶未免過失怠慢之機而未能如仁者盡好惡之極也好人之所惡惡人之所好是謂拂人之性災必逮夫身災古災字夫音扶拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也葉氏曰上一節雖未盡好惡之極猶能知所好惡尚不至於拂人好惡之常心今有人焉於人之所當好所同好者反從而惡之於人之所當惡所同惡者反從而好之如此等人不仁之甚自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之君子以位言之道謂居其位而修己治人之術發己自盡為忠文集曰謂凡出於己者必自竭盡而不使其有茍簡不盡之意語録曰發己是從這己上發生出來盡是盡己之誠不是盡之理如十分話對人只説七分便是不盡循物無違謂信文集曰謂言語之發循其物之真實而無所背戾如大則言大小則言小言循於物而無所違耳驕者矜髙泰者侈肆此因上所引文王康誥之意而言章內三言得失而語益加切蓋至此而天理存亡之幾決矣語録曰此章初言得衆失衆再言善不善意己切矣終之以忠信驕泰分明是就心上推出得失之由以決之忠信乃天理之所以存驕泰乃天理之所以亡生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣恆胡登反呂氏曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣三山陳氏曰此古人生財之政也蓋與後世異矣愚案此因有土有財而言以明足國之道在乎務本而節用非必外本內末而後財可聚也自此以至終篇皆一意也仁者以財發身不仁者以身發財發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也陳氏曰惟上之人不妄取民財而所好在仁則下皆好義以忠其上矣下既好義則為事無有不成遂者矣天下之人皆能成遂其上之事則府庫之財亦無悖出之患而為我有矣非若不好仁之人財悖而入亦悖而出也孟獻子曰畜馬乘不察於雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也畜許六反乘斂並去聲孟獻子魯之賢大夫仲孫蔑也畜馬乘士初試為大夫者也三山陳氏曰士之始為大夫有車馬者也伐冰之家卿大夫以上喪祭用冰者也百乘之家有采地者也君子寧亡己之財而不忍傷民之力故寧有盜臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家災害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也長上聲彼為善之此句上下疑有闕文誤字自由也言由小人導之也陳氏曰小人導君於利若長國家而専務財用者皆自小人導而為之此一節深明以利為利之害而重言以結之其丁寧之意切矣右傳之十章釋治國平天下此章之義務在與民同好惡而不專其利皆推廣潔矩之意也能如是則親賢樂利各得其所而天下平矣語録曰此章大槩是專從潔矩上來蓋財者人之所同好也而我欲專其利則民有不得其所好者矣大抵有國有家所以生起禍亂皆是從這裏來陳氏曰此章之義甚博大意則在於潔矩其所以説潔矩之道在於分義利别好惡其所惡者利其所好者義須是能公好惡别義利如此則天下均平而無一夫不遂其所矣三山陳氏曰此章反覆援引出入經傳者幾千言意若不一然求其緒卒不過好惡義利之兩端又從而要其歸則亦不出於潔矩之道而已潔矩之道以己知彼以彼反己而好惡義利之理明矣凡傳十章前四章統論綱領指趣後六章細論條目功夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近而忽之也蔡氏曰明善之要誠身之本朱子於篇末尤􅈤切為學者言之何耶蓋道之浩浩何處下手學者用工夫之至要者不過明善誠身而已明善即致知也誠身即力行也始而致知所以明萬理於心而使之無所疑終而力行所以復萬善於己而使之無不備知不致則真是真非莫辨而將何所從適行不力則雖精義入神亦徒為空言此大學第五章之明善第六章之誠身所以為學者用功之至切至要或問上章論齊家治國之道既以孝弟慈為言矣此論治國平天下之道而復以是為言何也曰三者人道之大端衆心之所同得者也自家以及國自國以及天下雖有大小之殊然其道不過如此而已但前章専以己推而人化為言此章又申言之以見人心之所同而不能已者如此是以君子不唯有以化之而又有以處之也愚謂上章孝弟慈專以己推而人化為言是家齊而國治之事此章就民之感發興起處説謂人已感化之後又當有以處之使各得其所願乃國治而天下平之事潔矩而下即處之之道二章之所指不同蓋人之所以為心者雖曰未嘗不同然貴賤殊勢賢愚異稟茍非在上之君子真知實蹈有以倡之則下之有是心者亦無所感而興起矣幸其有以倡焉而興起矣然上之人乃或不能察彼之心而失其所以處之之道則彼其所興起者或不得遂而反有不均之歎是以君子察其心之所同而得夫潔矩之道然後有以處此而遂其興起之善端也語録曰遂謂成遂之遂又曰能使人興起者聖人之心也能遂其人之興起者聖人之政事也又曰若但興起其善心而不有以使之得遂其心則雖能興起終亦徒然如政煩賦重不得以養其父母又安得以遂其善心須是推己之心以及於彼使之仰足以事父母俯足以畜妻子方得曰何以言潔之為度也曰此莊子所謂潔之百圍語録曰莊子注云潔圍束也是將一物圍束以為之則也賈子所謂度長潔大者也真氏曰度謂以尺之長短潔謂以帶量物之小大如今人之圍木也前此諸儒蓋莫之省而強訓以潔殊無意謂先友太史范公乃獨推此以言之而後其理可得而通也文集曰此范公如圭之説義理切當援據分明先儒訓説皆未及蓋潔度也矩所以為方也以己之心度人之心知人之所惡者不異乎己則不敢以己之所惡者施之於人使吾之身一處乎此則上下四方物我之際各得其分不相侵越而各就其中校其所占之地則其廣狹長短又皆平均如一截然正方而無有餘不足之處是則所謂潔矩者也文集曰問各得其分不相侵越廣狹長短平均如一曰所惡乎左便是左邊人侵了自家左邊界分而我惡之故我亦不以此待右邊人而不侵他右邊之左如此方得左邊界分分明又以所惡乎右者度之方得右邊界分分明上下前後亦莫不然則四至所向皆得均平而界分方整無偏狹之病矣夫為天下國家而所以處心制事者一出於此則天地之間將無一物不得其所而凡天下之欲為孝弟不倍者皆得以自盡其心而無不均之嘆矣天下其有不平者乎然君子之所以有此亦豈自外至而強為之哉亦曰物格知至故有以通天下之志而知千萬人之心即一人之心愚謂天下之志萬殊理則一也物格知至者能燭理則視衆人之心猶一心而明潔矩之義意誠心正故有以勝一己之私而能以一人之心為千萬人之心愚謂公則一致私則萬殊意誠心正者能克己則以一心為衆人之心而盡潔矩之道其如此而已矣一有私意存乎其間則一膜之外便為胡越雖欲潔矩亦將有所隔礙而不能通矣若趙由之為守則易尉而為尉則陵守王肅之方於事上而好人佞己推其所由蓋出於此而充其類則雖桀紂盜跖之所為亦將何所不至哉曰然則潔矩之云是則所謂恕者己乎曰此固前章所謂如愛己之心以愛人者也夫子所謂終身可行程子所謂充拓得去則天地變化而草木蕃充拓不去則天地閉賢人隱皆以其可以推之而無不通耳語録曰推得去則物我貫通自有箇生生無窮底意思便有天地變化草木蕃氣象天地只是這樣道理若推不去物我隔絶欲利於己不利於人欲己之富欲人之貧欲己之夀欲人之夭似這氣象全然閉塞隔絶了便似天地閉賢人隱然必自窮理正心者而推之則吾之愛惡取舍皆得其正而其所推以及人者亦無不得其正是以上下四方以此度之而莫不截然各得其分若於理有未明而心有未正則吾之所欲者未必其所當欲吾之所惡者未必其所當惡乃不察此而遽欲以是為施於人之準則則其意雖公而事則私是將見其物我相侵彼此交病而雖庭除之內跬步之間亦且參商矛盾而不可行矣尚何終身之望哉是以聖賢凡言恕者又必以忠為本而程子亦言忠恕兩言如形與影欲去其一而不可得蓋唯忠而後所如之心始得其正是亦此篇先後本末之意也語録曰忠是本體恕是枝葉非是别有枝葉乃是本根中發出枝葉枝葉即是本根陳氏曰大槩忠恕只是一物就中截作兩片則為二物蓋存諸中者既忠則發出外來便是恕應事接物處不恕則是在我者必不十分真實故發出忠底心便是恕底事做成恕底事便見忠底心然則君子之學可不謹其序哉曰自身而家自家而國自國而天下均為推己及人之事而傳之所以釋之者一事自為一説若有不能相通焉者何也曰此以𫝑之逺邇事之先後而所施有不同耳實非有異事也蓋必審於接物好惡不偏然後有以正倫理篤恩義而齊其家其家已齊事皆可法然後有以立標準胥教誨而治其國其國已治民知興起然後可以推己度物舉此加彼而平天下此以其逺近先後而施有不同者也然自國以上則治於內者嚴密而精詳自國以下則治於外者廣博而周遍語録曰裏面事要細密外面事要推闡愚謂嚴密周詳乃所以為廣博周遍之地若治內者踈略而茍簡則治外者雖欲廣博而周遍其可得哉亦可見其本末實一物首尾實一身矣何名為異説哉曰所謂民之父母者何也曰君子有潔矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫好其所好而與之聚之惡其所惡而不以施焉則上之愛下真猶父母之愛其子矣彼民之親其上豈不亦猶子之愛其父母哉三山陳氏曰父母之於子其所好惡無有不知者體氣同也至於民之好惡其君常有所不知無他制於形體之異耳能潔矩則能以民之心為心而可以父母斯民民亦父母之矣曰此所引節南山之詩何也曰言在尊位者人所觀仰不可不謹若人君恣己徇私不與天下同其好惡則為天下僇如桀紂幽厲也曰得衆得國失衆失國何也曰言能潔矩則民父母之而得衆得國矣不能潔矩則為天下僇而失衆失國矣曰所謂先慎乎德何也曰上言有國者不可不謹此言其所謹而當先者尤在於德也德即所謂明德所以謹之亦曰格物致知誠意正心以修其身而已矣曰此其深言務財用而失民何也曰有德而有人有土則因天分地不患乎無財用矣然不知本末而無潔矩之心則未有不爭鬬其民而施之以劫奪之教者也易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚於上則民散於下矣財散於下則民歸於上矣言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏以為君有逆命則民有逆辭上貪於利則下人侵畔得其旨矣曰前既言命之不易矣此又言命之不常何也曰以天命之重而致其丁寧之意亦承上文而言之也蓋善則得之者有德而有人之謂也不善則失之者悖入而悖出之謂也三山陳氏曰善與不善務德務財之異耳然則命之不常乃人之所自為耳可不謹哉三山陳氏曰命不于常命非天命也在人而已天命視人心以為去就此理昭然可不畏哉曰其引秦誓何也曰言好善之利及其子孫不好善之害流於後世亦由潔矩與否之異也曰媢疾之人誠可惡矣然仁人惡之之深至於如此得無疾之己甚之辭耶曰小人為惡千條萬端其可惡者不但媢疾一事而已仁人不深惡乎彼而獨深惡乎此者以其有害於善人使民不得被其澤而其流禍之長及於後世而未已也然非殺人于貨之盜則罪不至死故亦放流之而已然又念夫彼此之𫝑雖殊而苦樂之情則一今此惡人放而不逺則其為害雖得不施於此而彼所放之地其民復何罪焉故不敢以己之所惡施之於人而必逺而置之無人之境以禦魑魅而後已蓋不惟保安善人使不蒙其害亦所以禁伏凶人使不得稔其惡雖因彼之善惡而有好惡之殊然所以仁之之意亦未嘗不行乎其間也此其為禦亂之術至矣而何致亂之有曰迸之為屏何也曰古字之通用者多矣漢石刻詞有引尊五美屏四惡者而以尊為遵以屏為迸則其證也曰仁人之能愛人能惡人何也曰仁人者私欲不萌而天下之公在我是以是非不謬而舉措得宜也曰命之為慢與其為怠也孰得曰大凡疑義所以決之不過乎義理文𫝑事證三者而已今此二字欲以義理文𫝑決之則皆通欲以事證決之則無考蓋不可以深求矣若使其於義理事實之大者有所鄉背而不可以不究猶當視其緩急以為先後況於此等字既兩通而於事義無大得失則亦何必苦心極力以求之徒費日而無所益乎以是而推他亦皆可見矣曰好善惡惡人之性然也有拂人之性者何哉曰不仁之人阿黨媢疾有以陷溺其心是以其所好惡戾於常性如此與民之父母能好惡人者正相反使其能勝私而潔矩則不至於是矣曰忠信驕泰之所以為得失者何也曰忠信者盡己之心而不違於物潔矩之本也驕泰則恣己徇私以人從欲不得與人同好惡矣陳氏曰得失之道惟在於忠信驕泰二者之間盡己之心而不違乎物故好惡與人同能潔矩者也驕矜侈泰之人任己自恣好惡不與人同不能潔矩者也驕泰與忠信相反曰上文深陳財用之失民矣此復言生財之道何也曰此所謂有土而有財者也夫洪範八政食貨為先子貢問政而夫子告之亦以足食為首蓋生民之道不可一日而無者聖人豈輕之哉特以為國者以利為利則必至於剝民以自奉而有悖出之禍故深言其害以為戒耳至於崇本節用有國之常政所以厚下而足民者則固未嘗廢也吕氏之説得其旨矣有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也然孟子所謂政事則所以告齊梁之君使之制民之産者是已豈若後世頭會箕斂厲民自養之云哉真氏曰近世所謂善理財者何其懵乎此也元元己病而科斂日興不知皮將盡而毛亡所傅也出新巧以籠愚民茍邀倍稱之入不知朝四暮三之亡益也孟子曰我能為君充府庫今之所謂良臣古之所謂民賊也曰仁者以財發身不仁者以身發財何也曰仁者不私其有故財散民聚而身尊不仁者惟利是圖故捐身賈禍以崇貨也陳氏曰仁人財與民共所以得民而身自尊矣不仁之人惟知有財不知有身雖能聚斂其財而身反蹈於危亡矣然亦即財貨而以其效言之爾非謂仁者真有以財發身之意也愚謂仁人本無計效之意而效自至曰未有府庫財非其財者何也曰上好仁則下好義矣下好義則事有終矣事有終則為君者安富尊榮而府庫之財可長保矣此以財發身之效也上不好仁則下不好義下不好義則其事不終是將為天下僇之不暇而況府庫之財又豈得為吾之財乎若商紂以自焚而起巨橋鹿臺之財德宗以出走而豐瓊林大盈之積皆以身發財之效也愚謂財在天下本流通之物下之供上在九貢九職自有常數豈容取之無義専利自私而為一己之藏乎若紂有巨橋之粟鹿臺之財而終於自焚德宗橫斂於民涇原軍士聞瓊林大盈金帛盈溢相與取之其事之不終直至於此吁可戒哉曰其引孟獻子之言何也曰雞豚牛羊民之所畜養以為利者也既己食君之祿而享民之奉矣則不當復與之爭此公儀子所以拔園葵去織婦而董子因有與之齒者去其角傅之翼者兩其足之喻皆潔矩之義也聚斂之臣剝民之膏血以奉上而民被其殃盜臣竊君之府庫以自私而禍不及下陳氏曰聚斂之臣是橫取民之財盜臣是盜己府庫之私財盜臣禍未及民聚斂則禍及於民矣仁者之心至誠惻怛寧亡己之財而不忍傷民之力所以與其有聚斂之臣寧有盜臣亦潔矩之義也昔孔子以臧文仲之妾織蒲而直斥其不仁以冉求聚斂於季氏而欲鳴鼓以聲其罪以聖人之宏大兼容溫良博愛而所以責二子者疾痛深切不少假借如此其意亦可見矣三山陳氏曰織絍亦儉矣而君子疾之以其主於利也冉求之聚斂未必有後世掊克之事但聚斂藏於季氏之家而不能布之於下則聖人疾而欲攻之況剝民力以自富乎曰國不以利為利以義為利何也曰以利為利則上下交征不奪不厭以義為利則不遺其親不後其君蓋惟義之安而自無所不利矣程子曰聖人以義為利義之所安即利之所在正謂此也語録曰惟義之安則自無不利矣問只是當然而然便安否曰是只萬物皆得其分便是利君得其為君臣得其為臣父得其為父子得其為子何利如之這利字即易所謂利者義之和利便是義之和處孟子分别義利拔本塞原之意其傳蓋亦出於此云語録曰如秦發閭左之戍也是利墮名城殺豪傑銷鋒鏑北築長城皆是自要他利利不必専指財利所以孟子從頭截斷曰此其言災害並至無如之何何也曰怨己結於民心則非一朝一夕之可解矣聖賢深探其實而極言之欲人有以審於未然而不為無及於事之悔也以此為防人猶有用桑羊孔僅宇文融楊矜陳京裴延齡之徒以敗其國者故陸宣公之言曰民者邦之本財者民之心其心傷則其本傷其本傷則枝幹凋瘁而根柢蹶拔矣吕正獻公之言曰小人聚斂以佐人主之欲人主不悟以為有利於國而不知其終為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也嗚呼若二公之言則可謂深得此章之指者矣有國家者可不監哉愚謂興利之臣不過以聚斂為長䇿以掊克為匪躬惟求取媚於上而不顧結怨於下人主以其奉己之欲悅而寵之不知其失民心而蠧國脈災害並至匪一朝一夕之可解有必然之理者此桑羊之徒所以誤人之天下國家至於極也陸吕二公之言可謂當矣如司馬公闢善理財者不加賦之説則亦所當知其言曰天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱此古今之至言也後世之臣有以言利媒人主者其尚以大學此章之指與三君子之言察之曰此章之文程子多所更定而子獨以舊文為正者何也曰此章之義博故傳言之詳然其實則不過好惡義利之兩端而已但以欲致其詳故所言己足而復更端以廣其意是以二義相循間見層出有似於易置而錯陳耳然徐而考之則其端緒接續脈絡貫通而丁寧反復為人深切之意又自别見於言外不可易也必欲二説中判以類相從自始至終畫為兩節則其界辨雖若有餘而意味或反不足此不可不察也大學纂疏中庸纂疏原序豫既為趙君序大學章句疏矣趙君又疏中庸章句以胥教誨嗚呼士惟無志則已茍有志焉則何書之不可讀也豫至是益嘆趙君之用工何其專而工夫至到文理密察又何其不茍也然嘗伏讀中庸章句之書因有以見孔門傳授之正本朝諸子解説之詳矣蓋自皇王以來繼天立極丁寧告戒不出是道今觀堯之告舜則曰允執其中舜之命禹則曰人心道心湯之誥民則曰民有常性武之誓師則曰人為物靈以至成王之言生厚尹吉甫之言秉彛劉子之言天地中世之相去有久近而聖賢之言先後一揆未嘗少殊也吾夫子生於春秋之世雖不得其位而為往聖繼絶學幾若過於有位者越是時朝夕講貫則又有顔子曽子見而知之再傳而復得孔子之孫子思則又聞而知之子思子又懼此道之失其傳也乃推本古先聖人之意而質以平日所聞父師之言作為是書以詔來世若有不能自已者焉此作書之本義也自是而後又再傳而為孟氏孟氏殁此道寥寥千五百年至我朝而濂溪周子者出始得所傳之要以著於篇河南二程夫子又得其遺旨而發揮之然明道不及為書伊川雖為書又心不嗛意而火之今所傳者特其門人所記平居問答之辭而橫渠張子若謝氏尹氏亦皆記其語之及此者耳惟吕氏遊氏楊氏侯氏則有成書然或過於高或鄰於淺或語多差失或意轉支離或背其師説或入於釋氏具見於石君子重所編新安朱文公有憂之乃沈潛反復考其異會其同𠫭考究極以審訂之著為章句一篇既又刪石氏編次繁亂之語名曰輯略記嘗所論辨去取之意名曰或問以附其後然後中庸之旨始大白於天下可謂至矣盡矣今趙君又纂文公文集語録及諸高弟言及章句者而益之以己見至於或問則取其評論諸子之説而附注之是亦文公之意也學者觀乎此而有意于深造則羣言萃於一編易以𠫭訂既有以見文公取舍折衷之詳又有以見門人講明論辨之當俟其首尾該貫義理充足而後學中庸焉則得尺吾尺得寸吾寸雖逺可近雖高可升而所自得者多矣不寧惟是厥既知之又將以其所知者而見之素履實踐焉則知與行互相發見豈不能為聖為賢乎然則纂疏之作雖出於編輯之屬而發明中庸大義將以迪民彛厚世教也豈訓詁云乎哉寶祐四年十一月吉日陵陽牟子才序讀中庸章句綱領中庸一篇某妄以己意分其章句是書豈可以章句求哉然學者之於經未有不得於辭而能通其意者朱子文集中庸自首章以下多對説將來直是整齊某舊讀中庸以為子思做又時復有箇子曰字讀得熟後方見得是子思參夫子之説著為此書自是沈潛反覆遂漸得其旨趣定得今章句擺布得來直恁麼細密朱子語録黃氏曰中庸與他書不同如論語是一章説一事大學亦然中庸則成大片段須是滚讀方知首尾然後逐段解釋則理通矣今莫若且以中庸滚讀以章句子細一一玩味然後首尾貫通三山陳氏曰中庸三十三章其血脈貫通之處朱子既為之章句又撮其宏綱如言某章是援引先聖之言某章是子思發明之説具有次序中庸看得甚精章句大槩已改定多中庸全在章句其或問中皆是辨諸家説恐未必是語録又曰中庸或問亦有未滿意處如評論諸説處尚多粗問中庸編集得如何曰便是難説緣前輩諸公説得多了其間儘有差舛處又不欲盡剝難他底所以難下手不比大學都未曾有人説語録黃氏曰中庸自是難看石氏所集諸家説尤亂雜未易曉須是胸中有權衡尺度方始看得分明今驟取而讀之精神已先為所亂却不若子細將章句研究令十分通曉俟首尾該貫後却取而觀之可也中庸章句序中庸何為而作也子思子憂道學之失其傳而作也朱子文集曰曾子學於孔子而得其傳子思又學於曽子而得其所傳於孔子者既而懼夫傳之久逺而或失其真也於是推本所傳之意質以所聞之言更相反覆作為此書蓋自上古神聖繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也朱子語録曰中只是箇恰好砥道理允信也是真箇執得堯當時告舜只説這一句是舜已曉得那箇了所以不復更説人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也語録曰舜禹相傳只就這心上理會也只在日用動靜之間求之不是去虛空中討一箇物事來堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也語録曰舜告禹又添得三句是舜説得又較子細這三句是允執厥中以前事是舜教禹做工夫處便是怕那禹尚未曉得故恁地説葉氏曰堯只説一語至舜演為三言舜之意以為必言其所以微所以危必精必一而後可以執也蓋嘗論之心之虛靈知覺一而已矣語録曰虛靈自是心之本體知覺便是心之德又曰所以覺者心之理也能覺者氣之靈也問知覺是心之靈固如此抑氣之為耶曰不専是氣是先有知覺之理理未知覺氣聚成形理與氣合便能知覺譬如這燭火是因得這膏脂便有許多光焰曰心之發處是氣否曰也只是知覺而以為有人心道心之異者則以其或生於形氣之私文集曰如飢飽寒燠之類皆生于吾之血氣形體而他人無與馬所謂私也亦未便是不好但不可一向徇之耳語録曰問形氣是口耳鼻目四肢之屬曰固是問如此則未可便謂之私欲曰但此數件事屬自家體段上便是私有底物不比道便公共故上面便有箇私底根本或以形氣之私為未安曰私即是惡謂之上智不能無可乎真氏曰私者猶言我之所獨耳今人言私親私恩之類是也其可謂之惡乎又問六經中曽有謂私非惡者否曰雨我公田遂及我私獻豜于公言私其豵如此類以惡言之可乎或原於性命之正文集曰天生此民時便已是命他以此性了而所以為知覺者不同語録曰人心惟危是知覺口之於味目之於色耳之於聲砥道心是知覺義理砥又曰只是這一箇心知覺從耳目之欲上去便是人心知覺從義理上去便是道心陳氏曰人得天地之理為性得天地之氣為體理與氣合方成箇心有箇虛靈知覺便是身之所以為主宰處然虛靈知覺有從理而發者有從氣而發者又各不同也是以或危殆而不安語録曰危者欲陷而未陷之辭又曰危未便是不好只是危險在欲墮未墮之間耳陳氏曰人心方是就此軀殼上平説未是不好砥物但此心最臲卼不安易流於不好故謂之危如飢思食渴思飲此由形體而發人心也因而飲食未害也若窮口腹之欲便陷矣或微妙而難見耳語録曰微者難明有時發見些子使自家見得有時又不見了陳氏曰道心專是就理義上説但此心本無形狀至幽隱而難見故謂之微如呼爾蹴爾嗟來等食皆不肯食此由理義而發道心也若其嗟也可去其謝也可食則於理甚隱至為難知非賢哲莫能識之然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心語録曰道心是義理上發出來底人心是人身上發出來砥雖聖人不能無人心如飢食渴飲之類雖小人不能無道心如惻隱之心是問既云上智何以更有人心曰掐著痛抓著癢此非人心而何人自有人心道心一箇生於血氣一箇生於理飢寒痛癢此人心惻隱羞惡是非辭遜此道心也雖上知亦同二者雜於方寸之間陳氏曰二者在方寸間本自不相紊亂又曰二者無日無時不發見呈露非是判然為二物不相交涉只在人識别之而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣文集曰人心之危者人欲之萌也道心之微者天理之奧也心則一也以正不正而異其名耳精則察夫二者之間而不雜也語録曰精是精察分明又曰是識别得人心道心陳氏曰要分别二者界分分明不相混雜一則守其本心之正而不離也語録曰一是要守得不離陳氏曰專守道心之正而無以人心二之從事於斯無少間斷必使道心常為一身之主而人心每聽命焉語録曰有道心則人心為之節制人心皆道心也又曰道心是義理之心可以為人心之主宰而人心據以為準者也且以飲食言之凡飢渴而欲得飲食以充其飽且足者皆人心也然必有義理存焉有可以食有不可以食如子路食於孔悝之類此不可食者又如父之慈其子子之孝其父常人亦能之此道心之正也苟父一虐其子則子必很然以悖其父此人心之所以危也惟舜則不然雖其父欲殺之而舜之孝則未嘗習此道心也故當使人心每聽道心之區處方可問人心可無否曰如何無得但以道心為主而人心每聽命焉耳則危者安微者著而動靜云為自無過不及之差矣文集曰不待擇於過不及之間而自然無不中矣陳氏曰如此則日月之間無往而非中凡聲之所發便合律身之所行便合度凡由人心而出者莫非道心之流行夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉陳氏曰此是大綱目處堯舜禹之所以傳授天下皆是此道理自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者孟子集注曰堯舜治天下夫子又推其道以垂教萬世堯舜之道非得孔子則後世亦何所據哉然當是時見而知之者惟顔氏曾氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其説之也詳其曰天命率性則道心之謂也語録曰性是心之道理其曰擇善固執則精一之謂也語録曰擇善即惟精固執即惟一其曰君子時中則執中之謂也語録曰時中是無過不及砥中執中亦然世之相後千有餘年而其言之不異如合符節歷選前聖之書所以提挈綱維開示藴奧未有若是其明且盡者也自是而又再傳以得孟氏為能推明是書以承先聖之統愚謂中庸深處多見於孟子如道性善原於天命之謂性也所謂存心收放心乃致中也充廣其仁義之心則致和也至於誠者天之道思誠者人之道一章其義悉本於中庸尤足以見淵源之所自及其沒而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之説日新月盛以至於老佛之徒出則彌近理而大亂真矣語録曰便是他那道理也有極相似處只是説得來别須是看得他那彌近理而大亂真處始得陳氏曰彌近理而大亂真甚相似而絶不同也然非物格知至理明義精者不足以識破然而尚幸此書之不泯故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其語而得其心也惜乎其所以為説者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而微言未析文集曰明道不及為書世傳陳忠肅公所序者乃吕氏所著别本也伊川雖嘗言中庸已成書然亦不傳於學者或以問和靖尹公則曰先生自以不滿其意而火之矣二夫子既皆無書故今所傳特出於門人記其平居問答之辭至其門人所自為説則雖頗詳盡而多所發明然倍其師説而淫於老佛者亦有之矣文集曰唯呂氏遊氏楊氏侯氏為有成書若謝氏尹氏則亦或記其語之及此者耳又皆别自為編或頗雜出他記熹自蚤嵗即嘗受讀而竊疑之沈潛反復蓋亦有年一旦恍然似有以得其要領者然後乃敢會衆説而折其中既為定著章句一篇以俟後之君子而一二同志復取石氏書刪其繁亂名以輯略且記所嘗論辨取舍之意别為或問以附其後然後此書之旨支分節解脈絡貫通詳略相因巨細畢舉而凡諸説之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升髙之一助云爾淳熙己酉春三月戊申新安朱熹序
