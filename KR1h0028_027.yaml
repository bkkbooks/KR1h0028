body:
  text: 欽定四庫全書孟子纂疏卷十四宋趙順孫撰朱子集注盡心章句下凡三十八章孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛親親而仁民仁民而愛物所謂以其所愛及其所不愛也公孫丑曰何謂也梁惠王以土地之故糜爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也梁惠王以下孟子答辭也糜爛其民使之戰鬬糜爛其血肉也復之復戰也子弟謂太子申也以土地之故及其民以民之故及其子皆以其所不愛及其所愛也此承前篇之末三章之意言仁人之恩自內及外不仁之禍由疏逮親輔氏曰仁人之恩自內以及外者自本而推之也惟其自本而推之故雖無所不愛而輕重等差蓋不可紊也不仁之禍由疏逮親者徇欲而從流者也惟其徇欲而從流故橫放逆施莫之紀極也始也糜爛其人民而殘賊其子弟終不至殺身覆族不已也孟子曰春秋無義戰彼善於此則有之矣春秋每書諸侯戰伐之事必加譏貶以著其擅興之罪無有以為合於義而許之者但就中彼善於此者則有之如召陵之師之類是也征者上伐下也敵國不相征也征所以正人也諸侯有罪則天子討而正之此春秋所以無義戰也孟子曰盡信書則不如無書程子曰載事之辭容有重稱而過其實者學者當識其義而已茍執於辭則時或有害於義不如無書之愈也吾於武成取二三䇿而已矣武成周書篇名武王伐紂歸而記事之書也䇿竹簡也取其二三䇿之言其餘不可盡信也程子曰取其奉天伐暴之意反政施仁之法而已仁人無敵於天下以至仁伐至不仁而何其血之流杵也杵舂杵也或作鹵楯也武成言武王伐紂紂之前徒倒戈攻于後以北血流漂杵孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設是言懼後世之惑且長不仁之心耳輔氏曰如血流漂杵一語雖是商人之自殺然畢竟過乎實武王伐紂遇此等事亦必自處置豈肯使之殺人至於如此之多此而不辨竊恐後世惑之以為聖人任上亦或有時殺人如此則將長其不仁之心其為害大矣孟子曰有人曰我善為陳我善為戰大罪也陳去聲制行伍曰陳交兵曰戰國君好仁天下無敵焉好去聲南面而征北狄怨東面而征西夷怨曰奚為後我此引湯之事以明之解見前篇武王之伐殷也革車三百兩虎賁三千人兩去聲賁音奔又以武王之事明之也兩車數一車兩輪也愚案風俗通云車有兩輪故一車謂之一兩千書序作百王曰無畏寧爾也非敵百姓也若崩厥角稽首書泰誓文與此小異孟子之意當云王謂商人曰無畏我也我來伐紂本為安寧汝非敵商之百姓也於是商人稽首至地如角之崩也征之為言正也各欲正己也焉用戰焉於虔反民為暴君所虐皆欲仁者來正己之國也孟子曰梓匠輪輿能與人規矩不能使人巧尹氏曰規矩法度可告者也巧則在其人雖大匠亦末如之何也已輔氏曰巧謂熟後自得之妙蓋下學可以言傳上達必由心悟莊周所論斫輪之意蓋如此孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之飯上聲糗去久反茹音汝袗之忍反果説文作婐烏果反飯食也糗乾糒也茹亦食也袗畫衣也愚謂畫衣者畫黼黻絺繡之衣也二女堯二女也果女侍也語録曰趙氏以果為侍廣韻從女從果者亦曰侍也言聖人之心不以貧賤而有慕於外不以富貴而有動於中隨遇而安無預於己所性分定故也輔氏曰所性謂天所豫我之性也分定謂雖大行不加窮居不損也夫貧富貴賤皆外物之儻來寄也聖人盡性故其心湛然而無所厭羡欣戚於其間隨遇而安是不以物動己也無預於己是不以己隨物也孟子曰吾今而後知殺人親之重也殺人之父人亦殺其父殺人之兄人亦殺其兄然則非自殺之也一間耳間去聲言吾今而後知者必有所為而感發也一間者我往彼來間一人耳其實與自害其親無異也輔氏曰間字説分明其感發於人尤切范氏曰知此則愛敬人之親人亦愛敬其親矣孟子曰古之為關也將以禦暴譏察非常今之為關也將以為暴征稅出入輔氏曰關則一而古今所以為關之意則不同譏察非常為義也征稅出入為利也范氏曰古之耕者什一後世或收大半之稅此以賦斂為暴也文王之囿與民同之齊宣王之囿為阱國中此以園囿為暴也後世為暴不止於關若使孟子用於諸侯必行文王之政凡此之類皆不終日而改也輔氏曰先王制其本者天理也後世流於末者人欲也天下之事莫不然孟子舉關之一事言之故范氏推言及賦斂苑囿之事且曰使孟子用於諸侯必行文王之政者尤説得孟子之事實蓋孟子言句句是事實言之則必行之矣孟子曰身不行道不行於妻子使人不以道不能行於妻子身不行道者以行言之不行者道不行也使人不以道者以事言之不能行者令不行也孟子曰周于利者凶年不能殺周于德者邪世不能亂周足也言積之厚則用有餘輔氏曰德貴積蓄然後有餘用而外物不足以亂之若夫挾一善一長自以為足而欲以遊於邪世則鮮有不為其所亂者矣故良農不患乎年之有凶而惟患乎蓄糧之不厚君子不患乎世之難處而惟患乎積德之不周戰兢自持死而後已凡皆以周其德也孟子曰好名之人能讓千乘之國茍非其人簞食豆羮見於色好乘食皆去聲見音現好名之人矯情干譽是以能讓千乘之國然若本非能輕富貴之人則於得失之小者反不覺其真情之發見矣蓋觀人不於其所勉而於其所忽然後可以見其所安之實也或問好名之人能讓國矣而不能忘情於小物何哉曰千乘之國辭受之間十目所視十手所指之地也簞食豆得失之際則微矣人亦何暇注其耳目於斯哉此好名之士所以飾情於彼以取美名而不意其鄙吝之真情實態乃發露於忽易而不虞之地也語録曰能讓千乘之國惟賢人能之然好名之人亦有時而能之然若不是真箇能讓之人本非真能讓國也徒出一時之慕名而勉強為之耳然這邊雖能讓千乘之國那邊簞食豆羮必見於色又曰是好名之心勝大處打得過小處漏綻也輔氏曰矯情者務勉於其大而難久至誠者不忽於其小而有常是故觀人之法不於其所勉而於其所忽人之誠與偽見矣所安即誠也孟子曰不信仁賢則國空虛空虛言若無人然無禮義則上下亂禮義所以辨上下定民志無政事則財用不足生之無道取之無度用之無節故也尹氏曰三者以仁賢為本無仁賢則禮義政事處之皆不以其道矣輔氏曰仁者德之首賢則總言其有德耳國以賢而立無仁賢則其國虛矣有之而不能信任之則與無同尹氏謂三者以仁賢為本者當矣禮義由賢者出政事以得人為本故無仁賢則處之皆不得其當禮義則以非禮為禮非義為義政事之施則先後無序寬猛失宜也孟子曰不仁而得國者有之矣不仁而得天下未之有也言不仁之人騁其私智可以盜千乘之國而不可以得丘民之心鄒氏曰自秦以來不仁而得天下者有矣然皆一再傳而失之猶不得也所謂得天下者必如三代而後可輔氏曰不仁而得天下如曹操司馬氏及五代之君皆是也鄒氏斷以得天下必如三代而後可者得孟子之旨也孟子曰民為貴社稷次之君為輕社土神稷穀神建國則立壇壝以祀之愚謂社所以祭五土之神稷所以祭五穀之神稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利以養人故也周禮大司徒設其社稷之壝壝者纍土以為髙也不屋而壇社壇在東稷壇在西蓋國以民為本社稷亦為民而立而君之尊又係於二者之存亡故其輕重如此或問民貴君輕之説得不啓後世篡奪之端乎曰以理言之則民貴以分言之則君貴此固兼行而不悖也各於其時視其輕重之所在而已爾若不惟其是而姑借聖賢之説則亦何詞之不可借而所以啓後人之禍者又豈止於斯乎是故得乎丘民而為天子得乎天子為諸侯得乎諸侯為大夫丘民田野之民至微賤也然得其心則天下歸之天子至尊貴也而得其心者不過為諸侯耳是民為重也諸侯危社稷則變置諸侯無道將使社稷為人所滅則當更立賢君是君輕於社稷也犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷盛音成祭祀不失禮而土穀之神不能為民禦災捍患則毁其壇壝而更置之語録曰非謂易其人而祀之蓋言遷社稷壇場於他處耳亦年不順成八蠟不通之意是社稷雖重於君而輕於民也輔氏曰天生民而立之君以司牧之是君為民而立也世衰道微至戰國之時為君者不知其職而反視其民如草芥而不之恤也故孟子發此輕重之論而併及夫社稷焉蓋社稷亦為民而立故也於是反覆明辨之其丁寧警切之意可謂至矣孟子曰聖人百世之師也伯夷栁下惠是也故聞伯夷之風者頑夫廉懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬奮乎百世之上句百世之下聞者莫不興起也非聖人而能若是乎而況於親炙之者乎興起感動奮發也親灸親近而熏灸之也餘見前篇孟子曰仁也者人也合而言之道也仁者人之所以為人之理也語録曰此仁字不是别物即是這人底道理然仁理也人物也以仁之理合於人之身而言之乃所謂道者也或問此章之説曰言人而不及仁則血氣物欲之私而已言仁而不即人之身以明之則又徒為虛言而無以見天理流行之實故必以仁之理合於人之身而言然後仁之為道可見蓋仁則性而已矣道則父子之親君臣之分見於人之身而尤著也程子曰中庸所謂率性之謂道是也或曰外國本人也之下有義也者宜也禮也者履也智也者知也信也者實也凡二十字今案如此則理極分明然未詳其是否也或問外國别本二十字信乎曰不可知也姑記之以俟知者孟子曰孔子之去魯曰遲遲吾行也去父母國之道也去齊接淅而行去他國之道也重出孟子曰君子之厄於陳蔡之間無上下之交也君子孔子也厄與厄同君臣皆惡無所與交也輔氏曰陳蔡之厄聖人之極否也故孟子特原其事以為蓋緣君臣俱惡無所與交之故是亦氣數之窮在聖人則何與焉貉稽曰稽大不理於口貉音陌趙氏曰貉姓稽名為衆口所訕理賴也輔氏曰理雖訓賴而曰大不賴於口者言大為衆口所訕不見理於衆口是無所賴於衆口也今案漢書無俚方言亦訓賴孟子曰無傷也士憎兹多口趙氏曰為士者益多為衆口所訕案此則憎當從土今本皆從心蓋傳寫之誤詩云憂心悄悄愠于羣小孔子也肆不殄厥愠亦不隕厥問文王也詩弼風柏舟及大雅綿之篇也悄悄憂貌愠怒也本言衛之仁人見怒於羣小孟子以為孔子之事可以當之肆發語辭隕墜也問聲問也本言太王事昆夷雖不能殄絶其愠怒亦不自墜其聲問之美孟子以為文王之事可以當之語録曰問衛弼柏舟之詩何與孔子而孟子以此稱孔子何也曰此不必疑如見毁於叔孫幾害於桓魋皆愠于羣小也辭則衛詩意似孔子之事故孟子以此言孔子至於綿詩肆不殄厥愠之語注謂説文王以詩考之上文方説太王下文豈得便言文王如此意其間須有闕文尹氏曰言人顧自處如何盡其在我者而已輔氏曰尹氏深得此章之旨孔子文王之心亦如是而已矣孟子曰賢者以其昭昭使人昭昭今以其昏昏使人昭昭昭昭明也昏昏暗也尹氏曰大學之道在自昭明德而施於天下國家其有不順者寡矣輔氏曰以己昭昭使人昭昭者求之己也以己昏昏使人昭昭者求之人也尹氏引大學之説當矣能明明德則施於天下國家其有不順者寡矣若不自明其德則如面牆一物無所見一步不可移雖至近如妻子亦且不順之矣况他人乎孟子謂髙子曰山徑之蹊間句介然用之而成路句為間不用則茅塞之矣今茅塞子之心矣介音戛徑小路也蹊人行處也介然倐然之頃也用由也路大路也為間少頃也茅塞茅草生而塞之也言理義之心不可少有間斷也輔氏曰理義之心人所固有雖易發而亦易窒日用之間才有所感其端固未嘗不發見也此正猶山中之小徑人能由之則倐然之間遂可以成路亦如人於善端發處體察而力行之則亦可以成德若或少頃之間不能由之則茅草生而塞之矣亦如善端開發若或不能體察而力充之則內為氣習所蔽外為物欲所誘而遂窒之矣孟子言此蓋以見學者於理義之心不可少有間斷也髙子曰禹之聲尚文王之聲尚加尚也豐氏曰言禹之樂過於文王之樂孟子曰何以言之曰以追蠡追音堆蠡音禮豐氏曰追鍾紐也周禮所謂旋蟲是也愚案考工記鐘縣謂之旋旋蟲謂之幹蓋懸鐘之紐也其形如環環則有盤旋之義縣鐘則假物以為之附著鐘偃於此若盤旋然於旋之上為蟲形以飾之自漢以來鐘旋之上以銅篆作蹲熊及盤龍獸名辟邪皆旋蟲之類也蠡者齧木蟲也言禹時鐘在者鍾紐如蟲齧而欲絶蓋用之者多而文王之鐘不然是以知禹之樂過於文王之樂也曰是奚足哉城門之軌兩馬之力與與平聲豐氏曰奚足言此何足以知之也軌車轍迹也兩馬一車所駕也城中之塗容九軌車可散行故其轍迹淺城門惟容一車車皆由之故其轍迹深蓋日久車多所致非一車兩馬之力能使之然也言禹在文王前千餘年故鐘久而紐絶文王之鐘則未久而紐全不可以此而議優劣也此章文義本不可曉舊説相承如此而豐氏差明白故今存之亦未知其是否也齊飢陳臻曰國人皆以夫子將復為發棠殆不可復復扶又反先時齊國嘗飢孟子勸王發棠邑之倉以賑貧窮至此又飢陳臻問言齊人望孟子復勸王發棠而又自言恐其不可也孟子曰是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悅之其為士者笑之手執曰搏卒為善士後能改行為善也之適也負依也山曲曰嵎攖觸也笑之笑其不知止也疑此時齊王已不能用孟子而孟子亦將去矣故其言如此輔氏曰齊人之所望於孟子者利也而孟子之所以自守者義也夫告君以發粟賑民是亦美事固君子所樂為者但是時齊王已不能用孟子而孟子亦將去矣故其義不當復有所言耳君子之所為與時變化不主故常惟義理如何耳顧豈徇其常所為者以取人之屢快哉孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也程子曰五者之欲性也然有分不能皆如其願則是命也不可謂我性之所有而求必得之也語録曰此性字指氣質而言此命字乃合理與氣而言輔氏曰程子不謂性之説固已盡之其曰不可謂我性之所有而求必得之便是解不謂性一句也愚案不能皆如其願不止為貧賤蓋雖富貴之極亦有品節限制則是亦有命也語録曰五者之欲固是人性然有命分既不可謂我性之所有而必求得之又不可謂我分可以得而必極其欲如貧賤不能如願此固分也富貴之極可以無所不為然亦有限制裁節又當安之於理如紂之酒池肉林却是富貴之極而不知限節之意若以其分言之固無不可為但道理却恁地不得今人只説得一邊不知合而言之未嘗不同也輔氏曰若謂貧賤故五者不能如其所願則只説得一邊如武帝之千門萬戶却是不知限節仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也命也有性焉君子不謂命也程子曰仁義禮智天道在人則賦於命者所稟有厚薄清濁然而性善可學而盡故不謂之命也語録曰此命字專指氣而言此性字却指理而言如舜遇瞽瞍固是所遇氣數然舜惟盡事親之道期於底豫此所謂盡性大凡清濁厚薄之稟皆命也一以所稟言之一以所值言之所造之有淺有深所感之有應有不應皆厚薄清濁之分不同且如聖人之於天道如堯舜則是性之湯武則是反之禹則入聖域而不優此是合下所稟有清濁而所造有淺深不同文王之囚羑里夫子之不得位此是合下所稟有厚薄而所遇有應有不應但其命雖如此又有性焉故當盡性又曰以厚薄言命則是天之降才為有殊矣曰孟子言降才且如此説若命則誠有兩般由稟受有厚薄也又不可謂稟受為非命也大抵天命流行物各有得不謂之命不可也命如人有貧富貴賤豈不是有厚薄張子曰晏嬰智矣而不知仲尼是非命耶語録曰若作所稟之命則是嬰稟得智之淺者若作命分之命則是嬰偶然蔽於此遂不識夫子此當作兩般看愚案所稟者厚而清則其仁之於父子也至義之於君臣也盡禮之於賔主也恭智之於賢否也哲聖人之於天道也無不吻合而純亦不已焉薄而濁則反是是皆所謂命也語録曰清而厚則仁之於父子也至若瞽瞍之於舜則薄於仁矣義之於君臣也盡若桀紂之於逢干則薄於義矣禮薄而至於賔主之失其歡智薄而至於賢者之不能盡知其極至於聖人之於天道有性之反之之不同是皆所謂命也陳氏曰是就稟氣之清濁不齊上論是説人之智愚賢否或曰者當作否人衍字更詳之愚聞之師曰此二條者皆性之所有而命於天者也然世之人以前五者為性雖有不得而必欲求之以後五者為命一有不至則不復致力故孟子各就其重處言之以伸此而抑彼也或問所謂性命者何不同曰性者人之所受乎天者其體則不過仁義禮智之理而已其後則雖食色意欲之私亦無不本於是也命則因夫氣之厚薄而賦於人之名也不惟智愚賢否之所繫雖貧富貴賤之所值亦無不由於是也故君子於食色意欲之私則不謂之性而安於貧富貴賤之有命於智愚賢否之殊則不謂之命而勉於仁義禮智之有性也曰然則此其專為貧賤愚不肖者言之耶抑其通言之也曰孟子之意似若專為貧賤愚不肖者而言者而其推之則亦無不通矣蓋富且貴者雖所求之必得而亦必有制度之節聖且賢者雖所稟之已厚而亦未嘗不勉其所當勉也語録曰此章只要遏人欲長天理前一節人以為性我所有須要必得後一節人以為命則在天多委之而不修所以孟子到人説性處却曰有命人説命處却曰有性永嘉陳氏曰世人以上五者為性則見血氣而不見道理以下五者為命則見氣數而不見道理孟子於常人説性處却以命言則人之所嗜欲雖所同有却有品節限制不可必得於常人説命處却以性言則人之於義理其氣稟雖有清濁不齊須是著力自做工夫不可一委之天大要上是人心人皆知循其在人而君千則斷之以天下是道心人皆知委其在天而君子則斷之以人此君子言知命盡性之學所以異乎常人之言也歟張子所謂善則付命於天道則責成於己其言約而盡矣語録曰口之於味五者此固性之所欲然在人則有所賦之分在理則有不易之則皆命也是以不謂之性付命於天仁之於父子五者在我則有厚薄之稟在彼則有遇不遇之殊是皆命也然有性焉是以君子不謂之命而責成於己須如此看意思方圓無欠闕處浩生不害問曰樂正子何人也孟子曰善人也信人也趙氏曰浩生姓不害名齊人也何謂善何謂信不害問也曰可欲之謂善天下之理其善者必可欲其惡者必可惡其為人也可欲而不可惡則可謂善人矣或問此一節曰善者人之所欲惡者人之所惡其為人也處心造事行已接物凡其所為一皆可欲而不可惡則是可謂善人矣語録曰可欲是説這人可愛也又曰只是渾全一箇好人都可愛可欲更無些憎嫌處又曰人之所同愛而目為好人者謂之善人輔氏曰先儒多以可欲為己之欲如書所謂敬修其可願之意獨集注不然可欲是别人以為可欲蓋若以為己之欲則説得太輕且人之欲有善惡不同故也有諸己之謂信凡所謂善皆實有之如惡惡臭如好好色是則可謂信人矣或問此一節曰善人者或其天資之美或其知美而勉慕焉未必其真以為然而果然不失也必其用力之久一旦脫然有以真知其善之在己而不得不然決定真實而無一毫虛偽之意然後可以謂之信人矣輔氏曰善固多端故言凡所謂善以該之如惡惡臭如好好色則表裏誠實無一毫勉強假托之意也張子曰志仁無惡之謂善誠善於身之謂信充實之謂美力行其善至於充滿而積實則美在其中而無待於外矣或問此一節曰信足以自信於心而已未必其行之充足飽滿而無歉於身也然既信之則其行必力其守必固如是而不可已焉則其所有之善充足飽滿於其身雖其隱微曲折之間亦皆清和淳懿而無不善之雜是則所謂美者也語録曰無待於外都是裏面流出來輔氏曰有諸己則己是知至意誠之事然又須見於履踐方得故云行其善至於充滿其董蓄積成實然後美在其中而無所待於外矣充實而有光輝之謂大和順積中而英華發外美在其中而暢於四支發於事業則德業至盛而不可加矣或問此一節曰美足以充於其內而已而未必其能發見於外也又如是而不已焉則其善之充於內者彌滿布濩洋溢四出而不可禦其在躬也則睟面盎背而施於四體其在事也則德盛仁熟而天下文明是則所謂大人者也輔氏曰大則形見於外矣故以德業至盛不可加言之大而化之之謂聖大而能化使其大者泯然無復可見之迹則不思不勉從容中道而非人力之所能為矣或問此一節曰大而不化則其所謂大者未能離乎方體形迹之間必其德之盛者日以益盛仁之熟者日以益熟則向之所謂大者且將春融凍解混然無迹而與天地合德日月合明四時合序鬼神合其吉凶矣是則所謂聖人者也輔氏曰大則猶可以目見而指言至於化則無迹不可以目見不可以言傳無待於思惟無假於勉強從容自然與道為一而非人之智力所能及矣張子曰大可為也化不可為也在熟之而已矣聖而不可知之之謂神程子曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也或問此一節曰至於聖則造道入德之功至矣盡矣不可以有加矣是其盛德至善之極無聲無臭之妙必有非耳目所能制心思所能測者是則所謂神者而非聖人之上復有神人也樂正子二之中四之下也蓋在善信之間觀其從於子敖則其有諸己者或未實也或問樂正子以善名矣而以餔啜從子敖先館舍後長者何也曰言在二者之中則有餘於善而不足於信矣語録曰樂正子二之中是知好善而未能有諸己故有從子敖之失輔氏曰意者樂正子雖能明善而亦工夫未到於善未誠使其誠有諸己則於從子敖之事當如惡惡臭而自不嚮邇也張子曰顔淵樂正子皆知好仁矣樂正子志仁無惡而不致於學所以但為善人信人而已顔子好學不倦合仁與智具體聖人獨未至聖人之止耳輔氏曰張子并顔子言之以見學之不可已如此程子曰士之所難者在有諸己而已能有諸己則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡而已則能不受變於俗者鮮矣輔氏曰程子又發明學者只要有諸己有諸己則住不得自然趲將去故美且大可以循致不然徒知其善而若存若亡則為流俗所變而終亦必亡之矣尹氏曰自可欲之善至於聖而不可知之神上下一理擴充之至於神則不可得而名矣輔氏曰尹氏上下一理之説尤得其要惟其不可得而名故謂之神也孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣墨氏務外而不情楊氏太簡而近實故其反正之漸大略如此輔氏曰兼愛固仁之事若泛然而無差等則反至於徇外為我固義之事若徒知有已而不知有人則遂至於太簡徇外則不能若其情故有所強有所強故不情太簡則略於外故猶近實近實則反正為易矣自其外而觀之則兼愛若勝於為我自其心而觀之則兼愛之失為甚而為我之失猶近也歸斯受之者閔其陷溺之久而取其悔悟之新也今之與楊墨辨者如追放豚既入其苙又從而招之放豚放逸之豕豚也苙闌也招罥也羇其足也言彼既來歸而又追咎其既往之失也此章見聖賢之於異端拒之甚嚴而於其來歸待之甚恕拒之嚴故人知彼説之為邪待之恕故人知此道之可反仁之至義之盡也輔氏曰集注發明聖賢待異端之道以拒之甚嚴為義之盡以待之甚恕為仁之至其亦異乎楊墨之所謂仁義者矣孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離征賦之法嵗有常數然布縷取之於夏粟米取之於秋力役取之於冬當各以其時若并取之則民力有所不堪矣今兩稅三限之法亦此意也輔氏曰此乃孟子言之以警夫取民無度者今兩稅三限之法其意亦如此而有司乃有預借之名重催之弊其不仁甚矣問布縷粟米力役之征周禮皆取之而孟子言用其一而緩其二朱子乃有夏秋之辨夫夏秋之説始出於唐不知何所據而云永嘉陳氏曰緩非廢其征但不作一時併征之耳月令孟夏蠶畢而獻繭稅孟秋農乃登穀始收穀布縷征之夏粟米征之秋乃古法若唐分兩稅非止布縷粟米之征乃是取大厯十四年應完賦斂之數併而為兩稅名同實異失孟子之旨矣尹氏曰言民為邦本取之無度則其國危矣孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身尹氏曰言寶得其寶者安寶失其寶者危盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣盆成姓括名也恃才妄作所以取禍語録曰恃才妄作謂不循理了硬要胡做輔氏曰才出於氣而有限故曰小道本於性而無方故曰大况曰小才則又才之小者也夫道者義理之總名也不顧義理而惟才是逞則行險僥幸無所不至不至於顚覆不已也徐氏曰君子道其常而已括有死之道焉設使幸而獲免孟子之言猶信也輔氏曰孟子之言但述其理之當然耳不以是為竒中也學者不達而以是為竒則必以料事為明而駸駸然入於逆詐億不信矣孟子之滕館於上宫有業屨於牖上館人求之弗得館舍也上宫别宫名業屨織之有次業而未成者蓋館人所作置之牖上而失之也或問之曰若是乎從者之廋也曰子以是為竊屨來與曰殆非也夫子之設科也往者不追來者不拒茍以是心至斯受之而已矣從為去聲與平聲夫子如字舊讀為扶余者非或問之者問於孟子也廋匿也言子之從者乃匿人之物如此乎孟子答之而或人自悟其失因言此從者固不為竊屨而來但夫子設置科條以待學者茍以向道之心而來則受之耳雖夫子亦不能保其往也門人取其言有合於聖賢之指故記之輔氏曰先儒多讀夫子作扶子而以為孟子自説朱子獨以為夫子而作問者自悟其失而言者蓋不獨以殆非也下無曰字而知其然若以為孟子之言則不惟露筋骨且非所以待學者將使學者不自重惟以為問者之言則可取愚嘗謂近世好議論者往往以學者之失而議先生長者是其識量又不逮於當時織屨者矣茍以是心至斯受之者與人為善之公心也至於孺悲之欲見則辭以疾滕更之在門則不見答是又義之所當然也然教亦固在於中矣孟子曰人皆有所不忍達之於其所忍仁也人皆有所不為達之於其所為義也惻隱羞惡之心人皆有之故莫不有所不忍不為此仁義之端也然以氣質之偏物欲之蔽則於他事或有不能者但推所能達之於所不能則無非仁義矣輔氏曰此一節言凡人皆有所不忍有所不為夫不忍者惻隱之事也不為者羞惡之事也是皆本於性發於情而統於心人之所固有者也但為氣稟所拘物欲所蔽則心失其正而不能統夫性與情故有所當發而不發亦有所不當發而反發遂至於其所不忍者或有時而忍於其所不為者或有時而為而性亦從而梏亡之矣今教之以推所不忍以達於所忍推所不為以達於所為如是則心得其職情得其正而性之所以為仁義者得矣真氏曰有所不忍有所不為者此心之正也能即是心而推之雖所忍者亦不忍即仁也雖所為者亦不為即義也人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也勝平聲充滿也穿穿穴窬踰牆皆為盜之事也能推所不忍以達於所忍則能滿其無欲害人之心而無不仁矣能推其所不為以達於所為則能滿其無穿窬之心而無不義矣輔氏曰此一節因前説而教人以充滿其本心之量無欲害人之心即是所不忍也無穿窬之心即是所不為也是心也其量甚大其用有常人能推所不忍以達於其所忍然後能充滿其無欲害人之心量推所為然後能充滿其無穿窬之心量能充滿其心量則其用有常而仁義不可勝用矣人能充無受爾汝之實無所往而不為義也此申説上文充無穿窬之心之意也蓋爾汝人所輕賤之稱人雖或有所貪昧隱忍而甘受之者然其中心必有慚忿而不肯受之之實人能即此而推之使其充滿無所虧缺則無適而非義矣語録曰不欲人以爾汝之稱加諸我是惡爾汝之名也然反之於身而去其無可爾汝之行是能充其無受爾汝之實也若我身有未是處則雖惡人以爾汝相稱亦自有所愧矣輔氏曰此一節事愈微而理愈密夫人不肯受爾汝之稱其事雖微然皆是其羞惡之實心存養之不加體察之不至則不受之心雖有得於此而或遂失於彼則亦不能充滿其實心之量而義有時而不行矣唯能推所不受而達之於所受不以事之微而不察不以迹之粗而姑自恕亦必推所不受以達於所受而無所滲漏然後能充滿其無受爾汝實心之量無所適而不為義也士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也餂音忝餂探取之也語録曰問探取猶言探試之探否曰是鈎致之意今人以舌取物曰餂即此意也便佞隱默皆有意探取於人是亦穿窬之類語録曰如本不必説自家却強説幾句要去動人恱人是以言餂之也如合當與他説却不説須故為隱難要使他來問我是以不言餂之也問正使當言而言茍有悅人之意是亦穿窬之類否曰固是然其事隱微人所忽易故特舉以見例明必推無穿窬之心以達於此而悉去之然後為能充其無穿窬之心也輔氏曰此一節事之微而理之密又有甚於前者故以士言之夫不為穿窬無受爾汝在士則有所不足道然一語一默之微發於計較安排而有意探取於人則是亦穿窬之類故集注亦以為其事隱微人所忽易故特舉以見例必推無穿窬之心而達之於此類至纎至悉處亦不容有不盡方始能充其無穿窬之心也其義亦精矣孟子曰言近而指逺者善言也守約而施博者善道也君子之言也不下帶而道存焉施去聲古人視不下於帶則帶之上乃目前常見至近之處也舉目前之近事而至理存焉所以為言近而指逺也輔氏曰言近而指逺故測之而益深窮之而益逺是君子教人之事君子之守修其身而天下平此所謂守約而施博也輔氏曰守約而施博故推之而無不準動之而無不化是君子治天下之事人病舍其田而藝人之田所求於人者重而所以自任者輕舍音捨此言不守約而務博施之病孟子曰堯舜性者也湯武反之也性者得全於天無所汙壞不假修為聖之至也輔氏曰此言生而知之者也氣稟清明故其所得之天理無所汚壞既無所汚壞則自然不假修為此乃聖人之極致也反之者修為以復其性而至於聖人也輔氏曰此謂學而知之者也其初氣稟不能無所偏故其所得之天理亦不能無遮蔽處必賴人力修為克治去其偏而復其全及其全也則亦與聖人無異矣程子曰性之反之古未有此語蓋自孟子發之吕氏曰無意而安行性也有意利行而至於無意復性者也堯舜不失其性湯武善反其性及其成功則一也語録曰無意而安行性也性下合添之者二字輔氏曰前説是明生知學知合下有此不同吕氏則又自其生知學知之後有意無意安行利行處説耳復性則是反之者也堯舜不失其性則是生而知之者湯武善反其性則是學而知之者初雖不同及其至於聖則無不同矣故曰及其成功一也動容周旋中禮者盛德之至也哭死而哀非為生者也經德不回非以干祿也言語必信非以正行也中為行並去聲細微曲折無不中禮乃其盛德之至自然而中而非有意於中也輔氏曰若有意於中則必有勉強持守之意力懈意弛則必有所不中者矣觀鄉黨所載孔子之事則可以當之矣經常也回曲也三者亦皆自然而然非有意而為之也皆聖人之事性之之德也輔氏曰三者又特舉聖人之庸行人所易曉者以例其餘聖人之動無不時也豈有意而為之者哉故集注斷以為皆聖人之事性之之德也君子行法以俟命而已矣法者天理之當然者也君子行之而吉凶禍福有所不計蓋雖未至於自然而已非有所為而為矣此反之之事董子所謂正其義不謀其利明其道不計其功正此意也輔氏曰法者凡古聖賢之所制者皆是也蓋莫非天理之當然如為君而仁為臣而敬為子而孝為父而慈皆是也君子行之而吉凶禍福有所不計是則所謂俟命者也雖未至於聖人自然而不為惡也但知所謂行吾之法以俟天之命而已此反之之事正與董子之論合也程子曰動容周旋中禮者盛德之至行法以俟命者朝聞道夕死可矣之意也輔氏曰聞道故能行法行吾之法則雖夕死可矣吕氏曰法由此立命由此出聖人也行法以俟命君子也聖人性之君子所以復其性也孟子曰説大人則藐之勿視其巍巍然説音稅藐音眇趙氏曰大人當時尊貴者也藐輕之也巍巍富貴髙顯之貌藐焉而不畏之則志意舒展言語得盡也語録曰為世上有人把大人許多崇髙富貴當事有言不敢出口故孟子云爾輔氏曰若不藐視之則是為其巍巍者所動矣志氣一有所懾怯則必不能展盡底藴剛強者有懷或不敢盡柔弱者則必至於變其所欲言而反徇之矣堂髙數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乘我得志弗為也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉榱楚危反般音盤樂音洛乘去聲榱桷也題頭也食前方丈饌食列於前者方一丈也此皆其所謂巍巍然者我雖得志有所不為而所守者皆古聖賢之法則彼之巍巍者何足道哉輔氏曰在我者皆古之制以理為守也在彼之所恃者不過區區之物欲耳何足道哉楊氏曰孟子此章以己之長方人之短猶有此等氣象在孔子則無此矣輔氏曰孟子有泰山巖巖然之氣象便是指此等處言也若聖人則大而化之泯然不見其大之迹故不至如此然非聖人覺此而不為也德盛仁熟大而化之則自然不至有此等氣象矣孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣欲如口鼻耳目四支之欲雖人之所不能無然多而不節未有不失其本心者學者所當深戒也輔氏曰口鼻耳目四支之欲即前面不謂性章所言要之人之欲亦不過此五事但有淺深耳此即所謂人心也人雖不能無然須是以道心為主有以宰制節約之方得不然即轉而他之則氣勢周張浩大而反勝夫道心此學者所當深戒程子曰所欲不必沈溺只有所向便是欲輔氏曰程子又極其微細言之學者須是於欲有所向處克治若待其周張則用力又難矣曾晳嗜羊棗而曾子不忍食羊棗羊棗實小黑而圓又謂之羊矢棗語録曰只是北邊小棗如羊矢大者曾子以父嗜之父沒之後食必思親故不忍食也公孫丑問曰膾灸與羊棗孰美孟子曰膾灸哉公孫丑曰然則曽子何為食膾灸而不食羊棗曰膾灸所同也羊棗所獨也諱名不諱姓姓所同也名所獨也肉聶而切之為膾灸灸肉也萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士盍何不也狂簡謂志大而略於事進取謂求望髙逺不忘其初謂不能改其舊也此語與論語小異輔氏曰此語雖與論語異然以曾晳言志之事觀之則此語尤切異乎三子之撰則志大而略於事可知直欲躐乎聖人之樂處則期望髙逺可知終不肯做下學工夫後至於臨人之喪而歌不能改其舊可知然論語狂簡二字又却該拈得下兩句進取即是志大不忘其初即是略於事也孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也狷音絹不得中道至有所不為據論語亦孔子之言然則孔子字下當有曰字輔氏曰不惟論語可據此蓋孟子答萬章之問固當引孔子之言以告之而後方自言以釋之也論語道作行狷作狷有所不為者知恥自好不為不善之人也孔子豈不欲中道以下孟子言也敢問何如斯可謂狂矣萬章問曰如琴張曾晳牧皮者孔子之所謂狂矣琴張名牢字子張子桑戶死琴張臨其喪而歌事見莊子雖未必盡然要必有近似者曾晳見前篇季武子死曾晳倚其門而歌事見檀弓又言志異乎三子者之撰事見論語牧皮未詳輔氏曰琴張止有莊子所載一事故朱子以為其他言行雖未必盡然必有近似者若曾晳二事則盡備狂者之態至於牧皮則固無所考而不可知矣何以謂之狂也萬章問曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也嘐火交反行去聲嘐嘐志大言大也重言古之人見其動輒稱之不一稱而已也夷平也掩覆也言平考其行則不能覆其言也程子曰曽晳言志而夫子與之蓋與聖人之志同便是堯舜氣象也特行有不掩焉耳此所謂狂也輔氏曰曾晳之志固不止於如此然其不屑之於事為而直欲徑探乎聖人之樂處則與所謂嘐嘐然曰古之人古之人之意亦不相逺而其行有不能掩其言者則又自有不可誣者也故集注取程子之説以釋之夫子與之者是與其志大言大也便是堯舜氣象者是亦所謂古之人古之人之類也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也此因上文所引遂解所以思得狷者之意輔氏曰狂者是合下氣質高明便自有所見者狷者是合下氣質貞固便自有所守者狂者則於知上所得分數多狷者則於行上所得分數多聖門學者必皆中與和合德知與行並進然後為貴所謂中道者是也此等人既不可得故不得已而與夫狂狷也然必先知而後能行故狷又為狂之次狂有志者也狷有守者也有志者能進於道有守者不失其身輔氏曰其所志大則是其所知之大也故可與進於道守之固則行之力故不至於失其身屑潔也輔氏曰不屑不潔即前所謂知恥自好而不為不善之人也孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也曰何如斯可謂之鄉原矣鄉原非有識者原與願同荀子原慤字皆讀作願謂謹願之人也故鄉里所謂願人謂之鄉願孔子以其似德而非德故以為德之賊過門不入而不恨之以其不見親就為幸深惡而痛絶之也輔氏曰先儒皆以原為善不惟無所據又善字所包廣既曰善人則不應遂以為德之賊故集注引荀子為證以原為願且曰鄉人無知其所謂願人謂之鄉原願字固淺狹又鄉人以為願則亦未為真願者也孔子以其似德而非德而遂斥以為德之賊深惡而痛絶之是亦聖人性情之正也萬章又引孔子之言而問也曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也行去聲踽其禹反閹音奄踽踽獨行不進之貌涼涼薄也不見親厚於人也鄉原譏狂者曰何用如此嘐嘐然行不掩其言而徒每事必稱古人耶又譏狷者曰何必如此踽踽涼涼無所親厚哉人既生於此世則當但為此世之人使當世之人皆以為善則可矣此鄉原之志也閹如奄人之奄閉藏之意也媚求悅於人也孟子言此深自閉藏以求親媚於世是鄉原之行也語録曰鄉原務為謹願不欲忤俗以取容專務徇俗欲使人無所非刺既不肯做狂又不肯做狷一心只要得人説好更不理會自己所見所得與夫理之是非彼狂者嘐嘐然以古人為志雖行之未至而所知亦甚逺矣狷者便只是有志力行不為不善二者皆能不顧流俗汙世之是非雖是不得中道却都自是為己不為他人彼鄉原便反非笑之其實所向則是閹然媚於世而已輔氏曰閹然媚於世此是鄉原之隱情匿志萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉原亦謹厚之稱而孔子以為德之賊故萬章疑之曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似廉潔衆皆悅之自以為是而不可與入堯舜之道故曰德之賊也吕侍講曰言此等之人欲非之則無可舉欲刺之則無可刺也流俗者風俗頽靡如水之下流衆莫不然也汙濁也非忠信而似忠信非廉潔而似廉潔輔氏曰鄉原既欲人以為謹願故欲非之則無可非欲刺之則無可刺同乎流俗而不敢自異合乎汙世而不能自拔雖或勉為忠信廉潔而其心則實不然不過欲徇俗諧世而已惟其如是故衆皆悅之自以為是則又逨而不知反故不可與入堯舜大中至正真實之道也孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也惡去聲莠音有孟子又引孔子之言以明之輔氏曰據論語所載亦與此不同雖有詳略然其惡是而非之意則一也莠似苗之草也佞才智之稱其言似義而非義也輔氏曰佞者有口才能辨説故以為才智之稱惟其能言則其説多似義而實則有不然者故以為害義利口多言而不實者也輔氏曰巧言之人徒尚口而初無誠實者故以為害信鄭聲淫樂也樂正樂也紫間色朱正色也鄉原不狂不狷人皆以為善有似乎中道而實非也故恐其亂德輔氏曰鄉原既譏狂者故不狂又譏狷者故不狷衆皆悅之故人皆以為善而不可與入堯舜之道故有似乎中道而實非此聖人所以恐其亂德而深惡之也君子反經而已矣經正則庶民興庶民興斯無邪慝矣反復也經常也萬世不易之常道也陳氏曰經是日用常行之理興興起於善也邪慝如鄉原之屬是也世衰道微大經不正故人人得為異説以濟其私而邪慝並起不可勝正君子於此亦復其常道而已常道既復則民興於善而是非明白無所回互雖有邪慝不足以惑之矣輔氏曰此辨異端息邪説之大權也尹氏曰君子取夫狂狷者蓋以狂者志大而可與進道狷者有所不為而可與有為也所惡於鄉原而欲痛絶之者為其似是而非惑人之深也絶之之術無他焉亦曰反經而已矣孟子曰由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之趙氏曰五百嵗而聖人出天道之常然亦有遲速不能正五百年故言有餘也輔氏曰天道固有常矣然亦不能截然整齊須有先後遲速尹氏曰知謂知其道也由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之趙氏曰萊朱湯賢臣或曰即仲虺也為湯左相由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之散素亶反散氏宜生名文王賢臣也子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學此所謂聞而知之也由孔子而來至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾林氏曰孟子言孔子至今時未逺鄒魯相去又近然而已無有見而知之者矣則五百餘嵗之後又豈復有聞而知之者乎輔氏曰若非前面人見而知得後之人如何聞而知之孟子去孔子之世如此其未逺近聖人之居如此其近然而無有見而知之則今恐不能聞而知之耳愚案此言雖若不敢自謂已得其傳而憂後世遂失其傳然乃所以自見其有不得辭者而又以見夫天理民彛不可泯滅百世之下必將有神會而心得之者耳故於篇終歷序羣聖之統而終之以此所以明其傳之有在而又以俟後聖於無窮也其旨深哉輔氏曰孟子雖不敢自謂已得其傳而憂後世遂失其傳然乃所以自見其有不得辭者而又以見夫天理民彛不可泯滅百世而下必將有神會而心得之者使萬世之下學者即夫在已之不可泯滅者以求夫聖賢之言則道統可得而傳其仁天下後世深且逺矣有宋元豐八年河南程皓伯淳卒潞公文彥博題其墓曰明道先生而其弟頤正叔序之曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉輔氏曰係以程子之説者見程子果得其傳於遺經而孟子之説至是而遂驗也孟子纂疏卷十四
