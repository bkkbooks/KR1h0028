body:
  text: 欽定四庫全書孟子纂疏卷十宋趙順孫撰朱子集注萬章章句下凡九章孟子曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使冶則進亂則退橫政之所出橫民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭也當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫亷懦夫有立志治去聲下同橫去聲朝音潮橫謂不循法度頑者無知覺亷者有分辨懦柔弱也餘並見前篇伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺者也豫將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而內之溝中其自任以天下之重也與音預何事非君言所事即君何使非民言所使即民無不可事之君無不可使之民也餘見前篇栁下惠不羞汙君不辭小官進不隱賢必以其道遺佚而不怨厄窮而不憫與鄉人處由由然不忍去也爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故聞栁下惠之風者鄙夫寬薄夫敦鄙狹陋也敦厚也餘見前篇孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也淅先歷反接猶承也淅漬米水也漬米將炊而欲去之速故以手承水取米而行不及炊也舉此一端以見其久速仕止各當其可也或曰孔子去魯不稅冕而行豈得為遲楊氏曰孔子欲去之意久矣不欲苟去故遲遲其行也膰肉不至則得以微罪行矣故不稅冕而行非速也孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也張子曰無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也輔氏曰張子之説盡矣清有所勉則有時而雜和有所勉則有時而異孔氏曰任者以天下為己責也語録曰任是自任以天下之重愚謂孔子仕止久速各當其可蓋兼三子之所以聖者而時出之非如三子之可以一德名也語録曰問清任和時皆以聖人名之但曰清曰和曰任則猶倚於一偏而未得為大聖謂之時則隨事制宜而可以兼數子之大全如斯而已耳曰得之或疑伊尹出處合乎孔子而不得為聖之時何也程子曰終是任底意思在語録曰問伊尹終有任底意思在謂他有擔當作為底意思只這些意思便非夫子氣象否曰然然此處極難看且放那裏久之看道理熟自見強説不得若謂伊尹有這些意思在為非聖人之至則孔孟皇皇汲汲去齊去魯之梁之滕非無意者其所以異伊尹者何也問聖人若處伊尹之地也如他任如何曰夫子若處此地自是不同不如此著意問伊尹治亦進亂亦進無可無不可似亦可以為聖之時曰伊尹終是有任底意思在輔氏曰伊尹唯其任底意思在故未能與天為一而不得為聖之時若孔子則雖視天下無不可為之時在已無不可行之道然却無伊尹這些意思曰如有用我者期月而已可也如有用我者吾其為東周乎多少含蓄意思此其所以與天為一而謂之聖之時也孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此言孔子集三聖之事而為一大聖之事猶作樂者集衆音之小成而為一大成也成者樂之一終書所謂簫韶九成是也金鍾屬聲宣也如聲罪致討之聲玉磬也振收也如振河海而不泄之振始始之也終終之也條理猶言脈絡指衆音而言也語録曰問條理如所謂始作翕如也皎如也繹如也以成之類否言八音克諧不相奪倫各有條理脈絡也曰不然條理脈絡如一把草從中縛之上截為始條理下截為終條理若上截少一莖則下截亦少一莖上截不少則下截亦不少此之謂始終條理問條理猶言脈絡莫是猶一條路相似初間下步時才差便行得雖力終久是差否曰始條理猶箇絲線頭相似孔子是挈得箇絲頭故許多條絲都在這裏三子者則是各拈得一邉耳智者知之所及聖者德之所就也文集曰智是見得徹之名聖是行得徹之號蓋樂有八音金石絲竹匏土革木若獨奏一音則其一音自為始終而為一小成語録曰如樂器有一件相似是金聲底從頭到尾只是金聲是玉聲底從頭到尾只是玉聲是絲竹聲底從頭到尾只是絲竹之聲猶三子之所知偏於一而其所就亦偏於一也語録曰伯夷合下只見得清底其終成就亦只成就得清底伊尹合下只見得任底其終成就亦只成就得任底桞下惠合下只見得和底其終成就亦只成就得和底八音之中金石為重故特為衆音之綱紀輔氏曰八音以金石為首故八音迭奏而以金石為之始終又金始震而玉終詘然也語録曰金聲有洪殺始震終細玉聲則始終如一叩之其聲詘然而止輔氏曰金始震動於始以作其聲而玉於其終又詘然以止其韻也故並奏八音則於其未作而先擊鎛鍾以宣其聲俟其既闋而後擊特磬以收其韻語録曰古人作樂擊一聲鐘衆音遂作又擊一聲鐘衆音又齊作故金所以發衆音末則以玉振之所以收合衆音在裏面又曰金聲初打聲髙其後漸低於衆樂之作必以此聲之玉聲先後一般初打恁地響到住時也恁地響但玉聲住時截然便住於衆樂之終必以此振之宣以始之收以終之輔氏曰宣以始之謂擊鎛鐘以始八音之聲收以終之謂擊特磬以終八音之韻也二者之間脈絡貫通無所不備則合衆小成而為一大成輔氏曰謂自始及終中間八音之脈絡相與貫通而共底於大成猶孔子之知無不盡而德無不全也文集曰聖人之知精粗大小無所不周聖人之德精粗大小無所不備其始卒相成蓋如此輔氏曰亦如孔子之智以始之聖以終之中間於三子清任和之脈絡亦無不貫通故能時而出之以集其大成也金聲玉振始終條理疑古樂經之言故兒寬云惟天子建中和之極兼總條貫金聲而玉振之亦此意也語録曰如兒寬亦引金聲玉振是時未有孟子之書此必古曲中有此語智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也中去聲此復以射之巧力發明智聖二字之義見孔子巧力俱全而聖智兼備三子則力有餘而巧不足是以一節雖至於聖而智不足以及乎時中也語録曰伯夷伊尹桞下惠力已至但射不親孔子則既聖且智巧力兼全故孔子箭箭中的三子皆中垜也輔氏曰一節雖至於聖者指清任和而言也智不足以及乎時之中者謂其始之智但知其清任和而不得如孔子為聖之時也若孔子則速久處仕皆得乎時中蓋由其始之智足以及乎時中故也永嘉陳氏曰譬之射焉均至於百步之外而有中不中者蓋巧者知得到則百發而百中力者行得到則至而未必中由是觀之學不難於行而難於知猶射不難於力而難於巧此章言三子之行各極其一偏孔子之道兼全於衆理或問三子之偏如此而孟子以聖名之何也曰三子之聖因其氣質之偏而力行以造極卒至乎不思不勉之地而表裏洞然無一豪人欲之私者雖謂之聖然於孔子則有不得而班者就三子而論之則伊尹之學又密於夷惠矣所以偏者由其蔽於始是以缺於終所以全者由其知之至是以行之盡語録曰問三子合下少致知功夫看得道理有偏故其終之成也亦各至於一偏之極孔子合下盡得致知工夫看得道理周遍精切無所不盡故其德之成也亦兼該畢備而無一德一行之或闕使三子合下工夫不倚於一偏安知其不如孔子也曰然更子細看黃氏曰孔子之異於三子者知之至而行之盡三子之不及孔子者知有所蔽於始而行有所闕於終也此孔子之所以獨得其全而三子僅得其偏也知有不至行有不盡雖以伊尹夷惠之質尚不能無愧於孔子而況學者乎輔氏曰三子者知有所偏故其行亦有所偏而其德之所成就亦有所偏孔子則知無不至故其行亦無不至而其德之成就亦無不至永嘉陳氏曰三子始焉之所知只見得一邉道理後來亦只於那一邉上做得透徹此三子智不及於全故行到處亦只是一偏之聖夫子知得天下道理四方八面周匝普遍故成就處兼總衆理該貫萬善不可以一節名三子猶春夏秋冬之各一其時孔子則太和元氣之流行於四時也輔氏曰學者於此熟玩而有得焉則三子之聖與夫子之聖所以不同者皆可默識矣北宫錡問曰周室班爵祿也如之何錡魚綺反北宫姓錡名衛人班列也孟子曰其詳不可得聞也諸侯惡其害已也而皆去其籍然而軻也嘗聞其略也惡去聲去上聲當時諸侯兼并僭竊故惡周制妨害已之所為也輔氏曰兼并則其國日大僭竊則其祿日侈天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等此班爵之制也輔氏曰位以爵定也五等通於天下六等施於國中天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不逹於天子附於諸侯曰附庸此以下班祿之制也輔氏曰田以祿分也案君以下所食之祿皆助法之公田藉農夫之力以耕而收其租者此又可見周制都鄙用助法也不能猶不足也小國之地不足五十里者不能自達於天子因大國以姓名通謂之附庸若春秋邾儀父之類是也天子之卿受地視侯大夫受地視伯元士受地視子男視比也徐氏曰王畿之內亦制都鄙受地也愚謂此言食采邑於畿內祿之多少以外諸侯為差也元士上士也愚謂言上士而不言中下士者蓋以視附庸也大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也十十倍之也四四倍之也倍加一倍也徐氏曰大國君田三萬二千畝其入可食二千八百八十人卿田三千二百畝可食二百八十八人大夫田八百畝可食七十二人上士田四百畝可食三十六人中士田二百畝可食十八人下士與庶人在官者田百畝可食九人至五人庶人在官府史胥徒也語録曰問府史胥徒皆是庶人在官者不知如何有許多曰嘗看蘇氏古史他疑三事其一謂府史胥徒太多當時却多是兼官其實府史胥徒無許多問府史胥徒不知皆民為之抑别募遊手為之曰不可曉想只是民為之然府史胥徒各自有祿以代耕則又以别募遊手矣愚案君以下所食之祿皆助法之公田藉農夫之力以耕而收其租士之無田與庶人在官者則但受祿於官如田之入而已次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也三謂三倍之也徐氏曰次國君田二萬四千畝可食二千一百六十人卿田二千四百畝可食二百十六人小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也二即倍也徐氏曰小國君田一萬六千畝可食千四百四十人卿田一千六百畝可食百四十四人愚謂由卿而上三等之國異由大夫而下三等之國同者蓋卿而上其祿浸厚茍不為之殺則地之所出不足以供大夫而下其祿浸薄茍為之殺則臣之所養不能自給也耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是為差食音嗣獲得也一夫一婦佃田百畝加之以糞糞多而力勤者為上農其所收可供九人其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也語録曰問此等差别是地有肥瘠邪抑糞溉之不同也曰皆人力之不同爾然亦大約如此緣有此五等之祿故百畝所食亦有此五等愚案此章之説與周禮王制不同蓋不可考闕之可也語録曰孟子論三代制度多與周禮不合蓋孟子後出不及見王制之詳只是大綱約度而説程子曰孟子之時去先王未逺載籍未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於漢儒一時之傅會奈何欲盡信而句為之解乎然則其事固不可一二追復矣輔氏曰此説足以救陋儒泥古之失但據其所傳而姑存之使千百世之後一遇大聖則必能因其大體而詳其節目推其既往以為一時之制而先代聖王之法庶乎其可復見矣萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其德也不可以有挾也挾者兼有而恃之之稱輔氏曰謂其兼夫有與恃二者之意方謂之挾也若但有之而不恃則猶未謂之挾也孟獻子百乘之家也有友五人焉樂正裘牧仲其三人則豫忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣乘去聲下同孟獻子魯之賢大夫仲孫蔑也張子曰獻子忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之家則反為獻子之所賤矣輔氏曰獻子忘其勢不挾貴也五人者忘人之勢無獻子之家者也無獻子之家者不資其勢而利其有者也孟子歷舉四人之事自小至大皆以見其不敢有所挾之意而首於孟獻子之事詳之者又以見上之友下固不可有所挾至於在下者為上之所友則亦不可資其勢以利其有也一有資之利之之意則便為人所賤矣又豈肯與之為友哉非惟百乘之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也費音祕般音班惠公費邑之君也師所尊也友所敬也事我者所使也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖疏食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天祿也士之尊賢者也非王公之尊賢也疏食之食音嗣平公王公下諸本多無之字疑闕文也亥唐晉賢人也平公造之唐言入公乃入言坐乃坐言食乃食也疏食糲飯也不敢不飽敬賢者之命也范氏曰位曰天位職曰天職祿曰天祿言天所以待賢人使治天民非人君所得專者也輔氏曰平公之於亥唐則知所敬矣然不能與之共天位治天職食天祿則是不能推廣是心以體天而治民以及於國也真氏曰位者天位所以處賢者也職者天職所以命賢者也祿者天祿所以養賢者也三者皆天所以待賢人使治天民者也而晉平公之於亥唐特虛尊之而已未嘗處之以位命之以職食之以祿也此豈王公尊賢之道哉舜尚見帝帝館甥于二室亦饗舜迭為賔主是天子而友匹夫也尚上也舜上而見於帝堯也館舍也禮妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂之甥二室副宫也堯舍舜於副宫而就饗其食用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也貴貴尊賢皆事之宜者然當時但知貴貴而不知尊賢故孟子曰其義一也輔氏曰戰國之時惟知權勢之為尊而不知義理之為貴但知貴貴而不知尊賢是以孟子因萬章之問而極言朋友之道以見貴貴尊賢之義未嘗不一也此言朋友人倫之一所以輔仁故以天子友匹夫而不為詘以匹夫友天子而不為僭此堯舜所以為人倫之至而孟子言必稱之也輔氏曰自天子至於匹夫未有不須友以成者故推至於極則以堯為天子而下友於舜不為屈以舜為匹夫而上友於堯不為僭以見朋友為人倫之一不可以貴賤尊卑間也必至於堯舜然後能盡其道耳萬章問曰敢問交際何心也孟子曰恭也際接也交際謂人以禮儀幣帛相交接也曰卻之卻之為不恭何哉曰尊者賜之曰其所取之者義乎不義乎而後受之以是為不恭故弗卻也卻不受而還之也再言之未詳萬章疑交際之間有所卻者人便以為不恭何哉孟子言尊者之賜而心竊計其所以得此物者未知合義與否必其合義然後可受不然則卻之矣所以卻之為不恭也輔氏曰孟子言尊者有所賜而既以禮矣則是與之者恭也與之者既恭則只當恭以受之豈可竊計其所與我之物其初得之合義與否然後為辭受哉如此則若其不義則遂卻之矣一有是心則不可謂之恭也曰請無以辭卻之以心卻之曰其取諸民之不義也而以他辭無受不可乎曰其交也以道其接也以禮斯孔子受之矣萬章以為彼既得之不義則其餽不可受但無以言語間而卻之直以心度其不義而託於他辭以卻之如此可否邪輔氏曰萬章之意言彼所餽我之物既得之不義則我固不當受之若言其不義而直卻之為不恭則但以心度其為不義而託為他辭以卻之不亦可邪夫人之處事要只在義理上行過與不及皆非也萬章交際之間以辭卻之之説其視貪名耆利者固優矣然其有意於郤如此則亦失之過也由是而極之則必至為於陵仲子之為而後已交以道如餽贐聞戒周其飢餓之類接以禮謂辭命恭敬之節輔氏曰交以道謂來交我之有道理也接以禮謂來接我之有禮節也孔子受之如受陽貨蒸豚之類也萬章曰今有禦人於國門之外者其交也以道其餽也以禮斯可受禦與曰不可康誥曰殺越人于貨閔不畏死凡民罔不憝是不待教而誅者也殷受夏周受殷所不辭也於今為烈如之何其受之與平聲憝書作憝徒對反禦止也止人而殺之且奪其貨也國門之外無人之處也萬章以為茍不問其物之所從來而但觀其交接之禮則設有禦人者用其禦得之貨以禮餽我則可受之乎康誥周書篇名越顛越也今書閔作愍無凡民二字憝怨也言殺人而顚越之因取其貨愚謂若今劫人而殺傷者閔然不知畏死凡民無不怨之孟子言此乃不待教戒而當即誅者也如何而可受之乎輔氏曰孟子既已開曉之如此萬章猶不能反其意之偏以味孟子之言而復為此問此正所謂詖辭蓋陷於卻之之意而不覺也故孟子又引康誥之説以曉之殷受至為烈十四字語意不倫李氏以為此必有斷簡或闕文者近之而愚意其直為衍字耳然不可考姑闕之可也或問殷受夏周受殷所不辭也於今為烈趙氏謂三代相傳以此法不須辭問也於今為烈烈明法或者又謂若義在可受則三代受人之天下而不辭今禦人者乃為暴烈不義如此如何而可受其饋乎烈如詩序所謂厲王之烈者暴虐之意云爾或又以為烈光也三代相受而光烈至今也是三説者擇一而從之可也何至闕而不為之説乎曰熟讀本文此十四字自與上下文不相屬如趙氏之説則辭受二字與上下文亦不相似或者二説亦覺費力不若從李氏闕之之愈也曰今之諸侯取之於民也猶禦也茍善其禮際矣斯君子受之敢問何説也曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎夫謂非其有而取之者盜也充類至義之盡也孔子之仕於魯也魯人獵較孔子亦獵較獵較猶可而況受其賜乎比去聲夫音扶較音角比連也言今諸侯之取於民固多不義然有王者起必不連合而盡誅之必教之不改而後誅之則其與禦人之盜不待教而誅者不同矣夫禦人於國門之外與非其有而取之二者固皆不義之類然必禦人乃為真盜其謂非有而取為盜者乃推其類至於義之至精至密之處而極言之耳非便以為真盜也然則今之諸侯雖曰取非其有而豈可遽以同於禦人之盜也哉輔氏曰萬章終不肯置其偏見而詳味孟子之説至此則氣愈戾意愈刻説愈悖而都無輕重之差矣故孟子復問以有王者作將遂連合今之諸侯而盡誅之乎雖章之刻戾亦必知其不然也若必待其教之不改而後誅之則與不待教而誅之者固不可同日而語矣又引孔子之事以明世俗所尚猶或可從況受其賜何為不可乎輔氏曰世俗之所尚猶未合禮聖人猶或從之以小同於俗而況於以禮來賜何為不可受乎其教之不改而後誅之乎於此可見孟子待人之恕夫謂非其有而取之者盜也充類至義之盡也於此又可見孟子析理之精夫執其充類盡義之説而欲一槩以繩人幾何而不流於於陵仲子之為哉獵較未詳趙氏以為田獵相較奪禽獸以祭孔子不違所以小同於俗也張氏以為獵而較所獲之多少也二説未知孰是曰然則孔子之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正曰奚不去也曰為之兆也兆足以行矣而不行而後去是以未嘗有所終三年淹也與平聲此因孔子事而反覆辨論也事道者以行道為事也事道奚獵較也萬章問也先簿正祭器未詳徐氏曰先以簿書正其祭器使有定數不以四方難繼之物實之夫器有常數實有常品則其本正矣彼獵較者將久而自廢矣未知是否也兆猶卜之兆蓋事之端也語録曰猶縫罅也孔子所以不去者亦欲小試行道之端以示於人使知吾道之果可行也輔氏曰以孔子所謂吾豈匏瓜也哉焉能繫而不食之説與夫著之空言不如載之行事之説而觀之則是乃聖人之心也若其端既可行而人不能遂行之然後不得已而必去之蓋其去雖不輕而亦未嘗不決是以未嘗終三年留於一國也輔氏曰魯人獵較孔子亦獵較于以見聖人同物之仁簿正祭器不以四方之食供簿正于以見聖人處事之智未嘗有所終三年之淹于以見聖人制行之勇孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也於衛靈公際可之仕也於衛孝公公養之仕也見行可見其道之可行也際可接遇以禮也公養國君養賢之禮也輔氏曰見行可庶乎道之行也際可適其禮之宜也公養受其養之義也季桓子魯卿季孫斯也語録曰孔子仕於定公而言桓子當時桓子執國柄定公亦自做主不起孔子之相皆由桓子及桓子受女樂孔子便行矣衛靈公衛侯元也孝公春秋史記皆無之疑出公輒也輔氏曰或是字誤或是所傳之誤或是當時人呼出公為孝公皆不可考也因孔子仕魯而言其仕有此三者故於魯則兆足以行矣而不行然後去而於衛之事則又受其交際問餽而不卻之一驗也尹氏曰不聞孟子之義則自好者為於陵仲子而已聖賢辭受進退惟義所在愚案此章文義多不可曉不必強為之説孟子曰仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養為養並去聲下同仕本為行道而亦有家貧親老或道與時違而但為祿仕者如娶妻本為繼嗣而亦有為不能親操井臼而欲資其餽養者為貧者辭尊居卑辭富居貧貧富謂祿之厚薄蓋仕不為道已非出處之正故其所處但當如此辭尊居卑辭富居貧惡乎冝乎抱關擊柝惡去聲柝音托柝行夜所擊木也蓋為貧者雖不主於行道而亦不可以茍祿故惟抱關擊柝之吏位卑祿薄其職易稱為所冝居也李氏曰道不行矣為貧而仕者此其律令也若不能然則是貪位慕祿而已矣孔子嘗為委吏矣曰會計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣委鳥偽反會工外反當丁浪反乘去聲茁阻刮反長上聲此孔子之為貧而仕者也委吏主委積之吏也乘田主苑囿芻牧之吏也茁肥貌言以孔子大聖而嘗為賤官不以為辱者所以為貧而仕官卑祿薄而職易稱也位卑而言髙罪也立乎人之本朝而道不行恥也朝音潮以出位為罪則無行道之責以廢道為恥則非竊祿之官此為貧者之所以必辭尊富而寧處貧賤也語録曰為貧而仕只要在下位不當言責之地若是合言處便須當説非是教人都不得言耳若立乎人之本朝而道不行則恥矣故辭尊居卑辭富居貧尹氏曰言為貧者不可以居尊居尊者必欲以行道萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也託寄也謂不仕而食其祿也古者諸侯出奔他國食其廪餼謂之寄公士無爵土不得比諸侯不仕而食祿則非禮也輔氏曰諸侯之視諸侯雖其爵有五等之殊然其實則皆國君也且本有爵土不幸出奔而來適我國則其國君以廪餼之是乃禮之所宜也故可受而謂之寄公若士之於諸侯則有尊卑貴賤之不同又本無爵土豈可自比於諸侯故必仕而後當賦以祿為士者若不仕而食其祿則非禮矣萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之周救也視其空乏則周恤之無常數君待民之禮也輔氏曰天生民而立之君所以養之也既已制其常産而養之矣然當常常視其有空乏者則周救之是亦禮也曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也賜謂豫之祿有常數君所以待臣之禮也輔氏曰君擇賢而以為臣將與之共治天職則必與之共食天祿雖至於抱關擊柝之微亦皆有常職以食於上則又當因其髙卑勞逸而為之多少之定數是亦其禮之冝也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不恱於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也恱賢不能舉又不能養也可謂恱賢乎亟去聲下同摽音杓使去聲亟數也鼎肉熟肉也卒末也摽麾也數以君命來餽當拜受之非養賢之禮故不恱而於其末後復來餽時麾使者出拜而辭之犬馬畜伋言不以人禮待已也臺賤官主使令者蓋繆公愧悟自此不復令臺來致餽也輔氏曰繆公之於子思非不知所尊慕也而猶若此者一是思慮或有不至一是敬心或有未盡然敬心既盡則思慮必無不至也舉用也能養者未必能用況又不能養乎輔氏曰悅而不能用如晉平公於亥唐之類也世有徒徇養賢之虛名而無用賢之實事者固不足道況於養之之道又有所不至乎是焉能得賢者而臣之也曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廪人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也初以君命來餽則當拜受其後有司各以其職繼續所無不以君命來餽不使賢者有亟拜之勞也輔氏曰不使賢者冇亟拜之勞則敬心完而思慮到矣僕僕煩猥貌堯之於舜也使其子九男事之二女女焉百官牛羊倉廩備以養舜於畎畝之中後舉而加諸上位故曰王公之尊賢者也女下字去聲能養能舉悅賢之至也唯堯舜為能盡之而後世之所當法也輔氏曰堯之於舜則尊賢之極養賢之至用賢之周也萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳質為臣不敢見於諸侯禮也質與贄同傳通也質者士執雉庶人執鶩相見以自通者也國內莫非君臣但未仕者與執贄在位之臣不同故不敢見也輔氏曰在國之內者雖莫非君之臣然唯嘗執贄以自通於君既仕而有祿位者則正謂之臣若其他則雖隨所居而名為之臣其實皆庶人庶人既未曽執贄在位則不敢自同於已仕者以見於君是乃禮之當然也萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也往役者庶人之職不往見者士之禮輔氏曰庶人則當服君之賤事故召之役則往役者庶人之職也為士則知學問崇禮義不惟士之自處當如此而人君亦以此望之故召之則不往見之者士之禮也且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而況諸侯乎為其賢也則吾未聞欲見賢而召之也為並去聲繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而況可召與亟乘皆去聲召與之與平聲孟子引子思之言而釋之以明不可召之意齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也喪息浪反説見前篇曰敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌皮冠田獵之冠也愚謂皮冠辨也以鹿皮淺毛黃白者為之事見春秋傳愚謂春秋傳曰齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之然則皮冠者虞人之所有事也故以是招之庶人未仕之臣通帛曰旃愚謂通帛謂周大赤從周正色無飾士謂已仕者交龍為旗愚謂畫交龍於旗之上析羽而注旗干之首曰旌愚謂旗取烏羽注於干之首全而用之名曰旞析而用之名曰旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉況乎以不賢人之招招賢人乎欲見而召之是不賢人之招也輔氏曰非是説不以招賢人之禮招之蓋招之使見者是招不賢人之法耳以士之招招庶人則不敢往以不賢人之招招賢人則不可往矣輔氏曰以貴者之招而招賤則不敢往者畏義也以不賢之招而招賢則不可往者重禮也欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩云周道如底其直如矢君子所履小人所視夫音扶底詩作砥之履反詩小雅大東之篇底與砥同礪石也言其平也矢言其直也視視以為法也引此以證上文能由是路之義輔氏曰以周道為君子所履而證義路為賢者之所由也萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子當仕有官職而以其官召之也與平聲孔子方仕而任職君以其官名召之故不俟駕而行輔氏曰謂如為魯司寇時魯公以司寇召之故下俟駕而行以敬君之命故不敢慢也徐氏曰孔子孟子易地則皆然此章言不見諸侯之義最為詳悉更合陳代公孫丑所問者而觀之其説乃盡輔氏曰觀答陳代章則見孟子之不見諸侯得不肯枉道從人之義觀此章及答公孫丑章則又見孟子之不見諸侯得古者不為臣不見之禮與夫賢者有不可召之義蓋君子之出處進退一惟其禮與義而已初無適莫也孟子謂萬章曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士言已之善蓋於一鄉然後能盡友一鄉之善士推而至於一國天下皆然隨其髙下以為廣狹也輔氏曰善士雖有大小之不同皆主於善者也若在我之善不足以蓋一鄉之善士則隨其所主而取之必有偏而或遺者惟在我之善足以蓋其一鄉然後能盡友一鄉之善士凡剛柔緩急無有或遺者矣推而廣之至於一國天下皆隨其髙下以為廣狹耳以友天下之善士為未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也尚上同言進而上也頌誦通論其世論其當世行事之迹也言既觀其言則不可以不知其為人之實是以又考其行也夫能友天下之善士其所友衆矣猶以為未足又進而取於古人是能進其取友之道而非止為一世之士矣輔氏曰士而至於友天下之善士可謂取友之衆矣然不過是一世之士惟是進而友於古人則其取友更無窮盡而不可謂一世之士也蓋在我之善愈備則取於友者益廣然善無窮盡也故大而天下逺而前古無不在所取焉蓋時雖有先後而理則無古今也齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聽則易位大過謂足以亡其國者易位易君之位更立親戚之賢者蓋與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此也王勃然變乎色勃然變色貌曰王勿異也王問臣臣不敢不以正對孟子言也王色定然後請問異姓之卿曰君有過則諫反覆之而不聽則去君臣義合不合則去此章言大臣之義親疏不同守經行權各有其分貴戚之卿小過非不諫也但必大過而不聽乃可易位異姓之卿大過非不諫也雖小過而不聽已可去矣輔氏曰此説尤足以補孟子之説蓋行權者非至於甚不得已則不可為守經者則日用常行而須臾不可離者也然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑此又委任權力之不同不可以執一論也孟子纂疏卷十
