body:
  text: 欽定四庫全書孟子纂疏卷三宋趙順孫撰朱子集注公孫丑章句上凡九章公孫丑問曰夫子當路於齊管仲晏子之功可復許乎復扶又反公孫丑孟子弟子齊人也當路居要地也管仲齊大夫名夷吾相桓公霸諸侯許猶期也孟子未嘗得政丑蓋設辭以問也輔氏曰此必是丑初見孟子時事觀其語意尚恐孟子不敢以管晏之功自期是全未知孟子也真氏曰齊宣王既慕桓文而公孫丑復慕管晏蓋霸者功利之說深入人心為日已久故不惟時君慕之而學者亦慕之也孟子曰子誠齊人也知管仲晏子而已矣齊人但知其國有二子而已不復知有聖賢之事輔氏曰世衰道微聖賢不明人不知有學問則亦不復知有聖賢之事業有英才美質不過溺於時俗之見聞而已此齊人之所以但知其國之有二子也或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也曰然則吾子與管仲孰賢曽西艴然不恱曰爾何曽比豫於管仲管仲得君如彼其專也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是蹴子六反艴音拂又音勃曽並音增孟子引曽西與或人問答如此曽西曽子之孫蹴不安貌先子曽子也艴怒色也曽之言則也烈猶光也桓公獨任管仲四十餘年是專且久也管仲不知王道而行霸術故言功烈之卑也真氏曰晏子於齊固無功烈之足言若管仲者孔子蓋嘗以如其仁稱之孟子學孔子者也何其言之異邪孔子之稱稱其攘夷狄而尊中夏也孟子所譏譏其舍王道而用霸術也所指固不同矣然孔子雖稱其功而器小之譏不知禮之議固未嘗略況世變日下使孟子而不復議其舍王用霸之罪則人將靡然趨於霸矣波流滔滔孰從而返之邪以此防民商鞅申不害之流猶以詐力彊國而甘處於霸之下者楊氏曰孔子言子路之才曰千乘之國可使治其賦也使其見於施為如是而已其於九合諸侯一匡天下固有所不逮也然則曽西推尊子路如此而羞比管仲者何哉譬之御者子路則範我馳驅而不獲者也管仲之功詭遇而獲禽耳曽西仲尼之徒也故不道管仲之事輔氏曰楊氏斷置得極分明子路之才視管仲誠為不及然子路之所學則聖人之道其於管仲之事蓋有所不屑為者或曰楊氏本說但云子路譬之御者則範我馳驅者若管仲蓋詭遇耳此則是以御而譬其所為未說到功上今集注增益之曰子路則範我馳驅而不獲者也管仲之功則詭遇而獲禽耳則是併與功都說了然案孟子範我馳驅是一人不獲又是一人詭遇是一人獲禽又是一人今若只作一人說則似以子路為御之善而射未善然射御又非一人所能兼者恐不若只從其本說之為得也曰非是之謂也集注之意蓋謂子路是範我馳驅而不遇王者故不獲耳管仲則詭遇以逄桓公之為故得禽多耳曰管仲曽西之所不為也而子為我願之乎子為之為去聲曰孟子言也願望也曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與與平聲顯顯名也曰以齊王由反手也王去聲由猶通反手言易也輔氏曰譬如人自以手反覆此易為耳曰若是則弟子之惑滋甚且以文王之德百年而後崩猶未洽於天下武王周公繼之然後大行今言王若易然則文王不足法與易去聲下同與平聲滋益也文王九十七而崩言百年舉成數也文王三分天下才有其二武王克商乃有天下周公相成王制禮作樂然後教化大行曰文王何可當也由湯至于武丁賢聖之君六七作天下歸殷久矣久則難變也武丁朝諸侯有天下猶運之掌也紂之去武丁未久也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也朝音潮鬲音隔又音歷輔相之相去聲猶方之猶與由通當猶敵也商自成湯至于武丁中間太甲太戊祖乙盤庚皆賢聖之君作起也自武丁至紂凡七世故家舊臣之家也齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時今時則易然也鎡音兹鎡基田器也愚謂蓋耒耜之屬或云大鋤也時謂耕種之時夏后殷周之盛地未有過千里者也而齊有其地矣雞鳴狗吠相聞而達乎四境而齊有其民矣地不改辟矣民不改聚矣行仁政而王莫之能禦也辟與闢同此言其勢之易也三代盛時王畿不過千里今齊己有之異於文王之百里又雞犬之聲相聞自國都以至四境言民居稠密也且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者也飢者易為食渴者易為飲此言其時之易也自文武至此七百餘年異於商之賢聖繼作民苦虐政之甚異於紂之猶有善政易為飲食言飢渴之甚不待甘美也孔子曰德之流行速於置郵而傳命郵音尤置驛也郵馹也所以傳命也孟子引孔子之言如此當今之時萬乘之國行仁政民之恱之猶解倒懸也故事半古之人功必倍之惟此時為然乘去聲倒懸諭困苦也所施之事半於古人而功倍於古人田時勢易而德行速也愚謂以德行之速乘時勢之易此真有所不難也公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎孟子曰否我四十不動心相去聲此承上章又設問孟子若得位而行道則雖由此而成霸王之業亦不足怪語録曰言雖由此而為霸為王不是差異輔氏曰上章乃公孫丑設辭以問孟子若當要路於齊國管晏二子之功可復以自許否乎孟子既言二子之功不足為而以齊王猶反手之說告之矣故丑復設辭以問孟子若遂得位以行道則雖由此而成霸王之業是亦宜然而不足怪矣其併以王霸為言者丑方聞孟子之說而未能無疑習於世俗之論而不肯遽捨也任大責重如此亦有所恐懼疑惑而動其心乎語録曰公孫丑問孟子動心否乎非謂以卿相富貴動其心謂霸王事大恐孟子擔當不過有所疑懼而動其心也輔氏曰任大謂加齊之卿相責重謂人望以霸王之業凡人氣禀弱小而不知持養者遇事便疑惑恐懼以動其心況任大責重如此其心豈有不動者哉想公孫丑正未免此故以為問蓋疑孟子擔當不去有所疑懼而動心也四十彊仕君子道明德立之時孔子四十而不惑亦不動心之謂或問孟子之不動心曰盡心知性無所疑惑動皆合義無所畏怯雖當盛位行大道亦沛然行其所無事而已何心動之有易所謂不疑其所行者蓋如此而孔子之不惑亦其事也輔氏曰曲禮四十曰彊而仕非道明德立則何以仕哉孔子之不惑則道明之謂也孟子之不動心則德立之謂也唯其不惑然後能不動心也大抵人年四十亦是箇大節指所以使之出仕而夫子亦嘗曰年四十而見惡焉其終也已陵陽李氏問明則不疑立則不懼然未有不明而能立者故知言養氣雖二事並進而其序必以知言為先孔子不惑則自不動矣萬氏曰集注乃是借彼以明此猶言孔子之不惑亦如此而已今曰孔子不惑亦不疑之謂不疑則自不動矣以不動為聖人之不惑以不惑而後能不動似非所以言聖人恐於集注之意不能無小差也集注不惑章又云於事理之當然者皆無所疑則知之明而無所事守矣既曰無所事守則不動心乃其餘事斯又足以見其道明德立非有次第也黃氏曰李說是也萬之疑過矣曰若是則夫子過孟賁逺矣曰是不難告子先我不動心賁音奔孟賁勇士愚案賁齊人能生拔牛角秦武好多力之士賁往歸之告子名不害孟賁血氣之勇丑蓋借之以贊孟子不動心之難輔氏曰孟賁血氣之勇雖非孟子等倫然時人莫不以賁為難能故丑借以贊孟子不動心之難耳孟子言告子未為知道乃能先我不動心則此亦未足為難也語録曰孟子是義精理明天下之物不足以動其心不是把捉得定告子不動心是硬把定輔氏曰告子外義未為知道然未四十時已能不動心其不動心又先於孟子以此觀之則不動心未足為難可知也曰不動心有道乎曰有程子曰心有主則能不動矣輔氏曰程子之說本云不動心有道如數子皆中有所主便心不動所謂數子者即併下文􅉳舍言之黝舍二子其粗厲又非告子比然其心一以必勝為主一以不懼為主故其心亦皆不動以此觀之則程子正意可見不然則如黝舍二子事皆有窒礙說不合也北宫􅉳之養勇也不膚撓不目逃思以一豪挫於人若撻之於市朝不受於褐寬博亦不受於萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之􅉳伊紏反撓奴效反朝音潮乘去聲北宫姓􅉳名膚撓肌膚被刺而撓屈也目逃目被刺而轉睛逃避也挫猶辱也褐毛布愚謂以毳織布曰褐寬博寬大之衣賤者之服也不受者不受其挫也刺殺也嚴畏憚也言無可畏憚之諸侯也􅉳蓋刺客之流輔氏曰以其言所謂視刺萬乘之君若刺褐夫而知之也以必勝為主而不動心者也輔氏曰亦以其言而知之也其心以必勝夫人為主故無有尊貴視之一如匹夫不受其挫必反報之孟施舍之所飬勇也曰視不勝猶勝也量敵而後進慮勝而後㑹是畏三軍者也舍豈能為必勝哉能無懼而已矣舍去聲下同孟姓施發語聲舍名也語録曰此是古注說後面只稱舍字可見問有何例可案曰如孟之反舟之僑尹公之他之類㑹合戰也舍自言其戰雖不勝亦無所懼若量敵慮勝而後進戰則是無勇而畏三軍矣語録曰此孟施舍譏别人舍自云我則能無懼而已舍蓋力戰之士以無懼為主而不動心者也輔氏曰亦以其言而知之也惟其心以無懼為主故不問其徒之衆寡我之勝否遇敵則戰也孟施舍似曽子北宮􅉳似子夏夫二子之勇未知其孰賢然而孟施舍守約也夫音扶􅉳務敵人舍専守已輔氏曰􅉳務敵人謂􅉳専以必勝於人為主也舍専守己謂舍專以我無所懼為主也子夏篤信聖人曽子反求諸己語録曰問曽子反求諸己固有可見處子夏篤信聖人何以言之曰此因孟子說處文義推䆒亦無事實可指但將其平日所言詳味之有篤信聖人氣象又曰子夏篤信聖人但看他言語如博學篤志切問近思之類便見得他有箇緊要定底意思昭武李氏曰集注以子夏為篤信聖人至曽子則以為明理篤信者特堅守不變之謂於反身處未有以知其盡也若反身而盡則理無不明行無不慊矣黃氏曰子夏未盡反身蓋對曽子而言也子夏之學看著聖人篤信而進取之曽子之學只是㸃檢自身故二子之與曽子子夏雖非等倫然論其氣象則各有所似或問孟施舍之於曽子北宫􅉳之於子夏奈何曰二人勇力之士耳孟子特以其氣象之所似而明之非以其道為同乎二子也黃氏曰北宫􅉳之勇只要與人鬬故子夏之學似之孟施舍之勇只是要心能不懼故曽子之學似之賢猶勝也約要也言論二子之勇則未知誰勝論其所守則舍比於􅉳為得其要也輔氏曰􅉳務敵人則不屈於外舍専守己則無懼於我是舍之比􅉳所守為得其要也昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣好去聲惴之瑞反此言曽子之勇也子襄曽子弟子也夫子孔子也縮直也文集曰儀禮禮記多有此字每與衡字作對下文直養之說蓋本於此乃一章大指所繫不可失也檀弓曰古者冠縮縫今也衡縫愚謂凡物縮之則直衡之則橫古尚質故冠之吉凶相似而惟直縫之同今尚文故冠之吉凶相反而有橫縫之異又曰棺束縮二衡三愚謂古者以皮束棺蓋不用鐵故也為直者二為橫者三惴恐懼之也往往而敵之也孟施舍之守氣又不如曽子之守約也言孟施舍雖似曽子然其所守乃一身之氣又不如曽子之反身循理所守尤得其要也或問既以孟施舍為守約矣又曰舍之守氣不如曽子之守約何也曰守約云者言其所守之得其要耳非以約為一物而可守也蓋􅉳舍皆守氣以養勇然以􅉳比舍則舍之守為得其要至以舍而比於曽子則曽子之守尤為得其要也語録曰孟施舍就氣上做工夫曽子就理上做工夫輔氏曰論舍之氣象雖大略有似於曽子然舍之所守不過是一身之血氣固未嘗反之於心以自顧其直與不直也其視曽子之自反而以縮不縮為勇怯則其所守之要非舍之所能知所可比也反身謂自反循理謂直孟子之不動心其原蓋出於此下文詳之輔氏曰引曽子謂子襄之言以明不動心之由在於自反而縮以見己之所以不動心亦是如此其意至此已足矣下文則是緣公孫丑反復問難故又說得如此詳盡曰敢問夫子之不動心與告子之不動心可得聞與告子曰不得於言勿求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可夫志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣聞與之與平聲夫志之夫音扶此一節公孫丑之問孟子誦告子之言又斷以己意而告之也告子謂於言有所不達則當舍置其言而不必反求其理於心於心有所不安則當力制其心而不必更求其助於氣此所以固守其心而不動之速也語録曰不得於言勿求於心是心與言不相干不得於心勿求於氣是心與氣不相貫此告子說也告子只去守箇心得定都不管外面事外面是亦得不是亦得又曰告子之意以為言語之失當直求之於言而不足以動吾心念慮之失當直求之於心而不必更求之於氣蓋其天資剛徑有過人者力能堅忍固執以守其一偏之見所以學雖不正而能先孟子不動心也輔氏曰達字與辭達而已矣之達同言而不能通達乃其所以失也舍置其言謂置其前言而别更為說也若言有所不達而反求其理於心則是因言之失而自纍其心也安字與於汝安乎之安同心是臲杌不安則正失其心之平也力制其心謂硬把定其心也若心有所不安而更求其助於氣則是舍其本而從事於末也此四句乃告子不動心之法蓋告子只就心上整理堅持其心言與氣皆以為末節而不理㑹平居唯恐動著他心故雖義理亦皆以為在外而不敢認為已有程子所謂不知義在內者是也此其所以未四十而能先孟子不動心也孟子既誦其言而斷之曰彼謂不得於心而勿求諸氣者急於本而緩於末猶之可也語録曰不得於心勿求於氣者不失其本則猶可也又曰心之不正未必皆氣使之故勿求於氣未為甚失輔氏曰氣固有時而能動其心然心之不正則未必皆氣使之大抵心是本氣是末故程子亦曰人必有仁義之心然後有仁義之氣睟然達於外此不得於心勿求諸氣所以為急於本而緩其末猶之可也猶言尚為可也謂不得於言而不求諸心則既失於外而遂遺於內其不可也必矣語録曰不得於言而不求於心以考其所失則其中頑然而無所知覺無以擇乎義之所安故斷之以不可又曰言之不當未有不出於心者而曰勿求於心則有所不可矣輔氏曰言心聲也雖發於口而實出於心言有不順理不通達即是心有不順理不通達處也不得於言須就心上理㑹心正而明則言無不達矣告子反之是因其言之或失於外而遂遺其所以然者於內而不求也是則豈可哉故曰其不可也必矣永嘉陳氏曰言上有病便是他心上有病當反求諸心可也告子乃言不求於心此是他不知言處孟子與告子正相反故於詖淫邪遁之辭而知其所受病之處蓋詖淫邪遁言之病也蔽陷離窮心之病也因其言之病知其心之病孟子所以為知言然凡曰可者亦僅可而有所未盡之詞耳輔氏曰以下文氣志貴於交相養之說觀之則勿求於氣之說尚未為盡善若論其極則志固心之所之而為氣之將帥然氣亦人之所以充滿於身而為志之卒徒者也輔氏曰心有知而氣無知雖云氣一則能動志然大抵是氣隨心動故以志為氣之將帥氣從志所使猶卒徒之聽命於將帥也不言心而言志者志者心之動而有所之處志即心也但志則就其動處言故尤切耳下文又言是氣也而反動其心亦可見矣心無形而氣有質雖云心為本氣為末然人之所以充滿其身而不至餒乏者實賴氣為志之卒徒也志而無氣則志無所使亦由將帥而無卒徒則亦虛名而已故志固為至極而氣即次之語録曰志最緊氣亦不可緩志至焉則氣便在這裏是氣亦至了又曰只是一箇緩急底意思志雖為至然氣亦次之又曰志至氣次只是先後志至此氣亦隨之人固當敬守其志然亦不可不致養其氣蓋其內外本末交相培養或問持志養氣之為交養曰持志所以直其內也無暴其氣所以防於外也兩者各致其功而無所偏廢焉則志正而氣自完氣完而志益正其於存飬之功且將無一息之不存矣語録曰志是最要緊氣亦不可緩持其志無暴其氣是兩邊做工夫輔氏曰志與氣雖有緩急而實不爭多則兩下皆不可不理㑹故人當敬守其志而又不可不致養其氣守即持也敬則主一而無適也欲持守其志非敬不可故程子謂帥氣者在志養志者在直內切要之道無如敬以直內也養即無暴也凡氣發得暴者皆失其養故也必言致者見養氣之難須是以集義為本而又無正忘助長之病方得其養也此則孟子之心所以未嘗必其不動而自然不動之大略也輔氏曰言與心雖有內外心與氣雖有本末而內外本末貴乎交相培養孟子雖不及言上工夫然朱子嘗謂言上亦不可無工夫故程子有言發禁躁妄內斯靜専工夫兩下皆要到然後言順氣平而其心自然不動孟子養氣後面更有許多說話在然其不動心之大略則具見於此其視告子外義而不顧言悖而氣粗硬守定其心而不動者殆不可同年而語矣既曰志至焉氣次焉又曰持其志無暴其氣者何也曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心夫音扶公孫丑見孟子言志至而氣次故問如此則専持其志可矣又言無暴其氣何也語録曰公孫丑疑只就志理㑹理㑹得志氣自隨之不必更問氣也故又問曰持其志無暴其氣何也輔氏曰此見丑之有志於學也使其無志于學則聞孟子之言亦漫聽之而已必不能如是問之反覆也一專一也輔氏曰此本程子說但其諒以為一與一字同一動氣則動志一動志則動氣此為養氣者言也若成德者志已堅定則氣不能動志末後雖分得好但說一動氣則便動志一動志則便動氣亦太說得輕了至第二說以為志專一則動氣氣專一則動志若志專在淫僻則豈不動氣氣專在喜怒亦豈不動志故蹶者趨者反動其心此却說得好蹶顚躓也趨走也孟子言志之所向專一則氣固從之然氣之所在專一則志亦反為之動語録曰氣若併在一處自然引動著志如人顛躓趨走則氣專在是而反動其心焉語録曰問蹶趨反動其心若是志養得堅定莫須蹶趨亦不能動得否曰蹶趨自是動其心人之奔走如何心不動得曰蹶趨多遇於猝然不可支吾之際所以易動得心曰是又曰今人奔走而來偶喫一跌其氣必逆而心不定是氣之能動其心如人於忙急之中理㑹甚事亦是氣未定也輔氏曰志者心之所之故可言向氣則做出來砥便是不可以向言只得下在字如蹶者趨者要如此者是心及其蹶趨則是氣也此其察理精矣所以既持其志而又必無暴其氣也程子曰志動氣者什九氣動志者什一或問程子之說曰此言其多少之分也而孟子所以猶有取於勿求於氣之云者而不盡善之於此亦可見矣輔氏曰什九什一所以極言其多與少耳所以如此說者只是要以志為主工夫須多在志上方可故程子又有說曰志動氣者多氣動志者少雖氣亦能動志然亦在持其志而已敢問夫子惡乎長曰我知言我善養吾浩然之氣惡平聲公孫丑復問孟子之不動心所以異於告子如此者有何所長而能然而孟子又詳告之以其故也語録曰公孫丑既知告子之失而未知孟子之所以得故問焉而孟子告之知言者盡心知性於凡天下之言無不有以究極其理而識其是非得失之所以然也輔氏曰盡心知至也知性物格也物格知至則凡天下之事過于吾前者其理皆軒豁呈露無所遁情況言心聲也一接乎耳則豈不能究極其理而識其是非得失之所以然邪言有是非得失而所以然者則心也心有蔽陷離窮之病則言有詖淫邪遁之失矣浩然盛大流行之貌氣即所謂體之充者本自浩然失養故餒惟孟子為善養之以復其初也文集曰浩然之氣乃指其本來體段而言謂體之充者泛言之耳然亦非外此而别有浩然之氣也輔氏曰盛大言其體流行言其用才怯小則便非氣之本體才鬱塞則便非氣之本用氣即天地之氣而人之所以充滿其身者其本然之體用自是浩然由失其養故餒乏而不充乎體唯孟子善養之故復其初而成浩然也蓋惟知言則有以明夫道義而於天下之事無所疑養氣則有以配夫道義而於天下之事無所懼此其所以當大任而不動心也或問知言養氣之說曰孟子之不動心知言以開其前故無所疑養氣以培其後故無所懾如智勇之將勝敗之形得失之算已判然於胸中而熊虎貔貅百萬之衆又皆望其旌麾聽其金鼓為之赴湯蹈火有死無二是以千里轉戰所向無前其視告子之不動心正猶勇夫悍卒初無制勝料敵之謀又無蚍蜉蟻子之援徒恃其勇而挺身以赴敵也其不為人所擒者特幸而已輔氏曰疑懼二字以應此章第一節疑惑恐懼等字也道體也義用也言道義以該體用也知言則於道義究極無餘一事來則以一理應之夫復何疑之有養氣則於道義貼襯得起勇猛果決而不留行夫復何懼之有告子之學與此正相反其不動心殆亦冥然無覺悍然不顧而已爾輔氏曰孟子能知人言之是非告子乃自以其言為外而不復考孟子善養其氣而告子乃以氣為末而不知求此所謂正相反也其不動心者不過是硬把定其心冥冥然都無知覺於一切事皆漠然與之扞格而不顧耳亦豈能終不動哉然其所以能不動者亦幸而已敢問何謂浩然之氣曰難言也孟子先言知言而丑先問氣者承上文方論志氣而言也難言者蓋其心所獨得而無形聲之驗有未易以言語形容者愚謂心所獨得謂非人所與知有形有聲則有可指之驗惟無形聲之可驗則言語誠有未易形容者矣故程子曰觀此一言則孟子之實有是氣可知矣其為氣也至大至剛以直養而無害則塞于天地之間至大初無限量至剛不可屈撓蓋天地之正氣而人得以生者其體段本如是也語録曰問集注於剛字下㸃句何也曰直字斷句則養字全無骨肋只是自反而縮是以直養而無害也至大至剛氣之本也以直養而無害是用功處塞乎天地之間乃其效也又曰氣雖有清濁厚薄之不齊然論其本則未嘗異也所謂至大至剛者乃氣之本體如此輔氏曰至大初無限量者謂充塞宇宙而無有邊表之處窮盡之時也至剛不可屈撓者謂堅徑果決雖金石亦透過舉天下萬物不能沮抑之也此乃天地之正氣而人得以生者人固是禀天地之正氣以生然其間亦不能無盛衰之異此但言其盛者耳其體段本如是者孟子以至大至剛指言氣之本相也初無限量便是盛大不可屈撓便是流行即所謂浩然之氣也不言用者舉體則足以該之矣惟其自反而縮則得其所養而又無所作為以害之則其本體不虧而充塞無間矣語録曰充塞是遍滿之意又曰有一毫不滿不足之意則非塞矣輔氏曰人雖是禀得此氣以生然須是所為凡事合義自反而直仰無所愧俯無所怍則乃為得其所養而又無所作為如正忘助長以為之害則是氣之體始為無所虧缺而充塞乎天地之中更無有為之間隔者矣程子曰天人一也更不分别浩然之氣乃吾氣也養而無害則塞乎天地一為私意所蔽則欿然而餒知其小也語録曰天地之氣無處不到無處不透是他氣剛雖金石也透過去人便是禀得這箇氣無缺闕所以曰天人一也又曰蔽是遮隔之意氣自流通不息一為私意所遮隔則便去不得今且以粗言之如項羽一箇意氣如此才被漢王數其十罪便覺沮屈去不得也輔氏曰浩然之氣本是天地之正氣然天人一理故孟子更不分别直以為己之氣也養而無害則全得其本體而塞乎天地若不務集義而所為一有私意遮隔了則便不流行而欿然餒乏不足以充乎身而失其盛大之體也謝氏曰浩然之氣須於心得其正時識取又曰浩然是無虧缺時輔氏曰心得其正如大學所謂正心無四者之纍則心始得其正矣心得其正則氣之盛大流行者自可見故人當於此際體認取盛大流行則其氣方始無所虧缺也其為氣也配義與道無是餒也餒奴罪反配者合而有助之義語録曰問配字從前只訓作合今以助意釋之有據否曰非謂配便是助但養得那氣充不餒方合得那道義所以說有助之意又曰如有正將又立箇副將以配他乃所以助他輔氏曰此意本於李先生曰配是襯貼起來朱子謂襯貼二字說配字極親切蓋道義是虛砥物本自孤單得這氣襯貼起來便自張大無所不達今人做事亦有合於道義者若無此氣則只是一箇衰砥人李先生又曰氣與道義一滚出來朱子謂一滚出來說得道理好孟子分明說配義與道不是兩物相補貼只是一滚發出來故朱子用此意而又就配字說出此句蓋已極於精切矣義者人心之裁制道者天理之自然語録曰道則是物我公共自然之理義則吾心之能斷制者所用以處此理者也又曰義者人心節制之用道者人事當然之理餒飢乏而氣不充體也輔氏曰餒如人之不食而飢餒便覺得其體虛乏而不充也言人能養成此氣則其氣合乎義道而為之助使其行之勇決無所疑憚若無此氣則其一時所為雖未必不出於道義然其體有所不充則亦不免於疑懼而不足以有為矣或問何以言氣之配義與道也曰道體也義用也二者皆理也形而上者也氣也者器也形而下者也以本體言之則有是理然後有是氣而理之所以行又必因氣以為質也以人言之則必明道集義然後能生浩然之氣而義與道也又因是氣而後得以行焉蓋三者雖有上下體用之殊然其渾合而無間也乃如此苟為不知所以養焉而有以害之則理自理氣自氣其浩然而充者且為慊然之餒矣或略知道義之為貴而欲恃之而有為亦且散漫蕭索而不能以自振矣語録曰謂養成浩然之氣以配道義方襯貼得起不然雖有道義其氣懾怯安能有為又曰將這氣去助道義方能行得去若平時不養得此氣自衰颯了合當做砥事也畏縮不敢去做如朝廷欲去這小人我道理直了有甚怕他不敢動著知他是小人不敢去他只是我這氣自如此便是合下無工夫輔氏曰氣合乎道義而為之助便是一滚出來之意是集義所生者非義襲而取之也行有不慊於心則餒矣我故曰告子未嘗知義以其外之也慊口簟反又口劫反集義猶言積善蓋欲事事皆合於義也語録曰集義是平時積纍工夫又曰只是件件要合宜自然積得多又曰只是無一事不求箇是而已矣輔氏曰集謂積集於此不一而足襲掩取也如齊侯襲莒之襲語録曰襲如用兵之襲有襲奪之意如掩人不備而攻襲之者謂如才行得一件事合義便將來壯吾氣以為浩然之氣可以攫拏而來夫是之謂襲又曰襲如劫寨相似非順理而行有積習工夫者也又曰猶曰於一事一行之義勇而為之以襲取其氣也言氣雖可以配乎道義而其養之之始乃由事皆合義自反常直是以無所愧怍而此氣自然發生於中文集曰此氣乃集義而生事皆合義則胸中浩然俯仰無所愧怍矣語録曰事事都要合道理才有些子不合道理心下便不足才事事合道理便仰不愧俯不怍輔氏曰氣雖可以配道義使之張大無所不達然其養之之始則在乎集義以生之若我之所為事事合義自反而常直則仰無所愧俯無所怍而浩然之氣自然發生於中也所謂自然發生於中一句甚要切說得生字分明非由只行一事偶合於義便可掩襲於外而得之也語録曰非謂一事合宜便可掩取其氣以歸於已也又曰不是行一二件合義砥事能搏取浩然之氣也集義是歲月之功襲取是一朝一夕之事從而掩取終非已有也慊快也足也輔氏曰慊是心有所銜之義而此所謂慊者則銜其快與足也言所行一有不合於義而自反不直則不足於心而其體有所不充矣輔氏曰氣是集衆義而生故不可不積若所行一有不合於義則自反便不直自反既不直便自不足於心才有不足於心則氣之體便有所不充矣然則義豈在外哉告子不知此理乃曰仁內義外而不復以義為事則必不能集義以生浩然之氣矣文集曰告子之病蓋不知心之慊處即是義之所安其不慊處即是不合於義故直以義為外而不求輔氏曰所行一有不合於義則自反便不直心之理便不足氣之體便不充則義之不在外也明矣今告子乃曰仁內也非外也義外也非內也直是將義屏除去更不復以為事只就心上理㑹則是全然不知此理矣浩然之氣將何自而能生哉上文不得於言勿求於心即外義之意語録曰問外義之意蓋告子外之而不求非欲求之於外也曰告子直是將義屏除去只就心上理㑹輔氏曰告子謂言有所不得於義則當舍置其所言而别更為說若言有所不得而反求於心則是因言之失而自纍其心平居唯恐動著他心故雖義亦以為在外而不敢認為己有此即外義之意也詳見告子上篇必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苖之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣其子趨而往視之苗則槁矣天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苖者也非徒無益而又害之長上聲揠烏八反舍上聲必有事焉而勿正趙氏程子以七字為句近世或并下文心字讀之者亦通必有事焉有所事也語録曰有所事只是集義也黃氏曰猶言必有所作為如有事於顓臾之有事文集曰如言有事於顓臾之類非是用力之地乃言須當用力也正預期也文集曰正者等待期望之意語録曰正則有所待蓋必之之意古人言正字皆謂必也春秋傳曰戰不正勝是也語録曰公羊傳云師不正反戰不正勝此正字與孟子說正心之正一般彼言師出不可必期其反戰不可必期其勝也如作正心義亦同此與大學之所謂正心者語意自不同也輔氏曰正謂預期也勿正謂勿預期也勿正心謂勿以其心預期之也若大學之所謂正心則謂無忿􅓰恐懼好樂憂患四者之纍而心體自得其正耳其語意固不同也此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也語録曰勿正者勿待也勿忘者勿忘其以集義為事也助長者是待之不得而拔之使長也言人能集義以養其浩然之氣故事物之來自有以應之不可萌期待之心少閒待之不得則必出於私意有所作為而逆其天理矣是助之長也又曰集義是養氣之丹頭必有事是集義之大法言必有事者是養氣之法度也又曰是集義中小節目不要等待不要催促輔氏曰必有事焉者謂必以集義為事也勿預期其效者謂勿正也勿忘謂雖以集義為事或心生而未熟或集義而未多氣雖生而未至於充盛則但當勿忘其所集義之事也勿助長謂不可用意作為以助氣之長也夫養氣固在於集義然其所以集義之節度則又當如是也閔憂也揠拔也芒芒無知之貌其人家人也病疲倦也舍之不耘者忘其所有事揠而助之長者正之不得而妄有作為者也然不耘則失養而已揠則反以害之無是二者則氣得其養而無所害矣輔氏曰舍之而不耘者是忘其集義之事者也助之長者是預期之而不得乃妄意作為以助氣之長者也然忘其集義之事則氣失其養不能發生而已至於妄有作為以助氣之長則氣反被害將如苖之槁死而後已也苟集義而不忘其所事則氣得其養勿正而不妄作為則氣無所害如此則日引月長而充塞天地之體沛然流行之用將不期然而然矣夫其所謂揠則反以害之者正指告子而言也蓋告子不能集義而欲彊制其心則必不能免於正助之病其於所謂浩然者蓋不惟不善飬而又反害之矣如告子不能集義而欲彊制其心則必不能免於正助之病其於所謂浩然者蓋不惟不善養而又反害之矣語録曰養氣一章在不動心不動心在勇勇在氣氣在集義勿忘勿助長又是那集義砥節度若告子則更不理㑹言之得失事之是非氣之有平不平只是硬制壓那心使不動恰如說打硬修行一般愚謂告子之事雖不可詳考然即其以義為外而彊制其心與人辨論則自執已私屢變其說展轉求勝即其狹陋蔽固有害於盛大流行之體亦已多矣何謂知言曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣詖彼寄反復扶又反此公孫丑復問而孟子答之也詖偏陂也語録曰詖是說得一邊長一邊短又曰凡從皮皆是一邊意如跛是腳一長一短坡是山一邊斜又曰如楊氏為我墨氏兼愛各只見一邊淫放蕩也語録曰淫者說得周遮浩瀚輔氏曰放蕩謂無檢說得漸次夸張泛濫去邪邪僻也輔氏曰邪僻謂不正說得一句喎邪乖僻去遁逃避也語録曰遁如墨者夷之他說愛無差等却又說施由親始楊朱不肯拔一毛以利天下又遁處却說天下非拔一毛所能利若人人不拔一毛則天下利矣如佛氏他本無父母却說父母經這是他遁了輔氏曰逃避謂走閃說得皆成回互走作去四者相因言之病也輔氏曰偏陂則必放蕩放蕩則必邪僻邪僻則必逃避四者相因皆言之病也言形於外故以病言蔽遮隔也語録曰心有所蔽只見一邊不見一邊陷沉溺也語録曰陷是身溺在那裏如陷溺於水只見水而不見岸了離叛去也輔氏曰叛去謂其心與正理違叛愈去愈逺窮困屈也輔氏曰困屈謂其心於理有不通而困躓鬱屈四者亦相因則心之失也語録曰問四者相因之說曰詖辭初間只是偏了所以偏者止緣他蔽了一邊如被有物隔了只見一邊初間是如此後來只管陷入裏面去漸只管說得闊了支蔓淫溢才恁地陷入深了於是一向背却正路遂與正路相離了既離去了正路他那物事不成物事畢竟用不得其說必至於窮為是他說窮了又為一說以自遁又曰有則四者俱有其序自如此輔氏曰遮隔則必沈溺沈溺則必叛去叛去則必困屈四者亦相因則心之失也心存於中故以失言人之有言皆本於心其心明乎正理而無蔽然後其言平正通達而無病苟為不然則必有是四者之病矣輔氏曰此又言言之四病與心之四失表裏又相因也言心聲也故曰人之有言皆本於心蔽則心之初失也其心明乎正理而無蔽則陷離窮之三失皆無之矣永嘉陳氏曰辭之偏詖者由其心之蔽於理辭之淫放者由其心之陷於欲辭之邪僻者由其心之離於道辭之逃遁者由其心之窮屈於義理也即其言之病而知其心之失又知其害於政事之決然而不可易者如此非心通於道而無疑於天下之理其孰能之輔氏曰此言孟子之所以能知言也因其言之病而知其心之失是即其用而知其體也又知其害於政事之決然而不可易者如此是據其始而知其終也非心與理一其於天下之事如燭照數計略無所疑者何能如是哉不然則知其用者或不知其體見其始者或不見其終者有矣彼告子者不得於言而不肯求之於心至為義外之說則自不免於四者之病其何以知天下之言而無所疑哉輔氏曰此言告子之學離本末隳內外而不足以知夫道之實也既不能知天下之言而無所疑則所謂不動心殆亦冥然不覺悍然不顧而已矣程子曰心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也又曰孟子知言正如人在堂上方能辨堂下人曲直若猶未免雜於堂下衆人之中則不能辨決矣語録曰程子只言髙如衆人了便見得衆人與人一般低立在堂下如何辨得人長短問所謂在堂上者莫只是喻那心通於道者否曰此只是言見識髙似他方能辨他是非得失若見識與他一般如何解辨得他輔氏曰心通乎道謂心與理一則其於天下是非得失真如持權衡於此而輕重分毫之不差蓋不待求而知思而得也至於見識不超出於衆人之上則亦安能辨衆人之曲直邪非親到孟子地位則何能以是言之哉宰我子貢善為說辭冉牛閔子顔淵善言德行孔子兼之曰我於辭命則不能也然則夫子既聖矣乎行去聲此一節林氏以為皆公孫丑之問是也林氏名之竒三山人輔氏曰林氏之說當矣先儒皆有所不及者蓋惑於兩夫子字而然今以此夫子字為指孟子而言下假夫子字為指孔子而言然後明白無疑也說辭言語也德行得於心而見於行事者也三子善言德行者身有之故言之親切而有味也輔氏曰大凡非得於心體於身而貌言之其支離蔓衍離真失正者固不足論政使偶合於理則亦輕虛浮淺既無沈著痛快之意又無含蓄有餘之味不堪咀嚼不堪涵泳必矣惟冉閔顔三子者心得之身體之所以言之親切而有味可以涵泳而咀嚼兹其所以為善也公孫丑言數子各有所長而孔子兼之然猶自謂不能於辭命今孟子乃自謂我能知言又善養氣則是兼言語德行而有之輔氏曰知言則在我在人一也知其如此則於言語辭命何患其不能哉至於氣則必將見於行事況此章本為當大事不動心而言則夫養氣豈非德行乎然則豈不既聖矣乎此夫子指孟子也程子曰孔子自謂不能於辭命者欲使學者務本而已輔氏曰辭命在聖人豈有不能所以如此說者正欲教學者務本耳與論語所謂文莫吾猶人也躬行君子則吾未之有得同意曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭智也教不倦仁也仁且智夫子既聖矣夫聖孔子不居是何言也惡平聲夫聖之夫音扶惡驚歎辭也昔者以下孟子不敢當丑之言而引孔子子貢問答之辭以告之也此夫子指孔子也學不厭者智之所以自明教不倦者仁之所以及物再言是何言也以深拒之昔者竊聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微敢問所安此一節林氏亦以為皆公孫丑之問是也一體猶一肢也具體而微謂有其全體但未廣大耳或問六子之不同曰聖人之道大而能博門弟子不能遍觀而盡識也故學焉而各得其性之所近如游夏得其文學子張得其威儀皆一體也惟冉牛閔子顔淵氣質不偏理義完具故其默而識之不言而信者獨能具有聖人之全體但猶役於思勉滯於形迹未若聖人之大而化之無復限量之可言故以為具體而微爾輔氏曰孟子謂人之有是四體則一體猶一肢具體謂得其全體者宜也夫游夏以文學名子張以髙明稱是固各得聖人之一體矣至於冉閔顔子之德行則具有聖人之全體但養之未至充之未全故未極於廣大耳使其極於廣大則是固聖人天地之德也然此論亦未得為精細蓋冉閔顔子雖皆以德行稱然恐冉閔二子之所至終未及於顔子也至顔子之亞聖則與聖人相去特一間耳安處也公孫丑復問孟子既不敢比孔子則於此數子欲何所處也曰姑舍是舍上聲孟子言且置是者不欲以數子所至者自處也陵陽李氏問如集注之說則孟子猶有不足於顔子歟天台潘氏曰孟子之志願學孔子是誠有不足於顔子者蓋非不足於顔子以顔子不幸短命而未至於聖人之域耳前輩云才遜第一等事與别人做便是自暴自棄蓋古人之志大率如此然立志之後要須力行以酬其志不可徒有此志也愚謂學未至於聖人孟子之心終未慊也觀下文乃所願學孔子則可見矣曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也治去聲伯夷孤竹君之長子兄弟遜國避紂隱居聞文王之德而歸之及武王伐紂去而餓死伊尹有莘之處士湯聘而用之使之就桀桀不能用復歸於湯如是者五乃相湯而伐桀也三聖人事詳見此篇之末及萬章下篇伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也班齊等之貌公孫丑問而孟子答之以不同也輔氏曰自生民以來未有孔子則伯夷伊尹固不得與之齊等矣曰然則有同與曰有得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同與平聲朝音潮有言有同也以百里而王天下德之盛也行一不義殺一不辜而得天下有所不為心之正也聖人之所以為聖人其本根節目之大者惟在於此蔡氏曰此見孟子心通乎聖而羣聖人之心所以不約而同者惟在於此故集注以為根本節目之大者輔氏曰得百里之地而君之皆能以朝諸侯有天下非德之盛何以及此此即所謂本根之大者也行一不義殺一不辜而得天下不為非心得其正而不為外物所動者何以及此此即所謂節目之大者也本根之大不立固無以為節目之正節目之大不正則所謂本根者又豈能至於若是之盛哉於此不同則亦不足以為聖人矣曰敢問其所以異曰宰我子貢有若智足以知聖人汙不至阿其所好汙音蛙好去聲汙下也語録曰汙是汙下不平處或當時方言未可知當屬上文讀三子智足以知夫子之道假使汙下必不阿私所好而空譽之明其言之可信也輔氏曰智足以知聖人則其智識髙明矣阿私所好而空譽之則其識趣汙下矣髙明與汙下正相反髙明則必不至汙下矣反覆極言之以明三子之言必可信耳宰我曰以豫觀於夫子賢於堯舜逺矣程子曰語聖則不異事功則有異夫子賢於堯舜語事功也蓋堯舜治天下夫子又推其道以垂教萬世堯舜之道非得孔子則後世亦何所據哉輔氏曰語聖則不異以其德言也事功則有異就其所為事與成功而言也堯舜治天下夫子又推其道以垂教萬世此言事功久近之不同也堯舜之道非得孔子則後世亦何所據哉此言事功始終成就之不同也永嘉陳氏曰衣於斯食於斯寢且處於斯終身由而不自知夫子之功所以與天長地久雖堯舜不能與也又曰當時若無孔子今人連堯舜也不識子貢曰見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違也自生民以來未有夫子也言大凡見人之禮則可以知其政聞人之樂則可以知其德輔氏曰禮者政之本也見人之禮則知其政者遡其末而知其本也樂者德之發也聞人之樂而知其德者因其發而知其藴也大凡者泛言其理實如是也是以我從百世之後差等百世之王無有能遁其情者而見其皆莫若夫子之盛也輔氏曰惟其理之如是故我從百世之後以是等差百世之王其政之優劣德之髙下莫不盡見無有一人能遁其情而見其皆莫若夫子也有若曰豈惟民哉麒麟之於走獸鳯凰之於飛鳥太山之於丘垤河海之於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也垤大結反潦音老麒麟毛蟲之長愚案牝曰麒牡曰麟􅍪身牛尾一角不踐生草鳯凰羽蟲之長愚案雄曰鳯雌曰凰狀如鶴五色而文垤蟻封也行潦道上無源之水也出髙出也拔特起也萃聚也言自古聖人固皆異於衆人然未有如孔子之尤盛者也愚謂三子所論皆以事功言但宰我之所言者帝也子貢之所言者王也有若之所言者聖也此其為不同耳程子曰孟子此章擴前聖所未發學者所宜濳心而玩索也輔氏曰學者須是潛心玩索庶幾有得於心若泛然讀過則亦何能有益哉孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十里文王以百里力謂土地甲兵之力假仁者本無是心而借其事以為功者也霸若齊桓晉文是也輔氏曰力如今人之言事力也蓋生於己之所有而霸者之所有其大者則土地甲兵也假仁者謂己本無是仁心徒以其土地甲兵之力而借夫仁之一二事以圖彊霸之功如齊桓晉文也五霸獨以桓文言者舉其盛者也夫假仁者固不足道然有土地甲兵之力而不借仁以行之則雖霸者之功亦無由可致矣以德行仁則自吾之得於心者推之無適而非仁也輔氏曰德謂得於己而不失者也仁則性之所固有也自吾之得於己者推而行之則唯吾之所為生殺豫奪闔闢斂散自然無所往而非仁矣以力服人者非心服也力不贍也以德服人者中心恱而誠服也如七十子之服孔子也詩云自西自東自南自北無思不服此之謂也贍足也詩大雅文王有聲之篇王霸之心誠僞不同故人所以應之者其不同亦如此輔氏曰以力假仁者僞也假而行之終非己有非僞而何以德行仁者誠也所謂誠者成已者也已以僞感人以僞應己以誠感人以誠應如形聲影響之相隨蓋不容於有異也鄒氏曰以力服人者有意於服人而人不敢不服以德服人者無意於服人而人不能不服從古以來論王霸者多矣未有若此章之深切而著明也鄒氏名浩毗陵人輔氏曰鄒氏以有意無意釋力與德字最為簡要然其所謂無意者非如木石之無意者無期必之私意耳若夫正心修身之道則自有不可已者至謂自古論王霸未有如是之深切著明者亦為得之其視董子美玊碔砆之喻荀子隆禮尊賢重法愛民與夫曰粹曰駁諸說皆為優矣孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也惡去聲下同好榮惡辱人之常情然徒惡之而不去其得之之道不能免也輔氏曰本天理者常安榮徇人欲者常危辱固天理之自然也好榮而惡辱亦人情之同然也然心為之宰則以其情而順其理好榮而居仁惡辱而不居不仁者是也心苟不宰則肆其情而咈其理好榮而不居仁惡辱而居不仁者是也夫惡辱而居不仁其為得失是非甚易見也而情性之不治者每陷焉而不自知故以惡濕而居下者曉之夫惡濕而居下此又易見之甚而人未有不知避者故以是曉之而欲其省覺也夫惡辱者義之端也居不仁者不仁不智者之所為也不仁則不足以安其守不智則不足以決其行故徒知惡辱而終不能免辱也如惡之莫如貴德而尊士賢者在位能者在職國家閒暇及是時明其政刑雖大國必畏之矣閒音間此因其惡辱之情而進之以彊仁之事也輔氐曰彊仁者勇者之仁勉彊於行仁者也所謂安行利行之事亦自此而造耳貴德猶尚德也士則指其人而言之賢有德者使之在位則足以正君而善俗能有才者使之在職則足以修政而立事國家閒暇可以有為之時也詳味及字則惟日不足之意可見矣輔氏曰春秋傳曰及猶汲汲也及我欲之詳味此意則惟日不足之意可見矣詩云逮天之未隂雨徹彼桑土綢繆牖戶今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之徹直列反土音杜綢音稠繆武彪反詩豳風鴟梟之篇周公之所作也逮及也徹取也桑土桑根之皮也綢繆纒綿補葺也牖戶巢之通氣出入處也豫鳥自謂也言我之備患詳密如此今此在下之人或敢有侮豫者乎詩傳曰託為鳥言我及天未隂雨之時而往取桑根以纒綿巢之隙穴使之堅固以備隂雨之患則此下土之民誰敢有侮豫者周公以鳥之為巢如此比君之為國亦當思患而預防之孔子讀而贊之以為知道也輔氏曰鴟梟之詩則周公所作所謂安仁者之事而非彊仁者之所能也故孔子讀之以為知道知道則仁矣詳味思患預防之義則仁之理亦自可識非是心之存者能之乎真氏曰孟子引鴟梟之詩以為彼羽毛微類而能於未雨之時豫為之備若此今國家閒暇不能修明政刑顧乃玩細娛而忘大患可乎昔人有言燕雀處堂母子相安自以為樂也突如棟焚而母子恬然不知禍之將及是燕雀之智不及鴟梟逺矣為國者必能憂勤兢畏以圖安而不為般樂怠傲以自禍庶幾免於燕雀之譏乎今國家閒暇及是時般樂怠敖是自求禍也般音盤樂音洛敖音傲言其縱欲偷安亦惟日不足也輔氏曰縱欲則無緣得當乎理偷安則是私心之所為其為不仁甚矣禍福無不自己求之者結上文之意詩云永言配命自求多福太甲曰天作孽猶可違自作孽不可活此之謂也孽魚列反詩大雅文王之篇永長也言猶念也配合也命天命也此言福之自己求者太甲商書篇名孽禍也違避也活生也書作逭逭猶緩也此言禍之自己求者孟子曰尊賢使能俊傑在位則天下之士皆恱而願立於其朝矣朝音潮俊傑才德之異於衆者市㕓而不征法而不㕓則天下之商皆恱而願藏於其市矣㕓市宅也張子曰或賦其市地之㕓而不征其貨或治之以市官之法而不賦其㕓蓋逐末者多則㕓以抑之少則不必㕓也語録曰市㕓而不征謂使居市之㕓者各出㕓賦若干如今人賃鋪面相似更不征稅其所貨之物法而不㕓則但治之以市官之法而已雖㕓賦亦不取之也問古之為市者以其所有易其所無者有司者治之耳此是周禮市官之法否曰然如漢之獄市之類皆是古之遺制蓋自有一箇所在以為市其中自有許多事問此市在何處曰此都邑之市人君國都如井田樣畫為九區面朝背市左祖右社中間一區則君之宫室宫室前一區為外朝凡朝㑹藏庫之屬皆在焉後一區為市市四面有門每日市門開則商賈百物皆入焉賦其㕓者謂收其市地錢蓋逐末者多則賦其㕓以抑之少則不㕓但治以市官之法所以招徠之也市官之法如周禮司市平物價治爭訟譏察異服異言之類市中惟民乃得入凡公卿大夫有爵位者及士者皆不得入入則有罰左右各三區皆民所居而外朝一區左則宗廟右則社稷在焉此國君都邑規模之大槩輔氏曰此雖是張子以意度言之然觀孟子所論征商自此賤丈夫始之說則知先王之政必是如此關譏而不征則天下之旅皆恱而願出於其路矣解見前篇耕者助而不稅則天下之農皆恱而願耕於其野矣但使出力以助耕公田而不稅其私田也輔氏曰助而不稅則是用助法而不用貢法周之徹法通用二者㕓無夫里之布則天下之民皆恱而願為之氓矣氓音盲周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之使出一里二十五家之布民無常業者罰之使出一夫百𤱔之稅一家力役之征也語録曰問一里二十五家之布曰亦不可考又問民無常業者罰之如何罰得恁地重曰後世之法與此正相反農民賦稅丁錢却重而游手浮浪之民泰然都不管他輔氏曰先王之政宅不種桑麻與間民無職事者上之人皆有法以抑之此所以當其盛時民皆著業而無游手與甚貧困者所謂窮民不過鰥寡孤獨四者而已今戰國時一切取之市宅之民已賦其㕓又令出此夫里之布非先王之法也輔氏曰此則是末流之害縱人欲而滅天理者之所為也斯民何其不幸哉氓民也信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也呂氏曰奉行天命謂之天吏廢興存亡惟天所命不敢不從若湯武是也輔氏曰奉行天命則謂之天之吏廢興存亡惟天所命不敢不從者如栽培傾覆推亡固存者是也若湯武者湯武以征伐得天下其迹著故也要之聖人得位者皆能為之故曰無敵於天下者天吏也此章言能行王政則冦戎為父子不行王政則赤子為仇讎輔氏曰所以極言行王政與不行者之得失使後之人君知所警勵也孟子曰人皆有不忍人之心天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心也語録曰天地以生物為心譬如飯甑蒸飯從裏面蒸上到上面又下來只管在裏面滚便蒸得熟天地即是包得許多氣在這裏無出處滚一畨便生一畨物他别無可勾當只得生物不似得人便有許多應接所謂為心者如云天命豈是諄諄然命之所謂為心亦豈切切然做似磨子相似只是㑹磨出這物事又曰天包著地别無所作為只知生物而已亘古亘今生生不窮人物則得此生物之心以為心所以箇箇肖他本不須說以生物為心緣做箇語句難故著箇以生物為心又曰天地生物自是溫暖和煦這箇便是仁所以人物得之無不有慈愛惻怛之心又曰無天地生物之心則沒這身才有這血氣之身便具天地生物之心矣真氏曰天地造物無他作為惟以生物為事觀夫春夏秋冬往古來今生意周流何嘗一息間斷天地之心於此可見萬物之生既從天地生意中出故物物皆具此理何況人為最靈宜乎皆有不忍人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上言衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖人全體此心隨感而應故其所行無非不忍人之政也輔氏曰孟子言先王如此則便見得衆人不能如此集注又發明衆人之所以不能然之故與夫先王之所以能然之由使學者得以致知而力行也夫人皆有是不忍人之心惟學然後能知之衆人是指不知學者故言物欲害之存焉者寡所以不能察其端緒而推廣之於政事之間先王則指聖人也聖人更不言察識推廣之事但言全體此心隨感而應故其所行無非不忍人之政也此亦可見聖人之忠恕夫以不忍人之心行不忍人之政則體用兼備而天下雖大皆在吾性分之中治之固為近且易耳真氏曰人有是心而私欲間斷故不能達之於用惟聖人全體本心私欲不雜故有此仁心便有此仁政自然流出更無壅遏天下雖大運以此心而有餘矣所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也怵音黜內讀為納要平聲惡去聲下同乍猶忽也怵惕驚動貌惻傷之切也隱痛之深也此即所謂不忍人之心也語録曰惻是初頭子隱是痛輔氏曰怵然惕然皆是其心驚懼而念起之意緣其卒乍而見故其心有所驚懼而動也惻傷之切者謂傷之切於己也隱痛之深者謂痛之發於理也始也怵惕中也隱痛自淺而深也此皆所以名狀不忍人之心亦可謂善於形容者矣蔡氏曰惻者傷其失仁於外也隱者痛其失仁而不忍於中也內結要求聲名也語録曰是惡其被不救之名言乍見之時便有此心隨見而發非由此三者而然也語録曰方其乍見時也著手腳不得縱有許多私意未暇思量到但更遲霎時則了不得也程子曰滿腔子是惻隱之心文集曰腔子猶言軀殼耳滿腔子只是言充塞周遍本來如此又曰此是就人身上指出理充塞處最是親切若於此見得即萬物一體更無內外之别若見不得却去腔子外尋即莾莾蕩蕩無交涉矣語録曰腔子只是此心內虛處又曰滿腔子是只在這軀殼裏腔子乃洛中俗語又曰只是滿這軀殼都是惻隱之心才觸著便是這箇物事出來大感則大應小感則小應恰似大假痛傷固是痛只如針子略挑些血出也便痛故日用所當應接更無些少間隔癢痾疾痛莫不相關才是有些少不通處便是被些私意隔了又曰腔子身裏也言滿身裏皆惻隱之心在腔子裏亦只云心在身裏問心所發處不一便說惻隱如何曰惻隱之心渾身皆是無處不發如見赤子有惻隱之心見一蟻子亦豈無此心陵陽李氏謂腔子指人身言之天地之間充塞上下渾然生物之意無有空處人得此以為心則亦四體百骸充塞遍滿無非此惻隱之心觸處即是無有缺闕也黃氏曰極是謝氏曰人須是識其真心方乍見孺子入井之時其心怵惕乃真心也非思而得非勉而中天理之自然也內交要譽惡其聲而然即人欲之私矣輔氏曰謝氏要人識得此箇真心學者先識得此心然後有進步處非思而得非勉而中所以言天理自然之妙內交要譽惡其聲而然所以言人欲造作之私真氏曰孺子未有所知而將入於井乍見之者無閒賢愚皆有惻怛傷痛之心方其此心驟發之時非欲以此納交非欲以此干譽又非以避不仁之名也倉猝之間無安排無矯飾而天機自動此所謂真心也由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惡去聲下同羞恥己之不善也惡憎人之不善也辭解使去己也讓推以與人也是知其善而以為是也非知其惡而以為非也語録曰四端八箇字每字是一意惻是方惻然有此念起隱是惻然之後隱痛比惻為深羞者羞己之惡惡者惡人之惡辭者辭已之物讓者讓與他人是非自是兩樣分明但仁是總名若說仁義便如隂陽若說四端便如四時若分四端八字便如八節蔡氏曰羞者以其非義而耻之於內也惡者以其非義而憎之於外也辭者以其非禮而不受於已也讓者以其非禮而還之於人也是者以其善之未分而是之也非者以其惡之未分而非之也又曰每端兩字有內外人已之分惟是非一端則兩字皆在內而照乎外蓋仁義禮皆在內而外接乎物惟智則獨在內而外照乎物也人之所以為心不外乎是四者故因論惻隱而悉數之言人若無此則不得謂之人所以明其必有也黃氏曰暴虐狠鷙傷人害物則無復惻隱之心矣頑鈍嗜利寡亷鮮耻則無復羞惡之心矣驕淫矜誇傲很凌物則無復辭讓之心矣背善趨惡舍正習邪則無復是非之心矣如此則雖具人之形以生亦何以異於禽獸哉輔氏曰人之所以為心雖不外是四者然仁則又貫乎三者之中故此因論惻隱而悉數之也至於言人若無此心則非人也者所以明其必有而使人知反求之於己也真氏曰孟子始言惻隱之心至此則兼羞惡辭遜是非而言者蓋仁為衆善之長有惻隱則三者從之矣惻隱不存則三者亦何有哉又曰賦形為人孰無此心苟無此心則非人矣然所謂無者豈其固然哉私欲蔽塞而失其本真耳惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也惻隱羞惡辭讓是非情也仁義禮智性也文集曰性非有物只是一箇道理之在我者耳仁則是箇溫和慈愛砥道理義則是箇斷制裁割砥道理禮則是箇恭敬撙節砥道理智則是箇分别是非砥道理凡此四者具於人心乃是性之本體方其未發漠然無形象之可見及其發而為用則仁者為惻隱義者為羞惡禮者為辭遜智者為是非隨事發見各有苖脈不相殽亂所謂情也心統性情者也文集曰性為體情為用而心則貫之語録曰性是理之總名仁義禮智皆性中一理之名惻隱羞惡是非辭遜是情之所發之名其端所發甚微皆從此心出來性不是别有一箇物在心裏此心具此性情又曰性情與心固是一理然命之以心却似包著這性情在裏面又曰性是靜情是動心則兼動靜而言或指體或指用隨人所看又曰統猶兼也又曰性者心之理情者心之用心者性情之主又曰性對情言心對性情言合如此是性動處是情主宰是心大抵心與性似一而二似二而一此處最當體認又曰性情皆出於心故心能統之統如統兵之統言有以主之也又曰統是主宰如統百萬軍心是渾然砥物性是有此理情是動處又曰心主宰之謂也動靜皆主宰非是靜時無所用及至動時方有主宰也言主宰則混然體統自在其中心統攝性情非儱侗與性情為一物而不分别也又曰心之全體湛然虛明萬理具足無一毫私欲之間其流行該遍貫乎動靜而妙用又無不在焉故以其未發而全體者言之則性也以其已發而妙用者言之則情也然心統性情只就渾淪一物之中指其已發未發而為言爾非是性是一箇地頭情又是一箇地頭如此懸隔也又曰仁義禮智是心統性惻隱羞惡辭遜是非是心統情黃氏曰統字兼兩義有訓總字者有訓主字者非性情之外别有心只是總性情而謂之心心雖便是性情然又能為性情之主宰故兼此兩義而謂之統也陳氏曰惻隱羞惡等以情言仁義等以性言必又言心在其中者所以統性情而為之主也端緒也因其情之發而性之本然可得而見猶有物在中而緒見於外也文集曰謂之端者猶有物在中而不可見必因其端緒發見於外然後可得而尋也輔氏曰緒謂頭緒也因惻隱羞惡辭遜是非之情發而仁義禮智本然之性可得而見譬猶有物在中而其頭緒見於外也陳氏曰四端之說是就外面可見砥以驗其中之所有惟是裏面有是四者之體故四者端緒自然發見於外又曰四者端緒日用間常常發見只是人看理不明故茫然不知得蔡氏曰性不可見以其初發之端緒而見其性之本然永嘉陳氏曰端者端倪也物之緒也譬之繭絲外有一條緒便知得內有一團絲若其無絲在內則緒何由而見於外人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也四體四支人之所必有者也自謂不能者物欲蔽之耳輔氏曰人所必有應上明其必有之說物欲蔽之應上物欲害之之說凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母擴音廓擴推廣之意充滿也語録曰擴是脹開充是放滿又曰推是從這裏推將去如老吾老以及人之老幼吾幼以及人之幻到得充則填得來滿了如注水相似推是注下水去充則注得這一器滿了蓋仁義之性本自充塞天地若自家不能擴充則無緣得這箇殼子滿只是箇空殼子四端在我隨處發見知皆即此推廣而充滿其本然之量則其日新又新將有不能自己者矣語録曰此四者皆我所固有其初發時毫毛如也及推廣將去充滿其量則廣大無窮又曰此心之量本足以包括天地兼利萬物只是人自不能充滿其量所以推不去或能推之於一家而不能推之於一國或能推之於一國而不足以治天下此皆是未足以盡其本然之量又曰日新又新常常如此無間斷也能由此而遂充之則四海雖逺亦吾度內無難保者不能充之則雖事之至近而不能矣愚謂足以保四海極其逺而言之也不足以保妻子極其近而言之也此章所論人之性情心之體用本然全具而各有條理如此學者於此反求默識而擴充之則天之所以與我者可以無不盡矣黃氏曰仁義禮智心之體也惻隱羞惡辭遜是非心之用也人禀五行之氣以生有是氣則必有是理仁義禮智者木火金水之理也有是體則必有是用惻隱羞惡辭遜是非者仁義禮智之用也莫不有是氣則莫不有是理莫不有是體則莫不有是用此天之所以豫我而人之所以為人者也天下之人飢食而渴飲趨利而避害則知之矣至於天之豫我而人之所以為人者乃反不知焉何哉孟子憫斯人之愚而莫之覺也既啓以孺子入井之端又告之以火然泉達之始知是理而充之則足以保四海不充之則不足以事父母充不充之間而功用之遼絶乃如此其教人之意亦切矣輔氏曰反求默識者格物致知窮理之事也擴充之者誠意正心力行之事也既能窮理又能力行則天之所以豫我仁義禮智之性可以各各充滿其量而無遺憾矣前言日新又新將有不能自己所以言其推廣之意於其始也此言天之所與我者可以無不盡矣所以言充廣於其後之意也程子曰人皆有是心惟君子為能擴而充之不能然者皆自棄也然其充與不充亦在我而已矣輔氏曰程子之說乃為仁由己之意熟玩之自有以啓人進德之誠又曰四端不言信者既有誠心為四端則信在其中矣語録曰信是誠實此四者實有是仁實有是義與禮智皆然黃氏曰仁義禮智莫非實理之所為故四端不言信而信在其中矣永嘉陳氏曰信者實有此者也四端不得信則不成四端愚案四端之信猶五行之土無定位無成名無専氣而水火金木無不待是以生者故土於四行無不在於四時則寄王焉其理亦猶是也語録曰如五行之有土非土則不足以載四者又如土於四時各寄王十八日或謂王於戊己然季夏乃土之本宫故尤王於夏末月令載中央土者以此故也永嘉陳氏曰五行無土位位在四象之中五常無信位位在四端之中孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術不可不慎也函音含函甲也愚謂函之為義取其能包裏人身惻隱之心人皆有之是矢人之心本非不如函人之仁也巫者為人祈祝利人之生匠者作為棺槨利人之死孔子曰里仁為美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也焉於䖍反夫音扶里有仁厚之俗者猶以為美人擇所以自處而不於仁安得為智乎此孔子之言也仁義禮智皆天所與之良貴而仁者天地生物之心得之最先而兼統四者所謂元者善之長也故曰尊爵語録曰問如何是得之最先曰人先得那生砥道理所謂心生道也有是心斯具是形以生也又曰元亨利貞皆是善而元則為善之長亨利貞皆是那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出輔氏曰五性皆是天之賦與於人者故曰良貴謂天所豫我自然之貴也貴字正對爵字而言在人則為本心全體之德有天理自然之安無人欲陷溺之危人當常在其中而不可須臾離者也故曰安宅輔氏曰五性皆人心之德而仁則周貫乎四者之中故為本心全體之德天理有則而不流故有自然之安人欲橫流而無止故有陷溺之危克盡人欲純是天理方始是仁此所以有安而無危也人當常處其中而不可須臾離即所謂依於仁造次必於是顛沛必於是之意此聖門學者必以求仁為先務也又曰仁者天理之本然無人欲之阽危人當常居其中而不可有須臾之離故曰安宅此又孟子釋孔子之意以為仁道之大如此而自不為之豈非不智之甚乎輔氏曰莫之禦而不仁則是自不為之耳真氏曰仁者我所自有苟欲為之誰能止者乃甘心於不仁豈非不智乎故仁智二者常相須焉不仁斯不智矣不智斯不仁矣不仁不智無禮無義人役也人役而恥為役由弓人而恥為弓矢人而恥為矢也由與猶通以不仁故不智不智故不知禮義之所在輔氏曰不仁則頑然不覺不智則懵然無知故不仁則不智而下句只言不智者䝉上句故不必言也既頑然不覺又懵然無知則自然不知禮義之所在如恥之莫如為仁此亦因人愧恥之心而引之使志於仁也不言智禮義者仁該全體能為仁則三者在其中矣仁者如射射者正已而後發發而不中不怨勝己者反求諸己而巳矣中去聲為仁由己而由人乎哉孟子曰子路人告之以有過則喜喜其得聞而改之其勇於自修如此輔氏曰人受天地之中以生本自無過所以有過者非出於氣稟之偏則由乎物欲之誘人能知而改之則可以復於本然之善不知則其過愈深將陷溺焉而失其所以為人矣是豈可不懼哉人有告我以過我因得而改之以復於善則又豈可不以為喜乎然非子路之勇於自修則亦不能然也自修兩字雖出大學而集注於此下此二字極有意周子曰仲由喜聞過令名無窮焉今人有過不喜人規如諱疾而忌醫寧滅其身而無悟也噫周子名惇頤舂陵人程子曰子路人告之以有過則喜亦可謂百世之師矣輔氏曰周子是反說程子是順說亦可謂百世之師者一以言喜得聞其過而改之則必能全天之所以豫我者而階之以為聖為賢故可以為百世之師一以見能勇於自修如此者實難其人故可以為百世之師禹聞善言則拜書曰禹拜昌言蓋不待有過而能屈己以受天下之善也輔氏曰子路賢者也故不能無過但勇於自修是以喜於得聞而改之禹則聖人也其心純是天理本然之善故不待其有過但一聞善言則至誠屈己拜而受之大舜有大焉善與人同舍己從人樂取於人以為善舍上聲樂音洛言舜之所為又有大於禹與子路者善與人同公天下之善而不為私也輔氏曰舜禹雖皆是聖人然禹則學而知者舜則生而知者故亦不無大小之别禹聞善言則拜聞之者禹也言之者人也以我之聞聞彼之善拜以受之猶有人己之分也至於舜則善與人同耳善與人同者蓋善乃天下之公非人己所得而私者故曰公天下之善而不為私也己未善則無所係吝而舍己從人人有善則不待勉彊而取之於己此善與人同之目也或問善與人同曰善者天下之公理本無在己在人之别但人有身不能無私於已故有物我之分焉惟舜之心無一毫有我之私是以能公天下之善以為善而不知其孰為在己孰為在人所謂善與人同也舍己從人言其不先立己而虛心以聽乎天下之公蓋不知善之在己也樂取於人以為善言其見人之善則至誠樂取而行之於身蓋不知善之在人也此二者善與人同之目也然謂之舍己者特言其忘私順理而已非謂己有不善而舍之也謂之樂取者又以見其心與理一安而行之非有彊勉之意也此二句本一事特交互言之以見聖人之心表裏無閒如此耳輔氏曰此兩句乃是善與人同之條目凡人之情己有不善則必有係吝而不能舍以從人人之有善則雖欲勉彊而不能取之於己是皆不能以善為天下公共砥道理而各自以為私故唯大舜善與人同公天下之善而不為私故己或未善則無一毫係吝之私而脫然舍以從人人之有善則不用一毫勉彊之意而樂然取之於己如是則通天下唯善之同而初無在己在人之異也自耕稼陶漁以至為帝無非取於人者舜之側微耕于歷山愚案歷山在河東陶于河濱愚案濟隂定陶西南有陶丘亭漁于雷澤愚案雷夏兖州澤在濟隂取諸人以為善是與人為善者也故君子莫大乎與人為善與猶許也助也取彼之善而為之於我則彼益勸於為善矣是我助其為善也能使天下之人皆勸於為善君子之善孰大於此輔氏曰舜之取人以為善初未嘗有助人為善之意也孟子推說其事故以為取諸人以為善乃是助人之為善也因吾取人之善以為善而使天下之人皆勸於為善則是聖人成己成物之事故曰君子之善孰大於此此章言聖賢樂善之誠初無彼此之間故其在人者有以裕於己在己者有以及於人輔氏曰聖賢云者兼子路禹舜之事而言之也三人者雖有淺深之不同然其樂善之誠皆無彼此之間使子路而有彼此之間則於人告其有過之時未必不以為詆訐而惡之矣尚何喜之有哉惟有樂善之誠無彼此之間故在人之善有以裕於己無非取於人者是也在己之善有以及於人是與人為善者是也孟子曰伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄉人立其冠不正望望然去之若將浼焉是故諸侯雖有善其辭命而至者不受也不受也者是亦不屑就巳朝音潮惡惡上去聲下如字浼莫罪反塗泥也鄉人鄉里之常人也望望去而不顧之貌浼汚也屑趙氏曰潔也說文曰動作切切也不屑就言不以就之為潔而切切於是也語録曰潔猶美也苟以其辭命禮意之美而就之是切切於是也然伯夷雖有善其辭命而至者亦不肯就而況不道而無禮者固速去之矣世之所謂清者不就惡人耳若善辭令而來者固有時而就之惟伯夷不然此其所以為聖之清也栁下惠不屑之意亦然又曰動作切切只是不汲汲於就不汲汲於去屑字却是重輔氏曰如此解屑字方說得夷惠之意出先儒多解屑為輕者不盡其義也詩所謂不屑髢也者亦是此意巳語助辭栁下惠不羞汙君不卑小官進不隱賢必以其道遺佚而不怨厄窮而不憫故曰爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故由由然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已佚音逸袒音但裼音錫裸魯果反裎音程焉能之焉於䖍反栁下惠魯大夫展禽居栁下而諡惠也不隱賢不枉道也語録曰不隱賢謂不隱避其賢如己當亷却以利自汙己當勇却以怯自處之類乃是隱賢是枉道也問所以不解作不蔽賢謂其下文云必以其道若作不蔽賢說則下文不同矣曰然又曰進不隱賢便是必以其道人有所見不肯發出尚有所藏便是枉道又曰進不隱賢必以其道兩句相承只作一句讀遺佚放棄也厄困也憫憂也爾為爾至焉能浼我哉惠之言也袒裼露臂也裸裎露身也由由自得之貌偕並處也不自失不失其正也援而止之而止者言欲去而可留也孟子曰伯夷隘栁下惠不恭隘與不恭君子不由也隘狹窄也不恭簡慢也語録曰問不恭是處己如此是待人如此曰是待人如此蓋其玩世視他人如無也夷惠之行固皆造乎至極之地然既有所偏則不能無弊故不可由也語録曰夷隘惠不恭不必言效之而不至者其弊乃如此只二子所為己有此弊矣又曰以聖人顧二子則二子多有缺闕處才有缺闕處便有弊所以孟子直說他隘與不恭不曽究其末流如此如不念舊惡不以三公易其介固是清和好處然十分只救得一分救不得那九分清和之偏處了輔氏曰由清和而至於聖則是造乎至極之地也然其初不能無偏故其終不免有弊君子不由者謂於理有不可由也詳味二子之行則所謂窄狹與簡慢者見矣永嘉陳氏曰夷惠皆絶德而不合中庸故好處直是可學弊處却不當學孟子纂疏卷三
