body:
  text: 欽定四庫全書孟子纂疏卷六宋趙順孫撰朱子集注滕文公章句下凡十章陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉尺而直尋宜若可為也王去聲陳代孟子弟子也小謂小節也輔氏曰謂自局於小節也此正對下文所謂今一見之大則以王小則以霸而言之也言不見諸侯比小則以霸又為小也枉屈也直伸也八尺曰尋枉尺直尋猶屈己一見諸侯而可以致王霸所屈者小所伸者大也孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也如不待其招而往何哉喪去聲田獵也虞人守苑囿之吏也招大夫以旌招虞人以皮冠元首也志士固窮常念死無棺槨棄溝壑而不恨勇士輕生常念戰鬬而死喪其首而不顧也此二句乃孔子歎美虞人之言語録曰非其氣不餒如何強得夫虞人招之不以其物尚守死而不往況君子豈可不待其招而自往見之邪此以上告之以不可往見之意輔氏曰讀孟子須是就一章之中又斷置得如此分明方可玩索且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與夫音扶與平聲此以下正其所稱枉尺直尋之非夫所謂枉小而所伸者大則為之者計其利耳一有計利之心則雖枉多伸少而有利亦將為之邪甚言其不可也語録曰天下事不可顧利害凡人做事多要趨利避害不知才有利必有害吾雖處得十分利有害隨在背後不如且在理上求之且如臨難致死義也若不明其理而顧利害則見危死事者反不如偷生苟免之人輔氏曰人心不可二用喻於義則昧於利喻於利則昧於義義天理也利私欲也天理有則而不流人欲橫流而不止夫人一有計利之心則惟利是務方其始也猶有枉小直大之辨浸浸不巳殆其終也則併與小大皆不復計不至於滅天理而壞人紀不止也此孟子所以極其流而言之甚言其不可也昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乘謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十詩云不失其馳舍矢如破我不貫與小人乘請辭乘去聲強上聲女音汝汝為去聲舍上聲趙簡子晉大夫趙鞅也王良善御者也嬖奚簡子幸臣與之乘為之御也復之再乘也強而後可嬖奚不肯強之而後肯也一朝自晨至食時也掌專主也範法度也詭遇不正而與禽遇也言奚不善射以法馳驅則不獲廢法詭遇而後中也詩小雅車攻之篇言御者不失其馳驅之法而射者發矢皆中而力今嬖奚不能也貫習也御者且羞與射者比比而得禽獸雖若丘陵弗為也如枉道而從彼何也且子過矣枉巳者未有能直人者也比必二反比阿黨也若丘陵言多也或曰居今之世出處去就不必一一中節欲其一一中節則道不得行矣楊氏曰何其不自重也枉巳其能直人乎古之人寧道之不行而不輕其去就是以孔孟雖在春秋戰國之時而進必以正以至終不得行而死也使不恤其去就而可以行道孔孟當先為之矣孔孟豈不欲道之行哉輔氏曰楊氏只説何其不自重也一句便見得他是有諸已者凡人不知立已故不自重徇利忘義枉已從人無所不至唯君子明道正義知所重在已故寧道之不行而不輕其去就也其以孔孟為言者欲學者知所法也欲道之行者仁也進必以正者義也仁義並行而不悖此其所以為聖賢也景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄景春人姓名公孫衍張儀皆魏人怒則説諸侯使相攻伐故諸侯懼也輔氏曰儀衍二子皆破六國之從以為橫者也故或有觸其怒者則用其險譎之術交鬭六國之君使相攻伐故諸侯懼也若安居不出則天下熄然無事也孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也焉於虔反冠去聲女家之女音汝加冠於首曰冠女家夫家也婦人內夫家以嫁為歸也夫子夫也女子從人以順為正道也蓋言二子阿諛苟容竊取權𫝑乃妾婦順從之道耳黃氏曰衍儀戰國之遊士也一怒而諸侯懼安居而天下熄則其才亦有足稱者矣以其無學而不知道也一􅋀求順於人孟子以妾婦目之況於學不及古人才不及衍儀哉夫順於人者人之所喜也不順於人者人之所惡也然順於人者非有他也以其威福之權足以生殺榮辱乎我也即是心而充之則貪得嗜利背君賣國者皆若人也豈但妾婦之可羞而巳哉輔氏曰二子之説諸侯亦非能強其所不欲也不過阿諛苟容以逢其惡而順其意耳是乃妾婦順從之道也婦人之事夫唯當以順為正其或夫有過失亦當委曲巽順以開導之使得於義可也然亦或有強矯其夫而得正者要之非常道非丈夫之事也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫廣居仁也正位禮也大道義也語録曰大槩只是無些子偏曲且如此心廓然無一豪私意直與天地同量這箇便是居天下之廣居便是居仁到得自家立身更無些子不當於理這箇便是立天下之正位便是守禮及推而見於事更無些子不合於義這箇便是行天下之大道便是由義與民由之推其所得於人也獨行其道守其所得於巳也輔氏曰與民由之則是推巳之所得而與民共由之也獨行其道則是其道有不容推之於人故但守其道於一巳而巳守其道於巳則雖不得志而其道未嘗不行於巳也淫蕩其心也移變其節也屈挫其志也愚謂富貴則求得欲從故多致蕩其心貧賤則居約處困故多致變其節遇威武則又易致隕穫震懼故多挫攝其志氣何叔京曰戰國之時聖賢道否天下不復見其德業之盛但見姦巧之徒得志橫行氣焰可畏遂以為大丈夫不知由君子觀之是乃妾婦之道耳何足道哉叔京名鎬昭武人輔氏曰他説得當時風俗人情出謂聖賢道否天下不見其德業之盛者尤好使聖賢之道得行而人道立天道成地道平萬物各得其所則斯民也當安然自適於泰和之域豈復以是區區者為夸哉既不復見聖賢之德業宜乎以是姦巧之人得行其志氣焰可畏之為大丈夫也孟子力辨而深詆之其所以正人心之功大矣周霄問曰古之君子仕乎孟子曰仕傳曰孔子三月無君則皇皇如也出疆必載質公明儀曰古之人三月無君則弔傳直戀反質與贄同下同周霄魏人無君謂不得仕而事君也皇皇如有求而弗得之意出疆謂失位而去國也質所執以見人者如士則執雉也出疆載之者將以見所適國之君而事之也三月無君則弔不以急乎周霄問也以巳通太也後章放此曰士之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人𧖟繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎盛音成繅素刀反皿武永反禮曰諸侯為籍百畝冕而青紘躬秉耒以耕而庶人助以終畝收而藏之御廩以供宗廟之粢盛使世婦𧖟于公桑𧖟室奉繭以示于君遂獻于夫人夫人副褘受之繅三盆手遂布于三宫世婦使繅以為黼黻文章而服以祀先王先公輔氏曰此先王之制必如是然後能自盡其心至於不得奉祭祀則士不容以自安而人亦以為弔焉古人之重祭祀也如此又曰士有田則祭無田則薦黍稷曰粢在器曰盛牲殺牲必特殺也皿所以覆器者出疆必載質何也周霄問也曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉為去聲舍上聲曰晉國亦仕國也未嘗聞仕如此其急仕如此其急也君子之難仕何也曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道不由其道而往者與鑽穴隙之類也為去聲妁音酌隙去逆反惡去聲晉國解見首篇仕國謂君子遊宦之國霄意以孟子不見諸侯為難仕故先問古之君子仕否然後言此以風􅋀之也輔氏曰周霄亦頗有䇿士之風但孟子據道之極不為其所動但直述其義理以告之而已男以女為室女以男為家妁亦媒也言為父母者非不願其男女之有室家而亦惡其不由道蓋君子雖不潔身以亂倫而亦不徇利而忘義也輔氏曰士之仕猶男女之願有室家者此正理也至於為人男女而不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之為士而仕者不循天理之正不俟人君之招屈巳以徇利枉道以求君則為聖賢之學者皆賤之直與兒女子相窺相從者無異故君子之於仕未嘗潔身以亂倫而長往不顧亦未嘗徇利忘義而屈道以信身也彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎更平聲乘從皆去聲傳直戀反簞音丹食音嗣彭更孟子弟子也泰侈也曰否士無事而食不可也言不以舜為泰但謂今之士無功而食人之食則不可也愚謂彭更之意不以舜為泰蓋以士之無事固不可虛食也曰子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子於此有人焉入則孝出則悌守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉羡延面反通功易事謂通人之功而交易其事羡餘也有餘言無所貿易而積於無用也梓人匠人木工也輪人輿人車工也曰梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與曰子何以其志為哉其有功於子可食而食之矣且子食志乎食功乎曰食志與平聲可食而食食志食功之食皆音嗣下同孟子言自我而言固不求食自彼而言凡有功者則當食之曰有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也墁武安反子食之食亦音嗣墁牆壁之飾也毁瓦畫墁言無功而有害也既曰食功則以士為無事而食者真尊梓匠輪輿而輕為仁義者矣輔氏曰彭更至此其辨巳窮不復有説則既以為食功矣以為食功則以士為無事而食者是真尊梓匠輪輿以為有事而可與之食輕為仁義者以為無事而不可與之食矣萬章問曰宋小國也今將行王政齊楚惡而伐之則如之何惡去聲萬章孟子弟子宋王偃嘗滅滕伐薛敗齊楚魏之兵欲霸天下疑即此時也孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀曰無以供犧牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何為不祀曰無以供粢盛也湯使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也遺唯季反盛音成往為之為去聲饋食酒食之食音嗣要平聲餉式亮反葛國名愚案葛國在梁國寧陵縣伯爵也放而不祀放縱無道不祀先祖也亳衆湯之民其民葛民也授與也餉亦饋也書商書仲虺之誥也仇餉言與餉者為仇也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讎也為去聲非富天下言湯之心非以天下為富而欲得之也或問湯為童子復讎而四海之內皆知其非富天下何也曰聖人之心廓然大公表裏洞達故一有所為則天下信之如雨暘寒著無不感無不通也湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北狄怨曰奚為後我民之望之若大旱之望雨也歸市者弗止藝者不變誅其君弔其民如時雨降民大恱書曰徯我后后來其無罰載亦始也十一征所征十一國也餘巳見前篇有攸不為臣東征綏厥士女匪厥玄黃紹我周王見休惟臣附于大邑周其君子實玄黃于匪以迎其君子其小人簞食壺漿以迎其小人救民於水火之中取其殘而巳矣食音嗣案周書武成篇載武王之言孟子約其文如此然其辭特與今書文不類今姑依此文解之有所不為臣謂助紂為惡而不為周臣者匪與篚同玄黃幣也紹繼也猶言事也言其士女以匪盛玄黃之幣迎武王而事之也商人而曰我周王猶商書所謂我后也休美也言武王能順天休命而事之者皆見休也臣附歸服也孟子又釋其意言商人聞周師之來各以其類相迎者以武王能救民於水火之中取其殘民者誅之而不為暴虐耳君子謂在位之人小人謂細民也太誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光太誓周書也今書文亦小異言武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之功因以張大比於湯之伐桀又有光焉引此以證上文取其殘之義不行王政云爾苟行王政四海之內皆舉首而望之欲以為君齊楚雖大何畏焉宋實不能行王政後果為齊所滅王偃走死尹氏曰為國者能自治而得民心則天下皆將歸往之恨其征伐之不早也尚何強國之足畏哉苟不自治而以強弱之𫝑言之是可畏而巳矣輔氏曰尹氏説盡後世為國而不自強但以強大為畏者之病誠能反是道而求之於巳則知仁者之果無敵而帝王之道是誠在我而巳孟子謂戴不勝曰子欲子之王之善與我明告子有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得矣與平聲咻音休戴不勝宋臣也齊語齊人語也傅教也咻歡也齊齊語也莊嶽齊街里名也楚楚語也此先設譬以曉之也子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也王誰與為不善在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何長上聲居州亦宋人言小人衆而君子獨無以成正君之功輔氏曰古之大臣欲正其君者豈特取辦於一人一巳而巳哉必也兼收並蓄旁求廣取使忠賢之士畢集于朝在君之左右前後者無非正人端士然後可以薰陶漸染以變化其氣質成就其德性是豈獨欲趨事赴功而巳哉置一小人於其間則便足以惑其君而敗其類況於長幼卑尊皆非君子而獨欲以一薛居州使王為善豈可得哉公孫丑問曰不見諸侯何義孟子曰古者不為臣不見不為臣謂未仕於其國者也此不見諸侯之義也段干木踰垣而辟之泄栁閉門而不內是皆巳甚迫斯可以見矣辟去聲內與納同段干木魏文侯時人泄栁魯繆公時人文侯繆公欲見此二人而二人不肯見之蓋未為臣也巳甚過甚也迫謂求見之􅋀也輔氏曰士固當守義而不可輕往見君至於文侯繆公屈巳求見其意巳􅋀雖能聽用與否未可知聖賢於此則必見之矣至於踰垣閉戶則不成舉措亦為過甚而非義矣陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽貨瞰孔子之亡也而饋孔子蒸豚孔子亦瞰其亡也而往拜之當是時陽貨先豈得不見欲見之見音現惡去聲瞰音勘此又引孔子之事以明可見之節也欲見孔子欲召孔子來見巳也惡無禮畏人以巳為無禮也受於其家對使人拜受於家也其門大夫之門也瞰窺也陽貨於魯為大夫孔子為士故以此物及其不在而饋之欲其來拜而見之也先謂先來加禮也輔氏曰陽貨欲見孔子而惡無禮雖小人秉彞不可殄貨既先來加禮於巳則巳烏得而不答之然貨之意則非誠矣故但往答其禮而不欲見其人是亦不屑之教誨也天地之施與萬物者豈有差忒哉曽子曰脅肩諂笑病于夏畦子路曰未同而言觀其色赧赧然非由之所知也由是觀之則君子之所養可知巳矣脅虛業反赧奴簡反脅肩竦體諂笑強笑皆小人側媚之態也愚謂竦體者竦縮其身強笑者強容而笑病勞也夏畦夏月治畦之人也言為此者其勞過於夏畦之人也愚謂治畦灌園也未同而言與人未合而強與之言也赧赧慙而面赤之貌由子路名言非巳所知甚惡之之辭也孟子言由此二言觀之則二子之所養可知必不肯不俟其禮之至而輒往見之也輔氏曰曽子厚重篤實故視小人側媚之態如病于夏畦之人而深憐之子路剛果勇決故以未同而言赧赧其色者為非巳所知而深惡之知猶不知況為之乎此子路守巳之嚴而惡不仁之誠也二子所守如此雖各因其資質然亦是學力所就也又曰言心聲也觀二子之言而知其所憐所惡者如此則二子所養決不肯枉道以徇人者可知矣此章言聖人禮義之中正過之者傷於迫切而不洪不及者淪於汚賤而可恥輔氏曰孔子之事禮義之中正也差以豪氂則失之矣干木泄栁則過乎禮義之中正矣故傷於迫切而不洪曽子子路之所言則不及乎禮義之中止者故淪於汚穢而可恥此君子之行巳所以戰戰兢兢而唯恐有過不及之失也然與其汚賤之可恥寧失於迫切而不洪段干泄栁猶為狷者也戴盈之曰什一去關市之征今兹未能請輕之以待來年然後巳何如去上聲盈之亦宋大夫也什一井田之法也關市之征商賈之稅也巳止也孟子曰今有人日攘其鄰之雞者或告之曰是非君子之道曰請損之月攘一雞以待來年然後巳攘如羊反攘物自來而取之也輔氏曰因物自來而掩取之則非盜竊者之比若盜竊之為則又大不可也損減也如知其非義斯速巳矣何待來年知義理之不可而不能速改與月攘一雞何以異哉輔氏曰天下事只有義利兩端才出義便以利言也焉有兩存之理若知義理之不可而猶有吝惜之意不肯速改則亦終歸於悠悠必不能自拔而日新矣公都子曰外人皆稱夫子好辨敢問何也孟子曰豫豈好辨哉豫不得巳也好去聲下同天下之生久矣一治一亂治去聲生謂生民也一治一亂氣化盛衰人事得失反覆相尋理之常也輔氏曰觀孟子説天下之生久矣一治一亂便見他胸中包括得宇宙過先言氣化後言人事者氣化有盛衰然後人事有得失此理之常也然亦有氣化衰而人事之得可以轉移氣化而使之常盛者亦有氣化盛而人事之失有以戕敗氣化而使之遽衰者此理之變也蓋氣化無欲而有理故盛則必衰衰則必盛猶晝夜反覆之相尋人則有理有欲順乎理則事得從乎欲則事失其得失雖亦反覆相尋然人欲不行而唯理是順則其事常得而無失可併與氣化而轉移之若堯舜與賢之事是也若肆人欲以滅天理則雖氣化之盛亦可以戕賊之使遽衰三苗弗格于有虞之世三監弗靖於成周之時而漢唐之世一再傳之後遽有吕武之禍皆是也向非舜禹周公之聖及漢庭之賢佐有以平之則豈不至於衰敗乎集注則但言其理之常者耳當堯之時水逆行汜濫于中國蛇龍居之民無所定下者為巢上者為營窟書曰洚水警余洚水者洪水也洚音降又胡貢胡工二反水逆行下流壅塞故水倒流而旁溢也下下地上髙地也營窟穴處也書虞書大禹謨也洚水洚洞無涯之水也警戒也此一亂也輔氏曰此一亂純由乎氣化也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之菹側魚反掘地掘去壅塞也菹澤生草者也地中兩涯之間也險阻謂水之汜濫也逺去也消除也此一治也輔氏曰此一治氣化人事相參者也夫人與鳥獸亦相為多寡蓋同稟於氣故也繁氣盛則正氣衰正氣多則繁氣少聖人於其間有造化之用亦時焉而巳堯舜既沒聖人之道衰暴君代作壞宫室以為汙池民無所安息棄田以為園囿使民不得衣食邪説暴行又作園囿汙池沛澤多而禽獸至及紂之身天下又大亂壞音怪行去聲下同沛蒲內反暴君謂夏太康孔甲履癸商武乙之類也宫室民居也沛草木之所生也澤水所鍾也自堯舜沒至此治亂非一及紂而又一大亂也輔氏曰此一亂氣化人事相符者也自堯舜沒其中夏太康孔甲履癸商武乙等暴君不一難以屢數至紂則大敗極亂而無以復加矣故直推至紂時言之想見夏桀之時亦未必有飛廉等惡人與夫虎豹犀象之害也周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國者五十驅虎豹犀象而逺之天下大悅書曰丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正無缺相去聲奄平聲奄東方之國助紂為虐者也愚案奄國在淮夷之北飛廉紂幸臣也愚案飛廉善走以材力事紂周武王伐紂并殺之五十國皆紂黨虐民者也書周書君牙之篇丕大也顯明也謨謀也承繼也烈光也佑助也啓開也缺壞也此一治也輔氏曰此一治又氣化人事相參者也舉書之説者此言文王武王謀謨之大功業之光所以佑助開迪夫後人者莫非大正之道周全盡美而無有一豪壞缺之失也蓋正可為也無缺為難無缺謂禮樂刑政四逹而不悖三千三百之儀與至誠無倚之道並立而不偏凡所以正德利用厚生之具無一之不備防偽禁邪正慝之法無一之或隳夫然後可以為無缺至戰國時則道墜于地而無復有存者矣世衰道微邪説暴行有作臣弒其君者有之子弒其父者有之有作之有讀為又古字通此周室東遷之後又一亂也輔氏曰此一亂又氣化人事相符者也前乎此者雖曰世亂然但禽獸繁殖有以戕民之生而猶未至賊人之性至此以後則遂至傷壞人倫將使斯人盡為禽獸之歸其禍又慘矣此一亂又甚於前日是亦氣化人事之使然也孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎胡氏曰仲尼作春秋以寓王法惇典庸禮命德討罪其大要皆天子之事也知孔子者謂此書之作遏人欲於橫流存天理於既滅為後世慮至深逺也罪孔子者以謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣胡氏名安國建安人永嘉陳氏曰此謂聖人以王法繩諸侯所褒所貶皆是奉行王法既空言以寓行事與天子無異此聖人大用非孟子不能知胡氏發明備矣愚謂孔子作春秋以討亂賊則致治之法垂於萬世是亦一治也語録曰問孔子作春秋特載之空言亂臣賊子何緣便懼恐未足以為春秋之一治曰非説當時便一治只是存得箇治法使道理光明粲爛有能舉而行之為治不難當時史書掌於史官想人不得見及孔子取而筆削之而其義大明如今之史書直書其事善惡瞭然在日觀者知所懲勸故亂臣賊子有所懼而不敢犯爾輔氏曰此一治又純乎人事者也雖氣化不應而不使夫子得位以撥亂而反之正然作春秋以討亂賊垂致治之法于萬世之下則其功又大於舜禹矣聖王不作諸侯放恣處士橫議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也楊墨之道不息孔子之道不著是邪説誣民充塞仁義也仁義充塞則率獸食人人將相食橫為皆去聲莩皮表反楊朱但知愛身而不復知有致身之義故無君墨子愛無差等而視其至親無異衆人故無父無父無君則人道滅絶是亦禽獸而巳公明儀之言義見首篇充塞仁義謂邪説遍滿妨於仁義也孟子引儀之言以明楊墨道行則人皆無父無君以陷於禽獸而大亂將起是亦率獸食人而人又相食也此又一亂也語録曰楊墨只是差些子其末流遂至於無父無君蓋楊氏見世間人營營於名利埋沒其身而不自知故獨潔其身以自髙如荷蕢接輿之徒是也然使人皆如此潔身而自髙則天下事教誰理會此便是無君也墨氏見世間人自私自利不能及人故欲兼天下之人而盡愛之然不知或有一患難在君親則當先救之在他人則後救之若君親與他人不分先後則是待君親猶他人也此便是無父此二者之所以為禽獸也問率獸食人亦深究其弊而極言之非真有此事也曰不然即他之道便能如此楊氏是箇退步愛身不理會事砥人墨氏兼愛又弄得沒合殺使天下倀倀然必至於夫亂而後巳非率獸食人而何輔氏曰此一亂又氣化人事相符者也聖人之道非不愛身也然有致身事君之義有殺身成仁之時故不至於無君非不愛物也然親親而仁民仁民而愛物有自然之序故不至於無父無君無父則人道滅絶又將視弒父與君而冥然不覺矣是則人而反與禽獸無異也故引公明儀之説以言楊墨遂行則人皆無父無君安為亂賊以陷於禽獸而大亂將起是以與公明儀所謂率獸食人人將相食者類矣楊墨之道不息則邪説誣民孔子之道不著則充塞仁義也此四句只是説天理人欲不並立而巳所謂邪説遍滿妨於仁義者是解邪説誣民充塞仁義兩句也以遍滿字解充字以妨字解塞字但不曾解誣民兩字耳其實謂邪説誣罔天下之人其勢至於充盛窒塞人心固有之仁義使不能發也夫仁義具於人心而為邪説所誣而充塞之使不得逹於外況能廣充之以全其量乎嗚呼人之始生也既有氣稟之拘其少長也又有物欲之蔽其既長也又有異端邪説之誣不有聖賢之教左右扶翼之則幾何而能有所立於世哉吾為此懼間先聖之道距楊墨放淫辭邪説者不得作作於其心害於其事作於其事害於其政聖人復起不易吾言矣為去聲復扶又反間衛也放驅而逺之也作起也事所行政大體也真氏曰事者政之目政者事之綱孟子雖不得志於時然楊墨之害自是滅息而君臣父子之道賴以不墜是亦一治也輔氏曰此一治又純乎人事也故氣化不應而孟子亦不得志於時然因其言而楊墨之説滅息君臣父子之道至今得以不墜此孟子之功所以不在禹下而亞於孔子也程子曰楊墨之害甚於申韓佛氏之害甚於楊墨蓋楊氏為我疑於義墨氏兼愛疑於仁申韓則淺陋易見故孟子止闢楊墨為其惑世之甚也佛氏之言近理又非楊墨之比所以為害尤甚語録曰問墨氏兼愛疑於仁此易見楊氏為我何以疑於義曰楊朱看來不似義他全是老子之學只是箇逍遙物外僅足其身不屑世務之人只是他自愛其身界限齊整不相侵越微似義耳然終不似也又曰楊墨只是硬恁地做佛氏最有精微動得人處本朝許多極好人無不陷焉真氏曰義者任理而無情楊朱自一身之外截然弗恤故其迹似乎義仁者尚恩而主愛墨翟於親踈之間無乎不愛故其迹似乎仁殊不知天下之理本一而分則殊故君子親親而仁民仁民而愛物心無不溥而其施有序心無不溥則非為我矣其施有序則非兼愛矣楊朱專於為我則昧乎理之一墨翟一於兼愛則昧乎分之殊若是而曰仁義乃所以賊乎仁義也昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼抑止也兼并之也總結上文也真氏曰三聖事雖不同而其救天下之患立生民之極則一詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也説見上篇承當也我亦欲正人心息邪説距詖行放淫辭以承三聖者豈好辨哉豫不得巳也行好皆去聲詖淫解見前篇辭者説之詳也承繼也三聖禹周公孔子也蓋邪説橫流壞人心術甚於洪水猛獸之災慘於夷狄篡弒之禍故孟子深懼而力救之輔氏曰洪水猛獸害人之身夷狄篡弒賊人之性害人之身或專出於氣化故曰災賊人之性則實出於人為故曰禍然人而為夷狄之行篡弒之事者但自賊夫巳之性耳至於邪説橫流不能救止則天下之心皆為之蠱壞將胥而為夷狄禽獸之歸矣此其所以為害愈慘宜乎孟子之深排力詆而不少置也再言豈好辨哉豫不得巳也所以深致意焉輔氏曰重言此以深致其意者欲人之察其心而知邪説之真可畏也然非知道之君子孰能真知其所以不得巳之故哉輔氏曰知道者備人物於一身通古今於一息故知邪説之言特為深切而真有不得而不救之者也學者苟能考三聖之心味孟子之説詳朱子之注則非徒能真知其所以不得巳之故亦將併與斯道而得之矣人徒見孟子為一匹夫耳而不知其所憂者如是之大所任者如是之重也且厯代聖人之所為皆不得巳而為之者也得巳則聖人將無所為矣豈獨孟子之辨哉能言距楊墨者聖人之徒也言茍有能為此距楊墨之説者則其所趨正矣雖未必知道是亦聖人之徒也輔氏曰謂自今以後不待有知道者真能息滅楊墨之害然後可以繼聖人之事但能為説以距則是亦聖人之徒矣此可見孟子自任之重而望人之切也真氏曰所以勉天下學者皆以闢異端扶正道為心庶幾生人之類不淪胥於禽獸也孟子既答公都子之問而意有未盡故復言此蓋邪説害正人人得而攻之不必聖賢如春秋之法亂臣賊子人人得而討之不必士師也輔氏曰此義自朱子發之若朱子則真可謂以是道自任者故言此以詔天下使天下人人存是心則異端之説將無所容而聖人之道不復有蔽蝕之者矣豈小補哉聖人救世立法之意其切如此若以此意推之則不能攻討而又唱為不必攻討之説者其為邪詖之徒亂賊之黨可知矣尹氏曰學者於是非之原豪氂有差則害流於生民禍及於後世故孟子辨邪説如是之嚴而自以為承三聖之功也當是時方且以好辨目之是以常人之心而度聖賢之心也輔氏曰尹氏所謂害流於生民禍及於後世者其亦真知孟子不得巳之故矣匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見於音烏下於陵同螬音曹咽音宴匡章陳仲子皆齊人廉有分辨不苟取也於陵地名螬蠐螬蟲也匍匐言無力不能行也咽吞也孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能廉充仲子之操則蚓而後可者也擘薄厄反惡平聲蚓音引巨擘大指也言齊人中有仲子如衆小指中有大指也輔氏曰齊俗奢侈放縱當戰國時士之傷廉者必多有之此匡章之所以推仲子之廉而孟子亦以為齊人之巨擘也其語意與子誠齊人也者相似充推而滿之也操所守也蚓丘蚓也言仲子未得為廉也必若滿其所守之志則惟丘蚓之無求於世然後可以為廉耳夫蚓上食稿壤下飲黃泉仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也夫音扶與平聲稿壤乾土也黃泉濁水也抑發語辭也言蚓無求於人而自足而仲子未免居室食粟若所從來或有非義則是未能如蚓之廉也曰是何傷哉彼身織屨妻辟纑以易之也辟音璧纑音盧辟績也纑練麻也曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝者巳頻顣曰惡用是鶂鶂者為哉他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之蓋音閣辟音避頻與顰同顣與蹙同子六反惡平聲鶂魚一反哇音蛙世家世卿之家兄名戴食采於蓋其入萬鍾也歸自於陵歸也巳仲子也鶂鶂鵝聲也頻顣而言以其兄受饋為不義也哇吐之也以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也言仲子以母之食兄之室為不義而不食不居其操守如此至於妻所易之粟於陵所居之室既未必伯夷之所為則亦不義之類耳今仲子於此則不食不居於彼則食之居之豈為能充滿其操守之類者乎必其無求自足如丘蚓然乃為能滿其志而得為廉耳然豈人之所可為哉輔氏曰以仲子之孤介自守足以髙於一世之俗矣而孟子所以力闢之者蓋世衰道微學者大抵因其資質之偏而固執一説力行以取名初不顧義理之如何如告子不得於言勿求於心以至許行陳仲子之徒皆是物也況如匡章者既巳稱仲子為誠廉而傾向之矣此固以道自任者之所憂也則孟子烏得而不與之辨哉又曰仲子之所守不必驗之他人也只自其身而推之則巳有不能自滿其志者故孟子直以為蚓而後能充其操焉者斥之則仲子之行是豈人之所能為哉非人之所能為則是邪説詖行又豈可不深辨而力攻之邪又曰聖賢之道充之則至於與天地同功仲子之道充之則至於與丘蚓同操是豈人理也哉范氏曰天之所生地之所養惟人為大人之所以為大者以其有人倫也仲子避兄離母無親戚君臣上下是無人倫也豈有無人倫而可以為廉哉輔氏曰人倫天彞也人唯有人倫然後可以與天地並立而為三此其所以為大也避兄離母則是無人倫矣雖有小廉僻行適足以夸於亂世而惑夫人心也可不謹哉可不畏哉孟子纂疏卷六
