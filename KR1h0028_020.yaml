body:
  text: 欽定四庫全書孟子纂疏卷七宋趙順孫撰朱子集註離婁章句上凡二十八章孟子曰離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下離婁古之明目者愚案離婁黄帝時人能視於百步之外見秋毫之末公輸子名班魯之巧人也愚案班一作般天下之巧工嘗作雲梯之械以攻城規所以為員之器也矩所以為方之器也愚案規者所以規圜器械令得其𩔖也矩者所以矩方器械令不失其形也師曠晉之樂師知音者也愚案師曠字子野晉平公之樂太師也其聽至聰平公鑄鍾使工聽之皆以為調師曠曰後世有知音者將知不調臣竊為恥之至師㳙果知音之不調六律截竹為筩隂陽各六愚案黄帝使伶倫自大夏之西崑崙之隂取竹於解谷以生空竅厚大均者斷兩節間而吹之以為黄鍾之宫制十二筩比黄鍾之宫而皆可以生之是為律本陽六為律隂六為吕言六律不言六吕者陽統隂也以節五音之上下語録曰人聲自有髙下聖人制五聲以括之又制十二律以節五聲中又各有髙下每聲又分十二等所謂律和聲也黄鍾太蔟姑洗蕤賔夷則無射為陽大吕夾鍾仲吕林鍾南吕應鍾為隂也語録曰樂律自黄鍾至仲吕皆屬陽自蕤賔至應鍾皆屬隂此是一箇大隂陽黄鍾為陽大吕為隂太蔟為陽夾鍾為隂每一陽間一隂又是一箇小隂陽五音宫商角徴羽也愚案五音始於宫宫數八十一商數七十二角數六十四徵數五十四羽數四十八以數之多少為尊卑故曰宫商角徴羽范氏曰此言治天下不可無法度仁政者治天下之法度也今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也聞去聲仁心愛人之心也仁聞者有愛人之聲聞於人也先王之道仁政是也或問孟子告齊宣王曰是心足以王矣則仁心者固王政之本也今曰有仁心仁聞而不行先王之道則是所謂仁心者初不足恃而所謂先王之道者又在此心之外也曰是心足以王者言有是心而能擴充之以行先王之道如其篇末所論制民之産云者可以王耳非謂専恃此心而直可以王也先王之道固亦由是而推之以為法耳但其盡心知性而無私意小智之累故其為法也盡天理合人心雖聖人復起而有所不能易者後之人君當以吾心而廣之以盡夫法制之善而充吾心之固有者非謂心外有法而俟於它求也後人雖有是心而不能無私意小智之累苟不循是而之焉則雖有仁心仁聞而未免於徇私妄作之失譬之蔑弃規矩而欲以手制方員其器之不至於苦窳也㡬希矣范氏曰齊宣王不忍一牛之死以羊易之可謂有仁心梁武帝終日一食蔬素宗廟以麫為犧牲斷死刑必為之涕泣天下知其慈仁可謂有仁聞然而宣王之時齊國不治武帝之末江南大亂其故何哉有仁心仁聞而不行先王之道故也輔氏曰引齊宣王梁武帝為有仁心仁聞之證甚當然論二君不能行先王之道則同若論其所以不能行之故則異宣王不學無術奪於功利而不能行先王之道者也武帝則惑於異端避罪要福而不肯行先王之道者也宣王有仁心而不能保武帝有仁聞而非其真故曰徒善不足以為政徒法不能以自行徒猶空也有其心無其政是謂徒善有其政無其心是謂徒法程子嘗言為政須要有綱紀文章謹權審量讀法平價皆不可闕而又曰必有闗雎麟趾之意然後可以行周官之法度正謂此也語録曰所謂文章者便是文飾那謹權審量讀法平價之類耳又曰須是自閨門袵席之微積累到薰蒸洋溢天下無一不被其化然後可以行周官之法度不然則為王莽矣輔氏曰引程子前一說所以證徒善不足以為政後一說所以證徒法不能以自行政須要詳備心須要誠實後世如漢文帝近於徒善如漢武帝近於徒法詩云不愆不忘率由舊章遵先王之法而過者未之有也詩大雅假樂之篇愆過也率循也章典法也詩傳曰先王之禮樂刑政也所行不過差不遺忘者以其循用舊典故也輔氏曰過差謂用意過當處遺忘謂照顧不及處遵用舊典則有所循故不過差有所據故不遺忘聖人既竭目力焉繼之以規矩準繩以為方員平直不可勝用也既竭耳力焉繼之以六律正五音不可勝用也既竭心思焉繼之以不忍人之政而仁覆天下矣準所以為平繩所以為直愚謂準者所以揆平取正也繩者上下端直經緯四通也覆被也此言古之聖人既竭耳目心思之力然猶以為未足以徧天下及後世故制為法度以繼續之則其用不窮而仁之所被者廣矣輔氏曰規矩準繩所以為方員平直之法度也六律六吕所以正五音之法度也不忍人之政所以仁覆天下之法度也不為之法度則聖人之耳目心思止於聖人之身而巳固不能徧天下與後世也故聖人制為法度以繼續之使天下後世之為方員平直正五音仁天下者皆用是而不得違之所謂不可勝用而仁覆天下也止言覆天下而不言及後世者舉大以該逺也能覆天下則能及後世矣百工之事皆聖人作故規矩準繩六律五音并與不忍人之政作一統說了耳日言力心言思者耳目之視聽以力而心之官則思也故曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎丘陵本髙川澤本下為髙下者因之則用力少而成功多矣鄒氏曰自章首至此論以仁心仁聞行先王之道是以惟仁者宜在髙位不仁而在髙位是播其惡於衆也仁者有仁心仁聞而能擴而充之以行先王之道者也播惡於衆謂貽患於下也上無道揆也下無法守也朝不信道工不信度君子犯義小人犯刑國之所存者幸也朝音潮此言不仁而在髙位之禍也道義理也揆度也法制度也道揆謂以義理度量事物而制其宜法守謂以法度自守工官也度即法也君子小人以位而言也由上無道揆故下無法守無道揆則朝不信道而君子犯義無法守則工不信度而小人犯刑有此六者其國必亡其不亡者僥倖而巳語録曰上無道揆則下無法守雖有奉法守一官者亦將不能用而去之矣信如憑信之信這箇道理只是要人信得及若信得及自然依那箇行不敢逾越惟其不信所以妄作如胥吏分明知得條法只是冒法以為姦便是不信度也故曰城郭不完兵甲不多非國之災也田野不辟貨財不聚非國之害也上無禮下無學賊民興喪無日矣辟與闢同喪去聲上不知禮則無以敎民下不知學則易與為亂鄒氏曰自是以惟仁者至此所以責其君詩曰天之方蹶無然泄泄蹶居衞反泄戈制反詩大雅板之篇蹶顛覆之意詩傳曰蹶動也泄泄怠緩悦從之貌詩傳曰泄泄蓋弛緩之意言天欲顛覆周室羣臣無得泄泄然不急救正之輔氏曰天之方蹶而國家有傾覆之勢常情處此消索震懾易得怠緩苟從故戒羣臣以無得泄泄然不急救正之當此之際自非君臣上下力加振作於此奮發有為則何能救正也責難陳善便是振發底意不然則淪胥以亡而巳泄泄猶沓沓也沓徒合反沓沓即泄泄之意蓋孟子時人語如此輔氏曰泄泄東周時語沓沓戰國時語孟子以沓沓解泄泄蓋以泄泄古語難曉而以當時之言人所易曉者釋之也事君無義進退無禮言則非先王之道者猶沓沓也非詆毁也故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心唯恐其君或陷於有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也或問所謂陳善閉邪者奈何曰君有邪心所當閉也然不知所以閉之之道而逆閉之則動有矯拂之患其言不可得而入矣故必為之開陳善道使之曉然知善道之所在則所謂邪者亦不難乎閉之矣語録曰恭敬大槩也一般只是恭意思較闊大敬意思較細密如以堯舜三代望其君不敢謂其不能便是責難於君便是恭陳善閉邪蓋不徒責之以難凡事有善則陳之邪則閉之使其君不陷於惡便是敬責難之恭是尊君之辭先立箇大志以先王之道為可必信可必行陳善閉邪是子細着功夫去照管務引其君於當道問人臣固當望君以堯舜若度其君不足與為善而不之諫或謂君為中才可以致小康而不足以致大治或導之以功利而不輔之以仁義此皆是賊其君否曰然人臣之道但當以極等之事望其君責以十分事臨了只做得二三分少聞做不得一分矣若論才質之優劣志趣之髙下固有不同然吾所以導之者則不可問其才志之髙下優劣但當以堯舜之道望之鄒氏曰自詩云天之方蹶至此所以責其臣鄒氏曰此章言為治者當有仁心仁聞以行先王之政而君臣又當各任其責也輔氏曰孟子章長難看首尾易得支離此章唯鄒氏斷截得分明見其章雖長而首尾只是一意為治者固當以仁心仁聞而行先王之政然非君臣同心各任其責則亦安能有成哉孟子曰規矩方員之至也聖人人倫之至也至極也人倫說見前篇規矩盡所以為方員之理猶聖人盡所以為人之道語録曰規矩是方員之極聖人是人倫之極蓋規矩便盡得方員聖人便盡得人倫故物之方員者有未盡處以規矩為之便見於人倫有未盡處以聖人觀之便見惟聖人都盡無一豪之不盡故為人倫之至欲為君盡君道欲為臣盡臣道二者皆法堯舜而巳矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也法堯舜以盡君臣之道猶用規矩以盡方員之極此孟子所以道性善而稱堯舜也或問此章之說曰人之生也均有是性均有是性故均有是倫均有是倫故均有是道然惟聖人能盡其性故為人倫之至而所由莫不盡其道焉此堯舜之為君臣所以各盡其道而為萬世之法猶規矩之盡夫方員而天下之為方員者莫不出乎此也孔子曰道二仁與不仁而巳矣法堯舜則盡君臣之道而仁矣不法堯舜則慢君賊民而不仁矣二端之外更無他道出乎此則入乎彼矣可不謹哉語録曰問不仁何以亦曰道曰譬如說有小路有大路何疑之有輔氏曰仁與不仁只是一箇天理與人欲而巳纔出天理便入人欲也豈復更有他道哉此古之聖賢所以兢兢業業而不敢不謹也暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也幽暗厲虐皆惡諡也苟得其實則雖有孝子慈孫愛其祖考之甚者亦不得廢公義而改之言不仁之禍必至於此可懼之甚也輔氏曰不仁有淺深而其禍有大小以幽厲視桀紂則幽厲雖未至於身弑國亡然死䝉惡諡遺臭後來孝子慈孫欲改不可不仁之禍循致如此豈不可懼之甚故詩云殷鑒不逺在夏后之世此之謂也詩大雅蕩之篇言商紂之所當鑒者近在夏桀之世而孟子引之又欲後人以幽厲爲鑒也輔氏曰孟子雖是平說將去不過是欲人以幽厲為鑒耳然熟玩之其提撕警省之功亦至切矣孟子曰三代之得天下也以仁其失天下也以不仁三代謂夏商周也禹湯文武以仁得之桀紂幽厲以不仁失之國之所以廢興存亡者亦然國謂諸侯之國天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體言必死亡今惡死亡而樂不仁是猶惡醉而强酒惡去聲樂音洛强上聲此承上章之意而推言之也輔氏曰上章苐言道二仁與不仁與桀紂幽厲之事而巳此章又因其意而推及於諸侯卿大夫士庶人不仁之禍皆必至之理也真氏曰此章明白峻厲自天子以至庶人皆當佩服以自警也然所謂不仁者非他縱人欲以滅天理而巳人欲縱而天理滅其禍至於如此可不畏哉孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬治人之治平聲不治之治去聲我愛人而人不親我則反求諸巳恐我之仁未至也智敬放此語録曰孟子說都是䟎向上去更無退下來如今人愛人不親治人不治禮人不答更不反求諸巳敎你不親不治不答也休我也不解恁地得大家做箇鶻突底人也行有不得者皆反求諸巳其身正而天下歸之不得謂不得其所欲如不親不治不答是也反求諸巳謂反其仁反其智反其敬也如此則其自治益詳而身無不正矣天下歸之極言其效也輔氏曰自治詳則身無不正身無不正則天下無不歸雖極言其效是亦必然之理也為治本乎自反多福本乎自求治國者能玩此則知所本矣詩云永言配命自求多福解見前篇亦承上章而言輔氏曰此亦承上章得天下以仁而言之也孟子曰人有恒言皆曰天下國家天下之本在國國之本在家家之本在身恒胡登反恒常也雖常言之而未必知其言之有序也故推言之而又以家本乎身也此亦承上章而言之大學所謂自天子至於庶人壹是皆以修身為本為是故也輔氏曰人之常言雖曰有序而但及其外君子之論則必究其本而無有或遺得其本則末可舉矣以是而質於大學之言則曾子子思孟子相傳之學不可誣矣孟子曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之故沛然德敎溢乎四海巨室世臣大家也得罪謂身不正而取怨怒也永嘉陳氏曰得罪謂非理致怨所謂不得罪者謂合正理而不致怨於人非曲法以奉之也麥丘邑人祝齊桓公曰願主君無得罪於羣臣百姓意蓋如此慕向也心恱誠服之謂也沛然盛大流行之貌溢充滿也蓋巨室之心難以力服而國人素所取信今既恱服則國人皆服而吾德敎之所施可以無遠而不至矣此亦承上章而言蓋君子不患人心之不服而患吾身之不修吾身既修則人心之難服者先服而無一人之不服矣輔氏曰此亦承上章家之本在身而言也君人者不正其身所為乖戾則致人怨怒其𫝑必自世臣大家而始故麥丘邑人之言亦先及羣臣而後及百姓也林氏曰戰國之世諸侯失德巨室擅權為患甚矣然或者不修其本而遽欲勝之則未必能勝而適以取禍故孟子推本而言惟務修德以服其心彼既恱服則吾之德敎無所留礙可以及乎天下矣裴度所謂韓𢎞輿疾討賊承宗斂手削地非朝廷之力能制其死命特以處置得宜能服其心故爾正此𩔖也輔氏曰林氏謂或者不修其本者亦指身而言爾未必能勝而適以取禍者如魯昭公之事是也吾之德敎無所留礙者大凡人君施敎令於下其𫝑本甚易苟其德不足以服夫人則近而公卿大夫必懷疑議而有不肯奉行之心逺而羣黎百姓必生怨誹而公肆沮格之意如此則其為留礙也大矣安能有胥然胥效之應哉今也内而巨室外而天下無不傾心向慕唯恐其德敎之不下則德行如置郵之速令下如流水之源無復有遮留窒礙之者矣四海極其逺而言之裴度之言亦非謂以係戀之私恩養其家如遯之九三畜臣妾然也行大公至正之道可殺則殺可生則生殺之而彼自不怨利之而彼自不庸可也夫然後能沛然德敎溢乎四海孟子曰天下有道小德役大德小賢役大賢天下無道小役大弱役强斯二者天也順天者存逆天者亡有道之世人皆修德而位必稱其德之大小天下無道人不修德則但以力相役而巳天者理𫝑之當然也語録曰小德役大德小賢役大賢是以賢德論小役大弱役强只是以力論全不睹是問天下無道小役大弱役强亦曰天何也曰到那時不得不然亦是理當如此輔氏曰理無形勢有形也與夫専言之則道也之意同天下有道則以德為大小無道則以力為强弱二者皆理𫝑之所當然也順其理𫝑則存逆其理𫝑則亡必然之理也齊景公曰既不能令又不受命是絶物也涕出而女於吳女去聲引此以言小役大弱役强之事也輔氏曰既不能令是不能强也又不受命是不能弱也既不能强於自治以昌其國而出令以使人又不能因時𫝑之宜屈巳自下以聽人之命是與物暌絶也絶於物則絶於天也景公之言宜若可取也然景公所用之國乃桓公所以正天下霸諸侯者也雖時𫝑下衰然振起而作新之獨不在我乎而顧為是巽言横涕以自蓋何哉孟子獨取此說以證小役大弱役强之事其葁薾自棄之罪未暇議也令出令以使人也受命聽命於人也物猶人也女以女與人也吳蠻夷之國也景公羞與為昬而畏其强故涕泣而以女與之今也小國師大國而恥受命焉是猶弟子而恥受命於先師也言小國不修德以自强其般樂怠敖皆若效大國之所為者而獨恥受其敎命不可得也如恥之莫若師文王師文王大國五年小國七年必為政於天下矣此因其愧恥之心而勉以修德也輔氏曰小國師大國而恥受命焉是不當恥而恥者也然亦良心之苗裔所不能殄滅者故孟子因其幾而曉之文王之政布在方䇿舉而行之所謂師文王也五年七年以其所乗之𫝑不同為差輔氏曰所乗之𫝑指國之大小而言也蓋天下雖無道然修德之至則道自我行而大國反為吾役矣輔氏曰文王自百里而興玉業其政布在方䇿是必有道矣師其人行其政則人心自恱氣數自回而小可大弱可强大國反為吾役矣敵國雖大何畏焉程子曰五年七年聖人度其時則可矣然凡此𩔖學者皆當思其作為如何乃有益耳輔氏曰程子之言所以啟發學者至矣惟聖人能知時故曰聖人度其時可矣學者燭理既明而經厯之久思慮之深則自然見得詩云商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京孔子曰仁不可為衆也夫國君好仁天下無敵祼音灌夫音扶好去聲詩大雅文王之篇孟子引此詩及孔子之言以言文王之事麗數也十萬曰億侯維也商士商孫子之臣也膚大也敏逹也祼宗廟之祭以鬱鬯之酒灌地而降神也說見論語禘自既灌章將助也言商之孫子衆多其數不但十萬而巳上帝既命周以天下則凡此商之孫子皆臣服于周矣所以然者以天命不常歸于有德故也是以商士之膚大而敏逹者皆執祼獻之禮助王祭事于周之京師也真氏曰以商之孫子而為周之諸侯以商之美士而奔走周廟之祭天命何常之有哉成湯惟其仁也故天命歸于商紂惟其不仁故天命轉而歸周孔子因讀此詩而言有仁者則雖有十萬之衆不能當之故國君好仁則必無敵於天下也不可為衆猶所謂難為兄難為弟云爾輔氏曰我賢則難於為兄為弟者也我仁則難於為衆者也仁道之大無物不體故難於為衆而天下無敵也今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯恥受命於大國是欲無敵於天下也乃節大國而不師文王是不以仁也詩大雅桑柔之篇逝語辭也言誰能執持熱物而不以水自濯其手乎此章言不能自强則聽天所命修德行仁則天命在我語録曰今之為國者論為治則曰不消得十分底事只如此隨風俗做便得不必須欲如堯舜只恁地做天下也治為學者則曰做人也不須做得孔孟十分事且做得一二分也得盡是這般苟且之學所謂聽天所命者也輔氏曰不能自强則聽命于天而為强大所役使修德行仁如文王則與天為一而小可大弱可强昔之强大者反為役於我矣豈非天命之在我乎孟子曰不仁者可與言哉安其危而利其菑樂其所以亡者不仁而可與言則何亡國敗家之有菑與災同樂音洛安其危利其菑者不知其為危菑而反以為安利也所以亡者謂荒淫暴虐所以致亡之道也不仁之人私欲固蔽失其本心故其顛倒錯亂至於如此所以不可告以忠言而卒至於敗亡也輔氏曰仁本吾心之固有惟不知存養體認故為私欲所障蔽而冥然無知頑然無覺雖處於危而反以為安雖淪於菑而反以為利雖陷於其所以亡而反以為樂其顛倒惑亂至於如此故不可告語而敗亡隨之自古危亂之君同出一轍若本心尚有一㸃之明可以為受言之地則其禍亂猶有可以救藥者也真氏曰自昔危亂之世未嘗無忠言祖伊嘗諫紂矣召穆公嘗諫厲王矣而二君不之聽者蓋其心既不仁故顛倒迷繆以危為安以菑為利以取亡之道為可樂也夫人君孰不欲安存而惡危亡而其反易至此者私欲蔽障而失其本心故爾有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足浪音郎滄浪水名蔡氏曰武當縣北四十里漢水中有洲曰滄浪洲水曰滄浪水愚謂滄浪地名漢水至其地因以名之纓冠系也孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也言水之清濁有以自取之也聖人聲入心通無非至理此𩔖可見輔氏曰聖人之心純是義理故人言纔入于耳則便與其心相契而無非至理如孔子一聞孺子之歌而便知濯足濯纓皆水之清濁有以自取之者是也夫不仁之人則雖忠言至論無自而入聖人之仁則雖常言俗語聲入心通是亦莫非自取之也夫人必自侮然後人侮之家必自毁而後人毁之國必自伐而後人伐之夫音扶所謂自取之者太甲曰天作孽猶可違自作孽不可活此之謂也解見前篇此章言心存則有以審夫得失之幾不存則無以辨於存亡之著禍福之來皆其自取輔氏曰人心存則仁人心不存則不仁得失之幾至微也存亡之實至著也安利樂得失之幾也亡國敗家存亡之實也禍福之來皆其自取即所謂禍福無不自巳求之者此亦承上章而言仁與不仁所取之不同也孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也惡去聲民之所欲皆為致之如聚斂然輔氏曰天理人欲同行異情聚斂雖是人欲若能如此聚民之所欲則便是天理也民之所惡則勿施於民真氏曰此章之要在於所欲與聚所惡勿施之二言晁錯所謂人情莫不欲壽三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡輔氏曰晁錯說此幾句真能得三王之用心此𩔖之謂也民之歸仁也猶水之就下獸之走壙也走音奏壙廣野也言民之所以歸乎此以其所欲之在乎此也故為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也為去聲敺與驅同獺音闥爵與雀同鸇諸延反淵深水也獺食魚者也叢茂林也鸇食雀者也言民之所以去此以其所欲在彼而所畏在此也今天下之君有好仁者則諸侯皆為之敺矣雖欲無王不可得巳好為王皆去聲今之欲王者猶七年之病求三年之艾也苟為不畜終身不得苟不志於仁終身憂辱以陷於死亡王去聲艾草名所以灸者乾久益善夫病巳深而欲求乾久之艾固難卒辦然自今畜之則猶或可及不然則病日益深死日益迫而艾終不可得矣詩云其何能淑載胥及溺此之謂也詩大雅桑柔之篇淑善也載則也胥相也言今之所為其何能善則相引以陷於亂亡而巳輔氏曰至此則雖聖人亦末如之何矣詳味此詩則令人惕然警省有不容自巳者矣孟子曰自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也暴猶害也語録曰問向說自暴作自粗暴與今註暴害也不同曰害底是如暴其民甚非猶毁也語録曰非如言則非先王之道之非自害其身者不知禮義之為美而非毁之雖與之言必不見信也語録曰謂所言必非詆禮義之說為非道是失之暴戻我雖言而彼必不肯聽是不足與有言也自棄其身者猶知禮義之為美但溺於怠惰自謂必不能行與之有為必不能勉也語録曰謂其意氣卑弱志趣凡陋甘心自絶以為不能我雖言其仁義之美而彼以為我必不能居仁由義是不足有為也程子曰人苟以善自治則無不可移者雖昬愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也此所謂下愚之不移也語録曰拒之以不信只是說道没這道理絶之以不為是知有道理自割斷了不肯做自暴者有强銳意自棄者有懦弱意仁人之安宅也義人之正路也仁宅巳見前篇義者宜也乃天理之當行無人欲之邪曲故曰正路輔氏曰義者天理之當然無人欲之邪曲又當常行於此而不可有適莫之意故曰正路曠安宅而弗居舍正路而不由哀哉舍上聲曠空也由行也此章言道本固有而人自絶之是可哀也此聖賢之深戒學者所當猛省也孟子曰道在爾而求諸逺事在易而求諸難人人親其親長其長而天下平爾邇古字通用易去聲長上聲親長在人為甚邇親之長之在人為甚易而道初不外是也舍此而他求則逺且難而反失之但人人各親其親各長其長則天下自平矣輔氏曰先儒皆以逺近難易為泛說以親親長長而天下平為邇與易之事獨朱子直以親長為邇親之長之為易極為切當道指道理言事指所事言求諸逺指在事者言之也求之難指在人者言之也為人上者獨自親其親長其長亦未能得天下平唯在我者有以倡率之而使天下之人皆各親其親長其長則天下自平矣此又可見孟子之說周密無滲漏處孟子曰居下位而不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗恱弗信於友矣恱親有道反身不誠不恱於親矣誠身有道不明乎善不誠其身矣獲於上得其上之信任也誠實也反身不誠反求諸身而其所以為善之心有不實也輔氏曰人孰無為善之心然隱微之際有一豪自欺之意則其心便不實不明乎善不能即事以窮理無以真知善之所在也輔氏曰人孰不知善之可為然不能即夫事以窮其理而推極吾之知識則所知者或未必真游氏曰欲誠其意先致其知不明乎善不誠乎身矣學至於誠身則安往而不致其極哉以内則順乎親以外則信乎友以上則可以得君以下則可以得民矣輔氏曰游氏之說始則大學之次序終則中庸之極功也是故誠者天之道也思誠者人之道也誠者理之在我者皆實而無偽天道之本然也思誠者欲此理之在我者皆實而無偽人道之當然也語録曰誠者都是實理了思誠者恐有不實處便思去實他誠者天之道天無不實寒便是寒暑便是暑更不待使他恁地聖人仁便真箇是仁義真箇是義更無不實處在常人說仁時恐猶有不仁處說義時恐猶有不義處便須着思有以實之始得輔氏曰以欲字解思字以本然二字解天道當然二字解人道自然分曉維天之命於穆不巳至誠之理天道之本然也審思明辨自强不息思誠之事人道之當然也至誠而不動者未之有也不誠未有能動者也至極也楊氏曰動便是驗處若獲乎上信乎友恱於親之𩔖是也輔氏曰有感必有應驗便是應處極其誠則合内外平物我感與應皆非自外也此其所以無有不動也蔡氏曰動不動只在誠不誠之間此是孟子以其徴驗處喫𦂳以告人然子思以誠之言人之道而孟子易之以思誠子思言形著動變而孟子止於動者以思出於心於學者用功尤為有力而動者正指上文獲上信友恱親而言也此章述中庸孔子之言見思誠為修身之本而明善又為思誠之本乃子思所聞於曾子而孟子所受乎子思者亦與大學相表裏學者宜潛心焉輔氏曰明善者大學之本誠身者中庸之要於此可見中庸大學之相為表裏曾子子思孟子之相為授受者益不可誣矣蔡氏曰此章見孔子曽子子思孟子相傳無異道而明善誠身實傳道之要訣也明善即致知誠身即誠意孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者辟去聲作興皆起也盍何不也西伯即文王也紂命為西方諸侯之長得専征伐故稱西伯太公姜姓吕氏名尚文王發政必先鰥寡孤獨庶人之老皆無凍餒故伯夷太公來就其養非求仕也輔氏曰恐人見太公後來佐武王伐商遂以作興為有求仕之意故明辨之太公之初來于周無是意也故孟子將太公與伯夷並說亦自可見二老者天下之大老也而歸之是天下之父歸之也天下之父歸之其子焉往焉於䖍反二老伯夷太公也大老言非常人之老者天下之父言齒德皆尊如衆父然既得其心則天下之心不能外矣輔氏曰衆父二字出老子集註借用之其義則謂衆人之父耳父子同氣至親父既歸之則其子焉往蕭何所謂養民致賢以圖天下者暗與此合但其意則有公私之辨學者又不可以不察也輔氏曰蕭何之說是欲為此以圖天下有為而為所謂私也文王之為此則初無所為也行吾義而巳所謂公也二老之歸乃其自然之應耳學者不察此而以文王之事與蕭何一般看則不可也諸侯有行文王之政者七年之内必為政於天下矣七年以小國而言也大國五年在其中矣輔氏曰舉小國緩期言之則大國之五年固在其中矣孟子曰求也為季氏宰無能改於其德而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也求孔子弟子冉求季氏魯卿宰家臣賦猶取也取民之粟倍於他日也小子弟子也鳴鼓而攻之聲其罪而責之也輔氏曰王者征伐必鳴鼔以聲其罪而顯然伐之夫子蓋用此意以責冉求也由此觀之君不行仁政而富之皆棄於孔子者也況於為之强戰争地以戰殺人盈野争城以戰殺人盈城此所謂率土地而食人肉罪不容於死為去聲林氏曰富其君者奪民之財耳而夫子猶惡之況為土地之故而殺人使其肝腦塗地則是率土地而食人之肉其罪之大雖至於死猶不足以容之也輔氏曰率猶循也由也率土地而食人肉謂以土地之故殺人而使之肝腦塗地則是由土地而食人之肉也其罪之大雖至於死猶不足以容之者言罪大而刑小是刑不足以容其罪也故善戰者服上刑連諸侯者次之辟草萊任土地者次之辟與闢同善戰如孫臏吳起之徒臏齊威王臣起衞人為魏文侯將連結諸侯如蘇秦張儀之𩔖秦洛陽人辟開墾也任土地謂分土授民使任耕稼之責如李悝盡地力悝魏文侯臣作盡地力之敎以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畮治田勤謹則畮益三升不勤則損亦如之語録曰問若如李悝盡地力之𩔖不過欲敎民而巳孟子何以謂任土地者亦次於刑曰只為他是欲富國不是欲為民但强占土地開墾將去欲為巳物耳皆為君聚斂之徒也商鞅開阡陌之𩔖也鞅衞人為秦孝公相封以商於之地號曰商君始廢井田開阡陌語録曰阡陌便是井田一横一直如百夫有遂遂上有涂這涂便是陌若十涂恁地直在横頭又作一大溝謂之洫洫上有路這便是阡自阡陌之外有空地則只閑在那裏先王所以要如此者乃是要正其疆界恐人相侵占今商鞅却破開了遇可做田處便做田更不要齊整這開字非開創之開乃開闢之開蔡澤傳曰破壞井田決裂阡陌觀此可見輔氏曰集註引六人者當之是矣戰國之時人君之所求與士之所以自任者不過有此三等故孟子因列之而言其罪以遏其流雖是救時之言然士而以此三者得名則世德下衰可知矣孟子曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉眸音牟瞭音了眊音耄良善也眸子目瞳子也瞭明也眊者䝉䝉目不明之貌蓋人與物接之時其神在目輔氏曰自體察之可見神若不在則目雖見物猶無見也都不能有所識别矣故胷中正則神精而明不正則神散而昬輔氏曰心正則安裕完固故其神之見於目者精聚而明白心不正則驚惕掩覆故神之見於目者渙散而昬暗此其所謂不能掩者也聽其言也觀其眸子人焉廋哉焉於虔反廋音搜廋匿也言亦心之所發故并此以觀則人之邪正不可匿矣然言猶可以偽為眸子則有不容偽者輔氏曰言亦心之所發雖或可以偽為然有德者必有言如所謂多寡游屈蔽陷離窮亦皆因言而後可得聽其言辭以驗其藴觀其眸子以察其神則人之邪正有不可得而隱者也真氏曰目者精神之所發而言者心術之所形故審其言之邪正驗其日之明昧而其人之賢否不可掩焉此觀人之一法也孟子曰恭者不侮人儉者不奪人侮奪人之君惟恐不順焉惡得為恭儉恭儉豈可以聲音笑貌為哉惡平聲惟恐不順言恐人之不順巳聲音笑貌偽為於外也淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也與平聲援音爰淳于姓髠名齊之辯士授與也受取也古禮男女不親授受以逺别也援救之也權稱錘也稱物輕重而往來以取中者也陳氏曰權字乃就秤錘上取義秤錘之為物能權輕重以取平故名之曰權權者變也在衡有星兩之不齊權便移來移去隨物以取平亦猶人之用權度揆度事物以取其中相似權而得中是乃禮也陳氏曰知中然後能權由權然後得中中者理所當然而無過不及者也權者所以度事理而取其當然無過不及者也輔氏曰若是經禮更何須權唯是那經禮有行不得處故須用權以取中權而得中則是乃禮也若權而不得乎中則陷乎漢儒權術權變之域矣豈可便謂權只是經乎曰今天下溺矣夫子之不援何也言今天下大亂民遭陷溺亦當從權以援之不可守先王之正道也曰天下溺援之以道嫂溺援之以手子欲手援天下乎言天下溺惟道可以救之非若嫂溺可手援也今子欲援天下乃欲使我枉道求合則先失其所以援之之具矣是欲使我以手援天下乎語録曰吾人所以救世者以其有道也既自放倒矣天下豈一手可援哉此章言直已守道所以濟時枉道徇人徒為失已輔氏曰必如此斷置得分曉然後出來做事則規模自我所向有成不然枉道徇人未有能自立者也公孫丑曰君子之不敎子何也不親敎也輔氏曰易子而敎則非不敎也但不親敎耳孟子曰𫝑不行也敎者必以正以正不行繼之以怒繼之以怒則反夷矣夫子敎我以正夫子未出於正也則是父子相夷也父子相夷則惡矣夷傷也敎子者本為愛其子也繼之以怒則反傷其子矣父既傷其子子之心又責其父曰夫子敎我以正道而夫子之身未必自行正道則是子又傷其父也古者易子而敎之易子而敎所以全父子之恩而亦不失其為敎父子之間不責善責善則離離則不祥莫大焉責善朋友之道也王氏曰父有争子何也所謂争者非責善也當不義則争之而已矣父之於子也如何曰當不義則亦戒之而已矣輔氏曰王氏最得孟子之正意責善謂責之使必為善也責之使必為善則便有使之捐其所能强其所劣之意故必至於相傷至其所為或背理而害義則豈可坐視而不管故在子則當争在父則亦當戒切之也孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養亦不足以為孝矣輔氏曰味集註之言則人之持守其身者豈可有一豪一息之不謹哉且身者親之枝也枝葉茂盛則得以庇其本根枝葉傷殘則本根殄瘁矣不能事親更做甚人不能守身更說甚道義孰不為事事親事之本也孰不為守守身守之本也事親孝則忠可移於君順可移於長身正則家齊國治而天下平曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也養去聲復扶又反此承上文事親言之曽晳名㸃曽子父也曽元曽子子也曽子養其父每食必有酒肉食畢將徹去必請於父曰此餘者與誰或父問此物尚有餘否必曰有恐親意更欲與人也曽元不請所與雖有言無其意將以復進於親不欲其與人也此但能養父母之口體而已曽子則能承順父母之志而不忍傷之也輔氏曰養父母之口體者其事淺承順父母之心志者其思深夫子之於父異體同氣至親至密故事之者當先意承事必能聽於無聲視於無形然後為至若必待其言而後從固已不可況於先立其意以拂其親之欲惟口體是養而不恤其心志之虧乎事親若曽子者可也言當如曽子之養志不可如曽元但養口體程子曰子之身所能為者皆所當為無過分之事也故事親若曽子可謂至矣而孟子止曰可也豈以曽子之孝為有餘哉輔氏曰子之身即親之身也故凡子之身所能為者皆所當為也但人為物欲所昬蝕多不能自盡其分耳豈復有過分之事哉孟子只平說去曰事親若曽子可也至程子方看得可也二字有深意以此知讀書者不可不熟讀玩味若但略綽地看過何縁見得他意思出孟子曰人不足與適也政不足閒也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣適音謫閒去聲趙氏曰適過也間非也格正也徐氏曰格者物之所取正也書曰格其非心徐氏名度睢陽人語録曰格其非心與格君心之非格如合格之格謂使之歸于正也又曰只是將此一物格其不正者如格其非心是說得深者大人格君心之非是說得淺者蔡氏曰非心非僻之心也愚謂閒字上亦當有與字言人君用人之非不足過謫行政之失不足非閒惟有大人之德則能格其君心之不正以歸於正而國無不治矣大人者大德之人正己而物正者也輔氏曰集註解得格字義分曉所謂大人者道全德備譽望足以弭其邪心容色足以消其逸志非但取辦之頰舌之間諌争之際而已也然無大人之德與學而有言責者則又不可以是藉口程子曰天下之治亂繫乎人君之仁與不仁耳心之非即害於政不待乎發之於外也昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心既正而後天下之事可從而理也夫政事之失用人之非知者能更之直者能諫之然非心存焉則事事而更之後復有其事將不勝其更矣人人而去之後復用其人將不勝其去矣是以輔相之職必在乎格君心之非然後無所不正而欲格君心之非者非有大人之德則亦莫之能也輔氏曰孟子言君仁莫不仁君義莫不義君正莫不正一正君而國定矣程子但言天下之治亂擊乎人君之仁與不仁者言仁則該乎義與正也曰仁曰義而又曰正者仁義乃所以正之也一正君而國定猶形影然也又曰孟子三見齊王事見荀子書以此章觀之必是孟子有此事此一義最是事君者之大節目觀孟子之言如此則孟子自任之重可知程子發明其說已盡孟子曰有不虞之譽有求全之毁虞度也吕氏曰行不足以致譽而偶得譽是謂不虞之譽求免於毁而反致毁是謂求全之毁言毁譽之言未必皆實修己者不可以是遽為憂喜觀人者不可以是輕為進退輔氏曰毁譽出於公則固可信出於私則固不可信然公私之外又有是二者焉不可不察集註既得孟子之本意而又於人已兩有所益焉孟子曰人之易其言也無責耳矣易去聲人之所以輕易其言者以其未遭失言之責故耳蓋常人之情無所懲於前則無所警於後非以為君子之學必俟有責而後不敢易其言也然此豈亦有為而言之與輔氏曰謹言語自是君子之庸行何待於有責而後然孟子此言必有所為而發孟子曰人之患在好為人師好去聲王勉曰學問有餘人資於己不得已而應之可也若好為人師則自足而不復有進矣此人之大患也輔氏曰先儒多以好為人師為自尊大之意獨王氏解最善故取之樂正子從於子敖之齊子敖王驩字樂正子見孟子孟子曰子亦來見我乎曰先生何為出此言也曰子來幾日矣曰昔者曰昔者則我出此言也不亦宜乎曰舍館未定曰子聞之也舎館定然後求見長者乎長上聲昔者前日也館客舎也王驩孟子所不與言者則其人可知矣樂正子乃從之行其失身之罪大矣又不早見長者則其罪又有甚者焉故孟子姑以此責之曰克有罪陳氏曰樂正子固不能無罪矣然其勇於受責如此非好善而篤信之其能若是乎世有强辯飾非聞諫愈甚者又樂正子之罪人也輔氏曰人之心一有偏係之私則於其所當為者必不能勇於決為而於其所不當為者或且遲回以至於浸淫而不覺其非雖以樂正子之好善篤信猶有所不免必待孟子言之然後知其有罪況徇私背義强辯飾非者乎孟子可謂善敎樂正子可謂善學孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也餔博孤反啜昌恱反徒但也餔食也啜飲也言其不擇所從但求食耳此乃正其罪而切責之或問樂正子從子敖何也曰嘗攷孟子之書王驩齊王之幸臣蓋欲自託孟子以取重故孟子使滕則王必以驩為介孟子未嘗與言行事至弔於公行子之家又不與之言焉則所以絶之者深矣樂正子不察乎此而輕身以從之意者特藉其資糧輿馬以見孟子而已故孟子以餔啜罪之愚謂樂正子能勇於受責然後孟子正其罪而切責之所謂可與言而後與之言者也孟子曰不孝有三無後為大趙氏曰於禮有不孝者三事謂阿意曲從陷親不義一也家貧親老不為禄仕二也不娶無子絶先祖祀三也三者之中無後為大輔氏曰此必見於古傳記趙氏時其書尚存故引之今則不復存矣阿意曲從陷親不義者懦也家貧親老不為禄仕者惰也不娶無子絶先祖祀則因循苟且亂常咈理不仁之甚也故於三者之中最為不孝之大者舜不告而娶為無後也君子以為猶告也為無之為去聲舜告焉則不得娶而終於無後矣告者禮也不告者權也猶告言與告同也蓋權而得中則不離於正矣輔氏曰告者禮也不告者權也則禮與權固為二矣至以不告為猶告蓋權而得中則不離於正故也范氏曰天下之道有正有權正者萬世之常權者一時之用常道人皆可守權非體道者不能用也蓋權出於不得已者也若父非瞽瞍子非大舜而欲不告而娶則天下之罪人也孟子曰仁之實事親是也義之實從兄是也仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而其實不越於事親從兄之間蓋良心之發最為切近而精實者或問實之為精實曰是有數義有以實對虚而言者有以實對偽而言者有以實對華而言者此所謂實則以對華而言耳以實對虚而言者曰仁義理也孝弟事也理虚而事實此孝弟所以為仁義之實也然以事為實可矣謂理為虚則理豈虚而無物之謂乎以實對偽而言者曰莫非仁義也惟孝弟發於人心之不偽此孝弟所以為仁義之實也然謂孝弟為不偽可矣謂凡惻隱羞惡之發皆人之所偽為可乎惟以實對華而言則以為凡仁義之見於日用者惟此為本根精實之所在必先立乎此而後其光華枝葉有以發見於事業之間此說為得之耳語録曰且如愛親仁民愛物無非仁也但是愛親乃是切近而真實者乃是仁最先發處義之實亦然輔氏曰仁主於愛然人之生便先知愛其親義主於敬及少長便先知敬其兄未有知愛而不始於親者亦未有知敬而不始於兄者故事親從兄是良心所發最為切近而精實者也真氏曰仁義之道大矣而其切實處止在於事親從兄蓋二者人之良知良能天性之真於焉發見欲為仁義者惟致力乎此而已否則悠悠然汎汎然非可據之實地矣有子以孝弟為為仁之本其意亦猶此也蔡氏曰有子以孝弟為為仁之本孟子乃以事親屬之仁從兄屬之義若不同矣而朱子乃以為其意亦猶此也何邪蓋有子言仁即所謂専言之仁也孟子所言仁義即所謂偏言之仁也事親主乎愛而已義則愛之宜者也合而言之則推其事親者以從其兄此孝弟所以為為仁之本也分而言之則事親而孝從兄而弟所以為仁義之實也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可巳也惡可巳則不知足之蹈之手之舞之樂斯樂則之樂音洛惡平聲斯二者指事親從兄而言知而弗去則見之明而守之固矣輔氏曰知而弗去所謂四德之貞也非是固為弗去也知既明則自然弗去也如人知水火之不可蹈則自然不蹈也若有一豪勉强之心便是知之不明便不謂之智也故知而弗去是智之實且如人既知親之當愛則孰肯舍其親而不愛既知兄之當敬則孰肯舍其兄而不敬其有不愛其親不敬其兄者蓋其智為物欲所昬而遂忘其當愛當敬故也節文謂品節文章輔氏曰事親從兄雖是良心真切然事親自有事親之道理粗言之如冬温夏凊昬定晨省是也從兄自有從兄之道理粗言之如徐行後長兄先弟從是也各自品節其文理便是禮之實樂則生矣謂和順從容無所勉强事親從兄之意油然自生如草木之有生意也輔氏曰和順從容不待勉强事親從兄之意油然而生如草木之有生意是樂之實既有生意則其暢茂條達自有不可遏者所謂惡可已也輔氏曰草木既有生意則日長月茂無一息之停孰能遏而止之哉事親從兄之意油然自生則亦如草木之有生意自然日日暢滿茂盛條理通逹自無一息之停又烏得而遏止之哉其又盛則至於手舞足蹈而不自知矣輔氏曰此聖人之作樂所以必有舞也樂之之意至於充盛之極則不假言說心意自然形見血脉自然動盪手舞足蹈皆自然而然不待心使之然故不自知也在上如大舜武王在下如曽子方是到此田地倘有一豪勉强之意則便有變遷止息之時矣非所謂至孝矣此章言事親從兄良心真切天下之道皆原於此然必知之明而守之固然後節之密而樂之深也輔氏曰事親從兄是良心之真切曰仁與義是斯道之統㑹若便恁地說過亦只是說話須是以人體之方可所謂必知之明而守之固然後節之密而樂之深者此正如魚之飲水冷暖自知非言語之能盡也孟子曰天下大恱而將歸已視天下恱而歸巳猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子言舜視天下之歸巳如草芥而惟欲得其親而順之也得者曲為承順以得其心之恱而巳順則有以諭之於道心與之一而未始有違尤人所難也為人蓋泛言之為子則愈密矣語録曰人字只說大綱子字却說得重固有人承顔順色看父母做事不問是非一向不逆其志這是得親之心然猶是淺事惟順乎親則親之心皆順乎理必如此而後可以為子舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝底之爾反瞽瞍舜父名底致也豫恱樂也瞽瞍至頑嘗欲殺舜至是而底豫焉書所謂不格姦亦允若是也蓋舜至此而有以順乎親矣是以天下之為子者知天下無不可事之親顧吾所以事之者未若舜耳於是莫不勉而為孝至於其親亦底豫焉則天下之為父者亦莫不慈所謂化也真氏曰舜之所值者至難事之親也然積誠感動猶能使之底豫況其不如瞽瞍者乎故瞽瞍底豫而天下之為人子者皆知無不可事之親而各勉於為孝此所謂天下化也子孝父慈各止其所而無不安其位之意所謂定也為法於天下可傳於後世非止一身一家之孝而已此所以為大孝也李氏曰舜之所以能使瞽瞍底豫者盡事親之道共為子職不見父母之非而已昔羅仲素語此云只為天下無不是底父母了翁聞而善之曰唯如此而後天下之為父子者定彼臣弑其君子弑其父者常始於見其有不是處耳仲素名從彦豫章人後居延平了翁姓陳名瓘李氏侗皆延平人輔氏曰孝子之心與親為一凡親之過皆已之過舜之所以負罪引慝者此也故人子自不見父母有不是處羅氏此語甚有力蓋凡父母之不是皆子之不是也已旣是則父母豈有不是者哉陳氏則又推其極而言之亦事理之實也真氏曰罪已而不非其親者仁人孝子之心也怨親而不反諸已者亂臣賊子之志也後之事難事之親者其必以舜為法孟子纂疏卷七
