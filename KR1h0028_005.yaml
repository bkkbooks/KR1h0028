body:
  text: 欽定四庫全書論語纂疏卷二宋趙順孫撰朱子集註八佾第三凡二十六章通前篇末二章皆論禮樂之事孔子謂季氏八佾舞於庭是可忍也孰不可忍也佾音逸季氏魯大夫季孫氏也胡氏曰古者有姓有氏三家為桓公之後皆姬姓又自以仲叔李分為三氏也佾舞列也天子八諸侯六大夫四士二每佾人數如其佾數或曰每佾八人未詳孰是或問有謂通以八人為佾者曰是不可考矣然以理意求之舞位必方豈有佾少而人多如此哉胡氏曰每佾人數本春秋左氏傳文人如佾數本杜預註文每佾八人疏所引服䖍之說也季氏以大夫而僭用天子之禮樂孔子言其此事尚忍為之則何事不可忍為語錄曰為人臣子只有一箇尊君敬上之心方能自安其分不忍少萌一毫僭差之意今季氏以陪臣而僭天子之佾尚忍為之則是已絶滅天理雖悖逆作亂之事亦必忍為之矣或曰忍容忍也蓋深疾之之辭語錄曰問後說恐未安聖人氣象似不如此暴露曰聖人亦自有大段尀耐人處如孔子作春秋亦大段尀耐忍不得處愚謂忍之一字有敢忍之忍春秋傳所謂忍人也有容忍之忍春秋傳所謂君其忍之是也二義皆通而敢忍之說為長故集註以容忍之說居後范氏曰樂舞之數自上而下降殺以兩而已故兩之間不可以豪髮僭差也孔子為政先正禮樂則季氏之罪不容誅矣謝氏曰君子於其所不當為不敢須臾處不忍故也而季氏忍此矣則雖弑父與君亦何所憚而不為乎黄氏曰范氏說忍字義似主後說而反在謝氏曰說之前豈以范氏所言降殺以兩乃全章之意而謝氏特為是可忍也一句而發邪輔氏曰謝氏先論人心之本然以見季氏之忍心僭逆次又推極其忍心僭逆之害使讀之者惕然有警於其心而防微謹獨之意自有不容己者愚謂范氏就制度上說故以容忍為義言不可容忍之甚也謝氏就心上說故以敢忍為義言其心旣敢於此則雖極天下之大惡亦敢為之矣三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂徹直列反相去聲三家魯大夫孟孫叔孫季孫之家也胡氏曰三家皆魯桓公庶子初以仲叔季為氏其後加以孫字公子之子穪公孫也仲改為孟者庶子自為長少不敢與莊公為伯仲叔季公孫不敢祖諸侯也故自以庶長為孟詳見疏文至杜預作公子譜則云仲慶父弑君故改為孟恐或然也雍周頌篇名徹祭畢而収其俎也天子宗廟之祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深逺之意天子之容也此雍詩之詞孔子引之言三家之堂非有此事亦何取於此義而歌之乎譏其無知妄作以取僭竊之罪語錄曰天子宗廟之祭歌舞雍詩以徹其俎今三家亦歌此以祭聖人但舉雍詩之辭以譏之曰汝之祭亦有諸侯之助乎亦有天子穆穆深逺之容乎旣無此事奚用此詩程子曰周公之功固大矣皆臣子之分所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼譏之語錄曰當初成王不賜伯禽不受則後人雖欲僭亦無様子他也做不成胡氏曰案禮記明堂位云成王以周公有大勲勞於天下命魯公世世祀周公以天子之禮樂祭統又云成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也禮運又曰魯之郊禘非禮也周公其衰矣魯用天子之制三家僭魯遂至於僭天子以是知非特三家之僭魯亦僭矣程子所以謂成王之賜伯禽之受皆非也周公立為經制辨君臣上下之分於豪釐間如天地之不可易今也祀于周公之廟而倒行逆施如此豈非周公之衰乎是亦程子之意也眞氏曰無父母則無此身我因父母而有此身則事親自合盡孝無君上則無此爵位我因君而有此爵位則事君自合盡忠此只是盡其本分當為之事非過外也子曰人而不仁如禮何人而不仁如樂何游氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也語錄曰人旣不仁直是與那禮樂不相管攝禮樂雖是好厎事心旣不在自是呼喚他不來他亦不為吾用矣心旣不仁便是都不醒了自與禮樂不相干又曰不仁之人渾是一團私意自不奈那禮樂何禮樂須是中和溫厚厎人便行得若不仁者與禮樂自不相關了安得為之用又曰禮樂不為之用也是不為我使我使他不得雖玉帛交錯不足以為禮雖鐘鼓鏗鏘不足以為樂雖有禮而非禮雖有樂而非樂輔氏曰仁者心之德不仁則心無其德矣無德則雖謂之心亡可也心亡則無以管攝衆理故無如禮樂何也程子曰仁者天下之正理失正理則無序而不和語錄曰仁只是正當厎道理又曰程子說固好但少疎不見得仁仁者本心之全德人若本然天理之良心存而不失則所作為自有序而和若此心一放只是人欲私心做得出來安得有序安得有和黄氏曰集註置游氏說於前置程子說於後仁者心之德心之全德即仁也故游氏人心亡矣於仁字之義最親切仁心亡則無適而可不但無序不和而已程子正理之云則於仁字之訓為稍緩無序不和固切於如禮樂何之義然人心亡則又將無所不至也又曰將正理字頓在人心裏面方說得箇仁字全輔氏曰仁義禮智皆正理也此獨以仁言者蓋謂專言之而包四者之仁也失其正理則自然無序而不和無序則無禮不和則無樂陳氏曰仁者此心天理之全體也程子正理之說雖寛而實切却見得仁與禮樂相關甚密處然須更兼游氏人心之說乃圓所以集註並言之李氏曰禮樂待人而後行茍非其人則雖玉帛交錯鐘鼓鏗鏘亦將如之何哉然記者序此於八佾雍徹之後疑其為僭禮樂者發也李氏名郁昭武人語錄曰問游氏言心程子主理李氏謂待人而後行蓋心具是理而所以存是心者則在乎人也曰得之輔氏曰此章之意正指鐘鼓玉帛而言故以李氏說斷之又曰游氏兼禮樂之體用而言程子專指禮樂之體在内者李氏專指禮樂之用在外者三説備然後體用全内外備仁與禮樂相資以行之義可見矣林放問禮之本林放魯人見世之為禮者專事繁文而疑其本之不在是也故以為問子曰大哉問孔子以時方逐末而放獨有志於本故大其問語錄曰當時習於繁文人但指此為禮更不知有那實處故放問而夫子大之想是此問大段契夫子之心蓋得其本則禮之全體無不在其中矣語錄曰禮之全體兼文質本末言之問後面只以質為禮之本如何又說文質皆備曰有質則有文有本則有末徒文而無質如何行得譬如木必有本根則自然有枝葉華實若無本根則雖有枝葉華實隨即萎落矣禮與其奢也寧儉喪與其易也寧戚易去聲易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一於哀而文不足耳語錄曰易字訓治不是慢易簡易之易若是慢易簡易之易聖人便直道不好了如何更下得與其字只此可見又曰治田者須是經犁經耙治得無窒礙方可言熟若居喪而習熟於禮文行得皆無窒礙則哀戚必不能盡又曰易只是習得來熟似歡喜去做做得來手輕脚快都無那惻怛不忍厎意思禮貴得中語錄曰品節斯之謂禮蓋自有箇得中恰好處奢易則過於文儉戚則不及而質二者皆未合禮輔氏曰二者一過一不及皆未合乎理之中然凡物之理必先有質而後有文則質乃禮之本也輔氏曰無其質則文安所施以是觀之則質乃禮之本也范氏曰夫祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也禮失之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故為禮之本輔氏曰祭與喪皆禮也而與其不若之言正與夫子所謂寧字義相宜故引之為說禮失之奢喪失之易皆不能反本而流於末者此常情之弊也物事也禮而儉則是事之未有文飾也喪而戚則是心之誠實自然也故為禮之本楊氏曰禮始諸飲食故汙尊而抔飲為之簠簋籩豆罍爵之飾所以文之也則其本儉而已喪不可以徑情而直行為之衰麻哭踊之數所以節之也則其本戚而已周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此輔氏曰范氏止以祭為禮其說未全故又取楊氏說以足之人生之初便資乎飲食而飲食不可無器用故汙尊而抔飲此禮之始而儉也為之簠簋籩豆罍爵之數所以飾之而已喪之初若徑情而直行則毁或至於滅性此喪之始而戚也為之衰麻哭踊之數所以節之而已此儉與戚所以為禮與喪之本黄氏曰本之說有二其一曰仁義禮智根於心則性者禮之本也故曰中者天下之大本其一曰禮之本謂禮之初也凡物有本末初為本終為末所謂夫禮始諸飲食者是也二說不同集註乃取後說以儉戚為本而又引禮始諸飲食以證之矣然大哉問之下有曰得其本則禮之全體無不在其中以又指性而言何也禮之初始於儉與戚茍得儉戚之理則質與文實與華皆在其中蓋文之與華亦因質與誠而生也有本則有末末固具於本矣集註之說蓋本諸此而其意則因大哉之言而發以全體之具而見問之大非指性而言也子曰夷狄之有君不如諸夏之亡也吳氏曰亡古無字通用程子曰夷狄且有君長不如諸夏之僭亂反無上下之分也尹氏曰孔子傷時之亂而歎之也亡非實亡也雖有之不能盡其道爾語錄曰問程子似責在下者陷於無君之罪尹氏似責在上者不能盡為君之道曰只是一意皆是說上下僭亂不能盡君臣之道如無君也季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎女音汝與平聲旅祭名愚謂祭山曰旅周禮大宗伯旅四望鄭云旅陳也陳其事以祈焉禮不如祀之備也泰山山名在魯地禮諸侯祭封内山川語錄曰只緣是他屬我故我祭得他若不屬我則氣便不與之相感如何祭得他季氏祭之僭也冉有孔子弟子名求魯人時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也輔氏曰有是理則有是神有是神則享是禮神者禮之主也豈享非禮之祭哉故夫子言林放猶能問禮之本泰山寧享非禮之祭蓋欲季氏知其無益而自止又進林放以厲冉有也聖人之言廣大流通遏惡揚善包函無所不盡如此范氏曰冉有從季氏夫子豈不知其不可告也然而聖人不輕絶人盡已之心安知冉有之不能救季氏之不可諫也旣不能正則美林放以明泰山之不可誣是亦敎誨之道也輔氏曰聖人以人待人不逆人以為不能而輕棄之盡已之心述事之宜而順導之能不能雖在彼而敎誨之道則未嘗不行乎其間也子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子飲去聲揖遜而升者大射之禮耦進三揖而後升堂也胡氏曰大射之禮司射作三耦射三耦出次西面揖當階北面揖及階揖所謂三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降胡氏曰卒射北面揖揖如升射適次反位三耦卒射亦如之所謂射畢揖降以俟衆耦皆降也勝者乃揖不勝者升取觶立飲也胡氏曰司射命設豐于西楹西勝者之弟子洗觶酌奠于上勝者不勝者出揖如升射及階勝者先升堂不勝者進坐取豐上之觶興立卒觶坐奠于豐下興揖先降所謂勝者乃揖不勝者取觶立飲也言君子恭遜不與人爭惟於射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非若小人之爭矣輔氏曰恭與遜皆禮之發也恭主容遜主事爭則恭遜之反也君子恭遜則自無所爭獨於射則皆欲中的以取勝故不能無爭然其爭也升降揖遜雍容和緩乃如此是則所謂禮樂未嘗斯須去身者其爭也君子謂其異於小人之爭也以是觀之則信乎君子之眞無所爭矣子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也倩七鍊反盼普莧反絢呼縣反此逸詩也或問此詩蓋衞風碩人之篇素以為絢兮云者夫子刪而去之也曰刪詩者去其不合於義理者耳今此章之義夫子方有取焉而反見刪何哉且碩人詩四章而章皆七句不應此章獨多一句而見刪又不應因刪此句而并及他章例損一句以取齊也蓋不可知其為何詩矣倩好口輔也愚案服䖍云輔上頷車也是牙外之皮膚頰下之别名也盼目黑白分也素粉地畫之質也絢采色畫之飾也言人有此倩盼之美質而又加以華采之飾如有素地而加采色也子夏疑其反謂以素為飾故問之子曰繪事後素繪胡對反繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功謂先以粉地為質而後施五采猶人有美質然後可加文飾曰禮後乎子曰起予者商也始可與言詩已矣禮必以忠信為質猶繪事必以粉素為先起猶發也起予言能起發我之志意語錄曰聖人胷中雖包藏許多道理若無人叩擊則終是無以發揮於外一番說起則一番精神謝氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩輔氏曰子貢因論好禮與樂之學而知切磋琢磨之詩為自治益精之意子夏因論素以為絢之詩而知人之學禮當以質為先故皆可與言詩也楊氏曰甘受和白受采忠信之人可以學禮茍無其質禮不虚行此繪事後素之說也孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣所謂起予則亦相長之義也輔氏曰楊氏說最明切讀書者不可泥於章句之下而學詩者尤貴有得於言意之表不然則局於章句訓詁而詩之敎益於人者鮮矣固如高叟之固相長則是斆學相長之義也子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣杞夏之後宋商之後徴證也文典籍也獻賢也言二代之禮我能言之黄氏曰夫子所謂能言不但能言其制作之意其制度文為之實迹必有可以一二數者矣胡氏曰夏商之禮夫子能言之者併其本數末度皆能言之也聖人以聦明天縱之資加之以旁參博採故知之也而二國不足取以為證以其文獻不足故也胡氏曰所謂文獻不足非典籍與賢者全不可考也特有闕耳文獻若足則我能取之以證吾言矣輔氏曰典籍所以載是禮而賢者又禮之所從出典籍不足則無以考驗其事實賢者不足則無以質問其得失也子曰禘自旣灌而往者吾不欲觀之矣禘大計反趙伯循曰禘王者之大祭也王者旣立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也伯循名匡唐河東人或問禘禮之說獨取趙氏何也曰先儒以禘為合祭於太廟上及其祖之所自出而下及毁廟未毁廟之主祫則各祭於太廟而不及祖之所自出也惟趙伯循引曾子問春秋傳以明袷之為合如諸儒之說禘則直祭其祖之所自出而以其祖配之但設兩位而不兼羣廟之主為其尊逺不敢䙝也此說最為得之而其具於春秋纂例者詳矣成王以周公有大勲勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣語錄曰周禘帝嚳以后稷配之王者有禘有祫諸侯只有祫而無禘此魯所以為失禮也灌者方祭之始用鬱鬯之酒灌地以降神也或問鬱鬯曰禮家以為釀秬為酒煮鬱金香草和之其氣芬芳而條鬯也輔氏曰郊特牲謂周人尚臭灌用鬯臭鬱合鬯臭陰達於淵泉灌以圭璋用玉器也旣灌然後迎牲致陰氣也蕭合黍稷臭陽達於牆屋故旣奠然後焫蕭合羶薌凡祭謹諸此魂氣歸于天形魄歸于地故祭求諸陰陽之義也蓋周之祭禮先以鬱鬯灌地求神於陰旣奠然後取其血膋合之黍稷實於蕭以燔之以求神於陽也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣語錄曰方灌時誠意在焉即有其祭祀之事物及其誠意一散則雖有升降威儀已非所以為祭祀之事物矣蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也輔氏曰僭祭之罪雖大而其來已久且國惡當諱懈怠之失雖小然却是當時主祭者切已之實病不可不有以箴之蓋聖人於人旣往之失常有覆䕶之意而於人方起之病常有拯救之心此乃天地之心也謝氏曰夫子嘗曰我欲觀夏道是故之杞而不足證也我欲觀商道是故之宋而不足證也又曰我觀周道幽厲傷之吾舎魯何適矣魯之郊禘非禮也周公其衰矣考之杞宋已如彼考之當今又如此孔子所以深歎也輔氏曰謝氏蓋併前章通釋之以見此二章或夫子一時之言或記者以類次之也或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌先王報本追遠之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也語錄曰所禘者無廟無主便見聖人追遠報本之意無有窮已黄氏曰祀先之禮無非報本也無非追遠也子孫不敢忘其所自來而祀以報之是謂報本思其祖父亡矣遠矣不可復見矣而追以祀之是謂追遠報本追遠而至於及其祖之所自出是其用意甚深而非淺近之思也然此豈私意常情之所可及哉根於天理之自然者謂之仁形於人心之至愛者謂之孝眞實無妄者謂之誠主一無適者謂之敬仁孝誠敬凡為祭者皆然交於神明者愈遠則其心愈篤報本追遠之深則非仁孝誠敬之至者莫能知莫能行也輔氏曰仁者孝之本孝者仁之發誠者敬之體敬者誠之用仁孝誠敬有所未至則豈足以知禘禮為聖人報本追遠之極致哉蔡氏曰禘是報本中又報本追遠中又追遠者如祖考與吾之身心未相遼絶祭祀之理固自易通至於祭始祖已甚濶遠難盡其感格之道今又推其始祖所自出之帝而祀之茍非察理精微而仁孝誠敬之至安能與於此哉眞氏曰禘者祭始祖所自出之帝也祭祀之禮遠及於始祖之所自出無乃太遠乎蓋萬物本乎天人本乎祖我之有此身出於父母也父母又出於祖祖又出於始祖始祖又出於厥初得姓受氏之祖雖年代悠遠如自根而榦自榦而枝其本則一而已矣故必推始祖之所自出而祭之則報本反始之義無不盡矣若非仁孝誠敬之極至豈能知此禮而行之乎蓋凡人於世之近者則意其精神未散或嘗逮事而記其聲容必起哀敬之心而不敢忽若世之遠者相去已久精神之存與否不可得而知人素不識其聲容則有易忽之意故禘禮非極其仁孝極其誠敬者不能知其禮不能行其事又曰惟仁孝之深者能知此身之所自來惟誠敬之至者能知我之精神即祖考之精神而不王不禘之法又魯之所當諱者故以不知答之輔氏曰禮不王不禘而魯僭為之是當為之諱也傳曰諱國惡禮也或以其意之或怠而不欲觀或以其義之難知而不欲鑿其大意則皆為魯諱也示與視同指其掌弟子記夫子言此而自指其掌言其明且易也輔氏曰言如視此掌之明白而容易也蓋知禘之說則理無不明誠無不格而治天下不難矣語錄曰天地陰陽生死晝夜鬼神只是一理若明祭祀鬼神之理則治天下之理豈有外於此陳氏曰此是最大節目難明處旣有以明之則其他無有不可明者矣最疎遠難格處旣有以格之則其他無有不可格者矣所以於治天下不難也亦猶至誠感神矧兹有苗之意輔氏曰推報本之理至於始祖所自出之帝則理無不明矣推追遠之誠至於始祖所自出之帝則誠無不格矣理無不明則心盡而無一理之或蔽誠無不格則性存而無一誠之不通由是以治天下何難之有哉聖人於此豈眞有所不知也哉祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬語錄曰孔子當祭祖先之時孝心純篤雖死者已遠因時追思若聲容可接得以竭盡其孝心以祀之也祭外神謂山林陵谷之神能興雲雨者此孔子在官時也雖神明若有若亡聖人但盡其誠敬儼然如神明之來格得以與之接也又曰祭神如天地山川社稷五祀之類愚謂此門人記孔子祭祀之誠意語錄曰此是孔子弟子平時見孔子祭祖先及祭外神之時致其孝誠以交鬼神也黄氏曰祭先祭神固主於孝敬然其祭之也眞如見其在焉此足以見其盡孝敬之誠也集註以誠意二字發程子之所不及其義精矣子曰吾不與祭如不祭與去聲又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未嘗祭也語錄曰聖人萬一有故而不得與祭雖使人代之若其人自能極其恭敬固無不可然我這裏自欠少了故如不祭輔氏曰有故謂疾病或不得已之事已旣不克與而時又不可失則必使他人攝之然不得致其如在之誠故雖已祭而此心缺然與未嘗祭等也此心缺然處便是誠有未慊處也范氏曰君子之祭七日戒三日齋必見所祭者誠之至也是故郊則天神格廟則人鬼享皆由已以致之也有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虚也語錄曰誠者實也有誠則萬事都有無誠則凡事都無如祭祀有誠意則幽明便交無誠意便都不相接又曰神明不可見惟是此心盡其誠敬專一在於所祭之神便見得洋洋然如在其上如在其左右然則神之有無皆在於此心之誠與不誠不必求之恍惚之間也又曰鬼神之理即是此心之理問恐是自心裏以為有便有以為無便無曰若只據自家以為有便有無便無如此却是私意了這箇乃是自家欠了他厎蓋是自家空在這裏祭誠意却不達於彼便如不曾祭相似輔氏曰郊廟所以極言乎外神與先祖也又曰非言凡禮皆虚也特指攝祭之禮而言耳誠為實則指如在之意言也雖使人攝祭而不得自致其如在之誠則雖巳祭如未嘗祭是誠為實禮為虚也胡氏曰祭先之所以感通者吾身即所祭先之遺也祭神之所以感通者吾身即所祭神之主也因其遺因其主而聚其誠意則自然感格所謂有其誠則有其神愚謂范氏語意是說有此誠時方始有此神若無此誠即并此神無了不特說神來格不來格也王孫賈問曰與其媚於奥寧媚於竈何謂也王孫賈衞大夫媚親順也室西南隅為奥竈者五祀之一夏所祭也凡祭五祀皆先設主而祭於其所然後迎尸而祭於奥略如祭宗廟之儀如祀竈則設主於竈陘祭畢而更設饌於奥以迎尸也或問祀竈之禮何所據曰月令夏三月其祀竈而鄭註云爾也蓋凡祭五祀户竈門行霤皆先設席於奥而設主奠俎於其所祭之處已乃設饌迎尸於奥而孔疏以為逸禮中霤之文蓋唐猶有其書而今亡之也語錄曰問五祀皆設主而祭於其所然後迎尸而祭於奥曰譬如祭竈初設主於竈陘陘非可做好安排故又祭於奥以成禮凡五祀皆然問祀竈以誰為尸曰今亦無可考者但如墓祭則以冢人為尸以此推之則祀竈之尸恐是膳夫之類祀門之尸恐是閽人之類又如祀山川則是虞衡之類問竈可祭否曰人家飲食所繫亦可祭又曰竈陘想見是竈門外平正可頓柴處愚謂五祀先設主而祭於其所親之也再迎尸而祭於堂奥尊之也只祭於其所而不祭於奥則近於䙝祭於奥而不祭於其所則恐奥非神所常棲之地未必來享故兩祭之以盡其求神之道故時俗之語因以奥有常尊而非祭之主竈雖卑賤而當時用事胡氏曰五祀皆於祭俎之後設饌于奥故云奥有常尊而非祭之主竈不如奥而夏祭主之故云竈雖卑賤而當時用事也喻自結於君不如阿附權臣也賈衛之權臣故以此諷孔子語錄曰賈庸俗人見孔子在衛將謂有求仕之意欲孔子附已故有媚奥與媚竈之言彼須亦聞孔子之聖但其氣習卑陋自謂有權可以引援得孔子也子曰不然獲罪於天無所禱也天即理也語錄曰天之所以為天者理而已天非有此道理不能為天故蒼蒼者即此道理之天又曰天下只有丄箇正當道理循理而行便是天其尊無對非奥竈之可比也輔氏曰凡物必有對惟天則無所不包惟理則無所不在故尊而無對逆理則獲罪於天矣豈媚於奥竈所能禱而免乎語錄曰天下之至尊至大者莫如這箇道理若是違此道以干進乃是得罪於至尊至大者可畏之甚豈媚時君與媚權臣所得而免乎此是遜辭以拒王孫賈亦使之得聞天下有正理也言但當順理非特不當媚竈亦不可媚於奥也謝氏曰聖人之言遜而不迫使王孫賈而知此意不為無益使其不知亦非所以取禍眞氏曰使賈知此意則必惕然自省平日所為咈理得罪於天者已多是乃開其悔悟之機也如不知此意亦不至觸之以招禍其言渾然圭角不露此所以為聖人之言子曰周監於二代郁郁乎文哉吾從周郁於六反監視也二代夏商也言其視二代之禮而損益之郁郁文盛貌尹氏曰三代之禮至周大備夫子美其文而從之輔氏曰先王之制與氣數相為始終而前後相為損益固非一人一日之所能致也三代之禮至周大備則以氣數至此極盛而前後相承互為損益至此而始集其大成也夫子美其文而從之豈茍云乎哉子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也大音泰鄹側留反大廟魯周公廟此蓋孔子始仕之時入而助祭也或問何以知其為始仕時曰以所稱鄹人之子者觀之則其為少賤之時無疑矣鄹魯邑名孔子父叔梁紇嘗為其邑大夫孔子自少以知禮聞故或人因此而譏之孔子言是禮者敬謹之至乃所以為禮也尹氏曰禮者敬而已矣雖知亦問謹之至也其為敬莫大於此謂之不知禮者豈足以知孔子哉陳氏曰此章須於聖人敬謹之至處玩聖人氣象蔡氏曰聖人聦明睿知固無所不知然亦但知其理而已若夫制度器數之末掌之有司者聖人前此未之見安得而盡知之若已經講論討究知禮之器物與夫登降拜跪之節及今方見之亦須復問然後為審也子曰射不主皮為力不同科古之道也為去聲射不主皮鄉射禮文為力不同科孔子解禮之意如此也皮革也布侯而棲革於其中以為的所謂鵠也科等也古者射以觀德但主於中而不主於貫革蓋以人之力有强弱不同等也語錄曰射之本意也是要得貫革只是大射之禮主於觀德却不全是裸股肱決射御厎人只要内志正外體直取其中不專取其力爾黄氏曰主於中而不主於貫革則古人射但求其中鵠而已雖矢不沒而墜於地亦不害其為中也曰如此則古人之射但為文具而已乎曰非也射者固所以觀德而亦所以禦侮也男子之生桑弧蓬矢以射天地四方則射者凡人之皆有事焉者也射於百步之外而力足以至之亦豈非力哉不主於皮亦未嘗以貫革為非也取其中而貫與不貫不論耳若主於貫革則惟有力者可與於射而無力者不得與則世之善射者亦寡矣不主於貫革則人人皆可射其强有力者足以貫革其力不足者雖不能貫革於百步之外亦豈不能貫革於數十步之内哉如是則不惟足以觀德而亦可以禦侮也記曰武王克商散軍郊射而貫革之射息正此謂也周衰禮廢列國兵爭復尚貫革故孔子歎之輔氏曰時平則射以觀德世亂則射主貫革二者固各有所冝然貫革之射可暫而不可常武王之事是也此可見聖人之仁心周衰禮廢列國兵爭貫革之射遂將習以為常此夫子所以嘆之楊氏曰中可以學而能力不可以强而至聖人言古之道所以正今之失子貢欲去告朔之餼羊告朔之禮古者天子常以季冬頒來歲十二月之朔于諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之語錄曰特羊乃專特之特非牛也特牲用特皆是特用一牛非指特為牛也輔氏曰諸侯受天子所頒之朔而藏於祖廟所以敬天子也月朔則以特羊告廟請而行之所以敬先祖也餼生牲也魯自文公始不視朔而有司猶供此羊故子貢欲去之子曰賜也爾愛其羊我愛其禮愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若并去其羊則此禮遂亡矣孔子所以惜之語錄曰常人只是屑屑惜那小費聖人心却將那小費不當事所惜者是禮楊氏曰告朔諸侯所以禀命於君親禮之大者魯不視朔矣然羊存則告朔之名未泯而其實因可舉此夫子所以惜之也子曰事君盡禮人以為諂也黄氏曰孔子於事君之禮非有所加也如是而後盡爾時人不能反以為諂故孔子言之以明禮之當然也黄氏名祖舜三山人愚謂禮只是儀節如拜下禮也今拜乎上泰也雖違衆吾從下如此等處聖人必至禮而止故曰盡豈於禮之外又有加益哉當時君弱臣强事上簡慢反以為諂爾程子曰聖人事君盡禮當時以為諂若他人言之必曰我事君盡禮小人以為諂而孔子之言止於如此聖人道大德宏此亦可見定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠定公魯君名宋二者皆理之當然各欲自盡而已呂氏曰使臣不患其不忠患禮之不至事君不患其無禮患忠之不足尹氏曰君臣以義合者也故君使臣以禮則臣事君以忠或問呂尹氏之說曰呂氏以君臣各盡其道而言言之正也尹氏則為君而言之爾若為臣而言則曰君之使臣雖不以禮而臣之事君亦豈可以不忠也哉語錄曰尹氏就人君而言則如此說但道理亦是如此自是人主不善遇之則下面人不盡心如孟子所謂君之視臣如手足則臣視君如腹心道理是如此愚謂呂氏患不忠之說所以明君臣當各盡其分而不可有交相責之意也尹氏以則字介乎其間似若舉一而廢一然夫子之言因定公而發恐亦有此意專以警為君者也子曰關雎樂而不淫哀而不傷樂音洛關雎周南國風詩之首篇也淫者樂之過而失其正者也傷者哀之過而害於和者也輔氏曰失其正以理言也害於和以氣言也黄氏曰樂氣盈哀氣鬱盈而過則濫溢故淫鬱而深則哀怨故傷發於天理之公則盈而不淫鬱而不傷發於人欲之私則淫而傷矣關雎之詩言后妃之德宜配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鍾鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失其正故夫子稱之如此欲學者玩其辭審其音而有以識其性情之正也語錄曰憂止於展轉反側是不傷也若憂愁哭泣則傷矣樂止於琴瑟鍾鼓是不淫也若沉湎淫泆則淫矣是得性情之正問詩人之情性如此抑詩之辭意如此曰也是有那情性方有那辭氣聲音輔氏曰哀樂情之發也心不宰焉則流於傷與淫而不自知矣關雎之詩感於性發於情而宰於心者也其形於聲詩播諸音樂皆得其和且正焉故學者能玩其辭審其音則可以識其性情之正後世音雖不傳學者能玩其辭而有得焉則詩之敎猶為不廢也胡氏曰觀詩之法原其情性玩其詞語審其聲音而已今情性難知聲音不傳惟詞語可以玩味耳詩集傳以關雎為宮中人所作蓋其欲得賢妃以配文王方其未得也寤寐反側以致其憂思之深矣然未至於悲怨則不傷也及其得之也琴瑟鍾鼓以宣其和樂之至矣然未至於沈湎則不淫也因其詞語即可以知其情性至於播於長言被之筦弦則聲音亦可以略見矣哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗宰我孔子弟子名子魯人三代之社不同者古者立社各樹其土之所宜木以為主也語錄曰問不知以木造主還便以樹為主曰看古人意思只以樹為社主使神依焉如今人說神樹之類輔氏曰此註疏說也孔安國註云凡建邦立社各以其所宜之木孔穎達正義云夏都安邑宜松商都亳宜柏周都豐鎬宜栗謂用其木以為社主而朱子又嘗取沙隨程氏說云古者社以木為主今以石為主非古也愚案以石易木不知其所從始然地道敏樹則植木為主宜也想後世以木有榮枯故易用石耳胡氏曰周禮大司徒設其社稷之壝各以其野之所宜木此章之解因周制而知夏商之亦然也戰栗恐懼貌宰我又言周所以用栗之意如此豈以古者戮人於社故附會其說與輔氏曰書甘誓云弗用命戮於社蓋古者建國宗廟在左社稷在右左陽也右陰也陰主殺行軍則載社主以行弗用命則戮之於社也子聞之曰成事不說遂事不諫旣往不咎遂事謂事雖未成而勢不能已者輔氏曰微子之不諫商紂百里奚之不諫虞公近之蓋知其勢之不能已諫之終無益也孔子以宰我所對非立社之本意又啓時君殺伐之心而其言已出不可復救故歴言此以深責之欲使謹其後也尹氏曰古者各以所宜木名其社非取義於木也宰我不知而妄對故夫子責之輔氏曰莊子書有櫟社漢書有枌榆社皆是以木名社也後旣易之以石則不復名之矣又曰宰我在言語之科然觀此戰栗之對則失於鑿流於妄者或不能免大凡己所未曉之事而妄言以語人不惟無益而失已欺人之弊有不可勝言者又況導人以殺戮之事哉此夫子所以深責之也子曰管仲之器小哉管仲齊大夫名夷吾相桓公霸諸侯器小言其不知聖賢大學之道故局量褊淺規模卑狹不能正身脩德以致主於王道語錄曰局量褊淺是他容受不去了容受不去則富貴能淫之貧賤能移之威武能屈之矣規模是就他施設處說又曰局量是言其資質規模是言其所為黄氏曰局量指其心之蘊蓄而言規模指其事之發見而言心者器之體事者器之用褊淺卑狹一體一用無非小也不能正身修德則心之所向可知不能致主於王道則事之所就可知局量褊淺則規模必卑狹未有不能正身修德而能致主於王道也輔氏曰其所以不能正身修德以致主於王道者蓋以其局量褊淺規模卑狹故也而其所以局量褊淺規模卑狹者又以其不知聖賢大學之道局於資禀牿於物欲而不能盡此心之量此性之體故也陳氏曰局量是就身上言局是格局其所有處量是度量其所藴處規模是就事業言其所施設處局量褊淺故不能正身修德好奢而犯禮規模卑狹故不能致主於王道僅相桓公霸諸侯而已二者蓋兼内外體用之說以為器小之證亦略有先後但不可分開了胡氏曰局量規模以器言褊淺卑狹以小言不知聖賢大學之道所以器小也本之不立也不能正身修德以致主於王道器小之驗也效之不至也無是本則無是效矣又曰初以局量為度量後因學者有問而欲更度為識今定作局豈以局有器之義而識為疎邪一字之精嚴如此學者豈可疎略而觀之哉或曰管仲儉乎曰管氏有三歸官事不攝焉得儉焉於䖍反或人蓋疑器小之為儉三歸臺名事見說苑或問三歸之為臺名曰說苑謂管仲築三歸之臺而韓非亦曰桓公使管仲有三歸之家是其證也曰舊說婦人謂嫁曰歸三歸云者一娶三姓而備九女如諸侯之制也且雖臺名安知不以處是人而名之乎曰若此則為僭上失禮與塞門反坫同科矣今夫子但以為不儉則亦但為極臺觀之侈而未至於僭也攝兼也家臣不能具官一人常兼數事管仲不然皆言其侈然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮好去聲坫丁念反或人又疑不儉為知禮或問或人聞小器而以為儉則似矣聞其不儉而遽以為知禮何哉曰世方尊管仲之功而不敢議其失故以為凡管仲之所為則是禮之所存矣又方文勝故徒知儉而不及者之為非禮而不知奢而過者之尤失禮也屏謂之樹塞猶蔽也設屏於門以蔽内外也愚謂古者人君别内外於門樹屏以蔽塞之蓋小牆當門中也禮天子外屏諸侯内屛大夫以簾士以帷好謂好會坫在兩楹之間獻酬飲畢則反爵於其上愚謂古者諸侯與鄰國為好會主君獻賓賓筵前受爵飲畢反此虚爵於坫上於西階上拜主人於阼階上答拜賓於坫取爵洗爵酌以酢主人主人受爵飲畢反此虛爵於坫上主人阼階上拜賓答拜是賓主飲畢反爵於坫上也大夫則無之此皆諸侯之禮而管仲僭之不知禮也愚謂孔子譏管仲之器小其旨深矣輔氏曰器小兩字該括盡管仲所為故言其旨深或人不知而疑其儉故斥其奢以明其非儉或又疑其知禮故又斥其僭以明其不知禮蓋雖不復明言小器之所以然而其所以小者於此亦可見矣故程子曰奢而犯禮其器之小可知蓋器大則自知禮而無此失矣此言當深味也輔氏曰器大則天下之物不足以動其心而唯吾義理之是行自然不至於奢而犯禮也蓋奢而犯禮便是他裏面着不得見些些小功業便已驚天動地所以肆然犯禮無所忌也胡氏曰奢者其器之小而盈也犯禮者其器之盈而溢也蘇氏曰自脩身正家以及於國則其本深其及者遠是謂大器揚雄所謂大器猶規矩準繩先自治而後治人者是也管仲三歸反坫桓公内嬖六人而霸天下其本固已淺矣管仲死桓公薨天下不復宗齊蘇氏名軾眉山人語錄曰只為他本領淺只做得九合諸侯一匡天下之功三歸反坫等用處皆小楊氏曰夫子大管仲之功而小其器蓋非王佐之才雖能合諸侯正天下其器不足稱也道學不明而王霸之略混為一途故聞管仲之器小則疑其為儉以不儉告之則又疑其知禮蓋世方以詭遇為功而不知為之範則不悟其小宜矣語錄曰恐混為一途之下少些曲折蓋當時人但見有箇管仲更不敢擬議他故疑器小之為儉又疑不儉之為知禮輔氏曰大其功所以從衆而揚其善也小其器所以即事而名其實也又曰才與器皆生於氣質其所能為者謂之才其所能受者謂之器仲之才雖足以合諸侯正天下而其器之小不能大其受局於器奪於欲是以奢而犯禮茍免幸濟而其所成就者亦如此之卑也使仲而嘗學於聖人之門知大學之道而從事焉則其器之小者可以大而其才之能為者亦將光明盛大雖伊周事業可以立致矣又曰以器小為儉退一步以求其美也以不儉為知禮進一步以求其美也一進一退而終欲成仲之美蓋當時道學不明功利是騖人已眩惑於管仲之功而不敢議其失矣陳氏曰如楊氏說得不知大學本領所以局量褊淺處楊氏說得不能致主於王道所以規模卑狹處須兼二說通看乃備其義子語魯大師樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成語去聲大音泰從音縱語告也胡氏曰不待其問而告之也大師樂官名時音樂廢闕故孔子敎之翕合也胡氏曰樂作而不合則不備從放也純和也陳氏曰純則相濟如一而和胡氏曰翕合則易至於迫蹙故放之而欲其和皦明也陳氏曰皦則節奏分明而不相陵奪胡氏曰旣和而不明則無别繹相續不絶也胡氏曰旣别而不相連續則無貫通之妙成樂之一終也胡氏曰翕而純純而皦皦而繹其次第如此周而復始故謂之一成謝氏曰五音六律不具不足以為樂翕如言其合也五音合矣清濁高下如五味之相濟而後和故曰純如合而和矣欲其無相奪倫故曰皦如然豈宮自宮而商自商乎不相反而相連如貫珠可也故曰繹如也以成輔氏曰夫子之言樂首尾具舉節目分明非其心通黙會何以及此又得謝氏發明之詳可不玩其說以求樂之義哉儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸請見見之之見賢遍反從喪皆去聲儀衞邑封人掌封疆之官胡氏曰封人周官名掌為畿封而殖之左氏傳所謂頴谷封人祭封人蕭封人皆典封疆在邊邑者也蓋賢而隱於下位者也胡氏曰封人有請見之心則非若沮溺之狷介自高矣自言其得見君子之多則所聞已不淺狹矣雖其見聖人而請問之辭不傳然意象和平進退從容旣出而語門人之語亦深得其大致則賢者而隱於下位者也君子謂當時賢者至此皆得見之自言其平日不見絶於賢者而求以自通也見之謂通使得見喪謂失位去國禮曰喪欲速貧是也或問諸家皆以喪為斯文之喪子獨以為失位之喪何也曰此劉侍讀之說而蘇氏因之得其指矣蓋封人亦曰何患於喪而已固未有以知其為斯文之喪且當是時夫子固無恙也二三子又何患於斯文之喪乎木鐸金口木舌施政敎時所振以警衆者也胡氏曰明堂位言振木鐸于朝言亂極當治天必將使夫子得位設敎不久失位也封人一見夫子而遽以是稱之其所得於觀感之間者深矣語錄曰儀封人與夫子說話皆不可考但此人辭氣最好必是箇賢有德之人一見夫子其觀感之間必有所見故為此言輔氏曰聖人德容之盛觀之者固當知所敬愛矣然封人之賛夫子則因所見以驗所聞即其已然而得其將然不惟有以見聖人之當乎天而又有以知天之不能違乎聖人也其得於觀感之際可謂深矣豈他人所能及哉或曰木鐸所以徇于道路言天使夫子失位周流四方以行其敎如木鐸之徇于道路也輔氏曰本說意實而味長後說意巧而味短子謂韶盡美矣又盡善也謂武盡美矣未盡善也韶舜樂武武王樂美者聲容之盛善者美之實也語錄曰美如人生得好善則其中有德行耳以樂論之其聲音節奏與功德相稱可謂美矣善則是那美之實又曰實是美之所以然處且如織出絹與布雖皆好然布終不若絹之好輔氏曰聲容言樂之聲舞之容也美之實則謂其聲容之所以美陳氏曰美以功言善以德言集註已分明胡氏曰美者善之著善者美之實舜紹堯致治武王伐紂救民其功一也故其樂皆盡美胡氏曰盡美者韶武各盡其美蓋韶盡揖遜繼紹之美武盡發揚蹈厲之美然舜之德性之也又以揖遜而有天下武王之德反之也又以征誅而得天下故其實有不同者語錄曰性之反之也要尋他本身上來自是不同使舜當武王時畢竟更强似大武使武王當舜時必不及韶樂好又曰舜之德如此又撞着好時節武王徳不及舜又撞着不好時節又曰德有淺深有幸不幸舜性之武王反之自有淺深舜以揖遜武以征伐征伐雖是應天順人自是有不盡美處今若要强說舜武同道也不得必欲美舜而貶武也不得舜武不同正如孟子言伯夷伊尹之於孔子不同至謂得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下不為是則同也舜武同異正如此故武王之德雖比舜有淺深而治功亦不多爭韶武之樂正是聖人一箇影子要得因此以觀其心又曰舜之德性之武王反之是他身上事與揖遜征伐不相干但舜處武王時畢竟又别陳氏曰揖遜征伐乃所遇之時不同非干性反之故問性反與樂何相干曰樂雖由外作却與本人意思相合便是德之影子不可謂不相干也蔡氏曰或疑性之反之之說頗遠於樂殊不知樂觀其深矣若不原其性之反之之異亦何以觀其深程子曰成湯放桀惟有慙德武王亦然故未盡善堯舜湯武其揆一也征伐非其所欲所遇之時然爾語錄曰問使舜遇湯武之時不知如何曰只怕舜盛德人自歸之若是大段負固不得已也須征伐如伐苗是也輔氏曰舜武王之樂雖其實有不同者然聖人至公無我之心順天應人之舉則其揆一也故成湯之德為有慚武王之樂未盡善皆所遇之時然耳子曰居上不寛為禮不敬臨喪不哀吾何以觀之哉居上主於愛人故以寛為本為禮以敬為本臨喪以哀為本旣無其本則以何者而觀其所行之得失哉語錄曰有其本方可就其本上看他得失厚薄若無其本更看箇甚麽又曰如寛便有過不及哀便有淺深敬便有至不至須是有上面這箇物事方始就這箇見得他得失陳氏曰觀字有辨明兩件厎意此三者是根本切要處可以觀人之得失若無其本則其他末處無可以觀其得失矣里仁第四凡二十六章子曰里仁為美擇不處仁焉得知處上聲焉於䖍反知去聲里有仁厚之俗為美語錄曰如今有箇鄉村人淳厚便是那鄉村好擇里而不居於是焉則失其是非之本心而不得為知矣或問孟子嘗引以明擇術之意今直以擇鄉言何也曰以文義考之則擇云者不復指言所擇而特因上句以為文恐聖人本意止於如此而孟子姑借此以明彼耳黄氏曰道無精粗凡所當然無非道也居必擇鄉居之道也薫陶染習以成其德賙䘏保愛以全其生此豈細故哉學者不可以擇里為粗而必欲以擇術之言為精也子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁樂音洛知去聲約窮困也利猶貪也蓋深知篤好而必欲得之也輔氏曰知者之於仁猶小人之貪利皆深喻篤好故必欲得之蓋天理人欲同行而異情小人能移為惡之心以為善則何有哉不仁之人失其本心久約必濫久樂必淫語錄曰問旣是失其本心則便解濫淫而必以久言之何故曰也有時下未肯恁地做厎聖人說話穩而今說道他不仁則約便濫樂便淫也有不便恁地厎黄氏曰本心者天理之公失其本心則人欲之私為之主矣徇人欲之私豈能久處約長處樂乎輔氏曰濫謂濫溢為非淫謂淫佚自失不仁之人失其本心則以物為我逐物變遷好惡生於瞬息之間欣厭起於不旋踵之後曰濫曰淫蓋有不期然而然者惟仁者則安其仁而無適不然知者則利於仁而不易所守蓋雖深淺之不同然皆非外物所能奪矣輔氏曰仁者安其仁而無適不然如地之安靜而無物不體無時不然知者利於仁而不易所守則所謂知而弗去者是也知者知而不去仁者常而不已陳氏曰仁者智者之能處約樂只於安利處便見蓋仁者安其仁而無適不安久處約亦安長處樂亦安如舜飯糗茹草若將終身及被袗鼓琴若固有之殊不以約樂為事視外事若無有也知者貪仁如嗜利而不易所守在富貴不能淫在貧賤不能移故久處約長處樂皆確然不為外物所奪蔡氏曰仁知雖皆非外物所能奪然人之資禀亦自不同有得仁之深者有得知之深者加學問之功則知者亦可以至於仁然欲至於仁亦未有不由於知也愚謂安仁者心與仁為一故曰其知者心與仁猶二也故曰於謝氏曰仁者心無内外遠近精粗之間非有所存而自不亡非有所理而自不亂如目視而耳聽手持而足行也知者謂之有所見則可謂之有所得則未可有所存斯不亡有所理斯不亂未能無意也安仁則一利仁則二安仁者非顔閔以上去聖人為不遠不知此味也諸子雖有卓越之才謂之見道不惑則可然未免於利之也語錄曰問遠近精粗之間曰亦只是内外意思吾心渾然一理無内外遠近精粗這段分别極通透謝氏此說他人所不到又曰利仁貪利為之未要做遠厎且就近厎做未要做精厎且就粗厎做問安仁者非顔閔以上不知此味便是聖人之事乎曰是到顔閔地位知得此味猶未到安處也陳氏曰内外以身分别内是裏面外是外面遠近以所在言近是目前處遠是千里之外極天所覆處精粗以事言精是入細厎事粗是至粗鄙厎事仁者之心日用間渾是天理流行無一處不該無一物不貫何有内外遠近精粗之間若見得仁分明此等處自曉然矣輔氏曰仁體事而無不在故心無内外遠近精粗之異我固有之自然而然非有所存而自不亡言其體也非有所理而自不亂言其用也其動以天不待於使故如目視而耳聽手持而足行此安仁之事非顔閔以上去聖人不遠者不知此味也知者之知足以知夫仁然未能得之於已也有所操存則其體斯不亡有所經理則其用斯不亂此意少解則不能不失之此利仁之事所謂諸子雖有卓越之才謂之見道不惑則可然未免於利之也諸子蓋指孔門羣弟子由賜以下諸人也又曰安仁則純乎義理仁即我也我即仁也故一利仁則心知欲仁守而勿失於仁猶有間也故二莆田黄氏曰仁者心存隨處皆仁如源清看如何流出皆清也更不待計較安排其體常存其用各當如目視耳聽手持足行動者便自然相應子曰惟仁者能好人能惡人好惡皆去聲惟之為言獨也蓋無私心然後好惡當於理輔氏曰仁者心之德純是義理才有纎豪私欲便是不仁不仁則其好惡自然與義理相違悖矣胡氏曰好其所是惡其所非人之至情也然有一私意雜乎其間則憎而不知其善愛而不知其惡者有矣故好惡當理惟仁者能之仁者之心渾然天理無一豪私噫其心之所好理之所當好其心之所惡理之所當惡也程子所謂得其公正是也或問公正之說曰公者心之平也正者理之得也一言之中體用備矣語錄曰惟公然後能正公是箇廣大無私意正是箇無所偏主處又曰程子只着箇公正兩字解這處怕人理會不得故以無私心解公字好惡當於理解正字有人好惡當於理而未必無私心有人無私心而好惡又未必當於理惟仁者旣無私心而好惡又當於理又曰而今人多連看公正二字其實公自是公正自是正這兩箇字相少不得公是心裏公正是好惡得來當理茍公而不正則其好惡必不能皆當乎理正而不公則切切然於事物之間求其是而心却不公所以此兩字不可少一黄氏曰謂之得其公正則是一好一惡皆有以得夫至公至正而非私非邪所以為能好惡也仁者無私欲所以見於好惡者得其公仁者皆天理所以見於好惡者得其正陳氏曰二字固須兼盡然亦相因非截然二物更須知雖無私心茍不合正理亦私也雖或當理茍未能無私心亦未得為當理也輔氏曰公以心言正以事言心公則所好所惡之事皆得其正胡氏曰公者即無私心之謂正者即好惡當於理之謂無私心體也好惡當於理用也有是體則有是用也游氏曰好善而惡惡天下之同情然人每失其正者心有所繫而不能自克也惟仁者無私心所以能好惡也輔氏曰好善惡惡雖天下之同情然人每失其正者不能致知誠意而有所累于心故也方其好善也而有不好者拒之於内方其惡惡也而有不惡者引之於中所以卒至於倒行逆施好其所惡惡其所好而無所不至矣子曰茍志於仁矣無惡也惡如字茍誠也胡氏曰茍字有二義有以茍且為言者茍合茍美之類是也有以誠實為言者此章及茍子不欲之類是也志者心之所之也其心誠在於仁則必無為惡之事矣語錄曰纔志仁時便無惡若間斷不志仁時惡又生黄氏曰人心不可兩用志於此必遺於彼所患者無其志耳況仁者此心之全德誠志於仁則必先存此心天理之公而去其人欲之私惡念何自而生乎永嘉陳氏曰此是君子小人分路猶向東行人一心向東去無復有回轉向西之理西行人亦然楊氏曰茍志於仁未必無過舉也然而為惡則無矣通書解義曰有心悖理謂之惡無心失理謂之過語錄曰惡是誠中形外過是偶然過差輔氏曰過舉謂或用意過當或資質之偏或氣壹之動志無惡則志為之主也志在於仁則思慮自不到於惡上矣又安得志於為惡哉子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也惡去聲不以其道得之謂不當得而得之或問君子而有非道以得富貴者何也曰是亦一時不期而得之非語其平日之素行也蓋如孔子主我衞卿可得行一不義殺一不辜而得天下之類耳黄氏曰世之得貧賤之道多矣如不守繩檢博奕鬬狠奢侈縱肆者所以取貧賤之道不以其道者謂無此等事而為水火盗賊陷於刑戮之類以致貧賤皆非以得貧賤之道而得之然於富貴則不處於貧賤則不去君子之審富貴而安貧賤也如此語錄曰得富貴須是審茍不以其道決是不可受他厎得貧賤却要安我雖是不當得不可於上面計較云我不當得貧賤有汲汲求去之心又曰今人大率於利雖不當得亦瞑然受之若有害則必以為不當得而求去之便不是君子則於富貴之來須是審而處之於貧賤則不問當得與不當得但當安而受之不求去也君子去仁惡乎成名惡平聲言君子所以為君子以其仁也輔氏曰君子者成德之名而仁者心之全德也故惟仁然後可以名君子若貪富貴而厭貧賤則是自離其仁而無君子之實矣何所成其名乎輔氏曰貪字正與審字相悖厭字正與安字相反審富貴而安貧賤則義理勝而物欲不行必如是然後可以為仁不然則是自離其仁而無君子之實矣尚何以成君子之名乎胡氏曰仁者君子之實無其實則何以成其名哉君子無終食之間違仁造次必於是顛沛必於是造七到反沛音貝終食者一飯之頃造次急遽茍且之時顚沛傾覆流離之際語錄曰問茍且莫只就人情上說否曰茍且是時暫處茍可以坐茍可以立令此心常存非如大賓大祭時也問曾子易簀莫是茍且時否曰此正是顚沛之時那時已不可扶持要如此坐也不能得蓋君子之不去乎仁如此不但富貴貧賤取舎之間而已也言君子為仁自富貴貧賤取舎之間以至於終食造次顚沛之頃無時無處而不用其力也語錄曰聖人之意不獨是教人於富貴貧賤處做工夫須是到終食顛沛造次都用功方可輔氏曰道理無處不有無時不然君子為仁豈可不無時無處而用其力哉然取舎之分明然後存養之功密存養之功密則其取舎之分益明矣輔氏曰取舎之分在外所謂審富貴而安貧賤是也而實有助於内存養之功在内所謂無終食造次顛沛之違是也而實有益於外故取舎之分明則存養之功愈精密而無違闕之處存養之功密則取舎之分愈明白而無疑似之差蔡氏曰審富貴安貧賤是立大根本處終食不違造次顚沛必於是是入細存養處學者固不可不加存養之功然若不先立此根本則亦無以為存養之地也子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身好惡皆去聲夫子自言未見好仁者惡不仁者問好仁者必惡不仁惡不仁者必好仁二者並行而不相悖聖人必於好惡上分輕重何也永嘉陳氏曰性各有偏重顔子正是好仁之人豈不能惡不仁只緣好仁意思勝如惡不仁孟子正是惡不仁豈不能好仁只緣惡不仁意思勝如好仁故各於偏重處成就蓋好仁者眞知仁之可好故天下之物無以加之語錄曰旣是好仁便知得他無以加此若是説我好仁又却好財好色物皆有好便是不曾好仁若果好仁便須天下之物皆無以過之惡不仁者眞知不仁之可惡故其所以為仁者必能絶去不仁之事而不使少有及於其身語錄曰惡不仁如惡惡臭唯恐惡臭之及吾身也其眞箇惡他如此非是且如此惡他後又却不惡他也此皆成德之事故難得而見之也胡氏曰好仁而知天下之善無以加則所行皆仁矣惡不仁而使天下之惡不相及則所行無不仁矣故皆得為成德之事蔡氏曰好仁者天資溫和寛厚惟知仁之可好舉天下之物無以尚之惡不仁者天資剛毅勁直眞知不仁之可惡惟恐不仁者得以加其身若論資質則惡不仁者不如好仁者之渾然若論工夫則好仁者不如惡不仁者之有力要之皆成德之事本無優劣此夫子所以嘆其未見也有能一日用其力於仁矣乎我未見力不足者言好仁惡不仁者雖不可見然或有人果能一日奮然用力於仁則我又未見其力有不足者輔氏曰此以理言所以開人進善之路也蓋為仁在己欲之則是而志之所至氣必至焉語錄曰志如大將一般指揮一出三軍皆隨只怕志不立若能立志氣自由我使人出來恁地萎萎衰衰恁地柔弱亦只是志不立志立自是奮發敢為這氣便生志在這裏氣便在這裏故仁雖難能而至之亦易也蓋有之矣我未之見也蓋疑辭有之謂有用力而力不足者蓋人之氣質不同故疑亦容或有此昏弱之甚欲進而不能者但我偶未之見耳語錄曰問旣曰用力亦安有昏弱欲進而不能者曰有這般人其初用力非不切至到中間自是欲進不能夫子所謂力不足者中道而廢正說此等人輔氏曰此以事言所以決人用力之機也旣言有能一日用其力於仁矣乎我未之見也又曰蓋有用力而力不足者但我偶未見之耳其言抑揚磨厲反復嘆嗟言有盡而意無窮所以勉學者之為仁至矣蓋不敢終以為易而又歎人之莫肯用力於仁也語錄曰聖人只是甚言用力者之難得用力之好者固未之見到資稟昏弱欲進而不能者亦未之見可見用力者之難得也此章言仁之成德雖難其人然學者茍能實用其力則亦無不可至之理但用力而不至者今亦未見其人焉此夫子所以反覆而歎息之也胡氏曰此章三言未見而意實相承初言成德者之難得次言用力者之難得末又言用力而力不足者亦難得也語意反復無非欲學者因是以自警而用其力焉耳子曰人之過也各於其黨觀過斯知仁矣黨類也程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人過於忍文集曰程子止是舉一隅耳若君子過於廉小人過於貪君子過於介小人過於通之類皆是亦不止於四者而己語錄曰君子過於厚與愛雖然是過然亦是從那仁中來血脉未至斷絶若小人過於薄與忍則與仁之血脉已是斷絶謂之仁可乎又曰厚與愛必竟是仁上發來其苗脉可見黄氏曰人之有過必有其類者氣質心術之不同也因其所過之類而觀之則其人之氣質心術可見故雖有過而不害其為仁也非謂必欲伺人之過而觀其仁蓋以人雖有過不可以其過而忽之於此而觀其類乃所以得其用心之微也問不知合君子小人之過觀之則可以知仁還是君子小人各自於其過處觀之永嘉陳氏曰過於厚處即其仁可知過於薄處即其不仁可知觀其人之過可以知其仁不仁矣中含不仁字尹氏曰於此觀之則人之仁不仁可知矣黄氏曰觀其所入是何黨類而仁不仁可知輔氏曰此章但謂仁者之過若不仁之過又何觀哉故引尹氏之說以結之蔡氏曰經只說知仁尹氏乃以仁不仁言蓋推程子之說也詳味程子之意似非専指一人而言乃是通論人之所以有過皆是隨其所偏或厚或薄或愛或忍就其發處之偏而觀之則過於厚過於愛者固可以知仁而過於薄過於忍者亦可以因其不仁而知仁矣細玩聖經渾涵宏博但曰人之過也各於其黨而厚薄愛忍自無不包但曰觀過而觀人自觀自無不備但曰斯知仁而仁與不仁皆在其中矣蓋聖人就人隱微偏過處指以示人欲使求仁之功愈密而愈無滲漏是雖因此可以知仁而亦非謂必如此而後可以知仁也吳氏曰後漢吳祐謂掾以親故受汙辱之名所謂觀過知仁是也愚案此亦但言人雖有過猶可即此而知其厚薄非謂必俟其有過而後賢否可知也輔氏曰人情於人之過失多不致察故夫子發此觀過知仁之說耳却非是說欲知人賢否必須俟其有過而後可觀也子曰朝聞道夕死可矣道者事物當然之理茍得聞之則生順死安無復遺恨矣語錄曰道只是事物當然之理只是尋箇是處大者易曉於細微曲折人須自辨認取若見得道理分曉生固好死亦不妨不然生也不濟事死也枉死又曰問雖死亦安無有遺恨曰死亦是道理黄氏曰事物當然之理即道也合事物當然之理而緫言之亦道也口耳誦說即聞也物無不格而理無不通亦聞也此所謂聞物無不格理無不通之謂也輔氏曰父子有親則於父子之間順矣君臣有義則於君臣之間順矣夫婦有别則夫婦順矣長幼有序則長幼順矣朋友有信則朋友順矣推而至於應事接物之際各得其理則無適而非順矣豈復有不足之憾哉生盡其順則死得其安如曾子易簀是也不如是則不安矣胡氏曰夫子但以夕死為可而今兼生順言之者惟其生順而後死安也果能朝有所聞必不肯置身於一豪不順之地生旣能順則雖死可也朝夕所以甚言其時之近程子曰言人不可以不知道茍得聞道雖死可也語錄曰此聞是知得到信得及方是聞道故雖死可也若以聽人之說為聞道若如此便死亦可謂枉死了又曰所謂聞道亦不止知得一理須是知得多有箇透徹處至此雖便死也不妨又曰皆實理也人知而信者為難死生亦大矣非誠有所得豈以夕死為可乎或問朝聞夕死得無近於釋氏之說曰吾之所謂道者君臣父子夫婦昆弟朋友當然之實理也彼之所謂道則以此為幻為妄而絶滅之以求其所謂清淨寂滅者也人事當然之實理乃人之所以為人而不可以不聞者故朝聞之而夕死亦可以無所憾若彼之所謂清淨寂滅者則初無所效於人生之日用其急於聞之者特懼夫死之將至而欲倚是以敵之耳是以為吾之說者行法俟命而不求知死為彼之說者坐亡立脫變見萬端而卒無補於世敎之萬分也程子專以實理為說其旨亦深切矣語錄曰知後須要得得後方信得篤子曰士志於道而恥惡衣惡食者未足與議也心欲求道而以口體之奉不若人為恥其識趣之卑陋甚矣何足與議於道哉或問恥惡衣惡食者其為未免於求飽求安之累者乎曰此固然也然求飽與安者猶有以適乎口體之實也此則非以其不可衣且食也特以其不美於觀聽而自恧焉蓋其識致卑凡又在求飽與安者之下矣志於道而猶不免乎是焉則其志亦何足言哉輔氏曰士志於道則舉天下之物不足以動其心所知日高明所造日廣大與之議道則足以發其精微盡其曲折若猶以口體之奉不若人為恥則其識趣之卑陋可知矣尚何足與議夫道哉程子曰志於道而心役乎外何足與議也語錄曰程子只於本文添一兩字看着似平淡若是子細去窮究其味深長陳氏曰志方求而未眞有得安保其無外役以分之葉氏曰心一而已役於物則害於道篤於道則忘於物天理人欲消長之機聖人之所深辨而學者之所當加察也子曰君子之於天下也無適也無莫也義之與比適丁歴反比必二反適專主也春秋傳曰吾誰適從是也莫不肯也比從也謝氏曰適可也莫不可也無可無不可茍無道以主之不幾於猖狂自恣乎此佛老之學所以自謂心無所住而能應變而卒得罪於聖人也聖人之學不然於無可無不可之間有義存焉然則君子之心果有所倚乎語錄曰聖人不說道可不說道不可但看義如何耳佛老則皆不睹是我要道可便是可我要道不可便是不可只由在我說得又曰君子之心果有所倚乎只是把心去看是與不是輔氏曰適為專主莫為不肯正也謝氏以適為可者謂其專主於可也適與莫相反旣以適為可故以莫為不可也又曰道是體義是用義是就事上言前且緫言之故以體言而曰道又析言之故以用言而曰義又曰聖人之學以道為言而隨事應變有義存焉則雖若有倚而實無所倚蓋道義變動不居未嘗有所倚着故也又曰君子之心果有所倚乎此是活句蓋欲學者深思而自得之也大抵無適無莫而不主於義則猖狂妄行無適無莫義之與比則步步着實自然無倚也胡氏曰適旣釋為專主矣與謝氏可也之義甚不類然適與莫對以適為心之所專主則莫非所主矣主之者必意之所可則不主者必所不可矣字訓雖殊而義則相通子曰君子懷德小人懷土君子懷刑小人懷惠懷思念也懷德謂存其固有之善懷土謂溺其所處之安懷刑謂畏法懷惠謂貪利君子小人趣向不同公私之間而已矣輔氏曰懐德謂存乎是心固有之善懐土謂溺乎此身所處之安懐刑謂畏法如管仲所謂畏威如疾禮記所謂畏法令者皆是也人能如此亦可謂善有違條礙貫厎事能不做亦大段好了懷惠謂貪利茍得而不復知有所謂義理者也尹氏曰樂善惡不善所以為君子茍安務得所以為小人或問懷刑之為惡不善曰樂善惡不善猶曰好仁惡不仁也必以刑為言則猶管仲所謂畏威如疾申公巫臣所謂愼罰務去之之謂耳語錄曰此是君子小人相對說尹氏之說得之若一串說厎便添兩箇則字惠字下又着添字輔氏曰樂善惡不善心之公也茍安務得欲之流也子曰放於利而行多怨放上聲孔氏曰放依也多怨謂多取怨孔氏名安國西漢人孔子十一世孫程子曰欲利於己必害於人故多怨輔氏曰凡事須要自家安利則自然不恤它人故必至於害人而多怨子曰能以禮讓為國乎何有不能以禮讓為國如禮何讓者禮之實也語錄曰問辭遜之端發於本心之誠然故曰讓是禮之實曰是玉帛交錯固是禮之文擎跽曲拳升降俛仰也只是禮之文皆可以偽為惟是辭遜方是禮之實這却偽不得又曰讓者譬如凡事寧就自家身上抉出些箇辭尊居卑辭多受少厎意思方是禮之實黄氏曰禮有實有文以所有而遜與人此非虚文乃實事也實字只當如此看陳氏曰此一句最切乃以心言眞能如此則自足以興起國人之心矣何有言不難也言有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣輔氏曰若無其實而徒相與於繁文末節之間則亦無如禮何矣蔡氏曰集註言讓者禮之實又言禮文雖具蓋實字與文字相對發於辭遜之心見於辭尊居卑辭多受少者禮之實也從事乎繁文末節而形於跪拜俯伏者特禮之文耳以禮之實為國則一國興遜其為國也何有若徒從事於繁文末節之間亦偽而已矣其如禮何哉而況於為國乎子曰不患無位患所以立不患莫已知求為可知也所以立謂所以立乎其位者可知謂可以見知之實程子曰君子求其在已者而已矣黄氏曰所以立乎位之道有可知之實求諸已也患無位患莫已知求諸人也求諸已而在人者有不得在我無憾矣求諸人而在己者有不足祗足以自愧而已輔氏曰人情惟患無位耳君子則以立乎其位者為患人情惟患莫已知耳君子則以無可知之實為患此正為己之學也子曰參乎吾道一以貫之曾子曰唯參所金反唯上聲參乎者呼曾子之名而告之胡氏曰以子出門人問觀之當時侍坐必非一人獨呼曾子而語之蓋唯曾子為能達此也貫通也唯者應之速而無疑者也愚謂禮曰先生召無諾唯而起所以唯為應之速聖人之心渾然一理而泛應曲當用各不同胡氏曰此一章之大旨也渾然一理者純亦不已無豪髮之間斷在學者則為忠在夫子則為一在天地則為至誠無息也泛應曲當者酬酢萬變無不合乎理在學者則為恕在夫子則為貫在天地則為萬物各得其所也曾子於其用處蓋已隨事精察而力行之但未知其體之一爾語錄曰問曾子未知其體之一曰它逐件去理會問與禮到人情委曲處無不講究其初見一事只是一事百件事是百件事得夫子一㸃醒百件事只是一件事許多般様只一心流出曾子至此方信得是一箇道理又曰曾子先於孔子之所以敎者日用之常禮文之細莫不學來惟未知其本出於一貫耳又曰它只見得一事一理不知只是一理又曰問曾子未知體之一處恐但能行其粗而未造其精曰聖人所以發用流行處皆此一理豈有精粗政如水相似田中也是此水池中也是此水溝中也是此水海中也是此水不成說海中水是精它處水是粗豈有此理緣它見聖人用處皆能隨事精察力行不過但見得聖人之用不同而不知實皆此理流行之妙且如事君忠是此理事親孝也是此理交朋友也是此理以至精粗小大之事皆此一理貫通之胡氏曰一即體貫即用體隱而用顯故用可見學者之所能知體不可見非學之至者不能知也夫子知其眞積力久將有所得是以呼而告之曾子果能黙契其指即應之速而無疑也或問一貫之指夫子不俟曾子之問而呼以告之曾子無所問辨而唯焉以對何也曰曾子之學主於誠身其於聖人一言一行之際蓋無不詳視審記而力行之也至是則其積之久行之熟日用之間所以應物處事者各有條理而無不盡矣所未達者特未知反求其本而得夫衆理之所自來然其下學之功亦至而將有以上達矣夫子於此蓋得之眉睫之間也故不俟其問而呼以告之若曰吾之所謂道者雖有精粗小大内外本末之殊然其所以為道者則一而已矣曾子之心於是豁然而有以得夫衆理之所自來者故無所復疑而直應曰唯蓋不唯無待於問辨而亦不容有所稱賛也輔氏曰曾子平日於聖人應事接物處一一精察而力行之然其所以未知體之一者想見聖人只敎他去事事物物上做工夫而曾子之心思亦未嘗到那上只是着實踐履將去至此而眞積力久亦將融會貫通自有所得故夫子才略提省他他便自能黙契其指也子出門人問曰何謂也曾子曰夫子之道忠恕而已矣盡已之謂忠推已之謂恕文集曰盡已推已皆是賢人之事但以二者自相對待便見體用之意盡已是體上工夫推己是用上工夫語錄曰忠者盡已之心無少偽妄恕者推已及物各得其所欲陳氏曰忠是就心說是盡已之心無不眞實者恕是就待人接物處說只是推己心之所眞實者以及人物而已而已矣者竭盡而無餘之詞也胡氏曰所以止其妄意高遠之弊非姑為假託之辭也夫子之一理渾然而泛應曲當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣語錄曰自此之外固無餘法便是那竭盡無餘之謂聖人只是箇忠只是箇恕更無餘法學者則須推之聖人則不消如此只是箇至誠無息萬物得所是也問推只是推巳之推否更無餘法是一理之外更無其他否曰聖人之忠恕自别不可將做尋常忠恕字看問恕必須是推若不須推便是仁了曰聖人本不可說是忠恕曾子假借來說要之天地是一箇無心厎忠恕聖人是一個無為厎忠恕學者是一箇着力厎忠恕學者之忠恕方正定是忠恕陳氏曰詳集註所謂自此之外更無餘法而亦無待於推矣繫之天地至誠無息而萬物各得其所之下則更無餘法是言已盡之意應至誠無息句亦無待於推是應萬物各得其所意輔氏曰一理渾然而泛應曲當者聖人之體用也至誠無息而萬物各得其所者天地之體用也聖人之體用與天地為一則至矣盡矣不可以有加也故曰自此之外固無餘法皆自然而然莫之為而為莫之致而致故曰亦無待於推矣曾子有見於此而難言之故借學者盡己推己之目以著明之欲人之易曉也語錄曰一貫譬是天然厎花為是天然厎難說故把忠恕來說恰如把做厎花形容那天然厎花蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也以此觀之一以貫之之實可見矣語錄曰忠恕只是體用猶形影要除一箇不得又曰以其必於此而本焉故曰道之體以其必由是而之焉故曰道之用問若把做體用說恐成兩截曰說體用便只是一物如人渾身便是體口裏說話便是用不成說話厎是箇物事渾身又是一箇物事萬殊便是這一本一本便是那萬殊又曰忠者一理也恕便是條貫萬殊皆自此出來雖萬殊却只一理所謂貫也又曰一本是統會處萬殊是流行處在天道言之一本則是元氣之於萬物有日月星辰昆蟲草木之不同而只是一氣之所生萬殊則是日月星辰昆蟲草木之所得而生一箇自是一箇模様在人事言之則一理之於萬事有君臣父子兄弟朋友動息洒掃應對之不同而只是此理之所貫萬殊則是君臣父子兄弟朋友之所當於道者一箇是一箇道理其實只是一本又曰而今不是一本處難認是萬殊處難認如何就萬殊上見得皆有恰好處又曰到這裏只見一本萬殊不見其他輔氏曰此又獨舉天地之體用而釋之也雖不言聖人之體用而聖人之體用亦在其中矣故直言道之體道之用而已亦不復明言天地也萬殊之所以一本者指用之出於體謂萬殊之實出於一本也一本之所以萬殊者指體之散於用謂一本之實散於萬殊也指用之出於體指體之散於用則一以貫之之實可見矣或曰中心為忠如心為恕於義亦通語錄曰此語見周禮疏又曰如比也比自家心推將去輔氏曰中心為忠謂中心所有本無一豪之不盡也如心為恕謂如我之心而推之於外無彼此之間也心存於中則自無不盡如心而推則自然及物程子曰以己及物仁也推己及物恕也違道不遠是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不遠異者動以天爾或問天亦盡己之心而推以及物乎曰此以天道著人事取其理之屬乎是者而分之耳若天之目然而無外則又何己之盡而有待乎推以及物邪亦曰其本體者在人則謂之忠由是而在物者在人則謂之恕耳曰推程子動以天之云者則聖人之忠恕為動以天而賢人之忠恕為動以人矣而又以忠為天道恕為人道何邪且盡己推己均有涉乎人為又何以有天人之分邪曰彼以聖賢而分也此以内外而分也盡己雖涉乎人為然為之在己而非有接於物也從横錯綜見其並行而不相悖者焉則於此無所疑矣語錄曰以己是自然流出乾道變化各正性命是太極自然流出來不待安排布置老者安之朋友信之少者懐之是聖人心上自然流出來與天一般推己却要着力又曰以己及物是大賢以上聖人之事聖人是因我這裏有那意思便去及人如未飢未見得天下之飢未寒未見得天下之寒因我之飢寒便見得天下之飢寒自然恁地去及他便是以己及物如賢人以下知得我是要恁地想人亦要恁地而今不可不敎他恁地三反五折便是推已及物只是爭箇自然與不自然又曰天道是體人道是用動以天之天只是自然又曰忠是自然恕是隨事應接略假人為所以有天人之辨又曰此天却是與人對之天若言動以天也天即是理之自然又曰集註中舉程子第一段甚好非明道不能得到自忠恕一以貫之以後至違道不遠動以天住乃說一以貫之之忠恕其曰此與違道不遠異者動以天爾何也蓋此數句乃動以天爾如推己及物違道不遠則動以人爾問如此則有學者之忠恕曰聖人不消言恕故集註云此借學者之事而言又曰曾子忠恕與子思忠恕不同曾子忠恕是天子思尚是在人又曰論着忠恕名義自合依子思忠恕違道不遠是也曾子所説却是移上一階説聖人之忠恕到程子又移上一階說天地之忠恕其實只一箇忠恕須自看敎有許多等級分明黄氏曰今且把違道不遠之忠恕來看便分曉聖人之忠恕天道也學者便是人道也如何又說忠是天道恕是人道以聖人去比學者聖人之忠是天之天聖人之恕是天之人學者之忠是人之天學者之恕是人之人畢竟忠喚做體便是近那未發處故雖學者亦有箇天恕喚做用便是推出外去了雖聖人亦有箇人忠只是盡自家心便較易恕是逐一去做便着力又曰旣以天人分忠恕後獨言動以天者蓋忠則全是天恕字則有些子人所以言忠天道恕人道學者之忠恕皆人聖人之忠恕皆天所以言動以天輔氏曰違道不遠者學者之忠恕也動以天者聖人之忠恕也曾子一貫之忠恕雖借學者之事而言其所以異者只是動以天爾所謂動以天爾者蓋於忠上已全盡了不待推而自然及物也如所謂以已及物仁也此則夫子之一貫所謂動以天也陳氏曰程子說忠恕以大本達道為言只是借中庸四字言之耳其意自不同蓋中之為大本是專指未發處言之此忠之為大本則是就心之存主處眞實無妄處言徹首徹尾無閒於巳發未發也永嘉陳氏曰仁者已私銷盡中無障礙故說已即人便在不待以類而推所謂以已及物也恕者方欲滌除已私尚有障礙因已而後及人必待以類而推所謂推已及物也仁恕用心皆是與物公共意思但仁者見得快恕者見得遲耳又曰忠恕是對立道理故以體用言其體無妄故言天其用推行故言人天人之分體用之謂也愚謂程子欲人識得恕字之本義故先言仁恕之别蓋仁是恕之充極而至者以已及物聖人之事一以貫之之恕也即所謂仁也推已及物學者之事違道不遠之恕也只可謂之恕又曰維天之命於穆不已忠也乾道變化各正性命恕也語錄曰維天之命於穆不已此是不待盡而忠也乾道變化各正性命此是不待推而恕也又曰維天之命於穆不已亦只是以這實理流行發生萬物牛得之而為牛馬得之而為馬草木得之而為草木又曰各正性命各得其性命之正黄氏曰不已便是盡厎意各正便是推厎意天下雷行物與無妄是一箇物與它一箇無妄皆是恕厎意但它自然恁地流行不息在學者却須是盡他是自然恁地箇箇恰好不費力在學者却須是推輔氏曰只是一箇道理但天地聖人是自然學者是勉强而然若合天人而言之則維天之命於穆不巳忠也有少私意便是己便是有不盡也乾道變化各正性命恕也有少差錯便是不正便是不恕也陳氏曰天豈能盡已推已此只是言其理都一般耳維天之命元而亨亨而利利而貞貞而復元萬古循環無一息之停只是一箇眞實無妄道理而萬物各具此以生洪纎高下各正其所賦受之性命此天之忠恕也又曰聖人敎人各因其才吾道一以貫之唯曾子為能達此孔子所以告之也曾子告門人曰夫子之道忠恕而已矣亦猶夫子之告曾子也中庸所謂忠恕違道不遠斯乃下學上達之義或問下學上達之義曰此謂中庸之言欲學者之下學乎忠恕而上達乎道也若此章之云則聖人之事而非有等級之可言矣語錄曰忠恕違道不遠此乃略下敎人之意下學而上達也輔氏曰聖賢之於人雖有敎無類然其為敎也不陵節而施必因其才而篤焉故夫子之告曾子與曾子之告門人其意一也然曾子聞夫子之言則曰唯門人聞曾子之言則不領也是則夫子曾子之告則同而曾子門人之聞則異也子曰君子喻於義小人喻於利喻猶曉也或問喻之義曰心解通達則其幾微曲折無不盡矣胡氏曰喻者精微曲折不待思惟而曉然於胷中也人之一心至虚至靈萬物皆備無所不通者即其本體也雖至昏至愚蔽其本體隨其意之所趨亦有所通曉焉此君子小人所以皆有所喻也義者天理之所宜利者人情之所欲陳氏曰天理所宜者只是當然而然無所為而然也人情所欲者只是不當然而然有所為而然也輔氏曰天理之所宜謂義理之所當然人情之所欲謂人情之所欲得程子曰君子之於義猶小人之於利也唯其深喻是以篤好語錄曰君子之於義見得委曲透徹故自樂為小人之於利亦是於曲折纎悉間都理會得故亦深好之楊氏曰君子有舎生而取義者以利言之則人之所欲無甚於生所惡無甚於死孰肯舎生而取義哉其所喻者義而已不知利之為利故也小人反是輔氏曰楊氏說最明切夫死生亦大矣自人情之所欲言之則孰肯舎生而取義哉彼君子之所以獨能如是者蓋其心唯知義之不可違而不知利之為可欲故也不知利之為利者則以其平日心只在義上未嘗到利上是以不知其為可欲耳夫如是然後能舎生以取義不然天理人欲方交戰而並行乃欲臨時而加決擇焉則終亦必亡而已矣子曰見賢思齊焉見不賢而内自省也省悉井反思齊者冀已亦有是善内自省者恐已亦有是惡語錄曰問見人之賢者知其德行之可尊可貴則必思我亦有是善天之所賦未嘗虧欠何以不若於人必須勇猛精進求其必至於可尊可貴之地見不賢者則知彼是情欲汨沒所以至此必須惕然省察恐已亦有是惡潛伏於内不自知覺將為小人之歸此言君子當反求諸身如此曰然胡氏曰見人之善惡不同而無不反諸身者則不徒羡人而甘自棄不徒責人而忘自責矣輔氏曰羡人而甘自棄則不復勉於善責人而忘自責則不復改其惡不勉其善不改其惡則終必為小人而已大抵人心之明賢否固有所不能遁然徒見之而不反諸身以致其思齊内省之誠則無益於我非所謂為已之學近思之方也子曰事父母幾諫見志不從又敬不違勞而不怨此章與内則之言相表裏幾微也微諌所謂父母有過下氣怡色柔聲以諫也語錄曰幾微也只是漸漸細密諫不恁峻暴硬要䦨截胡氏曰子之事親主於愛雖父母有過不容不諫然必由愛心以發乃可故下氣怡色柔聲皆深愛之形見者也所以謂幾微而諫不敢顯然直遂其已意也見志不從又敬不違所謂諫若不入起敬起孝悅則復諫也語錄曰不違是主那諫上說敬已是順了又須委曲作道理以諫不違去了那幾諫之意也又曰又敬不違者上不違微諫之意恐唐突以觸父母之怒下不違欲諌之心務欲置父母於無過之地其心心念念只在於此若見父母之不從恐觸其怒遂止而不諫者非也務欲必諫遂至觸其怒亦非也勞而不怨所謂與其得罪於鄉黨州閭寧熟諫父母怒不悅而撻之流血不敢疾怨起敬起孝也語錄曰問集註舉内則將來說勞而不怨禮記說勞字似作勞力說如何曰諫了又諫被撻至於流血可謂勞矣所謂父母喜之愛而不忘父母惡之勞而不怨勞只是一般勞子曰父母在不遠遊遊必有方遠遊則去親遠而為日久定省曠而音問疎不惟已之思親不置亦恐親之念我不忘也遊必有方如已告云之東即不敢更適西欲親必知已之所在而無憂召已則必至而無失也輔氏曰詳味其言非身歴之不能盡其精微曲折之意如此事親者宜深體而力行之范氏曰子能以父母之心為心則孝矣輔氏曰父母在為子者遠遊固不可而近遊亦當有方遠遊與無方皆非父母之所欲於其子者子能以父母之心為心則自不到如此矣胡氏曰遠遊特事之至淺近者耳惟能即是而推之則可以貽親之憂者皆不敢為矣故范氏之說深得其旨子曰三年無改於父之道可謂孝矣胡氏曰已見首篇此蓋復出而逸其半也愚謂所謂逸其半者必兼觀志觀行二語而後可以究其義子曰父母之年不可不知也一則以喜一則以懼知猶記憶也胡氏曰謂念念在此而不能忘也常知父母之年則旣喜其壽又懼其衰而於愛日之誠自有不能已者語錄曰只是這一事上旣喜其壽又懼其來日之無多微差些却是兩事矣胡氏曰所謂愛日正恐其日之不足而事親之道欲無所不盡其至也子曰古者言之不出恥躬之不逮也言古者以見今之不然逮及也行不及言可恥之甚古者所以不出其言為此故也語錄曰此章𦂳要在恥字上若是無恥厎人未曾做得一分便說十分矣范氏曰君子之於言也不得已而後出之非言之難而行之難也人唯其不行也是以輕言之言之如其所行行之如其所言則出諸其口必不易矣語錄曰范氏說最好只緣胡亂輕易說了便把行不當事非踐履到厎烏能言及此子曰以約失之者鮮矣鮮上聲謝氏曰不侈然以自放之謂約文集曰約有収斂近裏着實之意非徒簡而已輔氏曰約與放正相反約則守於規矩之中放則逸乎規矩之外且天理有則而不流人欲横流而無止故以約失之者少尹氏曰凡事約則鮮失非止謂儉約也語錄曰凡事要約約厎自是少失或曰恐失之吝嗇如何曰這約字又不如此只是凡事自収斂若是吝嗇又當放開這箇要人自稱量子曰君子欲訥於言而敏於行行去聲謝氏曰放言易故欲訥力行難故欲敏語錄曰問凡事言時易行時難言懼其易故欲訥訥者言之難出諸口也行懼其難故欲敏敏者力行而不惰也曰然胡氏曰自吾道一貫至此十章疑皆曾子門人所記也輔氏曰曾子之學主於誠身又以孝聞於聖門而此十章皆反身切已為孝之道是以疑其然也子曰德不孤必有鄰鄰猶親也德不孤立必以類應故有德者必有其類從之如居之有鄰也語錄曰有如此之德必有如此之類應子游曰事君數斯辱矣朋友數斯疏矣數色角反程子曰數煩數也胡氏曰事君諫不行則當去導友善不納則當止至於煩瀆則言者輕聽者厭矣是以求榮而反辱求親而反疏也文集曰胡氏說盡人情語錄曰問胡氏似專主諫而言恐交際之間如諂媚之類亦是數不止是諫曰若說交際煩處數自是求媚之人則索性是不好厎事了是不消說以諫而數者却是意善而事未善耳聖人特言之以警學者范氏曰君臣朋友皆以義合故其事同也論語纂疏卷二
